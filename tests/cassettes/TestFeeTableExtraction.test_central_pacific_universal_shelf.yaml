        of Appointment by Successor</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">In case of the appointment hereunder of a successor
        Trustee with respect to all Securities, every such successor Trustee so appointed
        shall execute, acknowledge and deliver to the Company and to the retiring
        Trustee an\n        instrument accepting such appointment, and thereupon the
        resignation or removal of the retiring Trustee shall become effective and
