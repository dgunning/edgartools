        center;\"><a name=\"z_Toc126057226\"></a>ARTICLE 8</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"text-align: center;\">CONSOLIDATION,
        MERGER, CONVEYANCE, TRANSFER OR LEASE</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057227\"></a>Section 8.01&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Company May Consolidate, Etc., Only on Certain Terms</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        shall not consolidate with or merge into any other Person or convey, transfer
        or lease its properties and assets substantially as an entirety to any Person,
        and the Company shall not permit any Person to\n        consolidate with or
        merge into the Company or convey, transfer or lease its properties and assets
        substantially as an entirety to the Company, unless:</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160; &#160; &#160; in case the Company shall consolidate with
        or merge into another Person or convey, transfer or lease its properties and
        assets substantially as an entirety to any Person, the Person formed by such\n
        \       consolidation or into which the Company is merged or the Person which
        acquires by conveyance or transfer, or which leases, the properties and assets
