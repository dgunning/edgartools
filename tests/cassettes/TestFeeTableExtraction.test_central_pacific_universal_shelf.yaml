        style=\"font-weight: bold;\">] </font>per annum (to the extent that the payment
        of such interest shall be legally enforceable), from the dates such amounts
        are due until they are paid or made available for payment, and such interest
        shall be\n        payable on demand<font style=\"font-weight: bold;\">]</font>.
        The interest so payable, and punctually paid or duly provided for, on any
        Interest Payment Date will, as provided in such Indenture, be paid to the
        Person in whose name this Security (or\n        one or more Predecessor Securities)
        is registered at the close of business on the Regular Record Date for such
