        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h3\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; font-weight: bold; margin-top: 6.75pt; margin-left: 20pt; text-align:
        left;\">Notices </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Notices to be given to holders
        of a global debt security will be given only to the depositary, in accordance
        with its applicable policies as in effect from time-to-time. Notices to be
        given to holders of debt securities not in global form will be sent by mail
        to the respective addresses of the holders as they appear in the trustee&#8217;s
        records. Neither the failure to give any notice to a particular holder, nor
        any defect in a notice given to a particular holder, will affect the sufficiency
        of any notice given to another holder. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Book-entry and other indirect owners should consult their banks or
        brokers for information on how they will receive notices.<font style=\"font-style:
        normal;\"> </font></div></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">32<br></div></div></div>\n<!--End
        Page 35-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 36-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg24\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h1\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tDPC\"><!--Anchor--></a>DESCRIPTION
        OF PURCHASE CONTRACTS WE MAY OFFER </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Please note that in this section entitled &#8220;Description of Purchase
        Contracts We May Offer,&#8221; references to &#8220;holders&#8221; mean those
        who own purchase contracts registered in their own names, on the books that
        we or our agent maintain for this purpose, and not those who own beneficial
        interests in purchase contracts registered in street name or in purchase contracts
        issued in book-entry form through one or more depositaries. Owners of beneficial
        interests in the purchase contracts should read the section below entitled
        &#8220;Legal Ownership and Book-Entry Issuance.&#8221;<font style=\"font-style:
        normal;\"> </font></div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">This section outlines some of the provisions of the purchase contracts.
        This information may not be complete in all respects and is qualified entirely
        by reference to the purchase contract agreement with respect to the purchase
        contracts of any particular series. The specific terms of any series of purchase
        contracts will be described in the applicable prospectus supplement. If so
        described in a particular prospectus supplement, the specific terms of any
        series of purchase contracts may differ from the general description of terms
        presented below.<font style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Unless
        otherwise specified in the applicable prospectus supplement, we may issue
        purchase contracts, including contracts obligating holders to purchase from
        us, and obligating us to sell to the holders, a number of shares of our common
        stock, preferred stock or depositary shares, debt securities, rights or warrants,
        at a future date or dates. Alternatively, the purchase contracts may obligate
        use to purchase from holders, and obligate holders to sell to us, a specified
        or varying number of shares of common stock, preferred stock, depositary shares,
        debt securities, warrants or other security or property. The price per purchase
        contract security may be fixed at the time the purchase contracts are issued
        or may be determined by reference to a specific formula set&#160;forth in
        the purchase contracts. Under the purchase contracts, we may be required to
        make periodic payments to the holders of the units or vice versa. These payments
        may be unsecured or prefunded on some basis to be specified in the applicable
        prospectus supplement. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The purchase
        contracts may require holders to secure their obligations under the contracts
        in a specified manner and, in specified circumstances, we may deliver newly
        issued prepaid purchase contracts, or prepaid securities, when we transfer
        to a holder any collateral securing the holder&#8217;s obligations under the
        original purchase contract. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The purchase
