        the Company</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company shall file with the Trustee and the Commission, and transmit
        to Holders, such information, documents and other reports, and such summaries
        thereof, as may be required pursuant to the Trust Indenture Act at\n        the
        times and in the manner provided pursuant to such Act; <font style=\"font-style:
        italic;\">provided </font>that any such information, documents or reports
        required to be filed with the Commission pursuant to Section 13 or 15(d) of
        the Exchange\n        Act shall be filed with the Trustee within 15 days after
        the same is so required to be filed with the Commission.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Delivery of such reports, information
        and documents to the Trustee is for informational purposes only and the Trustee&#8217;s
        receipt of such shall not constitute constructive notice of any information
        contained therein or\n        determinable from information contained therein,
        including the Company&#8217;s compliance with any of its covenants hereunder
