        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tDOC\"><!--Anchor--></a>DESCRIPTION
        OF COMMON STOCK WE MAY OFFER </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Please note that in this section entitled &#8220;Description of Common
        Stock We May Offer,&#8221; references to &#8220;holders&#8221; mean those
        who own shares of common stock, registered in their own names, on the books
        that the registrar or we maintain for this purpose, and not those who own
        beneficial interests in shares registered in street name or in shares issued
        in book-entry form through one or more depositaries. Owners of beneficial
        interests in shares of common stock should also read the section entitled
        &#8220;Legal Ownership and Book-Entry Issuance.&#8221;<font style=\"font-style:
        normal;\"> </font></div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">The following summary description of our common stock is based on
        the provisions of our Amended and Restated Articles of Incorporation, as amended
        (the &#8220;Articles of Incorporation&#8221;), and amended and restated bylaws
        (the &#8220;Bylaws&#8221;), and the applicable provisions of the Hawaii Business
        Corporation Act (the &#8220;HBCA&#8221;). This description is not complete
        and is subject to, and is qualified in its entirety by reference to, our Articles
        of Incorporation, Bylaws (each of which are filed as exhibits to the registration
        statement of which this prospectus forms a part) and the applicable provisions
        of the HBCA. For information on how to obtain copies of our Articles of Incorporation
        and Bylaws, see &#8220;Where You Can Find More Information.&#8221;<font style=\"font-style:
        normal;\"> </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        12pt; margin-left: 0pt; text-align: left;\">Authorized Capital </div><div
        class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-weight: bold; margin-top: 7pt; margin-left:
        20pt; text-align: left;\"><u>Common Stock</u> </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Our
        authorized Common Stock consists of 185,000,000 shares of Common Stock, no
        par value per share, of which 27,061,589 shares are outstanding as of March&#160;31,
        2025. The issued Common Stock is not federally insured. </div><div class=\"BRDSX_h4\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 12pt; margin-left: 20pt; text-align:
        left;\">Dividend Rights </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Holders of our
        Common Stock are entitled to receive dividends if, as and when declared by
        the Board of Directors, out of any funds legally available for dividends.
        The ability to pay dividends depends on the amount of dividends paid to the
        Company by Central Pacific Bank, a wholly-owned subsidiary of the Company.
        The Company&#8217;s payment of dividends, and the Bank&#8217;s payment of
        dividends to the Company, are subject to extensive government regulation,
        in that regulatory authorities may invoke their authority to prohibit banks
        and their holding companies from paying dividends for a number of reasons,
        including, for example, a determination that such payments would constitute
        an unsafe or unsound banking practice or a determination that such payments
        would reduce the amount of either entity&#8217;s capital below that necessary
        to meet minimum applicable regulatory capital requirements. Our ability to
        pay dividends is also subject to restrictions set forth under Hawaii law and
        restrictions and covenants set forth in various agreements we are a party
        to, including covenants set forth in our subordinated debentures. Under Hawaii
        law, no dividend may be made if, after giving it effect, (i) we would not
        be able to pay our debts as they become due in the usual course of business,
        or (ii) our assets would be less than the sum of our total liabilities plus
        the amount that would be needed if we were to be dissolved at the time of
        the dividend, to satisfy the preferential rights upon dissolution of shareholders
        whose preferential rights are superior to those receiving the dividend. The
        Bank, in addition to obtaining approval from the Federal Reserve Board and
        Hawaii Division of Financial Institutions, if required, is not permitted under
        Hawaii law to pay dividends except out of retained earnings as defined under
        Hawaii banking law. </div><div class=\"BRDSX_h4\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 12pt; margin-left: 20pt; text-align: left;\">Liquidation
        and Dissolution </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">In the event of our liquidation
        or dissolution, the holders of Common Stock are entitled to receive proportionately
        all assets available for distribution to shareholders after the payment of
        all debts and other liabilities and subject to the prior rights of any outstanding
        preferred stock. Holders of Common Stock are not entitled to a liquidation
        preference in respect of those shares. </div><div class=\"BRDSX_h4\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 12pt; margin-left: 20pt; text-align: left;\">No Preemptive
        or Conversion Rights </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Holders of Common
        Stock generally do not have preemptive rights to purchase additional Common
        Stock or conversion or redemption rights under our Restated Articles of Incorporation
        or the HBCA. </div><div class=\"BRDSX_h4\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        12pt; margin-left: 20pt; text-align: left;\">Voting Rights </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Holders
        of our Common Stock are entitled to one vote for each share held on all matters
        submitted to a vote of shareholders and do not have cumulative voting rights.
        An election of directors by our shareholders shall be determined by a plurality
        of the votes cast by the shareholders entitled to vote on the election. </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">10<br></div></div></div>\n<!--End Page 13-->\n<div class=\"BRPFPageBreakArea\"
