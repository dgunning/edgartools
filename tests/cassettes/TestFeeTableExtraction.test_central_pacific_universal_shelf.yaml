        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">the number of shares constituting
        each such series. </div></td></tr></table><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The applicable
        prospectus supplement will describe the specific dividend, liquidation, redemption,
        voting and any conversion rights relating to the particular series of the
        preferred stock it offers, including among other things dividend rates; dividend
        periods; whether dividends will be cumulative or noncumulative; the terms
        upon which we may, or must, redeem such preferred stock; rights upon liquidation;
        and voting rights. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Unless the applicable
        prospectus supplement specifies otherwise, the preferred stock will have no
        preemptive rights to subscribe for any additional securities that we may issue
        in the future, which means that holders of shares of preferred stock will
        have no right, as holders of shares of preferred stock, to buy any portion
        of those issued securities. </div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">14<br></div></div></div>\n<!--End
        Page 17-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 18-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg6\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h1\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tDOD\"><!--Anchor--></a>DESCRIPTION
        OF DEPOSITARY SHARES WE MAY OFFER </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Please note that in this section entitled &#8220;Description of the
        Depositary Shares We May Offer,&#8221; references to &#8220;holders&#8221;
        mean those who own depositary shares registered in their own names, on the
        books that the registrar or we maintain for this purpose, and not those who
        own beneficial interests in shares registered in street name or in shares
        issued in book-entry form through one or more depositaries. Owners of beneficial
        interests in depositary shares should also read the section entitled &#8220;Legal
        Ownership and Book-Entry Issuance.&#8221;<font style=\"font-style: normal;\">
        </font></div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">This section
        outlines some of the provisions of the deposit agreement to govern any depositary
        shares, the depositary shares themselves and the depositary receipts. This
        information may not be complete in all respects and is qualified entirely
        by reference to the relevant deposit agreement and depositary receipts with
        respect to the depositary shares related to any particular series of preferred
        stock. The specific terms of any series of depositary shares will be described
        in the applicable prospectus supplement. If so described in the prospectus
        supplement, the terms of that series of depositary shares may differ from
        the general description of terms presented below.<font style=\"font-style:
        normal;\"> </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        15pt; margin-left: 0pt; text-align: left;\">General </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We
        may offer fractional interests in shares of our preferred stock, rather than
        full shares of preferred stock. If we do, we will provide for the issuance
        by a depositary to the public of receipts for depositary shares, each of which
        will represent a fractional interest in a share of a particular series of
        preferred stock. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The shares of any series of preferred
        stock underlying the depositary shares will be deposited under a separate
        deposit agreement between us and a bank or trust company having its principal
        office in the U.S. and having a combined capital and surplus of such amount
        as may be set forth in the applicable prospectus supplement, which we refer
        to in this section as the depositary. We will name the depositary in the applicable
        prospectus supplement. Subject to the terms of the deposit agreement, each
        owner of a depositary share will have a fractional interest in all the rights
        and preferences of the preferred stock underlying the depositary share. Those
        rights include any dividend, voting, redemption, conversion and liquidation
        rights. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The depositary shares will be
        evidenced by depositary receipts issued under the deposit agreement. Purchasers
        of fractional interests in shares of the related series of preferred stock
        will receive depositary receipts as described in the applicable prospectus
        supplement. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Unless we specify otherwise in
        the applicable prospectus supplement, purchasers will not be entitled to receive
        the whole shares of preferred stock underlying the depositary shares. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">While the deposit agreement relating to a particular
        series of preferred stock may have provisions applicable solely to that series
        of preferred stock, all deposit agreements relating to preferred stock we
        issue will include the following provisions except as described in any applicable
        prospectus supplement: </div><div class=\"BRDSX_h2\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Dividends and
        Other Distributions </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Each time we
        pay a cash dividend or make any other type of cash distribution with regard
        to preferred stock of an applicable series, the depositary will distribute
        to the holder of record of each depositary share relating to that series of
        preferred stock an amount equal to the dividend or other distribution per
        depositary share the depositary receives. If there is a distribution of property
        other than cash, the depositary either will distribute the property to the
        holders of depositary shares in proportion to the depositary shares held by
        each of them, or the depositary will, if we approve, sell the property and
        distribute the net proceeds to the holders of the depositary shares in proportion
        to the depositary shares held by them. </div><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Withdrawal of
        Preferred Stock </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">A holder of depositary shares
        will be entitled to receive, upon surrender of depositary receipts representing
        depositary shares, the number of whole or fractional shares of the applicable
        series of preferred stock, and any money or other property, to which the depositary
        shares relate. </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        15pt; margin-left: 0pt; text-align: left;\">Redemption of Depositary Shares
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">Whenever we redeem shares of applicable
        preferred stock held by a depositary, the depositary will be required to redeem,
        on the same redemption date, depositary shares constituting, in total, the
        number of shares of </div></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">15<br></div></div></div>\n<!--End
        Page 18-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 19-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg7\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">preferred stock held by the
        depositary which we redeem, subject to the depositary&#8217;s receiving the
        redemption price of those shares of preferred stock. If fewer than all the
        depositary shares relating to a series are to be redeemed, the depositary
        shares to be redeemed will be selected by lot or by another method we determine
        to be equitable. </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        20.5pt; margin-left: 0pt; text-align: left;\">Voting </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Any
        time we send a notice of meeting or other materials relating to a meeting
        to the holders of an applicable series of preferred stock to which depositary
        shares relate, we will provide the depositary with sufficient copies of those
        materials so they can be sent to all holders of record of the applicable depositary
        shares, and the depositary will send those materials to the holders of record
        of the depositary shares on the record date for the meeting. The depositary
        will solicit voting instructions from holders of depositary shares and will
        vote or not vote the applicable preferred stock to which the depositary shares
        relate in accordance with those instructions. </div><div class=\"BRDSX_h2\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-weight: bold; margin-top: 20.5pt; margin-left: 0pt; text-align:
        left;\">Liquidation Preference </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Upon our liquidation,
        dissolution or winding up, the holder of each depositary share will be entitled
        to what the holder of the depositary share would have received if the holder
        had owned the number of shares (or fraction of a share) of applicable preferred
        stock which is represented by the applicable depositary share. </div><div
        class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-weight: bold; margin-top: 20.5pt; margin-left:
        0pt; text-align: left;\">Conversion </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If shares of
        an applicable series of preferred stock are convertible into common stock
        or other of our securities or property, holders of depositary shares relating
        to that series of preferred stock will, if they surrender depositary receipts
        representing depositary shares and appropriate instructions to convert them,
        receive the shares of common stock or other securities or property into which
        the number of shares (or fractions of shares) of applicable preferred stock
        to which the depositary shares relate could at the time be converted. </div><div
        class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-weight: bold; margin-top: 20.5pt; margin-left:
        0pt; text-align: left;\">Amendment and Termination of a Deposit Agreement
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">We and the depositary may amend a deposit
        agreement and the form of depositary receipt, except that an amendment which
        materially and adversely affects the rights of holders of depositary shares,
        or would be materially and adversely inconsistent with the rights granted
        to the holders of the applicable preferred stock to which they relate, must
        be approved by holders of at least a majority of the outstanding depositary
        shares. No amendment will impair the right of a holder of depositary shares
        to surrender the depositary receipts evidencing those depositary shares and
        receive the applicable preferred stock to which they relate, except as required
        to comply with law. We may terminate a deposit agreement at any time, as long
        as the depositary mails notice of termination to the record holders of depositary
        shares then outstanding at least 30 days prior to the date fixed for termination.
        Upon termination, the depositary shall deliver to each holder of depositary
        receipts, upon surrender of the depositary receipts held by such holder, such
        number of whole or fractional shares of preferred stock as are represented
        by the depositary shares evidenced by such depositary receipts, together with
        any other property held by the depositary with respect to such depositary
        receipt. A deposit agreement will automatically terminate&#160;if: </div><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">All outstanding depositary shares
        to which it relates have been redeemed. </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">Each share of applicable preferred stock has been
        converted into or exchanged for common stock. </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">The depositary has made a final
        distribution to the holders of the depositary shares issued under the deposit
        agreement upon our liquidation, dissolution or winding up. </div></td></tr></table></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">16<br></div></div></div>\n<!--End Page 19-->\n<div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\"
        style=\"page-break-after: always;\"><hr noshade=\"noshade\" style=\"border-width:
        0px; clear: both; margin: 4px auto; width: 612pt; height: 2px; color: #000000;
        background-color: #000000;\"></div></div>\n<!--Begin Page 20-->\n<div class=\"BRDSX_page\"
        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_110-description_pg8\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h1\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tDDS\"><!--Anchor--></a>DESCRIPTION
        OF DEBT SECURITIES WE MAY OFFER </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Please note that in this section entitled &#8220;Description of Debt
        Securities We May Offer,&#8221; references to &#8220;holders&#8221; mean those
        who own debt securities registered in their own names on the books that we
        or the trustee maintain for this purpose, and not those who own beneficial
        interests in debt securities registered in street name or in debt securities
        issued in book-entry form through one or more depositaries. Owners of beneficial
        interests in the debt securities should also read the section entitled &#8220;Legal
        Ownership and Book-Entry Issuance.&#8221;<font style=\"font-style: normal;\">
        </font></div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The following
        description summarizes the material provisions of the senior debt indenture,
        the subordinated debt indenture and the debt securities to be issued under
        the senior debt indenture and subordinated debt indenture, respectively. This
        description is not complete and is subject to, and is qualified in its entirety
        by reference to, the indenture under which the debt securities are issued
        and the Trust Indenture Act of 1939, as amended (the &#8220;Trust Indenture
        Act&#8221;). The specific terms of any series of debt securities will be described
        in the applicable prospectus supplement, and may differ from the general description
        of the terms presented below. The senior debt security indenture and the form
        of subordinated debt security indenture have been filed as exhibits to our
        SEC registration statement relating to this prospectus. References to our
        senior debt indenture and subordinated debt indenture in this section mean
        the forms of indenture filed as exhibits to the registration statement of
        which this prospectus forms a part, such forms of indenture not having been
        executed as of the date of this prospectus.<font style=\"font-style: normal;\">
        </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        12pt; margin-left: 0pt; text-align: left;\">Debt Securities May Be Senior
        or Subordinated </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">We may issue senior or subordinated
        debt securities. Except as otherwise described in the applicable prospectus
        supplement, neither the senior debt securities nor the subordinated debt securities
        will be secured by any property or assets of ours or any of our subsidiaries.
        Thus, by owning a debt security, you are an unsecured creditor of Central
        Pacific. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The senior debt securities will
        be issued under a senior debt indenture described below (a form of which is
        filed as an exhibit to the registration statement of which this prospectus
        forms a part), as it may be supplemented or amended from time-to-time, and
        will rank equally with all of our other senior unsecured and unsubordinated
        debt. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The subordinated debt securities
        will be issued under a subordinated debt indenture described below (a form
        of which is filed as an exhibit to the registration statement of which this
        prospectus forms a part), as it may be supplemented or amended from time-to-time,
        and will be subordinate in right of payment to all of our &#8220;senior debt,&#8221;
        as defined in the subordinated debt indenture, as it may be supplemented or
        amended from time-to-time. The prospectus supplement for any series of subordinated
        debt securities or the information incorporated in this prospectus by reference
        will indicate the approximate amount of senior debt outstanding as of the
        end of our most recent fiscal quarter. Neither indenture will limit our ability
        to incur additional senior debt, unless otherwise described in the prospectus
        supplement relating to any series of debt securities. Our senior debt is,
        and any additional senior debt will be, structurally subordinated to the indebtedness
        of our subsidiaries. See &#8220;&#8212;Our Debt Securities Are Structurally
        Subordinated to Indebtedness of Our Subsidiaries&#8221; below. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">When we refer to &#8220;debt securities&#8221; in
        this prospectus, we mean both the senior debt securities and the subordinated
        debt securities. </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        12pt; margin-left: 0pt; text-align: left;\">The Senior Debt Indenture and
        the Subordinated Debt Indenture </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The senior debt
        securities and the subordinated debt securities will each be governed by a
        document called an indenture &#8211; the senior debt indenture, in the case
        of the senior debt securities, and the subordinated debt indenture, in the
        case of the subordinated debt securities. Each indenture will be a contract
        between us and the trustee under the indentures. The indentures will be substantially
        identical, except for the provisions relating to subordination, which will
        be included only in the subordinated debt indenture. At or prior to the time
        of offering of our debt securities, we will appoint a trustee under the applicable
        indenture. We will identify who that trustee is in the applicable prospectus
        supplement. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 8pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The trustee under each indenture
        has two main roles: </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">First, the
        trustee can enforce your rights against us if we default. There are some limitations
        on the extent to which the trustee acts on your behalf, which we describe
        below under &#8220;&#8212;Default, Remedies and Waiver of Default&#8221;;
        and </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
