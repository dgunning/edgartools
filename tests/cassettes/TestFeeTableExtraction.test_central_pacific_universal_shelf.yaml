        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tDOP\"><!--Anchor--></a>DESCRIPTION
        OF PREFERRED STOCK WE MAY OFFER </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Please note that in this section entitled &#8220;Description of Preferred
        Stock We May Offer,&#8221; references to &#8220;holders&#8221; mean those
        who own shares of preferred stock registered in their own names, on the books
        that the registrar or we maintain for this purpose, and not those who own
        beneficial interests in shares registered in street name or in shares issued
        in book-entry form through one or more depositaries. Owners of beneficial
        interests in shares of preferred stock should also read the section entitled
        &#8220;Legal Ownership and Book-Entry Issuance.&#8221; The following description
        summarizes the material provisions of the preferred stock we may offer.<font
        style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">This description is not complete and is subject to, and is qualified
        in its entirety by reference to our Articles&#160;of Incorporation, Bylaws
        and the applicable provisions of the HBCA. The specific terms of any series
        of preferred stock will be described in the applicable prospectus supplement.
        Any series of preferred stock we issue will be governed by our Articles of
        Incorporation (as amended and in effect as of the date of such issuance) and
        by any articles of amendment related to that series. We will file any articles
        of amendment with the SEC and incorporate it by reference as an exhibit to
        our registration statement at or before the time we issue any preferred stock
        of that series of authorized preferred stock.<font style=\"font-style: normal;\">
        </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        20.5pt; margin-left: 0pt; text-align: left;\">General </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Under
        our Articles of Incorporation, our board of directors has the authority, without
        any further vote or action by our shareholders, to issue up to 1,000,000 shares
        of preferred stock, no par value per share, in one or more series and to fix,
        determine or amend the relative rights and preferences of the shares of any
        series so established, within the limitations set forth in the HBCA, relating
        to the preferences, limitations, voting powers and relative rights thereof,
        including, but not limited to: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">dividend rights; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
