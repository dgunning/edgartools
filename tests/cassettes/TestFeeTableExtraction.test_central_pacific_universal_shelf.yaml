        style=\"font-family: 'Times New Roman'; font-size: 10pt; text-align: left;
        color: #000000;\" bgcolor=\"#ffffff\">\n  <div>\n    <hr style=\"height: 4px;
        color: #000000; background-color: #000000; text-align: center; margin-left:
        auto; margin-right: auto; border: none;\" align=\"center\" noshade=\"noshade\">\n
        \   <div>\n      <div style=\"text-align: right; font-weight: bold;\">EXHIBIT
        4.6</div>\n      <div>&#160;</div>\n      <div style=\"text-align: right;\">Form
        of Subordinated Indenture</div>\n      <div>&#160;</div>\n      <div style=\"text-align:
        center;\">CENTRAL PACIFIC FINANCIAL CORP.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">To</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">[&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ]</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center; font-style:
        italic;\">Trustee</div>\n      <div>&#160;</div>\n      <div style=\"text-align:
