        style=\"text-align: center;\"><a name=\"z_Toc126057175\"></a>ARTICLE 3</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-align: center;\">THE SECURITIES</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057176\"></a>Section
        3.01&#160;&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Amount
        Unlimited; Issuable in Series</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">The aggregate principal amount of Securities
        which may be authenticated and delivered under this Indenture is unlimited.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Securities
        may be issued in one or more series. There shall be established in or pursuant
        to a Board Resolution and, subject to Section 3.03, set forth, or determined
        in the manner provided, in an Officers&#8217;\n        Certificate, or established
        in one or more indentures supplemental hereto, prior to the issuance of Securities
        of any series,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; the title of the Securities of the
        series (which shall distinguish the Securities of the series from Securities
        of any other series);</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">18</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        any limit upon the aggregate principal amount of the Securities of the series
        which may be authenticated and delivered under this Indenture (except for
        Securities authenticated and delivered upon registration\n        of transfer
        of, or in exchange for, or in lieu of, other Securities of the series pursuant
        to Section 3.04, 3.05, 3.06, 9.06 or 11.07 and except for any Securities which,
        pursuant to Section 3.03, are deemed never to have been authenticated and\n
        \       delivered hereunder);</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160; the Person to whom any interest
        on a Security of the series shall be payable, if other than the Person in
        whose name that Security (or one or more Predecessor Securities) is registered
        at the close of business\n        on the Regular Record Date for such interest;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        the date or dates on which the principal of any Securities of the series is
        payable;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;
        the rate or rates at which any Securities of the series shall bear interest,
        if any, the date or dates from which any such interest shall accrue, the Interest
        Payment Dates on which any such interest shall be\n        payable and the
        Regular Record Date for any such interest payable on any Interest Payment
        Date;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;
        the place or places where the principal of and any premium and interest on
        any Securities of the series shall be payable and the manner in which any
        payment may be made;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(7)&#160;&#160;&#160;&#160;&#160; the period or periods within which,
        the price or prices at which and the terms and conditions upon which any Securities
        of the series may be redeemed, in whole or in part, at the option of the Company
        and, if\n        other than by a Board Resolution, the manner in which any
        election by the Company to redeem the Securities shall be evidenced;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;
        the obligation, if any, of the Company to redeem or purchase any Securities
        of the series pursuant to any sinking fund or analogous provisions or at the
        option of the Holder thereof and the period or periods\n        within which,
        the price or prices at which and the terms and conditions upon which any Securities
        of the series shall be redeemed or purchased, in whole or in part, pursuant
        to such obligation;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(9)&#160;&#160;&#160;&#160;&#160; if other than denominations of $1,000
        and any integral multiple thereof, the denominations in which any Securities
        of the series shall be issuable;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(10)&#160;&#160;&#160; if the amount of principal
        of or any premium or interest on any Securities of the series may be determined
        with reference to an index, a financial or economic measure or pursuant to
        a formula, the manner in\n        which such amounts shall be determined;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(11)&#160;&#160;&#160;&#160;
        if other than the currency of the United States of America, the currency,
        currencies or currency units in which the principal of or any premium or interest
        on any Securities of the series shall be payable and\n        the manner of
        determining the equivalent thereof in the currency of the United States of
        America for any purpose, including for the purposes of making payment in the
        currency of the United States of America and applying the definition of\n
        \       &#8220;Outstanding&#8221; in Section 1.01;</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">19</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">(12)&#160;&#160;&#160;
        if the principal of or any premium or interest on any Securities of the series
        is to be payable, at the election of the Company or the Holder thereof, in
        one or more currencies or currency units other than that\n        or those
        in which such Securities are stated to be payable, the currency, currencies
        or currency units in which the principal of or any premium or interest on
        such Securities as to which such election is made shall be payable, the periods
        within\n        which and the terms and conditions upon which such election
        is to be made and the amount so payable (or the manner in which such amount
        shall be determined);</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(13)&#160;&#160;&#160; if other than the entire principal amount thereof,
        the portion of the principal amount of any Securities of the series which
        shall be payable upon declaration of acceleration of the Maturity thereof
        pursuant to\n        Section 5.02;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(14)&#160;&#160;&#160; if the principal amount
        payable at the Stated Maturity of any Securities of the series will not be
        determinable as of any one or more dates prior to the Stated Maturity, the
        amount which shall be deemed to be\n        the principal amount of such Securities
        as of any such date for any purpose thereunder or hereunder, including the
        principal amount thereof which shall be due and payable upon any Maturity
        other than the Stated Maturity or which shall be deemed to\n        be Outstanding
        as of any date prior to the Stated Maturity (or, in any such case, the manner
        in which such amount deemed to be the principal amount shall be determined);</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(15)&#160;&#160;&#160;
        if applicable, that the Securities of the series shall be subject to either
        or both of Defeasance or Covenant Defeasance as provided in Article Thirteen;
        <font style=\"font-style: italic;\">provided </font>that\n        no series
        of Securities that is exchangeable for Common Shares or other securities pursuant
        to Section 3.01(19) shall be subject to Defeasance pursuant to Section 13.02;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(16)&#160;&#160;&#160;
        if applicable, that any Securities of the series shall be issuable in whole
        or in part in the form of one or more Global Securities and, in such case,
        the respective Depositaries for such Global Securities, the\n        form
        of any legend or legends which shall be borne by any such Global Security
        in addition to or in lieu of that set forth in Section 2.04 and any addition
        to, elimination of or other changes in the circumstances set forth in Clause
        (2) of the last\n        paragraph of Section 3.05 in which any such Global
        Security may be exchanged in whole or in part for Securities registered, and
        any transfer of such Global Security in whole or in part may be registered,
        in the name or names of Persons other than\n        the Depositary for such
        Global Security or a nominee thereof;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(17)&#160;&#160;&#160;&#160; any addition to,
        elimination of or other change in the Events of Default which applies to any
        Securities of the series and any change in the right of the Trustee or the
        requisite Holders of such Securities to\n        declare the principal amount
        thereof due and payable pursuant to Section 5.02;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(18)&#160;&#160;&#160;&#160; any addition
        to, elimination of or other change in the covenants set forth in Article Ten
        which applies to Securities of the series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(19)&#160;&#160;&#160; the terms and
        conditions, if any, pursuant to which the Securities are exchangeable for
        Common Stock or other securities; and (20)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;any
        other terms of the series (which terms shall not be inconsistent\n        with
        the provisions of this Indenture, except as permitted by Section 9.01(5)).</div>\n
        \     <div>&#160;</div>\n      <div></div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">20</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">All Securities of any
        one series shall be substantially identical except as to denomination and
        except as may otherwise be provided in or pursuant to the Board Resolution
        referred to above and (subject to Section 3.03)\n        set forth, or determined
        in the manner provided, in the Officer&#8217;s Certificate referred to above
        or in any such indenture supplemental hereto. All Securities of any one series
        need not be issued at one time and, unless otherwise provided or\n        contemplated
        by this Section 3.01 with respect to a series of Securities, additional Securities
        of a series may be issued at the option of the Company, without the consent
        of any Holder, at any time and from time to time.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If any of the terms of the series
        are established by action taken pursuant to a Board Resolution, a copy of
        an appropriate record of such action shall be certified by the Secretary or
        an Assistant Secretary of the\n        Company and delivered to the Trustee
        at or prior to the delivery of the Officers&#8217; Certificate setting forth
        the terms of the series.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Securities shall be subordinated in right of payment to Senior
        Debt as provided in Article Fourteen.</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057177\"></a>Section 3.02&#160;&#160;&#160;&#160;&#160; <font
        style=\"font-style: italic;\">Denominations</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Securities of each series shall
        be issuable only in registered form without coupons and only in such denominations
        as shall be specified as contemplated by Section 3.01. In the absence of any
        such specified\n        denomination with respect to the Securities of any
        series, the Securities of such series shall be issuable in denominations of
        $1,000 and any integral multiple thereof.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057178\"></a>Section 3.03&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Execution, Authentication, Delivery and
        Dating</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Securities shall be executed on behalf of the Company by the Chairman
        of the Board, the Vice Chairman of the Board, the President or one of the
        Vice Presidents, under the trust seal reproduced thereon attested by\n        the
        Secretary, one of the Assistant Secretaries or other authorized Person of
        the Company. The signature of any of these officers on the Securities may
        be manual or facsimile.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Securities bearing the manual or facsimile signatures of individuals
        who were at any time the proper officers of the Company shall bind the Company,
        notwithstanding that such individuals or any of them have ceased to\n        hold
        such offices prior to the authentication and delivery of such Securities or
        did not hold such offices at the date of such Securities.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">At any time and from time to time
        after the execution and delivery of this Indenture, the Company may deliver
        Securities of any series executed by the Company to the Trustee for authentication,
        together with a Company\n        Order for the authentication and delivery
        of such Securities, and the Trustee in accordance with the Company Order shall
        authenticate and deliver such Securities. If the form or terms of the Securities
        of the series have been established by or\n        pursuant to one or more
        Board Resolutions as permitted by Sections 2.01 and 3.01, in authenticating
        such Securities, and accepting the additional responsibilities under this
        Indenture in relation to such Securities, the Trustee shall be entitled to\n
        \       receive, and (subject to Section 6.01) shall be fully protected in
        relying upon, an Opinion of Counsel stating,\n        <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; if the form of such Securities has
        been established by or pursuant to Board Resolution as permitted by Section
        2.01, that such form has been established in conformity with the provisions
        of this Indenture;</div>\n        <div>&#160; <br>\n        </div>\n      </div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">21</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <br>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160; if the terms of such Securities
        have been established by or pursuant to Board Resolution as permitted by Section
        3.01, that such terms have been established in conformity with the provisions
        of this Indenture;\n        and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160; &#160; that such Securities,
        when authenticated and delivered by the Trustee and issued by the Company
        in the manner and subject to any conditions specified in such Opinion of Counsel,
        will constitute valid and\n        legally binding obligations of the Company
        enforceable in accordance with their terms, subject to bankruptcy, insolvency,
        fraudulent transfer, reorganization, moratorium and similar laws of general
        applicability relating to or affecting creditors&#8217;\n        rights and
        to general equity principles.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If such form or terms have been so established, the Trustee shall
        not be required to authenticate such Securities if the issue of such Securities
        pursuant to this Indenture will affect the Trustee&#8217;s own rights, duties\n
        \       or immunities under the Securities and this Indenture or otherwise
        in a manner which is not reasonably acceptable to the Trustee.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Notwithstanding the provisions of
        Section 3.01 and of the preceding paragraph, if all Securities of a series
        are not to be originally issued at one time, including where the size of an
        Outstanding series of Securities\n        is increased as contemplated by
        Section 3.01, it shall not be necessary to deliver the Officers&#8217; Certificate
        otherwise required pursuant to Section 3.01 or the Company Order and Opinion
        of Counsel otherwise required pursuant to such preceding\n        paragraph
        at or prior to the authentication of each Security of such series if such
        documents are delivered at or prior to the authentication upon original issuance
        of the first Security of such series to be issued.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Each Security shall be dated the date
        of its authentication.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">No Security shall be entitled to any benefit under this Indenture
        or be valid or obligatory for any purpose unless there appears on such Security
        a certificate of authentication substantially in the form provided for\n        herein
        executed by the Trustee by manual signature, and such certificate upon any
        Security shall be conclusive evidence, and the only evidence, that such Security
        has been duly authenticated and delivered hereunder. Notwithstanding the foregoing,\n
        \       if any Security shall have been authenticated and delivered hereunder
        but never issued and sold by the Company, and the Company shall deliver such
        Security to the Trustee for cancellation as provided in Section 3.09, for
        all purposes of this\n        Indenture such Security shall be deemed never
        to have been authenticated and delivered hereunder and shall never be entitled
        to the benefits of this Indenture.</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057179\"></a></div>\n      <div style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align:
        center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight:
        normal; font-style: normal;\" class=\"BRPFPageNumber\">22</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>Section 3.04&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Temporary Securities</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Pending the preparation of definitive Securities
        of any series, the Company may execute, and upon Company Order the Trustee
        shall authenticate and deliver, temporary Securities which are printed, lithographed,\n
        \       typewritten, mimeographed or otherwise produced, in any authorized
        denomination, substantially of the tenor of the definitive Securities in lieu
        of which they are issued and with such appropriate insertions, omissions,
        substitutions and other\n        variations as the officers executing such
        Securities may determine, as evidenced by their execution of such Securities.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If temporary
        Securities of any series are issued, the Company will cause definitive Securities
        of that series to be prepared without unreasonable delay. After the preparation
        of definitive Securities of such series,\n        the temporary Securities
        of such series shall be exchangeable for definitive Securities of such series
        upon surrender of the temporary Securities of such series at the office or
        agency of the Company in a Place of Payment for that series, without\n        charge
        to the Holder. Upon surrender for cancellation of any one or more temporary
        Securities of any series, the Company shall execute and the Trustee shall
        authenticate and deliver in exchange therefor one or more definitive Securities
        of the same\n        series, of any authorized denominations and of like tenor
        and aggregate principal amount. Until so exchanged, the temporary Securities
        of any series shall in all respects be entitled to the same benefits under
        this Indenture as definitive\n        Securities of such series and tenor.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057180\"></a>Section
        3.05&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Registration,
        Registration of Transfer and Exchange</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company shall cause to be kept
        at the Corporate Trust Office of the Trustee a register (the register maintained
        in such office and in any other office or agency of the Company in a Place
        of Payment being herein\n        sometimes collectively referred to as the
        &#8220;Security Register&#8221;) in which, subject to such reasonable regulations
        as it may prescribe, the Company shall provide for the registration of Securities
        and of transfers of Securities. The Trustee is hereby\n        appointed &#8220;Security
        Registrar&#8221; for the purpose of registering Securities and transfers of
        Securities as herein provided.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Upon surrender for registration of transfer of
        any Security of a series at the office or agency of the Company in a Place
        of Payment for that series, the Company shall execute, and the Trustee shall
        authenticate and\n        deliver, in the name of the designated transferee
        or transferees, one or more new Securities of the same series, of any authorized
        denominations and of like tenor and aggregate principal amount.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">At the option of the Holder, Securities
        of any series may be exchanged for other Securities of the same series, of
        any authorized denominations and of like tenor and aggregate principal amount,
        upon surrender of the\n        Securities to be exchanged at such office or
        agency. Whenever any Securities are so surrendered for exchange, the Company
        shall execute, and the Trustee shall authenticate and deliver, the Securities
        which the Holder making the exchange is entitled\n        to receive.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">All Securities
        issued upon any registration of transfer or exchange of Securities shall be
        the valid obligations of the Company, evidencing the same debt, and entitled
        to the same benefits under this Indenture, as the\n        Securities surrendered
        upon such registration of transfer or exchange.</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">23</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">Every
        Security presented or surrendered for registration of transfer or for exchange
        shall (if so required by the Company or the Trustee) be duly endorsed, or
        be accompanied by a written instrument of transfer in form\n        satisfactory
        to the Company and the Security Registrar duly executed, by the Holder thereof
        or his attorney duly authorized in writing.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">No service charge shall be made for
        any registration of transfer or exchange of Securities, but the Company may
        require payment of a sum sufficient to cover any tax or other governmental
        charge that may be imposed in\n        connection with any registration of
        transfer or exchange of Securities, other than exchanges pursuant to Section
        3.04, 9.06 or 11.07 not involving any transfer.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If the Securities of any series (or
        of any series and specified tenor) are to be redeemed in part, the Company
        shall not be required (A) to issue, register the transfer of or exchange any
        Securities of that series (or\n        of that series and specified tenor,
        as the case may be) during a period beginning at the opening of business 15
        days before the day of the mailing of a notice of redemption of any such Securities
        selected for redemption under Section 11.03 and\n        ending at the close
        of business on the day of such mailing, or (B) to register the transfer of
        or exchange any Security selected for redemption in whole or in part, except
        the unredeemed portion of any Security being redeemed in part.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The provisions of Clauses (1), (2),
        (3) and (4) below shall apply only to Global Securities:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        Each Global Security authenticated under this Indenture shall be registered
        in the name of the Depositary designated for such Global Security or a nominee
        thereof and delivered to such Depositary or a nominee\n        thereof or
        custodian therefor, and each such Global Security shall constitute a single
        Security for all purposes of this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        Notwithstanding any other provision in this Indenture, and subject to such
        applicable provisions, if any, as may be specified as contemplated by Section
        3.01, no Global Security may be exchanged in whole or in\n        part for
        Securities registered, and no transfer of a Global Security in whole or in
        part may be registered, in the name of any Person other than the Depositary
        for such Global Security or a nominee thereof unless (A) such Depositary has
        notified\n        the Company that it is unwilling or unable or no longer
        permitted under applicable law to continue as Depositary for such Global Security
        or (B) there shall have occurred and be continuing an Event of Default with
        respect to such Global Security or</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(C) the Company so directs the Trustee by Company
        Order or (D) there shall exist such circumstances, if any, in addition to
        or in lieu of the foregoing as have been specified for this purpose as contemplated
        by Section\n        3.01.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160; Subject to Clause (2) above and
        to such applicable provisions, if any, as may be specified as contemplated
        by Section 3.01, an exchange of a Global Security for other Securities may
        be made in whole or in\n        part, and all Securities issued in exchange
        for a Global Security or any portion thereof shall be registered in such names
        as the Depositary for such Global Security shall direct.</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">24</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        Every Security authenticated and delivered upon registration of transfer of,
        or in exchange for or in lieu of, a Global Security or any portion thereof,
        whether pursuant to this Section, Section 3.04, 3.06,\n        9.06 or 11.07
        or otherwise, shall be authenticated and delivered in the form of, and shall
        be, a Global Security, unless such Security is registered in the name of a
        Person other than the Depositary for such Global Security or a nominee thereof.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057181\"></a>Section
        3.06&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Mutilated,
        Destroyed, Lost and Stolen Securities</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If any mutilated Security is surrendered
        to the Trustee, the Company shall execute and the Trustee shall authenticate
        and deliver in exchange therefor a new Security of the same series and of
        like tenor and principal\n        amount and bearing a number not contemporaneously
        outstanding.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If there shall be delivered to the Company and the Trustee (i) evidence
        to their satisfaction of the destruction, loss or theft of any Security and
        (ii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;such security
        or indemnity as may be required by them to\n        save each of them and
        any agent of either of them harmless, then, in the absence of notice to the
        Company or the Trustee that such Security has been acquired by a bona fide
        purchaser, the Company shall execute and the Trustee shall authenticate and\n
        \       deliver, in lieu of any such destroyed, lost or stolen Security, a
        new Security of the same series and of like tenor and principal amount and
        bearing a number not contemporaneously outstanding.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In case any such mutilated, destroyed,
        lost or stolen Security has become or is about to become due and payable,
        the Company in its discretion may, instead of issuing a new Security, pay
        such Security.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Upon the issuance of any new Security under this Section, the Company
        may require the payment of a sum sufficient to cover any tax or other governmental
        charge that may be imposed in relation thereto and any other\n        expenses
        (including the fees and expenses of the Trustee) connected therewith.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Every new
        Security of any series issued pursuant to this Section in lieu of any destroyed,
        lost or stolen Security shall constitute an original additional contractual
        obligation of the Company, whether or not the\n        destroyed, lost or
        stolen Security shall be at any time enforceable by anyone, and shall be entitled
        to all the benefits of this Indenture equally and proportionately with any
        and all other Securities of that series duly issued hereunder.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The provisions of this Section are
        exclusive and shall preclude (to the extent lawful) all other rights and remedies
        with respect to the replacement or payment of mutilated, destroyed, lost or
        stolen Securities.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057182\"></a>Section
        3.07&#160;&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Payment
        of Interest; Interest Rights Preserved</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Except as otherwise provided as contemplated
        by Section 3.01 with respect to any series of Securities, interest on any
        Security which is payable, and is punctually paid or duly provided for, on
        any Interest Payment\n        Date shall be paid to the Person in whose name
        that Security (or one or more Predecessor Securities) is registered at the
        close of business on the Regular Record Date for such interest or, if no business
        is conducted by the Trustee at [&#160;&#160;&#160; ] on\n        such date,
        at 5:00 P.M., New York City time, on such date.</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">25</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">Any
        interest on any Security of any series which is payable, but is not punctually
        paid or duly provided for, on any Interest Payment Date (herein called &#8220;Defaulted
        Interest&#8221;) shall forthwith cease to be payable to the\n        Holder
        on the relevant Regular Record Date by virtue of having been such Holder,
        and such Defaulted Interest may be paid by the Company, at its election in
        each case, as provided in Clause (1) or (2) below:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        The Company may elect to make payment of any Defaulted Interest to the Persons
        in whose names the Securities of such series (or their respective Predecessor
        Securities) are registered at the close of business\n        on a Special
        Record Date for the payment of such Defaulted Interest, which shall be fixed
        in the following manner. The Company shall notify the Trustee in writing of
        the amount of Defaulted Interest proposed to be paid on each Security of such\n
        \       series and the date of the proposed payment, and at the same time
        the Company shall deposit with the Trustee an amount of money equal to the
        aggregate amount proposed to be paid in respect of such Defaulted Interest
        or shall make arrangements\n        satisfactory to the Trustee for such deposit
        prior to the date of the proposed payment, such money when deposited to be
        held in trust for the benefit of the Persons entitled to such Defaulted Interest
        as in this Clause provided. Thereupon the\n        Trustee shall fix a Special
        Record Date for the payment of such Defaulted Interest which shall be not
        more than 15 days and not less than 10 days prior to the date of the proposed
        payment and not less than 10 days after the receipt by the Trustee\n        of
        the notice of the proposed payment. The Trustee shall promptly notify the
        Company of such Special Record Date and, in the name and at the expense of
        the Company, shall cause notice of the proposed payment of such Defaulted
        Interest and the\n        Special Record Date therefor to be given to each
        Holder of Securities of such series in the manner set forth in Section 1.06,
        not less than 10 days prior to such Special Record Date. Notice of the proposed
        payment of such Defaulted Interest and the\n        Special Record Date therefor
        having been so mailed, such Defaulted Interest shall be paid to the Persons
        in whose names the Securities of such series (or their respective Predecessor
        Securities) are registered at the close of business on such\n        Special
        Record Date and shall no longer be payable pursuant to the following Clause
        (2).</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;
        The Company may make payment of any Defaulted Interest on the Securities of
        any series in any other lawful manner not inconsistent with the requirements
        of any securities exchange on which such Securities may\n        be listed,
        and upon such notice as may be required by such exchange, if, after notice
        given by the Company to the Trustee of the proposed payment pursuant to this
        Clause, such manner of payment shall be deemed practicable by the Trustee.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        may be provided in this Section 3.07 or as contemplated in Section 3.01 with
        respect to any Securities of a series, the Person to whom interest shall be
        payable on any Security that first becomes payable on a\n        day that
        is not an Interest Payment Date shall be the Holder of such Security on the
        day such interest is paid.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Subject to the foregoing provisions of this Section, each Security
        delivered under this Indenture upon registration of transfer of or in exchange
        for or in lieu of any other Security shall carry the rights to interest\n
        \       accrued and unpaid, and to accrue, which were carried by such other
        Security.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057183\"></a></div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">26</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div>Section 3.08&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Persons Deemed Owners</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Prior to
        due presentment of a Security for registration of transfer, the Company, the
        Trustee and any agent of the Company or the Trustee may treat the Person in
        whose name such Security is registered as the owner of\n        such Security
        for the purpose of receiving payment of principal of and any premium and (subject
        to Section 3.07) any interest on such Security and for all other purposes
        whatsoever, whether or not such Security be overdue, and neither the Company,\n
        \       the Trustee nor any agent of the Company or the Trustee shall be affected
        by notice to the contrary.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057184\"></a>Section
        3.09&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Cancellation</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">All Securities
        surrendered for payment, redemption, registration of transfer or exchange
        or for credit against any sinking fund payment shall, if surrendered to any
        Person other than the Trustee, be delivered to the\n        Trustee and shall
        be promptly cancelled by it. The Company may at any time deliver to the Trustee
        for cancellation any Securities previously authenticated and delivered hereunder
        which the Company may have acquired in any manner whatsoever, and may\n        deliver
        to the Trustee (or to any other Person for delivery to the Trustee) for cancellation
        any Securities previously authenticated hereunder which the Company has not
        issued and sold, and all Securities so delivered shall be promptly cancelled
        by\n        the Trustee. No Securities shall be authenticated in lieu of or
        in exchange for any Securities cancelled as provided in this Section, except
        as expressly permitted by this Indenture. All cancelled Securities held by
        the Trustee shall be disposed of\n        as directed by a Company Order;
        <font style=\"font-style: italic;\">provided, however</font>, that the Trustee
        shall not be required to destroy such cancelled Securities.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057185\"></a>Section 3.10&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Computation of Interest</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        otherwise specified as contemplated by Section 3.01 for Securities of any
        series, interest on the Securities of each series shall be computed on the
        basis of a 360-day year of twelve 30-day months.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057186\"></a>Section 3.11&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">CUSIP Numbers</font>.</div>\n      <div>&#160;</div>\n
        \     <div>\n        <div></div>\n        <div style=\"text-indent: 24.5pt;
        color: rgb(0, 0, 0);\"><a name=\"z_Hlk199588543\"></a>The Company in issuing
        the Securities may use &#8220;CUSIP,&#8221; &#8220;ISIN&#8221; or other similar
        numbers (if then generally in use), and, if so, the Trustee shall use &#8220;CUSIP,&#8221;
        &#8220;ISIN&#8221;\n          or other similar numbers in notices of redemption
        as a convenience to Holders; <u>provided</u> that any such notice may state
        that no representation is made as to the correctness of such numbers either
        as printed on the Securities or as\n          contained in any notice of a
        redemption and that reliance may be placed only on the other identification
        numbers printed on the Securities, and any such redemption shall not be affected
        by any defect in or omission of such numbers. The Company\n          shall
        promptly notify the Trustee in writing of any change in &#8220;CUSIP,&#8221;
        &#8220;ISIN&#8221; or other similar numbers.</div>\n        <div>&#160;</div>\n
        \     </div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">27</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-align: center;\">ARTICLE 4</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">SATISFACTION AND DISCHARGE</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057188\"></a>Section
        4.01&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Satisfaction
        and Discharge of Indenture</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">This Indenture shall upon Company Request cease
        to be of further effect (except as to any surviving rights of registration
        of transfer or exchange of any Security expressly provided for herein or in
        the terms of such\n        Security), and the Trustee, at the expense of the
        Company, shall execute proper instruments acknowledging satisfaction and discharge
        of this Indenture, when</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; either</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(A)&#160;&#160;&#160;&#160; all Securities
        theretofore authenticated and delivered (other than (i) Securities which have
        been destroyed, lost or stolen and which have been replaced or paid as provided
        in Section 3.06 and (ii) Securities\n        for whose payment money has theretofore
        been deposited in trust or segregated and held in trust by the Company and
        thereafter repaid to the Company or discharged from such trust, as provided
        in Section 10.03) have been delivered to the Trustee for\n        cancellation;
        or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(B)&#160;&#160;&#160;&#160;&#160;
        all such Securities not theretofore delivered to the Trustee for cancellation</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(i)&#160;&#160;&#160;&#160;&#160;&#160;
        have become due and payable, or (ii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;will
        become due and payable at their Stated Maturity within one year, or (iii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;are
        to be called for redemption within one year under arrangements\n        satisfactory
        to the Trustee for the giving of notice of redemption by the Trustee in the
        name, and at the expense, of the Company, and the Company, in the case of
        (i), (ii) or (iii) above, has deposited or caused to be deposited with the
        Trustee as\n        trust funds in trust for the purpose money in an amount
        sufficient to pay and discharge the entire indebtedness on such Securities
        not theretofore delivered to the Trustee for cancellation, for principal and
        any premium and interest to the date of\n        such deposit (in the case
        of Securities which have become due and payable) or to the Stated Maturity
        or Redemption Date, as the case may be;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160; the Company
        has paid or caused to be paid all other sums payable hereunder by the Company;
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;
        the Company has delivered to the Trustee an Officers&#8217; Certificate and
        an Opinion of Counsel, each stating that all conditions precedent herein provided
        for relating to the satisfaction and discharge of this\n        Indenture
        have been complied with.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Notwithstanding the satisfaction and discharge of this Indenture,
        the obligations of the Company to the Trustee under Section 6.07, the obligations
        of the Trustee to any Authenticating Agent under Section 6.14 and, if\n        money
        shall have been deposited with the Trustee pursuant to subclause (B) of Clause
        (1) of this Section, the obligations of the Trustee under Section 4.02 and
        the last paragraph of Section 10.03 shall survive.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">28</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>Section 4.02&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Application of Trust Money</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Subject to the provisions of the last
        paragraph of Section 10.03, all money deposited with the Trustee pursuant
        to Section 4.01 shall be held in trust and applied by it, in accordance with
        the provisions of the\n        Securities and this Indenture, to the payment,
        either directly or through any Paying Agent (including the Company acting
        as its own Paying Agent) as the Trustee may determine, to the Persons entitled
        thereto, of the principal and any premium and\n        interest for whose
        payment such money has been deposited with the Trustee. Money deposited pursuant
        to this Section not in violation of this Indenture shall not be subject to
        claims of the holders of Senior Debt under Article Fourteen.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\"><a name=\"z_Toc126057190\"></a>ARTICLE
        5</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\">REMEDIES</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057191\"></a>Section
        5.01&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Events of
        Default</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Event of Default&#8221;, wherever used herein with respect
        to Securities of any series, means any one of the following events (whatever
        the reason for such Event of Default and whether it shall be occasioned by
        the\n        provisions of Article Fourteen or be voluntary or involuntary
        or be effected by operation of law or pursuant to any judgment, decree or
        order of any court or any order, rule or regulation of any administrative
        or governmental body):</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; default in the payment of any interest
        upon any Security of that series when it becomes due and payable, and continuance
        of such default for a period of 30 days; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        default in the payment of the principal of or any premium, if any, on any
        Security of that series at its Maturity; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;
        default in the deposit of any sinking fund payment, when and as due by the
        terms of a Security of that series; or</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160; default in
        the performance, or breach, of any covenant or warranty of the Company in
        this Indenture (other than a covenant or warranty a default in whose performance
        or whose breach is elsewhere in this\n        Section specifically dealt with
        or which has expressly been included in this Indenture solely for the benefit
        of series of Securities other than that series), and continuance of such default
        or breach for a period of 90 days after there has been\n        given, by
        registered or certified mail, to the Company by the Trustee or to the Company
        and the Trustee by the Holders of at least 25% in principal amount of the
        Outstanding Securities of that series a written notice specifying such default
        or\n        breach and requiring it to be remedied and stating that such notice
        is a &#8220;Notice of Default&#8221; hereunder; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;
        the entry by a court having jurisdiction in the premises of (A) a decree or
        order for relief in respect of the Company in an involuntary case or proceeding
        under any applicable Federal or State bankruptcy,\n        insolvency, reorganization
        or other similar law or (B) a decree or order adjudging the Company a bankrupt
        or insolvent, or approving as properly filed a petition seeking reorganization,
        arrangement, adjustment or composition of or in respect of the\n        Company
        under any applicable Federal or State law, or appointing a custodian, receiver,
        liquidator, assignee, trustee, sequestrator or other similar official of the
        Company or of any substantial part of its property, or ordering the winding
        up or\n        liquidation of its affairs, and the continuance of any such
        decree or order for relief or any such other decree or order unstayed and
        in effect for a period of 60 consecutive days; or</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">29</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;
        the commencement by the Company of a voluntary case or proceeding under any
        applicable Federal or State bankruptcy, insolvency, reorganization or other
        similar law or of any other case or proceeding to be\n        adjudicated
        a bankrupt or insolvent, or the consent by it to the entry of a decree or
        order for relief in respect of the Company in an involuntary case or proceeding
        under any applicable Federal or State bankruptcy, insolvency, reorganization
        or\n        other similar law or to the commencement of any bankruptcy or
        insolvency case or proceeding against it, or the filing by it of a petition
        or answer or consent seeking reorganization or relief under any applicable
        Federal or State law, or the\n        consent by it to the filing of such
        petition or to the appointment of or taking possession by a custodian, receiver,
        liquidator, assignee, trustee, sequestrator or other similar official of the
        Company or of any substantial part of its property, or\n        the making
        by it of an assignment for the benefit of creditors, or the admission by it
        in writing of its inability to pay its debts generally as they become due,
        or the taking of corporate action by the Company in furtherance of any such
        action; or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(7)&#160;&#160;&#160;&#160;&#160; any other Event of Default provided
        with respect to Securities of that series.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057192\"></a>Section 5.02&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Acceleration of Maturity; Rescission and
        Annulment</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If an Event of Default specified in Section 5.01(5) or 5.01(6)) with
        respect to Securities of any series at the time Outstanding occurs and is
        continuing, then in every such case the Trustee or the Holders of not less\n
        \       than 25% in principal amount of the Outstanding Securities of that
        series may, declare the principal amount of all the Securities of that series
        (or, if any Securities of that series are Original Issue Discount Securities,
        such portion of the\n        principal amount of such Securities as may be
        specified by the terms thereof) to be due and payable immediately, by a notice
        in writing to the Company (and to the Trustee if given by Holders), and upon
        any such declaration such principal amount (or\n        specified amount)
        shall become immediately due and payable.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">At any time after such a declaration
        of acceleration with respect to Securities of any series has been made and
        before a judgment or decree for payment of the money due has been obtained
        by the Trustee as hereinafter\n        in this Article provided, the Holders
        of a majority in principal amount of the Outstanding Securities of that series,
        by written notice to the Company and the Trustee, may rescind and annul such
        declaration and its consequences if</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160; the Company
        has paid or deposited with the Trustee a sum sufficient to pay</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(A)&#160;&#160;&#160;&#160; all overdue
        interest on all Securities of that series,</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(B)&#160;&#160;&#160;&#160; the principal
        of (and premium, if any, on) any Securities of that series which have become
        due otherwise than by such declaration of acceleration and any interest thereon
        at the rate or rates prescribed\n        therefor in such Securities,</div>\n
        \     <div>&#160;</div>\n      <div></div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">30</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(C)&#160;&#160;&#160;&#160;&#160;
        to the extent that payment of such interest is lawful, interest upon overdue
        interest at the rate or rates prescribed therefor in such Securities, and</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(D)&#160;&#160;&#160;&#160;
        all sums paid or advanced by the Trustee hereunder and the reasonable compensation,
        expenses, disbursements and advances of the Trustee, its agents and counsel;
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        all Events of Default with respect to Securities of that series, other than
        the non-payment of the principal of Securities of that series which have become
        due solely by such declaration of acceleration, have\n        been cured or
        waived as provided in Section 5.13.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">No such rescission shall affect any subsequent
        default or impair any right consequent thereon.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Unless otherwise expressly provided
        with respect to a series of Securities, there is no right of acceleration
        upon the occurrence of an Event of Default specified in sections 5.01(1),
        5.01(2), 5.01(3), 5.01(4) or\n        5.01(7) above.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057193\"></a>Section 5.03&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Collection of Indebtedness and Suits for
        Enforcement by Trustee</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">The Company covenants that if</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        default is made in the payment of any interest on any Security when such interest
        becomes due and payable and such default continues for a period of 30 days,
        or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        default is made in the payment of the principal of (or premium, if any, on)
        any Security at the Maturity thereof, the Company will, upon demand of the
        Trustee, pay to it, for the benefit of the Holders of such\n        Securities,
        the whole amount then due and payable on such Securities for principal and
        any premium and interest and, to the extent that payment of such interest
        shall be legally enforceable, interest on any overdue principal and premium
        and on any\n        overdue interest, at the rate or rates prescribed therefor
        in such Securities, and, in addition thereto, such further amount as shall
        be sufficient to cover the costs and expenses of collection, including the
        reasonable compensation, expenses,\n        disbursements and advances of
        the Trustee, its agents and counsel. If the Company shall fail to pay such
        amounts forthwith upon such demand, the Trustee, in its own name and as trustee
        of an express trust, may institute a judicial proceeding for\n        the
        collection of the sums so due and unpaid, may prosecute such proceeding to
        judgment or final decree and may enforce the same against the Company or any
        other obligor upon such Securities and collect the moneys adjudged or decreed
        to be payable\n        in the manner provided by law out of the property of
        the Company or any other obligor upon such Securities, wherever situated.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If an Event
        of Default with respect to Securities of any series occurs and is continuing,
        the Trustee may in its discretion proceed to protect and enforce its rights
        and the rights of the Holders of Securities of such\n        series by such
        appropriate judicial proceedings as the Trustee shall deem most effectual
        to protect and enforce any such rights, whether for the specific enforcement
        of any covenant or agreement in this Indenture or in aid of the exercise of
        any\n        power granted herein, or to enforce any other proper remedy.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align:
        center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight:
        normal; font-style: normal;\" class=\"BRPFPageNumber\">31</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div>Section 5.04&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Trustee May File Proofs of Claim</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">In case of
        any judicial proceeding relative to the Company (or any other obligor upon
        the Securities), its property or its creditors, the Trustee shall be entitled
        and empowered, by intervention in such proceeding or\n        otherwise, to
        take any and all actions authorized under the Trust Indenture Act in order
        to have claims of the Holders and the Trustee allowed in any such proceeding.
        In particular, the Trustee shall be authorized to collect and receive any
        moneys\n        or other property payable or deliverable on any such claims
        and to distribute the same; and any custodian, receiver, assignee, trustee,
        liquidator, sequestrator or other similar official in any such judicial proceeding
        is hereby authorized by each\n        Holder to make such payments to the
        Trustee and, in the event that the Trustee shall consent to the making of
        such payments directly to the Holders, to pay to the Trustee any amount due
        it for the reasonable compensation, expenses, disbursements\n        and advances
        of the Trustee, its agents and counsel, and any other amounts due the Trustee
        under Section 6.07.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">No provision of this Indenture shall be deemed to authorize the Trustee
        to authorize or consent to or accept or adopt on behalf of any Holder any
        plan of reorganization, arrangement, adjustment or composition affecting\n
        \       the Securities or the rights of any Holder thereof or to authorize
        the Trustee to vote in respect of the claim of any Holder in any such proceeding;
        <font style=\"font-style: italic;\">provided</font>, <font style=\"font-style:
        italic;\">however</font>,\n        that the Trustee may, on behalf of the
        Holders, vote for the election of a trustee in bankruptcy or similar official
        and be a member of a creditors&#8217; or other similar committee.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057195\"></a>Section
        5.05&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Trustee May
        Enforce Claims Without Possession of Securities</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">All rights of action and claims under
        this Indenture or the Securities may be prosecuted and enforced by the Trustee
        without the possession of any of the Securities or the production thereof
        in any proceeding relating\n        thereto, and any such proceeding instituted
        by the Trustee shall be brought in its own name as trustee of an express trust,
        and any recovery of judgment shall, after provision for the payment of the
        reasonable compensation, expenses, disbursements\n        and advances of
        the Trustee, its agents and counsel, be for the ratable benefit of the Holders
        of the Securities in respect of which such judgment has been recovered.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057196\"></a>Section
        5.06&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Application
        of Money Collected</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Any money collected by the Trustee pursuant to this Article shall
        be applied in the following order, at the date or dates fixed by the Trustee
        and, in case of the distribution of such money on account of principal or\n
        \       any premium or interest, upon presentation of the Securities and the
        notation thereon of the payment if only partially paid and upon surrender
        thereof if fully paid:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">FIRST: To the payment of all amounts due the Trustee under Section
        6.07; and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">SECOND: Subject to Article Fourteen, to the payment of the amounts
        then due and unpaid for principal of and any premium and interest on the Securities
        in respect of which or for the benefit of which such money has been\n        collected,
        ratably, without preference or priority of any kind, according to the amounts
        due and payable on such Securities for principal and any premium and interest,
        respectively.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057197\"></a></div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">32</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div>Section 5.07&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Limitation on Suits</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">No Holder of any Security of any series
        shall have any right to institute any proceeding, judicial or otherwise, with
        respect to this Indenture, or for the appointment of a receiver or trustee,
        or for any other remedy\n        hereunder, unless</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        such Holder has previously given written notice to the Trustee of a continuing
        Event of Default with respect to the Securities of that series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        the Holders of not less than 25% in principal amount of the Outstanding Securities
        of that series shall have made written request to the Trustee to institute
        proceedings in respect of such Event of Default in\n        its own name as
        Trustee hereunder;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160; such Holder or Holders have offered
        to the Trustee indemnity reasonably satisfactory to the Trustee against the
        costs, expenses and liabilities to be incurred in compliance with such request;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        the Trustee for 60 days after its receipt of such notice, request and offer
        of indemnity has failed to institute any such proceeding; and</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;
        no direction inconsistent with such written request has been given to the
        Trustee during such 60-day period by the Holders of a majority in principal
        amount of the Outstanding Securities of that series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">it being understood and intended that
        no one or more of such Holders shall have any right in any manner whatever
        by virtue of, or by availing of, any provision of this Indenture to affect,
        disturb or prejudice the\n        rights of any other of such Holders, or
        to obtain or to seek to obtain priority or preference over any other of such
        Holders or to enforce any right under this Indenture, except in the manner
        herein provided and for the equal and ratable benefit of\n        all of such
        Holders.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057198\"></a>Section
        5.08&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Unconditional
        Right of Holders to Receive Principal, Premium and Interest</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Notwithstanding
        any other provision in this Indenture, but subject to Article Fourteen of
        this Indenture, the Holder of any Security shall have the right, which is
        absolute and unconditional, to receive payment of the\n        principal of
        and any premium and (subject to Section 3.07) interest on such Security on
        the respective Stated Maturities expressed in such Security (or, in the case
        of redemption, on the Redemption Date) and to institute suit for the enforcement
        of\n        any such payment, and such rights shall not be impaired without
        the consent of such Holder.</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057199\"></a></div>\n      <div style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align:
        center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight:
        normal; font-style: normal;\" class=\"BRPFPageNumber\">33</font></div>\n        <div
