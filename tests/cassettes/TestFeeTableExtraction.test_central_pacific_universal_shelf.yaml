        rights of the Holders of the Securities of each series\n        to be affected
        under the Indenture at any time by the Company and the Trustee with the consent
        of the Holders of a majority in principal amount of the Securities at the
        time Outstanding of each series to be affected. The Indenture also contains\n
        \       provisions (i) permitting the Holders of not less than a majority
        in principal amount of the Securities of any series at the time Outstanding,
        on behalf of the Holders of all Securities of such series, to waive compliance
        by the Company with\n        certain provisions of the Indenture with respect
        to such series and (ii) permitting the Holders of a majority in principal
        amount of the Securities at the time Outstanding of any series to be affected
        under the Indenture (with each such series\n        considered separately
        for this purpose), on behalf of the Holders of all Securities of such series,
        to waive certain past defaults under the Indenture and their consequences.
        Any such consent or waiver by the Holder of this Security shall be\n        conclusive
        and binding upon such Holder and upon all future Holders of this Security
        and of any Security issued upon the registration of transfer hereof or in
        exchange herefor or in lieu hereof, whether or not notation of such consent
        or waiver is\n        made upon this Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">As provided in and subject to the
        provisions of the Indenture, the Holder of this Security shall not have the
        right to institute any proceeding with respect to the Indenture, or for the
        appointment of a receiver or\n        trustee, or for any other remedy thereunder,
        unless such Holder shall have previously given the Trustee written notice
        of a continuing Event of Default with respect to the Securities of this series,
        the Holders of not less than 25% in principal\n        amount of the Securities
        of this series at the time Outstanding shall have made written request to
        the Trustee to institute proceedings in respect of such Event of Default as
        Trustee and offered the Trustee reasonable indemnity, and the Trustee\n        shall
        not have received from the Holders of a majority in principal amount of Securities
        of this series at the time Outstanding a direction inconsistent with such
        request, and shall have failed to institute any such proceeding, for 60 days
        after\n        receipt of such notice, request and offer of indemnity. The
        foregoing shall not apply to any suit instituted by the Holder of this Security
        for the enforcement of any payment of principal hereof or any premium or interest
        hereon on or after the\n        respective due dates expressed herein.</div>\n
        \     <div>&#160;</div>\n      <div></div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">16</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">No
        reference herein to the Indenture and no provision of this Security or of
        the Indenture shall alter or impair the obligation of the Company, which is
        absolute and unconditional, to pay the principal of and any\n        premium
        and interest on this Security at the times, place and rate, and in the coin
        or currency, herein prescribed.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">As provided in the Indenture and subject to certain
        limitations therein set forth, the transfer of this Security is registrable
        in the Security Register, upon surrender of this Security for registration
        of transfer at\n        the office or agency of the Company in any place where
        the principal of and any premium and interest on this Security are payable,
        duly endorsed by, or accompanied by a written instrument of transfer in form
        satisfactory to the Company and the\n        Security Registrar duly executed
        by, the Holder hereof or his attorney duly authorized in writing, and thereupon
        one or more new Securities of this series and of like tenor, of authorized
        denominations and for the same aggregate principal amount,\n        will be
        issued to the designated transferee or transferees.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Securities of this series are
        issuable only in registered form without coupons in denominations of $1,000
        and any integral multiple thereof. As provided in the Indenture and subject
        to certain limitations therein\n        set forth, Securities of this series
        are exchangeable for a like aggregate principal amount of Securities of this
        series and of like tenor of a different authorized denomination, as requested
        by the Holder surrendering the same.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">No service charge shall be made for any such
        registration of transfer or exchange, but the Company may require payment
        of a sum sufficient to cover any tax or other governmental charge payable
        in connection therewith.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Prior to due presentment of this Security for registration of transfer,
        the Company, the Trustee and any agent of the Company or the Trustee may treat
        the Person in whose name this Security is registered as the owner\n        hereof
        for all purposes, whether or not this Security be overdue, and neither the
        Company, the Trustee nor any such agent shall be affected by notice to the
        contrary.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt; font-size: 12pt;\"><font style=\"font-size: 10pt; font-weight: bold;\">[</font><font
        style=\"font-size: 10pt; font-style: italic;\">If applicable, insert&#8212;</font><font
        style=\"font-size: 10pt;\">This Security is a Global\n          Security and
        is subject to the provisions of the Indenture relating to Global Securities,
        including the limitations in Section 305 thereof on transfers and exchanges
        of Global Securities].</font></div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt; font-size: 12pt;\"><font style=\"font-size: 10pt; font-weight: bold;\">[</font><font
        style=\"font-size: 10pt; font-style: italic;\">If applicable, insert&#8212;</font><font
        style=\"font-size: 10pt;\">Interest on the principal\n          balance of
        this Security shall be calculated on the basis of a <font style=\"font-weight:
        bold;\">[</font>365- or 366-day year, as appropriate, for the actual number
        of days elapsed<font style=\"font-weight: bold;\">] [</font>360-day year of
        twelve\n          30-day months<font style=\"font-weight: bold;\">]]</font></font></div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt; font-weight:
        bold;\">THIS SECURITY SHALL BE GOVERNED BY AND CONSTRUED IN ACCORDANCE WITH
        THE LAWS OF THE STATE OF NEW YORK.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">All terms used in this Security which are defined
        in the Indenture shall have the meanings assigned to them in the Indenture.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057173\"></a></div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
