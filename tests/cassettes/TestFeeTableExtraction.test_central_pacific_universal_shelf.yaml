        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>Section 2.04&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Form of Legend for Global Securities</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Unless otherwise specified as contemplated
        by Section 3.01 for the Securities evidenced thereby, every Global Security
        authenticated and delivered hereunder shall bear a legend in substantially
        the following form:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">This Security is a Global Security within the meaning of the Indenture
        hereinafter referred to and is registered in the name of a Depositary or a
        nominee thereof. This Security may not be exchanged in whole or in part\n
        \       for a Security registered, and no transfer of this Security in whole
        or in part may be registered, in the name of any Person other than such Depositary
        or a nominee thereof, except in the limited circumstances described in the
        Indenture.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057174\"></a>Section
        2.05&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Form of Trustee&#8217;s
        Certificate of Authentication</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">The Trustee&#8217;s certificates of authentication
        shall be in substantially the following form:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">This is one of the Securities of the
        series designated herein and referred to in the within-mentioned Indenture.</div>\n
