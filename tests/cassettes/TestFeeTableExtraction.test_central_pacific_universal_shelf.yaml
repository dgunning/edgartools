        7.02&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Preservation
        of Information; Communications to Holders</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Trustee shall preserve, in as
        current a form as is reasonably practicable, the names and addresses of Holders
