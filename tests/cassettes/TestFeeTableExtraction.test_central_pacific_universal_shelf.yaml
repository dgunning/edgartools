        \     <div>INDENTURE, dated as of [&#160;&#160;&#160;&#160;&#160; ], between
        Central Pacific Financial Corp., a corporation duly organized and existing
        under the laws of the State of Hawaii (herein called the &#8220;Company&#8221;),
        having its principal office at 220 South King Street,\n        Honolulu, Hawaii
        96813, and [&#160;&#160;&#160;&#160;&#160;&#160; ], a [&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ], as Trustee (herein called the &#8220;Trustee&#8221;).</div>\n      <div>&#160;</div>\n
        \     <div>Recitals of the Company The Company has duly authorized the execution
        and delivery of this Indenture to provide for the issuance from time to time
        of its unsecured debentures, notes or other evidences of indebtedness (herein
        called the\n        &#8220;Securities&#8221;) to be issued in one or more
        series as in this Indenture provided.</div>\n      <div>&#160;</div>\n      <div>All
        things necessary to make this Indenture a valid agreement of the Company,
        in accordance with its terms, have been done. Now, Therefore, This Indenture
        Witnesseth:</div>\n      <div>&#160;</div>\n      <div>For and in consideration
        of the premises and the purchase of the Securities by the Holders thereof,
        it is mutually agreed, for the equal and proportionate benefit of all Holders
        of the Securities or of series thereof, as follows:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\"><a name=\"z_Toc126057155\"></a>ARTICLE
        1</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\">DEFINITIONS
        AND OTHER PROVISIONS</div>\n      <div style=\"text-align: center;\">OF GENERAL
        APPLICATION</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057156\"></a>Section
        1.01&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Definitions</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">For all purposes
        of this Indenture, except as otherwise expressly provided or unless the context
        otherwise requires:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; the terms defined in this Article
        have the meanings assigned to them in this Article and include the plural
        as well as the singular;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160; all other terms used herein which
        are defined in the Trust Indenture Act, either directly or by reference therein,
        have the meanings assigned to them therein;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;
        all accounting terms not otherwise defined herein have the meanings assigned
        to them in accordance with generally accepted accounting principles, and,
        except as otherwise herein expressly provided, the term\n        &#8220;generally
        accepted accounting principles&#8221; with respect to any computation required
        or permitted hereunder shall mean such accounting principles as are generally
        accepted in the United States of America at the date of such computation;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;
        unless the context otherwise requires, any reference to an &#8220;Article&#8221;
        or a &#8220;Section&#8221; refers to an Article or a Section, as the case
        may be, of this Indenture; and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160; the words
        &#8220;herein&#8221;, &#8220;hereof&#8221; and &#8220;hereunder&#8221; and
        other words of similar import refer to this Indenture as a whole and not to
        any particular Article, Section or other subdivision.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Act&#8221;, when used with
        respect to any Holder, has the meaning specified in Section 1.04.</div>\n
        \     <div>&#160;</div>\n      <div></div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">-1-</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <!--PROfilePageNumberReset%Num%2%%%-->\n      <div></div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Affiliate&#8221; of any specified
        Person means any other Person directly or indirectly controlling or controlled
        by or under direct or indirect common control with such specified Person.
        For the purposes of this definition,\n        &#8220;control&#8221; when used
        with respect to any specified Person means the power to direct the management
        and policies of such Person, directly or indirectly, whether through the ownership
        of voting securities, by contract or otherwise; and the terms\n        &#8220;controlling&#8221;
        and &#8220;controlled&#8221; have meanings correlative to the foregoing.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Applicable
        Procedures&#8221; of a Depositary means, with respect to any matter at any
        time, the policies and procedures of such Depositary, if any, that are applicable
        to such matter at such time.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Authenticating Agent&#8221; means any Person authorized by
        the Trustee pursuant to Section 6.14 to act on behalf of the Trustee to authenticate
        Securities of one or more series.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Board of Directors&#8221; means either
        the board of directors of the Company or any duly authorized committee of
        that board.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Board Resolution&#8221; means a copy of a resolution certified
        by the Secretary or an Assistant Secretary of the Company to have been duly
        adopted by the Board of Directors and to be in full force and effect on the
        date of\n        such certification, and delivered to the Trustee.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Business
        Day&#8221;, when used with respect to any Place of Payment, means each Monday,
        Tuesday, Wednesday, Thursday and Friday which is not a day on which banking
        institutions in that Place of Payment are authorized or\n        obligated
        by law or executive order to close.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Commission&#8221; means the Securities
        and Exchange Commission, from time to time constituted, created under the
        Exchange Act, or, if at any time after the execution of this instrument such
        Commission is not existing and\n        performing the duties now assigned
        to it under the Trust Indenture Act, then the body performing such duties
        at such time.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Common Stock&#8221; means the common stock, no par value per
        share, of the Company.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Company&#8221; means the Person named as the &#8220;Company&#8221;
        in the first paragraph of this instrument until a successor Person shall have
        become such pursuant to the applicable provisions of this Indenture, and thereafter\n
        \       &#8220;Company&#8221; shall mean such successor Person.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Company Request&#8221; or &#8220;Company
        Order&#8221; means a written request or order signed in the name of the Company
        by the Chairman of the Board, the Chief Executive Officer, the President or
        a Vice President, and by the\n        Treasurer, an Assistant Treasurer, the
        Controller, the Secretary or an Assistant Secretary of the Company, and delivered
        to the Trustee.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Corporate Trust Office&#8221; means the principal office of
        the Trustee in [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;]
        at which at any particular time its corporate trust business shall be administered,
        which office at the date hereof is located at [&#160;&#160;&#160;&#160;\n
        \       ].</div>\n      <div>&#160;</div>\n      <div></div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">2</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">&#8220;corporation&#8221;
        means a corporation, association, company, limited liability company, joint-stock
        company or business trust. &#8220;Covenant Defeasance&#8221; has the meaning
        specified in Section 13.03.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Defaulted Interest&#8221; has the meaning specified in Section
        3.07. &#8220;Defeasance&#8221; has the meaning specified in Section 13.02.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Depositary&#8221;
        means, with respect to Securities of any series issuable in whole or in part
        in the form of one or more Global Securities, any Person that is designated
        to act as Depositary for such Securities as\n        contemplated by Section
        3.01.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Event
        of Default&#8221; has the meaning specified in Section 5.01.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Exchange Act&#8221; means the
        Securities Exchange Act of 1934 and any statute successor thereto, in each
        case as amended from time to time. &#8220;Expiration Date&#8221; has the meaning
        specified in Section 1.04.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Global Security&#8221; means a Security that evidences all
        or part of the Securities of any series and bears the legend set forth in
        Section 2.04 (or such legend as may be specified as contemplated by Section
        3.01 for such\n        Securities).</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Holder&#8221; means a Person in whose
        name a Security is registered in the Security Register.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Indenture&#8221; means this
        instrument as originally executed and as it may from time to time be supplemented
        or amended by one or more indentures supplemental hereto entered into pursuant
        to the applicable provisions\n        hereof, including, for all purposes
        of this instrument and any such supplemental indenture, the provisions of
        the Trust Indenture Act that are deemed to be a part of and govern this instrument
        and any such supplemental indenture, respectively. The\n        term &#8220;Indenture&#8221;
        shall also include the terms of particular series of Securities established
        as contemplated by Section 3.01.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;interest&#8221;, when used with respect
        to an Original Issue Discount Security which by its terms bears interest only
        after Maturity, means interest payable after Maturity.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Interest Payment Date&#8221;,
        when used with respect to any Security, means the Stated Maturity of an installment
        of interest on such Security. time.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Investment Company Act&#8221; means the
        Investment Company Act of 1940 and any statute successor thereto, in each
        case as amended from time to &#8220;Maturity&#8221;, when used with respect
        to any Security, means the date on which the\n        principal of such Security
        or an installment of principal becomes due and payable as therein or herein
        provided, whether at the Stated Maturity or by declaration of acceleration,
        call for redemption or otherwise.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Notice of Default&#8221; means a written
        notice of the kind specified in Section 5.01(4) or 501(5).</div>\n      <div>&#160;</div>\n
        \     <div></div>\n      <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align: center;\"
        class=\"BRPFPageNumberArea\"><font style=\"font-size: 8pt; font-weight: normal;
        font-style: normal;\" class=\"BRPFPageNumber\">3</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">&#8220;Officer&#8221;
        means the Chairman of the Board, a Vice Chairman of the Board, the President
        or any Vice President, the Treasurer or the Secretary, of the Company.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Officers&#8217;
        Certificate&#8221; means a certificate signed by any two Officers or by any
        Officer and an Assistant Treasurer or an Assistant Secretary of the Company
        or any Person designated by an Officer in writing as\n        authorized to
        execute and deliver such certificate, and delivered to the Trustee. One of
        the Officers signing an Officers&#8217; Certificate given pursuant to Section
        10.04 shall be the principal executive, financial or accounting officer of
        the Company.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Opinion of Counsel&#8221; means a written opinion of counsel,
        who may be counsel for the Company.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Original Issue Discount Security&#8221;
        means any Security which provides for an amount less than the principal amount
        thereof to be due and payable upon a declaration of acceleration of the Maturity
        thereof pursuant to\n        Section 5.02.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Outstanding&#8221;, when used
        with respect to Securities, means, as of the date of determination, all Securities
        theretofore authenticated and delivered under this Indenture, except:</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        Securities theretofore cancelled by the Trustee or delivered to the Trustee
        for cancellation;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160; Securities for whose payment
        or redemption money in the necessary amount has been theretofore deposited
        with the Trustee or any Paying Agent (other than the Company) in trust or
        set aside and segregated in\n        trust by the Company (if the Company
        shall act as its own Paying Agent) for the Holders of such Securities; <font
        style=\"font-style: italic;\">provided </font>that, if such Securities are
        to be redeemed, notice of such redemption has been duly\n        given pursuant
        to this Indenture or provision therefor satisfactory to the Trustee has been
        made;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;
        Securities as to which Defeasance has been effected pursuant to Section 13.02;
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;
        Securities which have been paid pursuant to Section 3.06 or in exchange for
        or in lieu of which other Securities have been authenticated and delivered
        pursuant to this Indenture, other than any such\n        Securities in respect
        of which there shall have been presented to the Trustee proof satisfactory
        to it that such Securities are held by a bona fide purchaser in whose hands
        such Securities are valid obligations of the Company; <font style=\"font-style:
        italic;\">provided, however</font>, that in determining whether the Holders
        of the requisite principal amount of the Outstanding Securities have given,
        made or taken any request, demand, authorization, direction, notice,\n        consent,
        waiver or other action hereunder as of any date, (A) the principal amount
        of an Original Issue Discount Security which shall be deemed to be Outstanding
        shall be the amount of the principal thereof which would be due and payable
        as of such\n        date upon acceleration of the Maturity thereof to such
        date pursuant to Section 5.02, (B) if, as of such date, the principal amount
        payable at the Stated Maturity of a Security is not determinable, the principal
        amount of such Security which shall\n        be deemed to be Outstanding shall
        be the amount as specified or determined as contemplated by Section 3.01,
        (C) the principal amount of a Security denominated in one or more foreign
        currencies or currency units which shall be deemed to be\n        Outstanding
        shall be the U.S. dollar equivalent, determined as of such date in the manner
        provided as contemplated by Section 3.01, of the principal amount of such
        Security (or, in the case of a Security described in Clause (A) or (B) above,
        of the\n        amount determined as provided in such Clause), and (D) Securities
        owned by the Company or any other obligor upon the Securities or any Affiliate
        of the Company or of such other obligor shall be disregarded and deemed not
        to be Outstanding, except\n        that, in determining whether the Trustee
        shall be protected in relying upon any such request, demand, authorization,
        direction, notice, consent, waiver or other action, only Securities which
        a Responsible Officer of the Trustee knows to be so owned\n        shall be
        so disregarded. Securities so owned which have been pledged in good faith
        may be regarded as Outstanding if the pledgee establishes to the satisfaction
        of the Trustee the pledgee&#8217;s right so to act with respect to such Securities
        and that\n        the pledgee is not the Company or any other obligor upon
        the Securities or any Affiliate of the Company or of such other obligor.</div>\n
        \     <div>&#160;</div>\n      <div></div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">4</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">&#8220;Paying Agent&#8221;
        means any Person authorized by the Company to pay the principal of or any
        premium or interest on any Securities on behalf of the Company.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Person&#8221; means any individual,
        corporation, limited liability company, partnership, joint venture, trust,
        unincorporated organization or government or any agency or political subdivision
        thereof.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Place
        of Payment&#8221;, when used with respect to the Securities of any series,
        means the place or places where the principal of and any premium and interest
        on the Securities of that series are payable as specified as\n        contemplated
        by Section 3.01.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Predecessor Security&#8221; of any particular Security means
        every previous Security evidencing all or a portion of the same debt as that
        evidenced by such particular Security; and, for the purposes of this definition,
        any\n        Security authenticated and delivered under Section 3.06 in exchange
        for or in lieu of a mutilated, destroyed, lost or stolen Security shall be
        deemed to evidence the same debt as the mutilated, destroyed, lost or stolen
        Security.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Redemption Date&#8221;, when used with respect to any Security
        to be redeemed, means the date fixed for such redemption by or pursuant to
        this Indenture.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Redemption Price&#8221;, when used with respect to any Security
        to be redeemed, means the price at which it is to be redeemed pursuant to
        this Indenture.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Regular Record Date&#8221; for the interest payable on any
        Interest Payment Date on the Securities of any series means the date specified
        for that purpose as contemplated by Section 3.01.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Responsible Officer&#8221;,
        when used with respect to the Trustee, means any vice president, any assistant
        treasurer, any trust officer or assistant trust officer or any other officer
        of the Trustee customarily performing\n        functions similar to those
        performed by any of the above designated officers and also means, with respect
        to a particular corporate trust matter, any other officer to whom such matter
        is referred because of his knowledge of and familiarity with the\n        particular
        subject.</div>\n      <div>&#160;</div>\n      <div></div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">5</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">&#8220;Securities&#8221;
        has the meaning stated in the first recital of this Indenture and more particularly
        means any Securities authenticated and delivered under this Indenture.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Securities
        Act&#8221; means the Securities Act of 1933 and any statute successor thereto,
        in each case as amended from time to time. &#8220;Security Register&#8221;
        and &#8220;Security Registrar&#8221; have the respective meanings specified
        in\n        Section 3.05.</div>\n      <div>&#160;</div>\n      <div>\n        <div></div>\n
        \       <div style=\"text-indent: 36pt; color: rgb(0, 0, 0);\">&#8220;Senior
        Debt&#8221; means<a name=\"z_Hlk199589154\"></a></div>\n      </div>\n      <div>\n
        \       <div><font style=\"color: rgb(0, 0, 0);\"> </font><br>\n        </div>\n
        \     </div>\n      <table style=\"font-family: 'Times New Roman'; font-size:
        10pt; width: 100%; text-align: left; color: #000000;\" class=\"DSPFListTable\"
        id=\"z832d9a73ea454732b6e7fbd03e05bac7\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \         <tr>\n            <td style=\"width: 18pt; vertical-align: top;\">(i)</td>\n
        \           <td style=\"width: auto; vertical-align: top;\">\n              <div>any
        of the Company&#8217;s indebtedness for borrowed or purchased money, whether
        or not evidenced by bonds, debentures, notes, or other written instruments,
        including any obligations of the Company to general creditors or trade creditors,</div>\n
        \           </td>\n          </tr>\n\n      </table>\n      <div>\n        <div><font
        style=\"color: rgb(0, 0, 0);\"> </font><br>\n        </div>\n      </div>\n
        \     <table style=\"font-family: 'Times New Roman'; font-size: 10pt; width:
        100%; text-align: left; color: #000000;\" class=\"DSPFListTable\" id=\"zc349017b264c4ffb9eebe32505d932e5\"
        cellpadding=\"0\" cellspacing=\"0\">\n\n          <tr>\n            <td style=\"width:
        18pt; vertical-align: top;\">(ii)</td>\n            <td style=\"width: auto;
        vertical-align: top;\">\n              <div>the Company&#8217;s obligations
        under letters of credit,</div>\n            </td>\n          </tr>\n\n      </table>\n
        \     <div>\n        <div style=\"text-indent: -36pt; margin-left: 36pt;\"><font
        style=\"color: rgb(0, 0, 0);\"> </font><br>\n        </div>\n      </div>\n
        \     <table style=\"font-family: 'Times New Roman'; font-size: 10pt; width:
        100%; text-align: left; color: #000000;\" class=\"DSPFListTable\" id=\"zeb355279864d46fbb7ccaab14cb81f79\"
        cellpadding=\"0\" cellspacing=\"0\">\n\n          <tr>\n            <td style=\"width:
        18pt; vertical-align: top;\">(iii)</td>\n            <td style=\"width: auto;
        vertical-align: top;\">\n              <div>any of the Company&#8217;s indebtedness
        or other obligations with respect to commodity contracts, interest rate and
        currency swap agreements, cap, floor, and collar agreements, currency spot
        and forward contracts, and other similar agreements\n                or arrangements
        designed to protect against fluctuations in currency exchange or interest
        rates, and</div>\n            </td>\n          </tr>\n\n      </table>\n      <div>\n
        \       <div><font style=\"color: rgb(0, 0, 0);\"> </font><br>\n        </div>\n
        \     </div>\n      <table style=\"font-family: 'Times New Roman'; font-size:
        10pt; width: 100%; text-align: left; color: #000000;\" class=\"DSPFListTable\"
        id=\"zb526d322fc814b7db1f01badcb701ba7\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \         <tr>\n            <td style=\"width: 18pt; vertical-align: top;\">(iv)</td>\n
        \           <td style=\"width: auto; vertical-align: top;\">\n              <div>any
        guarantees, endorsements (other than by endorsement of negotiable instruments
        for collection in the ordinary course of business), or other similar contingent
        obligations in respect of obligations of others of a type described in\n                clauses
        (i), (ii), and (iii), whether or not such obligation is classified as a liability
        on a balance sheet prepared in accordance with accounting principles generally
        accepted in the United States,</div>\n            </td>\n          </tr>\n\n
        \     </table>\n      <div>\n        <div><br>\n        </div>\n        <div
        style=\"color: rgb(0, 0, 0);\">in each case whether outstanding on the date
        of execution of this Indenture or incurred later, other than obligations ranking
        on a parity with the Securities or ranking junior to the Securities. Notwithstanding
        the\n          foregoing, if the Board of Governors of the Federal Reserve
        (or other competent regulatory agency or authority) promulgates any rule or
        issues any interpretation that defines general creditor(s), the main purpose
        of which is to establish a\n          criteria for determining whether the
        subordinated debt of a bank holding company is to be included in its capital,
        then the term &#8220;general creditors&#8221; as used herein in the definition
        of Senior Debt will have the meaning as described in that rule\n          or
        interpretation.</div>\n        <div>&#160;</div>\n      </div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Special Record Date&#8221; for the payment
        of any Defaulted Interest means a date fixed by the Trustee pursuant to Section
        3.07.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Stated
        Maturity&#8221;, when used with respect to any Security or any instalment
        of principal thereof or interest thereon, means the date specified in such
        Security as the fixed date on which the principal of such Security\n        or
        such instalment of principal or interest is due and payable.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Subsidiary&#8221; means a corporation
        more than 50% of the outstanding voting stock of which is owned, directly
        or indirectly, by the Company or by one or more other Subsidiaries, or by
        the Company and one or more other\n        Subsidiaries. For the purposes
        of this definition, &#8220;voting stock&#8221; means stock which ordinarily
        has voting power for the election of directors or trustees, whether at all
        times or only so long as no senior class of stock has such voting power by\n
        \       reason of any contingency.</div>\n      <div>&#160;</div>\n      <div></div>\n
