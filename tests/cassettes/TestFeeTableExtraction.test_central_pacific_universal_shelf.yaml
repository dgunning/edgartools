        class=\"DSPFListTable\" id=\"z06d5c24841344f0c922a9be726527037\" cellpadding=\"0\"
        cellspacing=\"0\">\n\n        <tr>\n          <td style=\"width: 18pt;\">&#160;</td>\n
        \         <td style=\"width: 18pt; vertical-align: top;\">(1)</td>\n          <td
        style=\"width: auto; vertical-align: top;\">\n            <div>An indeterminate
        aggregate initial offering price or number or amount of the securities of
        each identified class is being registered as may from time to time be offered
        under this registration statement at indeterminate prices, along with\n              an
        indeterminate number or amount of securities that may be issued upon exercise,
        settlement, exchange or conversion of securities offered or sold under this
        registration statement, as shall have an aggregate initial offering price
        up to\n              $300,000,000. Pursuant to Rule 416 under the Securities
        Act of 1933, as amended (the &#8220;Securities Act&#8221;), this registration
        statement also covers any additional securities that may be offered or issued
        in connection with any stock split, stock\n              dividend or pursuant
        to anti-dilution provisions of any of the securities. Separate consideration
        may or may not be received for securities that are issuable upon conversion,
        exercise or exchange of other securities. In addition, the total\n              amount
        to be registered and the proposed maximum aggregate offering price are estimated
        solely for the purpose of calculating the registration fee pursuant to Rule
        457(o) under the Securities Act.</div>\n          </td>\n        </tr>\n\n
        \   </table>\n    <div> <br>\n    </div>\n    <table style=\"font-family:
        'Times New Roman'; font-size: 10pt; width: 100%; text-align: left; color:
        #000000;\" class=\"DSPFListTable\" id=\"z0a0b187274604952abcb389ffb888400\"
        cellpadding=\"0\" cellspacing=\"0\">\n\n        <tr>\n          <td style=\"width:
        18pt;\">&#160;</td>\n          <td style=\"width: 18pt; vertical-align: top;\">(2)</td>\n
        \         <td style=\"width: auto; vertical-align: top;\">\n            <div>Purchase
        contracts may be issued under an agreement obligating us to sell to the holders,
        our securities registered under this registration statement, including a number
        of shares of our common stock, preferred stock or depositary shares,\n              debt
        securities, rights or warrants or any combination thereof.</div>\n          </td>\n
        \       </tr>\n\n    </table>\n    <div> <br>\n    </div>\n    <table style=\"font-family:
        'Times New Roman'; font-size: 10pt; width: 100%; text-align: left; color:
        #000000;\" class=\"DSPFListTable\" id=\"zfb2033353c97496ba6abd0df278f1699\"
        cellpadding=\"0\" cellspacing=\"0\">\n\n        <tr>\n          <td style=\"width:
        18pt;\">&#160;</td>\n          <td style=\"width: 18pt; vertical-align: top;\">(3)</td>\n
        \         <td style=\"width: auto; vertical-align: top;\">\n            <div>Rights
        may be issued under an agreement obligating us to sell to the holders our
        securities registered under this registration statement, including a number
        of shares of our common stock, preferred stock, depositary shares, debt\n
        \             securities, or any combination thereof. The rights may be issued
        independently, as part of a unit, and/or together with any other securities
        and may be attached or separate from the other securities.</div>\n          </td>\n
        \       </tr>\n\n    </table>\n    <div> <br>\n    </div>\n    <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
