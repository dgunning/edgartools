        the requirements of the Trust Indenture Act.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057235\"></a>Section 9.06&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Reference in Securities to Supplemental
        Indentures</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">Securities of any series authenticated and delivered after the execution
        of any supplemental indenture pursuant to this Article may, and shall if required
