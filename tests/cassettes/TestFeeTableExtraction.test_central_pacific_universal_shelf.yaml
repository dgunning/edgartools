        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">Immediately
        after giving effect to the transaction, no default under the debt securities
        of that series has occurred and is continuing. For this purpose, &#8220;default
        under the debt securities of that series&#8221; means an event of default
        with respect to that series or any event that would be an event of default
        with respect to that series if the requirements for giving us a default notice
        and for our default having to continue for a specific period of time were
        disregarded. We describe these matters below under &#8220;&#8212;Default,
        Remedies and Waiver of Default.&#8221; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">We have delivered to the trustee an officers&#8217;
        certificate and opinion of counsel, each stating that the transaction complies
        with the indenture. </div></td></tr></table><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If the conditions
        described above are satisfied with respect to the debt securities of any series,
        we will not need to obtain the approval of the holders of those debt securities
        in order to merge or consolidate or to sell our assets. Also, these conditions
        will apply only if we wish to merge or consolidate with another entity or
        sell our assets substantially as an entirety to another entity. We will not
        need to satisfy these conditions if we enter into other types of transactions,
        including any transaction in which we acquire the stock or assets of another
        entity, any transaction that involves a change of control of us but in which
        we do not merge or consolidate and any transaction in which we sell assets
        in an amount that does not constitute a sale of our assets substantially as
        an entirety. </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        14pt; margin-left: 0pt; text-align: left;\">Subordination Provisions </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Holders of subordinated debt securities should recognize
        that contractual provisions in the subordinated debt indenture may prohibit
        us from making payments on those securities. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Our
        obligations under subordinated debt securities will be subordinated to the
        claims of all of our then-existing general creditors other than trade creditors,
        including claims of holders of the senior debt securities and Central Pacific&#8217;s
        other senior creditors. Subject to applicable law, in any voluntary or involuntary
        insolvency or bankruptcy proceedings, or any receivership, liquidation, reorganization
        or other similar proceeding involving us or our assets or any liquidation
        or winding-up of or relating to us, to the extent applicable, the rights of
        the holder of any subordinated debt security shall be subordinated in right
        of payment to the claims of holders of senior debt. The subordinated debt
        indenture defines &#8220;senior debt&#8221; as all amounts due on obligations
        to general creditors, whether outstanding or subsequently incurred or created,
        including: </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing:
        0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">(i)<br></div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">any of the Company&#8217;s indebtedness
        for borrowed or purchased money, whether or not evidenced by bonds, debentures,
        notes, or other written instruments, including any obligations of the Company
        to general creditors or trade creditors, </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">(ii)<br></div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">the Company&#8217;s obligations under letters of
        credit, </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">(iii)<br></div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">any of the
        Company&#8217;s indebtedness or other obligations with respect to commodity
        contracts, interest rate and currency swap agreements, cap, floor, and collar
        agreements, currency spot and forward contracts, and other similar agreements
        or arrangements designed to protect against fluctuations in currency exchange
        or interest rates, and </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">(iv)<br></div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">any guarantees, endorsements (other than by endorsement of negotiable
        instruments for collection in the ordinary course of business), or other similar
        contingent obligations in respect of obligations of others of a type described
        in clauses (i), (ii), and (iii), whether or not such obligation is classified
        as a liability on a balance sheet prepared in accordance with accounting principles
        generally accepted in the United&#160;States, </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
