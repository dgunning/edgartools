        5.1\n<TEXT>\n<html>\n  <head>\n    <title></title>\n    <!-- Licensed to:
        Broadridge Financial Solutions, Inc.\n         Document created using Broadridge
        PROfile 25.5.1.5318\n         Copyright 1995 - 2025 Broadridge -->\n  </head>\n<body
        style=\"font-family: 'Times New Roman'; font-size: 10pt; text-align: left;
        color: #000000;\" bgcolor=\"#ffffff\">\n  <hr style=\"height: 4px; color:
        #000000; background-color: #000000; text-align: center; margin-left: auto;
        margin-right: auto; border: none;\" align=\"center\" noshade=\"noshade\">\n
        \ <div style=\"text-align: justify; text-indent: 36pt;\">\n    <div style=\"text-align:
        right; font-weight: bold;\">Exhibit 5.1</div>\n    <div>&#160;</div>\n    <div
        style=\"text-align: right;\">June 30, 2025</div>\n    <div>&#160;</div>\n
        \   <div>Central Pacific Financial Corp.</div>\n    <div>220 South King Street</div>\n
        \   <div>Honolulu, Hawaii 96813</div>\n    <div><br>\n    </div>\n    <div>Ladies
        and Gentlemen:</div>\n    <div>&#160;</div>\n    <div style=\"text-indent:
        36pt;\">In connection with the registration on Form S-3 (the &#8220;Registration
        Statement&#8221;), under the Securities Act of 1933 (the &#8220;Act&#8221;),
        of up to $300,000,000 of securities including common stock, no par value (the
        &#8220;Common Stock&#8221;),\n      of Central Pacific Financial Corp., a
        Hawaii corporation (the &#8220;Company&#8221;), preferred stock, no par value,
        of the Company (the &#8220;Preferred Stock&#8221;), depositary shares representing
        preferred stock, senior and subordinated debt securities, purchase\n      contracts,
        rights, warrants and units comprised of two or more of the foregoing (the
        foregoing securities being referred to herein as the &#8220;Securities&#8221;),
        I have examined such corporate records, certificates and other documents,
        and such questions of\n      law, as I have considered necessary or appropriate
        for the purposes of this opinion.</div>\n    <div>&#160;</div>\n    <div style=\"text-indent:
        36pt;\">As Chief Legal Officer of the Company, I am of the opinion that:</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">The Company has
        been duly incorporated and is a validly existing corporation under the laws
        of the State of Hawaii.</div>\n    <div>&#160;</div>\n    <div style=\"text-indent:
        36pt;\">When the Registration Statement has become effective under the Act,
        when the terms of the Common Stock and of their issuance and sale have been
        duly established in conformity with the Company&#8217;s Amended and Restated\n
        \     Articles of Incorporation, as amended (the &#8220;Articles&#8221;),
        and when the Common Stock has been duly issued and sold as contemplated by
        the Registration Statement, and if all the foregoing actions are taken pursuant
        to authority granted in resolutions\n      duly adopted by the Company&#8217;s
        Board of Directors, or a duly authorized committee thereof, and so as not
        to violate any applicable law or result in a default under or breach of any
        agreement or instrument binding upon the Company and so as to comply\n      with
        any requirement or restriction imposed by any court or governmental body having
        jurisdiction over the Company, the Common Stock will be validly issued, fully
        paid and non-assessable. The Common Stock covered by the opinion in this paragraph\n
        \     include any Common Stock that may be issued (i) as part of the units
        or (ii) upon exercise, conversion, exchange or otherwise pursuant to the terms
        of any other Securities.</div>\n    <div style=\"text-indent: 36pt;\"> <br>\n
        \   </div>\n    <div style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\" class=\"BRPFPageBreakArea\">\n      <div style=\"page-break-after:
        always;\" class=\"BRPFPageBreak\">\n        <hr style=\"border-width: 0px;
        clear: both; margin: 4px 0px; width: 100%; height: 2px; color: #000000; background-color:
        #000000;\" noshade=\"noshade\"></div>\n    </div>\n    <div>\n      <div style=\"text-align:
        left; font-size: 12pt;\">\n        <table style=\"font-family: 'Times New
        Roman'; font-size: 10pt; color: #000000; width: 100%;\" id=\"zef06dade6f404827af4e579d35931153\"
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\">\n\n            <tr>\n              <td
        style=\"width: 50%;\">\n                <div>Central Pacific Financial Corp.</div>\n
        \             </td>\n              <td style=\"width: 50%; text-align: right;\"
        colspan=\"1\">2</td>\n            </tr>\n\n        </table>\n      </div>\n
        \   </div>\n    <br>\n  </div>\n  <div style=\"text-align: justify; text-indent:
        36pt;\"><font style=\"background-color: rgb(255, 255, 255); font-weight: normal;
        color: rgb(0, 0, 0); font-style: normal; font-variant: normal; text-transform:
        none;\">When the Registration Statement has become\n      effective under
        the Act, when the terms of the Preferred Stock and of its issuance and sale
        have been duly established in conformity with the Articles, when an appropriate
        articles of amendment with respect to the Preferred Stock has been duly filed\n
        \     with the Department of Commerce and Consumer Affairs, Business Registration
        Division&#160;of the State of Hawaii and when the Preferred Stock has been
        duly issued and sold as contemplated by the Registration Statement, and if
        all the foregoing actions are\n      taken pursuant to authority granted in
        resolutions duly adopted by the Company&#8217;s Board of Directors, or a duly
        authorized committee thereof, and so as not to violate any applicable law
        or result in a default under or breach of any agreement or\n      instrument
        binding upon the Company and so as to comply with any requirement or restriction
        imposed by any court or governmental body having jurisdiction over the Company,
        the Preferred Stock will be validly issued, fully paid and non-assessable.
        The\n      Preferred Stock covered by the opinion in this paragraph includes
        any preferred stock that may be represented by depositary shares or may be
        issued (i) as part of the units or (ii) upon exercise, conversion, exchange
        or otherwise pursuant to the\n      terms of any other Securities.</font>\n
        \   <div style=\"text-indent: 54pt;\"><font class=\"HorizontalTab\" style=\"width:
        9pt; font-size: 1px; display: inline-block;\"></font></div>\n    <div style=\"text-indent:
        54pt;\"> <br>\n    </div>\n    <div style=\"text-indent: 36pt;\">The foregoing
        opinion is limited to the laws of the State of Hawaii, and I am expressing
        no opinion as to the effect of the laws of any other jurisdiction.</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">I have relied
        as to certain matters on factual information obtained from public officials,
        officers of the Company and other sources believed by me to be responsible.</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">I hereby consent
        to the filing of this opinion as an exhibit to the Registration Statement
        and to the reference to me under the heading &#8220;Validity of the Securities&#8221;
        in the prospectus contained therein. In giving such\n      consent, I do not
        thereby admit that I am in the category of persons whose consent is required
        under Section 7 of the Act.</div>\n    <div>&#160;</div>\n    <table id=\"z1fda3ac5985041d0b0a9faee5608be1f\"
        style=\"font-family: 'Times New Roman'; font-size: 10pt; width: 100%; border-collapse:
        collapse; text-align: left; color: #000000;\" border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\">\n\n        <tr>\n          <td style=\"width: 45%; vertical-align:
        top;\">&#160;</td>\n          <td style=\"width: 40%; vertical-align: top;\">\n
        \           <div>Very truly yours,</div>\n          </td>\n          <td style=\"width:
        15%; vertical-align: top;\">&#160;</td>\n        </tr>\n        <tr>\n          <td
        style=\"width: 45%; vertical-align: top;\" rowspan=\"1\">&#160;</td>\n          <td
        style=\"width: 40%; vertical-align: top;\" rowspan=\"1\">&#160;</td>\n          <td
        style=\"width: 15%; vertical-align: top;\" rowspan=\"1\">&#160;</td>\n        </tr>\n
        \       <tr>\n          <td style=\"width: 45%; vertical-align: top; padding-bottom:
        2px;\">&#160;</td>\n          <td style=\"width: 40%; vertical-align: top;
        border-bottom: 2px solid rgb(0, 0, 0);\">\n            <div>/s/ GLENN K.C.
        CHING</div>\n          </td>\n          <td style=\"width: 15%; vertical-align:
        top; padding-bottom: 2px;\">&#160;</td>\n        </tr>\n        <tr>\n          <td
        style=\"width: 45%; vertical-align: top;\">&#160;</td>\n          <td style=\"width:
        40%; vertical-align: top;\">&#160;</td>\n          <td style=\"width: 15%;
        vertical-align: top;\">&#160;</td>\n        </tr>\n        <tr>\n          <td
        style=\"width: 45%; vertical-align: top;\">&#160;</td>\n          <td style=\"width:
        40%; vertical-align: top;\">\n            <div>GLENN K.C. CHING</div>\n          </td>\n
        \         <td style=\"width: 15%; vertical-align: top;\">&#160;</td>\n        </tr>\n\n
        \   </table>\n    <div><br>\n    </div>\n    <div><br>\n      <hr style=\"height:
        2px; color: #000000; background-color: #000000; text-align: center; margin-left:
        auto; margin-right: auto; border: none;\" align=\"center\" noshade=\"noshade\"></div>\n
        \ </div>\n</body>\n</html>\n</TEXT>\n</DOCUMENT>\n<DOCUMENT>\n<TYPE>EX-5.2\n<SEQUENCE>5\n<FILENAME>ny20051086x1_ex5-2.htm\n<DESCRIPTION>EXHIBIT
        5.2\n<TEXT>\n<html>\n  <head>\n    <title></title>\n    <!-- Licensed to:
        Broadridge Financial Solutions, Inc.\n         Document created using Broadridge
        PROfile 25.5.1.5318\n         Copyright 1995 - 2025 Broadridge -->\n  </head>\n<body
        style=\"font-family: 'Times New Roman'; font-size: 10pt; text-align: left;
        color: #000000;\" bgcolor=\"#ffffff\">\n  <hr style=\"height: 4px; color:
        #000000; background-color: #000000; text-align: center; margin-left: auto;
        margin-right: auto; border: none;\" align=\"center\" noshade=\"noshade\">\n
        \ <div>\n    <div style=\"text-align: right; font-weight: bold;\">Exhibit
        5.2</div>\n    <div>&#160;</div>\n    <table id=\"z785cff2d01fa4727950b9583dc819336\"
        style=\"font-family: 'Times New Roman'; font-size: 10pt; width: 100%; border-collapse:
        collapse; text-align: left; color: #000000;\" border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\">\n\n        <tr>\n          <td style=\"width: 45%; vertical-align:
        top;\">\n            <div style=\"font-size: 32pt; font-family: Arial;\">manatt</div>\n
        \           <div style=\"font-size: 9pt; font-family: Arial;\">manatt | phelps
        | phillips</div>\n          </td>\n          <td style=\"width: 55%; vertical-align:
        top;\">\n            <div style=\"text-align: right; font-family: Arial;\">Manatt,
        Phelps &amp; Phillips, LLP</div>\n            <div>&#160;</div>\n          </td>\n
        \       </tr>\n\n    </table>\n    <div style=\"text-align: right;\">June
        30, 2025</div>\n    <div>&#160;</div>\n    <div>Central Pacific Financial
        Corp.</div>\n    <div>200 South King Street</div>\n    <div>Honolulu, Hawaii
        96813</div>\n    <div> <br>\n    </div>\n    <div>Ladies and Gentlemen:</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">We are acting
        as counsel to Central Pacific Financial Corp., a Hawaii corporation (the &#8220;Company&#8221;),
        in connection with its filing of a registration statement on Form S-3 (the
        &#8220;Registration Statement&#8221;) under the Securities\n      Act of 1933
        (the &#8220;Act&#8221;). The Registration Statement registers up to $300,000,000
        of securities including common stock, no par value (&#8220;Common Stock&#8221;),
        of the Company, preferred stock, no par value (&#8220;Preferred Stock&#8221;),
        of the Company, senior and\n      subordinated debt securities (the &#8220;Debt
        Securities&#8221;), depositary shares representing preferred stock (the &#8220;Depositary
        Shares&#8221;), warrants to purchase Common Stock, Preferred Stock, Depositary
        Shares, Debt Securities or Units (as defined below) (the\n      &#8220;Warrants&#8221;),
        purchase contracts (the &#8220;Purchase Contracts&#8221;), rights (the &#8220;Rights&#8221;)
        and units comprised of two or more of the foregoing (the &#8220;Units,&#8221;
        and together with the Common Stock, Preferred Stock, Depositary Shares, Rights,
        Debt Securities and\n      Warrants, the &#8220;Securities&#8221;).</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">In connection
        with the filing of the Registration Statement, we, as your counsel, have examined
        such corporate records, certificates and other documents, and such questions
        of law, as we have considered necessary or\n      appropriate for the purposes
        of this opinion. Upon the basis of such examination, it is our opinion that:</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Debt Securities</font>. When the Registration
        Statement has become effective under the Act, when the applicable indenture
        (the &#8220;Debt Indenture&#8221;) relating to the Debt\n      Securities
        has been duly authorized, executed and delivered, when the terms of the Debt
        Securities and of their issuance and sale have been duly established in conformity
        with the applicable Debt Indenture, so as not to violate any applicable law
        or\n      result in a default under or breach of any agreement or instrument
        binding upon the Company, and so as to comply with any requirement or restriction
        imposed by any court or governmental body having jurisdiction over the Company,
        and when the Debt\n      Securities have been duly executed and authenticated
        in accordance with the applicable Debt Indenture and issued and sold as contemplated
        in the Registration Statement, and if all the foregoing actions are taken
        pursuant to authority granted in\n      resolutions duly adopted by the Company&#8217;s
        Board of Directors, or a duly authorized committee thereof, the Debt Securities
        will constitute valid and legally binding obligations of the Company. The
        Debt Securities covered by the opinion in this\n      paragraph include any
        Debt Securities that may be issued as part of the Units or upon exercise or
        otherwise pursuant to the terms of any other Securities as well as any Purchase
        Contracts or Units that may be issued under the applicable Debt\n      Indenture
        relating to the Debt Securities.</div>\n    <div>&#160;</div>\n    <div>\n
        \     <table id=\"ze311b77af153456da00982ae8b0a4c8b\" style=\"font-family:
        'Times New Roman'; font-size: 10pt; width: 100%; border-collapse: collapse;
        text-align: left; color: #000000;\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \         <tr>\n            <td style=\"width: 100%; vertical-align: top;\">\n
        \             <div style=\"text-align: center; font-size: 9pt; font-family:
        Arial;\">1 Embarcadero Ctr, San Francisco, CA 94111 Telephone:&#160; 415.291.7400&#160;
        Fax:&#160; 415.291.7474</div>\n              <font style=\"font-family: Arial;
        font-size: 9pt;\"> </font>\n              <div style=\"text-align: center;
        font-size: 9pt; font-family: Arial;\">Albany&#160; |&#160; Los Angeles&#160;
        |&#160; New York&#160; |&#160; Orange County&#160; |&#160; Palo Alto&#160;
        |&#160; Sacramento&#160; |&#160; San Francisco&#160; |&#160; Washington, D.C.</div>\n
        \           </td>\n          </tr>\n\n      </table>\n      <div> <br>\n      </div>\n
        \   </div>\n    <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n      <div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\">\n        <hr style=\"margin: 4px 0px; width: 100%; border-width:
        0; height: 2px; color: #000000; background-color: #000000; clear: both;\"
        noshade=\"noshade\"></div>\n      <div class=\"BRPFPageHeader\" style=\"width:
        100%;\">\n        <div style=\"font-size: 32pt; font-weight: normal; color:
        rgb(0, 0, 0); font-family: Arial; font-style: normal; font-variant: normal;
        text-transform: none;\">manatt</div>\n        <div style=\"font-family: Arial;
        font-size: 9pt;\">manatt | phelps | phillips</div>\n      </div>\n    </div>\n
        \   <div> </div>\n    <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Depositary Shares</font>. When the Registration
        Statement has become effective under the Act, when the terms of any applicable
        deposit agreements under which the Depositary\n      Shares are to be issued
        have been duly established and any applicable deposit agreements have been
        duly authorized, executed and delivered, when the terms of the Depositary
        Shares and of their issuance and sale have been duly established in\n      conformity
        with the applicable deposit agreements, when the Preferred Stock represented
        by the Depositary Shares have been duly delivered to the applicable depositaries
        and when the depositary receipts evidencing the Depositary Shares have been
        duly\n      issued against deposit of the Preferred Stock in accordance with
        the applicable deposit agreements and issued and sold as contemplated by the
        Registration Statement, and if all the foregoing actions are taken pursuant
        to authority granted in\n      resolutions duly adopted by the Company&#8217;s
        Board of Directors, or a duly authorized committee thereof, and so as not
        to violate any applicable law or result in a default under or breach of any
        agreement or instrument binding upon the Company and so as\n      to comply
        with any requirement or restriction imposed by any court or governmental body
        having jurisdiction over the Company, the depositary receipts evidencing the
        Depositary Shares will be validly issued and will entitle the holders thereof
        to the\n      rights specified in the Depositary Shares and the applicable
        deposit agreements. The Depositary Shares covered by the opinion in this paragraph
        include any Depositary Shares that may be issued as part of the Units or upon
        exercise or otherwise\n      pursuant to the terms of any other Securities.</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Warrants</font>. When the Registration Statement
        has become effective under the Act, when the terms of any applicable warrant
        agreements under which the Warrants are to be\n      issued have been duly
        established and the applicable warrant agreements have been duly authorized,
        executed and delivered, when the terms of the Warrants and of their issuance
        and sale have been duly established in conformity with the applicable\n      warrant
        agreement and when the Warrants have been duly executed and authenticated
        in accordance with the applicable warrant agreement and issued and sold as
        contemplated by the Registration Statement, and if all the foregoing actions
        are taken\n      pursuant to authority granted in resolutions duly adopted
        by the Company&#8217;s Board of Directors, or a duly authorized committee
        thereof, and so as not to violate any applicable law or result in a default
        under or breach of any agreement or instrument\n      binding upon the Company
        and so as to comply with any requirement or restriction imposed by any court
        or governmental body having jurisdiction over the Company, the Warrants will
        constitute valid and legally binding obligations of the Company. The\n      Warrants
        covered by the opinion in this paragraph include any Warrants that may be
        issued as part of the Units or upon exercise or otherwise pursuant to the
        terms of any other Securities.</div>\n    <div>&#160;</div>\n    <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Purchase Contracts. </font>When the Registration
        Statement has become effective under the Act, when the terms of the governing
        instruments or agreements under which certain\n      of the Purchase Contracts
        are to be issued have been duly established and the governing documents have
        been duly authorized, executed and delivered, when the terms of the Purchase
        Contracts and of their issuance and sale have been duly established in\n      conformity
        with the applicable governing documents and when the Purchase Contracts have
        been duly executed and authenticated in accordance with the applicable governing
        documents and issued and sold as contemplated in the Registration Statement,
        and\n      if all the foregoing actions are taken pursuant to authority granted
        in resolutions duly adopted by the Company&#8217;s Board of Directors or a
        duly authorized committee thereof, and so as not to violate any applicable
        law or result in a default under or\n      breach of any agreement or instrument
        binding upon the Company and so as to comply with any requirement or restriction
        imposed by any court or governmental body having jurisdiction over the Company,
        the Purchase Contracts will constitute valid and\n      legally binding obligations
        of the Company<font style=\"font-style: italic;\">. </font>The Purchase Contracts
        covered by the opinion in this paragraph include any Purchase Contracts that
        may be issued as part of the Units or upon exercise or otherwise\n      pursuant
        to the terms of any other Securities.</div>\n    <div>&#160;</div>\n    <div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\">\n      <div class=\"BRPFPageFooter\" style=\"width: 100%;\"></div>\n
        \     <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \       <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     <div class=\"BRPFPageHeader\" style=\"width: 100%;\">\n        <div
        style=\"font-size: 32pt; font-weight: normal; color: rgb(0, 0, 0); font-family:
        Arial; font-style: normal; font-variant: normal; text-transform: none;\">manatt</div>\n
        \       <div style=\"font-family: Arial; font-size: 9pt;\">manatt | phelps
        | phillips</div>\n      </div>\n    </div>\n    <div style=\"text-indent:
        36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Rights. </font>When the Registration Statement
        has become effective under the Act, when the terms of the governing instruments
        or agreements under which certain of the\n      Rights are to be issued have
        been duly established and the governing documents have been duly authorized,
        executed and delivered, when the terms of the Rights and of their issuance
        and sale have been duly established in conformity with the applicable\n      governing
        documents and when the Rights have been duly executed and authenticated in
        accordance with the applicable governing documents and issued and sold as
        contemplated in the Registration Statement, and if all the foregoing actions
        are taken\n      pursuant to authority granted in resolutions duly adopted
        by the Company&#8217;s Board of Directors or a duly authorized committee thereof,
        and so as not to violate any applicable law or result in a default under or
        breach of any agreement or instrument\n      binding upon the Company and
        so as to comply with any requirement or restriction imposed by any court or
        governmental body having jurisdiction over the Company, the Rights will constitute
        valid and legally binding obligations of the Company<font style=\"font-style:
        italic;\">. </font>The Rights covered by the opinion in this paragraph include
        any Rights that may be issued as part of the Units or upon exercise or otherwise
        pursuant to the terms of any other Securities.</div>\n    <div>&#160;</div>\n
        \   <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Units. </font>When the Registration Statement
        has become effective under the Act, when the terms of the unit agreements
        under which the Units are to be issued have been\n      duly established and
        the unit agreements have been duly authorized, executed and delivered, when
        the terms of the Units and of their issuance and sale have been duly established
        in conformity with the applicable unit agreements and when the Units\n      have
        been duly executed and authenticated in accordance with the applicable unit
        agreements and issued and sold as contemplated in the Registration Statement,
        and if all the foregoing actions are taken pursuant to the authority granted
        in resolutions\n      duly adopted by the Company&#8217;s Board of Directors,
        or a duly authorized committee thereof, and so as not to violate any applicable
        law or result in a default under or breach of any agreement or instrument
        binding upon the Company and so as to comply\n      with any requirement or
        restriction imposed by any court or governmental body having jurisdiction
        over the Company, the Units will constitute valid and legally binding obligations
        of the Company. <font style=\"font-style: italic;\">&#160;</font>The Units\n
        \     covered by the opinion in this paragraph include any Units that may
        be issued upon exercise or otherwise pursuant to the terms of any other Securities.</div>\n
        \   <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">The foregoing
        opinion is limited to the current Federal laws of the United States and the
        laws of the State of New York and to facts as they currently exist, and we
        are expressing no opinion as to the effect of the laws\n      of any other
        jurisdiction<font style=\"font-style: italic;\">. </font>With respect to all
        matters of Hawaii law, we have relied upon the opinion, dated June 30, 2025,
        of Glenn K.C. Ching, and our opinion is subject to the same assumptions,\n
        \     qualifications and limitations with respect to such matters as are contained
        in such opinion of Glenn K.C. Ching. We assume no obligations to revise or
        supplement this opinion in the event of future changes in such laws or the
        interpretations thereof\n      or such facts.</div>\n    <div>&#160;</div>\n
        \   <div style=\"text-indent: 36pt;\">The foregoing opinions as to the legality,
        validity, binding effect and enforceability of provisions of such instruments
        and agreements are subject to (i) applicable bankruptcy, reorganization, insolvency
        moratorium,\n      fraudulent transfer, voidable transactions, fraudulent
        conveyance, receivership or other laws of general application affecting creditors&#8217;
        rights, (ii) general equity principles, including, without limitation, concepts
        of materiality, reasonableness,\n      good faith, fair dealing and the possible
        unavailability of specific performance, injunctive relief or other equitable
        remedies (regardless of whether enforceability is considered in a proceeding
        I equity or at law), and (iii) public policy\n      considerations that may
        limit the rights of parties to obtain specific remedies or enforce specific
        terms.</div>\n    <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">In
        rendering the foregoing opinions, we are not passing upon, and assume no responsibility
        for, any disclosure in the Registration Statement or any related prospectus
        regarding the Company, the Securities, or their\n      offering and sale.</div>\n
        \   <div>&#160;</div>\n    <div class=\"BRPFPageBreakArea\" style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\">\n      <div class=\"BRPFPageFooter\"
        style=\"width: 100%;\"></div>\n      <div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\">\n        <hr style=\"margin: 4px 0px; width: 100%; border-width:
        0; height: 2px; color: #000000; background-color: #000000; clear: both;\"
        noshade=\"noshade\"></div>\n      <div class=\"BRPFPageHeader\" style=\"width:
        100%;\">\n        <div style=\"font-size: 32pt; font-weight: normal; color:
        rgb(0, 0, 0); font-family: Arial; font-style: normal; font-variant: normal;
        text-transform: none;\">manatt</div>\n        <div style=\"font-family: Arial;
        font-size: 9pt;\">manatt | phelps | phillips</div>\n      </div>\n    </div>\n
        \   <div style=\"text-indent: 36pt;\">We have relied as to certain factual
        matters on information obtained from public officials, officers of the Company
        and other sources believed by us to be responsible, and we have assumed all
        other governing documents\n      under which the Securities are to be issued,
        as well as the purchase contracts, if applicable, will have been duly authorized,
        executed and delivered by all parties thereto other than the Company and that
        the signatures on documents examined by us\n      are genuine<font style=\"font-style:
        italic;\">. </font>We have further assumed that the issuance or delivery by
        the Company of any securities other than the Securities, or of any other property,
        upon exercise or otherwise pursuant to the terms of the\n      Securities
        will be effected pursuant to authority granted in resolutions duly adopted
        by the Company&#8217;s Board of Directors, or a duly authorized committee
        thereof, and so as not to violate any applicable law or result in a default
        under or breach of\n      any agreement or instrument binding on the Company
        and so as to comply with any requirement or restriction imposed by any court
        or governmental body having jurisdiction over the Company<font style=\"font-style:
        italic;\">. </font>Finally, we have\n      assumed that the authority granted
        in resolutions duly adopted by the Company&#8217;s Board of Directors, or
        a duly authorized committee thereof, will remain in effect at all relevant
        times and that no Securities will be issued or other action taken in\n      contravention
        of any applicable limit established pursuant to such resolutions from time
        to time.</div>\n    <div>&#160;</div>\n    <div style=\"text-indent: 36pt;\">We
        are expressing no opinion as to any obligations that parties other than the
