        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">the issuance or transfer of any
        of our securities or any of our subsidiaries' securities by us or any of our
        subsidiaries to an interested shareholder or its affiliates having a fair
        market value of $2&#160;million or more; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">the adoption of a plan or proposal for our liquidation
        or dissolution proposed by or on behalf of an interested shareholder or its
        affiliate; and </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">any reclassification of securities (including any reverse stock split),
        recapitalization, merger or consolidation of our company with any of our subsidiaries
        or other transaction (whether or not involving an interested shareholder)
        that has the effect of increasing the proportionate share of the outstanding
        shares of any class of our equity or convertible securities or those of our
        subsidiaries owned by an interested shareholder or its affiliate. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">This voting requirement will not apply to any particular
        transaction approved by a majority vote of the directors who are unaffiliated
        with the interested shareholder and who were members of the Board of Directors
        before the latter of the first public announcement of the terms of the proposed
        business combination and the day the interested shareholder became a shareholder
        and any successor to such directors who were unaffiliated with </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
