        1pt solid #000000; margin-bottom: 1pt; margin-right: auto; margin-left: 0pt;
        margin-top: 12.75pt;\"> </div></div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 3pt; margin-left:
        0pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        8pt;\">*<br></div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 8pt; text-align:
        left;\">Estimated fees and expenses are not presently known and will depend
        on the securities offered and the number of securities issuances. An estimate
        of the aggregate expenses in connection with the sale and distribution of
        securities being offered will be included in the applicable prospectus supplement.
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 12pt; margin-left: 0pt;\"><tr><td style=\"width:
        50pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold;\">Item&#160;15.<br></div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-weight: bold; text-align: left;\">Indemnification of Directors
        and Officers </div></td></tr></table><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Section&#160;414-242
        of the Hawaii Business Corporation Act (the &#8220;<u>HBCA</u>&#8221;) provides
        that a corporation may indemnify an individual who is a party to a proceeding
        because the individual is a director against liability incurred in the proceeding
        if: </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing:
        0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">the individual conducted himself
        or herself in good faith and the individual reasonably believed (i) in the
        case of conduct in the individual&#8217;s official capacity, that the individual&#8217;s
        conduct was in the best interests of the corporation, and (ii) in all other
        cases, that the individual&#8217;s conduct was at least not opposed to the
        best interests of the corporation; and </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">in the case of any criminal proceeding, the individual
        had no reasonable cause to believe the individual&#8217;s conduct was unlawful;
        or </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">the individual
        engaged in conduct for which broader indemnification has been made permissible
        or obligatory under a provision of the articles of incorporation. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">To the extent that a director is wholly successful
        in the defense of any proceeding to which the director was a party because
        the director was a director of the corporation, the corporation is required
        by Section&#160;414-243 of the HBCA to indemnify such director for reasonable
        expenses incurred thereby. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Under Section&#160;414-244
        of the HBCA, a corporation, before final disposition of a proceeding, may
        advance funds to pay for or reimburse the reasonable expenses incurred by
        a director who is a party to a proceeding because the director is a director
        of the corporation if the director delivers certain written affirmations and
        certain undertakings. Under certain circumstances, under Section&#160;414-245
        of the HBCA a director may apply for and obtain indemnification or an advance
        for expenses to the court conducting the proceeding or to another court of
        competent jurisdiction. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Further, under
        Section&#160;414-246 of the HBCA, indemnification may be made only as authorized
        in a specific case upon a determination that indemnification is proper in
        the circumstances because a director has met the applicable standard, with
        such determination to be made: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">by the Board of Directors by a majority vote of a quorum consisting
        of directors who were not parties to the proceeding or who do not have a familial,
        financial, professional or employment relationship with the director whose
        indemnification is the subject of the decision being made, which relationship
        would reasonably be expected to influence the director&#8217;s judgment when
        voting on the decision being made; </div></td></tr></table></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">II-1<br></div></div></div>\n<!--End Page 53-->\n<div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\"
        style=\"page-break-after: always;\"><hr noshade=\"noshade\" style=\"border-width:
        0px; clear: both; margin: 4px auto; width: 612pt; height: 2px; color: #000000;
        background-color: #000000;\"></div></div>\n<!--Begin Page 54-->\n<div class=\"BRDSX_page\"
        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_301-part2_pg2\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6.75pt; margin-left: 20pt;\"><tr><td
        style=\"width: 20pt; text-align: left; vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">by special
        legal counsel; or </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">by a majority vote of the shareholders. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Under Section&#160;414-247 of the HBCA, a corporation
        may indemnify and advance expenses to an officer who is a party to a proceeding
        because the officer is an officer of the corporation: </div><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">to the same extent as a director; and </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">if the person is an officer but
        not a director, to such further extent as may be provided by the articles
        of incorporation, the bylaws, a resolution of the Board of Directors, or contract
        except for liability in connection with a proceeding by or in the right of
        the corporation other than for reasonable expenses incurred in connection
        with the proceeding, or liability arising out of conduct that constitutes
        (i) receipt by the officer of a financial benefit to which the officer is
        not entitled, (ii) an intentional infliction of harm on the corporation or
        the shareholders; or (iii) an intentional violation of criminal law. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">The above-described provision applies to an officer
        who is also a director if the basis on which the officer is made a party to
        the proceeding is an act or omission solely as an officer. Further an officer
        of a corporation who is not a director is entitled to mandatory indemnification
        under Section&#160;414-243 of the HBCA and may apply to a court under Section&#160;414-245
        of the HBCA for indemnification or an advance for expenses, in each case to
        the same extent to which a director may be entitled to indemnification or
        advance for expenses. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The HBCA also
        provides that a corporation may include indemnification provisions in its
        articles of incorporation that are broader than the foregoing provisions,
        except as limited by Section&#160;414-32 of the HBCA. Our Restated Articles
        of Incorporation, as amended, provide that, to the fullest extent permitted
        by the HBCA, no director of the Company shall be liable to the Company or
        its shareholders for monetary damages for any action taken, or any failure
        to take any action, as a director. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Pursuant to
        our Bylaws, as amended, we are obligated to indemnify each person who was
        or is a party or is threatened to be made a party to any threatened, pending
        or completed action, suit or proceeding, whether civil, criminal, administrative
        or investigative (other than an action by or in the right of the Company)
        by reason of the fact that he or she is or was a director, officer, employee
        or agent of the Company or of any division of the Company, or is or was serving
        at the request of the Company as a director, officer, employee or agent of
        another corporation, partnership, joint venture, trust or other enterprise
        against expenses (including attorneys&#8217; fees), judgments, fines and amounts
        paid in settlement actually and reasonably incurred by him or her in connection
        with such action, suit or proceeding if he or she acted in good faith and
        in a manner he or she reasonably believed to be in or not opposed to the best
        interests of this Company, and, with respect to any criminal action or proceeding,
        had no reasonable cause to believe his or her conduct was unlawful. The termination
        of any action, suit, or proceeding by judgment, order, settlement, conviction,
        or upon a plea of nolo contendere or its equivalent, shall not, of itself,
        create a presumption that the person did not act in good faith and in a manner
        which he or she reasonably believed to be in or not opposed to the best interests
        of the Company and, with respect to any criminal action or proceeding, had
        reasonable cause to believe that his or her conduct was unlawful. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">In addition, our Bylaws, as amended, provide that
        we shall indemnify each person who was or is a party or is threatened to be
        made a party to any threatened, pending, or completed action or suit by or
        in the right of the Company to procure a judgment in its favor by reason of
        the fact that he or she is or was a director, officer, employee or agent of
        the Company or of any division of the Company, or is or was serving at the
        request of the Company as a director, officer, employee or agent of the Company
        or of any division of the Company, or is or was serving at the request of
        the Company as a director, officer, employee, or agent of another corporation,
        partnership, joint venture, trust or other enterprise against expenses (including
        attorneys&#8217; fees) actually and reasonably incurred by him or her in connection
        with the defense or settlement of such action or suit if he or she acted in
        good faith and in a manner he or she reasonably believed to be in or not opposed
        to the best interests of the Company, except that no indemnification shall
        be made in respect of any claim, issue or matter as to which such person shall
        have been adjudged to be liable for negligence or misconduct in the performance
        of his or her duty to this Company unless and only to the extent that the
        court in which such action or suit was brought or in any other court having
        jurisdiction in the premises shall determine upon application that, despite
        the adjudication of liability but in view of all the circumstances of the
        case, such person is fairly and reasonably entitled to indemnity for such
        expenses which such court shall deem proper. </div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">II-2<br></div></div></div>\n<!--End
