        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Trustee&#8221;
        means the Person named as the &#8220;Trustee&#8221; in the first paragraph
        of this instrument until a successor Trustee shall have become such pursuant
