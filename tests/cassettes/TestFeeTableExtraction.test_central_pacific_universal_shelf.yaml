        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h2\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; margin-left: 0pt; text-align: left;\">Redemption
        and Repayment </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Unless otherwise indicated in
        the applicable prospectus supplement, a debt security will not be entitled
        to the benefit of any sinking fund&#8212;that is, we will not deposit money
        on a regular basis into any separate custodial account to repay the debt securities.
        In addition, we will not be entitled to redeem a debt security before its
        stated maturity unless the applicable prospectus supplement specifies a redemption
        commencement date. You will not be entitled to require us to buy a debt security
        from you before its stated maturity unless the applicable prospectus supplement
        specifies one or more repayment dates. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If your applicable
        prospectus supplement specifies a redemption commencement date or a repayment
        date, it will also specify one or more redemption prices or repayment prices,
        which may be expressed as a percentage of the principal amount of the debt
        security. It may also specify one or more redemption periods during which
        the redemption prices relating to a redemption of debt securities during those
        periods will apply. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If we redeem
        less than all the debt securities of any series, we will, at least 60 days
        before the redemption date set by us or any shorter period that is satisfactory
        to the trustee, notify the trustee of the redemption date, of the principal
        amount of debt securities to be redeemed and if applicable, of the tenor of
        the debt securities to be redeemed. The trustee will select from the outstanding
        securities of the series the particular debt securities to be redeemed not
        more than 60 days before the redemption date. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If
        the applicable prospectus supplement specifies a redemption commencement date,
        the debt security will be redeemable at our option at any time on or after
        that date or at a specified time or times. If we redeem the debt security,
        we will do so at the specified redemption price, together with interest accrued
        to the redemption date. If different prices are specified for different redemption
        periods, the price we pay will be the price that applies to the redemption
        period during which the debt security is redeemed. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If
        the applicable prospectus supplement specifies a repayment date, the debt
        security will be repayable at the holder&#8217;s option on the specified repayment
        date at the specified repayment price, together with interest accrued to the
        repayment date. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">If we exercise an option to redeem
        any debt security, we will give to the holder written notice of the principal
        amount of the debt security to be redeemed, except as otherwise described
        in the applicable prospectus supplement, not less than 30 days nor more than
        60 days before the applicable redemption date. We will give the notice in
        the manner described below under &#8220;&#8212;Notices.&#8221; </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">If a debt security represented by a global debt
        security is subject to repayment at the holder&#8217;s option, the depositary
        or its nominee, as the holder, will be the only person that can exercise the
        right to repayment. Any indirect owners who own beneficial interests in the
        global debt security and wish to exercise a repayment right must give proper
        and timely instructions to their banks or brokers through which they hold
        their interests, requesting that they notify the depositary to exercise the
        repayment right on their behalf. Different firms have different deadlines
        for accepting instructions from their customers, and you should take care
        to act promptly enough to ensure that your request is given effect by the
        depositary before the applicable deadline for exercise. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Street name and other indirect owners should contact
        their banks or brokers for information about how to exercise a repayment right
        in a timely manner.<font style=\"font-style: normal;\"> </font></div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We or our affiliates may purchase debt securities
        from investors who are willing to sell from time-to-time, either in the open
        market at prevailing prices or in private transactions at negotiated prices.
        Debt securities that we or they purchase may, at our discretion, be held,
        resold or canceled. </div><div class=\"BRDSX_h2\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 20pt; margin-left: 0pt; text-align: left;\">Mergers and
        Similar Transactions </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We will generally
        be permitted to merge or consolidate with another entity. We will also be
        permitted to sell our assets substantially as an entirety to another entity.
        With regard to any series of debt securities, however, unless otherwise indicated
        in the applicable prospectus supplement, we will not be permitted to take
        any of these actions unless all the following conditions are met: </div><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">If the successor entity in the
        transaction is not us, the successor entity must be a corporation organized
        and existing under the laws of the United States, any state thereof or the
        District of Columbia, and must assume our obligations under the debt securities
        of that series and the indenture with respect to that series. </div></td></tr></table></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
