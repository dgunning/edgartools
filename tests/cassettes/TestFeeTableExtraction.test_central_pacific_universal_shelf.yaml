        to any security interest in the assets of that subsidiary and any indebtedness
        of that subsidiary senior to that held by us. Claims from creditors (other
        than us) on subsidiaries may include long-term and medium-term debt and substantial
        obligations related to deposit liabilities, federal funds purchased, securities
        sold under repurchase agreements and other short-term borrowings. </div><div
