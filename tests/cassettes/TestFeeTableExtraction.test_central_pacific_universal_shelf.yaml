        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">Whenever the
        Company shall have one or more Paying Agents for any series of Securities,
        it will, prior to each due date of the principal of or any premium or interest
        on any Securities of that series, deposit (or,\n            if the Company
        has deposited any trust funds with a trustee pursuant to Section 13.04(1),
        cause such trustee to deposit) with a Paying Agent a sum sufficient to pay
        such amount, such sum to be held as provided by the Trust Indenture Act, and\n
        \           (unless such Paying Agent is the Trustee) the Company will promptly
        notify the Trustee of its action or failure so to act.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The Company will cause each Paying
        Agent for any series of Securities other than the Trustee to execute and deliver
        to the Trustee an instrument in which such Paying Agent shall agree with the
        Trustee, subject to\n            the provisions of this Section, that such
        Paying Agent will (1) comply with the provisions of the Trust Indenture Act
        applicable to it as a Paying Agent and (2) during the continuance of any default
        by the Company (or any other obligor upon the\n            Securities of that
        series) in the making of any payment in respect of the Securities of that
        series, upon the written request of the Trustee, forthwith pay to the Trustee
        all sums held in trust by such Paying Agent for payment in respect of the\n
        \           Securities of that series.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The Company may at any time, for
        the purpose of obtaining the satisfaction and discharge of this Indenture
        or for any other purpose, pay, or by Company Order direct any Paying Agent
        to pay, to the Trustee all sums\n            held in trust by the Company
