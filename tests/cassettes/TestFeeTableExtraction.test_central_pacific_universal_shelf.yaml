        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to cure any ambiguity or correct
        any inconsistency in an indenture provided that the cure or correction does
        not adversely affect the holders of the debt securities of any series in any
        material respect; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">to supplement any of the provisions of an indenture to the extent
        necessary to permit or facilitate defeasance and discharge of any series of
        debt securities, provided that the supplement does not adversely affect the
        interests of the holders of the debt securities of any series in any material
        respect; </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">to make provisions
        with respect to the conversion or exchange terms and conditions applicable
        to the debt securities of any series; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">to add to, delete from or revise the conditions,
        limitations or restrictions on issue, authentication and delivery of debt
        securities; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">to conform any provision in an indenture to the requirements of the
        Trust Indenture Act; or </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">to make any change that does not adversely affect the legal rights
        under an indenture of any holder of debt securities of any series issued under
        that indenture. </div></td></tr></table><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 14.5pt; margin-left: 0pt; text-align: left;\">Changes of
        the Indentures Requiring Majority Approval </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Any
        other change to a particular indenture and the debt securities issued under
        that indenture will require the following approval: </div><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">If the change affects only the debt securities of
        a particular series, it must be approved by the holders of a majority in principal
        amount of the debt securities of that series. </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">If the change affects the debt
        securities of more than one series of debt securities issued under the applicable
        indenture, it must be approved by the holders of a majority in principal amount
        of each series affected by the change. </div></td></tr></table><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        same majority approval would be required for us to obtain a waiver of any
        of our covenants in either indenture. Our covenants include the promises we
        make about merging and similar transactions, which we describe above under
        &#8220;&#8212;Mergers and Similar Transactions.&#8221; If the requisite holders
        approve a waiver of a covenant, we will not have to comply with it. The holders,
        however, will not be permitted to approve a waiver of any provision in a particular
        debt security, or in the applicable indenture as it affects that debt security,
        that we cannot change without the approval of the holder of that debt security
        as described above under &#8220;&#8212;Changes of the Indentures Requiring
        Each Holder&#8217;s Approval,&#8221; unless that holder approves the waiver.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Book-entry and
        other indirect owners should consult their banks or brokers for information
        on how approval may be granted or denied if we seek to change an indenture
        or any debt securities or request a waiver.<font style=\"font-style: normal;\">
        </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        14.5pt; margin-left: 0pt; text-align: left;\">Special Rules for Action by
        Holders </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">When holders take any action under
        either debt indenture, such as giving a notice of default, declaring an acceleration,
        approving any change or waiver or giving the trustee an instruction, we will
        apply the following rules. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Only Outstanding Debt Securities Are Eligible</u><font style=\"font-style:
        normal;\">. Only holders of outstanding debt securities of the applicable
        series will be eligible to participate in any action by holders of debt securities
        of that series. Also, we will count only outstanding debt securities in determining
        whether the various percentage requirements for taking action have been met.
        For these purposes, a debt security will not be &#8220;outstanding&#8221;:
        </font></div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing:
        0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">if it has been surrendered for
        cancellation or cancelled; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">if we have deposited or set aside, in trust for its holder, money
        for its payment or redemption; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">if we have fully defeased it as described above
        under &#8220;&#8212;Defeasance and Covenant Defeasance&#8212;Full Defeasance;&#8221;
        </div></td></tr></table></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">27<br></div></div></div>\n<!--End
        Page 30-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 31-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg19\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6.75pt; margin-left: 20pt;\"><tr><td
        style=\"width: 20pt; text-align: left; vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">if it has been
        exchanged for other debt securities of the same series due to mutilation,
        destruction, loss or theft; or </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">if we or one of our affiliates is the owner, unless
        the debt security is pledged under certain circumstances described in the
        indenture. </div></td></tr></table><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Eligible Principal Amount of Some Debt Securities.</u><font style=\"font-style:
        normal;\"> In some situations, we may follow special rules in calculating
        the principal amount of a debt security that is to be treated as outstanding
        for the purposes described above. This may happen, for example, if the principal
        amount is payable in a non-U.S. dollar currency, increases over time or is
        not to be fixed until maturity. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">For any debt
        security of the kind described below, we will decide how much principal amount
        to attribute to the debt security as follows: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">For an original issue discount debt security, we will use the principal
        amount that would be due and payable on the action date if the maturity of
        the debt security were accelerated to that date because of a default; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">For a debt security whose principal
        amount is not determinable, we will use any amount that we indicate in the
        applicable prospectus supplement for that debt security. The principal amount
        of a debt security may not be determinable, for example, because it is based
        on an index that changes from time-to-time and the principal amount is not
        to be determined until a later date; or </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">For debt securities with a principal amount denominated
        in one or more non-U.S. dollar currencies or currency units, we will use the
        U.S. dollar equivalent, which we will determine. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\"><u>Determining Record Dates for
        Action by Holders.</u><font style=\"font-style: normal;\"> We will generally
        be entitled to set any day as a record date for the purpose of determining
        the holders that are entitled to take action under either indenture. In certain
        limited circumstances, only the trustee will be entitled to set a record date
        for action by holders. If we or the trustee set a record date for an approval
        or other action to be taken by holders, that vote or action may be taken only
        by persons or entities who are holders on the record date and must be taken
        during the period that we specify for this purpose, or that the trustee specifies
        if it sets the record date. We or the trustee, as applicable, may shorten
        or lengthen this period from time-to-time. This period, however, may not extend
        beyond the 180th&#160;day after the record date for the action. In addition,
        record dates for any global debt security may be set in accordance with procedures
        established by the depositary from time-to-time. Accordingly, record dates
        for global debt securities may differ from those for other debt securities.
        </font></div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\"><u>Form, Exchange
        and Transfer of Debt Securities.</u><font style=\"font-style: normal;\"> Unless
        we indicate otherwise in the applicable prospectus supplement, the debt securities
        will be issued: </font></div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">only in fully
        registered form; and </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">in denominations of $1,000 and integral multiples of $1,000. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Holders will be permitted to exchange their debt
        securities for debt securities of the same series in any authorized denominations,
        as long as the total principal amount is not changed. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Holders
        will be permitted to exchange or transfer their debt securities at the office
        of the trustee. They will also be permitted to replace lost, stolen, destroyed
        or mutilated debt securities at that office. We anticipate appointing the
        trustee to act as our agent for registering debt securities in the names of
        holders and transferring and replacing debt securities. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Holders
        will not be required to pay a service charge to transfer or exchange their
        debt securities, but they may be required to pay for any tax or other governmental
        charge associated with the registration, exchange or transfer. The transfer
        or exchange, and any replacement, will be made only if our transfer agent
        is satisfied with the holder&#8217;s proof of legal ownership. The transfer
        agent may require an indemnity before replacing any debt securities. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">If a debt security is issued as a global debt security,
        only the depositary&#8212;e.g., DTC, Euroclear Bank S.A./N.V., as operator
        of the Euroclear system (&#8220;Euroclear&#8221;) and Clearstream Banking
        S.A. (&#8220;Clearstream&#8221;)&#8212;will be entitled to transfer and exchange
        the debt security as described in this subsection, since the depositary will
        be the sole holder of the debt security. </div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">28<br></div></div></div>\n<!--End
        Page 31-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 32-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg20\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The rules
        for exchange described above apply to exchange of debt securities for other
        debt securities of the same series and kind. If a debt security is convertible
        into or exchangeable for our common stock or preferred stock, the rules governing
        that type of exchange will be described in the applicable prospectus supplement.
        </div><div class=\"BRDSX_h4\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        16pt; margin-left: 20pt; text-align: left;\"><u>Payment Mechanics for Debt
        Securities.</u> </div><div class=\"BRDSX_h3\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; font-weight:
        bold; margin-top: 15pt; margin-left: 20pt; text-align: left;\">Who Receives
        Payment? </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">If interest is due on a debt security
        on an interest payment date, we will pay the interest to the person in whose
        name the debt security is registered at the close of business on the regular
        record date relating to the interest payment date as described below under
        &#8220;&#8212;Payment and Record Dates for Interest.&#8221; If interest is
        due at maturity but on a day that is not an interest payment date, we will
        pay the interest to the person entitled to receive the principal of the debt
        security. If principal or another amount besides interest is due on a debt
        security at maturity, we will pay the amount to the holder of the debt security
        against surrender of the debt security at a proper place of payment or, in
        the case of a global debt security, in accordance with the applicable policies
        of the depositary, DTC, Euroclear or Clearstream, as applicable. </div><div
        class=\"BRDSX_h3\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; font-weight: bold; margin-top:
        16.5pt; margin-left: 20pt; text-align: left;\">Payment and Record Dates for
        Interest </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The dates on which interest will
        be payable will be specified in the applicable prospectus supplement. The
        regular record date relating to an interest payment date for any fixed-rate
        debt security or floating-rate debt security will be on or about the 15th
        calendar day before that interest payment date. These record dates will apply
        regardless of whether a particular record date is a &#8220;business day,&#8221;
        as defined below. For the purpose of determining the holder at the close of
        business on a regular record date when business is not being conducted, the
        close of business will mean 5:00 P.M., New York City time, on that day. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Business Day.<font style=\"font-style:
        normal;\"> The term &#8220;business day&#8221; will mean, with respect to
        the debt securities of a series, a Monday, Tuesday, Wednesday, Thursday or
        Friday that is not a day on which banking institutions in the place of payment
        for the debt securities of that series are authorized or obligated by law
        or executive order to close and that satisfies any other criteria specified
        in the applicable prospectus supplement. </font></div><div class=\"BRDSX_h3\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; font-weight: bold; margin-top: 16.5pt; margin-left:
        20pt; text-align: left;\">How We Will Make Payments Due in U.S. Dollars </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We will follow the practice described in this subsection
        when paying amounts due in U.S. dollars. Payments of amounts due in other
        currencies will be made as described in the next subsection. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Payments on Global Debt Securities.<font style=\"font-style:
        normal;\"> We will make payments on a global debt security in accordance with
        the applicable policies of the depositary as in effect from time-to-time.
        Under those policies, we will make payments directly to the depositary, or
        its nominee, and not to any indirect owners who own beneficial interests in
        the global debt security. An indirect owner&#8217;s right to receive those
        payments will be governed by the rules and practices of the depositary and
        its participants, as described below in the section entitled &#8220;Legal
        Ownership and Book-Entry Issuance&#8212;What Is a Global Security?&#8221;
        </font></div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Payments on
        Non-Global Debt Securities.<font style=\"font-style: normal;\"> We will make
        payments on a debt security in non-global, registered form as follows. We
        will pay interest that is due on an interest payment date by check mailed
        on the interest payment date to the holder at his or her address shown on
        the trustee&#8217;s records as of the close of business on the regular record
        date. We will make all other payments by check to the paying agent described
        below, against surrender of the debt security. All payments by check will
        be made in next-day funds&#8212;i.e., funds that become available on the day
        after the check is cashed. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Alternatively,
        if a non-global debt security has a face amount of at least $1,000,000 and
        the holder asks us to do so, we will pay any amount that becomes due on the
        debt security by wire transfer of immediately available funds to an account
        at a bank in New York City, on the due date. To request a wire payment, the
        holder will be required to give the paying agent appropriate wire transfer
        instructions at least five business days before the requested wire payment
        is due. In the case of any interest payment due on an interest payment date,
        the instructions will be required to be given by the person or entity who
        is the holder on the relevant regular record date. In the case of any other
        payment, payment will be made only after the debt security is surrendered
        to the paying agent. Any wire instructions, once properly given, will remain
        in effect unless and until new instructions are given in the manner described
        above. </div></div></div><div class=\"BRDSX_block-frill\" style=\"width: 468pt;
        margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        9.47pt; text-align: center;\">29<br></div></div></div>\n<!--End Page 32-->\n<div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after: always;\"><hr
        noshade=\"noshade\" style=\"border-width: 0px; clear: both; margin: 4px auto;
        width: 612pt; height: 2px; color: #000000; background-color: #000000;\"></div></div>\n<!--Begin
        Page 33-->\n<div class=\"BRDSX_page\" style=\"text-align: left; margin: auto;
        line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg21\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6.75pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Book-entry and other indirect owners should consult their banks or
        brokers for information on how they will receive payments on their debt securities.<font
        style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_h3\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; font-weight: bold; margin-top: 12pt; margin-left: 20pt; text-align:
        left;\">How We Will Make Payments Due in Other Currencies </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We
        will follow the practice described in this subsection when paying amounts
        that are due in a specified currency other than U.S. dollars. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Payments on Global Debt Securities.<font style=\"font-style:
        normal;\"> We will make payments on a global debt security in accordance with
        the applicable policies as in effect from time-to-time of the depositary,
        which will be DTC, Euroclear or Clearstream. Unless we specify otherwise in
        the applicable prospectus supplement, DTC will be the depositary for all debt
        securities in global form. We understand that DTC&#8217;s policies, as currently
        in effect, are as follows. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Unless otherwise
        indicated in the applicable prospectus supplement, if you are an indirect
        owner of global debt securities denominated in a specified currency other
        than U.S. dollars and if you have the right to elect to receive payments in
        that other currency and do so elect, you will be required to notify the participant
        through which your interest in the global debt security is held of your election:
        </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing:
        0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">on or before the applicable regular
        record date, in the case of a payment of interest; or </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">on or before the 16th day before
        the stated maturity, or any redemption or repayment date, in the case of payment
        of principal or any premium. </div></td></tr></table><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Your
        participant will be required, in turn, to notify DTC of your election on or
        before the third DTC business day after that regular record date, in the case
        of a payment of interest, and on or before the 12th DTC business day prior
        to the stated maturity, or on the redemption or repayment date if your debt
        security is redeemed or repaid earlier, in the case of a payment of principal
        or any premium. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 8pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">DTC, in turn, will notify the
        paying agent of your election in accordance with DTC&#8217;s procedures. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">If complete instructions are received by the participant
        and forwarded by the participant to DTC, and by DTC to the paying agent, on
        or before the dates noted above, the paying agent, in accordance with DTC&#8217;s
        instructions, will make the payments to you or your participant by wire transfer
        of immediately available funds to an account maintained by the payee with
        a bank located in the country issuing the specified currency or in another
        jurisdiction acceptable to us and the paying agent. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If
        the foregoing steps are not properly completed, we expect DTC to inform the
        paying agent that payment is to be made in U. S. dollars. In that case, we
        or our agent will convert the payment to U.S. dollars in the manner described
        below under &#8220;&#8212;Conversion to U.S. Dollars.&#8221; We expect that
        we or our agent will then make the payment in U.S. dollars to DTC, and that
        DTC in turn will pass it along to its participants. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Indirect owners of a global debt security denominated
        in a currency other than U.S. dollars should consult their banks or brokers
        for information on how to request payment in the specified currency.<font
        style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Payments on Non-Global Debt Securities.<font style=\"font-style: normal;\">
        Except as described in the last paragraph under this heading, we will make
        payments on debt securities in non-global form in the applicable specified
        currency. We will make these payments by wire transfer of immediately available
        funds to any account that is maintained in the applicable specified currency
        at a bank designated by the holder and which is acceptable to us and the trustee.
        To designate an account for wire payment, the holder will be required to give
        the paying agent appropriate wire instructions at least five business days
        before the requested wire payment is due. In the case of any interest payment
        due on an interest payment date, the instructions will be required to be given
        by the person or entity who is the holder on the regular record date. In the
        case of any other payment, the payment will be made only after the debt security
        is surrendered to the paying agent. Any instructions, once properly given,
        will remain in effect unless and until new instructions are properly given
        in the manner described above. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If a holder
        fails to give instructions as described above, we will be required to notify
        the holder at the address in the trustee&#8217;s records and will make the
        payment within five business days after the holder provides appropriate instructions.
        Any late payment made in these circumstances will be treated under the applicable
        indenture as if made on the due date, and no interest will accrue on the late
        payment from the due date to the date paid. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Although
        a payment on a debt security in non-global form may be due in a specified
        currency other than U.S. dollars, we will make the payment in U.S. dollars
        if the holder asks us to do so. To request U.S. dollar </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">30<br></div></div></div>\n<!--End Page 33-->\n<div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\"
        style=\"page-break-after: always;\"><hr noshade=\"noshade\" style=\"border-width:
        0px; clear: both; margin: 4px auto; width: 612pt; height: 2px; color: #000000;
        background-color: #000000;\"></div></div>\n<!--Begin Page 34-->\n<div class=\"BRDSX_page\"
        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_110-description_pg22\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">payment, the holder will be
        required to provide appropriate written notice to the trustee at least five
        business days before the next due date for which payment in U.S. dollars is
        requested. In the case of any interest payment due on an interest payment
        date, the request will be required to be made by the person or entity who
        is the holder on the regular record date. Any request, once properly made,
        will remain in effect unless and until revoked by notice properly given in
        the manner described above. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Book-entry and other indirect owners of a debt security with a specified
        currency other than U.S. dollars should contact their banks or brokers for
        information about how to receive payments in the specified currency or in
        U.S. dollars.<font style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Conversion to U.S. Dollars.<font style=\"font-style:
        normal;\"> When we are asked by a holder to make payments in U.S. dollars
        of an amount due in another currency, either on a global debt security or
        a non-global debt security as described above, the exchange rate agent described
        below will calculate the U.S. dollar amount the holder receives in the exchange
        rate agent&#8217;s discretion. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">A holder that
        requests payment in U.S. dollars will bear all associated currency exchange
        costs, which will be deducted from the payment. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">When the Specified Currency is Not Available.<font
        style=\"font-style: normal;\"> If we are obligated to make any payment in
        a specified currency other than U.S. dollars and the specified currency or
        any successor currency is not available to us due to circumstances beyond
        our control&#8212;such as the imposition of exchange controls or a disruption
        in the currency markets&#8212;we will be entitled to satisfy our obligation
        to make the payment in that specified currency by making the payment in U.S.
        dollars, on the basis of the exchange rate determined by the exchange rate
        agent described below, in its discretion. </font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        foregoing will apply to any debt security, whether in global or non-global
        form, and to any payment, including a payment at maturity. Any payment made
        under the circumstances and in a manner described above will not result in
        a default under any debt security or the applicable indenture. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Exchange Rate Agent.<font style=\"font-style:
        normal;\"> If we issue a debt security in a specified currency other than
        U. S. dollars, we will appoint a financial institution to act as the exchange
        rate agent and will name the institution initially appointed when the debt
        security is originally issued in the applicable prospectus supplement. We
        may change the exchange rate agent from time-to-time after the original issue
        date of the debt security without your consent and without notifying you of
        the change. </font></div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">All determinations
        made by the exchange rate agent will be in its sole discretion unless we state
        in the applicable prospectus supplement that any determination requires our
        approval. In the absence of manifest error, those determinations will be conclusive
        for all purposes and binding on you and us, without any liability on the part
        of the exchange rate agent. </div><div class=\"BRDSX_h3\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; font-weight: bold; margin-top: 12pt; margin-left: 20pt; text-align:
        left;\">Payment When Offices Are Closed </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If any payment
        is due on a debt security on a day that is not a business day, we will make
        the payment on the next day that is a business day. Payments postponed to
        the next business day in this situation will be treated under the applicable
        indenture as if they were made on the original due date. Postponement of this
        kind will not result in a default under any debt security or the applicable
        indenture, and no interest will accrue on the postponed amount from the original
        due date to the next day that is a business day. The term business day has
        a special meaning, which we describe above under &#8220;&#8212;Payment and
        Record Dates for Interest.&#8221; </div><div class=\"BRDSX_h3\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; font-weight: bold; margin-top: 12pt; margin-left: 20pt; text-align:
        left;\">Paying Agent </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We may appoint
        one or more financial institutions to act as our paying agents, at whose designated
        offices debt securities in non-global entry form may be surrendered for payment
        at their maturity. We call each of those offices a paying agent. We may add,
        replace or terminate paying agents from time-to-time. We may also choose to
        act as our own paying agent. Initially, we anticipate appointing the trustee,
        at its corporate trust office in New&#160;York City, as the paying agent.
        We must notify the trustee of changes in the paying agents. </div><div class=\"BRDSX_h3\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; font-weight: bold; margin-top: 12pt; margin-left:
        20pt; text-align: left;\">Unclaimed Payments </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Regardless
        of who acts as paying agent, all money paid by us to a paying agent that remains
        unclaimed at the end of two years after the amount is due to a holder will
        be repaid to us. After that two-year period, the holder may look only to us
        for payment and not to the trustee, any other paying agent or anyone else.
        </div></div></div><div class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top:
        12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        9.47pt; text-align: center;\">31<br></div></div></div>\n<!--End Page 34-->\n<div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after: always;\"><hr
        noshade=\"noshade\" style=\"border-width: 0px; clear: both; margin: 4px auto;
