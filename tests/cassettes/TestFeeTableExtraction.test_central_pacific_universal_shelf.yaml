        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        may, in the circumstances permitted by the Trust Indenture Act, set any day
        as a record date for the purpose of determining the Holders of Outstanding
        Securities of any series entitled to give, make or take\n        any request,
        demand, authorization, direction, notice, consent, waiver or other action
