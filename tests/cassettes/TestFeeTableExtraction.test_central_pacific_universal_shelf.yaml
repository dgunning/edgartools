        \       <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \   </div>\n    <table style=\"font-family: 'Times New Roman'; font-size:
        10pt; width: 100%; text-align: left; color: #000000;\" class=\"DSPFListTable\"
        id=\"za061d40915de447f8e4b506b6f3c579a\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \       <tr>\n          <td style=\"width: 18pt;\">&#160;</td>\n          <td
        style=\"width: 18pt; vertical-align: top;\">(4)</td>\n          <td style=\"width:
        auto; vertical-align: top;\">\n            <div>Units may be issued under
        a unit agreement and will represent an interest in one or more securities
        registered under this registration statement including common stock, preferred
        stock, depositary shares, debt securities, rights, purchase\n              contracts
        or warrants, in any combination, which may or may not be separable from one
        another.</div>\n          </td>\n        </tr>\n\n    </table>\n    <div>
        <br>\n    </div>\n    <table style=\"font-family: 'Times New Roman'; font-size:
        10pt; width: 100%; text-align: left; color: #000000;\" class=\"DSPFListTable\"
        id=\"z9109c08462494bcc98a332ede6cf8f8e\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \       <tr>\n          <td style=\"width: 18pt;\">&#160;</td>\n          <td
        style=\"width: 18pt; vertical-align: top;\">(5)</td>\n          <td style=\"width:
        auto; vertical-align: top;\">\n            <div>Warrants may be issued under
        a warrant agreement and will represent an interest in one or more securities
        registered under this registration statement, including common stock, preferred
        stock, depositary shares, debt securities, rights,\n              purchase
        contracts or units, or any combination thereof, which may or may not separate
        from one another.</div>\n          </td>\n        </tr>\n\n    </table>\n
        \   <div> <br>\n    </div>\n    <table style=\"font-family: 'Times New Roman';
        font-size: 10pt; width: 100%; text-align: left; color: #000000;\" class=\"DSPFListTable\"
        id=\"zb600dfb3d9074b8ebd97784cd0429ab4\" cellpadding=\"0\" cellspacing=\"0\">\n\n
        \       <tr>\n          <td style=\"width: 18pt;\">&#160;</td>\n          <td
        style=\"width: 18pt; vertical-align: top;\">(6)</td>\n          <td style=\"width:
        auto; vertical-align: top;\">\n            <div>The proposed maximum offering
        price per security will be determined from time to time by the registrant
        in connection with the issuance by the registrant of the securities registered
        hereunder and is not specified as to each class of\n              security
        pursuant to General Instruction II.D. of Form S-3 under the Securities Act.
        Separate consideration may or may not be received for securities that are
        issuable on exercise, conversion or exchange of other securities, or that
        are\n              issued in units.</div>\n          </td>\n        </tr>\n\n
