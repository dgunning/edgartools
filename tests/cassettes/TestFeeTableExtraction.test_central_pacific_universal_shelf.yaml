        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_110-description_pg29\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Before exercising
        their warrants, holders of warrants will not have any of the rights of holders
        of the securities purchasable upon such exercise, including the right to receive
        dividends, if any, or payments upon our liquidation, dissolution or winding
        up or to exercise voting rights, if any. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Upon receipt
        of the required payment and the warrant certificate properly completed and
        duly executed at the corporate trust office of the warrant agent or any other
        office indicated in the applicable prospectus supplement, we will issue and
        deliver the securities purchasable upon such exercise. If fewer than all of
        the warrants represented by the warrant certificate are exercised, then we
        will issue a new warrant certificate for the remaining amount of warrants.
        </div></div></div><div class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top:
        12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        9.47pt; text-align: center;\">38<br></div></div></div>\n<!--End Page 41-->\n<div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after: always;\"><hr
        noshade=\"noshade\" style=\"border-width: 0px; clear: both; margin: 4px auto;
        width: 612pt; height: 2px; color: #000000; background-color: #000000;\"></div></div>\n<!--Begin
        Page 42-->\n<div class=\"BRDSX_page\" style=\"text-align: left; margin: auto;
        line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_111-ownership_pg1\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h1\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tLOA\"><!--Anchor--></a>LEGAL
        OWNERSHIP AND BOOK-ENTRY ISSUANCE </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">In this section,
        we describe special considerations that will apply to registered securities
        issued in global&#8212;i.e., book-entry&#8212;form. First we describe the
        difference between legal ownership and indirect ownership of registered securities.
        Then we describe special provisions that apply to global securities. </div><div
        class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-weight: bold; margin-top: 20pt; margin-left:
        0pt; text-align: left;\">Who Is the Legal Owner of a Registered Security?
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">Each share of common stock, share of
        preferred stock, depositary share, debt security, purchase contract, right,
        unit and warrant in registered form will be represented either by a certificate
        issued in definitive form to a particular investor or by one or more global
        securities representing the entire issuance of securities. We refer to those
        who have securities registered in their own names, on the books that we or
        the trustee, warrant agent or other agent maintain for this purpose, as the
        &#8220;holders&#8221; of those securities. These persons will be the legal
        holders of the securities. We refer to those who, indirectly through others,
        own beneficial interests in securities that are not registered in their own
        names as indirect owners of those securities. As we discuss below, indirect
        owners will not be legal holders, and investors in securities issued in book-entry
        form or in street name will be indirect owners. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\"><u>Book-Entry Owners.</u><font style=\"font-style:
        normal;\"> We will issue each security in book-entry form only, unless we
        specify otherwise in the applicable prospectus supplement. This means securities
        will be represented by one or more global securities registered in the name
        of a financial institution that holds them as depositary on behalf of other
        financial institutions that participate in the depositary&#8217;s book-entry
        system. These participating institutions, in turn, hold beneficial interests
        in the securities on behalf of themselves or their customers. </font></div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Under each indenture, only the person in whose name
        a security is registered will be recognized as the holder of that security.
        Consequently, for securities issued in global form, we will recognize only
        the depositary as the holder of the securities and we will make all payments
        on the securities, including deliveries of any property other than cash, to
        the depositary. The depositary passes along the payments it receives to its
        participants, which in turn pass the payments along to their customers who
        are the beneficial owners. The depositary and its participants do so under
        agreements they have made with one another or with their customers; they are
        not obligated to do so under the terms of the securities. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">As
        a result, investors will not own securities directly. Instead, they will own
        beneficial interests in a global security, through a bank, broker or other
        financial institution that participates in the depositary&#8217;s book-entry
        system or holds an interest through a participant. As long as the securities
        are issued in global form, investors will be indirect owners, and not holders,
        of the securities. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Street Name Owners</u><font style=\"font-style: normal;\"><u>.</u>
        In the future we may terminate a global security or issue securities initially
        in non-global form. In these cases, investors may choose to hold their securities
        in their own names or in street name. Securities held by an investor in street
        name would be registered in the name of a bank, broker or other financial
        institution that the investor chooses, and the investor would hold only a
        beneficial interest in those securities through an account he or she maintains
        at that institution. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">For securities
        held in street name, we will recognize only the intermediary banks, brokers
        and other financial institutions in whose names the securities are registered
        as the holders of those securities and we will make all payments on those
        securities, including deliveries of any property other than cash, to them.
        These institutions pass along the payments they receive to their customers
        who are the beneficial owners but only because they agree to do so in their
        customer agreements or because they are legally required to do so. Investors
        who hold securities in street name will be indirect owners, not holders, of
        those securities. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Legal Holders</u><font style=\"font-style: normal;\"><u>.</u> Our
        obligations, as well as the obligations of the trustee under any indenture
        and the obligations, if any, of any warrant agents, right agents and unit
        agents and any other third parties employed by us, the trustee or any of those
        agents, run only to the holders of the securities. We have no obligations
        to investors who hold beneficial interests in global securities, in street
        name or by any other indirect means. This will be the case whether an investor
        chooses to be an indirect owner of a security or has no choice because we
        are issuing the securities only in global form. </font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">For
        example, once we make a payment or give a notice to the holder, we have no
        further responsibility for that payment or notice even if that holder is required,
        under agreements with depositary participants or customers or by law, to pass
        it along to the indirect owners but does not do so. </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
