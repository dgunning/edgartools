        background-color: #000000;\"></div></div>\n<!--Begin Page 43-->\n<div class=\"BRDSX_page\"
        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_111-ownership_pg2\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Similarly,
        if we want to obtain the approval of the holders for any purpose&#8212;e.g.,
        to amend the indenture for a series of debt securities or warrants or the
        warrant agreement for a series of warrants or to relieve us of the consequences
        of a default or of our obligation to comply with a particular provision of
        an indenture&#8212;we would seek the approval only from the holders, and not
        the indirect owners, of the relevant securities. Whether and how the holders
        contact the indirect owners is up to the holders. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">When
        we refer to &#8220;you&#8221; in this prospectus, we mean those who invest
        in the securities being offered by this prospectus, whether they are the holders
        or only indirect owners of those securities. When we refer to &#8220;your
        securities&#8221; in this prospectus, we mean the securities in which you
        will hold a direct or indirect interest. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Special Considerations for Indirect Owners</u><font style=\"font-style:
        normal;\"><u>.</u> If you hold securities through a bank, broker or other
        financial institution, either in book-entry form or in street name, you should
        check with your own institution to find out: </font></div><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">how it handles securities payments and notices;
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">whether it
        imposes fees or charges; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">whether and how you can instruct it to exercise any rights to purchase
        or sell warrant property under a warrant contract or to exchange or convert
        a security for or into other property; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">how it would handle a request for the holders&#8217;
        consent, if ever required; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">whether and how you can instruct it to send you securities registered
        in your own name so you can be a holder, if that is permitted in the future;
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">how it would
        exercise rights under the securities if there were a default or other event
        triggering the need for holders to act to protect their interests; and </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">if the securities are in book-entry
        form, how the depositary&#8217;s rules and procedures will affect these matters.
        </div></td></tr></table><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>What Is a Global Security?</u><font style=\"font-style: normal;\">
        We will issue each security in book-entry form only, unless we specify otherwise
        in the applicable prospectus supplement. Each security issued in book-entry
        form will be represented by a global security that we deposit with and register
        in the name of one or more financial institutions or clearing systems, or
        their nominees, which we select. A financial institution or clearing system
        that we select for any security for this purpose is called the &#8220;depositary&#8221;
        for that security. A security will usually have only one depositary but it
        may have more depositaries. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        8.5pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Each series
        of securities will have one or more of the following as the depositaries:
        </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing:
        0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">DTC; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">a financial institution holding
        the securities on behalf of Euroclear; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">a financial institution holding the securities on
        behalf of Clearstream; and </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">any other clearing system or financial institution named in the applicable
        prospectus supplement. </div></td></tr></table><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The depositaries
        named above may also be participants in one another&#8217;s systems. Thus,
        for example, if DTC is the depositary for a global security, investors may
        hold beneficial interests in that security through Euroclear or Clearstream,
        as DTC participants. The depositary or depositaries for your securities will
        be named in the prospectus supplement; if none is named, the depositary will
        be DTC. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">A global security may represent
        one or any other number of individual securities. Generally, all securities
        represented by the same global security will have the same terms. We may,
        however, issue a global security that represents multiple securities of the
        same kind, such as debt securities, that have different terms and are issued
        at different times. We call this kind of global security a master global security.
        The applicable prospectus supplement will not indicate whether your securities
        are represented by a master global security. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">A
        global security may not be transferred to or registered in the name of anyone
        other than the depositary or its nominee, unless special termination situations
        arise. We describe those situations below under &#8220;&#8212;Holder&#8217;s
        Option to Obtain a Non-Global Security; Special Situations When a Global Security
        Will Be Terminated.&#8221; As a result of these arrangements, the depositary,
        or its nominee, will be the sole registered owner and holder of all securities
        represented by a global security, and investors will be permitted to own only
        indirect interests in a </div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">40<br></div></div></div>\n<!--End
        Page 43-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 44-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_111-ownership_pg3\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">global security. Indirect interests
        must be held by means of an account with a broker, bank or other financial
        institution that in turn has an account with the depositary or with another
        institution that does. Thus, an investor whose security is represented by
        a global security will not be a holder of the security, but only an indirect
        owner of an interest in the global security. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If
        the applicable prospectus supplement for a particular security indicates that
        the security will be issued in global form only, then the security will be
        represented by a global security at all times unless and until the global
        security is terminated. We describe the situations in which this can occur
        below under &#8220;&#8212;Holder&#8217;s Option to Obtain a Non-Global Security;
        Special Situations When a Global Security Will Be Terminated.&#8221; If termination
        occurs, we may issue the securities through another book-entry clearing system
        or decide that the securities may no longer be held through any book-entry
        clearing system. </div><div class=\"BRDSX_h3\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; font-weight:
        bold; margin-top: 20.5pt; margin-left: 20pt; text-align: left;\">Special Considerations
        for Global Securities </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">As an indirect
        owner, an investor&#8217;s rights relating to a global security will be governed
        by the account rules of the depositary and those of the investor&#8217;s financial
        institution or other intermediary through which it holds its interest (e.g.,
        Euroclear or Clearstream, if DTC is the depositary), as well as general laws
        relating to securities transfers. We do not recognize this type of investor
        or any intermediary as a holder of securities and instead deal only with the
        depositary that holds the global security. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 8.5pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">If securities are issued only in the form of a global security, an
        investor should be aware of the following: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">An investor cannot cause the securities to be registered in his or
        her own name and cannot obtain non-global certificates for his or her interest
        in the securities, except in the special situations we describe below; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">An investor will be an indirect
        holder and must look to his or her own bank or broker for payments on the
        securities and protection of his or her legal rights relating to the securities,
        as we describe above under &#8220;&#8212;Who Is the Legal Owner of a Registered
        Security?&#8221;; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">An investor may not be able to sell interests in the securities to
        some insurance companies and other institutions that are required by law to
        own their securities in non-book-entry form; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">An investor may not be able to
        pledge his or her interest in a global security in circumstances where certificates
        representing the securities must be delivered to the lender or other beneficiary
        of the pledge in order for the pledge to be effective; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">The depositary&#8217;s policies
        will govern payments, deliveries, transfers, exchanges, notices and other
        matters relating to an investor&#8217;s interest in a global security, and
        those policies may change from time-to-time. We, any trustee and any warrant
        agents and unit agents will have no responsibility for any aspect of the depositary&#8217;s
        policies, actions or records of ownership interests in a global security.
        We, any trustee and any warrant agents, rights agents and unit agents also
        do not supervise the depositary in any way; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">The depositary will require that
        those who purchase and sell interests in a global security within its book-entry
        system use immediately available funds and your broker or bank may require
        you to do so as well; and </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">Financial institutions that participate in the depositary&#8217;s
        book-entry system and through which an investor holds its interest in the
        global securities, directly or indirectly, may also have their own policies
        affecting payments, deliveries, transfers, exchanges, notices and other matters
        relating to the securities, and those policies may change from time-to-time.
        For example, if you hold an interest in a global security through Euroclear
        or Clearstream, when DTC is the depositary, Euroclear or Clearstream, as applicable,
        will require those who purchase and sell interests in that security through
        them to use immediately available funds and comply with other policies and
        procedures, including deadlines for giving instructions as to transactions
        that are to be effected on a particular day. There may be more than one financial
        intermediary in the chain of ownership for an investor. We do not monitor
        and are not responsible for the policies or actions or records of ownership
        interests of any of those intermediaries. </div></td></tr></table></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">41<br></div></div></div>\n<!--End Page 44-->\n<div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\"
        style=\"page-break-after: always;\"><hr noshade=\"noshade\" style=\"border-width:
        0px; clear: both; margin: 4px auto; width: 612pt; height: 2px; color: #000000;
        background-color: #000000;\"></div></div>\n<!--Begin Page 45-->\n<div class=\"BRDSX_page\"
        style=\"text-align: left; margin: auto; line-height: initial; width: 468pt;\"><a
        name=\"ny20051086x1_s3_111-ownership_pg4\"><!--Anchor--></a><p style=\"text-align:
        left; font-family: 'Times New Roman', Times, Serif; font-size: 8pt; font-variant:
        normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h3\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; font-weight: bold; margin-top: 6.75pt; margin-left: 20pt; text-align:
        left;\">Holder&#8217;s Option to Obtain a Non-Global Security; Special Situations
        When a Global Security Will Be Terminated </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">If
        we issue any series of securities in book-entry form but we choose to give
        the beneficial owners of that series the right to obtain non-global securities,
        any beneficial owner entitled to obtain non-global securities may do so by
        following the applicable procedures of the depositary, any transfer agent
        or registrar for that series and that owner&#8217;s bank, broker or other
        financial institution through which that owner holds its beneficial interest
        in the securities. For example, in the case of a global security representing
        preferred stock or depositary shares, a beneficial owner will be entitled
        to obtain a non-global security representing its interest by making a written
        request to the transfer agent or other agent designated by us. If you are
        entitled to request a non-global certificate and wish to do so, you will need
        to allow sufficient lead time to enable us or our agent to prepare the requested
        certificate. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">In addition, in a few special
        situations described below, a global security will be terminated and interests
        in it will be exchanged for certificates in non-global form representing the
        securities it represented. After that exchange, the choice of whether to hold
        the securities directly or in street name will be up to the investor. Investors
        must consult their own banks or brokers to find out how to have their interests
        in a global security transferred on termination to their own names, so that
        they will be holders. We have described the rights of holders and street name
        investors above under &#8220;&#8212;Who Is the Legal Owner of a Registered
        Security?&#8221; </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 8pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The special situations for termination
        of a global security are as follows: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">if the depositary notifies us that it is unwilling, unable or no longer
        qualified to continue as depositary for that global security and we do not
        appoint another institution to act as depositary within 60 days; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">if we notify the trustee, warrant
        agent or unit agent, as applicable, that we wish to terminate that global
        security; or </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">in the case of a global security representing debt securities or warrants
        issued under an indenture, if an event of default has occurred with regard
        to these debt securities and has not been cured or waived. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">If a global security is terminated, only the depositary,
        and not we, the trustee for any debt securities or the warrant agent for any
        warrants, rights agents for any rights or the unit agent for any units, is
        responsible for deciding the names of the institutions in whose names the
        securities represented by the global security will be registered and, therefore,
        who will be the holders of those securities. </div><div class=\"BRDSX_h3\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; font-weight: bold; margin-top: 12pt; margin-left:
        20pt; text-align: left;\">Considerations Relating to Euroclear and Clearstream
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">Euroclear and Clearstream are securities
        clearance systems in Europe. Both systems clear and settle securities transactions
        between their participants through electronic, book-entry delivery of securities
        against payment. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Euroclear and Clearstream may
        be depositaries for a global security. In addition, if DTC is the depositary
        for a global security, Euroclear and Clearstream may hold interests in the
        global security as participants in DTC. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">As long as any
        global security is held by Euroclear or Clearstream, as depositary, you may
        hold an interest in the global security only through an organization that
        participates, directly or indirectly, in Euroclear or Clearstream. If Euroclear
        or Clearstream is the depositary for a global security and there is no depositary
        in the United States, you will not be able to hold interests in that global
        security through any securities clearance system in the United States. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Payments, deliveries, transfers, exchanges, notices
        and other matters relating to the securities made through Euroclear or Clearstream
        must comply with the rules and procedures of those systems. Those systems
        could change their rules and procedures at any time. We do not have control
        over those systems or their participants, and we do not take responsibility
        for their activities. Transactions between participants in Euroclear or Clearstream,
        on one hand, and participants in DTC, on the other hand, when DTC is the depositary,
        would also be subject to DTC&#8217;s rules and procedures. </div><div class=\"BRDSX_h3\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; font-weight: bold; margin-top: 12pt; margin-left:
        20pt; text-align: left;\">Special Timing Considerations for Transactions in
        Euroclear and Clearstream </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Investors will
        be able to make and receive through Euroclear and Clearstream payments, deliveries,
        transfers, exchanges, notices and other transactions involving any securities
        held through those clearing systems only on days when those systems are open
        for business. Those clearing systems may not be open for business on days
        when banks, brokers and other institutions are open for business in the United
        States. </div></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">42<br></div></div></div>\n<!--End
        Page 45-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 46-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_111-ownership_pg5\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">In addition,
        because of time-zone differences, U.S. investors who hold their interests
        in the securities through these clearing systems and wish to transfer their
        interests, or to receive or make a payment or delivery or exercise any other
        right with respect to their interests, on a particular day may find that the
        transaction will not be effected until the next business day in Luxembourg
        or Brussels, as applicable. Thus, investors who wish to exercise rights that
        expire on a particular day may need to act before the expiration date. In
        addition, investors who hold their interests through both DTC and Euroclear
        or Clearstream may need to make special arrangements to finance any purchases
        or sales of their interests between the U.S. and European clearing systems,
        and those transactions may settle later than would be the case for transactions
        within one clearing system. </div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">43<br></div></div></div>\n<!--End
