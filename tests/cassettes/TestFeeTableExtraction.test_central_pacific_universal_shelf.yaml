        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">Any request, demand,
        authorization, direction, notice, consent, waiver or other Act of the Holder
        of any Security shall bind every future Holder of the same Security and the
        Holder of every Security issued upon the\n        registration of transfer
        thereof or in exchange therefor or in lieu thereof in respect of anything
