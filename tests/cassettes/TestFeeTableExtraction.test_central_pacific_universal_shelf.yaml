        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We may also guarantee some obligations of our subsidiaries.
        Any liability we may have for our subsidiaries&#8217; obligations could reduce
        our assets that are available to satisfy our direct creditors, including investors
        in our debt securities. </div><div class=\"BRDSX_h2\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 14.5pt; margin-left: 0pt; text-align: left;\">This Section&#160;Is
        Only a Summary </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">The indentures and any associated
        documents, including your debt security, will contain the full legal text
        of the matters described in this section and the prospectus supplement. Forms
        of the indentures are filed with the SEC as exhibits to the registration statement
        on Form&#160;S-3 of which this prospectus forms a part. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">This
        section and the applicable prospectus supplement summarize the material terms
        of the indentures and your debt security. They do not, however, describe every
        aspect of the indentures and your debt security. For example, in this section
        and the applicable prospectus supplement, we use terms that have been given
        special meaning in the indentures, but we describe the meaning for only the
        more important of those terms. </div><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 14.5pt; margin-left: 0pt; text-align: left;\">Governing
        Law </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 7pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">The indentures and the debt securities
        will be governed by New York law. </div><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Currency of
        Debt Securities </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Amounts that become due and payable
        on a debt security in cash will be payable in a currency, currencies or currency
        units specified in the accompanying prospectus supplement. We refer to this
        currency, currencies or currency units as a &#8220;specified currency.&#8221;
        The specified currency for a debt security will be U.S. dollars, unless the
        prospectus supplement states otherwise. Some debt securities may have different
        specified currencies for principal and interest. You will have to pay for
        your debt securities by delivering the requisite amount of the specified currency
        for the principal to us or the underwriters, agents or dealers that we name
        in the prospectus supplement, unless other arrangements have been made between
        you and us or you and that firm. We will make payments on a debt security
        in the specified currency, except as described below under &#8220;&#8212;Payment
        Mechanics for Debt Securities.&#8221; </div><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Form&#160;of
        Debt Securities </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">We will issue each debt security
        in global&#8212;i.e., book-entry&#8212;form only, unless we specify otherwise
        in the applicable prospectus supplement. Debt securities in book-entry form
        will be represented by a global security registered in the name of a depositary,
        which we describe below under &#8220;Legal Ownership and Book-Entry Issuance&#8212;What
        is a Global Security?,&#8221; which will be the holder of all the debt securities
        represented by that global security. Those who own beneficial interests in
        a global debt security will do so through participants in the depositary&#8217;s
        securities clearance system, and the rights of these indirect owners will
        be governed solely by the applicable procedures of the depositary and its
        participants. We describe book-entry securities below in the section entitled
        &#8220;Legal Ownership and Book-Entry Issuance.&#8221; </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">In
        addition, we will issue each debt security in fully registered form, without
        coupons, unless we specify otherwise in the applicable prospectus supplement.
        </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        15pt; margin-left: 0pt; text-align: left;\">Information in the Prospectus
