        \     <div><a name=\"z_Toc126057162\"></a>Section 1.07&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Conflict with Trust Indenture Act</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If any provision
        hereof limits, qualifies or conflicts with a provision of the Trust Indenture
