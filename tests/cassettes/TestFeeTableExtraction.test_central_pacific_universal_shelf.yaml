        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057241\"></a></div>\n
        \         <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">50</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 10.04&#160;&#160; <font style=\"font-style:
        italic;\">Statement by Officers as to Default</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The Company will deliver to the
        Trustee, within 120 days after the end of each fiscal year of the Company
        ending after the date hereof, an Officers&#8217; Certificate, stating whether
        or not to the best knowledge of the\n            signers thereof the Company
        is in default in the performance and observance of any of the terms, provisions
        and conditions of this Indenture (without regard to any period of grace or
        requirement of notice provided hereunder) and, if the Company\n            shall
        be in default, specifying all such defaults and the nature and status thereof
        of which they may have knowledge.</div>\n          <div>&#160;</div>\n          <div><a
        name=\"z_Toc126057242\"></a>Section 10.05&#160;&#160; <font style=\"font-style:
        italic;\">Existence</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">Subject to Article Eight, the Company will do
        or cause to be done all things necessary to preserve and keep in full force
        and effect its existence, rights (charter and statutory) and franchises; <font
        style=\"font-style: italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that the Company shall not be required to preserve any such right or franchise
        if the Board of Directors shall determine that the preservation\n            thereof
        is no longer desirable in the conduct of the business of the Company and that
        the loss thereof is not disadvantageous in any material respect to the Holders
        of Outstanding Securities.</div>\n          <div>&#160;</div>\n          <div><a
        name=\"z_Toc126057243\"></a>Section 10.06&#160;&#160; <font style=\"font-style:
        italic;\">Payment of Taxes and Other Claims</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The Company will pay or discharge
        or cause to be paid or discharged, before the same shall become delinquent,
        (1) all taxes, assessments and governmental charges levied or imposed upon
        the Company or any Subsidiary\n            or upon the income, profits or
        property of the Company or any Subsidiary, and (2) all lawful claims for labor,
        materials and supplies which, if unpaid, might by law become a lien upon the
        property of the Company or any Subsidiary; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that the Company shall
        not be required to pay or discharge or cause to be paid or discharged any
        such tax, assessment, charge or claim whose\n            amount, applicability
        or validity is being contested in good faith by appropriate proceedings.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057244\"></a>Section
        10.07&#160;&#160; <font style=\"font-style: italic;\">Waiver of Certain Covenants</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Except
        as otherwise specified as contemplated by Section 3.01 for Securities of a
        specific series, the Company may, with respect to the Securities of any series,
        omit in any particular instance to comply with any\n            term, provision
        or condition set forth in any covenant provided pursuant to Section 3.01(18)
        or 9.01(2) for the benefit of the Holders of such series, in Article Eight
        or in any of Sections 10.05 and 10.06, if before the time for such\n            compliance
        the Holders of at least a majority in principal amount of the Outstanding
        Securities of such series shall, by Act of such Holders, either waive such
        compliance in such instance or generally waive compliance with such term,
        provision\n            or condition, but no such waiver shall extend to or
        affect such term, provision or condition except to the extent so expressly
        waived, and, until such waiver shall become effective, the obligations of
        the Company and the duties of the Trustee\n            in respect of any such
        term, provision or condition shall remain in full force and effect.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057245\"></a>Section
        10.08&#160;&#160; <font style=\"font-style: italic;\">Calculation of Original
        Issue Discount</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The Company shall file with the Trustee promptly
        at the end of each calendar year a written notice specifying the amount of
        original issue discount (including daily rates and accrual periods) accrued
        on Outstanding\n            Securities as of the end of such year, but only
        if as of the end of such year Securities issued at an original issue discount
        are then Outstanding.</div>\n          <div>&#160;</div>\n          <div><a
        name=\"z_Toc126057246\"></a></div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">51</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-align: center;\">ARTICLE 11</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-align: center;\">REDEMPTION
        OF SECURITIES</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057247\"></a>Section
        11.01 &#160;&#160; <font style=\"font-style: italic;\">Applicability of Article</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Securities
        of any series which are redeemable before their Stated Maturity shall be redeemable
        in accordance with their terms and (except as otherwise specified as contemplated
        by Section 3.01 for such Securities)\n            in accordance with this
        Article.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057248\"></a>Section
        11.02&#160;&#160;&#160; <font style=\"font-style: italic;\">Election to Redeem;
        Notice to Trustee</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The election of the Company to redeem any Securities
        shall be evidenced by a Board Resolution or in another manner specified as
        contemplated by Section 3.01 for such Securities. In case of any redemption
        at the\n            election of the Company of less than all the Securities
        of any series (including any such redemption affecting only a single Security),
        the Company shall, at least 60 days prior to the Redemption Date fixed by
        the Company (unless a shorter\n            notice shall be satisfactory to
        the Trustee), notify the Trustee of such Redemption Date, of the principal
        amount of Securities of such series to be redeemed and, if applicable, of
        the tenor of the Securities to be redeemed. In the case of any\n            redemption
        of Securities prior to the expiration of any restriction on such redemption
        provided in the terms of such Securities or elsewhere in this Indenture, the
        Company shall furnish the Trustee with an Officers&#8217; Certificate evidencing\n
        \           compliance with such restriction.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057249\"></a>Section 11.03&#160; &#160; <font
        style=\"font-style: italic;\">Selection by Trustee of Securities to Be Redeemed</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">If
        less than all the Securities of any series are to be redeemed (unless all
        the Securities of such series and of a specified tenor are to be redeemed
        or unless such redemption affects only a single Security), the\n            particular
        Securities to be redeemed shall be selected not more than 60 days prior to
        the Redemption Date by the Trustee, from the Outstanding Securities of such
        series not previously called for redemption, by such method as the Trustee
        shall\n            deem fair and appropriate and which may provide for the
        selection for redemption of a portion of the principal amount of any Security
        of such series, <font style=\"font-style: italic;\">provided </font>that the
        unredeemed portion of the\n            principal amount of any Security shall
        be in an authorized denomination (which shall not be less than the minimum
        authorized denomination) for such Security. If less than all the Securities
        of such series and of a specified tenor are to be\n            redeemed (unless
        such redemption affects only a single Security), the particular Securities
        to be redeemed shall be selected not more than 60 days prior to the Redemption
        Date by the Trustee, from the Outstanding Securities of such series and\n
        \           specified tenor not previously called for redemption in accordance
        with the preceding sentence.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The Trustee shall promptly notify the Company
        in writing of the Securities selected for redemption as aforesaid and, in
        case of any Securities selected for partial redemption as aforesaid, the principal
        amount\n            thereof to be redeemed.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The provisions of the two preceding
        paragraphs shall not apply with respect to any redemption affecting only a
        single Security, whether such Security is to be redeemed in whole or in part.
        In the case of any such\n            redemption in part, the unredeemed portion
        of the principal amount of the Security shall be in an authorized denomination
        (which shall not be less than the minimum authorized denomination) for such
        Security.</div>\n          <div>&#160;</div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">52</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">For all purposes
        of this Indenture, unless the context otherwise requires, all provisions relating
        to the redemption of Securities shall relate, in the case of any Securities
        redeemed or to be redeemed only in\n            part, to the portion of the
        principal amount of such Securities which has been or is to be redeemed.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057250\"></a>Section
        11.04&#160;&#160;&#160; <font style=\"font-style: italic;\">Notice of Redemption</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Notice
        of redemption shall be given by first-class mail, postage prepaid, mailed
        not less than 30 nor more than 60 days prior to the Redemption Date, to each
        Holder of Securities to be redeemed, at his address\n            appearing
        in the Security Register, with a copy to the Trustee and any Paying Agent.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">All
        notices of redemption shall identify the Securities to be redeemed, including
        CUSIP number, if any, and shall state:</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;
        the Redemption Date,</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160; the Redemption Price,</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160; &#160; if
        less than all the Outstanding Securities of any series consisting of more
        than a single Security are to be redeemed, the identification (and, in the
        case of partial redemption of any such Securities,\n            the principal
        amounts) of the particular Securities to be redeemed and, if less than all
        the Outstanding Securities of any series consisting of a single Security are
        to be redeemed, the principal amount of the particular Security to be\n            redeemed,</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        that on the Redemption Date the Redemption Price will become due and payable
        upon each such Security to be redeemed and, if applicable, that interest thereon
        will cease to accrue on and after said date,</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;
        the place or places where each such Security is to be surrendered for payment
        of the Redemption Price, and</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160; that the redemption
        is for a sinking fund, if such is the case.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Notice of redemption of Securities
        to be redeemed at the election of the Company shall be given by the Company
        or, at the Company&#8217;s request made to the Trustee at least 35 days prior
        to the Redemption Date, by the\n            Trustee in the name and at the
        expense of the Company and shall be irrevocable.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057251\"></a>Section 11.05 &#160;&#160; <font
        style=\"font-style: italic;\">Deposit of Redemption Price</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Prior
        to any Redemption Date, the Company shall deposit with the Trustee or with
        a Paying Agent (or, if the Company is acting as its own Paying Agent, segregate
        and hold in trust as provided in Section 10.03) an\n            amount of
        money sufficient to pay the Redemption Price of, and (except if the Redemption
        Date shall be an Interest Payment Date or the Securities of the series provide
        otherwise) accrued interest on, all the Securities which are to be redeemed\n
        \           on that date.</div>\n          <div>&#160;</div>\n          <div><a
        name=\"z_Toc126057252\"></a></div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">53</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 11.06&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Securities Payable on Redemption Date</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Notice of redemption having been
        given as aforesaid, the Securities so to be redeemed shall, on the Redemption
        Date, become due and payable at the Redemption Price therein specified, and
        from and after such date\n            (unless the Company shall default in
        the payment of the Redemption Price and accrued interest) such Securities
        shall cease to bear interest. Upon surrender of any such Security for redemption
        in accordance with said notice, such Security shall\n            be paid by
        the Company at the Redemption Price, together, if applicable, with accrued
        interest to the Redemption Date; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that, unless otherwise\n
        \           specified as contemplated by Section 3.01, installments of interest
        whose Stated Maturity is on or prior to the Redemption Date will be payable
        to the Holders of such Securities, or one or more Predecessor Securities,
        registered as such at the\n            close of business on the relevant Record
        Dates according to their terms and the provisions of Section 3.07.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">If
        any Security called for redemption shall not be so paid upon surrender thereof
        for redemption, the principal and any premium shall, until paid, bear interest
        from the Redemption Date at the rate prescribed\n            therefor in the
        Security.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057253\"></a>Section
        11.07&#160;&#160;&#160; <font style=\"font-style: italic;\">Securities Redeemed
        in Part</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">Any Security which is to be redeemed only in part shall be surrendered
        at a Place of Payment therefor (with, if the Company or the Trustee so requires,
        due endorsement by, or a written instrument of transfer in\n            form
        satisfactory to the Company and the Trustee duly executed by, the Holder thereof
        or his attorney duly authorized in writing), and the Company shall execute,
        and the Trustee shall authenticate and deliver to the Holder of such Security\n
        \           without service charge, a new Security or Securities of the same
        series and of like tenor, of any authorized denomination as requested by such
        Holder, in aggregate principal amount equal to and in exchange for the unredeemed
        portion of the\n            principal of the Security so surrendered.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-align: center;\"><a
        name=\"z_Toc126057254\"></a>ARTICLE 12</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-align: center;\">SINKING FUNDS</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057255\"></a>Section 12.01&#160;&#160; <font
        style=\"font-style: italic;\">Applicability of Article</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The provisions of this Article
        shall be applicable to any sinking fund for the retirement of Securities of
        any series except as otherwise specified as contemplated by Section 3.01 for
        such Securities.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">The minimum amount of any sinking fund payment provided for by the
        terms of any Securities is herein referred to as a &#8220;mandatory sinking
        fund payment&#8221;, and any payment in excess of such minimum amount provided
        for\n            by the terms of such Securities is herein referred to as
        an &#8220;optional sinking fund payment&#8221;. If provided for by the terms
        of any Securities, the cash amount of any sinking fund payment may be subject
        to reduction as provided in Section 12.02.\n            Each sinking fund
        payment shall be applied to the redemption of Securities as provided for by
        the terms of such Securities.</div>\n          <div>&#160;</div>\n          <div><a
        name=\"z_Toc126057256\"></a></div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">54</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 12.02&#160;&#160; <font style=\"font-style:
        italic;\">Satisfaction of Sinking Fund Payments with Securities</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">The
        Company (1) may deliver Outstanding Securities of a series (other than any
        previously called for redemption) and (2) may apply as credit Securities of
        a series which have been redeemed either at the election of\n            the
        Company pursuant to the terms of such Securities or through the application
        of permitted optional sinking fund payments pursuant to the terms of such
        Securities, in each case in satisfaction of all or any part of any sinking
        fund payment\n            with respect to any Securities of such series required
        to be made pursuant to the terms of such Securities as and to the extent provided
        for by the terms of such Securities; <font style=\"font-style: italic;\">provided
        </font>that the\n            Securities to be so credited have not been previously
        so credited. The Securities to be so credited shall be received and credited
        for such purpose by the Trustee at the Redemption Price, as specified in the
        Securities so to be redeemed, for\n            redemption through operation
        of the sinking fund and the amount of such sinking fund payment shall be reduced
        accordingly.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057257\"></a>Section
        12.03 &#160; <font style=\"font-style: italic;\">Redemption of Securities
        for Sinking Fund</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">Not less than 60 days (or such shorter period
        as shall be satisfactory to the Trustee) prior to each sinking fund payment
        date for any Securities, the Company will deliver to the Trustee an Officer&#8217;s
        Certificate\n            specifying the amount of the next ensuing sinking
        fund payment for such Securities pursuant to the terms of such Securities,
        the portion thereof, if any, which is to be satisfied by payment of cash and
        the portion thereof, if any, which is to\n            be satisfied by delivering
        and crediting Securities pursuant to Section 12.02 and will also deliver to
        the Trustee any Securities to be so delivered. Not less than 30 nor more than
        45 days prior to each such sinking fund payment date, the\n            Trustee
        shall select the Securities to be redeemed upon such sinking fund payment
        date in the manner specified in Section 11.03 and cause notice of the redemption
        thereof to be given in the name of and at the expense of the Company in the\n
        \           manner provided in Section 11.04. Such notice having been duly
        given, the redemption of such Securities shall be made upon the terms and
        in the manner stated in Sections 11.06 and 11.07.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-align: center;\"><a name=\"z_Toc126057258\"></a>ARTICLE
        13</div>\n          <div>&#160;</div>\n          <div style=\"text-align:
        center;\">DEFEASANCE AND COVENANT DEFEASANCE</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057259\"></a>Section 13.01&#160;&#160; <font
        style=\"font-style: italic;\">Company&#8217;s Option to Effect Defeasance
        or Covenant Defeasance</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">If applicable to a particular series of Securities,
        the Company may elect, at its option at any time, to have Section 13.02 or
        Section 13.03 applied to any such series of Securities or any Securities of
        such\n            series, as the case may be, designated pursuant to Section
        3.01 as being defeasible pursuant to such Section 13.02 or 13.03, in accordance
        with any applicable requirements provided pursuant to Section 3.01 and upon
        compliance with the\n            conditions set forth below in this Article.
        Any such election shall be evidenced by a Board Resolution or in another manner
        specified as contemplated by Section 3.01 for such Securities.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057260\"></a></div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">55</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 13.02&#160;&#160; <font style=\"font-style:
        italic;\">Defeasance and Discharge</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Upon the Company&#8217;s exercise
        of its option (if any) to have this Section applied to any applicable series
        of Securities or any Securities of such series, as the case may be, the Company
        shall be deemed to have been\n            discharged from its obligations
        with respect to such Securities as provided in this Section on and after the
        date the conditions set forth in Section 13.04 are satisfied (hereinafter
        called &#8220;Defeasance&#8221;). For this purpose, such Defeasance means\n
        \           that the Company shall be deemed to have paid and discharged the
        entire indebtedness represented by such Securities and to have satisfied all
        its other obligations under such Securities and this Indenture insofar as
        such Securities are\n            concerned (and the Trustee, at the expense
        of the Company, shall execute proper instruments acknowledging the same),
        subject to the following which shall survive until otherwise terminated or
        discharged hereunder:</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">(1) the rights of Holders of such Securities to receive, solely from
        the trust fund described in Section 13.04 and as more fully set forth in such
        Section, payments in respect of the principal of and any premium\n            and
        interest on such Securities when payments are due, (2) the Company&#8217;s
        obligations with respect to such Securities under Sections 3.04, 3.05, 3.06,
        10.02 and 10.03, (3) the rights, powers, trusts, duties and immunities of
        the Trustee\n            hereunder and (4) this Article. Subject to compliance
        with this Article, the Company may exercise its option (if any) to have this
        Section applied to any applicable Securities notwithstanding the prior exercise
        of its option (if any) to have\n            Section 13.03 applied to such
        Securities.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057261\"></a>Section
        13.03&#160;&#160; <font style=\"font-style: italic;\">Covenant Defeasance</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Upon
        the Company&#8217;s exercise of its option (if any) to have this Section applied
        to any applicable series of Securities or any Securities of such series, as
        the case may be, (1) the Company shall be released from\n            its obligations
        under Section 10.06, and any covenants provided pursuant to Section 3.01(18),
        9.01(2) or 9.01(7) for the benefit of the Holders of such Securities and (2)
        the occurrence of any event specified in Sections 5.01(4) (with respect\n
        \           to Section 10.06, and any such covenants provided pursuant to
        Section 3.01(18), 9.01(2) and 5.01(7) shall be deemed not to be or result
        in an Event of Default, in each case with respect to such Securities as provided
        in this Section on and\n            after the date the conditions set forth
        in Section 13.04 are satisfied (hereinafter called &#8220;Covenant Defeasance&#8221;).
        For this purpose, such Covenant Defeasance means that, with respect to such
        Securities, the Company may omit to comply with and\n            shall have
        no liability in respect of any term, condition or limitation set forth in
        any such specified Section (to the extent so specified in the case of Section
        5.01(4)), whether directly or indirectly by reason of any reference elsewhere\n
        \           herein to any such Section or by reason of any reference in any
        such Section to any other provision herein or in any other document, but the
        remainder of this Indenture and such Securities shall be unaffected thereby.</div>\n
        \         <div>&#160;</div>\n          <div class=\"BRPFPageBreakArea\" style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">56</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">\n            <div>
        <br>\n            </div>\n            <div>Section 13.04&#160;&#160; <font
        style=\"font-style: italic;\">Conditions to Defeasance or Covenant Defeasance</font>.</div>\n
        \           <div>&#160;</div>\n            <div style=\"text-indent: 36pt;\">The
        following shall be the conditions to the application of Section 13.02 or Section
        13.03 to any applicable series of Securities or any Securities of such series,
        as the case may be:</div>\n            <div>&#160;(1)&#160;&#160;&#160;&#160;&#160;
        The Company shall irrevocably have deposited or caused to be deposited with
        the Trustee (or another trustee which satisfies the requirements contemplated
        by Section 6.09 and agrees to comply with the provisions of this Article\n
        \             applicable to it) as trust funds in trust for the purpose of
        making the following payments, specifically pledged as security for, and dedicated
        solely to, the benefits of the Holders of such Securities, (A) money in an
        amount, or (B) U.S.\n              Government Obligations which through the
        scheduled payment of principal and interest in respect thereof in accordance
        with their terms will provide, not later than one day before the due date
        of any payment, money in an amount, or (C) a\n              combination thereof,
        in each case sufficient, in the opinion of a nationally recognized firm of
        independent public accountants expressed in a written certification thereof
        delivered to the Trustee, to pay and discharge, and which shall be\n              applied
        by the Trustee (or any such other qualifying trustee) to pay and discharge,
        the principal of and any premium and interest on such Securities on the respective
        Stated Maturities, in accordance with the terms of this Indenture and such\n
        \             Securities. As used herein, &#8220;U.S. Government Obligation&#8221;
        means (x) any security which is (i) a direct obligation of the United States
        of America for the payment of which the full faith and credit of the United
        States of America is pledged or\n              (ii) an obligation of a Person
        controlled or supervised by and acting as an agency or instrumentality of
        the United States of America the payment of which is unconditionally guaranteed
        as a full faith and credit obligation by the United\n              States
        of America, which, in either case (i) or (ii), is not callable or redeemable
        at the option of the issuer thereof, and (y) any depositary receipt issued
        by a bank (as defined in Section 3(a)(2) of the Securities Act) as custodian
        with\n              respect to any U.S. Government Obligation which is specified
        in Clause (x) above and held by such bank for the account of the holder of
        such depositary receipt, or with respect to any specific payment of principal
        of or interest on any U.S.\n              Government Obligation which is so
        specified and held, <font style=\"font-style: italic;\">provided </font>that
        (except as required by law) such custodian is not authorized to make any deduction
        from the amount payable to the holder of such\n              depositary receipt
        from any amount received by the custodian in respect of the U.S. Government
        Obligation or the specific payment of principal or interest evidenced by such
        depositary receipt.</div>\n          </div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        In the event of an election to have Section 13.02 apply to any applicable
        series of Securities or any Securities of such series, as the case may be,
        the Company shall have delivered to the Trustee an\n            Opinion of
        Counsel stating that (A) the Company has received from, or there has been
        published by, the Internal Revenue Service a ruling or (B) since the date
        of this instrument, there has been a change in the applicable Federal income
        tax law,\n            in either case (A) or (B) to the effect that, and based
        thereon such opinion shall confirm that, the Holders of such Securities will
        not recognize gain or loss for Federal income tax purposes as a result of
        the deposit, Defeasance and discharge\n            to be effected with respect
        to such Securities and will be subject to Federal income tax on the same amount,
        in the same manner and at the same times as would be the case if such deposit,
        Defeasance and discharge were not to occur.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;
        In the event of an election to have Section 13.03 apply to any applicable
        series of Securities or any Securities of such series, as the case may be,
        the Company shall have delivered to the Trustee an\n            Opinion of
        Counsel to the effect that the Holders of such Securities will not recognize
        gain or loss for Federal income tax purposes as a result of the deposit and
        Covenant Defeasance to be effected with respect to such Securities and will
        be\n            subject to Federal income tax on the same amount, in the same
        manner and at the same times as would be the case if such deposit and Covenant
        Defeasance were not to occur.</div>\n          <div>&#160;</div>\n          <div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\">\n            <div class=\"BRPFPageNumberArea\" style=\"text-align:
        center;\"><font class=\"BRPFPageNumber\" style=\"font-size: 8pt; color: #000000;
        font-weight: normal; font-style: normal;\">57</font></div>\n            <div
        class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n              <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        The Company shall have delivered to the Trustee an Officers&#8217; Certificate
        to the effect that neither such Securities nor any other Securities of the
        same series, if then listed on any securities exchange,\n            will
        be delisted as a result of such deposit.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160; &#160; No
        event which is, or after notice or lapse of time or both would become, an
        Event of Default with respect to such Securities or any other Securities shall
        have occurred and be continuing at the time of\n            such deposit or,
        with regard to any such event specified in Sections 5.01(5) and (6), at any
        time on or prior to the 90th day after the date of such deposit (it being
        understood that this condition shall not be deemed satisfied until after such\n
        \           90th day).</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160; Such Defeasance
        or Covenant Defeasance shall not cause the Trustee to have a conflicting interest
        within the meaning of the Trust Indenture Act (assuming all Securities are
        in default within the meaning of\n            such Act).</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(7)&#160;&#160;&#160;&#160;&#160;
        Such Defeasance or Covenant Defeasance shall not result in a breach or violation
        of, or constitute a default under, any other agreement or instrument to which
        the Company is a party or by which it is\n            bound.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;
        Such Defeasance or Covenant Defeasance shall not result in the trust arising
        from such deposit constituting an investment company within the meaning of
        the Investment Company Act unless such trust shall be\n            registered
        under such Act or exempt from registration thereunder.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">(9)&#160;&#160;&#160;&#160;&#160;
        At the time of such deposit, (A) no default in the payment of any principal
        of or premium or interest on any Senior Debt shall have occurred and be continuing,
        (B) no event of default with respect to any\n            Senior Debt shall
        have resulted in such Senior Debt becoming, and continuing to be, due and
        payable prior to the date on which it would otherwise have become due and
        payable (unless payment of such Senior Debt has been made or duly provided\n
        \           for), and (C) no other event of default with respect to any Senior
        Debt shall have occurred and be continuing permitting (after notice or lapse
        of time or both) the holders of such Senior Debt (or a trustee on behalf of
        such holders) to declare\n            such Senior Debt due and payable prior
        to the date on which it would otherwise have become due and payable.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">(10)&#160;&#160;&#160;
        The Company shall have delivered to the Trustee an Officers&#8217; Certificate
        and an Opinion of Counsel, each stating that all conditions precedent with
        respect to such Defeasance or Covenant Defeasance have\n            been complied
        with.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057263\"></a>Section
        13.05&#160;&#160; <font style=\"font-style: italic;\">Deposited Money and
        U.S. Government Obligations to Be Held in Trust; Miscellaneous Provisions</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Subject
        to the provisions of the last paragraph of Section 10.03, all money and U.S.
        Government Obligations (including the proceeds thereof) deposited with the
        Trustee or other qualifying trustee (solely for\n            purposes of this
        Section and Section 13.06, the Trustee and any such other trustee are referred
        to collectively as the &#8220;Trustee&#8221;) pursuant to Section 13.04 in
        respect of any Securities shall be held in trust and applied by the Trustee,
        in\n            accordance with the provisions of such Securities and this
        Indenture, to the payment, either directly or through any such Paying Agent
        (including the Company acting as its own Paying Agent) as the Trustee may
        determine, to the Holders of such\n            Securities, of all sums due
        and to become due thereon in respect of principal and any premium and interest,
        but money so held in trust need not be segregated from other funds except
        to the extent required by law.</div>\n          <div>&#160;</div>\n          <div
        class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top: 10pt; margin-bottom:
        10pt;\">\n            <div class=\"BRPFPageNumberArea\" style=\"text-align:
        center;\"><font class=\"BRPFPageNumber\" style=\"font-size: 8pt; color: #000000;
        font-weight: normal; font-style: normal;\">58</font></div>\n            <div
        class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n              <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">The Company
        shall pay and indemnify the Trustee against any tax, fee or other charge imposed
        on or assessed against the U.S. Government Obligations deposited pursuant
        to Section 13.04 or the principal and interest\n            received in respect
        thereof other than any such tax, fee or other charge which by law is for the
        account of the Holders of Outstanding Securities.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Anything in this Article to the
        contrary notwithstanding, the Trustee shall deliver or pay to the Company
        from time to time upon Company Request any money or U.S. Government Obligations
        held by it as provided in\n            Section 13.04 with respect to any Securities
        which, in the opinion of a nationally recognized firm of independent public
        accountants expressed in a written certification thereof delivered to the
        Trustee, are in excess of the amount thereof\n            which would then
        be required to be deposited to effect the Defeasance or Covenant Defeasance,
        as the case may be, with respect to such Securities.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057264\"></a>Section 13.06&#160;&#160; <font
        style=\"font-style: italic;\">Reinstatement</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">If the Trustee or the Paying Agent
        is unable to apply any money in accordance with this Article with respect
        to any Securities by reason of any order or judgment of any court or governmental
        authority enjoining,\n            restraining or otherwise prohibiting such
        application, then the obligations under this Indenture and such Securities
        from which the Company has been discharged or released pursuant to Section
        13.02 or 13.03 shall be revived and reinstated as\n            though no deposit
        had occurred pursuant to this Article with respect to such Securities, until
        such time as the Trustee or Paying Agent is permitted to apply all money held
        in trust pursuant to Section 13.05 with respect to such Securities in\n            accordance
        with this Article; <font style=\"font-style: italic;\">provided</font>, <font
        style=\"font-style: italic;\">however</font>, that if the Company makes any
        payment of principal of or any premium or interest on any such Security following\n
        \           such reinstatement of its obligations, the Company shall be subrogated
        to the rights (if any) of the Holders of such Securities to receive such payment
        from the money so held in trust.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-align: center;\"><a name=\"z_Toc126057265\"></a>ARTICLE 14</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-align: center;\">SUBORDINATION
        OF SECURITIES</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057266\"></a>Section
        14.01&#160;&#160; <font style=\"font-style: italic;\">Securities Subordinate
        to Senior Debt</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The Company covenants and agrees, and each Holder
        of a Security, by his acceptance thereof, likewise covenants and agrees, that,
        to the extent and in the manner hereinafter set forth in this Article, the\n
        \           indebtedness represented by the Securities and the payment of
        the principal of (and premium, if any) and interest on each and all of the
        Securities are hereby expressly made subordinate and subject in right of payment
        to the prior payment in\n            full of all Senior Debt.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057267\"></a></div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">59</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 14.02&#160;&#160; <font style=\"font-style:
        italic;\">Payment Over of Proceeds Upon Dissolution, Etc</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">In the event of (a) any insolvency
        or bankruptcy case or proceeding, or any receivership, liquidation, reorganization
        or other similar case or proceeding in connection therewith, relative to the
        Company or to its\n            creditors, as such, or to its assets, or (b)
        any liquidation, dissolution or other winding up of the Company, whether voluntary
        or involuntary and whether or not involving insolvency or bankruptcy, or (c)
        any assignment for the benefit of\n            creditors or any other marshalling
        of assets and liabilities of the Company, then and in any such event the holders
        of Senior Debt shall be entitled to receive payment in full of all amounts
        due or to become due on or in respect of all Senior\n            Debt, or
        provision shall be made for such payment in cash, before the Holders of the
        Securities are entitled to receive any payment on account of principal of
        (or premium, if any) or interest on the Securities, and to that end the holders
        of\n            Senior Debt shall be entitled to receive, for application
        to the payment thereof, any payment or distribution of any kind or character,
        whether in cash, property or securities, including any such payment or distribution
        which may be payable or\n            deliverable by reason of the payment
        of any other indebtedness of the Company being subordinated to the payment
        of the Securities, which may be payable or deliverable in respect of the Securities
        in any such case, proceeding, dissolution,\n            liquidation or other
        winding up event.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">In the event that, notwithstanding the foregoing provisions of this
        Section, the Trustee or the Holder of any Security shall have received any
        payment or distribution of assets of the Company of any kind or\n            character,
        whether in cash, property or securities, including any such payment or distribution
        which may be payable or deliverable by reason of the payment of any other
        indebtedness of the Company being subordinated to the payment of the\n            Securities,
        before all Senior Debt is paid in full or payment thereof provided for, and
        if such fact shall, at or prior to the time of such payment or distribution,
        have been made known to the Trustee or, as the case may be, such Holder, then\n
        \           and in such event such payment or distribution shall be paid over
        or delivered forthwith to the trustee in bankruptcy, receiver, liquidating
        trustee, custodian, assignee, agent or other Person making payment or distribution
        of assets of the\n            Company for application to the payment of all
        Senior Debt remaining unpaid, to the extent necessary to pay all Senior Debt
        in full, after giving effect to any concurrent payment or distribution to
        or for the holders of Senior Debt. Any taxes\n            that have been withheld
        or deducted from any payment or distribution in respect of the Securities,
        or any taxes that ought to have been withheld or deducted from any such payment
        or distribution that have been remitted to the relevant taxing\n            authority,
        shall not be considered to an amount that the Trustee or the Holder of any
        Security receives for purposes of this Section.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">For purposes of this Article only,
        the words &#8220;cash, property or securities&#8221; shall not be deemed to
        include shares of stock of the Company as reorganized or readjusted, or securities
        of the Company or any other\n            corporation provided for by a plan
        of reorganization or readjustment which are subordinated in right of payment
        to all Senior Debt which may at the time be outstanding to substantially the
        same extent as, or to a greater extent than, the\n            Securities are
        so subordinated as provided in this Article. The consolidation of the Company
        with, or the merger of the Company into, another Person or the liquidation
        or dissolution of the Company following the conveyance or transfer of its\n
        \           properties and assets substantially as an entirety to another
        Person upon the terms and conditions set forth in Article Eight shall not
        be deemed a dissolution, winding up, liquidation, reorganization, assignment
        for the benefit of creditors or\n            marshalling of assets and liabilities
        of the Company for the purposes of this Section if the Person formed by such
        consolidation or into which the Company is merged or the Person which acquires
        by conveyance or transfer such properties and\n            assets substantially
        as an entirety, as the case may be, shall, as a part of such consolidation,
        merger, conveyance or transfer, comply with the conditions set forth in Article
        Eight.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057268\"></a></div>\n
        \         <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">60</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 14.03&#160;&#160; <font style=\"font-style:
        italic;\">Prior Payment to Senior Debt upon Acceleration of Securities</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">In
        the event that any Securities are declared due and payable before their Stated
        Maturity, then and in such event the holders of Senior Debt shall be entitled
        to receive payment in full of all amounts due or to\n            become due
        on or in respect of all Senior Debt or provision shall be made for such payment
        in cash, before the Holders of the Securities are entitled to receive any
        payment (including any payment which may be payable by reason of the payment
        of\n            any other indebtedness of the Company being subordinated to
        the payment of the Securities) by the Company on account of the principal
        of (or premium, if any) or interest on the Securities or on account of the
        purchase or other acquisition of\n            Securities; <font style=\"font-style:
        italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that nothing in this Section shall prevent the satisfaction of any sinking
        fund payment in accordance with Article Twelve by\n            delivering
        and crediting pursuant to Section 12.02 Securities which have been acquired
        (upon redemption or otherwise) prior to such declaration of acceleration.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">In
        the event that, notwithstanding the foregoing, the Company shall make any
        payment to the Trustee or the Holder of any Security prohibited by the foregoing
        provisions of this Section, and if such fact shall, at\n            or prior
        to the time of such payment, have been made known to the Trustee or, as the
        case may be, such Holder, then and in such event such payment shall be paid
        over and delivered forthwith to the Company.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The provisions of this Section
        shall not apply to any payment with respect to which Section 14.02 would be
        applicable.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057269\"></a>Section
        14.04&#160;&#160; <font style=\"font-style: italic;\">No Payment When Senior
        Debt in Default</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">(a) In the event and during the continuation
        of any default in the payment of principal of (or premium, if any) or interest
        on any Senior Debt beyond any applicable grace period with respect thereto,
        or in the\n            event that any event of default with respect to any
        Senior Debt shall have occurred and be continuing permitting the holders of
        such Senior Debt (or a trustee on behalf of the holders thereof) to declare
        such Senior Debt due and payable prior\n            to the date on which it
        would otherwise have become due and payable, unless and until such event of
        default shall have been cured or waived or shall have ceased to exist and
        such acceleration shall have been rescinded or annulled, or (b) in the\n            event
        any judicial proceeding shall be pending with respect to any such default
        in payment or event of default, then no payment (including any payment which
        may be payable by reason of the payment of any other indebtedness of the Company
        being\n            subordinated to the payment of the Securities) shall be
        made by the Company on account of principal of (or premium, if any) or interest
        on the Securities or on account of the purchase or other acquisition of Securities;
        <font style=\"font-style: italic;\">provided</font>, <font style=\"font-style:
        italic;\">however</font>, that nothing in this Section shall prevent the satisfaction
        of any sinking fund payment in accordance with Article Twelve by delivering
        and\n            crediting pursuant to Section 12.02 Securities which have
        been acquired (upon redemption or otherwise) prior to such default in Payment
        or event of default.</div>\n          <div>&#160;</div>\n          <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n            <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; color: #000000; font-weight: normal; font-style: normal;\">61</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div style=\"text-indent: 36pt;\">In the event
        that, notwithstanding the foregoing, the Company shall make any payment to
        the Trustee or the Holder of any Security prohibited by the foregoing provisions
        of this Section, and if such fact shall, at\n            or prior to the time
        of such payment, have been made known to the Trustee or, as the case may be,
        such Holder, then and in such event such payment shall be paid over and delivered
        forthwith to the Company.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The provisions of this Section shall not apply
        to any payment with respect to which Section 14.02 would be applicable.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057270\"></a>Section
        14.05&#160;&#160; <font style=\"font-style: italic;\">Payment Permitted in
        Certain Situations</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">Nothing contained in this Article or elsewhere
        in this Indenture or in any of the Securities shall prevent (a) the Company,
        at any time except during the pendency of any case, proceeding, dissolution,
        liquidation\n            or other winding up, assignment for the benefit of
        creditors or other marshalling of assets and liabilities of the Company referred
        to in Section 14.02 or under the conditions described in Section 14.03 or
        14.04, from making payments at any\n            time of principal of (and
        premium, if any) or interest on the Securities, or (b) the application by
        the Trustee of any money deposited with it hereunder to the payment of or
        on account of the principal of (and premium, if any) or interest on\n            the
        Securities or the retention of such payment by the Holders, if, at the time
        of such application by the Trustee, it did not have knowledge that such payment
        would have been prohibited by the provisions of this Article.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057271\"></a>Section 14.06&#160;&#160; <font
        style=\"font-style: italic;\">Subrogation to Rights of Holders of Senior Debt</font>.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Subject
        to the payment in full of all Senior Debt or the provision for such payment
        in cash or cash equivalents or otherwise in a manner satisfactory to the holders
        of Senior Debt, the Holders of the Securities\n            shall be subrogated
        to the extent of the payments or distributions made to the holders of such
        Senior Debt pursuant to the provisions of this Article (equally and ratably
        with the holders of indebtedness of the Company which by its express\n            terms
        is subordinated to indebtedness of the Company to substantially the same extent
        as the Securities are subordinated to the Senior Debt and is entitled to like
        rights of subrogation) to the rights of the holders of such Senior Debt to\n
        \           receive payments and distributions of cash, property and securities
        applicable to the Senior Debt until the principal of (and premium, if any)
        and interest on the Securities shall be paid in full. For purposes of such
        subrogation, no payments\n            or distributions to the holders of the
        Senior Debt of any cash, property or securities to which the Holders of the
        Securities or the Trustee would be entitled except for the provisions of this
        Article, and no payments over pursuant to the\n            provisions of this
        Article to the holders of Senior Debt by Holders of the Securities or the
        Trustee, shall, as among the Company, its creditors other than holders of
        Senior Debt and the Holders of the Securities, be deemed to be a payment or\n
        \           distribution by the Company to or on account of the Senior Debt.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057272\"></a></div>\n
        \         <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">62</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 14.07&#160;&#160; <font style=\"font-style:
        italic;\">Provisions Solely to Define Relative Rights</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The provisions of this Article
        are and are intended solely for the purpose of defining the relative rights
        of the Holders of the Securities on the one hand and the holders of Senior
        Debt on the other hand. Nothing\n            contained in this Article or
        elsewhere in this Indenture or in the Securities is intended to or shall (a)
        impair, as among the Company, its creditors other than holders of Senior Debt
        and the Holders of the Securities, the obligation of the\n            Company,
        which is absolute and unconditional (and which, subject to the rights under
        this Article of the holders of Senior Debt, is intended to rank equally with
        all other general obligations of the Company), to pay to the Holders of the\n
        \           Securities the principal of (and premium, if any) and interest
        on the Securities as and when the same shall become due and payable in accordance
        with their terms; or (b) affect the relative rights against the Company of
        the Holders of the\n            Securities and creditors of the Company other
        than the holders of Senior Debt; or (c) prevent the Trustee or the Holder
        of any Security from exercising all remedies otherwise permitted by applicable
        law upon default under this Indenture,\n            subject to the rights,
        if any, under this Article of the holders of Senior Debt to receive cash,
        property and securities otherwise payable or deliverable to the Trustee or
        such Holder.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057273\"></a>Section
        14.08&#160;&#160; <font style=\"font-style: italic;\">Trustee to Effectuate
        Subordination</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">Each Holder of a Security by his acceptance thereof authorizes and
        directs the Trustee on his behalf to take such action as may be necessary
        or appropriate to effectuate the subordination provided in this Article\n
        \           and appoints the Trustee his attorney-in-fact for any and all
        such purposes.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057274\"></a>Section
        14.09&#160;&#160; <font style=\"font-style: italic;\">No Waiver of Subordination
        Provisions</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">No right of any present or future holder of any Senior Debt to enforce
        subordination as herein provided shall at any time in any way be prejudiced
        or impaired by any act or failure to act on the part of the Company\n            or
        by any act or failure to act, in good faith, by any such holder, or by any
        non-compliance by the Company with the terms, provisions and covenants of
        this Indenture, regardless of any knowledge thereof any such holder may have
        or be otherwise\n            charged with.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Without in any way limiting the
        generality of the foregoing paragraph, the holders of Senior Debt may, at
        any time and from time to time, without the consent of or notice to the Trustee
        or the Holders of the\n            Securities, without incurring responsibility
        to the Holders of the Securities and without impairing or releasing the subordination
        provided in this Article or the obligations hereunder of the Holders of the
        Securities to the holders of Senior\n            Debt do any one or more of
        the following: (i) change the manner, place or terms of payment or extend
        the time of payment of, or renew or alter, Senior Debt or otherwise amend
        or supplement in any manner Senior Debt or any instrument evidencing\n            the
        same or any agreement under which Senior Debt is outstanding; (ii) sell, exchange,
        release or otherwise deal with any property pledged, mortgaged or otherwise
        securing Senior Debt; (iii) release any Person liable in any manner for the\n
        \           collection of Senior Debt; and (iv) exercise or refrain from exercising
        any rights against the Company and any other Person.</div>\n          <div>&#160;</div>\n
        \         <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">63</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 14.10&#160;&#160; <font style=\"font-style:
        italic;\">Notice to Trustee</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The Company shall give prompt written notice
        to the Trustee of any fact known to the Company which would prohibit the making
        of any payment to or by the Trustee in respect of the Securities. Notwithstanding
        the\n            provisions of this Article or any other provision of this
        Indenture, the Trustee shall not be charged with knowledge of the existence
        of any facts which would prohibit the making of any payment to or by the Trustee
        in respect of the Securities,\n            unless and until the Trustee shall
        have received written notice thereof from the Company or a holder of Senior
        Debt or from any trustee therefor; and, prior to the receipt of any such written
        notice, the Trustee, subject to the provisions of\n            Section 6.01,
        shall be entitled in all respects to assume that no such facts exist.</div>\n
        \         <div>&#160;</div>\n          <div style=\"text-indent: 36pt;\">Subject
        to the provisions of Section 6.01, the Trustee shall be entitled to rely on
        the delivery to it of a written notice by a Person representing himself to
        be a holder of Senior Debt (or a trustee therefor) to\n            establish
        that such notice has been given by a holder of Senior Debt (or a trustee therefor).
        In the event that the Trustee determines in good faith that further evidence
        is required with respect to the right of any Person as a holder of Senior\n
        \           Debt to participate in any payment or distribution pursuant to
        this Article, the Trustee may request such Person to furnish evidence to the
        reasonable satisfaction of the Trustee as to the amount of Senior Debt held
        by such Person, the extent\n            to which such Person is entitled to
        participate in such payment or distribution and any other facts pertinent
        to the rights of such Person under this Article, and if such evidence is not
        furnished, the Trustee may defer any payment to such\n            Person pending
        judicial determination as to the right of such Person to receive such payment.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057276\"></a>Section
        14.11&#160;&#160; <font style=\"font-style: italic;\">Reliance on Judicial
        Order or Certificate of Liquidating Agent</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">Upon any payment or distribution
        of assets of the Company referred to in this Article, the Trustee, subject
        to the provisions of Section 6.01, and the Holders of the Securities shall
        be entitled to rely upon any\n            order or decree entered by any court
        of competent jurisdiction in which such insolvency, bankruptcy, receivership,
        liquidation, reorganization, dissolution, winding up or similar case or proceeding
        is pending, or a certificate of the trustee in\n            bankruptcy, receiver,
        liquidating trustee, custodian, assignee for the benefit of creditors, agent
        or other Person making such payment or distribution, delivered to the Trustee
        or to the Holders of Securities, for the purpose of ascertaining\n            the
        Persons entitled to participate in such payment or distribution, the holders
        of Senior Debt and other indebtedness of the Company, the amount thereof or
        payable thereon, the amount or amounts paid or distributed thereon and all
        other facts\n            pertinent thereto or to this Article.</div>\n          <div>&#160;</div>\n
        \         <div><a name=\"z_Toc126057277\"></a>Section 14.12&#160;&#160; <font
        style=\"font-style: italic;\">Trustee Not Fiduciary for Holders of Senior
        Debt</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">The Trustee shall not be deemed to owe any fiduciary duty to the holders
        of Senior Debt and shall not be liable to any such holders or creditors if
        it shall in good faith pay over or distribute to Holders of\n            Securities
        or to the Company or to any other Person cash, property or securities to which
        any holders of Senior Debt shall be entitled by virtue of this Article or
        otherwise.</div>\n          <div>&#160;</div>\n          <div><a name=\"z_Toc126057278\"></a></div>\n
        \         <div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\">\n            <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; color: #000000; font-weight: normal; font-style: normal;\">64</font></div>\n
        \           <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \             <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \         </div>\n          <div>Section 14.13&#160;&#160; <font style=\"font-style:
        italic;\">Rights of Trustee as Holder of Senior Debt; Preservation of Trustee&#8217;s
        Rights</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">The Trustee in its individual capacity shall be entitled to all the
        rights set forth in this Article with respect to any Senior Debt which may
        at any time be held by it, to the same extent as any other holder of\n            Senior
        Debt and nothing in this Indenture shall deprive the Trustee of any of its
        rights as such holder.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">Nothing in this Article shall apply to claims
        of, or payments to, the Trustee under or pursuant to Section 6.07.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057279\"></a>Section
        14.14&#160;&#160; <font style=\"font-style: italic;\">Article Applicable to
        Paying Agents</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">In case at any time any Paying Agent other than the Trustee shall
        have been appointed by the Company and be then acting hereunder, the term
        &#8220;Trustee&#8221; as used in this Article shall in such case (unless the
        context\n            otherwise requires) be construed as extending to and
        including such Paying Agent within its meaning as fully for all intents and
        purposes as if such Paying Agent were named in this Article in addition to
        or in place of the Trustee; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that Section 14.13 shall
        not apply to the Company or any Affiliate of the Company if it or such Affiliate
        acts as Paying Agent.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">This instrument may be executed in any number of counterparts, each
        of which so executed shall be deemed an original, but all such counterparts
        shall together constitute but one and the same instrument.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">IN WITNESS WHEREOF, the parties
