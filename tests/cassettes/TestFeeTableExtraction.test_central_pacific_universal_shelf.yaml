        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">To the extent
        that a director, officer, employee or agent of the Company or of any division
        of the Company, or a person serving at the request of the Company as a director,
        officer, employee or agent of another corporation, partnership, joint venture,
        trust or other enterprise has been successful on the merits or otherwise in
        defense of any action, suit or proceeding referred to in the above two paragraphs,
        or in defense of any claim, issue or matter therein, our Bylaws, as amended,
        require that we indemnify him or her against expenses (including attorneys&#8217;
        fees) actually and reasonably incurred by him or her in connection therewith.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">Nevertheless, pursuant to our Bylaws,
        as amended, unless ordered by a court, any indemnification pursuant to the
        bylaw provisions summarized above must be authorized in the specific case
        by a determination that indemnification of the director, officer, employee
        or agent is proper in the circumstances because he or she has met the applicable
        standard of conduct set forth in the applicable provisions of our Bylaws,
        as amended. Such determination shall be made: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">by the Board of Directors by a majority vote of a quorum consisting
        of directors who were not parties to such action, suit or proceeding, or </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">if such a quorum is not obtainable,
        or even if obtainable a quorum of disinterested directors so directs, by independent
        legal counsel in a written opinion to the corporation, or </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">by a majority vote of the shareholders.
        </div></td></tr></table><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Our Bylaws,
        as amended, provide that expenses incurred in defending a civil or criminal
        action, suit or proceeding may be paid by the Company in advance of the final
        disposition of such action, suit or proceeding as authorized by the Board
        of Directors in a particular case upon receipt of an undertaking by or on
        behalf of the director, officer, employee or agent to repay such amount unless
        it shall ultimately be determined that he or she is entitled to be indemnified
        by the Company. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Any indemnification pursuant to
        our Bylaws, as amended, shall not be deemed exclusive of any other rights
        to which those seeking indemnification may be entitled and shall continue
        as to the person who has ceased to be a director, officer, employee or agent
        and shall inure to the benefit of the heirs, executors and administrators
        of such a person. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The indemnification
        provisions in our Bylaws, as amended, are effective with respect to any person
        who is a director, officer, employee or agent of the Company at any time on
        or after the date of incorporation of the Company with respect to any action,
        suit or proceeding pending on or after that date, by reason of the fact that
        he or she is or was, before or after that date, a director, officer, employee
        or agent of the Company or is or was serving, before or after that date, at
        the request of the Company as a director, officer, employee or agent of another
        corporation, partnership, joint venture, trust or other enterprise. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We have purchased insurance on behalf of any person
        who is or was a director, officer, employee or agent of the Registrant, or
        is or was serving at the request of the Registrant as a director, officer,
        employee or agent of another corporation, partnership, joint venture, trust
        or other enterprise against any liability asserted against him or her and
        incurred by him or her in any such capacity, or arising out of his or her
        status as such, whether or not we would have the power to indemnify him or
        her against such liability under the provisions of our Bylaws, as amended.
        </div></div></div><div class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top:
