        \     </div>\n      <div></div>\n      <div>Section 1.12&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Governing Law</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">This Indenture and the Securities
        shall be governed by and construed in accordance with the law of the State
        of New York.</div>\n      <div>&#160;</div>\n      <div><a name=\"z_Toc126057168\"></a>Section
        1.13&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Legal Holidays</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">In any case
        where any Interest Payment Date, Redemption Date or Stated Maturity of any
        Security shall not be a Business Day at any Place of Payment, then (notwithstanding
        any other provision of this Indenture or of the\n        Securities (other
        than a provision of any Security which specifically states that such provision
        shall apply in lieu of this Section)) payment of interest or principal (and
        premium, if any) need not be made at such Place of Payment on such date,\n
        \       but may be made on the next succeeding Business Day at such Place
        of Payment with the same force and effect as if made on the Interest Payment
        Date or Redemption Date, or at the Stated Maturity, <font style=\"font-style:
        italic;\">provided </font>that\n\n\n        no interest shall accrue with
        respect to such payment for the period from and after such Interest Payment
        Date, Redemption Date or Maturity, as the case may be to the date of such
        payment.</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\"><a
        name=\"z_Toc126057169\"></a>ARTICLE 2</div>\n      <div>&#160;</div>\n      <div
        style=\"text-align: center;\">SECURITY FORMS</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057170\"></a>Section 2.01&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Forms Generally</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Securities of each series shall
        be in substantially the form set forth in this Article, or in such other form
        as shall be established by or pursuant to a Board Resolution or in one or
        more indentures supplemental\n        hereto, in each case with such appropriate
        insertions, omissions, substitutions and other variations as are required
        or permitted by this Indenture, and may have such letters, numbers or other
        marks of identification and such legends or\n        endorsements placed thereon
        as may be required to comply with the rules of any securities exchange or
        Depositary therefor or as may, consistently herewith, be determined by the
