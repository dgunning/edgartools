        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\"><u>Certain Remedies If an Event of Default Occurs</u><font style=\"font-style:
        normal;\"><u>.</u></font> If you are the holder of a subordinated debt security,
        all the remedies available upon the occurrence of an event of default under
        the subordinated debt indenture will be subject to the restrictions on the
        subordinated debt securities described above under &#8220;&#8212;Subordination
        Provisions.&#8221;<font style=\"font-style: normal;\"> </font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        situations described above are called an acceleration of the maturity of the
        affected series of debt securities. If the maturity of any series is accelerated,
        a judgment for payment has not yet been obtained, we pay or deposit with the
        trustee an amount sufficient to pay all amounts due on the securities of the
        series, and all events of default with respect to the series, other than the
        nonpayment of the accelerated principal, have been cured or waived, then the
        holders of a majority in principal amount of the outstanding debt securities
        of that series may cancel the acceleration for the entire series. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">If an event of default occurs, the trustee will
        have special duties. In that situation, the trustee will be obligated to use
        those of its rights and powers under the relevant indenture, and to use the
        same degree of care and skill in so doing, that a prudent person would use
        in that situation in conducting his or her own affairs. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Except
        as described in the prior paragraph, the trustee will not be required to take
        any action under the relevant indenture at the request of any holders unless
        the holders offer the trustee reasonable protection from expenses and liability.
        This is called an indemnity. If the trustee is provided with an indemnity
        reasonably satisfactory to it, the holders of a majority in principal amount
        of all debt securities of the relevant series may direct the time, method
        and place of conducting any lawsuit or other formal legal action seeking any
        remedy available to the trustee with respect to that series. These majority
        holders may also direct the trustee in performing any other action under the
        applicable indenture with respect to the debt securities of that series. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Before you are permitted to bypass the trustee and
        bring your own lawsuit or other formal legal action or take other steps to
        enforce your rights or protect your interests relating to any debt security,
        all of the following must occur: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">The holder of your debt security must give the trustee written notice
        of a continuing event of default; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">The holders of not less than 25% in principal amount
        of all debt securities of your series must make a written request that the
        trustee take action because of the default, and they or other holders must
        offer to the trustee indemnity reasonably satisfactory to the trustee against
        the cost and other liabilities of taking that action; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">The trustee must not have taken
        action for 60 days after the above steps have been taken; and </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">During those 60 days, the holders
        of a majority in principal amount of the debt securities of your series must
        not have given the trustee directions that are inconsistent with the written
        request of the holders of not less than 25% in principal amount of the debt
        securities of your series. </div></td></tr></table><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">You
        will be entitled at any time, however, to bring a lawsuit for the payment
        of money due on your debt security on or after its due date. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\"><u>Waiver of Default</u>.<font style=\"font-style:
        normal;\"> The holders of a majority in principal amount of the outstanding
        debt securities of a series may waive a default for all debt securities of
        that series. If this happens, the default will be treated as if it has not
        occurred. No one can waive a payment default on your debt security or a covenant
        or provision of the indenture that cannot be modified or amended without the
        consent of the holder of each outstanding debt security of the series, however,
        without the approval of the particular holder of that debt security. </font></div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\"><u>We Will Give the Trustee Information
        About Defaults Annually.</u><font style=\"font-style: normal;\"> We will furnish
        to each trustee every year a written statement of two of our officers certifying
        that to their knowledge we are in compliance with the applicable indenture
        and the debt securities issued under it, or else specifying any default under
        the indenture. </font></div></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">25<br></div></div></div>\n<!--End
        Page 28-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
