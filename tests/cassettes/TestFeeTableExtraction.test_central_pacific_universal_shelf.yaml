        and Assigns</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">All covenants and agreements in this Indenture by the Company shall
        bind its successors and assigns, whether so expressed or not.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057165\"></a>Section 1.10&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Separability Clause</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In case any provision in this Indenture
        or in the Securities shall be invalid, illegal or unenforceable, the validity,
        legality and enforceability of the remaining provisions shall not in any way
        be affected or\n        impaired thereby.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057166\"></a>Section 1.11&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Benefits of Indenture</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Nothing in
        this Indenture or in the Securities, express or implied, shall give to any
        Person, other than the parties hereto and their successors hereunder, the
        holders of Senior Debt and the Holders, any benefit or any\n        legal
        or equitable right, remedy or claim under this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div><a name=\"z_Toc126057167\"></a></div>\n      <div style=\"clear:
