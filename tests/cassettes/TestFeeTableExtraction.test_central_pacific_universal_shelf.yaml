        36pt;\">Any request, demand, authorization, direction, notice, consent, waiver
        or other action provided or permitted by this Indenture to be given, made
        or taken by Holders may be embodied in and evidenced by one or more\n        instruments
        of substantially similar tenor signed by such Holders in person or by agent
