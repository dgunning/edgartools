        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">the interested shareholder and
        recommended to the Board of Directors by a majority of such directors. This
        voting requirement will also not apply to any transaction involving the payment
        of consideration to holders of our outstanding Common Stock in which certain
        minimum &#8220;fair price&#8221; and procedural requirements are met. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">This &#8220;fair price&#8221; provision could have
        the effect of delaying or preventing a change in control of our company in
        a transaction of series of transactions that does not satisfy the stated criteria.
        </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        20.5pt; margin-left: 20pt; text-align: left;\"><u>Preferred Stock</u><font
        style=\"font-style: italic; font-weight: normal;\">.</font></div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Our
        Restated Articles of Incorporation allow the Board of Directors to issue up
        to 1,000,000 shares of preferred stock, no par value per share. The Board
        of Directors also has the authority to designate the rights, preferences,
        privileges and restrictions of such preferred stock, including dividend rights,
        dividend rates, conversion rights, voting rights, terms of redemption, redemption
        prices, liquidation preferences and the number of shares constituting any
        series. The issuance of preferred stock may have the effect of delaying, deterring
        or preventing a change of control of our company without further action by
        the shareholders. The issuance of preferred stock with voting and conversion
        rights may also adversely affect the voting power of the holders of Common
        Stock. In certain circumstances, an issuance of preferred stock could have
        the effect of decreasing the market price of our Common Stock. </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">13<br></div></div></div>\n<!--End Page 16-->\n<div class=\"BRPFPageBreakArea\"
