        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg17\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6.75pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Book-entry and other indirect owners should consult their banks or
        brokers for information on how to give notice or direction to or make a request
        of the trustee and how to declare or cancel an acceleration of the maturity.
        Book-entry and other indirect owners are described below in the section entitled
        &#8220;Legal Ownership and Book-Entry Issuance.&#8221;<font style=\"font-style:
        normal;\"> </font></div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        12pt; margin-left: 0pt; text-align: left;\">Changes of the Indentures Requiring
        Each Holder&#8217;s Approval </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">There are certain
        changes that will not be permitted without the approval of each holder of
        a debt security affected by the change under a particular indenture. Here
        is a list of those types of changes: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">changing the stated maturity for any principal or interest payment
        on a debt security; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">reduction in the principal amount or the interest rate or the premium
        payable upon the redemption of any debt security; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">reduction in the amount of principal
        of an original issue discount security or any other debt security payable
        upon acceleration of its maturity; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">changing the currency of any payment on a debt security;
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">changing the
        place of payment on a debt security; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">changes that would impair a holder&#8217;s right
        to sue for payment of any amount due on its debt security; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">reduction in the percentage in
        principal amount of the debt securities of any series, the approval of whose
        holders is needed to change the applicable indenture or those debt securities;
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">reduction in
        the percentage in principal amount of the debt securities of any series, the
        consent of whose holders is needed to waive our compliance with the applicable
        indenture or to waive defaults; and </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">change in the provisions of the applicable indenture
        dealing with modification and waiver in any other respect, except to increase
        any required percentage referred to above or to add to the provisions that
        cannot be changed or waived without approval of the holder of each affected
        debt security. </div></td></tr></table><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 12pt; margin-left: 0pt; text-align: left;\">Modification
        of Subordination Provisions </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We will not
        be permitted to amend the subordinated debt indenture to alter the subordination
        of any outstanding subordinated debt securities without the written consent
        of each holder of senior debt then outstanding who would be adversely affected.
        In addition, we will not be permitted to modify the subordination provisions
        of the subordinated debt indenture in a manner that would adversely affect
        the outstanding subordinated debt securities of any one or more series in
        any material respect, without the consent of the holders of a majority in
        aggregate principal amount of all affected series, voting together as one
        class. </div><div class=\"BRDSX_h2\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-weight: bold; margin-top:
        12pt; margin-left: 0pt; text-align: left;\">Changes of the Indentures Not
        Requiring Approval </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Other types
        of changes will not require any approval by holders of the debt securities
        of an affected series. These changes include modifications or amendments for
        the following purposes: </div><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">to evidence
        the succession of another person to us as obligor under the applicable indenture
        or to evidence the addition or release of any guarantor in accordance with
        the applicable indenture or any supplemental indenture; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to add to our covenants for the
        benefit of the holders of all or any series of debt securities or to surrender
        any right or power conferred upon us in the applicable indenture; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to add events of default for the
        benefit of the holders of all or any series of debt securities; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to add or change any provisions
        of the applicable indenture to facilitate the issuance of, or to liberalize
        specific terms of, debt securities in bearer form, or to permit or facilitate
        the issuance of debt securities in uncertificated form, provided that the
        action will not adversely affect the interests of the holders of the debt
        securities of any series in any material respect; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to change or eliminate any provisions
        of an indenture, if the change or elimination becomes effective only when
        there are no debt securities outstanding of any series created prior to the
        change or elimination that are entitled to the benefit of the changed or eliminated
        provision; </div></td></tr></table></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
