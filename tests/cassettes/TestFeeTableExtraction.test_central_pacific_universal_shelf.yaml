        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div></div>\n      <div style=\"text-indent: 36pt;\">In
        case by reason of the suspension of regular mail service or by reason of any
        other cause it shall be impracticable to give such notice by mail, then such
        notification as shall be made with the approval of the\n        Trustee shall
        constitute a sufficient notification for every purpose hereunder.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Where this
        Indenture provides for notice of any event to a Holder of a Global Security,
        such notice shall be sufficiently given if given to the Depositary for such
