        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>Section 1.03&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Form of Documents Delivered to Trustee</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In any case where several matters
        are required to be certified by, or covered by an opinion of, any specified
        Person, it is not necessary that all such matters be certified by, or covered
        by the opinion of, only one\n        such Person, or that they be so certified
        or covered by only one document, but one such Person may certify or give an
        opinion with respect to some matters and one or more other such Persons as
        to other matters, and any such Person may certify or\n        give an opinion
        as to such matters in one or several documents.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Any certificate or opinion of an officer
        of the Company may be based, insofar as it relates to legal matters, upon
        a certificate or opinion of, or representations by, counsel, unless such officer
        knows, or in the\n        exercise of reasonable care should know, that the
        certificate or opinion or representations with respect to the matters upon
        which his certificate or opinion is based are erroneous. Any such certificate
        or opinion of counsel may be based, insofar\n        as it relates to factual
        matters, upon a certificate or opinion of, or representations by, an officer
        or officers of the Company stating that the information with respect to such
        factual matters is in the possession of the Company, unless such\n        counsel
        knows, or in the exercise of reasonable care should know, that the certificate
        or opinion or representations with respect to such matters are erroneous.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Where any
        Person is required to make, give or execute two or more applications, requests,
        consents, certificates, statements, opinions or other instruments under this
        Indenture, they may, but need not, be consolidated\n        and form one instrument.</div>\n
        \     <div>&#160;</div>\n      <div><a name=\"z_Toc126057159\"></a>Section
