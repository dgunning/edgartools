        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tPOD\"><!--Anchor--></a>PLAN
        OF DISTRIBUTION </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 7.5pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">We may offer and sell the securities
        from time to time as follows: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">directly to one or more purchasers; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">through agents; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">to or through dealers or underwriters;
        </div></td></tr></table><table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"
        style=\"border-spacing: 0; margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width:
        20pt; text-align: left; vertical-align: top;\"><div style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td
        style=\"vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; text-align: left;\">directly to
        its shareholders; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">directly to holders of warrants exercisable for our securities upon
        the exercise of such warrants; </div></td></tr></table><table border=\"0\"
        cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0; margin-top:
        6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; text-align: left;\">directly to other purchasers; or </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">through a combination of any of
        these methods of sale or any other method permitted by applicable law. </div></td></tr></table><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">In addition, the securities may be issued as a dividend
        or distribution or in a subscription rights offering to existing holders of
        securities. In some cases, we may also repurchase securities and reoffer them
        to the public by one or more of the methods described above. The applicable
        prospectus supplement will provide additional information regarding the plan
        of distribution of the securities offered thereby. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        securities we distribute by any of these methods may be sold to the public,
        in one or more transactions, either: </div><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">at a fixed price or prices, which may be changed; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">at market prices prevailing at
        the time of sale; </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">at prices related to prevailing market prices; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">at prices determined by an auction
        process; or </div></td></tr></table><table border=\"0\" cellpadding=\"0\"
        cellspacing=\"0\" style=\"border-spacing: 0; margin-top: 6pt; margin-left:
        20pt;\"><tr><td style=\"width: 20pt; text-align: left; vertical-align: top;\"><div
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt;\">&#8226;</div></td><td style=\"vertical-align: top;\"><div style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; text-align:
        left;\">at negotiated prices. </div></td></tr></table><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We
        may solicit offers to purchase securities directly from the public from time
        to time. We may also designate agents from time to time to solicit offers
        to purchase securities from the public on our behalf. If required, the prospectus
        supplement relating to any particular offering of securities will name any
        agents designated to solicit offers, and will include information about any
        commissions we may pay the agents, in that offering. Agents may be deemed
        to be &#8220;underwriters&#8221; as that term is defined in the Securities
        Act of 1933, as amended (the &#8220;Securities Act&#8221;). </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">From
        time to time, we may sell securities to one or more dealers as principals.
        The dealers, who may be deemed to be &#8220;underwriters&#8221; as that term
        is defined in the Securities Act, may then resell those securities to the
        public. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">We may sell securities from time
        to time to one or more underwriters, who would purchase the securities as
        principal for resale to the public, either on a firm-commitment or best-efforts
        basis. If we sell securities to underwriters, we will execute an underwriting
        agreement with them at the time of sale and will name them in the applicable
        prospectus supplement. In connection with those sales, underwriters may be
        deemed to have received compensation from us in the form of underwriting discounts
        or commissions and may also receive commissions from purchasers of the securities
        for whom they may act as agents. Underwriters may resell the securities to
        or through dealers, and those dealers may receive compensation in the form
        of discounts, concessions or commissions from the underwriters and/or commissions
        from purchasers for whom they may act as agents. The applicable prospectus
        supplement will include any required information about any underwriting compensation
        we pay to underwriters, and any discounts, concessions or commissions underwriters
        allow to participating dealers, in connection with an offering of securities.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">If we offer securities in a subscription
        rights offering to our existing securityholders, we may enter into a standby
        underwriting agreement with dealers, acting as standby underwriters. We may
        pay the standby underwriters a commitment fee for the securities they commit
        to purchase on a standby basis. Additionally, before the expiration date for
        the subscription rights, the standby underwriters may offer the securities,
        including securities they may acquire through the purchase and exercise of
        subscription rights, on a when-issued basis at prices set from time to time
        by them. After the expiration date, the standby underwriters may offer the
        securities, </div></div></div><div class=\"BRDSX_block-frill\" style=\"width:
        468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">44<br></div></div></div>\n<!--End
        Page 47-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 48-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_112-plan_pg2\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">whether acquired under the standby
        underwriting agreement, on exercise of subscription rights or by purchase
        in the market, to the public at prices to be determined by them. Thus, standby
        underwriters may realize profits or losses independent of the underwriting
        discounts or commissions we may pay them. If we do not enter into a standby
        underwriting arrangement, we may retain a dealer-manager to manage a subscription
        rights offering for us. Any dealer-manager we retain may acquire securities
        by purchasing and exercising the subscription rights and resell the securities
        to the public at prices it determines. As a result, a dealer-manager may realize
        profits or losses independent of any dealer-manager fee paid by us. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We may authorize underwriters, dealers and agents
        to solicit from third parties offers to purchase securities under contracts
        providing for payment and delivery on future dates. The third parties with
        whom we may enter into contracts of this kind may include banks, insurance
        companies, pension funds, investment companies, educational and charitable
        institutions, and others. The applicable prospectus supplement will describe
        the material terms of these contracts, including any conditions to the purchasers&#8217;
        obligations and will include any required information about any commissions
        we may pay for soliciting these contracts. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We
        may enter into derivative transactions with third parties, or sell securities
        not covered by this prospectus to third parties in privately negotiated transactions.
        If the applicable prospectus supplement indicates, in connection with those
        derivatives, the third parties may sell securities covered by this prospectus
        and the applicable prospectus supplement, including in short sale transactions.
        If so, the third party may use securities pledged by us or borrowed from us
        or others to settle those sales or to close out any related open borrowings
        of stock, and may use securities received from us in settlement of those derivatives
        to close out any related open borrowings of stock. The third party in such
        sale transactions will be an underwriter and will be identified in the applicable
        prospectus supplement (or a post-effective amendment). </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Underwriters,
        dealers, agents and other persons may be entitled, under agreements that they
        may enter into with us, to indemnification by us against civil liabilities,
        including liabilities under the Securities Act. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Underwriters
        may engage in over-allotment, stabilizing and syndicate covering transactions
        in accordance with Rule&#160;104 of Regulation M. Rule&#160;104 permits stabilizing
        bids to purchase the securities being offered as long as the stabilizing bids
        do not exceed a specified maximum. Underwriters may over-allot the offered
        securities in connection with the offering, thus creating a short position
        in their account. Syndicate covering transactions involve purchases of the
        offered securities by underwriters in the open market after the distribution
        has been completed in order to cover syndicate short positions. Stabilizing
        and syndicate covering transactions may cause the price of the offered securities
        to be higher than it would otherwise be in the absence of these transactions.
        These transactions, if commenced, may be discontinued at any time. </div><div
