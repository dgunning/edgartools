        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_h1\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tACP\"><!--Anchor--></a>ABOUT
        CENTRAL PACIFIC FINANCIAL CORP. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Central Pacific
        Financial Corp., a Hawaii corporation and bank holding company registered
        under the Bank&#160;Holding Company Act of 1956, as amended (the &#8220;BHC
        Act&#8221;), was organized on February&#160;1, 1982. Our principal business
        is to serve as a holding company for our bank subsidiary, Central Pacific
        Bank, which was incorporated in its present form in the state of Hawaii on
        March&#160;16, 1982 in connection with the holding company reorganization.
        Its predecessor entity was incorporated in the state of Hawaii on January&#160;15,
        1954. We provide financial results based on a fiscal year ending December&#160;31
        as a single reportable segment. As of March&#160;31, 2025, we had total assets
        of $7.41&#160;billion, total loans of $5.33&#160;billion, total deposits of
        $6.60&#160;billion and shareholders' equity of $557.4&#160;million. Through
        our Bank and its subsidiaries, we offer full-service commercial banking with
        27 bank branches and 55 ATMs located throughout the state of Hawaii. Our administrative
        and main offices are located in Honolulu and we have 20 branches on the island
        of Oahu. We operate 4 branches on the island of Maui, 2 branches on the island
        of Hawaii and 1 branch on the island of Kauai. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Central
        Pacific Bank is a full-service commercial bank offering traditional deposit
        and lending products and services to consumer and business customers, such
        as accepting demand, money market, savings and time deposits, originating
        loans, including commercial loans, construction loans, commercial real estate
        loans, residential mortgage loans, and consumer loans and fiduciary and investment
        management services. Our Bank&#8217;s deposits are insured by the Federal
        Deposit Insurance Corporation (&#8220;FDIC&#8221;) up to applicable limits.
        The Bank became a member of the Federal Reserve System in January&#160;2025.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">We derive our income primarily from
        interest and fees on loans, interest on investment securities and fees received
        in connection with deposit and other services. Our major operating expenses
        are the interest paid by our Bank on deposits and borrowings, salaries and
        employee benefits and general operating expenses. Our Bank relies substantially
        on a foundation of locally generated deposits. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Our
        principal executive offices are located at 220 South King Street, Honolulu,
        Hawaii 96813 and our telephone number is (808) 544-0500. Our internet address
        is www.cpb.bank. Information on, or accessible through, our website is not
        part of this prospectus. </div></div></div><div class=\"BRDSX_block-frill\"
