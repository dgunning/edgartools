        style=\"text-indent: 36pt;\">&#8220;U.S. Government Obligation&#8221; has
        the meaning specified in Section 13.04.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Vice President&#8221;, when used with
        respect to the Company or the Trustee, means any vice president, whether or
        not designated by a number or a word or words added before or after the title
        &#8220;vice president&#8221;.</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057157\"></a>Section 1.02&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Compliance Certificates and Opinions</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Upon any application or request by
        the Company to the Trustee to take any action under any provision of this
        Indenture, the Company shall furnish to the Trustee such certificates and
        opinions as may be required under\n        the Trust Indenture Act. Each such
        certificate or opinion shall be given in the form of an Officers&#8217; Certificate,
        if to be given by an officer of the Company, or an Opinion of Counsel, if
        to be given by counsel, and shall comply with the\n        requirements of
        the Trust Indenture Act and any other requirements set forth in this Indenture.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Every certificate
        or opinion with respect to compliance with a condition or covenant provided
        for in this Indenture (except for certificates provided for in Section 10.04)
        shall include,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160; a statement that each individual
        signing such certificate or opinion has read such covenant or condition and
        the definitions herein relating thereto;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;
        a brief statement as to the nature and scope of the examination or investigation
        upon which the statements or opinions contained in such certificate or opinion
        are based;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160; a statement that, in the opinion
        of each such individual, he or she has made such examination or investigation
        as is necessary to enable him or her to express an informed opinion as to
        whether or not such\n        covenant or condition has been complied with;
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;
        a statement as to whether, in the opinion of each such individual, such condition
        or covenant has been complied with.</div>\n      <div>&#160;</div>\n      <div><a
        name=\"z_Toc126057158\"></a></div>\n      <div style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div style=\"text-align:
