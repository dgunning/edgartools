        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"text-align: center;\" class=\"BRPFPageNumberArea\"><font
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\" class=\"BRPFPageNumber\">43</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">The rights of Holders
        to communicate with other Holders with respect to their rights under this
        Indenture or under the Securities, and the corresponding rights and privileges
        of the Trustee, shall be as provided by the\n        Trust Indenture Act.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Every Holder
        of Securities, by receiving and holding the same, agrees with the Company
        and the Trustee that neither the Company nor the Trustee nor any agent of
