        bold; margin-top: 6.75pt; text-align: center;\"><a name=\"tCEC\"><!--Anchor--></a>CERTAIN
        ERISA CONSIDERATIONS </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">A fiduciary
        of a (i) pension, profit-sharing or other employee benefit plan subject to
        the Employee Retirement Income Security Act of 1974, as amended (&#8220;ERISA&#8221;),
        or (ii) an entity whose underlying assets include &#8220;plan assets&#8221;
        by reason of such plan&#8217;s investment in the entity above a statutory
        threshold (each a &#8220;Plan&#8221; and collectively, &#8220;Plans&#8221;),
        should consider the fiduciary standards of ERISA in the context of the Plan&#8217;s
        particular circumstances before authorizing an investment in the securities.
        Among other factors, the fiduciary should consider whether the investment
        would satisfy the prudence and diversification requirements of ERISA and would
        be consistent with the documents and instruments governing the Plan, and whether
        the investment would involve a prohibited transaction under ERISA or the U.S.
        Internal Revenue Code of 1986, as amended (the &#8220;Code&#8221;). </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Section&#160;406 of ERISA and Section&#160;4975
        of the Code prohibit Plans, as well as individual retirement accounts and
        arrangements, Keogh plans and other plans that are subject to Section&#160;4975
        of the Code (also &#8220;Plans&#8221;), from engaging in certain transactions
        involving &#8220;plan assets&#8221; with persons who are &#8220;parties in
        interest&#8221; under ERISA or &#8220;disqualified persons&#8221; under the
        Code with respect to the Plan. A violation of these prohibited transaction
        rules may result in excise tax or other liabilities under ERISA or the Code
        for those persons, unless exemptive relief is available under an applicable
        statutory, regulatory or administrative exemption. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        acquisition and holding of the securities by a Plan with respect to which
        Central Pacific or any of its respective affiliates is or becomes a party
        in interest or disqualified person may result in a prohibited transaction
        under ERISA or Section&#160;4975 of the Code, unless the securities are acquired
        and held in compliance with the applicable provisions of ERISA and the Code
        or pursuant to an applicable exemption. The U.S. Department of Labor has issued
        various prohibited transaction class exemptions, or &#8220;PTCEs,&#8221; that
        may provide exemptive relief if required for direct or indirect prohibited
        transactions that may arise from the purchase or holding of the securities.
        These exemptions include PTCE 84-14 (for certain transactions determined by
        independent qualified professional asset managers), PTCE 90-1 (for certain
        transactions involving insurance company pooled separate accounts), PTCE 91-38
        (for certain transactions involving bank collective investment funds), PTCE
        95-60 (for transactions involving certain insurance company general accounts),
        and PTCE 96-23 (for transactions managed by in-house asset managers). Additionally,
        ERISA Section&#160;408(b)(17) and Section&#160;4975(d)(20) of the Code provide
        an exemption for the purchase and sale of the securities by a Plan, provided
        that neither Central Pacific nor any of its affiliates have or exercise any
        discretionary authority or control or render any investment advice with respect
        to the assets of the Plan, and provided further that the Plan pays no more
        and receives no less than &#8220;adequate consideration&#8221; in connection
        with the transaction (the &#8220;service provider exemption&#8221;). There
        can be no assurance that all of the conditions of any such exemptions will
        be satisfied. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Unless otherwise provided in connection
        with a particular offering of securities by Central Pacific, any purchaser,
        holder or subsequent transferee of the securities or any interest therein
        will be deemed to have represented by its purchase and holding of the securities
        or any interest therein that it either (i) is neither a Plan nor a Non-ERISA
        Arrangement and is not purchasing the securities on behalf of or with the
        assets of any Plan or Non-ERISA Arrangement or (ii) the purchase and holding
        of the securities will not constitute a non-exempt prohibited transaction
        under ERISA or the Code or a similar violation under any applicable ERISA
        Similar Laws. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Due to the complexity of these
        rules and the penalties that may be imposed upon persons involved in non-exempt
        prohibited transactions, it is important that fiduciaries and other persons
        considering investing in the securities on behalf of or with the assets of
        any Plan or Non-ERISA Arrangement consult with their counsel regarding the
        availability of exemptive relief under any of the PTCEs listed above or the
        service provider exemption and the potential consequences of any purchase
        or holding under ERISA Similar Laws, as applicable. Purchasers of the securities
        have exclusive responsibility for ensuring that their purchase and holding
        of the securities do not violate the fiduciary or prohibited transaction rules
        of ERISA or the Code or any similar provisions of ERISA Similar Laws. The
        sale of any securities to a Plan or Non-ERISA Arrangement is in no respect
        a recommendation to purchase the securities or a representation by Central
        Pacific or any of its affiliates or representatives that such an investment
        meets all relevant legal requirements with respect to investments by any such
        Plans or Non-ERISA Arrangements generally or any particular Plan or Non-ERISA
        Arrangement or that such investment is appropriate for any such Plans or Non-ERISA
        Arrangements generally or any particular Plan or Non-ERISA Arrangement. </div></div></div><div
