        of appointment by a successor trustee or facilitate the administration of
        the trusts under an indenture by more than one trustee; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
