        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        shall give notice of each resignation and each removal of the Trustee with
        respect to the Securities of any series and each appointment of a successor
        Trustee with respect to the Securities of any series to\n        all Holders
        of Securities of such series in the manner provided in Section 1.06. Each
