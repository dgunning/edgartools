        retiring Trustee; but, on the request of the Company or the successor Trustee,
        such retiring Trustee shall, upon payment of its charges, execute and deliver
        an instrument transferring to such successor Trustee all the\n        rights,
        powers and trusts of the retiring Trustee and shall duly assign, transfer
        and deliver to such successor Trustee all property and money held by such
        retiring Trustee hereunder.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">In case of the appointment hereunder of a successor Trustee with respect
