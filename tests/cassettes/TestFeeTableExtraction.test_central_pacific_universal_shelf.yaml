        (or one or\n        more Predecessor Securities) is registered at the close
        of business on a Special Record Date for the payment of such Defaulted Interest
        to be fixed by the Trustee, notice whereof shall be given to Holders of Securities
        of this series not less than\n        10 days prior to such Special Record
        Date, or be paid at any time in any other lawful manner not inconsistent with
        the requirements of any securities exchange on which the Securities of this
        series may be listed, and upon such notice as may be\n        required by
        such exchange, all as more fully provided in said Indenture.<font style=\"font-weight:
