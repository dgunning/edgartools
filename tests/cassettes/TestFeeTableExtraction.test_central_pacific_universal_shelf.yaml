        7.03&#160;&#160;&#160;&#160; <font style=\"font-style: italic;\">Reports by
        Trustee</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Trustee shall transmit to Holders such reports concerning the
        Trustee and its actions under this Indenture as may be required pursuant to
        the Trust Indenture Act at the times and in the manner provided pursuant\n
        \       thereto. Reports so required to be transmitted at stated intervals
