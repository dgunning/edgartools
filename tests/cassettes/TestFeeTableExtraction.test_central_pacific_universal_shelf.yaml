        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt; font-size:
        12pt;\"><font style=\"font-size: 10pt; font-weight: bold;\">[</font><font
        style=\"font-size: 10pt; font-style: italic;\">If applicable, insert </font><font
        style=\"font-size: 10pt;\">&#8211; The Indenture contains\n          provisions
        for defeasance at any time of the entire indebtedness of this Security or
        certain restrictive covenants and Events of Default with respect to this Security,
        in each case upon compliance with certain conditions set forth in the\n          Indenture.<font
        style=\"font-weight: bold;\">]</font></font></div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">14</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt; font-size: 12pt;\"><font style=\"font-size: 10pt; font-weight: bold;\">[</font><font
        style=\"font-size: 10pt; font-style: italic;\">If the Security is not an Original
        Issue Discount Security, insert </font><font style=\"font-size: 10pt;\">&#8211;
        If an Event of Default with respect to Securities of this series shall occur
        and be continuing, the principal of the Securities of this series may be declared
        due and payable in the manner and with the effect provided\n          in the
        Indenture.<font style=\"font-weight: bold;\">]</font></font></div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt; font-size: 12pt;\"><font style=\"font-size:
        10pt; font-weight: bold;\">[</font><font style=\"font-size: 10pt; font-style:
        italic;\">If the Security is an Original Issue Discount Security, insert </font><font
        style=\"font-size: 10pt;\">&#8211; If an Event of Default with respect to
        Securities of this series shall occur and be continuing, an amount of principal
        of the Securities of this series may be declared due and payable in the manner
        and with the effect\n          provided in the Indenture. Such amount shall
        be equal to &#8211; insert formula for determining the amount. Upon payment
        (i) of the amount of principal so declared due and payable and (ii) of interest
        on any overdue principal, premium and interest (in\n          each case to
        the extent that the payment of such interest shall be legally enforceable),
        all of the Company&#8217;s obligations in respect of the payment of the principal
        of and premium and interest, if any, on the Securities of this series shall\n
        \         terminate.<font style=\"font-weight: bold;\">]</font></font></div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Indenture
        permits, with certain exceptions as therein provided, the amendment thereof
        and the modification of the rights and obligations of the Company and the
        rights of the Holders of the Securities of each series\n        to be affected
        under the Indenture at any time by the Company and the Trustee with the consent
        of the Holders of a majority in principal amount of the Securities at the
        time Outstanding of each series to be affected. The Indenture also contains\n
        \       provisions (i) permitting the Holders of not less than a majority
        in principal amount of the Securities of any series at the time Outstanding,
        on behalf of the Holders of all Securities of such series, to waive compliance
        by the Company with\n        certain provisions of the Indenture with respect
        to such series and (ii) permitting the Holders of a majority in principal
        amount of the Securities at the time Outstanding of any series to be affected
        under the Indenture (with each such series\n        considered separately
        for this purpose), on behalf of the Holders of all Securities of such series,
        to waive certain past defaults under the Indenture and their consequences.
        Any such consent or waiver by the Holder of this Security shall be\n        conclusive
        and binding upon such Holder and upon all future Holders of this Security
        and of any Security issued upon the registration of transfer hereof or in
        exchange herefor or in lieu hereof, whether or not notation of such consent
        or waiver is\n        made upon this Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">As provided in and subject to the
        provisions of the Indenture, the Holder of this Security shall not have the
        right to institute any proceeding with respect to the Indenture, or for the
        appointment of a receiver or\n        trustee, or for any other remedy thereunder,
        unless such Holder shall have previously given the Trustee written notice
        of a continuing Event of Default with respect to the Securities of this series,
        the Holders of not less than 25% in principal\n        amount of the Securities
        of this series at the time Outstanding shall have made written request to
        the Trustee to institute proceedings in respect of such Event of Default as
        Trustee and offered the Trustee reasonable indemnity, and the Trustee\n        shall
        not have received from the Holders of a majority in principal amount of Securities
        of this series at the time Outstanding a direction inconsistent with such
        request, and shall have failed to institute any such proceeding, for 60 days
        after\n        receipt of such notice, request and offer of indemnity. The
        foregoing shall not apply to any suit instituted by the Holder of this Security
        for the enforcement of any payment of principal hereof or any premium or interest
        hereon on or after the\n        respective due dates expressed herein.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">15</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">No reference herein
        to the Indenture and no provision of this Security or of the Indenture shall
        alter or impair the obligation of the Company, which is absolute and unconditional,
        to pay the principal of and any\n        premium and interest on this Security
        at the times, place and rate, and in the coin or currency, herein prescribed.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">As provided
        in the Indenture and subject to certain limitations therein set forth, the
        transfer of this Security is registrable in the Security Register, upon surrender
        of this Security for registration of transfer at\n        the office or agency
        of the Company in any place where the principal of and any premium and interest
        on this Security are payable, duly endorsed by, or accompanied by a written
        instrument of transfer in form satisfactory to the Company and the\n        Security
        Registrar duly executed by, the Holder hereof or his attorney duly authorized
        in writing, and thereupon one or more new Securities of this series and of
        like tenor, of authorized denominations and for the same aggregate principal
        amount,\n        will be issued to the designated transferee or transferees.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Securities
        of this series are issuable only in registered form without coupons in denominations
        of $1,000 and any integral multiple thereof. As provided in the Indenture
        and subject to certain limitations therein\n        set forth, Securities
        of this series are exchangeable for a like aggregate principal amount of Securities
        of this series and of like tenor of a different authorized denomination, as
        requested by the Holder surrendering the same.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">No service charge shall be made for
        any such registration of transfer or exchange, but the Company may require
        payment of a sum sufficient to cover any tax or other governmental charge
        payable in connection therewith.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Prior to due presentment of this Security for
        registration of transfer, the Company, the Trustee and any agent of the Company
        or the Trustee may treat the Person in whose name this Security is registered
        as the owner\n        hereof for all purposes, whether or not this Security
        be overdue, and neither the Company, the Trustee nor any such agent shall
        be affected by notice to the contrary.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt; font-size: 12pt;\"><font style=\"font-size: 10pt;
        font-weight: bold;\">[</font><font style=\"font-size: 10pt; font-style: italic;\">If
        applicable, insert </font><font style=\"font-size: 10pt;\">- This Security
        is a Global\n          Security and is subject to the provisions of the Indenture
        relating to Global Securities, including the limitations in Section 3.05 thereof
        on transfers and exchanges of Global Securities.<font style=\"font-weight:
        bold;\">]</font></font></div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt; font-size: 12pt;\"><font style=\"font-size: 10pt; font-weight: bold;\">[</font><font
        style=\"font-size: 10pt; font-style: italic;\">If applicable, insert </font><font
        style=\"font-size: 10pt;\">- Interest on the principal\n          balance
        of this Security shall be calculated on the basis of a <font style=\"font-weight:
        bold;\">[</font>365- or 366-day year, as appropriate, for the actual number
        of days elapsed<font style=\"font-weight: bold;\">] [</font>360-day year of
        twelve\n          30-day months<font style=\"font-weight: bold;\">]]</font></font></div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt; font-weight:
        bold;\">THIS SECURITY SHALL BE GOVERNED BY AND CONSTRUED IN ACCORDANCE WITH
        THE LAWS OF THE STATE OF NEW YORK.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">All terms used in this Security which are defined
        in the Indenture shall have the meanings assigned to them in the Indenture.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 2.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Form of Legend for Global Securities</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Unless otherwise
        specified as contemplated by Section 3.01 for the Securities evidenced thereby,
        every Global Security authenticated and delivered hereunder shall bear a legend
        in substantially the following form:</div>\n      <div style=\"text-indent:
        36pt;\"> <br>\n      </div>\n      <div style=\"text-indent: 36pt;\">\n        <div
        style=\"text-indent: 36pt;\">This Security is a Global Security within the
        meaning of the Indenture hereinafter referred to and is registered in the
        name of a Depositary or a nominee thereof. This Security may not be exchanged
        in whole or in\n          part for a Security registered, and no transfer
        of this Security in whole or in part may be registered, in the name of any
        Person other than such Depositary or a nominee thereof, except in the limited
        circumstances described in the Indenture.</div>\n      </div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">16</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>&#160;</div>\n
        \     <div>SECTION 2.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Form of Trustee&#8217;s Certificate of Authentication</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Trustee&#8217;s
        certificates of authentication shall be in substantially the following form:</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">This is one
        of the Securities of the series designated herein and referred to in the within-mentioned
        Indenture. Dated:</div>\n      <div>&#160;</div>\n      <table style=\"font-family:
        'Times New Roman'; font-size: 10pt; width: 100%; border-collapse: collapse;
        text-align: left; color: #000000;\" id=\"zd2044edacafd4467a036db34ad73a5c1\"
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\">\n\n          <tr>\n            <td
        style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td colspan=\"3\"
        style=\"vertical-align: top;\">\n              <div>[&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ],</div>\n            </td>\n          </tr>\n          <tr>\n            <td
        rowspan=\"1\" style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td
        colspan=\"3\" rowspan=\"1\" style=\"vertical-align: top;\">&#160;</td>\n          </tr>\n
        \         <tr>\n            <td style=\"width: 50%; vertical-align: top;\">&#160;</td>\n
        \           <td colspan=\"3\" style=\"vertical-align: top;\">\n              <div
        style=\"font-style: italic;\">As Trustee</div>\n            </td>\n          </tr>\n
        \         <tr>\n            <td rowspan=\"1\" style=\"width: 50%; vertical-align:
        top;\">&#160;</td>\n            <td colspan=\"3\" rowspan=\"1\" style=\"vertical-align:
        top;\"><br>\n            </td>\n          </tr>\n          <tr>\n            <td
        style=\"width: 50%; vertical-align: top; padding-bottom: 2px;\">&#160;</td>\n
        \           <td style=\"width: 3%; vertical-align: top; padding-bottom: 2px;\">\n
        \             <div>By</div>\n            </td>\n            <td style=\"width:
        37%; vertical-align: top; border-bottom: 2px solid rgb(0, 0, 0);\"><br>\n
        \           </td>\n            <td style=\"width: 10%; vertical-align: top;
        padding-bottom: 2px;\"><br>\n            </td>\n          </tr>\n          <tr>\n
        \           <td style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td
        colspan=\"3\" style=\"vertical-align: top;\">\n              <div style=\"font-style:
        italic; margin-left: 54pt;\">Authorized Signatory</div>\n            </td>\n
        \         </tr>\n          <tr>\n            <td rowspan=\"1\" style=\"width:
        50%; vertical-align: top;\">&#160;</td>\n            <td rowspan=\"1\" colspan=\"3\"
        style=\"vertical-align: top;\">&#160;</td>\n          </tr>\n          <tr>\n
        \           <td style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td
        colspan=\"3\" style=\"vertical-align: top;\">\n              <div>ARTICLE
        THREE</div>\n            </td>\n          </tr>\n          <tr>\n            <td
        style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td colspan=\"3\"
        style=\"vertical-align: top;\">&#160;</td>\n          </tr>\n          <tr>\n
        \           <td style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td
        colspan=\"3\" style=\"vertical-align: top;\">\n              <div>THE SECURITIES</div>\n
        \           </td>\n          </tr>\n\n      </table>\n      <div> <br>\n      </div>\n
        \     <div>SECTION 3.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Amount Unlimited; Issuable in Series</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The aggregate
        principal amount of Securities which may be authenticated and delivered under
        this Indenture is unlimited.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Securities may be issued in one or more series. There shall be
        established in or pursuant to a Board Resolution and, subject to Section 3.03,
        set forth, or determined in the manner provided, in an Officers&#8217;\n        Certificate,
        or established in one or more indentures supplemental hereto, prior to the
        issuance of Securities of any series,</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        title of the Securities of the series (which shall distinguish the Securities
        of the series from Securities of any other series);</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;any
        limit upon the aggregate principal amount of the Securities of the series
        which may be authenticated and delivered under this Indenture (except for
        Securities authenticated and delivered upon\n        registration of transfer
        of, or in exchange for, or in lieu of, other Securities of the series pursuant
        to Section 3.04, 3.05, 3.06, 9.06 or 11.07 and except for any Securities which,
        pursuant to Section 3.03, are deemed never to have been\n        authenticated
        and delivered hereunder);</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Person to whom any interest on a Security of the series shall be payable,
        if other than the Person in whose name that Security (or one or more Predecessor
        Securities) is registered at the close of\n        business on the Regular
        Record Date for such interest;</div>\n      <div>&#160;</div>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">17</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        date or dates on which the principal of any Securities of the series is payable;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        rate or rates at which any Securities of the series shall bear interest, if
        any, the date or dates from which any such interest shall accrue, the Interest
        Payment Dates on which any such interest shall\n        be payable and the
        Regular Record Date for any such interest payable on any Interest Payment
        Date;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        place or places where the principal of and any premium and interest on any
        Securities of the series shall be payable and the manner in which any payment
        may be made;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(7)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        period or periods within which, the price or prices at which and the terms
        and conditions upon which any Securities of the series may be redeemed, in
        whole or in part, at the option of the Company and,\n        if other than
        by a Board Resolution, the manner in which any election by the Company to
        redeem the Securities shall be evidenced;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        obligation, if any, of the Company to redeem or purchase any Securities of
        the series pursuant to any sinking fund or analogous provisions or at the
        option of the Holder thereof and the period or\n        periods within which,
        the price or prices at which and the terms and conditions upon which any Securities
        of the series shall be redeemed or purchased, in whole or in part, pursuant
        to such obligation;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(9)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;if
        other than denominations of $1,000 and any integral multiple thereof, the
        denominations in which any Securities of the series shall be issuable;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(10)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        if the amount of principal of or any premium or interest on any Securities
        of the series may be determined with reference to an index, a financial or
        economic measure or pursuant to a formula, the manner in\n        which such
        amounts shall be determined;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(11)&#160;&#160;&#160;&#160;&#160;&#160;&#160; if other than the currency
        of the United States of America, the currency, currencies or currency units
        in which the principal of or any premium or interest on any Securities of
        the series shall be payable\n        and the manner of determining the equivalent
        thereof in the currency of the United States of America for any purpose, including
        for the purposes of making payment in the currency of the United States of
        America and applying the definition of\n        &#8220;Outstanding&#8221;
        in Section 1.01;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(12)&#160;&#160;&#160;&#160;&#160;&#160;&#160; if the principal of
        or any premium or interest on any Securities of the series is to be payable,
        at the election of the Company or the Holder thereof, in one or more currencies
        or currency units other than\n        that or those in which such Securities
        are stated to be payable, the currency, currencies or currency units in which
        the principal of or any premium or interest on such Securities as to which
        such election is made shall be payable, the periods\n        within which
        and the terms and conditions upon which such election is to be made and the
        amount so payable (or the manner in which such amount shall be determined);</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(13)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        if other than the entire principal amount thereof, the portion of the principal
        amount of any Securities of the series which shall be payable upon declaration
        of acceleration of the Maturity thereof\n        pursuant to Section 5.02;</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">18</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(14)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        if the principal amount payable at the Stated Maturity of any Securities of
        the series will not be determinable as of any one or more dates prior to the
        Stated Maturity, the amount which shall be deemed to\n        be the principal
        amount of such Securities as of any such date for any purpose thereunder or
        hereunder, including the principal amount thereof which shall be due and payable
        upon any Maturity other than the Stated Maturity or which shall be deemed\n
        \       to be Outstanding as of any date prior to the Stated Maturity (or,
        in any such case, the manner in which such amount deemed to be the principal
        amount shall be determined);</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(15)&#160;&#160;&#160;&#160;&#160;&#160;&#160; if applicable, that
        the Securities of the series, shall be subject to either or both of Defeasance
        or Covenant Defeasance as provided in Article Thirteen; <font style=\"font-style:
        italic;\">provided </font>that\n\n        no series of Securities that is
        exchangeable for Common Shares or other securities pursuant to Section 3.01(19)
        shall be subject to Defeasance pursuant to Section 13.02;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(16)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        if applicable, that any Securities of the series shall be issuable in whole
        or in part in the form of one or more Global Securities and, in such case,
        the respective Depositaries for such Global Securities,\n        the form
        of any legend or legends which shall be borne by any such Global Security
        in addition to or in lieu of that set forth in Section 2.04 and any addition
        to, elimination of or other changes in the circumstances set forth in Clause
        (2) of the\n        last paragraph of Section 3.05 in which any such Global
        Security may be exchanged in whole or in part for Securities registered, and
        any transfer of such Global Security in whole or in part may be registered,
        in the name or names of Persons other\n        than the Depositary for such
        Global Security or a nominee thereof;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(17)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        any addition to, elimination of or other change in the Events of Default which
        applies to any Securities of the series and any change in the right of the
        Trustee or the requisite Holders of such Securities\n        to declare the
        principal amount thereof due and payable pursuant to Section 5.02;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(18)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        any addition to, elimination of or other change in the covenants set forth
        in Article Ten which applies to Securities of the series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(19)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        the terms and conditions, if any, pursuant to which the Securities are exchangeable
        for Common Stock or other securities; and</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(20)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        any other terms of the series (which terms shall not be inconsistent with
        the provisions of this Indenture, except as permitted by Section 9.01(5)).</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">All Securities
        of any one series shall be substantially identical except as to denomination
        and except as may otherwise be provided in or pursuant to the Board Resolution
        referred to above and (subject to Section 3.03)\n        set forth, or determined
        in the manner provided, in the Officers&#8217; Certificate referred to above
        or in any such indenture supplemental hereto. All Securities of any one series
        need not be issued at one time and, unless otherwise provided or\n        contemplated
        by this Section 3.01 with respect to a series of Securities, additional Securities
        of a series may be issued at the option of the Company, without the consent
        of any Holder, at any time and from time to time.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If any of the terms of the series
        are established by action taken pursuant to a Board Resolution, a copy of
        an appropriate record of such action shall be certified by the Secretary or
        an Assistant Secretary of the\n        Company and delivered to the Trustee
        at or prior to the delivery of the Officers&#8217; Certificate setting forth
        the terms of the series.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">19</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 3.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Denominations</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Securities of each series shall
        be issuable only in registered form without coupons and only in such denominations
        as shall be specified as contemplated by Section 3.01. In the absence of any
        such specified\n        denomination with respect to the Securities of any
        series, the Securities of such series shall be issuable in denominations of
        $1,000 and any integral multiple thereof.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 3.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Execution, Authentication, Delivery and Dating</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Securities
        shall be executed on behalf of the Company by the Chairman of the Board, the
        Vice Chairman of the Board, the President or one of the Vice Presidents, under
        the trust seal reproduced thereon attested by\n        the Secretary, one
        of the Assistant Secretaries or other authorized Person of the Company. The
        signature of any of these officers on the Securities may be manual or facsimile.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Securities
        bearing the manual or facsimile signatures of individuals who were at any
        time the proper officers of the Company shall bind the Company, notwithstanding
        that such individuals or any of them have ceased to\n        hold such offices
        prior to the authentication and delivery of such Securities or did not hold
        such offices at the date of such Securities.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">At any time and from time to time
        after the execution and delivery of this Indenture, the Company may deliver
        Securities of any series executed by the Company to the Trustee for authentication,
        together with a Company\n        Order for the authentication and delivery
        of such Securities, and the Trustee in accordance with the Company Order shall
        authenticate and deliver such Securities. If the form or terms of the Securities
        of the series have been established by or\n        pursuant to one or more
        Board Resolutions as permitted by Sections 2.01 and 3.01, in authenticating
        such Securities, and accepting the additional responsibilities under this
        Indenture in relation to such Securities, the Trustee shall be entitled to\n
        \       receive, and (subject to Section 6.01) shall be fully protected in
        relying upon, an Opinion of Counsel stating,</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;if
        the form of such Securities has been established by or pursuant to Board Resolution
        as permitted by Section 2.01, that such form has been established in conformity
        with the provisions of this Indenture;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;if
        the terms of such Securities have been established by or pursuant to Board
        Resolution as permitted by Section 3.01, that such terms have been established
        in conformity with the provisions of this\n        Indenture; and</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;that
        such Securities, when authenticated and delivered by the Trustee and issued
        by the Company in the manner and subject to any conditions specified in such
        Opinion of Counsel, will constitute valid and\n        legally binding obligations
        of the Company enforceable in accordance with their terms, subject to bankruptcy,
        insolvency, fraudulent transfer, reorganization, moratorium and similar laws
        of general applicability relating to or affecting creditors&#8217;\n        rights
        and to general equity principles.</div>\n      <div>&#160;</div>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">20</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">If such form or terms have been so established, the Trustee shall
        not be required to authenticate such Securities if the issue of such Securities
        pursuant to this Indenture will affect the Trustee&#8217;s own rights, duties\n
        \       or immunities under the Securities and this Indenture or otherwise
        in a manner which is not reasonably acceptable to the Trustee.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Notwithstanding the provisions of
        Section 3.01 and of the preceding paragraph, if all Securities of a series
        are not to be originally issued at one time, including where the size of an
        Outstanding series of Securities\n        is increased as contemplated by
        Section 3.01, it shall not be necessary to deliver the Officers&#8217; Certificate
        otherwise required pursuant to Section 3.01 or the Company Order and Opinion
        of Counsel otherwise required pursuant to such preceding\n        paragraph
        at or prior to the authentication of each Security of such series if such
        documents are delivered at or prior to the authentication upon original issuance
        of the first Security of such series to be issued.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Each Security shall be dated the date
        of its authentication.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">No Security shall be entitled to any benefit under this Indenture
        or be valid or obligatory for any purpose unless there appears on such Security
        a certificate of authentication substantially in the form provided for\n        herein
        executed by the Trustee by manual signature, and such certificate upon any
        Security shall be conclusive evidence, and the only evidence, that such Security
        has been duly authenticated and delivered hereunder. Notwithstanding the foregoing,\n
        \       if any Security shall have been authenticated and delivered hereunder
        but never issued and sold by the Company, and the Company shall deliver such
        Security to the Trustee for cancellation as provided in Section 3.09, for
        all purposes of this\n        Indenture such Security shall be deemed never
        to have been authenticated and delivered hereunder and shall never be entitled
        to the benefits of this Indenture.</div>\n      <div>&#160;</div>\n      <div>SECTION
        3.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Temporary Securities</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Pending the preparation of definitive Securities
        of any series, the Company may execute, and upon Company Order the Trustee
        shall authenticate and deliver, temporary Securities which are printed, lithographed,\n
        \       typewritten, mimeographed or otherwise produced, in any authorized
        denomination, substantially of the tenor of the definitive Securities in lieu
        of which they are issued and with such appropriate insertions, omissions,
        substitutions and other\n        variations as the officers executing such
        Securities may determine, as evidenced by their execution of such Securities.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If temporary
        Securities of any series are issued, the Company will cause definitive Securities
        of that series to be prepared without unreasonable delay. After the preparation
        of definitive Securities of such series,\n        the temporary Securities
        of such series shall be exchangeable for definitive Securities of such series
        upon surrender of the temporary Securities of such series at the office or
        agency of the Company in a Place of Payment for that series, without\n        charge
        to the Holder. Upon surrender for cancellation of any one or more temporary
        Securities of any series, the Company shall execute and the Trustee shall
        authenticate and deliver in exchange therefor one or more definitive Securities
        of the same\n        series, of any authorized denominations and of like tenor
        and aggregate principal amount. Until so exchanged, the temporary Securities
        of any series shall in all respects be entitled to the same benefits under
        this Indenture as definitive\n        Securities of such series and tenor.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">21</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>SECTION 3.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Registration, Registration of Transfer and Exchange</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        shall cause to be kept at the Corporate Trust Office of the Trustee a register
        (the register maintained in such office and in any other office or agency
        of the Company in a Place of Payment being herein\n        sometimes collectively
        referred to as the &#8220;Security Register&#8221;) in which, subject to such
        reasonable regulations as it may prescribe, the Company shall provide for
        the registration of Securities and of transfers of Securities. The Trustee
        is hereby\n        appointed &#8220;Security Registrar&#8221; for the purpose
        of registering Securities and transfers of Securities as herein provided.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Upon surrender
        for registration of transfer of any Security of a series at the office or
        agency of the Company in a Place of Payment for that series, the Company shall
        execute, and the Trustee shall authenticate and\n        deliver, in the name
        of the designated transferee or transferees, one or more new Securities of
        the same series, of any authorized denominations and of like tenor and aggregate
        principal amount.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">At the option of the Holder, Securities of any series may be exchanged
        for other Securities of the same series, of any authorized denominations and
        of like tenor and aggregate principal amount, upon surrender of the\n        Securities
        to be exchanged at such office or agency. Whenever any Securities are so surrendered
        for exchange, the Company shall execute, and the Trustee shall authenticate
        and deliver, the Securities which the Holder making the exchange is entitled\n
        \       to receive.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">All Securities issued upon any registration of transfer or exchange
        of Securities shall be the valid obligations of the Company, evidencing the
        same debt, and entitled to the same benefits under this Indenture, as the\n
        \       Securities surrendered upon such registration of transfer or exchange.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Every Security
        presented or surrendered for registration of transfer or for exchange shall
        (if so required by the Company or the Trustee) be duly endorsed, or be accompanied
        by a written instrument of transfer in form\n        satisfactory to the Company
        and the Security Registrar duly executed, by the Holder thereof or his attorney
        duly authorized in writing.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">No service charge shall be made for any registration of transfer or
        exchange of Securities, but the Company may require payment of a sum sufficient
        to cover any tax or other governmental charge that may be imposed in\n        connection
        with any registration of transfer or exchange of Securities, other than exchanges
        pursuant to Section 3.04, 9.06 or 11.07 not involving any transfer.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If the Securities
        of any series (or of any series and specified tenor) are to be redeemed in
        part, the Company shall not be required (A) to issue, register the transfer
        of or exchange any Securities of that series (or\n        of that series and
        specified tenor, as the case may be) during a period beginning at the opening
        of business 15 days before the day of the mailing of a notice of redemption
        of any such Securities selected for redemption under Section 11.03 and\n        ending
        at the close of business on the day of such mailing, or (B) to register the
        transfer of or exchange any Security so selected for redemption in whole or
        in part, except the unredeemed portion of any Security being redeemed in part.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">22</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">The provisions of Clauses
        (1), (2), (3) and (4) below shall apply only to Global Securities:</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Each
        Global Security authenticated under this Indenture shall be registered in
        the name of the Depositary designated for such Global Security or a nominee
        thereof and delivered to such Depositary or a\n        nominee thereof or
        custodian therefor, and each such Global Security shall constitute a single
        Security for all purposes of this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Notwithstanding
        any other provision in this Indenture, and subject to such applicable provisions,
        if any, as may be specified as contemplated by Section 3.01, no Global Security
        may be exchanged in whole\n        or in part for Securities registered, and
        no transfer of a Global Security in whole or in part may be registered, in
        the name of any Person other than the Depositary for such Global Security
        or a nominee thereof unless (A) such Depositary has\n        notified the
        Company that it is unwilling or unable or no longer permitted under applicable
        law to continue as Depositary for such Global Security or (B) there shall
        have occurred and be continuing an Event of Default with respect to such Global\n
        \       Security or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(C) the Company so directs the Trustee by Company Order or (D) there
        shall exist such circumstances, if any, in addition to or in lieu of the foregoing
        as have been specified for this purpose as contemplated by Section\n        3.01.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Subject
        to Clause (2) above and to such applicable provisions, if any, as may be specified
        as contemplated by Section 3.01, any exchange of a Global Security for other
        Securities may be made in whole or in\n        part, and all Securities issued
        in exchange for a Global Security or any portion thereof shall be registered
        in such names as the Depositary for such Global Security shall direct.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Every
        Security authenticated and delivered upon registration of transfer of, or
        in exchange for or in lieu of, a Global Security or any portion thereof, whether
        pursuant to this Section, Section 3.04,\n        3.06, 9.06 or 11.07 or otherwise,
        shall be authenticated and delivered in the form of, and shall be, a Global
        Security, unless such Security is registered in the name of a Person other
        than the Depositary for such Global Security or a nominee\n        thereof.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 3.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Mutilated, Destroyed, Lost and Stolen Securities</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If any mutilated
        Security is surrendered to the Trustee, the Company shall execute and the
        Trustee shall authenticate and deliver in exchange therefor a new Security
        of the same series and of like tenor and principal\n        amount and bearing
        a number not contemporaneously outstanding.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If there shall be delivered to the
        Company and the Trustee (i) evidence to their satisfaction of the destruction,
        loss or theft of any Security and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(ii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;such
        security or indemnity as may be required by them to save each of them and
        any agent of either of them harmless, then, in the absence of notice to the
        Company or the Trustee that such Security has\n        been acquired by a
        bona fide purchaser, the Company shall execute and the Trustee shall authenticate
        and deliver, in lieu of any such destroyed, lost or stolen Security, a new
        Security of the same series and of like tenor and principal amount and\n        bearing
        a number not contemporaneously outstanding.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">23</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">In case any such mutilated, destroyed, lost or stolen Security has
        become or is about to become due and payable, the Company in its discretion
        may, instead of issuing a new Security, pay such Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Upon the issuance of any new Security
        under this Section, the Company may require the payment of a sum sufficient
        to cover any tax or other governmental charge that may be imposed in relation
        thereto and any other\n        expenses (including the fees and expenses of
        the Trustee) connected therewith.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Every new Security of any series issued pursuant
        to this Section in lieu of any destroyed, lost or stolen Security shall constitute
        an original additional contractual obligation of the Company, whether or not
        the\n        destroyed, lost or stolen Security shall be at any time enforceable
        by anyone, and shall be entitled to all the benefits of this Indenture equally
        and proportionately with any and all other Securities of that series duly
        issued hereunder.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The provisions of this Section are exclusive and shall preclude (to
        the extent lawful) all other rights and remedies with respect to the replacement
        or payment of mutilated, destroyed, lost or stolen Securities.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 3.07&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Payment of Interest; Interest Rights Preserved</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        otherwise provided as contemplated by Section 3.01 with respect to any series
        of Securities, interest on any Security which is payable, and is punctually
        paid or duly provided for, on any Interest Payment\n        Date shall be
        paid to the Person in whose name that Security (or one or more Predecessor
        Securities) is registered at the close of business on the Regular Record Date
        for such interest or, if no business is conducted by the Trustee at [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ]\n        on such date, at 5:00 P.M., New York City time, on such date.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Any interest
        on any Security of any series which is payable, but is not punctually paid
        or duly provided for, on any Interest Payment Date (herein called &#8220;Defaulted
        Interest&#8221;) shall forthwith cease to be payable to the\n        Holder
        on the relevant Regular Record Date by virtue of having been such Holder,
        and such Defaulted Interest may be paid by the Company, at its election in
        each case, as provided in Clause (1) or (2) below:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;The
        Company may elect to make payment of any Defaulted Interest to the Persons
        in whose names the Securities of such series (or their respective Predecessor
        Securities) are registered at the close of\n        business on a Special
        Record Date for the payment of such Defaulted Interest, which shall be fixed
        in the following manner. The Company shall notify the Trustee in writing of
        the amount of Defaulted Interest proposed to be paid on each Security of\n
        \       such series and the date of the proposed payment, and at the same
        time the Company shall deposit with the Trustee an amount of money equal to
        the aggregate amount proposed to be paid in respect of such Defaulted Interest
        or shall make arrangements\n        satisfactory to the Trustee for such deposit
        prior to the date of the proposed payment, such money when deposited to be
        held in trust for the benefit of the Persons entitled to such Defaulted Interest
        as in this Clause provided. Thereupon the\n        Trustee shall fix a Special
        Record Date for the payment of such Defaulted Interest which shall be not
        more than 15 days and not less than 10 days prior to the date of the proposed
        payment and not less than 10 days after the receipt by the Trustee\n        of
        the notice of the proposed payment. The Trustee shall promptly notify the
        Company of such Special Record Date and, in the name and at the expense of
        the Company, shall cause notice of the proposed payment of such Defaulted
        Interest and the\n        Special Record Date therefor to be given to each
        Holder of Securities of such series in the manner set forth in Section 1.06,
        not less than 10 days prior to such Special Record Date. Notice of the proposed
        payment of such Defaulted Interest and the\n        Special Record Date therefor
        having been so mailed, such Defaulted Interest shall be paid to the Persons
        in whose names the Securities of such series (or their respective Predecessor
        Securities) are registered at the close of business on such\n        Special
        Record Date and shall no longer be payable pursuant to the following Clause
        (2).</div>\n      <div>&#160;</div>\n      <div style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">24</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;The
        Company may make payment of any Defaulted Interest on the Securities of any
        series in any other lawful manner not inconsistent with the requirements of
        any securities exchange on which such Securities\n        may be listed, and
        upon such notice as may be required by such exchange, if, after notice given
        by the Company to the Trustee of the proposed payment pursuant to this Clause,
        such manner of payment shall be deemed practicable by the Trustee.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        may be provided in this Section 3.07 or as contemplated in Section 3.01 with
        respect to any Securities of a series, the Person to whom interest shall be
        payable on any Security that first becomes payable on a\n        day that
        is not an Interest Payment Date shall be the Holder of such Security on the
        day such interest is paid.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Subject to the foregoing provisions of this Section, each Security
        delivered under this Indenture upon registration of transfer of or in exchange
        for or in lieu of any other Security shall carry the rights to interest\n
        \       accrued and unpaid, and to accrue, which were carried by such other
        Security.</div>\n      <div>&#160;</div>\n      <div>SECTION 3.08&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Persons Deemed Owners</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Prior to due presentment of a Security
        for registration of transfer, the Company, the Trustee and any agent of the
        Company or the Trustee may treat the Person in whose name such Security is
        registered as the owner of\n        such Security for the purpose of receiving
        payment of principal of and any premium and (subject to Section 3.07) any
        interest on such Security and for all other purposes whatsoever, whether or
        not such Security be overdue, and neither the Company,\n        the Trustee
        nor any agent of the Company or the Trustee shall be affected by notice to
        the contrary.</div>\n      <div>&#160;</div>\n      <div>SECTION 3.09&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Cancellation</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">All Securities surrendered for payment,
        redemption, registration of transfer or exchange or for credit against any
        sinking fund payment shall, if surrendered to any Person other than the Trustee,
        be delivered to the\n        Trustee and shall be promptly cancelled by it.
        The Company may at any time deliver to the Trustee for cancellation any Securities
        previously authenticated and delivered hereunder which the Company may have
        acquired in any manner whatsoever, and may\n        deliver to the Trustee
        (or to any other Person for delivery to the Trustee) for cancellation any
        Securities previously authenticated hereunder which the Company has not issued
        and sold, and all Securities so delivered shall be promptly cancelled by\n
        \       the Trustee. No Securities shall be authenticated in lieu of or in
        exchange for any Securities cancelled as provided in this Section, except
        as expressly permitted by this Indenture. All cancelled Securities held by
        the Trustee shall be disposed of\n        as directed by a Company Order;
        <font style=\"font-style: italic;\">provided, however</font>, that the Trustee
        shall not be required to destroy such cancelled Securities.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">25</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 3.10&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Computation of Interest</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Except as otherwise specified as contemplated
        by Section 3.01 for Securities of any series, interest on the Securities of
        each series shall be computed on the basis of a 360-day year of twelve 30-day
        months.</div>\n      <div>&#160;</div>\n      <div>SECTION 3.11&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">CUSIP Numbers</font>.</div>\n      <div>\n        <div><br>\n
        \       </div>\n        <div style=\"text-indent: 24.5pt; color: rgb(0, 0,
        0);\">The Company in issuing the Securities may use &#8220;CUSIP,&#8221; &#8220;ISIN&#8221;
        or other similar numbers (if then generally in use), and, if so, the Trustee
        shall use &#8220;CUSIP,&#8221; &#8220;ISIN&#8221; or other similar numbers
        in\n          notices of redemption as a convenience to Holders; <u>provided</u>
        that any such notice may state that no representation is made as to the correctness
        of such numbers either as printed on the Securities or as contained in any
        notice of a\n          redemption and that reliance may be placed only on
        the other identification numbers printed on the Securities, and any such redemption
        shall not be affected by any defect in or omission of such numbers. The Company
        shall promptly notify the\n          Trustee in writing of any change in &#8220;CUSIP,&#8221;
        &#8220;ISIN&#8221; or other similar numbers.</div>\n      </div>\n      <div><br>\n
        \     </div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\">ARTICLE
        FOUR</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\">SATISFACTION
        AND DISCHARGE</div>\n      <div>&#160;</div>\n      <div>SECTION 4.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Satisfaction and Discharge of Indenture</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">This Indenture
        shall upon Company Request cease to be of further effect (except as to any
        surviving rights of registration of transfer or exchange of any Security expressly
        provided for herein or in the terms of such\n        Security), and the Trustee,
        at the expense of the Company, shall execute proper instruments acknowledging
        satisfaction and discharge of this Indenture, when</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;either</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(A)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        all Securities theretofore authenticated and delivered (other than (i) Securities
        which have been destroyed, lost or stolen and which have been replaced or
        paid as provided in Section 3.06 and (ii)\n        Securities for whose payment
        money has theretofore been deposited in trust or segregated and held in trust
        by the Company and thereafter repaid to the Company or discharged from such
        trust, as provided in Section 10.03) have been delivered to the\n        Trustee
        for cancellation; or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(B)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; all such Securities
        not theretofore delivered to the Trustee for cancellation</div>\n      <div
        style=\"text-indent: 36pt;\"> <br>\n      </div>\n      <div style=\"text-indent:
        36pt;\">\n        <div style=\"text-indent: 36pt;\">(i)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        &#160;&#160; have become due and payable, or</div>\n      </div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">26</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <br>\n      <div style=\"text-indent:
        36pt;\">(ii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;will
        become due and payable at their Stated Maturity within one year, or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(iii)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        are to be called for redemption within one year under arrangements satisfactory
        to the Trustee for the giving of notice of redemption by the Trustee in the
        name, and at the expense, of the Company, and\n        the Company, in the
        case of (i), (ii) or (iii) above, has deposited or caused to be deposited
        with the Trustee as trust funds in trust for the purpose money in an amount
        sufficient to pay and discharge the entire indebtedness on such Securities
        not\n        theretofore delivered to the Trustee for cancellation, for principal
        and any premium and interest to the date of such deposit (in the case of Securities
        which have become due and payable) or to the Stated Maturity or Redemption
        Date, as the case\n        may be;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Company has paid or caused to be paid all other sums payable hereunder by
        the Company; and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Company has delivered to the Trustee an Officers&#8217; Certificate and an
        Opinion of Counsel, each stating that all conditions precedent herein provided
        for relating to the satisfaction and discharge of\n        this Indenture
        have been complied with.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Notwithstanding the satisfaction and discharge of this Indenture,
        the obligations of the Company to the Trustee under Section 6.07, the obligations
        of the Trustee to any Authenticating Agent under Section 6.14 and, if\n        money
        shall have been deposited with the Trustee pursuant to subclause (B) of Clause
        (1) of this Section, the obligations of the Trustee under Section 4.02 and
        the last paragraph of Section 10.03 shall survive.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 4.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Application of Trust Money</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Subject to the provisions of the last
        paragraph of Section 10.03, all money deposited with the Trustee pursuant
        to Section 4.01 shall be held in trust and applied by it, in accordance with
        the provisions of the\n        Securities and this Indenture, to the payment,
        either directly or through any Paying Agent (including the Company acting
        as its own Paying Agent) as the Trustee may determine, to the Persons entitled
        thereto, of the principal and any premium and\n        interest for whose
        payment such money has been deposited with the Trustee.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">ARTICLE FIVE</div>\n      <div><br>\n
        \     </div>\n      <div style=\"text-align: center;\">REMEDIES</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 5.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Events of Default</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Event of Default&#8221;, wherever
        used herein with respect to Securities of any series, means any one of the
        following events (whatever the reason for such Event of Default and whether
        it shall be voluntary or involuntary\n        or be effected by operation
        of law or pursuant to any judgment, decree or order of any court or any order,
        rule or regulation of any administrative or governmental body):</div>\n      <div
        style=\"text-indent: 36pt;\"> <br>\n      </div>\n      <div style=\"text-indent:
        36pt;\">\n        <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        in the payment of any interest upon any Security of that series when it becomes
        due and payable, and continuance of such default for a period of 30 days;
        or</div>\n      </div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">27</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        in the payment of the principal of or any premium, if any, on any Security
        of that series at its Maturity; or</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        in the deposit of any sinking fund payment, when and as due by the terms of
        a Security of that series; or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        in the performance, or breach, of any covenant or warranty of the Company
        in this Indenture (other than a covenant or warranty a default in whose performance
        or whose breach is elsewhere in this\n        Section specifically dealt with
        or which has expressly been included in this Indenture solely for the benefit
        of series of Securities other than that series), and continuance of such default
        or breach for a period of 90 days after there has been\n        given, by
        registered or certified mail, to the Company by the Trustee or to the Company
        and the Trustee by the Holders of at least 25% in principal amount of the
        Outstanding Securities of that series a written notice specifying such default
        or\n        breach and requiring it to be remedied and stating that such notice
        is a &#8220;Notice of Default&#8221; hereunder; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        entry by a court having jurisdiction in the premises of (A) a decree or order
        for relief in respect of the Company in an involuntary case or proceeding
        under any applicable Federal or State bankruptcy,\n        insolvency, reorganization
        or other similar law or (B) a decree or order adjudging the Company a bankrupt
        or insolvent, or approving as properly filed a petition seeking reorganization,
        arrangement, adjustment or composition of or in respect of the\n        Company
        under any applicable Federal or State law, or appointing a custodian, receiver,
        liquidator, assignee, trustee, sequestrator or other similar official of the
        Company or of any substantial part of its property, or ordering the winding
        up or\n        liquidation of its affairs, and the continuance of any such
        decree or order for relief or any such other decree or order unstayed and
        in effect for a period of 60 consecutive days; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        commencement by the Company of a voluntary case or proceeding under any applicable
        Federal or State bankruptcy, insolvency, reorganization or other similar law
        or of any other case or proceeding to be\n        adjudicated a bankrupt or
        insolvent, or the consent by it to the entry of a decree or order for relief
        in respect of the Company in an involuntary case or proceeding under any applicable
        Federal or State bankruptcy, insolvency, reorganization or\n        other
        similar law or to the commencement of any bankruptcy or insolvency case or
        proceeding against it, or the filing by it of a petition or answer or consent
        seeking reorganization or relief under any applicable Federal or State law,
        or the\n        consent by it to the filing of such petition or to the appointment
        of or taking possession by a custodian, receiver, liquidator, assignee, trustee,
        sequestrator or other similar official of the Company or of any substantial
        part of its property, or\n        the making by it of an assignment for the
        benefit of creditors, or the admission by it in writing of its inability to
        pay its debts generally as they become due, or the taking of corporate action
        by the Company in furtherance of any such action; or</div>\n      <div><br>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(7)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;any
        other Event of Default provided with respect to Securities of that series.</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">28</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 5.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Acceleration of Maturity; Rescission and Annulment</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If an Event
        of Default (other than an Event of Default specified in Section 5.01(5) or
        5.01(6)) with respect to Securities of any series at the time Outstanding
        occurs and is continuing, then in every such case the\n        Trustee or
        the Holders of not less than 25% in principal amount of the Outstanding Securities
        of that series may, declare the principal amount of all the Securities of
        that series (or, if any Securities of that series are Original Issue Discount\n
        \       Securities, such portion of the principal amount of such Securities
        as may be specified by the terms thereof) to be due and payable immediately,
        by a notice in writing to the Company (and to the Trustee if given by Holders),
        and upon any such\n        declaration such principal amount (or specified
        amount) shall become immediately due and payable. If an Event of Default specified
        in Section 5.01(5) or 5.01(6) with respect to Securities of any series at
        the time Outstanding occurs, the principal\n        amount of all the Securities
        of that series (or, if any Securities of that series are Original Issue Discount
        Securities, such portion of the principal amount of such Securities as may
        be specified by the terms thereof) shall automatically, and\n        without
        any declaration or other action on the part of the Trustee or any Holder,
        become immediately due and payable.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">At any time after such a declaration of acceleration
        with respect to Securities of any series has been made and before a judgment
        or decree for payment of the money due has been obtained by the Trustee as
        hereinafter\n        in this Article provided, the Holders of a majority in
        principal amount of the Outstanding Securities of that series, by written
        notice to the Company and the Trustee, may rescind and annul such declaration
        and its consequences if</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Company has paid or deposited with the Trustee a sum sufficient to pay</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(A)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        all overdue interest on all Securities of that series,</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(B)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        the principal of (and premium, if any, on) any Securities of that series which
        have become due otherwise than by such declaration of acceleration and any
        interest thereon at the rate or rates prescribed\n        therefor in such
        Securities,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(C)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; to the extent
        that payment of such interest is lawful, interest upon overdue interest at
        the rate or rates prescribed therefor in such Securities, and</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(D)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        all sums paid or advanced by the Trustee hereunder and the reasonable compensation,
        expenses, disbursements and advances of the Trustee, its agents and counsel;
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;all
        Events of Default with respect to Securities of that series, other than the
        non-payment of the principal of Securities of that series which have become
        due solely by such declaration of acceleration,\n        have been cured or
        waived as provided in Section 5.13.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">No such rescission shall affect any subsequent
        default or impair any right consequent thereon.</div>\n      <br>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">29</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"border-width: 0px; clear:
        both; margin: 4px 0px; width: 100%; height: 2px; color: #000000; background-color:
        #000000;\" noshade=\"noshade\"></div>\n      </div>\n    </div>\n    <div>SECTION
        5.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Collection of Indebtedness and Suits for Enforcement by Trustee</font>.\n
        \     <div style=\"text-indent: 36pt;\"> <br>\n      </div>\n      <div style=\"text-indent:
        36pt;\">The Company covenants that if</div>\n      <br>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        is made in the payment of any interest on any Security when such interest
        becomes due and payable and such default continues for a period of 30 days,
        or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;default
        is made in the payment of the principal of (or premium, if any, on) any Security
        at the Maturity thereof, the Company will, upon demand of the Trustee, pay
        to it, for the benefit of the Holders of\n        such Securities, the whole
        amount then due and payable on such Securities for principal and any premium
        and interest and, to the extent that payment of such interest shall be legally
        enforceable, interest on any overdue principal and premium and on\n        any
        overdue interest, at the rate or rates prescribed therefor in such Securities,
        and, in addition thereto, such further amount as shall be sufficient to cover
        the costs and expenses of collection, including the reasonable compensation,
        expenses,\n        disbursements and advances of the Trustee, its agents and
        counsel. If the Company shall fail to pay such amounts forthwith upon such
        demand, the Trustee, in its own name and as trustee of an express trust, may
        institute a judicial proceeding for\n        the collection of the sums so
        due and unpaid, may prosecute such proceeding to judgment or final decree
        and may enforce the same against the Company or any other obligor upon such
        Securities and collect the moneys adjudged or decreed to be payable\n        in
        the manner provided by law out of the property of the Company or any other
        obligor upon such Securities, wherever situated.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If an Event of Default with respect
        to Securities of any series occurs and is continuing, the Trustee may in its
        discretion proceed to protect and enforce its rights and the rights of the
        Holders of Securities of such\n        series by such appropriate judicial
        proceedings as the Trustee shall deem most effectual to protect and enforce
        any such rights, whether for the specific enforcement of any covenant or agreement
        in this Indenture or in aid of the exercise of any\n        power granted
        herein, or to enforce any other proper remedy.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 5.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Trustee May File Proofs of Claim</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">In case of
        any judicial proceeding relative to the Company (or any other obligor upon
        the Securities), its property or its creditors, the Trustee shall be entitled
        and empowered, by intervention in such proceeding or\n        otherwise, to
        take any and all actions authorized under the Trust Indenture Act in order
        to have claims of the Holders and the Trustee allowed in any such proceeding.
        In particular, the Trustee shall be authorized to collect and receive any
        moneys\n        or other property payable or deliverable on any such claims
        and to distribute the same; and any custodian, receiver, assignee, trustee,
        liquidator, sequestrator or other similar official in any such judicial proceeding
        is hereby authorized by each\n        Holder to make such payments to the
        Trustee and, in the event that the Trustee shall consent to the making of
        such payments directly to the Holders, to pay to the Trustee any amount due
        it for the reasonable compensation, expenses, disbursements\n        and advances
        of the Trustee, its agents and counsel, and any other amounts due the Trustee
        under Section 6.07.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">No provision of this Indenture shall be deemed to authorize the Trustee
        to authorize or consent to or accept or adopt on behalf of any Holder any
        plan of reorganization, arrangement, adjustment or composition affecting\n
        \       the Securities or the rights of any Holder thereof or to authorize
        the Trustee to vote in respect of the claim of any Holder in any such proceeding;
        <font style=\"font-style: italic;\">provided</font>, <font style=\"font-style:
        italic;\">however</font>,\n        that the Trustee may, on behalf of the
        Holders, vote for the election of a trustee in bankruptcy or similar official
        and be a member of a creditors&#8217; or other similar committee.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">30</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>SECTION 5.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Trustee May Enforce Claims Without Possession
        of Securities</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">All rights of action and claims under this Indenture or the Securities
        may be prosecuted and enforced by the Trustee without the possession of any
        of the Securities or the production thereof in any proceeding relating\n        thereto,
        and any such proceeding instituted by the Trustee shall be brought in its
        own name as trustee of an express trust, and any recovery of judgment shall,
        after provision for the payment of the reasonable compensation, expenses,
        disbursements\n        and advances of the Trustee, its agents and counsel,
        be for the ratable benefit of the Holders of the Securities in respect of
        which such judgment has been recovered.</div>\n      <div>&#160;</div>\n      <div>SECTION
        5.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Application of Money Collected</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Any money collected by the Trustee
        pursuant to this Article shall be applied in the following order, at the date
        or dates fixed by the Trustee and, in case of the distribution of such money
        on account of principal or\n        any premium or interest, upon presentation
        of the Securities and the notation thereon of the payment if only partially
        paid and upon surrender thereof if fully paid:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">FIRST: To the payment of all amounts
        due the Trustee under Section 6.07; and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">SECOND: To the payment of the amounts then due
        and unpaid for principal of and any premium and interest on the Securities
        in respect of which or for the benefit of which such money has been collected,
        ratably, without\n        preference or priority of any kind, according to
        the amounts due and payable on such Securities for principal and any premium
        and interest, respectively.</div>\n      <div>&#160;</div>\n      <div>SECTION
        5.07&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Limitation on Suits</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">No Holder of any Security of any series shall
        have any right to institute any proceeding, judicial or otherwise, with respect
        to this Indenture, or for the appointment of a receiver or trustee, or for
        any other remedy\n        hereunder, unless</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;such
        Holder has previously given written notice to the Trustee of a continuing
        Event of Default with respect to the Securities of that series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Holders of not less than 25% in principal amount of the Outstanding Securities
        of that series shall have made written request to the Trustee to institute
        proceedings in respect of such Event of Default\n        in its own name as
        Trustee hereunder;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;such
        Holder or Holders have offered to the Trustee indemnity reasonably satisfactory
        to the Trustee against the costs, expenses and liabilities to be incurred
        in compliance with such request;</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee for 60 days after its receipt of such notice, request and offer of
        indemnity has failed to institute any such proceeding; and</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">31</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;no
        direction inconsistent with such written request has been given to the Trustee
        during such 60-day period by the Holders of a majority in principal amount
        of the Outstanding Securities of that series;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">it being understood and intended that
        no one or more of such Holders shall have any right in any manner whatever
        by virtue of, or by availing of, any provision of this Indenture to affect,
        disturb or prejudice the\n        rights of any other of such Holders, or
        to obtain or to seek to obtain priority or preference over any other of such
        Holders or to enforce any right under this Indenture, except in the manner
        herein provided and for the equal and ratable benefit of\n        all of such
        Holders.</div>\n      <div>&#160;</div>\n      <div>SECTION 5.08&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Unconditional Right of Holders to Receive Principal,
        Premium and Interest</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Notwithstanding any other provision in this Indenture, the Holder
        of any Security shall have the right, which is absolute and unconditional,
        to receive payment of the principal of and any premium and (subject to\n        Section
        3.07) interest on such Security on the respective Stated Maturities expressed
        in such Security (or, in the case of redemption, on the Redemption Date) and
        to institute suit for the enforcement of any such payment, and such rights
        shall not\n        be impaired without the consent of such Holder.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 5.09&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Restoration of Rights and Remedies</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If the Trustee
        or any Holder has instituted any proceeding to enforce any right or remedy
        under this Indenture and such proceeding has been discontinued or abandoned
        for any reason, or has been determined adversely to\n        the Trustee or
        to such Holder, then and in every such case, subject to any determination
        in such proceeding, the Company, the Trustee and the Holders shall be restored
        severally and respectively to their former positions hereunder and thereafter\n
        \       all rights and remedies of the Trustee and the Holders shall continue
        as though no such proceeding had been instituted.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 5.10&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Rights and Remedies Cumulative</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        otherwise provided with respect to the replacement or payment of mutilated,
        destroyed, lost or stolen Securities in the last paragraph of Section 3.06,
        no right or remedy herein conferred upon or reserved to\n        the Trustee
        or to the Holders is intended to be exclusive of any other right or remedy,
        and every right and remedy shall, to the extent permitted by law, be cumulative
        and in addition to every other right and remedy given hereunder or now or\n
        \       hereafter existing at law or in equity or otherwise. The assertion
        or employment of any right or remedy hereunder, or otherwise, shall not prevent
        the concurrent assertion or employment of any other appropriate right or remedy.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 5.11&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Delay or Omission Not Waiver</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">No delay
        or omission of the Trustee or of any Holder of any Securities to exercise
        any right or remedy accruing upon any Event of Default shall impair any such
        right or remedy or constitute a waiver of any such Event\n        of Default
        or an acquiescence therein. Every right and remedy given by this Article or
        by law to the Trustee or to the Holders may be exercised from time to time,
        and as often as may be deemed expedient, by the Trustee or by the Holders,
        as the\n        case may be.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">32</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 5.12&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Control by Holders</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Holders of a majority in principal
        amount of the Outstanding Securities of any series shall have the right to
        direct the time, method and place of conducting any proceeding for any remedy
        available to the Trustee,\n        or exercising any trust or power conferred
        on the Trustee, with respect to the Securities of such series, <font style=\"font-style:
        italic;\">provided </font>that</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;such
        direction shall not be in conflict with any rule of law or with this Indenture,
        and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee may take any other action deemed proper by the Trustee which is not
        inconsistent with such direction.</div>\n      <div>&#160;</div>\n      <div>SECTION
        5.13&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Waiver of Past Defaults</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Holders of not less than a majority
        in principal amount of the Outstanding Securities of any series may on behalf
        of the Holders of all the Securities of such series waive any past default
        hereunder with respect to\n        such series and its consequences, except
        a default</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;in
        the payment of the principal of or any premium or interest on any Security
        of such series, or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;in
        respect of a covenant or provision hereof which under Article Nine cannot
        be modified or amended without the consent of the Holder of each Outstanding
        Security of such series affected.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Upon any such waiver, such default shall cease
        to exist, and any Event of Default arising therefrom shall be deemed to have
        been cured, for every purpose of this Indenture; but no such waiver shall
        extend to any\n        subsequent or other default or impair any right consequent
        thereon.</div>\n      <div>&#160;</div>\n      <div>SECTION 5.14&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Undertaking for Costs</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In any suit for the enforcement of
        any right or remedy under this Indenture, or in any suit against the Trustee
        for any action taken, suffered or omitted by it as Trustee, a court may require
        any party litigant in such\n        suit to file an undertaking to pay the
        costs of such suit, and may assess costs against any such party litigant,
        in the manner and to the extent provided in the Trust Indenture Act, <font
        style=\"font-style: italic;\">provided </font>that neither\n        this Section
        nor the Trust Indenture Act shall be deemed to authorize any court to require
        such an undertaking or to make such an assessment in any suit instituted by
        the Trustee or the Company.</div>\n      <div>&#160;</div>\n      <div>SECTION
        5.15&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Waiver of Usury, Stay or Extension Laws</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company covenants (to the extent
        that it may lawfully do so) that it will not at any time insist upon, or plead,
        or in any manner whatsoever claim or take the benefit or advantage of, any
        usury, stay or extension\n        law wherever enacted, now or at any time
        hereafter in force, which may affect the covenants or the performance of this
        Indenture; and the Company (to the extent that it may lawfully do so) hereby
        expressly waives all benefit or advantage of any\n        such law and covenants
        that it will not hinder, delay or impede the execution of any power herein
        granted to the Trustee, but will suffer and permit the execution of every
        such power as though no such law had been enacted.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">33</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-align:
        center;\">ARTICLE SIX</div>\n      <div>&#160;</div>\n      <div style=\"text-align:
        center;\">THE TRUSTEE</div>\n      <div>&#160;</div>\n      <div>SECTION 6.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Certain Duties and Responsibilities</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The duties
        and responsibilities of the Trustee shall be as provided by the Trust Indenture
        Act. Notwithstanding the foregoing, no provision of this Indenture shall require
        the Trustee to expend or risk its own funds or\n        otherwise incur any
        financial liability in the performance of any of its duties hereunder, or
        in the exercise of any of its rights or powers, if it shall have reasonable
        grounds for believing that repayment of such funds or adequate indemnity\n
        \       against such risk or liability is not reasonably assured to it. Whether
        or not therein expressly so provided, every provision of this Indenture relating
        to the conduct or affecting the liability of or affording protection to the
        Trustee shall be\n        subject to the provisions of this Section.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 6.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Notice of Defaults</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">If a default occurs hereunder with
        respect to Securities of any series, the Trustee shall give the Holders of
        Securities of such series notice of such default as and to the extent provided
        by the Trust Indenture Act; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that in the case of any
        default of the character specified in Section 5.01(1) and Section 5.01(4)
        with respect to Securities of such series, no such\n        notice to Holders
        shall be given until at least 30 days or 60 days, respectively, after the
        occurrence thereof. For the purpose of this Section, the term &#8220;default&#8221;
        means any event which is, or after notice or lapse of time or both would become,
        an\n        Event of Default with respect to Securities of such series.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 6.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Certain Rights of Trustee</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Subject to the provisions of Section
        6.01:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee may rely and shall be protected in acting or refraining from acting
        upon any resolution, certificate, statement, instrument, opinion, report,
        notice, request, direction, consent, order, bond,\n        debenture, note,
        other evidence of indebtedness or other paper or document believed by it to
        be genuine and to have been signed or presented by the proper party or parties;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;any
        request or direction of the Company mentioned herein shall be sufficiently
        evidenced by a Company Request or Company Order, and any resolution of the
        Board of Directors shall be sufficiently evidenced\n        by a Board Resolution;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;whenever
        in the administration of this Indenture the Trustee shall deem it desirable
        that a matter be proved or established prior to taking, suffering or omitting
        any action hereunder, the Trustee (unless\n        other evidence be herein
        specifically prescribed) may, in the absence of bad faith on its part, rely
        upon an Officers&#8217; Certificate;</div>\n      <div>&#160;</div>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">34</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee may consult with counsel of its selection and the advice of such counsel
        (to be confirmed in writing) or any Opinion of Counsel shall be full and complete
        authorization and protection in\n        respect of any action taken, suffered
        or omitted by it hereunder in good faith and in reliance thereon;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall be under no obligation to exercise any of the rights or powers
        vested in it by this Indenture at the request or direction of any of the Holders
        pursuant to this Indenture, unless such\n        Holders shall have offered
        to the Trustee reasonable security or indemnity reasonably satisfactory to
        the Trustee against the costs, expenses and liabilities which might be incurred
        by it in compliance with such request or direction;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall not be bound to make any investigation into the facts or matters
        stated in any resolution, certificate, statement, instrument, opinion, report,
        notice, request, direction, consent, order,\n        bond, debenture, note,
        other evidence of indebtedness or other paper or document, but the Trustee,
        in its discretion, may make such further inquiry or investigation into such
        facts or matters as it may see fit, and, if the Trustee shall determine\n
        \       to make such further inquiry or investigation, it shall be entitled
        to examine the books, records and premises of the Company, personally or by
        agent or attorney;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(7)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee may execute any of the trusts or powers hereunder or perform any duties
        hereunder either directly or by or through agents or attorneys and the Trustee
        shall not be responsible for any\n        misconduct or negligence on the
        part of any agent or attorney appointed with due care by it hereunder;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall not be liable for any action taken, suffered, or omitted to
        be taken by it in good faith and reasonably believed by it to be authorized
        or within the discretion or rights or powers\n        conferred upon it by
        this Indenture;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(9)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall not be deemed to have notice of any default or Event of Default
        unless a Responsible Officer of the Trustee has actual knowledge thereof or
        unless written notice of any event which is in\n        fact such a default
        is received by the Trustee at the Corporate Trust Office of the Trustee, and
        such notice references the Securities and this Indenture;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(10)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        the rights, privileges, protections, immunities and benefits given to the
        Trustee, including, without limitation, its right to be indemnified, are extended
        to, and shall be enforceable by, the Trustee in\n        each of its capacities
        hereunder; and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(11)&#160;&#160;&#160;&#160;&#160;&#160;&#160; The Trustee may request
        that the Company deliver an Officers&#8217; Certificate setting forth the
        names of individuals and or titles of officers authorized at such time to
        take specified actions pursuant to this\n        Indenture, which Officers&#8217;
        Certificate may be signed by any person authorized to sign an Officers&#8217;
        Certificate, including any person specified as so authorized in any such certificate
        previously delivered and not superseded.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">35</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 6.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Not Responsible for Recitals or Issuance of
        Securities</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The recitals contained herein and in the Securities, except the Trustee&#8217;s
        certificates of authentication, shall be taken as the statements of the Company,
        and neither the Trustee nor any Authenticating Agent assumes\n        any
        responsibility for their correctness. The Trustee makes no representations
        as to the validity or sufficiency of this Indenture or of the Securities.
        Neither the Trustee nor any Authenticating Agent shall be accountable for
        the use or\n        application by the Company of Securities or the proceeds
        thereof.</div>\n      <div>&#160;</div>\n      <div>SECTION 6.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">May Hold Securities</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Trustee, any Authenticating Agent,
        any Paying Agent, any Security Registrar or any other agent of the Company,
        in its individual or any other capacity, may become the owner or pledgee of
        Securities and, subject to\n        Sections 6.08 and 6.13, may otherwise
        deal with the Company with the same rights it would have if it were not Trustee,
        Authenticating Agent, Paying Agent, Security Registrar or such other agent.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 6.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Money Held in Trust</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Money held by the Trustee in trust
        hereunder need not be segregated from other funds except to the extent required
        by law. The Trustee shall be under no liability for interest on any money
        received by it hereunder\n        except as otherwise agreed in writing with
        the Company.</div>\n      <div>&#160;</div>\n      <div>SECTION 6.07&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Compensation and Reimbursement</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        agrees</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        pay to the Trustee from time to time such compensation as the Company and
        the Trustee shall from time to time agree in writing for all services rendered
        by it hereunder (which compensation shall not be\n        limited by any provision
        of law in regard to the compensation of a trustee of an express trust);</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;except
        as otherwise expressly provided herein, to reimburse the Trustee upon its
        request for all reasonable expenses, disbursements and advances incurred or
        made by the Trustee in accordance with any\n        provision of this Indenture
        (including the reasonable compensation and the expenses and disbursements
        of its agents and counsel), except any such expense, disbursement or advance
        as may be attributable to its negligence or bad faith; and</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        indemnify the Trustee and any predecessor Trustee for, and to hold it harmless
        against, any and all loss, liability or expense including taxes (other than
        taxes imposed on the income of the Trustee)\n        incurred without negligence
        or bad faith on its part, arising out of or in connection with the acceptance
        or administration of the trust or trusts hereunder, including the costs and
        expenses of defending itself against any claim or liability in\n        connection
        with the exercise or performance of any of its powers or duties hereunder.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">36</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">The Trustee shall have
        a lien prior to the Securities as to all property and funds held by it hereunder
        for any amount owing it or any predecessor Trustee pursuant to this Section
        6.07 except with respect to funds held\n        in trust for the benefit of
        the Holders of particular Securities. When the Trustee incurs expenses or
        renders services in connection with an Event of Default specified in Section
        5.01(6) or Section 5.01(7), the expenses (including the reasonable\n        charges
        and expenses of its counsel) and the compensation for the services are intended
        to constitute expenses of administration under any applicable Federal or State
        bankruptcy, insolvency or other similar law.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The provisions of this Section shall
        survive the termination of this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 6.08&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Disqualification; Conflicting Interests</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If the Trustee
        has or shall acquire a conflicting interest within the meaning of the Trust
        Indenture Act, the Trustee shall either eliminate such interest or resign,
        to the extent and in the manner provided by, and\n        subject to the provisions
        of, the Trust Indenture Act and this Indenture. To the extent permitted by
        such Act, the Trustee shall not be deemed to have a conflicting interest by
        virtue of being a trustee under this Indenture with respect to\n        Securities
        of more than one series.</div>\n      <div>&#160;</div>\n      <div>SECTION
        6.09&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Corporate Trustee Required; Eligibility</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">There shall at all times be one (and
        only one) Trustee hereunder with respect to the Securities of each series,
        which may be Trustee hereunder for Securities of one or more other series.
        Each Trustee shall be a Person\n        that is eligible pursuant to the Trust
        Indenture Act to act as such and has a combined capital and surplus of at
        least $50,000,000. If any such Person publishes reports of condition at least
        annually, pursuant to law or to the requirements of its\n        supervising
        or examining authority, then for the purposes of this Section and to the extent
        permitted by the Trust Indenture Act, the combined capital and surplus of
        such Person shall be deemed to be its combined capital and surplus as set
        forth in\n        its most recent report of condition so published. If at
        any time the Trustee with respect to the Securities of any series shall cease
        to be eligible in accordance with the provisions of this Section, it shall
        resign immediately in the manner and\n        with the effect hereinafter
        specified in this Article.</div>\n      <div>&#160;</div>\n      <div>SECTION
        6.10&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Resignation and Removal; Appointment of Successor</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">No resignation
        or removal of the Trustee and no appointment of a successor Trustee pursuant
        to this Article shall become effective until the acceptance of appointment
        by the successor Trustee in accordance with the\n        applicable requirements
        of Section 6.11.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Trustee may resign at any time with respect to the Securities
        of one or more series by giving written notice thereof to the Company.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Trustee
        may be removed at any time with respect to the Securities of any series by
        Act of the Holders of a majority in principal amount of the Outstanding Securities
        of such series, delivered to the Trustee and to\n        the Company.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">37</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">\n        <div style=\"text-indent:
        36pt;\">If at any time:</div>\n        <div style=\"text-indent: 36pt;\">&#160;</div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall fail to comply with Section 6.08 after written request therefor
        by the Company or by any Holder who has been a bona fide Holder of a Security
        for at least six months, or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall cease to be eligible under Section 6.09 and shall fail to resign
        after written request therefor by the Company or by any such Holder, or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee shall become incapable of acting or shall be adjudged a bankrupt or
        insolvent or a receiver of the Trustee or of its property shall be appointed
        or any public officer shall take charge or\n        control of the Trustee
        or of its property or affairs for the purpose of rehabilitation, conservation
        or liquidation,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">then, in any such case, (A) the Company by a Board Resolution may
        remove the Trustee with respect to all Securities, or (B) subject to Section
        5.14, any Holder who has been a bona fide Holder of a Security for at least\n
        \       six months may, on behalf of himself and all others similarly situated,
        petition any court of competent jurisdiction for the removal of the Trustee
        with respect to all Securities and the appointment of a successor Trustee
        or Trustees.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If the instrument of acceptance by a successor Trustee required by
        Section 6.11 shall not have been delivered to the Trustee within 30 days after
        the giving of such notice of resignation or removal, the Trustee\n        resigning
        or being removed may petition, at the expense of the Company, any court of
        competent jurisdiction for the appointment of a successor Trustee with respect
        to the Securities of such series.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">If the Trustee shall resign, be removed or become
        incapable of acting, or if a vacancy shall occur in the office of Trustee
        for any cause, with respect to the Securities of one or more series, the Company,
        by a Board\n        Resolution, shall promptly appoint a successor Trustee
        or Trustees with respect to the Securities of that or those series (it being
        understood that any such successor Trustee may be appointed with respect to
        the Securities of one or more or all of\n        such series and that at any
        time there shall be only one Trustee with respect to the Securities of any
        particular series) and shall comply with the applicable requirements of Section
        6.11. If, within one year after such resignation, removal or\n        incapability,
        or the occurrence of such vacancy, a successor Trustee with respect to the
        Securities of any series shall be appointed by Act of the Holders of a majority
        in principal amount of the Outstanding Securities of such series delivered
        to\n        the Company and the retiring Trustee, the successor Trustee so
        appointed shall, forthwith upon its acceptance of such appointment in accordance
        with the applicable requirements of Section 6.11, become the successor Trustee
        with respect to the\n        Securities of such series and to that extent
        supersede the successor Trustee appointed by the Company. If no successor
        Trustee with respect to the Securities of any series shall have been so appointed
        by the Company or the Holders and accepted\n        appointment in the manner
        required by Section 6.11, any Holder who has been a bona fide Holder of a
        Security of such series for at least six months may, on behalf of himself
        and all others similarly situated, petition any court of competent\n        jurisdiction
        for the appointment of a successor Trustee with respect to the Securities
        of such series.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company shall give notice of each resignation and each removal
        of the Trustee with respect to the Securities of any series and each appointment
        of a successor Trustee with respect to the Securities of any series to\n        all
        Holders of Securities of such series in the manner provided in Section 1.06.
        Each notice shall include the name of the successor Trustee with respect to
        the Securities of such series and the address of its Corporate Trust Office.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">38</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>SECTION 6.11&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Acceptance of Appointment by Successor</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">In case of
        the appointment hereunder of a successor Trustee with respect to all Securities,
        every such successor Trustee so appointed shall execute, acknowledge and deliver
        to the Company and to the retiring Trustee an\n        instrument accepting
        such appointment, and thereupon the resignation or removal of the retiring
        Trustee shall become effective and such successor Trustee, without any further
        act, deed or conveyance, shall become vested with all the rights, powers,\n
        \       trusts and duties of the retiring Trustee; but, on the request of
        the Company or the successor Trustee, such retiring Trustee shall, upon payment
        of its charges, execute and deliver an instrument transferring to such successor
        Trustee all the\n        rights, powers and trusts of the retiring Trustee
        and shall duly assign, transfer and deliver to such successor Trustee all
        property and money held by such retiring Trustee hereunder.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In case of the appointment hereunder
        of a successor Trustee with respect to the Securities of one or more (but
        not all) series, the Company, the retiring Trustee and each successor Trustee
        with respect to the\n        Securities of one or more series shall execute
        and deliver an indenture supplemental hereto wherein each successor Trustee
        shall accept such appointment and which (1) shall contain such provisions
        as shall be necessary or desirable to transfer and\n        confirm to, and
        to vest in, each successor Trustee all the rights, powers, trusts and duties
        of the retiring Trustee with respect to the Securities of that or those series
        to which the appointment of such successor Trustee relates, (2) if the\n        retiring
        Trustee is not retiring with respect to all Securities, shall contain such
        provisions as shall be deemed necessary or desirable to confirm that all the
        rights, powers, trusts and duties of the retiring Trustee with respect to
        the\n        Securities of that or those series as to which the retiring Trustee
        is not retiring shall continue to be vested in the retiring Trustee, and</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3) shall
        add to or change any of the provisions of this Indenture as shall be necessary
        to provide for or facilitate the administration of the trusts hereunder by
        more than one Trustee, it being understood that\n        nothing herein or
        in such supplemental indenture shall constitute such Trustees co-trustees
        of the same trust and that each such Trustee shall be trustee of a trust or
        trusts hereunder separate and apart from any trust or trusts hereunder\n        administered
        by any other such Trustee; and upon the execution and delivery of such supplemental
        indenture the resignation or removal of the retiring Trustee shall become
        effective to the extent provided therein and each such successor Trustee,\n
        \       without any further act, deed or conveyance, shall become vested with
        all the rights, powers, trusts and duties of the retiring Trustee with respect
        to the Securities of that or those series to which the appointment of such
        successor Trustee\n        relates; but, on request of the Company or any
        successor Trustee, such retiring Trustee shall duly assign, transfer and deliver
        to such successor Trustee all property and money held by such retiring Trustee
        hereunder with respect to the Securities\n        of that or those series
        to which the appointment of such successor Trustee relates.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">39</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">Upon request of any such successor Trustee, the Company shall execute
        any and all instruments for more fully and certainly vesting in and confirming
        to such successor Trustee all such rights, powers and trusts referred\n        to
        in the first or second preceding paragraph, as the case may be.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">No successor Trustee shall accept
        its appointment unless at the time of such acceptance such successor Trustee
        shall be qualified and eligible under this Article.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 6.12&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Merger, Conversion, Consolidation or Succession
        to Business</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Any corporation into which the Trustee may be merged or converted
        or with which it may be consolidated, or any corporation resulting from any
        merger, conversion or consolidation to which the Trustee shall be a party,\n
        \       or any corporation succeeding to all or substantially all the corporate
        trust business of the Trustee, shall be the successor of the Trustee hereunder,
        <font style=\"font-style: italic;\">provided </font>such corporation shall
        be otherwise\n        qualified and eligible under this Article, without the
        execution or filing of any paper or any further act on the part of any of
        the parties hereto. In case any Securities shall have been authenticated,
        but not delivered, by the Trustee then in\n        office, any successor by
        merger, conversion or consolidation to such authenticating Trustee may adopt
        such authentication and deliver the Securities so authenticated with the same
        effect as if such successor Trustee had itself authenticated such\n        Securities.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 6.13&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Preferential Collection of Claims Against the
        Company</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If and when the Trustee shall be or become a creditor of the Company
        (or any other obligor upon the Securities), the Trustee shall be subject to
        the provisions of the Trust Indenture Act regarding the collection of\n        claims
        against the Company (or any such other obligor).</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 6.14&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Appointment of Authenticating Agent</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Trustee
        may appoint an Authenticating Agent or Agents with respect to one or more
        series of Securities which shall be authorized to act on behalf of the Trustee
        to authenticate Securities of such series issued upon\n        original issue
        and upon exchange, registration of transfer, or partial redemption thereof
        or pursuant to Section 3.06, and Securities so authenticated shall be entitled
        to the benefits of this Indenture and shall be valid and obligatory for all\n
        \       purposes as if authenticated by the Trustee hereunder. Wherever reference
        is made in this Indenture to the authentication and delivery of Securities
        by the Trustee or the Trustee&#8217;s certificate of authentication, such
        reference shall be deemed to\n        include authentication and delivery
        on behalf of the Trustee by an Authenticating Agent and a certificate of authentication
        executed on behalf of the Trustee by an Authenticating Agent. Each Authenticating
        Agent shall be acceptable to the Company\n        and shall at all times be
        a corporation organized and doing business under the laws of the United States
        of America, any State thereof or the District of Columbia, authorized under
        such laws to act as Authenticating Agent, having a combined capital\n        and
        surplus of not less than $50,000,000 and subject to supervision or examination
        by Federal or State authority. If such Authenticating Agent publishes reports
        of condition at least annually, pursuant to law or to the requirements of
        said\n        supervising or examining authority, then for the purposes of
        this Section, the combined capital and surplus of such Authenticating Agent
        shall be deemed to be its combined capital and surplus as set forth in its
        most recent report of condition so\n        published. If at any time an Authenticating
        Agent shall cease to be eligible in accordance with the provisions of this
        Section, such Authenticating Agent shall resign immediately in the manner
        and with the effect specified in this Section.</div>\n      <div style=\"text-indent:
        36pt;\"> <br>\n      </div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">40</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">Any corporation into
        which an Authenticating Agent may be merged or converted or with which it
        may be consolidated, or any corporation resulting from any merger, conversion
        or consolidation to which such Authenticating\n        Agent shall be a party,
        or any corporation succeeding to the corporate agency or corporate trust business
        of an Authenticating Agent, shall continue to be an Authenticating Agent,
        provided such corporation shall be otherwise eligible under this\n        Section,
        without the execution or filing of any paper or any further act on the part
        of the Trustee or the Authenticating Agent.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">An Authenticating Agent may resign
        at any time by giving written notice thereof to the Trustee and to the Company.
        The Trustee may at any time terminate the agency of an Authenticating Agent
        by giving written notice\n        thereof to such Authenticating Agent and
        to the Company. Upon receiving such a notice of resignation or upon such a
        termination, or in case at any time such Authenticating Agent shall cease
        to be eligible in accordance with the provisions of this\n        Section,
        the Trustee may appoint a successor Authenticating Agent which shall be acceptable
        to the Company and shall give notice of such appointment in the manner provided
        in Section 1.06 to all Holders of Securities of the series with respect to\n
        \       which such Authenticating Agent will serve. Any successor Authenticating
        Agent upon acceptance of its appointment hereunder shall become vested with
        all the rights, powers and duties of its predecessor hereunder, with like
        effect as if originally\n        named as an Authenticating Agent. No successor
        Authenticating Agent shall be appointed unless eligible under the provisions
        of this Section.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company agrees to pay to each Authenticating Agent from time to
        time such compensation for its services under this Section as the Company
        and the Authenticating Agent shall from time to time agree in writing.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If an appointment
        with respect to one or more series is made pursuant to this Section, the Securities
        of such series may have endorsed thereon, in addition to the Trustee&#8217;s
        certificate of authentication, an alternative\n        certificate of authentication
        in the following form:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">This is one of the Securities of the series designated therein referred
        to in the within-mentioned Indenture.</div>\n      <div>&#160;</div>\n      <table
        style=\"font-family: 'Times New Roman'; font-size: 10pt; width: 100%; border-collapse:
        collapse; text-align: left; color: #000000;\" id=\"z22f37adf85844fc2bb3314fad3ac907d\"
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\">\n\n          <tr>\n            <td
        style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td colspan=\"3\"
        style=\"vertical-align: top;\">\n              <div>[&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ],</div>\n            </td>\n          </tr>\n          <tr>\n            <td
        rowspan=\"1\" style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td
        colspan=\"3\" rowspan=\"1\" style=\"vertical-align: top;\">&#160;</td>\n          </tr>\n
        \         <tr>\n            <td style=\"width: 50%; vertical-align: top;\">&#160;</td>\n
        \           <td colspan=\"3\" style=\"vertical-align: top;\">\n              <div
        style=\"font-style: italic;\">As Trustee</div>\n            </td>\n          </tr>\n
        \         <tr>\n            <td rowspan=\"1\" style=\"width: 50%; vertical-align:
        top;\">&#160;</td>\n            <td colspan=\"3\" rowspan=\"1\" style=\"vertical-align:
        top;\">&#160;</td>\n          </tr>\n          <tr>\n            <td style=\"width:
        50%; vertical-align: top; padding-bottom: 2px;\">&#160;</td>\n            <td
        style=\"width: 3%; vertical-align: top; padding-bottom: 2px;\">\n              <div>By
        <br>\n              </div>\n            </td>\n            <td style=\"width:
        37%; vertical-align: top; border-bottom: 2px solid rgb(0, 0, 0);\"><br>\n
        \           </td>\n            <td style=\"width: 10%; vertical-align: top;
        padding-bottom: 2px;\">&#160;</td>\n          </tr>\n          <tr>\n            <td
        style=\"width: 50%; vertical-align: top;\">&#160;</td>\n            <td colspan=\"3\"
        style=\"vertical-align: top;\">\n              <div style=\"margin-left: 54pt;\">As
        Authenticating Agent</div>\n            </td>\n          </tr>\n          <tr>\n
        \           <td rowspan=\"1\" style=\"width: 50%; vertical-align: top;\">&#160;</td>\n
        \           <td colspan=\"3\" rowspan=\"1\" style=\"vertical-align: top;\">&#160;</td>\n
        \         </tr>\n          <tr>\n            <td style=\"width: 50%; vertical-align:
        top; padding-bottom: 2px;\">&#160;</td>\n            <td style=\"width: 3%;
        vertical-align: top; padding-bottom: 2px;\">\n              <div>By<br>\n
        \             </div>\n            </td>\n            <td style=\"width: 37%;
        vertical-align: top; border-bottom: 2px solid rgb(0, 0, 0);\"><br>\n            </td>\n
        \           <td style=\"width: 10%; vertical-align: top; padding-bottom: 2px;\">&#160;</td>\n
        \         </tr>\n          <tr>\n            <td style=\"width: 50%; vertical-align:
        top;\">&#160;</td>\n            <td colspan=\"3\" style=\"vertical-align:
        top;\">\n              <div style=\"font-style: italic; margin-left: 54pt;\">Authorized
        Signatory</div>\n            </td>\n          </tr>\n\n      </table>\n      <div
        style=\"text-align: center;\"> <br>\n      </div>\n      <div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\">\n        <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\">41</font></div>\n
        \       <div class=\"BRPFPageBreak\" style=\"page-break-after: always;\">\n
        \         <hr style=\"border-width: 0px; clear: both; margin: 4px 0px; width:
        100%; height: 2px; color: #000000; background-color: #000000;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-align: center;\">ARTICLE SEVEN</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-align: center;\">HOLDERS&#8217;
        LISTS AND REPORTS BY TRUSTEE AND THE COMPANY</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 7.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Company to Furnish Trustee Names and Addresses
        of Holders</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company will furnish or cause to be furnished to the Trustee</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;semi-annually,
        not later than [ &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; ]
        and [ &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; ] in each year,
        a list, in such form as the Trustee may reasonably require, of the names and
        addresses of the Holders of Securities of each\n        series as of the preceding
        [ &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; ] or [ &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        ], as the case may be, and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;at
        such other times as the Trustee may request in writing, within 30 days after
        the receipt by the Company of any such request, a list of similar form and
        content as of a date not more than 15 days prior\n        to the time such
        list is furnished, excluding from any such list names and addresses received
        by the Trustee in its capacity as Security Registrar.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 7.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Preservation of Information; Communications
        to Holders.</font></div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Trustee shall preserve, in as current a form as is reasonably
        practicable, the names and addresses of Holders contained in the most recent
        list furnished to the Trustee as provided in Section 7.01 and the names and\n
        \       addresses of Holders received by the Trustee in its capacity as Security
        Registrar. The Trustee may destroy any list furnished to it as provided in
        Section 7.01 upon receipt of a new list so furnished.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The rights of Holders to communicate
        with other Holders with respect to their rights under this Indenture or under
        the Securities, and the corresponding rights and privileges of the Trustee,
        shall be as provided by the\n        Trust Indenture Act.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Every Holder of Securities, by receiving
        and holding the same, agrees with the Company and the Trustee that neither
        the Company nor the Trustee nor any agent of either of them shall be held
        accountable by reason of any\n        disclosure of information as to names
        and addresses of Holders made pursuant to the Trust Indenture Act.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 7.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Reports by Trustee</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Trustee shall transmit to Holders
        such reports concerning the Trustee and its actions under this Indenture as
        may be required pursuant to the Trust Indenture Act at the times and in the
        manner provided pursuant\n        thereto. Reports so required to be transmitted
        at stated intervals of not more than 12 months shall be transmitted within
        60 days after the first date of issuance of Securities and on each anniversary
        of such date.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">A copy of each such report shall, at the time of such transmission
        to Holders, be filed by the Trustee with each stock exchange upon which any
        Securities are listed, with the Commission and with the Company. The\n        Company
        will promptly notify the Trustee when any Securities are listed on any stock
        exchange.</div>\n      <div>&#160;</div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\">42</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>SECTION 7.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Reports by the Company</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company shall file with the Trustee
        and the Commission, and transmit to Holders, such information, documents and
        other reports, and such summaries thereof, as may be required pursuant to
        the Trust Indenture Act at\n        the times and in the manner provided pursuant
        to such Act; <font style=\"font-style: italic;\">provided </font>that any
        such information, documents or reports required to be filed with the Commission
        pursuant to Section 13 or 15(d) of the Exchange\n        Act shall be filed
        with the Trustee within 15 days after the same is so required to be filed
        with the Commission.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Delivery of such reports, information and documents to the Trustee
        is for informational purposes only and the Trustee&#8217;s receipt of such
        shall not constitute constructive notice of any information contained therein
        or\n        determinable from information contained therein, including the
        Company&#8217;s compliance with any of its covenants hereunder (as to which
        the Trustee is entitled to rely exclusively on Officers&#8217; Certificates).</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-align: center;\">ARTICLE
        EIGHT</div>\n      <div>&#160;</div>\n      <div style=\"text-align: center;\">CONSOLIDATION,
        MERGER, CONVEYANCE, TRANSFER OR LEASE</div>\n      <div>&#160;</div>\n      <div>SECTION
        8.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Company May Consolidate, Etc., Only on Certain Terms</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        shall not consolidate with or merge into any other Person or convey, transfer
        or lease its properties and assets substantially as an entirety to any Person,
        and the Company shall not permit any Person to\n        consolidate with or
        merge into the Company or convey, transfer or lease its properties and assets
        substantially as an entirety to the Company, unless:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;in
        case the Company shall consolidate with or merge into another Person or convey,
        transfer or lease its properties and assets substantially as an entirety to
        any Person, the Person formed by such\n        consolidation or into which
        the Company is merged or the Person which acquires by conveyance or transfer,
        or which leases, the properties and assets of the Company substantially as
        an entirety shall <font style=\"color: rgb(0, 0, 0);\">be a\n          corporation
        organized and existing under the laws of the United States, any state thereof
        or the District of Columbia, and shall </font>expressly assume, by an indenture
        supplemental hereto, executed and delivered to the Trustee, in form\n        satisfactory
        to the Trustee, the due and punctual payment of the principal of and any premium
        and interest on all the Securities and the performance or observance of every
        covenant of this Indenture on the part of the Company to be performed or\n
        \       observed;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;immediately
        after giving effect to such transaction and treating any indebtedness which
        becomes an obligation of the Company or any Subsidiary as a result of such
        transaction as having been incurred by the\n        Company or such Subsidiary
        at the time of such transaction, no Event of Default, and no event which,
        after notice or lapse of time or both, would become an Event of Default, shall
        have happened and be continuing; and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Company has delivered to the Trustee an Officers&#8217; Certificate and an
        Opinion of Counsel, each stating that such consolidation, merger, conveyance,
        transfer or lease and, if a supplemental indenture is\n        required in
        connection with such transaction, such supplemental indenture comply with
        this Article and that all conditions precedent herein provided for relating
        to such transaction have been complied with.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">43</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 8.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Successor Substituted</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Upon any consolidation of the Company
        with, or merger of the Company into, any other Person or any conveyance, transfer
        or lease of the properties and assets of the Company substantially as an entirety
        in accordance\n        with Section 8.01, the successor Person formed by such
        consolidation or into which the Company is merged or to which such conveyance,
        transfer or lease is made shall succeed to, and be substituted for, and may
        exercise every right and power of, the\n        Company under this Indenture
        with the same effect as if such successor Person had been named as the Company
        herein, and thereafter, except in the case of a lease, the predecessor Person
        shall be relieved of all obligations and covenants under this\n        Indenture
        and the Securities.</div>\n      <div>&#160;</div>\n      <div style=\"text-align:
        center;\">ARTICLE NINE</div>\n      <div>&#160;</div>\n      <div style=\"text-align:
        center;\">SUPPLEMENTAL INDENTURES</div>\n      <div>&#160;</div>\n      <div>SECTION
        9.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Supplemental Indentures Without Consent of Holders</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Without the
        consent of any Holders, the Company, when authorized by a Board Resolution,
        and the Trustee, at any time and from time to time, may enter into one or
        more indentures supplemental hereto, in form\n        satisfactory to the
        Trustee, for any of the following purposes:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        evidence the succession of another Person to the Company and the assumption
        by any such successor of the covenants of the Company herein and in the Securities
        or to evidence the addition or release of\n        any guarantor; or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        add to the covenants of the Company for the benefit of the Holders of all
        or any series of Securities (and if such covenants are to be for the benefit
        of less than all series of Securities, stating that\n        such covenants
        are expressly being included solely for the benefit of such series) or to
        surrender any right or power herein conferred upon the Company; or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        add any additional Events of Default for the benefit of the Holders of all
        or any series of Securities (and if such additional Events of Default are
        to be for the benefit of less than all series of\n        Securities, stating
        that such additional Events of Default are expressly being included solely
        for the benefit of such series); or</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        add to or change any of the provisions of this Indenture to such extent as
        shall be necessary to permit or facilitate the issuance of Securities in bearer
        form, registrable or not registrable as to\n        principal, and with or
        without interest coupons, or to permit or facilitate the issuance of Securities
        in uncertificated form, <font style=\"font-style: italic;\">provided </font>that
        any such action shall not adversely affect the interests of the\n        Holders
        of Securities of any series or any related coupons in any material respect;
        or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        add to, change or eliminate any of the provisions of this Indenture in respect
        of one or more series of Securities, provided that any such addition, change
        or elimination (A) shall neither (i) apply to\n        any Security of any
        series created prior to the execution of such supplemental indenture and entitled
        to the benefit of such provision nor (ii) modify the rights of the Holder
        of any such Security with respect to such provision or (B) shall become\n
        \       effective only when there is no such Security Outstanding; or</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">44</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        secure or provide for the guarantee of the Securities; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(7)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        establish the form or terms of Securities of any series and any related coupons
        as permitted by Sections 2.01 and 3.01; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        evidence and provide for the acceptance of appointment hereunder by a successor
        Trustee with respect to the Securities of one or more series and to add to
        or change any of the provisions of this\n        Indenture as shall be necessary
        to provide for or facilitate the administration of the trusts hereunder by
        more than one Trustee, pursuant to the requirements of Section 6.11; or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(9)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;to
        cure any ambiguity, to correct or supplement any provision herein which may
        be defective or inconsistent with any other provision herein, or to make any
        other provisions with respect to matters or\n        questions arising under
        this Indenture, <font style=\"font-style: italic;\">provided </font>that such
        action pursuant to this Clause (9) shall not adversely affect the interests
        of the Holders of Securities of any series in any material respect; or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(10)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        to supplement any of the provisions of this Indenture to the extent necessary
        to permit or facilitate the Defeasance and discharge of any series of Securities
        pursuant to sections 4.01, 13.02 and 13.03; <font style=\"font-style: italic;\">provided
        </font>that any such action shall not adversely affect the interests of the
        Holders of Securities of any series in any material respect; or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(11)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        to make provisions with respect conversion or exchange rights of Holders of
        Securities of any series; or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(12)&#160;&#160;&#160;&#160;&#160;&#160;&#160; to add, delete from
        or revise the conditions, limitations or restrictions on issue, authentication
        and delivery of Securities; or</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(13)&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        to conform any provision in an indenture to the requirements of the Trust
        Indenture Act; or</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(14)&#160;&#160;&#160;&#160;&#160;&#160;&#160; to make any change
        that does not adversely affect the legal rights of any Holder of Securities
        of any series.</div>\n      <div>&#160;</div>\n      <div>SECTION 9.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Supplemental Indentures With Consent of Holders</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">With the
        consent of the Holders of not less than a majority in principal amount of
        the Outstanding Securities of each series affected by such supplemental indenture,
        by Act of said Holders delivered to the Company and\n        the Trustee,
        the Company, when authorized by a Board Resolution, and the Trustee may enter
        into an indenture or indentures supplemental hereto for the purpose of adding
        any provisions to or changing in any manner or eliminating any of the\n        provisions
        of this Indenture or of modifying in any manner the rights of the Holders
        of Securities of such series under this Indenture; <font style=\"font-style:
        italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that no\n        such supplemental indenture shall, without the consent of
        the Holder of each Outstanding Security affected thereby,</div>\n      <div
        style=\"text-indent: 36pt;\"> <br>\n      </div>\n      <div style=\"text-indent:
        36pt;\">\n        <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;change
        the Stated Maturity of the principal of, or any installment of principal of
        or interest on, any Security, or reduce the principal amount thereof or the
        rate of interest thereon or any premium\n          payable upon the redemption
        thereof, or reduce the amount of the principal of an Original Issue Discount
        Security or any other Security which would be due and payable upon a declaration
        of acceleration of the Maturity thereof pursuant to Section\n          5.02,
        or change any Place of Payment where, or the coin or currency in which, any
        Security or any premium or interest thereon is payable, or impair the right
        to institute suit for the enforcement of any such payment on or after the
        Stated\n          Maturity thereof (or, in the case of redemption, on or after
        the Redemption Date), or</div>\n      </div>\n      <div>&#160;</div>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">45</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      &#160;\n      <div
        style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;reduce
        the percentage in principal amount of the Outstanding Securities of any series,
        the consent of whose Holders is required for any such supplemental indenture,
        or the consent of whose Holders is\n        required for any waiver (of compliance
        with certain provisions of this Indenture or certain defaults hereunder and
        their consequences) provided for in this Indenture, or</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;modify
        any of the provisions of this Section, Section 5.13 or Section 10.07, except
        to increase any such percentage or to provide that certain other provisions
        of this Indenture cannot be modified or\n        waived without the consent
        of the Holder of each Outstanding Security affected thereby; <font style=\"font-style:
        italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that this clause shall not be deemed to require the\n        consent of any
        Holder with respect to changes in the references to &#8220;the Trustee&#8221;
        and concomitant changes in this Section and Section 10.07, or the deletion
        of this proviso, in accordance with the requirements of Sections 6.11 and
        9.01(8).</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">A
        supplemental indenture which changes or eliminates any covenant or other provision
        of this Indenture which has expressly been included solely for the benefit
        of one or more particular series of Securities, or which\n        modifies
        the rights of the Holders of Securities of such series with respect to such
        covenant or other provision, shall be deemed not to affect the rights under
        this Indenture of the Holders of Securities of any other series.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">It shall not be necessary for any
        Act of Holders under this Section to approve the particular form of any proposed
        supplemental indenture, but it shall be sufficient if such Act shall approve
        the substance thereof.</div>\n      <div>&#160;</div>\n      <div>SECTION
        9.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Execution of Supplemental Indentures</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In executing, or accepting the additional
        trusts created by, any supplemental indenture permitted by this Article or
        the modifications thereby of the trusts created by this Indenture, the Trustee
        shall be entitled to\n        receive, and (subject to Section 6.01) shall
        be fully protected in relying upon, an Opinion of Counsel stating that the
        execution of such supplemental indenture is authorized or permitted by this
        Indenture. The Trustee may, but shall not be\n        obligated to, enter
        into any such supplemental indenture which affects the Trustee&#8217;s own
        rights, duties or immunities under this Indenture or otherwise.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 9.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Effect of Supplemental Indentures</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Upon the
        execution of any supplemental indenture under this Article, this Indenture
        shall be modified in accordance therewith, and such supplemental indenture
        shall form a part of this Indenture for all purposes; and\n        every Holder
        of Securities theretofore or thereafter authenticated and delivered hereunder
        shall be bound thereby.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">46</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 9.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Conformity with Trust Indenture Act</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Every supplemental
        indenture executed pursuant to this Article shall conform to the requirements
        of the Trust Indenture Act.</div>\n      <div>&#160;</div>\n      <div>SECTION
        9.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Reference in Securities to Supplemental Indentures</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Securities
        of any series authenticated and delivered after the execution of any supplemental
        indenture pursuant to this Article may, and shall if required by the Trustee,
        bear a notation in form approved by the Trustee\n        as to any matter
        provided for in such supplemental indenture. If the Company shall so determine,
        new Securities of any series so modified as to conform, in the opinion of
        the Trustee and the Company, to any such supplemental indenture may be\n        prepared
        and executed by the Company and authenticated and delivered by the Trustee
        in exchange for Outstanding Securities of such series.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">ARTICLE TEN</div>\n      <div><br>\n
        \     </div>\n      <div style=\"text-align: center;\">COVENANTS</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 10.01&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Payment of Principal, Premium and Interest</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company covenants and agrees for
        the benefit of each series of Securities that it will duly and punctually
        pay the principal of and any premium and interest on the Securities of that
        series in accordance with the\n        terms of the Securities and this Indenture.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 10.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Maintenance of Office or Agency</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        will maintain in each Place of Payment for any series of Securities an office
        or agency where Securities of that series may be presented or surrendered
        for payment, where Securities of that series may be\n        surrendered for
        registration of transfer or exchange and where notices and demands to or upon
        the Company in respect of the Securities of that series and this Indenture
        may be served. The Company will give prompt written notice to the Trustee
        of\n        the location, and any change in the location, of such office or
        agency. If at any time the Company shall fail to maintain any such required
        office or agency or shall fail to furnish the Trustee with the address thereof,
        such presentations,\n        surrenders, notices and demands may be made or
        served at the Corporate Trust Office of the Trustee, and the Company hereby
        appoints the Trustee as its agent to receive all such presentations, surrenders,
        notices and demands.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company may also from time to time designate one or more other
        offices or agencies where the Securities of one or more series may be presented
        or surrendered for any or all such purposes and may from time to time\n        rescind
        such designations; <font style=\"font-style: italic;\">provided</font>, <font
        style=\"font-style: italic;\">however</font>, that no such designation or
        rescission shall in any manner relieve the Company of its obligation to maintain
        an office\n        or agency in each Place of Payment for Securities of any
        series for such purposes. The Company will give prompt written notice to the
        Trustee of any such designation or rescission and of any change in the location
        of any such other office or\n        agency.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">47</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">With respect to any Global Security, and except as otherwise may be
        specified for such Global Security as contemplated by Section 3.01, the Corporate
        Trust Office of the Trustee shall be the Place of Payment where such\n        Global
        Security may be presented or surrendered for payment or for registration of
        transfer or exchange, or where successor Securities may be delivered in exchange
        therefore, <font style=\"font-style: italic;\">provided, however</font>, that
        any\n        such payment, presentation, surrender or delivery effected pursuant
        to the Applicable Procedures of the Depositary for such Global Security shall
        be deemed to have been effected at the Place of Payment for such Global Security
        in accordance with\n        the provisions of this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 10.03&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Money for Securities Payments to Be Held in Trust</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If the Company
        shall at any time act as its own Paying Agent with respect to any series of
        Securities, it will, on or before each due date of the principal of or any
        premium or interest on any of the Securities of that\n        series, segregate
        and hold in trust for the benefit of the Persons entitled thereto a sum sufficient
        to pay the principal and any premium and interest so becoming due until such
        sums shall be paid to such Persons or otherwise disposed of as herein\n        provided
        and will promptly notify the Trustee of its action or failure so to act.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Whenever
        the Company shall have one or more Paying Agents for any series of Securities,
        it will, prior to each due date of the principal of or any premium or interest
        on any Securities of that series, deposit (or, if\n        the Company has
        deposited any trust funds with a trustee pursuant to Section 13.04(1), cause
        such trustee to deposit) with a Paying Agent a sum sufficient to pay such
        amount, such sum to be held as provided by the Trust Indenture Act, and (unless\n
        \       such Paying Agent is the Trustee) the Company will promptly notify
        the Trustee of its action or failure so to act.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company will cause each Paying
        Agent for any series of Securities other than the Trustee to execute and deliver
        to the Trustee an instrument in which such Paying Agent shall agree with the
        Trustee, subject to the\n        provisions of this Section, that such Paying
        Agent will (1) comply with the provisions of the Trust Indenture Act applicable
        to it as a Paying Agent and (2) during the continuance of any default by the
        Company (or any other obligor upon the\n        Securities of that series)
        in the making of any payment in respect of the Securities of that series,
        upon the written request of the Trustee, forthwith pay to the Trustee all
        sums held in trust by such Paying Agent for payment in respect of the\n        Securities
        of that series.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company may at any time, for the purpose of obtaining the satisfaction
        and discharge of this Indenture or for any other purpose, pay, or by Company
        Order direct any Paying Agent to pay, to the Trustee all sums held\n        in
        trust by the Company or such Paying Agent, such sums to be held by the Trustee
        upon the same trusts as those upon which such sums were held by the Company
        or such Paying Agent; and, upon such payment by any Paying Agent to the Trustee,
        such\n        Paying Agent shall be released from all further liability with
        respect to such money.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">48</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">Any money deposited with the Trustee or any Paying Agent, or then
        held by the Company, in trust for the payment of the principal of or any premium
        or interest on any Security of any series and remaining unclaimed for\n        two
        years after such principal, premium or interest has become due and payable
        shall be paid to the Company on Company Request, or (if then held by the Company)
        shall be discharged from such trust; and the Holder of such Security shall
        thereafter,\n        as an unsecured general creditor, look only to the Company
        for payment thereof, and all liability of the Trustee or such Paying Agent
        with respect to such trust money, and all liability of the Company as trustee
        thereof, shall thereupon cease; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that the Trustee or such
        Paying Agent, before being required to make any such repayment, may at the
        expense of the Company cause to be published once,\n        in a newspaper
        published in the English language, customarily published on each Business
        Day and of general circulation in New York, New York, notice that such money
        remains unclaimed and that, after a date specified therein, which shall not
        be\n        less than 30 days from the date of such publication, any unclaimed
        balance of such money then remaining will be repaid to the Company.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 10.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Statement by Officers as to Default</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        will deliver to the Trustee, within 120 days after the end of each fiscal
        year of the Company ending after the date hereof, an Officers&#8217; Certificate,
        stating whether or not to the best knowledge of the\n        signers thereof
        the Company is in default in the performance and observance of any of the
        terms, provisions and conditions of this Indenture (without regard to any
        period of grace or requirement of notice provided hereunder) and, if the Company\n
        \       shall be in default, specifying all such defaults and the nature and
        status thereof of which they may have knowledge.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 10.05&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Existence</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Subject to Article Eight, the Company will do or cause to be done
        all things necessary to preserve and keep in full force and effect its existence,
        rights (charter and statutory) and franchises; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that the Company shall
        not be required to preserve any such right or franchise if the Board of Directors
        shall determine that the preservation thereof\n        is no longer desirable
        in the conduct of the business of the Company and that the loss thereof is
        not disadvantageous in any material respect to the Holders of Outstanding
        Securities.</div>\n      <div>&#160;</div>\n      <div>SECTION 10.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Payment of Taxes and Other Claims</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        will pay or discharge or cause to be paid or discharged, before the same shall
        become delinquent, (1) all taxes, assessments and governmental charges levied
        or imposed upon the Company or any Subsidiary or\n        upon the income,
        profits or property of the Company or any Subsidiary, and (2) all lawful claims
        for labor, materials and supplies which, if unpaid, might by law become a
        lien upon the property of the Company or any Subsidiary; <font style=\"font-style:
        italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that the Company shall not be required to pay or discharge or cause to be
        paid or discharged any such tax, assessment, charge or claim whose amount,\n
        \       applicability or validity is being contested in good faith by appropriate
        proceedings.</div>\n      <div>&#160;</div>\n      <div>SECTION 10.07&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Waiver of Certain Covenants</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Except as
        otherwise specified as contemplated by Section 3.01 for Securities of a specific
        series, the Company may, with respect to the Securities of any series, omit
        in any particular instance to comply with any term,\n        provision or
        condition set forth in any covenant provided pursuant to Section 3.01(18)
        or 9.01(2) for the benefit of the Holders of such series, in Article Eight
        or in any of Sections 10.05 and 10.06, if before the time for such compliance
        the\n        Holders of at least a majority in principal amount of the Outstanding
        Securities of such series shall, by Act of such Holders, either waive such
        compliance in such instance or generally waive compliance with such term,
        provision or condition, but\n        no such waiver shall extend to or affect
        such term, provision or condition except to the extent so expressly waived,
        and, until such waiver shall become effective, the obligations of the Company
        and the duties of the Trustee in respect of any such\n        term, provision
        or condition shall remain in full force and effect.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">49</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 10.08&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Calculation of Original Issue Discount</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Company
        shall file with the Trustee promptly at the end of each calendar year a written
        notice specifying the amount of original issue discount (including daily rates
        and accrual periods) accrued on Outstanding\n        Securities as of the
        end of such year, but only if as of the end of such year Securities issued
        at an original issue discount are then Outstanding.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">ARTICLE ELEVEN</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">REDEMPTION OF SECURITIES</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 11.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Applicability of Article</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Securities
        of any series which are redeemable before their Stated Maturity shall be redeemable
        in accordance with their terms and (except as otherwise specified as contemplated
        by Section 3.01 for such Securities) in\n        accordance with this Article.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 11.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Election to Redeem; Notice to Trustee</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The election
        of the Company to redeem any Securities shall be evidenced by a Board Resolution
        or in another manner specified as contemplated by Section 3.01 for such Securities.
        In case of any redemption at the\n        election of the Company of less
        than all the Securities of any series (including any such redemption affecting
        only a single Security), the Company shall, at least 60 days prior to the
        Redemption Date fixed by the Company (unless a shorter notice\n        shall
        be satisfactory to the Trustee), notify the Trustee of such Redemption Date,
        of the principal amount of Securities of such series to be redeemed and, if
        applicable, of the tenor of the Securities to be redeemed. In the case of
        any redemption\n        of Securities prior to the expiration of any restriction
        on such redemption provided in the terms of such Securities or elsewhere in
        this Indenture, the Company shall furnish the Trustee with an Officers&#8217;
        Certificate evidencing compliance with such\n        restriction.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 11.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Selection by Trustee of Securities to
        Be Redeemed</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">If less than all the Securities of any series are to be redeemed (unless
        all the Securities of such series and of a specified tenor are to be redeemed
        or unless such redemption affects only a single Security), the\n        particular
        Securities to be redeemed shall be selected not more than 60 days prior to
        the Redemption Date by the Trustee, from the Outstanding Securities of such
        series not previously called for redemption, by such method as the Trustee
        shall deem\n        fair and appropriate and which may provide for the selection
        for redemption of a portion of the principal amount of any Security of such
        series, <font style=\"font-style: italic;\">provided </font>that the unredeemed
        portion of the principal amount\n        of any Security shall be in an authorized
        denomination (which shall not be less than the minimum authorized denomination)
        for such Security. If less than all the Securities of such series and of a
        specified tenor are to be redeemed (unless such\n        redemption affects
        only a single Security), the particular Securities to be redeemed shall be
        selected not more than 60 days prior to the Redemption Date by the Trustee,
        from the Outstanding Securities of such series and specified tenor not\n        previously
        called for redemption in accordance with the preceding sentence.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">50</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">The Trustee shall promptly notify the Company in writing of the Securities
        selected for redemption as aforesaid and, in case of any Securities selected
        for partial redemption as aforesaid, the principal amount thereof\n        to
        be redeemed.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The provisions of the two preceding paragraphs shall not apply with
        respect to any redemption affecting only a single Security, whether such Security
        is to be redeemed in whole or in part. In the case of any such\n        redemption
        in part, the unredeemed portion of the principal amount of the Security shall
        be in an authorized denomination (which shall not be less than the minimum
        authorized denomination) for such Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">For all purposes of this Indenture,
        unless the context otherwise requires, all provisions relating to the redemption
        of Securities shall relate, in the case of any Securities redeemed or to be
        redeemed only in part, to\n        the portion of the principal amount of
        such Securities which has been or is to be redeemed.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 11.04&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Notice of Redemption</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">Notice of redemption shall be given by first-class
        mail, postage prepaid, mailed not less than 30 nor more than 60 days prior
        to the Redemption Date, to each Holder of Securities to be redeemed, at his
        address\n        appearing in the Security Register, with a copy to the Trustee
        and any Paying Agent.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">All notices of redemption shall identify the Securities to be redeemed,
        including CUSIP number, if any, and shall state:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Redemption Date,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Redemption Price,</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;if
        less than all the Outstanding Securities of any series consisting of more
        than a single Security are to be redeemed, the identification (and, in the
        case of partial redemption of any such Securities,\n        the principal
        amounts) of the particular Securities to be redeemed and, if less than all
        the Outstanding Securities of any series consisting of a single Security are
        to be redeemed, the principal amount of the particular Security to be redeemed,</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;that
        on the Redemption Date the Redemption Price will become due and payable upon
        each such Security to be redeemed and, if applicable, that interest thereon
        will cease to accrue on and after said date,</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        place or places where each such Security is to be surrendered for payment
        of the Redemption Price, and</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">51</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;that
        the redemption is for a sinking fund, if such is the case.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Notice of redemption of Securities
        to be redeemed at the election of the Company shall be given by the Company
        or, at the Company&#8217;s request made to the Trustee at least 35 days prior
        to the Redemption Date, by the\n        Trustee in the name and at the expense
        of the Company and shall be irrevocable.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 11.05&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Deposit of Redemption Price</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Prior to any Redemption Date, the
        Company shall deposit with the Trustee or with a Paying Agent (or, if the
        Company is acting as its own Paying Agent, segregate and hold in trust as
        provided in Section 10.03) an amount\n        of money sufficient to pay the
        Redemption Price of, and (except if the Redemption Date shall be an Interest
        Payment Date or the Securities of the series provide otherwise) accrued interest
        on, all the Securities which are to be redeemed on that\n        date.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 11.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Securities Payable on Redemption Date</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Notice of
        redemption having been given as aforesaid, the Securities so to be redeemed
        shall, on the Redemption Date, become due and payable at the Redemption Price
        therein specified, and from and after such date\n        (unless the Company
        shall default in the payment of the Redemption Price and accrued interest)
        such Securities shall cease to bear interest. Upon surrender of any such Security
        for redemption in accordance with said notice, such Security shall be\n        paid
        by the Company at the Redemption Price, together, if applicable, with accrued
        interest to the Redemption Date; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that, unless otherwise\n
        \       specified as contemplated by Section 3.01, installments of interest
        whose Stated Maturity is on or prior to the Redemption Date will be payable
        to the Holders of such Securities, or one or more Predecessor Securities,
        registered as such at the\n        close of business on the relevant Record
        Dates according to their terms and the provisions of Section 3.07.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If any Security
        called for redemption shall not be so paid upon surrender thereof for redemption,
        the principal and any premium shall, until paid, bear interest from the Redemption
        Date at the rate prescribed therefor\n        in the Security.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 11.07&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Securities Redeemed in Part</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Any Security which is to be redeemed
        only in part shall be surrendered at a Place of Payment therefor (with, if
        the Company or the Trustee so requires, due endorsement by, or a written instrument
        of transfer in form\n        satisfactory to the Company and the Trustee duly
        executed by, the Holder thereof or his attorney duly authorized in writing),
        and the Company shall execute, and the Trustee shall authenticate and deliver
        to the Holder of such Security without\n        service charge, a new Security
        or Securities of the same series and of like tenor, of any authorized denomination
        as requested by such Holder, in aggregate principal amount equal to and in
        exchange for the unredeemed portion of the principal of the\n        Security
        so surrendered.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">52</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-align:
        center;\">ARTICLE TWELVE</div>\n      <div><br>\n      </div>\n      <div
        style=\"text-align: center;\">SINKING FUNDS</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 12.01&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Applicability of Article</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The provisions of this Article shall
        be applicable to any sinking fund for the retirement of Securities of any
        series except as otherwise specified as contemplated by Section 3.01 for such
        Securities.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The minimum amount of any sinking fund payment provided for by the
        terms of any Securities is herein referred to as a &#8220;mandatory sinking
        fund payment&#8221;, and any payment in excess of such minimum amount provided
        for by\n        the terms of such Securities is herein referred to as an &#8220;optional
        sinking fund payment&#8221;. If provided for by the terms of any Securities,
        the cash amount of any sinking fund payment may be subject to reduction as
        provided in Section 12.02. Each\n        sinking fund payment shall be applied
        to the redemption of Securities as provided for by the terms of such Securities.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 12.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Satisfaction of Sinking Fund Payments
        with Securities</font>.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The Company (1) may deliver Outstanding Securities of a series (other
        than any previously called for redemption) and (2) may apply as a credit Securities
        of a series which have been redeemed either at the election of\n        the
        Company pursuant to the terms of such Securities or through the application
        of permitted optional sinking fund payments pursuant to the terms of such
        Securities, in each case in satisfaction of all or any part of any sinking
        fund payment with\n        respect to any Securities of such series required
        to be made pursuant to the terms of such Securities as and to the extent provided
        for by the terms of such Securities; <font style=\"font-style: italic;\">provided
        </font>that the Securities to be\n        so credited have not been previously
        so credited. The Securities to be so credited shall be received and credited
        for such purpose by the Trustee at the Redemption Price, as specified in the
        Securities so to be redeemed, for redemption through\n        operation of
        the sinking fund and the amount of such sinking fund payment shall be reduced
        accordingly.</div>\n      <div>&#160;</div>\n      <div>SECTION 12.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Redemption of Securities for Sinking Fund</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Not less
        than 60 days (or such shorter period as shall be satisfactory to the Trustee)
        prior to each sinking fund payment date for any Securities, the Company will
        deliver to the Trustee an Officers&#8217; Certificate\n        specifying
        the amount of the next ensuing sinking fund payment for such Securities pursuant
        to the terms of such Securities, the portion thereof, if any, which is to
        be satisfied by payment of cash and the portion thereof, if any, which is
        to be\n        satisfied by delivering and crediting Securities pursuant to
        Section 12.02 and will also deliver to the Trustee any Securities to be so
        delivered. Not less than 30 nor more than 45 days prior to each such sinking
        fund payment date, the Trustee\n        shall select the Securities to be
        redeemed upon such sinking fund payment date in the manner specified in Section
        11.03 and cause notice of the redemption thereof to be given in the name of
        and at the expense of the Company in the manner provided\n        in Section
        11.04. Such notice having been duly given, the redemption of such Securities
        shall be made upon the terms and in the manner stated in Sections 11.06 and
        11.07.</div>\n      <div>&#160;</div>\n      <div style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">53</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-align: center;\">ARTICLE THIRTEEN</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-align: center;\">DEFEASANCE
        AND COVENANT DEFEASANCE</div>\n      <div>&#160;</div>\n      <div>SECTION
        13.01&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Company&#8217;s Option to Effect Defeasance or Covenant Defeasance</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If applicable
        to a particular series of Securities, the Company may elect, at its option
        at any time, to have Section 13.02 or Section 13.03 applied to any such series
        of Securities or any Securities of such series, as\n        the case may be,
        designated pursuant to Section 3.01 as being defeasible pursuant to such Section
        13.02 or 13.03, in accordance with any applicable requirements provided pursuant
        to Section 3.01 and upon compliance with the conditions set forth\n        below
        in this Article. Any such election shall be evidenced by a Board Resolution
        or in another manner specified as contemplated by Section 3.01 for such Securities.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 13.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Defeasance and Discharge</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Upon the
        Company&#8217;s exercise of its option (if any) to have this Section applied
        to any applicable series of Securities or any Securities of such series, as
        the case may be, the Company shall be deemed to have been\n        discharged
        from its obligations with respect to such Securities as provided in this Section
        on and after the date the conditions set forth in Section 13.04 are satisfied
        (hereinafter called &#8220;Defeasance&#8221;). For this purpose, such Defeasance
        means\n        that the Company shall be deemed to have paid and discharged
        the entire indebtedness represented by such Securities and to have satisfied
        all its other obligations under such Securities and this Indenture insofar
        as such Securities are concerned\n        (and the Trustee, at the expense
        of the Company, shall execute proper instruments acknowledging the same),
        subject to the following which shall survive until otherwise terminated or
        discharged hereunder:&#160; (1) the rights of Holders of such\n        Securities
        to receive, solely from the trust fund described in Section 13.04 and as more
        fully set forth in such Section, payments in respect of the principal of and
        any premium and interest on such Securities when payments are due, (2) the\n
        \       Company&#8217;s obligations with respect to such Securities under
        Sections 3.04, 3.05, 3.06, 10.02 and 10.03, (3) the rights, powers, trusts,
        duties and immunities of the Trustee hereunder and (4) this Article. Subject
        to compliance with this Article,\n        the Company may exercise its option
        (if any) to have this Section applied to any applicable Securities notwithstanding
        the prior exercise of its option (if any) to have Section 13.03 applied to
        such Securities.</div>\n      <div>&#160;</div>\n      <div>SECTION 13.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Covenant Defeasance</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Upon the Company&#8217;s exercise
        of its option (if any) to have this Section applied to any applicable series
        of Securities or any Securities of such series, as the case may be, (1) the
        Company shall be released from its\n        obligations under Section 10.06,
        and any covenants provided pursuant to Section 3.01(18), 9.01(2) or 9.01(7)
        for the benefit of the Holders of such Securities and (2) the occurrence of
        any event specified in Sections 5.01(4) (with respect to\n        Section
        10.06, and any such covenants provided pursuant to Section 3.01(18), 9.01(2)
        and 5.01(7) shall be deemed not to be or result in an Event of Default, in
        each case with respect to such Securities as provided in this Section on and
        after the\n        date the conditions set forth in Section 13.04 are satisfied
        (hereinafter called &#8220;Covenant Defeasance&#8221;). For this purpose,
        such Covenant Defeasance means that, with respect to such Securities, the
        Company may omit to comply with and shall have no\n        liability in respect
        of any term, condition or limitation set forth in any such specified Section
        (to the extent so specified in the case of Section 5.01(4)), whether directly
        or indirectly by reason of any reference elsewhere herein to any such\n        Section
        or by reason of any reference in any such Section to any other provision herein
        or in any other document, but the remainder of this Indenture and such Securities
        shall be unaffected thereby.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">54</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 13.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Conditions to Defeasance or Covenant Defeasance</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The following
        shall be the conditions to the application of Section 13.02 or Section 13.03
        to any applicable series of Securities or any Securities of such series, as
        the case may be:</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;The
        Company shall irrevocably have deposited or caused to be deposited with the
        Trustee (or another trustee which satisfies the requirements contemplated
        by Section 6.09 and agrees to comply with the\n        provisions of this
        Article applicable to it) as atrust funds in trust for the purpose of making
        the following payments, specifically pledged as security for, and dedicated
        solely to, the benefits of the Holders of such Securities, (A) money in an\n
        \       amount, or (B) U.S. Government Obligations which through the scheduled
        payment of principal and interest in respect thereof in accordance with their
        terms will provide, not later than one day before the due date of any payment,
        money in an amount,\n        or (C) a combination thereof, in each case sufficient,
        in the opinion of a nationally recognized firm of independent public accountants
        expressed in a written certification thereof delivered to the Trustee, to
        pay and discharge, and which shall be\n        applied by the Trustee (or
        any such other qualifying trustee) to pay and discharge, the principal of
        and any premium and interest on such Securities on the respective Stated Maturities,
        in accordance with the terms of this Indenture and such\n        Securities.
        As used herein, &#8220;U.S. Government Obligation&#8221; means (x) any security
        which is (i) a direct obligation of the United States of America for the payment
        of which the full faith and credit of the United States of America is pledged
        or (ii)\n        an obligation of a Person controlled or supervised by and
        acting as an agency or instrumentality of the United States of America the
        payment of which is unconditionally guaranteed as a full faith and credit
        obligation by the United States of\n        America, which, in either case
        (i) or (ii), is not callable or redeemable at the option of the issuer thereof,
        and (y) any depositary receipt issued by a bank (as defined in Section 3(a)(2)
        of the Securities Act) as custodian with respect to any\n        U.S. Government
        Obligation which is specified in Clause (x) above and held by such bank for
        the account of the holder of such depositary receipt, or with respect to any
        specific payment of principal of or interest on any U.S. Government Obligation\n
        \       which is so specified and held, <font style=\"font-style: italic;\">provided
        </font>that (except as required by law) such custodian is not authorized to
        make any deduction from the amount payable to the holder of such depositary
        receipt from any\n        amount received by the custodian in respect of the
        U.S. Government Obligation or the specific payment of principal or interest
        evidenced by such depositary receipt.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;In
        the event of an election to have Section 13.02 apply to any applicable series
        of Securities or any Securities of such series, as the case may be, the Company
        shall have delivered to the Trustee an\n        Opinion of Counsel stating
        that (A) the Company has received from, or there has been published by, the
        Internal Revenue Service a ruling or (B) since the date of this instrument,
        there has been a change in the applicable Federal income tax law, in\n        either
        case (A) or (B) to the effect that, and based thereon such opinion shall confirm
        that, the Holders of such Securities will not recognize gain or loss for Federal
        income tax purposes as a result of the deposit, Defeasance and discharge to
        be\n        effected with respect to such Securities and will be subject to
        Federal income tax on the same amount, in the same manner and at the same
        times as would be the case if such deposit, Defeasance and discharge were
        not to occur.</div>\n      <div>&#160;</div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\">55</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;In
        the event of an election to have Section 13.03 apply to any applicable series
        of Securities or any Securities of such series, as the case may be, the Company
        shall have delivered to the Trustee an\n        Opinion of Counsel to the
        effect that the Holders of such Securities will not recognize gain or loss
        for Federal income tax purposes as a result of the deposit and Covenant Defeasance
        to be effected with respect to such Securities and will be\n        subject
        to Federal income tax on the same amount, in the same manner and at the same
        times as would be the case if such deposit and Covenant Defeasance were not
        to occur.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;The
        Company shall have delivered to the Trustee an Officers&#8217; Certificate
        to the effect that neither such Securities nor any other Securities of the
        same series, if then listed on any securities exchange,\n        will be delisted
        as a result of such deposit.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;No
        event which is, or after notice or lapse of time or both would become, an
        Event of Default with respect to such Securities or any other Securities shall
        have occurred and be continuing at the time of\n        such deposit or, with
        regard to any such event specified in Sections 5.01(5) and (6), at any time
        on or prior to the 90th day after the date of such deposit (it being understood
        that this condition shall not be deemed satisfied until after such\n        90th
        day).</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(6)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Such
        Defeasance or Covenant Defeasance shall not cause the Trustee to have a conflicting
        interest within the meaning of the Trust Indenture Act (assuming all Securities
        are in default within the meaning of\n        such Act).</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(7)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Such
        Defeasance or Covenant Defeasance shall not result in a breach or violation
        of, or constitute a default under, any other agreement or instrument to which
        the Company is a party or by which it is\n        bound.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(8)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Such
        Defeasance or Covenant Defeasance shall not result in the trust arising from
        such deposit constituting an investment company within the meaning of the
        Investment Company Act unless such trust shall be\n        registered under
        such Act or exempt from registration thereunder.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(9)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;The
        Company shall have delivered to the Trustee an Officers&#8217; Certificate
        and an Opinion of Counsel, each stating that all conditions precedent with
        respect to such Defeasance or Covenant Defeasance have\n        been complied
        with.</div>\n      <div>&#160;</div>\n      <div>SECTION 13.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;
        <font style=\"font-style: italic;\">Deposited Money and U.S. Government Obligations
        to Be Held in Trust; Miscellaneous Provisions</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Subject to the provisions of the last
        paragraph of Section 10.03, all money and U.S. Government Obligations (including
        the proceeds thereof) deposited with the Trustee or other qualifying trustee
        (solely for purposes\n        of this Section and Section 13.06, the Trustee
        and any such other trustee are referred to collectively as the &#8220;Trustee&#8221;)
        pursuant to Section 13.04 in respect of any Securities shall be held in trust
        and applied by the Trustee, in accordance with\n        the provisions of
        such Securities and this Indenture, to the payment, either directly or through
        any such Paying Agent (including the Company acting as its own Paying Agent)
        as the Trustee may determine, to the Holders of such Securities, of all\n
        \       sums due and to become due thereon in respect of principal and any
        premium and interest, but money so held in trust need not be segregated from
        other funds except to the extent required by law.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">56</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">The Company shall pay and indemnify the Trustee against any tax, fee
        or other charge imposed on or assessed against the U.S. Government Obligations
        deposited pursuant to Section 13.04 or the principal and interest\n        received
        in respect thereof other than any such tax, fee or other charge which by law
        is for the account of the Holders of Outstanding Securities.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Anything in this Article to the contrary
        notwithstanding, the Trustee shall deliver or pay to the Company from time
        to time upon Company Request any money or U.S. Government Obligations held
        by it as provided in\n        Section 13.04 with respect to any Securities
        which, in the opinion of a nationally recognized firm of independent public
        accountants expressed in a written certification thereof delivered to the
        Trustee, are in excess of the amount thereof which\n        would then be
        required to be deposited to effect the Defeasance or Covenant Defeasance,
        as the case may be, with respect to such Securities.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 13.06&#160;&#160;&#160;&#160;&#160;&#160;&#160; <font style=\"font-style:
        italic;\">Reinstatement</font>.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">If the Trustee or the Paying Agent is unable
        to apply any money in accordance with this Article with respect to any Securities
        by reason of any order or judgment of any court or governmental authority
        enjoining,\n        restraining or otherwise prohibiting such application,
        then the obligations under this Indenture and such Securities from which the
        Company has been discharged or released pursuant to Section 13.02 or 13.03
        shall be revived and reinstated as though\n        no deposit had occurred
        pursuant to this Article with respect to such Securities, until such time
        as the Trustee or Paying Agent is permitted to apply all money held in trust
        pursuant to Section 13.05 with respect to such Securities in accordance\n
        \       with this Article; <font style=\"font-style: italic;\">provided</font>,
        <font style=\"font-style: italic;\">however</font>, that if the Company makes
        any payment of principal of or any premium or interest on any such Security
        following such\n        reinstatement of its obligations, the Company shall
        be subrogated to the rights (if any) of the Holders of such Securities to
        receive such payment from the money so held in trust.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">This instrument may be executed in
        any number of counterparts, each of which so executed shall be deemed an original,
        but all such counterparts shall together constitute but one and the same instrument.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">IN WITNESS
        WHEREOF, the parties hereto have caused this Indenture to be duly executed,
        and their respective seals to be hereunto affixed and attested, all as of
        the day and year first above written.</div>\n      <div>&#160;</div>\n      <table
        style=\"font-family: 'Times New Roman'; font-size: 10pt; width: 100%; border-collapse:
        collapse; text-align: left; color: #000000;\" id=\"z09fadf1d0a5d46db98c6f01a602d9422\"
