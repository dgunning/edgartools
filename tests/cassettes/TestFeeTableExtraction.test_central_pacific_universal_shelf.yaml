        \         <div>&#160;</div>\n          <div style=\"text-align: center;\">COVENANTS</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057238\"></a>Section
        10.01&#160;&#160; <font style=\"font-style: italic;\">Payment of Principal,
        Premium and Interest</font>.</div>\n          <div>&#160;</div>\n          <div
        style=\"text-indent: 36pt;\">The Company covenants and agrees for the benefit
        of each series of Securities that it will duly and punctually pay the principal
        of and any premium and interest on the Securities of that series in accordance
        with\n            the terms of the Securities and this Indenture.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057239\"></a>Section
        10.02&#160;&#160; <font style=\"font-style: italic;\">Maintenance of Office
        or Agency</font>.</div>\n          <div>&#160;</div>\n          <div style=\"text-indent:
        36pt;\">The Company will maintain in each Place of Payment for any series
        of Securities an office or agency where Securities of that series may be presented
        or surrendered for payment, where Securities of that series may\n            be
        surrendered for registration of transfer or exchange and where notices and
        demands to or upon the Company in respect of the Securities of that series
        and this Indenture may be served. The Company will give prompt written notice
        to the\n            Trustee of the location, and any change in the location,
        of such office or agency. If at any time the Company shall fail to maintain
        any such required office or agency or shall fail to furnish the Trustee with
        the address thereof, such\n            presentations, surrenders, notices
        and demands may be made or served at the Corporate Trust Office of the Trustee,
        and the Company hereby appoints the Trustee as its agent to receive all such
        presentations, surrenders, notices and demands.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">The Company may also from time
        to time designate one or more other offices or agencies where the Securities
        of one or more series may be presented or surrendered for any or all such
        purposes and may from time to\n            time rescind such designations;
        <font style=\"font-style: italic;\">provided</font>, <font style=\"font-style:
        italic;\">however</font>, that no such designation or rescission shall in
        any manner relieve the Company of its obligation to maintain\n            an
        office or agency in each Place of Payment for Securities of any series for
        such purposes. The Company will give prompt written notice to the Trustee
        of any such designation or rescission and of any change in the location of
        any such other\n            office or agency.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">With respect to any Global Security,
        and except as otherwise may be specified for such Global Security as contemplated
        by Section 3.01, the Corporate Trust Office of the Trustee shall be the Place
        of Payment where\n            such Global Security may be presented or surrendered
        for payment or for registration of transfer or exchange, or where successor
        Securities may be delivered in exchange therefore, <font style=\"font-style:
        italic;\">provided</font>, <font style=\"font-style: italic;\">however</font>,
        that any such payment, presentation, surrender or delivery effected pursuant
        to the Applicable Procedures of the Depositary for such Global Security shall
        be deemed to have been effected at the\n            Place of Payment for such
        Global Security in accordance with the provisions of this Indenture.</div>\n
        \         <div>&#160;</div>\n          <div><a name=\"z_Toc126057240\"></a>Section
        10.03&#160;&#160; <font style=\"font-style: italic;\">Money for Securities
        Payments to Be Held in Trust</font>.</div>\n          <div>&#160;</div>\n
        \         <div style=\"text-indent: 36pt;\">If the Company shall at any time
        act as its own Paying Agent with respect to any series of Securities, it will,
        on or before each due date of the principal of or any premium or interest
        on any of the Securities of\n            that series, segregate and hold in
