        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6.75pt; margin-left: 20pt; text-align: left;\">Restrictions
        on Ownership-Bank Regulatory Restrictions </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        Bank Holding Company Act generally would prohibit any company that, together
        with its affiliates, is not solely engaged in activities that are permissible
        for a bank holding company or a financial holding company from acquiring control
        of us. For these purposes, &#8220;control&#8221; is generally defined as ownership,
        control or the ability to vote 25% or more of any class of voting stock of,
        control of the election of a majority of the directors of or other exercise
        of a controlling influence over a bank holding company. In addition, any existing
        bank holding company would need the prior approval of the Federal Reserve
        before acquiring 5% or more of our voting stock. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Furthermore,
        the Change in Bank Control Act of 1978, as amended, prohibits a person or
        group of persons &#8220;acting in concert&#8221; from acquiring &#8220;control&#8221;
        of a bank holding company unless the Federal Reserve Board has been given
        prior written notice of such proposed acquisition and within that time period
        the Federal Reserve has not issued a notice disapproving the proposed acquisition
        or extending for up to another statutory period during which such a disapproval
        may be issued. Under a rebuttable presumption established by regulations of
        the Federal Reserve, the acquisition of 10% or more of a class of voting stock
        of a bank holding company with a class of securities registered under Section&#160;12
        of the Exchange Act, such as us, is presumed to constitute acquisition of
        control of the bank holding company for purposes of the Change in Bank Control
        Act of 1978. An acquisition may be made prior to the expiration of the disapproval
        period if the Federal Reserve issues written notice of its intent not to disapprove
        the action. Whether or not a party is presumed to have acquired control or
        have a controlling influence over a bank holding company depends on, among
        other things, its percentage of voting ownership, the number of director representatives
        such party has and overall business relationships with the bank holding company.
        Similarly, the Hawaii Commissioner of Financial Institutions is required to
        approve any acquisition of control of the Bank or the Company. </div><div
        class=\"BRDSX_h4\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; font-style: italic; margin-top: 18pt; margin-left:
        20pt; text-align: left;\">Anti-Takeover Effects of Hawaii Law </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The
        Hawaii Control Share Acquisitions Act (the &#8220;CSA Act&#8221;) is applicable
        to the Company and is designed to inhibit hostile acquisitions by restricting
        Control Share Acquisitions. A Control Share Acquisition is the acquisition
        of shares of an issuer resulting in beneficial ownership of a new range of
        voting power (with thresholds for the ranges starting at 10% and set at 10%
        intervals up to a majority) for the election of directors. Certain acquisitions
        are exempt from the CSA Act, including acquisitions from the issuer or where
        the issuer's prior approval has been obtained. The CSA Act prohibits the consummation
        of a Control Share Acquisition unless each such acquisition is separately
        approved by a majority of the corporation's outstanding shares (excluding
        shares beneficially owned by the acquiring person) and imposes certain state
        law disclosure and timing requirements. If a Control Share Acquisition is
        made without the requisite shareholder approval, then, for a period of one
        year after the acquisition, the shares acquired by the acquiring person will
        (i) be denied voting rights, (ii) be non-transferable, and (iii) be subject
        to redemption at the option of the corporation either at the price at which
        the shares were acquired or at book value per share as of the last day of
        the fiscal quarter ended prior to the date of the call for redemption. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">Thus, under certain circumstances, the CSA Act may
        make it more difficult for an acquiring person to exercise control over the
        Company due to the limitations placed on that person's ability to vote the
        shares so acquired and the right of the Company to acquire the subject shares.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">In addition, the HBCA requires certain
        mergers and share exchanges to be approved by the affirmative vote of the
        holders of &#190; (three-fourth&#8217;s) of all the Company&#8217;s issued
        and outstanding shares having voting power. </div><div class=\"BRDSX_h4\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-style: italic; margin-top: 18pt; margin-left: 20pt; text-align:
        left;\">Anti-Takeover Provisions in our Restated Articles and Amended Bylaws
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">The following discussion is a general
        summary of certain provisions of the Restated Articles of Incorporation, and
        Amended Bylaws of the Company which may be deemed to have an &#8220;anti-takeover&#8221;
        effect. </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Advance Notice
        Requirement for Director Nominations and Shareholder Proposals; Procedural
        Requirements.<font style=\"font-style: normal;\"> Our Amended Bylaws provide
        that shareholder nominations for the election of directors and other shareholder
        proposals may not be brought before a meeting of shareholders unless the shareholder
        has given timely written notice in proper form of such nomination or proposal
        to the Secretary of the Company at the principal executive office. Such proposals
        or nominations may be made only by persons who are shareholders of record
        on the date on which such notice is given and on the record date for determination
        of shareholders </font></div></div></div><div class=\"BRDSX_block-frill\"
        style=\"width: 468pt; margin-top: 12pt; margin-left: 0pt;\"><div class=\"BRDSX_unknown\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 9.47pt; text-align: center;\">11<br></div></div></div>\n<!--End
        Page 14-->\n<div class=\"BRPFPageBreakArea\" style=\"clear: both; margin-top:
        10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\" style=\"page-break-after:
        always;\"><hr noshade=\"noshade\" style=\"border-width: 0px; clear: both;
        margin: 4px auto; width: 612pt; height: 2px; color: #000000; background-color:
        #000000;\"></div></div>\n<!--Begin Page 15-->\n<div class=\"BRDSX_page\" style=\"text-align:
        left; margin: auto; line-height: initial; width: 468pt;\"><a name=\"ny20051086x1_s3_110-description_pg3\"><!--Anchor--></a><p
        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-align: left;\">entitled to vote at that meeting.
        To be timely, a shareholder's notice shall be delivered to or mailed and received
        at the executive office of the corporation not less than 90 calendar days
        nor more than 120 calendar days prior to the first anniversary date of the
        annual meeting for the preceding year; provided, however, if and only if the
        annual meeting is not scheduled to be held within a period that commences
        30 days before such anniversary date and ends 30 days after such anniversary
        date, the shareholder's notice shall be given in the manner provided herein
        by the later of (i) the close of business on the date 90 days prior to the
        meeting date or (ii) the tenth day following the date the meeting is first
        publicly announced or disclosed, and (iii) in the case of a special meeting
        of shareholders called for the purpose of electing directors, not later than
        the close of business on the tenth day following the day on which the date
        of the special meeting and of the nominees proposed by the Board of Directors
        to be elected at such meeting is publicly announced or disclosed. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">In addition, shareholders proposing any action to
        be brought before a meeting of shareholders and shareholders proposing any
        nominee for election must meet certain procedural requirements set forth in
        our Bylaws, including information relating to the noticing shareholder and
        information relating to the proposed nominee for director, in the case of
        a shareholder proposing a director nominee. </div><div class=\"BRDSX_para\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">No
        person nominated by a shareholder is eligible for election to the Board of
        Directors and no proposal shall be considered properly submitted unless in
        accordance with the foregoing procedures, and thus such procedures could make
        it more difficult for dissident shareholders to nominate and elect their candidates.
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; font-style: italic; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">Supermajority
        Shareholder Vote to Call a Special Shareholders Meeting to Amend Bylaws.<font
        style=\"font-style: normal;\"> Subject to repeal or change at any regular
        meeting of the shareholders, or at any special meeting called for that purpose
        by the vote of the holders of eighty percent (80%) of the outstanding shares
        entitled to vote at such meeting, the power to alter, amend or repeal our
        Amended Bylaws or adopt new bylaws is vested in the Board of Directors. The
        supermajority vote required to call a special meeting of shareholders to amend
        the bylaws could have the effect of discouraging a tender offer or other takeover
        attempt where the ability to make fundamental changes through bylaw amendments
        adopted by the shareholders at a special meeting is an important element of
        the takeover strategy. </font></div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">Fair Price Provisions Involving Business Combinations.<font style=\"font-style:
        normal;\"> Our Restated Articles of Incorporation contain a &#8220;fair price&#8221;
        provision that applies to certain business combination transactions involving
        any interested shareholder, which is (i) any person that beneficially owns
        more than 10% of our voting stock or (ii) any affiliate of the Company that
        within the past five years beneficially owned more than 10% of our voting
        stock. This provision requires the affirmative vote of the holders of at least
        75% of our voting stock to approve specified transactions between an interested
        shareholder or its affiliate and us or our subsidiaries, including: </font></div><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">any merger or consolidation; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
        margin-top: 6pt; margin-left: 20pt;\"><tr><td style=\"width: 20pt; text-align:
        left; vertical-align: top;\"><div style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt;\">&#8226;</div></td><td style=\"vertical-align:
        top;\"><div style=\"color: #000000; font-family: 'Times New Roman', Times,
        serif; font-size: 10pt; text-align: left;\">any sale, lease, license, exchange,
        pledge, transfer or other disposition of assets (in one transaction or a series
        of transactions) having a fair market value of $2&#160;million or more; </div></td></tr></table><table
        border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-spacing: 0;
