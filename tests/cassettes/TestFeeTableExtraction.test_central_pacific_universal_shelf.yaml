        style=\"text-align: left; font-family: 'Times New Roman', Times, Serif; font-size:
        8pt; font-variant: normal; font-weight: bold\"><a href=\"#TOC\">TABLE OF CONTENTS</a></p><div
        class=\"BRDSX_page-content\"><div class=\"BRDSX_block-main\" style=\"width:
        468pt; margin-left: 0pt;\"><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6.75pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">When we refer
        to the indenture or the trustee with respect to any debt securities, we mean
        the indenture under which those debt securities will be issued and the trustee
        under that indenture. </div><div class=\"BRDSX_h2\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 14.5pt; margin-left: 0pt; text-align: left;\">We May Issue
        Many Series&#160;of Debt Securities </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">We may issue
        as many distinct series of debt securities under either debt indenture as
        we wish. This section of the prospectus summarizes terms of the securities
        that will apply generally to all series. The provisions of each indenture
        will allow us not only to issue debt securities with terms different from
        those of debt securities previously issued under that indenture, but also
        to &#8220;reopen&#8221; a previous issue of a series of debt securities and
        issue additional debt securities of that series. We will describe most of
        the financial and other specific terms of a series, whether it be a series
        of the senior debt securities or subordinated debt securities, in the applicable
        prospectus supplement accompanying this prospectus. Those terms may vary from
        the terms described here. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-style:
        italic; margin-top: 6pt; margin-left: 0pt; text-indent: 20pt; text-align:
        left;\">As you read this section of the prospectus, please remember that the
        specific terms of your debt security will be described in an accompanying
        prospectus supplement relating to your debt security and, if applicable, modify
        or replace the general terms described in this section. If there are any differences
        between the accompanying prospectus supplement and this prospectus, the prospectus
        supplement will control. Thus, the statements we make in this section may
        not apply to your debt security.<font style=\"font-style: normal;\"> </font></div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">When we refer to a series of debt securities, we
        mean a series issued under the applicable indenture. When we refer to the
        prospectus supplement, we mean the prospectus supplement describing the specific
        terms of the debt security you purchase. </div><div class=\"BRDSX_h2\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; font-weight:
        bold; margin-top: 14.5pt; margin-left: 0pt; text-align: left;\">Amounts That
        We May Issue </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family:
        'Times New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left:
        0pt; text-indent: 20pt; text-align: left;\">Neither indenture will limit the
        aggregate amount of debt securities that we may issue or the number of series
        or the aggregate amount of any particular series. We may issue debt securities
        and other securities up to the aggregate amount authorized by us for each
        series, at any time without your consent and without notifying you. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">The indentures and the debt securities will not
        limit our ability to incur other indebtedness or to issue other securities,
        unless otherwise described in the prospectus supplement relating to any series
        of debt securities. Also, we will not be subject to financial or similar restrictions
        by the terms of the debt securities, unless otherwise described in the prospectus
        supplement relating to any series of debt securities. </div><div class=\"BRDSX_h2\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-weight: bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Principal
        Amount, Stated Maturity and Maturity </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The principal
        amount of a debt security means the principal amount payable at its stated
        maturity, unless that amount is not determinable, in which case the principal
        amount of a debt security is its face amount. Any debt securities owned by
        us or any of our affiliates will not be deemed to be outstanding for certain
        determinations under the indenture. </div><div class=\"BRDSX_para\" style=\"color:
        #000000; font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">The term &#8220;stated
        maturity&#8221; with respect to any debt security means the day on which the
        principal amount of the debt security is scheduled to become due. The principal
        may become due sooner, by reason of redemption or acceleration after a default
        or otherwise in accordance with the terms of the debt security. The day on
        which the principal actually becomes due, whether at the stated maturity or
        earlier, is called the &#8220;maturity&#8221; of the principal. </div><div
        class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times New Roman',
        Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt; text-indent:
        20pt; text-align: left;\">We also use the terms &#8220;stated maturity&#8221;
        and &#8220;maturity&#8221; to refer to the days when other payments become
        due. For example, we refer to a regular interest payment date when an installment
        of interest is scheduled to become due as the &#8220;stated maturity&#8221;
        of that installment. </div><div class=\"BRDSX_para\" style=\"color: #000000;
        font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin-top:
        6pt; margin-left: 0pt; text-indent: 20pt; text-align: left;\">When we refer
        to the &#8220;stated maturity&#8221; or the &#8220;maturity&#8221; of a debt
        security without specifying a particular payment, we mean the stated maturity
        or maturity, as the case may be, of the principal. </div><div class=\"BRDSX_h2\"
        style=\"color: #000000; font-family: 'Times New Roman', Times, serif; font-size:
        10pt; font-weight: bold; margin-top: 15pt; margin-left: 0pt; text-align: left;\">Our
        Debt Securities Are Structurally Subordinated to Indebtedness of Our Subsidiaries
        </div><div class=\"BRDSX_para\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 6pt; margin-left: 0pt;
        text-indent: 20pt; text-align: left;\">Because our assets consist principally
        of ownership interests in Central Pacific Bank, through which we own our assets
        and conduct our businesses, our right to participate as an equity holder in
        any distribution of assets of any of our subsidiaries upon the subsidiary&#8217;s
        liquidation or otherwise, and thus the ability of our security holders to
        benefit from the distribution, is junior to creditors of the subsidiary, except
        to the extent that any claims we may have as a creditor of the subsidiary
        are recognized. If we are recognized as a creditor of a subsidiary, our </div></div></div><div
        class=\"BRDSX_block-frill\" style=\"width: 468pt; margin-top: 12pt; margin-left:
        0pt;\"><div class=\"BRDSX_unknown\" style=\"color: #000000; font-family: 'Times
        New Roman', Times, serif; font-size: 10pt; margin-top: 9.47pt; text-align:
        center;\">18<br></div></div></div>\n<!--End Page 21-->\n<div class=\"BRPFPageBreakArea\"
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\"><div class=\"BRPFPageBreak\"
