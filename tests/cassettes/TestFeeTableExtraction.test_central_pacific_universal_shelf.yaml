        the Holders of Outstanding Securities of the relevant series on such record
        date, and no other Holders, shall be entitled to take the relevant action,
        whether or not such Holders remain Holders after such record date; <font style=\"font-style:
        italic;\">provided </font>that no such action shall be effective hereunder
