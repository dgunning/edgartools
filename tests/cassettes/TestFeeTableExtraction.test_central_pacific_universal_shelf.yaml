        \     </table>\n      <div><br>\n      </div>\n      <div style=\"clear: both;
        margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div
        class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font class=\"BRPFPageNumber\"
        style=\"font-size: 8pt; font-weight: normal; font-style: normal;\">-iii-</font></div>\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">INDENTURE, dated as
        of [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;], between
        Central Pacific Financial Corp., a corporation duly organized and existing
        under the laws of the State of Hawaii (herein called the &#8220;Company&#8221;),
        having its principal office\n        at 220 South King Street, Honolulu, Hawaii
        96813 and [&#160; &#160; &#160; &#160; &#160; &#160; ], a [&#160;&#160;&#160;
        ], as Trustee (herein called the &#8220;Trustee&#8221;).</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">Recitals of the Company</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company has duly authorized the
        execution and delivery of this Indenture to provide for the issuance from
        time to time of its unsecured debentures, notes or other evidences of indebtedness
        (herein called the\n        &#8220;Securities&#8221;) to be issued in one
        or more series as in this Indenture provided.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">All things necessary to make this
        Indenture a valid agreement of the Company, in accordance with its terms,
        have been done. Now, Therefore, This Indenture Witnesseth:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">For and in consideration of the premises
        and the purchase of the Securities by the Holders thereof, it is mutually
        agreed, for the equal and proportionate benefit of all Holders of the Securities
        or of series thereof,\n        as follows:</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">ARTICLE ONE</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">DEFINITIONS AND OTHER PROVISIONS</div>\n
        \     <div style=\"text-align: center;\">OF GENERAL APPLICATION</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 1.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Definitions</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">For all purposes of this Indenture,
        except as otherwise expressly provided or unless the context otherwise requires:</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        terms defined in this Article have the meanings assigned to them in this Article
        and include the plural as well as the singular;</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;all
        other terms used herein which are defined in the Trust Indenture Act, either
        directly or by reference therein, have the meanings assigned to them therein;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;all
        accounting terms not otherwise defined herein have the meanings assigned to
        them in accordance with generally accepted accounting principles, and, except
        as otherwise herein expressly provided, the\n        term &#8220;generally
        accepted accounting principles&#8221; with respect to any computation required
        or permitted hereunder shall mean such accounting principles as are generally
        accepted in the United States of America at the date of such computation;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;unless
        the context otherwise requires, any reference to an &#8220;Article&#8221;
        or a &#8220;Section&#8221; refers to an Article or a Section, as the case
        may be, of this Indenture; and</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(5)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        words &#8220;herein&#8221;, &#8220;hereof&#8221; and &#8220;hereunder&#8221;
        and other words of similar import refer to this Indenture as a whole and not
        to any particular Article, Section or other subdivision.</div>\n      <div>&#160;\n
        \       <div style=\"text-indent: 36pt;\">&#8220;Act&#8221;, when used with
        respect to any Holder, has the meaning specified in Section 1.04.</div>\n
        \       <div style=\"text-indent: 36pt;\"> <br>\n        </div>\n      </div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n
        \         <hr style=\"margin: 4px 0px; width: 100%; border-width: 0; height:
        2px; color: #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <!--PROfilePageNumberReset%Num%2%%%-->\n      <div style=\"text-indent:
        36pt;\">&#8220;Affiliate&#8221; of any specified Person means any other Person
        directly or indirectly controlling or controlled by or under direct or indirect
        common control with such specified Person. For the purposes of this definition,\n
        \       &#8220;control&#8221; when used with respect to any specified Person
        means the power to direct the management and policies of such Person, directly
        or indirectly, whether through the ownership of voting securities, by contract
        or otherwise; and the terms\n        &#8220;controlling&#8221; and &#8220;controlled&#8221;
        have meanings correlative to the foregoing.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Applicable Procedures&#8221;
        of a Depositary means, with respect to any matter at any time, the policies
        and procedures of such Depositary, if any, that are applicable to such matter
        at such time.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Authenticating Agent&#8221; means any Person authorized by
        the Trustee pursuant to Section 6.14 to act on behalf of the Trustee to authenticate
        Securities of one or more series.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Board of Directors&#8221; means either
        the board of directors of the Company or any duly authorized committee of
        that board.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Board Resolution&#8221; means a copy of a resolution certified
        by the Secretary or an Assistant Secretary of the Company to have been duly
        adopted by the Board of Directors and to be in full force and effect on the
        date of\n        such certification, and delivered to the Trustee.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Business
        Day&#8221;, when used with respect to any Place of Payment, means each Monday,
        Tuesday, Wednesday, Thursday and Friday which is not a day on which banking
        institutions in that Place of Payment are authorized or\n        obligated
        by law or executive order to close.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Commission&#8221; means the Securities
        and Exchange Commission, from time to time constituted, created under the
        Exchange Act, or, if at any time after the execution of this instrument such
        Commission is not existing and\n        performing the duties now assigned
        to it under the Trust Indenture Act, then the body performing such duties
        at such time.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Common Stock&#8221; means the common stock, no par value per
        share, of the Company.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Company&#8221; means the Person named as the &#8220;Company&#8221;
        in the first paragraph of this instrument until a successor Person shall have
        become such pursuant to the applicable provisions of this Indenture, and thereafter\n
        \       &#8220;Company&#8221; shall mean such successor Person.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Company Request&#8221; or &#8220;Company
        Order&#8221; means a written request or order signed in the name of the Company
        by the Chairman of the Board, the Chief Executive Officer, the President or
        a Vice President, and by the\n        Treasurer, an Assistant Treasurer, the
        Controller, the Secretary or an Assistant Secretary of the Company, and delivered
        to the Trustee.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Corporate Trust Office&#8221; means the principal office of
        the Trustee in [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;]
        at which at any particular time its corporate trust business shall be administered,
        which office at the date hereof is located at\n        [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;].</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;corporation&#8221;
        means a corporation, association, company, limited liability company, joint-stock
        company or business trust. &#8220;Covenant Defeasance&#8221; has the meaning
        specified in Section 13.03.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">2</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Defaulted Interest&#8221; has the meaning specified in Section
        3.07. &#8220;Defeasance&#8221; has the meaning specified in Section 13.02.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Depositary&#8221;
        means, with respect to Securities of any series issuable in whole or in part
        in the form of one or more Global Securities, any Person that is designated
        to act as Depositary for such Securities as\n        contemplated by Section
        3.01.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Event
        of Default&#8221; has the meaning specified in Section 5.01.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Exchange Act&#8221; means the
        Securities Exchange Act of 1934 and any statute successor thereto, in each
        case as amended from time to time. &#8220;Expiration Date&#8221; has the meaning
        specified in Section 1.04.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Global Security&#8221; means a Security that evidences all
        or part of the Securities of any series and bears the legend set forth in
        Section 2.04 (or such legend as may be specified as contemplated by Section
        3.01 for such\n        Securities).</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Holder&#8221; means a Person in whose
        name a Security is registered in the Security Register.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Indenture&#8221; means this
        instrument as originally executed and as it may from time to time be supplemented
        or amended by one or more indentures supplemental hereto entered into pursuant
        to the applicable provisions\n        hereof, including, for all purposes
        of this instrument and any such supplemental indenture, the provisions of
        the Trust Indenture Act that are deemed to be a part of and govern this instrument
        and any such supplemental indenture, respectively. The\n        term &#8220;Indenture&#8221;
        shall also include the terms of particular series of Securities established
        as contemplated by Section 3.01.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;interest&#8221;, when used with respect
        to an Original Issue Discount Security which by its terms bears interest only
        after Maturity, means interest payable after Maturity.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Interest Payment Date&#8221;,
        when used with respect to any Security, means the Stated Maturity of an installment
        of interest on such Security.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Investment Company Act&#8221; means the Investment Company
        Act of 1940 and any statute successor thereto, in each case as amended from
        time to time.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Maturity&#8221;, when used with respect to any Security, means
        the date on which the principal of such Security or an installment of principal
        becomes due and payable as therein or herein provided, whether at the Stated\n
        \       Maturity or by declaration of acceleration, call for redemption or
        otherwise.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Notice of Default&#8221; means a written notice of the kind
        specified in Section 5.01(4) or 5.01(5).</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Officer&#8221; means the Chairman
        of the Board, a Vice Chairman of the Board, the President or any Vice President,
        the Treasurer or the Secretary, of the Company.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">3</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Officers&#8217; Certificate&#8221; means a certificate signed
        by any two Officers or by any Officer and an Assistant Treasurer or an Assistant
        Secretary of the Company or any Person designated by an Officer in writing
        as\n        authorized to execute and deliver such certificate, and delivered
        to the Trustee. One of the Officers signing an Officers&#8217; Certificate
        given pursuant to Section 10.04 shall be the principal executive, financial
        or accounting officer of the Company.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Opinion of Counsel&#8221; means a written
        opinion of counsel, who may be counsel for the Company.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Original Issue Discount Security&#8221;
        means any Security which provides for an amount less than the principal amount
        thereof to be due and payable upon a declaration of acceleration of the Maturity
        thereof pursuant to\n        Section 5.02.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Outstanding&#8221;, when used
        with respect to Securities, means, as of the date of determination, all Securities
        theretofore authenticated and delivered under this Indenture, except:</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Securities
        theretofore cancelled by the Trustee or delivered to the Trustee for cancellation;</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Securities
        for whose payment or redemption money in the necessary amount has been theretofore
        deposited with the Trustee or any Paying Agent (other than the Company) in
        trust or set aside and segregated in\n        trust by the Company (if the
        Company shall act as its own Paying Agent) for the Holders of such Securities;
        <font style=\"font-style: italic;\">provided </font>that, if such Securities
        are to be redeemed, notice of such redemption has been duly\n        given
        pursuant to this Indenture or provision therefor satisfactory to the Trustee
        has been made;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Securities
        as to which Defeasance has been effected pursuant to Section 13.02; and</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Securities
        which have been paid pursuant to Section 3.06 or in exchange for or in lieu
        of which other Securities have been authenticated and delivered pursuant to
        this Indenture, other than any such\n        Securities in respect of which
        there shall have been presented to the Trustee proof satisfactory to it that
        such Securities are held by a bona fide purchaser in whose hands such Securities
        are valid obligations of the Company; <font style=\"font-style: italic;\">provided,
        however</font>, that in determining whether the Holders of the requisite principal
        amount of the Outstanding Securities have given, made or taken any request,
        demand, authorization, direction, notice,\n        consent, waiver or other
        action hereunder as of any date, (A) the principal amount of an Original Issue
        Discount Security which shall be deemed to be Outstanding shall be the amount
        of the principal thereof which would be due and payable as of such\n        date
        upon acceleration of the Maturity thereof to such date pursuant to Section
        5.02, (B) if, as of such date, the principal amount payable at the Stated
        Maturity of a Security is not determinable, the principal amount of such Security
        which shall\n        be deemed to be Outstanding shall be the amount as specified
        or determined as contemplated by Section 3.01, (C) the principal amount of
        a Security denominated in one or more foreign currencies or currency units
        which shall be deemed to be\n        Outstanding shall be the U.S. dollar
        equivalent, determined as of such date in the manner provided as contemplated
        by Section 3.01, of the principal amount of such Security (or, in the case
        of a Security described in Clause (A) or (B) above, of the\n        amount
        determined as provided in such Clause), and (D) Securities owned by the Company
        or any other obligor upon the Securities or any Affiliate of the Company or
        of such other obligor shall be disregarded and deemed not to be Outstanding,
        except\n        that, in determining whether the Trustee shall be protected
        in relying upon any such request, demand, authorization, direction, notice,
        consent, waiver or other action, only Securities which a Responsible Officer
        of the Trustee knows to be so owned\n        shall be so disregarded. Securities
        so owned which have been pledged in good faith may be regarded as Outstanding
        if the pledgee establishes to the satisfaction of the Trustee the pledgee&#8217;s
        right so to act with respect to such Securities and that\n        the pledgee
        is not the Company or any other obligor upon the Securities or any Affiliate
        of the Company or of such other obligor.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">4</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Paying Agent&#8221; means any Person authorized by the Company
        to pay the principal of or any premium or interest on any Securities on behalf
        of the Company.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Person&#8221; means any individual, corporation, limited liability
        company, partnership, joint venture, trust, unincorporated organization or
        government or any agency or political subdivision thereof.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Place of Payment&#8221;, when
        used with respect to the Securities of any series, means the place or places
        where the principal of and any premium and interest on the Securities of that
        series are payable as specified as\n        contemplated by Section 3.01.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Predecessor
        Security&#8221; of any particular Security means every previous Security evidencing
        all or a portion of the same debt as that evidenced by such particular Security;
        and, for the purposes of this definition, any\n        Security authenticated
        and delivered under Section 3.06 in exchange for or in lieu of a mutilated,
        destroyed, lost or stolen Security shall be deemed to evidence the same debt
        as the mutilated, destroyed, lost or stolen Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Redemption Date&#8221;, when
        used with respect to any Security to be redeemed, means the date fixed for
        such redemption by or pursuant to this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Redemption Price&#8221;, when
        used with respect to any Security to be redeemed, means the price at which
        it is to be redeemed pursuant to this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Regular Record Date&#8221;
        for the interest payable on any Interest Payment Date on the Securities of
        any series means the date specified for that purpose as contemplated by Section
        3.01.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Responsible
        Officer&#8221;, when used with respect to the Trustee, means any vice president,
        any assistant treasurer, any trust officer or assistant trust officer or any
        other officer of the Trustee customarily performing\n        functions similar
        to those performed by any of the above designated officers and also means,
        with respect to a particular corporate trust matter, any other officer to
        whom such matter is referred because of his knowledge of and familiarity with
        the\n        particular subject.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Securities&#8221; has the meaning stated
        in the first recital of this Indenture and more particularly means any Securities
        authenticated and delivered under this Indenture.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">5</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Securities Act&#8221; means the Securities Act of 1933 and
        any statute successor thereto, in each case as amended from time to time.
        &#8220;Security Register&#8221; and &#8220;Security Registrar&#8221; have
        the respective meanings specified in\n        Section 3.05.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">&#8220;Special Record Date&#8221;
        for the payment of any Defaulted Interest means a date fixed by the Trustee
        pursuant to Section 3.07.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Stated Maturity&#8221;, when used with respect to any Security
        or any installment of principal thereof or interest thereon, means the date
        specified in such Security as the fixed date on which the principal of such
        Security\n        or such instalment of principal or interest is due and payable.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Subsidiary&#8221;
        means a corporation more than 50% of the outstanding voting stock of which
        is owned, directly or indirectly, by the Company or by one or more other Subsidiaries,
        or by the Company and one or more other\n        Subsidiaries. For the purposes
        of this definition, &#8220;voting stock&#8221; means stock which ordinarily
        has voting power for the election of directors or trustees, whether at all
        times or only so long as no senior class of stock has such voting power by\n
        \       reason of any contingency.</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">&#8220;Trust Indenture Act&#8221; means the Trust
        Indenture Act of 1939 as in force at the date as of which this instrument
        was executed; <font style=\"font-style: italic;\">provided</font>, <font style=\"font-style:
        italic;\">however</font>,\n        that in the event the Trust Indenture Act
        of 1939 is amended after such date, &#8220;Trust Indenture Act&#8221; means,
        to the extent required by any such amendment, the Trust Indenture Act of 1939
        as so amended.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">&#8220;Trustee&#8221; means the Person named as the &#8220;Trustee&#8221;
        in the first paragraph of this instrument until a successor Trustee shall
        have become such pursuant to the applicable provisions of this Indenture,
        and thereafter\n        &#8220;Trustee&#8221; shall mean or include each Person
        who is then a Trustee hereunder, and if at any time there is more than one
        such Person, &#8220;Trustee&#8221; as used with respect to the Securities
        of any series shall mean the Trustee with respect to Securities of\n        that
        series.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;U.S.
        Government Obligation&#8221; has the meaning specified in Section 13.04.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">&#8220;Vice
        President&#8221;, when used with respect to the Company or the Trustee, means
        any vice president, whether or not designated by a number or a word or words
        added before or after the title &#8220;vice president&#8221;.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 1.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Compliance Certificates and Opinions</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Upon any
        application or request by the Company to the Trustee to take any action under
        any provision of this Indenture, the Company shall furnish to the Trustee
        such certificates and opinions as may be required under\n        the Trust
        Indenture Act. Each such certificate or opinion shall be given in the form
        of an Officers&#8217; Certificate, if to be given by an officer of the Company,
        or an Opinion of Counsel, if to be given by counsel, and shall comply with
        the\n        requirements of the Trust Indenture Act and any other requirements
        set forth in this Indenture.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Every certificate or opinion with respect to compliance with a condition
        or covenant provided for in this Indenture (except for certificates provided
        for in Section 10.04) shall include,</div>\n      <div style=\"text-indent:
        36pt;\"> <br>\n      </div>\n      <div style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;a
        statement that each individual signing such certificate or opinion has read
        such covenant or condition and the definitions herein relating thereto; </div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">6</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;a
        brief statement as to the nature and scope of the examination or investigation
        upon which the statements or opinions contained in such certificate or opinion
        are based;</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(3)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;a statement
        that, in the opinion of each such individual, he or she has made such examination
        or investigation as is necessary to enable him or her to express an informed
        opinion as to whether or not such\n        covenant or condition has been
        complied with; and</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">(4)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;a statement
        as to whether, in the opinion of each such individual, such condition or covenant
        has been complied with.</div>\n      <div>&#160;</div>\n      <div>SECTION
        1.03&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font style=\"font-style:
        italic;\">Form of Documents Delivered to Trustee</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In any case where several matters
        are required to be certified by, or covered by an opinion of, any specified
        Person, it is not necessary that all such matters be certified by, or covered
        by the opinion of, only one\n        such Person, or that they be so certified
        or covered by only one document, but one such Person may certify or give an
        opinion with respect to some matters and one or more other such Persons as
        to other matters, and any such Person may certify or\n        give an opinion
        as to such matters in one or several documents.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Any certificate or opinion of an officer
        of the Company may be based, insofar as it relates to legal matters, upon
        a certificate or opinion of, or representations by, counsel, unless such officer
        knows, or in the\n        exercise of reasonable care should know, that the
        certificate or opinion or representations with respect to the matters upon
        which his certificate or opinion is based are erroneous. Any such certificate
        or opinion of counsel may be based, insofar\n        as it relates to factual
        matters, upon a certificate or opinion of, or representations by, an officer
        or officers of the Company stating that the information with respect to such
        factual matters is in the possession of the Company, unless such\n        counsel
        knows, or in the exercise of reasonable care should know, that the certificate
        or opinion or representations with respect to such matters are erroneous.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Where any
        Person is required to make, give or execute two or more applications, requests,
        consents, certificates, statements, opinions or other instruments under this
        Indenture, they may, but need not, be consolidated\n        and form one instrument.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 1.04&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Acts of Holders; Record Dates</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Any request,
        demand, authorization, direction, notice, consent, waiver or other action
        provided or permitted by this Indenture to be given, made or taken by Holders
        may be embodied in and evidenced by one or more\n        instruments of substantially
        similar tenor signed by such Holders in person or by agent duly appointed
        in writing; and, except as herein otherwise expressly provided, such action
        shall become effective when such instrument or instruments are\n        delivered
        to the Trustee and, where it is hereby expressly required, to the Company.
        Such instrument or instruments (and the action embodied therein and evidenced
        thereby) are herein sometimes referred to as the &#8220;Act&#8221; of the
        Holders signing such\n        instrument or instruments. Proof of execution
        of any such instrument or of a writing appointing any such agent shall be
        sufficient for any purpose of this Indenture and (subject to Section 6.01)
        conclusive in favor of the Trustee and the Company,\n        if made in the
        manner provided in this Section.</div>\n      <div>&#160;</div>\n      <div
        style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">7</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">The fact and date of the execution by any Person of any such instrument
        or writing may be proved by the affidavit of a witness of such execution or
        by a certificate of a notary public or other officer authorized by law\n        to
        take acknowledgments of deeds, certifying that the individual signing such
        instrument or writing acknowledged to him the execution thereof. Where such
        execution is by a signer acting in a capacity other than his individual capacity,
        such\n        certificate or affidavit shall also constitute sufficient proof
        of his authority. The fact and date of the execution of any such instrument
        or writing, or the authority of the Person executing the same, may also be
        proved in any other manner which\n        the Trustee deems sufficient.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The ownership
        of Securities shall be proved by the Security Register.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Any request, demand, authorization,
        direction, notice, consent, waiver or other Act of the Holder of any Security
        shall bind every future Holder of the same Security and the Holder of every
        Security issued upon the\n        registration of transfer thereof or in exchange
        therefor or in lieu thereof in respect of anything done, omitted or suffered
        to be done by the Trustee or the Company in reliance thereon, whether or not
        notation of such action is made upon such\n        Security.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Company may, in the circumstances
        permitted by the Trust Indenture Act, set any day as a record date for the
        purpose of determining the Holders of Outstanding Securities of any series
        entitled to give, make or take\n        any request, demand, authorization,
        direction, notice, consent, waiver or other action provided or permitted by
        this Indenture to be given, made or taken by Holders of Securities of such
        series, <font style=\"font-style: italic;\">provided </font>that\n\n        the
        Company may not set a record date for, and the provisions of this paragraph
        shall not apply with respect to, the giving or making of any notice, declaration,
        request or direction referred to in the next paragraph. If any record date
        is set\n        pursuant to this paragraph, the Holders of Outstanding Securities
        of the relevant series on such record date, and no other Holders, shall be
        entitled to take the relevant action, whether or not such Holders remain Holders
        after such record date; <font style=\"font-style: italic;\">provided </font>that
        no such action shall be effective hereunder unless taken on or prior to the
        applicable Expiration Date by Holders of the requisite principal amount of
        Outstanding Securities of such series on such\n        record date.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Nothing in
        this paragraph shall be construed to prevent the Company from setting a new
        record date for any action for which a record date has previously been set
        pursuant to this paragraph (whereupon the record date\n        previously
        set shall automatically and with no action by any Person be cancelled and
        of no effect), and nothing in this paragraph shall be construed to render
        ineffective any action taken by Holders of the requisite principal amount
        of Outstanding\n        Securities of the relevant series on the date such
        action is taken. Promptly after any record date is set pursuant to this paragraph,
        the Company, at its own expense, shall cause notice of such record date, the
        proposed action by Holders and the\n        applicable Expiration Date to
        be given to the Trustee in writing and to each Holder of Securities of the
        relevant series in the manner set forth in Section 1.06.</div>\n      <div>&#160;</div>\n
        \     <div style=\"clear: both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">8</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div style=\"text-indent:
        36pt;\">The Trustee may set any day as a record date for the purpose of determining
        the Holders of Outstanding Securities of any series entitled to join in the
        giving or making of (i) any Notice of Default, (ii) any\n        declaration
        of acceleration referred to in Section 5.02, (iii) any request to institute
        proceedings referred to in Section 5.07(2) or (iv) any direction referred
        to in Section 5.12, in each case with respect to Securities of such series.
        If any\n        record date is set pursuant to this paragraph, the Holders
        of Outstanding Securities of such series on such record date, and no other
        Holders, shall be entitled to join in such notice, declaration, request or
        direction, whether or not such Holders\n        remain Holders after such
        record date; <font style=\"font-style: italic;\">provided </font>that no such
        action shall be effective hereunder unless taken on or prior to the applicable
        Expiration Date by Holders of the requisite principal amount of\n        Outstanding
        Securities of such series on such record date. Nothing in this paragraph shall
        be construed to prevent the Trustee from setting a new record date for any
        action for which a record date has previously been set pursuant to this paragraph\n
        \       (whereupon the record date previously set shall automatically and
        with no action by any Person be cancelled and of no effect), and nothing in
        this paragraph shall be construed to render ineffective any action taken by
        Holders of the requisite\n        principal amount of Outstanding Securities
        of the relevant series on the date such action is taken. Promptly after any
        record date is set pursuant to this paragraph, the Trustee, at the Company&#8217;s
        expense, shall cause notice of such record date, the\n        proposed action
        by Holders and the applicable Expiration Date to be given to the Company in
        writing and to each Holder of Securities of the relevant series in the manner
        set forth in Section 1.06.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">With respect to any record date set pursuant to this Section, the
        party hereto which sets such record dates may designate any day as the &#8220;Expiration
        Date&#8221; and from time to time may change the Expiration Date to any\n
        \       earlier or later day; <font style=\"font-style: italic;\">provided
        </font>that no such change shall be effective unless notice of the proposed
        new Expiration Date is given to the other party hereto in writing, and to
        each Holder of Securities of\n        the relevant series in the manner set
        forth in Section 1.06, on or prior to the existing Expiration Date. If an
        Expiration Date is not designated with respect to any record date set pursuant
        to this Section, the party hereto which set such record\n        date shall
        be deemed to have initially designated the 180th day after such record date
        as the Expiration Date with respect thereto, subject to its right to change
        the Expiration Date as provided in this paragraph. Notwithstanding the foregoing,
        no\n        Expiration Date shall be later than the 180th day after the applicable
        record date.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">Without limiting the foregoing, a Holder entitled hereunder to take
        any action hereunder with regard to any particular Security may do so with
        regard to all or any part of the principal amount of such Security or by\n
        \       one or more duly appointed agents each of which may do so pursuant
        to such appointment with regard to all or any part of such principal amount.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 1.05&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Notices, Etc., to Trustee and the Company</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Any request,
        demand, authorization, direction, notice, consent, waiver or Act of Holders
        or other document provided or permitted by this Indenture to be made upon,
        given or furnished to, or filed with,</div>\n      <div>&#160;</div>\n      <div
        style=\"text-indent: 36pt;\">(1)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Trustee by any Holder or by the Company shall be sufficient for every purpose
        hereunder if made, given, furnished or filed in writing to or with the Trustee
        at [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;], or</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">(2)&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;the
        Company by the Trustee or by any Holder shall be sufficient for every purpose
        hereunder (unless otherwise herein expressly provided) if in writing and mailed,
        first-class postage prepaid, to the\n        Company addressed to it at the
        address of its principal office specified in the first paragraph of this instrument,
        Attention: [&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160; ], or at
        any other address previously furnished in writing to the Trustee by the Company.</div>\n
        \     <div>&#160;</div>\n      <div style=\"clear: both; margin-top: 10pt;
        margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n        <div class=\"BRPFPageNumberArea\"
        style=\"text-align: center;\"><font class=\"BRPFPageNumber\" style=\"font-size:
        8pt; font-weight: normal; font-style: normal;\">9</font></div>\n        <div
        style=\"page-break-after: always;\" class=\"BRPFPageBreak\">\n          <hr
        style=\"margin: 4px 0px; width: 100%; border-width: 0; height: 2px; color:
        #000000; background-color: #000000; clear: both;\" noshade=\"noshade\"></div>\n
        \     </div>\n      <div>SECTION 1.06&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Notice to Holders; Waiver</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Where this Indenture provides for
        notice to Holders of any event, such notice shall be sufficiently given (unless
        otherwise herein expressly provided) if in writing and mailed, first-class
        postage prepaid, to each\n        Holder affected by such event, at his or
        her address as it appears in the Security Register, not later than the latest
        date (if any), and not earlier than the earliest date (if any), prescribed
        for the giving of such notice. In any case where\n        notice to Holders
        is given by mail, neither the failure to mail such notice, nor any defect
        in any notice so mailed, to any particular Holder shall affect the sufficiency
        of such notice with respect to other Holders. Where this Indenture provides\n
        \       for notice in any manner, such notice may be waived in writing by
        the Person entitled to receive such notice, either before or after the event,
        and such waiver shall be the equivalent of such notice. Waivers of notice
        by Holders shall be filed with\n        the Trustee, but such filing shall
        not be a condition precedent to the validity of any action taken in reliance
        upon such waiver.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">In case by reason of the suspension of regular mail service or by
        reason of any other cause it shall be impracticable to give such notice by
        mail, then such notification as shall be made with the approval of the\n        Trustee
        shall constitute a sufficient notification for every purpose hereunder.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">Where this
        Indenture provides for notice of any event to a Holder of a Global Security,
        such notice shall be sufficiently given if given to the Depositary for such
        Security (or its designee), pursuant to its Applicable\n        Procedures,
        not later than the latest date (if any), and not earlier than the earliest
        date (if any), prescribed for the giving of such notice.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 1.07&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Conflict with Trust Indenture Act</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">If any provision
        hereof limits, qualifies or conflicts with a provision of the Trust Indenture
        Act that is required under such Act to be a part of and govern this Indenture,
        the latter provision shall control. If any\n        provision of this Indenture
        modifies or excludes any provision of the Trust Indenture Act that may be
        so modified or excluded, the latter provision shall be deemed to apply to
        this Indenture as so modified or to be excluded, as the case may be.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 1.08&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Effect of Headings and Table of Contents</font>.</div>\n
        \     <div>&#160;</div>\n      <div style=\"text-indent: 36pt;\">The Article
        and Section headings herein and the Table of Contents are for convenience
        only and shall not affect the construction hereof.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 1.09&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Successors and Assigns</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">All covenants and agreements in this
        Indenture by the Company shall bind its successors and assigns, whether so
        expressed or not.</div>\n      <div>&#160;</div>\n      <div style=\"clear:
        both; margin-top: 10pt; margin-bottom: 10pt;\" class=\"BRPFPageBreakArea\">\n
        \       <div class=\"BRPFPageNumberArea\" style=\"text-align: center;\"><font
        class=\"BRPFPageNumber\" style=\"font-size: 8pt; font-weight: normal; font-style:
        normal;\">10</font></div>\n        <div style=\"page-break-after: always;\"
        class=\"BRPFPageBreak\">\n          <hr style=\"margin: 4px 0px; width: 100%;
        border-width: 0; height: 2px; color: #000000; background-color: #000000; clear:
        both;\" noshade=\"noshade\"></div>\n      </div>\n      <div>SECTION 1.10&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Separability Clause</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In case any provision in this Indenture
        or in the Securities shall be invalid, illegal or unenforceable, the validity,
        legality and enforceability of the remaining provisions shall not in any way
        be affected or\n        impaired thereby.</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 1.11&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Benefits of Indenture</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">Nothing in this Indenture or in the
        Securities, express or implied, shall give to any Person, other than the parties
        hereto and their successors hereunder and the Holders, any benefit or any
        legal or equitable right,\n        remedy or claim under this Indenture.</div>\n
        \     <div>&#160;</div>\n      <div>SECTION 1.12&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Governing Law</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">This Indenture and the Securities
        shall be governed by and construed in accordance with the law of the State
        of New York.</div>\n      <div>&#160;</div>\n      <div>SECTION 1.13&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Legal Holidays</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">In any case where any Interest Payment
        Date, Redemption Date or Stated Maturity of any Security shall not be a Business
        Day at any Place of Payment, then (notwithstanding any other provision of
        this Indenture or of the\n        Securities (other than a provision of any
        Security which specifically states that such provision shall apply in lieu
        of this Section)) payment of interest or principal (and premium, if any) need
        not be made at such Place of Payment on such date,\n        but may be made
        on the next succeeding Business Day at such Place of Payment with the same
        force and effect as if made on the Interest Payment Date or Redemption Date,
        or at the Stated Maturity, <font style=\"font-style: italic;\">provided </font>that\n\n
        \       no interest shall accrue with respect to such payment for the period
        from and after such Interest Payment Date, Redemption Date or Maturity, as
        the case may be to the date of such payment.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">ARTICLE TWO</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-align: center;\">SECURITY FORMS</div>\n      <div>&#160;</div>\n
        \     <div>SECTION 2.01&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Forms Generally</font>.</div>\n      <div>&#160;</div>\n
        \     <div style=\"text-indent: 36pt;\">The Securities of each series shall
        be in substantially the form set forth in this Article, or in such other form
        as shall be established by or pursuant to a Board Resolution or in one or
        more indentures supplemental\n        hereto, in each case with such appropriate
        insertions, omissions, substitutions and other variations as are required
        or permitted by this Indenture, and may have such letters, numbers or other
        marks of identification and such legends or\n        endorsements placed thereon
        as may be required to comply with the rules of any securities exchange or
        Depositary therefor or as may, consistently herewith, be determined by the
        officers executing such Securities, as evidenced by their execution\n        thereof.
        If the form of Securities of any series is established by action taken pursuant
        to a Board Resolution, a copy of an appropriate record of such action shall
        be certified by the Secretary or an Assistant Secretary of the Company and\n
        \       delivered to the Trustee at or prior to the delivery of the Company
        Order contemplated by Section 3.03 for the authentication and delivery of
        such Securities.</div>\n      <div>&#160;</div>\n      <div style=\"text-indent:
        36pt;\">The definitive Securities shall be printed, lithographed or engraved
        on steel engraved borders or may be produced in any other manner, all as determined
        by the officers executing such Securities, as evidenced by their\n        execution
        of such Securities.</div>\n      <div>&#160;</div>\n      <div>SECTION 2.02&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<font
        style=\"font-style: italic;\">Form of Face of Security</font>.</div>\n      <div>&#160;</div>\n
