        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n\n\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<DIV
        STYLE=\"padding: 5.4pt; border: Black 1.5pt solid; width: 98%\">\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Strategies
        Across Private Markets and Absolute\nReturn Strategies</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 35.75pt; text-align:
        justify; text-indent: -11.25pt\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 100%\">\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD STYLE=\"width: 0.5in\">&nbsp;</TD>\n    <TD STYLE=\"width:
        0.25in; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align:
        justify; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Middle Market and Small and Emerging Managers.
        </I>Over the past 30 years, we have developed a market-leading, dedicated
        effort to investing in and alongside middle market and small and emerging
        managers, which we believe adds significant, differentiated value to our clients.</FONT></TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"font-size:
        10pt\">&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Alternative Credit</I>. We are a leader in alternative credit investing
        and our one-firm approach to the asset class provides us with a competitive
        advantage in sourcing and making credit investments. Our activities cover
        the liquidity spectrum across structured credit, corporate credit, distressed,
        direct lending, and real assets. Our platform also enables us to take a holistic
        approach to credit investing, both through managers and through credit co-investments
        and secondaries.</FONT></TD></TR>\n  <TR STYLE=\"vertical-align: top\">\n
        \   <TD>&nbsp;</TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n    <TD
        STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Opportunistic Investing</I>. We combine our unparalleled deal sourcing
        platform with flexibility of mandate to manage programs and products that
        opportunistically invest across multiple asset classes, liquidity profiles,
        capital structures and geographies.</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\">&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align:
        justify; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align:
        justify; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Sustainable and Impact Investing. </I>We implement
        Sustainable Investing solutions for clients, that are rooted in our clients&rsquo;
        choice around the inclusion of Sustainable Investing themes, and/or Impact
        factors into their portfolio construction. We have been consistently focused
        on helping our clients achieve their own objectives by designing solutions
        that meet our clients&rsquo; varied goals, priorities, and risk tolerances.</FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><B>Client Offerings and
        Value Proposition </B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 24.5pt\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We strive to put our clients&rsquo;\nneeds first,
        and a key to doing that is by providing solutions across alternatives strategies
        with a high degree of flexibility. Within\neach investment strategy, we make
        primary investments in funds managed by third-party managers, which we refer
        to as primary fund investments,\nand we pursue &lsquo;direct-oriented&rsquo;
        strategies: we acquire secondary stakes in such funds, which we refer to as
        secondaries; we\nco-invest alongside such primary fund managers, which we
        refer to as co-investments; we make seed investments in small and emerging
        managers,\nwhich we refer to as seeding; and we invest directly into operating
        businesses and operating assets, which we refer to as direct investing.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">From
        a structural standpoint,\nwe offer investment portfolios to clients in two
        broad ways:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 24.5pt\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\"
        CELLPADDING=\"0\" STYLE=\"font: 10pt Times New Roman, Times, Serif; width:
        100%\">\n  <TR STYLE=\"vertical-align: top\">\n    <TD STYLE=\"width: 48px\">&nbsp;</TD>\n
        \   <TD STYLE=\"width: 24px; text-align: justify; font-size: 10pt\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n
        \   <TD STYLE=\"text-align: justify; font-size: 10pt\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Customized separate accounts</I>.
        We construct customized portfolios to meet our clients&rsquo; specific objectives
        with regards to asset classes, implementation types, return, risk tolerance,
        diversification, liquidity and other factors. We believe that the strong economic
        value proposition for customized separate accounts helps create a moat around
        our strategic partnerships with our clients, which in turn helps foster long-term
        relationships. Depending on the program, we offer our clients fee savings
        and preferential terms as well as access to proprietary capacity or deal flow.
        Beyond our strong economic value proposition, for many of our large clients,
        we also provide value-add ancillary services, including fund administration,
        portfolio risk management and research access. Clients also can benefit from
        the scale of our data and technology systems.</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\">&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD STYLE=\"text-align: justify;
        font-size: 10pt\">&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Specialized funds</I>. Our specialized funds are products through
        which multiple investors can access a particular investment strategy through
        a commingled vehicle. Our specialized funds leverage our existing investment
        capabilities, and lower minimum investment thresholds, allowing us to expand
        our investor footprint with both institutional and individual investors.</FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify; text-indent: 24.5pt\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">We filed our amended and restated\ncertificate of incorporation with
        the Secretary of State of Delaware on November 17, 2020.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Our principal executive
        offices\nare located at 900 North Michigan Avenue, Suite 1100, Chicago, Illinois
        60611, and our telephone number is (312) 506-6500.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n</DIV>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
