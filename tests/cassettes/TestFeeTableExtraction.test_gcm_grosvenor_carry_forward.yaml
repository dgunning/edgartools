        New Roman, Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">This prospectus is part of\na registration statement
        that we filed with the U.S. Securities and Exchange Commission (the &ldquo;SEC&rdquo;)
        using a &ldquo;shelf&rdquo;\nregistration process. By using a shelf registration
        statement, we may sell securities from time to time and in one or more offerings
        up\nto a total dollar amount of $350,000,000 as described in this prospectus.
        Each time that we offer and sell securities, we will provide\na prospectus
        supplement to this prospectus that contains specific information about the
        securities being offered and sold and the specific\nterms of that offering.
        We may also authorize one or more free writing prospectuses to be provided
        to you that may contain material information\nrelating to these offerings.
        The prospectus supplement or free writing prospectus may also add, update
        or change information contained\nin this prospectus with respect to that offering.
        If there is any inconsistency between the information in this prospectus and
        the applicable\nprospectus supplement or free writing prospectus, you should
        rely on the prospectus supplement or free writing prospectus, as applicable.\nBefore
        purchasing any securities, you should carefully read both this prospectus
        and the applicable prospectus supplement (and any applicable\nfree writing
        prospectuses), together with the additional information described under the
        heading &ldquo;Where You Can Find More Information;\nIncorporation by Reference.&rdquo;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        have not authorized anyone\nto provide you with any information or to make
        any representations other than those contained in this prospectus, any applicable
        prospectus\nsupplement or any free writing prospectuses prepared by or on
        behalf of us or to which we have referred you. We take no responsibility\nfor,
        and can provide no assurance as to the reliability of, any other information
        that others may give you. We will not make an offer\nto sell these securities
        in any jurisdiction where the offer or sale is not permitted. You should assume
        that the information appearing\nin this prospectus and the applicable prospectus
        supplement to this prospectus is accurate only as of the date on its respective
        cover,\nthat the information appearing in any applicable free writing prospectus
        is accurate only as of the date of that free writing prospectus,\nand that
        any information incorporated by reference is accurate only as of the date
        of the document incorporated by reference, unless we\nindicate otherwise.
        Our business, financial condition, results of operations and prospects may
        have changed since those dates. This prospectus\nincorporates by reference,
        and any prospectus supplement or free writing prospectus may contain and incorporate
        by reference, market data\nand industry statistics and forecasts that are
        based on independent industry publications and other publicly available information.
        Although\nwe believe these sources are reliable, we do not guarantee the accuracy
        or completeness of this information and we have not independently\nverified
        this information. In addition, the market and industry data and forecasts
        that may be included or incorporated by reference in\nthis prospectus, any
        prospectus supplement or any applicable free writing prospectus may involve
        estimates, assumptions and other risks\nand uncertainties and are subject
        to change based on various factors, including those discussed under the heading
