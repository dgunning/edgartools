        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;a\nbrief
        statement as to the nature and scope of the examination or investigation upon
        which the statements or opinions contained in such\ncertificate or opinion
        are based;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
