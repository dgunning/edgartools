        Serif; font-size: 10pt\">By:</FONT></TD>\n    <TD STYLE=\"border-bottom: Black
        1.5pt solid\">/s/ Michael H. Wass</TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD>\n    <TD><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Name:</FONT></TD>\n    <TD><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Michael H. Wass</FONT></TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD>&nbsp;</TD>\n    <TD><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Title:</FONT></TD>\n    <TD><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Vice
        President</FONT></TD></TR>\n  </TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 6in; text-indent: -3.5in\"></P>\n\n<!--
        Field: Page; Sequence: 3 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->2<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 6in; text-indent: -3.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><B>EXHIBIT 1</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><B>CHARTER
        OF WILMINGTON TRUST, NATIONAL ASSOCIATION</B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n\n<!-- Field:
        Page; Sequence: 4 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt;
        border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->3<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><B>ARTICLES
        OF ASSOCIATION</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\"><B>OF</B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><B>WILMINGTON
        TRUST, NATIONAL ASSOCIATION</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">For the purpose of organizing an association to\nperform
        any lawful activities of national banks, the undersigned do enter into the
        following articles of association:</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">FIRST. The title of this association shall be Wilmington Trust,\nNational
        Association.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">SECOND. The main
        office of the association shall be in the City\nof Wilmington, County of New
        Castle, State of Delaware. The general business of the association shall be
        conducted at its main office\nand its branches.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">THIRD. The board of directors of this association shall consist\nof
        not less than five nor more than twenty-five persons, unless the OCC has exempted
        the bank from the 25-member limit. The exact number\nis to be fixed and determined
        from time to time by resolution of a majority of the full board of directors
        or by resolution of a majority\nof the shareholders at any annual or special
        meeting thereof. Each director shall own common or preferred stock of the
        association or\nof a holding company owning the association, with an aggregate
        par, fair market or equity value $1,000. Determination of these values\nmay
        be based as of either (i) the date of purchase or (ii) the date the person
        became a director, whichever value is greater. Any combination\nof common
        or preferred stock of the association or holding company may be used.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Any vacancy in the
        board of directors may be filled\nby action of a majority of the remaining
        directors between meetings of shareholders. The board of directors may not
        increase the number\nof directors between meetings of shareholders to a number
        which:</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">1)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">exceeds by more than two the number
        of directors last elected by shareholders where the number was 15 or less;
        or</TD></TR></TABLE>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font:
        10pt Times New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; width:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">2)</FONT></TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\">exceeds
        by more than four the number of directors last elected by shareholders where
        the number was 16 or more, but in no event shall\nthe number of directors
        exceed 25, unless the OCC has exempted the bank from the 25-member limit.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.25in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Directors
        shall be elected for terms of one year\nand until their successors are elected
        and qualified. Terms of directors, including directors selected to fill vacancies,
        shall expire\nat the next regular meeting of shareholders at which directors
        are elected, unless the directors resign or are removed from office. Despite\nthe
        expiration of a director's term, the director shall continue to serve until
        his or her successor is elected and qualifies or until\nthere is a decrease
        in the number of directors and his or her position is eliminated.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.25in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Honorary
        or advisory members of the board of directors,\nwithout voting power or power
        of final decision in matters concerning the business of the association, may
        be appointed by resolution\nof a majority of the full board of directors,
        or by resolution of shareholders at any annual or special meeting. Honorary
        or advisory\ndirectors shall not be counted to determine the number of directors
        of the association or the presence of a quorum in connection with\nany board
        action, and shall not be required to own qualifying shares.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0in\">FOURTH. There shall be an annual meeting of the
        shareholders to\nelect directors and transact whatever other business may
        be brought before the meeting. It shall be held at the main office or any
        other\nconvenient place the board of directors may designate, on the day of
        each year specified therefor in the bylaws, or, if that day falls\non a legal
        holiday in the state in which the association is located, on the next following
        banking day. If no election is held on the\nday fixed, or in the event of
        a legal holiday on the following banking day, an election may be held on any
        subsequent day within 60 days\nof the day fixed, to be designated by the board
        of directors, or, if the directors fail to fix the day, by shareholders representing
        two-thirds\nof the shares issued and outstanding. In all cases at least 10
        days advance notice of the time, place and purpose of a shareholders&rsquo;\nmeeting
        shall be given to the shareholders by first class mail, unless the OCC determines
        that an emergency circumstance exists. The sole\nshareholder of the bank is
        permitted to waive notice of the shareholders&rsquo; meeting.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">In all elections of directors, the number of votes\neach
        common shareholder may cast will be determined by multiplying the number of
        shares such shareholder owns by the number of directors\nto be elected. Those
        votes may be cumulated and cast for a single candidate or may be distributed
        among two or more candidates in the\nmanner selected by the shareholder. If,
        after the first ballot, subsequent ballots are necessary to elect directors,
        a shareholder may\nnot vote shares that he or she has already fully cumulated
        and voted in favor of a successful candidate. On all other questions, each\ncommon
        shareholder shall be entitled to one vote for each share of stock held by
        him or her.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Nominations
        for election to the board of directors\nmay be made by the board of directors
        or by any stockholder of any outstanding class of capital stock of the association
        entitled to vote\nfor election of directors. Nominations other than those
        made by or on behalf of the existing management shall be made in writing and
        be\ndelivered or mailed to the president of the association not less than
        14 days nor more than 50 days prior to any meeting of shareholders\ncalled
        for the election of directors; provided, however, that if less than 21 days
        notice of the meeting is given to shareholders, such\nnominations shall be
        mailed or delivered to the president of the association not later than the
        close of business on the seventh day following\nthe day on which the notice
        of meeting was mailed. Such notification shall contain the following information
        to the extent known to the\nnotifying shareholder:</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times New Roman, Times,
        Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">1)</FONT></TD><TD STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif\">The name and address of each proposed
        nominee.</TD></TR></TABLE>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font:
        10pt Times New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; width:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">2)</FONT></TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\">The
        principal occupation of each proposed nominee.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">3)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">The total number of shares of capital
        stock of the association that will be voted for each proposed nominee.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">4)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">The name and residence address
        of the notifying shareholder.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">5)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">The number of shares of capital
        stock of the association owned by the notifying shareholder.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in;
        text-indent: 0.25in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence: 5 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->4<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">Nominations not made in accordance\nherewith may,
        in his/her discretion, be disregarded by the chairperson of the meeting, and
        the vote tellers may disregard all votes cast\nfor each such nominee. No bylaw
        may unreasonably restrict the nomination of directors by shareholders.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.25in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">A director
        may resign at any time by\ndelivering written notice to the board of directors,
        its chairperson, or to the association, which resignation shall be effective
        when\nthe notice is delivered unless the notice specifies a later effective
        date.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.25in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">A
        director may be removed by shareholders\nat a meeting called to remove the
        director, when notice of the meeting stating that the purpose or one of the
        purposes is to remove the\ndirector is provided, if there is a failure to
        fulfill one of the affirmative requirements for qualification, or for cause;
        provided,\nhowever, that a director may not be removed if the number of votes
        sufficient to elect the director under cumulative voting is voted against\nthe
        director's removal.</P>\n\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">FIFTH.
        The authorized amount of capital stock of this association\nshall be ten thousand
        shares of common stock of the par value of one hundred dollars ($100) each;
        but said capital stock may be increased\nor decreased from time to time, according
        to the provisions of the laws of the United States.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">No holder of shares
        of the capital stock of any\nclass of the association shall have any preemptive
        or preferential right of subscription to any shares of any class of stock
        of the association,\nwhether now or hereafter authorized, or to any obligations
        convertible into stock of the association, issued, or sold, nor any right
        of\nsubscription to any thereof other than such, if any, as the board of directors,
        in its discretion, may from time to time determine and\nat such price as the
        board of directors may from time to time fix. Preemptive rights also must
        be approved by a vote of holders of two-thirds\nof the bank&rsquo;s outstanding
        voting shares. Unless otherwise specified in these articles of association
        or required by law, (1) all\nmatters requiring shareholder action, including
        amendments to the articles of association, must be approved by shareholders
        owning a majority\nvoting interest in the outstanding voting stock, and (2)
        each shareholder shall be entitled to one vote per share.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Unless otherwise
        specified in these articles of\nassociation or required by law, all shares
        of voting stock shall be voted together as a class, on any matters requiring
        shareholder approval.\nIf a proposed amendment would affect two or more classes
        or series in the same or a substantially similar way, all the classes or series\nso
        affected must vote together as a single voting group on the proposed amendment.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Courier; margin: 0pt 0; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Shares of one class
        or series may be issued as\na dividend for shares of the same class or series
        on a pro rata basis and without consideration. Shares of one class or series
        may be\nissued as share dividends for a different class or series of stock
        if approved by a majority of the votes entitled to be cast by the class\nor
        series to be issued, unless there are no outstanding shares of the class or
        series to be issued. Unless otherwise provided by the board\nof directors,
        the record date for determining shareholders entitled to a share dividend
        shall be the date authorized by the board of directors\nfor the share dividend.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Unless
        otherwise provided in the bylaws, the record\ndate for determining shareholders
        entitled to notice of and to vote at any meeting is the close of business
        on the day before the first\nnotice is mailed or otherwise sent to the shareholders,
        provided that in no event may a record date be more than 70 days before the
        meeting.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">If
        a shareholder is entitled to fractional shares\npursuant to a stock dividend,
        consolidation or merger, reverse stock split or otherwise, the association
        may: (a) issue fractional shares;\n(b) in lieu of the issuance of fractional
        shares, issue script or warrants entitling the holder to receive a full share
        upon surrendering\nenough script or warrants to equal a full share; (c) if
        there is an established and active market in the association's stock, make
        reasonable\narrangements to provide the shareholder with an opportunity to
        realize a fair price through sale of the fraction, or purchase of the additional\nfraction
        required for a full share; (d) remit the cash equivalent of the fraction to
        the shareholder; or (e) sell full shares representing\nall the fractions at
        public auction or to the highest bidder after having solicited and received
        sealed bids from at least three licensed\nstock brokers; and distribute the
        proceeds pro rata to shareholders who otherwise would be entitled to the fractional
        shares. The holder\nof a fractional share is entitled to exercise the rights
        for shareholder, including the right to vote, to receive dividends, and to
        participate\nin the assets of the association upon liquidation, in proportion
        to the fractional interest. The holder of script or warrants is not entitled\nto
        any of these rights unless the script or warrants explicitly provide for such
        rights. The script or warrants may be subject to such\nadditional conditions
        as: (1) that the script or warrants will become void if not exchanged for
        full shares before a specified date; and\n(2) that the shares for which the
        script or warrants are exchangeable may be sold at the option of the association
        and the proceeds paid\nto scriptholders.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">The association, at any time and from time to
        time,\nmay authorize and issue debt obligations, whether or not subordinated,
        without the approval of the shareholders. Obligations classified\nas debt,
        whether or not subordinated, which may be issued by the association without
        the approval of shareholders, do not carry voting\nrights on any issue, including
        an increase or decrease in the aggregate number of the securities, or the
        exchange or reclassification\nof all or part of securities into securities
        of another class or series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 6
        -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->5<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">SIXTH. The board of directors shall appoint one of its members president\nof
        this association, and one of its members chairperson of the board and shall
        have the power to appoint one or more vice presidents,\na secretary who shall
        keep minutes of the directors' and shareholders' meetings and be responsible
        for authenticating the records of the\nassociation, and such other officers
        and employees as may be required to transact the business of this association.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">A duly appointed
        officer may appoint one or more\nofficers or assistant officers if authorized
        by the board of directors in accordance with the bylaws.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">The board of directors shall have the power to:</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times New Roman, Times,
        Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">1)</FONT></TD><TD STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif\">Define the duties of the officers, employees,
        and agents of the association.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">2)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Delegate the performance of its
        duties, but not the responsibility for its duties, to the officers, employees,
        and agents of the association.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">3)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Fix the compensation and enter
        into employment contracts with its officers and employees upon reasonable
        terms and conditions consistent\nwith applicable law.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">4)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Dismiss officers and employees.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">5)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Require bonds from officers and
        employees and to fix the penalty thereof.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">6)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Ratify written policies authorized
        by the association's management or committees of the board.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">7)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Regulate the manner in which any
        increase or decrease of the capital of the association shall be made, provided
        that nothing herein\nshall restrict the power of shareholders to increase
        or decrease the capital of the association in accordance with law, and nothing
        shall\nraise or lower from two-thirds the percentage required for shareholder
        approval to increase or reduce the capital.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">8)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Manage and administer the business
        and affairs of the association.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">9)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Adopt initial bylaws, not inconsistent
        with law or the articles of association, for managing the business and regulating
        the affairs\nof the association.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">10)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Amend or repeal bylaws, except
        to the extent that the articles of association reserve this power in whole
        or in part to shareholders.</TD></TR></TABLE>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; font: 10pt Times New Roman, Times,
        Serif; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">11)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Make contracts.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">12)</FONT></TD><TD STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif\">Generally perform all acts that
        are legal for a board of directors to perform.</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">SEVENTH. The board of directors shall have the power to change the\nlocation
        of the main office to any other place within the limits of Wilmington, Delaware,
        without the approval of the shareholders, or\nwith a vote of shareholders
        owning two-thirds of the stock of such association for a relocation outside
        such limits and upon receipt of\na certificate of approval from the Comptroller
        of the Currency, to any other location within or outside the limits of Wilmington
        Delaware,\nbut not more than 30 miles beyond such limits. The board of directors
        shall have the power to establish or change the location of any\nbranch or
        branches of the association to any other location permitted under applicable
        law, without approval of shareholders, subject\nto approval by the Comptroller
        of the Currency.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence: 7 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->6<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">EIGHTH.
        The corporate existence of this association shall continue\nuntil termination
        according to the laws of the United States.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">NINTH. The board of directors of this association, or any one or\nmore
        shareholders owning, in the aggregate, not less than 50 percent of the stock
        of this association, may call a special meeting of shareholders\nat any time.
        Unless otherwise provided by the bylaws or the laws of the United States,
        a notice of the time, place, and purpose of every\nannual and special meeting
        of the shareholders shall be given at least 10 days prior to the meeting by
        first-class mail, unless the OCC\ndetermines that an emergency circumstance
        exists. If the association is a wholly-owned subsidiary, the sole shareholder
        may waive notice\nof the shareholders&rsquo; meeting. Unless otherwise provided
        by the bylaws or these articles, any action requiring approval of shareholders\nmust
        be effected at a duly called annual or special meeting.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">TENTH. For purposes of this Article Tenth, the term &ldquo;institution-affiliated\nparty&rdquo;
        shall mean any institution-affiliated party of the association as such term
        is defined in 12 U.S.C. 1813(u).</P>\n\n<P STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">Any institution-affiliated party (or his or her\nheirs,
        executors or administrators) may be indemnified or reimbursed by the association
        for reasonable expenses actually incurred in connection\nwith any threatened,
        pending or completed actions or proceedings and appeals therein, whether civil,
        criminal, governmental, administrative\nor investigative, in accordance with
        and to the fullest extent permitted by law, as such law now or hereafter exists;
        provided, however,\nthat when an administrative proceeding or action instituted
        by a federal banking agency results in a final order or settlement pursuant\nto
        which such person: (i) is assessed a civil money penalty, (ii) is removed
        from office or prohibited from participating in the conduct\nof the affairs
        of the association, or (iii) is required to cease and desist from or to take
        any affirmative action described in 12 U.S.C.\n1818(b) with respect to the
        association, then the association shall require the repayment of all legal
        fees and expenses advanced pursuant\nto the next succeeding paragraph and
        may not indemnify such institution-affiliated parties (or their heirs, executors
        or administrators)\nfor expenses, including expenses for legal fees, penalties
        or other payments incurred. The association shall provide indemnification
        in\nconnection with an action or proceeding (or part thereof) initiated by
        an institution-affiliated party (or by his or her heirs, executors\nor administrators)
        only if such action or proceeding (or part thereof) was authorized by the
        board of directors.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">Expenses incurred by an institution-affiliated\nparty (or by his or
        her heirs, executors or administrators) in connection with any action or proceeding
        under 12 U.S.C. 164 or 1818 may\nbe paid by the association in advance of
        the final disposition of such action or proceeding upon (a) a determination
        by the board of directors\nacting by a quorum consisting of directors who
        are not parties to such action or proceeding that the institution-affiliated
        party (or\nhis or her heirs, executors or administrators) has a reasonable
        basis for prevailing on the merits, (b) a determination that the indemnified\nindividual
        (or his or her heirs, executors or administrators) will have the financial
        capacity to reimburse the bank in the event he or\nshe does not prevail, (c)
        a determination that the payment of expenses and fees by the association will
        not adversely affect the safety\nand soundness of the association, and (d)
        receipt of an undertaking by or on behalf of such institution-affiliated party
        (or by his or\nher heirs, executors or administrators) to repay such advancement
        in the event of a final order or settlement pursuant to which such person:\n(i)
        is assessed a civil money penalty, (ii) is removed from office or prohibited
        from participating in the conduct of the affairs of the\nassociation, or (iii)
        is required to cease and desist from or to take any affirmative action described
        in 12 U.S.C. 1818(b) with respect\nto the association. In all other instances,
        expenses incurred by an institution-affiliated party (or by his or her heirs,
        executors or\nadministrators) in connection with any action or proceeding
        as to which indemnification may be given under these articles of association\nmay
        be paid by the association in advance of the final disposition of such action
        or proceeding upon (a) receipt of an undertaking by\nor on behalf of such
        institution-affiliated party (or by or on behalf of his or her heirs, executors
        or administrators) to repay such\nadvancement in the event that such institution-affiliated
        party (or his or her heirs, executors or administrators) is ultimately found\nnot
        to be entitled to indemnification as authorized by these articles of association
        and (b) approval by the board of directors acting\nby a quorum consisting
        of directors who are not parties to such action or proceeding or, if such
        a quorum is not obtainable, then approval\nby stockholders. To the extent
        permitted by law, the board of directors or, if applicable, the stockholders,
        shall not be required to\nfind that the institution-affiliated party has met
        the applicable standard of conduct provided by law for indemnification in
        connection\nwith such action or proceeding.</P>\n\n<P STYLE=\"font: 10pt Courier;
        margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Courier;
        margin: 0pt 0; text-indent: 0.5in\"></P>\n\n<!-- Field: Page; Sequence: 8
        -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->7<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Courier; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">In the event that a majority of the members of\nthe
        board of directors are named as respondents in an administrative proceeding
        or civil action and request indemnification, the remaining\nmembers of the
        board may authorize independent legal counsel to review the indemnification
        request and provide the remaining members of\nthe board with a written opinion
        of counsel as to whether the conditions delineated in the first four paragraphs
        of this Article Tenth\nhave been met. If independent legal counsel opines
        that said conditions have been met, the remaining members of the board of
        directors\nmay rely on such opinion in authorizing the requested indemnification.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">In
        the event that all of the members of the board\nof directors are named as
        respondents in an administrative proceeding or civil action and request indemnification,
        the board shall authorize\nindependent legal counsel to review the indemnification
        request and provide the board with a written opinion of counsel as to whether\nthe
        conditions delineated in the first four paragraphs of this Article Tenth have
        been met. If legal counsel opines that said conditions\nhave been met, the
        board of directors may rely on such opinion in authorizing the requested indemnification.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">To the extent permitted
        under applicable law, the\nrights of indemnification and to the advancement
        of expenses provided in these articles of association (a) shall be available
        with respect\nto events occurring prior to the adoption of these articles
        of association, (b) shall continue to exist after any restrictive amendment\nof
        these articles of association with respect to events occurring prior to such
        amendment, (c) may be interpreted on the basis of applicable\nlaw in effect
        at the time of the occurrence of the event or events giving rise to the action
        or proceeding, or on the basis of applicable\nlaw in effect at the time such
        rights are claimed, and (d) are in the nature of contract rights which may
        be enforced in any court of\ncompetent jurisdiction as if the association
        and the institution-affiliated party (or his or her heirs, executors or administrators)
        for\nwhom such rights are sought were parties to a separate written agreement.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The
        rights of indemnification and to the advancement\nof expenses provided in
        these articles of association shall not, to the extent permitted under applicable
        law, be deemed exclusive of\nany other rights to which any such institution
        affiliated party (or his or her heirs, executors or administrators) may now
        or hereafter\nbe otherwise entitled whether contained in these articles of
        association, the bylaws, a resolution of stockholders, a resolution of the\nboard
        of directors, or an agreement providing such indemnification, the creation
        of such other rights being hereby expressly authorized.\nWithout limiting
        the generality of the foregoing, the rights of indemnification and to the
        advancement of expenses provided in these articles\nof association shall not
        be deemed exclusive of any rights, pursuant to statute or otherwise, of any
        such institution-affiliated party\n(or of his or her heirs, executors or administrators)
        in any such action or proceeding to have assessed or allowed in his or her
        favor,\nagainst the association or otherwise, his or her costs and expenses
        incurred therein or in connection therewith or any part thereof.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">If
        this Article Tenth or any part hereof shall\nbe held unenforceable in any
        respect by a court of competent jurisdiction, it shall be deemed modified
        to the minimum extent necessary\nto make it enforceable, and the remainder
        of this Article Tenth shall remain fully enforceable.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">The association may, upon affirmative vote of
        a\nmajority of its board of directors, purchase insurance to indemnify its
        institution-affiliated parties to the extent that such indemnification\nis
        allowed in these articles of association; provided, however, that no such
        insurance shall include coverage to pay or reimburse any\ninstitution-affiliated
        party for the cost of any judgment or civil money penalty assessed against
        such person in an administrative proceeding\nor civil action commenced by
        any federal banking agency. Such insurance may, but need not, be for the benefit
        of all institution-affiliated\nparties.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">ELEVENTH. These articles of association may be amended at any regular\nor
        special meeting of the shareholders by the affirmative vote of the holders
        of a majority of the stock of this association, unless the\nvote of the holders
        of a greater amount of stock is required by law, and in that case by the vote
        of the holders of such greater amount.\nThe association's board of directors
        may propose one or more amendments to the articles of association for submission
        to the shareholders.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n\n<!-- Field: Page;
        Sequence: 9 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->8<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><B>EXHIBIT 4</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"> <B>BY-LAWS OF WILMINGTON TRUST, NATIONAL ASSOCIATION</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B></B></P>\n\n<!--
        Field: Page; Sequence: 10 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->9<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"text-align: center; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><B>WILMINGTON TRUST, NATIONAL ASSOCIATION</B></P>\n\n<P
        STYLE=\"font: 10pt Courier; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin-top: 0pt; margin-bottom: 0pt; text-align: center\"><B>AMENDED AND RESTATED
        BYLAWS</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt; text-align: center\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><B>(Effective as of March 7, 2024)</B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><B>&nbsp;</B></P>\n\n\n<!-- Field: Page; Sequence: 11 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->10<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">AMENDED AND RESTATED BYLAWS OF</P>\n\n<P STYLE=\"font: bold 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">WILMINGTON
        TRUST, NATIONAL ASSOCIATION</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE
        I</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: center\"><U>Meetings of Shareholders</U></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 1. Annual Meeting</B>. The annual meeting of shareholders\nshall
        be held on such date and at such time as may be designated by the chair of
        the Board of Directors, the chief executive officer,\nthe president, the chief
        operating officer, the secretary, or the Board of Directors for the purpose
        of the election of directors and\nfor the transaction of such other business
        as may properly come before the meeting, except such date shall not be a legal
        holiday in Delaware.\nNotice of the meeting shall be mailed by first class
        mail, postage prepaid, at least 10 days and no more than 60 days prior to
        the date\nthereof, addressed to each shareholder at his or her address appearing
        on the books of the association. If, for any cause, an election\nof directors
        is not made on that date, an election may be held on any subsequent day within
        60 days of the date fixed, to be designated\nby the Board of Directors, or,
        if the directors fail to fix the date, by shareholders representing two-thirds
        of the shares. In these\ncircumstances, at least 10 days&rsquo; notice must
        be given by first class mail to shareholders.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 2. Special Meetings</B>. The chair of the Board of Directors,\nthe
        president, the chief executive officer, the secretary, or the Board of Directors
        may call a special meeting of the shareholders. A\nspecial meeting shall be
        called to act on any matter that may properly be considered at a meeting of
        shareholders upon the written request\nof shareholders entitled to cast not
        less than a majority of all the votes entitled to be cast on such matter at
        the meeting. Every such\nspecial meeting, unless otherwise provided by law,
        shall be called by mailing, postage prepaid, not less than 10 days nor more
        than 60\ndays prior to the date fixed for the meeting, to each shareholder
        at the address appearing on the books of the association a notice stating\nthe
        purpose of the meeting.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">The Board
        of Directors may fix a record date for determining shareholders\nentitled
        to notice and to vote at any meeting, in reasonable proximity to the date
        of giving notice to the shareholders of such meeting.\nThe record date for
        determining shareholders entitled to demand a special meeting is the date
        the first shareholder signs a demand for\nthe meeting describing the purpose
        or purposes for which it is to be held.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 3. Adjournment</B>. If an annual or special shareholders'\nmeeting
        is adjourned to a different date, time, or place, notice need not be given
        of the new date, time or place, if the new date, time\nor place is announced
        at the meeting before adjournment, unless any additional items of business
        are to be considered, or the association\nbecomes aware of an intervening
        event materially affecting any matter to be voted on more than 10 days prior
        to the date to which the\nmeeting is adjourned. If a new record date for the
        adjourned meeting is fixed, however, notice of the adjourned meeting must
        be given\nto persons who are shareholders as of the new record date. If, however,
        the meeting to elect the directors is adjourned before the election\ntakes
        place, at least ten days&rsquo; notice of the new election must be given to
        the shareholders by first-class mail.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        12 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->11<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 4. Nominations of Directors</B>. Nominations for election\nto
        the Board of Directors may be made by the Board of Directors or by any shareholder
        of any outstanding class of capital stock of the\nassociation entitled to
        vote for the election of directors. Nominations, other than those made by
        or on behalf of the existing management\nof the association, shall be made
        in writing and shall be delivered or mailed to the president of the association,
        not less than 14 days\nnor more than 50 days prior to any meeting of shareholders
        called for the election of directors; <I>provided, however, </I>that if less\nthan
        21 days' notice of the meeting is given to shareholders, such nomination shall
        be mailed or delivered to the president of the association\nnot later than
        the close of business on the seventh day following the day on which the notice
        of meeting was mailed. Such notification\nshall contain the following information
        to the extent known to the notifying shareholder:</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">(1)</TD><TD STYLE=\"text-align: justify\">The name
        and address of each proposed nominee;</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">(2)</TD><TD STYLE=\"text-align: justify\">The principal
        occupation of each proposed nominee;</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">(3)</TD><TD STYLE=\"text-align: justify\">The total
        number of shares of capital stock of the association that will be voted for
        each proposed nominee;</TD></TR></TABLE>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">(4)</TD><TD STYLE=\"text-align: justify\">The name
        and residence of the notifying shareholder; and</TD></TR></TABLE>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">(5)</TD><TD STYLE=\"text-align: justify\">The number
        of shares of capital stock of the association owned by the notifying shareholder</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">Nominations not made in accordance herewith
        may, in his/her discretion,\nbe disregarded by the chair of the meeting, and
        upon his/her instructions, all votes cast for each such nominee may be disregarded.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 5. Proxies</B>. Shareholders
        may vote at any meeting of\nthe shareholders by proxies duly authorized in
        writing, but no officer or employee of this association shall act as proxy.
        A director\nor an attorney of the association may act as proxy for shareholders
        voting if they are not also employed as an officer of the association.\nProxies
        shall be valid only for one meeting, to be specified therein, and any adjournments
        of such meeting. Proxies shall be dated and\nfiled with the records of the
        meeting. Proxies with facsimile signatures may be used and unexecuted proxies
        may be counted upon receipt\nof a written confirmation from the shareholder.
        Proxies meeting the above requirements submitted at any time during a meeting
        shall be\naccepted.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        6. Quorum</B>. A majority of the outstanding capital stock,\nrepresented in
        person or by proxy, shall constitute a quorum at any meeting of shareholders,
        unless otherwise provided by law, but less\nthan a quorum may adjourn any
        meeting, from time to time, and the meeting may be held, as adjourned, without
        further notice. A majority\nof the votes cast shall decide every question
        or matter submitted to the shareholders at any meeting, unless otherwise provided
        by law\nor by the articles of association. If a meeting for the election of
        directors is not held on the fixed date, at least 10 days&rsquo; notice\nmust
        be given by first-class mail to the shareholders.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n\n<!-- Field:
        Page; Sequence: 13 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->12<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE
        II</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: center\"><U>Directors</U></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        1. Board of Directors</B>. The Board of Directors shall\nhave the power to
        manage and administer the business and affairs of the association. Except
        as expressly limited by law, all corporate\npowers of the association shall
        be vested in and may be exercised by the Board of Directors.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 2. Number</B>. The Board of Directors shall consist of
        not\nless than five nor more than twenty-five members, unless the OCC has
        exempted the association from the 25-member limit. The exact number\nwithin
        such minimum and maximum limits is to be fixed and determined from time to
        time by resolution of a majority of the full Board of\nDirectors or by resolution
        of a majority of the shareholders at any meeting thereof. The Board of Directors
        may not increase the number\nof directors between meetings of shareholders
        to a number which: (a) exceeds by more than 2 the number of directors last
        elected by shareholders\nwhere the number was 15 or less; or (b) exceeds by
        more than 4 the number of directors last elected by shareholders where the
        number was\n16 or more, but in no event shall the number of directors exceed
        25, unless the OCC has exempted the association from the 25-member limit.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 3. Qualifications.</B> Each
        director must be a citizen of\nthe United States and must own in his or her
        own right either shares of the capital stock of the association or a company
        that controls\nthe association that has not less than an aggregate par value
        of $1,000, an aggregate shareholders&rsquo; equity of $1,000, or an aggregate\nfair
        market value of $1,000. The value of the common or preferred stock held by
        a director is valued as of the date purchased or the date\non which the individual
        became a director, whichever is greater.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 4. Organization Meeting</B>. After each annual meeting\nof
        shareholders at which directors shall have been elected, the Board of Directors
        shall meet as soon as practicable for the purpose of\norganization and the
        transaction of other business. Such first regular meeting shall be held at
        any place as may be designated by the\nchair, the president or the Board of
        Directors for such first regular meeting or, in default of such designation,
        where the immediately\npreceding meeting of shareholders was held.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><B>Section 5. Regular Meetings</B>. Regular
        meetings\nof the Board of Directors shall be held on such dates and at such
        places as may be designated from time to time by the chair. No notice\nof
        regular meetings shall be necessary.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 6. Special Meetings</B>. Special meetings of the Board\nof
        Directors may be called at any time by the chair, the chief executive officer,
        the president or by a majority of the then- acting\ndirectors by vote at a
        meeting or in writing, or by a majority of the members of the executive committee,
        if one is constituted, by\nvote at a meeting or in writing. A special meeting
        of the Board of Directors shall be held on such date and at any place as may
        be\ndesignated from time to time by the Board of Directors. In the absence
        of such designation, such meeting shall be held at such place\nas may be designated
        in the call. Each member of the Board of Directors shall be given notice stating
        the date, time and place, by\nletter, electronic delivery or in person, of
        each special meeting not less than one day before the meeting. Such notice
        need not\nspecify the purpose for which the meeting is called, unless required
        by the Articles of Association or the bylaws.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 14 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->13<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 7. Quorum</B>. A majority of the entire Board then in office\nshall
        constitute a quorum at any meeting, except when otherwise provided by law
        or these Bylaws, but a lesser number may adjourn any meeting,\nfrom time to
        time, and the meeting may be held, as adjourned, without further notice. If
        the number of directors present at the meeting\nis reduced below the number
        that would constitute a quorum, no business may be transacted, except selecting
        directors to fill vacancies\nin conformance with Article II, Section 11. If
        a quorum is present, the board of directors may take action through the vote
        of a majority\nof the directors who are in attendance. No director may vote
        by proxy.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section 8. Attendance
        by Electronic, Telephonic or Similar Means.</B>\nAny one or more members of
        the Board of Directors or any committee thereof may participate in a regular
        or special meeting of such board\nor committee by, or conduct the meeting
        through the use of, conference telephone or other communications equipment
        by which all directors\nor committee members participating may simultaneously
        hear each other during the meeting. Participation in a meeting by these means
        constitutes\npresence in person at a meeting.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 9. Procedures</B>. The order of business and all other
        matters\nof procedure at every meeting of the Board of Directors may be determined
        by the person presiding at the meeting.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 10. Removal of Directors</B>. Any director may be removed\nfor
        cause at any meeting of shareholders, notice of which shall have referred
        to the proposed action, by vote of the shareholders. Any\ndirector may be
        removed without cause at any meeting of shareholders, notice of which shall
        have referred to the proposed action, by the\nvote of the holders of a majority
        of the shares of the association entitled to vote. Any director may be removed
        for cause at any meeting\nof the directors, notice of which shall have referred
        to the proposed action, by vote of a majority of the entire Board of Directors.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 11. Vacancies</B>. When any
        vacancy occurs among the directors,\na majority of the remaining members of
        the Board of Directors may appoint a director to fill such vacancy until the
        next election at any\nregular meeting of the Board of Directors, or at a special
        meeting called for that purpose at which a quorum is present, or if the directors\nremaining
        in office constitute fewer than a quorum of the Board of Directors, by the
        affirmative vote of a majority of all the directors\nremaining in office,
        or by shareholders at a special meeting called for that purpose in conformance
        with Section 2 of Article I. A vacancy\nthat will occur at a specific later
        date (by reason of a resignation effective at a later date) may be filled
        before the vacancy occurs\nbut the new director may not take office until
        the vacancy occurs.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        12. Consent of Directors without a Meeting</B>. Any\naction required or permitted
        to be taken at any meeting of the Board of Directors may be taken without
        a meeting if the action is\ntaken by all members of the Board. The action
        may be evidenced by one or more written consents signed by each director before
        or\nafter such action, describing the action taken, and included in the minutes
        or filed with the corporate records. A director&rsquo;s\nconsent to action
        taken without a meeting may be in electronic form and delivered by electronic
        means.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section 13. Ratification</B>.
        The board of directors may ratify\nand make binding on the association any
        action or inaction by the association or its officers to the extent that the
        Board of Directors\nor the shareholders could have originally authorized the
        matter and as permitted by law. Moreover, any action or inaction questioned
        in\nany shareholders&rsquo; derivative proceeding or any other proceeding
        on the ground of lack of authority, defective or irregular execution,\nadverse
        interest of a director, officer or shareholder, non-disclosure, miscomputation,
        the application of improper principles or practices\nof accounting or otherwise,
        may be ratified, before or after judgment, by the Board of Directors or by
        the shareholders, and if so ratified,\nshall have the same force and effect
        as if the questioned action or inaction had been originally duly authorized,
        and such ratification\nshall be binding upon the shareholders and shall constitute
        a bar to any claim or execution of any judgment in respect of such questioned\naction
        or inaction.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 15 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->14<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE III</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Committees</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section 1. Executive
        Committee</B>. The Board of Directors may appoint\nan Executive Committee,
        which shall have and may exercise, during the intervals between meetings of
        the Board of Directors, all the powers\nof the Board of Directors in the management
        of the business, properties and affairs of the association except as prohibited
        by law, the\nArticles of Association or these Bylaws. All acts done and powers
        conferred by the Executive Committee shall be deemed to be and may be\ncertified
        as being, done or conferred under authority of the Board of Directors.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 2. Trust Audit Committee.</B>
        Unless delegated pursuant\nto Section 5 of this Article III, there shall be
        a Trust Audit Committee composed of not less than 2 directors, appointed by
        the Board\nof Directors, which shall, at least once during each calendar year
        make suitable audits of the association&rsquo;s fiduciary activities\nor cause
        suitable audits to be made by auditors responsible only to the Board, and
        at such time shall ascertain whether fiduciary powers\nhave been administered
        according to law, Part 9 of the Regulations of the Comptroller of the Currency,
        and sound fiduciary principles.\nSuch committee: (1) must not include any
        officers of the association or an affiliate who participate significantly
        in the administration\nof the association&rsquo;s fiduciary activities; and
        (2) must consist of a majority of members who are not also members of any
        committee\nto which the Board of Directors has delegated power to manage and
        control the fiduciary activities of the bank.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 3. Examining Committee</B>. Unless delegated pursuant\nto
        Section 5 of this Article III, there shall be an examining committee composed
        of not less than 2 directors, exclusive of any\nactive officers, appointed
        by the board of directors annually or more often. The duty of that committee
        shall be to examine at least\nonce during each calendar year and within 15
        months of the last examination the affairs of the association or cause suitable\nexaminations
        to be made by auditors responsible only to the board of directors and to report
        the result of such examination in\nwriting to the board of directors at the
        next regular meeting thereafter. Such report shall state whether the association
        is in a\nsound condition, and whether adequate internal controls and procedures
        are being maintained and shall recommend to the board of\ndirectors such changes
        in the manner of conducting the affairs of the association as shall be deemed
        advisable.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section 4. Other
        Committees</B>. The Board of Directors may from\ntime to time by resolution
        adopted by affirmative vote of a majority of the Board of Directors, appoint
        other committees of the Board\nof Directors which shall have such powers and
        duties as the Board of Directors may properly determine. No such other committee
        of the\nBoard of Directors shall be composed of fewer than three (3) directors.
        The Board of Directors may also appoint one or more directors\nas alternative
        members of a committee. All acts done and powers conferred by the Board of
        Directors on committees of the Board of Directors\nshall be deemed to be and
        may be certified as being, done or conferred under that authority of the Board
        of Directors.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        5. Delegation of Responsibility and Authority</B>. The responsibility,\nauthority
        and constitution of any committee under this Article III may, if authorized
        by law, be given over to a duly constituted committee\nof the association&rsquo;s
        parent corporation by resolution adopted by the Board of Directors.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 16 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->15<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE IV</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Officers and Employees</U></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        1 Officers.</B> The Board of Directors shall annually, at\nthe Annual Reorganization
        Meeting of the Board of Directors following the annual meeting of shareholders,
        appoint or elect a chair of\nthe Board, a chief executive officer, a president,
        one (1) or more senior executive vice presidents, a corporate secretary, a
        treasurer,\na chief auditor, and such other officers as it may determine,
        each to hold office until the next Annual Reorganization meeting.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">The officers below the level of senior
        executive vice president may\nbe elected as follows: the head of the Human
        Resources Department of M&amp;T Bank, or his or her designee, may appoint
        officers up to\nand including (without limitation as to title or number) one
        (1) or more executive vice presidents, senior vice presidents, vice presidents,\nassistant
        vice presidents, assistant secretaries, assistant treasurers, and assistant
        auditors, and any other officer positions as they\ndeem necessary and appropriate,
        except the chair of the board, chief executive officer, president, any &ldquo;Executive
        Officer&rdquo;\nof the association for the purposes of Regulation O (codified
        at 12 C.F.R. &sect;215.2(e)(1)), and any &ldquo;Senior Executive Officer&rdquo;\nwithin
        the meaning of 12 C.F.R. &sect;5.51(c)(4) may only be appointed by the Board
        of Directors.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        2. Chair of the Board</B>. The Board of Directors shall\nappoint one of its
        members to be the chair of the Board to serve at its pleasure. Such person
        shall preside at all meetings of the Board\nof Directors. The chair of the
        Board shall supervise the carrying out of the policies adopted or approved
        by the Board of Directors; shall\nhave general executive powers, as well as
        the specific powers conferred by these Bylaws; and shall also have and may
        exercise such further\npowers and duties as from time to time may be conferred
        upon or assigned by the Board of Directors.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 3. President</B>. The Board of Directors shall appoint\none
        of its members to be the president of the association. The president shall
        be a member of the Board of Directors. In the absence\nof the chair, the president
        shall preside at any meeting of the Board of Directors. The president shall
        have general executive\npowers and shall have and may exercise any and all
        other powers and duties pertaining by law, regulation, or practice to the
        office\nof president, or imposed by these Bylaws. The president shall also
        have and may exercise such further powers and duties as from time\nto time
        may be conferred or assigned by the Board of Directors.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 4. Vice President</B>. The Board of Directors may appoint\none
        or more vice presidents. Each vice president shall have such powers and duties
        as may be assigned by the Board of Directors. One vice\npresident shall be
        designated by the Board of Directors, in the absence of the president, to
        perform all the duties of the president.</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 5. Secretary</B>. The Board of Directors shall appoint
        a\nsecretary or other designated officer who shall be secretary of the Board
        of Directors and of the association and who shall keep accurate\nminutes of
        all meetings. The secretary shall attend to the giving of all notices required
        by these Bylaws; shall be custodian of the corporate\nseal, records, documents
        and papers of the association; shall provide for the keeping of proper records
        of all transactions of the association;\nshall have and may exercise any and
        all other powers and duties pertaining by law, regulation or practice, or
        imposed by these bylaws;\nand shall also perform such other duties as may
        be assigned from time to time, by the Board of Directors.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 6. Other Officers</B>. The Board of Directors may appoint\none
        or more assistant vice presidents, one or more trust officers, one or more
        officers, one or more assistant secretaries, one or more\nassistant treasurers,
        one or more managers and assistant managers of branches and such other officers
        and attorneys in fact as from time\nto time may appear to the Board of Directors
        to be required or desirable to transact the business of the association. Such
        officers shall\nrespectively exercise such powers and perform such duties
        as pertain to their several offices, or as may be conferred upon or assigned\nto
        them by the Board of Directors, the chair of the Board, or the president.
        The Board of Directors may authorize an officer to appoint\none or more officers
        or assistant officers.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        7. Resignation</B>. An officer may resign at any time by\ndelivering notice
        to the association. A resignation is effective when the notice is given unless
        the notice specifies a later effective\ndate.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 17 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->16<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE V</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\"><U>Stock and Stock Certificates</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 1. Transfers</B>. Shares of stock shall be transferable\non
        the books of the association, and a transfer book shall be kept in which all
        transfers of stock shall be recorded. Every person becoming\na shareholder
        by such transfer shall in proportion to such shareholder's shares, succeed
        to all rights of the prior holder of such shares.\nThe Board of Directors
        may impose conditions upon the transfer of the stock reasonably calculated
        to simplify the work of the association\nwith respect to stock transfers,
        voting at shareholder meetings and related matters and to protect it against
        fraudulent transfers.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        2. Stock Certificates</B>. Certificates of stock shall\nbear the signature
        of the president (which may be engraved, printed or impressed) and shall be
        signed manually, by facsimile process,\nor electronic means by the secretary,
        assistant secretary, treasurer, assistant treasurer, or any other officer
        appointed by the Board\nof Directors for that purpose, to be known as an authorized
        officer, and the seal of the association shall be engraved thereon. Each\ncertificate
        shall recite on its face that the stock represented thereby is transferable
        only upon the books of the association properly\nendorsed and otherwise comply
        with the requirements of 12 U.S.C. 52 and 12 C.F.R. &sect;7.2016(b).</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 3. Lost, Stolen or Destroyed
        Certificates</B>. In case any\ncertificate representing shares shall be lost,
        stolen or destroyed, the Board of Directors, in its discretion, or any officer
        or officers\nthereunder duly authorized by the Board of Directors, may authorize
        the issue of a substitute certificate or substitute shares in uncertificated\nform
        in the place of the certificate so lost, stolen or destroyed.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 4. Fixing of Record Date</B>. The Board of Directors may\nset,
        in advance, a record date for the purpose of determining shareholders entitled
        to notice of or to vote at any meeting of shareholders\nor determining shareholders
        entitled to receive payment of any dividend or the allotment of any other
        rights, in order to make a determination\nof shareholders for any other proper
        purpose. Such date, in any case, shall be the close of business on the day
        before the first notice\nis mailed or otherwise sent to the shareholders,
        provided that in no event may a record date be more than 10 days before the
        meeting.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\">ARTICLE VII</P>\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><U>Corporate
        Seal</U></P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section 1. Seal</B>.
        The seal of the association shall be in such\nform as may be determined from
        time to time by the Board of Directors. The president, the treasurer, the
        secretary or any assistant treasurer\nor assistant secretary, or other officer
        thereunto designated by the Board of Directors shall have authority to affix
        the corporate seal\nto any document requiring such seal and to attest the
        same. The seal on any corporate obligation for the payment of money may be
        facsimile.</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE
        VIII</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: center\"><U>Miscellaneous Provisions</U></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        1. Fiscal Year</B>. The fiscal year of the association shall\nbe the calendar
        year.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B>Section 2. Execution of Instruments</B>.
        All agreements,\nindentures, mortgages, deeds, conveyances, transfers, certificates,
        declarations, receipts, discharges, releases, satisfactions,\nsettlements,
        petitions, schedules, accounts, affidavits, bonds, undertakings, proxies and
        other instruments or documents may be\nsigned, executed, acknowledged, verified,
        delivered or accepted on behalf of the association by any officer elected
        or appointed\npursuant to Article IV of these Bylaws. Any such instruments
        may also be executed, acknowledged, verified, delivered or accepted on\nbehalf
        of the association in such other manner and by such other officers as the
        Board of Directors may from time to time direct.\nThe provisions of this Section
        2 are supplementary to any other provision of these Bylaws.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 18 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->17<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 3. Records</B>. The Articles of Association, the Bylaws\nand
        the proceedings of all meetings of the shareholders, the Board of Directors,
        and standing committees of the Board of Directors shall\nbe recorded in appropriate
        minute books provided for that purpose. The minutes of each meeting shall
        be signed by the secretary, treasurer\nor other officer appointed to act as
        secretary of the meeting.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Section
        4. Corporate Governance Procedures.</B>\nTo the extent not inconsistent with
        federal banking statutes and regulations, or safe and sound banking practices,
        the association may\nfollow the Delaware General Corporation Law, Del. Code
        Ann. tit. 8 (1991, as amended 1994, and as amended thereafter) with respect
        to\nmatters of corporate governance procedures.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 5. Indemnification.</B> For purposes of this Section 5
        of\nArticle VIII, the term &ldquo;institution-affiliated party&rdquo; shall
        mean any institution-affiliated party of the association as such\nterm is
        defined in 12 U.S.C. 1813(u).</P>\n\n<P STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">Any institution-affiliated
        party (or his or her heirs, executors or\nadministrators) may be indemnified
        or reimbursed by the association for reasonable expenses actually incurred
        in connection with any threatened,\npending or completed actions or proceedings
        and appeals therein, whether civil, criminal, governmental, administrative
        or investigative,\nin accordance with and to the fullest extent permitted
        by law, as such law now or hereafter exists; provided, however, that when
        an administrative\nproceeding or action instituted by a federal banking agency
        results in a final order or settlement pursuant to which such person: (i)\nis
        assessed a civil money penalty, (ii) is removed from office or prohibited
        from participating in the conduct of the affairs of the association,\nor (iii)
        is required to cease and desist from or to take any affirmative action described
        in 12 U.S.C. 1818(b) with respect to the association,\nthen the association
        shall require the repayment of all legal fees and expenses advanced pursuant
        to the next succeeding paragraph and\nmay not indemnify such institution-affiliated
        parties (or their heirs, executors or administrators) for expenses, including
        expenses for\nlegal fees, penalties or other payments incurred. The association
        shall provide indemnification in connection with an action or proceeding\n(or
        part thereof) initiated by an institution-affiliated party (or by his or her
        heirs, executors or administrators) only if such action\nor proceeding (or
        part thereof) was authorized by the Board of Directors.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">Expenses incurred by an institution-affiliated party (or by his\nor
        her heirs, executors or administrators) in connection with any action or proceeding
        under 12 U.S.C. 164 or 1818 may be paid by\nthe association in advance of
        the final disposition of such action or proceeding upon (a) a determination
        by the Board of Directors\nacting by a quorum consisting of directors who
        are not parties to such action or proceeding that the institution-affiliated
        party\n(or his or her heirs, executors or administrators) has a reasonable
        basis for prevailing on the merits, (b) a determination that the\nindemnified
        individual (or his or her heirs, executors or administrators) will have the
        financial capacity to reimburse the\nassociation in the event he or she does
        not prevail, (c) a determination that the payment of expenses and fees by
        the association\nwill not adversely affect the safety and soundness of the
        association, and (d) receipt of an undertaking by or on behalf of such\ninstitution-affiliated
        party (or by his or her heirs, executors or administrators) to repay such
        advancement in the event of a final\norder or settlement pursuant to which
        such person: (i) is assessed a civil money penalty, (ii) is removed from office
        or prohibited\nfrom participating in the conduct of the affairs of the association,
        or (iii) is required to cease and desist from or to take any\naffirmative
        action described in 12 U.S.C. 1818(b) with respect to the association. In
        all other instances, expenses incurred by an\ninstitution-affiliated party
        (or by his or her heirs, executors or administrators) in connection with any
        action or proceeding as to\nwhich indemnification may be given under the Articles
        of Association may be paid by the association in advance of the final\ndisposition
        of such action or proceeding upon (a) receipt of an undertaking by or on behalf
        of such institution-affiliated party (or\nby or on behalf of his or her heirs,
        executors or administrators) to repay such advancement in the event that such
        institution-\naffiliated party (or his or her heirs, executors or administrators)
        is ultimately found not to be entitled to indemnification as\nauthorized by
        these Bylaws and (b) approval by the Board of Directors acting by a quorum
        consisting of directors who are not parties\nto such action or proceeding
        or, if such a quorum is not obtainable, then approval by shareholders. To
        the extent permitted by law,\nthe Board of Directors or, if applicable, the
        shareholders, shall not be required to find that the institution-affiliated
        party has\nmet the applicable standard of conduct provided by law for indemnification
        in connection with such action or proceeding.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 19 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->18<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">In the event that a majority of the members of the Board of Directors\nare
        named as respondents in an administrative proceeding or civil action and request
        indemnification, the remaining members of the Board\nmay authorize independent
        legal counsel to review the indemnification request and provide the remaining
        members of the Board with a written\nopinion of counsel as to whether the
        conditions delineated in the first four paragraphs of this Section 5 of Article
        VIII have been met.\nIf independent legal counsel opines that said conditions
        have been met, the remaining members of the Board of Directors may rely on
        such\nopinion in authorizing the requested indemnification.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">In the event that all of the members of the Board of Directors are\nnamed
        as respondents in an administrative proceeding or civil action and request
        indemnification, the Board shall authorize independent\nlegal counsel to review
        the indemnification request and provide the Board with a written opinion of
        counsel as to whether the conditions\ndelineated in the first four paragraphs
        of this Section 5 of Article VIII have been met. If legal counsel opines that
        said conditions\nhave been met, the Board of Directors may rely on such opinion
        in authorizing the requested indemnification.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">To the extent permitted under applicable law, the rights of indemnification\nand
        to the advancement of expenses provided in the Articles of Association (a)
        shall be available with respect to events occurring prior\nto the adoption
        of these Bylaws, (b) shall continue to exist after any restrictive amendment
        of these Bylaws with respect to events occurring\nprior to such amendment,
        (c) may be interpreted on the basis of applicable law in effect at the time
        of the occurrence of the event or\nevents giving rise to the action or proceeding,
        or on the basis of applicable law in effect at the time such rights are claimed,
        and (d)\nare in the nature of contract rights which may be enforced in any
        court of competent jurisdiction as if the association and the institution-affiliated\nparty
        (or his or her heirs, executors or administrators) for whom such rights are
        sought were parties to a separate written agreement.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">The rights of indemnification and to the advancement of expenses provided\nin
        these Bylaws shall not, to the extent permitted under applicable law, be deemed
        exclusive of any other rights to which any such institution-affiliated\nparty
        (or his or her heirs, executors or administrators) may now or hereafter be
        otherwise entitled whether contained in the association&rsquo;s\nArticles
        of Association, these Bylaws, a resolution of shareholders, a resolution of
        the Board of Directors, or an agreement providing\nsuch indemnification, the
        creation of such other rights being hereby expressly authorized. Without limiting
        the generality of the foregoing,\nthe rights of indemnification and to the
        advancement of expenses provided in these Bylaws shall not be deemed exclusive
        of any rights,\npursuant to statute or otherwise, of any such institution-affiliated
        party (or of his or her heirs, executors or administrators) in any\nsuch action
        or proceeding to have assessed or allowed in his or her favor, against the
        association or otherwise, his or her costs and\nexpenses incurred therein
        or in connection therewith or any part thereof.</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">If this Section 5 of Article VIII or any part hereof shall be held\nunenforceable
        in any respect by a court of competent jurisdiction, it shall be deemed modified
        to the minimum extent necessary to make\nit enforceable, and the remainder
        of this Section 5 of Article VIII shall remain fully enforceable.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">The association may, upon affirmative
        vote of a majority of its Board\nof Directors, purchase insurance to indemnify
        its institution-affiliated parties to the extent that such indemnification
        is allowed in\nthese Bylaws; provided, however, that no such insurance shall
        include coverage for a final order assessing civil money penalties against\nsuch
        persons by a bank regulatory agency. Such insurance may, but need not, be
        for the benefit of all institution- affiliated parties.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 20 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->19<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE IX</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\"><U>Inspection and Amendments</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Section 1. Inspection</B>. A copy of the bylaws of the association,\nwith
        all amendments, shall at all times be kept in a convenient place at the main
        office of the association, and shall be open for inspection\nto all shareholders
        during banking hours.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Section
        2. Amendments</B>. The Board of Directors shall have the\npower, at any regular
        or special meeting thereof, to amend, alter or repeal the bylaws of the association,
        or to make and adopt new bylaws.\nThese Bylaws may be amended, altered or
        repealed and new bylaws may be adopted by the shareholders of the association
        to the extent and\nas permitted in the Articles of Association or applicable
        law.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 21 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->20<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><B>EXHIBIT 6</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">&nbsp;</P>\n\n<P STYLE=\"text-align: center; font: 10pt Times New
        Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"> <B>Section 321(b)
        Consent</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">Pursuant to Section 321(b) of the Trust
        Indenture Act of 1939, as amended,\nWilmington Trust, National Association
        hereby consents that reports of examinations by Federal, State, Territorial
        or District authorities\nmay be furnished by such authorities to the Securities
        and Exchange Commission upon requests therefor.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\"
        CELLPADDING=\"0\" STYLE=\"font: 10pt Times New Roman, Times, Serif; width:
        100%; border-collapse: collapse\">\n  <TR STYLE=\"vertical-align: top\">\n
