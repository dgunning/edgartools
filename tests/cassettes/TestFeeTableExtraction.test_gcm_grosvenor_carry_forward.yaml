        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nTrustee may make reasonable rules
        for action by or a meeting of Securityholders of one or more Series. Any Agent
        may make reasonable\nrules and set reasonable requirements for its functions.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
