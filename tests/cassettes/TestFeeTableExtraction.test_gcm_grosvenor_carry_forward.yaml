        \   <TD STYLE=\"text-align: justify; width: 0.25in\"><FONT STYLE=\"font-size:
        10pt\">(3)</FONT></TD>\n    <TD STYLE=\"text-align: justify\"><FONT STYLE=\"font-size:
        10pt\">Estimated solely for the purpose of calculating the registration fee.
        No separate consideration will be received for shares of common stock that
        are issued upon conversion of debt securities, depositary shares or preferred
        stock or upon exercise of Class A common stock warrants registered hereunder.
        The maximum aggregate offering price of all securities issued pursuant to
        this registration statement will not exceed $350,000,000. </FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\"
