        justify; text-indent: 0.5in\">We may offer and sell up\nto $350,000,000 in
        the aggregate of the securities identified above from time to time in one
        or more offerings. This prospectus provides\nyou with a general description
        of the securities.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Each time we offer and sell\nsecurities, we
        will provide a supplement to this prospectus that contains specific information
        about the offering and the amounts, prices\nand terms of the securities. The
        supplement may also add, update or change information contained in this prospectus
        with respect to that\noffering. You should carefully read this prospectus
        and the applicable prospectus supplement before you invest in any of our securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        may offer and sell the\nsecurities described in this prospectus and any prospectus
        supplement to or through one or more underwriters, dealers and agents, or
        directly\nto purchasers, or through a combination of these methods. If any
        underwriters, dealers or agents are involved in the sale of any of the\nsecurities,
        their names and any applicable purchase price, fee, commission or discount
        arrangement between or among them will be set forth,\nor will be calculable
        from the information set forth, in the applicable prospectus supplement. See
        the sections of this prospectus entitled\n&ldquo;About this Prospectus&rdquo;
        and &ldquo;Plan of Distribution&rdquo; for more information. No securities
        may be sold without delivery\nof this prospectus and the applicable prospectus
        supplement describing the method and terms of the offering of such securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"text-transform: uppercase\"><B>&nbsp;</B></FONT></P>\n\n<P
