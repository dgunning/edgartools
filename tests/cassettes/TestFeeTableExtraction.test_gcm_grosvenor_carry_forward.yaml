        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->2<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<DIV
        STYLE=\"padding-right: 5.4pt; padding-left: 5.4pt; border: Black 1.5pt solid\">\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\"><A NAME=\"gcm_003\"></A>THE COMPANY</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Over our 53-year
        history we\nhave prided ourselves on our client-centric approach to alternative
        asset management. As a leading global solutions provider, we invest\nacross
        all major alternative investment strategies and are highly flexible in how
        we structure our solutions, so that we can work to meet\neach client&rsquo;s
        specific needs.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Our central objectives are\nto provide our clients
        with choice, deliver innovative alternative investment offerings and generate
        competitive risk-adjusted returns.\nWe partner with our institutional and
        individual clients to invest on their behalf across the private and public
        markets, either through\nportfolios customized to meet a client&rsquo;s specific
        objectives or through specialized funds that are developed to meet broad market\ndemands
        for strategies and risk-return objectives. Our clients include large, sophisticated,
        global institutional investors and a growing\nindividual investor client base.
        In both cases, our clients rely on our investment expertise and differentiated
        investment access to navigate\nthe alternatives market. As one of the pioneers
        of customized separate account solutions, we are equipped to provide investment
        services\nto clients with a wide variety of needs, internal resources and
        investment objectives, and our client relationships are deep and frequently\nspan
        decades.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">We believe our history, experience,\nexpertise and scale across the
        full range of alternative investment strategies, combined with our flexible
        implementation approach, are\nkey differentiators and position us well to
        provide a strong value proposition for clients. In addition, we believe our
        &ldquo;one firm&rdquo;\nculture, which is rooted in values of integrity and
        responsibility, is a key intangible asset to all our stakeholders.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        operate at scale across\nthe full range of private markets and absolute return
        strategies. Private markets and absolute return strategies are primarily defined\nby
        the liquidity of the underlying securities purchased, the length of the client
        commitment, and the form and timing of incentive fees.\nWe offer the following
        private markets and absolute return investment strategies:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><B>Private Markets</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 35.75pt; text-align:
        justify; text-indent: -11.25pt\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 100%\">\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD STYLE=\"width: 0.5in\">&nbsp;</TD>\n    <TD STYLE=\"width:
        0.25in; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align:
        justify; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Private Equity</I>. We are a recognized industry
        leader in private equity with global capabilities investing in primary funds,
        secondaries and co-investments.</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n
        \   <TD STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n
        \   <TD STYLE=\"font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align:
        justify; font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Infrastructure</I>. We are a leading open architecture
        infrastructure platform with nearly two decades of experience. Our investment
        activities span geographies, infrastructure subsectors, and include fund investing,
        secondary investing and direct investing.</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n    <TD STYLE=\"font-size:
        10pt\">&nbsp;</TD>\n    <TD STYLE=\"text-align: justify; font-size: 10pt\">&nbsp;</TD></TR>\n
        \ <TR STYLE=\"vertical-align: top\">\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"text-align: justify; font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Real Estate</I>. We manage real estate investment portfolios through
        a flexible investment platform to provide differentiated exposure to opportunistic
        real estate investments, primarily in North America. We are a leader in seeding
        new platforms, joint venture investing, and other creative and innovative
        implementation methods to access attractive real estate returns.</FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times
