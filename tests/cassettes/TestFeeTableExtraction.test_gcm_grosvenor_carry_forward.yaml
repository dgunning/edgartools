        justify; font: 10pt Times New Roman, Times, Serif\">The authorization to exercise
        corporate trust powers was granted under the Charter for Wilmington Trust,
        National Association, incorporated\nherein by reference to Exhibit 1 above.</TD></TR>\n<TR
        STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\">&nbsp;</TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\">&nbsp;</TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\">&nbsp;</TD></TR>\n<TR
        STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\"></TD><TD
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif\">4.</FONT></TD><TD STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif\">A copy of the existing
        By-Laws of Trustee, as now in effect, incorporated herein by reference to
        Exhibit 4of this Form T-1.</TD></TR>\n<TR STYLE=\"font: 10pt Times New Roman,
        Times, Serif; vertical-align: top\">\n<TD STYLE=\"text-align: justify; font:
