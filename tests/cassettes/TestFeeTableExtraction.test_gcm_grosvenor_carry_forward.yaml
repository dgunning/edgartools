        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-transform: uppercase; text-align: center; text-indent:
        0in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt; text-transform: none\">ARTICLE\nXI.</FONT><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><BR>\nSINKING
        FUNDS</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-transform: uppercase; text-align: center; text-indent: 0in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n11.1.&nbsp;<U>Applicability
        of Article</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nprovisions of this Article
        shall be applicable to any sinking fund for the retirement of the Securities
        of a Series if so provided by\nthe terms of such Securities pursuant to Section
        2.2, except as otherwise permitted or required by any form of Security of
        such Series\nissued pursuant to this Indenture.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nminimum amount of any sinking
        fund payment provided for by the terms of the Securities of any Series is
        herein referred to as a &ldquo;<I>mandatory\nsinking fund payment</I>&rdquo;
        and any other amount provided for by the terms of Securities of such Series
        is herein referred to as\nan &ldquo;<I>optional sinking fund payment</I>.&rdquo;
        If provided for by the terms of Securities of any Series, the cash amount
        of any\nsinking fund payment may be subject to reduction as provided in Section
        11.2. Each sinking fund payment shall be applied to the redemption\nof Securities
        of any Series as provided for by the terms of the Securities of such Series.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n11.2.&nbsp;<U>Satisfaction of Sinking Fund Payments with Securities</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany may, in satisfaction of
        all or any part of any sinking fund payment with respect to the Securities
        of any Series to be made pursuant\nto the terms of such Securities (1) deliver
        outstanding Securities of such Series to which such sinking fund payment is
        applicable (other\nthan any of such Securities previously called for mandatory
        sinking fund redemption) and (2) apply as credit Securities of such Series\nto
        which such sinking fund payment is applicable and which have been repurchased
        by the Company or redeemed either at the election of\nthe Company pursuant
        to the terms of such Series of Securities (except pursuant to any mandatory
        sinking fund) or through the application\nof permitted optional sinking fund
        payments or other optional redemptions pursuant to the terms of such Securities,
        provided that such\nSecurities have not been previously so credited. Such
        Securities shall be received by the Trustee, together with an Officer&rsquo;s
        Certificate\nwith respect thereto, not later than 15 days prior to the date
        on which the Trustee begins the process of selecting Securities for redemption,\nand
        shall be credited for such purpose by the Trustee at the price specified in
        such Securities for redemption through operation of the\nsinking fund and
        the amount of such sinking fund payment shall be reduced accordingly. If as
        a result of the delivery or credit of Securities\nin lieu of cash payments
        pursuant to this Section 11.2, the principal amount of Securities of such
        Series to be redeemed in order to\nexhaust the aforesaid cash payment shall
        be less than $100,000, the Trustee need not call Securities of such Series
        for redemption, except\nupon receipt of a Company Order that such action be
        taken, and such cash payment shall be held by the Trustee or a Paying Agent
        and applied\nto the next succeeding sinking fund payment, <U>provided</U>,
        <U>however</U>, that the Trustee or such Paying Agent shall from time to\ntime
        upon receipt of a Company Order pay over and deliver to the Company any cash
        payment so being held by the Trustee or such Paying\nAgent upon delivery by
        the Company to the Trustee of Securities of that Series purchased by the Company
        having an unpaid principal amount\nequal to the cash payment required to be
        released to the Company.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n11.3.&nbsp;<U>Redemption
        of Securities for Sinking Fund</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Not\nless than 45 days (unless otherwise indicated in the Board Resolution,
        supplemental indenture hereto or Officer&rsquo;s Certificate in\nrespect of
        a particular Series of Securities) prior to each sinking fund payment date
        for any Series of Securities, the Company will\ndeliver to the Trustee an
        Officer&rsquo;s Certificate specifying the amount of the next ensuing mandatory
        sinking fund payment for that\nSeries pursuant to the terms of that Series,
        the portion thereof, if any, which is to be satisfied by payment of cash and
        the portion\nthereof, if any, which is to be satisfied by delivering and crediting
        of Securities of that Series pursuant to Section 11.2, and the\noptional amount,
        if any, to be added in cash to the next ensuing mandatory sinking fund payment,
        and the Company shall thereupon be obligated\nto pay the amount therein specified.
        Not less than 30 days (unless otherwise indicated in the Board Resolution,
        Officer&rsquo;s Certificate\nor supplemental indenture in respect of a particular
        Series of Securities) before each such sinking fund payment date the Securities\nto
        be redeemed upon such sinking fund payment date will be selected in the manner
        specified in Section 3.2 and the Company shall send\nor cause to be sent a
        notice of the redemption thereof to be given in the name of and at the expense
        of the Company in the manner provided\nin and in accordance with Section 3.3.
        Such notice having been duly given, the redemption of such Securities shall
        be made upon the terms\nand in the manner stated in Sections 3.4, 3.5 and
        3.6.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
