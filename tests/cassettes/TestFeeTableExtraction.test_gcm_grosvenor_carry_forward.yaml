        \ <TR STYLE=\"vertical-align: top; background-color: White\">\n    <TD STYLE=\"text-align:
        left\"><FONT STYLE=\"font-size: 10pt\">&ldquo;<I>successor person</I>&rdquo;</FONT></TD>\n
        \   <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align: center\"><FONT STYLE=\"font-size:
        10pt\">5.1</FONT></TD></TR>\n  </TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        1.3.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Incorporation
        by Reference of Trust Indenture Act</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">Whenever\nthis Indenture refers to a provision of the TIA, the
        provision is incorporated by reference in and made a part of this Indenture.
        The\nfollowing TIA terms used in this Indenture have the following meanings:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0.5in 0pt 0;
        text-align: justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Commission</I>&rdquo;\nmeans
        the SEC.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0.5in 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>indenture\nsecurities</I>&rdquo; means the Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0.5in 0pt 0;
        text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0.5in 0pt 0;
        text-align: justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>indenture\nsecurity
        holder</I>&rdquo; means a Securityholder.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>indenture\nto be qualified</I>&rdquo;
        means this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>indenture\ntrustee</I>&rdquo; or &ldquo;<I>institutional
        trustee</I>&rdquo; means the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0.5in 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0.5in 0pt 1in; text-align: justify; text-indent:
        0in; background-color: transparent\">&ldquo;<I>obligor</I>&rdquo;\non the
        indenture securities means the Company and any successor obligor upon the
        Securities.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0.5in 0pt 1in; text-align: justify; text-indent: 0in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">All\nother terms used in this Indenture that are defined by
        the TIA, defined by TIA reference to another statute or defined by SEC rule
        under\nthe TIA and not otherwise defined herein are used herein as so defined.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 9; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->4<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        1.4. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\"> </FONT><U>Rules\nof
        Construction</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Unless\nthe context
        otherwise requires:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">(a)
        <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>a term
        has the meaning assigned to it;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\">(b)\n an accounting term not otherwise
        defined has the meaning assigned to it in accordance with GAAP;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">(c)
        <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>&ldquo;<I>or</I>&rdquo;
        is not exclusive;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">(d)\n words in the singular include the plural, and in the plural
        include the singular; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">(e) <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>provisions
        apply to successive events and transactions.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"text-transform: none\">ARTICLE\nII.</FONT><BR>\nTHE SECURITIES</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform:
        uppercase; text-align: center; text-indent: 0in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.1. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\"> </FONT><U>Issuable\nin Series</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\naggregate principal amount of Securities
        that may be authenticated and delivered under this Indenture is unlimited.
        The Securities may\nbe issued in one or more Series. All Securities of a Series
        shall be identical except as may be set forth or determined in the manner\nprovided
        in a Board Resolution, a supplemental indenture or an Officer&rsquo;s Certificate
        detailing the adoption of the terms thereof\npursuant to authority granted
        under a Board Resolution. In the case of Securities of a Series to be issued
        from time to time, the Board\nResolution, Officer&rsquo;s Certificate or supplemental
        indenture detailing the adoption of the terms thereof pursuant to authority
        granted\nunder a Board Resolution may provide for the method by which specified
        terms (such as interest rate, maturity date, record date or date\nfrom which
        interest shall accrue) are to be determined. Securities may differ between
        Series in respect of any matters, provided that\nall Series of Securities
        shall be equally and ratably entitled to the benefits of the Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.2. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\"> </FONT><U>Establishment\nof Terms of Series
        of Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">At\nor prior to
        the issuance of any Securities within a Series, the following shall be established
        (as to the Series generally, in the case\nof Section 2.2.1 and either as to
        such Securities within the Series or as to the Series generally in the case
        of Sections 2.2.2 through\n2.2.23) by or pursuant to a Board Resolution, and
        set forth or determined in the manner provided in a Board Resolution, supplemental
        indenture\nhereto or Officer&rsquo;s Certificate:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.1. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the title (which shall distinguish the
        Securities of that particular Series from the Securities of any other Series)
        and ranking\n(including the terms of any subordination provisions) of the
        Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.2. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>the price or prices (expressed as
        a percentage of the principal amount thereof) at which the Securities of the
        Series will be issued;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 10; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->5<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.3. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>any limit upon the aggregate principal
        amount of the Securities of the Series which may be authenticated and delivered
        under this\nIndenture (except for Securities authenticated and delivered upon
        registration of transfer of, or in exchange for, or in lieu of, other\nSecurities
        of the Series pursuant to Section 2.7, 2.8, 2.11, 3.6 or 9.6);</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.4. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the date or dates on which the principal
        of the Securities of the Series is payable;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.5. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the rate or rates (which may be fixed or
        variable) per annum or, if applicable, the method used to determine such rate
        or rates\n(including, but not limited to, any commodity, commodity index,
        stock exchange index or financial index) at which the Securities of the\nSeries
        shall bear interest, if any, the date or dates from which such interest, if
        any, shall accrue, the date or dates on which such\ninterest, if any, shall
        commence and be payable and any regular record date for the interest payable
        on any interest payment date;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.6. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>the
        place or places where the principal of and interest, if any, on the Securities
        of the Series shall be payable, where the Securities\nof such Series may be
        surrendered for registration of transfer or exchange and where notices and
        demands to or upon the Company in respect\nof the Securities of such Series
        and this Indenture may be delivered, and the method of such payment, if by
        wire transfer, mail or other\nmeans;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.7. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>if applicable, the period or periods within
        which, the price or prices at which and the terms and conditions upon which
        the Securities\nof the Series may be redeemed, in whole or in part, at the
        option of the Company;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.8. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>the
        obligation, if any, of the Company to redeem or purchase the Securities of
        the Series pursuant to any sinking fund or analogous\nprovisions or at the
        option of a Holder thereof and the period or periods within which, the price
        or prices at which and the terms and\nconditions upon which Securities of
        the Series shall be redeemed or purchased, in whole or in part, pursuant to
        such obligation;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.9. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>the dates, if any, on which and the
        price or prices at which the Securities of the Series will be repurchased
        by the Company at\nthe option of the Holders thereof and other detailed terms
        and provisions of such repurchase obligations;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.10. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>if other than minimum denominations of
        $1,000 and any integral multiple thereof, the denominations in which the Securities
        of the\nSeries shall be issuable;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.11. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>the
        forms of the Securities of the Series and whether the Securities will be issuable
        as Global Securities;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.12. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>if
        other than the principal amount thereof, the portion of the principal amount
        of the Securities of the Series that shall be payable\nupon declaration of
        acceleration of the maturity thereof pursuant to Section 6.2;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.13. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the currency of denomination of the Securities
        of the Series, which may be Dollars or any Foreign Currency, and if such currency\nof
        denomination is a composite currency, the agency or organization, if any,
        responsible for overseeing such composite currency;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.14. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the designation of the currency, currencies
        or currency units in which payment of the principal of and interest, if any,
        on the\nSecurities of the Series will be made;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 11;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->6<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.15. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>if
        payments of principal of or interest, if any, on the Securities of the Series
        are to be made in one or more currencies or currency\nunits other than that
        or those in which such Securities are denominated, the manner in which the
        exchange rate with respect to such payments\nwill be determined;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.16. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>the manner in which the amounts of
        payment of principal of or interest, if any, on the Securities of the Series
        will be determined,\nif such amounts may be determined by reference to an
        index based on a currency or currencies or by reference to a commodity, commodity\nindex,
        stock exchange index or financial index;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.17. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the provisions, if any, relating to any
        security provided for the Securities of the Series;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.18. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>any addition to, deletion of or change
        in the Events of Default which applies to any Securities of the Series and
        any change in\nthe right of the Trustee or the requisite Holders of such Securities
        to declare the principal amount thereof due and payable pursuant\nto Section
        6.2;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.19. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>any addition to, deletion of or change
        in the covenants set forth in Articles IV or V which applies to Securities
        of the Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.20. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>any Depositaries, interest rate calculation
        agents, exchange rate calculation agents or other agents with respect to Securities\nof
        such Series if other than those appointed herein;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.2.21. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the provisions, if any, relating to conversion
        or exchange of any Securities of such Series, including if applicable, the
        conversion\nor exchange price, the conversion or exchange period, provisions
        as to whether conversion or exchange will be mandatory, at the option\nof
        the Holders thereof or at the option of the Company, the events requiring
        an adjustment of the conversion price or exchange price and\nprovisions affecting
        conversion or exchange if such Series of Securities are redeemed;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.2.22. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>any other terms of the Series (which
        may supplement, modify or delete any provision of this Indenture insofar as
        it applies to\nsuch Series), including any terms that may be required under
        applicable law or regulations or advisable in connection with the marketing\nof
        Securities of that Series; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.2.23. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>whether
        any of the Company&rsquo;s direct or indirect Subsidiaries will guarantee
        the Securities of that Series, including the\nterms of subordination, if any,
        of such guarantees.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">All\nSecurities
        of any one Series need not be issued at the same time and may be issued from
        time to time, consistent with the terms of this\nIndenture, if so provided
        by or pursuant to the Board Resolution, supplemental indenture hereto or Officer&rsquo;s
        Certificate referred\nto above.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        2.3.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Execution
        and Authentication</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">An\nOfficer shall
        sign the Securities for the Company by manual, facsimile or electronic signature.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">If\nan Officer
        whose signature is on a Security no longer holds that office at the time the
        Security is authenticated, the Security shall\nnevertheless be valid.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">A\nSecurity shall
        not be valid until authenticated by the manual signature of the Trustee or
        an authenticating agent. The signature shall\nbe conclusive evidence that
        the Security has been authenticated under this Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 12;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->7<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nTrustee shall at any time, and from time to time, authenticate
        Securities for original issue in the principal amount provided in the Board\nResolution,
        supplemental indenture hereto or Officer&rsquo;s Certificate, upon receipt
        by the Trustee of a Company Order. Each Security\nshall be dated the date
        of its authentication.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\naggregate principal amount of Securities of any Series
        outstanding at any time may not exceed any limit upon the maximum principal
        amount\nfor such Series set forth in the Board Resolution, supplemental indenture
        hereto or Officer&rsquo;s Certificate delivered pursuant to\nSection 2.2,
        except as provided in Section 2.8.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Prior\nto the issuance of Securities
        of any Series, the Trustee shall have received and (subject to Section 7.2)
        shall be fully protected in\nrelying on: (a) the Board Resolution, supplemental
        indenture hereto or Officer&rsquo;s Certificate establishing the form of the
        Securities\nof that Series or of Securities within that Series and the terms
        of the Securities of that Series or of Securities within that Series,\n(b)
        an Officer&rsquo;s Certificate complying with Section 10.4, and (c) an Opinion
        of Counsel complying with Section 10.4.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nTrustee shall have the right to
        decline to authenticate and deliver any Securities of such Series: (a) if
        the Trustee, being advised by\ncounsel, determines that such action may not
        be taken lawfully; or (b) if the Trustee in good faith shall determine that
        such action would\nexpose the Trustee to personal liability to Holders of
        any then outstanding Series of Securities.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nTrustee may appoint an authenticating
        agent acceptable to the Company to authenticate Securities. An authenticating
        agent may authenticate\nSecurities whenever the Trustee may do so. Each reference
        in this Indenture to authentication by the Trustee includes authentication
        by\nsuch agent. An authenticating agent has the same rights as an Agent to
        deal with the Company or an Affiliate of the Company.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 2.4.\n<FONT STYLE=\"font-family: Times New Roman, Times,
        Serif\"> </FONT><U>Registrar and Paying Agent</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nCompany shall maintain, with respect to each Series of
        Securities, at the place or places specified with respect to such Series pursuant\nto
        Section 2.2, an office or agency where Securities of such Series may be presented
        or surrendered for payment (the &ldquo;<I>Paying\nAgent</I>&rdquo;), where
        Securities of such Series may be surrendered for registration of transfer
        or exchange (the &ldquo;<I>Registrar</I>&rdquo;)\nand where notices and demands
        to or upon the Company in respect of the Securities of such Series and this
        Indenture may be delivered (the\n&ldquo;<I>Notice Agent</I>&rdquo;). The Registrar
        shall keep a register with respect to each Series of Securities and to their
        transfer\nand exchange. The Company will give prompt written notice to the
        Trustee of the name and address, and any change in the name or address,\nof
        each Registrar, Paying Agent or Notice Agent. If at any time the Company shall
        fail to maintain any such required Registrar, Paying\nAgent or Notice Agent
        or shall fail to furnish the Trustee with the name and address thereof, such
        presentations, surrenders, notices\nand demands may be made or served at the
        Corporate Trust Office of the Trustee, and the Company hereby appoints the
        Trustee as its agent\nto receive all such presentations, surrenders, notices
        and demands; <U>provided</U>, <U>however</U>, that any appointment of the
        Trustee\nas the Notice Agent shall exclude the appointment of the Trustee
        or any office of the Trustee as an agent to receive the service of legal\nprocess
        on the Company.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">The\nCompany may
        also from time to time designate one or more co-registrars, additional paying
        agents or additional notice agents and may from\ntime to time rescind such
        designations; <U>provided</U>, <U>however</U>, that no such designation or
        rescission shall in any manner relieve\nthe Company of its obligations to
        maintain a Registrar, Paying Agent and Notice Agent in each place so specified
        pursuant to Section 2.2\nfor Securities of any Series for such purposes. The
        Company will give prompt written notice to the Trustee of any such designation
        or\nrescission and of any change in the name or address of any such co-registrar,
        additional paying agent or additional notice agent. The\nterm &ldquo;<I>Registrar</I>&rdquo;
        includes any co-registrar; the term &ldquo;<I>Paying Agent</I>&rdquo; includes
        any additional paying\nagent; and the term &ldquo;<I>Notice Agent</I>&rdquo;
        includes any additional notice agent. The Company or any of its Affiliates
        may serve\nas Registrar or Paying Agent.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 13;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->8<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nCompany hereby appoints the Trustee the initial Registrar,
        Paying Agent and Notice Agent for each Series unless another Registrar, Paying\nAgent
        or Notice Agent, as the case may be, is appointed prior to the time Securities
        of that Series are first issued.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        2.5.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Paying
        Agent to Hold Money in Trust</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">The\nCompany shall
        require each Paying Agent other than the Trustee to agree in writing that
        the Paying Agent will hold in trust, for the benefit\nof Securityholders of
        any Series of Securities, or the Trustee, all money held by the Paying Agent
        for the payment of principal of or\ninterest on the Series of Securities,
        and will notify the Trustee in writing of any default by the Company in making
        any such payment.\nWhile any such default continues, the Trustee may require
        a Paying Agent to pay all money held by it to the Trustee. The Company at
        any\ntime may require a Paying Agent to pay all money held by it to the Trustee.
        Upon payment over to the Trustee, the Paying Agent (if other\nthan the Company
        or a Subsidiary of the Company) shall have no further liability for the money.
        If the Company or a Subsidiary of the\nCompany acts as Paying Agent, it shall
        segregate and hold in a separate trust fund for the benefit of Securityholders
        of any Series of\nSecurities all money held by it as Paying Agent. Upon any
        bankruptcy, reorganization or similar proceeding with respect to the Company,\nthe
        Trustee shall serve as Paying Agent for the Securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 2.6.&nbsp;<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">\n</FONT><U>Securityholder Lists</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nTrustee shall preserve in as current a form as is reasonably
        practicable the most recent list available to it of the names and addresses\nof
        Securityholders of each Series of Securities and shall otherwise comply with
        TIA &sect; 312(a). If the Trustee is not the Registrar,\nthe Company shall
        furnish to the Trustee at least ten days before each interest payment date
        and at such other times as the Trustee may\nrequest in writing a list, in
        such form and as of such date as the Trustee may reasonably require, of the
        names and addresses of Securityholders\nof each Series of Securities; provided,
        that if and so long as the Trustee shall be the Registrar with respect to
        such series, such list\nshall not be required to be furnished. The Trustee
        may destroy any list furnished to it as provided in Section 2.6 upon receipt
        of a new\nlist so furnished.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        2.7.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Transfer
        and Exchange</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Where\nSecurities
        of a Series are presented to the Registrar or a co-registrar with a request
        to register a transfer or to exchange them for\nan equal principal amount
        of Securities of the same Series, the Registrar shall register the transfer
        or make the exchange if its requirements\nfor such transactions are met. To
        permit registrations of transfers and exchanges, the Trustee shall authenticate
        Securities at the Registrar&rsquo;s\nrequest. No service charge shall be made
        for any registration of transfer or exchange (except as otherwise expressly
        permitted herein),\nbut the Company may require payment of a sum sufficient
        to cover any transfer tax or similar governmental charge payable in connection\ntherewith
        (other than any such transfer tax or similar governmental charge payable upon
        exchanges pursuant to Sections 2.11, 3.6 or 9.6).</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Neither\nthe Company nor the Registrar
        shall be required (a) to issue, register the transfer of, or exchange Securities
        of any Series for the period\nbeginning at the opening of business 15 days
        immediately preceding the sending of a notice of redemption of Securities
        of that Series\nselected for redemption and ending at the close of business
        on the day such notice is sent, or (b) to register the transfer of or exchange\nSecurities
        of any Series selected, called or being called for redemption as a whole or
        the portion being redeemed of any such Securities\nselected, called or being
        called for redemption in part.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 14; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->9<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.8.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Mutilated, Destroyed, Lost and
        Stolen Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">If\nany mutilated
        Security is surrendered to the Trustee, the Company shall execute and the
        Trustee shall authenticate and deliver in exchange\ntherefor a new Security
        of the same Series and of like tenor and principal amount and bearing a number
        not contemporaneously outstanding.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">If\nthere shall be delivered to the Company
        and the Trustee (i) evidence to their satisfaction of the destruction, loss
        or theft of any Security\nand (ii) such security or indemnity bond as may
        be required by each of them to hold itself and any of its agents harmless,
        then, in the\nabsence of notice to the Company or the Trustee that such Security
        has been acquired by a bona fide purchaser, the Company shall execute\nand
        upon receipt of a Company Order the Trustee shall authenticate and make available
        for delivery, in lieu of any such destroyed, lost\nor stolen Security, a new
        Security of the same Series and of like tenor and principal amount and bearing
        a number not contemporaneously\noutstanding.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">In\ncase any such mutilated, destroyed,
        lost or stolen Security has become or is about to become due and payable,
        the Company in its discretion\nmay, instead of issuing a new Security, pay
        such Security.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Upon\nthe issuance
        of any new Security under this Section 2.8, the Company may require the payment
        of a sum sufficient to cover any tax or other\ngovernmental charge that may
        be imposed in relation thereto and any other expenses (including the fees
        and expenses of the Trustee) connected\ntherewith.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Every\nnew Security of any Series issued
        pursuant to this Section 2.8 in lieu of any destroyed, lost or stolen Security
        shall constitute an original\nadditional contractual obligation of the Company,
        whether or not the destroyed, lost or stolen Security shall be at any time
        enforceable\nby anyone, and shall be entitled to all the benefits of this
        Indenture equally and proportionately with any and all other Securities of\nthat
        Series duly issued hereunder.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nprovisions of this Section 2.8 are exclusive and shall
        preclude (to the extent lawful) all other rights and remedies with respect
        to the\nreplacement or payment of mutilated, destroyed, lost or stolen Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.9.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Outstanding Securities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nSecurities outstanding at any time
        are all the Securities authenticated by the Trustee except for those canceled
        by it, those delivered\nto it for cancellation, those reductions in the interest
        on a Global Security effected by the Trustee in accordance with the provisions\nhereof
        and those described in this Section 2.9 as not outstanding.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">If\na Security is replaced pursuant to
        Section 2.8, it ceases to be outstanding until the Trustee receives proof
        satisfactory to it that the\nreplaced Security is held by a bona fide purchaser.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">If\nthe Paying
        Agent (other than the Company, a Subsidiary of the Company or an Affiliate
        of the Company) holds on the Maturity of Securities\nof a Series money sufficient
        to pay such Securities payable on that date, then on and after that date such
        Securities of the Series cease\nto be outstanding and interest on them ceases
        to accrue.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">The\nCompany may
        purchase or otherwise acquire the Securities, whether by open market purchases,
        negotiated transactions or otherwise. A Security\ndoes not cease to be outstanding
        because the Company or an Affiliate of the Company holds the Security (but
        see Section 2.10 below).</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 15; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->10<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">In\ndetermining
        whether the Holders of the requisite principal amount of outstanding Securities
        have given any request, demand, authorization,\ndirection, notice, consent
        or waiver hereunder, the principal amount of a Discount Security that shall
        be deemed to be outstanding for\nsuch purposes shall be the amount of the
        principal thereof that would be due and payable as of the date of such determination
        upon a declaration\nof acceleration of the Maturity thereof pursuant to Section
        6.2.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.10.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Treasury Securities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">In\ndetermining whether the Holders of
        the required principal amount of Securities of a Series have concurred in
        any request, demand, authorization,\ndirection, notice, consent or waiver,
        Securities of a Series owned by the Company or any Affiliate of the Company
        shall be disregarded,\nexcept that for the purposes of determining whether
        the Trustee shall be protected in relying on any such request, demand, authorization,\ndirection,
        notice, consent or waiver only Securities of a Series that a Responsible Officer
        of the Trustee actually knows are so owned\nshall be so disregarded.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.11.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Temporary Securities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Until\ndefinitive Securities are ready
        for delivery, the Company may prepare and the Trustee shall authenticate temporary
        Securities upon a Company\nOrder. Temporary Securities shall be substantially
        in the form of definitive Securities but may have variations that the Company
        considers\nappropriate for temporary Securities. Without unreasonable delay,
        the Company shall prepare and the Trustee upon receipt of a Company\nOrder
        shall authenticate definitive Securities of the same Series and date of maturity
        in exchange for temporary Securities. Until so\nexchanged, temporary securities
        shall have the same rights under this Indenture as the definitive Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.12.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Cancellation</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nCompany may at any time deliver to the Trustee for cancellation
        any Securities previously authenticated and delivered hereunder which\nthe
        Company may have acquired in any manner whatsoever, and may deliver to the
        Trustee (or to any other Person for delivery to the Trustee)\nfor cancellation
        any Securities previously authenticated hereunder which the Company has not
        issued and sold, and all Securities so delivered\nshall be promptly cancelled
        by the Trustee. If the Company shall so acquire any of the Securities, however,
        such acquisition shall not\noperate as a redemption or satisfaction of the
        indebtedness represented by such Securities unless and until the same are
        surrendered to\nthe Trustee for cancellation. The Registrar and the Paying
        Agent shall forward to the Trustee any Securities surrendered to them for
        registration\nof transfer, exchange or payment. No Securities shall be authenticated
        in lieu of or in exchange for any Securities cancelled as provided\nin this
        Section 2.12, except as expressly permitted by this Indenture. The Trustee
        shall cancel all Securities surrendered for transfer,\nexchange, payment,
        replacement or cancellation in accordance with its customary procedures and
        deliver a certificate of such cancellation\nto the Company upon written request
        by a Company Order from the Company. The Company may not issue new Securities
        to replace Securities\nthat it has paid or delivered to the Trustee for cancellation.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.13.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Defaulted Interest</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">If\nthe Company defaults in a payment
        of interest on a Series of Securities, it shall pay the defaulted interest,
        plus, to the extent permitted\nby law, any interest payable on the defaulted
        interest, to the persons who are Securityholders of the Series on a subsequent
        special record\ndate. The Company shall fix the record date and payment date.
        At least ten days before the special record date, the Company shall send\nto
        the Trustee and to each Securityholder of the Series a notice that states
        the special record date, the payment date and the amount\nof interest to be
        paid. The Company may pay defaulted interest in any other lawful manner.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 16; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->11<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        2.14.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Global
        Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">2.14.1. <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Terms of Securities</U>. A Board
        Resolution, a supplemental indenture hereto or an Officer&rsquo;s Certificate
        shall establish\nwhether the Securities of a Series shall be issued in whole
        or in part in the form of one or more Global Securities and the Depositary\nfor
        such Global Security or Securities.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.14.2. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT><U>Transfer and Exchange</U>. Notwithstanding
        any provisions to the contrary contained in Section 2.7 of the Indenture and
        in addition\nthereto, any Global Security shall be exchangeable pursuant to
        Section 2.7 of the Indenture for Securities registered in the names of\nHolders
        other than the Depositary for such Security or its nominee only if (i) such
        Depositary notifies the Company that it is unwilling\nor unable to continue
        as Depositary for such Global Security or if at any time such Depositary ceases
        to be a clearing agency registered\nunder the Exchange Act, and, in either
        case, the Company fails to appoint a successor Depositary registered as a
        clearing agency under\nthe Exchange Act within 90 days of such event or (ii)
        the Company executes and delivers to the Trustee an Officer&rsquo;s Certificate\nto
        the effect that such Global Security shall be so exchangeable. Any Global
        Security that is exchangeable pursuant to the preceding sentence\nshall be
        exchangeable for Securities registered in such names as the Depositary shall
        direct in writing in an aggregate principal amount\nequal to the principal
        amount of the Global Security with like tenor and terms.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Except\nas provided in this Section 2.14.2,
        a Global Security may not be transferred except as a whole by the Depositary
        with respect to such\nGlobal Security to a nominee of such Depositary, by
        a nominee of such Depositary to such Depositary or another nominee of such
        Depositary\nor by the Depositary or any such nominee to a successor Depositary
        or a nominee of such a successor Depositary.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.14.3. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT><U>Legends</U>. Any Global Security issued
        hereunder shall bear a legend in substantially the following form:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;THIS\nSECURITY
        IS A GLOBAL SECURITY WITHIN THE MEANING OF THE INDENTURE HEREINAFTER REFERRED
        TO AND IS REGISTERED IN THE NAME OF THE DEPOSITARY\nOR A NOMINEE OF THE DEPOSITARY.
        THIS SECURITY IS EXCHANGEABLE FOR SECURITIES REGISTERED IN THE NAME OF A PERSON
        OTHER THAN THE DEPOSITARY\nOR ITS NOMINEE ONLY IN THE LIMITED CIRCUMSTANCES
        DESCRIBED IN THE INDENTURE, AND MAY NOT BE TRANSFERRED EXCEPT AS A WHOLE BY
        THE DEPOSITARY\nTO A NOMINEE OF THE DEPOSITARY, BY A NOMINEE OF THE DEPOSITARY
        TO THE DEPOSITARY OR ANOTHER NOMINEE OF THE DEPOSITARY OR BY THE DEPOSITARY\nOR
        ANY SUCH NOMINEE TO A SUCCESSOR DEPOSITARY OR A NOMINEE OF SUCH A SUCCESSOR
        DEPOSITARY.&rdquo;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">In\naddition, so
        long as the Depository Trust Company (&ldquo;DTC&rdquo;) is the Depositary,
        each Global Note registered in the name of DTC\nor its nominee shall bear
        a legend in substantially the following form:</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;UNLESS\nTHIS GLOBAL NOTE IS PRESENTED
        BY AN AUTHORIZED REPRESENTATIVE OF THE DEPOSITORY TRUST COMPANY, A NEW YORK
        CORPORATION (&ldquo;DTC&rdquo;),\nTO THE COMPANY OR ITS AGENT FOR REGISTRATION
        OF TRANSFER, EXCHANGE OR PAYMENT, AND ANY GLOBAL NOTE ISSUED IS REGISTERED
        IN THE NAME OF\nCEDE &amp; CO. OR IN SUCH OTHER NAME AS IS REQUESTED BY AN
        AUTHORIZED REPRESENTATIVE OF DTC (AND ANY PAYMENT IS MADE TO CEDE &amp; CO.\nOR
        TO SUCH OTHER ENTITY AS IS REQUESTED BY AN AUTHORIZED REPRESENTATIVE OF DTC),
        ANY TRANSFER, PLEDGE OR OTHER USE HEREOF FOR VALUE OR\nOTHERWISE BY OR TO
        ANY PERSON IS WRONGFUL INASMUCH AS THE REGISTERED OWNER HEREOF, CEDE &amp;
        CO., HAS AN INTEREST HEREIN.&rdquo;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 17;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->12<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">2.14.4. <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Acts
        of Holders</U>. The Depositary, as a Holder, may appoint agents and otherwise
        authorize participants to give or take any\nrequest, demand, authorization,
        direction, notice, consent, waiver or other action which a Holder is entitled
        to give or take under the\nIndenture.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.14.5. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT><U>Payments</U>. Notwithstanding the other
        provisions of this Indenture, unless otherwise specified as contemplated by
        Section\n2.2, payment of the principal of and interest, if any, on any Global
        Security shall be made to the Holder thereof.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">2.14.6. <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT><U>Consents, Declaration and Directions</U>.
        The Company, the Trustee and any Agent shall treat a person as the Holder
        of such\nprincipal amount of outstanding Securities of such Series represented
        by a Global Security as shall be specified in a written statement\nof the
        Depositary or by the applicable procedures of such Depositary with respect
        to such Global Security, for purposes of obtaining any\nconsents, declarations,
        waivers or directions required to be given by the Holders pursuant to this
        Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.15.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>CUSIP Numbers</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">The\nCompany in issuing the Securities may use &ldquo;CUSIP&rdquo;
        numbers (if then generally in use), and, if so, the Trustee shall use &ldquo;CUSIP&rdquo;\nnumbers
        in notices of redemption as a convenience to Holders; <U>provided</U> that
        any such notice may state that no representation is\nmade as to the correctness
        of such numbers either as printed on the Securities or as contained in any
        notice of a redemption and that\nreliance may be placed only on the other
        elements of identification printed on the Securities, and any such redemption
        shall not be affected\nby any defect in or omission of such numbers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 2.16.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Trustee Not Responsible for Securities
        Laws</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Notwithstanding\nanything
        herein to the contrary, neither the Trustee nor the Registrar shall be responsible
        for ascertaining whether any transfer complies\nwith the registration provisions
        of or exemptions from the Securities Act of 1933, as amended, applicable state
        securities laws or other\napplicable laws.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase; text-align:
        center; text-indent: 0in; background-color: transparent\"><FONT STYLE=\"text-transform:
        none\">ARTICLE\nIII.</FONT><BR>\nREDEMPTION</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase; text-align:
        center; text-indent: 0in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 3.1.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Notice to Trustee</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nCompany may, with respect to any
        Series of Securities, reserve the right to redeem and pay the Series of Securities
        or may covenant to\nredeem and pay the Series of Securities or any part thereof
        prior to the Stated Maturity thereof at such time and on such terms as provided\nfor
        in such Securities. If a Series of Securities is redeemable and the Company
        wants or is obligated to redeem prior to the Stated Maturity\nthereof all
        or part of the Series of Securities pursuant to the terms of such Securities,
        it shall notify the Trustee in writing of the\nredemption date and the principal
        amount of the Series of Securities to be redeemed. The Company shall give
        the notice at least 15 days\nbefore the redemption date, unless a shorter
        period is satisfactory to the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 18;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->13<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        3.2.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Selection
        of Securities to be Redeemed</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Unless\notherwise
        indicated for a particular Series by a Board Resolution, a supplemental indenture
        hereto or an Officer&rsquo;s Certificate,\nif less than all the Securities
        of a Series are to be redeemed, the Securities of the Series to be redeemed
        will be selected as follows:\n(a) if the Securities are in the form of Global
        Securities, in accordance with the procedures of the Depositary, (b) if the
        Securities\nare listed on any national securities exchange, in compliance
        with the requirements of the principal national securities exchange, if\nany,
        on which the Securities are listed, or (c) if not otherwise provided for under
        clause (a) or (b) in the manner that the Trustee deems\nfair and appropriate,
        including by lot or other method, unless otherwise required by law or applicable
        stock exchange requirements, subject,\nin the case of Global Securities, to
        the applicable rules and procedures of the Depositary. The Securities to be
        redeemed shall be selected\nfrom Securities of the Series outstanding not
        previously called for redemption. Portions of the principal of Securities
        of the Series\nthat have denominations larger than $1,000 may be selected
        for redemption. Securities of the Series and portions of them it selected
        for\nredemption shall be in amounts of $1,000 or whole multiples of $1,000
        or, with respect to Securities of any Series issuable in other denominations\npursuant
        to Section 2.2.10, the minimum principal denomination for each Series and
        the authorized integral multiples thereof. Provisions\nof this Indenture that
        apply to Securities of a Series called for redemption also apply to portions
        of Securities of that Series called\nfor redemption.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 3.3.&nbsp;<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">\n</FONT><U>Notice of Redemption</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">Unless\notherwise indicated for a particular Series by Board
        Resolution, a supplemental indenture hereto or an Officer&rsquo;s Certificate,
        at\nleast 15 days but not more than 60 days before a redemption date, the
        Company shall send or cause to be sent by first-class mail or electronically,\nin
        accordance with the procedures of the Depositary, a notice of redemption to
        each Holder whose Securities are to be redeemed.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nnotice shall identify the Securities
        of the Series to be redeemed and shall state:</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\">(a) <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">\n</FONT>the redemption date;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">(b) <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">  &nbsp;\n</FONT>the redemption price;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">(c)
        <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>the name
        and address of the Paying Agent;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\">(d) <FONT STYLE=\"font-family: Times
        New Roman, Times, Serif\">  &nbsp;\n</FONT>if any Securities are being redeemed
        in part, the portion of the principal amount of such Securities to be redeemed
        and that, after\nthe redemption date and upon surrender of such Security,
        a new Security or Securities in principal amount equal to the unredeemed portion\nof
        the original Security shall be issued in the name of the Holder thereof upon
        cancellation of the original Security;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">(e) <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT>that Securities of the Series called
        for redemption must be surrendered to the Paying Agent to collect the redemption
        price;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">(f) <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT>that
        interest on Securities of the Series called for redemption ceases to accrue
        on and after the redemption date unless the Company\ndefaults in the deposit
        of the redemption price;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">(g) <FONT STYLE=\"font-family: Times New Roman, Times, Serif\">
        \ &nbsp;\n</FONT>the CUSIP number, if any; and</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">(h) <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">  &nbsp;\n</FONT>any other information as
        may be required by the terms of the particular Series or the Securities of
        a Series being redeemed.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">At\nthe Company&rsquo;s request, the Trustee shall give the
        notice of redemption in the Company&rsquo;s name and at its expense, provided,\nhowever,
        that the Company has delivered to the Trustee, at least 10 days (unless a
        shorter time shall be acceptable to the Trustee) prior\nto the notice date,
        an Officer&rsquo;s Certificate requesting that the Trustee give such notice
        and setting forth the information to be\nstated in such notice.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 19; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->14<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 3.4.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Effect of Notice of Redemption</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">Once\nnotice of redemption is sent as
        provided in Section 3.3, Securities of a Series called for redemption become
        due and payable on the redemption\ndate and at the redemption price. Except
        as otherwise provided in the supplemental indenture, Board Resolution or Officer&rsquo;s
        Certificate\nfor a Series, a notice of redemption may not be conditional.
        Upon surrender to the Paying Agent, such Securities shall be paid at the\nredemption
        price plus accrued interest to the redemption date.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 3.5.&nbsp;<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">\n</FONT><U>Deposit of Redemption Price</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">On\nor before 11:00 a.m., New York City time, on the redemption
        date, the Company shall deposit with the Paying Agent money sufficient to\npay
        the redemption price of and accrued interest, if any, on all Securities to
        be redeemed on that date.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        3.6.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Securities
        Redeemed in Part</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Upon\nsurrender
        of a Security that is redeemed in part, the Trustee shall authenticate for
        the Holder a new Security of the same Series and\nthe same maturity equal
        in principal amount to the unredeemed portion of the Security surrendered.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-transform: uppercase; text-align: center; background-color: transparent\"><FONT
        STYLE=\"text-transform: none\">ARTICLE\nIV.<BR>\n</FONT>COVENANTS</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform:
        uppercase; text-align: center; text-indent: 0in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">Section 4.1.&nbsp;<FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">\n</FONT><U>Payment of Principal and Interest</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">The\nCompany covenants and agrees for
        the benefit of the Holders of each Series of Securities that it will duly
        and punctually pay the principal\nof and interest, if any, on the Securities
        of that Series in accordance with the terms of such Securities and this Indenture.
        On or before\n11:00 a.m., New York City time, on the applicable payment date,
        the Company shall deposit with the Paying Agent money sufficient to pay\nthe
        principal of and interest, if any, on the Securities of each Series in accordance
        with the terms of such Securities and this Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 4.2.&nbsp;<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">\n</FONT><U>SEC Reports</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">To\nthe extent any Securities of a Series are outstanding, the
        Company shall deliver to the Trustee within 15 days after it files them with\nthe
        SEC copies of the annual reports and of the information, documents, and other
        reports (or copies of such portions of any of the foregoing\nas the SEC may
        by rules and regulations prescribe) which the Company is required to file
        with the SEC pursuant to Section 13 or 15(d)\nof the Exchange Act. The Company
        also shall comply with the other provisions of TIA &sect; 314(a). All such
        reports, information or documents\nreferred to in this Section 4.2 that the
        Company files with the SEC via the SEC&rsquo;s EDGAR system shall be deemed
        to be filed and delivered\nto the Trustee and transmitted to Holders at the
        time such reports, information or documents are filed via the EDGAR system
        (or any successor\nsystem).</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">Delivery\nof reports, information and documents to the Trustee
        under this Section 4.2 are for informational purposes only and the Trustee&rsquo;s\nreceipt
        of the foregoing shall not constitute constructive or actual notice of any
        information contained therein or determinable from\ninformation contained
        therein, including the Company&rsquo;s compliance with any of the covenants
        hereunder (as to which the Trustee is\nentitled to rely exclusively on an
        Officer&rsquo;s Certificate).</P>\n\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence:
        20; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->15<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n4.3.&nbsp;<U>Compliance Certificate</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">To\nthe extent any Securities of a
        Series are outstanding, the Company shall deliver to the Trustee, within 120
        days after the end of each\nfiscal year (ending December 31; it being understood
        and agreed that the Company may change its fiscal year so long as the Company
        has\nprovided written notice of such change to the Trustee) of the Company,
        an Officer&rsquo;s Certificate stating that a review of the activities\nof
        the Company and its Subsidiaries during the preceding fiscal year has been
        made under the supervision of the signing Officers with\na view to determining
        whether the Company has kept, observed, performed and fulfilled its obligations
        under this Indenture, and further\nstating, as to each such Officer signing
        such certificate, that to the best of his/her knowledge the Company has kept,
        observed, performed\nand fulfilled each and every covenant contained in this
        Indenture and is not in default in the performance or observance of any of
        the\nterms, provisions and conditions hereof (or, if a Default or Event of
        Default shall have occurred, describing all such Defaults or Events\nof Default
        of which the Officer may have knowledge).</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n4.4.&nbsp;<U>Stay, Extension and Usury Laws</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany covenants (to the extent
        that it may lawfully do so) that it will not at any time insist upon, plead,
        or in any manner whatsoever\nclaim or take the benefit or advantage of, any
        stay, extension or usury law wherever enacted, now or at any time hereafter
        in force,\nwhich may affect the covenants or the performance of this Indenture
        or the Securities; and the Company (to the extent it may lawfully\ndo so)
        hereby expressly waives all benefit or advantage of any such law and covenants
        that it will not, by resort to any such law, hinder,\ndelay or impede the
        execution of any power herein granted to the Trustee, but will suffer and
        permit the execution of every such power\nas though no such law has been enacted.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-transform:
        uppercase; text-align: center; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt; text-transform: none\">ARTICLE\nV.</FONT><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><BR>\nSUCCESSORS</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform:
        uppercase; text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n5.1.&nbsp;<U>When Company
        May Merge, Etc</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany shall not consolidate
        with or merge with or into, or convey, transfer or lease all or substantially
        all of its properties and\nassets to, any person (a &ldquo;<I>successor person</I>&rdquo;)
        unless:</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;the\nCompany
        is the surviving corporation or the successor person (if other than the Company)
        is a corporation, partnership, trust or other\nentity organized and validly
        existing under the laws of any U.S. domestic jurisdiction and expressly assumes
        the Company&rsquo;s obligations\non the Securities and under this Indenture;
        and</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;immediately\nafter giving effect to the transaction, no Default
        or Event of Default, shall have occurred and be continuing.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany shall deliver
        to the Trustee prior to the consummation of the proposed transaction an Officer&rsquo;s
        Certificate to the foregoing\neffect and an Opinion of Counsel stating that
        the proposed transaction and any supplemental indenture comply with this Indenture.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Notwithstanding\nthe above, any Subsidiary
        of the Company may consolidate with, merge into or transfer all or part of
        its properties to the Company. Neither\nan Officer&rsquo;s Certificate nor
        an Opinion of Counsel shall be required to be delivered in connection therewith.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 21; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->16<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n5.2.&nbsp;<U>Successor
        Corporation Substituted</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Upon\nany consolidation or merger, or any sale, lease, conveyance or
        other disposition of all or substantially all of the assets of the Company\nin
        accordance with Section 5.1, the successor corporation formed by such consolidation
        or into or with which the Company is merged or\nto which such sale, lease,
        conveyance or other disposition is made shall succeed to, and be substituted
        for, and may exercise every right\nand power of, the Company under this Indenture
        with the same effect as if such successor person has been named as the Company
        herein;\n<U>provided</U>, <U>however</U>, that the predecessor Company in
        the case of a sale, conveyance or other disposition (other than a lease)\nshall
        be released from all obligations and covenants under this Indenture and the
        Securities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform:
        uppercase; text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        none\">ARTICLE\nVI.</FONT><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><BR>\nDEFAULTS AND REMEDIES</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n6.1.&nbsp;<U>Events of Default</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&ldquo;<I>Event\nof Default</I>,&rdquo;
        wherever used herein with respect to Securities of any Series, means any one
        of the following events, unless in\nthe establishing Board Resolution, supplemental
        indenture or Officer&rsquo;s Certificate, it is provided that such Series
        shall not have\nthe benefit of said Event of Default:</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;default\nin the
        payment of any interest on any Security of that Series when it becomes due
        and payable, and continuance of such default for a\nperiod of 30 days (unless
        the entire amount of such payment is deposited by the Company with the Trustee
        or with a Paying Agent prior\nto 11:00 a.m., New York City time, on the 30<SUP>th</SUP>
        day of such period); or</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;default\nin the
        payment of principal of any Security of that Series at its Maturity; or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;default\nin
        the performance or breach of any covenant or warranty of the Company in this
        Indenture (other than defaults pursuant to Sections 6.1(a)\nor 6.1(b) or pursuant
        to a covenant or warranty that has been included in this Indenture solely
        for the benefit of a Series of Securities\nother than that Series), which
        default continues uncured for a period of 60 days after there has been given,
        by registered or certified\nmail, to the Company by the Trustee or to the
        Company and the Trustee by the Holders of at least 30% in principal amount
        of the outstanding\nSecurities of that Series a written notice specifying
        such default or breach and requiring it to be remedied and stating that such
        notice\nis a &ldquo;Notice of Default&rdquo; hereunder; or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;the\nCompany
        pursuant to or within the meaning of any Bankruptcy Law:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(i)&nbsp;commences\na voluntary
        case,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(ii)&nbsp;consents\nto the entry of an order for relief against it
        in an involuntary case,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(iii)&nbsp;consents\nto the
        appointment of a Custodian of it or for all or substantially all of its property,</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(iv)&nbsp;makes\na general
        assignment for the benefit of its creditors, or</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(v)&nbsp;generally\nis unable
        to pay its debts as the same become due; or</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"></P>\n\n<!-- Field: Page;
        Sequence: 22; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->17<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(e)&nbsp;a\ncourt of competent jurisdiction enters an order or decree
        under any Bankruptcy Law that:</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(i)&nbsp;is\nfor relief against
        the Company in an involuntary case,</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(ii)&nbsp;appoints\na Custodian
        of the Company or for all or substantially all of its property, or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(iii)&nbsp;orders\nthe liquidation
        of the Company,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">and\nthe
        order or decree remains unstayed and in effect for 60 days; or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;any\nother Event
        of Default provided with respect to Securities of that Series, which is specified
        in a Board Resolution, a supplemental indenture\nhereto or an Officer&rsquo;s
        Certificate, in accordance with Section 2.2.18.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nterm &ldquo;<I>Bankruptcy Law</I>&rdquo;
        means title 11, U.S. Code or any similar Federal or State law for the relief
        of debtors. The\nterm &ldquo;<I>Custodian</I>&rdquo; means any receiver, trustee,
        assignee, liquidator or similar official under any Bankruptcy Law.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany will provide the Trustee
        written notice of any Default or Event of Default within 30 days of becoming
        aware of the occurrence\nof such Default or Event of Default, which notice
        will describe in reasonable detail the status of such Default or Event of
        Default and\nwhat action the Company is taking or proposes to take in respect
        thereof.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n6.2.&nbsp;<U>Acceleration
        of Maturity; Rescission and Annulment</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nan Event of Default with respect to Securities of any Series at
        the time outstanding occurs and is continuing (other than an Event of\nDefault
        referred to in Section 6.1(d) or 6.1(e)) then in every such case the Trustee
        or the Holders of not less than 30% in principal\namount of the outstanding
        Securities of that Series may declare the principal amount (or, if any Securities
        of that Series are Discount\nSecurities, such portion of the principal amount
        as may be specified in the terms of such Securities) of and accrued and unpaid
        interest,\nif any, on all of the Securities of that Series to be due and payable
        immediately, by a notice in writing to the Company (and to the\nTrustee if
        given by Holders), and upon any such declaration such principal amount (or
        specified amount) and accrued and unpaid interest,\nif any, shall become immediately
        due and payable. If an Event of Default specified in Section 6.1(d) or 6.1(e)
        shall occur, the principal\namount (or specified amount) of and accrued and
        unpaid interest, if any, on all outstanding Securities shall <I>ipso facto</I>
        become\nand be immediately due and payable without any declaration or other
        act on the part of the Trustee or any Holder.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">At\nany time after such a declaration
        of acceleration with respect to any Series has been made and before a judgment
        or decree for payment\nof the money due has been obtained by the Trustee as
        hereinafter in this Article provided, the Holders of a majority in principal
        amount\nof the outstanding Securities of that Series, by written notice to
        the Company and the Trustee, may rescind and annul such declaration\nand its
        consequences if all Events of Default with respect to Securities of that Series,
        other than the non-payment of the principal\nand interest, if any, of Securities
        of that Series which have become due solely by such declaration of acceleration,
        have been cured\nor waived as provided in Section 6.13.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">No\nsuch rescission shall affect any
        subsequent Default or impair any right consequent thereon.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 23; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->18<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n6.3.&nbsp;<U>Collection
        of Indebtedness and Suits for Enforcement by Trustee</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany covenants that if:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;default\nis made
        in the payment of any interest on any Security when such interest becomes
        due and payable and such default continues for a period\nof 30 days, or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;default\nis
        made in the payment of principal of any Security at the Maturity thereof,
        or</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(c)&nbsp;default\nis made in the deposit of any sinking fund payment,
        if any, when and as due by the terms of a Security,</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>then,\n</I>the Company will, upon demand of the Trustee, pay to
        it, for the benefit of the Holders of such Securities, the whole amount then\ndue
        and payable on such Securities for principal and interest and, to the extent
        that payment of such interest shall be legally enforceable,\ninterest on any
        overdue principal and any overdue interest at the rate or rates prescribed
        therefor in such Securities, and, in addition\nthereto, such further amount
        as shall be sufficient to cover the costs and expenses of collection, including
        the compensation, reasonable\nexpenses, disbursements and advances of the
        Trustee, its agents and counsel.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nthe Company fails to pay such amounts forthwith upon such demand,
        the Trustee, in its own name and as trustee of an express trust, may\ninstitute
        a judicial proceeding for the collection of the sums so due and unpaid, may
        prosecute such proceeding to judgment or final\ndecree and may enforce the
        same against the Company or any other obligor upon such Securities and collect
        the moneys adjudged or deemed\nto be payable in the manner provided by law
        out of the property of the Company or any other obligor upon such Securities,
        wherever situated.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nan Event of Default with respect to any Securities of any Series
        occurs and is continuing, the Trustee may in its discretion proceed\nto protect
        and enforce its rights and the rights of the Holders of Securities of such
        Series by such appropriate judicial proceedings\nas the Trustee shall deem
        most effectual to protect and enforce any such rights, whether for the specific
        enforcement of any covenant\nor agreement in this Indenture or in aid of the
        exercise of any power granted herein, or to enforce any other proper remedy.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.4.&nbsp;<U>Trustee May File Proofs of Claim</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">In\ncase of the pendency of any receivership,
        insolvency, liquidation, bankruptcy, reorganization, arrangement, adjustment,
        composition or\nother judicial proceeding relative to the Company or any other
        obligor upon the Securities or the property of the Company or of such\nother
        obligor or their creditors, the Trustee (irrespective of whether the principal
        of the Securities shall then be due and payable\nas therein expressed or by
        declaration or otherwise and irrespective of whether the Trustee shall have
        made any demand on the Company\nfor the payment of overdue principal or interest)
        shall be entitled and empowered, by intervention in such proceeding or otherwise,</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;to\nfile and prove
        a claim for the whole amount of principal and interest owing and unpaid in
        respect of the Securities and to file such\nother papers or documents as may
        be necessary or advisable in order to have the claims of the Trustee (including
        any claim for the compensation,\nreasonable expenses, disbursements and advances
        of the Trustee, its agents and counsel) and of the Holders allowed in such
        judicial proceeding,\nand</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;to\ncollect and
        receive any moneys or other property payable or deliverable on any such claims
        and to distribute the same,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">and\nany custodian, receiver, assignee, trustee, liquidator, sequestrator
        or other similar official in any such judicial proceeding is hereby\nauthorized
        by each Holder to make such payments to the Trustee and, in the event that
        the Trustee shall consent to the making of such\npayments directly to the
        Holders, to pay to the Trustee any amount due it for the compensation, reasonable
        expenses, disbursements and\nadvances of the Trustee, its agents and counsel,
        and any other amounts due the Trustee under Section 7.7.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 24; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->19<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: transparent\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Nothing\nherein contained shall be
        deemed to authorize the Trustee to authorize or consent to or accept or adopt
        on behalf of any Holder any plan\nof reorganization, arrangement, adjustment
        or composition affecting the Securities or the rights of any Holder thereof
        or to authorize\nthe Trustee to vote in respect of the claim of any Holder
        in any such proceeding.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n6.5.&nbsp;<U>Trustee
        May Enforce Claims Without Possession of Securities</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">All\nrights of action and claims under
        this Indenture or the Securities may be prosecuted and enforced by the Trustee
        without the possession\nof any of the Securities or the production thereof
        in any proceeding relating thereto, and any such proceeding instituted by
        the Trustee\nshall be brought in its own name as trustee of an express trust,
        and any recovery of judgment shall, after provision for the payment\nof the
        compensation, reasonable expenses, disbursements and advances of the Trustee,
        its agents and counsel, be for the ratable benefit\nof the Holders of the
        Securities in respect of which such judgment has been recovered.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.6.&nbsp;<U>Application of Money Collected.</U></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Any\nmoney or property collected by
        the Trustee pursuant to this Article shall be applied in the following order,
        at the date or dates fixed\nby the Trustee and, in case of the distribution
        of such money or property on account of principal or interest, upon presentation
        of the\nSecurities and the notation thereon of the payment if only partially
        paid and upon surrender thereof if fully paid:</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">First:&#9;To\nthe payment of all amounts
        due the Trustee under Section 7.7; and</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Second:&#9;To\nthe payment of the amounts
        then due and unpaid for principal of and interest on the Securities in respect
        of which or for the benefit\nof which such money has been collected, ratably,
        without preference or priority of any kind, according to the amounts due and
        payable\non such Securities for principal and interest, respectively; and</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Third:&#9;To\nthe Company.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.7.&nbsp;<U>Limitation on Suits</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">No\nHolder of any Security of any Series shall have any right to institute
        any proceeding, judicial or otherwise, with respect to this Indenture,\nor
        for the appointment of a receiver or trustee, or for any other remedy hereunder,
        unless</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;such\nHolder
        has previously given written notice to the Trustee of a continuing Event of
        Default with respect to the Securities of that Series;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;the\nHolders of
        not less than 30% in principal amount of the outstanding Securities of that
        Series shall have made written request to the\nTrustee to institute proceedings
        in respect of such Event of Default in its own name as Trustee hereunder;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;such\nHolder
        or Holders have offered to the Trustee indemnity or security satisfactory
        to the Trustee against the costs, expenses and liabilities\nwhich might be
        incurred by the Trustee in compliance with such request;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!--
        Field: Page; Sequence: 25; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->20<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;the\nTrustee for
        60 days after its receipt of such notice, request and offer of indemnity has
        failed to institute any such proceeding; and</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;no\ndirection inconsistent
        with such written request has been given to the Trustee during such 60-day
        period by the Holders of a majority\nin principal amount of the outstanding
        Securities of that Series;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">it\nbeing understood, intended and expressly covenanted by the Holder
        of every Security with every other Holder and the Trustee that no one\nor
        more of such Holders shall have any right in any manner whatever by virtue
        of, or by availing of, any provision of this Indenture\nto affect, disturb
        or prejudice the rights of any other of such Holders, or to obtain or to seek
        to obtain priority or preference over\nany other of such Holders or to enforce
        any right under this Indenture, except in the manner herein provided and for
        the equal and ratable\nbenefit of all such Holders of the applicable Series.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: transparent\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.8.&nbsp;<U>Unconditional Right of Holders to Receive Principal
        and Interest</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Notwithstanding\nany other
        provision in this Indenture, the Holder of any Security shall have the right,
        which is absolute and unconditional, to receive\npayment of the principal
        of and interest, if any, on such Security on the Maturity of such Security,
        including the Stated Maturity expressed\nin such Security (or, in the case
        of redemption, on the redemption date) and to institute suit for the enforcement
        of any such payment,\nand such rights shall not be impaired without the consent
        of such Holder.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n6.9.&nbsp;<U>Restoration
        of Rights and Remedies</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nthe Trustee or any Holder has instituted any proceeding to enforce
        any right or remedy under this Indenture and such proceeding has been\ndiscontinued
        or abandoned for any reason, or has been determined adversely to the Trustee
        or to such Holder, then and in every such case,\nsubject to any determination
        in such proceeding, the Company, the Trustee and the Holders shall be restored
        severally and respectively\nto their former positions hereunder and thereafter
        all rights and remedies of the Trustee and the Holders shall continue as though
        no\nsuch proceeding had been instituted.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.10.&nbsp;<U>Rights and Remedies Cumulative</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Except\nas otherwise provided with
        respect to the replacement or payment of mutilated, destroyed, lost or stolen
        Securities in Section 2.8, no\nright or remedy herein conferred upon or reserved
        to the Trustee or to the Holders is intended to be exclusive of any other
        right or\nremedy, and every right and remedy shall, to the extent permitted
        by law, be cumulative and in addition to every other right and remedy\ngiven
        hereunder or now or hereafter existing at law or in equity or otherwise. The
        assertion or employment of any right or remedy hereunder,\nor otherwise, shall
        not, to the extent permitted by law, prevent the concurrent assertion or employment
        of any other appropriate right\nor remedy.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.11.&nbsp;<U>Delay or Omission Not Waiver</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">No\ndelay or omission of the Trustee
        or of any Holder of any Securities to exercise any right or remedy accruing
        upon any Event of Default\nshall impair any such right or remedy or constitute
        a waiver of any such Event of Default or an acquiescence therein. Every right
        and\nremedy given by this Article or by law to the Trustee or to the Holders
        may be exercised from time to time, and as often as may be deemed\nexpedient,
        by the Trustee or by the Holders, as the case may be.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 26;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->21<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n6.12.&nbsp;<U>Control
        by Holders</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nHolders of a majority
        in principal amount of the outstanding Securities of any Series shall have
        the right to direct the time, method\nand place of conducting any proceeding
        for any remedy available to the Trustee, or exercising any trust or power
        conferred on the Trustee,\nwith respect to the Securities of such Series,
        provided that</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)&nbsp;such\ndirection shall not be in conflict with any rule of
        law or with this Indenture,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;the\nTrustee may
        take any other action deemed proper by the Trustee which is not inconsistent
        with such direction,</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;subject\nto the
        provisions of Section 7.1, the Trustee shall have the right to decline to
        follow any such direction if the Trustee in good faith\nshall, by a Responsible
        Officer of the Trustee, determine that the proceeding so directed would involve
        the Trustee in personal liability,\nand</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;prior\nto taking
        any action as directed under this Section 6.12, the Trustee shall be entitled
        to indemnity satisfactory to it against the costs,\nexpenses and liabilities
        which might be incurred by it in compliance with such request or direction.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n6.13.&nbsp;<U>Waiver of Past
        Defaults</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nHolders of not less
        than a majority in principal amount of the outstanding Securities of any Series
        may on behalf of the Holders of all\nthe Securities of such Series, by written
        notice to the Trustee and the Company, waive any past Default hereunder with
        respect to such\nSeries and its consequences, except a Default in the payment
        of the principal of or interest on any Security of such Series (provided,\nhowever,
        that the Holders of a majority in principal amount of the outstanding Securities
        of any Series may rescind an acceleration and\nits consequences, including
        any related payment default that resulted from such acceleration). Upon any
        such waiver, such Default shall\ncease to exist, and any Event of Default
        arising therefrom shall be deemed to have been cured, for every purpose of
        this Indenture; but\nno such waiver shall extend to any subsequent or other
        Default or impair any right consequent thereon.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n6.14.&nbsp;<U>Undertaking for Costs</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">All\nparties to this Indenture agree,
        and each Holder of any Security by his acceptance thereof shall be deemed
        to have agreed, that any court\nmay in its discretion require, in any suit
        for the enforcement of any right or remedy under this Indenture, or in any
        suit against the\nTrustee for any action taken, suffered or omitted by it
        as Trustee, the filing by any party litigant in such suit of an undertaking
        to\npay the costs of such suit, and that such court may in its discretion
        assess reasonable costs, including reasonable attorneys&rsquo;\nfees, against
        any party litigant in such suit, having due regard to the merits and good
        faith of the claims or defenses made by such\nparty litigant; but the provisions
        of this Section 6.14 shall not apply to any suit instituted by the Company,
        to any suit instituted\nby the Trustee, to any suit instituted by any Holder,
        or group of Holders, holding in the aggregate more than 10% in principal amount\nof
        the outstanding Securities of any Series, or to any suit instituted by any
        Holder for the enforcement of the payment of the principal\nof or interest
        on any Security on or after the Maturity of such Security, including the Stated
        Maturity expressed in such Security (or,\nin the case of redemption, on the
        redemption date).</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 27; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->22<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        none\">ARTICLE\nVII.</FONT><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><BR>\nTRUSTEE</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase; text-align:
        center; text-indent: 0in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.1.&nbsp;<U>Duties of Trustee</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)&nbsp;If\nan Event of Default has occurred and is continuing, the
        Trustee shall exercise the rights and powers vested in it by this Indenture
        and\nuse the same degree of care and skill in their exercise as a prudent
        person would exercise or use under the circumstances in the conduct\nof such
        person&rsquo;s own affairs.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;Except\nduring the
        continuance of an Event of Default:</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(i)&nbsp;The\nTrustee need
        perform only those duties that are specifically set forth in this Indenture
        and no others.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(ii)&nbsp;In\nthe absence of bad faith on its part, the Trustee may
        conclusively rely, as to the truth of the statements and the correctness of
        the\nopinions expressed therein, upon Officer&rsquo;s Certificates or Opinions
        of Counsel furnished to the Trustee and conforming to the requirements\nof
        this Indenture; <U>however</U>, in the case of any such Officer&rsquo;s Certificates
        or Opinions of Counsel which by any provisions\nhereof are specifically required
        to be furnished to the Trustee, the Trustee shall examine such Officer&rsquo;s
        Certificates and Opinions\nof Counsel to determine whether or not they conform
        to the form requirements of this Indenture.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;The\nTrustee may
        not be relieved from liability for its own negligent action, its own negligent
        failure to act or its own willful misconduct,\nexcept that:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(i)&nbsp;This\nSection 7.1(c)
        does not limit the effect of Section 7.1(b).</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(ii)&nbsp;The\nTrustee shall
        not be liable for any error of judgment made in good faith by a Responsible
        Officer, unless it is proved that the Trustee\nwas negligent in ascertaining
        the pertinent facts.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(iii)&nbsp;The\nTrustee shall
        not be liable with respect to any action taken, suffered or omitted to be
        taken by it with respect to Securities of any\nSeries in good faith in accordance
        with the direction of the Holders of a majority in principal amount of the
        outstanding Securities\nof such Series relating to the time, method and place
        of conducting any proceeding for any remedy available to the Trustee, or exercising\nany
        trust or power conferred upon the Trustee, under this Indenture with respect
        to the Securities of such Series in accordance with\nSection 6.12.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;Every\nprovision
        of this Indenture that in any way relates to the Trustee is subject to this
        Section 7.1 and Section 7.2.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;The\nTrustee may
        refuse to perform any duty or exercise any right or power unless it receives
        indemnity satisfactory to it against the costs,\nexpenses and liabilities
        which might be incurred by it in performing such duty or exercising such right
        or power.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(f)&nbsp;The\nTrustee shall not be liable for interest on any money
        received by it except as the Trustee may agree in writing with the Company.
        Money\nheld in trust by the Trustee need not be segregated from other funds
        except to the extent required by law.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"></P>\n\n<!-- Field: Page;
        Sequence: 28; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->23<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(g)&nbsp;No\nprovision of this Indenture shall require the Trustee
        to risk its own funds or otherwise incur any financial liability in the performance\nof
        any of its duties, or in the exercise of any of its rights or powers, if adequate
        indemnity against such risk is not assured to the\nTrustee in its satisfaction.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(h)&nbsp;The\nPaying
        Agent, the Registrar and any authenticating agent shall be entitled to the
        protections and immunities as are set forth in Sections\n7.1(e), 7.1(f) and
        7.1(g) and in Section 7.2, each with respect to the Trustee.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n7.2.&nbsp;<U>Rights of Trustee</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;The\nTrustee may
        rely on and shall be protected in acting upon any resolution, certificate,
        statement, instrument, opinion, report, notice,\nrequest, direction, consent,
        order, judgment, approval, bond, debenture, note, coupon, other evidence of
        indebtedness or other paper\nor document (whether in its original or facsimile
        form) believed by it to be genuine and to have been signed or presented by
        the proper\nperson, not only as to due execution, validity and effectiveness,
        but also as to the truth and accuracy of any information contained\ntherein.
        The Trustee need not investigate any fact or matter stated in the document.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;Before\nthe
        Trustee acts or refrains from acting, it may require an Officer&rsquo;s Certificate
        or an Opinion of Counsel or both. The Trustee\nshall not be liable for any
        action it takes or omits to take in good faith in reliance on such Officer&rsquo;s
        Certificate and/or Opinion\nof Counsel.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;The\nTrustee may
        act through agents and shall not be responsible for the misconduct or negligence
        of any agent appointed with due care. No\nDepositary shall be deemed an agent
        of the Trustee and the Trustee shall not be responsible for any act or omission
        by any Depositary.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(d)&nbsp;The\nTrustee shall not be liable for any action it takes or
        omits to take in good faith which it believes to be authorized or within its
        rights\nor powers, provided that the Trustee&rsquo;s conduct does not constitute
        willful misconduct or negligence.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;The\nTrustee may
        consult with counsel and the advice of such counsel or any Opinion of Counsel
        shall be full and complete authorization and\nprotection in respect of any
        action taken, suffered or omitted by it hereunder without willful misconduct
        or negligence, and in reliance\nthereon.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;The\nTrustee shall
        be under no obligation to exercise any of the rights or powers vested in it
        by this Indenture at the request or direction\nof any of the Holders of Securities
        unless such Holders shall have offered to the Trustee security or indemnity
        satisfactory to it against\nthe costs, expenses and liabilities which might
        be incurred by it in compliance with such request or direction.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(g)&nbsp;The\nTrustee
        shall not be bound to make any investigation into the facts or matters stated
        in any resolution, certificate, statement, instrument,\nopinion, report, notice,
        request, direction, consent, order, bond, debenture, note, other evidence
        of indebtedness or other paper or\ndocument, but the Trustee, in its discretion,
        may make such further inquiry or investigation into such facts or matters
        as it may see\nfit.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(h)&nbsp;The\nTrustee shall not be deemed to have notice of any Default
        or Event of Default unless a Responsible Officer of the Trustee has actual\nknowledge
        thereof or unless written notice of any event which is in fact such a default
        is received by the Trustee at the Corporate Trust\nOffice of the Trustee,
        and such notice references the Securities generally or the Securities of a
        particular Series and this Indenture.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"></P>\n\n<!-- Field: Page;
        Sequence: 29; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->24<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(i)&nbsp;In\nno event shall the Trustee be liable to any person for
        special, punitive, indirect, consequential or incidental loss or damage of
        any\nkind whatsoever (including but not limited to lost profits), even if
        the Trustee has been advised of the likelihood of such loss or damage\nand
        regardless of the form of action.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(j)&nbsp;The\npermissive
        right of the Trustee to take the actions permitted by this Indenture shall
        not be construed as an obligation or duty to do\nso.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(k)&nbsp;The\nTrustee is
        not responsible for monitoring the performance of other persons or for the
        failure of others to perform their duties.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">(l)&nbsp;Any\naction taken, or
        omitted to be taken, by the Trustee in good faith pursuant to this Indenture
        upon the request or authority or consent\nof any person who, at the time of
        making such request or giving such authority or consent, is the holder of
        any Note shall be conclusive\nand binding upon future holders of Notes, and
        upon Notes executed and delivered in exchange therefor or in place thereof.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">(m)&nbsp;The\nTrustee may request
        that the Company deliver an Officer&rsquo;s Certificate setting forth the
        names of individuals and/or titles of officers\nauthorized at such time to
        take specified actions pursuant to this Indenture, which Officer&rsquo;s Certificate
        may be signed by any\nPerson authorized to sign an Officer&rsquo;s Certificate,
        including any Person specified as so authorized in any certificate previously\ndelivered
        and not superseded.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(n)&nbsp;The\nTrustee shall not be required to give any bond or surety
        in respect of the execution of the trusts and powers under this Indenture.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">(o)&nbsp;Notwithstanding\nanything
        to the contrary set forth herein, in no event shall the Trustee or the Paying
        Agent be liable for interest on any money received\nby it (including, but
        not limited to, any negative interest) except as the Trustee or the Paying
        Agent may otherwise agree in writing\nwith the Company. For the avoidance
        of doubt, the compensation, reimbursement and indemnification protections
        afforded to the Trustee\nand the Paying Agent under Section 7.7 of this Indenture
        shall cover any interest-related expenses incurred by the Trustee or the Paying\nAgent
        in the performance of their duties hereunder.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.3.&nbsp;<U>Individual Rights of Trustee</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nTrustee in its individual or any
        other capacity may become the owner or pledgee of Securities and may otherwise
        deal with the Company\nor an Affiliate of the Company with the same rights
        it would have if it were not Trustee. Any Agent may do the same with like
        rights.\nThe Trustee is also subject to Sections 7.10 and 7.11.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.4.&nbsp;<U>Trustee&rsquo;s Disclaimer</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nTrustee makes no representation
        as to the validity or adequacy of this Indenture or the Securities, it shall
        not be accountable for the\nCompany&rsquo;s use of the proceeds from the Securities,
        and it shall not be responsible for any statement in the Securities other
        than\nits authentication.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"></P>\n\n<!-- Field: Page; Sequence: 30; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->25<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.5.&nbsp;<U>Notice of Defaults</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\na Default or Event of Default occurs and is continuing with respect
        to the Securities of any Series and if it is known to a Responsible\nOfficer
        of the Trustee, the Trustee shall send to each Securityholder of the Securities
        of that Series notice of a Default or Event of\nDefault within 90 days after
        it occurs or, if later, after a Responsible Officer of the Trustee has knowledge
        of such Default or Event\nof Default. Except in the case of a Default or Event
        of Default in payment of principal of or interest on any Security of any Series,\nthe
        Trustee may withhold the notice if and so long as its corporate trust committee
        or a committee of its Responsible Officers in good\nfaith determines that
        withholding the notice is in the interests of Securityholders of that Series.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.6.&nbsp;<U>Reports by Trustee to Holders</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Within\n60 days after each anniversary
        of the date of this Indenture and for so long as any Securities remain outstanding,
        the Trustee shall\ntransmit to all Securityholders, as their names and addresses
        appear on the register kept by the Registrar, a brief report dated as of\nsuch
        anniversary date, in accordance with, and to the extent required under, TIA
        &sect; 313.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">A\ncopy of each report at
        the time of its mailing to Securityholders of any Series shall be filed with
        the SEC and each national securities\nexchange on which the Securities of
        that Series are listed. The Company shall promptly notify the Trustee in writing
        when Securities\nof any Series are listed on any national securities exchange.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.7.&nbsp;<U>Compensation and Indemnity</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany shall pay to the Trustee
        from time to time compensation for its services as the Company and the Trustee
        shall from time to time\nagree upon in writing. The Trustee&rsquo;s compensation
        shall not be limited by any law on compensation of a trustee of an express
        trust.\nThe Company shall reimburse the Trustee upon request for all reasonable
        out of pocket expenses, disbursements and advances incurred by\nit in connection
        with the performance of its duties under this Indenture. Such expenses shall
        include the reasonable compensation and\nexpenses of the Trustee&rsquo;s agents
        and counsel.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany shall indemnify
        and hold harmless each of the Trustee and any predecessor Trustee (including
        for the cost of defending itself\nagainst any claims by a third party or enforcing
        this indemnity) against any cost, expense, liability, action, damage, claim,
        suit or\nexpense (including attorneys&rsquo; fees and expenses, and including
        taxes (other than taxes based upon, measured by or determined by\nthe income
        of the Trustee)), incurred by it or arising out of or in connection with (including
        the performance of its duties and the\nexercise of its powers and the enforcement
        of this Indenture), except as set forth in the next paragraph, its duties
        under this Indenture\nas Trustee or Agent. The Trustee shall notify the Company
        promptly of any claim for which it may seek indemnity. Failure by the Trustee\nto
        so notify the Company shall not relieve the Company of its obligations hereunder,
        unless and to the extent that the Company is materially\nprejudiced thereby.
        The Company shall defend the claim and the Trustee shall cooperate in the
        defense. The Trustee may have separate\ncounsel and the Company shall pay
        the reasonable fees and expenses of such counsel. The Company need not pay
        for any settlement made\nwithout its consent, which consent will not be unreasonably
        withheld. This indemnification shall apply to officers, directors, employees,\nshareholders
        and agents of the Trustee.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nCompany need not reimburse any expense or indemnify against any
        loss or liability incurred by the Trustee or by any officer, director,\nemployee,
        shareholder or agent of the Trustee through willful misconduct or negligence.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 31; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->26<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">To\nsecure the Company&rsquo;s payment obligations in this Section
        7.7, the Trustee shall have a lien prior to the Securities of any Series\non
        all money or property held or collected by the Trustee, except that held in
        trust to pay principal of and interest on particular Securities\nof that Series.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">When\nthe Trustee incurs expenses or
        renders services after an Event of Default specified in Section 6.1(d) or
        6.1(e) occurs, the expenses\nand the compensation for the services are intended
        to constitute expenses of administration under any Bankruptcy Law.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nprovisions of this Section 7.7
        shall survive the termination of this Indenture and the resignation or removal
        of the Trustee or Agent.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n7.8.&nbsp;<U>Replacement
        of Trustee</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">A\nresignation or removal
        of the Trustee and appointment of a successor Trustee shall become effective
        only upon the successor Trustee&rsquo;s\nacceptance of appointment as provided
        in this Section 7.8.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nTrustee may resign with respect to the Securities of one or more
        Series by so notifying the Company at least 30 days prior to the date\nof
        the proposed resignation. The Holders of a majority in principal amount of
        the Securities of any Series may remove the Trustee with\nrespect to that
        Series by so notifying the Trustee and the Company in writing at least 30
        days prior to the date of the proposed removal.\nThe Company may remove the
        Trustee with respect to Securities of one or more Series if:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;the\nTrustee fails
        to comply with Section 7.10;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;the\nTrustee is
        adjudged a bankrupt or an insolvent or an order for relief is entered with
        respect to the Trustee under any Bankruptcy Law;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;a\nCustodian or
        public officer takes charge of the Trustee or its property; or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;the\nTrustee
        becomes incapable of acting.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">If\nthe Trustee resigns or is removed
        or if a vacancy exists in the office of Trustee for any reason, the Company
        shall promptly appoint\na successor Trustee. Within one year after the successor
        Trustee takes office, the Holders of a majority in principal amount of the
        then\noutstanding Securities may appoint a successor Trustee to replace the
        successor Trustee appointed by the Company.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">If\na successor Trustee with respect
        to the Securities of any one or more Series does not take office within 60
        days after the retiring Trustee\nresigns or is removed, the retiring Trustee,
        the Company or the Holders of at least a majority in principal amount of the
        Securities\nof the applicable Series may petition any court of competent jurisdiction
        for the appointment of a successor Trustee.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">A\nsuccessor Trustee shall deliver
        a written acceptance of its appointment to the retiring Trustee and to the
        Company. Immediately after\nthat, the retiring Trustee shall transfer all
        property held by it as Trustee to the successor Trustee subject to the lien
        provided for\nin Section 7.7, the resignation or removal of the retiring Trustee
        shall become effective, and the successor Trustee shall have all the\nrights,
        powers and duties of the Trustee with respect to each Series of Securities
        for which it is acting as Trustee under this Indenture.\nA successor Trustee
        shall mail a notice of its succession to each Securityholder of each such
        Series. Notwithstanding replacement of\nthe Trustee pursuant to this Section
        7.8, the Company&rsquo;s obligations under Section 7.7 hereof shall continue
        for the benefit of\nthe retiring Trustee with respect to expenses and liabilities
        incurred by it for actions taken or omitted to be taken in accordance with\nits
        rights, powers and duties under this Indenture prior to such replacement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 32; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->27<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n7.9.&nbsp;<U>Successor
        Trustee by Merger, Etc</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nthe Trustee consolidates with, merges or converts into, or transfers
        all or substantially all of its corporate trust business to, another\ncorporation,
        the successor corporation without any further act shall be the successor Trustee,
        subject to Section 7.10.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n7.10.&nbsp;<U>Eligibility;
        Disqualification</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">This\nIndenture shall always
        have a Trustee who satisfies the requirements of TIA &sect; 310(a)(1), (2)
        and (5). The Trustee shall always have\na combined capital and surplus of
        at least $25,000,000 as set forth in its most recent published annual report
        of condition. The Trustee\nshall comply with TIA &sect; 310(b).</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n7.11.&nbsp;<U>Preferential Collection of Claims Against Company</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nTrustee is subject to TIA &sect;
        311(a), excluding any creditor relationship listed in TIA &sect; 311(b). A
        Trustee who has resigned\nor been removed shall be subject to TIA &sect; 311(a)
        to the extent indicated.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-transform: uppercase; text-align: center; text-indent:
        0in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt; text-transform: none\">ARTICLE\nVIII.</FONT><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><BR>\nSATISFACTION
        AND DISCHARGE; DEFEASANCE</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-transform: uppercase; text-align: center;
        text-indent: 0in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n8.1.&nbsp;<U>Satisfaction and Discharge of Indenture</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">This\nIndenture shall upon Company
        Order be discharged with respect to the Securities of any Series and cease
        to be of further effect as to\nall Securities of such Series (except as hereinafter
        provided in this Section 8.1), and the Trustee, at the expense of the Company,
        shall\nexecute instruments acknowledging satisfaction and discharge of this
        Indenture, when</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)&nbsp;either</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(i)&nbsp;all\nSecurities
        of such Series theretofore authenticated and delivered (other than Securities
        that have been destroyed, lost or stolen and\nthat have been replaced or paid)
        have been delivered to the Trustee for cancellation; or</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(ii)&nbsp;all\nsuch Securities
        of such Series not theretofore delivered to the Trustee for cancellation:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(1)&nbsp;have\nbecome due
        and payable by reason of sending a notice of redemption or otherwise, or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(2)&nbsp;will\nbecome
        due and payable at their Stated Maturity within one year, or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(3)&nbsp;have\nbeen
        called for redemption or are to be called for redemption within one year under
        arrangements satisfactory to the Trustee for the\ngiving of notice of redemption
        by the Trustee in the name, and at the expense, of the Company, or</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"></P>\n\n<!--
        Field: Page; Sequence: 33; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->28<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(4)&nbsp;are\ndeemed paid
        and discharged pursuant to Section 8.3, as applicable;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">and\nthe Company, in the case of (1), (2) or (3) above, shall have
        irrevocably deposited or caused to be deposited with the Trustee as trust\nfunds
        in trust an amount of money or U.S. Government Obligations, which amount shall
        be sufficient for the purpose of paying and discharging\neach installment
        of principal (including mandatory sinking fund or analogous payments) of and
        interest on all the Securities of such\nSeries on the dates such installments
        of principal or interest are due;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;the\nCompany shall have paid or caused to be paid all other
        sums payable hereunder by the Company; and</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;the\nCompany shall
        have delivered to the Trustee an Officer&rsquo;s Certificate and an Opinion
        of Counsel, each stating that all conditions\nprecedent provided for relating
        to the satisfaction and discharge contemplated by this Section 8.1 have been
        complied with.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Notwithstanding\nthe satisfaction and discharge of this Indenture,
        the obligations of the Company to the Trustee under Section 7.7, and, if money
        shall\nhave been deposited with the Trustee pursuant to Section 8.1(a), the
        provisions of Sections 2.4, 2.7, 2.8, 8.2 and 8.5 shall survive.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n8.2.&nbsp;<U>Application of Trust Funds; Indemnification</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;Subject\nto the
        provisions of Section 8.5, all money and U.S. Government Obligations or Foreign
        Government Obligations deposited with the Trustee\npursuant to Section 8.1,
        8.3 or 8.4 and all money received by the Trustee in respect of U.S. Government
        Obligations or Foreign Government\nObligations deposited with the Trustee
        pursuant to Section 8.1, 8.3 or 8.4, shall be held in trust and applied by
        it, in accordance with\nthe provisions of the Securities and this Indenture,
        to the payment, either directly or through any Paying Agent (including the
        Company\nacting as its own Paying Agent) as the Trustee may determine, to
        the persons entitled thereto, of the principal and interest for whose\npayment
        such money has been deposited with or received by the Trustee or to make mandatory
        sinking fund payments or analogous payments\nas contemplated by Sections 8.1,
        8.3 or 8.4.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;The\nCompany shall pay and shall indemnify the Trustee against
        any tax, fee or other charge imposed on or assessed against U.S. Government\nObligations
        or Foreign Government Obligations deposited pursuant to Sections 8.1, 8.3
        or 8.4 or the interest and principal received in\nrespect of such obligations
        other than any payable by or on behalf of Holders.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;The\nTrustee shall
        deliver or pay to the Company from time to time upon Company Order any U.S.
        Government Obligations or Foreign Government\nObligations or money held by
        it as provided in Sections 8.3 or 8.4 which, in the opinion of a nationally
        recognized firm of independent\ncertified public accountants or investment
        bank expressed in a written certification thereof delivered to the Trustee,
        are then in excess\nof the amount thereof which then would have been required
        to be deposited for the purpose for which such U.S. Government Obligations\nor
        Foreign Government Obligations or money were deposited or received. This provision
        shall not authorize the sale by the Trustee of\nany U.S. Government Obligations
        or Foreign Government Obligations held under this Indenture.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!--
        Field: Page; Sequence: 34; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->29<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n8.3.&nbsp;<U>Legal Defeasance of Securities of any Series</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Unless\nthis Section 8.3 is otherwise
        specified, pursuant to Section 2.2, to be inapplicable to Securities of any
        Series, the Company shall be\ndeemed to have paid and discharged the entire
        indebtedness on all the outstanding Securities of any Series on the 91st day
        after the\ndate of the deposit referred to in Section 8.3(d), and the provisions
        of this Indenture, as it relates to such outstanding Securities\nof such Series,
        shall no longer be in effect (and the Trustee, at the expense of the Company,
        shall, upon receipt of a Company Order,\nexecute instruments acknowledging
        the same), except as to:</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)&nbsp;the\nrights of Holders of Securities of such Series to receive,
        from the trust funds described in Section 8.3(d), (i) payment of the principal\nof
        and each installment of principal of and interest on the outstanding Securities
        of such Series on the Maturity of such principal or\ninstallment of principal
        or interest and (ii) the benefit of any mandatory sinking fund payments applicable
        to the Securities of such\nSeries on the day on which such payments are due
        and payable in accordance with the terms of this Indenture and the Securities
        of such\nSeries;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;the\nprovisions of Sections 2.4, 2.5, 2.7, 2.8, 7.7, 8.2,
        8.3, 8.5 and 8.6; and</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;the\nrights, powers,
        trusts and immunities of the Trustee hereunder and the Company&rsquo;s obligations
        in connection therewith;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">provided\nthat, the following conditions shall have been satisfied:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: transparent\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;the\nCompany shall
        have irrevocably deposited or caused to be deposited (except as provided in
        Section 8.2(c)) with the Trustee as trust funds\nspecifically pledged as security
        for and dedicated solely to the benefit of the Holders of such Securities
        (i) in the case of Securities\nof such Series denominated in Dollars, cash
        in Dollars and/or U.S. Government Obligations, or (ii) in the case of Securities
        of such\nSeries denominated in a Foreign Currency (other than a composite
        currency), money and/or Foreign Government Obligations, which through\nthe
        payment of interest and principal in respect thereof in accordance with their
        terms, will provide (and without reinvestment and assuming\nno tax liability
        will be imposed on such Trustee), not later than one day before the due date
        of any payment of money, an amount in cash,\nsufficient, in the opinion of
        a nationally recognized firm of independent public accountants or investment
        bank expressed in a written\ncertification thereof delivered to the Trustee,
        to pay and discharge each installment of principal of and interest, on and
        any mandatory\nsinking fund payments in respect of all the Securities of such
        Series on the dates such installments of principal or interest and such\nsinking
        fund payments are due;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;such\ndeposit will
        not result in a breach or violation of, or constitute a default under, this
        Indenture or any other agreement or instrument\nto which the Company is a
        party or by which it is bound;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;no\nDefault or Event
        of Default with respect to the Securities of such Series shall have occurred
        and be continuing on the date of such deposit\nor during the period ending
        on the 91st day after such date;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(g)&nbsp;the\nCompany shall
        have delivered to the Trustee an Officer&rsquo;s Certificate and an Opinion
        of Counsel to the effect that (i) the Company\nhas received from, or there
        has been published by, the Internal Revenue Service a ruling, or (ii) since
        the date of execution of this\nIndenture, there has been a change in the applicable
        Federal income tax law, in either case to the effect that, and based thereon
        such\nOpinion of Counsel shall confirm that, the Holders of the Securities
        of such Series will not recognize income, gain or loss for Federal\nincome
        tax purposes as a result of such deposit, defeasance and discharge and will
        be subject to Federal income tax on the same amount\nand in the same manner
        and at the same times as would have been the case if such deposit, defeasance
        and discharge had not occurred;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!-- Field:
        Page; Sequence: 35; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
