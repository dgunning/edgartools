        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;a\nstatement that
        the person making such certificate or opinion has read such covenant or condition;</FONT></P>\n\n<P
