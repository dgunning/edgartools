        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">Indenture\ndated as of __________, 20__ between GCM Grosvenor
        Inc., a Delaware corporation (the &ldquo;<I>Company</I>&rdquo;), and Wilmington
        Trust,\nNational Association, a national banking association, not in its individual
        capacity but solely as trustee (the &ldquo;<I>Trustee</I>&rdquo;).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">Each\nparty agrees
        as follows for the benefit of the other party and for the equal and ratable
        benefit of the Holders of the Securities issued\nunder this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform:
        uppercase; text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"text-transform: none\">ARTICLE\nI.</FONT><BR>\nDEFINITIONS AND INCORPORATION
        BY REFERENCE</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-transform: uppercase; text-align: center; text-indent: 0in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\">Section
        1.1.&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times, Serif\">\n</FONT><U>Definitions.</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Affiliate</I>&rdquo;\nof any
        specified person means any other person directly or indirectly controlling
        or controlled by or under common control with such specified\nperson. For
        the purposes of this definition, &ldquo;control&rdquo; (including, with correlative
        meanings, the terms &ldquo;controlled\nby&rdquo; and &ldquo;under common control
        with&rdquo;), as used with respect to any person, shall mean the possession,
        directly or indirectly,\nof the power to direct or cause the direction of
        the management or policies of such person, whether through the ownership of
        voting securities\nor by agreement or otherwise.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Agent</I>&rdquo;\nmeans any
        Registrar, Paying Agent or Notice Agent.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Board\nof Directors</I>&rdquo;
        means the board of directors of the Company or any duly authorized committee
        thereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Board\nResolution</I>&rdquo;
        means a copy of a resolution certified by the Secretary or an Assistant Secretary
        of the Company to have been adopted\nby the Board of Directors or pursuant
        to authorization by the Board of Directors and to be in full force and effect
        on the date of the\ncertificate and delivered to the Trustee.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Business\nDay</I>&rdquo; means
        any day except a Saturday, Sunday, a legal holiday or any other day in The
        City of New York, New York (or in connection\nwith any payment, the Place
        of Payment or the city in which the Corporate Trust Office is located) on
        which banking institutions are authorized\nor required by law, regulation
        or executive order to close.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Capital\nStock</I>&rdquo; means any and all shares,
        interests, participations, rights or other equivalents (however designated)
        of corporate stock.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Company</I>&rdquo;\nmeans
        the party named as such above until a successor replaces it and thereafter
        means the successor.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Company\nOrder</I>&rdquo; means a written order signed
        in the name of the Company by an Officer.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Corporate\nTrust Office</I>&rdquo;
        means the office of the Trustee at which at any particular time its corporate
        trust business related to this Indenture\nshall be principally administered,
        which office at the date hereof is located at Rodney Square North, 1100 North
        Market Street, Wilmington,\nDE 19890, Attention: GCM Grosvenor Inc., Administrator
        , or such other address as the Trustee may designate from time to time by
        notice\nto the Holders and the Company, or the principal corporate trust office
        of any successor Trustee (or such other address as such successor\nTrustee
        may designate from time to time by notice to the Holders and the Company).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 6 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt;
        border-bottom: Black 1.5pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Default</I>&rdquo;\nmeans any
        event which is, or after notice or passage of time or both would be, an Event
        of Default.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Depositary</I>&rdquo;\nmeans,
        with respect to the Securities of any Series issuable or issued in whole or
        in part in the form of one or more Global Securities,\nthe person designated
        as Depositary for such Series by the Company, which Depositary shall be a
        clearing agency registered under the Exchange\nAct; and if at any time there
        is more than one such person, &ldquo;Depositary&rdquo; as used with respect
        to the Securities of any Series\nshall mean the Depositary with respect to
        the Securities of such Series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Discount\nSecurity</I>&rdquo; means any Security that
        provides for an amount less than the stated principal amount thereof to be
        due and payable\nupon declaration of acceleration of the maturity thereof
        pursuant to Section 6.2.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Dollars</I>&rdquo;\nand &ldquo;<I>$</I>&rdquo; means
        the currency of The United States of America.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Exchange\nAct</I>&rdquo; means
        the Securities Exchange Act of 1934, as amended.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Foreign\nCurrency</I>&rdquo;
        means any currency or currency unit issued by a government other than the
        government of The United States of America.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Foreign\nGovernment Obligations</I>&rdquo;
        means, with respect to Securities of any Series that are denominated in a
        Foreign Currency, direct obligations\nof, or obligations guaranteed by, the
        government that issued or caused to be issued such currency for the payment
        of which obligations\nits full faith and credit is pledged and which are not
        callable or redeemable at the option of the issuer thereof.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><I>&ldquo;GAAP&rdquo;</I>\nmeans generally
        accepted accounting principles in the United States of America set forth in
        the opinions and pronouncements of the Accounting\nPrinciples Board of the
        American Institute of Certified Public Accountants and statements and pronouncements
        of the Financial Accounting\nStandards Board or in such other statements by
        such other entity as have been approved by a significant segment of the accounting
        profession,\nwhich are in effect as of the date of determination.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Global\nSecurity</I>&rdquo;
        or &ldquo;<I>Global Securities</I>&rdquo; means a Security or Securities,
        as the case may be, in the form established\npursuant to Section 2.2 evidencing
        all or part of a Series of Securities, issued to the Depositary for such Series
        or its nominee, and\nregistered in the name of such Depositary or nominee.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Holder</I>&rdquo;\nor
        &ldquo;<I>Securityholder</I>&rdquo; means a person in whose name a Security
        is registered in the Security Register kept by the Registrar\nfor that purpose,
        in accordance with the terms hereof.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Indenture</I>&rdquo;\nmeans
        this Indenture as amended or supplemented from time to time and shall include
        the form and terms of particular Series of Securities\nestablished as contemplated
        hereunder.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>interest</I>&rdquo;\nwith
        respect to any Discount Security which by its terms bears interest only after
        Maturity, means interest payable after Maturity.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Maturity</I>,&rdquo;\nwhen
        used with respect to any Security, means the date on which the principal of
        such Security becomes due and payable as therein or herein\nprovided, whether
        at the Stated Maturity or by declaration of acceleration, call for redemption
        or otherwise.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Officer</I>&rdquo;\nmeans
        the Chief Executive Officer, President, the Chief Financial Officer, the Treasurer
        or any Assistant Treasurer, the Secretary or\nany Assistant Secretary, and
        any Vice President of the Company.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 7;
        Options: NewSection; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->2<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Officer&rsquo;s\nCertificate</I>&rdquo; means a certificate
        signed by any Officer.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Opinion\nof Counsel</I>&rdquo; means a written opinion
        of legal counsel who is acceptable to the Trustee. The counsel may be an employee
        of or\ncounsel to the Company. The opinion may contain customary limitations,
        conditions and exceptions.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>person</I>&rdquo;\nmeans any individual, corporation,
        partnership, joint venture, association, limited liability company, joint-stock
        company, trust, unincorporated\norganization or government or any agency or
        political subdivision thereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Place\nof Payment</I>&rdquo; when used with respect
        to the Securities of or within any Series, means the place or places where
        the principal\nof (and premium, if any) and interest, if any, on such Securities
        are payable as specified and as contemplated by Section 2.1.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>principal</I>&rdquo;\nof a
        Security means the principal of the Security plus, when appropriate, the premium,
        if any, on, the Security.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>Responsible\nOfficer</I>&rdquo; means any officer
        of the Trustee in its Corporate Trust Office having direct responsibility
        for administration of this\nIndenture and also means, with respect to a particular
        corporate trust matter, any other officer to whom any corporate trust matter
        is\nreferred because of his or her knowledge of and familiarity with a particular
        subject.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>SEC</I>&rdquo;\nmeans
        the Securities and Exchange Commission.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Securities</I>&rdquo;\nmeans
        the debentures, notes or other debt instruments of the Company of any Series
        authenticated and delivered under this Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Series</I>&rdquo;\nor &ldquo;<I>Series
        of Securities</I>&rdquo; means each series of debentures, notes or other debt
        instruments of the Company created pursuant\nto Sections 2.1 and 2.2 hereof.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Stated\nMaturity</I>&rdquo;
        when used with respect to any Security, means the date specified in such Security
        as the fixed date on which the principal\nof such Security or interest is
        due and payable.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>Subsidiary</I>&rdquo;\nof
        any specified person means any corporation, association or other business
        entity of which more than 50% of the total voting power of\nshares of Capital
        Stock entitled (without regard to the occurrence of any contingency) to vote
        in the election of directors, managers\nor trustees thereof is at the time
        owned or controlled, directly or indirectly, by such person or one or more
        of the other Subsidiaries\nof that person or a combination thereof.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&ldquo;<I>TIA</I>&rdquo;\nmeans
        the Trust Indenture Act of 1939 (15 U.S. Code &sect;&sect; 77aaa-77bbbb) as
        in effect on the date of this Indenture; <U>provided</U>,\n<U>however</U>,
        that in the event the Trust Indenture Act of 1939 is amended after such date,
        &ldquo;TIA&rdquo; means, to the extent required\nby any such amendment, the
        Trust Indenture Act as so amended.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&ldquo;<I>Trustee</I>&rdquo;\nmeans the
        person named as the &ldquo;Trustee&rdquo; in the first paragraph of this instrument
        until a successor Trustee shall have become\nsuch pursuant to the applicable
        provisions of this Indenture, and thereafter &ldquo;Trustee&rdquo; shall mean
        or include each person who\nis then a Trustee hereunder, and if at any time
        there is more than one such person, &ldquo;Trustee&rdquo; as used with respect
        to the\nSecurities of any Series shall mean the Trustee with respect to Securities
        of that Series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 8; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->3<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\">&ldquo;<I>U.S.\nGovernment Obligations</I>&rdquo; means securities
        which are direct obligations of, or guaranteed by, The United States of America
        for\nthe payment of which its full faith and credit is pledged and which are
        not callable or redeemable at the option of the issuer thereof,\nand shall
        also include a depositary receipt issued by a bank or trust company as custodian
        with respect to any such U.S. Government Obligation\nor a specific payment
        of interest on or principal of any such U.S. Government Obligation held by
        such custodian for the account of the\nholder of a depositary receipt, <I>provided</I>
        that (except as required by law) such custodian is not authorized to make
        any deduction\nfrom the amount payable to the holder of such depositary receipt
        from any amount received by the custodian in respect of the U.S. Government\nObligation
        evidenced by such depositary receipt.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\">Section 1.2.&nbsp;<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">\n</FONT><U>Other Definitions</U>.</P>\n\n<P STYLE=\"font:
