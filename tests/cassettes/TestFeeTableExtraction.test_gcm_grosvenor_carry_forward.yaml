        width: 0.25in\"><FONT STYLE=\"font-size: 10pt\">(2)</FONT></TD>\n    <TD STYLE=\"text-align:
        justify\"><FONT STYLE=\"font-size: 10pt\">Includes rights to acquire Class
        A common stock or preferred stock of the registrant under any shareholder
        rights plan then in effect, if applicable under the terms of any such plan.
        </FONT></TD></TR>\n  </TABLE>\n<P STYLE=\"text-align: justify; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\"
