        10pt\">Each\ncertificate or opinion with respect to compliance with a condition
        or covenant provided for in this Indenture (other than a certificate\nprovided
        pursuant to TIA &sect; 314(a)(4)) shall comply with the provisions of TIA
        &sect; 314(e) and shall include:</FONT></P>\n\n<P STYLE=\"font: 10pt Times
