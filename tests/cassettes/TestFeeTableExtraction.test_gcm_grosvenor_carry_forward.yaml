        STYLE=\"text-align: justify; width: 0.25in\">4.</TD><TD STYLE=\"text-align:
        justify\">When the applicable deposit agreement has been duly authorized,
        executed and delivered by all necessary\ncorporate action of the Company,
        and when the specific terms of a particular issuance of Depositary Shares
        have been duly established\nin accordance with the terms of the applicable
        deposit agreement and authorized by all necessary corporate action of the
        Company, and\nsuch Depositary Shares have been duly executed, authenticated,
        issued and delivered against payment therefor in accordance with the terms\nof
        the applicable deposit agreement and in the manner contemplated by the applicable
        Prospectus and by such corporate action (assuming\nthe underlying securities
        have been validly issued and deposited with the depositary), such Depositary
        Shares will be the legally valid\nand binding obligations of the Company,
        enforceable against the Company in accordance with their terms.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.25in\">5.</TD><TD STYLE=\"text-align:
        justify\">When the applicable warrant agreement has been duly authorized,
        executed and delivered by all necessary\ncorporate action of the Company,
        and when the specific terms of a particular issuance of Warrants have been
        duly established in accordance\nwith the terms of the applicable warrant agreement
        and authorized by all necessary corporate action of the Company, and such
        Warrants\nhave been duly executed, authenticated, issued and delivered against
        payment therefor in accordance with the terms of the applicable warrant\nagreement
        and in the manner contemplated by the applicable Prospectus and by such corporate
        action (assuming the securities issuable upon\nexercise of such Warrants have
        been duly authorized and reserved for issuance by all necessary corporate
        action), such Warrants will be\nthe legally valid and binding obligations
        of the Company, enforceable against the Company in accordance with their terms.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in;
        text-align: justify; text-indent: -0.25in\"><FONT STYLE=\"text-transform:
        uppercase\"><B>&nbsp;</B></FONT></P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.25in\"><FONT STYLE=\"text-transform: uppercase\">6.</FONT></TD><TD
        STYLE=\"text-align: justify\">When the applicable purchase contract agreement
        has been duly authorized, executed and delivered by all\nnecessary corporate
        action of the Company, and when the specific terms of a particular issue of
        Purchase Contracts have been duly authorized\nin accordance with the terms
        of the applicable purchase contract agreement and authorized by all necessary
        corporate action of the Company,\nand such Purchase Contracts have been duly
        executed, authenticated, issued and delivered against payment therefor in
        accordance with the\nterms of the applicable purchase contract agreement and
        in the manner contemplated by the applicable Prospectus and by such corporate\naction
        (assuming the securities issuable under such Purchase Contracts have been
        duly authorized and reserved for issuance by all necessary\ncorporate action),
        such Purchase Contracts will be the legally valid and binding obligations
        of the Company, enforceable against the Company\nin accordance with their
        terms.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.25in; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.25in\">7.</TD><TD STYLE=\"text-align:
        justify\">When the applicable unit agreement has been duly authorized, executed
        and delivered by all necessary corporate\naction of the Company, and when
        the specific terms of a particular issuance of Units have been duly authorized
        in accordance with the\nterms of the applicable unit agreement and authorized
        by all necessary corporate action of the Company, and such Units have been
        duly\nexecuted, authenticated, issued and delivered against payment therefor
        in accordance with the terms of the applicable unit agreement and\nin the
        manner contemplated by the applicable Prospectus and by such corporate action
        (assuming the securities issuable upon exercise of\nsuch Units have been duly
        authorized and reserved for issuance by all necessary corporate action), such
        Units will be the legally valid\nand binding obligations of the Company, enforceable
        against the Company in accordance with their terms.</TD></TR></TABLE>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: right\">&copy; Latham &amp;
        Watkins LLP 2019</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\"></P>\n\n<!-- Field: Page; Sequence: 3; Value:
        2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; text-align: justify; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>June
        27, 2025</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"><B>Page 4</B></P>\n\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-right:
        0; margin-bottom: 0pt; text-align: left\"><IMG SRC=\"ex5-1_002.jpg\" ALT=\"\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; text-align: justify; margin: 0pt 0; text-indent: 0.5in\">Our
        opinions are subject to: (i) the effect of\nbankruptcy, insolvency, reorganization,
        preference, fraudulent transfer, moratorium or other similar laws relating
        to or affecting the\nrights and remedies of creditors; (ii) (a) the effect
        of general principles of equity, whether considered in a proceeding in equity
        or\nat law (including the possible unavailability of specific performance
        or injunctive relief), (b) concepts of materiality, reasonableness,\ngood
        faith and fair dealing, and (c) the discretion of the court before which a
        proceeding is brought; and (iii) the invalidity under\ncertain circumstances
        under law or court decisions of provisions providing for the indemnification
        of or contribution to a party with\nrespect to a liability where such indemnification
        or contribution is contrary to public policy. We express no opinion as to
        (a) any provision\nfor liquidated damages, default interest, late charges,
        monetary penalties, make-whole premiums or other economic remedies to the
        extent\nsuch provisions are deemed to constitute a penalty, (b) consents to,
        or restrictions upon, governing law, jurisdiction, venue, arbitration,\nremedies,
        or judicial relief, (c) waivers of rights or defenses, (d) any provision requiring
        the payment of attorneys&rsquo; fees, where\nsuch payment is contrary to law
        or public policy, (e) any provision permitting, upon acceleration of any Debt
        Securities, collection of\nthat portion of the stated principal amount thereof
        which might be determined to constitute unearned interest thereon, (f) the
        creation,\nvalidity, attachment, perfection, or priority of any lien or security
        interest, (g) advance waivers of claims, defenses, rights granted\nby law,
        or notice, opportunity for hearing, evidentiary requirements, statutes of
        limitation, trial by jury or at law, or other procedural\nrights, (h) waivers
        of broadly or vaguely stated rights, (i) provisions for exclusivity, election
        or cumulation of rights or remedies,\n(j) provisions authorizing or validating
        conclusive or discretionary determinations, (k) grants of setoff rights, (l)
        proxies, powers\nand trusts, (m) provisions prohibiting, restricting, or requiring
        consent to assignment or transfer of any right or property, (n) any\nprovision
        to the extent it requires that a claim with respect to a security denominated
        in other than U.S. dollars (or a judgment in respect\nof such a claim) be
        converted into U.S. dollars at a rate of exchange at a particular date, to
        the extent applicable law otherwise provides,\nand (o) the severability, if
        invalid, of provisions to the foregoing effect.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">With your consent,
        we have\nassumed (a) that each of the Debt Securities, Depositary Shares,
        Warrants, Purchase Contracts and Units and the Applicable Indenture,\ndeposit
        agreements, warrant agreements, purchase contract agreements and unit agreements
        governing such Securities (collectively, the\n&ldquo;<B><I>Documents</I></B>&rdquo;)
        will be governed by the internal laws of the State of New York, (b) that each
        of the Documents\nhas been or will be duly authorized, executed and delivered
        by the parties thereto, (c) that each of the Documents constitutes or will\nconstitute
        legally valid and binding obligations of the parties thereto other than the
        Company, enforceable against each of them in accordance\nwith their respective
        terms, and (d) that the status of each of the Documents as legally valid and
        binding obligations of the parties\nwill not be affected by any (i) breaches
        of, or defaults under, agreements or instruments, (ii) violations of statutes,
        rules, regulations\nor court or governmental orders, or (iii) failures to
        obtain required consents, approvals or authorizations from, or to make required\nregistrations,
        declarations or filings with, governmental authorities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">This opinion is for
        your benefit\nin connection with the Registration Statement and may be relied
        upon by you and by persons entitled to rely upon it pursuant to the applicable\nprovisions
        of the Act. We consent to your filing this opinion as an exhibit to the Registration
        Statement and to the reference to our\nfirm contained in the Prospectus under
        the heading &ldquo;Legal Matters.&rdquo; We further consent to the incorporation
        by reference of\nthis letter and consent into any registration statement or
        post-effective amendment to the Registration Statement filed pursuant to Rule\n462(b)
        under the Act with respect to the Securities. In giving such consent, we do
        not thereby admit that we are in the category of persons\nwhose consent is
        required under Section 7 of the Act or the rules and regulations of the Commission
        thereunder.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
