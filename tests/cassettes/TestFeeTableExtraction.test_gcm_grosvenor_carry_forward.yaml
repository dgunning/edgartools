        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(h)&nbsp;the\nCompany shall have delivered to the Trustee an Officer&rsquo;s
        Certificate stating that the deposit was not made by the Company with\nthe
        intent of defeating, hindering, delaying or defrauding any other creditors
        of the Company; and</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(i)&nbsp;the\nCompany shall have delivered to the Trustee an Officer&rsquo;s
        Certificate and an Opinion of Counsel, each stating that all conditions\nprecedent
        provided for relating to the defeasance contemplated by this Section 8.3 have
        been complied with.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n8.4.&nbsp;<U>Covenant
        Defeasance</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Unless\nthis Section 8.4
        is otherwise specified pursuant to Section 2.2 to be inapplicable to Securities
        of any Series, the Company may omit\nto comply with respect to the Securities
        of any Series with any term, provision or condition set forth under Sections
        4.2, 4.3, 4.4 and\n5.1 and, unless otherwise specified therein, any additional
        covenants specified in a supplemental indenture for such Series of Securities\nor
        a Board Resolution or an Officer&rsquo;s Certificate delivered pursuant to
        Section 2.2 (and the failure to comply with any such covenants\nshall not
        constitute a Default or Event of Default with respect to such Series under
        Section 6.1) and the occurrence of any event specified\nin a supplemental
        indenture for such Series of Securities or a Board Resolution or an Officer&rsquo;s
        Certificate delivered pursuant\nto Section 2.2 and designated as an Event
        of Default shall not constitute a Default or Event of Default hereunder, with
        respect to the\nSecurities of such Series, but, except as specified above,
        the remainder of this Indenture and such Securities will be unaffected thereby;\nprovided
        that the following conditions shall have been satisfied:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;with\nreference
        to this Section 8.4, the Company has irrevocably deposited or caused to be
        irrevocably deposited (except as provided in Section\n8.2(c)) with the Trustee
        as trust funds in trust for the purpose of making the following payments specifically
        pledged as security for,\nand dedicated solely to, the benefit of the Holders
        of such Securities (i) in the case of Securities of such Series denominated
        in Dollars,\ncash in Dollars and/or U.S. Government Obligations, or (ii) in
        the case of Securities of such Series denominated in a Foreign Currency\n(other
        than a composite currency), money and/or Foreign Government Obligations, which
        through the payment of interest and principal in\nrespect thereof in accordance
        with their terms, will provide (and without reinvestment and assuming no tax
        liability will be imposed\non such Trustee), not later than one day before
        the due date of any payment of money, an amount in cash, sufficient, in the
        opinion of\na nationally recognized firm of independent certified public accountants
        or investment bank expressed in a written certification thereof\ndelivered
        to the Trustee, to pay and discharge each installment of principal (including
        mandatory sinking fund or analogous payments)\nof and interest on all the
        Securities of such Series on the dates such installments of principal or interest
        are due;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;such\ndeposit will not result in a breach or violation of,
        or constitute a default under, this Indenture or any other agreement or instrument\nto
        which the Company is a party or by which it is bound;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;no\nDefault or Event
        of Default with respect to the Securities of such Series shall have occurred
        and be continuing on the date of such deposit;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;the\nCompany shall
        have delivered to the Trustee an Officers&rsquo; Certificate and an Opinion
        of Counsel to the effect that the Holders of\nthe Securities of such Series
        will not recognize income, gain or loss for Federal income tax purposes as
        a result of such deposit and\ncovenant defeasance and will be subject to Federal
        income tax on the same amount and in the same manner and at the same times
        as would\nhave been the case if such deposit and covenant defeasance had not
        occurred;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"></FONT></P>\n\n<!-- Field: Page; Sequence: 36; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->31<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;The\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate stating
        the deposit was not made by the Company with the intent\nof defeating, hindering,
        delaying or defrauding any other creditors of the Company; and</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;The\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate and an
        Opinion of Counsel, each stating that all conditions\nprecedent herein provided
        for relating to the covenant defeasance contemplated by this Section 8.4 have
        been complied with.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n8.5.&nbsp;<U>Repayment
        to Company</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Subject\nto applicable abandoned
        property law, the Trustee and the Paying Agent shall pay to the Company upon
        request any money held by them for\nthe payment of principal and interest
        that remains unclaimed for two years. After that, Securityholders entitled
        to the money must look\nto the Company for payment as general creditors unless
        an applicable abandoned property law designates another person.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n8.6.&nbsp;<U>Reinstatement</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nthe Trustee or the Paying Agent is unable to apply any money deposited
        with respect to Securities of any Series in accordance with Section\n8.1 by
        reason of any legal proceeding or by reason of any order or judgment of any
        court or governmental authority enjoining, restraining\nor otherwise prohibiting
        such application, the obligations of the Company under this Indenture with
        respect to the Securities of such\nSeries and under the Securities of such
        Series shall be revived and reinstated as though no deposit had occurred pursuant
        to Section\n8.1 until such time as the Trustee or the Paying Agent is permitted
        to apply all such money in accordance with Section 8.1; <U>provided</U>,\n<U>however</U>,
        that if the Company has made any payment of principal of or interest on any
        Securities because of the reinstatement of\nits obligations, the Company shall
        be subrogated to the rights of the Holders of such Securities to receive such
        payment from the money\nor U.S. Government Obligations held by the Trustee
        or Paying Agent after payment in full to the Holders.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        none\">ARTICLE\nIX.</FONT><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><BR>\nAMENDMENTS AND WAIVERS</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n9.1.&nbsp;<U>Without Consent
        of Holders</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany and the Trustee
        may amend or supplement this Indenture or the Securities of one or more Series
        without the consent of any Securityholder:</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;to\ncure any ambiguity,
        defect or inconsistency;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(b)&nbsp;to\ncomply with
        Article V;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(c)&nbsp;to\nprovide for uncertificated Securities in addition to or
        in place of certificated Securities;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(d)&nbsp;to\nadd guarantees
        with respect to Securities of any Series or secure Securities of any Series;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in; background-color: transparent\">&nbsp;</P>\n\n<P
