        or facilitate the administration\nof the trusts hereunder by more than one
        Trustee; or</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(k)&nbsp;to\nmodify, eliminate or add to the provisions of this Indenture
        to such extent as shall be necessary to comply with requirements of the\nSEC
        in order to effect or maintain the qualification of this Indenture under the
        TIA, or under any similar federal statute hereafter\nenacted, and to add to
        this Indenture such other provisions as may be expressly permitted by the
        TIA, excluding however, the provisions\nreferred to in Section 316(a)(2) of
        the TIA or any corresponding provision in any similar federal statute hereafter
        enacted.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n9.2.&nbsp;<U>With
        Consent of Holders</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany and the Trustee
        may enter into a supplemental indenture with the written consent of the Holders
        of at least a majority in principal\namount of the outstanding Securities
        of each Series affected by such supplemental indenture (including consents
        obtained in connection\nwith a tender offer or exchange offer for the Securities
        of such Series), for the purpose of adding any provisions to or changing in\nany
        manner or eliminating any of the provisions of this Indenture or of any supplemental
        indenture or of modifying in any manner the\nrights of the Securityholders
        of each such Series. Except as provided in Section 6.13, the Holders of at
        least a majority in principal\namount of the outstanding Securities of any
        Series by notice to the Trustee (including consents obtained in connection
        with a tender\noffer or exchange offer for the Securities of such Series)
        may waive compliance by the Company with any provision of this Indenture or\nthe
        Securities with respect to such Series.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">It\nshall not be necessary for the
        consent of the Holders of Securities under this Section 9.2 to approve the
        particular form of any proposed\nsupplemental indenture or waiver, but it
        shall be sufficient if such consent approves the substance thereof. After
        a supplemental indenture\nor waiver under this Section 9.2 becomes effective,
        the Company shall send to the Holders of Securities affected thereby, a notice
        briefly\ndescribing the supplemental indenture or waiver. Any failure by the
        Company to send such notice, or any defect therein, shall not, however,\nin
        any way impair or affect the validity of any such supplemental indenture or
        waiver.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 38; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->33<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n9.3.&nbsp;<U>Limitations</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Without\nthe consent of each Securityholder
        affected, an amendment or waiver may not:</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(a)&nbsp;reduce\nthe principal
        amount of Securities whose Holders must consent to an amendment, supplement
        or waiver;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)&nbsp;reduce\nthe rate of or extend the time for payment of interest
        (including default interest) on any Security;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(c)&nbsp;reduce\nthe principal
        or change the Stated Maturity of any Security or reduce the amount of, or
        postpone the date fixed for, the payment of any\nsinking fund or analogous
        obligation;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(d)&nbsp;reduce\nthe principal amount of Discount Securities payable
        upon acceleration of the maturity thereof;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(e)&nbsp;waive\na Default
        or Event of Default in the payment of the principal of or interest, if any,
        on any Security (except a rescission of acceleration\nof the Securities of
        any Series by the Holders of at least a majority in principal amount of the
        outstanding Securities of such Series\nand a waiver of the payment default
        that resulted from such acceleration);</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;make\nthe principal
        of or interest, if any, on any Security payable in any currency other than
        that stated in the Security;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(g)&nbsp;make\nany change
        in Sections 6.8, 6.13 or 9.3 (this sentence); or</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">(h)&nbsp;waive\na redemption
        payment with respect to any Security, provided that such redemption is made
        at the Company&rsquo;s option.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n9.4.&nbsp;<U>Compliance with Trust Indenture Act</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Every\namendment to this Indenture
        or the Securities of one or more Series shall be set forth in a supplemental
        indenture hereto that complies\nwith the TIA as then in effect.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n9.5.&nbsp;<U>Revocation and Effect of Consents</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Until\nan amendment is set forth in
        a supplemental indenture or a waiver becomes effective, a consent to it by
        a Holder of a Security is a continuing\nconsent by the Holder and every subsequent
        Holder of a Security or portion of a Security that evidences the same debt
        as the consenting\nHolder&rsquo;s Security, even if notation of the consent
        is not made on any Security. However, any such Holder or subsequent Holder
        may\nrevoke the consent as to his Security or portion of a Security if the
        Trustee receives the notice of revocation before the date of the\nsupplemental
        indenture or the date the waiver becomes effective.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Any\namendment or waiver once effective
        shall bind every Securityholder of each Series affected by such amendment
        or waiver unless it is of\nthe type described in any of clauses (a) through
        (h) of Section 9.3. In that case, the amendment or waiver shall bind each
        Holder of\na Security who has consented to it and every subsequent Holder
        of a Security or portion of a Security that evidences the same debt as\nthe
        consenting Holder&rsquo;s Security.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">The\nCompany may, but shall not be
        obligated to, fix a record date for the purpose of determining the Holders
        entitled to give their consent\nor take any other action described above or
        required or permitted to be taken pursuant to this Indenture. If a record
        date is fixed,\nthen notwithstanding the second immediately preceding paragraph,
        those Persons who were Holders at such record date (or their duly designated\nproxies),
        and only those persons, shall be entitled to give such consent or to revoke
        any consent previously given or take any such action,\nwhether or not such
        Persons continue to be Holders after such record date. No such consent shall
        be valid or effective for more than\n120 days after such record date.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
        Page; Sequence: 39; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->34<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n9.6.&nbsp;<U>Notation
        on or Exchange of Securities</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nCompany or the Trustee may place an appropriate notation about
        an amendment or waiver on any Security of any Series thereafter authenticated.\nThe
        Company in exchange for Securities of that Series may issue and the Trustee
        shall authenticate upon receipt of a Company Order in\naccordance with Section
        2.3 new Securities of that Series that reflect the amendment or waiver.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n9.7.&nbsp;<U>Trustee Protected</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">In\nexecuting, or accepting the additional trusts created by, any supplemental
        indenture permitted by this Article or the modifications thereby\nof the trusts
        created by this Indenture, the Trustee shall be entitled to receive, and (subject
        to Section 7.1) shall be fully protected\nin relying upon, an Officer&rsquo;s
        Certificate or an Opinion of Counsel or both complying with Section 10.4.
        The Trustee shall sign\nall supplemental indentures upon delivery of such
        an Officer&rsquo;s Certificate or Opinion of Counsel or both, except that
        the Trustee\nneed not sign any supplemental indenture that adversely affects
        its rights, duties, liabilities or immunities under this Indenture.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        none\">ARTICLE\nX.</FONT><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><BR>\nMISCELLANEOUS</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-transform: uppercase;
        text-align: center; text-indent: 0in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n10.1.&nbsp;<U>Trust Indenture
        Act Controls</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">If\nany provision of this
        Indenture limits, qualifies, or conflicts with another provision which is
        required or deemed to be included in\nthis Indenture by the TIA, such required
        or deemed provision shall control.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.2.&nbsp;<U>Notices</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Any\nnotice or communication by the Company or the Trustee to the other,
        or by a Holder to the Company or the Trustee, is duly given if in\nwriting
        and delivered in person or mailed by first-class mail (registered or certified,
        return receipt requested), facsimile transmission,\nemail or overnight air
        courier guaranteeing next day delivery, to the others&rsquo; address:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">if\nto the Company:</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">GCM\nGrosvenor Inc.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">900\nNorth Michigan Avenue</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Suite\n1100</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
        text-align: justify; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Chicago,\nIllinois 60611</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.5in;
