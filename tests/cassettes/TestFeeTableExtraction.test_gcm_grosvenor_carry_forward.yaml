        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.7.&nbsp;<U>Legal Holidays</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">A\n&ldquo;<I>Legal Holiday</I>&rdquo; is any day that is not a Business
        Day. If a payment date is a Legal Holiday at a place of payment,\npayment
        may be made at that place on the next succeeding day that is not a Legal Holiday,
        and no interest shall accrue for the intervening\nperiod.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.8.&nbsp;<U>No Recourse Against Others</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">A\ndirector, officer, employee or stockholder
        (past or present), as such, of the Company shall not have any liability for
        any obligations\nof the Company under the Securities or the Indenture or for
        any claim based on, in respect of or by reason of such obligations or their\ncreation.
        Each Securityholder by accepting a Security waives and releases all such liability.
        The waiver and release are part of the\nconsideration for the issue of the
        Securities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n10.9.&nbsp;<U>Counterparts</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">This\nIndenture may be executed in
        any number of counterparts and by the parties hereto in separate counterparts,
        each of which when so executed\nshall be deemed to be an original and all
        of which taken together shall constitute one and the same agreement. The exchange
        of copies\nof this Indenture and of signature pages by facsimile or electronic
        format (e.g., &ldquo;.pdf&rdquo; or &ldquo;.tif&rdquo;) transmission\nshall
        constitute effective execution and delivery of this Indenture as to the parties
        hereto and may be used in lieu of the original\nIndenture for all purposes.
        Signatures of the parties hereto transmitted by facsimile or electronic format
        (e.g., &ldquo;.pdf&rdquo;\nor &ldquo;.tif&rdquo;) shall be deemed to be their
        original signatures for all purposes.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 42;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->37<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Unless\notherwise provided herein or in any other Securities, the words
        &ldquo;execute&rdquo;, &ldquo;execution&rdquo;, &ldquo;signed&rdquo;,\nand
        &ldquo;signature&rdquo; and words of similar import used in or related to
        any document to be signed in connection with this Indenture,\nany Securities
        or any of the transactions contemplated hereby (including amendments, waivers,
        consents and other modifications) shall\nbe deemed to include electronic signatures
        and the keeping of records in electronic form, each of which shall be of the
        same legal effect,\nvalidity or enforceability as a manually executed signature
        in ink or the use of a paper-based recordkeeping system, as applicable, to\nthe
        fullest extent and as provided for in any applicable law, including the Federal
        Electronic Signatures in Global and National Commerce\nAct, the New York State
        Electronic Signatures and Records Act, and any other similar state laws based
        on the Uniform Electronic Transactions\nAct, provided that, notwithstanding
        anything herein to the contrary, the Trustee is not under any obligation to
        agree to accept electronic\nsignatures in any form or in any format unless
        expressly agreed to by such Trustee pursuant to procedures approved by such
        Trustee.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Section\n10.10.&nbsp;<U>Governing Law;
        Waiver of Jury Trial; Consent to Jurisdiction</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>THIS\nINDENTURE AND THE SECURITIES, INCLUDING ANY CLAIM OR CONTROVERSY
        ARISING OUT OF OR RELATING TO THE INDENTURE OR THE SECURITIES, SHALL\nBE GOVERNED
        BY THE LAWS OF THE STATE OF NEW YORK<FONT STYLE=\"text-transform: uppercase\">.</FONT></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt; text-transform: uppercase\"><B>THE\nCOMPANY,
        THE TRUSTEE AND THE HOLDERS (BY THEIR ACCEPTANCE OF THE SECURITIES) EACH HEREBY
        IRREVOCABLY WAIVE, TO THE FULLEST EXTENT PERMITTED\nBY APPLICABLE LAW, ANY
        AND ALL RIGHT TO TRIAL BY JURY IN ANY LEGAL PROCEEDING ARISING OUT OF OR RELATING
        TO THIS INDENTURE, THE NOTES\nOR THE TRANSACTIONS CONTEMPLATED HEREBY OR THEREBY.</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Any\nlegal suit, action or proceeding
        arising out of or based upon this Indenture or the transactions contemplated
        hereby may be instituted\nin the federal courts of the United States of America
        located in the City of New York or the courts of the State of New York in
        each\ncase located in the City of New York (collectively, the &ldquo;<I>Specified
        Courts</I>&rdquo;), and each party irrevocably submits to\nthe non exclusive
        jurisdiction of such courts in any such suit, action or proceeding. Service
        of any process, summons, notice or document\nby mail (to the extent allowed
        under any applicable statute or rule of court) to such party&rsquo;s address
        set forth above shall be\neffective service of process for any suit, action
        or other proceeding brought in any such court. The Company, the Trustee and
        the Holders\n(by their acceptance of the Securities) each hereby irrevocably
        and unconditionally waive any objection to the laying of venue of any\nsuit,
        action or other proceeding in the Specified Courts and irrevocably and unconditionally
        waive and agree not to plead or claim any\nsuch suit, action or other proceeding
        has been brought in an inconvenient forum.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.11.&nbsp;<U>No Adverse Interpretation of Other Agreements</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">This\nIndenture may not be used to
        interpret another indenture, loan or debt agreement of the Company or a Subsidiary
        of the Company. Any such\nindenture, loan or debt agreement may not be used
        to interpret this Indenture.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.12.&nbsp;<U>Successors</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">All\nagreements of the Company in this Indenture and the Securities
        shall bind its successor. All agreements of the Trustee in this Indenture\nshall
        bind its successor.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n10.13.&nbsp;<U>Severability</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">In\ncase any provision in this Indenture
        or in the Securities shall be invalid, illegal or unenforceable, the validity,
        legality and enforceability\nof the remaining provisions shall not in any
        way be affected or impaired thereby.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"></P>\n\n<!-- Field: Page; Sequence: 43;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->38<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n10.14.&nbsp;<U>Table
        of Contents, Headings, Etc</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nTable of Contents, Cross Reference Table, and headings of the
        Articles and Sections of this Indenture have been inserted for convenience\nof
        reference only, are not to be considered a part hereof, and shall in no way
        modify or restrict any of the terms or provisions hereof.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.15.&nbsp;<U>Securities in a Foreign Currency</U>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">Unless\notherwise specified in a Board
        Resolution, a supplemental indenture hereto or an Officer&rsquo;s Certificate
        delivered pursuant to Section\n2.2 of this Indenture with respect to a particular
        Series of Securities, whenever for purposes of this Indenture any action may
        be taken\nby the Holders of a specified percentage in aggregate principal
        amount of Securities of all Series or all Series affected by a particular\naction
        at the time outstanding and, at such time, there are outstanding Securities
        of any Series which are denominated in more than one\ncurrency, then the principal
        amount of Securities of such Series which shall be deemed to be outstanding
        for the purpose of taking such\naction shall be determined by converting any
        such other currency into a currency that is designated upon issuance of any
        particular Series\nof Securities. Unless otherwise specified in a Board Resolution,
        a supplemental indenture hereto or an Officer&rsquo;s Certificate delivered\npursuant
        to Section 2.2 of this Indenture with respect to a particular Series of Securities,
        such conversion shall be at the spot rate\nfor the purchase of the designated
        currency as published in The Financial Times in the &ldquo;Currency Rates&rdquo;
        section (or, if The\nFinancial Times is no longer published, or if such information
        is no longer available in The Financial Times, such source as may be selected\nin
        good faith by the Company) on any date of determination. The provisions of
        this paragraph shall apply in determining the equivalent\nprincipal amount
        in respect of Securities of a Series denominated in currency other than Dollars
        in connection with any action taken\nby Holders of Securities pursuant to
        the terms of this Indenture.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: transparent\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">All\ndecisions and determinations provided
        for in the preceding paragraph shall, in the absence of manifest error, to
        the extent permitted\nby law, be conclusive for all purposes and irrevocably
        binding upon the Trustee and all Holders.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.16.&nbsp;<U>Judgment Currency</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nCompany agrees, to the fullest extent that it may effectively
        do so under applicable law, that (a) if for the purpose of obtaining judgment\nin
        any court it is necessary to convert the sum due in respect of the principal
        of or interest or other amount on the Securities of any\nSeries (the &ldquo;<I>Required
        Currency</I>&rdquo;) into a currency in which a judgment will be rendered
        (the &ldquo;<I>Judgment Currency</I>&rdquo;),\nthe rate of exchange used shall
        be the rate at which in accordance with normal banking procedures the Trustee
        could purchase in The City\nof New York the Required Currency with the Judgment
        Currency on the day on which final unappealable judgment is entered, unless
        such\nday is not a New York Banking Day, then the rate of exchange used shall
        be the rate at which in accordance with normal banking procedures\nthe Trustee
        could purchase in The City of New York the Required Currency with the Judgment
        Currency on the New York Banking Day preceding\nthe day on which final unappealable
        judgment is entered and (b) its obligations under this Indenture to make payments
        in the Required\nCurrency (i) shall not be discharged or satisfied by any
        tender, any recovery pursuant to any judgment (whether or not entered in accordance\nwith
        subsection (a)), in any currency other than the Required Currency, except
        to the extent that such tender or recovery shall result\nin the actual receipt,
        by the payee, of the full amount of the Required Currency expressed to be
        payable in respect of such payments,\n(ii) shall be enforceable as an alternative
        or additional cause of action for the purpose of recovering in the Required
        Currency the\namount, if any, by which such actual receipt shall fall short
        of the full amount of the Required Currency so expressed to be payable,\nand
        (iii) shall not be affected by judgment being obtained for any other sum due
        under this Indenture. For purposes of the foregoing,\n&ldquo;<I>New York Banking
        Day</I>&rdquo; means any day except a Saturday, Sunday or a legal holiday
        in The City of New York on which\nbanking institutions are authorized or required
        by law, regulation or executive order to close.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in; background-color: transparent\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.17.&nbsp;<U>Force Majeure</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">In\nno event shall the Trustee be responsible or liable for any failure
        or delay in the performance of its obligations hereunder arising\nout of or
        caused by, directly or indirectly, forces beyond its control, including, without
        limitation, strikes, work stoppages, accidents,\nacts of war or terrorism,
        civil or military disturbances or governmental actions, nuclear or natural
        catastrophes or acts of God, earthquakes,\nfires, floods, sabotage, riots,
        epidemics or pandemics, interruptions, loss or malfunctions of utilities,
        communications or computer\n(software and hardware) services, and the unavailability
        of the Federal Reserve Bank wire or telex or other wire or communication facility,\nit
        being understood that the Trustee shall use reasonable best efforts which
        are consistent with accepted practices in the banking industry\nto resume
        performance as soon as practicable under the circumstances.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Section\n10.18.&nbsp;<U>U.S.A. Patriot Act</U>.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nparties hereto acknowledge that in accordance with Section 326
        of the U.S.A. Patriot Act, the Trustee is required to obtain, verify,\nand
        record information that identifies each person or legal entity that establishes
        a relationship or opens an account with the Trustee.\nThe parties to this
        Indenture agree that they will provide the Trustee with such information as
        it may request in order for the Trustee\nto satisfy the requirements of the
        U.S.A. Patriot Act.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        transparent\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Section\n10.19.&nbsp;
        <U>Entire Agreement</U>.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">This\nIndenture, any applicable
        supplemental indenture and the exhibits hereto set forth the entire agreement
        and understanding of the parties\nrelated to this transaction and supersedes
        all prior written agreements and understandings, oral or written.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in; background-color: transparent\"></P>\n\n<!-- Field:
