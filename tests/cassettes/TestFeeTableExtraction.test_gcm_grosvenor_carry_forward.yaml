        text-align: justify; text-indent: 0.5in; background-color: transparent\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">(f)&nbsp;to\nadd
        covenants or events of default for the benefit of the holders of Securities
        of any Series;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
