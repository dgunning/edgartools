        0in; margin-bottom: 0in; width: 100%\"><TR STYLE=\"vertical-align: top; text-align:
        justify\">\n<TD STYLE=\"width: 0.5in; text-align: left\">Re:</TD><TD STYLE=\"text-align:
        justify\"><U>Registration Statement on Form S-3</U></TD>\n</TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">To the addressee
        set forth above:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We have acted as special counsel\nto GCM Grosvenor
        Inc., a Delaware corporation (the &ldquo;<B><I>Company</I></B>&rdquo;), in
        connection with its filing on the date hereof\nwith the Securities and Exchange
        Commission (the &ldquo;<B><I>Commission</I></B>&rdquo;) of a registration
        statement on Form S-3 (as amended,\nthe &ldquo;<B><I>Registration Statement</I></B>&rdquo;),
        including a base prospectus (the &ldquo;<B><I>Base Prospectus</I></B>&rdquo;),\nwhich
        provides that it will be supplemented by one or more prospectus supplements
        (each such prospectus supplement, together with the\nBase Prospectus, a &ldquo;<B><I>Prospectus</I></B>&rdquo;),
        under the Securities Act of 1933, as amended (the &ldquo;<B><I>Act</I></B>&rdquo;),\nrelating
        to the registration for issue and sale by the Company of up to $350,000,000
        aggregate offering amount of (i) shares of the Company&rsquo;s\nClass A common
        stock, $0.0001 par value per share (&ldquo;<B><I>Common Stock</I></B>&rdquo;),
        (ii) shares of one or more series of the\nCompany&rsquo;s preferred stock,
        $0.0001 par value per share (&ldquo;<B><I>Preferred Stock</I></B>&rdquo;),
        (iii) one or more series of\nthe Company&rsquo;s debt securities (collectively,
        &ldquo;<B><I>Debt Securities</I></B>&rdquo;) to be issued under an indenture
        to be\nentered into between the Company, as issuer, and Wilmington Trust,
        National Association, as trustee (a form of which is included as Exhibit\n4.1
        to the Registration Statement) and one or more board resolutions, supplements
        thereto or officer&rsquo;s certificates thereunder (such\nindenture, together
        with the applicable board resolution, supplement or officer&rsquo;s certificate
        pertaining to the applicable series\nof Debt Securities, the &ldquo;<B><I>Applicable
        Indenture</I></B>&rdquo;), (iv) depositary shares (&ldquo;<B><I>Depositary
        Shares</I></B>&rdquo;),\n(v) warrants (&ldquo;<B><I>Warrants</I></B>&rdquo;),
        (vi) purchase contracts (&ldquo;<B><I>Purchase Contracts</I></B>&rdquo;),
        and (vii)\nunits (&ldquo;<B><I>Units</I></B>&rdquo;). The Common Stock, Preferred
        Stock, Debt Securities, Depositary Shares, Warrants, Purchase Contracts,\nand
        Units, plus any additional Common Stock, Preferred Stock, Debt Securities,
        Depositary Shares, Warrants, Purchase Contracts and Units\nthat may be registered
        pursuant to any subsequent registration statement that the Company may hereafter
        file with the Commission pursuant\nto Rule 462(b) under the Act in connection
        with the offering by the Company contemplated by the Registration Statement,
        are referred to\nherein collectively as the &ldquo;<B><I>Securities</I></B>.&rdquo;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">This
        opinion is being furnished in connection with\nthe requirements of Item 601(b)(5)
        of Regulation S-K under the Act, and no opinion is expressed herein as to
        any matter pertaining to\nthe contents of the Registration Statement or related
        applicable Prospectus, other than as expressly stated herein with respect
        to the\nissue of the Securities.</P>\n\n<P STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify; margin:
        0pt 0; text-indent: 0.5in\"></P>\n\n<!-- Field: Page; Sequence: 1; Options:
        NewSection; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"><B>June 27, 2025</B></P>\n\n<P STYLE=\"margin: 0pt 0; font:
        10pt Times New Roman, Times, Serif\"><B>Page 2</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin-top: 0pt; margin-right: 0; margin-bottom: 0pt; text-align: left\"><IMG
        SRC=\"ex5-1_002.jpg\" ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">As such counsel, we have examined such matters\nof
        fact and questions of law as we have considered appropriate for purposes of
        this letter. With your consent, we have relied upon certificates\nand other
        assurances of officers of the Company and others as to factual matters without
        having independently verified such factual matters.\nWe are opining herein
        as to the General Corporation Law of the State of Delaware, and with respect
        to the opinions set forth in paragraphs\n3 through 7 below, the internal laws
        of the State of New York, and we express no opinion with respect to the applicability
        thereto, or\nthe effect thereon, of the laws of any other jurisdiction or,
        in the case of the State of Delaware, any other laws, or as to any matters\nof
        municipal law or the laws of any local agencies within any state.</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Subject
        to the foregoing and the other matters\nset forth herein, it is our opinion
        that, as of the date hereof:</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.25in; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.25in\">1.</TD><TD STYLE=\"text-align: justify\">When an issuance
        of Common Stock has been duly authorized by all necessary corporate action
        of the Company,\nupon issuance, delivery and payment therefor in an amount
        not less than the par value thereof in the manner contemplated by the applicable\nProspectus
        and by such corporate action, and in total amounts and numbers of shares that
        do not exceed the respective total amounts and\nnumbers of shares (a) available
        under the certificate of incorporation, and (b) authorized by the board of
        directors in connection with\nthe offering contemplated by the applicable
        Prospectus, such shares of Common Stock will be validly issued, fully paid
        and nonassessable.\nIn rendering the foregoing opinion, we have assumed that
        the Company will comply with all applicable notice requirements regarding
        uncertificated\nshares provided in the General Corporation Law of the State
        of Delaware.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.25in; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.25in\">2.</TD><TD STYLE=\"text-align:
        justify\">When a series of Preferred Stock has been duly established in accordance
        with the terms of the Company&rsquo;s\ncertificate of incorporation and authorized
        by all necessary corporate action of the Company, upon issuance, delivery
        and payment therefor\nin an amount not less than the par value thereof in
        the manner contemplated by the applicable Prospectus and by such corporate
        action,\nand in total amounts and numbers of shares that do not exceed the
        respective total amounts and numbers of shares (a) available under the\ncertificate
        of incorporation, and (b) authorized by the board of directors in connection
        with the offering contemplated by the applicable\nProspectus, such shares
        of such series of Preferred Stock will be validly issued, fully paid and nonassessable.
        In rendering the foregoing\nopinion, we have assumed that the Company will
        comply with all applicable notice requirements regarding uncertificated shares
        provided\nin the General Corporation Law of the State of Delaware.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.25in\">3.</TD><TD STYLE=\"text-align:
        justify\">When the Applicable Indenture has been duly authorized, executed
        and delivered by all necessary corporate\naction of the Company, and when
        the specific terms of a particular series of Debt Securities have been duly
        established in accordance\nwith the terms of the Applicable Indenture and
        authorized by all necessary corporate action of the Company, and such Debt
        Securities have\nbeen duly executed, authenticated, issued and delivered against
        payment therefor in accordance with the terms of the Applicable Indenture\nand
        in the manner contemplated by the applicable Prospectus and by such corporate
        action, such Debt Securities will be the legally valid\nand binding obligations
        of the Company, enforceable against the Company in accordance with their terms.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: right\">&copy;
        Latham &amp; Watkins LLP 2019</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
