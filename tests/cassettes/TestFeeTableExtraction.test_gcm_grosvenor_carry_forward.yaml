        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->4<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center;
        text-indent: 0in\"><A NAME=\"gcm_004\"></A>RISK FACTORS</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Investment in any
        securities offered pursuant to this prospectus and\nthe applicable prospectus
        supplement involves risks. You should carefully consider the risk factors
        incorporated by reference to our most\nrecent Annual Report on Form 10-K and
        any subsequent Quarterly Reports on Form 10-Q or Current Reports on Form 8-K,
        and all other information\ncontained or incorporated by reference into this
        prospectus, as updated by our subsequent filings under the Exchange Act, and
        the risk\nfactors and other information contained in the applicable prospectus
        supplement and any applicable free writing prospectus before acquiring\nany
        of such securities. The occurrence of any of these risks might cause you to
        lose all or part of your investment in the offered securities.\nThere may
        be other unknown or unpredictable economic, business, competitive, regulatory
        or other factors that could have material adverse\neffects on our future results.
        Past financial performance may not be a reliable indicator of future performance,
        and historical trends\nshould not be used to anticipate results or trends
        in future periods. If any of these risks actually occurs, our business, financial
        condition,\nresults of operations or cash flow could be seriously harmed.
        This could cause the trading price of our securities to decline, resulting\nin
        a loss of all or part of your investment. Please also carefully read the section
        entitled &ldquo;Forward-Looking Statements&rdquo;\nincluded in our most recent
        Annual Report on Form 10-K and any subsequent Quarterly Reports on Form 10-Q
        or Current Reports on Form 8-K.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        8; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->5<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center;
        text-indent: 0in\"><A NAME=\"gcm_005\"></A>USE OF PROCEEDS</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We intend to use the net proceeds\nfrom the
        sale of the securities as set forth in the applicable prospectus supplement.</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: center; text-indent: 0in\"><A
        NAME=\"gcm_006\"></A>DESCRIPTION OF CAPITAL STOCK</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The following description of our capital stock
        and certain provisions\nof our amended and restated certificate of incorporation
        (the &ldquo;Charter&rdquo;), bylaws (the &ldquo;Bylaws&rdquo;), and Stockholders&rsquo;\nAgreement,
        dated as of November 17, 2020 (the &ldquo;Stockholders&rsquo; Agreement&rdquo;),
        by and among the Company, the GCM Equityholders\n(as defined below) and the
        other parties thereto, are summaries and are qualified in their entirety by
        reference to the full text of the\nCharter, Bylaws, Warrant Agreement and
        Stockholders&rsquo; Agreement, copies of which have been filed with the SEC,
        and applicable provisions\nof the General Corporation Law of the State of
        Delaware (the &ldquo;DGCL&rdquo;).</P>\n\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Our authorized capital stock\nconsists of:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 60.5pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">700,000,000
        shares of Class A common stock;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 60.5pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">500,000,000 shares of Class B common stock,
        par value $0.0001 per share (&ldquo;Class B common stock&rdquo;);</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 60.5pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">300,000,000
        shares of Class C common stock, par value $0.0001 per share (&ldquo;Class
        C common stock&rdquo;\nand, together with the Class A common stock and the
        Class B common stock, &ldquo;common stock&rdquo;); and</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 60.5pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">100,000,000
        shares of preferred stock, par value $0.0001 per share.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Common Stock</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B><I>&nbsp;</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>Voting</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Pursuant
        to the Charter,\nholders of Class A common stock and Class C common stock
        vote together as a single class on all matters submitted to the stockholders\nfor
        their vote or approval, except as required by applicable law. Holders of Class
        A common stock are entitled to one vote per share on\nall matters submitted
        to the stockholders for their vote or approval. Prior to the date on which
        Grosvenor Holdings, L.L.C., GCM Grosvenor\nManagement, LLC and Grosvenor Holdings
        II, L.L.C. (the &ldquo;GCMH Equityholders&rdquo;) beneficially own voting
        shares representing less\nthan 20% of the amount of Class A common stock held
        by the GCMH Equityholders immediately following the closing of our business
        combination\non November 17, 2020 (the &ldquo;Sunset Date&rdquo;), the holders
        of Class C common stock are entitled to the lesser of (i) 10 votes per\nshare
        and (ii) the Class C Share Voting Amount (as defined in the Charter) on all
        matters submitted to stockholders for their vote or\napproval. From and after
        the Sunset Date, holders of Class C Common Stock will be entitled to one vote
        per share. The Class B common stock\nis not entitled to vote (except as required
        by applicable law).</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">As of June 27, 2025, GCM V,\nLLC (&ldquo;GCM
        V&rdquo;) controlled approximately 75% of the combined voting power of our
        common stock as a result of its ownership of\nall of Class C common stock.
        Accordingly, Michael Sacks, through his control of GCM V, controls our business
        policies and affairs and\ncan control any action requiring the general approval
        of our stockholders, including the election of our board, the adoption of
        amendments\nto the Charter and Bylaws and approval of any merger or sale of
        substantially all of its assets. Until the Sunset Date, Mr. Sacks will\ncontinue
        to control the outcome of matters submitted to the stockholders.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        Class B common stock\nis non-voting and is not entitled to any votes on any
        matter that is submitted to a vote of our stockholders, except as required
        by Delaware\nlaw. Delaware law would permit holders of Class B common stock
        to vote, with one vote per share, on a matter if it were to (i) change\nthe
        par value of the Class B common stock or (ii) amend the Charter to alter the
        powers, preferences, or special rights of the Class B\ncommon stock as a whole
        in a way that would adversely affect the holders of Class B common stock.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">As
        a result, in these limited\ninstances, the holders of a majority of the Class
        B common stock could defeat such an amendment to the Charter. For example,
        if a proposed\namendment of the Charter provided for the Class B common stock
        to rank junior to the Class A common stock or Class C common stock with\nrespect
        to (i) any dividend or distribution, (ii) the distribution of proceeds were
        we to be acquired or (iii) any other right, Delaware\nlaw would require the
        separate vote of the holders of Class B common stock, with each share of Class
        B common stock entitled to one vote\nper share. In this instance, the holders
        of a majority of the Class B common stock could defeat that amendment to the
        Charter.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><B><I>&nbsp;</I></B></P>\n\n\n<!-- Field: Page;
        Sequence: 9; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->6<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>&nbsp;</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B><I>Dividends</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The holders of Class A common\nstock and Class
        B common stock (collectively, the &ldquo;Economic Rights Stock&rdquo;) are
        entitled to receive dividends as and if declared\nby our board of directors
        out of legally available funds. Under the Charter, dividends may not be declared
        or paid in respect of the Class\nA common stock or the Class B common stock
        unless they are declared or paid in the same amount in respect of the other
        class of Economic\nRights Stock. With respect to stock dividends, holders
        of Class A common stock must receive Class A common stock and holders of Class\nB
        common stock must receive Class B common stock.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The holders of Class
        C common\nstock do not have any right to receive dividends other than stock
        dividends consisting of shares of Class C common stock, paid proportionally\nwith
        respect to each outstanding share of Class C common stock.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>&nbsp;</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B><I>Merger, Consolidation or Tender or Exchange\nOffer</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        holders of Class A common\nstock are not entitled to receive economic consideration
        for their shares in excess of that payable to the holders of Class B common
        stock\nin connection with any merger, consolidation, or tender or exchange
        offer. However, in any such event involving consideration in the form\nof
        securities, the holders of Class B common stock will be deemed to have received
        the same consideration as the holders of Class A common\nstock.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B><I>&nbsp;</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>Liquidation or Dissolution</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Upon
        our liquidation or dissolution,\nthe holders of all classes of common stock
        are entitled to their respective par value, and the holders of Class A common
        stock and Class\nB common stock will then be entitled to share ratably in
        those of our assets that are legally available for distribution to stockholders\nafter
        payment of liabilities and subject to the prior rights of any holders of preferred
        stock then outstanding. Other than their par\nvalue, the holders of Class
        C common stock will not have any right to receive a distribution upon our
        liquidation or dissolution.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>&nbsp;</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B><I>Conversion, Transferability and Exchange</I></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Subject
        to the terms of the\nFifth Amended and Restated Limited Liability Partnership
        Agreement of Grosvenor Capital Management Holdings, LLLP (&ldquo;A&amp;R LLLPA&rdquo;),\nthe
        limited partners of Grosvenor Capital Management Holdings, LLLP (&ldquo;GCMH&rdquo;)
        (other than GCM Grosvenor Holdings, LLC (&ldquo;IntermediateCo&rdquo;))\nmay
        from time to time cause GCMH to redeem any or all of their units of partnership
        interest in GCMH (the &ldquo;Grosvenor common units&rdquo;)\nin exchange for,
        at our election (subject to certain exceptions), either cash (based on the
        market price for a share of the Class A common\nstock) or shares of Class
        A common stock. At our election, such transaction may be effectuated via a
        direct exchange of Class A common\nstock or cash by IntermediateCo for the
        redeemed Grosvenor common units.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The Charter provides that\n(i) a share of Class
        C common stock will automatically be cancelled for no consideration upon any
        sale or other transfer of a share of\nClass A common stock issued as a result
        of any redemption or direct exchange of Grosvenor common units transferred
        to any person that\nis not Michael Sacks, GCM V or the GCM Equityholders (or
        affiliate or owner thereof), and (ii) a share of Class C common stock will
        automatically\nbe cancelled for no consideration upon the redemption or exchange
        of a Grosvenor common unit for cash. Shares of Class A common stock,\nClass
        B common stock and Class C common stock are not subject to any conversion
        right.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><B><I>&nbsp;</I></B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B><I>Other
        Provisions</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">None of the Class A common\nstock, Class B common
        stock or Class C common stock has any pre-emptive or other subscription rights,
        or sinking fund provisions under\nthe terms of the Charter, the Bylaws or
        the Stockholders&rsquo; Agreement.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Under the terms of the A&amp;R\nLLLPA, following
        the Sunset Date, the limited partners of Grosvenor Capital Management Holdings,
        LLLP will have the right, subject to\ncertain exceptions, to purchase their
        respective pro rata share of newly issued securities proposed to be sold by
        us or GCMH.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"><B>&nbsp;</B></P>\n\n\n<!--
        Field: Page; Sequence: 10; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->7<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Preferred Stock</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        are authorized to issue\nup to 100,000,000 shares of preferred stock. Our
        board of directors is authorized, subject to limitations prescribed by Delaware
        law and\nthe Charter, to determine the terms and conditions of the preferred
        stock, including whether the shares of preferred stock will be issued\nin
        one or more series, the number of shares to be included in each series and
        the powers (including the voting power), designations, preferences\nand rights
        of the shares. Our board of directors also will be authorized to designate
        any qualifications, limitations or restrictions\non the shares without any
        further vote or action by the stockholders. The issuance of preferred stock
        may have the effect of delaying,\ndeferring or preventing a change in control
        of our Company and may adversely affect the voting and other rights of the
        holders of Class\nA common stock, Class B common stock and Class C common
        stock, which could have a negative impact on the market price of the Class
        A common\nstock.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Amendment
        of Certificate of Incorporation or\nBylaws</B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The Bylaws may be
        amended\nor repealed by a majority vote of our board of directors or by the
        holders of at least the majority of the voting power of all of the\nthen-outstanding
        shares entitled to vote thereon, subject to the Stockholders&rsquo; Agreement
        (for so long as it remains in effect).\nThe affirmative vote of a majority
        of our board of directors and a majority in voting power of the outstanding
        shares entitled to vote\nthereon is required to amend the Charter, subject
        to the terms contained therein.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Exclusive Forum</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The Charter provides that,\nto the fullest extent
        permitted by law, and unless we provide notice in writing to the selection
        of an alternative forum, the Court of\nChancery of the State of Delaware will
        be the sole and exclusive forum for (i) any derivative action or proceeding
        brought on behalf of\nus, (ii) any action asserting a claim of breach of a
        fiduciary duty owed by any of our directors, officers, employees, agents or
        stockholders\nto us or our stockholders, (iii) any action asserting a claim
        arising pursuant to any provision of the DGCL, Charter or Bylaws or as to\nwhich
        the DGCL confers jurisdiction on the Court of Chancery of the State of Delaware
        or (iv) any action asserting a claim governed by\nthe internal affairs doctrine,
        in each such case subject to such Court of Chancery having personal jurisdiction
        over the indispensable\nparties named as defendants therein. The Charter further
        provides that, unless we otherwise consent in writing to the selection of
        an\nalternative forum, to the fullest extent permitted by law, the federal
        district courts of the United States will be the exclusive forum\nfor resolving
        any complaint asserting a cause of action arising under the Securities Act
        of 1933, as amended (the &ldquo;Securities Act&rdquo;).\nThere is uncertainty
        as to whether a court would enforce such a provision relating to causes of
        action arising under the Securities Act,\nand investors cannot waive compliance
        with the federal securities laws and the rules and regulations thereunder.
        The clauses described\nabove will not apply to suits brought to enforce a
        duty or liability created by the Exchange Act or any other claim for which
        the federal\ncourts have exclusive jurisdiction.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Anti-Takeover Effects of Provisions of the\nCharter and Bylaws</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        provisions of the Charter\nand Bylaws and of the DGCL summarized below may
        have an anti-takeover effect and may delay, defer or prevent a tender offer
        or takeover\nattempt that you might consider in your best interest, including
        an attempt that might result in your receipt of a premium over the market\nprice
        for your shares of Class A common stock.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The Charter and Bylaws
        contain\ncertain provisions that are intended to enhance the likelihood of
        continuity and stability in the composition of our board of directors\nand
        that may have the effect of delaying, deferring or preventing our future takeover
        or change in control unless such takeover or change\nin control is approved
        by our board of directors.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">These provisions include:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>Action
        by Written Consent;\nSpecial Meetings of Stockholders</I>. The Charter provides
        that, until we are no longer a &ldquo;controlled company&rdquo; under Nasdaq\nListing
        Rule 5605(c)(1), stockholder action can be taken by written consent in lieu
        of a meeting. The Charter and Bylaws also provide\nthat, subject to any special
        rights of the holders of any series of preferred stock and except as otherwise
        required by law, special meetings\nof the stockholders can only be called
        by our board of directors, the chairman or so long as we are a &ldquo;controlled
        company,&rdquo;\nby the Secretary at the request of any holder of at least
        25% of the total voting power of the outstanding shares of capital stock of\nthe
        Company entitled to vote generally in the election of directors, voting together
        as a single class. Stockholders are not otherwise\npermitted to call a special
        meeting or to require our board of directors to call a special meeting.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><I>&nbsp;</I></P>\n\n\n<!-- Field: Page; Sequence:
        11; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->8<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>Advance
        Notice Procedures</I>.\nThe Bylaws establish an advance notice procedure for
        stockholder proposals to be brought before an annual meeting of our stockholders,\nand
        for stockholder nominations of persons for election to our board of directors
        to be brought before an annual or special meeting of\nstockholders. Stockholders
        at an annual meeting will only be able to consider proposals or nominations
        specified in the notice of meeting\nor brought before the meeting by or at
        the direction of our board of directors or by a stockholder who was a stockholder
        of record on\nthe record date for the meeting, who is entitled to vote at
        the meeting and who has given our Secretary timely written notice, in proper\nform,
        of the stockholder&rsquo;s intention to bring that business or nomination
        before the meeting. Although the Bylaws do not give our\nboard of directors
        the power to approve or disapprove stockholder nominations of candidates or
        proposals regarding other business to be\nconducted at a special or annual
        meeting, as applicable, the Bylaws may have the effect of precluding the conduct
        of certain business\nat a meeting if the proper procedures are not followed
        or may discourage or deter a potential acquiror from conducting a solicitation\nof
        proxies to elect its own slate of directors or otherwise attempting to obtain
        control of us.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>&nbsp;</I></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><I>Authorized but Unissued\nShares</I>. Our
        authorized but unissued shares of common stock and preferred stock will be
        available for future issuance without stockholder\napproval. These additional
        shares may be utilized for a variety of corporate purposes, including future
        public offerings to raise additional\ncapital, corporate acquisitions and
        employee benefit plans. The existence of authorized but unissued shares of
        common stock and preferred\nstock could render more difficult or discourage
        an attempt to obtain control of a majority of our common stock by means of
        a proxy contest,\ntender offer, merger or otherwise.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>Business
        Combinations\nwith Interested Stockholders</I>. The Charter provides that
        we are not subject to Section 203 of the DGCL, an anti-takeover law. In general,\nSection
        203 prohibits a publicly held Delaware corporation from engaging in a business
        combination, such as a merger, with an &ldquo;interested\nstockholder&rdquo;
        (which includes a person or group owning 15% or more of the corporation&rsquo;s
        voting stock) for a period of three\nyears following the date the person became
        an interested stockholder, unless (with certain exceptions) the business combination
        or the\ntransaction in which the person became an interested stockholder is
        approved in a prescribed manner. However, the Charter contains provisions\nthat
        have a similar effect to Section 203, except that they provide that Mr. Sacks
        and the GCMH Equityholders, their respective affiliates\nand successors and
        their direct and indirect transferees will not be deemed to be &ldquo;interested
        stockholders,&rdquo; regardless of\nthe percentage of our voting stock owned
        by them, and accordingly will not be subject to such restrictions.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Corporate Opportunities</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        Charter provides that,\nto the fullest extent permitted by law, we renounce
        any interest or expectancy in a transaction or matter that may be a corporate
        opportunity\nfor us and Mr. Sacks (other than in his capacity as an officer
        and employee of our Company), the GCMH Equityholders, or any of our non-employee\ndirectors
        have no duty to present such corporate opportunity to us and they may invest
        in competing businesses or do business with our\nclients or customers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Registration Rights</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">On
        November 17, 2020, we entered into an amended and restated registration\nrights
        agreement (the &ldquo;Registration Rights Agreement&rdquo;) with the CF Sponsor,
        the GCMH Equityholders and certain qualified institutional\nbuyers and accredited
        investors that agreed to purchase shares of Class A common stock in a private
        placement in connection with the transactions\ncontemplated by that certain
        transaction agreement dated as of August 2, 2020. Pursuant to the Registration
        Rights Agreement, we agreed\nto register for resale, pursuant to Rule 415
        under the Securities Act, certain shares of our Class A common stock and other
        equity securities\nthat are held by the parties thereto from time to time.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Transfer Agent and Registrar</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        transfer agent for our\ncommon stock is Continental Stock Transfer &amp; Trust
        Company. Each person investing in our Class A common stock held through The
        Depository\nTrust Company must rely on the procedures thereof and on institutions
        that have accounts therewith to exercise any rights of a holder\nof our Class
        A common stock.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">For as long as any shares\nof our Class A common
        stock are listed on Nasdaq or on any other stock exchange operating in the
        United States, the laws of the State\nof New York shall apply to the property
        law aspects of our Class A common stock (including securities exercisable
        for or convertible into\nour Class A common stock) reflected in the register
        administered by our transfer agent.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We have listed shares of\nour Class A common
        stock in registered form and such shares, through the transfer agent, will
        not be certificated. We have appointed Continental\nStock Transfer &amp; Trust
        Company as our agent in New York to maintain our shareholders&rsquo; register
        on behalf of our board of directors\nand to act as transfer agent and registrar
        for our Class A common stock. Shares of our Class A common stock are traded
        on Nasdaq in book-entry\nform.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Listing of Class A Common Stock</B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Our Class A common
        stock is listed on Nasdaq under the symbol &ldquo;GCMG.&rdquo;</P>\n\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        12; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->9<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center; text-indent: 0in\"><A NAME=\"gcm_007\"></A>DESCRIPTION
        OF DEBT SECURITIES</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The following description,\ntogether with the additional information
        we include in any applicable prospectus supplement or free writing prospectus,
        summarizes certain\ngeneral terms and provisions of the debt securities that
        we may offer under this prospectus. When we offer to sell a particular series\nof
        debt securities, we will describe the specific terms of the series in a supplement
        to this prospectus. We will also indicate in the\nsupplement to what extent
        the general terms and provisions described in this prospectus apply to a particular
        series of debt securities.\nThe terms of any debt securities offered under
        a prospectus supplement may differ from the terms described below.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        may issue debt securities\neither separately, or together with, or upon the
        conversion or exercise of or in exchange for, other securities described in
        this prospectus.\nDebt securities may be our senior, senior subordinated or
        subordinated obligations and, unless otherwise specified in a supplement to\nthis
        prospectus, the debt securities will be our direct, unsecured obligations
        and may be issued in one or more series.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The debt securities
        will\nbe issued under an indenture between us and Wilmington Trust, National
        Association, as trustee. We have summarized select portions of\nthe indenture
        below. The summary is not complete. The form of the indenture has been filed
        as an exhibit to the registration statement\nof which this prospectus forms
        a part and you should read the indenture for provisions that may be important
        to you. In the summary below,\nwe have included references to the section
        numbers of the indenture so that you can easily locate these provisions. Capitalized
        terms\nused in the summary and not defined herein have the meanings specified
        in the indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">As used in this section only,\n&ldquo;GCM Grosvenor,&rdquo;
        &ldquo;we,&rdquo; &ldquo;our&rdquo; or &ldquo;us&rdquo; refer to GCM Grosvenor
        Inc., a Delaware corporation,\nexcluding our subsidiaries, unless expressly
        stated or the context otherwise requires.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>General </B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The terms of each series\nof debt securities
        will be established by or pursuant to a resolution of our board of directors
        and set forth or determined in the manner\nprovided in a resolution of our
        board of directors, in an officer&rsquo;s certificate or by a supplemental
        indenture. (Section 2.2) The\nparticular terms of each series of debt securities
        will be described in a prospectus supplement relating to such series (including
        any\npricing supplement or term sheet).</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We can issue an unlimited\namount
        of debt securities under the indenture that may be in one or more series with
        the same or various maturities, at par, at a premium,\nor at a discount. (Section
        2.1) We will set forth in a prospectus supplement (including any pricing supplement
        or term sheet) relating\nto any series of debt securities being offered, the
        aggregate principal amount and the following terms of the debt securities,
        if applicable:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        title and ranking of the debt securities (including the terms of any subordination
        provisions);</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        price or prices (expressed as a percentage of the principal amount) at which
        we will sell the debt\nsecurities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">any limit on the aggregate principal amount
        of the debt securities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the date or dates on which the principal of
        the securities of the series is payable;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the rate or rates (which may be fixed or variable)
        per annum or the method used to determine the rate\nor rates (including any
        commodity, commodity index, stock exchange index or financial index) at which
        the debt securities will bear interest,\nthe date or dates from which interest
        will accrue, the date or dates on which interest will commence and be payable
        and any regular record\ndate for the interest payable on any interest payment
        date;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        place or places where principal of, and interest, if any, on the debt securities
        will be payable (and\nthe method of such payment), where the securities of
        such series may be surrendered for registration of transfer or exchange, and
        where\nnotices and demands to us in respect of the debt securities may be
        delivered;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n\n<!--
        Field: Page; Sequence: 13; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->10<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the period or periods within which, the price or prices at which
        and the terms and conditions upon which\nwe may redeem the debt securities;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">any obligation
        we have to redeem or purchase the debt securities pursuant to any sinking
        fund or analogous\nprovisions or at the option of a holder of debt securities
        and the period or periods within which, the price or prices at which and in\nthe
        terms and conditions upon which securities of the series shall be redeemed
        or purchased, in whole or in part, pursuant to such obligation;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the dates on
        which and the price or prices at which we will repurchase debt securities
        at the option of\nthe holders of debt securities and other detailed terms
        and provisions of these repurchase obligations;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the denominations in which the debt securities
        will be issued, if other than denominations of $1,000 and\nany integral multiple
        thereof;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">whether
        the debt securities will be issued in the form of certificated debt securities
        or global debt\nsecurities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the portion of principal amount of the debt
        securities payable upon declaration of acceleration of the\nmaturity date,
        if other than the principal amount;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the currency of denomination of the debt securities,
        which may be United States Dollars or any foreign\ncurrency, and if such currency
        of denomination is a composite currency, the agency or organization, if any,
        responsible for overseeing\nsuch composite currency;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the designation
        of the currency, currencies or currency units in which payment of principal
        of, premium\nand interest on the debt securities will be made;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">if payments
        of principal of, premium or interest on the debt securities will be made in
        one or more currencies\nor currency units other than that or those in which
        the debt securities are denominated, the manner in which the exchange rate
        with respect\nto these payments will be determined;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the manner in
        which the amounts of payment of principal of, premium, if any, or interest
        on the debt securities\nwill be determined, if these amounts may be determined
        by reference to an index based on a currency or currencies or by reference
        to a\ncommodity, commodity index, stock exchange index or financial index;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">any provisions
        relating to any security provided for the debt securities;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">any addition
        to, deletion of or change in the Events of Default described in this prospectus
        or in the\nindenture with respect to the debt securities and any change in
        the acceleration provisions described in this prospectus or in the indenture\nwith
        respect to the debt securities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">any addition to, deletion of or change in the
        covenants described in this prospectus or in the indenture\nwith respect to
        the debt securities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">any depositaries, interest rate calculation
        agents, exchange rate calculation agents or other agents with\nrespect to
        the debt securities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the provisions, if any, relating to conversion
        or exchange of any debt securities of such series, including\nif applicable,
        the conversion or exchange price and period, provisions as to whether conversion
        or exchange will be mandatory, the events\nrequiring an adjustment of the
        conversion or exchange price and provisions affecting conversion or exchange;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n\n<!-- Field: Page;
        Sequence: 14; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align: center; font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->11<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">any other terms of the debt securities, which may supplement, modify
        or delete any provision of the indenture\nas it applies to that series, including
        any terms that may be required under applicable law or regulations or advisable
        in connection\nwith the marketing of the securities; and</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">whether any
        of our direct or indirect subsidiaries will guarantee the debt securities
        of that series,\nincluding the terms of subordination, if any, of such guarantees.
        (Section 2.2)</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We may issue debt securities\nthat provide for
        an amount less than their stated principal amount to be due and payable upon
        declaration of acceleration of their maturity\npursuant to the terms of the
        indenture. We will provide you with information on the federal income tax
        considerations and other special\nconsiderations applicable to any of these
        debt securities in the applicable prospectus supplement.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">If we denominate
        the purchase\nprice of any of the debt securities in a foreign currency or
        currencies or a foreign currency unit or units, or if the principal of and\nany
        premium and interest on any series of debt securities is payable in a foreign
        currency or currencies or a foreign currency unit or\nunits, we will provide
        you with information on the restrictions, elections, general tax considerations,
        specific terms and other information\nwith respect to that issue of debt securities
        and such foreign currency or currencies or foreign currency unit or units
        in the applicable\nprospectus supplement.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Transfer and Exchange</B></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Each debt security
        will be\nrepresented by either one or more global securities registered in
        the name of The Depository Trust Company (the &ldquo;Depositary&rdquo;),\nor
        a nominee of the Depositary (we will refer to any debt security represented
        by a global debt security as a &ldquo;book-entry debt security&rdquo;),\nor
        a certificate issued in definitive registered form (we will refer to any debt
        security represented by a certificated security as a\n&ldquo;certificated
        debt security&rdquo;) as set forth in the applicable prospectus supplement.
        Except as set forth under the heading\n&ldquo;Global Debt Securities and Book-Entry
        System&rdquo; below, book-entry debt securities will not be issuable in certificated
        form.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>Certificated Debt Securities</I>.\nYou may transfer or exchange
        certificated debt securities at any office we maintain for this purpose in
        accordance with the terms of the\nindenture. (Section 2.4) No service charge
        will be made for any transfer or exchange of certificated debt securities,
        but we may require\npayment of a sum sufficient to cover any tax or other
        governmental charge payable in connection with a transfer or exchange. (Section\n2.7)</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">You
        may affect the transfer\nof certificated debt securities and the right to
        receive the principal of, premium and interest on certificated debt securities
        only by\nsurrendering the certificate representing those certificated debt
        securities and either reissuance by us or the trustee of the certificate\nto
        the new holder or the issuance by us or the trustee of a new certificate to
        the new holder.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>&nbsp;</I></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><I>Global Debt Securities\nand Book-Entry System</I>.
        Each global debt security representing book-entry debt securities will be
        deposited with, or on behalf of,\nthe Depositary, and registered in the name
        of the Depositary or a nominee of the Depositary. Please see &ldquo;Global
        Securities.&rdquo;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Covenants</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        will set forth in the\napplicable prospectus supplement any restrictive covenants
        applicable to any issue of debt securities. (Article IV)</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>No Protection in the Event of a Change of Control</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Unless
        we state otherwise\nin the applicable prospectus supplement, the debt securities
        will not contain any provisions which may afford holders of the debt securities\nprotection
        in the event we have a change in control or in the event of a highly leveraged
        transaction (whether or not such transaction\nresults in a change in control)
        which could adversely affect holders of debt securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n\n<!--
        Field: Page; Sequence: 15; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->12<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Consolidation, Merger and Sale
        of Assets</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We may not consolidate with\nor merge with or
        into, or convey, transfer or lease all or substantially all of our properties
        and assets to any person (a &ldquo;successor\nperson&rdquo;) unless:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">we are the surviving corporation or the successor person (if other
        than GCM Grosvenor) is a corporation,\npartnership, trust or other entity
        organized and validly existing under the laws of any U.S. domestic jurisdiction
        and expressly assumes\nour obligations on the debt securities and under the
        indenture; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">immediately after giving effect to the transaction,
        no Default or Event of Default, shall have occurred\nand be continuing.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Notwithstanding
        the above,\nany of our subsidiaries may consolidate with, merge into or transfer
        all or part of its properties to us. (Section 5.1)</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Events of Default</B></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Unless otherwise set forth\nin the applicable
        prospectus supplement, &ldquo;Event of Default&rdquo; means with respect to
        any series of debt securities, any of the\nfollowing:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">default in the payment of any interest upon any debt security of
        that series when it becomes due and payable,\nand continuance of such default
        for a period of 30 days (unless the entire amount of the payment is deposited
        by us with the trustee or\nwith a paying agent prior to the expiration of
        the 30-day period);</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">default in the payment of principal of any security
        of that series at its maturity;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">default in the performance or breach of any other covenant or warranty
        by us in the indenture (other than\na covenant or warranty that has been included
        in the indenture solely for the benefit of a series of debt securities other
        than that series),\nwhich default continues uncured for a period of 60 days
        after we receive written notice from the trustee or GCM Grosvenor and the
        trustee\nreceive written notice from the holders of not less than 30% in principal
        amount of the outstanding debt securities of that series as\nprovided in the
        indenture; or</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">certain voluntary or involuntary events of bankruptcy,
        insolvency or reorganization of GCM Grosvenor (Section\n6.1).</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">No
        Event of Default with\nrespect to a particular series of debt securities (except
        as to certain events of bankruptcy, insolvency or reorganization) necessarily\nconstitutes
        an Event of Default with respect to any other series of debt securities. (Section
        6.1) The occurrence of certain Events of\nDefault or an acceleration under
        the indenture may constitute an event of default under certain indebtedness
        of ours or our subsidiaries\noutstanding from time to time.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We will provide the
        trustee\nwritten notice of any Default or Event of Default within 30 days
        of becoming aware of the occurrence of such Default or Event of Default,\nwhich
        notice will describe in reasonable detail the status of such Default or Event
        of Default and what action we are taking or propose\nto take in respect thereof.
        (Section 6.1)</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">If an Event of Default with\nrespect to debt
        securities of any series at the time outstanding occurs and is continuing,
        then the trustee or the holders of not less\nthan 30% in principal amount
        of the outstanding debt securities of that series may, by a notice in writing
        to us (and to the trustee if\ngiven by the holders), declare to be due and
        payable immediately the principal of (or, if the debt securities of that series
        are discount\nsecurities, that portion of the principal amount as may be specified
        in the terms of that series) and accrued and unpaid interest, if\nany, on
        all debt securities of that series. In the case of an Event of Default resulting
        from certain events of bankruptcy, insolvency\nor reorganization, the principal
        (or such specified amount) of and accrued and unpaid interest, if any, on
        all outstanding debt securities\nwill become and be immediately due and payable
        without any declaration or other act on the part of the trustee or any holder
        of outstanding\ndebt securities. At any time after a declaration of acceleration
        with respect to debt securities of any series has been made, but before\na
        judgment or decree for payment of the money due has been obtained by the trustee,
        the holders of a majority in principal amount of the\noutstanding debt securities
        of that series may rescind and annul the acceleration if all Events of Default,
        other than the non-payment\nof accelerated principal and interest, if any,
        with respect to debt securities of that series, have been cured or waived
        as provided in\nthe indenture. (Section 6.2) We refer you to the prospectus
        supplement relating to any series of debt securities that are discount securities\nfor
        the particular provisions relating to acceleration of a portion of the principal
        amount of such discount securities upon the occurrence\nof an Event of Default.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        16; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->13<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The indenture provides
        that\nthe trustee may refuse to perform any duty or exercise any of its rights
        or powers under the indenture unless the trustee receives indemnity\nsatisfactory
        to it against any cost, liability or expense which might be incurred by it
        in performing such duty or exercising such right\nor power. (Section 7.1(e))
        Subject to certain rights of the trustee, the holders of a majority in principal
        amount of the outstanding\ndebt securities of any series will have the right
        to direct the time, method and place of conducting any proceeding for any
        remedy available\nto the trustee or exercising any trust or power conferred
        on the trustee with respect to the debt securities of that series. (Section\n6.12)</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">No
        holder of any debt security\nof any series will have any right to institute
        any proceeding, judicial or otherwise, with respect to the indenture or for
        the appointment\nof a receiver or trustee, or for any remedy under the indenture,
        unless:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">that holder has previously given to the trustee
        written notice of a continuing Event of Default with respect\nto debt securities
        of that series; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">the holders of not less than 30% in principal
        amount of the outstanding debt securities of that series\nhave made written
        request, and offered indemnity or security satisfactory to the trustee, to
        the trustee to institute the proceeding as\ntrustee, and the trustee has not
        received from the holders of not less than a majority in principal amount
        of the outstanding debt securities\nof that series a direction inconsistent
        with that request and has failed to institute the proceeding within 60 days.
        (Section 6.7)</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Notwithstanding any other\nprovision in the
        indenture, the holder of any debt security will have an absolute and unconditional
        right to receive payment of the principal\nof, premium and any interest on
        that debt security on or after the due dates expressed in that debt security
        and to institute suit for\nthe enforcement of payment. (Section 6.8)</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        indenture requires us,\nwithin 120 days after the end of our fiscal year,
        to furnish to the trustee a statement as to compliance with the indenture.
        (Section\n4.3) If a Default or Event of Default occurs and is continuing with
        respect to the securities of any series and if it is known to a responsible\nofficer
        of the trustee, the trustee shall mail to each Securityholder of the securities
        of that series notice of a Default or Event of\nDefault within 90 days after
        it occurs or, if later, after a responsible officer of the trustee has knowledge
        of such Default or Event\nof Default. The indenture provides that the trustee
        may withhold notice to the holders of debt securities of any series of any
        Default\nor Event of Default (except in payment on any debt securities of
        that series) with respect to debt securities of that series if the trustee\ndetermines
        in good faith that withholding notice is in the interest of the holders of
        those debt securities. (Section 7.5)</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Modification and Waiver </B></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We and the trustee
        may modify,\namend or supplement the indenture or the debt securities of any
        series without the consent of any holder of any debt security:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">to cure any ambiguity, defect or inconsistency;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to comply with
        covenants in the indenture described above under the heading &ldquo;Consolidation,
        Merger\nand Sale of Assets&rdquo;;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">to provide for uncertificated securities in
        addition to or in place of certificated securities;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to add guarantees
        with respect to debt securities of any series or secure debt securities of
        any series;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n\n<!--
        Field: Page; Sequence: 17; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->14<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">to surrender any of our rights or powers under the indenture;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to add covenants
        or events of default for the benefit of the holders of debt securities of
        any series;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to
        comply with the applicable procedures of the applicable depositary;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to make any
        change that does not materially adversely affect the rights of any holder
        of debt securities;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align:
        justify; width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to
        provide for the issuance of and establish the form and terms and conditions
        of debt securities of any\nseries as permitted by the indenture;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to effect the
        appointment of a successor trustee with respect to the debt securities of
        any series and\nto add to or change any of the provisions of the indenture
        to provide for or facilitate administration by more than one trustee; or</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">to comply with
        requirements of the SEC in order to effect or maintain the qualification of
        the indenture\nunder the Trust Indenture Act. (Section 9.1)</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        may also modify and amend\nthe indenture with the consent of the holders of
        at least a majority in principal amount of the outstanding debt securities
        of each series\naffected by the modifications or amendments. We may not make
        any modification or amendment without the consent of the holders of each\naffected
        debt security then outstanding if that amendment will:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">reduce the amount of debt securities whose holders
        must consent to an amendment, supplement or waiver;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">reduce the rate
        of or extend the time for payment of interest (including default interest)
        on any debt\nsecurity;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align: justify;
        width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">reduce the principal of or premium on or change
        the fixed maturity of any debt security or reduce the\namount of, or postpone
        the date fixed for, the payment of any sinking fund or analogous obligation
        with respect to any series of debt\nsecurities;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">reduce the principal amount of discount securities
        payable upon acceleration of maturity;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">waive a default in the payment of the principal
        of, premium or interest on any debt security (except a\nrescission of acceleration
        of the debt securities of any series by the holders of at least a majority
        in aggregate principal amount of\nthe then outstanding debt securities of
        that series and a waiver of the payment default that resulted from such acceleration);</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"text-align: justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify;
        width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">make the principal
        of or premium or interest on any debt security payable in currency other than
        that\nstated in the debt security;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">make any change to certain provisions of the
        indenture relating to, among other things, the right of holders\nof debt securities
        to receive payment of the principal of, premium and interest on those debt
        securities and to institute suit for the\nenforcement of any such payment
        and to waivers or amendments; or</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"text-align:
        justify; width: 0.5in\"></TD><TD STYLE=\"text-align: justify; width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">waive a redemption payment with respect to any
        debt security. (Section 9.3)</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Except for certain
        specified\nprovisions, the holders of at least a majority in principal amount
        of the outstanding debt securities of any series may on behalf of the\nholders
        of all debt securities of that series waive our compliance with provisions
        of the indenture. (Section 9.2) The holders of a majority\nin principal amount
        of the outstanding debt securities of any series may on behalf of the holders
        of all the debt securities of such series\nwaive any past default under the
        indenture with respect to that series and its consequences, except a default
        in the payment of the principal\nof, premium or any interest on any debt security
        of that series; provided, however, that the holders of a majority in principal
        amount\nof the outstanding debt securities of any series may rescind an acceleration
        and its consequences, including any related payment default\nthat resulted
        from the acceleration. (Section 6.13)</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n\n<!--
        Field: Page; Sequence: 18; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->15<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Defeasance of Debt Securities
        and Certain Covenants\nin Certain Circumstances </B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><I>Legal Defeasance</I>.\nThe
        indenture provides that, unless otherwise provided by the terms of the applicable
        series of debt securities, we may be discharged\nfrom any and all obligations
        in respect of the debt securities of any series (subject to certain exceptions).
        We will be so discharged\nupon the irrevocable deposit with the trustee, in
        trust, of money and/or U.S. government obligations or, in the case of debt
        securities\ndenominated in a single currency other than U.S. Dollars, government
        obligations of the government that issued or caused to be issued\nsuch currency,
        that, through the payment of interest and principal in accordance with their
        terms, will provide money or U.S. government\nobligations in an amount sufficient
        in the opinion of a nationally recognized firm of independent public accountants
        or investment bank\nto pay and discharge each installment of principal, premium
        and interest on and any mandatory sinking fund payments in respect of the\ndebt
        securities of that series on the stated maturity of those payments in accordance
        with the terms of the indenture and those debt securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">This discharge may
        occur\nonly if, among other things, we have delivered to the trustee an opinion
        of counsel stating that we have received from, or there has been\npublished
        by, the United States Internal Revenue Service a ruling or, since the date
        of execution of the indenture, there has been a change\nin the applicable
        United States federal income tax law, in either case to the effect that, and
        based thereon such opinion shall confirm\nthat, the holders of the debt securities
        of that series will not recognize income, gain or loss for United States federal
        income tax purposes\nas a result of the deposit, defeasance and discharge
        and will be subject to United States federal income tax on the same amounts
        and in\nthe same manner and at the same times as would have been the case
        if the deposit, defeasance and discharge had not occurred. (Section\n8.3)</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><I>Defeasance of Certain\nCovenants</I>. The indenture provides that,
        unless otherwise provided by the terms of the applicable series of debt securities,
        upon compliance\nwith certain conditions:</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">we may
        omit to comply with the covenant described under the heading &ldquo;Consolidation,
        Merger and Sale\nof Assets&rdquo; and certain other covenants set forth in
        the indenture, as well as any additional covenants which may be set forth
        in\nthe applicable prospectus supplement; and</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">any omission to comply with those covenants will not constitute
        a Default or an Event of Default with\nrespect to the debt securities of that
        series (&ldquo;covenant defeasance&rdquo;).</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The conditions include:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">depositing with the trustee money and/or U.S. government obligations
        or, in the case of debt securities\ndenominated in a single currency other
        than U.S. Dollars, government obligations of the government that issued or
        caused to be issued\nsuch currency, that, through the payment of interest
        and principal in accordance with their terms, will provide money in an amount
        sufficient\nin the opinion of a nationally recognized firm of independent
        public accountants or investment bank to pay and discharge each installment\nof
        principal of, premium and interest on and any mandatory sinking fund payments
        in respect of the debt securities of that series on the\nstated maturity of
        those payments in accordance with the terms of the indenture and those debt
        securities; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">delivering to the trustee an opinion of counsel
        to the effect that the holders of the debt securities\nof that series will
        not recognize income, gain or loss for United States federal income tax purposes
        as a result of the deposit and related\ncovenant defeasance and will be subject
        to United States federal income tax on the same amounts and in the same manner
        and at the same\ntimes as would have been the case if the deposit and related
        covenant defeasance had not occurred. (Section 8.4)</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0in\"><B>&nbsp;</B></P>\n\n\n<!-- Field: Page; Sequence:
        19; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->16<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0in\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0in\"><B>No Personal Liability
        of\nDirectors, Officers, Employees or Securityholders</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">None of our past,
        present\nor future directors, officers, employees or securityholders, as such,
        will have any liability for any of our obligations under the debt\nsecurities
        or the indenture or for any claim based on, or in respect or by reason of,
        such obligations or their creation. By accepting\na debt security, each holder
        waives and releases all such liability. This waiver and release is part of
        the consideration for the issue\nof the debt securities. However, this waiver
        and release may not be effective to waive liabilities under U.S. federal securities
        laws,\nand it is the view of the SEC that such a waiver is against public
        policy.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Governing
        Law </B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The indenture and the debt\nsecurities, including any claim or controversy
        arising out of or relating to the indenture or the securities, will be governed
        by the\nlaws of the State of New York.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The indenture will provide that we, the trustee\nand
        the holders of the debt securities (by their acceptance of the debt securities)
        irrevocably waive, to the fullest extent permitted\nby applicable law, any
        and all right to trial by jury in any legal proceeding arising out of or relating
        to the indenture, the debt securities\nor the transactions contemplated thereby.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The
        indenture will provide\nthat any legal suit, action or proceeding arising
        out of or based upon the indenture or the transactions contemplated thereby
        may be instituted\nin the federal courts of the United States of America located
        in the City of New York or the courts of the State of New York in each case\nlocated
        in the City of New York, and we, the trustee and the holder of the debt securities
        (by their acceptance of the debt securities)\nirrevocably submit to the non-exclusive
        jurisdiction of such courts in any such suit, action or proceeding. The indenture
        will further\nprovide that service of any process, summons, notice or document
        by mail (to the extent allowed under any applicable statute or rule of\ncourt)
        to such party&rsquo;s address set forth in the indenture will be effective
        service of process for any suit, action or other proceeding\nbrought in any
        such court. The indenture will further provide that we, the trustee and the
        holders of the debt securities (by their acceptance\nof the debt securities)
        irrevocably and unconditionally waive any objection to the laying of venue
        of any suit, action or other proceeding\nin the courts specified above and
        irrevocably and unconditionally waive and agree not to plead or claim any
        such suit, action or other\nproceeding has been brought in an inconvenient
        forum. (Section 10.10)</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n\n<!--
        Field: Page; Sequence: 20; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->17<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: center; text-indent: 0in\"><A
        NAME=\"gcm_008\"></A>DESCRIPTION OF DEPOSITARY\nSHARES</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We may, at our option, elect\nto offer depositary
        shares rather than full shares of preferred stock. Each depositary share will
        represent ownership of and entitlement\nto all rights and preferences of a
        fraction of a share of preferred stock of a specified series (including dividend,
        voting, redemption\nand liquidation rights). The applicable fraction will
        be specified in a prospectus supplement. The shares of preferred stock represented\nby
        the depositary shares will be deposited with a depositary named in the applicable
        prospectus supplement, under a deposit agreement\namong us, the depositary
        and the holders of the certificates evidencing depositary shares (&ldquo;depositary
        receipts&rdquo;). Depositary\nreceipts will be delivered to those persons
        purchasing depositary shares in the offering. The depositary will be the transfer
        agent, registrar\nand dividend disbursing agent for the depositary shares.
        Holders of depositary receipts agree to be bound by the deposit agreement,
        which\nrequires holders to take certain actions such as filing proof of residence
        and paying certain charges.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The summary of the terms of\nthe depositary shares contained in this
        prospectus does not purport to be complete and is subject to, and qualified
        in its entirety by,\nthe provisions of the deposit agreement and the Charter
        and the certificate of designation that are, or will be, filed with the SEC
        for\nthe applicable series of preferred stock.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Dividends</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The depositary will distribute\nall cash dividends or other cash distributions
        received in respect of the series of preferred stock represented by the depositary
        shares\nto the record holders of depositary receipts in proportion to the
        number of depositary shares owned by such holders on the relevant record\ndate,
        which will be the same date as the record date fixed by us for the applicable
        series of preferred stock. The depositary, however,\nwill distribute only
        such amount as can be distributed without attributing to any depositary share
        a fraction of one cent, and any balance\nnot so distributed will be added
        to and treated as part of the next sum received by the depositary for distribution
        to record holders\nof depositary receipts then outstanding.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">In the event of a distribution\nother than in
        cash, the depositary will distribute property received by it to the record
        holders of depositary receipts entitled thereto,\nin proportion, as nearly
        as may be practicable, to the number of depositary shares owned by such holders
        on the relevant record date,\nunless the depositary determines (after consultation
        with us) that it is not feasible to make such distribution, in which case
        the depositary\nmay (with our approval) adopt any other method for such distribution
        as it deems equitable and appropriate, including the sale of such\nproperty
        (at such place or places and upon such terms as it may deem equitable and
        appropriate) and distribution of the net proceeds from\nsuch sale to such
        holders.</P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Liquidation
        Preference</B></P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">In the event of the liquidation,\ndissolution
        or winding up of the affairs of GCM Grosvenor, whether voluntary or involuntary,
        the holders of each depositary share will\nbe entitled to the fraction of
        the liquidation preference accorded each share of the applicable series of
        preferred stock as set forth\nin the applicable prospectus supplement.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Redemption</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">If the series of preferred\nstock represented
        by the applicable series of depositary shares is redeemable, such depositary
        shares will be redeemed from the proceeds\nreceived by the depositary resulting
        from the redemption, in whole or in part, of the preferred stock held by the
        depositary. Whenever\nwe redeem any preferred stock held by the depositary,
        the depositary will redeem as of the same redemption date the number of depositary\nshares
        representing the shares of preferred stock so redeemed. The depositary will
        mail the notice of redemption promptly upon receipt\nof such notice from us
        and not less than 30 nor more than 60 days prior to the date fixed for redemption
        of the preferred stock and the\ndepositary shares to the record holders of
        the depositary receipts.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"><B></B></P>\n\n<!-- Field: Page; Sequence:
        21; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->18<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Voting</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Promptly upon receipt of notice\nof any meeting
        at which the holders of the series of preferred stock represented by the applicable
        series of depositary shares are entitled\nto vote, the depositary will mail
        the information contained in such notice of meeting to the record holders
        of the depositary receipts\nas of the record date for such meeting. Each such
        record holder of depositary receipts will be entitled to instruct the depositary
        as\nto the exercise of the voting rights pertaining to the number of shares
        of preferred stock represented by such record holder&rsquo;s depositary\nshares.
        The depositary will endeavor, insofar as practicable, to vote such preferred
        stock represented by such depositary shares in accordance\nwith such instructions,
        and we will agree to take all action which may be deemed necessary by the
        depositary in order to enable the depositary\nto do so. The depositary will
        abstain from voting any of the preferred stock to the extent that it does
        not receive specific instructions\nfrom the holders of depositary receipts.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><B>Withdrawal of Preferred Stock</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Upon surrender of
        depositary\nreceipts at the principal office of the depositary and payment
        of any unpaid amount due the depositary, and subject to the terms of the\ndeposit
        agreement, the owner of the depositary shares evidenced thereby is entitled
        to delivery of the number of whole shares of preferred\nstock and all money
        and other property, if any, represented by such depositary shares. Partial
        shares of preferred stock will not be issued.\nIf the depositary receipts
        delivered by the holder evidence a number of depositary shares in excess of
        the number of depositary shares\nrepresenting the number of whole shares of
        preferred stock to be withdrawn, the depositary will deliver to such holder
        at the same time\na new depositary receipt evidencing such excess number of
        depositary shares. Holders of preferred stock thus withdrawn will not thereafter\nbe
        entitled to deposit such shares under the deposit agreement or to receive
        depositary receipts evidencing depositary shares therefor.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Amendment and Termination of Deposit Agreement</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The form of depositary
        receipt\nevidencing the depositary shares and any provision of the deposit
        agreement may at any time and from time to time be amended by agreement\nbetween
        us and the depositary. However, any amendment which materially and adversely
        alters the rights of the holders (other than any\nchange in fees) of depositary
        shares will not be effective unless such amendment has been approved by at
        least a majority of the depositary\nshares then outstanding. No such amendment
        may impair the right, subject to the terms of the deposit agreement, of any
        owner of any depositary\nshares to surrender the depositary receipt evidencing
        such depositary shares with instructions to the depositary to deliver to the
        holder\nof the preferred stock and all money and other property, if any, represented
        thereby, except in order to comply with mandatory provisions\nof applicable
        law.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The deposit agreement will\nbe permitted to be terminated by us upon
        not less than 30 days prior written notice to the applicable depositary if
        a majority of each\nseries of preferred stock affected by such termination
        consents to such termination, whereupon such depositary will be required to
        deliver\nor make available to each holder of depositary receipts, upon surrender
        of the depositary receipts held by such holder, such number of\nwhole or fractional
        shares of preferred stock as are represented by the depositary shares evidenced
        by such depositary receipts together\nwith any other property held by such
        depositary with respect to such depositary receipts. In addition, the deposit
        agreement will automatically\nterminate if (a) all outstanding depositary
        shares thereunder shall have been redeemed, (b) there shall have been a final
        distribution\nin respect of the related preferred stock in connection with
        any liquidation, dissolution or winding-up of GCM Grosvenor and such distribution\nshall
        have been distributed to the holders of depositary receipts evidencing the
        depositary shares representing such preferred stock or\n(c) each share of
        the related preferred stock shall have been converted into stock of GCM Grosvenor
        not so represented by depositary shares.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>Charges of Depositary</B></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We will pay all transfer and\nother taxes and
        governmental charges arising solely from the existence of the depositary arrangements.
        We will pay charges of the depositary\nin connection with the initial deposit
        of the preferred stock and initial issuance of the depositary shares, and
        redemption of the preferred\nstock and all withdrawals of preferred stock
        by owners of depositary shares. Holders of depositary receipts will pay transfer,
        income\nand other taxes and governmental charges and certain other charges
        as are provided in the deposit agreement to be for their accounts.\nIn certain
        circumstances, the depositary may refuse to transfer depositary shares, may
        withhold dividends and distributions and sell the\ndepositary shares evidenced
        by such depositary receipt if such charges are not paid. The applicable prospectus
        supplement will include\ninformation with respect to fees and charges, if
        any, in connection with the deposit or substitution of the underlying securities,
        the\nreceipt and distribution of dividends, the sale or exercise of rights,
        the withdrawal of the underlying security, and the transferring,\nsplitting
        or grouping of receipts. The applicable prospectus supplement will also include
        information with respect to the right to collect\nthe fees and charges, if
        any, against dividends received and deposited securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n\n\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 22; Value: 1 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic;
        Name: PageNo -->19<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>Miscellaneous</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The depositary will
        forward\nto the holders of depositary receipts all notices, reports and proxy
        soliciting material from us which are delivered to the depositary\nand which
        we are required to furnish to the holders of the preferred stock. In addition,
        the depositary will make available for inspection\nby holders of depositary
        receipts at the principal office of the depositary, and at such other places
        as it may from time to time deem\nadvisable, any notices, reports and proxy
        soliciting material received from us which are received by the depositary
        as the holder of preferred\nstock. The applicable prospectus supplement will
        include information about the rights, if any, of holders of receipts to inspect
        the transfer\nbooks of the depositary and the list of holders of receipts.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Neither
        the depositary nor\nGCM Grosvenor assumes any obligation or will be subject
        to any liability under the deposit agreement to holders of depositary receipts\nother
        than for its negligence or willful misconduct. Neither the depositary nor
        GCM Grosvenor will be liable if it is prevented or delayed\nby law or any
        circumstance beyond its control in performing its obligations under the deposit
        agreement. The obligations of GCM Grosvenor\nand the depositary under the
        deposit agreement will be limited to performance in good faith of their duties
        thereunder, and they will\nnot be obligated to prosecute or defend any legal
        proceeding in respect of any depositary shares or preferred stock unless satisfactory\nindemnity
        is furnished. GCM Grosvenor and the depositary may rely on written advice
        of counsel or accountants, on information provided\nby holders of the depositary
        receipts or other persons believed in good faith to be competent to give such
        information and on documents\nbelieved to be genuine and to have been signed
        or presented by the proper party or parties.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">In the event the depositary\nshall receive conflicting
        claims, requests or instructions from any holders of depositary receipts,
        on the one hand, and us, on the other\nhand, the depositary shall be entitled
        to act on such claims, requests or instructions received from us.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><B>Resignation and Removal of Depositary</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The depositary
        may resign\nat any time by delivering to us notice of its election to do so,
        and we may at any time remove the depositary, any such resignation or\nremoval
        to take effect upon the appointment of a successor depositary and its acceptance
        of such appointment. Such successor depositary\nmust be appointed within 60
        days after delivery of the notice for resignation or removal and must be a
        bank or trust company having its\nprincipal office in the United States and
        having a combined capital and surplus of at least $150,000,000.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        23; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->20<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: small-caps
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><A NAME=\"gcm_009\"></A>DESCRIPTION OF WARRANTS</P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We
        may issue warrants for\nthe purchase of shares of our common stock or preferred
        stock or of debt securities. We may issue warrants independently or together
        with\nother securities, and the warrants may be attached to or separate from
        any offered securities. Each series of warrants will be issued\nunder a separate
        warrant agreement to be entered into between us and the investors or a warrant
        agent. The following summary of material\nprovisions of the warrants and warrant
        agreements are subject to, and qualified in their entirety by reference to,
        all the provisions\nof the warrant agreement and warrant certificate applicable
        to a particular series of warrants. The terms of any warrants offered under\na
        prospectus supplement may differ from the terms described below. We urge you
        to read the applicable prospectus supplement and any related\nfree writing
        prospectus, as well as the complete warrant agreements and warrant certificates
        that contain the terms of the warrants.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The particular terms of any\nissue of warrants
        will be described in the prospectus supplement relating to the issue. Those
        terms may include:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the number of shares of common stock or preferred stock purchasable
        upon the exercise of warrants to purchase\nsuch shares and the price at which
        such number of shares may be purchased upon such exercise;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        designation, stated value and terms (including, without limitation, liquidation,
        dividend, conversion\nand voting rights) of the series of preferred stock
        purchasable upon exercise of warrants to purchase preferred stock;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        principal amount of debt securities that may be purchased upon exercise of
        a debt warrant and the\nexercise price for the warrants, which may be payable
        in cash, securities or other property;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-right: 0; margin-bottom:
        0pt; text-align: left\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the date, if any, on and after which the warrants and the related
        debt securities, preferred stock or\ncommon stock will be separately transferable;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-right:
        0; margin-bottom: 0pt; text-align: left\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the terms of any rights to redeem or call the warrants;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-right:
        0; margin-bottom: 0pt; text-align: left\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the date on which the right to exercise the warrants will commence
        and the date on which the right will\nexpire;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">United States Federal income tax consequences
        applicable to the warrants; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin-top: 0pt; margin-right: 0; margin-bottom:
        0pt; text-align: left\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">any additional terms of the warrants, including terms, procedures,
        and limitations relating to the exchange,\nexercise and settlement of the
        warrants.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Holders of equity warrants\nwill not be entitled:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-right: 0; margin-bottom:
        0pt; text-align: left\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">to vote, consent or receive dividends;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">receive notice as shareholders with respect
        to any meeting of shareholders for the election of our directors\nor any other
        matter; or&#9;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">exercise any rights as shareholders of GCM Grosvenor.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Each warrant will
        entitle\nits holder to purchase the principal amount of debt securities or
        the number of shares of preferred stock or common stock at the exercise\nprice
        set forth in, or calculable as set forth in, the applicable prospectus supplement.
        Unless we otherwise specify in the applicable\nprospectus supplement, holders
        of the warrants may exercise the warrants at any time up to the specified
        time on the expiration date that\nwe set forth in the applicable prospectus
        supplement. After the close of business on the expiration date, unexercised
        warrants will become\nvoid.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">A holder of warrant certificates\nmay exchange
        them for new warrant certificates of different denominations, present them
        for registration of transfer and exercise them\nat the corporate trust office
        of the warrant agent or any other office indicated in the applicable prospectus
        supplement. Until any warrants\nto purchase debt securities are exercised,
        the holder of the warrants will not have any rights of holders of the debt
        securities that\ncan be purchased upon exercise, including any rights to receive
        payments of principal, premium or interest on the underlying debt securities\nor
        to enforce covenants in the applicable indenture. Until any warrants to purchase
        common stock or preferred stock are exercised, the\nholders of the warrants
        will not have any rights of holders of the underlying common stock or preferred
        stock, including any rights to\nreceive dividends or payments upon any liquidation,
        dissolution or winding up on the common stock or preferred stock, if any.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        24; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->21<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center;
        text-indent: 0in\"><A NAME=\"gcm_010\"></A>DESCRIPTION OF PURCHASE\nCONTRACTS</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We may issue purchase
        contracts\nfor the purchase or sale of debt or equity securities issued by
        us. Each purchase contract will entitle the holder thereof to purchase\nor
        sell, and obligate us to sell or purchase, on specified dates, such securities
        at a specified purchase price, which may be based on\na formula, all as set
        forth in the applicable prospectus supplement. Any purchase contracts we issue
        will be physically settled by delivery\nof such securities. The applicable
        prospectus supplement will also specify the methods by which the holders may
        purchase or sell such\nsecurities and any acceleration, cancellation or termination
        provisions or other provisions relating to the settlement of a purchase contract.</P>\n\n\n\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\"><FONT STYLE=\"text-transform: uppercase\"><B>DESCRIPTION\nOF
        UNITS</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">We may issue
        units consisting\nof any combination of the other types of securities offered
        under this prospectus in one or more series. We may evidence each series of\nunits
        by unit certificates that we will issue under a separate agreement. We may
        enter into unit agreements with a unit agent. Each unit\nagent will be a bank
        or trust company that we select. We will indicate the name and address of
        the unit agent in the applicable prospectus\nsupplement relating to a particular
        series of units.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">The following description,\ntogether with the additional information
        included in any applicable prospectus supplement, summarizes the general features
        of the units\nthat we may offer under this prospectus. You should read any
        prospectus supplement and any free writing prospectus that we may authorize\nto
        be provided to you related to the series of units being offered, as well as
        the complete unit agreements that contain the terms of\nthe units. Specific
        unit agreements will contain additional important terms and provisions and
        we will file as an exhibit to the registration\nstatement of which this prospectus
        is a part, or will incorporate by reference from another report that we file
        with the SEC, the form\nof each unit agreement relating to units offered under
        this prospectus.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">If we offer any units, certain\nterms of that series of units will
        be described in the applicable prospectus supplement, including, without limitation,
        the following,\nas applicable:</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">the title of the series of units;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">identification
        and description of the separate constituent securities comprising the units;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        price or prices at which the units will be issued;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">the
        date, if any, on and after which the constituent securities comprising the
        units will be separately\ntransferable;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">a discussion of certain United States federal
        income tax considerations applicable to the units; and</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">any
        other terms of the units and their constituent securities.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence:
        25; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->22<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center; text-indent:
        0in\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center; text-indent: 0in\"><A NAME=\"gcm_011\"></A>GLOBAL
        SECURITIES</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"><B>Book-Entry, Delivery and Form </B></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Unless we indicate
        differently\nin any applicable prospectus supplement or free writing prospectus,
        the securities initially will be issued in book-entry form and represented\nby
        one or more global notes or global securities (collectively, &ldquo;global
        securities&rdquo;). The global securities will be deposited\nwith, or on behalf
        of, The Depository Trust Company, New York, New York, as depositary (&ldquo;DTC&rdquo;),
        and registered in the name\nof Cede &amp; Co., the nominee of DTC. Unless
        and until it is exchanged for individual certificates evidencing securities
        under the limited\ncircumstances described below, a global security may not
        be transferred except as a whole by the depositary to its nominee or by the
        nominee\nto the depositary, or by the depositary or its nominee to a successor
        depositary or to a nominee of the successor depositary.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">DTC has advised us
        that it\nis:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 45pt; text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">a limited-purpose trust company organized under
        the New York Banking Law;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify; text-indent:
        -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD
        STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align: justify\">a &ldquo;banking
        organization&rdquo; within the meaning of the New York Banking Law;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">a member of the Federal Reserve System;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">a &ldquo;clearing corporation&rdquo; within the meaning of the New
        York Uniform Commercial Code; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">a &ldquo;clearing agency&rdquo; registered pursuant to the provisions
        of Section 17A of the Exchange Act.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">DTC holds securities
        that\nits participants deposit with DTC. DTC also facilitates the settlement
        among its participants of securities transactions, such as transfers\nand
        pledges, in deposited securities through electronic computerized book-entry
        changes in participants&rsquo; accounts, thereby eliminating\nthe need for
        physical movement of securities certificates. &ldquo;Direct participants&rdquo;
        in DTC include securities brokers and dealers,\nincluding underwriters, banks,
        trust companies, clearing corporations and other organizations. DTC is a wholly-owned
        subsidiary of The\nDepository Trust &amp; Clearing Corporation (&ldquo;DTCC&rdquo;).
        DTCC is the holding company for DTC, National Securities Clearing Corporation\nand
        Fixed Income Clearing Corporation, all of which are registered clearing agencies.
        DTCC is owned by the users of its regulated subsidiaries.\nAccess to the DTC
        system is also available to others, which we sometimes refer to as indirect
        participants, that clear through or maintain\na custodial relationship with
        a direct participant, either directly or indirectly. The rules applicable
        to DTC and its participants are\non file with the SEC.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Purchases of securities
        under\nthe DTC system must be made by or through direct participants, which
        will receive a credit for the securities on DTC&rsquo;s records.\nThe ownership
        interest of the actual purchaser of a security, which we sometimes refer to
        as a beneficial owner, is in turn recorded on\nthe direct and indirect participants&rsquo;
        records. Beneficial owners of securities will not receive written confirmation
        from DTC of\ntheir purchases. However, beneficial owners are expected to receive
        written confirmations providing details of their transactions, as\nwell as
        periodic statements of their holdings, from the direct or indirect participants
        through which they purchased securities. Transfers\nof ownership interests
        in global securities are to be accomplished by entries made on the books of
        participants acting on behalf of beneficial\nowners. Beneficial owners will
        not receive certificates representing their ownership interests in the global
        securities, except under\nthe limited circumstances described below.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">To
        facilitate subsequent\ntransfers, all global securities deposited by direct
        participants with DTC will be registered in the name of DTC&rsquo;s partnership
        nominee,\nCede &amp; Co., or such other name as may be requested by an authorized
        representative of DTC. The deposit of securities with DTC and\ntheir registration
        in the name of Cede &amp; Co. or such other nominee will not change the beneficial
        ownership of the securities. DTC\nhas no knowledge of the actual beneficial
        owners of the securities. DTC&rsquo;s records reflect only the identity of
        the direct participants\nto whose accounts the securities are credited, which
        may or may not be the beneficial owners. The participants are responsible
        for keeping\naccount of their holdings on behalf of their customers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">So
        long as the securities\nare in book-entry form, you will receive payments
        and may transfer securities only through the facilities of the depositary
        and its direct\nand indirect participants. We will maintain an office or agency
        in the location specified in the prospectus supplement for the applicable\nsecurities,
        where notices and demands in respect of the securities and the indenture may
        be delivered to us and where certificated securities\nmay be surrendered for
        payment, registration of transfer or exchange.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence: 26; Value: 1 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->23<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Conveyance
        of notices and\nother communications by DTC to direct participants, by direct
        participants to indirect participants and by direct participants and indirect\nparticipants
        to beneficial owners will be governed by arrangements among them, subject
        to any legal requirements in effect from time to\ntime.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Redemption notices
        will be\nsent to DTC. If less than all of the securities of a particular series
        are being redeemed, DTC&rsquo;s practice is to determine by lot\nthe amount
        of the interest of each direct participant in the securities of such series
        to be redeemed.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Neither DTC nor Cede &amp;\nCo. (or such other
        DTC nominee) will consent or vote with respect to the securities. Under its
        usual procedures, DTC will mail an omnibus\nproxy to us as soon as possible
        after the record date. The omnibus proxy assigns the consenting or voting
        rights of Cede &amp; Co. to\nthose direct participants to whose accounts the
        securities of such series are credited on the record date, identified in a
        listing attached\nto the omnibus proxy.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">So long as securities
        are\nin book-entry form, we will make payments on those securities to the
        depositary or its nominee, as the registered owner of such securities,\nby
        wire transfer of immediately available funds. If securities are issued in
        definitive certificated form under the limited circumstances\ndescribed below
        and unless if otherwise provided in the description of the applicable securities
        herein or in the applicable prospectus\nsupplement, we will have the option
        of making payments by check mailed to the addresses of the persons entitled
        to payment or by wire\ntransfer to bank accounts in the United States designated
        in writing to the applicable trustee or other designated party at least 15
        days\nbefore the applicable payment date by the persons entitled to payment,
        unless a shorter period is satisfactory to the applicable trustee\nor other
        designated party.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Redemption proceeds, distributions\nand dividend
        payments on the securities will be made to Cede &amp; Co., or such other nominee
        as may be requested by an authorized representative\nof DTC. DTC&rsquo;s practice
        is to credit direct participants&rsquo; accounts upon DTC&rsquo;s receipt
        of funds and corresponding detail\ninformation from us on the payment date
        in accordance with their respective holdings shown on DTC records. Payments
        by participants to\nbeneficial owners will be governed by standing instructions
        and customary practices, as is the case with securities held for the account\nof
        customers in bearer form or registered in &ldquo;street name.&rdquo; Those
        payments will be the responsibility of participants and\nnot of DTC or us,
        subject to any statutory or regulatory requirements in effect from time to
        time. Payment of redemption proceeds, distributions\nand dividend payments
        to Cede &amp; Co., or such other nominee as may be requested by an authorized
        representative of DTC, is our responsibility,\ndisbursement of payments to
        direct participants is the responsibility of DTC, and disbursement of payments
        to the beneficial owners is\nthe responsibility of direct and indirect participants.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Except
        under the limited\ncircumstances described below, purchasers of securities
        will not be entitled to have securities registered in their names and will
        not\nreceive physical delivery of securities. Accordingly, each beneficial
        owner must rely on the procedures of DTC and its participants to\nexercise
        any rights under the securities and the indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">The laws of some
        jurisdictions\nmay require that some purchasers of securities take physical
        delivery of securities in definitive form. Those laws may impair the ability\nto
        transfer or pledge beneficial interests in securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">DTC may discontinue
        providing\nits services as securities depositary with respect to the securities
        at any time by giving reasonable notice to us. Under such circumstances,\nin
        the event that a successor depositary is not obtained, securities certificates
        are required to be printed and delivered.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">As noted above, beneficial\nowners
        of a particular series of securities generally will not receive certificates
        representing their ownership interests in those securities.\nHowever, if:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">DTC notifies us that it is unwilling or unable to continue as a
        depositary for the global security or\nsecurities representing such series
        of securities or if DTC ceases to be a clearing agency registered under the
        Exchange Act at a time\nwhen it is required to be registered and a successor
        depositary is not appointed within 90 days of the notification to us or of
        our becoming\naware of DTC&rsquo;s ceasing to be so registered, as the case
        may be;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">we determine, in our sole discretion, not to have such securities
        represented by one or more global securities;\nor</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">an Event of Default has occurred and is continuing with respect
        to such series of securities,</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">we will prepare and deliver certificates for such\nsecurities in
        exchange for beneficial interests in the global securities. Any beneficial
        interest in a global security that is exchangeable\nunder the circumstances
        described in the preceding sentence will be exchangeable for securities in
        definitive certificated form registered\nin the names that the depositary
        directs. It is expected that these directions will be based upon directions
        received by the depositary\nfrom its participants with respect to ownership
        of beneficial interests in the global securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"></P>\n\n<!-- Field: Page; Sequence: 27; Value: 1 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1.5pt solid\"><P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->24<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><B><I>Euroclear and
        Clearstream</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">If so provided in the applicable\nprospectus
        supplement, you may hold interests in a global security through Clearstream
        Banking S.A., which we refer to as &ldquo;Clearstream,&rdquo;\nor Euroclear
        Bank S.A./N.V., as operator of the Euroclear System, which we refer to as
        &ldquo;Euroclear,&rdquo; either directly if you\nare a participant in Clearstream
        or Euroclear or indirectly through organizations which are participants in
        Clearstream or Euroclear.\nClearstream and Euroclear will hold interests on
        behalf of their respective participants through customers&rsquo; securities
        accounts\nin the names of Clearstream and Euroclear, respectively, on the
        books of their respective U.S. depositaries, which in turn will hold such\ninterests
        in customers&rsquo; securities accounts in such depositaries&rsquo; names
        on DTC&rsquo;s books.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Clearstream and Euroclear\nare securities clearance
        systems in Europe. Clearstream and Euroclear hold securities for their respective
        participating organizations\nand facilitate the clearance and settlement of
        securities transactions between those participants through electronic book-entry
        changes\nin their accounts, thereby eliminating the need for physical movement
        of certificates.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Payments, deliveries, transfers,\nexchanges,
        notices and other matters relating to beneficial interests in global securities
        owned through Euroclear or Clearstream must\ncomply with the rules and procedures
        of those systems. Transactions between participants in Euroclear or Clearstream,
        on one hand, and\nother participants in DTC, on the other hand, are also subject
        to DTC&rsquo;s rules and procedures.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Investors will be able to\nmake and receive
        through Euroclear and Clearstream payments, deliveries, transfers and other
        transactions involving any beneficial interests\nin global securities held
        through those systems only on days when those systems are open for business.
        Those systems may not be open for\nbusiness on days when banks, brokers and
        other institutions are open for business in the United States.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Cross-market transfers
        between\nparticipants in DTC, on the one hand, and participants in Euroclear
        or Clearstream, on the other hand, will be effected through DTC in\naccordance
        with the DTC&rsquo;s rules on behalf of Euroclear or Clearstream, as the case
        may be, by their respective U.S. depositaries;\nhowever, such cross-market
        transactions will require delivery of instructions to Euroclear or Clearstream,
        as the case may be, by the\ncounterparty in such system in accordance with
        the rules and procedures and within the established deadlines (European time)
        of such system.\nEuroclear or Clearstream, as the case may be, will, if the
        transaction meets its settlement requirements, deliver instructions to its\nU.S.
        depositary to take action to effect final settlement on its behalf by delivering
        or receiving interests in the global securities\nthrough DTC, and making or
        receiving payment in accordance with normal procedures for same-day fund settlement.
        Participants in Euroclear\nor Clearstream may not deliver instructions directly
        to their respective U.S. depositaries.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Due to time zone
        differences,\nthe securities accounts of a participant in Euroclear or Clearstream
        purchasing an interest in a global security from a direct participant\nin
        DTC will be credited, and any such crediting will be reported to the relevant
        participant in Euroclear or Clearstream, during the securities\nsettlement
        processing day (which must be a business day for Euroclear or Clearstream)
        immediately following the settlement date of DTC.\nCash received in Euroclear
        or Clearstream as a result of sales of interests in a global security by or
        through a participant in Euroclear\nor Clearstream to a direct participant
        in DTC will be received with value on the settlement date of DTC but will
        be available in the relevant\nEuroclear or Clearstream cash account only as
        of the business day for Euroclear or Clearstream following DTC&rsquo;s settlement
        date.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><B><I>Other</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">The information in this section\nof this prospectus
        concerning DTC, Clearstream, Euroclear and their respective book-entry systems
        has been obtained from sources that\nwe believe to be reliable, but we do
        not take responsibility for this information. This information has been provided
        solely as a matter\nof convenience. The rules and procedures of DTC, Clearstream
        and Euroclear are solely within the control of those organizations and could\nchange
        at any time. Neither we nor the trustee nor any agent of ours or of the trustee
        has any control over those entities and none of\nus takes any responsibility
        for their activities. You are urged to contact DTC, Clearstream and Euroclear
        or their respective participants\ndirectly to discuss those matters. In addition,
        although we expect that DTC, Clearstream and Euroclear will perform the foregoing
        procedures,\nnone of them is under any obligation to perform or continue to
        perform such procedures and such procedures may be discontinued at any\ntime.
        Neither we nor any agent of ours will have any responsibility for the performance
        or nonperformance by DTC, Clearstream and Euroclear\nor their respective participants
        of these or any other rules or procedures governing their respective operations.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><B>&nbsp;</B></P>\n\n\n<!-- Field: Page; Sequence:
        28; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1.5pt solid\"><P STYLE=\"text-align: center; font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->25<!-- Field: /Sequence --></P></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center; text-indent:
        0in\">&nbsp;</P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times, Serif;
        margin-top: 0pt; margin-bottom: 0pt; text-align: center\"><A NAME=\"gcm_012\"></A>PLAN
        OF DISTRIBUTION</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"background-color:
        white\">We\nmay sell the securities from time to time pursuant to underwritten
        public offerings, negotiated transactions, block trades or a combination\nof
        these methods or through underwriters or dealers, through agents and/or directly
        to one or more purchasers or a combination of these\nmethods. The securities
        may be distributed from time to time in one or more transactions:</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD
        STYLE=\"text-align: justify\">at a fixed price or prices, which may be changed;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">at market prices prevailing at the time of sale;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">at prices related to such prevailing market prices; or</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt;
        text-align: justify; text-indent: -0.25in\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.25in\">&#9679;</TD><TD STYLE=\"text-align:
        justify\">at negotiated prices.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 45pt; text-align: justify;
        text-indent: -0.25in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"background-color: white\">Each\ntime that we sell securities covered
        by this prospectus, we will provide a prospectus supplement or supplements
        that will describe the\nmethod of distribution and set forth the terms and
        conditions of the offering of such securities, including the offering price
        of the\nsecurities and the proceeds to us, if applicable.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"background-color: white\">Offers\nto purchase the securities
        being offered by this prospectus may be solicited directly. Agents may also
        be designated to solicit offers\nto purchase the securities from time to time.
        Any agent involved in the offer or sale of our securities will be identified
        in a prospectus\nsupplement.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in;
        background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"background-color: white\">If\na dealer is utilized in the sale of
        the securities being offered by this prospectus, the securities will be sold
        to the dealer, as principal.\nThe dealer may then resell the securities to
        the public at varying prices to be determined by the dealer at the time of
        resale.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"background-color:
        white\">If\nan underwriter is utilized in the sale of the securities being
        offered by this prospectus, an underwriting agreement will be executed\nwith
        the underwriter at the time of sale and the name of any underwriter will be
        provided in the prospectus supplement that the underwriter\nwill use to make
        resales of the securities to the public. In connection with the sale of the
        securities, we or the purchasers of securities\nfor whom the underwriter may
        act as agent, may compensate the underwriter in the form of underwriting discounts
        or commissions. The underwriter\nmay sell the securities to or through dealers,
        and those dealers may receive compensation in the form of discounts, concessions
        or commissions\nfrom the underwriters and/or commissions from the purchasers
        for which they may act as agent. Unless otherwise indicated in a prospectus\nsupplement,
        an agent will be acting on a best efforts basis and a dealer will purchase
        securities as a principal, and may then resell\nthe securities at varying
        prices to be determined by the dealer.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"background-color: white\">Any\ncompensation paid to
        underwriters, dealers or agents in connection with the offering of the securities,
        and any discounts, concessions\nor commissions allowed by underwriters to
        participating dealers will be provided in the applicable prospectus supplement.
        Underwriters,\ndealers and agents participating in the distribution of the
        securities may be deemed to be underwriters within the meaning of the Securities\nAct,
        and any discounts and commissions received by them and any profit realized
        by them on resale of the securities may be deemed to be\nunderwriting discounts
        and commissions. We may enter into agreements to indemnify underwriters, dealers
        and agents against civil liabilities,\nincluding liabilities under the Securities
        Act, or to contribute to payments they may be required to make in respect
        thereof and to reimburse\nthose persons for certain expenses.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"background-color: white\">Any\nClass A common stock
        will be listed on the Nasdaq Global Market, but any other securities may or
        may not be listed on a national securities\nexchange. To facilitate the offering
        of securities, certain persons participating in the offering may engage in
        transactions that stabilize,\nmaintain or otherwise affect the price of the
        securities. This may include over-allotments or short sales of the securities,
        which involve\nthe sale by persons participating in the offering of more securities
        than were sold to them. In these circumstances, these persons would\ncover
        such over-allotments or short positions by making purchases in the open market
        or by exercising their over-allotment option, if\nany. In addition, these
        persons may stabilize or maintain the price of the securities by bidding for
        or purchasing securities in the\nopen market or by imposing penalty bids,
        whereby selling concessions allowed to dealers participating in the offering
        may be reclaimed\nif securities sold by them are repurchased in connection
        with stabilization transactions. The effect of these transactions may be to\nstabilize
        or maintain the market price of the securities at a level above that which
        might otherwise prevail in the open market. These\ntransactions may be discontinued
        at any time.</FONT>&nbsp;</P>\n\n\n\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"background-color: white\">We\nmay engage in at the market offerings
        into an existing trading market in accordance with Rule 415(a)(4) under the
        Securities Act. In addition,\nwe may enter into derivative transactions with
        third parties, or sell securities not covered by this prospectus to third
        parties in privately\nnegotiated transactions. If the applicable prospectus
        supplement so indicates, in connection with those derivatives, the third parties\nmay
        sell securities covered by this prospectus and the applicable prospectus supplement,
        including in short sale transactions. If so,\nthe third party may use securities
        pledged by us or borrowed from us or others to settle those sales or to close
        out any related open\nborrowings of stock, and may use securities received
        from us in settlement of those derivatives to close out any related open borrowings\nof
        stock. The third party in such sale transactions will be an underwriter and,
        if not identified in this prospectus, will be named in\nthe applicable prospectus
        supplement (or a post-effective amendment). In addition, we may otherwise
        loan or pledge securities to a financial\ninstitution or other third party
        that in turn may sell the securities short using this prospectus and an applicable
        prospectus supplement.\nSuch financial institution or other third party may
        transfer its economic short position to investors in our securities or in
        connection\nwith a concurrent offering of other securities.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"background-color: white\">The\nmaterial terms of any
        lock-up provisions in respect of any given offering will be described in the
        applicable prospectus supplement.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"background-color: white\">The\nunderwriters, dealers
        and agents may engage in transactions with us, or perform services for us,
        in the ordinary course of business for\nwhich they receive compensation.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\">&nbsp;</P>\n\n\n<!--
