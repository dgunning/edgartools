        \   <TD STYLE=\"text-align: justify\"><FONT STYLE=\"font-size: 10pt\">&ldquo;<I>Event
        of Default</I>&rdquo;</FONT></TD>\n    <TD>&nbsp;</TD>\n    <TD STYLE=\"text-align:
