        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the exchanges,
        if any, on which such warrants may be listed. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">You
        may exercise warrants by paying our warrant agent the exercise price, in each
        case in such currency or currencies as are specified in the\nwarrant, and
        giving your identity and the number of warrants to be exercised. Once you
        pay our warrant agent and deliver the properly completed and executed warrant
        certificate to our warrant agent at the specified office, our warrant agent
        will, as\nsoon as practicable, forward securities to you in authorized denominations
        or share amounts. If you exercise less than all of the warrants evidenced
        by your warrant certificate, you will be issued a new warrant certificate
        for the remaining amount\nof warrants. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">27 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_11\"></A>DESCRIPTION
        OF DEPOSITARY SHARES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>General </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">At
        our option, we may elect to\noffer fractional shares of preferred stock rather
        than full shares of preferred stock. If we do, we will issue to the public
        receipts for depositary shares, and each of these depositary shares will represent
        a fraction, to be set forth in the\nprospectus supplement, of a share of a
        particular series of preferred stock. Each owner of a depositary share will
        be entitled, in proportion to the applicable fractional interest in shares
        of preferred stock underlying that depositary share, to all\nrights and preferences
        of the preferred stock underlying that depositary share. Those rights include
        dividend, voting, redemption and liquidation rights. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        shares of preferred stock underlying the depositary shares will be deposited
        with a bank or trust company selected by us to act as\ndepositary, under a
        deposit agreement between us, the depositary and the holders of the depositary
        receipts. The depositary will be the transfer agent, registrar and dividend
        disbursing agent for the depositary shares. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Depositary
        receipts issued pursuant to the depositary agreement will evidence the depositary
        shares. Holders of depositary receipts agree to\nbe bound by the deposit agreement,
        which requires holders to take certain actions such as filing proof of residence
        and paying certain charges. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The summary
        of terms of the depositary shares contained in this prospectus is not complete.
        You should refer to our certificate of\nincorporation, a copy of which is
        an exhibit to the registration statement of which this prospectus forms a
        part, as well as the deposit agreement for the depositary shares and the certificate
        of designation for the applicable series of preferred\nstock that, each of
        which will be filed with the SEC prior to issuance of the depositary shares.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Dividends </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The depositary
        will distribute all cash dividends or other cash distributions received in
        respect of the series of preferred stock underlying\nthe depositary shares
        to the record holders of depositary receipts in proportion to the number of
        depositary shares owned by those holders on the relevant record date, which
        will be the same date as the record date for the preferred stock. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In the event of a distribution other than in
        cash, the depositary will distribute property received by it to the record
        holders of depositary\nreceipts that are entitled to receive the distribution,
        unless the depositary determines that it is not feasible to make the distribution.
        If this occurs, the depositary, with our approval, may adopt another method
        for the distribution, including\nselling the property and distributing the
        net proceeds to the holders. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The amount distributed
        in any of the foregoing cases will be\nreduced by any amounts required to
        be withheld by us or the depositary on account of taxes or other governmental
        charges. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Liquidation Preference\n</B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        the event of our voluntary or involuntary liquidation, dissolution or winding
        up, the holders of each depositary share will be\nentitled to receive the
        fraction of the liquidation preference accorded each share of the applicable
        series of preferred stock, as set forth in the applicable prospectus supplement.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Redemption </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If a series
        of preferred\nstock underlying the depositary shares is subject to redemption,
        the depositary shares will be redeemed from the proceeds received by the depositary
        resulting from the redemption, in whole or in part, of preferred stock held
        by the depositary.\nWhenever we redeem any preferred stock held by the depositary,
        the </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">28 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\ndepositary will redeem, as of the same redemption
        date, the number of depositary shares representing the preferred stock so
        redeemed. The depositary will send the notice of redemption to the\nrecord
        holders of the depositary receipts promptly upon receiving the notice from
        us and not fewer than 35 nor more than 60 days, unless otherwise provided
        in the applicable prospectus supplement, prior to the date fixed for redemption
        of the\npreferred stock and the depositary shares. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">After
        the date fixed for redemption, the depositary shares so called for redemption
        will no\nlonger be deemed to be outstanding and all rights of the holders
        of the depositary shares will cease, except the right to receive the monies
        payable upon redemption and any money or other property to which the holders
        of the depositary shares were\nentitled upon such redemption, upon surrender
        to the depositary of the depositary receipts evidencing the depositary shares.
        Any funds deposited by us with the depositary for any depositary shares that
        the holders thereof fail to redeem will be\nreturned to us after a period
        of time set forth in the applicable prospectus supplement. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Voting
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon receipt of notice of any meeting at which
        the holders of preferred stock are entitled to vote, the depositary will send
        the information\ncontained in the notice of meeting to the record holders
        of the depositary receipts underlying the preferred stock. Each record holder
        of those depositary receipts on the record date will be entitled to instruct
        the depositary as to the exercise of\nthe voting rights pertaining to the
        amount of preferred stock underlying that holder&#146;s depositary shares.
        The record date for the depositary will be the same date as the record date
        for the preferred stock. The depositary will try, as far as\npracticable,
        to vote the preferred stock underlying the depositary shares in accordance
        with such instructions, and we will agree to take all reasonable action that
        may be deemed necessary by the depositary in order to enable the depositary
        to do\nso. The depositary will not vote the preferred stock to the extent
        that it does not receive specific instructions from the holders of depositary
        receipts representing the preferred stock. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Withdrawal
        of Preferred Stock </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon\nsurrender
        of the depositary receipts at the corporate trust office of the depositary
        and upon payment of any taxes, charges and fees provided for in the deposit
        agreement and subject to the terms thereof, owners of depositary shares are
        entitled,\nupon surrender of depositary receipts at the principal office of
        the depositary and payment of any unpaid amount due to the depositary, to
        receive the number of whole shares of preferred stock underlying the depositary
        shares. Partial shares of\npreferred stock will not be issued. If the depositary
        receipts delivered by the owner evidence a number of depositary shares in
        excess of the number of depositary shares representing the number of whole
        shares of the underlying preferred stock to be\nwithdrawn, the depositary
        will deliver to the owner or upon his or her order at the same time a new
        depositary receipt evidencing the excess number of depositary shares. Holders
        of preferred stock will not be entitled to deposit the shares under the\ndeposit
        agreement or to receive depositary receipts evidencing depositary shares for
        the preferred stock. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Amendment and Termination of Deposit\nAgreement
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The form of depositary receipt evidencing the
        depositary shares and any provision of the deposit agreement may be amended
        at\nany time and from time to time by agreement between us and the depositary.
        However, any amendment which materially and adversely alters the rights of
        the holders of depositary shares, other than fee changes, will not be effective
        unless the\namendment has been approved by the holders of at least a majority
        of the depositary shares then outstanding. Every holder of a depositary receipt
        at the time the amendment becomes effective will be deemed, by continuing
        to hold the depositary\nreceipt, to be bound by the deposit agreement as so
        amended. The deposit agreement may be terminated by the depositary or us only
        if: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">all outstanding
        depositary shares have been redeemed; or </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">there has
        been a final distribution in respect of the preferred stock in connection
        with our liquidation,\ndissolution or <FONT STYLE=\"white-space:nowrap\">winding-up</FONT>
        and such distribution has been made to all the holders of depositary shares.
        </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">29 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Charges of Depositary </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        will pay all transfer and other taxes and governmental charges arising solely
        from the existence of the depositary arrangements. We will\nalso pay charges
        of the depositary in connection with the initial deposit of the preferred
        stock and the initial issuance of the depositary shares, any redemption of
        the preferred stock and all withdrawals of preferred stock by owners of depositary\nshares.
        Holders of depositary receipts will pay transfer, income and other taxes and
        governmental charges and other specified charges as provided in the deposit
        agreement to be for their accounts. The depositary may refuse to transfer
        depositary\nshares, withhold dividends and distributions and sell the depositary
        shares evidenced by the depositary receipt if the charges are not paid. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Miscellaneous </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The depositary
        will\nforward to the holders of depositary receipts all reports and communications
        we deliver to the depositary that we are required to furnish to the holders
        of the preferred stock. In addition, the depositary will make available for
        inspection by\nholders of depositary receipts at the principal office of the
        depositary, and at such other places as it may from time to time deem advisable,
        any reports and communications we deliver to the depositary as the holder
        of preferred stock. Unless\notherwise set forth in the applicable prospectus
        supplement, the depositary will act as transfer agent and registrar for the
        depositary receipts and if shares of a series of preferred stock are redeemable,
        the depositary will also act as redemption\nagent for the corresponding depositary
        receipts. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Neither the depositary nor we
        will be liable if either of us is prevented or delayed by\nlaw or any circumstance
        beyond our control in performing our respective obligations under the deposit
        agreement. Our obligations and those of the depositary will be limited to
        performance in good faith of our respective duties under the deposit\nagreement.
        Neither the depositary nor we will be obligated to prosecute or defend any
        legal proceeding in respect of any depositary shares or preferred stock unless
        satisfactory indemnity is furnished. We and the depositary may rely on written\nadvice
        of counsel or accountants, on information provided by holders of depositary
        receipts or other persons believed in good faith to be competent to give such
        information and on documents believed to be genuine and to have been signed
        or presented\nby the proper party or parties. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Resignation
        and Removal of Depositary </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The depositary
        may resign at any time by delivering a notice to us of its election to do
        so. We may remove the depositary at any time. Any such\nresignation or removal
        will take effect upon the appointment of a successor depositary and its acceptance
        of such appointment. The successor depositary must be appointed within 60
        days after delivery of the notice for resignation or removal and must\nbe
        a bank or trust company having its principal office in the United States of
        America. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Federal Income Tax Consequences </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Owners of the depositary shares will be treated
        for U.S. federal income tax purposes as if they were owners of the preferred
        stock underlying\nthe depositary shares. As a result, owners will be entitled
        to take into account for U.S. federal income tax purposes, income and deductions
        to which they would be entitled if they were holders of such preferred stock.
        No gain or loss will be\nrecognized for U.S. federal income tax purposes upon
        the withdrawal of preferred stock in exchange for depositary shares. The tax
        basis of each share of preferred stock to an exchanging owner of depositary
        shares will be, upon such exchange, the\nsame as the aggregate tax basis of
        the depositary shares exchanged. The holding period for preferred stock in
        the hands of an exchanging owner of depositary shares will include the period
        during which such person owned such depositary shares. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">30 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_12\"></A>PLAN
        OF DISTRIBUTION </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We may sell the securities described
        in this prospectus and any accompanying prospectus supplement through underwriters,
        through\nbroker-dealers, through agents, on one or more exchanges, directly
        to one or more purchasers, including existing stockholders, through a combination
        of any of the foregoing methods of sale, or through any other method permitted
        by applicable law.\n</P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We will prepare a prospectus
        supplement for each offering that will disclose the terms of the offering,
        including the name or names of\nany underwriters, dealers, or agents, the
        purchase price of the securities and the proceeds to us from the sale, any
        underwriting discounts, and other items constituting compensation to underwriters,
        dealers, or agents. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We will fix a price or prices
        of our securities at: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">market prices
        prevailing at the time of any sale under this registration statement; </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">prices related
        to market prices; or </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
