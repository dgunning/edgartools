        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">negotiated
        prices. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We may change
        the price of the securities offered from time to time. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        we use underwriters or dealers in the sale, they will acquire the securities
        for their own account, and they may resell these securities\nfrom time to
        time in one or more transactions, including negotiated transactions, at a
        fixed public offering price, or at varying prices determined at the time of
        sale. The securities may be offered to the public either through underwriting\nsyndicates
        represented by one or more managing underwriters or directly by one or more
        of such firms. Unless otherwise disclosed in the prospectus supplement, the
        obligations of the underwriters to purchase securities will be subject to
        certain\nconditions precedent, and the underwriters will be obligated to purchase
        all of the securities offered by the prospectus supplement if any of the securities
        are purchased. Any initial public offering price and any discounts or concessions
        allowed or\n<FONT STYLE=\"white-space:nowrap\">re-allowed</FONT> or paid to
        dealers may be changed from time to time. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        may sell the securities\nthrough agents designated by us from time to time.
        We will name any agent involved in the offering and sale of the securities
        for which this prospectus is delivered, and disclose any commissions payable
        by us to the agent or the method by which the\ncommissions can be determined,
        in the prospectus supplement. Unless otherwise indicated in the prospectus
        supplement, any agent will be acting on a best efforts basis for the period
        of its appointment. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Offers to purchase securities
        may be solicited directly by us and the sale thereof may be made by us directly
        to institutional investors or\nothers, who may be deemed to be underwriters
        within the meaning of the Securities Act with respect to any resale thereof.
        The terms of any such sales will be described in the prospectus supplement
        relating thereto. We may use electronic media,\nincluding the internet, to
        sell offered securities directly. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We may engage
        in <FONT STYLE=\"white-space:nowrap\"><FONT\nSTYLE=\"white-space:nowrap\">at-the-market</FONT></FONT>
        offerings and offer our shares of Class&nbsp;A common stock into an existing
        trading market in accordance with Rule 415(a)(4) under the Securities Act
        on the terms described in the prospectus\nsupplement relating thereto. Underwriters,
        dealers, and agents who participate in any <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">at-the-market</FONT></FONT> offerings will be
        described in the prospectus supplement relating\nthereto. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        may agree to indemnify underwriters, dealers, and agents who participate in
        the distribution of securities against certain\nliabilities to which they
        may become subject in connection with the sale of the securities, including
        liabilities arising under the Securities Act. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Certain
        of the underwriters and their affiliates may be customers of, may engage in
        transactions with and may perform services for us or our\naffiliates in the
        ordinary course of business. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">31 </P>\n\n</DIV></Center>\n\n\n<p
