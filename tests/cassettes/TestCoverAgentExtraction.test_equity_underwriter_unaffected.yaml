        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The expenses
        of the offering that are payable by us are estimated to be approximately $&#8195;&#8195;&#8195;&#8195;(excluding
        underwriting\ndiscounts and commissions). We have agreed to reimburse the
        underwriters for certain expenses in connection with the offering in an amount
        not exceeding $&#8195;&#8195;&#8195;&#8195;. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Option
        to Purchase Additional Class&nbsp;A Common Stock </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        have granted the underwriters an option exercisable for 30 days after the
        date of this prospectus supplement to purchase, from time to time,\nin whole
        or in part, up to an aggregate of $22,500,000 of Class&nbsp;A </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-21 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nCommon Stock from us at the
        offering price less underwriting discounts and commissions. To the extent
        that this option is exercised, each underwriter will be obligated, subject
        to certain\nconditions, to purchase its pro rata portion of these additional
        shares based on the underwriter&#146;s percentage underwriting commitment
        in this offering as indicated in the above table. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B><FONT
        STYLE=\"white-space:nowrap\">Lock-Up</FONT> Agreements </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        and certain of our stockholders, directors and executive officers have agreed
        that, for a period of 60 days after the date of this\nprospectus supplement
        (the <FONT STYLE=\"white-space:nowrap\">&#147;Lock-Up</FONT> Period&#148;),
        subject to certain limited exceptions as described below, we and they will
        not directly or indirectly, without the prior written consent of Barclays\nCapital
        Inc. and Morgan Stanley &amp; Co. LLC, (1) offer for sale, sell, pledge or
        otherwise dispose of (or enter into any transaction or device that is designed
        to, or could be expected to, result in the disposition by any person at any
        time in the\nfuture of) any shares of our Class&nbsp;A Common Stock (including
        shares of the Class&nbsp;A Common Stock issuable upon exchange of limited
        partnership interests in EELP (the &#147;Interests&#148;)), Class&nbsp;B Common
        Stock or securities\nconvertible into or exercisable or exchangeable for Common
        Stock, including the Interests, (2)&nbsp;enter into any swap or other derivatives
        transaction that transfers to another, in whole or in part, any of the economic
        benefits or risks of\nownership of such shares of Common Stock or Interests,
        whether any such transaction described in clause (1)&nbsp;or (2) above is
        to be settled by delivery of Common Stock, Interests or other securities,
        in cash or otherwise, (3)&nbsp;publicly file\nor cause to be publicly filed
        a registration statement, including any amendments thereto, with respect to
        the registration of any shares of Common Stock or securities convertible,
        exercisable or exchangeable into Common Stock or any other securities\nof
        the Company (other than any registration statement on <FONT STYLE=\"white-space:nowrap\">Form&nbsp;S-8),</FONT>
        <I>provided</I> that the Company shall notify Barclays Capital Inc. and Morgan
        Stanley &amp; Co. LLC of any confidential submission of a\nregistration statement
        at least two business days before such submission or (4)&nbsp;publicly disclose
        the intention to do any of the foregoing. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        foregoing restrictions are expressly agreed to preclude the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        party from engaging in any\nhedging or other transaction which is designed
        to or which reasonably could be expected to lead to or result in a sale or
        disposition of Common Stock or any other securities of the Company even if
        such Common Stock or other securities of the Company\nwould be disposed of
        by someone other than the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        party, including, without limitation, any short sale or any purchase, sale
        or grant of any right (including without limitation any put or call option,\nforward,
        swap or any other derivative transaction or instrument) with respect to any
        Common Stock, or any other security of the Company that includes, relates
        to or derives any significant part of its value from Common Stock or other
        securities of\nthe Company. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The restrictions
        above and contained in the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        agreements between the\nunderwriters, certain of our stockholders, our directors
        and executive officers do not apply to: (a)&nbsp;transactions relating to
        shares of Common Stock or other securities acquired in the open market after
        the completion of the offering;\n(b)&nbsp;transfers of shares of Common Stock
        or any security convertible into Common Stock as a bona fide gift or gifts;
        (c)&nbsp;sales or other dispositions of shares of any class of the Company&#146;s
        capital stock, in each case that are made\nexclusively between and among the
        <FONT STYLE=\"white-space:nowrap\">lock-up</FONT> party or members of the
        <FONT STYLE=\"white-space:nowrap\">lock-up</FONT> party&#146;s family (including
        to any trust, limited partnership, limited liability company or\nother entity
        for the direct or indirect benefit of the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        party or any members of the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        party&#146;s family), or affiliates of the <FONT\nSTYLE=\"white-space:nowrap\">lock-up</FONT>
        party, including its subsidiaries, partners (if a partnership) or members
        (if a limited liability company), stockholders (if a corporation) or any investment
        fund or other entity controlling, controlled by,\nmanaging or managed by or
        under common control with the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        party or affiliates of the <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
