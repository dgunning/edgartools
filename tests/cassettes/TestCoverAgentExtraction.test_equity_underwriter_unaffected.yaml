        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_6\"></A>USE
        OF PROCEEDS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Unless otherwise specified in
        an accompanying prospectus supplement, we will use the net proceeds we receive
        from the sale of the securities\ncovered by this prospectus for general corporate
        purposes, which may include, among other things, paying or refinancing all
        or a portion of our indebtedness at the time and funding acquisitions, capital
        expenditures, working capital and investments\nin our subsidiaries. Net proceeds
        may be temporarily invested prior to use. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        actual application of the net proceeds from the sale of\nany particular offering
        of securities using this prospectus will be described in the applicable prospectus
        supplement relating to such offering. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">4 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_7\"></A>DESCRIPTION
        OF CAPITAL STOCK </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As of May&nbsp;5,
        2023, the authorized capital stock of the Company consists of 300&nbsp;million
        shares of Class&nbsp;A common stock, par\nvalue $0.001 per share, of which
        26,254,167 shares are issued and outstanding, 150&nbsp;million shares of Class&nbsp;B
        common stock, par value $0.001 per share (&#147;Class&nbsp;B common stock&#148;),
        of which 82,021,389 shares are issued and\noutstanding and 25&nbsp;million
        shares of preferred stock, par value $0.001 per share, of which no shares
        are issued and outstanding. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The\nfollowing
        summary of the capital stock and amended and restated certificate of incorporation
        and amended and restated bylaws of the Company does not purport to be complete
        and is qualified in its entirety by reference to the provisions of applicable\nlaw
        and to our amended and restated certificate of incorporation and amended and
        restated bylaws, which are filed as exhibits to the registration statement
        of which this prospectus is a part. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Common Stock </B></P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have two classes of\ncommon stock: Class&nbsp;A
        and Class&nbsp;B, each of which has one vote per share. Holders of our Class&nbsp;A
        common stock and Class&nbsp;B common stock will vote together as a single
        class on all matters presented to our stockholders for their\nvote or approval,
        except as provided in our amended and restated certificate of incorporation
        and/or as otherwise required by applicable law. Pursuant to our amended and
        restated certificate of incorporation, we may not amend, alter, repeal or
        waive\ncertain of the provisions of our amended and restated certificate of
        incorporation that relate to the terms of our capital stock without the approval
        of the holders of a majority of the then outstanding shares of our Class&nbsp;B
        common stock,\nvoting as a class. Holders of the Class&nbsp;A common stock
        and Class&nbsp;B common stock, as the case may be, would also have a separate
        class vote if we subdivide, combine or reclassify shares of the other class
        without concurrently subdividing,\ncombining or reclassifying shares of such
        class in a proportional manner. Pursuant to the Delaware General Corporation
        Law (the &#147;DGCL&#148;), the holders of the outstanding shares of a class
        shall be entitled to vote as a class upon a proposed\namendment, whether or
        not entitled to vote thereon by the certificate of incorporation, if the amendment
        would increase or decrease the par value of the shares of such class or alter
        or change the powers, preferences, or special rights of the shares\nof such
        class so as to affect them adversely. Excelerate Energy Holdings, LLC (&#147;EE
        Holdings&#148;) holds all of the shares of our outstanding Class&nbsp;B common
        stock. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Class&nbsp;A Common Stock </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Voting</I>. Holders of our Class&nbsp;A common
        stock are entitled to one vote for each share held of record on all matters
        submitted to a\nvote of stockholders. Stockholders do not have the ability
        to cumulate votes for the election of directors. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Dividends</I>.
        Holders of\nour Class&nbsp;A common stock are entitled to receive dividends
        when and if declared by our board of directors out of funds legally available
        therefor, subject to any statutory or contractual restrictions on the payment
        of dividends and to any\nrestrictions on the payment of dividends imposed
        by the terms of any outstanding preferred stock.</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Dissolution
        and Liquidation</I>. Upon\nour dissolution or liquidation or the sale of all
        or substantially all of our assets, after payment in full of all amounts required
        to be paid to creditors and to the holders of preferred stock having liquidation
        preferences, if any, the holders of\nour Class&nbsp;A common stock will be
        entitled to receive pro rata our remaining assets available for distribution.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>No Preemptive\nRights</I>. Holders of our
        Class&nbsp;A common stock do not have preemptive, subscription, redemption
        or conversion rights. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Issuance\nof
        Additional Class</I><I></I><I>&nbsp;A Common Stock</I>. We may issue additional
        shares of Class&nbsp;A common stock from time to time, subject to applicable
        provisions of our amended and restated certificate of incorporation,\n</P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">5 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\namended and restated bylaws and Delaware law.
        We are obligated to issue Class&nbsp;A common stock (subject to the transfer
        and exchange restrictions set forth in the Amended and Restated Limited\nPartnership
        Agreement of EELP, dated April&nbsp;14, 2022 (as the same may be amended,
        modified, supplemented and/or restated from time to time, the &#147;EELP Limited
        Partnership Agreement&#148;)) to holders of Class&nbsp;B interests\n(&#147;Class&nbsp;B
        interests&#148;) of EELP who exchange those interests for shares of our Class&nbsp;A
        common stock on a <FONT STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">one-for-one</FONT></FONT>
        basis (unless we elect to satisfy\nsuch exchange for cash). When a Class&nbsp;B
        interest is exchanged for a share of our Class&nbsp;A common stock, the corresponding
        share of our Class&nbsp;B common stock will automatically be retired and restored
        to the status of an authorized but\nunissued share of Class&nbsp;B common
        stock. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Class&nbsp;B Common Stock </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Voting</I>. Holders of our Class&nbsp;B common
        stock are entitled to one vote for each share held of record on all matters
        submitted to a\nvote of stockholders. Holders of shares of our Class&nbsp;B
        common stock vote together with holders of our Class&nbsp;A common stock as
        a single class on all matters on which stockholders are entitled to vote generally,
        except as otherwise provided\nin our amended and restated certificate of incorporation
        and/or required by law. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Dividends</I>.
        Holders of our Class&nbsp;B common\nstock are not entitled to dividends in
        respect of their shares of Class&nbsp;B common stock. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Dissolution
        and Liquidation</I>. Upon our\ndissolution or liquidation or the sale of all
        or substantially all of our assets, the holders of our Class&nbsp;B common
        stock will not be entitled to receive any distributions. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>No
        Preemptive Rights</I>. Holders of our Class&nbsp;B common stock do not have
        preemptive, subscription, redemption or conversion rights. A\ncorresponding
        share of Class&nbsp;B common stock is subject to automatic retirement upon
        an exchange of a Class&nbsp;B interest of EELP for a share of Class&nbsp;A
        common stock on and subject to the terms and conditions contemplated by the
        EELP\nLimited Partnership Agreement. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Issuance
        of Additional Class</I><I></I><I>&nbsp;B Common Stock</I>. We may in the future
        issue shares\nof Class&nbsp;B common stock to one or more new or existing
        partners of EELP to whom Class&nbsp;B interests are also issued, for example,
        in connection with the contribution of assets to us or EELP by such partner.
        We may also issue shares of\nClass&nbsp;B common stock to holders of Class&nbsp;B
        interests as necessary to maintain a <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">one-to-one</FONT></FONT> ratio between the number
        of Class&nbsp;B interests and the number of\nshares of Class&nbsp;B common
        stock outstanding, including in connection with a stock split, stock dividend,
        reclassification or similar transaction. In connection with an exchange of
        a Class&nbsp;B interest for Class&nbsp;A common stock, the\ncorresponding
        share of Class&nbsp;B common stock will automatically be retired and restored
        to the status of an authorized but unissued share of Class&nbsp;B common stock.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Preferred Stock </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our amended
        and restated\ncertificate of incorporation provides that our board of directors
        has the authority, without further action by the stockholders, to issue up
        to 25&nbsp;million shares of preferred stock. Our board of directors is able
        to issue preferred stock in one\nor more series and determine the rights,
        preferences, privileges, qualifications and restrictions granted to or imposed
        upon our preferred stock, including dividend rights, conversion rights, voting
        rights, rights and terms of redemption,\nliquidation preferences and sinking
        fund terms, any or all of which may be greater than the rights of our common
        stock. Issuances of preferred stock could adversely affect the voting power
        of holders of our common stock and reduce the likelihood\nthat holders of
        our common stock will receive dividend payments and payments upon liquidation.
        Any issuance of preferred stock could also have the effect of decreasing the
        market price of our common stock and could delay, deter or prevent a change\nin
        control of our company. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Exclusive Forum Clause </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Our amended and restated certificate of incorporation
        provides that, unless we select or consent in writing to the selection of
        another forum,\nthe Court of Chancery of the State of Delaware (or, if the
        Court of Chancery does </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">6 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nnot have jurisdiction, another
        state court or a federal court located within the State of Delaware) shall
        be the exclusive forum for any complaints asserting any &#147;internal corporate\nclaims,&#148;
        which include claims in the right of our company (i)&nbsp;that are based upon
        a violation of a duty by a current or former director, officer, employee,
        or stockholder in such capacity or (ii)&nbsp;as to which the DGCL confers\njurisdiction
        upon the Court of Chancery. Further, unless we select or consent to the selection
        of an alternative forum, the federal district courts of the United States
        shall be the exclusive forum for the resolution of any complaint asserting
        a\ncause of action arising under the Securities Act. Our exclusive forum provision
        does not apply to suits brought to enforce any liability or duty created by
        the Exchange Act, and investors cannot waive compliance with the federal securities
        laws and\nthe rules and regulations thereunder. Any person or entity purchasing
        or otherwise acquiring an interest in any shares of our capital stock shall
        be deemed to have notice of and to have consented to the forum provisions
        in our amended and restated\ncertificate of incorporation. It is possible
        that a court could find our exclusive forum provision to be inapplicable or
        unenforceable. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Provisions of\nOur Amended and Restated Certificate
        of Incorporation and Amended and Restated Bylaws and Delaware Law That May
        Have an Anti-Takeover Effect </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Provisions of
        the DGCL and our amended and restated certificate of incorporation and amended
        and restated bylaws could make it more difficult\nto acquire our company by
        means of a tender offer, a proxy contest or otherwise, or to remove incumbent
        officers and directors. These provisions, summarized below, are intended to
        discourage coercive takeover practices and inadequate takeover bids\nand to
        encourage persons seeking to acquire control of us to first negotiate with
        our board of directors. These provisions may delay, deter or prevent a merger
        or acquisition of us that a stockholder might consider is in its best interest,
        including\nthose attempts that might result in a premium over the prevailing
        market price of our common stock. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B><I>Classified Board of Directors;
        Removal of\nDirectors; Vacancies </I></B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our amended
        and restated certificate of incorporation provides that, prior to the Classification
        Date (as\ndefined in the amended and restated certificate of incorporation),
        our board of directors is subject to annual elections. Each director will
        hold office until the next annual meeting of our stockholders and until his
        or her successor is duly elected\nand qualified or until his or her earlier
        death, resignation or removal. During such time, directors may be removed
        with or without cause, and vacancies, including as a result of newly created
        directorships on the board of directors, may be filled\nat any time by the
        stockholders or by remaining directors. For purposes of our amended and restated
        certificate of incorporation, the &#147;Trigger Date&#148; shall be defined
        as such time when EE Holdings (including its permitted transferees)\nceases
        to beneficially own at least 40% of the combined voting power of our then-outstanding
        capital stock entitled to vote generally in director elections. If Mr.&nbsp;Kaiser
        dies prior to the Trigger Date, for purposes of calculating the ownership\npercentage,
        shares held by EE Holdings immediately prior to Mr.&nbsp;Kaiser&#146;s death
        shall be combined with any shares held by the George Kaiser Family Foundation
        (the &#147;Foundation&#148;) and its affiliates and, subsequently, based on
        the\nFoundation&#146;s ownership for five years following Mr.&nbsp;Kaiser&#146;s
        death. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">However, generally, from and
        after the Trigger Date,\nthe board of directors is divided into three classes
        of directors, with directors serving staggered three-year terms. As a result,
        approximately <FONT STYLE=\"white-space:nowrap\">one-third</FONT> of the board
        of directors will be elected each year.\nDuring such time as our board is
        classified, our amended and restated certificate of incorporation and amended
        and restated bylaws provide that any director may be removed for cause only
        and only by the affirmative vote of at least 66 2/3% of the\nvoting power
        of the stock outstanding and entitled to vote on the election of directors,
        voting together as a single class. In addition, during such time, the classification
        of directors will have the effect of making it more difficult for\nstockholders
        to change the composition of our board of directors. From and after the Trigger
        Date, vacancies, including as a result of newly created directorships on the
        board of directors, shall be filled at any time only by the remaining\ndirectors,
        or a sole remaining director, subject to the terms of the Stockholder&#146;s
        Agreement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">7 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>No Cumulative Voting </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The DGCL provides that a stockholder&#146;s
        right to vote cumulatively in the election of directors does not exist unless
        the certificate of\nincorporation specifically provides otherwise. Our amended
        and restated certificate of incorporation does not provide for cumulative
        voting. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Special Meetings of Stockholder </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Our amended and restated certificate of incorporation
        provides that, from and after the Trigger Date, special meetings of the stockholders
        may\nbe called only by the board of directors, the Chairperson of our board
        or our Chief Executive Officer. Prior to the Trigger Date, a special meeting
        may also be called at the request of EE Holdings. Our amended and restated
        bylaws prohibit the\nconduct of any business at a special meeting other than
        as specified in the notice for such meeting. These provisions may have the
        effect of deferring, delaying or discouraging hostile takeovers, or changes
        in control or management of our company.\n</P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B><I>Stockholder
        Action by Written Consent </I></B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The DGCL permits
        any action required to be taken at any annual or special meeting of the stockholders
        to be taken without a meeting, without\nprior notice and without a vote if
        a consent or consents in writing, setting forth the action so taken, is signed
        by the holders of outstanding stock having not less than the minimum number
        of votes that would be necessary to authorize or take such\naction at a meeting
        at which all shares of stock entitled to vote thereon were present and voted,
        unless the certificate of incorporation provides otherwise. Our amended and
        restated certificate of incorporation and amended and restated bylaws\npermit
        stockholder action by written consent prior to the Trigger Date and preclude
        stockholder action by written consent from and after the Trigger Date. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><I>Requirements for Advance Notification of Stockholder Meetings,
        Nominations and Proposals </I></B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our amended
        and restated bylaws establish advance notice procedures with respect to stockholder
        proposals and the nomination of candidates for\nelection as director. In order
        for any matter to be &#147;properly brought&#148; before a meeting, a stockholder
        must comply with such advance notice procedures and provide us with certain
        information. Our amended and restated bylaws allow the\nchairperson of the
        meeting of stockholders to adopt rules and regulations for the conduct of
        meetings which may have the effect of precluding the conduct of certain business
        at a meeting if such rules and regulations are not followed. These\nprovisions
        may also defer, delay or discourage a potential acquirer from conducting a
        solicitation of proxies to elect the acquirer&#146;s own slate of directors
        or otherwise attempting to influence or obtain control of our company. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><I>Supermajority Voting for Amendments to Our Governing Documents
        </I></B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Our amended and restated certificate
        of incorporation and our amended and restated bylaws provide that the board
        of directors is expressly\nauthorized to adopt, amend or repeal our bylaws.
        From and after the Trigger Date, any adoption, alteration, amendment or repeal
        of our amended and restated bylaws by our stockholders will require the affirmative
        vote of holders of at least 66 2/3%\nof the voting power of our stock outstanding
        and entitled to vote thereon, voting together as a single class. In addition,
        our amended and restated certificate of incorporation provides that from and
        after the Trigger Date, certain articles of our\namended and restated certificate
        of incorporation, including those relating to (i)&nbsp;the board size, classification,
        removal and vacancies, (ii)&nbsp;stockholder action by written consent, (iii)&nbsp;special
        meetings of stockholders,\n(iv)&nbsp;amendment of certificate and bylaws,
        (v)&nbsp;business combinations with interested stockholders, (vi)&nbsp;liability
        of directors, (vii)&nbsp;corporate opportunity waiver and (viii)&nbsp;forum
        selection, may be amended only by a vote of\nat least 66 2/3% of the voting
        power of our stock outstanding and entitled to vote thereon, voting together
        as a single class. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Authorized but\nUnissued Shares </I></B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">As mentioned above, our authorized but unissued
        shares of common stock and preferred stock will be available for\nfuture issuance
        without your approval. The DGCL does not require stockholder approval for
        any </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">8 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nissuance of authorized shares. However, the
        applicable stock exchange listing requirements require stockholder approval
        of certain issuances equal to or exceeding 20% of the then-outstanding\nvoting
        power or the then-outstanding number of shares of common stock. No assurances
        can be given that our shares will remain so listed. We may use additional
        shares for a variety of corporate purposes, including future public offerings
        to raise\nadditional capital, corporate acquisitions and employee benefit
        plans. As discussed above, our board of directors will have the ability to
        issue preferred stock with voting rights or other preferences, without stockholder
        approval. The existence of\nauthorized but unissued shares of common stock
        and preferred stock could render more difficult or discourage an attempt to
        obtain control of our company by means of a proxy contest, tender offer, merger
        or otherwise. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Delaware Takeover Statute </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        general,\nSection&nbsp;203 of the DGCL, an anti-takeover provision, prohibits
        a publicly held Delaware corporation from engaging in a business combination,
        such as a merger, with an interested stockholder, or person or group owning
        15% or more of the\ncorporation&#146;s voting stock, for a period of three
        years following the date the person became an interested stockholder, unless
        (with certain exceptions) the business combination or the transaction in which
        the person became an interested\nstockholder is approved in the manner prescribed
        by the DGCL and Delaware Court of Chancery. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        elected in our amended and restated\ncertificate of incorporation not to be
        subject to Section&nbsp;203. However, our amended and restated certificate
        of incorporation contains provisions that have generally the same effect as
        Section&nbsp;203, except that Kaiser, the Foundation and\ntheir respective
        affiliates and successors (other than our company), as well as their direct
        and indirect transferees, are not deemed to be &#147;interested stockholders,&#148;
        regardless of the percentage of our voting stock owned by them, and\naccordingly
        are not be subject to such restrictions. The existence of this provision in
        our amended and restated certificate of incorporation is expected to have
        an anti-takeover effect with respect to transactions not approved in advance
        by the\nboard of directors, including discouraging attempts that might result
        in a premium over the market price for the shares of common stock held by
        stockholders. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Corporate Opportunity </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our
        amended and\nrestated certificate of incorporation provides that Kaiser and
        the Foundation and their affiliates, including any of their director nominees
        under the Stockholder&#146;s Agreement (together, the &#147;Identified Persons&#148;),
        will not have any\nduty to refrain from corporate opportunities of (1)&nbsp;engaging,
        directly or indirectly, in certain similar business activities or lines of
        business as us or (2)&nbsp;otherwise competing with us or with any of our
        affiliates, other than, in each\ncase, with respect to business, activities
        or business opportunities that relate to the business of supply of LNG or
        regasified LNG to New England (referred to as the &#147;Covered Business&#148;).
        In the event that any Identified Person acquires\nknowledge of a potential
        business opportunity which may be a corporate opportunity for us, such Identified
        Person will have no duty to communicate or offer such corporate opportunity
        to us, other than with respect to (i)&nbsp;opportunities that come\nto any
        of our directors, director nominees or officers solely in their capacity as
        directors or officers of our company or (ii)&nbsp;any Covered Business. Our
        amended and restated certificate of incorporation also provides that, to the
        fullest\nextent permitted by law, Identified Persons will not be liable to
        us, for breach of any fiduciary duty or otherwise, by reason of the fact any
        Identified Person pursues, acquires or offers or directs such corporate opportunity
        to another person, or\notherwise does not communicate information regarding
        such corporate opportunity to us (other than with respect to clauses (i)&nbsp;and
        (ii) above), and we will waive and renounce any claim that such business opportunity
        constituted a corporate\nopportunity that should have been presented to us.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Limitations on Liability and Indemnification of Officers and
        Directors </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">As summarized in greater detail
        above, the limitation of liability in our amended and restated certificate
        of incorporation and indemnification\nprovisions in our amended and restated
        bylaws may discourage stockholders </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">9 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nfrom bringing a lawsuit against
        directors for breach of their fiduciary duties. These provisions may also
        have the effect of reducing the likelihood of derivative litigation against
        directors and\nofficers, even though such an action, if successful, might
        otherwise benefit us and our stockholders. In addition, your investment may
        be adversely affected to the extent we pay the settlement costs and damage
        awards against directors and officers\npursuant to these indemnification provisions.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Transfer Agent and Registrar </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Transfer Agent and Registrar for our Class&nbsp;A common stock is Broadridge
        Corporate Issuer Solutions, Inc. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Listing </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our
        Class&nbsp;A common stock is\nlisted on the NYSE under the symbol &#147;EE.&#148;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">10 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_8\"></A>DESCRIPTION
        OF DEBT SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>General </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Excelerate
        Energy, Inc. may\nissue debt securities in one or more series. When used in
        this &#147;Description of Debt Securities&#148; section, unless we state otherwise
        or the context clearly indicates otherwise, references to the &#147;Company,&#148;
        &#147;we,&#148;\n&#147;us,&#148; and &#147;our&#148; refer to Excelerate Energy,
        Inc. and not any of its subsidiaries. We may issue senior or subordinated
        debt securities. Neither the senior debt securities nor the subordinated debt
        securities will be secured by any\nof our property or assets. Thus, by owning
        a debt security, you will be one of our unsecured creditors. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        senior debt securities will\nconstitute part of our senior debt, will be issued
        under a senior debt indenture described below and will rank equally with all
        of our other unsecured and unsubordinated debt. The subordinated debt securities
        will constitute part of our subordinated\ndebt, will be issued under a subordinated
        debt indenture described below and will be subordinate in right of payment
        to all of our &#147;senior debt,&#148; as defined in the indenture with respect
        to such subordinated debt securities. The prospectus\nsupplement for any series
        of subordinated debt securities or the information incorporated in this prospectus
        by reference will indicate the approximate amount of senior debt outstanding
        as of the end of the then most recent fiscal quarter. Neither\nindenture will
        limit our ability to incur additional senior debt or other indebtedness. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">When we refer to &#147;debt securities&#148;
        in\nthis prospectus, we mean both the senior debt securities and the subordinated
        debt securities. When we refer to a &#147;debt security&#148; in this prospectus,
        we mean either a senior debt security or a subordinated debt security. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We conduct substantially all of our operations
        through subsidiaries and expect that we will continue to do so. As a result,
        cash we obtain\nfrom our subsidiaries is the principal source of funds necessary
        to meet our debt service obligations. Contractual provisions or laws, as well
        as our subsidiaries&#146; financial condition and operating requirements,
        may limit our ability to obtain\ncash from our subsidiaries that we require
        to pay our debt service obligations, including payments on the debt securities.
        In addition, holders of the debt securities will have a junior position to
        the claims of creditors, including trade creditors\nand tort claimants, of
        our subsidiaries on their assets and earnings. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        debt indentures and their associated documents, including your\ndebt security,
        will contain the full legal text of the matters described in this section
        and your prospectus supplement. We have filed forms of the indentures with
        the SEC as exhibits to our registration statement of which this prospectus
        is a part.\nPlease read &#147;Where You Can Find More Information&#148; in
        this prospectus for information on how to obtain copies of them. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This\nsection
        and your prospectus supplement summarize material terms of the indentures
        and your debt security. They do not, however, describe every aspect of the
        indentures and your debt security. For example, in this section and your prospectus\nsupplement,
        we use terms that have been given special meaning in the indentures, but we
        describe the meaning for only the more important of those terms. Your prospectus
        supplement will have a more detailed description of the specific terms of
        your\ndebt security. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Indentures </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The\nsenior
        debt securities and subordinated debt securities will each be governed by
        a document called an indenture. Each indenture is a contract between us and
        the trustee. The indentures are substantially identical, except for certain
        provisions\nincluding those relating to subordination, which are included
        only in the indenture related to subordinated debt securities. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        trustee\nunder each indenture has two main roles: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">first, the
        trustee can enforce your rights against us if we default, but there are some
        limitations on the extent\nto which the trustee acts on your behalf, which
        we describe later under &#147; &#151;Default, Remedies and Waiver of Default&#148;;
        and </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\">11 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\" VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD
        WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P ALIGN=\"left\" STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:Times
        New Roman; font-size:10pt\">second, the trustee performs administrative duties
        for us, such as sending you interest payments and notices.\n</P></TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">When we refer to the &#147;indenture&#148; or
        the &#147;trustee&#148; with respect to any debt securities, we mean the\nindenture
        under which those debt securities are issued and the trustee under that indenture.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Series of Debt Securities </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        may issue as many distinct debt securities or series of debt securities under
        either indenture as we wish. This section summarizes terms of\nthe securities
        that apply generally to all debt securities and series of debt securities.
        The provisions of each indenture allow us not only to issue debt securities
        with terms different from those of debt securities previously issued under
        that\nindenture, but also to &#147;reopen&#148; a previously issued series
        of debt securities and issue additional debt securities of that series. We
        will describe most of the financial and other specific terms of your debt
        security, whether it is a\nseries of the senior debt securities or the subordinated
        debt securities, in your prospectus supplement. Those terms may vary from
        the terms described here. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As you read
        this section, please remember that the specific terms of your debt security
        as described in your prospectus supplement will\nsupplement and, if applicable,
        modify or replace the general terms described in this section. If there are
        any differences between your prospectus supplement and this prospectus with
        respect to your debt security, your prospectus supplement will\ncontrol. Thus,
        the statements we make in this section may not apply to your debt security.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">When we refer to a &#147;series of debt\nsecurities,&#148;
        we mean a series of debt securities issued under the applicable indenture.
        When we refer to &#147;your debt security,&#148; we mean the series of debt
        securities you purchase. When we refer to &#147;your prospectus\nsupplement,&#148;
        we mean the prospectus supplement describing the specific terms of your debt
        security. The terms used in your prospectus supplement will have the meanings
        described in this prospectus, unless otherwise specified. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Amounts
        of Issuances </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Neither indenture\nwill limit
        the aggregate amount of debt securities that we may issue or the number of
        series or the aggregate amount of any particular series. We may issue debt
        securities and other securities at any time without your consent and without
        notifying\nyou. The indentures and the debt securities will not limit our
        ability to incur other indebtedness or to issue other securities other than
        as specified in your debt security, as applicable. Also, unless otherwise
        specified below or in your\nprospectus supplement, we are not subject to financial
        or similar restrictions by the terms of the debt securities. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Principal
        Amount, Stated Maturity\nand Maturity </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise stated, the principal amount of a debt security means the principal
        amount payable at its stated\nmaturity, unless that amount is not determinable,
        in which case the principal amount of a debt security is its face amount.
        The term &#147;stated maturity&#148; with respect to any debt security means
        the day on which the principal amount of your\ndebt security is scheduled
        to become due. The principal may become due sooner, by reason of redemption,
        acceleration after a default or otherwise in accordance with the terms of
        the debt security. The day on which the principal actually becomes due,\nwhether
        at the stated maturity or earlier, is called the &#147;maturity&#148; of the
        principal. We also use the terms &#147;stated maturity&#148; and &#147;maturity&#148;
        to refer to the days when other payments become due. For example, we may refer\nto
        a regular interest payment date when an installment of interest is scheduled
        to become due as the &#147;stated maturity&#148; of that installment. When
        we refer to the &#147;stated maturity&#148; or the &#147;maturity&#148; of
        a debt security\nwithout specifying a particular payment, we mean the stated
        maturity or maturity, as the case may be, of the principal. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">12 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
