        font-size:10pt; font-family:Times New Roman\">The second type of change does
        not require any approval by holders of the debt securities affected. These
        changes are limited to clarifications\nand changes that would not adversely
        affect any debt securities of any series in any material respect. Nor do we
        need any approval to make changes that affect only debt securities to be issued
        under the applicable indenture after the changes take\neffect. We may also
        make changes or obtain waivers that do not adversely affect a particular debt
        security, even if they affect other debt securities. In those cases, we do
        not need to obtain the approval of the holder of the unaffected debt\nsecurity;
        we need only obtain any required approvals from the holders of the affected
        debt securities. We may also make changes to conform the text of the applicable
        indenture or any debt securities to any provision of the &#147;Description
        of Debt\nSecurities&#148; in this prospectus or the comparable section in
        your prospectus supplement, to the extent such provision was intended to be
        a verbatim recitation of a provision of such indenture or debt securities.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><I>Modification of Subordination Provisions </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We may not amend the indenture related to subordinated
        debt securities to alter the subordination of any outstanding subordinated
        debt\nsecurities without the written consent of each holder of senior debt
        then outstanding who would be adversely affected (or the group or representative
        thereof authorized or required to consent thereto pursuant to the instrument
        creating or\nevidencing, or pursuant to which there is outstanding, such senior
        debt). In addition, we may not modify the subordination provisions of the
        indenture related to subordinated debt securities in a manner that would adversely
        affect the subordinated\ndebt securities of any one or more series then outstanding
        in any material respect, without the consent of the holders of a majority
        in aggregate principal amount of all affected series then outstanding, voting
        together as one class (and also of any\naffected series that by its terms
        is entitled to vote separately as a series, as described below). </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B><I>Changes
        Requiring Majority Approval </I></B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any other change
        to a particular indenture and the debt securities issued under that indenture
        would require the following approval: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">If the change
        affects only particular debt securities within a series issued under the applicable
        indenture, it\nmust be approved by the holders of a majority in principal
        amount of such particular debt securities; or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">If the change
        affects debt securities of more than one series issued under the applicable
        indenture, it must be\napproved by the holders of a majority in principal
        amount of all debt securities of all such series affected by the change, with
        all such affected debt securities voting together as one class for this purpose
        and such affected debt securities of any\nseries potentially comprising fewer
        than all debt securities of such series, </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">in
        each case, except as may otherwise be\nprovided pursuant to such indenture
        for all or any particular debt securities of any series. This means that modification
        of terms with respect to certain securities of a series could be effectuated
        without obtaining the consent of the holders of a\nmajority in principal amount
        of other securities of such series that are not affected by such modification.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The same majority approval\nwould be required
        for us to obtain a waiver of any of our covenants in either indenture. Our
        covenants include the promises we make about merging or selling substantially
        all of our assets, which we describe above under &#147;&#151;Mergers and\nSimilar
        Transactions.&#148; If the holders approve a waiver of a covenant, we will
        not have to comply with it. The holders, however, cannot approve a waiver
        of any provision in </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">22 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\na particular debt security, or in the applicable
        indenture as it affects that debt security, that we cannot change without
        the approval of the holder of that debt security as described above in\n&#147;&#151;Changes
        Requiring Each Holder&#146;s Approval,&#148; unless that holder approves the
        waiver. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We may issue particular debt\nsecurities
        or a particular series of debt securities, as applicable, that are entitled,
        by their terms, to separately approve matters (for example, modification or
        waiver of provisions in the applicable indenture) that would also, or otherwise,\nrequire
        approval of holders of a majority in principal amount of all affected debt
        securities of all affected series issued under such indenture voting together
        as a single class. Any such affected debt securities or series of debt securities
        would\nbe entitled to approve such matters (i)&nbsp;pursuant to such special
        rights by consent of holders of a majority in principal amount of such affected
        debt securities or series of debt securities voting separately as a class
        and (ii)&nbsp;in\naddition, as described above, except as may otherwise be
        provided pursuant to the applicable indenture for such debt securities or
        series of debt securities, by consent of holders of a majority in principal
        amount of such affected debt securities or\nseries of debt securities and
        all other affected debt securities of all series issued under such indenture
        voting together as one class for this purpose. We may issue series or debt
        securities of a series having these or other special voting rights\nwithout
        obtaining the consent of or giving notice to holders of outstanding debt securities
        or series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Book-entry and other indirect\nowners
        should consult their banks or brokers for information on how approval may
        be granted or denied if we seek to change an indenture or any debt securities
        or request a waiver. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Special Rules for Action
        by Holders </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Only\nholders of outstanding
        debt securities of the applicable series will be eligible to take any action
        under the applicable indenture, such as giving a notice of default, declaring
        an acceleration, approving any change or waiver or giving the trustee\nan
        instruction with respect to debt securities of that series. Also, we will
        count only outstanding debt securities in determining whether the various
        percentage requirements for taking action have been met. Any debt securities
        owned by us or any of\nour affiliates or surrendered for cancellation or for
        payment or redemption, for which money has been set aside in trust, are not
        deemed to be outstanding. Any required approval or waiver must be given by
        written consent. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In some situations, we may follow
        special rules in calculating the principal amount of debt securities that
        are to be treated as outstanding\nfor the purposes described above. This may
        happen, for example, if the principal amount is payable in a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        dollar currency, increases over time or is not to be fixed until maturity.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We will generally be entitled to set any day
        as a record date for the purpose of determining the holders that are entitled
        to take action\nunder either indenture. In certain limited circumstances,
        only the trustee will be entitled to set a record date for action by holders.
        If we or the trustee sets a record date for an approval or other action to
        be taken by holders, that vote or\naction may be taken only by persons or
        entities who are holders on the record date and must be taken during the period
        that we specify for this purpose, or that the trustee specifies if it sets
        the record date. We or the trustee, as applicable, may\nshorten or lengthen
        this period from time to time. This period, however, may not extend beyond
        the 180th day after the record date for the action. In addition, record dates
        for any global debt security may be set in accordance with procedures\nestablished
        by the depositary from time to time. Accordingly, record dates for global
        debt securities may differ from those for other debt securities. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Form, Exchange and Transfer </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any debt\nsecurities cease to be issued in registered global form, they will
        be issued: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">only in fully
        registered form; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">without interest
        coupons; and </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">unless we
        indicate otherwise in your prospectus supplement, in denominations of $2,000
        and integral multiples of\n$1,000. </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">23 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Holders may
        exchange their debt securities for debt securities of smaller denominations
        or\ncombined into fewer debt securities of larger denominations, as long as
        the total principal amount is not changed. You may not exchange your debt
        securities for securities of a different series or having different terms,
        unless your prospectus\nsupplement and the supplemental indenture with respect
        to your debt securities provide for such exchange. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Holders
        may exchange or\ntransfer their debt securities at the office of the trustee.
        They may also replace lost, stolen, destroyed or mutilated debt securities
        at that office. We have appointed the trustee to act as our agent for registering
        debt securities in the names of\nholders and transferring and replacing debt
        securities. We may appoint another entity to perform these functions or perform
        them ourselves. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Holders will not be required
        to pay a service charge to transfer or exchange their debt securities, but
        they may be required to pay for any\ntax or other governmental charge associated
        with the exchange or transfer. The transfer or exchange, and any replacement,
        will be made only if our transfer agent is satisfied with the holder&#146;s
        proof of legal ownership. The transfer agent may\nrequire an indemnity before
        replacing any debt securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If we have designated
        additional transfer agents for your debt security, they\nwill be named in
        your prospectus supplement. We may appoint additional transfer agents or cancel
        the appointment of any particular transfer agent. We may also approve a change
        in the office through which any transfer agent acts. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the debt securities of any series are redeemable and we redeem less than all
        those debt securities, we may block the transfer or exchange\nof those debt
        securities during the period beginning 15 days before the day we mail the
        notice of redemption and ending on the day of that mailing, in order to freeze
        the list of holders to prepare the mailing. We may also refuse to register\ntransfers
        of or exchange any debt security selected for redemption, except that we will
        continue to permit transfers and exchanges of the unredeemed portion of any
        debt security being partially redeemed. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        a debt security is issued as a global debt security, only DTC or other depositary
        will be entitled to transfer and exchange the debt\nsecurity as described
        in this subsection because the depositary will be the sole holder of the debt
        security. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The rules for exchange\ndescribed
        above apply to exchange of debt securities for other debt securities of the
        same series and kind. If a debt security is convertible, exercisable or exchangeable
        into or for a different kind of security, such as one that we have not yet\nissued,
        or for other property, the rules governing that type of conversion, exercise
        or exchange will be described in the applicable prospectus supplement. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Payments </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We will pay
        interest, principal\nand other amounts payable with respect to the debt securities
        of any series to the holders of record of those debt securities as of the
        record dates and otherwise in the manner specified below or in the prospectus
        supplement for that series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We will make
        payments on a global debt security in accordance with the applicable policies
        of the depositary as in effect from time to time.\nUnder those policies, we
        will pay directly to the depositary, or its nominee, and not to any indirect
        owners who own beneficial interests in the global debt security. An indirect
        owner&#146;s right to receive those payments will be governed by the\nrules
        and practices of the depositary and its participants. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        will make payments on a debt security in\n<FONT STYLE=\"white-space:nowrap\">non-global,</FONT>
        registered form as follows. We will pay interest that is due on an interest
        payment date by check mailed on the interest payment date to the holder at
        his or her address shown on the trustee&#146;s\nrecords as of the close of
        business on the regular record date. We will make all other payments by check
        at the paying agent described below, against surrender of the debt security.
        All payments by check will be made in <FONT\nSTYLE=\"white-space:nowrap\">next-day</FONT>
        funds&#151;i.e., funds that become available on the day after the check is
        cashed. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">24 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Alternatively, if a <FONT STYLE=\"white-space:nowrap\">non-global</FONT>
        debt security has a\nface amount of at least $1,000,000 and the holder asks
        us to do so, we will pay any amount that becomes due on the debt security
        by wire transfer of immediately available funds to an account at a bank in
        New York City, on the due date. To request\nwire payment, the holder must
        give the paying agent appropriate wire transfer instructions at least five
        business days before the requested wire payment is due. In the case of any
        interest payment due on an interest payment date, the instructions\nmust be
        given by the person or entity who is the holder on the relevant regular record
        date. In the case of any other payment, payment will be made only after the
        debt security is surrendered to the paying agent. Any wire instructions, once
        properly\ngiven, will remain in effect unless and until new instructions are
        given in the manner described above. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Book-entry and
        other indirect\nowners should consult their banks or brokers for information
        on how they will receive payments on their debt securities. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Regardless
        of\nwho acts as paying agent, all money paid by us to a paying agent that
        remains unclaimed at the end of two years after the amount is due to a holder
        will be repaid to us. After that <FONT STYLE=\"white-space:nowrap\">two-year</FONT>
        period, the holder\nmay look only to us for payment and not to the trustee,
        any other paying agent or anyone else. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Paying Agents </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We may appoint one or more financial institutions
        to act as our paying agents, at whose designated offices debt securities in
        <FONT\nSTYLE=\"white-space:nowrap\">non-global</FONT> entry form may be surrendered
        for payment at their maturity. We call each of those offices a paying agent.
        We may add, replace or terminate paying agents from time to time. We may also
        choose to act as\nour own paying agent. We will specify in the prospectus
        supplement for your debt security the initial location of each paying agent
        for that debt security. We must notify the trustee of changes in the paying
        agents. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Notices </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notices
        to be given to holders\nof a global debt security will be given only to the
        depositary, in accordance with its applicable policies as in effect from time
        to time. Notices to be given to holders of debt securities not in global form
        will be sent by mail to the respective\naddresses of the holders as they appear
        in the trustee&#146;s records, and will be deemed given when mailed. Neither
        the failure to give any notice to a particular holder, nor any defect in a
        notice given to a particular holder, will affect the\nsufficiency of any notice
        given to another holder. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Book-entry and
        other indirect owners should consult their banks or brokers for\ninformation
        on how they will receive notices. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Our Relationship with the
        Trustee </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The prospectus supplement for
        your debt security will describe any material relationships we may have with
        the trustee with respect to that\ndebt security. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        same financial institution may initially serve as the trustee for our senior
        debt securities and subordinated debt\nsecurities. Consequently, if an actual
        or potential event of default occurs with respect to any of these securities,
        the trustee may be considered to have a conflicting interest for purposes
        of the Trust Indenture Act of 1939. In that case, the\ntrustee may be required
        to resign under one or more of the indentures, and we would be required to
        appoint a successor trustee. For this purpose, a &#147;potential&#148; event
        of default means an event that would be an event of default if the\nrequirements
        for giving us default notice or for the default having to exist for a specific
        period of time were disregarded. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">25 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_9\"></A>DESCRIPTION
        OF GUARANTEES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We may issue guarantees of debt
        securities and other securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The applicable
        prospectus supplement will describe the terms of any guarantees. The guarantees
        will be issued pursuant to documents to be\nissued by us. You should read
        the particular terms of the documents, which will be described in more detail
        in the applicable prospectus supplement. The particular terms of any guarantees
        offered by any prospectus supplement, and the extent to which\nthe general
        provisions summarized below may apply to the offered securities, will be described
