        Energy, Inc. </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:14pt;
        font-family:arial\" ALIGN=\"center\"><B>Class&nbsp;A Common Stock </B></P>
        <P STYLE=\"font-size:7pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<P
        STYLE=\"line-height:1.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1px
        solid #000000\">&nbsp;</P> <P STYLE=\"margin-top:5pt; margin-bottom:0pt; font-size:12pt;
        font-family:arial\">We are offering shares of our Class&nbsp;A common stock,
        par\nvalue $0.001 per share (the &#147;Class&nbsp;A Common Stock&#148;), pursuant
        to this prospectus supplement and the accompanying prospectus. The public
        offering price for each share of Class&nbsp;A Common Stock is $&#8195;&#8195;&#8195;&#8195;.
        </P>\n<P STYLE=\"margin-top:5pt; margin-bottom:0pt; font-size:12pt; font-family:arial\">Our
        Class&nbsp;A Common Stock trades on The New York Stock Exchange (&#147;NYSE&#148;)
        under the symbol &#147;EE.&#148; On March&nbsp;28, 2025, the last reported
        sale\nprice for our Class&nbsp;A Common Stock on NYSE was 27.99 per share.
        </P> <P STYLE=\"margin-top:5pt; margin-bottom:0pt; font-size:12pt; font-family:arial\">On
        March&nbsp;26, 2025, we entered into, through our subsidiary Excelerate Energy
        Limited\nPartnership, an equity and asset purchase agreement (the &#147;Purchase
        Agreement&#148;) with Atlantic Energy Holdings LLC and New Fortress Energy,
        Inc. (the &#147;NFE Parties&#148;), pursuant to which we agreed to acquire
        the NFE Parties&#146;\nbusiness in Jamaica (the &#147;Business&#148;). See
        &#147;Prospectus Supplement Summary&#151;Recent Developments&#151;Pending
        Acquisition of Infrastructure Assets.&#148; </P>\n<P STYLE=\"margin-top:5pt;
        margin-bottom:0pt; font-size:12pt; font-family:arial\">We are a &#147;controlled
        company&#148; within the meaning of NYSE&#146;s corporate governance rules.
        </P>\n<P STYLE=\"font-size:7pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>
        <P STYLE=\"line-height:1.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1px
        solid #000000\">&nbsp;</P>\n<P STYLE=\"margin-top:5pt; margin-bottom:0pt;
        font-size:14pt; font-family:arial\"><I>Investing in our Class&nbsp;A Common
        Stock involves a high degree of risk. See &#147;<A HREF=\"#supptoc833971_4\">Risk
        Factors</A>&#148; beginning on page <FONT\nSTYLE=\"white-space:nowrap\">S-8</FONT>
        of this prospectus supplement and page 3 of the accompanying prospectus, as
        well as the section captioned &#147;Risk Factors&#148; in our most recently
        filed annual report on <U>Form <FONT\nSTYLE=\"white-space:nowrap\">10-K</FONT></U><U>
        </U>and any subsequent report we file with the U.S. Securities and Exchange
        Commission, which are incorporated by reference in this prospectus supplement.
