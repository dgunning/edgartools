        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Governing Law </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The indentures and the debt securities will
        be governed by New York law. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Form of Debt Securities </B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We will issue\neach debt security only in registered
        form, without coupons, unless we specify otherwise in the applicable prospectus
        supplement. In addition, we will issue each debt security in global&#151;i.e.,
        book-entry&#151;form only, unless we specify\notherwise in the applicable
        prospectus supplement. Debt securities in book-entry form will be represented
        by a global security registered in the name of a depositary, which will be
        the holder of all the debt securities represented by the global\nsecurity.
        Those who own beneficial interests in a global debt security will do so through
        participants in the depositary&#146;s securities clearance system, and the
        rights of these indirect owners will be governed solely by the applicable
        procedures\nof the depositary and its participants. References to &#147;holders&#148;
        in this section mean those who own debt securities registered in their own
        names, on the books that we or the trustee maintain for this purpose, and
        not those who own\nbeneficial interests in debt securities registered in street
        name or in debt securities issued in book-entry form through one or more depositaries.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Unless otherwise indicated in the prospectus
        supplement, the following is a summary of the depositary arrangements applicable
        to debt\nsecurities issued in global form and for which DTC acts as depositary.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Each global debt security will be deposited
        with, or on behalf of,\nDTC, as depositary, or its nominee, and registered
        in the name of a nominee of DTC. Except under the limited circumstances described
        below, global debt securities are not exchangeable for definitive certificated
        debt securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Ownership of beneficial interests
        in a global debt security is limited to institutions that have accounts with
        DTC or its nominee, or persons\nthat may hold interests through those participants.
        In addition, ownership of beneficial interests by participants in a global
        debt security will be evidenced only by, and the transfer of that ownership
        interest will be effected only through,\nrecords maintained by DTC or its
        nominee for a global debt security. Ownership of beneficial interests in a
        global debt security by persons that hold those interests through participants
        will be evidenced only by, and the transfer of that ownership\ninterest within
        that participant will be effected only through, records maintained by that
        participant. DTC has no knowledge of the actual beneficial owners of the debt
        securities. Beneficial owners will not receive written confirmation from DTC
        of\ntheir purchase, but beneficial owners are expected to receive written
        confirmations providing details of the transaction, as well as periodic statements
        of their holdings, from the participants through which the beneficial owners
        entered the\ntransaction. The laws of some jurisdictions require that certain
        purchasers of securities take physical delivery of securities they purchase
        in definitive form. These laws may impair your ability to transfer beneficial
        interests in a global debt\nsecurity. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We will make
        payment of principal of, and interest on, debt securities represented by a
        global debt security registered in the\nname of or held by DTC or its nominee
        to DTC or its nominee, as the case may be, as the registered owner and holder
        of the global debt security representing those debt securities. DTC has advised
        us that upon receipt of any payment of principal of,\nor interest on, a global
        debt security, DTC immediately will credit accounts of participants on its
        book-entry registration and transfer system with payments in amounts proportionate
        to their respective interests in the principal amount of that\nglobal debt
        security, as shown in the records of DTC. Payments by participants to owners
        of beneficial interests in a global debt security held through those participants
        will be governed by standing instructions and customary practices, as is now\nthe
        case with securities held for the accounts of customers in bearer form or
        registered in &#147;street name,&#148; and will be the sole responsibility
        of those participants, subject to any statutory or regulatory requirements
        that may be in effect\nfrom time to time. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Neither
        we, any trustee nor any of our respective agents will be responsible for any
        aspect of the records of DTC, any\nnominee or any participant relating to,
        or payments made on account of, beneficial interests in a </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">14 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\npermanent global debt security
        or for maintaining, supervising or reviewing any of the records of DTC, any
        nominee or any participant relating to such beneficial interests. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">A global debt security is exchangeable for definitive
        certificated debt securities registered in the name of and a transfer of a
        global debt\nsecurity may be registered to, any person other than DTC or its
        nominee, only if: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">DTC notifies
        us that it is unwilling or unable to continue as depositary for that global
        security or has ceased\nto be a registered clearing agency and we do not appoint
        another institution to act as depositary within 90 days; or </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we notify
        the trustee that we wish to terminate that global security. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any global debt security that is exchangeable
        pursuant to the preceding paragraph will be exchangeable in whole for definitive
        certificated\ndebt securities in registered form, of like tenor and of an
        equal aggregate principal amount as the global debt security, in denominations
        specified in the applicable prospectus supplement, if other than $2,000 and
        multiples of $1,000. The\ndefinitive debt securities will be registered by
        the registrar in the name or names instructed by DTC. We expect that these
        instructions may be based upon directions received by DTC from its participants
        with respect to ownership of beneficial\ninterests in the global debt security.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as provided above or in your prospectus
        supplement, owners of the beneficial interests in a\nglobal debt security
        will not be entitled to receive physical delivery of debt securities in definitive
        certificated form and will not be considered the holders of debt securities
        for any purpose under the indentures. Except as provided above, no\nglobal
        debt security shall be exchangeable except for another global debt security
        of like denomination and tenor to be registered in the name of DTC or its
        nominee. Accordingly, each person owning a beneficial interest in a global
        debt security\nmust rely on the procedures of DTC and, if that person is not
        a participant, on the procedures of the participant through which that person
        owns its interest, to exercise any rights of a holder under the global debt
        security or the indentures. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We understand
        that, under existing industry practices, in the event that we request any
        action of holders, or an owner of a beneficial\ninterest in a global debt
        security desires to give or take any action that a holder is entitled to give
        or take under the debt securities or the indentures, DTC would authorize the
        participants holding the relevant beneficial interests to give or\ntake that
        action. Additionally, those participants would authorize beneficial owners
        owning through those participants to give or take that action or would otherwise
        act upon the instructions of beneficial owners owning through them. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">DTC has advised us that it is a limited-purpose
        trust company organized under the laws of the State of New York, a &#147;banking\norganization&#148;
        within the meaning of the New York Banking Law, a member of the Federal Reserve
        System, a &#147;clearing corporation&#148; within the meaning of the New York
        Uniform Commercial Code, and a &#147;clearing agency&#148; registered\nunder
        the Exchange Act. DTC was created to hold securities of its participants and
        to facilitate the clearance and settlement of transactions among its participants
        in securities through electronic book-entry changes in accounts of the participants.\nBy
        doing so, DTC eliminates the need for physical movement of securities certificates.
        DTC&#146;s participants include securities brokers and dealers, banks, trust
        companies, clearing corporations, and certain other organizations. DTC is
        owned by a\nnumber of its participants and by the New York Stock Exchange,
        Inc. and NYSE Amex Equities. Access to DTC&#146;s book-entry system is also
        available to others, such as banks, brokers, dealers, and trust companies
        that clear through or maintain a\ncustodial relationship with a participant,
        either directly or indirectly. The rules applicable to DTC and its participants
        are on file with the SEC. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Investors may
        hold interests in the debt securities outside the U.S. through the Euroclear
        System (&#147;Euroclear&#148;) or Clearstream\nBanking (&#147;Clearstream&#148;)
        if they are participants in those systems, or indirectly through organizations
        which are participants in those systems. Euroclear and Clearstream will hold
        interests on behalf of their participants through\ncustomers&#146; securities
        accounts in Euroclear&#146;s and Clearstream&#146;s names on the books of
        their respective depositaries, which in turn will hold such interests in customers&#146;
        securities accounts in the depositaries&#146; names on the\nbooks of DTC.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">15 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Securities clearance accounts
        and cash accounts with Euroclear SA/NV are governed by the\nTerms and Conditions
        Governing Use of Euroclear, the related Operating Procedures of Euroclear,
        and applicable Belgian law (collectively, the &#147;Terms and Conditions&#148;).
        The Terms and Conditions govern transfers of securities and cash within\nEuroclear,
        withdrawals of securities and cash within Euroclear, withdrawals of securities
        and cash from Euroclear, and receipts of payments with respect to securities
        in Euroclear. All securities in Euroclear are held on a fungible basis without\nattribution
        of specific certificates to specific securities clearance accounts. Euroclear
        SA/NV acts under the Terms and Conditions only on behalf of Euroclear participants
        and has no record of or relationship with persons holding through Euroclear\nparticipants.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Distributions with respect to debt securities
        held beneficially through Euroclear will be credited to the cash accounts
        of\nEuroclear participants in accordance with the Terms and Conditions, to
        the extent received by the U.S. depositary for Euroclear. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Distributions
        with respect to debt securities held beneficially through Clearstream will
        be credited to cash accounts of Clearstream\nparticipants in accordance with
        its rules and procedures, to the extent received by the U.S. depositary for
        Clearstream. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We have provided\nthe descriptions
        herein of the operations and procedures of DTC, Euroclear and Clearstream
        solely as a matter of convenience. These operations and procedures are solely
        within the control of DTC, Euroclear and Clearstream and are subject to change\nby
        them from time to time. We believe that the sources from which the information
        in this section and elsewhere in this prospectus concerning DTC, Euroclear,
        Euroclear SA/NV, Euroclear Clearance Systems S.C., Euroclear&#146;s system,
        Clearstream and\nClearstream&#146;s system has been obtained are reliable,
        but neither we, any underwriters nor the trustee takes any responsibility
        for the accuracy of the information. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Initial settlement
        for the securities will be made in immediately available funds. Secondary
        market trading between DTC participants will\noccur in the ordinary way in
        accordance with DTC&#146;s rules and will be settled in immediately available
        funds. Secondary market trading between Euroclear participants and/or Clearstream
        participants will occur in the ordinary way in accordance\nwith the applicable
        rules and operating procedures of Euroclear and Clearstream, as applicable,
        and will be settled using the procedures applicable to conventional eurobonds
        in immediately available funds. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Cross-market
        transfers between persons holding directly or indirectly through DTC, on the
        one hand, and directly or indirectly through\nEuroclear participants or Clearstream
        participants, on the other, will be effected in DTC in accordance with DTC
        rules on behalf of the relevant European international clearing system by
        its U.S. depositary; however, such cross-market transactions\nwill require
        delivery of instructions to the relevant European international clearing system
        by the counterparty in such system in accordance with its rules and procedures
        and within its established deadlines (European time). The relevant European\ninternational
        clearing system will, if the transaction meets its settlement requirements,
        deliver instructions to its U.S. depositary to take action to effect final
        settlement on its behalf by delivering or receiving securities in DTC, and
        making or\nreceiving payment in accordance with normal procedures for <FONT
        STYLE=\"white-space:nowrap\">same-day</FONT> funds settlement applicable to
        DTC. Euroclear participants and Clearstream participants may not deliver instructions
        directly to their\nrespective U.S. depositaries. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Because
        of time-zone differences, credits of securities received in Euroclear or Clearstream
        as a result of\na transaction with a DTC participant will be made during subsequent
        securities settlement processing and dated the business day following the
        DTC settlement date. Credits or any transactions in securities settled during
        this processing will be\nreported to the relevant Euroclear or Clearstream
        participants on that following business day. Cash received in Euroclear or
        Clearstream as a result of sales of debt securities by or through a Euroclear
        participant or a Clearstream participant to a\nDTC participant will be received
        with value on the DTC settlement date but will be available in the relevant
        Euroclear or Clearstream cash account only as of the business day following
        settlement in DTC. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">16 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Although DTC, Euroclear and
        Clearstream have agreed to the foregoing procedures to\nfacilitate transfers
        of securities among participants of DTC, Euroclear and Clearstream, they are
        under no obligation to perform or continue to perform these procedures and
        these procedures may be discontinued at any time. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Redemption
        or Repayment </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If there are any\nprovisions
        regarding redemption or repayment applicable to your debt security, we will
        describe them in your prospectus supplement. We or our affiliates may purchase
        debt securities from investors who are willing to sell from time to time,
        either in\nthe open market at prevailing prices or in private transactions
        at negotiated prices. Debt securities that we or they purchase may, at our
        discretion, be held, resold or canceled. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Mergers
        and Similar Transactions </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We are\ngenerally
        permitted under the indentures to merge or consolidate with another corporation
        or other entity. We are also permitted under the indentures to sell all or
        substantially all of our assets to another corporation or other entity. With
        regard\nto any series of debt securities and other than as set forth in your
        prospectus supplement, however, we may not take any of these actions unless
        all the following conditions, among other things, are met: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">If the successor
        entity in the transaction is not the Company, the successor entity must be
        organized as a\ncorporation, limited liability company, partnership or trust
        and must expressly assume our obligations under the debt securities of that
        series and the indenture with respect to that series. The successor entity
        may be organized under the laws of\nthe United States, any state thereof or
        the District of Columbia. </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">Immediately
        after the transaction, no default under the debt securities of that series
        has occurred and is\ncontinuing. For this purpose, &#147;default under the
        debt securities of that series&#148; means an event of default with respect
        to that series or any event that would be an event of default with respect
        to that series if the requirements for\ngiving us default notice and for our
        default having to continue for a specific period of time were disregarded.
        We describe these matters below under &#147;&#151;Default, Remedies and Waiver
        of Default.&#148; </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If the conditions
        described above are satisfied with respect to the debt securities of any series,
        we will not need to obtain the approval of\nthe holders of those debt securities
        in order to merge or consolidate or to sell all or substantially all our assets.
        Also, these conditions will apply only if we wish to merge or consolidate
        with another entity or sell all or substantially all of\nour assets to another
        entity. We will not need to satisfy these conditions if we enter into other
        types of transactions, including any transaction in which we acquire the stock
        or assets of another entity, any transaction that involves a change of\ncontrol
        of the Company but in which we do not merge or consolidate and any transaction
        in which we sell less than substantially all our assets. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        successor entity will be substituted for the Company with respect to the debt
        securities of any series and under the indenture with the\nsame effect as
        if it had been an original party to the indenture, and, except in the case
        of a lease, the Company will be relieved from any further obligations and
        covenants under the indenture. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Subordination Provisions
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Holders of\nsubordinated debt securities should
        recognize that contractual provisions in the subordinated debt indenture may
        prohibit us from making payments on those securities. Subordinated debt securities
        are subordinate and junior in right of payment, to\nthe extent and in the
        manner stated in the subordinated debt indenture, to all of our senior debt,
        as defined in the subordinated debt indenture, including all debt securities
        we have issued and will issue under the senior debt indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        subordinated debt indenture will define &#147;senior debt&#148; as any indebtedness
        permitted under the terms of that indenture, unless\nthe instrument under
        which such indebtedness is incurred expressly provides that it is on a parity
        with or subordinated in right of payment to the subordinated debt securities.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">17 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Notwithstanding the foregoing,
        &#147;senior debt&#148; will not include: (i)&nbsp;equity\ninterests; (ii)&nbsp;any
        liability for taxes; (iii)&nbsp;any indebtedness to any of our subsidiaries
        or affiliates; (iv)&nbsp;any trade payables; or (v)&nbsp;any indebtedness
        incurred in violation of the subordinated debt indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        may modify the subordination provisions, including the definition of senior
        debt, with respect to one or more series of subordinated debt\nsecurities.
        Such modifications will be set forth in the applicable prospectus supplement.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The subordinated debt indenture provides that,\nunless
        all principal of and any premium or interest on the senior debt has been paid
        in full, no payment or other distribution may be made in respect of any subordinated
        debt securities in the following circumstances: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">in the event
        of any insolvency or bankruptcy proceedings, or any receivership, liquidation,
        reorganization,\nassignment for creditors or other similar proceedings or
        events involving us or our assets; </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">(i) in the
        event and during the continuation of any default in the payment of principal
        of, and any premium and\ninterest on, any senior debt beyond any applicable
        grace period or (ii)&nbsp;in the event that any event of default with respect
        to any senior debt has occurred and is continuing, permitting the holders
        of that senior debt (or a trustee) to\naccelerate the maturity of that senior
        debt, whether or not the maturity is in fact accelerated (unless, in the case
        of (i)&nbsp;or (ii), the payment default or event of default has been cured
        or waived or ceased to exist and any related\nacceleration has been rescinded)
        or (iii)&nbsp;in the event that any judicial proceeding is pending with respect
        to a payment default or event of default described in (i)&nbsp;or (ii); or
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">in the event
        that any subordinated debt securities have been declared due and payable before
        their stated\nmaturity. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the trustee under the subordinated debt indenture or any holders of the subordinated
        debt securities\nreceive any payment or distribution that is prohibited under
        the subordination provisions, then the trustee or the holders will have to
        repay that money to the holders of the senior debt. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Even
        if the subordination provisions prevent us from making any payment when due
        on the subordinated debt securities of any series, we will be\nin default
        on our obligations under that series if we do not make the payment when due.
        This means that the trustee under the subordinated debt indenture and the
        holders of that series can take action against us, but they will not receive
        any money\nuntil the claims of the holders of senior debt have been fully
        satisfied. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The subordinated debt indenture
        allows the holders of senior\ndebt to obtain a court order requiring us and
        any holder of subordinated debt securities to comply with the subordination
        provisions. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Defeasance,\nCovenant Defeasance and Satisfaction
        and Discharge </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">When we use the term defeasance,
        we mean discharge from some or all of our\nobligations under the applicable
        indenture. If we deposit with the trustee funds or government securities,
        or if so provided in your prospectus supplement, obligations other than government
        securities, sufficient to make payments on any series of\ndebt securities
        on the dates those payments are due and payable and other specified conditions
        are satisfied, then, at our option, either of the following will occur: </P>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we will be
        discharged from our obligations with respect to the debt securities of such
        series (&#147;legal\ndefeasance&#148;); or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we will be
        discharged from any covenants we make in the applicable indenture for the
        benefit of such series and\nthe related events of default will no longer apply
        to us (&#147;covenant defeasance&#148;). </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">18 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If we defease
        any series of debt securities, the holders of such securities will not be\nentitled
        to the benefits of the applicable indenture, except for our obligations to
        register the transfer or exchange of such securities, replace stolen, lost
        or mutilated securities or maintain paying agencies and hold moneys for payment
        in trust.\nIn case of covenant defeasance, our obligation to pay principal
        of, and any premium and interest on, the applicable series of debt securities
        will also survive. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We will be required to deliver
        to the trustee an opinion of counsel that the deposit and related defeasance
        would not cause the holders of the\napplicable series of debt securities to
        recognize gain or loss for federal income tax purposes. If we elect legal
        defeasance, that opinion of counsel must be based upon a ruling from the U.S.
        Internal Revenue Service or a change in law to that\neffect. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        addition, we may satisfy and discharge all our obligations under the indenture
        with respect to debt securities of any series,\nother than our obligation
        to register the transfer of and exchange debt securities of that series, provided
        that we either: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">deliver all
        outstanding debt securities of that series to the trustee for cancellation;
        or </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">all such
        debt securities not so delivered for cancellation have either become due and
        payable or will become due\nand payable at their stated maturity within one
        year or are to be called for redemption within one year, and in the case of
        this bullet point, we have deposited with the trustee in trust an amount of
        cash sufficient to pay the entire indebtedness of\nsuch debt securities, including
        interest to the stated maturity or applicable redemption date. </P></TD></TR></TABLE>
        <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>No Personal Liability </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        past, present or future director, officer, employee, incorporator, member,
        manager, partner (whether general or limited), stockholder or\nstockholder
        of the Company, as such, will have any liability for any obligations of us
        under the debt securities or the indentures or for any claim based on, in
        respect of, or by reason of, such obligations or their creation. Each holder
        of debt\nsecurities by accepting a debt security waives and releases all such
        liability. The waiver and release are part of the consideration for issuance
        of the debt securities. The waiver may not be effective to waive liabilities
        under the federal\nsecurities laws. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Default, Remedies and Waiver
        of Default </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">You will have special rights
        if an event of default with respect to your debt security occurs and is continuing,
        as described in this\nsubsection. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B><I>Events of Default </I></B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Unless your prospectus supplement says otherwise,
        when we refer to an event of default with respect to any series of debt securities,
        we mean\nany of the following: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we do not
        pay the principal of and any premium on any debt security of that series on
        the due date;\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
