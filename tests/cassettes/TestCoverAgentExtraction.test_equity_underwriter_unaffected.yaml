        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"supptoc833971_1\"></A>ABOUT
        THIS PROSPECTUS SUPPLEMENT </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This prospectus
        supplement and the accompanying prospectus form part of a registration statement
        on\n<FONT STYLE=\"white-space:nowrap\">Form&nbsp;S-3</FONT> that we have filed
        with the U.S. Securities and Exchange Commission (the &#147;SEC&#148;) using
        a &#147;shelf&#148; registration process. This document contains two parts.
        The first part consists\nof this prospectus supplement, which provides you
        with specific information about this offering. The second part consists of
        the accompanying prospectus, which generally describes Excelerate Energy,
        Inc. and the securities we may offer, some of\nwhich may not apply to this
        offering. This prospectus supplement may add, update or change information
        contained in the accompanying prospectus. To the extent that any statement
        we make in this prospectus supplement is inconsistent with statements\nmade
        in the accompanying prospectus, or any documents incorporated by reference,
        the statements made in this prospectus supplement will be deemed to modify
        or supersede those made in the accompanying prospectus, including the documents
        incorporated\nby reference therein. Information in any document we subsequently
        file that is incorporated by reference shall modify or supersede the information
        in this prospectus supplement, the accompanying prospectus and documents incorporated
        by reference\nprior to such subsequent filing. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Please
        read this prospectus supplement, the accompanying prospectus and any related
        free writing\nprospectus, together with the information incorporated herein
        by reference as described under the heading &#147;Where You Can Find More
        Information,&#148; carefully before buying any of the Class&nbsp;A Common
        Stock being offered. The distribution\nof this prospectus supplement and the
        accompanying prospectus and the offering of our Class&nbsp;A Common Stock
        in certain jurisdictions may be restricted by law. Persons outside the United
