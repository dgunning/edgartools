        prospectus must inform themselves about, and observe any restrictions relating
        to, the offering of our securities and the distribution of this prospectus
        supplement and the accompanying prospectus outside the United\nStates. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">This prospectus supplement contains summaries
        of certain provisions contained in some of the documents described herein,
        but\nreference is made to the actual documents for complete information. All
        of the summaries are qualified in their entirety by the actual documents.
        Copies of some of the documents referred to herein have been filed, will be
        filed or are incorporated\nby reference as exhibits to the registration statement
        of which this prospectus is a part, and you may obtain copies of those documents
        as described below under the heading &#147;Where You Can Find More Information.&#148;
        </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>Trademarks, Tradenames and Service Marks </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We own or have rights to trademarks, trade names
        and service marks that appear in this offering memorandum, including, but
        not limited to,\nExcelerate Energy, which are protected under applicable intellectual
        property laws. This prospectus supplement may also contain trademarks, trade
        names and service marks of other parties, which are the property of their
        respective owners. Solely for\nconvenience, trademarks, trade names and service
        marks referred to in this prospectus supplement may appear without the <SUP
        STYLE=\"font-size:75%; vertical-align:top\">&reg;</SUP>, TM or SM symbols,
        but such references are not intended to indicate,\nin any way, that we will
        not assert, to the fullest extent permitted under applicable law, our rights
        or the rights of the applicable owners to these trademarks, trade names and
        service marks. We do not intend our use or display of other\nparties&#146;
        trademarks, trade names or service marks to imply, and such use or display
        should not be construed to imply, a relationship with, or endorsement or sponsorship
        of us by, these other parties. </P>\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n\n<div style =\"BORDER-BOTTOM:1.00pt solid #000000;BORDER-LEFT:1.00pt
        solid #000000;BORDER-RIGHT:1.00pt solid #000000;BORDER-TOP:1.00pt solid #000000;MARGIN-LEFT:0px;
        MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%; margin-top:1.5%;
        margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A
        NAME=\"supptoc833971_2\"></A>PROSPECTUS SUPPLEMENT SUMMARY </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>The
        items in the following summary are described in more detail later in this
        prospectus supplement and the accompanying prospectus. This\nsummary provides
        an overview of selected information and does not contain all of the information
        you should consider before buying our Class&nbsp;A Common Stock. Therefore,
        you should read the entire prospectus supplement and the accompanying\nprospectus
        carefully, including the information in our filings with the SEC, incorporated
        by reference herein and as described under the heading &#147;Where You Can
        Find More Information,&#148; before deciding to invest in our Class&nbsp;A
        Common\nStock. Investors should carefully consider the information set forth
        under &#147;Risk Factors&#148; beginning on page <FONT STYLE=\"white-space:nowrap\">S-8</FONT>
        of this prospectus supplement and page 3 of the accompanying prospectus and
        any related\nfree writing prospectus, and under similar headings in the other
        documents that are incorporated by reference into this prospectus supplement.
        In this prospectus supplement, unless the context otherwise requires, references
        to &#147;the\nCompany,&#148; &#147;we,&#148; &#147;us,&#148; &#147;our,&#148;
        or &#147;Excelerate&#148; refer to Excelerate Energy, Inc., in each case together
        with its consolidated subsidiaries. </I></P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Our Company
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Excelerate offers liquefied\nnatural gas (&#147;LNG&#148;)
        solutions, providing integrated services along the LNG value chain. We offer
        a full range of services, including floating storage and regasification units
        (&#147;FSRUs&#148;), LNG import infrastructure development and\nLNG and natural
        gas supply. From our founding, we have focused on LNG solutions to markets
        in diverse environments across the globe, providing a lesser emitting form
        of energy to markets that often rely on coal as their primary energy source.
        At\nExcelerate, we believe that access to energy sources such as LNG is critical
        to assisting markets with enhancing energy security and advancing their decarbonization
        efforts. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Our business focuses on the
        integration of natural\n<FONT STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">gas-to-power</FONT></FONT>
        in the LNG value chain, and as part of this value chain, we operate at regasification
        terminals that utilize our FSRU fleet to serve economies throughout\nthe world.
        Our business is substantially supported by time charter and terminal use contracts,
        which are effectively long-term, <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">take-or-pay</FONT></FONT> arrangements and provide\nconsistent
        revenue and cash flow from our high-quality customer base. As of December&nbsp;31,
        2024, we operate a fleet of 10 purpose-built FSRUs, and since we began operations,
        we have completed more than 3,000 <FONT STYLE=\"white-space:nowrap\"><FONT\nSTYLE=\"white-space:nowrap\">ship-to-ship</FONT></FONT>
        transfers of LNG with over 50 LNG operators and have safely delivered more
        than 7,300&nbsp;billion cubic feet of natural gas through 16 LNG regasification
        terminals. We expect to bring online\nHull 3407, our newbuild FSRU currently
        being constructed by Hyundai Heavy Industries in South Korea, in 2026 to support
        our fleet expansion plans and to meet the growing need for floating regasification
        capacity. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Our business spans the globe,
        with regional presences in 11 countries and an operational presence in Argentina,
        Bangladesh, Brazil, Finland,\nGermany, Pakistan, the United Arab Emirates
        (&#147;UAE&#148;) and the United States. We are the largest provider of regasified
        LNG capacity in Argentina, Bangladesh, Finland and the UAE. We are also one
        of the largest providers of regasified LNG\ncapacity in Brazil, where we operate
        the largest FSRU, and Pakistan, where we have regasified more LNG than any
        other provider in the past 10 years. Our business strategy includes marketing
        natural gas and LNG, both of which offer a cleaner energy\nsource from which
        power can be generated consistently, through our infrastructure assets in
        the markets where we operate. The high value our customers place on our services
        has resulted in a reliable source of revenues to us. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        also procure LNG from major producers and sell natural gas through our LNG
        terminals. We believe that the commercial momentum that we have\nestablished
        in recent years and the increasing need for access to LNG around the world
        have resulted in a significant portfolio of new growth opportunities for us
        to pursue. In addition to our FSRU and terminal services businesses and LNG
        and\nnatural gas sales, we plan to expand our business through investments
        LNG import and related infrastructure. </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-2 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
