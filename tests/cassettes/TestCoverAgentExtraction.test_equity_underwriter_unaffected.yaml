        on hand, to fund the\nconsideration payable by us in the Pending Acquisition
        and pay related fees and expenses. While we expect that the net proceeds from
        this offering and the net proceeds from the Debt Financing, along with cash
        on hand, will be sufficient to fund the\npurchase price of the Pending Acquisition,
        we may use proceeds from other debt financing transactions, such as the Bridge
        Facility (to the extent commitments remain available), to fund the remaining
        portion of the consideration. If the Pending\nAcquisition does not close,
        we intend to use the net proceeds from this offering for general corporate
        purposes, including repayment of outstanding indebtedness and to fund capital
        expenditures. The closing of this offering is not conditioned on the\nclosing
        of the Pending Acquisition. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Prior to the
