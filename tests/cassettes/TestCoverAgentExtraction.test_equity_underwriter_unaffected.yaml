        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">persons that
        acquire our securities as compensation for services. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In addition, this summary does not discuss other
        U.S. federal tax consequences (e.g., estate or gift tax), any state, local,
        or <FONT\nSTYLE=\"white-space:nowrap\">non-U.S.</FONT> tax considerations
        or the Medicare tax or alternative minimum taxes. No assurance can be given
        that the Internal Revenue Service (&#147;IRS&#148;) would not assert, or that
        a court would not sustain a\nposition contrary to any of the tax aspects set
        forth below. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">For purposes of this summary,
        a &#147;U.S. Holder&#148; is a beneficial\nholder of Class&nbsp;A Common Stock
        that, for U.S. federal income tax purposes is: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">1.</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">an individual who is a United States citizen
        or resident of the United States; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">2.</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">a corporation or other entity treated as a corporation
        for United States federal income tax purposes created\nin, or organized under
        the law of, the United States or any state or political subdivision thereof;
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">3.</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">an estate the income of which is includible in
        gross income for United States federal income tax purposes\nregardless of
        its source; or </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-17 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\" VALIGN=\"top\" ALIGN=\"left\">4.</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">a trust (A)&nbsp;the
        administration of which is subject to the primary supervision of a United
        States court and\nwhich has one or more United States persons (within the
        meaning of the Code) who have the authority to control all substantial decisions
        of the trust or (B)&nbsp;that has in effect a valid election under applicable
        Treasury regulations to be treated\nas a United States person. </P></TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">A <FONT STYLE=\"white-space:nowrap\">&#147;non-U.S.</FONT>
        Holder&#148; is a beneficial holder\nof Class&nbsp;A Common Stock that is
        neither a U.S. Holder nor a partnership (or other entity or arrangement treated
        as a partnership) for U.S. federal income tax purposes. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        tax treatment of a partner in a partnership (or other entity or arrangement
        treated as a partnership for U.S. federal income tax purposes)\nthat holds
        our securities generally will depend on the status of the partner and the
        activities of the partnership. Partnerships holding our securities and the
        partners in such partnerships should consult their own tax advisors regarding
        the U.S.\nfederal income tax consequences applicable to them. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">THIS
        DISCUSSION OF U.S. FEDERAL INCOME TAX CONSIDERATIONS IS FOR GENERAL INFORMATION\nPURPOSES
        ONLY AND IS NOT TAX ADVICE. PROSPECTIVE HOLDERS SHOULD CONSULT THEIR TAX ADVISORS
        CONCERNING THE U.S. FEDERAL INCOME TAX CONSEQUENCES TO THEM OF OWNING AND
        DISPOSING OF OUR SECURITIES, AS WELL AS THE APPLICATION OF ANY, STATE, LOCAL
        AND <FONT\nSTYLE=\"white-space:nowrap\">NON-U.S.</FONT> INCOME, ESTATE AND
        OTHER TAX CONSIDERATIONS. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>U.S. Holders </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><I>Distributions </I></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Distributions
        of cash or\nother property (other than certain pro rata distributions of our
        stock) in respect of our Class&nbsp;A Common Stock will generally be treated
        as a dividend to the extent paid out of our current or accumulated earnings
        and profits, as determined\nunder U.S. federal income tax principles. Distributions
        in excess of current and accumulated earnings and profits will be treated
        as a <FONT STYLE=\"white-space:nowrap\">non-taxable</FONT> return of capital
        to the extent of the U.S. Holder&#146;s\nbasis in its Class&nbsp;A Common
        Stock and, to the extent the amount of the distribution exceeds a U.S. Holder&#146;s
        adjusted tax basis in such securities, the excess will be treated as gain
        from the disposition of such security (the tax treatment\nof which is discussed
        below under &#147;U.S. Holders &#151; Sale, Exchange or Other Taxable Disposition
        of Our Class&nbsp;A Common Stock&#148;). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Dividends
        we pay to a U.S. Holder that is a taxable corporation generally will qualify
        for the dividends received deduction if the\nrequirements relating to the
        requisite holding period are satisfied. With certain exceptions, and provided
        certain holding period requirements are met, dividends we pay to a <FONT STYLE=\"white-space:nowrap\">non-corporate</FONT>
        U.S. Holder generally\nwill constitute &#147;qualified dividends&#148; that
        currently are subject to tax at preferential long-term capital gains rates.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><I>Sale, Exchange or\nOther Taxable Disposition of Our Securities
        </I></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon a sale, exchange (other than by exercise)
        or other taxable disposition of our\nsecurities, a U.S. Holder will generally
        recognize taxable gain or loss in an amount equal to the difference between
        (1)&nbsp;the amount realized upon such sale, exchange or disposition and (2)&nbsp;the
        U.S. Holder&#146;s tax basis in the security.\nSuch gain or loss will generally
        be treated as long-term capital gain or loss if the security is held by the
        U.S. Holder for more than one year at the time of such sale, exchange or disposition.
        Long-term capital gains recognized by certain <FONT\nSTYLE=\"white-space:nowrap\">non-corporate</FONT>
        U.S. Holders generally are taxed at preferential rates. The deductibility
        of capital losses is subject to certain limitations. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><I>Information
        Reporting and Backup Withholding </I></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In general,
        information reporting requirements may apply to dividends paid to a U.S. Holder
        and to the proceeds of the sale, exchange or other\ntaxable disposition of
        our securities, unless the U.S. Holder is an exempt </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-18 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nrecipient. Backup withholding
        may apply to such payments if the U.S. Holder fails to provide a taxpayer
        identification number, typically on an IRS Form\n<FONT STYLE=\"white-space:nowrap\">W-9,</FONT>
        or a certification of exempt status or has been notified by the IRS that it
        is subject to backup withholding (and such notification has not been withdrawn).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Backup withholding is not an additional tax.
        Any amounts withheld under the backup withholding rules will be allowed as
        a refund or a credit\nagainst a U.S. Holder&#146;s U.S. federal income tax
        liability provided the required information is timely furnished to the IRS.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><FONT\nSTYLE=\"white-space:nowrap\">Non-U.S.</FONT> Holders
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><I>Distributions </I></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Distributions
        to a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder with respect
        to shares of our Class&nbsp;A Common Stock that is\ntreated as a dividend
        for U.S. federal income tax purposes will generally be subject to withholding
        tax at a 30% rate (or such lower rate specified by an applicable income tax
        treaty). To obtain the benefit of a reduced rate under an applicable\nincome
        tax treaty, a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder must
        certify as to its <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> status,
        that no withholding is required pursuant to the Foreign Account Tax Compliance
        Act\n(&#147;FATCA&#148;) (discussed below), and to such right under the applicable
        income tax treaty on a properly completed IRS Form <FONT STYLE=\"white-space:nowrap\">W-8BEN</FONT>
        or IRS Form <FONT STYLE=\"white-space:nowrap\"><FONT\nSTYLE=\"white-space:nowrap\">W-8BEN-E.</FONT></FONT>
        If, however, a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder provides
        an IRS Form <FONT STYLE=\"white-space:nowrap\">W-8ECI,</FONT> certifying that
        the dividend is effectively connected with\nthe <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder&#146;s conduct of a trade or business within the United States (and,
        in the case of certain income tax treaties, is attributable to a permanent
        establishment or fixed base maintained by the\n<FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder in the United States), the dividend will not be subject to withholding.
        Instead, such dividends are subject to U.S. federal income tax at regular
        rates applicable to U.S. persons generally and,\nfor corporate holders, may
        also be subject to a 30% &#147;branch profits tax&#148; unless the <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder qualifies for a lower rate under an applicable U.S. income tax treaty.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><I>Sale, Exchange or Other Taxable Disposition of Our Class&nbsp;A
        Common Stock </I></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Subject to the discussions below
        regarding FATCA and backup withholding, a non-U.S. Holder will generally not
        be subject to U.S. federal income\nor withholding tax in respect of gain recognized
        on a sale, taxable exchange or other taxable disposition of our Class&nbsp;A
        Common Stock unless: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the gain
        is effectively connected with the conduct of a trade or business by the\n<FONT
        STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder within the United States
        (and, if an applicable tax treaty so requires, is attributable to a U.S. permanent
        establishment or fixed base maintained by the\n<FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder); </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the <FONT
        STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder is an individual who is
        present in the United States\nfor 183 days or more in the taxable year of
        disposition and certain other conditions are met; or </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we are or
        have been a &#147;United States real property holding corporation&#148; for
        U.S. federal income tax\npurposes during a specified period and certain other
        requirements are met. We do not expect to be a &#147;United States real property
        holding corporation&#148; for U.S. federal income tax purposes, but there
        can be no assurance in that regard.\n</P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Gain
        described in the first bullet point above will be subject to tax at the generally
        applicable U.S. federal income\ntax rates. Any gains described in the first
        bullet point above of a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder that is a foreign corporation may also be subject to an additional
        &#147;branch profits tax&#148; at a 30% rate (or lower\napplicable treaty
        rate). Gain described in the second bullet point above will generally be subject
        to a flat 30% U.S. federal income tax. <FONT STYLE=\"white-space:nowrap\">Non-U.S.</FONT>
        Holders are urged to consult their tax advisors regarding\npossible eligibility
        for benefits under income tax treaties. If the third bullet point above applies
        to a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder, gain recognized
        by such holder on the sale, exchange or other disposition of our\nClass&nbsp;A
        Common Stock will be subject to tax at the generally applicable U.S. federal
        income tax rates, and certain withholding requirements may apply. Each <FONT
        STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder is urged to consult its
        tax\nadvisor regarding the application of these rules. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-19 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><I>Foreign Account Tax Compliance
        Act </I></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Under FATCA, withholding at
        a rate of 30% will generally be required on dividends in respect of shares
        of our Class&nbsp;A Common Stock held by\nor through certain foreign financial
        institutions (including investment funds), unless such institution (i)&nbsp;enters
        into an agreement with the U.S. Department of the Treasury to report, on an
        annual basis, information with respect to shares in,\nand accounts maintained
        by, the institution to the extent such shares (or <FONT STYLE=\"white-space:nowrap\">pre-funded</FONT>
        warrants) or accounts are held by certain U.S. persons and by certain <FONT
        STYLE=\"white-space:nowrap\">non-U.S.</FONT>\nentities that are wholly or
        partially owned by U.S. persons and to withhold on certain payments, (ii)&nbsp;complies
        with the terms of an intergovernmental agreement between the United States
        and an applicable foreign country or (iii)&nbsp;otherwise\nqualifies for an
        exemption. Accordingly, the entity through which our Class&nbsp;A Common Stock
        is held will affect the determination of whether such withholding is required.
        Similarly, dividends in respect of shares of our Class&nbsp;A Common Stock\nheld
        by an investor that is a <FONT STYLE=\"white-space:nowrap\">non-financial</FONT>
        <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> entity that does not qualify
        under certain exemptions will be subject to withholding at a rate of 30%,
        unless such\nentity either (i)&nbsp;certifies that such entity does not have
        any &#147;substantial United States owners&#148; or (ii)&nbsp;provides certain
        information regarding the entity&#146;s &#147;substantial United States owners,&#148;
        which we or the\napplicable withholding agent will in turn provide to the
        Secretary of the Treasury. An intergovernmental agreement between the United
        States and an applicable foreign country, or future Treasury regulations or
        other guidance, may modify these\nrequirements. We will not pay any additional
        amounts to investors in respect of any amounts withheld. Withholding under
        FATCA may also apply to payments of gross proceeds from a sale or other disposition
        of our securities. However, under proposed\nTreasury regulations, withholding
        on gross proceeds is not required. Although such regulations are not final,
        applicable withholding agents may rely on the proposed regulations until final
        regulations are issued. If withholding under FATCA is\nrequired on any payment
        in respect of our securities, <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        investors not otherwise subject to withholding (or that otherwise would be
        entitled to a reduced rate of withholding) may be required to seek a\nrefund
        or credit from the IRS. Each <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder is urged to consult its tax advisor regarding the possible implications
        of FATCA on such holder&#146;s investment in our securities. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><I>Information
        Reporting and Backup Withholding </I></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Information
        returns will be filed with the IRS in connection with payments of dividends
        and the proceeds from a sale, exchange or other taxable\ndisposition of our
        Class&nbsp;A Common Stock. Copies of the information returns reporting such
        dividends and withholding may also be made available to the tax authorities
        in the country in which the respective\n<FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        Holder resides under the provisions of an applicable income tax treaty. A
        <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder may have to comply
        with certification procedures to establish that it\nis not a &#147;United
        States person&#148; within the meaning of Section&nbsp;7701(a)(30) of the
        Code in order to avoid information reporting and backup withholding requirements.
        The certification procedures required to claim a reduced rate of\nwithholding
        under a treaty generally will satisfy the certification requirements necessary
        to avoid the backup withholding as well. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Backup
        withholding is not an additional tax. The amount of any backup withholding
        from a payment to a\n<FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder
        will be allowed as a credit against such holder&#146;s U.S. federal income
        tax liability and may entitle such holder to a refund, provided that the required
        information is timely furnished to\nthe IRS. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each
        <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder is urged to consult
        its tax advisor regarding the application of\ninformation reporting and backup
        withholding to such <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT> Holder.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">S-20 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
