        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"txa833971_4\"></A>ABOUT
        EXCELERATE ENERGY, INC. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We are changing
        the way the world accesses cleaner and more reliable energy by delivering
        regasified natural gas, benefiting hundreds of\nmillions of people around
        the world. From our founding, we have focused on providing flexible LNG solutions
        to markets in diverse environments across the globe, providing a lesser emitting
        form of energy to markets that often rely on coal as their\nprimary energy
        source. At Excelerate, we believe that access to energy sources such as LNG
        is critical to assisting markets in their decarbonization efforts, while at
        the same time promoting economic growth and improving quality of life. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have grown our business significantly since
        our first FSRU charter in 2003, and today, we are a profitable energy company
        with a\ngeographically diversified business model. Our business spans the
        globe, with regional offices in 11 countries and operations in Argentina,
        Bangladesh, Brazil, Finland, Pakistan, United Arab Emirates and the United
        States. We are the largest\nprovider of regasified LNG in Argentina and Bangladesh
        and one of the largest providers of regasified LNG in Brazil and Pakistan,
        and we operate the largest FSRU in Brazil. We also lease an LNG terminal in
        Bahia, Brazil from Petr&oacute;leo\nBrasileiro S.A. and, in December 2021,
        started importing LNG and selling natural gas to the Brazilian market. In
        December 2022, we began importing and selling natural gas and LNG into Europe
        via the Inkoo Terminal in Finland. We also have plans to\nsell natural gas
        to other downstream customers in Brazil, Europe and Bangladesh. In each of
        these regions, we offer a cleaner energy source from which power can be generated
        consistently. The high value our customers place on our services has\nresulted
        in a reliable source of revenues to us, while our global reach helps balance
        seasonal demand fluctuation among the geographies in which we operate. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Our business focuses on the integration of the
        natural\n<FONT STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">gas-to-power</FONT></FONT>
        LNG value chain, and as part of this value chain, we operate regasification
        terminals in global economies that utilize our FSRU fleet. Our business is\nsubstantially
        supported by time charter contracts, which are effectively long-term, <FONT
        STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">take-or-pay</FONT></FONT>
        arrangements and provide consistent revenue and cash flow from our\nhigh-quality
        customer base. As of March&nbsp;31, 2023, we operate a fleet of ten purpose-built
        FSRUs, have completed more than 2,500 <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">ship-to-ship</FONT></FONT> transfers of LNG with\nover
        40 LNG operators since we began operations and have safely delivered more
        than 6,000&nbsp;billion cubic feet of natural gas through 16 LNG regasification
        terminals. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We also procure LNG from major
        producers and sell natural gas through our flexible LNG terminals. The commercial
        momentum that we have\nestablished in recent years and the increasing need
        for access to LNG around the world have resulted in a significant portfolio
        of new growth opportunities for us to pursue. In addition to our FSRU and
        terminal services businesses and natural gas\nsales, we plan to expand our
        business to provide customers with an array of products. We are evaluating
        and pursuing early-stage projects with opportunities in Europe, Asia Pacific,
        Latin America and the Middle East. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our integrated
        LNG solutions are designed to avoid the roadblocks that routinely hinder the
        development of terminal, gas and power projects in\nmarkets worldwide. We
        offer enhanced energy security and independence to the countries in which
        we operate, while playing a vital role in advancing their efforts to lower
        carbon emissions and comply with the Paris Agreement on climate change. From\nour
        global experience, we see firsthand the impact of providing local communities
        with a reliable source of energy and the subsequent development of natural
        gas and power infrastructure to take advantage of the natural gas we deliver
        to them. With\nimproved access to cleaner and more reliable energy, countries
        are able to power industries, light homes and bolster economies. Additionally,
        some of the markets in which we operate lack developed energy infrastructure
        and therefore rely heavily on\nour services. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        seek to optimize our LNG portfolio and fleet flexibility to deliver the best
        solutions that scale with our\ncustomers&#146; needs. We believe that LNG
        will play a critical part in the global transition to a lower-carbon future.
        Even the most aggressive scenarios that call for a larger role for renewables
        and new technology in decarbonization efforts fail\nto achieve the Paris Agreement&#146;s
        goals without substantial growth in natural gas volumes, including in the
        form of LNG, through 2040. While more aggressive mandates to shift electricity
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">1 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
