        above under &#147;&#151;Subordination Provisions.&#148; </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        as otherwise specified in the applicable prospectus supplement, if an event
        of default has occurred with respect to any series of debt\nsecurities and
        has not been cured or waived, the trustee or the holders of not less than
        25% in principal amount of all debt securities of that series then outstanding
        may declare the entire principal amount of the debt securities of that series
        to\nbe due immediately. Except as otherwise specified in the applicable prospectus
        supplement, if the event of default occurs because of events in bankruptcy,
        insolvency or reorganization relating to the Company, the entire principal
        amount of the debt\nsecurities of that series will be automatically accelerated,
        without any action by the trustee or any holder. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each
        of the situations\ndescribed above is called an acceleration of the stated
        maturity of the affected series of debt securities. Except as otherwise specified
        in the applicable prospectus supplement, if the stated maturity of any series
        is accelerated and a judgment for\npayment has not yet been obtained, the
        holders of a majority in principal amount of the debt securities of that series
        may cancel the acceleration for the entire series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an event of default occurs, the trustee will have special duties. In that
        situation, the trustee will be obligated to use those of its\nrights and powers
        under the relevant indenture, and to use the same degree of care and skill
        in doing so, that a prudent person would use in that situation in conducting
        his or her own affairs. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except as described
        in the prior paragraph, the trustee is not required to take any action under
        the relevant indenture at the request of any\nholders unless the holders offer
        the trustee reasonable protection from expenses and liability. This is called
        an indemnity. If the trustee is provided with an indemnity reasonably satisfactory
        to it, the holders of a majority in principal amount of\nall debt securities
        of the relevant series may direct the time, method and place of conducting
        any lawsuit or other formal legal action seeking any remedy available to the
        trustee with respect to that series. These majority holders may also direct\nthe
        trustee in performing any other action under the relevant indenture with respect
        to the debt securities of that series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Before you\nbypass
        the trustee and bring your own lawsuit or other formal legal action or take
        other steps to enforce your rights or protect your interests relating to any
        debt security, all of the following must occur: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
