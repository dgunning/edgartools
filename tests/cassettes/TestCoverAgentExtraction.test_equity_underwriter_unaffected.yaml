        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR>\n<TD
        WIDTH=\"38%\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">We intend to
        use the net proceeds from this offering, together with the net proceeds from
        the Debt Financing and cash on hand, to fund the consideration payable by
