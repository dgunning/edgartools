        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Barclays Capital
        Inc. and Morgan Stanley &amp; Co. LLC, in their sole discretion, may release
        the Common Stock and other securities subject to\nthe <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>
        agreements described above in whole or in part at any time. When determining
        whether or not to release Common Stock and other securities from <FONT STYLE=\"white-space:nowrap\">lock-up</FONT>\nagreements,
        Barclays Capital Inc. and Morgan Stanley &amp; Co. LLC will consider, among
        other factors, the holder&#146;s reasons for requesting the release, the number
        of shares of Common Stock and other securities for which the release is being\nrequested
        and market conditions at the time. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Indemnification </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have agreed to indemnify the underwriters
        against certain liabilities, including liabilities under the Securities Act,
        and to contribute to\npayments that the underwriters may be required to make
        for these liabilities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-23 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Stabilization, Short Positions
        and Penalty Bids </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The representatives may engage
        in stabilizing transactions, short sales and purchases to cover positions
        created by short sales, and penalty\nbids or purchases for the purpose of
        pegging, fixing or maintaining the price of the Class&nbsp;A Common Stock,
        in accordance with Regulation M under the Exchange Act: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">Stabilizing
        transactions permit bids to purchase the underlying security so long as the
        stabilizing bids do not\nexceed a specified maximum. </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">A short position
        involves a sale by the underwriters of shares in excess of the number of shares
        the underwriters\nare obligated to purchase in the offering, which creates
        the syndicate short position. This short position may be either a covered
        short position or a naked short position. In a covered short position, the
        number of shares involved in the sales made\nby the underwriters in excess
        of the number of shares they are obligated to purchase is not greater than
        the number of shares that they may purchase by exercising their option to
        purchase additional shares. In a naked short position, the number of\nshares
        involved is greater than the number of shares in their option to purchase
        additional shares. The underwriters may close out any short position by either
        exercising their option to purchase additional shares and/or purchasing shares
        in the\nopen market. In determining the source of shares to close out the
        short position, the underwriters will consider, among other things, the price
        of shares available for purchase in the open market as compared to the price
        at which they may purchase\nshares through their option to purchase additional
        shares. A naked short position is more likely to be created if the underwriters
        are concerned that there could be downward pressure on the price of the shares
        in the open market after pricing that\ncould adversely affect investors who
        purchase in the offering. </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">Syndicate
        covering transactions involve purchases of the Class&nbsp;A Common Stock in
        the open market after the\ndistribution has been completed in order to cover
        syndicate short positions. </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">Penalty bids
        permit the representatives to reclaim a selling concession from a syndicate
        member when the\nClass&nbsp;A Common Stock originally sold by the syndicate
        member is purchased in a stabilizing or syndicate covering transaction to
        cover syndicate short positions. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">These
        stabilizing transactions, syndicate covering transactions and penalty bids
        may have the effect of raising or maintaining the market\nprice of our Class&nbsp;A
        Common Stock or preventing or retarding a decline in the market price of the
        Class&nbsp;A Common Stock. As a result, the price of the Class&nbsp;A Common
        Stock may be higher than the price that might otherwise exist in the\nopen
        market. These transactions may be effected on NYSE or otherwise and, if commenced,
        may be discontinued at any time. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Neither we nor\nany
        of the underwriters make any representation or prediction as to the direction
        or magnitude of any effect that the transactions described above may have
        on the price of the Class&nbsp;A Common Stock. In addition, neither we nor
        any of the\nunderwriters make any representation that the representatives
        will engage in these stabilizing transactions or that any transaction, once
        commenced, will not be discontinued without notice. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Electronic
        Distribution </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">A prospectus in\nelectronic
        format may be made available on the Internet sites or through other online
        services maintained by one or more of the underwriters and/or selling group
        members participating in this offering, or by their affiliates. In those cases,\nprospective
        investors may view offering terms online and, depending upon the particular
        underwriter or selling group member, prospective investors may be allowed
        to place orders online. The underwriters may agree with us to allocate a specific\nnumber
        of shares for sale to online brokerage account holders. Any such allocation
        for online distributions will be made by the representatives on the same basis
        as other allocations. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Other than the
        prospectus in electronic format, the information on any underwriter&#146;s
        or selling group member&#146;s web site and any\ninformation contained in
        any other web site maintained by an underwriter or selling </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-24 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\ngroup member is not part of
        the prospectus or the registration statement of which this prospectus forms
        a part, has not been approved and/or endorsed by us or any underwriter or
        selling group\nmember in its capacity as underwriter or selling group member
        and should not be relied upon by investors. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Listing
        on The New York Stock Exchange\n</B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our Class&nbsp;A
        Common Stock is listed on NYSE under the symbol &#147;EE&#148;. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Other
        Relationships </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The underwriters and\ncertain
        of their affiliates are full service financial institutions engaged in various
        activities, which may include securities trading, commercial and investment
        banking, financial advisory, investment management, investment research, principal\ninvestment,
        hedging, financing and brokerage activities. The underwriters and certain
        of their affiliates have, from time to time, performed, and may in the future
        perform, various commercial and investment banking and financial advisory
        services\nfor the issuer and its affiliates, for which they received or may
        in the future receive customary fees and expenses. Certain of the underwriters
        (or affiliates thereof) are acting as joint lead arrangers, joint bookrunners,
        syndication agents,\nadjustment agents, <FONT STYLE=\"white-space:nowrap\">co-managers</FONT>
        or lenders for our senior secured credit facilities, including our Revolving
        Credit Facility. In addition, Barclays Bank PLC and Morgan Stanley Senior
        Funding, Inc., who are\nparties under the Commitment Letter, are affiliates
        of certain of the underwriters in this offering. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        the ordinary course of their\nvarious business activities, the underwriters
        and certain of their affiliates may make or hold a broad array of investments
        and actively trade debt and equity securities (or related derivative securities)
        and financial instruments (including bank\nloans) for their own account and
        for the accounts of their customers, and such investment and securities activities
        may involve securities and/or instruments of the issuer or its affiliates.
        If the underwriters or their affiliates have a lending\nrelationship with
        us, certain of those underwriters or their affiliates routinely hedge, and
        certain other of those underwriters or their affiliates may hedge, their credit
        exposure to us consistent with their customary risk management policies.\nTypically,
        the underwriters and their affiliates would hedge such exposure by entering
        into transactions which consist of either the purchase of credit default swaps
        or the creation of short positions in our securities or the securities of
        our\naffiliates, including potentially the shares of common stock offered
        hereby. Any such credit default swaps or short positions could adversely affect
        future trading prices of the shares of common stock offered hereby. The underwriters
        and certain of\ntheir affiliates may also communicate independent investment
        recommendations, market color or trading ideas and/or publish or express independent
        research views in respect of such securities or instruments and may at any
        time hold, or recommend to\nclients that they acquire, long and/or short positions
        in such securities and instruments. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Selling Restrictions </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><I>General </I></B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Other than in
        the United\nStates, no action has been taken by us or the underwriters that
        would permit a public offering of the securities offered by this prospectus
        supplement in any jurisdiction where action for that purpose is required.
        The securities offered by this\nprospectus supplement may not be offered or
        sold, directly or indirectly, nor may this prospectus supplement or any other
        offering material or advertisements in connection with the offer and sale
        of any such securities be distributed or published in\nany jurisdiction, except
        under circumstances that will result in compliance with the applicable rules
        and regulations of that jurisdiction. Persons into whose possession this prospectus
        supplement comes are advised to inform themselves about and to\nobserve any
        restrictions relating to the offering and the distribution of this prospectus
        supplement. This prospectus supplement does not constitute an offer to sell
        or a solicitation of an offer to buy any securities offered by this prospectus\nsupplement
        in any jurisdiction in which such an offer or a solicitation is unlawful.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">S-25 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Australia </I></B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        placement document, prospectus, product disclosure statement or other disclosure
        document has been lodged with the Australian Securities and\nInvestments Commission,
        in relation to the offering. This prospectus supplement does not constitute
        a prospectus, product disclosure statement or other disclosure document under
        the Corporations Act 2001 (the Corporations Act) and does not purport\nto
        include the information required for a prospectus, product disclosure statement
        or other disclosure document under the Corporations Act. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any
        offer in Australia of the shares may only be made to persons (Exempt Investors)
        who are &#147;sophisticated investors&#148; (within the\nmeaning of section
        708(8) of the Corporations Act), &#147;professional investors&#148; (within
        the meaning of section 708(11) of the Corporations Act) or otherwise pursuant
        to one or more exemptions contained in section 708 of the Corporations Act\nso
        that it is lawful to offer the shares without disclosure to investors under
        Chapter 6D of the Corporations Act. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The shares applied
        for\nby Exempt Investors in Australia must not be offered for sale in Australia
        in the period of 12 months after the date of allotment under the offering,
        except in circumstances where disclosure to investors under Chapter 6D of
        the Corporations Act\nwould not be required pursuant to an exemption under
        section 708 of the Corporations Act or otherwise or where the offer is pursuant
        to a disclosure document which complies with Chapter 6D of the Corporations
        Act. Any person acquiring the shares\nmust observe such <FONT STYLE=\"white-space:nowrap\">Australian&nbsp;on-sale&nbsp;restrictions.</FONT>
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">This prospectus supplement contains\ngeneral
        information only and does not take account of the investment objectives, financial
        situation or particular needs of any particular person. It does not contain
        any securities recommendations or financial product advice. Before making
        an\ninvestment decision, investors need to consider whether the information
        in this prospectus supplement is appropriate to their needs, objectives and
        circumstances, and, if necessary, seek expert advice on those matters. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><I>Canada </I></B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The shares may
        be sold\nonly to purchasers purchasing, or deemed to be purchasing, as principal
        that are accredited investors, as defined in National Instrument <FONT STYLE=\"white-space:nowrap\">45-106</FONT>
        Prospectus Exemptions or subsection 73.3(1) of the Securities Act\n(Ontario),
        and are permitted clients, as defined in National Instrument <FONT STYLE=\"white-space:nowrap\">31-103</FONT>
