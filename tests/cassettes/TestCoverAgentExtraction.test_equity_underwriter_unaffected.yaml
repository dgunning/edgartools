        after\nclosing of the Pending Acquisition, the Purchase Agreement provides
        for limited recourse against the NFE Parties. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Difficulties
        in\nintegrating the Business into the Company may result in operational and
        other challenges, including the diversion of management&#146;s attention from
        ongoing business concerns; the diversion of resources to integration processes;
        the retention of\nkey management and other employees; the retention of existing
        business and operational relationships, including customers, suppliers and
        other counterparties; the attraction of new business and operational relationships;
        the possibility of faulty\nassumptions underlying expectations regarding integration
        processes and associated expenses; the elimination of duplicative corporate
        or operational processes; potential limitations placed on our business by
        regulatory authorities; the possibility\nthat a failure to successfully integrate
        the Business into our internal control over financial reporting could compromise
        the integrity of our financial reporting; as well as unanticipated issues
        in integrating certain systems. An inability to\nrealize the full extent of
        the intended benefits of the Pending Acquisition, and any delays encountered
        in the integration process, could have an adverse effect on our revenues and
        level of expenses and results of operations. In addition, the\nintegration
        may result in additional or unforeseen expenses. Although we expect the strategic
        benefits and additional operating cash flow to offset incremental transaction-related
        costs over time, if we are not able to adequately and effectively\naddress
        integration challenges, we may be unable to successfully integrate operations
        or realize anticipated benefits of the integration of the Business. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If we consummate the Pending Acquisition and
