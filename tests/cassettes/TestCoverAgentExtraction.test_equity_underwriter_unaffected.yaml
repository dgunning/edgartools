        margin-top:1.5%; margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Recent Developments&#151;Pending Acquisition of Infrastructure
        Assets </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">On March&nbsp;26, 2025, we entered
        into the Purchase Agreement with the NFE Parties, pursuant to which we agreed
        to acquire the Business, on a\ndebt-free and cash-free basis for approximately
        $1.055&nbsp;billion in cash, subject to certain adjustments for cash, indebtedness,
        transaction expenses, working capital and LNG and fuel inventory (the &#147;Pending
        Acquisition&#148;). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Purchase Agreement contains
        customary representations, warranties and covenants. The Pending Acquisition
        is expected to close as early as\nthe second quarter of 2025, subject to satisfaction
        or waiver of certain customary closing conditions, including (i)&nbsp;the
        consummation of certain <FONT STYLE=\"white-space:nowrap\">pre-closing</FONT>
        restructuring transactions by the NFE Parties,\n(ii)&nbsp;the delivery of
        certain consents, (iii)&nbsp;the delivery of audited and GAAP-compliant financial
        statements of the Business and (iv)&nbsp;the release of the assets of the
        Business from certain debt facilities and the delivery of payoff\nletters
        related to outstanding third-party indebtedness. The Purchase Agreement contains
        certain customary termination rights. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The\nforegoing
        summary only describes certain provisions of the Purchase Agreement and is
        subject to, and qualified in its entirety by reference to, the Purchase Agreement,
        a copy of which is included as an exhibit to our Current Report on <FONT\nSTYLE=\"white-space:nowrap\">Form&nbsp;8-K</FONT>
        filed with the SEC on March&nbsp;27, 2025, which is incorporated by reference
        into this prospectus supplement. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B><I>The Facilities </I></B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We are acquiring\n100% of the operating interests
        in three facilities, as well as operations, pipelines and infrastructure associated
        therewith: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>Montego
        Bay LNG Terminal</B>: The facility&#146;s regasification system is capable
        of processing up to\napproximately 31,000&nbsp;million British thermal units
        (&#147;MMBtu&#148;) per day and features approximately 7,000 cubic meters
        of onsite LNG storage. The Montego Bay Terminal sends natural gas ashore via
        pipeline to Jamaica Public Service Company\nLimited (&#147;JPS&#148;), which
        is owned by a consortium of Korea East West Power, Marubeni, Asian investment
        grade power and energy companies and the government of Jamaica, to fuel the
        <FONT STYLE=\"white-space:nowrap\">145-megawatt</FONT> Bogue\npower plant
        in Montego Bay, Jamaica pursuant to a long-term contract for natural gas of
        up to approximately 25,000 MMBtu from LNG per day. The Montego Bay Terminal
        also supplies numerous <FONT STYLE=\"white-space:nowrap\">on-island</FONT>
        industrial\nusers with natural gas or LNG pursuant to offtake contracts of
        various durations. </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>Old Harbour
        LNG Terminal</B>: Offshore facility with storage and regasification. Includes
        the operation of a\nchartered FSRU that is capable of processing up to approximately
        520,000 MMBtu of LNG per day. The Old Harbour Terminal sends up to approximately
        60,000 MMBtu per day of natural gas ashore via two pipelines to the\n<FONT
        STYLE=\"white-space:nowrap\">190-megawatt</FONT> Old Harbour power plant operated
        by South Jamaica Power Company Limited, a subsidiary of JPS, pursuant to a
        long-term contract, and to the Clarendon CHP Plant. </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>Clarendon
        CHP Plant</B>: A <FONT STYLE=\"white-space:nowrap\">100-megawatt</FONT> power
        plant with two\ncommercial agreements, including a long-term contract to supply
        electricity to JPS and a long-term contract to supply steam to the Jamalco
        Alumina Refinery, which is a joint venture between affiliates of Century Aluminum
        Company and the government\nof Jamaica. The Clarendon CHP Plant is one of
        four <FONT STYLE=\"white-space:nowrap\">gas-fired</FONT> power plants in Jamaica.
        </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B><I>Strategic Rationale </I></B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Pending\nAcquisition directly aligns with our strategies of (1)&nbsp;acquiring
        interests in LNG regasification terminals and integrated LNG infrastructure
        projects, which we believe will enhance long-term contract revenue and margins,
        and\n(2)&nbsp;diversifying the geographic mix of the LNG markets we serve
        and our customer base. </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-3 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<div style =\"BORDER-BOTTOM:1.00pt
        solid #000000;BORDER-LEFT:1.00pt solid #000000;BORDER-RIGHT:1.00pt solid #000000;BORDER-TOP:1.00pt
        solid #000000;MARGIN-LEFT:0px; MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%;
        margin-top:1.5%; margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We believe that the Pending Acquisition is complementary
        to our existing assets and business\nstrategy and is expected to drive greater
        demand for our core FSRU and terminal services business and establish Excelerate
        as a provider of &#147;last-mile&#148; LNG infrastructure in Jamaica. Additionally,
        the Pending Acquisition provides an\nattractive downstream natural gas market
        for Excelerate&#146;s <FONT STYLE=\"white-space:nowrap\">20-year</FONT> Venture
        Global LNG supply agreement and secures pull through demand and value-accretive
        offtake for our LNG supply portfolio. The Pending\nAcquisition aligns with
        our investment thesis in the following ways: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>The Facilities
        Serve Attractive and Growing Markets</B>: The Facilities are located in a
        key Atlantic Basin\nnatural gas market, representing Jamaica&#146;s only two
        LNG regasification terminals and the first dual-fired combined heat and power
        (&#147;CHP&#148;) plant in the Caribbean, and supply approximately 30 TBtus
        per year of LNG, directly or\nindirectly accounting for more than half of
        Jamaica&#146;s electricity generation. We believe the Pending Acquisition
        will also position us to capture additional market share as regional demand
        grows, creating\n<FONT STYLE=\"white-space:nowrap\">low-cost</FONT> opportunities
        to expand. </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>Highly
        Contracted with Long-Term Agreements</B>: 86% of contracted revenue is\n<FONT
        STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">take-or-pay,</FONT></FONT>
        representing approximately $2.9&nbsp;billion of cumulative <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">take-or-pay</FONT></FONT>\ndirect margin through
        2039, and nearly 100% of contracted revenue includes contractual inflation
        escalators. The acquired contracts have a weighted average remaining contract
        tenor of approximately 13 years (or approximately 21 years, if extension\noptions
        are exercised) and the majority of the contracts are with high-quality investment-grade
        counterparties. Based on the contracts in place as of December&nbsp;31, 2024,
        pro forma for the Pending Acquisition, we expect over 90% of our cash flows\nfrom
        customers to be derived from take-or-pay contracts, with such contracts having
        a remaining weighted average contract life of approximately 10&nbsp;years
        (or approximately 14&nbsp;years, if extension options are exercised for the
        Pending\nAcquisition contracts). </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>Highly
        Complementary Infrastructure Assets</B>: The Facilities expand our size, scale
        and operating\ncapabilities without requiring significant additional capital
        expenditures. Our combined platform will expand our ability to provide customers
        with tailored solutions across the LNG value chain, from procurement to distribution.
        We believe that the\nPending Acquisition will result in our holding an approximately
        25% market share of total global floating regasification capacity. </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><B>The Pending
        </B><B>Acquisition Enhances</B><B> our </B><B>Financial Profile</B>: The Pending
        Acquisition is\nexpected to be immediately accretive to earnings per share
        and enhance our operating cash flow. </P></TD></TR></TABLE> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B><I>Financing
        </I></B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We intend to fund the purchase
        price for the Pending Acquisition with the net proceeds from this offering
        of Class&nbsp;A Common Stock and the\nexpected incurrence of approximately
        $650&nbsp;million aggregate principal amount of senior indebtedness, subject
        to market conditions (the &#147;Debt Financing&#148;), along with cash on
        hand. See &#147;Use of Proceeds.&#148; This offering of\nClass&nbsp;A Common
        Stock is not contingent upon the completion of the Pending Acquisition or
        on the terms of the Pending Acquisition. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We\nhave
        also obtained a commitment letter that provides for committed financing to
        fund a portion of the purchase price of the Pending Acquisition (the &#147;Commitment
        Letter&#148;). The Commitment Letter provides commitments from a syndicate
        of\nlenders led by Barclays Bank PLC for a <FONT STYLE=\"white-space:nowrap\">364-day</FONT>
        bridge loan facility (the &#147;Bridge Facility&#148;) in an aggregate initial
        principal amount of $850&nbsp;million. The commitments under the Commitment
        Letter\nwill be reduced by the amount of the net cash proceeds of this offering
        and, if consummated prior to the closing of the Pending Acquisition, the Debt
        Financing, as well as certain other reductions as set forth in the Commitment
        Letter. We expect to\ndraw on the Bridge Facility only to the extent we do
        not raise, prior to the closing of the Pending Acquisition, $850&nbsp;million
        or more in combined net cash proceeds of this offering and the Debt Financing.
        The funding of the Bridge Facility is\ncontingent upon the satisfaction of
        customary conditions, including the </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-4 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<div style =\"BORDER-BOTTOM:1.00pt
        solid #000000;BORDER-LEFT:1.00pt solid #000000;BORDER-RIGHT:1.00pt solid #000000;BORDER-TOP:1.00pt
        solid #000000;MARGIN-LEFT:0px; MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%;
        margin-top:1.5%; margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">\nexecution and delivery of definitive documentation with respect
        to the Bridge Facility in accordance with the terms set forth in the Commitment
