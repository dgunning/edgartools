        THIS PROSPECTUS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This prospectus is part of a
        registration statement that we have filed with the Securities and Exchange
        Commission (the &#147;SEC&#148;) using\na &#147;shelf&#148; registration process.
        Under this shelf registration process, we may, from time to time, offer and
        sell any combination of the securities described in this prospectus in one
        or more offerings. This prospectus generally describes\nExcelerate Energy,
        Inc. and the securities we may offer. Each time securities are offered by
        means of this prospectus, we will provide a prospectus supplement that will
        contain specific information about the terms of that offering. We may also\nauthorize
        one or more free writing prospectuses to be provided to you that may contain
        material information relating to these offerings. We may also add or update
        in any prospectus supplement (and in any related free writing prospectus that
        we may\nauthorize to be provided to you) any of the information contained
        in this prospectus or in the documents that we have incorporated by reference
        into this prospectus. Please read this prospectus, any applicable prospectus
        supplement and any related\nfree writing prospectus, together with the information
        incorporated herein by reference as described under the heading &#147;Where
        You Can Find More Information,&#148; carefully before buying any of the securities
        being offered. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This prospectus contains summaries
