        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        Cash Settlement Amounts shown above are entirely hypothetical; they are based
        on market prices for the Underlier Stocks that may not be achieved on the
        Determination Date and on assumptions that may prove to be erroneous. The
        actual market value of your notes on the stated maturity date or at any other
        time, including any time you may wish to sell your notes, may bear little
        relation to the hypothetical Cash Settlement Amounts shown above, and these
        amounts should not be viewed as an indication of the financial return on an
        investment in the offered notes. The hypothetical Cash Settlement Amounts
        on notes held to the stated maturity date in the examples above assume you
        purchased your notes at their face amount and have not been adjusted to reflect
        the actual price to public you pay for your notes. The return on your investment
        (whether positive or negative) in your notes will be affected by the amount
        you pay for your notes. If you purchase your notes for a price other than
        the face amount, the return on your investment will differ from, and may be
        significantly lower than, the hypothetical returns suggested by the above
        examples. Please read &#8220;Risk Factors &#8212; If You Purchase Your Notes
        at a Premium to Face Amount, the Return on Your Investment Will Be Lower Than
        the Return on Notes Purchased at Face Amount and the Impact of Certain Key
        Terms of the Notes Will Be Negatively Affected&#8221; below.</font> </div>\n<div
        style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
