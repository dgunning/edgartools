        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">As
        discussed above, alternative characterizations of the notes for U.S. federal
        income tax purposes are possible.  Should an alternative characterization,
        by reason of change or clarification of the law, by regulation or otherwise,
        cause payments as to the notes to become subject to withholding tax, tax will
        be withheld at the applicable statutory rate.  As discussed above, the IRS
        has indicated in the Notice that it is considering whether income in respect
        of instruments such as the notes should be subject to withholding tax.  Prospective
        Non-U.S. Holders should consult their own tax advisors&nbsp;regarding the
        tax consequences of such alternative characterizations.</font> </div>\n<div
