        S&amp;P DOW JONES INDICES.</font> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"></font>
        </div>\n<div style=\"text-align:center; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-20</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>SUPPLEMENTAL
        PLAN OF DISTRIBUTION&#8212;CONFLICTS OF INTEREST</b></font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">BofA
        Finance has agreed to sell to BofAS, and BofAS has agreed to purchase from
        BofA Finance, the aggregate face amount of the offered notes specified on
        the front cover of this pricing supplement. BofAS will offer the notes to
        the public at the price to public set forth on the cover&nbsp;page of this
        pricing supplement.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">BofAS
        or one of its affiliates will also pay a fee to iCapital Markets LLC, a broker-dealer
        in which an affiliate of Goldman Sachs &amp; Co. LLC, who is acting as a dealer
        in connection with the distribution of the&nbsp;notes, holds an indirect minority
        equity interest, for services it is providing in connection with this offering.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">We
        will deliver the notes against payment therefor in New York, New York on April
        3, 2025, which is the fifth scheduled business day following the trade date.
        Under Rule 15c6-1 of the Securities Exchange Act of 1934, trades in the secondary
        market generally are required to settle in one business day, unless the parties
        to any such trade expressly agree otherwise. Accordingly, purchasers who wish
        to trade the notes on any date prior to one&nbsp;business day before delivery
        will be required to specify alternative settlement arrangements to prevent
        a failed settlement.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">BofAS,
        a broker-dealer affiliate of ours, is a member of the Financial Industry Regulatory
        Authority, Inc. (&#8220;FINRA&#8221;) and will participate as selling agent
        in the distribution of the notes.  Accordingly, the offering of the notes
        will conform to the requirements of FINRA Rule 5121. &nbsp;BofAS may not make
        sales in this offering to any of its discretionary accounts without the prior
        written approval of the account holder.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">BofAS
        and any of our other broker-dealer affiliates, may use this pricing supplement,
        and the accompanying product supplement, prospectus supplement and prospectus
        for offers and sales in secondary market transactions and market-making transactions
        in the notes.  However, they are not obligated to engage in such secondary
        market transactions and/or market-making transactions. &nbsp;The selling agent
        may act as principal or agent in these transactions, and any such sales will
        be made at prices related to prevailing market conditions at the time of the
        sale.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">As
        agreed by BofAS and the distribution participants, for approximately a three-month
        period after the trade date, BofAS expects to offer to buy the notes in the
        secondary market at a price that will exceed the estimated value of the notes
        at that time; the amount of this excess will decline on a straight line basis
        over that period. Thereafter, if BofAS buys or sells your notes, it will do
        so at prices that reflect the estimated value determined by reference to its
        pricing models at that time. Any price at any time after the trade date will
        be based on then-prevailing market conditions and other considerations, including
        the performance<b> </b>of the Underlier and the remaining term of the notes.
        &nbsp;However, none of us, the Guarantor, BofAS or any other party is obligated
        to purchase your notes at any price or at any time, and we cannot assure you
        that any party will purchase your notes at a price that equals or exceeds
        the initial estimated value of the notes.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Any
        price that BofAS may pay to repurchase the notes will depend upon then prevailing
        market conditions, the creditworthiness of us and the Guarantor, and transaction
        costs. &nbsp;At certain times, this price may be higher than or lower than
        the initial estimated value of the notes.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>European
        Economic Area and United Kingdom</b></font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">None
        of this pricing supplement, the accompanying product supplement, the accompanying
        prospectus or the accompanying prospectus supplement is a prospectus for the
        purposes of the Prospectus Regulation (as defined below). This pricing supplement,
        the accompanying product supplement, the accompanying prospectus and the accompanying
        prospectus supplement have been prepared on the basis that any offer of notes
        in any Member State of the European Economic Area (the &#8220;EEA&#8221;)
        or in the United Kingdom (each, a &#8220;Relevant State&#8221;) will only
        be made to a legal entity which is a qualified investor under the Prospectus
        Regulation (&#8220;Qualified Investors&#8221;). Accordingly any person making
        or intending to make an offer in that Relevant State of notes which are the
        subject of the offering contemplated in this pricing supplement, the accompanying
        product supplement, the accompanying prospectus and the accompanying prospectus
        supplement may only do so with respect to Qualified Investors. Neither BofA
        Finance nor BAC has authorized, nor does it authorize, the making of any offer
        of&nbsp;notes other than to Qualified Investors. The expression &#8220;Prospectus
        Regulation&#8221; means Regulation (EU) 2017/1129.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>PROHIBITION
        OF SALES TO EEA AND UNITED KINGDOM RETAIL INVESTORS</b> &#8211; The notes
        are not intended to be offered, sold or otherwise made available to and should
        not be offered, sold or otherwise made available to any retail investor in
        the EEA or in the United Kingdom. For these purposes: (a) a retail investor
        means a person who is one (or more) of: (i) a retail client as defined in
        point (11) of Article 4(1) of Directive 2014/65/EU, as amended (&#8220;MiFID
        II&#8221;); or (ii) a customer within the meaning of Directive (EU) 2016/97
        (the Insurance Distribution Directive) where that customer would not qualify
        as a professional client as defined in point (10) of Article 4(1) of MiFID
        II; or (iii) not a qualified investor as defined in the Prospectus Regulation;
        and (b) the expression &#8220;offer&#8221;&nbsp;</font> </div>\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-21</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">includes
        the communication in any form and by any means of sufficient information on
        the terms of the offer and the notes to be offered so as to enable an investor
        to decide to purchase or subscribe for the notes. Consequently no key information
        document required by Regulation (EU) No 1286/2014, as amended (the &#8220;PRIIPs
        Regulation&#8221;) for offering or selling the notes or otherwise making them
        available to retail investors in the EEA or in the United Kingdom has been
        prepared and therefore offering or selling the&nbsp;notes or otherwise making
        them available to any retail investor in the EEA or in the United Kingdom
        may be unlawful under the PRIIPs Regulation.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>United
        Kingdom</b></font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        communication of this pricing supplement, the accompanying product supplement,
        the accompanying prospectus supplement, the accompanying prospectus and any
        other document or materials relating to the issue of the notes offered hereby
        is not being made, and such documents and/or materials have not been approved,
        by an authorized person for the purposes of section 21 of the United Kingdom&#8217;s
        Financial Services and Markets Act 2000, as amended (the &#8220;FSMA&#8221;).
        Accordingly, such documents and/or materials are not being distributed to,
        and must not be passed on to, the general public in the United Kingdom. The
        communication of such documents and/or materials as a financial promotion
        is only being made to those persons in the United Kingdom who have professional
        experience in matters relating to investments and who fall within the definition
        of investment professionals (as defined in Article 19(5) of the Financial
        Services and Markets Act 2000 (Financial Promotion) Order 2005, as amended
        (the &#8220;Financial Promotion Order&#8221;)), or who fall within Article
        49(2)(a) to (d) of the Financial Promotion Order, or who are any other persons
        to whom it may otherwise lawfully be made under the Financial Promotion Order
        (all such persons together being referred to as &#8220;relevant persons&#8221;).
        In the United Kingdom, the&nbsp;notes offered hereby are only available to,
        and any investment or investment activity to which this pricing supplement,
        the accompanying product supplement, the accompanying prospectus supplement
        and the accompanying prospectus relates will be engaged in only with, relevant
        persons. Any person in the United Kingdom that is not a relevant person should
        not act or rely on this pricing supplement, the accompanying product supplement,
        the accompanying prospectus supplement or the accompanying prospectus or any
        of their contents.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Any
        invitation or inducement to engage in investment activity (within the meaning
        of Section 21 of the FSMA) in connection with the issue or sale of the&nbsp;notes
        may only be communicated or caused to be communicated in circumstances in
        which Section 21(1) of the FSMA does not apply to BofA Finance, as issuer,
        or BAC, as guarantor.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">All
        applicable provisions of the FSMA must be complied with in respect to anything
        done by any person in relation to the&nbsp;notes in, from or otherwise involving
        the United Kingdom.</font> </div>\n<div style=\"text-align:center; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"></font>
        </div>\n<div style=\"text-align:center; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-22</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>STRUCTURING
        THE NOTES</b></font> </div>\n<div style=\"text-align:center; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        notes are our debt securities, the return on which is linked to the performance
        of the Underlier.  The related guarantees are BAC&#8217;s obligations.  As
        is the case for all of our and BAC&#8217;s respective debt securities, including
        our market-linked notes, the economic terms of the notes reflect our and BAC&#8217;s
        actual or perceived creditworthiness at the time of pricing.  In addition,
        because market-linked notes result in increased operational, funding and liability
        management costs to us and BAC, BAC typically borrows the funds under these
        types of notes at a rate, which we refer to in this pricing supplement as
        BAC&#8217;s internal funding rate, that is more favorable to BAC than the
        rate that it might pay for a conventional fixed or floating rate debt security.
        \ This generally relatively lower internal funding rate, which is reflected
        in the economic terms of the notes, along with the fees and charges associated
        with market-linked notes, resulted&nbsp;in the initial estimated value of
        the notes on the trade date being less than their public offering price.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">In
        order to meet our payment obligations on the notes, at the time we issue the
        notes, we may choose to enter into certain hedging arrangements (which may
        include call options, put options or other derivatives) with BofAS or one
        of our other affiliates.  The terms of these hedging arrangements are determined
        based upon terms provided by BofAS and its affiliates, and take into account
        a number of factors, including our and BAC&#8217;s creditworthiness, interest
        rate movements, the volatility of the Underlier, the tenor of the notes and
        the hedging arrangements. &nbsp;The economic terms of the notes and their
        initial estimated value depend in part on the terms of these hedging arrangements.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">BofAS
        has advised us that the hedging arrangements will include hedging-related
        charges, reflecting the costs associated with, and our affiliates&#8217; profit
        earned from, these hedging arrangements. &nbsp;Since hedging entails risk
        and may be influenced by unpredictable market forces, actual profits or losses
        from these hedging transactions may be more or less than any expected amounts.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">For
        further information, see &#8220;Risk Factors&#8221; beginning on page PS-11<b>
        </b>above and &#8220;Supplemental Use of Proceeds&#8221; on page PS-20&nbsp;of
        product supplement EQUITY-1.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:center; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>VALIDITY
        OF THE NOTES</b></font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">In
        the opinion of McGuireWoods LLP, as counsel to BofA Finance, as issuer, and
        BAC, as guarantor, when the trustee has made the appropriate entries or notations
        on Schedule 1 to the master global note that represents the Notes (the &#8220;Master
        Note&#8221;) identifying the Notes offered hereby as supplemental obligations
        thereunder in accordance with the instructions of BofA Finance, and the Notes
        have been delivered against payment therefor as contemplated in this pricing
        supplement and the related prospectus, prospectus supplement and product supplement,
        all in accordance with the provisions of the indenture governing the Notes
        and the related guarantee, such Notes will be the legal, valid and binding
        obligations of BofA Finance, and the related guarantee will be the legal,
        valid and binding obligation of BAC, subject, in each case, to the effects
        of applicable bankruptcy, insolvency (including laws relating to preferences,
        fraudulent transfers and equitable subordination), reorganization, moratorium
        and other similar laws affecting creditors&#8217; rights generally, and to
        general principles of equity. This opinion is given as of the date of this
        pricing supplement and is limited to the Delaware General Corporation Law
        and the Delaware Limited Liability Company Act (including the statutory provisions,
        all applicable provisions of the Delaware Constitution and reported judicial
        decisions interpreting either of the foregoing) and the laws of the State
        of New York as in effect on the date hereof. In addition, this opinion is
        subject to customary assumptions about the trustee&#8217;s authorization,
        execution and delivery of the indenture governing the Notes and due authentication
        of the Master Note, the validity, binding nature and enforceability of the
        indenture governing the Notes and the related guarantee with respect to the
        trustee, the legal capacity of individuals, the genuineness of signatures,
        the authenticity of all documents submitted to McGuireWoods LLP as originals,
        the conformity to original documents of all documents submitted to McGuireWoods
        LLP as copies thereof, the authenticity of the originals of such copies and
        certain factual matters, all as stated in the opinion letter of McGuireWoods
        LLP dated December 8, 2022, which has been filed as an exhibit to the Registration
        Statement (File Nos. 333-268718 and 333-268718-01) of BAC and BofA Finance,
        filed with the SEC on December 8, 2022.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"></font>
        </div>\n<div style=\"text-align:center; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-23</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>U.S.
        FEDERAL INCOME TAX SUMMARY</b></font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        following summary of the material U.S. federal income and estate&nbsp;tax
        considerations of the acquisition, ownership, and disposition of the notes
        supplements, and to the extent inconsistent supersedes, the discussion under
        &#8220;U.S. Federal Income Tax Considerations&#8221; in the accompanying prospectus
        and is not exhaustive of all possible tax considerations. This summary is
        based upon the Internal Revenue Code of 1986, as amended (the &#8220;Code&#8221;),
        regulations promulgated under the Code by the U.S. Treasury Department (&#8220;Treasury&#8221;)
        (including proposed and temporary regulations), rulings, current administrative
        interpretations and official pronouncements of the IRS, and judicial decisions,
        all as currently in effect and all of which are subject to differing interpretations
        or to change, possibly with retroactive effect. No assurance can be given
        that the IRS would not assert, or that a court would not sustain, a position
        contrary to any of the tax consequences described below. This summary does
        not include any description of the tax laws of any state or local governments,
        or of any foreign government, that may be applicable to a particular holder.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Although
        the notes are issued by us, they will be treated as if they were issued by
        BAC for U.S. federal income tax purposes.  Accordingly throughout this tax
        discussion, references to &#8220;we,&#8221; &#8220;our&#8221; or &#8220;us&#8221;
        are generally to BAC&nbsp;unless the context requires otherwise.</font> </div>\n<div
        style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">This
        summary is directed solely to U.S. Holders and Non-U.S. Holders that, except
        as otherwise specifically noted, will purchase the notes upon original issuance
        and will hold the notes as capital assets within the meaning of Section 1221
        of the Code, which generally means property held for investment, and that
        are not excluded from the discussion under &#8220;U.S. Federal Income Tax
        Considerations&#8221; in the accompanying prospectus.</font> </div>\n<div
        style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><i>You
        should consult your own tax advisor concerning the U.S. federal income tax
        consequences to you of acquiring, owning, and disposing of the notes, as well
        as any tax consequences arising under the laws of any state, local, foreign,
        or other tax jurisdiction and the possible effects of changes in U.S. federal
        or other tax laws.</i></font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none none none
        none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>General</b></font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Although
        there is no statutory, judicial, or administrative authority directly addressing
        the characterization of the notes, we intend to treat the notes for all tax
        purposes as single financial contracts with respect to the Underlier and under
        the terms of the notes, we and every investor in the notes agree, in the absence
        of an administrative determination or judicial ruling to the contrary, to
        treat the notes in accordance with such characterization.  In the opinion
        of our counsel, Sidley Austin LLP, it is reasonable to treat the notes as
        single financial contracts with respect to the Underlier. This discussion
        assumes that the notes constitute single financial contracts with respect
        to the Underlier for U.S. federal income tax purposes. &nbsp;If the notes
        did not constitute single financial contracts, the tax consequences described
        below would be materially different.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><i>This
        characterization of the notes is not binding on the IRS or the courts.  No
        statutory, judicial, or administrative authority directly addresses the characterization
        of the notes or any similar instruments for U.S. federal income tax purposes,
        and no ruling is being requested from the IRS with respect to their proper
        characterization and treatment.  Due to the absence of authorities on point,
        significant aspects of the U.S. federal income tax consequences of an investment
        in the notes are not certain, and no assurance can be given that the IRS or
        any court will agree with the characterization and tax treatment described
        in this </i><i>pricing </i><i>supplement. &nbsp;Accordingly, you are urged
        to consult your tax advisor regarding all aspects of the U.S. federal income
        tax consequences of an investment in the notes, including possible alternative
        characterizations.</i></font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Unless
        otherwise stated, the following discussion is based on the characterization
        described above. &nbsp;The discussion in this section assumes that there is
        a significant possibility of a significant loss of principal on an investment
        in the notes.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">We
        will not attempt to ascertain whether any issuer of a component stock included
        in the Underlier would be treated as a &#8220;passive foreign investment company&#8221;
        (&#8220;PFIC&#8221;), within the meaning of Section 1297 of the Code, or a
        United States real property holding corporation, within the meaning of Section
        897(c) of the Code.  If the issuer of one or more stocks included in the Underlier
        were so treated, certain adverse U.S. federal income tax consequences could
        possibly apply to a holder of the notes. You should refer to information filed
        with the SEC by the issuers of the component stocks included in the Underlier
        and consult your tax advisor regarding the possible consequences to you, if
        any, if any issuer of a component stock&nbsp;included in the Underlier is
        or becomes a PFIC or is or becomes a United States real property holding corporation.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none none none
        none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>U.S.
        Holders</b></font> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:center;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-24</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Upon
        receipt of a cash payment at maturity or upon a sale or exchange of the notes
        prior to maturity, a U.S. Holder generally will recognize capital gain or
        loss equal to the difference between the amount realized and the U.S. Holder&#8217;s
        tax basis in the notes. &nbsp;A U.S. Holder&#8217;s tax basis in the notes
        will equal the amount paid by that holder to acquire them. This capital gain
        or loss generally will be long-term capital gain or loss if the U.S. Holder
        held the notes for more than one year. The deductibility of capital losses
        is subject to limitations.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><i>Alternative
        Tax Treatments</i>. Due to the absence of authorities that directly address
        the proper tax treatment of the notes, prospective investors are urged to
        consult their tax advisors regarding all possible alternative tax treatments
        of an investment in the notes.  In particular, the IRS could seek to subject
        the notes to the Treasury regulations governing contingent payment debt instruments.
        \ If the IRS were successful in that regard, the timing and character of income
        on the notes would be affected significantly. Among other things, a U.S. Holder
        would be required to accrue original issue discount every year at a &#8220;comparable
        yield&#8221; determined at the time of issuance.  In addition, any gain realized
        by a U.S. Holder at maturity or upon a sale or exchange of the notes generally
        would be treated as ordinary income, and any loss realized at maturity or
        upon a sale or exchange of the notes generally&nbsp;would be treated as ordinary
        loss to the extent of the U.S. Holder&#8217;s prior accruals of original issue
        discount, and as capital loss thereafter.</font> </div>\n<div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        IRS released Notice 2008-2 (the &#8220;Notice&#8221;), which sought comments
        from the public on the taxation of financial instruments currently taxed as
        &#8220;prepaid forward contracts.&#8221; This Notice addresses instruments
        such as the notes.  According to the Notice, the IRS and Treasury are considering
        whether a holder of an instrument such as the notes should be required to
        accrue ordinary income on a current basis, regardless of whether any payments
        are made prior to maturity.  It is not possible to determine what guidance
        the IRS and Treasury will ultimately issue, if any. &nbsp;Any such future
        guidance may affect the amount, timing and character of income, gain, or loss
        in respect of the notes, possibly with retroactive effect.</font> </div>\n<div
        style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        IRS and Treasury are also considering additional issues, including whether
        additional gain or loss from such instruments should be treated as ordinary
        or capital, whether foreign holders of such instruments should be subject
        to withholding tax on any deemed income accruals, whether Section 1260 of
        the Code, concerning certain &#8220;constructive ownership transactions,&#8221;
        generally applies or should generally apply to such instruments, and whether
        any of these determinations depend on the nature of the underlying asset.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">In
        addition, proposed Treasury regulations require the accrual of income on a
        current basis for contingent payments made under certain notional principal
        contracts. The preamble to the regulations states that the &#8220;wait and
        see&#8221; method of accounting does not properly reflect the economic accrual
        of income on those contracts, and requires current accrual of income for some
        contracts already in existence. While the proposed regulations do not apply
        to prepaid forward contracts, the preamble to the proposed regulations expresses
        the view that similar timing issues exist in the case of prepaid forward contracts.
        If the IRS or Treasury publishes future guidance requiring current economic
        accrual for contingent payments on prepaid forward contracts, it is possible
        that you could be required to accrue income over the term of the notes.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Because
        of the absence of authority regarding the appropriate tax characterization
        of the notes, it is also possible that the IRS could seek to characterize
        the notes in a manner that results in tax consequences that are different
        from those described above. For example, the IRS could possibly assert that
        any gain or loss that a holder may recognize at maturity or upon the sale
        or exchange of the notes should be treated as ordinary gain or loss.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Because
        the Underlier is an index that periodically rebalances, it is possible that
        the notes could be treated as a series of single financial contracts, each
        of which matures on the next rebalancing date. &nbsp;If the notes were properly
        characterized in such a manner, a U.S. Holder would be treated as disposing
        of the notes on each rebalancing date in return for new notes that mature
        on the next rebalancing date, and a U.S. Holder would accordingly likely recognize
        capital gain or loss on each rebalancing date equal to the difference between
        the holder&#8217;s tax basis in the notes (which would be adjusted to take
        into account any prior recognition of gain or loss) and the fair market value
        of the notes on such date.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none none none
        none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\"><b>Non-U.S.
        Holders</b></font> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">Except
        as discussed below, a Non-U.S. Holder generally will not be subject to U.S.
        federal income or withholding tax for amounts paid in respect of the notes
        provided that the Non-U.S. Holder complies with applicable certification requirements
        and that the payment is not effectively connected with the conduct by the
        Non-U.S. Holder of a U.S. trade or business.  Notwithstanding the foregoing,
        gain from the sale or exchange of the notes or their settlement at maturity
        may be subject to U.S. federal income tax if that Non-U.S. Holder is a non-resident
        alien individual and is present in the U.S. for 183 days or more during the
        taxable year of the sale, exchange, or settlement&nbsp;and certain other conditions
        are satisfied.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div>\n<div
        style=\"text-align:center; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">PS-25</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<hr size='5' noshade
        width='100%' style='page-break-before: always;' >\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"><font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">If
        a Non-U.S. Holder of the notes is engaged in the conduct of a trade or business
        within the U.S. and if gain realized on the settlement at maturity, or upon
        sale or exchange of the notes, is effectively connected with the conduct of
        such trade or business (and, if certain tax treaties apply, is attributable
        to a permanent establishment maintained by the Non-U.S. Holder in the U.S.),
        the Non-U.S. Holder, although exempt from U.S. federal withholding tax, generally
        will be subject to U.S. federal income tax on such gain on a net income basis
        in the same manner as if it were a U.S. Holder.  Such Non-U.S. Holders should
        read the material under the heading &#8220;&#8212;U.S. Holders,&#8221; for
        a description of the U.S. federal income tax consequences of acquiring, owning,
        and disposing of the notes. &nbsp;In addition, if such Non-U.S. Holder is
        a foreign corporation, it may also be subject to a branch profits tax equal
        to 30% (or such lower rate provided by any applicable tax treaty) of a portion
        of its earnings and profits for the taxable year that are effectively connected
        with its conduct of a trade or business in the U.S., subject to certain adjustments.</font>
        </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">A
        &#8220;dividend equivalent&#8221; payment is treated as a dividend from sources
        within the United States and such payments generally would be subject to a
        30% U.S. withholding tax if paid to a Non-U.S. Holder.  Under&nbsp;Treasury
        regulations, payments (including deemed payments) with respect to equity-linked
        instruments (&#8220;ELIs&#8221;) that are &#8220;specified ELIs&#8221; may
        be treated as dividend equivalents if such specified ELIs reference an interest
        in an &#8220;underlying security,&#8221; which is generally any interest in
        an entity taxable as a corporation for U.S. federal income tax purposes, if
        a payment with respect to such interest could give rise to a U.S. source dividend.
        However, IRS guidance provides that withholding on dividend equivalent payments
        will not apply to specified ELIs that are not delta-one instruments and that
        are issued before January 1, 2027. Based on our determination that the notes
        are not delta-one instruments, Non-U.S. Holders should not be subject to withholding
        on dividend equivalent payments, if any, under the notes. However, it is possible
        that the notes could be treated as deemed reissued for U.S. federal income
        tax purposes upon the occurrence of certain events affecting the Underlier
        or the notes, and following such occurrence the notes could be treated as
        subject to withholding on dividend equivalent payments. Non-U.S. Holders that
        enter, or have entered, into other transactions in respect of the Underlier
        or the notes should consult their tax advisors as to the application of the
        dividend equivalent withholding tax in the context of the notes and their
        other transactions. If any payments are treated as dividend equivalents subject
        to withholding, we (or the applicable paying agent) would be entitled to withhold
        taxes without being required to pay any additional amounts with respect to
        amounts so withheld.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
