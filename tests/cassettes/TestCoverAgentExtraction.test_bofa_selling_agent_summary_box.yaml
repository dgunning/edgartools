        padding-top: 5px; border-width:1px 1px 1px 1px; border-style:none none none
        none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">If,
        for example, the Final Underlier Level were determined to be 25.000% of the
        Initial Underlier Level, the Cash Settlement Amount that we would deliver
        on your notes at maturity would be approximately 28.571% of the face amount
        of your notes (which would be equal to a Cash Settlement Amount of approximately
        $285.71), as shown in the table above. As a result, if you purchased your
        notes on the original issue date at the face amount and held them to the stated
        maturity date, you would lose approximately 71.429% of your investment (if
        you purchased your notes at a premium to face amount you would lose a correspondingly
        higher percentage of your investment). If the Final Underlier Level were determined
        to be 0.000% of the Initial Underlier Level, you would lose your entire investment
        in the notes.  In addition, if the Final Underlier Level were determined to
        be 150.000% of the Initial Underlier Level, the Cash Settlement Amount that
        we would deliver on your notes at maturity would be capped at the Threshold
        Settlement Amount of $1,171.90, or 117.190% of each $1,000 face amount of
        your notes, as shown in the table above.  As a result, if you held your notes
        to the stated maturity date, you would not benefit from any increase in the
        Final Underlier Level of greater than 87.500%&nbsp;of the Initial Underlier
        Level.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:10pt;font-family:'Arial',Times,serif;\">The
        following chart shows a graphical illustration of the hypothetical Cash Settlement
        Amounts that we would pay on your notes on the stated maturity date, if the
        Final Underlier Level were any of the hypothetical levels shown on the horizontal
        axis. The hypothetical Cash Settlement Amounts in the chart are expressed
        as percentages of the face amount of your notes and the hypothetical Final
        Underlier Levels are expressed as percentages of the Initial Underlier Level.
        The chart shows that any hypothetical Final Underlier Level of less than 87.500%
        (the section left of the 87.500% marker on the horizontal axis) would result
        in a hypothetical Cash Settlement Amount of less than 100.000% of the face
        amount of your notes (the section below the 100.000% marker on the vertical
        axis) and, accordingly, in a loss of principal to the holder of the notes.
        The chart also shows that any hypothetical Final Underlier Level of greater
        than or equal to 87.500% of the Initial Underlier Level (the section right
        of the 87.500%&nbsp;marker on the horizontal axis) would result in a fixed
        return on your investment.</font> </div>\n<div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
