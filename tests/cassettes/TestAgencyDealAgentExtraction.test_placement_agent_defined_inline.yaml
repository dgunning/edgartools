        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0
        0pt 0.5in; text-align: justify; text-indent: -0.25in; background-color: white\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: -0.25in; background-color: white\"></P>\n\n<TABLE
        CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; width: 100%; background-color: white; border-collapse: collapse\">\n
        \ <TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align: top\">\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify;
        width: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD STYLE=\"font: 10pt Times New
        Roman, Times, Serif; text-align: justify; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n    <TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">any
        action to interpret,\n    apply, enforce or determine the validity of our
        charter or our bylaws; and</FONT></TD></TR>\n  <TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n    <TD STYLE=\"font: 10pt
        Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD></TR>\n
        \ <TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align: top\">\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">any
        action asserting a\n    claim against us governed by the internal affairs
        doctrine.</FONT></TD></TR>\n  </TABLE>\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: -0.25in;
        background-color: white\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">For\nthe avoidance of doubt, the foregoing
        provisions of our charter will not apply to any action or proceeding asserting
        a claim under the\nSecurities Act or the Exchange Act. These provisions of
        our charter could limit the ability of our stockholders to obtain a favorable\njudicial
        forum for certain disputes with us or with our current or former directors,
        officers or other employees, which may discourage\nsuch lawsuits against us
        and our current or former directors, officers and employees. Alternatively,
        if a court were to find these provisions\nof our charter inapplicable to,
        or unenforceable in respect of, one or more of the types of actions or proceedings
        listed above, we may\nincur additional costs associated with resolving such
        matters in other jurisdictions, which could adversely affect our business,
        financial\ncondition and results of operations.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Delaware\nAnti-Takeover Statute</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nare subject to the provisions of Section 203 of the Delaware General
        Corporation Law (sometimes referred to as Section 203) regulating\ncorporate
        takeovers. In general, Section 203 prohibits a publicly-held Delaware corporation
        from engaging, under specified circumstances,\nin a business combination with
        an interested stockholder for a period of three years following the date the
        person became an interested\nstockholder unless:</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0; margin-bottom: 0\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"font: 10pt Times New Roman, Times, Serif;
        width: 0.5in\"></TD><TD STYLE=\"font: 10pt Times New Roman, Times, Serif;
        width: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font: 10pt Times New Roman,
        Times, Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">prior\n                                            to
        the date of the transaction, the board of directors of the corporation approved
        either\n                                            the business combination
        or the transaction which resulted in the stockholder becoming an\n                                            interested
        stockholder;</FONT></TD></TR>\n<TR STYLE=\"font: 10pt Times New Roman, Times,
        Serif; vertical-align: top\">\n<TD STYLE=\"font: 10pt Times New Roman, Times,
        Serif; width: 0.5in\"></TD><TD STYLE=\"font: 10pt Times New Roman, Times,
        Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font: 10pt Times New
        Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">upon\n                                            consummation
        of the transaction that resulted in the stockholder becoming an interested
        stockholder,\n                                            the stockholder
        owned at least 85% of the voting stock of the corporation outstanding at\n
        \                                           the time the transaction commenced,
        excluding for purposes of determining the number of shares\n                                            of
        voting stock outstanding (but not the outstanding voting stock owned by the
        stockholder)(1)\n                                            shares owned
        by persons who are directors and also officers and (2) shares owned by employee\n
        \                                           stock plans in which employee
        participants do not have the right to determine confidentially\n                                            whether
        shares held subject to the plan will be tendered in a tender or exchange offer;
        or</FONT></TD></TR>\n<TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n<TD STYLE=\"font: 10pt Times New Roman, Times, Serif;
        width: 0.5in\"></TD><TD STYLE=\"font: 10pt Times New Roman, Times, Serif;
        width: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font: 10pt Times New Roman,
        Times, Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">on\n                                            or
        subsequent to the date of the transaction, the business combination is approved
        by the\n                                            board of directors and
        authorized at an annual or special meeting of stockholders, and not\n                                            by
        written consent, by the affirmative vote of at least 66-2/3% of the outstanding
        voting\n                                            stock that is not owned
        by the interested stockholder.</FONT></TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify; text-indent: -0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Generally,\na business combination includes a merger, asset or stock
        sale, or other transaction resulting in a financial benefit to the interested\nstockholder.
        An interested stockholder is a person who, together with affiliates and associates,
        owns or, within three years prior to\nthe determination of interested stockholder
        status, did own 15% or more of a corporation&rsquo;s outstanding voting securities.
        We expect\nthe existence of this provision to have an anti-takeover effect
        with respect to transactions our board of directors do not approve in\nadvance.
        We also anticipate that Section 203 may also discourage attempts that might
        result in a premium over the market price for the\nshares of our common stock
        held by stockholders.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">The\nprovisions of Delaware law, our certificate
        of incorporation and our bylaws could have the effect of discouraging others
        from attempting\nhostile takeovers and, as a consequence, they may also inhibit
        temporary fluctuations in the market price of our common stock that often\nresult
        from actual or rumored hostile takeover attempts. These provisions may also
        have the effect of preventing changes in our management.\nIt is possible that
        these provisions could make it more difficult to accomplish transactions that
        stockholders may otherwise deem to\nbe in their best interests.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>
        Warrants</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nSeptember 24, 2021, we entered into a securities purchase agreement,
        whereby we issued to the other parties thereto warrants to purchase\n54,174
        shares of the common stock in the aggregate (the &ldquo;2021 Investor Warrants&rdquo;).
        The 2021 Investor Warrants\nhad an exercise price of $152.60, a 30% premium
        to the conversion price, and are exercisable for five years following issuance.
        As a\nresult of our entering into a securities purchase agreement in 2022
        with the same parties that were signatory to the securities purchase\nagreement
        in 2021, the exercise price of the 2021 Prior Warrants was reduced to $15.60.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"></P>\n\n<!--
        Field: Page; Sequence: 27; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt;
        border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->9<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nJune 30, 2022, we entered into a securities purchase agreement,
        whereby we issued to the other parties signatory thereto warrants\n(the &ldquo;2022
        Investor Warrants&rdquo;) to purchase 466,788 shares of the common stock in
        the aggregate. The 2022 Investor\nWarrants have been reset to an exercise
        price of $2.006, and are exercisable for five years following issuance. Our
        obligations under\nthe 2021 Investor Warrants and 2022 Investor Warrants are
        secured by all of our and our subsidiaries&rsquo; assets and\nare guaranteed
        jointly and severally by our subsidiaries.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\">On December
        9, 2022,\nin connection with the sale of shares of our common stock pursuant
        to a registration statement filed with the SEC, we issued warrants\nto purchase
        6,600,000 shares of our common stock at an exercise price of $1.40 per share
        of common stock. These warrants are not traded\non any market.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Over\ntime, we have issued,
        to a number of third parties, warrants that may be exercised for common stock.
        Some of these warrants are traded\non the OTC Pink Open Market under the symbol
        &ldquo;<I>ENSCW</I>&rdquo;.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Convertible\nPromissory Notes</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>2021\nSecured Convertible Promissory Notes</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nSeptember 24, 2021, we entered into a securities purchase agreement
        (the &ldquo;2021 Securities Purchase Agreement&rdquo;) whereby we\nissued
        to the other parties signatory thereto secured convertible promissory notes
        in the aggregate principal amount of $15.9 million\nfor an aggregate purchase
        price of $15 million (the &ldquo;2021 Notes&rdquo;). Our obligations under
        the 2021 Securities Purchase Agreement\nare secured by all of our and our
        subsidiaries&rsquo; assets and are guaranteed jointly and severally by our
        subsidiaries.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave registered with the SEC the resale of the shares of common
        stock issuable upon conversion of the 2021 Notes, as well as the shares\nof
        common stock issuable upon the exercise of the 2021 Investor Warrants. The
        2021 Notes were repaid in full in October 2022.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>2022\nSecured Convertible Promissory Notes</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nJune 30, 2022, we entered into a securities purchase agreement
        (the &ldquo;2022 Securities Purchase Agreement&rdquo;) whereby we issued\nto
        the other parties signatory thereto secured convertible promissory notes in
        the aggregate principal amount of $8.48 million\nfor an aggregate purchase
        price of $8.0 million (the &ldquo;2022 Notes&rdquo;) in two closings under
        the 2022 Securities Purchase\nAgreement, the first closing occurring on July
        1, 2022 and the second occurring on August 8, 2022. Our obligations under
        the 2022 Securities\nPurchase Agreement are secured by all of our and our
        subsidiaries&rsquo; assets and are guaranteed jointly and severally by our
        subsidiaries.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\n2022 Notes, subject to an original issue discount of six percent
        (6%), have a term of eighteen months and accrue interest at the rate\nof 6.0%
        per annum. The 2022 Notes are convertible into the common stock, at a per
        share conversion price equal to $10.90, a 10% premium\nto the average price
        of the common stock for the three trading days prior to the first closing
        under the 2022 Securities Purchase Agreement.\nThe conversion price is subject
        to customary anti-dilution adjustments upon (among other triggering events)
        the occurrence of a change\nof control transaction and certain dilutive transactions,
        including subsequent equity issuances, share dividends and splits occurring\nfollowing
        the issuance of the promissory note.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Under\nthe 2022 Notes, commencing on September 29, 2022 and continuing
        monthly on the first day of each month beginning November 1, 2022, we\nare
        obligated to redeem one fifteenth (1/15th) of the original principal amount
        of the applicable 2022 Notes, plus accrued but unpaid\ninterest, liquidated
        damages and any other amounts then owing to the holder of such 2022 Note.
        Under the 2022 Notes issued on August\n8, 2022, commencing on November 1,
        2022 and continuing monthly on the first day of each month beginning December
        1, 2022, we are obligated\nto redeem one fifteenth (1/15th) of the original
        principal amount under the applicable 2022 Note, plus accrued but unpaid interest,
        liquidated\ndamages and any other amounts then owing to the holder of such
        2022 Note.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.25in\"></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!-- Field:
        Page; Sequence: 28; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt; border-bottom:
