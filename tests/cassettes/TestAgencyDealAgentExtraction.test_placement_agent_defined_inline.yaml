        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 1pt;
        text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\"><B>Overview</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0pt 0pt 1pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nare a clinical stage pharmaceutical company
        seeking to develop innovative solutions for severe pain relief while reducing
        the potential\nfor opioid misuse, abuse, and overdose.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nare
        currently developing product candidates designed to improve the safety of
        prescription drugs. Our primary focus has been on opioid\npain products and
        opioid use disorder products. Prescription opioid abuse presents major burdens
        to society, resulting in significant\ncosts, illnesses, and deaths, many of
        which we believe could be prevented through the use of our proprietary technologies.
        We believe\nthe intertwined issues of (1) the widespread abuse of prescription
        opioids and (2) the resultant reluctance of many prescribers to write\nprescriptions
        for opioid analgesics have resulted in the persistent under-treatment of patients
        with moderate-to-severe pain. Our platforms\nutilize a novel molecular delivery
        technology designed to deter prescription opioid abuse at the molecular level.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Our\ncurrent development pipeline includes two new drug platforms -
        an abuse-resistant opioid prodrug technology &ndash; the&#8239;Trypsin\nActivated
        Abuse Protection, or the TAAP platform, and an over-dose protection opioid
        prodrug technology - the Multi-Pill Abuse Resistant,\nor the MPAR&reg; platform.
        The TAAP platform is designed to seek to improve the care of patients with
        severe pain while reducing the\nhuman and economic costs associated with prescription
        opioid drug abuse. The MPAR&reg; platform when combined with our TAAP prodrugs\nis
        designed not only to seek to prevent abuse of prescription drugs but also
        to reduce overdose occurrences. Each prodrug is intended\nto be able to be
        combined with our MPAR&reg; technology for overdose protection.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0.7pt;
        text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0.7pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>Recent\nDevelopments</B></FONT></P>\n\n<P
