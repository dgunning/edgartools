        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">we\nwill prepare and deliver certificates
        for such securities in exchange for beneficial interests in the global securities.
        Any beneficial\ninterest in a global security that is exchangeable under the
