        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nmay issue units consisting of any combination of the other types
        of securities offered under this prospectus in one or more series. We\nmay
        evidence each series of units by unit certificates that we will issue under
        a separate agreement. We may enter into unit agreements\nwith a unit agent.
        Each unit agent will be a bank or trust company that we select. We will indicate
        the name and address of the unit\nagent in the applicable prospectus supplement
        relating to a particular series of units.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nfollowing description,
        together with the additional information included in any applicable prospectus
        supplement, summarizes the general\nfeatures of the units that we may offer
        under this prospectus. You should read any prospectus supplement and any free
        writing prospectus\nthat we may authorize to be provided to you related to
        the series of units being offered, as well as the complete unit agreements
        that\ncontain the terms of the units. Specific unit agreements will contain
        additional important terms and provisions and we will file as an\nexhibit
        to the registration statement of which this prospectus is a part or will incorporate
        by reference from another report that we\nfile with the SEC, the form of each
        unit agreement relating to units offered under this prospectus.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
