        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">No\nEvent of Default with respect to a particular series of debt securities
        necessarily constitutes an Event of Default with respect to any\nother series
        of debt securities. (Section 6.2) The occurrence of certain Events of Default
        or an acceleration under the indenture may\nconstitute an event of default
        under certain indebtedness of ours or our subsidiary outstanding from time
        to time.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\nan Event of Default with respect to debt securities of any series
        at the time outstanding (except as to certain events of bankruptcy,\ninsolvency
        or reorganization) occurs and is continuing, then the trustee or the holders
        of not less than 25% in principal amount of the\noutstanding debt securities
        of that series may, by a notice in writing to us (and to the trustee if given
        by the holders), declare to\nbe due and payable immediately the principal
        of, and accrued and unpaid interest, if any, on, all debt securities of that
        series. In\nthe case of an Event of Default resulting from certain events
        of bankruptcy, insolvency or reorganization, the principal (or such specified\namount)
        of and accrued and unpaid interest, if any, on all outstanding debt securities
        will become and be immediately due and payable\nwithout any declaration or
        other act on the part of the trustee or any holder of outstanding debt securities.
        At any time after a declaration\nof acceleration with respect to debt securities
        of any series has been made, but before a judgment or decree for payment of
        the money\ndue has been obtained by the trustee, the holders of a majority
        in principal amount of the outstanding debt securities of that series\nmay
        rescind and annul the acceleration if all Events of Default, other than the
        non-payment of accelerated principal and interest, if\nany, with respect to
        debt securities of that series, have been cured or waived as provided in the
        indenture and such rescission would\nnot conflict with any judgment or decree.
        (Section 6.2) We refer you to the prospectus supplement relating to any series
        of debt securities\nthat are discount securities for the particular provisions
