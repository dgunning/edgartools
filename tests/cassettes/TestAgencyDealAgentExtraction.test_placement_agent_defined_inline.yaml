        that we may offer. Particular terms of the warrants will be described in the
        applicable warrant agreements\nand the applicable prospectus supplement for
        the warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
