        in definitive certificated form registered in the names that the depositary
        directs. It is expected that these directions\nwill be based upon directions
        received by the depositary from its participants with respect to ownership
        of beneficial interests in the\nglobal securities.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>Euroclear\nand Clearstream</I></B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">If\nso provided in the applicable prospectus
        supplement, you may hold interests in a global security through Clearstream
        Banking S.A., which\nwe refer to as &ldquo;Clearstream,&rdquo; or Euroclear
        Bank S.A./N.V., as operator of the Euroclear System, which we refer to as
        &ldquo;Euroclear,&rdquo;\neither directly if you are a participant in Clearstream
        or Euroclear or indirectly through organizations which are participants in
        Clearstream\nor Euroclear. Clearstream and Euroclear will hold interests on
        behalf of their respective participants through customers&rsquo; securities\naccounts
        in the names of Clearstream and Euroclear, respectively, on the books of their
        respective U.S. depositaries, which in turn will\nhold such interests in customers&rsquo;
        securities accounts in such depositaries&rsquo; names on DTC&rsquo;s books.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Clearstream\nand Euroclear are securities clearance systems in Europe.
        Clearstream and Euroclear hold securities for their respective participating\norganizations
        and facilitate the clearance and settlement of securities transactions between
        those participants through electronic book-entry\nchanges in their accounts,
        thereby eliminating the need for physical movement of certificates.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Payments,\ndeliveries, transfers, exchanges, notices and other matters
        relating to beneficial interests in global securities owned through Euroclear\nor
        Clearstream must comply with the rules and procedures of those systems. Transactions
        between participants in Euroclear or Clearstream,\non one hand, and other
        participants in DTC, on the other hand, are also subject to DTC&rsquo;s rules
        and procedures.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Investors\nwill be able to make and receive through Euroclear and Clearstream
        payments, deliveries, transfers and other transactions involving any\nbeneficial
        interests in global securities held through those systems only on days when
        those systems are open for business. Those systems\nmay not be open for business
        on days when banks, brokers and other institutions are open for business in
        the United States.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Cross-market\ntransfers between participants in DTC, on the one hand,
        and participants in Euroclear or Clearstream, on the other hand, will be effected\nthrough
        DTC in accordance with the DTC&rsquo;s rules on behalf of Euroclear or Clearstream,
        as the case may be, by their respective U.S.\ndepositaries; however, such
        cross-market transactions will require delivery of instructions to Euroclear
        or Clearstream, as the case\nmay be, by the counterparty in such system in
        accordance with the rules and procedures and within the established deadlines
        (European\ntime) of such system. Euroclear or Clearstream, as the case may
        be, will, if the transaction meets its settlement requirements, deliver\ninstructions
        to its U.S. depositary to take DTC, and making or receiving payment in accordance
        with normal procedures for same-day fund\nsettlement. Participants in Euroclear
        or Clearstream may not deliver instructions directly to their respective U.S.
        depositaries.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Due\nto time zone differences, the securities accounts of a participant
        in Euroclear or Clearstream purchasing an interest in a global security\nfrom
        a direct participant in DTC will be credited, and any such crediting will
        be reported to the relevant participant in Euroclear or\nClearstream, during
        the securities settlement processing day (which must be a business day for
        Euroclear or Clearstream) immediately\nfollowing the settlement date of DTC.
        Cash received in Euroclear or Clearstream as a result of sales of interests
        in a global security\nby or through a participant in Euroclear or Clearstream
        to a direct participant in DTC will be received with value on the settlement\ndate
        of DTC but will be available in the relevant Euroclear or Clearstream cash
        account only as of the business day for Euroclear or\nClearstream following
        DTC&rsquo;s settlement date.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I></I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
