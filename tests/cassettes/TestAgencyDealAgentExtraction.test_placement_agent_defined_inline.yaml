        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        uppercase\"><B><A NAME=\"Sk_009\"></A>DILUTION</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">If\nyou
        invest in our common stock or Pre-funded Warrants, your ownership interest
        will be diluted to the extent of the difference between\nthe price per share
        you pay in this offering and the as adjusted net tangible book value per share
        of our common stock immediately after\ngiving effect to this offering, assuming
        no value is attributed to the Warrants issued in the concurrent private placement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">Our\nnet tangible book value as of December 31, 2024 was
        approximately $3.4 million, or approximately $2.49 per share of common stock.
        Our\nnet tangible book value is the amount of our total tangible assets less
        our liabilities. Net tangible book value per share is our net\ntangible book
        value divided by the number of shares of common stock outstanding as of December
        31, 2024. Dilution with respect to net\ntangible book value per share represents
        the difference between the amount per share paid by purchasers of shares of
        common stock in\nthis offering and the net tangible book value per share of
        our common stock immediately after this offering.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">After\ngiving
        effect to the sale of 239,594 shares of common stock and 75,594 Pre-funded
        Warrants in this offering at an offering price of $3.49\nper share of common
        stock and $3.4899 per Pre-funded Warrant, and after deducting placement agent
        fees and offering expenses payable\nby us, our as adjusted net tangible book
        value as of December 31, 2024 would have been approximately $4.3 million,
        or approximately $2.60\nper share of common stock. This amount represents
        an immediate increase in as adjusted net tangible book value of $0.11 per
        share\nto our existing stockholders and an immediate dilution of $0.89 per
        share to investors participating in this offering. We determine\ndilution
        per share to investors participating in this offering by subtracting as adjusted
        net tangible book value per share after giving\neffect to this offering from
        the assumed combined public offering price per share, Pre-funded Warrant and
        accompanying warrant paid by\ninvestors participating in this offering.</FONT></P>\n\n<P
