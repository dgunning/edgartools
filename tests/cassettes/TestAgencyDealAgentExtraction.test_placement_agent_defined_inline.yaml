        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">We\nmay temporarily invest
        the net proceeds in a variety of capital preservation instruments, including
        investment grade instruments, certificates\nof deposit or direct or guaranteed
        obligations of the U.S. government, or may hold such proceeds as cash, until
        they are used for their\nstated purpose. We have not determined the amount
        of net proceeds to be used specifically for such purposes. As a result, management\nwill
        retain broad discretion over the allocation of net proceeds.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!--
        Field: Page; Sequence: 24; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt;
        border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->6<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\"></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center;
        text-indent: 0in\"><A NAME=\"d_008\"></A><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">DESCRIPTION\nOF CAPITAL STOCK</FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>The\nfollowing description of our capital stock is not complete
        and may not contain all the information you should consider before investing\nin
        our capital stock. This description is summarized from, and qualified in its
        entirety by reference to, our certificate of incorporation,\nwhich has been
        publicly filed with the SEC. See &ldquo;Where You Can Find More Information.&rdquo;
        For a complete description, you should\nrefer to our third amended and restated
        certificate of incorporation and amended and restated bylaws, copies of which
        are incorporated\nby reference as exhibits to the registration statement of
        which this prospectus is a part.</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Authorized\nand Outstanding
        Capital Stock</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nauthorized capital stock consists of
        250,000,000 shares of common stock, $0.0001 par value per share, and 1,500,000
        shares of preferred\nstock, $0.0001 par value per share. As of December 30,
        2022, there were 6,414,074 shares of common stock and no shares of preferred
        stock outstanding and no shares of common stock held in treasury. The following
        description of our capital stock does not purport\nto be complete and should
        be reviewed in conjunction with our certificate of incorporation and our bylaws.
        See &ldquo;Where You Can Find\nMore Information.&rdquo;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Common\nStock</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">All\noutstanding shares of our common stock are fully paid and nonassessable.
        Common stockholders of record are entitled to one vote for each\nshare held
        on all matters to be voted on by stockholders. Unless specified in our third
        amended and restated certificate of incorporation\nor bylaws, or as required
        by applicable provisions of the Delaware General Corporation Law (the &ldquo;DGCL&rdquo;)
        or applicable stock\nexchange rules, the affirmative vote of a majority of
        our shares of common stock that are voted is required to approve any such
        matter\nvoted on by our stockholders. Our board of directors (the &ldquo;Board&rdquo;)
        is divided into three classes, each of which will generally\nserve for a term
        of three years with only one class of directors being elected in each year.
        There is no cumulative voting with respect\nto the election of directors or
        any other matter, with the result that the holders of more than 50% of the
        shares voted for the election\nof directors can elect all  the directors.
        Our stockholders are entitled to receive ratable dividends when, as and if
        declared by the\nBoard out of funds legally available therefor.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">In\nthe event of a liquidation, dissolution
        or winding up, our stockholders are entitled to share ratably in all assets
        remaining available\nfor distribution to them after payment of liabilities
        and after provision is made for each class of stock, if any, having preference\nover
        the common stock. Our stockholders have no preemptive or other subscription
        rights. There are no sinking fund provisions applicable\nto the common stock.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Preferred\nStock</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Our\nboard
        of directors is authorized to issue from time to time, in one or more designated
        series, any or all of our authorized but unissued\nshares of preferred stock
        with dividend, redemption, conversion, exchange, voting and other provisions
        as may be provided in that particular\nseries. The issuance need not be approved
        by our common stockholders.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B>Certain\nAnti-Takeover Provisions of our
        Third Amended and Restated Certificate of Incorporation and our Bylaws</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">The\nthird amended and restated certificate
        of incorporation and our bylaws contain provisions that may delay, defer or
        discourage another\nparty from acquiring control of us. These provisions,
        which are summarized below, discourage coercive takeover practices or inadequate\ntakeover
        bids. These provisions are also designed to encourage persons seeking to acquire
        control of us to first negotiate with our Board,\nwhich may result in an improvement
        of the terms of any such acquisition in favor of our stockholders. However,
        they also give the Board\nthe power to discourage acquisitions that some stockholders
        may favor.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 24.5pt; background-color:
        white\"></P>\n\n<!-- Field: Page; Sequence: 25; Value: 1 -->\n    <DIV STYLE=\"margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->7<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 24.5pt; background-color: white\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 15pt; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Classified\nBoard</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 15pt; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nthird amended and restated certificate
        of incorporation provides that our Board is classified into three classes
        of directors. As a result,\nin most circumstances, a person can gain control
        of our Board only by successfully engaging in a proxy contest at two or more
        annual\nmeetings.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 15pt; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Authorized\nbut Unissued Shares</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        15pt; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nauthorized but unissued shares of common
        and preferred stock are available for future issuances without stockholder
        approval and could\nbe utilized for a variety of corporate purposes, including
        future offerings to raise additional capital, acquisitions, and employee benefit\nplans.
        However, the listing requirements of the Nasdaq, which apply if and so long
        as our common stock remains listed on the Nasdaq,\nrequire stockholder approval
        of certain issuances equal to or exceeding 20% of the then outstanding voting
        power or then outstanding\nnumber of shares of common stock. Additional shares
        that may be used in the future may be issued for a variety of corporate purposes,\nincluding
        future public offerings, to raise additional capital, or to facilitate acquisitions.
        The existence of authorized but unissued\nand unreserved common stock and
        preferred stock could render it more difficult or discourage an attempt to
        obtain control of us by means\nof a proxy contest, tender offer, merger or
        otherwise.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 15pt; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Special\nMeetings of Stockholders</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        15pt; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nbylaws provide that special meetings
        of our stockholders may be called only by a majority vote of our Board.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        15pt; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Advance\nNotice Requirements for Stockholder
        Proposals and Director Nominations</I></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        15pt; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nbylaws provide that stockholders seeking
        to bring business before our annual meeting of stockholders, or to nominate
        candidates for election\nas directors at our annual meeting of stockholders,
        must provide timely notice of their intent in writing. To be timely, a stockholder&rsquo;s\nnotice
        will need to be received by the company secretary at our principal executive
        offices not later than the close of business on the\n90<SUP>th</SUP> day nor
        earlier than the close of business on the 120<SUP>th</SUP> day prior to the
        anniversary date of the immediately\npreceding annual meeting of stockholders.
        Pursuant to Rule 14a-8 of the Exchange Act, proposals seeking inclusion in
        our annual proxy\nstatement must comply with the notice periods contained
        therein. Our bylaws also specify certain requirements as to the form and content\nof
        a stockholders meeting. These provisions may preclude our stockholders from
        bringing matters before our annual meeting of stockholders\nor from making
        nominations for directors at our annual meeting of stockholders.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Amendment\nof Charter or Bylaws</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.25in; background-color: white\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">The\nthird amended and restated certificate
        of incorporation provides that certain provisions of the third amended and
        restated certificate\nof incorporation, notwithstanding that a lesser percentage
        may be permitted from time to time by applicable law, and our bylaws may only\nbe
        amended or repealed by, in addition to any vote required by the third amended
        and restated certificate of incorporation or by applicable\nlaw, the vote
        of the holders of sixty-five percent of the voting power of all of the then-outstanding
        shares entitled to vote generally\nin the election of directors, voting together
        as a single class.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in; background-color:
        white\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Exclusive\nForum</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in;
        background-color: white\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in; background-color: white\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Under\nthe our charter, unless we consent
        in writing to the selection of an alternative forum, subject to certain limitations,
        the sole and\nexclusive forum will be the Court of Chancery of the State of
        Delaware (or, if such court does not have jurisdiction, the Superior Court\nof
        the State of Delaware, or, if the Superior Court of the State of Delaware
        also does not have jurisdiction, the United States District\nCourt for the
        District of Delaware) for:</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.25in; background-color: white\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<TABLE
        CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; width: 100%; background-color: white; border-collapse: collapse\">\n
