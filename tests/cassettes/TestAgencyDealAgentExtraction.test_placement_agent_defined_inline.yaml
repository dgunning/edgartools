        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">No\nPersonal Liability of Directors,
        Officers, Employees or Shareholders</FONT></P>\n\n<P STYLE=\"font: bold 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">None\nof our past, present or future directors,
        officers, employees or shareholders, as such, will have any liability for
        any of our obligations\nunder the debt securities or the indenture or for
        any claim based on, or in respect or by reason of, such obligations or their
        creation.\nBy accepting a debt security, each holder waives and releases all
        such liability. This waiver and release is part of the consideration\nfor
        the issue of the debt securities. However, this waiver and release may not
        be effective to waive liabilities under U.S. federal securities\nlaws, and
        it is the view of the SEC that such a waiver is against public policy. (Section
        10.9)</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Governing\nLaw</FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nindenture and the debt
        securities, including any claim or controversy arising out of or relating
        to the indenture or the securities,\nwill be governed by the laws of the State
        of New York. (Section 10.8)<BR STYLE=\"clear: both\"></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
