        foreign currency\nunit or units in the applicable prospectus supplement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Exchange\nand/or
        Conversion Rights</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nmay issue debt securities which can be
        exchanged for or converted into shares of our common stock or preferred stock.
        If we do, we will\ndescribe the terms of exchange or conversion in the prospectus
        supplement relating to these debt securities. (Section 2.2)</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Transfer\nand
        Exchange</FONT></P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Each\ndebt security will be represented by either one or more global
        securities registered in the name of The Depository Trust Company, or\nthe
        Depositary, or a nominee of the Depositary (we will refer to any debt security
        represented by a global debt security as a book-entry\ndebt security), or
        a certificate issued in definitive registered form (we will refer to any debt
        security represented by a certificated\nsecurity as a certificated debt security)
        as set forth in the applicable prospectus supplement. Except as set forth
        under the heading\n&ldquo;Global Debt Securities and Book-Entry System&rdquo;
        below, book-entry debt securities will not be issuable in certificated form.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; background-color:
        white\">Certificated\nDebt Securities</FONT></P>\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">You\nmay transfer or exchange certificated
        debt securities in accordance with the terms of the indenture. (Section 2.4)
        You will not be charged\na service charge for any transfer or exchange of
        certificated debt securities but may be required to pay an amount sufficient
        to cover\nany tax or other governmental charge payable in connection with
        such transfer or exchange. (Section 2.7)</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">You\nmay effect the transfer
        of certificated debt securities and the right to receive the principal of,
        premium and interest on certificated\ndebt securities only by surrendering
        the certificate representing those certificated debt securities and either
        reissuance by us or the\ntrustee of the certificate to the new holder or the
        issuance by us or the trustee of a new certificate to the new holder. (Section
        2.7)</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; background-color:
        white\">Global\nSecurities</FONT></P>\n\n<P STYLE=\"font: bold 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Each\nglobal debt security representing book-entry debt securities
        will be deposited with, or on behalf of, the Depositary, and registered\nin
        the name of the Depositary or a nominee of the Depositary. Please see &ldquo;Global
        Securities.&rdquo;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">No\nProtection
        in the Event of a Change of Control</FONT></P>\n\n<P STYLE=\"font: bold 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Unless\nwe state otherwise in the applicable
        prospectus supplement, the debt securities will not contain any provisions
        which may afford holders\nof the debt securities protection in the event we
        have a change in control or in the event of a highly leveraged transaction
        (whether\n such transaction results in a change in control) which could adversely
        affect holders of debt securities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">Covenants</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Unless\notherwise indicated in this prospectus
        or the applicable prospectus supplement, our debt securities may not have
        the benefit of any covenant\nthat limits or restricts our business or operations,
        the pledging of our assets or the incurrence by us of indebtedness. We will
        describe\nin the applicable prospectus supplement any material covenants in
        respect of a series of debt securities. (Article 4)</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!-- Field:
        Page; Sequence: 32; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt; border-bottom:
