        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 41.75pt; text-align:
        justify; text-indent: -0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"font: 10pt Times New
        Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"></TD><TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font:
        10pt Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">a\n                                            &ldquo;clearing
        corporation&rdquo; within the meaning of the New York Uniform Commercial\n
        \                                           Code; and</FONT></TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 41.75pt;
        text-align: justify; text-indent: -0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"width: 100%; font: 10pt Times New Roman, Times,
        Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"font: 10pt Times New
        Roman, Times, Serif; vertical-align: top\">\n<TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"></TD><TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font:
        10pt Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">a\n                                            &ldquo;clearing
        agency&rdquo; registered pursuant to the provisions of Section 17A of the\n
        \                                           Exchange Act.</FONT></TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 41.75pt;
        text-align: justify; text-indent: -0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">DTC\nholds securities that its participants deposit with DTC. DTC also
        facilitates the settlement among its participants of securities transactions,\nsuch
        as transfers and pledges, in deposited securities through electronic computerized
        book-entry changes in participants&rsquo; accounts,\nthereby eliminating the
        need for physical movement of securities certificates. &ldquo;Direct participants&rdquo;
        in DTC include securities\nbrokers and dealers, including underwriters, banks,
        trust companies, clearing corporations and other organizations. DTC is a wholly-owned\nsubsidiary
        of The Depository Trust &amp; Clearing Corporation, or DTCC. DTCC is the holding
        company for DTC, National Securities Clearing\nCorporation and Fixed Income
        Clearing Corporation, all of which are registered clearing agencies. DTCC
        is owned by the users of its regulated\nsubsidiaries. Access to the DTC system
        is also available to others, which we sometimes refer to as indirect participants,
        that clear\nthrough or maintain a custodial relationship with a direct participant,
        either directly or indirectly. The rules applicable to DTC and\nits participants
        are on file with the SEC.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Purchases\nof securities under the DTC system
        must be made by or through direct participants, which will receive a credit
        for the securities on\nDTC&rsquo;s records. The ownership interest of the
        actual purchaser of a security, which we sometimes refer to as a beneficial
        owner,\nis in turn recorded on the direct and indirect participants&rsquo;
        records. Beneficial owners of securities will not receive written\nconfirmation
        from DTC of their purchases. However, beneficial owners are expected to receive
        written confirmations providing details\nof their transactions, as well as
        periodic statements of their holdings, from the direct or indirect participants
        through which they\npurchased securities. Transfers of ownership interests
        in global securities are to be accomplished by entries made on the books of
        participants\nacting on behalf of beneficial owners. Beneficial owners will
        not receive certificates representing their ownership interests in the\nglobal
        securities, except under the limited circumstances described below.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">To\nfacilitate subsequent transfers, all global securities deposited
        by direct participants with DTC will be registered in the name of DTC&rsquo;s\npartnership
        nominee, Cede &amp; Co., or such other name as may be requested by an authorized
        representative of DTC. The deposit of securities\nwith DTC and their registration
        in the name of Cede &amp; Co. or such other nominee will not change the beneficial
        ownership of the securities.\nDTC has no knowledge of the actual beneficial
        owners of the securities. DTC&rsquo;s records reflect only the identity of
        the direct participants\nto whose accounts the securities are credited, which
        may or may not be the beneficial owners. The participants are responsible
        for keeping\naccount of their holdings on behalf of their customers.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">So\nlong as the securities are in book-entry form, you will receive
        payments and may transfer securities only through the facilities of the\ndepositary
        and its direct and indirect participants. We will maintain an office or agency
        in the location specified in the prospectus\nsupplement for the applicable
        securities, where notices and demands in respect of the securities and the
        indenture may be delivered to\nus and where certificated securities may be
        surrendered for payment, registration of transfer or exchange.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"></P>\n\n<!--
        Field: Page; Sequence: 40; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt;
        border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->22<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Conveyance\nof notices and other communications by DTC to direct participants,
        by direct participants to indirect participants and by direct participants\nand
        indirect participants to beneficial owners will be governed by arrangements
        among them, subject to any legal requirements in effect\nfrom time to time.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Redemption\nnotices will be sent to DTC. If less than all of the securities
        of a particular series are being redeemed, DTC&rsquo;s practice is to\ndetermine
        by lot the amount of the interest of each direct participant in the securities
        of such series to be redeemed.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Neither\nDTC nor Cede &amp; Co. (or such other
        DTC nominee) will consent or vote with respect to the securities. Under Its
        usual procedures, DTC\nwill mail an omnibus proxy to us as soon as possible
        after the record date. The omnibus proxy assigns the consenting or voting
        rights\nof Cede &amp; Co. to those direct participants to whose accounts the
        securities of such series are credited on the record date, identified\nin
        a listing attached to the omnibus proxy.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">So\nlong as securities are
        in book-entry form, we will make payments on those securities to the depositary
        or its nominee, as the registered\nowner of such securities, by wire transfer
        of immediately available funds. If securities are issued in definitive certificated
        form under\nthe limited circumstances described below and unless if otherwise
        provided in the description of the applicable securities herein or\nin the
        applicable prospectus supplement, we will have the option of making payments
        by check mailed to the addresses of the persons entitled\nto payment or by
        wire transfer to bank accounts in the United States designated in writing
        to the applicable trustee or other designated\nparty at least 15 days before
        the applicable payment date by the persons entitled to payment, unless a shorter
        period is satisfactory\nto the applicable trustee or other designated party.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Redemption\nproceeds, distributions and dividend payments on the securities
        will be made to Cede &amp; Co., or such other nominee as may be requested\nby
        an authorized representative of DTC. DTC&rsquo;s practice is to credit direct
        participants&rsquo; accounts upon DTC&rsquo;s receipt\nof funds and corresponding
        detail information from us on the payment date in accordance with their respective
        holdings shown on DTC records.\nPayments by participants to beneficial owners
        will be governed by standing instructions and customary practices, as is the
        case with\nsecurities held for the account of customers in bearer form or
        registered in &ldquo;street name.&rdquo; Those payments will be the responsibility\nof
        participants and not of DTC or us, subject to any statutory or regulatory
        requirements in effect from time to time. Payment of redemption\nproceeds,
        distributions and dividend payments to Cede &amp; Co., or such other nominee
        as may be requested by an authorized representative\nof DTC, is our responsibility,
        disbursement of payments to direct participants is the responsibility of DTC,
        and disbursement of payments\nto the beneficial owners is the responsibility
        of direct and indirect participants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Except\nunder the limited
        circumstances described below, purchasers of securities will not be entitled
        to have securities registered in their\nnames and will not receive physical
        delivery of securities. Accordingly, each beneficial owner must rely on the
        procedures of DTC and\nits participants to exercise any rights under the securities
        and the indenture.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nlaws of some jurisdictions may require that some purchasers of
        securities take physical delivery of securities in definitive form. Those\nlaws
        may impair the ability to transfer or pledge beneficial interests in securities.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">DTC\nmay discontinue providing its services as securities depositary
        with respect to the securities at any time by giving reasonable notice\nto
        us. Under such circumstances, in the event that a successor depositary is
        not obtained, securities certificates are required to be\nprinted and delivered.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">As\nnoted above, beneficial owners of a particular series of securities
        generally will not receive certificates representing their ownership\ninterests
        in those securities. However, if:</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"width:
        100%; font: 10pt Times New Roman, Times, Serif; margin-top: 0; margin-bottom:
        0\"><TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align:
        top\">\n<TD STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 0.25in\"></TD><TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD><TD STYLE=\"font:
        10pt Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">DTC\n                                            notifies
        us that it is unwilling or unable to continue as a depositary for the global
        security\n                                            or securities representing
        such series of securities or if DTC ceases to be a clearing agency\n                                            registered
        under the Exchange Act at a time when it is required to be registered and
        a successor\n                                            depositary is not
        appointed within 90 days of the notification to us or of our becoming aware\n
        \                                           of DTC&rsquo;s ceasing to be so
        registered, as the case may be;</FONT></TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 41.75pt; text-align:
        justify; text-indent: -0.25in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 41.75pt; text-align: justify; text-indent:
        -0.25in\"></P>\n\n<!-- Field: Page; Sequence: 41; Value: 1 -->\n    <DIV STYLE=\"margin-bottom:
