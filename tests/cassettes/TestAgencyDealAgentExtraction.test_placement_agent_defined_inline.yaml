        Nasdaq Capital Market was $3.24 per share. There is no established public
        trading market for the Pre-funded\nWarrants being offered in this offering
        and the Warrants being sold in a concurrent private placement, and we do not
        expect a market\nto develop. In addition, we do not intend to apply for listing
        of the Pre-funded Warrants or the Warrants on any national securities\nexchange
        or other trading market. Without an active market, the liquidity of the Pre-funded
        Warrants and the Warrants will be limited.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
