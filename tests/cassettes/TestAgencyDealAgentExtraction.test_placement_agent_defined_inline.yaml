        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">This\ndischarge may occur only if, among other things, we have delivered
        to the trustee an opinion of counsel stating that we have received\nfrom,
        or there has been published by, the United States Internal Revenue Service
        a ruling or, since the date of execution of the indenture,\nthere has been
        a change in the applicable United States federal income tax law, in either
        case to the effect that, and based thereon\nsuch opinion shall confirm that,
        the holders of the debt securities of that series will not recognize income,
        gain or loss for United\nStates federal income tax purposes as a result of
        the deposit, defeasance and discharge and will be subject to United States
        federal\nincome tax on the same amounts and in the same manner and at the
        same times as would have been the case if the deposit, defeasance and\ndischarge
        had not occurred. (Section 9.2)</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
