        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">Defeasance\nof Debt Securities
        and Certain Covenants in Certain Circumstances</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Legal\nDefeasance</I>. The indenture provides
        that, unless otherwise provided by the terms of the applicable series of debt
        securities, we may\nbe discharged from  all obligations in respect of the
        debt securities of any series (subject to certain exceptions). We will be\nso
        discharged upon the irrevocable deposit with the trustee, in trust, of money
        and/or U.S. government obligations or, in the case of\ndebt securities denominated
        in a single currency other than U.S. Dollars, government obligations of the
        government that issued or caused\nto be issued such currency, that, through
        the payment of interest and principal in accordance with their terms, will
        provide money or\nU.S. government obligations in an amount sufficient in the
        opinion of a nationally recognized firm of independent public accountants\nor
        investment bank to pay and discharge each installment of principal, premium
        and interest on and any mandatory sinking fund payments\nin respect of the
        debt securities of that series on the stated maturity of those payments in
        accordance with the terms of the indenture\nand those debt securities.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
