        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">any\n
        \                                                        action asserting
        a claim against us arising pursuant to any provision of the DGCL, our charter
        or our bylaws (as either may be\n                                                         amended,
        restated, modified, supplemented or waived from time to time);</FONT></P></TD></TR>\n</TABLE>\n\n<P
        STYLE=\"margin: 0\">&nbsp;<FONT STYLE=\"font-family: Times New Roman, Times,
