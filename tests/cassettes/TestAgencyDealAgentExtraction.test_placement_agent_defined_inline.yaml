        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt; text-transform: uppercase\"><B><A NAME=\"Sk_006\"></A>MARKET\nPRICE
        AND TICKER SYMBOL</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 20pt\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 20pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">Our\ncommon stock is currently listed on the Nasdaq
        Stock Market under the symbol &ldquo;<I>ENSC</I>.&rdquo; Our Public Warrants
        are currently\nlisted on the OTC Pink Open Market under the symbol &ldquo;<I>ENSCW</I>.&rdquo;
        The closing price of our common stock and Public Warrants\non March 28, 2025,
        was $3.24 and $0.013, respectively. As of March 28, 2025, there were approximately
        73 holders of record of our common\nstock. The number of record holders was
        determined from the records of our transfer agent and does not include beneficial
        owners of common\nstock whose shares are held in the names of various security
        brokers, dealers, and registered clearing agencies.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt; text-transform: uppercase\"><B><A NAME=\"Sk_007\"></A>DIVIDEND\nPOLICY</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">We\nhave not paid any cash dividends on our common stock
        to date. We may retain future earnings, if any, for future operations, expansion\nand
        debt repayment and has no current plans to pay cash dividends for the foreseeable
        future. Any decision to declare and pay dividends\nin the future will be made
        at the discretion of the Board and will depend on, among other things, our
        results of operations, financial\ncondition, cash requirements, contractual
        restrictions and other factors that the Board may deem relevant. In addition,
        our ability to\npay dividends may be limited by covenants of any existing
        and future outstanding indebtedness we or our subsidiaries incur or the terms\nof
        other equity financings. We do not anticipate declaring any cash dividends
        to holders of our common stock in the foreseeable future.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt; text-transform: uppercase\"><B><A
        NAME=\"Sk_008\"></A>USE\nOF PROCEEDS</B></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nexpect
        to receive net proceeds from the sale of common stock and Pre-funded Warrants
        in this offering of approximately $0.9 million,\nafter deducting the placement
        agent fees and offering expenses payable by us, excluding the proceeds we
        may receive from the exercise\nof the Warrants issued in the concurrent private
        placement and the warrants to be issued to the placement agent as compensation.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">We\nintend to use the net proceeds from this offering for
        general corporate purposes, which will include continued development of our
        TAAP\nand MPAR&reg; programs and for working capital.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Except\nas
        noted above, we have not determined the amounts we plan to spend on any of
        the areas listed above or the timing of these expenditures.\nAs a result,
        our management will have broad discretion to allocate the net proceeds from
        this offering. Pending application of the net\nproceeds as described above,
        we intend to invest the net proceeds to us from this offering in a variety
        of capital preservation investments,\nincluding short-term, investment-grade
        and interest-bearing instruments. An investor will not have the opportunity
        to evaluate the economic,\nfinancial, or other information on which we base
        our decisions on how to use the proceeds.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"></FONT></P>\n\n<!-- Field: Page; Sequence: 10; Value: 1 -->\n    <DIV
