        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><A NAME=\"Sk_010\"></A>DESCRIPTION\nOF THE PRE-FUNDED WARRANTS</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>The\nfollowing summary
        of certain terms and provisions of the Pre-funded Warrants that are being
        offered hereby is not complete and is subject\nto, and qualified in its entirety
        by the provisions of, the Pre-funded Warrants. You should carefully review
        the terms and provisions\nof the form of the Pre-funded Warrant for a complete
        description of the terms and conditions of the Pre-funded Warrants</I>.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nterm &ldquo;pre-funded&rdquo;
        refers to the fact that the purchase price of our common stock in this offering
        includes almost the entire\nexercise price that will be paid under the Pre-funded
        Warrants, except for a nominal remaining exercise price, of $3.4899. The purpose\nof
        the Pre-funded Warrants is to enable investors that may have restrictions
        on their ability to beneficially own more than 4.99% (or,\nupon election of
        the holder, 9.99%) of our outstanding common stock following the consummation
        of this offering the opportunity to make\nan investment in the Company without
        triggering their ownership restrictions, by receiving Pre-funded Warrants
        in lieu of our common\nstock which would result in such ownership of more
        than 4.99% (or 9.99%), and receive the ability to exercise their option to
        purchase\nthe shares underlying the Pre-funded Warrants at such nominal price
        at a later date.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>Duration\nand
        Exercise Price</I>. The Pre-funded Warrants offered hereby will entitle the
        holder thereof to purchase up to an aggregate of 75,594\nshares of our common
        stock at an exercise price of $0.0001 per share, commencing immediately on
        the date of issuance until exercised\nin full. The Pre-funded Warrants will
        be issued separately from the common stock and may be transferred separately
        immediately thereafter.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>Exercisability</I>.\nThe
        Pre-funded Warrants will be exercisable, at the option of each holder, in
        whole or in part, by delivering to us a duly executed exercise\nnotice accompanied
        by payment in full for the number of shares of common stock purchased upon
        such exercise (except in the case of a\ncashless exercise as discussed below).
        A holder (together with its affiliates) may not exercise any portion of such
        holder&rsquo;s warrants\nto the extent that the holder would own more than
        4.99% (or, at the election of the holder, 9.99%) of our outstanding shares
        of common\nstock immediately after exercise, except that upon notice from
        the holder to us, the holder may increase or decrease the amount of ownership\nof
        outstanding shares of common stock after exercising the holder&rsquo;s Pre-funded
        Warrants up to 9.99% of the number of shares of\ncommon stock outstanding
        immediately after giving effect to the exercise, as such percentage ownership
        is determined in accordance with\nthe terms of the Pre-funded Warrants, provided
        that any increase in this limitation shall not be effective until 61 days
        after notice\nto us.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>Cashless\nExercise</I>.
        In lieu of making the cash payment otherwise contemplated to be made to us
        upon the exercise of a Pre-funded Warrant in\npayment of the aggregate exercise
        price, the holder may elect instead to receive upon such exercise (either
        in whole or in part) the\nnet number of shares of common stock determined
        according to a formula set forth in the Pre-funded Warrant.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Exercise\nPrice Adjustment</I>.
        The exercise price of the Pre-funded Warrants is subject to appropriate adjustment
        in the event of certain stock\ndividends and distributions, stock splits,
        stock combinations, reclassifications or similar events affecting our common
        stock.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>Fundamental\nTransaction</I>.
        In the event of any fundamental transaction, as described in the Pre-funded
        Warrants and generally including any merger\nwith or into another entity,
        sale of all or substantially all of our assets, tender offer or exchange offer,
        reclassification of our\nshares of common stock or acquisition of more than
        50% of the voting power represented by our common stock, then upon any subsequent\nexercise
        of a Pre-funded Warrant, the holder will have the right to receive as alternative
        consideration, for each share of common stock\nthat would have been issuable
        upon such exercise immediately prior to the occurrence of such fundamental
        transaction, the number of shares\nof common stock of the successor or acquiring
        corporation or of our Company, if it is the surviving corporation, and any
        additional consideration\nreceivable upon or as a result of such transaction
        by a holder of the number of shares of common stock for which the Pre-funded
        Warrant\nis exercisable immediately prior to such event.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Transferability</I>.\nIn
        accordance with its terms and subject to applicable laws, a Pre-funded Warrant
        may be transferred at the option of the holder upon\nsurrender of the Pre-funded
        Warrant to us together with the appropriate instruments of transfer and payment
        of funds sufficient to pay\nany transfer taxes (if applicable).</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Fractional\nShares</I>.
        No fractional shares of common stock will be issued upon the exercise of the
        Pre-funded Warrants. Rather, the number of shares\nof common stock to be issued
        will, at our election, either be rounded up to the nearest whole number or
        we will pay a cash adjustment\nin respect of such final fraction in an amount
        equal to such fraction multiplied by the exercise price.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Exchange\nListing</I>.
        There is no established trading market for the Pre-funded Warrants, and we
        do not expect a market to develop. In addition,\nwe do not intend to apply
        for the listing of the Pre-funded Warrants on any national securities exchange
        or other trading market. Without\nan active trading market, the liquidity
        of the Pre-funded Warrants will be limited.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Rights\nas a Stockholder</I>. Except as otherwise provided in the
        Pre-funded Warrants or by virtue of such holder&rsquo;s ownership of shares\nof
        our common stock, the holder of a Pre-funded Warrant does not have the rights
        or privileges of a holder of our common stock, including\nany voting rights,
        until the holder exercises the Pre-funded Warrant.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"></FONT></P>\n\n<!-- Field: Page; Sequence: 12; Value: 1 -->\n    <DIV
        STYLE=\"margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->10<!--
        Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        uppercase\"><B><A NAME=\"Sk_011\"></A>PRIVATE\nPLACEMENT OF WARRANTS</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">In\na concurrent private placement, we are selling to each
        of the investors in this offering one Series A-5 Warrant and one Series\nA-6
        Warrant each to purchase one share of common stock for each share of common
        stock purchased in this offering by each such investor.\nThe aggregate number
        of Warrant Shares exercisable pursuant to the Warrants is 630,376. The Warrants
        will be exercisable at an exercise\nprice of $3.24 per share. The exercise
        price and number of Warrant Shares issuable upon the exercise of the Warrants
        will be subject\nto adjustment in the event of any stock dividend and split,
        reverse stock split, recapitalization, reorganization, or similar transaction,\nas
        described in the Warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Each\nWarrant shall be exercisable immediately.
        The Series A-5 Warrants have a term of exercise equal to eighteen months from
        the date\nof issuance and the Series A-6 Warrants have a term of exercise
        equal to five years from the date of issuance. A\nholder of Warrants will
        have the right to exercise the Warrants on a &ldquo;cashless&rdquo; basis
        if there is no effective registration\nstatement registering the resale of
        the Warrant Shares. Subject to limited exceptions, a holder of Warrants will
        not have the right to\nexercise any portion of its Warrants if the holder,
        together with its affiliates, would beneficially own in excess of 4.99% (or
        9.99%\nat the election of the holder prior to the date of issuance) of the
        number of shares of our common stock outstanding immediately after\ngiving
        effect to such exercise, provided that the holder may increase or decrease
        the beneficial ownership limitation up to 9.99%. Any\nincrease in the beneficial
        ownership limitation shall not be effective until 61 days following notice
        of such change to the Company.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Except\nas
        otherwise provided in the Warrants or by virtue of such holder&rsquo;s ownership
        of shares of our common stock, the holders of the\nWarrants do not have the
        rights or privileges of holders of our common stock, including any voting
        rights, until they exercise their\nWarrants.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The\nWarrants
        and the Warrant Shares are being offered pursuant to the exemptions provided
        in Section 4(a)(2) under the Securities Act and\nRule 506(b) promulgated thereunder,
        and they are not being offered pursuant to this prospectus supplement and
        the accompanying prospectus.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">There\nis
        no established public trading market for the Warrants and we do not expect
        a market to develop. In addition, we do not intend to list\nthe Warrants on
        the Nasdaq Capital Market, any other national securities exchange or any other
        nationally recognized trading system.\nAll purchasers are required to be &ldquo;accredited
        investors&rdquo; as such term is defined in Rule 501(a) under the Securities
        Act.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0pt 0pt 0; text-align: center\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        uppercase\"><B><A NAME=\"Sk_016\"></A>PLAN\nOF DISTRIBUTION</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">We\nhave engaged H.C. Wainwright &amp; Co., LLC (&ldquo;Wainwright&rdquo;
        or the &ldquo;placement agent&rdquo;), to act as our exclusive\nplacement
        agent to solicit offers to purchase the shares of our common stock and Pre-funded
        Warrants offered by this prospectus supplement\nand the accompanying base
        prospectus. Wainwright is not purchasing or selling any such shares or Pre-funded
        Warrants, nor is it required\nto arrange for the purchase and sale of any
        specific number or dollar amount of such shares or Pre-funded Warrants, other
        than to use\nits &ldquo;reasonable best efforts&rdquo; to arrange for the
        sale of such shares and Pre-funded Warrants by us. Therefore, we may not\nsell
        all of the shares of our common stock and Pre-funded Warrants being offered.
        The terms of this offering were subject to market conditions\nand negotiations
        between us, Wainwright, and prospective investors. Wainwright will have no
        authority to bind us by virtue of the engagement\nletter we have executed.
        We have entered into securities purchase agreements directly with certain
        institutional and accredited investors\nwho have agreed to purchase shares
        of our common stock and Pre-funded Warrants in this offering. We will only
        sell to investors who have\nentered into securities purchase agreements.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">Delivery\nof the shares of common stock and Pre-funded Warrants
        offered hereby is expected to take place on or about March 31, 2025, subject
        to\nsatisfaction of certain closing conditions.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nhave
        agreed to pay the placement agent (i) a total cash fee equal to 7.0% of the
        aggregate gross proceeds of this offering, (ii) accountable\nexpenses of up
        to $35,000, (iii) non-accountable expenses of up to $15,000, and (iii) $15,950
        for the clearing expenses\nof the placement agent in connection with this
        offering.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">We\nestimate the total expenses of this offering paid or
        payable by us will be approximately $0.1 million. After deducting the fees
        due to\nthe placement agent and our expenses in connection with this offering,
        we expect the net proceeds from this offering will be approximately\n$0.9
        million.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!--
        Field: Page; Sequence: 13; Value: 1 -->\n    <DIV STYLE=\"margin-bottom: 6pt;
        border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!--
        Field: Sequence; Type: Arabic; Name: PageNo -->11<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Placement\nAgent Warrants</B></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">In\naddition,
        we have agreed to issue to the placement agent, at the closing of this offering,
        warrants to purchase 7.0% of the number of\nshares of our common stock and
        Pre-funded Warrants sold in this offering (or warrants to purchase up to 22,063
        shares of our common stock).\nSuch warrants will have substantially the same
        terms as the warrants being sold and issued in the private placement, except
        that the\nplacement agent&rsquo;s warrants will have an exercise price equal
        to 125% of the offering price per share (or $4.3625 per share) and\nwill expire
        five years from the commencement of sales in this offering. Neither the placement
        agent&rsquo;s warrants nor the shares of\nour common stock issuable upon exercise
        thereof are being registered hereby.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Indemnification</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nhave
        agreed to indemnify the placement agent against certain liabilities, including
        liabilities under the Securities Act and liabilities\narising from breaches
        of representations and warranties contained in our engagement letter with
        the placement agent. We have also agreed\nto contribute to payments the placement
        agent may be required to make in respect of such liabilities.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">In\naddition, we will indemnify the purchasers of shares
        of our common stock in this offering against liabilities arising out of or
        relating\nto (i) any breach of any of the representations, warranties, covenants
        or agreements made by us in the securities purchase agreement\nor related
        documents or (ii) any action instituted against a purchaser by a third party
        (other than a third party who is affiliated with\nsuch purchaser) with respect
        to the securities purchase agreement or related documents and the transactions
        contemplated thereby, subject\nto certain exceptions.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Right\nof First Refusal</B></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nhave
        also granted Wainwright, subject to certain exceptions, a right of first refusal
        for a period of twelve (12) months following the\nclosing of this offering
        to act as sole book-runner, sole manager, sole underwriter, sole placement
        agent or sole agent for every future\ndebt financing or refinancing and public
        or private equity offering or acquisition or disposition by us or any of our
        subsidiaries.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Tail\nFinancing
        Payments</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nhave also agreed to pay the placement
        agent a tail fee equal to the cash and warrant compensation in this offering,
        if any investor,\nwho was contacted by the placement agent during the term
        of its engagement, provides us with capital in any public or private offering\nor
        other financing or capital raising transaction during the 12-month period
        following the termination or expiration of our engagement\nof the placement
        agent.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Other\nRelationships</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
