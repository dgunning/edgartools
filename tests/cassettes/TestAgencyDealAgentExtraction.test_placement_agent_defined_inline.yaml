        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nmay elect to pay all or part of the redemption amount in cash with
        a premium of eight percent or in conversion shares of common stock\nbased
        on a conversion price equal to the lesser of (i) the conversion price and
        (ii) 92% of the average of the three lowest VWAPs (as\ndefined in the 2022
        Securities Purchase Agreement) during the ten (10) consecutive trading days
        ending on the trading day that is immediately\nprior to the applicable redemption
        date, but in no event may we pay the redemption amount in conversion shares
        of common stock unless\nthe conversion price is at least equal to $2.006 and
        certain equity conditions are satisfied. We may incur additional dilution
        from repayment\nof the 2022 Notes in common stock or re-setting the conversion
        price of the 2022 Notes if we issue equity at a price below the conversion\nprice
        of the 2022 Notes. Such issuance occurred in December 2022, re-setting the
        conversion price of the 2022 Notes to\n$2.006.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nare obligated to pay additional cash as true-up payments in the
        event that we pay interest or redemption amounts in shares of common\nstock
        that are valued below $2.006. The true-up payments compensate for the difference
        between the value of a share and $2.006, multiplied\nby the number of shares
        paid. The holders of the 2022 Notes may, each month while the 2022 Notes are
        outstanding, accelerate redemption\namounts, resulting in an aggregate of
        up to four redemption amounts per month. Each accelerated redemption amount,
        like the monthly redemption\namount, is one fifteenth (1/15<SUP>th</SUP>)
        of the original principal amount. We are required to pay accelerated redemption
        amounts\nin additional shares. Therefore, acceleration of redemption amounts
        accelerates the conversion of the 2022 Notes into shares of common\nstock.
        If those conversion shares are valued below $2.006, then we will be required
        to pay additional cash as true-up payments at a time\nwhen we may not have
        the cash to satisfy any deficiency.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave registered with the SEC the resale of the shares of common
        stock issuable upon conversion of the 2022 Notes as well as the shares\nof
        common stock issuable upon the exercise of the 2022 Investor Warrants. The
        2022 Notes contain certain covenants, and events\nof default and triggering
        events, respectively, which would require repayment of the obligations outstanding
        pursuant to such instruments.\nOur obligations under the 2022 Notes are secured
        by all of our and our subsidiaries&rsquo; assets and are guaranteed jointly
        and severally\nby our subsidiaries.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>Options</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">As\nof December 31, 2022, we had 328,248 shares of common stock issuable
        upon the exercise of outstanding options, having a weighted average\nexercise
        price of $56.80 per share.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Transfer\nAgent and Registrar</B></FONT></P>\n\n<P STYLE=\"font:
