        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Further,\nthe stock market in general and
        micro-cap clinical trial pharmaceutical issuers in particular, have recently
        experienced extreme price\nand volume fluctuations. Continued market fluctuations
        could result in extreme volatility in the price of our common stock, which
        could\ncause a decline in the value of our common stock and the loss of some
        or all your investment.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>The\nPre-funded
        Warrants are not listed for trading on any exchange, and we do not expect
        a market to develop for the Pre-funded Warrants.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">There\nis
        no established public trading market for the Pre-funded Warrants, and we do
        not expect a market to develop. In addition, we do not\nintend to apply for
        listing the Pre-funded Warrants on any national securities exchange or other
        trading market. Without an active market,\nthe liquidity of the Pre-funded
        Warrants will be limited. Further, the existence of the Pre-funded Warrants
        and Warrants may act to reduce\nboth the trading volume and the trading price
        of our common stock.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>The\nPre-funded
        Warrants are speculative in nature and do not entitle the holder to any rights
        as common stockholders until the holder exercises\nthe warrant for shares
        of our common stock, except as set forth in the Pre-funded Warrants.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Except\nas
        otherwise provided in the Pre-funded Warrants, until holders of Pre-funded
        Warrants acquire shares of common stock upon exercise of\nthe Pre-funded Warrants,
        holders of Pre-funded Warrants will have no rights with respect to our common
        stock underlying such Pre-funded\nWarrants. Upon exercise of the Pre-funded
        Warrants, the holders will be entitled to exercise the rights of a stockholder
        only as to matters\nfor which the record date occurs after the exercise date.
        Moreover, following this offering, the market value of the Pre-funded Warrants\nis
        uncertain. There can be no assurance that the market price of our common stock
        will ever equal or exceed the price of the Pre-funded\nWarrants, and, consequently,
        whether it will ever be profitable for investors to exercise their Pre-funded
        Warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>Provisions\nof
        the Pre-funded Warrants could discourage an acquisition of us by a third party.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Certain\nprovisions
        of the Pre-funded Warrants offered by this prospectus could make it more difficult
        or expensive for a third party to acquire\nus. The Pre-funded Warrants prohibit
        us from engaging in certain transactions constituting &ldquo;fundamental transactions&rdquo;
        unless,\namong other things, the surviving entity assumes our obligations
        under the Pre-funded Warrants. These and other provisions of the Pre-funded\nWarrants
        offered by this prospectus could prevent or deter a third party from acquiring
        us even where the acquisition could be beneficial\nto stockholders.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0.75in;
        text-align: justify; text-indent: -0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0.75in; text-align:
        justify; text-indent: -0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"></FONT></P>\n\n<!-- Field: Page; Sequence:
