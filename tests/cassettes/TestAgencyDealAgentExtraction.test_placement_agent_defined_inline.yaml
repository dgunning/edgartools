        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center;
        text-indent: 0in\"><A NAME=\"d_005\"></A><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">ABOUT\nENSYSCE</FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt; background-color: white\"><B>Overview</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nare
        a clinical stage pharmaceutical company seeking to develop innovative solutions
        for severe pain relief while reducing the fear of\nand the potential for opioid
        misuse, abuse, and overdose. Prescription opioid abuse presents major burdens
        to society, resulting in significant\ncosts, illnesses and deaths, many of
        which we believe could be prevented through the use of our proprietary technologies.
        We believe\nthe intertwined issues of (1) the widespread abuse of prescription
        opioids and (2) the resultant reluctance of many prescribers to write\nprescriptions
        for opioid analgesics have resulted in the persistent under-treatment of patients
        with moderate-to-severe pain. Our platforms\nutilize a novel molecular delivery
        technology designed to deter prescription opioid abuse at the molecular level.
        We own numerous patents\nand applications in the United States and significant
        commercial markets, such as Europe, China and Japan, relating to our product
        candidates\ncurrently in development, as well as other product candidates
        that may be developed in the future.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Our\ncurrent development
        pipeline includes two new drug platforms: (1) an abuse-resistant opioid prodrug
        technology &ndash; the&#8239;Trypsin\nActivated Abuse Protection, or the TAAP
        platform; and (2) an over-dose protection opioid prodrug technology &ndash;
        the Multi-Pill Abuse\nResistant, or the MPAR&trade; platform. The TAAP platform
        is designed to seek to improve the care of patients with chronic pain while\nreducing
        the human and economic costs associated with prescription opioid drug abuse.
        The MPAR&trade; platform when combined with our\nTAAP prodrugs is designed
        not only to seek to prevent abuse of prescription drugs but also to reduce
        overdose occurrences. Each prodrug\nis intended to be able to be combined
        with our MPAR&trade; technology for overdose protection.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">While\nour principal focus and lead product candidates are geared towards
        combating abuse and overdose of opioid drugs, we have, over the years\nof
        research and development, discovered and recognized qualities and unique features
        of certain product candidates that may be useful\nin addressing other treatments.
        For example, we discovered the ability of nafamostat di-mesylate (&ldquo;nafamostat&rdquo;)
        to inhibit\nthe action of enzymes associated with the COVID-19 infection,
        and have done preliminary work on the development of an oral and inhalation\ndrug
        product of nafamostat, for use against coronaviral infections and other pulmonary
        diseases such as cystic fibrosis.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Corporate\nInformation</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nwere
        originally incorporated in the State of Delaware in April 2003 as PharmacoFore,
        Inc. and, in January 2012, we changed our name from\nPharmacoFore, Inc. to
        Signature Therapeutics Inc. (&ldquo;Signature&rdquo;). On December 28, 2015,
        Signature, Signature Acquisition Corp.,\na wholly-owned subsidiary of Signature
        (&ldquo;SAQ&rdquo;), and Ensysce Biosciences, Inc. (&ldquo;EB&rdquo;) entered
        into an Agreement\nand Plan of Merger (&ldquo;EB-ST Agreement&rdquo;). Pursuant
        to the EB-ST Agreement, SAQ merged with and into EB with EB surviving the\nmerger
        as a wholly-owned subsidiary of Signature. As part of the transaction, Signature
        changed its name to &ldquo;Ensysce Biosciences,\nInc.&rdquo; (&ldquo;Former
        Ensysce&rdquo;) and changed EB&rsquo;s name to EBI Operating Inc. On January
        31, 2021, LACQ, Former Ensysce,\nand Merger Sub entered into the Merger Agreement.
        On June 30, 2021, pursuant to the Merger Agreement, Merger Sub merged with
        and into\nFormer Ensysce, with Former Ensysce surviving the transaction as
        a wholly-owned subsidiary of LACQ. As part of the transaction, LACQ\nchanged
        its name to &ldquo;Ensysce Biosciences, Inc.&rdquo; and Former Ensysce changed
        its name to EBI OpCo, Inc. (the &ldquo;Merger&rdquo;).</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
