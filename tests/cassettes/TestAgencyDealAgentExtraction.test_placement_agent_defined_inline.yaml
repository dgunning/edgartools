        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">To\nthe extent permitted
        by and in accordance with Regulation M under the Exchange Act, in connection
        with an offering an underwriter may\nengage in over-allotments, stabilizing
        transactions, short covering transactions and penalty bids. Over-allotments
        involve sales in excess\nof the offering size, which creates a short position.
        Stabilizing transactions permit bids to purchase the underlying security so
        long\nas the stabilizing bids do not exceed a specified maximum. Short covering
        transactions involve purchases of the securities in the open\nmarket after
        the distribution is completed to cover short positions. Penalty bids permit
        the underwriters to reclaim a selling concession\nfrom a dealer when the securities
        originally sold by the dealer are purchased in a covering transaction to cover
        short positions. Those\nactivities may cause the price of the securities to
        be higher than it would be otherwise. If commenced, the underwriters may discontinue\nany
        of the activities at any time.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
