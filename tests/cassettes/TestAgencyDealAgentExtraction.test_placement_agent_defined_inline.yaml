        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The
        announcement or the\n    market introduction of new products or product enhancements
        by us or our competitors;</FONT></TD></TR>\n  <TR STYLE=\"font: 10pt Times
        New Roman, Times, Serif; vertical-align: top\">\n    <TD STYLE=\"font: 10pt
        Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD></TR>\n
        \ <TR STYLE=\"font: 10pt Times New Roman, Times, Serif; vertical-align: top\">\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&#9679;</FONT></TD>\n
