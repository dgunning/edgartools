        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">To\nthe extent permitted by and in accordance
        with Regulation M under the Exchange Act, any underwriters who are qualified
