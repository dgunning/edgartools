        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\ntrustee is entitled to be indemnified by holders of debt securities
        before proceeding to exercise any trust or power under the indenture\nat the
        request of such holders. (Section 6.6) The holders of at least a majority
