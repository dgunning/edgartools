        Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">78,385 shares reserved\n    for future issuance under
        our 2021 Omnibus Incentive Plan.</FONT></TD></TR>\n  </TABLE>\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"></FONT></P>\n\n<!-- Field: Page; Sequence: 6; Value: 1 -->\n    <DIV
        STYLE=\"margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->4<!--
        Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0pt 0pt 0; text-align: justify\"><FONT STYLE=\"font-family: Times New
        Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt; text-transform:
        uppercase\"><B><A NAME=\"Sk_004\"></A>RISK\nFACTORS</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>An\ninvestment
        in our securities involves a high degree of risk. Before deciding whether
        to invest in our securities, you should consider\ncarefully the following
        risk factors and the risk factors included in our most recent Annual Report
        on Form 10-K filed with the SEC,\nany subsequent Quarterly Reports on Form
        10-Q as well as all other information contained and incorporated by reference
        in this prospectus\nsupplement and the accompanying prospectus, including
        our consolidated financial statements and the related notes. If any of these
        risks\noccurs, our business, financial condition, results of operations or
        cash flow could be materially harmed. This could cause the trading\nprice
        of our common stock to decline, resulting in a loss of all or part of your
        investment. The risks and uncertainties described below\nare not the only
        ones facing us. Additional risks and uncertainties not presently known to
        us, or that we currently see as immaterial,\nmay also harm our business. Please
        also read carefully the section below entitled &ldquo;Cautionary Note Regarding
        Forward-Looking Statements.&rdquo;</I></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>Risks\nRelated to this Offering and Our Common Stock</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>We\nneed
        to raise additional capital after this offering to support our operations.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave incurred substantial losses since our inception. Net losses
        and negative cash flows have had, and will continue to have, an adverse\neffect
        on our stockholders&rsquo; equity and working capital. We expect to continue
        to incur significant losses for the foreseeable future\nas we continue our
        research and development of, and seek regulatory approvals for, our product
        candidates.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\ncurrent cash on hand is sufficient to
        fund operations into the second quarter of 2025. The report of our independent
        registered public\naccounting firm on our financial statements for the years
        ended December 31, 2024 and 2023 contains explanatory language that substantial\ndoubt
        exists about our ability to continue as a going concern. We have reduced expenses
        because we do not have access to sufficient cash\nand liquidity to finance
        our business operations as currently contemplated and may be compelled to
        reduce further general and administrative\nexpenses and delay research and
        development projects until we are able to obtain sufficient financing. We
        may find it difficult to raise\nmoney on terms favorable to us or at all.
        The failure to obtain sufficient capital to support our operations would have
        a material adverse\neffect on our business, financial condition and results
        of operations. If sufficient financing is not received timely, we would then\nneed
        to pursue a plan to license or sell assets, seek to be acquired by another
        entity, cease operations and/or seek bankruptcy protection.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>If\nwe are unable to maintain compliance with the listing standards
        of Nasdaq, our common stock could be delisted and may become subject\nto &ldquo;penny
        stock&rdquo; rules, which could have a material adverse effect on the liquidity
        of our common stock, the ability of investors\nto sell their shares and our
        ability to raise funding.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">On\nNovember 14, 2024, we
        received notice from Nasdaq stating that we had demonstrated compliance with
        the $2.5 million stockholders&rsquo;\nequity requirement set forth in Nasdaq
        Listing Rule 5550(b)(1) as of September 30, 2024. On December 20, 2024, we
        received notice from\nNasdaq that we had regained compliance with the bid
        price requirement set forth in Nasdaq Listing Rule 5550(a)(2). There can be
        no assurance\nthat we will be able to maintain compliance with such Nasdaq
        Listing Rules and our common stock could be delisted.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The\nde-listing
        of our common stock on Nasdaq could have a material adverse effect on us,
        including on our ability to raise capital through\nalternative financing sources
        on terms acceptable to us, or at all, and may result in the potential loss
        of confidence by investors,\nsuppliers, customers and employees and fewer
        business development opportunities. Upon any delisting, our common stock could
        become subject\nto the regulations of the SEC relating to the market for penny
        stocks. Penny stocks are securities with a price of less than $5.00 per\nshare
        unless (i) the securities are traded on a &ldquo;recognized&rdquo; national
        exchange or (ii) the issuer has net tangible assets\nless than $2,000,000
        (if the issuer has been in continuous operation for at least three years)
        or $5,000,000 (if in continuous operation\nfor less than three years), or
        with average annual revenues of less than $6,000,000 for the last three years.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nprocedures applicable to penny stocks requires a broker-dealer
        to (i) obtain from the investor information concerning his financial situation,\ninvestment
        experience and investment objectives; (ii) reasonably determine, based on
        that information, that transactions in penny stocks\nare suitable for the
        investor and that the investor has sufficient knowledge and experience as
        to be reasonably capable of evaluating\nthe risks of penny stock transactions;
        (iii) provide the investor with a written statement setting forth the basis
        on which the broker-dealer\nmade the determination in (ii) above; and (iv)
        receive a signed and dated copy of such statement from the investor, confirming
        that it\naccurately reflects the investor&rsquo;s financial situation, investment
        experience and investment objectives. The regulations applicable\nto penny
        stocks may severely affect the market liquidity for our common stock and could
        limit the ability of stockholders to sell their\ncommon stock in the secondary
        market.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"></P>\n\n<!-- Field: Page; Sequence: 7; Value:
        1 -->\n    <DIV STYLE=\"margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width:
        100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD
        STYLE=\"text-align: center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic;
        Name: PageNo -->5<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV
        STYLE=\"break-before: page; margin-top: 6pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>If\nyou purchase securities sold in
        this offering, you will incur immediate dilution.</I></B></FONT> </P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"> Since the price\nper share of our common stock being offered is higher
        than the net tangible book value per share of our common stock after giving
        effect\nto this offering, you will suffer dilution with respect to the net
        tangible book value of the shares of common stock you purchase in\nthis offering.
        Based on a public offering price of $3.94 per share and our net tangible book
        value as of December 31, 2024, if you purchase\nsecurities in this offering,
        you will suffer immediate dilution of $0.94 per share with respect to the
        net tangible book value of the\ncommon stock. You may experience additional
        dilution upon exercise of the outstanding stock options and other equity awards
        that may\nbe granted under our equity incentive plans, exercise of outstanding
        warrants and when we otherwise issue additional shares of our common\nstock.
        For more information, see &ldquo;Dilution.&rdquo; </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>If\nyou
        purchase our securities in this offering you may experience future dilution
        as a result of future equity offerings or other equity\nissuances.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">To\nraise additional capital, we will need to offer and issue additional
        shares of our common stock or other securities convertible into\nor exchangeable
        for our common stock in the future. We cannot assure you that we will be able
        to sell shares or other securities in any\nother offering at a price per share
        that is equal to or greater than the price per share paid by investors in
        this offering, and investors\npurchasing other securities in the future could
        have rights superior to existing stockholders. The price per share at which
        we sell additional\nshares of our common stock or other securities convertible
        into or exchangeable for our common stock in future transactions may be higher\nor
        lower than the price per share in this offering.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">We\nhave
        a significant number of warrants and stock options outstanding. Further, we
        may choose to raise additional capital due to market\nconditions or strategic
        considerations even if we believe we have sufficient funds for our current
        or future operating plans.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>We\nwill have broad discretion in the
        use of the net proceeds from this offering and may not use them effectively,
        including in connection\nwith pending litigation.</I></B></FONT> </P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT> </P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman, Times, Serif;
        font-size: 10pt\">Our\nmanagement will have broad discretion in the application
        of the net proceeds from this offering, including for any of the purposes
        described\nin the section entitled &ldquo;Use of Proceeds,&rdquo; and you
        will not have the opportunity as part of your investment decision to assess\nwhether
        the net proceeds are being used appropriately. Because of the number and variability
        of factors that will determine our use of\nthe net proceeds from this offering,
        their ultimate use may vary substantially from their currently intended use.
        Our management may\nnot apply the net proceeds from this offering in ways
        that ultimately increase the value of your investment. The failure by our
        management\nto apply these funds effectively could harm our business. Pending
        their use, we may invest the net proceeds from this offering in short-term,\ninvestment-grade,
        interest-bearing securities or as otherwise provided in our investment policies
        in effect from time to time. These\ninvestments may not yield a favorable
        return to our stockholders.</FONT> </P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\"> <FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT> </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"> <FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>We\ndo
        not anticipate paying dividends on our common stock in the foreseeable future.</I></B></FONT>
        </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt
        0pt 0; text-align: justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT> </P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\ncurrently plan to invest all available
        funds, including the proceeds from this offering, and future earnings, if
        any, in the development\nand growth of our business. We currently do not anticipate
        paying any cash dividends on our common stock in the foreseeable future. As\na
        result, a rise in the market price of our common stock, which is uncertain
        and unpredictable, will be your sole source of potential\ngain in the foreseeable
        future and you should not rely on an investment in our common stock for dividend
        income.</FONT> </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>The\nmarket price of our common stock
        and the trading volume of our common stock has been and may continue to be,
        highly volatile, and such\nvolatility could cause the market price of our
        common stock to decrease.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify; text-indent:
        0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0pt 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Between\nJanuary 1, 2025,
        and March 28, 2025, the market price of our common stock fluctuated from a
        low of $2.12 per share to a high of $14.67\nper share, and our stock price
        continues to fluctuate. The market price and trading volume of our common
        stock may continue to fluctuate\nsignificantly in response to numerous factors,
        some of which are beyond our control, such as:</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0pt 0pt 0; text-align: justify;
        text-indent: 0.5in\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 100%\">\n  <TR STYLE=\"font:
        10pt Times New Roman, Times, Serif; vertical-align: top\">\n    <TD STYLE=\"font:
        10pt Times New Roman, Times, Serif; width: .5in; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; width: .5in; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&#9679;</FONT></TD>\n    <TD STYLE=\"font: 10pt Times New Roman, Times,
        Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">our ability to grow our\n    revenue and customer
        base;</FONT></TD></TR>\n  <TR STYLE=\"font: 10pt Times New Roman, Times, Serif;
        vertical-align: top\">\n    <TD STYLE=\"font: 10pt Times New Roman, Times,
        Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD></TR>\n
