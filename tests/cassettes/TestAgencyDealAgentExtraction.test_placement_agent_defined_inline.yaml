        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\"><A NAME=\"d_009\"></A><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">DESCRIPTION\nOF DEBT SECURITIES</FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center; text-indent: 0in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nfollowing description, together with the additional information
        we include in any applicable prospectus supplement or free writing prospectus,\nsummarizes
        certain general terms and provisions of the debt securities that we may offer
        under this prospectus. When we offer to sell\na particular series of debt
        securities, we will describe the specific terms of the series in a supplement
        to this prospectus. We will\nalso indicate in the supplement to what extent
        the general terms and provisions described in this prospectus apply to a particular
        series\nof debt securities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nmay issue debt securities either separately,
        or together with, or upon the conversion or exercise of or in exchange for,
        other securities\ndescribed in this prospectus. Debt securities may be our
        senior, senior subordinated or subordinated obligations and, unless otherwise\nspecified
        in a supplement to this prospectus, the debt securities will be our direct,
        unsecured obligations and may be issued in one\nor more series.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\ndebt securities will be issued under an indenture between us and
        a third party to be identified therein as trustee. We have summarized\nselect
        portions of the indenture below. The summary is not complete. The form of
        the indenture has been filed as an exhibit to the registration\nstatement
        and you should read the indenture for provisions that may be important to
        you. In the summary below, we have included references\nto the section numbers
        of the indenture so that you can easily locate these provisions. Capitalized
        terms used in the summary and not\ndefined herein have the meanings specified
        in the indenture.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nmay offer under this prospectus up to an aggregate principal amount
        of $75,000,000 in debt securities, or if debt securities are issued\nat a
        discount, or in a foreign currency, foreign currency units or composite currency,
        the principal amount as may be sold for an aggregate\ninitial public offering
        price of up to $75,000,000. Unless otherwise specified in the applicable prospectus
        supplement, the debt securities\nwill represent direct, unsecured obligations
        of the Company and will rank equally with all  our other unsecured indebtedness.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: bold
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">General</FONT></P>\n\n<P
        STYLE=\"font: bold 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nterms of each series
        of debt securities will be established by or pursuant to a resolution of our
        board of directors and set forth or\ndetermined in the manner provided in
        a resolution of our board of directors, in an officer&rsquo;s certificate
        or by a supplemental indenture.\n(Section 2.2) We can issue an unlimited amount
        of debt securities under the indenture that may be issued in one or more series.
        Unless\notherwise set forth in a resolution of our board of directors, a supplemental
        indenture or an officer&rsquo;s certificate detailing the\nadopt of a series
        of debt securities, all securities in a series shall be identical. Debt securities
        may differ between series with respect\nto any term, provided, that all series
        of debt securities shall be equally and ratably entitled to the benefits of
        the indenture. (Section\n2.1)</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">The\nfollowing statements relating to the
        debt securities and the indenture are summaries, qualified in their entirety
        by reference to the\ndetailed provisions of the indenture and the final form
        indenture as may be filed with a future prospectus supplement.</FONT></P>\n\n<P
