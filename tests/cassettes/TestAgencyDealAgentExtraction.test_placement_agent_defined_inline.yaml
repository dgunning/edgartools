        10pt Times New Roman, Times, Serif; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">we\n                                            may
        omit to comply with the covenant described under the heading &ldquo;Consolidation,
        Merger\n                                            and Sale of Assets&rdquo;
        and certain other covenants set forth in the indenture, as well\n                                            as
        any additional covenants which may be set forth in the applicable prospectus
