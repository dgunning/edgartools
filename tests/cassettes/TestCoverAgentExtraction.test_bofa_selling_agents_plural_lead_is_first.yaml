        100%; font-size: 12pt\"><FONT STYLE=\"font-size: 7pt; color: white\"><B>Features</B></FONT></TD></TR>\n
        \ </TABLE>\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"font: 7pt Arial,
        Helvetica, Sans-Serif; margin-top: 0pt; margin-bottom: 0pt; width: 100%\"><TR
        STYLE=\"vertical-align: top; text-align: justify\">\n<TD STYLE=\"width: 0in\"></TD><TD
        STYLE=\"width: 0.25in; text-align: left\"><FONT STYLE=\"font-family: Wingdings\">q</FONT></TD><TD
        STYLE=\"text-align: left\"><B>Coupon Payment</B> &#8212; Regardless of the
        performance\nof the Underlyings, we will pay you a Coupon Payment on each
        monthly Coupon Payment Date.</TD>\n</TR></TABLE>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin-top:
        0pt; margin-bottom: 0pt; width: 100%\"><TR STYLE=\"vertical-align: top; text-align:
        justify\">\n<TD STYLE=\"width: 0in\"></TD><TD STYLE=\"width: 0.25in; text-align:
        left\"><FONT STYLE=\"font-family: Wingdings\">q</FONT></TD><TD STYLE=\"text-align:
        left\"><B>Issuer Callable </B>&#8212; Beginning in July 2025, on any\nCall
        Date, the issuer may, in its sole discretion, call the Notes in whole, but
        not in part, and pay you the Stated Principal Amount\nplus the Coupon Payment
        otherwise due on such Call Date. If the Notes are not called, investors may
        have full downside market exposure\nto the Least Performing Underlying at
        maturity.</TD>\n</TR></TABLE>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin-top: 0pt; margin-bottom:
        0pt; width: 100%\"><TR STYLE=\"vertical-align: top; text-align: justify\">\n<TD
        STYLE=\"width: 0in\"></TD><TD STYLE=\"width: 0.25in; text-align: left\"><FONT
        STYLE=\"font-family: Wingdings\">q</FONT></TD><TD STYLE=\"text-align: left\"><B>Downside
        Exposure with Contingent Repayment of Principal\nat Maturity </B>&#8212; If
        the Notes are not called prior to maturity and the Final Value of the Least
        Performing Underlying on the Final\nObservation Date is greater than or equal
        to its Downside Threshold, you will receive the Stated Principal Amount at
        maturity (plus the\nfinal Coupon Payment). However, if the Final Value of
        the Least Performing Underlying on the Final Observation Date is less than
        its\nDownside Threshold, although you will receive the final Coupon Payment,
        you will receive less than the Stated Principal Amount of your\nNotes at maturity,
        resulting in a loss that is proportionate to the decline in the closing level
        of the Least Performing Underlying from\nthe Strike Date to the Final Observation
        Date, up to a 100% loss of your investment.</TD>\n</TR></TABLE>\n\n<P STYLE=\"font:
        7pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>Any payment on the Notes
        is subject to the creditworthiness of BofA Finance\nand the Guarantor.</B></P>\n\n</div>\n<div
