        100%; font-size: 12pt\"><FONT STYLE=\"font-size: 7pt; color: white\"><B>Notes
        Offering</B></FONT></TD></TR>\n  </TABLE>\n<P STYLE=\"font: 7pt Arial, Helvetica,
        Sans-Serif; margin: 0 0 0 8.7pt\">We are offering Trigger Callable Yield Notes
        linked to the Least\nPerforming of the S&amp;P 500<SUP>&reg;</SUP> Index and
        the S&amp;P 500<SUP>&reg;</SUP> Equal Weight Index due October 5, 2026. The
        payment\nat maturity on the Notes will be based on the performance of the
        Least Performing Underlying. The Coupon Rate will be determined on the\nTrade
        Date. The Initial Values and Downside Thresholds were determined on the Strike
        Date. The Notes are our senior unsecured obligations,\nguaranteed by BAC,
        and are offered for a minimum investment of 100 Notes (each Note corresponding
        to $10.00 in Stated Principal Amount)\nat the Public Offering Price described
        below.</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"width: 100%;
