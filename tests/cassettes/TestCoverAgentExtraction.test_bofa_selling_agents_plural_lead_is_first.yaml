        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\"><FONT STYLE=\"background-color:
        white\"><B>Correlation of the Underlyings</B></FONT></P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\"><FONT STYLE=\"background-color:
        white\">The graph below illustrates the daily\nperformance of the SPX and
        the SPW from January 2, 2020 through the Strike Date. For comparison purposes,
        each Underlying has been &#8220;normalized&#8221;\nto have a closing level
        of 100 on January 2, 2020 by dividing the closing level of that Underlying
        on each trading day by the closing\nlevel of that Underlying on January 2,
        2020 and multiplying by 100. We obtained the closing levels used to determine
        the normalized closing\nlevels set forth below from Bloomberg L.P., without
        independent verification.</FONT></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\"><FONT STYLE=\"background-color: white\">The correlation
        of a pair of Underlyings\nrepresents a statistical measurement of the degree
        to which the returns of those Underlyings were similar to each other over
        a given period\nin terms of timing and direction. The correlation between
        a pair of Underlyings is scaled from 1.0 to -1.0, with 1.0 indicating perfect\npositive
        correlation (<I>i.e.</I>, the value of both Underlyings are increasing together
        or decreasing together and the ratio of their\nreturns has been constant),
        0 indicating no correlation (<I>i.e.</I>, there is no statistical relationship
        between the returns of that\npair of Underlyings) and -1.0 indicating perfect
        negative correlation (<I>i.e.</I>, as the value of one Underlying increases,
        the value\nof the other Underlying decreases and the ratio of their returns
        has been constant).</FONT></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><FONT STYLE=\"background-color: white\">The graph below illustrates
        the historical\nperformance of each Underlying relative to each other over
        the time period shown and provides an indication of how close the relative\nperformance
        of each Underlying has historically been to the other Underlying. A closer
        relationship between the daily returns of two or\nmore underlying assets over
        a given period indicates that such underlying assets have been more positively
        correlated. Lower (or more-negative)\ncorrelation among two or more underlying
        assets over a given period may indicate that it is less likely that those
        underlying assets will\nsubsequently move in the same direction. Therefore,
        lower correlation among the Underlyings may indicate a greater potential for
        one of\nthe Underlyings to close below its Downside Threshold on the Final
        Observation Date, because there may be a greater likelihood that at\nleast
        one of the Underlyings will decrease in value significantly. However, even
        if the Underlyings have a higher positive correlation,\none or both of the
        Underlyings may close below the respective Downside Threshold(s) on the Final
        Observation Date, as the Underlyings\nmay both decrease in value. Moreover,
        the actual correlation among the Underlyings may differ, perhaps significantly,
        from their historical\ncorrelation. Although the correlation of the Underlyings&#8217;
        performance may change over the term of the Notes, the economic terms\nof
        the Notes, including the Coupon Rate and Downside Threshold are determined,
        in part, based on the correlation of the Underlyings&#8217;\nperformance calculated
        using our and our affiliates' pricing models at the time when the terms of
        the Notes are finalized. All other things\nbeing equal, a higher Coupon Rate
        and lower Downside Threshold is generally associated with lower correlation
        among the Underlyings, which\nmay indicate a greater potential for a significant
        loss on your investment at maturity. See &#8220;You are exposed to the market
        risk\nof both Underlyings&#8221;, &#8220;Because the Notes are linked to the
        performance of the least performing between the SPX and the SPW,\nyou are
        exposed to greater risk of sustaining a significant loss on your investment
        than if the Notes were linked to just the SPX or just\nthe SPW&#8221; and
        &#8220;Greater expected volatility generally indicates an increased risk of
        loss&#8221; in the Risk Factors section\nherein.</FONT></P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\"><FONT STYLE=\"background-color:
        white\">Past performance and correlation of\nthe Underlyings are not indicative
        of the future performance or correlation of the Underlyings.</FONT></P>\n\n<P
        STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif; margin-top: 0; margin-bottom:
        0; text-align: center\"><FONT STYLE=\"font-size: 11pt\"><IMG SRC=\"image_004.jpg\"
        ALT=\"\" STYLE=\"height: 253px; width: 728px\"></FONT></P>\n\n\n<!-- Field:
        Page; Sequence: 21; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif; text-align:
        right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->21<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif; margin:
        0\">&nbsp;</P>\n\n\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"font:
        12pt Arial, Helvetica, Sans-Serif; width: 100%; border-collapse: collapse\">\n
        \ <TR STYLE=\"vertical-align: top; background-color: #788D41\">\n    <TD STYLE=\"width:
        100%; padding-top: 3pt; padding-bottom: 3pt\">&nbsp;<FONT STYLE=\"font-size:
        9pt; color: white\"><B>Supplement to the Plan\nof Distribution; Role of BofAS
        and Conflicts of Interest</B></FONT></TD></TR>\n  </TABLE>\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 12pt 0 0\">BofAS, an affiliate of
        BofA Finance and the lead selling agent for\nthe sale of the Notes, will receive
        an underwriting discount of $0.10 for any Note sold in this offering. UBS,
        as selling agent for sales\nof the Notes, expects to purchase from BofAS,
        and BofAS expects to sell to UBS, all of the Notes sold in this offering for
        $9.90 per Note.\n<FONT STYLE=\"font-family: Arial, Helvetica, Sans-Serif\">UBS
        proposes to offer the Notes to the public at a price of $10.00 per Note. </FONT>UBS\nwill
        receive an underwriting discount of $0.10 for each Note it sells to the public.
        The underwriting discount will be received by UBS\nand its financial advisors
        collectively. If all of the Notes are not sold at the initial offering price,
        BofAS may change the public offering\nprice and other selling terms.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 12pt 0 0\">BofAS,
        a broker-dealer affiliate of ours, is a member of the Financial\nIndustry
        Regulatory Authority, Inc. (&#8220;FINRA&#8221;) and will participate as lead
        selling agent in the distribution of the Notes.\nAccordingly, the offering
        of the Notes will conform to the requirements of FINRA Rule 5121. BofAS may
        not make sales in this offering\nto any of its discretionary accounts without
        the prior written approval of the account holder.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 12pt 0 0\">We will deliver the Notes
        against payment therefor in New York, New\nYork on a date that is greater
        than one business day following the Trade Date. Under Rule 15c6-1 of the Securities
        Exchange Act of 1934,\ntrades in the secondary market generally are required
        to settle in one business day, unless the parties to any such trade expressly
        agree\notherwise. Accordingly, purchasers who wish to trade the Notes more
        than one business day prior to the Issue Date will be required to\nspecify
        alternative settlement arrangements to prevent a failed settlement.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 12pt 0 0\">BofAS and
        any of our other broker-dealer affiliates may use this pricing\nsupplement,
        and the accompanying product supplement, prospectus supplement and prospectus,
        for offers and sales in secondary market transactions\nand market-making transactions
        in the Notes. However, they are not obligated to engage in such secondary
        market transactions and/or market-making\ntransactions. These broker-dealer
        affiliates may act as principal or agent in these transactions, and any such
        sales will be made at prices\nrelated to prevailing market conditions at the
        time of the sale.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 12pt 0 0\">As agreed by BofAS and UBS, for approximately a three-month
        period\nafter the Trade Date, to the extent BofAS offers to buy the Notes
        in the secondary market, it will do so at a price that will exceed the\nestimated
        value of the Notes at that time. The amount of this excess will decline on
        a straight line basis over that period. Thereafter,\nif BofAS buys or sells
        your Notes, it will do so at prices that reflect the estimated value determined
        by reference to its pricing models\nat that time. Any price at any time after
        the Trade Date will be based on then-prevailing market conditions and other
        considerations,\nincluding the performance of the Underlyings and the remaining
        term of the Notes. However, none of us, the Guarantor, BofAS, UBS or any\nother
        party is obligated to purchase your Notes at any price or at any time, and
        we cannot assure you that any party will purchase your\nNotes at a price that
        equals or exceeds the initial estimated value of the Notes.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 12pt 0 0\">Any price that BofAS
        may pay to repurchase the Notes will depend upon\nthen prevailing market conditions,
        the creditworthiness of us and the Guarantor, and transaction costs. At certain
        times, this price may\nbe higher than or lower than the initial estimated
        value of the Notes.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 12pt 0 4pt\"><B>Sales Outside of the United States&#9;</B></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 1pt 0 12pt\">The Notes
        have not been approved for public sale in any jurisdiction\noutside of the
        United States. There has been no registration or filing as to the Notes with
        any regulatory, securities, banking, or local\nauthority outside of the United
        States and no action has been taken by BofA Finance, BAC, BofAS or any other
        affiliate of BAC, or by UBS\nor any of its affiliates, to offer the Notes
        in any jurisdiction other than the United States. As such, these Notes are
        made available\nto investors outside of the United States only in jurisdictions
        where it is lawful to make such offer or sale and only under circumstances\nthat
        will result in compliance with applicable laws and regulations, including
        private placement requirements.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 1pt 0 12pt\">Further, no offer or sale of the securities
        is permitted with regards\nto the following jurisdictions:</P>\n\n<TABLE CELLPADDING=\"0\"
