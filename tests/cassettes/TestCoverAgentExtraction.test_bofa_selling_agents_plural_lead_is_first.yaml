        It is possible that this trading activity will affect the value of the Notes.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">S&amp;P DOW JONES
        INDICES DO NOT GUARANTEE THE ADEQUACY, ACCURACY, TIMELINESS\nAND/OR THE COMPLETENESS
        OF THE SPX OR ANY DATA RELATED THERETO OR ANY COMMUNICATION, INCLUDING BUT
