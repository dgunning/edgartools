        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 12pt 0 6pt\">You are urged to carefully review the <FONT STYLE=\"background-color:
        white\">selling\nrestrictions </FONT>that may be applicable to your jurisdiction
        beginning on page S-56 of the accompanying prospectus supplement.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\"><B>European
        Economic Area and United Kingdom</B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0; text-align: left\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt
        Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\">None of this pricing
        supplement, the accompanying product\nsupplement, the accompanying prospectus
        or the accompanying prospectus supplement is a prospectus for the purposes
        of the Prospectus Regulation\n(as defined below). This pricing supplement,
        the accompanying product supplement, the accompanying prospectus and the accompanying
        prospectus\nsupplement have been prepared on the basis that any offer of Notes
        in any Member State of the European Economic Area (the &#8220;EEA&#8221;)\nor
        in the United Kingdom (each, a &#8220;Relevant State&#8221;) will only be
        made to a legal entity which is a qualified investor under\nthe Prospectus
        Regulation (&#8220;Qualified Investors&#8221;). Accordingly any person making
        or intending to make an offer in that Relevant\nState of Notes which are the
        subject of the offering contemplated in this pricing supplement, the accompanying
        product supplement, the\naccompanying prospectus and the accompanying prospectus
        supplement may only do so with respect to Qualified Investors. Neither BofA
        Finance\nnor BAC has authorized, nor does it authorize, the making of any
        offer of Notes other than to Qualified Investors. The expression &#8220;Prospectus\nRegulation&#8221;
        means Regulation (EU) 2017/1129.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0; text-align: left\"><B>PROHIBITION OF SALES TO EEA AND
        UNITED KINGDOM RETAIL\nINVESTORS</B> &#8211; The Notes are not intended to
        be offered, sold or otherwise made available to and should not be offered,
        sold or\notherwise made available to any retail investor in the EEA or in
        the United Kingdom. For these purposes: (a) a retail investor means a\nperson
        who is one (or more) of: (i) a retail client as defined in point (11) of Article
        4(1) of Directive 2014/65/EU, as amended (&#8220;MiFID\nII&#8221;); or (ii)
        a customer within the meaning of Directive (EU) 2016/97 (the Insurance Distribution
        Directive), where that customer\nwould not qualify as a professional client
        as defined in point (10) of Article 4(1) of MiFID II; or (iii) not a qualified
        investor as\ndefined in the Prospectus Regulation; and (b) the expression
        &#8220;offer&#8221; includes the communication in any form and by any means\nof
        sufficient information on the terms of the offer and the Notes to be offered
        so as to enable an investor to decide to purchase or subscribe\nfor the Notes.
        Consequently no key information document required by Regulation (EU) No 1286/2014,
        as amended (the &#8220;PRIIPs Regulation&#8221;)\nfor offering or selling
        the Notes or otherwise making them available to retail investors in the EEA
        or in the United Kingdom has been\nprepared and therefore offering or selling
        the Notes or otherwise making them available to any retail investor in the
        EEA or in the United\nKingdom may be unlawful under the PRIIPs Regulation.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\"><B>United
        Kingdom</B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0; text-align: left\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0; text-align: left\">The communication of this pricing
        supplement, the accompanying\nproduct supplement, the accompanying prospectus
        supplement, the accompanying prospectus and any other document or materials
        relating to\nthe issue of the Notes offered hereby is not being made, and
        such documents and/or materials have not been approved, by an authorized\nperson
        for the purposes of section 21 of the United Kingdom&#8217;s Financial Services
        and Markets Act 2000, as amended (the &#8220;FSMA&#8221;).\nAccordingly, such
        documents and/or materials are not being distributed to, and must not be passed
        on to, the general public in the United\nKingdom. The communication of such
        documents and/or materials as a financial promotion is only being made to
        those persons in the United\nKingdom who have professional experience in matters
        relating to investments and who fall within the definition of investment professionals\n(as
        defined in Article 19(5) of the Financial Services and Markets Act 2000 (Financial
        Promotion) Order 2005, as amended (the &#8220;Financial\nPromotion Order&#8221;)),
        or who fall within Article 49(2)(a) to (d) of the Financial Promotion Order,
        or who are any other persons to\nwhom it may otherwise lawfully be made under
        the Financial Promotion Order (all such persons together being referred to
        as &#8220;relevant\npersons&#8221;). In the United Kingdom, the Notes offered
        hereby are only available to, and any investment or investment activity to
        which\nthis pricing supplement, the accompanying product supplement, the accompanying
        prospectus supplement and the accompanying prospectus relates\nwill be engaged
        in only with, relevant persons. Any person in the United Kingdom that is not
        a relevant person should not act or rely\non this pricing supplement, the
        accompanying product supplement, the accompanying prospectus supplement or
        the accompanying prospectus\nor any of their contents.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\">Any
        invitation or inducement to engage in investment activity\n(within the meaning
        of Section 21 of the FSMA) in connection with the issue or sale of the Notes
        may only be communicated or caused to\nbe communicated in circumstances in
        which Section 21(1) of the FSMA does not apply to the issuer or the Guarantor.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: left\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">All applicable
        provisions of the FSMA must be complied with in respect to\nanything done
        by any person in relation to the Notes in, from or otherwise involving the
        United Kingdom.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence: 23; Value: 2 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P STYLE=\"font: normal
        8pt Arial, Helvetica, Sans-Serif; text-align: right; margin: 0pt\">PS-<!--
        Field: Sequence; Type: Arabic; Name: PageNo -->23<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0; background-color: #788D41; color:
        white; border-top: #788D41 3pt solid; border-bottom: #788D41 3pt solid\">&nbsp;<B>Structuring\nthe
        Notes</B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        3pt 0 6pt\">The Notes are our debt securities, the return on which is linked\nto
        the performance of the Underlyings. The related guarantees are BAC&#8217;s
        obligations. Any payments on the Notes, including any Coupon\nPayments, depend
        on the credit risk of BofA Finance and BAC and on the performance of each
        of the Underlyings. The economic terms of the\nNotes reflect our and BAC&#8217;s
        actual or perceived creditworthiness at the time of pricing and are based
        on BAC&#8217;s internal funding\nrate, which is the rate it would pay to borrow
        funds through the issuance of market-linked Notes, and the economic terms
        of certain related\nhedging arrangements it enters into. BAC&#8217;s internal
        funding rate is typically lower than the rate it would pay when it issues
        conventional\nfixed or floating rate debt securities. This difference in funding
        rate, as well as the underwriting discount and the hedging related\ncharges
        described elsewhere in this pricing supplement, will reduce the economic terms
        of the Notes to you and the initial estimated value\nof the Notes. Due to
        these factors, the public offering price you pay to purchase the Notes will
        be greater than the initial estimated\nvalue of the Notes as of the Trade
        Date. On the cover page of this preliminary pricing supplement, we have provided
        the initial estimated\nvalue range for the Notes. The final pricing supplement
        will set forth the initial estimated value of the Notes as of the Trade Date.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\">In order
        to meet our payment obligations on the Notes, at the time\nwe issue the Notes,
        we may choose to enter into certain hedging arrangements (which may include
        call options, put options or other derivatives)\nwith BofAS or one of our
        other affiliates. The terms of these hedging arrangements are determined based
        upon terms provided by BofAS and\nits affiliates, and take into account a
        number of factors, including our and BAC&#8217;s creditworthiness, interest
        rate movements, the\nvolatility of the Underlyings, the tenor of the Notes
        and the hedging arrangements. The economic terms of the Notes and their initial\nestimated
        value depend in part on the terms of these hedging arrangements.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\">BofAS has
        advised us that the hedging arrangements will include hedging\nrelated charges,
        reflecting the costs associated with, and our affiliates&#8217; profit earned
        from, these hedging arrangements. Since\nhedging entails risk and may be influenced
        by unpredictable market forces, actual profits or losses from these hedging
        transactions may\nbe more or less than any expected amounts.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\">For further information,
        see &#8220;Risk Factors&#8221; beginning on\npage PS-7 above and &#8220;Supplemental
        Use of Proceeds&#8221; on page PS-20 of the accompanying product supplement.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\">&nbsp;</P>\n\n\n<!--
        Field: Page; Sequence: 24; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->24<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"font:
        12pt Arial, Helvetica, Sans-Serif; width: 100%; border-collapse: collapse\">\n
        \ <TR STYLE=\"vertical-align: top; background-color: #788D41\">\n    <TD STYLE=\"width:
        100%; padding-top: 3pt; padding-bottom: 3pt\">&nbsp;<FONT STYLE=\"font-size:
        9pt; color: white\"><B>U.S. Federal Income Tax Summary</B></FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0;
        text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">The following summary of the material U.S. federal
        income and estate tax\nconsiderations of the acquisition, ownership, and disposition
        of the Notes supplements, and to the extent inconsistent supersedes, the\ndiscussion
        under &#8220;U.S. Federal Income Tax Considerations&#8221; in the accompanying
        prospectus and is not exhaustive of all possible\ntax considerations. This
        summary is based upon the Internal Revenue Code of 1986, as amended (the &#8220;Code&#8221;),
        regulations promulgated\nunder the Code by the U.S. Treasury Department (&#8220;Treasury&#8221;)
        (including proposed and temporary regulations), rulings, current\nadministrative
        interpretations and official pronouncements of the IRS, and judicial decisions,
        all as currently in effect and all of which\nare subject to differing interpretations
        or to change, possibly with retroactive effect. No assurance can be given
        that the IRS would\nnot assert, or that a court would not sustain, a position
        contrary to any of the tax consequences described below. This summary does
        not\ninclude any description of the tax laws of any state or local governments,
        or of any foreign government, that may be applicable to a particular\nholder.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">Although the Notes
        are issued by us, they will be treated as if they were\nissued by BAC for
        U.S. federal income tax purposes. Accordingly throughout this tax discussion,
        references to &#8220;we,&#8221; &#8220;our&#8221;\nor &#8220;us&#8221; are
        generally to BAC unless the context requires otherwise.&#9;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">This summary is directed solely
        to U.S. Holders and Non-U.S. Holders that,\nexcept as otherwise specifically
        noted, will purchase the Notes upon original issuance and will hold the Notes
        as capital assets within\nthe meaning of Section 1221 of the Code, which generally
        means property held for investment, and that are not excluded from the discussion\nunder
        &#8220;U.S. Federal Income Tax Considerations&#8221; in the accompanying prospectus.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\"><I>You should
        consult your own tax advisor concerning the U.S. federal income\ntax consequences
        to you of acquiring, owning, and disposing of the Notes, as well as any tax
        consequences arising under the laws of any\nstate, local, foreign, or other
        tax jurisdiction and the possible effects of changes in U.S. federal or other
        tax laws.</I></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\"><B>General</B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">There is no statutory, judicial, or administrative authority directly
        addressing\nthe characterization of the Notes or instruments substantially
        similar to the Notes. We intend to treat the Notes for all tax purposes\nas
        a unit (a &#8220;Unit&#8221;) consisting of the following:</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\">(i)</TD><TD>a put option
        (the &#8220;Put Option&#8221;) written by you to us that, if exercised, requires
        you to pay us an amount equal to the\nDeposit (as defined below) in exchange
        for a cash amount based upon the performance of the Underlyings; and</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 0 1in\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\">(ii)</TD><TD>a
        deposit with us of a fixed amount of cash, equal to the issue price of the
        Note, to secure your obligation under the Put Option\n(the &#8220;Deposit&#8221;)
        that pays you interest based on our cost of borrowing at the time of issuance
        (the &#8220;Deposit Interest&#8221;).</TD></TR></TABLE>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">Based on the treatment of each
        Note as a Unit consisting of the Put Option\nand the Deposit, it would be
        reasonable to allocate each Coupon Payment between the Deposit and the Put
        Option and treat % of each Coupon\nPayment as Deposit Interest and % of each
        Coupon Payment as Put Option premium. Under this approach, it would be reasonable
        to allocate\n100% of the issue price of a Note to the Deposit and none to
        the Put Option.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">No statutory, judicial or administrative authority directly addresses
        the\nproper treatment of the Notes or instruments substantially similar to
        the Notes for U.S. federal income tax purposes, and no ruling is\nbeing requested
        from the IRS with respect to the Notes. Significant aspects of the U.S. federal
        income tax consequences of an investment\nin the Notes are uncertain, and
        no assurance can be given that the IRS or a court will agree with the tax
        treatment described herein.\nIn the opinion of our counsel, Sidley Austin
        LLP, the treatment of the Notes described above is reasonable under current
        law; however,\nour counsel has advised us that it is unable to conclude affirmatively
        that this treatment is more likely than not to be upheld, and that\nalternative
        treatments are possible. Accordingly, you should consult your tax advisor
        regarding the U.S. federal income tax consequences\nof an investment in the
        Notes (including alternative treatments of the Notes). Unless otherwise expressly
        stated, the remainder of this\ndiscussion is based upon, and assumes, the
        treatment of each Note as a Unit consisting of the Put Option and the Deposit,
        as well as the\nallocation of the Coupon Payments and issue price of the Note
        described above.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">Unless otherwise stated, the following discussion is based on
        the characterization\ndescribed above. The discussion in this section assumes
        that there is a significant possibility of a significant loss of principal
        on\nan investment in the Notes.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">We will not attempt to ascertain whether the issuer
        of any component stocks\nincluded in the Underlyings would be treated as a
        &#8220;passive foreign investment company&#8221; (&#8220;PFIC&#8221;), within
        the meaning\nof Section 1297 of the Code, or a United States real property
        holding corporation, within the meaning of Section 897(c) of the Code. If\nthe
        issuer of one or more stocks included in the Underlyings were so treated,
        certain adverse U.S. federal income tax consequences could\npossibly apply
        to a holder of the Notes. You should refer to information filed with the SEC
        by the issuers of the component stocks included\nin the Underlyings and consult
        your tax advisor regarding the possible consequences to you, if any, if any
        issuer of a component stock\nincluded in the Underlyings is or becomes a PFIC
        or is or becomes a United States real property holding corporation.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>&nbsp;</B></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>U.S. Holders</B></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n\n<!--
        Field: Page; Sequence: 25; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->25<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">The Deposit Interest payments will be included in the income of
        a U.S. Holder\nas interest at the time that such interest is accrued or received
        in accordance with such U.S. Holder&#8217;s regular method of tax accounting.\nThe
        Put Option premium will not be included in the income of a U.S. Holder until
        the sale, exchange, redemption or maturity of the Notes.\nAccordingly, all
        of the Put Option premium payments on the Notes (except for the last Put Option
        premium payment) generally will not be\nincluded in the income of a U.S. Holder
        when they are received.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">If at maturity the U.S. Holder receives cash equal to the full
        principal\namount plus the last Deposit Interest payment and the last Put
        Option premium payment, then such U.S. Holder (i) would include the last\nDeposit
        Interest payment in income as interest in the manner described above and (ii)
        would recognize short-term capital gain equal to\nthe entire amount of Put
        Option premium, which amount is equal to the sum of all of the Put Option
        premium payments received.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">If at maturity the U.S. Holder receives an amount of cash that
        is less than\nthe full principal amount and receives the last Deposit Interest
        payment and the last Put Option premium payment, then such U.S. Holder\n(i)
        will include the last Deposit Interest payment in income as interest in the
        manner described above and (ii) will recognize long-term\ncapital gain or
        loss with respect to the remaining cash received at maturity (other than the
        last Put Option premium payment) in an amount\nequal to the difference between
        (1) the sum of all of the Put Option premiums received (including the last
        Put Option premium payment)\nand (2) the excess of the principal amount of
        the Note over the amount of such cash received.</P>\n\n<P STYLE=\"font: 9pt
        Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt
        Arial, Helvetica, Sans-Serif; margin: 0\">Upon a redemption of the Notes prior
        to maturity, a U.S. Holder (i) would\ninclude the last Deposit Interest payment
        in income as interest in the manner described above and (ii) would recognize
        short-term capital\ngain equal to the sum of all the Put Option premium payments
        received.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\">Upon a sale or exchange of a Note prior to maturity (except upon redemption\nof
        the Notes prior to maturity, which is described above), a U.S. Holder will
        generally recognize short-term or long-term capital gain\nor loss with respect
        to the Deposit (depending upon the U.S. Holder&#8217;s holding period for
        the Notes). The U.S. Holder will also generally\nrecognize short-term capital
        gain or loss with respect to the Put Option. For purposes of determining the
        amount of such gain or loss,\na U.S. Holder should apportion the amount realized
        on the sale or exchange (other than amounts attributable to accrued but unpaid
        Deposit\nInterest payments, which would be taxed as described above) between
        the Deposit and the Put Option based upon their respective fair market\nvalues
        on the date of such sale or exchange. In general, the amount of capital gain
        or loss on the Deposit will equal the amount realized\nthat is attributable
        to the Deposit, less the U.S. Holder&#8217;s adjusted tax basis in the Deposit.
        The amount realized that is attributable\nto the Put Option plus the total
        Put Option premiums previously received by the U.S. Holder should be treated
        as short-term capital gain.\nNotwithstanding the foregoing, if the fair market
        value of the Deposit on the date of such sale or exchange exceeds the total
        amount realized\non the sale or exchange (other than amounts attributable
        to accrued but unpaid Deposit Interest payments), the U.S. Holder should be
        treated\nas having (i) sold or exchanged the Deposit for an amount equal to
        its fair market value on such date and (ii) made a payment (the &#8220;Put\nOption
        Assumption Payment&#8221;) equal to the amount of such excess in exchange
        for the purchaser&#8217;s assumption of the U.S. Holder&#8217;s\nrights and
        obligations under the Put Option. In such event, the U.S. Holder should recognize
        short-term capital gain or loss in respect\nof the Put Option in an amount
        equal to the difference between the total Put Option premiums previously received
        by the U.S. Holder and\nthe Put Option Assumption Payment.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\"><I>Alternative Tax Treatments.</I>
        Due to the absence of authorities that\ndirectly address the proper tax treatment
        of the Notes, prospective investors are urged to consult their tax advisors
        regarding all possible\nalternative tax treatments of an investment in the
        Notes. In particular, the IRS could seek to subject the Notes to the Treasury
        regulations\ngoverning contingent payment debt instruments. If the IRS were
        successful in that regard, the timing and character of income on the Notes\nwould
        be affected significantly. Among other things, a U.S. Holder would be required
        to accrue original issue discount every year at a\n&#8220;comparable yield&#8221;
        determined at the time of issuance. In addition, any gain realized by a U.S.
        Holder at maturity or upon\na sale, exchange, or redemption of the Notes generally
        would be treated as ordinary income, and any loss realized at maturity or
        upon\na sale, exchange, or redemption of the Notes generally would be treated
        as ordinary loss to the extent of the U.S. Holder&#8217;s prior\naccruals
        of original issue discount, and as capital loss thereafter. Alternatively,
        under an alternative characterization of the Notes\nas income-bearing single
        financial contracts, the entire Coupon Payments could be required to be included
        in income as ordinary income\nby a U.S. holder at the time received or accrued.
        Other alternative characterizations are possible and prospective investors
        should consult\nwith their tax advisors regarding all aspects of the U.S.
        federal income tax consequences of an investment in the Notes.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">The IRS released Notice 2008-2
        (the &#8220;Notice&#8221;), which sought comments\nfrom the public on the
        taxation of financial instruments currently taxed as &#8220;prepaid forward
        contracts.&#8221; This Notice addresses\ninstruments such as the Notes. According
        to the Notice, the IRS and Treasury are considering whether a holder of an
        instrument such as\nthe Notes should be required to accrue ordinary income
        on a current basis, regardless of whether any payments are made prior to maturity.\nIt
        is not possible to determine what guidance the IRS and Treasury will ultimately
        issue, if any. Any such future guidance may affect\nthe amount, timing and
        character of income, gain, or loss in respect of the Notes, possibly with
        retroactive effect.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">The IRS and Treasury are also considering additional issues, including
        whether\nadditional gain or loss from such instruments should be treated as
        ordinary or capital, whether foreign holders of such instruments should\nbe
        subject to withholding tax on any deemed income accruals, whether Section
        1260 of the Code, concerning certain &#8220;constructive\nownership transactions,&#8221;
        generally applies or should generally apply to such instruments, and whether
        any of these determinations\ndepend on the nature of the underlying asset.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt\">In addition,
        proposed Treasury regulations require the accrual of income\non a current
        basis for contingent payments made under certain notional principal contracts.
        The preamble to the regulations states that\nthe &#8220;wait and see&#8221;
        method of accounting does not properly reflect the economic accrual of income
        on those contracts, and requires\ncurrent accrual of income for some contracts
        already in existence. While the proposed regulations do not apply to prepaid
        forward contracts,\nthe preamble to the proposed regulations expresses the
        view that similar timing issues exist in the case of prepaid forward contracts.\nIf
        the IRS or Treasury publishes future guidance requiring current economic</P>\n\n\n<!--
        Field: Page; Sequence: 26; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->26<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0 0 6pt\">accrual for contingent payments on prepaid forward contracts,
        it is\npossible that you could be required to accrue income over the term
        of the Notes.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\">Because of the absence of authority regarding the appropriate tax characterization\nof
        the Notes, it is also possible that the IRS could seek to characterize the
        Notes in a manner that results in tax consequences that\nare different from
        those described above. For example, the IRS could possibly assert that any
        gain or loss that a holder may recognize\nat maturity or upon the sale, exchange,
        or redemption of the Notes should be treated as ordinary gain or loss.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">Because each Underlying
        is an index that periodically rebalances, it is possible\nthat the Notes could
        be treated as a series of income-bearing single financial contracts, each
        of which matures on the next rebalancing\ndate. If the Notes were properly
        characterized in such a manner, a U.S. Holder would be treated as disposing
        of the Notes on each rebalancing\ndate in return for new Notes that mature
        on the next rebalancing date, and a U.S. Holder would accordingly likely recognize
        capital gain\nor loss on each rebalancing date equal to the difference between
        the holder&#8217;s tax basis in the Notes (which would be adjusted to\ntake
        into account any prior recognition of gain or loss) and the fair market value
        of the Notes on such date.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><B>Non-U.S. Holders</B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">Assuming the treatment of the Notes as set forth above
        is respected and subject\nto the discussions below regarding the potential
        application of Section 871(m) of the Code and the discussions in the accompanying
        prospectus\nregarding FATCA, Coupon Payments with respect to a Note, and gain
        realized on the sale, exchange or redemption of such Note, should not\nbe
        subject to U.S. federal income or withholding tax under current law, provided
        that:</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.25in\"></TD><TD STYLE=\"width: 0.25in\"><FONT
        STYLE=\"font-family: Symbol\">&middot;</FONT></TD><TD>the Non-U.S. Holder
        does not own, directly or by attribution, ten percent or more of the total
        combined voting power of all classes\nof our stock entitled to vote&#894;</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.25in\"></TD><TD STYLE=\"width: 0.25in\"><FONT
        STYLE=\"font-family: Symbol\">&middot;</FONT></TD><TD>the Non-U.S. Holder
        is not a controlled foreign corporation related, directly or indirectly, to
        us through stock ownership&#894;</TD></TR></TABLE>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.25in\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&middot;</FONT></TD><TD>the Non-U.S. Holder is not a bank receiving
        interest under Section 881(c)(3)(A) of the Code&#894;</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.25in\"></TD><TD STYLE=\"width: 0.25in\"><FONT
        STYLE=\"font-family: Symbol\">&middot;</FONT></TD><TD>the certification requirement
        described below has been fulfilled with respect to the beneficial owner; and</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 0\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.25in\"></TD><TD STYLE=\"width: 0.25in\"><FONT
        STYLE=\"font-family: Symbol\">&middot;</FONT></TD><TD>the payment is not effectively
        connected with the conduct by the Non-U.S. Holder of U.S. trade or business.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\"><I>Certification
        Requirement</I>. The certification requirement referred\nto in the preceding
        paragraph will be fulfilled if the beneficial owner of a Note (or a financial
        institution holding a Note on behalf\nof the beneficial owner) furnishes to
        the applicable withholding agent an IRS Form W-8BEN (or other appropriate
        form), on which the beneficial\nowner certifies under penalties of perjury
        that it is not a U.S. person.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\"><I>Alternative Tax Treatments</I>. As described above
        under &#8220;&#8212;\nU.S. Holders &#8212; Alternative Tax Treatments,&#8221;
        the IRS may seek to apply a different characterization and tax treatment from\nthe
        treatment described herein. While the U.S. federal income and withholding
        tax consequences to a Non-U.S. Holder of ownership and disposition\nof a Note
        under current law should generally be the same as those described immediately
        above, it is possible that a Non-U.S. Holder could\nbe subject to withholding
        tax under certain recharacterizations of the Notes.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">Moreover, among the issues addressed
        in the Notice described in &#8220;&#8212;\nU.S. Holders &#8212; Alternative
        Tax Treatments&#8221; is the degree, if any, to which income realized by Non-U.S.
        Holders should be subject\nto withholding tax. It is possible that any Treasury
        regulations or other guidance issued after consideration of this issue could
        materially\nand adversely affect the withholding tax consequences of ownership
        and disposition of the Notes, possibly with retroactive effect. Accordingly,\nprospective
        investors should consult their tax advisors regarding all aspects of the U.S.
        federal income tax consequences of an investment\nin the Notes, including
        the possible implications of the Notice discussed above. Prospective investors
        should note that we currently do\nnot intend to withhold on any of the payments
        made with respect to the Notes to Non-U.S. Holders (subject to compliance
        by such holders\nwith the certification requirement described above and to
        the discussion regarding FATCA in the accompanying prospectus). However, in\nthe
        event of a change of law or any formal or informal guidance by the IRS, the
        Treasury or Congress, we (or the applicable paying agent)\nmay decide to withhold
        on payments made with respect to the Notes to Non-U.S. Holders and we will
        not be required to pay any additional\namounts with respect to amounts withheld.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">Notwithstanding
        the foregoing, gain from the sale, exchange, or redemption\nof the Notes or
        their settlement at maturity may be subject to U.S. federal income tax if
        that Non-U.S. Holder is a non-resident alien\nindividual and is present in
        the U.S. for 183 days or more during the taxable year of the sale, exchange,
        redemption, or settlement and\ncertain other conditions are satisfied.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">If a Non-U.S.
        Holder of the Notes is engaged in the conduct of a trade or\nbusiness within
        the U.S. and if any Coupon Payment and gain realized on the settlement at
        maturity, or upon sale, exchange or redemption\nof the Notes, is effectively
        connected with the conduct of such trade or business (and, if certain tax
        treaties apply, is attributable\nto a permanent establishment maintained by
        the Non-U.S. Holder in the U.S.), the Non-U.S. Holder, although exempt from
        U.S. federal withholding\ntax, generally will be subject to U.S. federal income
        tax on such Coupon Payment and gain on a net income basis in the same manner
        as\nif it were a U.S. Holder. Such Non-U.S. Holders should read the material
        under the heading &#8220;&#8212;U.S. Holders,&#8221; for a description\nof
        the U.S. federal income tax consequences of acquiring, owning, and disposing
        of the Notes. In addition, if such Non-U.S. Holder is\na foreign corporation,
        it may also be subject to a branch profits tax equal to 30% (or such lower
        rate provided by any applicable tax\ntreaty) of a portion of its earnings
        and profits for the taxable year that are effectively connected with its conduct
        of a trade or business\nin the U.S., subject to certain adjustments.</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">A &#8220;dividend
        equivalent&#8221; payment is treated as a dividend from\nsources within the
        United States and such payments generally would be subject to a 30% U.S. withholding
        tax if paid to a Non-U.S. Holder.\nUnder Treasury regulations, payments (including
        deemed payments) with respect</P>\n\n\n<!-- Field: Page; Sequence: 27; Value:
        2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P STYLE=\"font:
        normal 8pt Arial, Helvetica, Sans-Serif; text-align: right; margin: 0pt\">PS-<!--
        Field: Sequence; Type: Arabic; Name: PageNo -->27<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">to equity-linked instruments
        (&#8220;ELIs&#8221;) that are &#8220;specified\nELIs&#8221; may be treated
        as dividend equivalents if such specified ELIs reference an <B>interest in
        an &#8220;underlying security,&#8221;\nwhich is generally any interest in
        an entity taxable as a corporation for U.S.</B> federal income tax purposes
        if a payment with respect\nto such interest could give rise to a U.S. source
        dividend. However, IRS guidance provides that withholding on dividend equivalent
        payments\nwill not apply to specified ELIs that are not delta-one instruments
        and that are issued before January 1, 2027. Based on our determination\nthat
        the Notes are not delta-one instruments, Non-U.S. Holders should not be subject
        to withholding on dividend equivalent payments,\nif any, under the Notes.
        However, it is possible that the Notes could be treated as deemed reissued
        for U.S. federal income tax purposes\nupon the occurrence of certain events
        affecting the Underlyings or the Notes, and following such occurrence the
        Notes could be treated\nas subject to withholding on dividend equivalent payments.
        Non-U.S. Holders that enter, or have entered, into other transactions in respect\nof
        the Underlyings or the Notes should consult their tax advisors as to the application
        of the dividend equivalent withholding tax in\nthe context of the Notes and
        their other transactions. If any payments are treated as dividend equivalents
        subject to withholding, we\n(or the applicable paying agent) would be entitled
        to withhold taxes without being required to pay any additional amounts with
        respect\nto amounts so withheld.</P>\n\n<P STYLE=\"font: 12pt Arial, Helvetica,
        Sans-Serif; margin: 0; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">As discussed above, alternative
        characterizations of the Notes for U.S. federal\nincome tax purposes are possible.
        Should an alternative characterization, by reason of change or clarification
        of the law, by regulation\nor otherwise, cause payments as to the Notes to
        become subject to withholding tax in addition to the withholding tax described
        above,\ntax will be withheld at the applicable statutory rate. Prospective
        Non-U.S. Holders should consult their own tax advisors regarding the\ntax
        consequences of such alternative characterizations.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\"><I>U.S. Federal Estate Tax.</I>
        Under current law, while the matter is not\nentirely clear, individual Non-U.S.
        Holders, and entities whose property is potentially includible in those individuals&#8217;
        gross estates\nfor U.S. federal estate tax purposes (for example, a trust
        funded by such an individual and with respect to which the individual has
        retained\ncertain interests or powers), should note that, absent an applicable
        treaty benefit, a Note is likely to be treated as U.S. situs property,\nsubject
        to U.S. federal estate tax. These individuals and entities should consult
        their own tax advisors regarding the U.S. federal estate\ntax consequences
        of investing in a Note.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><B>Backup Withholding and Information Reporting</B></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">Please see the
        discussion under &#8220;U.S. Federal Income Tax Considerations\n&#8212; General
        &#8212; Backup Withholding and Information Reporting&#8221; in the accompanying
        prospectus for a description of the applicability\nof the backup withholding
        and information reporting rules to payments made on the Notes.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0; text-indent: 0.5in\">&nbsp;</P>\n\n<!--
        Field: Page; Sequence: 28; Options: Last -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->28<!-- Field: /Sequence --></P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0\"></P>\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n</BODY>\n</HTML>\n</TEXT>\n</DOCUMENT>\n<DOCUMENT>\n<TYPE>GRAPHIC\n<SEQUENCE>2\n<FILENAME>image_001.jpg\n<DESCRIPTION>GRAPHIC\n<TEXT>\nbegin
