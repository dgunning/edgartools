        STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin: 2pt 0 0\"><B>NOTICE
        TO INVESTORS: <FONT STYLE=\"text-transform: uppercase\">The\nNotes are significantly
        riskier than conventional debt INSTRUMENTS. BofA Finance IS NOT NECESSARILY
        OBLIGATED TO REPAY THE STATED PRINCIPAL\nAMOUNT AT MATURITY, AND the Notes
        CAN have downside MARKET risk SIMILAR TO the LEAST PERFORMING UNDERLYING.
        This MARKET risk is in addition\nto the CREDIT risk INHERENT IN PURCHASING
        A DEBT OBLIGATION OF BOFA FINANCE THAT IS GUARANTEED BY BAC.&nbsp; You should
        not PURCHASE the\nNotes if you do not understand or are not comfortable with
        the significant risks INVOLVED in INVESTING IN the Notes.</FONT></B></P>\n\n<P
        STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>YOU SHOULD
        CAREFULLY CONSIDER THE RISKS DESCRIBED UNDER &#8220;RISK FACTORS&#8217;&#8217;\nBEGINNING
        ON PAGE PS-7 OF THIS PRICING SUPPLEMENT, PAGE PS-5 OF THE ACCOMPANYING PRODUCT
        SUPPLEMENT, PAGE S-6 OF THE ACCOMPANYING PROSPECTUS\nSUPPLEMENT AND PAGE 7
        OF THE ACCOMPANYING PROSPECTUS BEFORE PURCHASING ANY NOTES. EVENTS RELATING
        TO ANY OF THOSE RISKS, OR OTHER RISKS\nAND UNCERTAINTIES, COULD ADVERSELY
        AFFECT THE MARKET VALUE OF, AND THE RETURN ON, YOUR NOTES. YOU MAY LOSE SOME
        OR ALL OF YOUR INITIAL\nINVESTMENT IN THE NOTES. THE NOTES WILL NOT BE LISTED
        ON ANY SECURITIES EXCHANGE AND MAY HAVE LIMITED OR NO LIQUIDITY.</B></P>\n\n<TABLE
        CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"width: 100%; border-collapse:
        collapse; font-family: Arial, Helvetica, Sans-Serif\">\n  <TR STYLE=\"vertical-align:
