        DAMAGES OR LIABILITY\nFOR ANY ERRORS, OMISSIONS, OR DELAYS THEREIN. S&amp;P
        DOW JONES INDICES MAKE NO EXPRESS OR IMPLIED WARRANTIES, AND EXPRESSLY DISCLAIM\nALL
        WARRANTIES, OF MERCHANTABILITY OR FITNESS FOR A PARTICULAR PURPOSE OR USE
        OR AS TO RESULTS TO BE OBTAINED BY US, BAC, MERRILL LYNCH,\nPIERCE, FENNER
        &amp; SMITH INCORPORATED, HOLDERS OF THE NOTES, OR ANY OTHER PERSON OR ENTITY
        FROM THE USE OF THE SPX OR WITH RESPECT TO\nANY DATA RELATED THERETO. WITHOUT
        LIMITING ANY OF THE FOREGOING, IN NO EVENT WHATSOEVER SHALL S&amp;P DOW JONES
        INDICES BE LIABLE FOR\nANY INDIRECT, SPECIAL, INCIDENTAL, PUNITIVE, OR CONSEQUENTIAL
        DAMAGES INCLUDING BUT NOT LIMITED TO, LOSS OF PROFITS, TRADING LOSSES, LOST\nTIME
        OR GOODWILL, EVEN IF THEY HAVE BEEN ADVISED OF THE POSSIBILITY OF SUCH DAMAGES,
        WHETHER IN CONTRACT, TORT, STRICT LIABILITY, OR OTHERWISE.\nTHERE ARE NO THIRD
        PARTY BENEFICIARIES OF ANY AGREEMENTS OR ARRANGEMENTS BETWEEN S&amp;P DOW
        JONES INDICES AND MERRILL LYNCH, PIERCE,\nFENNER &amp; SMITH INCORPORATED,
        OTHER THAN THE LICENSORS OF S&amp;P DOW JONES INDICES.</P>\n\n\n<!-- Field:
        Page; Sequence: 16; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif; text-align:
        right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->16<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0\"><B>The S&amp;P 500<SUP>&reg;</SUP> Equal Weight Index</B></P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">The SPW is the equal weight
        version of the S&amp;P 500<SUP>&reg;</SUP>\nIndex (&quot;SPX&quot;).</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">The composition
        of the SPW is the same as the SPX. Constituent changes\nare incorporated in
        the SPW as and when they are made in the SPX. When a company is added to the
        SPW in the middle of the quarter, it\ntakes the weight of the company that
        it replaced. The one exception is when a company is removed from the SPW at
        a price of $0.00. In\nthat case, the company&#8217;s replacement is added
        to the SPW at the weight using the previous day&#8217;s closing value, or
        the most\nimmediate prior business day that the deleted company was not valued
        at $0.00.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        8pt 0\">The SPW is calculated and maintained in the same manner as the SPX,
        except\nthat the constituents of the SPW are equally weighted rather than
        weighted by float-adjusted market capitalization. To calculate an equal-weighted\nindex,
        the market capitalization for each stock used in the calculation of the index
        is redefined so that each index constituent has an\nequal weight in the index
        at each rebalancing date. In addition to being the product of the stock price,
        the stock&#8217;s shares outstanding,\nand the stock&#8217;s investible weight
        factor (&#8220;IWF&#8221;), an additional weight factor (&#8220;AWF&#8221;)
        is also introduced\nin the market capitalization calculation to establish
        equal weighting. The AWF of a stock is the adjustment factor of that stock
        assigned\nat each index rebalancing date that makes all index constituents&#8217;
        modified market capitalization equal (and, therefore, equal weight),\nwhile
        maintaining the total market value of the overall index.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 10pt 0 0\"><B><I>The S&amp;P 500<SUP>&reg;</SUP>
        Index</I></B></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        8pt 0\">The SPX includes a representative sample of 500 companies in leading\nindustries
        of the U.S. economy. The SPX is intended to provide an indication of the pattern
        of common stock price movement. The calculation\nof the level of the SPX is
        based on the relative value of the aggregate market value of the common stocks
        of 500 companies as of a particular\ntime compared to the aggregate average
        market value of the common stocks of 500 similar companies during the base
        period of the years\n1941 through 1943.</P>\n\n<P STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin: 8pt 0\">The SPX includes companies from eleven
        main groups: Communication Services;\nConsumer Discretionary; Consumer Staples;
        Energy; Financials; Health Care; Industrials; Information Technology; Real
        Estate; Materials;\nand Utilities. SPDJI may from time to time, in its sole
        discretion, add companies to, or delete companies from, the SPX to achieve
        the\nobjectives stated above.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 8pt 0\">SPDJI calculates the SPX by reference to the prices
        of the constituent\nstocks of the SPX without taking account of the value
        of dividends paid on those stocks. As a result, the return on the Notes will
        not\nreflect the return you would realize if you actually owned the SPX constituent
        stocks and received the dividends paid on those stocks.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\"><I>Computation of the SPX</I></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">While SPDJI
        currently employs the following methodology to calculate\nthe SPX, no assurance
        can be given that SPDJI will not modify or change this methodology in a manner
        that may affect payments on the Notes.</P>\n\n<P STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin: 8pt 0\">Historically, the market value of any
        component stock of the SPX was\ncalculated as the product of the market price
        per share and the number of then outstanding shares of such component stock.
        In March 2005,\nSPDJI began shifting the SPX halfway from a market capitalization
        weighted formula to a float-adjusted formula, before moving the SPX\nto full
        float adjustment on September 16, 2005. SPDJI&#8217;s criteria for selecting
        stocks for the SPX did not change with the shift\nto float adjustment. However,
        the adjustment affects each company&#8217;s weight in the SPX.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">Under float adjustment,
        the share counts used in calculating the SPX\nreflect only those shares that
        are available to investors, not all of a company&#8217;s outstanding shares.
        Float adjustment excludes\nshares that are closely held by control groups,
        other publicly traded companies or government agencies.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">In September 2012, all shareholdings
        representing more than 5% of a stock&#8217;s\noutstanding shares, other than
        holdings by &#8220;block owners,&#8221; were removed from the float for purposes
        of calculating the SPX.\nGenerally, these &#8220;control holders&#8221; will
        include officers and directors, private equity, venture capital and special
        equity\nfirms, other publicly traded companies that hold shares for control,
        strategic partners, holders of restricted shares, ESOPs, employee\nand family
        trusts, foundations associated with the company, holders of unlisted share
        classes of stock, government entities at all levels\n(other than government
        retirement/pension funds) and any individual person who controls a 5% or greater
        stake in a company as reported\nin regulatory filings. However, holdings by
        block owners, such as depositary banks, pension funds, mutual funds and ETF
        providers, 401(k)\nplans of the company, government retirement/pension funds,
        investment funds of insurance companies, asset managers and investment funds,\nindependent
        foundations and savings and investment plans, will ordinarily be considered
        part of the float.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 8pt 0\">Treasury stock, stock options, restricted shares, equity participation\nunits,
        warrants, preferred stock, convertible stock, and rights are not part of the
        float. Shares held in a trust to allow investors in\ncountries outside the
        country of domicile, such as depositary shares and Canadian exchangeable shares,
        are normally part of the float\nunless those shares form a control block.
        If a company has multiple classes of stock outstanding, shares in an unlisted
        or non-traded\nclass are treated as a control block.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">For each stock, an investable
        weight factor (&#8220;IWF&#8221;) is calculated\nby dividing the available
        float shares by the total shares outstanding. Available float shares are defined
        as the total shares outstanding\nless shares held by control holders. This
        calculation is subject to a 5% minimum threshold for control blocks. For example,
        if a company&#8217;s\nofficers and directors hold 3% of the company&#8217;s
        shares, and no other control group holds 5% of the company&#8217;s shares,
        SPDJI\nwould assign that company an IWF of 1.00, as no control group meets
        the 5% threshold. However, if a company&#8217;s officers and directors\nhold
        3% of the company&#8217;s shares and another control group holds 20% of the
        company&#8217;s shares, SPDJI would</P>\n\n\n<!-- Field: Page; Sequence: 17;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P STYLE=\"font:
        normal 8pt Arial, Helvetica, Sans-Serif; text-align: right; margin: 0pt\">PS-<!--
        Field: Sequence; Type: Arabic; Name: PageNo -->17<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">assign an IWF of 0.77, reflecting
        the fact that 23% of\nthe company&#8217;s outstanding shares are considered
        to be held for control. As of July 31, 2017, companies with multiple share
        class\nlines are no longer eligible for inclusion in the SPX. Constituents
        of the SPX prior to July 31, 2017 with multiple share class lines\nwill be
        grandfathered in and continue to be included in the SPX. If a constituent
        company of the SPX reorganizes into a multiple share\nclass line structure,
        that company will remain in the SPX at the discretion of the S&amp;P Index
        Committee in order to minimize turnover.</P>\n\n<P STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin: 8pt 0\">The SPX is calculated using a base-weighted
        aggregate methodology. The\nlevel of the SPX reflects the total market value
        of all component stocks relative to the base period of the years 1941 through
        1943. An\nindexed number is used to represent the results of this calculation
        in order to make the level easier to work with and track over time.\nThe actual
        total market value of the component stocks during the base period of the years
        1941 through 1943 has been set to an indexed\nlevel of 10. This is often indicated
        by the notation 1941- 43 = 10. In practice, the daily calculation of the SPX
        is computed by dividing\nthe total market value of the component stocks by
        the &#8220;index divisor.&#8221; By itself, the index divisor is an arbitrary
        number.\nHowever, in the context of the calculation of the SPX, it serves
        as a link to the original base period level of the SPX. The index divisor\nkeeps
        the SPX comparable over time and is the manipulation point for all adjustments
        to the SPX, which is index maintenance.</P>\n\n<P STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin: 8pt 0\"><I>Index Maintenance</I></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">Index maintenance
        includes monitoring and completing the adjustments\nfor company additions
        and deletions, share changes, stock splits, stock dividends, and stock price
        adjustments due to company restructuring\nor spinoffs. Some corporate actions,
        such as stock splits and stock dividends, require changes in the common shares
        outstanding and the\nstock prices of the companies in the SPX, and do not
        require index divisor adjustments.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 8pt 0\">To prevent the level of the SPX from changing
        due to corporate actions,\ncorporate actions which affect the total market
        value of the SPX require an index divisor adjustment. By adjusting the index
        divisor for\nthe change in market value, the level of the SPX remains constant
        and does not reflect the corporate actions of individual companies in\nthe
        SPX. Index divisor adjustments are made after the close of trading and after
        the calculation of the SPX closing level.</P>\n\n<P STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin: 8pt 0\">Changes in a company&#8217;s shares
        outstanding of 5.00% or more due\nto mergers, acquisitions, public offerings,
        tender offers, Dutch auctions, or exchange offers are made as soon as reasonably
        possible.\nShare changes due to mergers or acquisitions of publicly held companies
        that trade on a major exchange are implemented when the transaction\noccurs,
        even if both of the companies are not in the same headline index, and regardless
        of the size of the change. All other changes\nof 5.00% or more (due to, for
        example, company stock repurchases, private placements, redemptions, exercise
        of options, warrants, conversion\nof preferred stock, notes, debt, equity
        participation units, at-the-market offerings, or other recapitalizations)
        are made weekly and\nare announced on Fridays for implementation after the
        close of trading on the following Friday. Changes of less than 5.00% are accumulated\nand
        made quarterly on the third Friday of March, June, September, and December,
        and are usually announced two to five days prior.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 8pt 0\">If a change in a company&#8217;s
        shares outstanding of 5.00% or more\ncauses a company&#8217;s IWF to change
        by five percentage points or more, the IWF is updated at the same time as
        the share change. IWF\nchanges resulting from partial tender offers are considered
        on a case by case basis.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><I>&nbsp;</I></P>\n\n\n<!-- Field: Page; Sequence: 18; Value:
        2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P STYLE=\"font:
        normal 8pt Arial, Helvetica, Sans-Serif; text-align: right; margin: 0pt\">PS-<!--
        Field: Sequence; Type: Arabic; Name: PageNo -->18<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 1pt 0 6pt\"><I>&nbsp;</I></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 1pt 0 6pt\"><I>Historical
        Performance of the SPW </I></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0\">The following graph sets forth the daily historical
        performance of the SPW\nin the period from January 2, 2020 through the Strike
        Date. We obtained this historical data from Bloomberg L.P. We have not independently\nverified
        the accuracy or completeness of the information obtained from Bloomberg L.P.
        The horizontal line in the graph represents the\nSPW&#8217;s Downside Threshold
        of 4,880.14 (rounded to two decimal places), which is 70% of the SPW&#8217;s
        Initial Value of 6,971.63,\nwhich was the SPW&#8217;s closing level on the
        Strike Date.</P>\n\n<P STYLE=\"font: 10pt Arial, Helvetica, Sans-Serif; margin:
        0 0 2pt; text-align: justify\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Arial,
        Helvetica, Sans-Serif; margin: 0 0 2pt; text-align: center\"><FONT STYLE=\"font-size:
        11pt\"><IMG SRC=\"image_003.jpg\" ALT=\"\" STYLE=\"height: 295px; width: 553px\"></FONT></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 1pt 0 6pt\">This historical
        data on the SPW is not necessarily indicative of\nthe future performance of
        the SPW or what the value of the Notes may be. Any historical upward or downward
        trend in the level of the SPW\nduring any period set forth above is not an
        indication that the level of the SPW is more or less likely to increase or
        decrease at any\ntime over the term of the Notes.</P>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 1pt 0 6pt\">Before investing in
        the Notes, you should consult publicly available\nsources for the levels of
        the SPW.</P>\n\n\n<!-- Field: Page; Sequence: 19; Value: 2 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->19<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
