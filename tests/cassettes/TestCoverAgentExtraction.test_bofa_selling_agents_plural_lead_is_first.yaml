        PRICING SUPPLEMENT\n<TEXT>\n<HTML>\n<HEAD>\n<TITLE></TITLE>\n</HEAD>\n<BODY>\n\n\n<P
        STYLE=\"font: 6.5pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: 6.5pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: center;
        color: red\">This pricing supplement, which is not complete\nand may be changed,
        relates to an effective Registration Statement under the Securities Act of
        1933. This pricing supplement and the accompanying\nproduct supplement, prospectus
        supplement and prospectus are not an offer to sell these notes in any country
        or jurisdiction where such\nan offer would not be permitted.</P>\n\n<P STYLE=\"font:
        6.5pt Arial, Helvetica, Sans-Serif; margin: 0; text-align: center; color:
        red\">SUBJECT TO COMPLETION, DATED March 31,\n2025</P>\n\n<P STYLE=\"font:
        12pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\"
        CELLPADDING=\"0\" STYLE=\"width: 100%; border-collapse: collapse; font-family:
        Arial, Helvetica, Sans-Serif\">\n  <TR STYLE=\"vertical-align: top\">\n    <TD
        STYLE=\"width: 50%; font-size: 9pt\"><FONT STYLE=\"font-size: 6.5pt\">Preliminary
        Pricing Supplement - Subject to Completion</FONT></TD>\n    <TD STYLE=\"text-align:
        right; width: 50%; font-size: 9pt\"><FONT STYLE=\"font-size: 6.5pt\">Filed
        Pursuant to Rule 424(b)(2)</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD STYLE=\"font-size: 9pt\"><FONT STYLE=\"font-size: 6.5pt\">(To
        Prospectus dated December 30, 2022,</FONT></TD>\n    <TD STYLE=\"text-align:
        right; font-size: 9pt\"><FONT STYLE=\"font-size: 6.5pt\">Series A Registration
        Statement Nos. 333-268718 and 333-268718-01</FONT></TD></TR>\n  </TABLE>\n<P
        STYLE=\"font: 6.5pt Arial, Helvetica, Sans-Serif; margin: 0\">Prospectus Supplement
        dated December 30, 2022 and</P>\n\n<P STYLE=\"font: 6.5pt Arial, Helvetica,
        Sans-Serif; margin: 0\">Product Supplement EQUITY-1 dated December 30, 2022)</P>\n\n<P
        STYLE=\"font: 6.5pt Arial, Helvetica, Sans-Serif; margin: 0\">Dated March&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        , 2025</P>\n\n<P STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif; margin:
        0; text-align: right\"><FONT STYLE=\"font-family: Arial, Helvetica, Sans-Serif;
        font-size: 8pt\"><IMG SRC=\"image_001.jpg\" ALT=\"\" STYLE=\"height: 34px;
        width: 197px\"></FONT></P>\n\n<P STYLE=\"font: 11.5pt Arial, Helvetica, Sans-Serif;
        margin: 0\"><B>BofA Finance LLC</B> $---- Trigger Callable Yield Notes</P>\n\n<P
        STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>Linked to the
        Least Performing of the S&amp;P 500<SUP>&reg;</SUP> Index\nand the S&amp;P
        500<SUP>&reg;</SUP> Equal Weight Index Due October 5, 2026</B></P>\n\n<P STYLE=\"font:
        7pt Arial, Helvetica, Sans-Serif; margin: 0\"><B>Fully and Unconditionally
        Guaranteed by Bank of America Corporation</B></P>\n\n\n\n<TABLE CELLSPACING=\"0\"
        CELLPADDING=\"0\" STYLE=\"width: 100%; border-collapse: collapse; font-family:
        Arial, Helvetica, Sans-Serif\">\n  <TR STYLE=\"vertical-align: top; background-color:
        #788D41\">\n    <TD STYLE=\"padding: 3pt 5.4pt; width: 100%; font-size: 12pt\"><FONT
        STYLE=\"font-size: 7pt; color: white\"><B>Investment Description</B></FONT></TD></TR>\n
        \ </TABLE>\n\n\n<P STYLE=\"font: 7pt Arial, Helvetica, Sans-Serif; margin:
        0\">The Trigger Callable Yield Notes linked to the Least Performing of the
        S&amp;P\n500<SUP>&reg;</SUP> Index and the S&amp;P 500<SUP>&reg;</SUP> Equal
        Weight Index (each, an &#8220;Underlying&#8221;) due October 5, 2026\n(the
        &#8220;Notes&#8221;) are senior unsecured obligations issued by BofA Finance
        LLC (&#8220;BofA Finance&#8221; or the &#8220;issuer&#8221;),\na consolidated
        finance subsidiary of Bank of America Corporation (&#8220;BAC&#8221; or the
        &#8220;Guarantor&#8221;), which are fully and\nunconditionally guaranteed
        by the Guarantor. The Notes will pay a Coupon Payment, regardless of the performance
        of the Least Performing\nUnderlying, on each monthly Coupon Payment Date.
        Beginning in July 2025, on any Call Date, the issuer may, in its sole discretion,
        call\nthe Notes in whole, but not in part, and pay you the Stated Principal
        Amount plus the Coupon Payment otherwise due on such Call Date,\nand no further
        amounts will be owed to you. If the Notes have not previously been called,
        at maturity, the amount you receive will depend\non the Final Value of the
        Least Performing Underlying on the Final Observation Date. If the Final Value
        of the Least Performing Underlying\non the Final Observation Date is greater
        than or equal to its Downside Threshold, you will receive the Stated Principal
        Amount at maturity\n(plus the final Coupon Payment). However, if the Notes
        have not been called prior to maturity and the Final Value of the Least Performing\nUnderlying
        on the Final Observation Date is less than its Downside Threshold, although
        you will receive the final Coupon Payment, you\nwill receive less than the
        Stated Principal Amount at maturity, resulting in a loss that is proportionate
        to the decline in the closing\nlevel of the Least Performing Underlying from
        the Strike Date to the Final Observation Date, up to a 100% loss of your investment.
        The\n&#8220;Least Performing Underlying&#8221; is the Underlying with the
        lowest Underlying Return from the Strike Date to the Final Observation\nDate.
        <B>Investing in the Notes involves significant risks. You may lose a substantial
        portion or all of your initial investment. The\npayment at maturity on the
        Notes will be based on the performance of the Least Performing Underlying.
        You will not benefit in any way\nfrom the performance of the other Underlying.
        You will therefore be adversely affected if either Underlying performs poorly,
        regardless\nof the performance of the other Underlying. You will not receive
        dividends or other distributions paid on any stocks included in the Underlyings\nor
        participate in any appreciation of either Underlying. The contingent repayment
        of the Stated Principal Amount applies only if you hold\nthe Notes to maturity
        or earlier call by the issuer. Any payment on the Notes, including any repayment
        of the Stated Principal Amount,\nis subject to the creditworthiness of BofA
        Finance and the Guarantor and is not, either directly or indirectly, an obligation
        of any third\nparty.</B></P>\n\n<div style=\"float: left; width: 68%\">\n\n<TABLE
        CELLSPACING=\"0\" CELLPADDING=\"0\" STYLE=\"width: 100%; border-collapse:
        collapse; font-family: Arial, Helvetica, Sans-Serif\">\n  <TR STYLE=\"vertical-align:
