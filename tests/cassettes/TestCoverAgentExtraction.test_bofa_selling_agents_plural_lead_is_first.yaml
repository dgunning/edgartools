        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        1pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        12pt Arial, Helvetica, Sans-Serif; margin: 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\"
        CELLPADDING=\"0\" STYLE=\"font: 12pt Arial, Helvetica, Sans-Serif; width:
        100%; border-collapse: collapse\">\n  <TR STYLE=\"vertical-align: top; background-color:
        #788D41\">\n    <TD STYLE=\"width: 100%; padding-top: 3pt; padding-bottom:
        3pt\">&nbsp;<FONT STYLE=\"font-size: 9pt; color: white\"><B>Risk Factors</B></FONT></TD></TR>\n
        \ </TABLE>\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt
        0 0; text-indent: 0in\"><I>Your investment in the Notes entails significant\nrisks,
        many of which differ from those of a conventional debt security. Your decision
        to purchase the Notes should be made only after\ncarefully considering the
        risks of an investment in the Notes, including those discussed below, with
        your advisors in light of your particular\ncircumstances. The Notes are not
        an appropriate investment for you if you are not knowledgeable about significant
        elements of the Notes\nor financial matters in general. You should carefully
        review the more detailed explanation of risks relating to the Notes in the
        &#8220;Risk\nFactors&#8221; sections beginning on page PS-5 of the accompanying
        product supplement, page S-6 of the accompanying prospectus supplement\nand
        page 7 of the accompanying prospectus identified on page PS-2 above.</I></P>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 6pt 0 0; text-indent:
        0in\"><I>&nbsp;</I></P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0 0 6pt; text-indent: 0in\"><B><U>Structure-related Risks</U></B></P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>Your investment may result in a loss; there
        is no guaranteed return of principal. </B>There is no fixed principal repayment
        amount\non the Notes at maturity. If the Notes are not called prior to maturity
        and the Final Value of either Underlying is less than its Downside\nThreshold,
        at maturity, you will lose 1% of the Stated Principal Amount for each 1% that
        the Final Value of the Least Performing Underlying\nis less than its Initial
        Value. In that case, you will lose a significant portion or all of your investment
        in the Notes.</TD></TR></TABLE>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top:
        0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>The
        limited downside protection provided by the Downside Threshold applies only
        at maturity. </B>You should be willing to hold\nyour Notes to maturity. If
        you are able to sell your Notes in the secondary market prior to a call or
        maturity, you may have to sell them\nat a loss relative to your initial investment
        even if the level of each Underlying at that time is equal to or greater than
        its Downside\nThreshold. All payments on the Notes are subject to the credit
        risk of BofA Finance, as issuer, and BAC, as guarantor.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>Your return on the Notes is limited to the
        return represented by the Coupon Payments over the term of the Notes.</B>
        Your return\non the Notes is limited to the Coupon Payments paid over the
        term of the Notes, regardless of the extent to which the closing level of\neither
        Underlying exceeds its Initial Value. Similarly, the amount payable at maturity
        or upon a call will never exceed the sum of the\nStated Principal Amount and
        the applicable Coupon Payment, regardless of the extent to which the closing
        level or Final Value, as applicable,\nof either Underlying exceeds its Initial
        Value. In contrast, a direct investment in the securities included in one
        or more of the Underlyings\nwould allow you to receive the benefit of any
        appreciation in their values. Thus, any return on the Notes will not reflect
        the return\nyou would realize if you actually owned those securities and received
        the dividends paid or distributions made on them.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The Notes are subject to a potential early
        call, which would limit your ability to receive the Coupon Payments over the
        full term\nof the Notes.</B> Beginning in July 2025, on each Call Date, at
        our option, we may redeem your Notes in whole, but not in part. If the\nNotes
        are called prior to the Maturity Date, you will be entitled to receive the
        Stated Principal Amount plus the Coupon Payment otherwise\ndue on such Call
        Date. In this case, you will lose the opportunity to continue to receive Coupon
        Payments after the date of the early\ncall. If the Notes are called prior
        to the Maturity Date, you may be unable to invest in other securities with
        a similar level of risk\nthat could provide a return that is similar to the
        Notes. Even if we do not exercise our option to redeem your Notes, our ability
        to do\nso may adversely affect the market value of your Notes. It is our sole
        option whether to redeem your Notes prior to maturity on any Call\nDate and
        we may or may not exercise this option for any reason. Because of this, the
        term of your Notes could be anywhere between three\nand eighteen months.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt 0.25in; text-indent:
        0in\">It is more likely that we will call the Notes\nin our sole discretion
        prior to maturity to the extent that the expected Coupon Payments payable
        on the Notes are greater than the coupon\nthat would be payable on other instruments
        issued by us of comparable maturity, terms and credit rating trading in the
        market. The greater\nlikelihood of us calling the Notes in that environment
        increases the risk that you will not be able to reinvest the proceeds from
        the\ncalled Notes in another investment that provides a similar yield with
        a similar level of risk. We are less likely to call the Notes prior\nto maturity
        when the expected Coupon Payments payable on the Notes are less than the coupon
        that would be payable on other comparable\ninstruments issued by us. Therefore,
        the Notes are more likely to remain outstanding when the expected Coupon Payments
        payable on the\nNotes are less than what would be payable on other comparable
        instruments and when your risk of not receiving a coupon is relatively higher.</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>Your return on the Notes may be less than
        the yield on a conventional debt security of comparable maturity. </B>Any
        return that\nyou receive on the Notes may be less than the return you would
        earn if you purchased a conventional debt security with the same Maturity\nDate.
        As a result, your investment in the Notes may not reflect the full opportunity
        cost to you when you consider factors, such as inflation,\nthat affect the
        time value of money. In addition, if interest rates increase during the term
        of the Notes, the Coupon Payment (if any)\nmay be less than the yield on a
        conventional debt security of comparable maturity.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>Any payment on the Notes is subject to our
        credit risk and the credit risk of the Guarantor, and actual or perceived
        changes in\nour or the Guarantor&#8217;s creditworthiness are expected to
        affect the value of the Notes. </B> The Notes are our senior unsecured debt\nsecurities.
        Any payment on the Notes will be fully and unconditionally guaranteed by the
        Guarantor. The Notes are not guaranteed by any\nentity other than the Guarantor.
        As a result, your receipt of all payments on the Notes will be dependent upon
        our ability and the ability\nof the Guarantor to repay our respective obligations
        under the Notes on the applicable payment date, regardless of the closing
        level or\nFinal Value of either Underlying as compared to its Downside Threshold
        or Initial Value, as applicable. No assurance can be given as to\nwhat our
        financial condition or the financial condition of the Guarantor will be on
        the Maturity Date. If we and the Guarantor become\nunable to meet our respective
        financial obligations as they become due, you may not receive the amounts
        payable under the terms of the\nNotes and you could lose all of your initial
        investment.</TD></TR></TABLE>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0 0 6pt 0.25in; text-indent: 0in\">In addition, our credit ratings
        and the credit\nratings of the Guarantor are assessments by ratings agencies
        of our respective abilities to pay our obligations. Consequently, our or\nthe
        Guarantor&#8217;s perceived creditworthiness and actual or anticipated decreases
        in our or the Guarantor&#8217;s credit ratings or\nincreases in the spread
        between the yield on our respective securities and the yield on U.S. Treasury
        securities (the &#8220;credit spread&#8221;)\nprior to the Maturity Date of
        your Notes may adversely affect the market value of the Notes. However,</P>\n\n\n<!--
        Field: Page; Sequence: 7; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif;
        text-align: right; margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name:
        PageNo -->7<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin: 0 0 6pt 0.25in; text-indent: 0in\">because your return on the Notes
        depends upon factors in addition\nto our ability and the ability of the Guarantor
        to pay our respective obligations, such as the values of the Underlyings,
        an improvement\nin our or the Guarantor&#8217;s credit ratings will not reduce
        the other investment risks related to the Notes.</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>We are a finance subsidiary and, as such,
        have no independent assets, operations or revenues.</B> We are a finance subsidiary
        of\nthe Guarantor, have no operations other than those related to the issuance,
        administration and repayment of our debt securities that are\nguaranteed by
        the Guarantor, and are dependent upon the Guarantor and/or its other subsidiaries
        to meet our obligations under the Notes\nin the ordinary course. Therefore,
        our ability to make payments on the Notes may be limited.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><FONT STYLE=\"background-color: white\"><B>Because
        the Notes are linked to the performance of the least performing between the
        SPX and\nthe SPW, you are exposed to greater risk of sustaining a significant
        loss on your investment than if the Notes were linked to just the\nSPX or
        just the SPW.</B> The risk that you will lose a significant portion or all
        of your investment in the Notes is greater if you invest\nin the Notes as
        opposed to substantially similar securities that are linked to the performance
        of just the SPX or just the SPW. With two\nUnderlyings, it is more likely
        that either Underlying will close below its Downside Threshold on the Final
        Observation Date than if the\nNotes were linked to only one of the Underlyings,
        and therefore it is more likely that you will receive a Payment at Maturity
        that is\nsignificantly less than the Stated Principal Amount on the Maturity
        Date.</FONT></TD></TR></TABLE>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top:
        0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>Greater
        expected volatility generally indicates an increased risk of loss.</B> A higher
        Coupon Rate and/or a lower Downside Threshold\nmay reflect greater expected
        volatilities of the Underlyings, which is generally associated with a greater
        risk of loss. Volatility is\na measure of the degree of variation in the levels
        of the Underlyings over a period of time. The greater the expected volatilities
        of\nthe Underlyings at the time the terms of the Notes are set, the greater
        the expectation is at that time that you may lose a significant\nportion or
        all of the Stated Principal Amount at maturity. In addition, the economic
        terms of the Notes, including the Coupon Rate and\nthe Downside Threshold,
        are based, in part, on the expected volatilities of the Underlyings at the
        time the terms of the Notes are set,\nwhere higher expected volatilities will
        generally be reflected in a higher Coupon Rate than the fixed rate we would
        pay on conventional\ndebt securities of the same maturity and/or on otherwise
        comparable securities and/or a lower Downside Threshold as compared to otherwise\ncomparable
        securities. Accordingly, a higher Coupon Rate will generally be indicative
        of a greater risk of loss while a lower Downside\nThreshold does not necessarily
        indicate that the Notes have a greater likelihood of returning the Stated
        Principal Amount at maturity.\nYou should be willing to accept the downside
        market risk of each Underlying and the potential loss of a significant portion
        or all of\nthe Stated Principal Amount at maturity.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt; text-indent:
        0in\"><B><U>Valuation and Market-related Risks</U></B></P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The public offering price you pay for the
        Notes will exceed their initial estimated value.</B> The range of initial
        estimated values\nof the Notes that is provided on the cover page of this
        preliminary pricing supplement, and the initial estimated value as of the
        Trade\nDate that will be provided in the final pricing supplement, are each
        estimates only, determined as of a particular point in time by reference\nto
        our and our affiliates' pricing models. These pricing models consider certain
        assumptions and variables, including our credit spreads\nand those of the
        Guarantor, the Guarantor&#8217;s internal funding rate, mid-market terms on
        hedging transactions, expectations on interest\nrates, dividends and volatility,
        price-sensitivity analysis, and the expected term of the Notes.&nbsp; These
        pricing models rely in part\non certain forecasts about future events, which
        may prove to be incorrect. If you attempt to sell the Notes prior to maturity,
        their market\nvalue may be lower than the price you paid for them and lower
        than their initial estimated value. This is due to, among other things,\nchanges
        in the level of the Underlyings, changes in the Guarantor&#8217;s internal
        funding rate, and the inclusion in the public offering\nprice of the underwriting
        discount and the hedging related charges, all as further described in &#8220;Structuring
        the Notes&#8221; below.\nThese factors, together with various credit, market
        and economic factors over the term of the Notes, are expected to reduce the
        price\nat which you may be able to sell the Notes in any secondary market
        and will affect the value of the Notes in complex and unpredictable\nways.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The initial estimated value does not represent
        a minimum or maximum price at which we,&nbsp;BAC,&nbsp;BofAS or&nbsp;any of
        our&nbsp;other&nbsp;affiliates\nwould be willing to purchase your Notes in
        any secondary market (if any exists) at any time. </B>The value of your Notes
        at any time after\nissuance will vary based on many factors that cannot be
        predicted with accuracy,&nbsp;including the performance of the&nbsp;Underlyings,\nour&nbsp;and
        BAC&#8217;s&nbsp;creditworthiness and changes in market conditions.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The price of the Notes that may be paid by
        BofAS in any secondary market (if BofAS makes a market, which it is not required
        to\ndo), as well as the price which may be reflected on customer account statements,
        will be higher than the then-current estimated value\nof the Notes for a limited
        time period after the Trade Date. </B>As agreed by BofAS and UBS, for approximately
        a three-month period after\nthe Trade Date, to the extent BofAS offers to
        buy the Notes in the secondary market, it will do so at a price that will
        exceed the estimated\nvalue of the Notes at that time.&nbsp; The amount of
        this excess, which represents a portion of the hedging-related charges expected
        to\nbe realized by BofAS and UBS over the term of the Notes, will decline
        to zero on a straight line basis over that three-month period.&nbsp;\nAccordingly,
        the estimated value of your Notes during this initial three-month period may
        be lower than the value shown on your customer\naccount statements.&nbsp;
        Thereafter, if BofAS buys or sells your Notes, it will do so at prices that
        reflect the estimated value determined\nby reference to its pricing models
        at that time. Any price at any time after the Trade Date will be based on
        then-prevailing market conditions\nand other considerations, including the
        performance of the Underlyings and the remaining term of the Notes.&nbsp;
        However, none of us,\nthe Guarantor, BofAS or any other party is obligated
        to purchase your Notes at any price or at any time, and we cannot assure you
        that\nany party will purchase your Notes at a price that equals or exceeds
        the initial estimated value of the Notes.</TD></TR></TABLE>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif;
        margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>We cannot assure you that a trading market
        for your Notes will ever develop or be maintained. </B>We will not list the
        Notes on\nany securities exchange. We cannot predict how the Notes will trade
        in any secondary market or whether that market will be liquid or illiquid.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt 0.25in; text-indent:
        0in\">The development of a trading market for the\nNotes will depend on the
        Guarantor&#8217;s financial performance and other factors, including changes
        in the level of the Underlyings.\nThe number of potential buyers of your Notes
        in any secondary market may be limited. We</P>\n\n\n<!-- Field: Page; Sequence:
        8; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P
        STYLE=\"font: normal 8pt Arial, Helvetica, Sans-Serif; text-align: right;
        margin: 0pt\">PS-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->8<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        0 0 6pt 0.25in; text-indent: 0in\">anticipate that BofAS will act as a market-maker
        for the Notes,\nbut none of us, the Guarantor or BofAS is required to do so.
        There is no assurance that any party will be willing to purchase your Notes\nat
        any price in any secondary market. BofAS may discontinue its market-making
        activities as to the Notes at any time. To the extent that\nBofAS engages
        in any market-making activities, it may bid for or offer the Notes. Any price
        at which BofAS may bid for, offer, purchase,\nor sell any Notes may differ
        from the values determined by pricing models that it may use, whether as a
        result of dealer discounts, mark-ups,\nor other transaction costs. These bids,
        offers, or completed transactions may affect the prices, if any, at which
        the Notes might otherwise\ntrade in the market. In addition, if at any time
        BofAS were to cease acting as a market-maker as to the Notes, it is likely
        that there\nwould be significantly less liquidity in the secondary market.
        In such a case, the price at which the Notes could be sold likely would\nbe
        lower than if an active market existed.</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top:
        0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>Economic
        and market factors have affected the terms of the Notes and may affect the
        market value of the Notes prior to maturity\nor a call. </B>Because market-linked
        notes, including the Notes, can be thought of as having a debt component and
        a derivative component,\nfactors that influence the values of debt instruments
        and options and other derivatives will also affect the terms and features
        of the\nNotes at issuance and the market price of the Notes prior to maturity
        or a call. These factors include the levels of the Underlyings and\nthe securities
        included in the Underlyings; the volatility of the Underlyings and the securities
        included in the Underlyings; the correlation\namong the Underlyings; the dividend
        rate paid on the securities included in the Underlyings, if applicable; the
        time remaining to the\nmaturity of the Notes; interest rates in the markets;
        geopolitical conditions and economic, financial, political, force majeure
        and regulatory\nor judicial events; the availability of comparable instruments;
        the creditworthiness of BofA Finance, as issuer, and BAC, as guarantor;\nand
        the then current bid-ask spread for the Notes and the factors discussed under
        &#8220;&#8212; Trading and hedging activities by us,\nthe Guarantor and any
        of our other affiliates, including BofAS, and UBS and its affiliates, may
        create conflicts of interest with you\nand may affect your return on the Notes
        and their market value&#8221; below. These factors are unpredictable and interrelated
        and may\noffset or magnify each other.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt; text-indent: 0in\"><B><U>Conflict-related
        Risks</U></B></P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top: 0; margin-bottom:
        6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>Trading
        and hedging activities by us, the Guarantor and any of our other affiliates,
        <FONT STYLE=\"background-color: white\">including\nBofAS, </FONT>and UBS and
        its affiliates, may create conflicts of interest with you and may affect your
        return on the Notes and their\nmarket value. </B>We, the Guarantor or one
        or more of our other affiliates, including BofAS, and UBS and its affiliates,
        may buy or sell\nthe securities held by or included in the Underlyings, or
        futures or options contracts on the Underlyings or those securities, or other\nlisted
        or over-the-counter derivative instruments linked to the Underlyings or those
        securities. We, the Guarantor or one or more of our\nother affiliates, including
        BofAS, and UBS and its affiliates also may issue or underwrite other financial
        instruments with returns based\nupon the Underlyings. We expect to enter into
        arrangements or adjust or close out existing transactions to hedge our obligations
        under\nthe Notes. We, the Guarantor or our other affiliates, including BofAS,
        and UBS and its affiliates also may enter into hedging transactions\nrelating
        to other notes or instruments, some of which may have returns calculated in
        a manner related to that of the Notes offered hereby.\nWe or UBS may enter
        into such hedging arrangements with one of our or their affiliates. Our affiliates
        or their affiliates may enter into\nadditional hedging transactions with other
        parties relating to the Notes and the Underlyings. This hedging activity is
        expected to result\nin a profit to those engaging in the hedging activity,
        which could be more or less than initially expected, or the hedging activity
        could\nalso result in a loss. We and our affiliates and UBS and its affiliates
        will price these hedging transactions with the intent to realize\na profit,
        regardless of whether the value of the Notes increases or decreases. Any profit
        in connection with such hedging activities will\nbe in addition to any other
        compensation that we, the Guarantor and our other affiliates, including BofAS,
        and UBS and its affiliates\nreceive for the sale of the Notes, which creates
        an additional incentive to sell the Notes to you. While we, the Guarantor
        or one or more\nof our other affiliates, including BofAS, and UBS and its
        affiliates may from time to time own securities represented by the Underlyings,\nexcept
        to the extent that BAC&#8217;s or UBS Group AG&#8217;s (the parent company
        of UBS) common stock may be included in the Underlyings,\nas applicable, we,
        the Guarantor and our other affiliates, including BofAS, and UBS and its affiliates
        do not control any company included\nin the Underlyings, and have not verified
        any disclosure made by any other company. We, the Guarantor or one or more
        of our other affiliates,\nincluding BofAS, and UBS and its affiliates may
        execute such purchases or sales for our own or their own accounts, for business
        reasons,\nor in connection with hedging our obligations under the Notes. The
        transactions described above may present a conflict of interest between\nyour
        interest in the Notes and the interests we, the Guarantor and our other affiliates,
        including BofAS, and UBS and its affiliates may\nhave in our or their proprietary
        accounts, in facilitating transactions, including block trades, for our or
        their other customers, and\nin accounts under our or their management.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt 0.25in; text-indent:
        0in\">The transactions described above may affect\nthe value of the Underlyings
        in a manner that could be adverse to your investment in the Notes. On or before
        the Strike Date, any purchases\nor sales by us, the Guarantor or our other
        affiliates, including BofAS or others on its behalf, and UBS and its affiliates
        (including\nfor the purpose of hedging some or all of our anticipated exposure
        in connection with the Notes) may have affected the value of the Underlyings.\nConsequently,
        the value of the Underlyings may change subsequent to the Strike Date, which
        may adversely affect the market value of the\nNotes. In addition, these activities
        may decrease the market value of your Notes prior to maturity, and may affect
        the amounts to be paid\non the Notes. We, the Guarantor or one or more of
        our other affiliates, including BofAS, and UBS and its affiliates may purchase
        or otherwise\nacquire a long or short position in the Notes and may hold or
        resell the Notes. For example, BofAS may enter into these transactions in\nconnection
        with any market making activities in which it engages. We cannot assure you
        that these activities will not adversely affect\nthe value of the Underlyings,
        the market value of your Notes prior to maturity or the amounts payable on
        the Notes.</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top: 0; margin-bottom:
        6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>There
        may be potential conflicts of interest involving the calculation agent, which
        is an affiliate of ours.</B> We have the right\nto appoint and remove the
        calculation agent. One of our affiliates will be the calculation agent for
        the Notes and, as such, will make\na variety of determinations relating to
        the Notes, including the amounts that will be paid on the Notes. Under some
        circumstances, these\nduties could result in a conflict of interest between
        its status as our affiliate and its responsibilities as calculation agent.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt 0.85in; text-indent:
        -0.25in\">&nbsp;</P>\n\n\n<!-- Field: Page; Sequence: 9; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt\"><P STYLE=\"font: normal 8pt
        Arial, Helvetica, Sans-Serif; text-align: right; margin: 0pt\">PS-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->9<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        9pt Arial, Helvetica, Sans-Serif; margin: 0 0 6pt; text-indent: 0in\"><B><U>Underlying-related
        Risks</U></B></P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin-top: 0; margin-bottom:
        6pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family: Symbol\">&uml;</FONT></TD><TD><B>The
        Notes are subject to the market risk of the Underlyings. </B>The return on
        the Notes, which may be negative, is directly linked\nto the performance of
        the Underlyings and indirectly linked to the value of the securities included
        in the Underlyings. The levels of\nthe Underlyings can rise or fall sharply
        due to factors specific to the Underlyings and the securities included in
        the Underlyings and\nthe issuers of such securities, such as stock price volatility,
        earnings and financial conditions, corporate, industry and regulatory\ndevelopments,
        management changes and decisions and other events, as well as general market
        factors, such as general stock market or commodity\nmarket volatility and
        levels, interest rates and economic and political conditions.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The publisher of an Underlying may adjust
        that Underlying in a way that affects its levels, and the publisher has no
        obligation\nto consider your interests.</B> The publisher of an Underlying
        can add, delete, or substitute the components included in that Underlying\nor
        make other methodological changes that could change its level. Any of these
        actions could adversely affect the value of your Notes.</TD></TR></TABLE>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><FONT STYLE=\"background-color: white\"><B>You
        are exposed to the market risk of both Underlyings.</B> Your return on the
        Notes is not\nlinked to a basket consisting of the Underlyings. Rather, it
        will be contingent upon the independent performance of each of the SPX and\nthe
        SPW. Unlike an instrument with a return linked to a basket of underlying assets,
        in which risk is mitigated and diversified among\nall of the components of
        the basket, you will be exposed to the risks related to both the SPX and the
        SPW. Poor performance by either\nof the Underlyings over the term of the Notes
        may negatively affect your return and will not be offset or mitigated by positive
        performance\nby the other Underlying. </FONT>To receive the contingent repayment
        of principal at maturity, each Underlying must close at or above its\nDownside
        Threshold on the Final Observation Date. Therefore, if <FONT STYLE=\"background-color:
        white\">the Notes are not called prior to\nmaturity, you may incur a loss
        proportionate to the negative return of the Least Performing Underlying even
        if the other Underlying appreciates\nduring the term of the Notes. Accordingly,
        your investment is subject to the market risk of both Underlyings. Additionally,
        movements\nin the values of the Underlyings may be correlated or uncorrelated
        at different times during the term of the Notes, and such correlation\n(or
        lack thereof) could have an adverse effect on your return on the Notes. For
        example, the likelihood that one of the Underlyings will\nclose below its
        Downside Threshold on the Final Observation Date will increase when the movements
        in the values of the Underlyings are\nuncorrelated. Thus, if the performance
        of the Underlyings is not correlated or is negatively correlated, the risk
        of incurring a significant\nloss of principal at maturity is greater. In addition,
        correlation generally decreases for each additional Underlying to which the
        Notes\nare linked, resulting in a greater potential for a significant loss
        of principal at maturity. Although the correlation of the Underlyings&#8217;\nperformance
        may change over the term of the Notes, the economic terms of the Notes, including
        the Coupon Rate and Downside Thresholds,\nare determined, in part, based on
        the correlation of the Underlyings&#8217; performance calculated using our
        and our affiliates' pricing\nmodels at the time when the terms of the Notes
        are finalized. All other things being equal, a higher Coupon Rate and lower
        Downside Threshold\nis generally associated with lower correlation of the
        Underlyings, which may indicate a greater potential for a significant loss
        on your\ninvestment at maturity. See &#8220;Correlation of the Underlyings&#8221;
        below.</FONT></TD></TR></TABLE>\n\n<P STYLE=\"font: 9pt Arial, Helvetica,
        Sans-Serif; margin: 0 0 6pt; text-indent: 0in\"><B><U>Tax-related Risks</U></B></P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 9pt Arial,
        Helvetica, Sans-Serif; margin-top: 0; margin-bottom: 6pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.2in\"><FONT STYLE=\"font-family:
        Symbol\">&uml;</FONT></TD><TD><B>The U.S. federal income tax consequences
        of an investment in the Notes are uncertain, and may be adverse to a holder
        of the Notes.</B>\nNo statutory, judicial, or administrative authority directly
        addresses the characterization of the Notes or securities substantially similar\nto
        the Notes for U.S. federal income tax purposes. As a result, significant aspects
        of the U.S. federal income tax consequences of an\ninvestment in the Notes
        are not certain. Under the terms of the Notes, you will have agreed with us
        to treat the Notes as consisting of\na put option and a deposit, as more fully
        described below under &#8220;U.S. Federal Income Tax Summary&#8212;General.&#8221;
        If the Internal\nRevenue Service (the &#8220;IRS&#8221;) were successful in
        asserting an alternative characterization for the Notes, the timing and character\nof
        income, gain or loss with respect to the Notes may differ. No ruling will
        be requested from the IRS with respect to the Notes and no\nassurance can
        be given that the IRS will agree with the statements made in the section entitled
        &#8220;U.S. Federal Income Tax Summary.&#8221;\n<B>You are urged to consult
        with your own tax advisor regarding all aspects of the U.S. federal income
        tax consequences of investing in\nthe Notes.</B></TD></TR></TABLE>\n\n\n<!--
