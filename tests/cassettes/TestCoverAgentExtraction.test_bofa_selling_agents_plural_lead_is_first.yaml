        and business and tax advisors before making a decision to purchase any of
        the Notes.</P>\n\n<P STYLE=\"font: 9pt Arial, Helvetica, Sans-Serif; margin:
        1pt 0 6pt\">The information in the &#8220;Summary&#8221; section is qualified\nin
