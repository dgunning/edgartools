        style=\"text-align:left; margin-bottom:13px;border-width:1px 1px 1px 1px;
        border-style:none none none none;\"> <font style=\"font-size:17pt;font-family:'Helvetica',Times,serif;\">Supplement
        to the Plan of Distribution; Role of BofAS and Conflicts of Interest</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">BofAS,
        a broker-dealer affiliate of ours, is a member of the Financial Industry Regulatory
        Authority, Inc. (&#8220;FINRA&#8221;) and will participate as selling agent
        in the distribution of the Notes. Accordingly, the offering of the Notes will
        conform to the requirements of FINRA Rule 5121. BofAS may not make sales in
        this offering to any of its discretionary accounts without the prior written
        approval of the account holder.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">We
        expect to deliver the Notes against payment therefor in New York, New York
        on a date that is greater than one business day following the pricing date.
        Under Rule 15c6-1 of the Securities Exchange Act of 1934, trades in the secondary
        market generally are required to settle in one business day, unless the parties
        to any such trade expressly agree otherwise. Accordingly, if the initial settlement
        of the Notes occurs more than one business day from the pricing date, purchasers
        who wish to trade the Notes more than one business day prior to the original
        issue date will be required to specify alternative settlement arrangements
        to prevent a failed settlement.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Under
        our distribution agreement with BofAS, BofAS will purchase the Notes from
        us as principal at the public offering price indicated on the cover of this
        pricing supplement, less the indicated underwriting discount, if any. BofAS
        will sell the Notes to other broker-dealers that will participate in the offering
        and that are not affiliated with us, at an agreed discount to the principal
        amount. Each of those broker-dealers may sell the Notes to one or more additional
        broker-dealers. BofAS has informed us that these discounts may vary from dealer
        to dealer and that not all dealers will purchase or repurchase the Notes at
        the same discount. Certain dealers who purchase the Notes for sale to certain
        fee-based advisory accounts may forgo some or all of their selling concessions,
        fees or commissions. The public offering price for investors purchasing the
        Notes in these fee-based advisory accounts may be as low as $997.50 per $1,000.00
        in principal amount of Notes. In addition to the underwriting discount, if
        any,&nbsp;an affiliate of BofA Finance will pay a referral fee of up to $2.50
        per $1,000.00 in principal amount of Notes in connection with the distribution
        of the Notes to other registered broker-dealers.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">BofAS
        and any of our other broker-dealer affiliates may use this pricing supplement
        and the accompanying product supplement, prospectus supplement and prospectus
        for offers and sales in secondary market transactions and market-making transactions
        in the Notes. However, they are not obligated to engage in such secondary
        market transactions and/or market-making transactions. These broker-dealer
        affiliates may act as principal or agent in these transactions, and any such
        sales will be made at prices related to&nbsp;prevailing market conditions
        at the time of the sale.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">At
        BofAS&#8217;s discretion, for a short, undetermined initial period after the
        issuance of the Notes, BofAS may offer to buy the Notes in the secondary market
        at a price that may exceed the initial estimated value of the Notes. Any price
        offered by BofAS for the Notes will be based on then-prevailing market conditions
        and other considerations, including the performance of the Underlyings and
        the remaining term of the Notes. However, none of us, the Guarantor, BofAS
        or any of our other affiliates is obligated to&nbsp;purchase your Notes at
        any price or at any time, and we cannot assure you that any party will purchase
        your Notes at a price that equals or exceeds the initial estimated value of
        the Notes.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Any
        price that BofAS may pay to repurchase the Notes will depend upon then prevailing
        market conditions, the creditworthiness of us and the Guarantor, and transaction
        costs. At certain times, this price may be higher than or lower than the initial
        estimated value of the Notes.</font> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;font-family:'Helvetica',Times,serif;\"><b>European
        Economic Area and United Kingdom</b></font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">None
        of this pricing supplement, the accompanying product supplement, the accompanying
        prospectus or the accompanying prospectus supplement is a prospectus for the
        purposes of the Prospectus Regulation (as defined below). This pricing supplement,
        the accompanying product supplement, the accompanying prospectus and the accompanying
        prospectus supplement have been prepared on the basis that any offer of Notes
        in any Member State of the European Economic Area (the &#8220;EEA&#8221;)
        or in the United Kingdom (each, a &#8220;Relevant State&#8221;) will only
        be made to a legal entity which is a qualified investor under the Prospectus
        Regulation (&#8220;Qualified Investors&#8221;). Accordingly any person making
        or intending to make an offer in that Relevant State of Notes which are the
        subject of the offering contemplated in this pricing supplement, the accompanying
        product supplement, the accompanying prospectus and the accompanying prospectus
        supplement may only do so with respect to Qualified Investors. Neither BofA
        Finance nor BAC has authorized,&nbsp;nor does it authorize, the making of
        any offer of Notes other than to Qualified Investors. The expression &#8220;Prospectus
        Regulation&#8221; means Regulation (EU) 2017/1129.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>PROHIBITION
        OF SALES TO EEA AND UNITED KINGDOM RETAIL INVESTORS</b>&nbsp;&#8211; The Notes
        are not intended to be offered, sold or otherwise made available to and should
        not be offered, sold or otherwise made available to any retail investor in
        the EEA or in the United Kingdom. For these purposes: (a) a retail investor
        means a person who is one (or more) of: (i) a retail client as defined in
        point (11) of Article 4(1) of Directive 2014/65/EU, as amended (&#8220;MiFID
        II&#8221;); or (ii) a customer within the meaning of Directive (EU) 2016/97
        (the Insurance Distribution Directive) where that customer would not qualify
        as a professional client as defined in point (10) of Article 4(1) of MiFID
        II; or (iii) not a qualified investor as defined in the Prospectus Regulation;
        and (b) the expression &#8220;offer&#8221; includes the communication in any
        form and by any means of sufficient information on the terms of the offer
        and the Notes to be offered so as to enable an investor to decide to purchase
        or subscribe for the Notes. Consequently no key information document required
        by Regulation (EU) No 1286/2014, as amended (the &#8220;PRIIPs Regulation&#8221;)
        for offering or selling the Notes or otherwise making them available to retail
        investors in the EEA or in the United Kingdom has been prepared and therefore
        offering or selling the Notes or otherwise making them available to any retail
        investor in the EEA or in the United Kingdom may be unlawful under the PRIIPs
        Regulation.</font> </div>\n<div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div>\n<table  width=\"100%\"
