        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">This
        pricing supplement and the accompanying product supplement, prospectus supplement
        and prospectus have been filed as part of a registration statement with the
        SEC, which may, without cost, be accessed on the SEC website at www.sec.gov
        or obtained from BofAS by calling 1-800-294-1322. Before you invest, you should
        read this pricing supplement and the accompanying product supplement, prospectus
        supplement and prospectus for information about us, BAC and this offering.
        Any prior or contemporaneous oral statements and any other written materials
        you may have received are superseded by this pricing supplement and the accompanying
        product supplement, prospectus supplement and prospectus. Certain terms used
        but not defined in this pricing supplement have the meanings set forth in
        the accompanying product supplement or prospectus supplement. Unless otherwise
        indicated or unless the context requires otherwise, all references in this
        document to &#8220;we,&#8221; &#8220;us,&#8221; &#8220;our,&#8221; or similar
        references are to BofA Finance, and not&nbsp;to BAC.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        Notes are our senior debt securities. Any payments on the Notes are fully
        and unconditionally guaranteed by BAC. The Notes and the related guarantee
        are not insured by the Federal Deposit Insurance Corporation or secured by
        collateral. The Notes will rank equally in right of payment with all of our
        other unsecured and unsubordinated obligations, except obligations that are
        subject to any priorities or preferences by law. The related guarantee will
        rank equally in right of payment with all of BAC&#8217;s other&nbsp;unsecured
        and unsubordinated obligations, except obligations that are subject to any
        priorities or preferences by law, and senior to its subordinated obligations.
        Any payments due on the Notes, including any repayment of the principal amount,
        will be subject to the credit risk of BofA Finance, as Issuer, and BAC, as
        Guarantor.</font> </div>\n<div style=\"text-align:left; border-width:1px 1px
