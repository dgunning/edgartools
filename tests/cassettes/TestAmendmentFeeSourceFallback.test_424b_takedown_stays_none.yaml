        </div></td>\n  </tr>\n</table>\n<table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n    <td width=\"0%\" valign
        = \"baseline\"><div style =\"text-indent:16px;\"><font style=\"font-size:16px;color:#5F8CD6;font-family:Calibri
        Light;\">&#8226;</font>&nbsp;&nbsp;&nbsp; </div></td>\n    <td style=\"padding-top:5px;\"><div
        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">the
        security must have a minimum three-month average daily trading volume of at
        least 200,000 shares;</font> </div></td>\n  </tr>\n</table>\n<table style=\"
        border-collapse:collapse;\" cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n
        \   <td width=\"0%\" valign = \"baseline\"><div style =\"text-indent:16px;\"><font
        style=\"font-size:16px;color:#5F8CD6;font-family:Calibri Light;\">&#8226;</font>&nbsp;&nbsp;&nbsp;
        </div></td>\n    <td style=\"padding-top:5px;\"><div style =\" text-align:left;\"><font
        style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">if
        the issuer of the security is organized under the laws of a jurisdiction outside
        the U.S., then such security must have listed options on a recognized options
        market in the U.S. or be eligible for listed-options trading on a recognized
        options market in the U.S. (measured annually during the ranking review process);</font>
        </div></td>\n  </tr>\n</table>\n<table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n    <td width=\"0%\" valign
        = \"baseline\"><div style =\"text-indent:16px;\"><font style=\"font-size:16px;color:#5F8CD6;font-family:Calibri
        Light;\">&#8226;</font>&nbsp;&nbsp;&nbsp; </div></td>\n    <td style=\"padding-top:5px;\"><div
        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">the
        security must have an adjusted&nbsp;market capitalization equal to or exceeding
        0.10% of the aggregate adjusted market capitalization of the NDX at each month-end.
        In the event a company does not meet this criterion for two consecutive month-ends,
        it will be removed from the NDX effective after the close of trading on the
        third Friday of the following month; and</font> </div></td>\n  </tr>\n</table>\n<div
        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> </div>\n<table  width=\"100%\"  cellpadding = \"0\"  cellspacing
        = \".0\"  style = \" border-collapse:collapse; margin-top:20px;\" >\n  <tr>\n
