        style=\"text-align:left; margin-bottom:20px;border-width:1px 1px 1px 1px;
        border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div>\n<div
        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> <font style=\"font-size:17pt;font-family:'Helvetica',Times,serif;\">U.S.
        Federal Income Tax Summary</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        following summary of the material U.S. federal income and estate tax considerations
        of the acquisition, ownership, and disposition of the Notes supplements, and
        to the extent inconsistent supersedes, the discussion under &#8220;U.S. Federal
        Income Tax Considerations&#8221; in the accompanying prospectus and is not
        exhaustive of all possible tax considerations. This summary is based upon
        the Internal Revenue Code of 1986, as amended (the &#8220;Code&#8221;), regulations
        promulgated under the Code by the U.S. Treasury Department (&#8220;Treasury&#8221;)
        (including proposed and temporary regulations), rulings, current administrative
        interpretations and official pronouncements of the IRS, and judicial decisions,
        all as currently in effect and all of which are subject to differing interpretations
        or to change, possibly with retroactive effect. No assurance can be given
        that the IRS would not assert, or that a court would not sustain, a position
        contrary to any of the tax consequences described below. This summary does
        not include any description&nbsp;of the tax laws of any state or local governments,
        or of any foreign government, that may be applicable to a particular holder.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Although
        the Notes are issued by us, they will be treated as if they were issued by
        BAC for U.S. federal income tax purposes. Accordingly throughout this tax
        discussion, references to &#8220;we,&#8221; &#8220;our&#8221; or &#8220;us&#8221;
        are generally to BAC unless the context requires otherwise.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">This
        summary is directed solely to U.S. Holders and Non-U.S. Holders that, except
        as otherwise specifically noted, will purchase the Notes upon original issuance
        and will hold the Notes as capital assets within the meaning of Section 1221
        of the Code, which generally means property held for investment, and that
        are not excluded from the discussion under &#8220;U.S. Federal Income Tax
        Considerations&#8221; in the accompanying prospectus.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">You
        should consult your own tax advisor concerning the U.S. federal income tax
        consequences to you of acquiring, owning, and disposing of the Notes, as well
        as any tax consequences arising under the laws of any state, local, foreign,
        or other tax jurisdiction and the possible effects of changes in U.S. federal
        or other tax laws.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>General</b></font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Although
        there is no&nbsp;statutory, judicial, or administrative authority directly
        addressing the characterization of the Notes, we intend to treat the Notes
        for all tax purposes as contingent income-bearing single financial contracts
        with respect to the Underlyings and under the terms of the Notes, we and every
        investor in the Notes agree, in the absence of an administrative determination
        or judicial ruling to the contrary, to treat the Notes in accordance with
        such characterization. In the opinion of our counsel, Sidley Austin LLP, it
        is reasonable to treat the Notes as contingent income-bearing single financial
        contracts with respect to the Underlyings. This discussion assumes that the
        Notes constitute contingent income-bearing single financial contracts with
        respect to the Underlyings for U.S. federal income tax purposes. If the Notes
        did not constitute contingent income-bearing single financial contracts, the
        tax consequences described below would be materially different.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><i>This
        characterization of the Notes is not binding on&nbsp;</i><i>the IRS or the
        courts. No statutory, judicial, or administrative authority directly addresses
        the characterization of the Notes or any similar instruments for U.S. federal
        income tax purposes, and no ruling is being requested from the IRS with respect
        to their proper characterization and treatment. Due to the absence of authorities
        on point, significant aspects of the U.S. federal income tax consequences
        of an investment in the Notes are not certain, and no assurance can be given
        that the IRS or any court w</i><i>ill agree with the characterization and
        tax treatment described in this pricing supplement. Accordingly, you are urged
        to consult your tax advisor regarding all aspects of the U.S. federal income
        tax consequences of an investment in the Notes, including possible alternative
        characterizations.</i></font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Unless
        otherwise stated, the following discussion is based on the characterization
        described above. The discussion in this section assumes that there is a significant
        possibility of a significant loss of principal on an investment in the Notes.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">We
        will not attempt to ascertain whether any issuer of a component stock included
        in an Underlying would be treated as a &#8220;passive foreign investment company&#8221;
        (&#8220;PFIC&#8221;), within the meaning of Section 1297 of the Code, or a
        United States real property holding corporation, within the meaning of Section
        897(c) of the Code. If the issuer of one or more stocks included in an Underlying
        were so treated, certain adverse U.S. federal income tax consequences could
        possibly apply to a holder of the Notes. You should refer to information filed
        with the SEC by the issuers of the component stocks included in each Underlying
        and consult your tax advisor regarding the possible consequences to you, if
        any, if any issuer of a component stock included in an Underlying is or becomes
        a PFIC or is or becomes a United States real property holding corporation.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>U.S.
        Holders</b></font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Although
        the U.S. federal income tax treatment of any Contingent Coupon Payment on
        the Notes is uncertain, we intend to take the position, and the following
        discussion assumes, that any Contingent Coupon Payment constitutes taxable
        ordinary income to a U.S. Holder at the time received or accrued in accordance
        with the U.S. Holder&#8217;s regular method of accounting. &nbsp;By purchasing
        the Notes you agree, in the absence of an administrative determination or
        judicial ruling to the contrary, to treat any Contingent Coupon Payment as
        described in the preceding sentence.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Upon
        receipt of a cash payment at maturity or upon a sale, exchange, or redemption
        of the Notes prior to maturity, a U.S. Holder generally will recognize capital
        gain or loss equal to the difference between the amount realized (other than
        amounts representing any Contingent Coupon Payment, which would be taxed as
        described above) and the U.S. Holder&#8217;s tax basis in the Notes. A U.S.
        Holder&#8217;s tax basis in the Notes will equal the amount paid by that holder
        to acquire them. This capital gain or loss generally&nbsp;will be long-term
        capital gain or loss if the U.S. Holder held the Notes for more than one year.
        The deductibility of capital losses is subject to limitations.</font> </div>\n<div
        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> </div>\n<table  width=\"100%\"  cellpadding = \"0\"  cellspacing
