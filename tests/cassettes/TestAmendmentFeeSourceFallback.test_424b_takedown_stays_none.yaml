        information reflects the policies of, and is subject to change by, the sponsor
        of the NDX, the sponsor of the RTY and the sponsor of the SPX (collectively,
        the &#8220;Underlying Sponsors&#8221;). The Underlying Sponsors, which license
        the copyright and all other rights to the respective Underlyings, have no
        obligation to continue to publish, and may discontinue publication of, the
        Underlyings. The consequences of any Underlying Sponsor discontinuing publication
        of the applicable Underlying are discussed in &#8220;Description of the Notes
        &#8212; Discontinuance of an Index&#8221; in the accompanying product supplement.
        None of us, the Guarantor, the calculation agent, or BofAS accepts any responsibility
        for the calculation, maintenance or publication of any Underlying or any successor
        index. None of us, the&nbsp;Guarantor, BofAS or any of our other affiliates
        makes any representation to you as to the future performance of the Underlyings.
        You should make your own investigation into the Underlyings.</font> </div>\n<div
        style=\"text-align:left; margin-top:13px;margin-bottom:13px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:11pt;color:#E31837;font-family:'Helvetica',Times,serif;\"><b>The
        Nasdaq-100</b><b><sup>&#174;</sup></b><b>&nbsp;Index</b></font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        NDX is intended to measure the performance of the 100 largest domestic and
        international non-financial securities listed on The Nasdaq Stock Market (\"NASDAQ\")
        based on market capitalization. The NDX reflects companies across major industry
        groups including computer hardware and software, telecommunications, retail/wholesale
        trade and biotechnology. It does not contain securities of financial companies
        including investment companies.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        NDX began trading on January 31, 1985 at a base value of 125.00. The NDX is
        calculated and published by Nasdaq, Inc. In administering the NDX, Nasdaq,
        Inc. will exercise reasonable discretion as it deems appropriate.</font> </div>\n<div
        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> <font style=\"font-size:8pt;font-family:'Helvetica',Times,serif;\"><b><i>Underlying
        Stock Eligibility Criteria</i></b></font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">NDX
        eligibility is limited to specific security types only. The security types
        eligible for the NDX include foreign or domestic common stocks, ordinary shares,
        ADRs and tracking stocks. Security types not included in the NDX are closed-end
        funds, convertible debt securities, exchange traded funds, limited liability
        companies, limited partnership interests, preferred stocks, rights, shares
        or units of beneficial interest, warrants, units, and other derivative securities.
        The NDX does not contain securities of investment companies. For purposes
        of the NDX eligibility criteria, if the security is a depositary receipt representing
        a security of a non-U.S. issuer, then references to the &#8220;issuer&#8221;
        are references to the issuer of the underlying security.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><i>Initial
        Eligibility Criteria</i></font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">To
        be eligible for initial inclusion in the NDX, a security must be listed on
        NASDAQ and meet the following criteria:</font> </div>\n<table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n    <td width=\"0%\" valign
        = \"baseline\"><div style =\"text-indent:16px;\"><font style=\"font-size:16px;color:#5F8CD6;font-family:Calibri
