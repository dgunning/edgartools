        of each Underlying would not be combined, and the depreciation in the level
        of one Underlying would not be offset by any appreciation in the levels of
        the other Underlyings. Even if the Observation Value of an Underlying is at
        or above its Coupon Barrier on an Observation Date, you will not receive the
        Contingent Coupon Payment with respect to that&nbsp;Observation Date if the
        Observation Value of another Underlying is below its Coupon Barrier on that
