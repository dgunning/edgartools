        the rate it would pay to borrow funds through the issuance of market-linked
        notes, and the economic terms of certain related hedging arrangements BAC&#8217;s
        affiliates enter into. BAC&#8217;s internal funding rate is typically lower
        than the rate it would pay when it issues conventional fixed or floating rate
        debt securities. This difference in funding rate, as well as the underwriting
        discount, if any, the referral fee and the hedging related charges described
        below (see &#8220;Risk Factors&#8221; beginning on page PS-9), will reduce
        the economic terms of the Notes to you and the initial estimated value of
        the Notes. Due to these factors, the public offering price you pay to purchase
