        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">&#8220;Russell
        2000<sup>&#174;</sup>&#8221; and &#8220;Russell 3000<sup>&#174;</sup>&#8221;
        are trademarks of FTSE Russell and have been licensed for use by our affiliate,
        Merrill Lynch, Pierce, Fenner &amp; Smith Incorporated. The Notes are not
        sponsored, endorsed, sold, or promoted by FTSE Russell, and FTSE Russell makes
        no representation regarding the advisability of investing in the Notes.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">FTSE
