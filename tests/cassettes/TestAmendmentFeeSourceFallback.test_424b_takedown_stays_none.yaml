        ; \" >\n  <tr>\n    <td  colspan=\"1\"  width=\"100%\"  rowspan=\"1\"  valign=\"top\"
        \ style = \"border-bottom:1px solid #A6A6A6;  \" ><div style=\"text-align:left;padding-left:7px;padding-right:7px;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div></td>\n
        \ </tr>\n  <tr>\n    <td  colspan=\"1\"  width=\"100%\"  rowspan=\"1\"  valign=\"top\"
        ><div style=\"text-align:left;padding-left:7px;padding-right:7px; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div></td>\n  </tr>\n</table>\n<div
        style=\"text-align:left; margin-bottom:20px;border-width:1px 1px 1px 1px;
        border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">If
        a Non-U.S. Holder of the Notes is engaged in the conduct of a trade or business
        within the U.S. and if any Contingent Coupon Payment and gain realized on
        the settlement at maturity, or upon sale, exchange, or redemption of the Notes,
        is effectively connected with the conduct of such trade or business (and,
        if certain tax treaties apply, is attributable to a permanent establishment
        maintained by the Non-U.S. Holder in the U.S.), the Non-U.S. Holder, although
        exempt from U.S. federal withholding tax, generally will be subject to U.S.
        federal income tax on such Contingent Coupon Payment and gain on a net income
        basis in the same manner as if it were a U.S. Holder. Such Non-U.S. Holders
        should read the material under the heading &#8220;&#8212;U.S. Holders,&#8221;
        for a description of the U.S. federal income tax consequences of acquiring,
        owning, and disposing of the Notes. In addition, if such Non-U.S. Holder is
        a foreign corporation, it may also be subject to a branch profits tax equal
        to 30% (or such lower rate provided by any applicable tax treaty) of a portion
        of its earnings and profits for the taxable year that are effectively connected
        with its conduct of a trade or business in the U.S., subject to certain adjustments.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">A
        &#8220;dividend equivalent&#8221; payment is treated as a dividend from sources
        within the United States and such payments generally would be subject to a
        30% U.S. withholding tax if paid to a Non-U.S. Holder. Under Treasury regulations,
        payments (including deemed payments) with respect to equity-linked instruments
        (&#8220;ELIs&#8221;) that are &#8220;specified ELIs&#8221; may be treated
        as dividend equivalents if such specified ELIs reference an interest in an
        &#8220;underlying security,&#8221; which is generally any interest in an entity
        taxable as a corporation for U.S. federal income tax purposes if a payment
        with respect to such interest could give rise to a U.S. source dividend. However,
        IRS guidance provides that withholding on dividend equivalent payments will
        not apply to specified ELIs that are not delta-one instruments and that are
        issued before January 1, 2027. Based on our determination that the Notes are
        not delta-one instruments, Non-U.S. Holders should not be subject to withholding
        on dividend equivalent payments, if any, under the Notes.&nbsp;However, it
        is possible that the Notes could be treated as deemed reissued for U.S. federal
        income tax purposes upon the occurrence of certain events affecting the Underlyings
        or the Notes, and following such occurrence the Notes could be treated as
        subject to withholding on dividend equivalent payments. Non-U.S. Holders that
        enter, or have entered, into other transactions in respect of the Underlyings
        or the Notes should consult their tax advisors as to the application of the
        dividend equivalent withholding tax in the context of the Notes and their
        other transactions. If any payments are treated as dividend equivalents subject
        to withholding, we (or the applicable paying agent) would be entitled to withhold
        taxes without being required to pay any additional amounts with respect to
        amounts so withheld.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">As
        discussed above, alternative characterizations of the Notes for U.S. federal
        income tax purposes are possible. Should an alternative characterization,
        by reason of change or clarification of the law, by regulation or otherwise,
        cause payments as to the Notes to become subject to withholding tax in addition
        to the withholding tax described above, tax will be withheld at the applicable
        statutory rate. Prospective Non-U.S. Holders should consult their own tax
        advisors regarding the tax consequences of such&nbsp;alternative characterizations.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><i>U.S.
        Federal Estate Tax.&nbsp;</i>Under current law, while the matter is not entirely
        clear, individual Non-U.S. Holders, and entities whose property is potentially
        includible in those individuals&#8217; gross estates for U.S. federal estate
        tax purposes (for example, a trust funded by such an individual and with respect
        to which the individual has retained certain interests or powers), should
        note that, absent an applicable treaty benefit, a Note is likely to be treated
        as U.S. situs property, subject to U.S. federal estate tax. These individuals
        and entities should consult their own tax advisors regarding the U.S. federal
        estate tax consequences of investing in a Note.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>Backup
        Withholding and Information Reporting</b></font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Please
        see the discussion under &#8220;U.S. Federal Income Tax Considerations &#8212;
        General &#8212; Backup Withholding and Information Reporting&#8221; in the
        accompanying prospectus for a description of the applicability of the backup
        withholding and information reporting rules to payments made on the Notes.</font>
        </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> </div>\n<table  width=\"100%\"  cellpadding = \"0\"  cellspacing
