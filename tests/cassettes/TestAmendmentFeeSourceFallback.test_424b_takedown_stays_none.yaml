        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>We
        are a finance subsidiary and, as such, have no independent assets, operations,
        or revenues.&nbsp;</b>We are a finance subsidiary of the Guarantor, have no
        operations other than those related to the issuance, administration and repayment
        of our debt securities that are guaranteed by the Guarantor, and are dependent
        upon the Guarantor and/or its other subsidiaries to meet our obligations under
        the Notes in the ordinary course. Therefore, our ability to make payments
        on the Notes may be limited.</font> </div></td>\n  </tr>\n</table>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b><u>Valuation
