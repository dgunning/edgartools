        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>The
        publisher or the sponsor of an Underlying may adjust that Underlying in a
        way that affects its levels, and the publisher or the sponsor has no obligation
