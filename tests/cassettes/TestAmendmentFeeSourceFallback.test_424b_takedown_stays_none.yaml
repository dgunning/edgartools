        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>The
        U.S. federal income tax consequences of an investment in the Notes are uncertain,
        and may be adverse to a holder of the Notes. </b>No statutory, judicial, or
        administrative authority directly addresses the characterization of the Notes
        or securities similar to the Notes for U.S. federal income tax purposes. As
        a result, significant aspects of the U.S. federal income tax consequences
        of an investment in the Notes are not certain. Under the terms of the Notes,
        you will have agreed with us to treat the Notes as contingent income-bearing
        single financial contracts, as described below under &#8220;U.S. Federal Income
        Tax Summary&#8212;General.&#8221; If the Internal Revenue Service (the &#8220;IRS&#8221;)
        were successful in asserting an alternative characterization for the Notes,
        the timing and character of income, gain or loss with respect to the Notes
