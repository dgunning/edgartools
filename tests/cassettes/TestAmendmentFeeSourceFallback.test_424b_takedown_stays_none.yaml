        </div></td>\n    <td style=\"padding-top:5px;\"><div style =\" text-align:left;\"><font
        style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">sales
        for our own or their own accounts, for business reasons, or in connection
        with hedging our obligations under the Notes. These transactions may present
        a conflict of interest between your interest in the Notes and the interests
        we, the Guarantor and our other affiliates, including BofAS, may have in our
        or their proprietary accounts, in facilitating transactions, including block
        trades, for our or their other customers, and in accounts under our or their
        management. These transactions may adversely affect the levels of the Underlyings
        in a manner that could be adverse to your investment in the Notes. On or before
        the pricing date, any purchases or sales by us, the Guarantor or our other
        affiliates, including BofAS or others on our or their behalf (including those
        for the purpose of hedging some or all of our anticipated exposure in connection
        with the Notes), may affect the levels of the Underlyings. Consequently, the
        levels of the Underlyings may change subsequent to the pricing date, which
        may adversely affect the market value of the Notes. <br>\n        <br>\n        We,
        the Guarantor or one or more of our other affiliates, including BofAS, also
        expect to engage in hedging activities that could affect the levels of the
        Underlyings on the pricing date. In addition, these hedging activities, including
        the unwinding of a hedge, may decrease the market value of your Notes prior
        to maturity, and may affect the amounts to be paid on the Notes. We, the Guarantor
        or one or more of our other affiliates, including BofAS, may purchase or otherwise
        acquire a long or short position in the Notes and may hold or resell the Notes.
        For example, BofAS may enter into these transactions in connection with any
        market making activities in which it engages. We cannot assure you that these
        activities will not adversely affect the levels of the Underlyings, the market
        value of your Notes prior to maturity or the amounts payable on the Notes.</font>
