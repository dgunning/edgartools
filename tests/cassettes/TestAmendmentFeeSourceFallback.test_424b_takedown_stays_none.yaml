        Light;\">&#8226;</font>&nbsp;&nbsp;&nbsp; </div></td>\n    <td style=\"padding-top:5px;\"><div
        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>The
        public offering price you pay for the Notes will exceed their initial estimated
        value.&nbsp;</b>The range of initial estimated values of the Notes that is
        provided on the cover page of this preliminary pricing supplement, and the
        initial estimated value as of the pricing date that will be provided in the
        final pricing supplement, are each estimates only, determined as of a particular
        point in time by reference to our and our affiliates&#8217; pricing models.
        These pricing models consider certain assumptions and variables, including
        our credit spreads and those of the Guarantor, the Guarantor&#8217;s internal
        funding rate, mid-market terms on hedging transactions, expectations on interest
        rates, dividends and volatility, price-sensitivity analysis, and the expected
        term of the Notes. These pricing models rely in part on certain forecasts
        about future events, which may prove to be incorrect. If you attempt to sell
        the Notes prior to maturity, their market value may be lower than the price
        you paid for them and lower than their initial estimated value. This is due
        to, among other things, changes in the levels of the Underlyings, changes
        in the Guarantor&#8217;s internal funding rate, and the inclusion in the public
        offering price of the underwriting discount, if any, the referral fee and
        the hedging related charges, all as further described in &#8220;Structuring
        the Notes&#8221; below. These factors, together with various credit, market
        and economic factors over the term of the Notes, are expected to reduce the
        price at which you may be able to sell the Notes in any secondary market and
        will affect the value of the Notes in complex and unpredictable ways.</font>
        </div></td>\n  </tr>\n</table>\n<table style=\" border-collapse:collapse;\"
