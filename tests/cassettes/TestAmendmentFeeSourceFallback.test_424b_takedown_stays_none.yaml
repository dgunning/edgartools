        </div></td>\n    <td style=\"padding-top:5px;\"><div style =\" text-align:left;\"><font
        style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>Any
        payments on the Notes are subject to our credit risk and the credit risk of
        the Guarantor, and any actual or perceived changes in our or the Guarantor&#8217;s
        creditworthiness are expected to affect the value of the Notes. </b>The Notes
        are our senior unsecured debt securities. Any payment on the Notes will be
        fully and unconditionally guaranteed by the Guarantor. The Notes are not guaranteed
        by any entity other than the Guarantor. As a result, your receipt of any payments
        on the Notes will be dependent upon our ability and the ability of the Guarantor
        to repay our respective obligations under the Notes on the applicable payment
        date, regardless of the performance of the Underlyings. No assurance can be
        given as to what our financial condition or the financial condition of the
        Guarantor will be at any time after the pricing date of the Notes. If we and
        the Guarantor become unable to meet our respective financial obligations as
        they become due, you may not receive the amount(s) payable under the terms
        of the Notes. <br>\n        <br>\n        In addition, our credit ratings
        and the credit ratings of the Guarantor are assessments by ratings agencies
        of our respective abilities to pay our obligations. Consequently, our or the
        Guarantor&#8217;s perceived creditworthiness and actual or anticipated decreases
        in our or the Guarantor&#8217;s credit ratings or increases in the spread
        between the yield on our respective securities and the yield on U.S. Treasury
        securities (the &#8220;credit spread&#8221;) prior to the Maturity Date may
        adversely affect the market value of the Notes. However, because your return
        on the Notes depends upon factors in addition to our ability and the ability
        of the Guarantor to pay our respective obligations, such as the values of
        the Underlyings, an improvement in&nbsp;our or the Guarantor&#8217;s credit
        ratings will not reduce the other investment risks related to the Notes.</font>
        </div></td>\n  </tr>\n</table>\n<table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n    <td width=\"0%\" valign
