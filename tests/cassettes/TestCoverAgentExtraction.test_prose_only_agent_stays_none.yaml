        border-width:1px 1px 1px 1px; border-style:none none none none;\">\n\n\n    </div>\n\n\n
        \   <div style=\"text-align:right;padding-left:7px;padding-right:7px; border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n\n\n    </div>\n\n\n    <div
        style=\"text-align:right;padding-left:7px;padding-right:7px; border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n\n\n    </div>\n\n\n   </td>\n\n
        \ </tr>\n\n</table>\n    <div style=\"text-align:left; border-width:1px 1px
        1px 1px; border-style:none none none none;\">\n\n    </div>\n\n    <div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\">\n\n    </div>\n\n\n
        \   <div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:20pt;color:#5B862B;font-family:'Arial',Times,serif;\">Summary
        Tax Consequences</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\">&nbsp;You should
        consider the U.S. federal income tax consequences of an investment in the
        notes, including the following:</font>\n\n    </div>\n\n\n <table style=\"
        border-collapse:collapse;\" cellspacing=\"0\" cellpadding=\"0\">\n<tr>\n   <td
        width=\"0%\" valign = \"baseline\">\n    <div style =\"text-indent:24px;margin-top:6px;\"><font
        style=\"font-size:9pt;\">&#9632;</font>&nbsp;&nbsp;&nbsp;\n    </div>\n\n
        \  </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style =\"margin-top:6px;
        text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">There
        is no statutory, judicial, or administrative authority directly addressing
        the characterization of the notes.</font>\n    </div>\n\n   </td>\n\n  </tr>\n\n</table>\n
        <table style=\" border-collapse:collapse;\" cellspacing=\"0\" cellpadding=\"0\">\n<tr>\n
        \  <td width=\"0%\" valign = \"baseline\">\n    <div style =\"text-indent:24px;margin-top:6px;\"><font
        style=\"font-size:9pt;\">&#9632;</font>&nbsp;&nbsp;&nbsp;\n    </div>\n\n
        \  </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style =\"margin-top:6px;
        text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">You
        agree with us (in the absence of an administrative determination, or judicial
        ruling to the contrary) to characterize and treat the notes for all tax purposes
        as a single financial contract with respect to the Underlying Fund.</font>\n
        \   </div>\n\n   </td>\n\n  </tr>\n\n</table>\n <table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n<tr>\n   <td width=\"0%\" valign = \"baseline\">\n
        \   <div style =\"text-indent:24px;margin-top:6px;\"><font style=\"font-size:9pt;\">&#9632;</font>&nbsp;&nbsp;&nbsp;\n
        \   </div>\n\n   </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style
        =\"margin-top:6px; text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">Under
        this characterization and tax treatment of the notes, a U.S. Holder (as defined
        on page 71 of the prospectus) generally will recognize capital gain or loss
        upon maturity or upon a sale or exchange of the notes prior to maturity. This
        capital gain or loss generally will be long-term capital gain or loss if you
        held the notes for more than one year.</font>\n    </div>\n\n   </td>\n\n
        \ </tr>\n\n</table>\n <table style=\" border-collapse:collapse;\" cellspacing=\"0\"
        cellpadding=\"0\">\n<tr>\n   <td width=\"0%\" valign = \"baseline\">\n    <div
        style =\"text-indent:24px;margin-top:6px;\"><font style=\"font-size:9pt;\">&#9632;</font>&nbsp;&nbsp;&nbsp;\n
        \   </div>\n\n   </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style
        =\"margin-top:6px; text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">No
        assurance can be given that the Internal Revenue Service (&#8220;IRS&#8221;)
        or any court will agree with this characterization and tax treatment.</font>\n
        \   </div>\n\n   </td>\n\n  </tr>\n\n</table>\n <table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n<tr>\n   <td width=\"0%\" valign = \"baseline\">\n
        \   <div style =\"text-indent:24px;margin-top:6px;\"><font style=\"font-size:9pt;\">&#9632;</font>&nbsp;&nbsp;&nbsp;\n
        \   </div>\n\n   </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style
        =\"margin-top:6px; text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">Under
        current IRS guidance, withholding on &#8220;dividend equivalent&#8221; payments
        (as discussed in the product supplement), if any, will not apply to notes
        that are issued as of the date of this term sheet unless such notes are &#8220;delta-one&#8221;
        instruments.</font>\n    </div>\n\n   </td>\n\n  </tr>\n\n</table>\n    <div
        style=\"text-align:left; margin-top:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b>You
        should consult your own tax advisor concerning the U.S. federal income tax
        consequences to you of acquiring, owning, and disposing of the notes, as well
        as any tax consequences arising under the laws of any state, local, foreign,
        or other tax jurisdiction and the possible effects of changes in U.S. federal
        or other tax laws. You should review carefully the discussion under the section
        entitled &#8220;U.S. Federal Income Tax Summary&#8221; beginning on page PS-37
        of </b><b>the accompanying&nbsp;</b><b>product supplement.</b></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:20pt;color:#5B862B;font-family:'Arial',Times,serif;\">Where
        You Can Find More Information</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\">We and BAC have filed
        a registration statement (including a product supplement, a prospectus supplement,
        and a prospectus) with the SEC for the offering to which this term sheet relates.
        \ Before you invest, you should read the Note Prospectus, including this term
        sheet, and the other documents relating to this offering that we and BAC have
        filed with the SEC, for more complete information about us, BAC and this offering.
        \ You may get these documents without cost by visiting EDGAR on the SEC website
        at www.sec.gov. &nbsp;Alternatively, we, any agent, or any dealer participating
        in this offering will arrange to send you these documents if you so request
        by calling MLPF&amp;S or BofAS toll-free at 1-800-294-1322.</font>\n\n    </div>\n\n\n
