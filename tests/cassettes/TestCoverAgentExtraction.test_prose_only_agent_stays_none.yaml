        date that is greater than one business day following the pricing date. Under
        Rule 15c6-1 of the Securities Exchange Act of 1934, as amended, trades in
        the secondary market generally are required to settle in one business day,
        unless the parties to any such trade expressly agree otherwise. Accordingly,
        purchasers who wish to trade the notes more than one&nbsp;business day prior
        to the original issue date will be required to specify alternative settlement
        arrangements to prevent a failed settlement.</font>\n\n    </div>\n\n\n    <div
        style=\"text-align:left; margin-top:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
