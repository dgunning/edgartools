        to be incorrect. The initial estimated value of the notes is an estimate only,
        determined as of the pricing date by reference to our and our affiliates&#8217;
        pricing models. These pricing models consider certain assumptions and variables,
        including our credit spreads and those of BAC, BAC&#8217;s internal funding
        rate on the pricing date, mid-market terms on hedging transactions, expectations
        on interest rates and volatility, price-sensitivity analysis, and the expected
        term of the notes. &nbsp;These pricing models rely in part on certain forecasts
        about future events, which may prove to be incorrect.</font>\n    </div>\n\n
        \  </td>\n\n  </tr>\n\n</table>\n <table style=\" border-collapse:collapse;\"
