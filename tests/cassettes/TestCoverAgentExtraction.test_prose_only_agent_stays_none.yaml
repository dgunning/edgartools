        style=\"font-size:9pt;\">&#9679;</font>&nbsp;&nbsp;&nbsp;\n    </div>\n\n
        \  </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style =\"margin-top:6px;margin-bottom:6px;
        text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">Then,
        the aggregate weight of the companies in the Dow Jones U.S. Select Aerospace
        &amp; Defense Index&nbsp;with a weight greater than 4.5% is capped at 45%.</font>\n
        \   </div>\n\n   </td>\n\n  </tr>\n\n</table>\n    <div style=\"text-align:left;text-indent:-19px;padding-left:19px;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>Index
        Rebalancing</i></b></font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        Dow Jones U.S. Select Aerospace &amp; Defense Index&nbsp;is rebalanced quarterly,
        effective at the open of trading on the Monday following the third Friday
        of March, June, September and December. Component eligibility is determined
        as of the last trading day of the month prior to rebalancing. As part of the
        rebalancing process, index composition, shares and weight caps are adjusted,
        if necessary.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;text-indent:-19px;padding-left:19px;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><i>Additions</i></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left;text-indent:-19px;padding-left:19px;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">With
        the exception of spin-offs, no additions are made to an index between quarterly
        rebalancings.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;text-indent:-19px;padding-left:19px;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><i>Deletions</i></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;margin-bottom:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">Between
        rebalancings, a company can be deleted from an index due to corporate events
        such as mergers, acquisitions, takeovers, delistings or bankruptcies. Deleted
        constituents are not replaced between rebalancings. If, during the course
        of the regular review of company classifications, a constituent&#8217;s sector
        classification changes to an ineligible sector, it is removed from the relevant
        index at the next rebalancing. If a constituent&#8217;s sector classification
        changes due to a corporate action such as a merger or spin-off, it is evaluated
        and may be removed from the relevant index at that time.</font>\n\n    </div>\n\n\n
        \   <div style=\"text-align:left; margin-top:6px;margin-bottom:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">In
        addition to the scheduled quarterly rebalancings, the Dow Jones U.S. Select
        Aerospace &amp; Defense Index is reviewed on an ongoing basis. Changes in
        index composition and related weight adjustments are necessary whenever there
        are extraordinary events such as delistings, bankruptcies, mergers, or takeovers
        involving index components. In these cases, each event will be taken into
        account as soon as it is effective. Whenever possible, the changes in the
        Dow Jones U.S. Select Aerospace &amp; Defense Index&nbsp;components will be
        announced at least two business days prior to their implementation date.</font>\n\n
