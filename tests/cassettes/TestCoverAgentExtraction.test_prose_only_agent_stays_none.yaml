        style=\"text-align:right;padding-left:7px;padding-right:7px; border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n\n\n    </div>\n\n\n   </td>\n\n
        \ </tr>\n\n</table>\n    <div style=\"text-align:left; border-width:1px 1px
        1px 1px; border-style:none none none none;\">\n\n    </div>\n\n    <div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\">\n\n    </div>\n\n\n
        \   <div style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:8px;margin-bottom:8px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:20pt;color:#5B862B;font-family:'Arial',Times,serif;\">Structuring
        the Notes</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        notes are our debt securities, the return on which is linked to the performance
        of the Underlying Fund.  The related guarantees are BAC&#8217;s obligations.
        As is the case for all of our and BAC&#8217;s respective debt securities,
        including our market-linked notes, the economic terms of the notes reflect
        our and BAC&#8217;s actual or perceived creditworthiness at the time of pricing.
        \ In addition, because market-linked notes result in increased operational,
        funding and liability management costs to us and BAC, BAC typically borrows
        the funds under these types of notes at a rate that is more favorable to BAC
        than the rate that it might pay for a conventional fixed or floating rate
        debt security. This rate, which we refer to in this term sheet as BAC&#8217;s
        internal funding rate, is typically lower than the rate BAC would pay when
        it issues conventional fixed or floating rate debt securities. This generally
        relatively lower internal funding rate, which is reflected in the economic
        terms of the notes, along with the fees and charges associated with market-linked
        notes, resulted&nbsp;in the initial estimated value of the notes on the pricing
        date being less than their public offering price.</font>\n\n    </div>\n\n\n
        \   <div style=\"text-align:left; margin-top:6px;border-width:1px 1px 1px
        1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">At
        maturity, we are required to pay the Redemption Amount to holders of the notes,
        which will be calculated based on the performance of the Underlying Fund and
        the $10 per unit principal amount. In order to meet these payment obligations,
        at the time we issue the notes, we may choose to enter into certain hedging
        arrangements (which may include call options, put options or other derivatives)
        with BofAS or one of our other affiliates.  The terms of these hedging arrangements
        are determined by seeking bids from market participants, including MLPF&amp;S,
        BofAS and its affiliates, and take into account a number of factors, including
        our and BAC&#8217;s creditworthiness, interest rate movements, the volatility
        of the Underlying Fund, the tenor of the notes and the tenor of the hedging
        arrangements. &nbsp;The economic terms of the notes and their initial estimated
        value depend in part on the terms of these hedging arrangements.</font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">BofAS
        has advised us that the hedging arrangements will include a hedging-related
        charge of $0.05 per unit, reflecting an estimated profit to be credited to
        BofAS from these transactions. &nbsp;Since hedging entails risk and may be
        influenced by unpredictable market forces, additional profits and losses from
        these hedging arrangements may be realized by BofAS or any third party hedge
        providers.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">For
        further information, see &#8220;Risk Factors&#8221; beginning on page PS-7
        and &#8220;Use of Proceeds&#8221; on page PS-22 of the accompanying product
        supplement.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; margin-top:2px;margin-bottom:2px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n    </div>\n\n    <div
        style=\"text-align:left; margin-top:2px;margin-bottom:2px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n    </div>\n\n    <div
        style=\"text-align:left; margin-top:8px;margin-bottom:8px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:20pt;color:#5B862B;font-family:'Arial',Times,serif;\">Validity
        of the Notes</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">In
        the opinion of McGuireWoods LLP, as counsel to BofA Finance, as issuer, and
        BAC, as guarantor, when the trustee has made the appropriate entries or notations
        on Schedule 1 to the master global note that represents the notes (the &#8220;Master
        Note&#8221;) identifying the notes offered hereby as supplemental obligations
        thereunder in accordance with the instructions of BofA Finance, and the notes
        have been delivered against payment therefor as contemplated in this term
        sheet and the related prospectus, prospectus supplement and product supplement,
        all in accordance with the provisions of the indenture governing the notes
        and the related guarantee, such notes will be the legal, valid and binding
        obligations of BofA Finance, and the related guarantee will be the legal,
        valid and binding obligation of BAC, subject, in each case, to the effects
        of applicable bankruptcy, insolvency (including laws relating to preferences,
        fraudulent transfers and equitable subordination), reorganization, moratorium
        and other similar laws affecting creditors&#8217; rights generally, and to
        general principles of equity. This opinion is given as of the date of this
        term sheet and is limited to the Delaware General Corporation Law and the
        Delaware Limited Liability Company Act (including the statutory provisions,
        all applicable provisions of the Delaware Constitution and reported judicial
        decisions interpreting either of the foregoing) and the laws of the State
        of New York as in effect on the date hereof. In addition, this opinion is
        subject to customary assumptions about the trustee&#8217;s authorization,
        execution and delivery of the indenture governing the notes and due authentication
        of the Master Note, the validity, binding nature and enforceability of the
        indenture governing the notes and the related guarantee with respect to the
        trustee, the legal capacity of individuals, the genuineness of signatures,
        the authenticity of all documents submitted to McGuireWoods LLP as originals,
        the conformity to original documents of all documents submitted to McGuireWoods
        LLP as copies thereof, the authenticity of the originals of such copies and
        certain factual matters, all as stated in the opinion letter of McGuireWoods
        LLP dated December&#160;8, 2022, which has been filed as an exhibit to the
        Registration Statement (File Nos. 333-268718 and 333-268718-01) of BAC and
        BofA Finance, filed with the SEC&nbsp;on December&#160;8, 2022.</font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; border-width:1px 1px 1px
        1px; border-style:none none none none;\">\n\n    </div>\n\n <table width=
