        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\">MLPF&amp;S and BofAS
        may repurchase and resell the notes, with repurchases and resales being made
        at prices related to then-prevailing market prices or at negotiated prices,
        and these will include MLPF&amp;S&#8217;s and BofAS&#8217;s trading commissions
        and mark-ups or mark-downs. MLPF&amp;S and BofAS may act as principal or agent
        in these market-making transactions; however, neither is obligated to engage
        in any such transactions. At their discretion, for a short, undetermined initial
        period after the issuance of the notes, MLPF&amp;S and BofAS may offer to
        buy the notes in the secondary market at a price that may exceed the initial
        estimated value of the notes. Any price offered by MLPF&amp;S or BofAS for
        the notes will be based on then-prevailing market conditions and other considerations,
        including the performance of the Underlying Fund and the remaining term of
        the notes. However, neither we nor any of our affiliates is obligated to purchase
        your notes at any price, or at any time, and we cannot assure you that we
        or any of our affiliates will purchase your notes at a price that equals or
        exceeds the&nbsp;initial estimated value of the notes.</font>\n\n    </div>\n\n\n
