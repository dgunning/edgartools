        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:20pt;color:#5B862B;font-family:'Arial',Times,serif;\">The&nbsp;Underlying
        Fund</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">All
        disclosures contained in this term sheet regarding the Underlying Fund, including,
        without limitation, its make-up, method of calculation, and changes in its
        components, have been derived from publicly available sources. The information
        reflects the policies of, and is subject to change by, BlackRock Fund Advisors,
        the advisor to the Underlying Fund. The advisor, which licenses the copyright
        and all other rights to the Underlying Fund, has no obligation to continue
        to publish, and may discontinue publication of, the Underlying Fund. The consequences
        of the advisor discontinuing publication of the Underlying Fund are discussed
        in the section entitled &#8220;Description of the ARNs &#8211; Anti-Dilution
        and Discontinuance Adjustments Relating to Underlying Funds&#8212;Discontinuance
        of or Material Change to an Underlying Fund&#8221; beginning on page PS-31
        of the accompanying product supplement. &nbsp;None of us, BAC, the calculation
        agent, MLPF&amp;S or BofAS accepts any responsibility for the calculation,
        maintenance, or publication of the Underlying Fund or any successor underlying
        fund.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b>The
        iShares</b><b><sup>&#174;</sup></b><b>&nbsp;U.S. Aerospace &amp; Defense ETF</b></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        ITA seeks to provide investment results that correspond generally to the price
        and yield performance, before fees and expenses, of the Dow Jones U.S. Select
        Aerospace &amp; Defense Index, its underlying index. The Dow Jones U.S. Select
        Aerospace &amp; Defense Index was developed by S&amp;P Dow Jones Indices and
        is designed to track the performance of companies in the aerospace and defense
        sector. The ITA uses a representative sampling strategy to try to track the
        Dow Jones U.S. Select Aerospace &amp; Defense Index and generally will invest
        at least 80% of its assets in the components of the&nbsp;Dow Jones U.S. Select
        Aerospace &amp; Defense Index. The returns of the ITA will be reduced by certain
        management fees and other expenses, which are detailed in its prospectus.</font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left;text-indent:-19px;padding-left:19px;
        margin-top:6px;margin-bottom:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n    </div>\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b>The
        Dow Jones U.S. Select Aerospace &amp; Defense Index</b></font>\n\n    </div>\n\n\n
        \   <div style=\"text-align:left; margin-top:6px;border-width:1px 1px 1px
        1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>General</i></b></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        Dow Jones U.S. Select Aerospace &amp; Defense Index is a float-adjusted market
        capitalization-weighted index that is designed to measure the performance
        of U.S. companies in the aerospace and defense sector. Component companies
        consist of manufacturers, assemblers and distributors of aircraft and aircraft
        parts primarily used in commercial or private air transport and producers
        of components and equipment for the defense industry, including military aircraft,
        radar equipment and weapons. The Dow Jones U.S. Select Aerospace &amp; Defense
        Index has a base date of December 31, 1991. The Dow Jones U.S. Select Aerospace
        &amp; Defense Index&nbsp;is reported by Bloomberg L.P. under the ticker symbol
        &#8220;DJSASD.&#8221;</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>Index Eligibility</i></b></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        index universe includes all common stocks of companies in the Dow Jones U.S.
        Broad Stock Market Index that are categorized into the aerospace or defense
        sectors, based on a proprietary classification system used by S&amp;P Dow
        Jones Indices. The Dow Jones U.S. Broad Stock Market Index is designed to
        measure the performance of large- and small-capitalization U.S. equity securities.
        To be eligible for inclusion in the Dow Jones U.S. Broad Stock Market Index,
        a company must (1) be a &#8220;U.S. company&#8221;, which is generally defined
        as a company that files 10-K annual reports and for which the U.S. portion
        of fixed assets and revenues constitute a plurality of the total, but need
        not exceed 50%, (2) primary listing must be on one of the following U.S. stock
        exchanges: NYSE, NASDAQ Capital Market, NYSE Arca, CBOE BZX, NYSE American,
        CBOE BYX, NASDAQ Global Select Market, CBOE EDGA, NASDAQ Select Market, CBOE
        EDGX, Investors Exchange (IEX) and (3) a corporation (including equity and
        mortgage REITs). Only common stock of a company is eligible for inclusion
        in the Dow Jones U.S. Broad Stock Market Index. All publicly listed multiple
        share class lines are eligible for inclusion in the&nbsp;Dow Jones U.S. Select
        Aerospace &amp; Defense Index, subject to meeting the eligibility criteria.</font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>Constituent
        Selection</i></b></font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\">On the last business
        day of the month prior to the quarterly rebalancing, a nonconstituent company
        must have float-adjusted market capitalization of at least $500 million to
        enter the Dow Jones U.S. Select Aerospace &amp; Defense Index. If a company
        is already an index constituent, its float-adjusted market capitalization
        must be at least $250 million to remain in the&nbsp;Dow Jones U.S. Select
        Aerospace &amp; Defense Index. At each quarterly rebalancing, if the component
        count is less than 22 after applying the rules set forth in the eligibility
        criteria, the market capitalization requirement is relaxed so that the next
        largest non-component in the eligible universe is added until the component
        count reaches 22.</font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>Index Calculation</i></b></font>\n\n
        \   </div>\n\n\n    <div style=\"text-align:left; margin-top:6px;border-width:1px
        1px 1px 1px; border-style:none none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The
        Dow Jones U.S. Select Aerospace &amp; Defense Index is a capped, float-adjusted
        market capitalization-weighted index. On any given day, the index value of
        the Dow Jones U.S. Select Aerospace &amp; Defense Index is the total float-adjusted
        market capitalization of the Dow Jones U.S. Select Aerospace &amp; Defense
        Index&#8217;s constituents divided by its divisor. The float-adjusted market
        capitalization reflects the price of each stock in the Dow Jones U.S. Select
        Aerospace &amp; Defense Index&nbsp;multiplied by the number of shares used
        in the index value calculation, and reflects adjustments from an additional
        weight factor used to confine constituents to a maximum weight and distribute
        excess weight among remaining constituents.</font>\n\n    </div>\n\n\n    <div
        style=\"text-align:left; margin-top:6px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\">\n<font style=\"font-size:9pt;font-family:'Arial',Times,serif;\"><b><i>Constituent
        Weighting</i></b></font>\n\n    </div>\n\n\n    <div style=\"text-align:left;
        margin-top:6px;border-width:1px 1px 1px 1px; border-style:none none none none;\">\n<font
        style=\"font-size:9pt;font-family:'Arial',Times,serif;\">The Dow Jones U.S.
        Select Aerospace &amp; Defense Index&nbsp;is weighted by float-adjusted market
        capitalization, subject to the following adjustments, which are made as part
        of the quarterly rebalancings in March, June, September, and December:</font>\n\n
        \   </div>\n\n\n <table style=\" border-collapse:collapse;\" cellspacing=\"0\"
        cellpadding=\"0\">\n<tr>\n   <td width=\"0%\" valign = \"baseline\">\n    <div
        style =\"text-indent:24px;margin-top:6px;\"><font style=\"font-size:9pt;\">&#9679;</font>&nbsp;&nbsp;&nbsp;\n
