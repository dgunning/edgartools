        \  </td>\n\n   <td style=\"padding-top:4px;\">\n    <div style =\"margin-top:6px;margin-bottom:6px;
        text-align:left;\"><font style=\"font-size:9pt;font-family:'Arial',Times,serif;\">If
        any company&#8217;s weight exceeds 22.5%, that company&#8217;s weight is capped
        at 22.5% and all excess weight is proportionally redistributed to all uncapped
        companies within the&nbsp;Dow Jones U.S. Select Aerospace &amp; Defense Index.
        If after this redistribution, any company breaches the 22.5% weight cap, the
        process is repeated iteratively until no company breaches the 22.5% weight
        cap.</font>\n    </div>\n\n   </td>\n\n  </tr>\n\n</table>\n <table style=\"
        border-collapse:collapse;\" cellspacing=\"0\" cellpadding=\"0\">\n<tr>\n   <td
