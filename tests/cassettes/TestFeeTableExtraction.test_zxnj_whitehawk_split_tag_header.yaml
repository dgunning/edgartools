        of Directors and Officers</I></B><B> </B></P></TD></TR></TABLE>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">Under Section&nbsp;145
        of the Delaware General Corporation Law (the &#147;<B>DGCL</B>&#148;), we
        have broad powers to indemnify our directors and officers\nagainst liabilities
        they may incur in such capacities, including liabilities under the Securities
        Act of 1933, as amended, or the Securities Act. Section&nbsp;145 of the DGCL
        generally provides that a Delaware corporation has the power to indemnify\nits
        present and former directors, officers, employees and agents against expenses
        incurred by them in connection with any suit to which they are or are threatened
        to be made, a party by reason of their serving in such positions so long as
        they acted\nin good faith and in a manner they reasonably believed to be in
        or not opposed to, the best interests of the corporation and, with respect
        to any criminal action, they had no reasonable cause to believe their conduct
        was unlawful. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">Our Amended and Restated Certificate of Incorporation
        and Amended and Restated Bylaws (&#147;<B>Bylaws</B>&#148;) provide that we
        will limit the liability of\nour directors, and may indemnify our directors
        and officers, to the maximum extent permitted by the DGCL. The DGCL provides
        that directors of a corporation will not be personally liable for monetary
        damages for breach of their fiduciary duties as\ndirectors, except for liability
        for any: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
