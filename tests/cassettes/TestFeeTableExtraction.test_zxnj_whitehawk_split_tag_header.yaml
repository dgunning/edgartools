        warrants does not have the right to exercise <FONT STYLE=\"white-space:nowrap\">pre-funded</FONT>
        warrants if such\nholder, together with its affiliates, would beneficially
        own in excess of 4.99%, 9.99% or 19.99%, at the election of the holder, of
        the number of shares of our common stock outstanding immediately before or
        after giving effect to such exercise (the\n&#147;<B>Beneficial Ownership Limitation</B>&#148;);
        provided, however, that each holder may increase the Beneficial Ownership
        Limitation by giving at least 61 days&#146; notice to the Company, but not
        in excess of 19.99%. Throughout this\nprospectus, when we refer to the shares
        of common stock being registered on behalf of the selling stockholders, we
        are referring to the outstanding shares of our common stock and the shares
        issuable upon the exercise of outstanding <FONT\nSTYLE=\"white-space:nowrap\">pre-funded</FONT>
        warrants without giving effect to the Beneficial Ownership Limitation. </P>
