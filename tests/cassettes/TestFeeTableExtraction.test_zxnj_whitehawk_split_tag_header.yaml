        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">Registration
        Statement on Form <FONT STYLE=\"white-space:nowrap\">S-3</FONT> </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">Ladies and Gentlemen: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">This opinion is furnished to
        you in\nconnection with the Registration Statement on Form <FONT STYLE=\"white-space:nowrap\">S-3</FONT>
        (the &#147;<U>Registration Statement</U>&#148;), filed by Whitehawk Therapeutics,
        Inc. (f/k/a Aadi Bioscience, Inc.), a Delaware corporation (the\n&#147;<U>Company</U>&#148;)
        with the United States Securities and Exchange Commission (the &#147;<U>Commission</U>&#148;)
        on the date hereof in connection with the registration under the Securities
        Act of 1933, as amended (the &#147;<U>Securities\nAct</U>&#148;), of the offer
        and resale of an aggregate of 41,668,500 shares (the &#147;<U>Shares</U>&#148;)
        of the Company&#146;s common stock, $0.0001 par value per share (the &#147;<U>Common
        Stock</U>&#148;). All of the Shares are being\nregistered for resale on behalf
        of certain stockholders of the Company, including their transferees, pledgees
        or donees or their respective successors (the &#147;<U>Selling Stockholders</U>&#148;),
        pursuant to a Registration Rights Agreement, dated\nMarch 4, 2025, by and
        among the Company and the Selling Stockholders (the &#147;<U>Registration
        Rights Agreement</U>&#148;). The Shares consist of (i) 21,592,000 outstanding
        shares of Common Stock (the &#147;Common Shares&#148;) that are held by\ncertain
        of the Selling Stockholders and (ii) 20,076,500 shares of Common Stock issuable
        upon the exercise of outstanding <FONT STYLE=\"white-space:nowrap\">pre-funded</FONT>
        warrants (the &#147;<U>Warrants</U>&#148;) to purchase shares of Common Stock\n(the
        &#147;<U>Warrant Shares</U>&#148;) that are held by certain of the Selling
        Stockholders. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">We are acting as counsel for the Company in
        connection with\nthe registration of the Shares for offer and resale. As such
        counsel, we have made such legal and factual examinations and inquiries as
        we have deemed necessary or advisable for the purpose of rendering the opinions
        and statements set forth below.\nIn rendering the opinions and statements
        expressed below, we have examined originals or copies, certified or otherwise
        identified to our satisfaction, of such documents, corporate records, certificates
        of public officials and other instruments as we\nhave deemed necessary for
        the purposes of rendering this opinion. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
