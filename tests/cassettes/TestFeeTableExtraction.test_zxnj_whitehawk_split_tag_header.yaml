        align=\"left\">\n\n<div style =\"BORDER-BOTTOM:1.00pt solid #000000;BORDER-LEFT:1.00pt
        solid #000000;BORDER-RIGHT:1.00pt solid #000000;BORDER-TOP:1.00pt solid #000000;MARGIN-LEFT:0px;
        MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%; margin-top:1.5%;
        margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A
        NAME=\"toc906583_1\"></A>PROSPECTUS SUMMARY </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><I>This summary
        highlights important features of this offering and the information contained
        elsewhere in or incorporated by reference into this prospectus.\nBecause this
        is only a summary, it does not contain all of the information that you should
        consider before investing in our securities. You should carefully read this
        entire prospectus and any applicable prospectus supplement, including the\ninformation
        contained under the heading &#147;Risk Factors,&#148; and all other information
        included or incorporated by reference into this prospectus and any applicable
        prospectus supplement in their entirety before you invest in our securities.\n</I></P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><I>Unless otherwise stated, all references in this prospectus
        to &#147;we,&#148; &#147;us,&#148; &#147;our,&#148; &#147;Whitehawk,&#148;
        the\n&#147;Company&#148; and similar designations refer to Whitehawk Therapeutics,
        Inc., together with its consolidated subsidiaries. </I></P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Company
        Overview\n</B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">We are an oncology therapeutics company applying
        advanced technologies to established tumor biology that are intended to efficiently
        deliver improved\ncancer treatments. We have deep experience in chemistry,
        formulation, and drug delivery, as well as research, clinical, and commercial
        pharmaceutical development, resulting in successfully taking product candidates
        from the clinic to approval,\nlaunch, and commercialization. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">We recently
        entered into an intellectual property license agreement (the &#147;<B>WuXi
        License Agreement</B>&#148;) with\nWuXi Biologics (Shanghai FX) Co., Ltd.
        (&#147;<B>WuXi Biologics</B>&#148;) for the development and global commercialization
        of a portfolio of three next generation antibody drug conjugates (&#147;<B>ADCs</B>&#148;)
        targeting clinically validated,\nbroadly overexpressed tumor antigens in high
        potential cancer indications with significant unmet need. These ADCs are constructed
        utilizing an advanced linker-payload platform called CPT113 that has been
        shown to provide increased stability in blood\ncirculation and deliver targeted
        release of a Topoisomerase I (&#147;<B>TOPO1</B>&#148;) inhibitor payload
        into cancer cells. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">These <FONT\nSTYLE=\"white-space:nowrap\">in-licensed</FONT>
        assets originated through the collaborative efforts of WuXi Biologics, a leading
        global contract research, development and manufacturing organization (&#147;<B>CRDMO</B>&#148;),
        and Hangzhou DAC\nBiotechnology (&#147;<B>Hangzhou DAC</B>&#148;), a global
        leader in ADC innovation, where Hangzhou DAC&#146;s CPT113 linker-payload
        has been conjugated to novel antibodies developed by WuXi Biologics against
        three tumor targets: Protein Tyrosine\nKinase 7 (&#147;<B>PTK7</B>&#148;),
        Mucin 16 (&#147;<B>MUC16</B>&#148;) and <FONT STYLE=\"white-space:nowrap\">Seizure-related</FONT>
        Protein 6 (&#147;<B>SEZ6</B>&#148;). The antibody targeting MUC16 targets
        the membrane-bound form of MUC16 (mMUC16).\nThe antibody targeting SEZ6 is
        a biparatopic SEZ6 (&#147;<B>biSEZ6</B>&#148;) antibody targeting two different
        epitopes on SEZ6. We believe the resulting ADCs will be able to target cancers
        expressing these respective tumor markers precisely and\ndeliver the potent,
        cytotoxic TOPO1 inhibitor at the site of cancer. Each of these ADCs have demonstrated
        tumor cell binding, tumor cell line cytotoxicity, and <I>in vivo</I> antitumor
        activity in preclinical models of cancer. We refer to these <FONT\nSTYLE=\"white-space:nowrap\">in-licensed</FONT>
        ADC assets as the &#147;ADC Therapies&#148; herein. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">We anticipate
        submitting three investigational new drug\n(&#147;<B>IND</B>&#148;) applications
        with the U.S. Food and Drug Administration (&#147;<B>FDA</B>&#148;) in the
        coming 12 to 24 months, starting with <FONT STYLE=\"white-space:nowrap\">HWK-007</FONT>
        for the treatment of solid tumors, including <FONT\nSTYLE=\"white-space:nowrap\">non-small</FONT>
        cell lung cancer (&#147;<B>NSCLC</B>&#148;) and ovarian cancer, in the second
        half of 2025; <FONT STYLE=\"white-space:nowrap\">HWK-016</FONT> for the treatment
        of cancers of female origin by the end of 2025;\nand <FONT STYLE=\"white-space:nowrap\">HWK-206</FONT>
        for the treatment of cancers of neuroendocrine origin in <FONT STYLE=\"white-space:nowrap\">mid-2026.</FONT>
        With these three assets, we have the ability to pursue multiple cancer indications
        with\nhigh potential in large addressable patient populations, including and
        beyond those indications currently expected to be targeted in the upcoming
        Phase 1 trials. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">Our track record of strong execution of novel
        drug formulation, research, clinical development, and commercialization in
        oncology, combined with our deep\nunderstanding of ADCs positions us to unlock
        the high potential of this differentiated ADC portfolio. Our management team
        has extensive experience in the discovery, </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">1 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<div style =\"BORDER-BOTTOM:1.00pt
        solid #000000;BORDER-LEFT:1.00pt solid #000000;BORDER-RIGHT:1.00pt solid #000000;BORDER-TOP:1.00pt
        solid #000000;MARGIN-LEFT:0px; MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%;
        margin-top:1.5%; margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">\ndevelopment, and commercialization of cancer therapeutics, including
        in senior roles at leading oncology companies. We are supported by our board
        of directors and specialized scientific advisors,\nwho contribute their deep
        understanding of drug discovery and development. Furthermore, our investor
        base includes top life science investors. We believe that our team is well
        positioned to execute our strategy to develop and, if approved,\ncommercialize
        the ADC Therapies and future pipeline assets to ultimately bring broad benefit
        to cancer patients worldwide. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B><I>Legacy FYARRO Business\n</I></B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">Historically, our lead drug product was FYARRO<SUP STYLE=\"font-size:75%;
        vertical-align:top\">&reg;</SUP> (sirolimus protein-bound particles for\ninjectable
        suspension (albumin-bound); <FONT STYLE=\"white-space:nowrap\">nab-sirolimus),</FONT>
        which combines two established technologies: nanoparticle albumin-bound (nab)
        technology and the anti-cancer agent, sirolimus. <FONT\nSTYLE=\"white-space:nowrap\">Nab-sirolimus</FONT>
        is a potent inhibitor of the mTOR biological pathway with demonstrated anti-cancer
        activity in advanced malignant perivascular epithelioid cell tumor (&#147;<B>PEComa</B>&#148;),
        a rare cancer. We\nexclusively licensed FYARRO, previously called <FONT STYLE=\"white-space:nowrap\">ABI-009,</FONT>
        <FONT STYLE=\"white-space:nowrap\">nab-sirolimus,</FONT> from Abraxis BioScience,
        LLC, a wholly owned subsidiary of Celgene Corporation, which is a wholly\nowned
        subsidiary of Bristol-Myers Squibb Company (&#147;BMS&#148;) and we refer
        to the development, production and commercial sale of FYARRO herein as the
        &#147;FYARRO Business.&#148; On February&nbsp;22, 2022, we launched FYARRO
        in the United\nStates for treatment of advanced malignant PEComa and recognized
        net product sales of $26.0&nbsp;million and $24.4&nbsp;million for the years
        ended December&nbsp;31, 2024 and 2023, respectively. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">On December&nbsp;19,
        2024, we entered into a Stock Purchase Agreement (the &#147;<B>Divestiture
        Agreement</B>&#148;) with KAKEN INVESTMENTS INC., a Delaware\ncorporation
        (&#147;<B>Kaken</B>&#148;), KAKEN PHARMACEUTICAL CO., LTD (&#147;<B>Guarantor</B>&#148;),
        and Aadi Subsidiary, Inc., a Delaware corporation and our former wholly owned
        subsidiary and the operating company for the FYARRO Business\n(&#147;<B>Aadi
        Subsidiary</B>&#148;). Under the Divestiture Agreement, Kaken acquired 100%
        of the outstanding shares of capital stock of Aadi Subsidiary from us at the
        closing of the transaction for a cash payment of $102.4&nbsp;million (following\napplicable
        purchase price adjustments under the Divestiture Agreement) (the &#147;<B>FYARRO
        Divestiture</B>&#148;). The divestiture transaction closed on March&nbsp;25,
        2025 and, as a result, we no longer operate the FYARRO Business. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Company Information </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">We were originally incorporated
        in\nthe State of Delaware in November 2007 under the name &#147;Zeta Acquisition
        Corp. II.&#148; Zeta Acquisition Corp. II was a &#147;shell&#148; company
        registered under the Exchange Act with no specific business plan or purpose
        until it began\noperating the business of Aerpio Pharmaceuticals, Inc. through
        a merger in March 2017. In August 2021, we effected a reverse merger pursuant
        to which a wholly owned subsidiary of ours, merged with and into Aadi Subsidiary,
        Inc. (formerly known as\nAadi Bioscience, Inc.) (&#147;<B>Aadi Subsidiary</B>&#148;),
        with Aadi Subsidiary surviving as a wholly owned subsidiary of ours (the &#147;<B>Merger</B>&#148;).
        Upon the closing of the Merger, we changed our name from &#147;Aerpio Pharmaceuticals,\nInc.&#148;
        to &#147;Aadi Bioscience, Inc.&#148; and the name of Private Aadi was changed
        from &#147;Aadi Bioscience, Inc.&#148; to &#147;Aadi Subsidiary, Inc.&#148;
        In connection with the FYARRO Divestiture, Kaken acquired 100% of the outstanding\nshares
        of capital stock of Aadi Subsidiary. On March&nbsp;18, 2025, in connection
        with such transaction, we changed our name from &#147;Aadi Bioscience, Inc.&#148;
        to &#147;Whitehawk Therapeutics, Inc.&#148; </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">Since March
        2025, our principal executive offices have been located at 2 Headquarters
