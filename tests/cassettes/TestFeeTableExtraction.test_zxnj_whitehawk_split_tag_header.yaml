        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">We entered
        into separate indemnification agreements with our directors and executive
        officers in addition to the\nindemnification provided for in our Bylaws. These
        indemnification agreements provide, among other things, that we will indemnify
