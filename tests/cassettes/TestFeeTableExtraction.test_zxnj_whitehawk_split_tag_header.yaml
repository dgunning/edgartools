        font-size:10pt; font-family:Times New Roman\">(a)&#8195;The undersigned registrant
        hereby undertakes; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">(1) To file, during any period
        in which offers or sales are being made, a post-effective amendment to this
        registration statement; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i) To include
        any prospectus required by Section&nbsp;10(a)(3) of the Securities Act of
        1933; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(ii) To reflect in the prospectus
        any facts or events arising after the effective date of the registration statement
        (or the most recent\npost-effective amendment thereof) which, individually
        or in the aggregate, represent a fundamental change in the information set
        forth in the registration statement. Notwithstanding the foregoing, any increase
        or decrease in volume of securities\noffered (if the total dollar value of
        securities offered would not exceed that which was registered) and any deviation
        from the low or high end of the estimated maximum offering range may be reflected
        in the form of prospectus filed with the\nCommission pursuant to Rule&nbsp;424(b)
        if, in the aggregate, the changes in volume and price represent no more than
        20&nbsp;percent change in the maximum aggregate offering price set forth in
        the &#147;Calculation of Registration Fee&#148; table in\nthe effective registration
        statement; and </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(iii) To include any material
        information with respect to the plan of distribution not\npreviously disclosed
        in the registration statement or any material change to such information in
        the registration statement; </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">II-2 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Provided, however,
        that paragraphs (a)(1)(i), (a)(1)(ii) and (a)(1)(iii) do not apply if the\ninformation
        required to be included in a post-effective amendment by those paragraphs
        is contained in reports filed with or furnished to the Commission by the registrant
        pursuant to Section&nbsp;13 or Section&nbsp;15(d) of the Securities Exchange\nAct
        of 1934 that are incorporated by reference in the registration statement,
        or is contained in a form of prospectus filed pursuant to Rule 424(b) that
        is part of the registration statement; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">(2) That, for
        the purpose of determining any liability under the Securities Act of 1933,
        each such post-effective amendment shall be deemed to\nbe a new registration
        statement relating to the securities offered therein, and the offering of
        such securities at that time shall be deemed to be the initial bona fide offering
        thereof; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">(3) To remove from registration
        by means of a post-effective amendment any of the securities being registered
        which remain unsold at the\ntermination of the offering; </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">(4)
        That, for the purpose of determining liability under the Securities Act of
        1933 to any purchaser: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(A) Each prospectus
        filed by the registrant pursuant to Rule 424(b)(3) shall be deemed to be part
        of the registration statement as of the date\nthe filed prospectus was deemed
        part of and included in the registration statement; and </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(B)
        Each prospectus required to be filed pursuant\nto Rule 424(b)(2), (b)(5) or
        (b)(7) as part of a registration statement in reliance on Rule 430B relating
        to an offering made pursuant to Rule 415(a)(1)(i), (vii)&nbsp;or (x)&nbsp;for
        the purpose of providing the information required by\nSection&nbsp;10(a) of
        the Securities Act of 1933 shall be deemed to be part of and included in the
        registration statement as of the earlier of the date such form of prospectus
        is first used after effectiveness or the date of the first contract of\nsale
        of securities in the offering described in prospectus. As provided in Rule
        430B, for liability purposes of the issuer and any person that is at that
        date an underwriter, such date shall be deemed to be a new effective date
        of the registration\nstatement relating to the securities in the registration
        statement to which the prospectus relates, and the offering of such securities
        at that time shall be deemed to be the initial bona fide offering thereof.
        Provided, however, that no statement\nmade in a registration statement or
        prospectus that is part of the registration statement or made in a document
        incorporated or deemed incorporated by reference into the registration statement
        or prospectus that is part of the registration statement\nwill, as to a purchaser
        with a time of contract of sale prior to such effective date, supersede or
        modify any statement that was made in the registration statement or prospectus
        that was part of the registration statement or made in any such\ndocument
        immediately prior to such effective date; and </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">(5)
        The undersigned registrant hereby undertakes that, for purposes of determining\nany
        liability under the Securities Act of 1933, each filing of the registrant&#146;s
        annual report pursuant to section 13(a) or section 15(d) of the Securities
        Exchange Act of 1934 (and, where applicable, each filing of an employee benefit\nplan&#146;s
        annual report pursuant to section 15(d) of the Securities Exchange Act of
        1934) that is incorporated by reference in the registration statement shall
        be deemed to be a new registration statement relating to the securities offered\ntherein,
        and the offering of such securities at that time shall be deemed to be the
        initial bona fide offering thereof. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">(6) Insofar
        as\nindemnification for liabilities arising under the Securities Act of 1933
        may be permitted to directors, officers and controlling persons of the registrant
        pursuant to the foregoing provisions, or otherwise, the registrant has been
        advised that in\nthe opinion of the Securities and Exchange Commission such
        indemnification is against public policy as expressed in the Securities Act
        and is, therefore, unenforceable. In the event that a claim for indemnification
        against such liabilities (other\nthan the payment by the registrant of expenses
        incurred or paid by a director, officer or controlling person of the registrant
        in the successful defense of any action, suit or proceeding) is asserted by
        such director, officer or controlling person\nin connection with the securities
        being registered, the registrant will, unless in the opinion of its counsel
        the matter has been settled by controlling precedent, submit to a court of
        appropriate jurisdiction the question whether such\nindemnification by it
        is against public policy as expressed in the Securities Act and will be governed
        by the final adjudication of such issue. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">II-3 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
