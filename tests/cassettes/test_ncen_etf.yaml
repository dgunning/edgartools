        \  <TITLE>ncenabactiveetfsincbatch2.htm - Generated by SEC Publisher for SEC
        Filing</TITLE>\n</HEAD>\n\n<BODY bgcolor=\"#ffffff\">\n<a name=\"page_1\"></a><a
        name=\"_bclPageBorder1\"></a><DIV STYLE=\"PADDING-RIGHT: 0%; PADDING-LEFT:
        0%\">\n<p align=center style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:center;\"><b><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></b></p>\n\n<p
        align=center style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:center;\"><b><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">Report\nof
        Independent Registered Public Accounting Firm</font></b></p>\n\n<p style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">To
        the Shareholders and Board of Directors of AB Core Plus Bond\nETF, AB New
        York Intermediate Municipal ETF, AB California Intermediate Municipal\nETF,
        and AB Core Bond ETF</font></p>\n\n<p style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">In
        planning and performing our audits of the financial\nstatements of AB Core
        Plus Bond ETF, AB New York Intermediate Municipal ETF, AB\nCalifornia Intermediate
        Municipal ETF and AB Core Bond ETF (the &#8220;Funds&#8221;) (four\nof the
        funds constituting AB Active ETFs, Inc.) as of and for the year or period\nended
        November 30, 2025, in accordance with the standards of the Public Company\nAccounting
        Oversight Board (United States) (PCAOB), we considered the Funds&#8217; internal\ncontrol
        over financial reporting, including controls over safeguarding\nsecurities,
        as a basis for designing our auditing procedures for the purpose of\nexpressing
        our opinion on the financial statements and to comply with the\nrequirements
        of Form N-CEN, but not for the purpose of expressing an opinion on\nthe effectiveness
        of the Funds&#8217; internal control over financial reporting.\nAccordingly,
        we express no such opinion.&#160; </font></p>\n\n<p style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">The
        management of the Funds is responsible for\nestablishing and maintaining effective
        internal control over financial\nreporting. In fulfilling this responsibility,
        estimates and judgments by\nmanagement are required to assess the expected
        benefits and related costs of\ncontrols. A fund&#8217;s internal control over
        financial reporting is a process\ndesigned to provide reasonable assurance
        regarding the reliability of financial\nreporting and the preparation of financial
        statements for external purposes in\naccordance with U.S. generally accepted
        accounting principles. A fund&#8217;s internal\ncontrol over financial reporting
        includes those policies and procedures that\n(1) pertain to the maintenance
        of records that, in reasonable detail,\naccurately and fairly reflect the
        transactions and dispositions of the assets\nof the fund; (2) provide reasonable
        assurance that transactions are recorded as\nnecessary to permit preparation
        of financial statements in accordance with U.S.\ngenerally accepted accounting
        principles, and that receipts and expenditures of\nthe fund are being made
        only in accordance with authorizations of management\nand directors of the
        fund; and (3) provide reasonable assurance regarding\nprevention or timely
        detection of unauthorized acquisition, use or disposition\nof a fund&#8217;s
        assets that could have a material effect on the financial\nstatements.</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">Because
        of its inherent limitations, internal control\nover financial reporting may
        not prevent or detect misstatements. Also,\nprojections of any evaluation
        of effectiveness to future periods are subject to\nthe risk that controls
        may become inadequate because of changes in conditions,\nor that the degree
        of compliance with the policies or procedures may\ndeteriorate. </font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">A
        deficiency in internal control over financial\nreporting exists when the design
        or operation of a control does not allow\nmanagement or employees, in the
        normal course of performing their assigned\nfunctions, to prevent or detect
        misstatements on a timely basis. A material\nweakness is a deficiency, or
        a combination of deficiencies, in internal control\nover financial reporting,
        such that there is a reasonable possibility that a\nmaterial misstatement
        of the fund&#8217;s annual or interim financial statements will\nnot be prevented
        or detected on a timely basis.</font></p>\n\n<p style=\"margin-bottom:0in;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">&nbsp;</font></p>\n\n<p
        style=\"margin-bottom:10.0pt;margin-left:0in;margin-right:0in;margin-top:0in;text-align:justify;text-justify:inter-ideograph;\"><font
        face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">Our\nconsideration
        of the Funds&#8217; internal control over financial reporting was for\nthe
        limited purpose described in the first paragraph and would not necessarily\ndisclose
        all deficiencies in </font><font face=\"times new roman\" lang=EN-US style=\"font-size:12.0pt;line-height:normal;\">internal
        control that\nmight be material weaknesses under standards established by
        the PCAOB. However,\nwe noted no deficiencies in the Funds&#8217; internal
        control over financial\nreporting and their operation, including controls
        over safeguarding securities that\nwe consider to be a material weakness as
        defined above as of November 30, 2025.</font></p>\n</DIV><HR noshade align=\"center\"
