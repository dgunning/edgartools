        \ style = \"border-bottom:1px solid #A6A6A6;  \" ><div style=\"text-align:left;padding-left:7px;padding-right:7px;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div></td>\n
        \ </tr>\n  <tr>\n    <td  colspan=\"1\"  width=\"100%\"  rowspan=\"1\"  valign=\"top\"
        ><div style=\"text-align:left;padding-left:7px;padding-right:7px; border-width:1px
        1px 1px 1px; border-style:none none none none;\"> </div></td>\n  </tr>\n</table>\n<div
        style=\"text-align:left; margin-bottom:20px;border-width:1px 1px 1px 1px;
        border-style:none none none none;\"> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        IRS released Notice 2008-2 (the \"Notice\"), which sought comments from the
        public on the taxation of financial instruments currently taxed as &#8220;prepaid
        forward contracts.&#8221; This Notice addresses instruments such as the Notes.
        According to the Notice, the IRS and Treasury are considering whether a holder
        of an instrument such as the Notes should be required to accrue ordinary income
        on a current basis, regardless of whether any payments are made prior to maturity.
        It is not possible to determine what guidance the IRS and Treasury will ultimately
        issue, if any. Any such future guidance may affect the amount, timing and
        character of income, gain, or loss in respect of the Notes, possibly with
        retroactive effect.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        IRS and Treasury are also considering additional issues, including whether
        additional gain or loss from such instruments should be treated as ordinary
        or capital, whether foreign holders of such instruments should be subject
        to withholding tax on any deemed income accruals, whether Section 1260 of
        the Code, concerning certain &#8220;constructive ownership transactions,&#8221;
        generally applies or should generally apply to such instruments, and whether
        any of these determinations depend on the nature of the underlying asset.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">In
        addition, proposed Treasury regulations require the accrual of income on a
        current basis for contingent payments made under certain notional principal
        contracts. The preamble to the regulations states that the &#8220;wait and
        see&#8221; method of accounting does not properly reflect the economic accrual
        of income on those contracts, and requires current accrual of income for some
        contracts already in existence. While the proposed regulations do not apply
        to prepaid forward contracts, the preamble to the proposed regulations expresses
        the view that similar timing issues exist in the case of prepaid forward contracts.
        If the IRS or Treasury publishes future guidance requiring current economic
        accrual for contingent payments on prepaid forward contracts, it is possible
        that you could be required to accrue income over the term of the Notes.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Because
        of the absence of authority regarding the appropriate tax characterization
        of the Notes, it is also possible that the IRS could seek to characterize
        the Notes in a manner that results in tax consequences that are different
        from those described above. For example, the IRS could possibly assert that
        any gain or loss that a holder may recognize at maturity or upon the sale,
        or exchange of the Notes should be treated as ordinary gain or loss.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Because
        the Underlying is an index that periodically rebalances, it is possible that
        the Notes could be treated as a series of single financial contracts, each
        of which matures on the next rebalancing date. If the Notes were properly
        characterized in such a manner, a U.S. Holder would be treated as disposing
        of the Notes on each rebalancing date in return for new Notes that mature
        on the next rebalancing date, and a U.S. Holder would accordingly likely recognize
        capital gain or loss on each rebalancing date equal to the difference between
        the holder&#8217;s tax basis in the Notes (which would be adjusted to take
        into account any prior recognition of gain or loss) and the fair market value
        of the Notes on such date.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>Non-U.S.
        Holders</b></font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Except
        as discussed below, a Non-U.S. Holder generally will not be subject to U.S.
        federal income or withholding tax for amounts paid in respect of the Notes
        provided that the Non-U.S. Holder complies with applicable certification requirements
        and that the payment is not effectively connected with the conduct by the
        Non-U.S. Holder of a U.S. trade or business. Notwithstanding the foregoing,
        gain from the sale, or exchange of the Notes or their settlement at maturity
        may be subject to U.S. federal income tax if that Non-U.S. Holder is a non-resident
        alien individual and is present in the U.S. for 183 days or more during the
        taxable year of the sale, exchange, or settlement and certain other conditions
        are satisfied.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">If
        a Non-U.S. Holder of the Notes is engaged in the conduct of a trade or business
        within the U.S. and if any gain realized on the settlement at maturity, or
        upon sale, or exchange of the Notes, is effectively connected with the conduct
        of such trade or business (and, if certain tax treaties apply, is attributable
        to a permanent establishment maintained by the Non-U.S. Holder in the U.S.),
        the Non-U.S. Holder, although exempt from U.S. federal withholding tax, generally
        will be subject to U.S. federal income tax on such gain on a net income basis
        in the same manner as if it were a U.S. Holder. Such Non-U.S. Holders should
        read the material under the heading &#8220;&#8212;U.S. Holders,&#8221; for
        a description of the U.S. federal income tax consequences of acquiring, owning,
        and disposing of the Notes. In addition, if such Non-U.S. Holder is a foreign
        corporation, it may also be subject to a branch profits tax equal to 30% (or
        such lower rate provided by any applicable tax treaty) of a portion of its
        earnings and profits for the taxable year that are effectively connected with
        its conduct of a trade or business in the U.S., subject to certain adjustments.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">A
        &#8220;dividend equivalent&#8221; payment is treated as a dividend from sources
        within the United States and such payments generally would be subject to a
        30% U.S. withholding tax if paid to a Non-U.S. Holder. Under Treasury regulations,
        payments (including deemed payments) with respect to equity-linked instruments
        (&#8220;ELIs&#8221;) that are &#8220;specified ELIs&#8221; may be treated
        as dividend equivalents if such specified ELIs reference an interest in an
        &#8220;underlying security,&#8221; which is generally any interest in an entity
        taxable as a corporation for U.S. federal income tax purposes if a payment
        with respect to such interest could give rise to a U.S. source dividend. However,
        IRS guidance provides that withholding on dividend equivalent payments will
        not apply to specified ELIs that are not delta-one instruments and that are
        issued before January 1, 2027. Based on our determination that the Notes are
        not delta-one instruments, Non-U.S. Holders should not be subject to withholding
        on dividend equivalent payments, if any, under the Notes. However, it is possible
        that the Notes could be treated as deemed reissued for U.S. federal income
        tax purposes upon the occurrence of certain events affecting the Underlying
        or the Notes, and following such occurrence the Notes could be treated as
        subject to withholding on dividend equivalent payments. Non-U.S. Holders that
        enter, or have entered, into other transactions in respect of the Underlying
        or the Notes should consult their tax advisors as to the application of the
        dividend equivalent withholding tax in the context of the Notes and their
        other transactions. If any payments are treated as dividend equivalents subject
        to withholding, we (or the applicable paying agent) would be entitled to withhold
        taxes without being required to pay any additional amounts with respect to
        amounts so withheld.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">As
        discussed above, alternative characterizations of the Notes for U.S. federal
        income tax purposes are possible. Should an alternative characterization,
        by reason of change or clarification of the law, by regulation or otherwise,
        cause payments as to the Notes to become subject to withholding tax, tax will
        be withheld at the applicable statutory rate. As discussed above, the IRS
        has indicated in the Notice that it is considering whether income in respect
        of</font> </div>\n<div style=\"text-align:left; border-width:1px 1px 1px 1px;
        border-style:none none none none;\"> </div>\n<table  width=\"100%\"  cellpadding
        = \"0\"  cellspacing = \".0\"  style = \" border-collapse:collapse; margin-top:20px;\"
