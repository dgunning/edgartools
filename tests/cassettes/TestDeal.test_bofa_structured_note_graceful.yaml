        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> <font style=\"font-size:17pt;font-family:'Helvetica',Times,serif;\">Structuring
        the Notes</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        Notes are our debt securities, the return on which is linked to the performance
        of the Underlying. The related guarantee is BAC&#8217;s obligation. As is
        the case for all of our and BAC&#8217;s respective debt securities, including
        our market-linked notes, the economic terms of the Notes reflect our and BAC&#8217;s
        actual or perceived creditworthiness at the time of pricing. In addition,
        because market-linked notes result in increased operational, funding and liability
        management costs to us and BAC, BAC typically borrows the funds under these
        types of notes at a rate, which we refer to in this pricing supplement as
        BAC&#8217;s internal funding rate, that is more favorable to BAC than the
        rate that it might pay for a conventional fixed or floating rate debt security.
        This generally relatively lower internal funding rate, which is reflected
        in the economic terms of the Notes, along with the fees and charges associated
        with market-linked notes, typically results in the initial estimated value
        of the Notes on the pricing date being less than their public offering price.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">In
        order to meet our payment obligations on the Notes, at the time we issue the
        Notes, we may choose to enter into certain hedging arrangements (which may
        include call options, put options or other derivatives) with BofAS or one
        of our other affiliates. The terms of these hedging arrangements are determined
        based upon terms provided by BofAS and its affiliates, and take into account
        a number of factors, including our and BAC&#8217;s creditworthiness, interest
        rate movements, the volatility of the Underlying, the tenor of the Notes and
        the hedging arrangements. The economic terms of the Notes and their initial
        estimated value depend in part on the terms of these hedging arrangements.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">BofAS
        has advised us that the hedging arrangements will include hedging related
        charges, reflecting the costs associated with, and our affiliates&#8217; profit
        earned from, these hedging arrangements. Since hedging entails risk and may
        be influenced by unpredictable market forces, actual profits or losses from
        these hedging transactions may be more or less than any expected amounts.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
