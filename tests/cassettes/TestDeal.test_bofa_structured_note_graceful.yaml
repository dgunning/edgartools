        style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">Approximate
        18 month term.</font> </div></td>\n  </tr>\n</table>\n<table style=\" border-collapse:collapse;\"
        cellspacing=\"0\" cellpadding=\"0\">\n  <tr>\n    <td width=\"0%\" valign
        = \"baseline\"><div style =\"text-indent:16px;\"><font style=\"font-size:16px;color:#5F8CD6;font-family:Calibri
