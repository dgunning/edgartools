        style =\" text-align:left;\"><font style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\"><b>Trading
        and hedging activities by us, the Guarantor and any of our other affiliates,
        including BofAS, may create conflicts of interest with you and may affect
        your return on the Notes and their market value.&nbsp;</b>We, the Guarantor
        or one or more of our other affiliates, including BofAS, may buy or sell the
        securities held by or included in the Underlying, or futures or options contracts
        or exchange traded instruments on the Underlying or those securities, or other
        instruments whose value is derived from the Underlying or those securities.
        While we, the Guarantor or one or more of our other affiliates, including
        BofAS, may from time to time own securities represented by the Underlying,
        except to the extent that BAC&#8217;s common stock may be included in the
        Underlying, we, the Guarantor and our other affiliates, including BofAS, do
        not control any company included in the Underlying, and have not verified
        any disclosure made by any other company. We, the Guarantor or one or more
        of our other affiliates, including BofAS, may execute such purchases or sales
        for our own or their own accounts, for business reasons, or in connection
        with hedging our obligations under the Notes. These transactions may present
        a conflict of interest between your interest in the Notes and the interests
        we, the Guarantor and our other affiliates, including BofAS, may have in our
        or their proprietary accounts, in facilitating transactions, including block
        trades, for our or their other customers, and in accounts under our or their
        management. These transactions may adversely affect the level of the Underlying
        in a manner that could be adverse to your investment in the Notes. On or before
        the pricing date, any purchases or sales by us, the Guarantor or our other
        affiliates, including BofAS or others on our or their behalf (including those
        for the purpose of hedging some or all of our anticipated exposure in connection
        with the Notes), may affect the level of the Underlying. Consequently, the
        level of the Underlying may change subsequent to the pricing date, which may
        adversely affect the market value of the Notes. <br>\n        <br>\n        We,
        the Guarantor or one or more of our other affiliates, including BofAS, also
        expect to engage in hedging activities that could affect the level of the
        Underlying on the pricing date. In addition, these hedging activities, including
        the unwinding of a hedge, may decrease the market value of your Notes prior
        to maturity, and may affect the amounts to be paid on the Notes. We, the Guarantor
        or one or more of our other affiliates, including BofAS, may purchase or otherwise
        acquire a long or short position in the Notes and may hold or resell the Notes.
        For example, BofAS may enter into these transactions in connection with any
        market making activities in which it engages. We cannot assure you that these
        activities will not adversely affect the level of the Underlying, the market
        value of your Notes prior to maturity or the amounts payable on the Notes.</font>
