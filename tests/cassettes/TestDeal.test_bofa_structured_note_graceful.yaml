        style=\"text-align:left; border-width:1px 1px 1px 1px; border-style:none none
        none none;\"> <font style=\"font-size:17pt;font-family:'Helvetica',Times,serif;\">U.S.
        Federal Income Tax Summary</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">The
        following summary of the material U.S. federal income and estate tax considerations
        of the acquisition, ownership, and disposition of the Notes supplements, and
        to the extent inconsistent supersedes, the discussion under &#8220;U.S. Federal
        Income Tax Considerations&#8221; in the accompanying prospectus and is not
        exhaustive of all possible tax considerations. This summary is based upon
        the Internal Revenue Code of 1986, as amended (the &#8220;Code&#8221;), regulations
        promulgated under the Code by the U.S. Treasury Department (&#8220;Treasury&#8221;)
        (including proposed and temporary regulations), rulings, current administrative
        interpretations and official pronouncements of the IRS, and judicial decisions,
        all as currently in effect and all of which are subject to differing interpretations
        or to change, possibly with retroactive effect. No assurance can be given
        that the IRS would not assert, or that a court would not sustain, a position
        contrary to any of the tax consequences described below. This summary does
        not include any description of the tax laws of any state or local governments,
        or of any foreign government, that may be applicable to a particular holder.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Although
        the Notes are issued by us, they will be treated as if they were issued by
        BAC for U.S. federal income tax purposes. Accordingly throughout this tax
        discussion, references to &#8220;we,&#8221; &#8220;our&#8221; or &#8220;us&#8221;
        are generally to BAC unless the context requires otherwise.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">This
        summary is directed solely to U.S. Holders and Non-U.S. Holders that, except
        as otherwise specifically noted, will purchase the Notes upon original issuance
        and will hold the Notes as capital assets within the meaning of Section 1221
        of the Code, which generally means property held for investment, and that
        are not excluded from the discussion under &#8220;U.S. Federal Income Tax
        Considerations&#8221; in the accompanying prospectus.</font> </div>\n<div
        style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">You
        should consult your own tax advisor concerning the U.S. federal income tax
        consequences to you of acquiring, owning, and disposing of the Notes, as well
        as any tax consequences arising under the laws of any state, local, foreign,
        or other tax jurisdiction and the possible effects of changes in U.S. federal
        or other tax laws.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>General</b></font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Although
        there is no statutory, judicial, or administrative authority directly addressing
        the characterization of the Notes, we intend to treat the Notes for all tax
        purposes as single financial contracts with respect to the Underlying and
        under the terms of the Notes, we and every investor in the Notes agree, in
        the absence of an administrative determination or judicial ruling to the contrary,
        to treat the Notes in accordance with such characterization. In the opinion
        of our counsel, Sidley Austin LLP, it is reasonable to treat the Notes as
        single financial contracts with respect to the Underlying. This discussion
        assumes that the Notes constitute single financial contracts with respect
        to the Underlying for U.S. federal income tax purposes. If the Notes did not
        constitute single financial contracts, the tax consequences described below
        would be materially different.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><i>This
        characterization of the Notes is not binding on the IRS or the courts. No
        statutory, judicial, or administrative authority directly addresses the characterization
        of the Notes or any similar instruments for U.S. federal income tax purposes,
        and no ruling is being requested from the IRS with respect to their proper
        characterization and treatment. Due to the absence of authorities on point,
        significant aspects of the U.S. federal income tax consequences of an investment
        in the Notes are not certain, and no assurance can be given that the IRS or
        any court will agree with the characterization and tax treatment described
        in this pricing supplement. Accordingly, you are urged to consult your tax
        advisor regarding all aspects of the U.S. federal income tax consequences
        of an investment in the Notes, including possible alternative characterizations.</i></font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Unless
        otherwise stated, the following discussion is based on the characterization
        described above. The discussion in this section assumes that there is a significant
        possibility of a significant loss of principal on an investment in the Notes.</font>
        </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">We
        will not attempt to ascertain whether any issuer of a component stock included
        in the Underlying would be treated as a &#8220;passive foreign investment
        company&#8221; (&#8220;PFIC&#8221;), within the meaning of Section 1297 of
        the Code, or a United States real property holding corporation, within the
        meaning of Section 897(c) of the Code. If the issuer of one or more stocks
        included in the Underlying were so treated, certain adverse U.S. federal income
        tax consequences could possibly apply to a holder of the Notes. You should
        refer to information filed with the SEC by the issuers of the component stocks
        included in the Underlying and consult your tax advisor regarding the possible
        consequences to you, if any, if any issuer of a component stock included in
        the Underlying is or becomes a PFIC or is or becomes a United States real
        property holding corporation.</font> </div>\n<div style=\"text-align:left;
        margin-top:10px;margin-bottom:10px;border-width:1px 1px 1px 1px; border-style:none
        none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><b>U.S.
        Holders</b></font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\">Upon
        receipt of a cash payment at maturity or upon a sale, or exchange of the Notes
        prior to maturity, a U.S. Holder generally will recognize capital gain or
        loss equal to the difference between the amount realized and the U.S. Holder&#8217;s
        tax basis in the Notes. A U.S. Holder&#8217;s tax basis in the Notes will
        equal the amount paid by that holder to acquire them. This capital gain or
        loss generally will be long-term capital gain or loss if the U.S. Holder held
        the Notes for more than one year. The deductibility of capital losses is subject
        to limitations.</font> </div>\n<div style=\"text-align:left; margin-top:10px;margin-bottom:10px;border-width:1px
        1px 1px 1px; border-style:none none none none;\"> <font style=\"font-size:8pt;color:#59595B;font-family:'Helvetica',Times,serif;\"><i>Alternative
        Tax Treatments.&nbsp;</i>Due to the absence of authorities that directly address
        the proper tax treatment of the Notes, prospective investors are urged to
        consult their tax advisors regarding all possible alternative tax treatments
        of an investment in the Notes. In particular, the IRS could seek to subject
        the Notes to the Treasury regulations governing contingent payment debt instruments.
        If the IRS were successful in that regard, the timing and character of income
        on the Notes would be affected significantly. Among other things, a U.S. Holder
        would be required to accrue original issue discount every year at a &#8220;comparable
        yield&#8221; determined at the time of issuance. In addition, any gain realized
        by a U.S. Holder at maturity or upon a sale, or exchange of the Notes generally
        would be treated as ordinary income, and any loss realized at maturity or
        upon a sale, or exchange of the Notes generally would be treated as ordinary
        loss to the extent of the U.S. Holder&#8217;s prior accruals of original issue
        discount, and as capital loss thereafter.</font> </div>\n<div style=\"text-align:left;
        border-width:1px 1px 1px 1px; border-style:none none none none;\"> </div>\n<table
