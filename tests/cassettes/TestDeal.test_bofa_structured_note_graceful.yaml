        </div></td>\n    <td style=\"padding-top:5px;\"><div style =\" text-align:justify;\"><font
        style=\"font-size:8pt;color:#58595B;font-family:'Helvetica',Times,serif;\">The
        Capped Buffered Enhanced Return Notes Linked to the Russell 2000<sup>&#174;</sup>&nbsp;Index,
        due July 31, 2026 (the &#8220;Notes&#8221;) are expected to price on January
        28, 2025 and expected to issue on January 31, 2025.</font> </div></td>\n  </tr>\n</table>\n<table
        style=\" border-collapse:collapse;\" cellspacing=\"0\" cellpadding=\"0\">\n
        \ <tr>\n    <td width=\"0%\" valign = \"baseline\"><div style =\"text-indent:16px;\"><font
