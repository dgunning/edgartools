        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nclosing of the Transactions took place on October 24, 2024. The
        gross proceeds from the Transactions were approximately $2.1 million,\nbefore
        deducting placement agent fees and other offering expenses payable by the
        Company and excluding the net proceeds, if any, from\nthe exercise of the
        Common Warrants or Placement Agent Warrants (as defined below). The shares
