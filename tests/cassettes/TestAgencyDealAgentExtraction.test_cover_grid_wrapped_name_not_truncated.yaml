        font: 10pt Times New Roman, Times, Serif; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nOctober 23, 2024, the Company entered into a placement agency agreement
