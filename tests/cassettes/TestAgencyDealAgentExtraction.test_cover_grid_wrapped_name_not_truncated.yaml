        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)\nacted as the placement agent for the public offering that closed
        on January 10, 2025, for which the Placement Agent was engaged to provide\nexclusive
        financial services in connection with the transactions, and was paid a fee
