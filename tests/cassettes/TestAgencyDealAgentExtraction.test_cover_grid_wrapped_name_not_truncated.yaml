        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">We have engaged Ladenberg\nThalmann &amp; Co., Inc., or the placement
        agent, to act as our exclusive placement agent in connection with this offering.
        The placement\nagent is not purchasing or selling any of the securities we
        are offering. This offering is being conducted on a &ldquo;best efforts&rdquo;\nbasis
        and the placement agent has no obligation to arrange for the purchase or sale
        of any specific number or dollar amount of securities.\nWe have agreed to
        pay to the placement agent the placement agent fees set forth in the table
        below. Since we will deliver\nthe securities to be issued in this offering
        upon our receipt of investor funds, there is no arrangement for funds to be
        received in\nescrow, trust or similar arrangement. There is no minimum offering
        requirement as a condition of closing of this offering. Further, any\nproceeds
        from the sale of securities offered by us will be available for our immediate
        use, despite uncertainty about whether we would\nbe able to use such funds
        to effectively implement our business plan. See the section entitled &ldquo;Risk
        Factors&rdquo; for more information.\nWe will bear all costs associated with
        the offering. See &ldquo;Plan of Distribution&rdquo; beginning on page of
        S-15 this prospectus\nfor more information regarding these arrangements.</P>\n<P
