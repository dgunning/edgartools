        10pt Times New Roman, Times, Serif; width: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 0.25in; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&#9679;</B></FONT></TD>\n    <TD STYLE=\"font: 10pt Times New Roman,
        Times, Serif; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">the\n    title and stated or par value of
        the preferred stock;</FONT></TD></TR>\n  <TR STYLE=\"font: 10pt Times New
        Roman, Times, Serif; vertical-align: top\">\n    <TD STYLE=\"font: 10pt Times
        New Roman, Times, Serif\"><FONT STYLE=\"font-family: Times New Roman, Times,
