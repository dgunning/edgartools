        NAME=\"SL_008\"></A>DILUTION</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">If\nyou purchase shares of
        our Common Stock and/or Pre-funded Warrants in this offering, your ownership
        interest will be diluted to the extent\nof the difference between the public
        offering price per share of our Common Stock (or Pre-funded Warrants) and
        the as adjusted net tangible\nbook value (deficit) per share of our Common
        Stock after giving effect to this Offering. We calculate net tangible book
        value (deficit)\nper share by dividing the net tangible book value (deficit),
        which is total tangible assets, less total liabilities, by the number of\noutstanding
        shares of our Common Stock. Dilution represents the difference between the
        price per share paid by purchasers of shares in\nthis offering and the as
        adjusted net tangible book value per share of our Common Stock immediately
        after giving effect to this offering.\nOur net tangible book value (deficit)
        as of September 30, 2024, was approximately $(9.5) million, or $(1.02) per
        share. &ldquo;Net tangible\nbook value (deficit)&rdquo; is total assets minus
        the sum of liabilities and intangible assets.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">After\ngiving further effect
