        this offering and may add, update, or change information contained in the
        accompanying base prospectus.\nThe accompanying base prospectus provides general
        information about us and our securities, some of which, such as the section
        entitled\n&ldquo;Plan of Distribution,&rdquo; may not apply to this offering.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">This\nprospectus supplement and the accompanying base prospectus are
        an offer to sell only the securities offered hereby, but only under circumstances\nand
        in jurisdictions where it is lawful to do so. We are not making offers to
        sell or solicitations to buy our Common Stock in any jurisdiction\nin which
        an offer or solicitation is not authorized or in which the person making that
        offer or solicitation is not qualified to do so\nor to anyone to whom it is
        unlawful to make an offer or solicitation. This document is in two parts.
        The first part is this prospectus\nsupplement, which describes the specific
        terms of this Common Stock offering and adds to, and updates information contained
        in the accompanying\nbase prospectus and the documents incorporated by reference
        herein. The second part, the accompanying base prospectus, provides more\ngeneral
        information. Generally, when we refer to this prospectus, we are referring
        to both parts of this document combined. To the extent\nthere is a conflict
        between the information contained in this prospectus supplement and the information
        contained in the accompanying\nbase prospectus or any document incorporated
        by reference therein filed prior to the date of this prospectus supplement,
        you should rely\non the information in this prospectus supplement; provided
        that if any statement in one of these documents is inconsistent with a statement\nin
        another document having a later date&mdash;for example, a document incorporated
        by reference in the accompanying base prospectus&mdash;the\nstatement in the
        document having the later date modifies or supersedes the earlier statement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\ninformation in this prospectus supplement is inconsistent with
        the accompanying base prospectus or the information incorporated by reference\nwith
        an earlier date, you should rely on this prospectus supplement. This prospectus
        supplement, together with the accompanying base\nprospectus, the documents
        incorporated by reference into this prospectus supplement and the accompanying
        base prospectus and any free\nwriting prospectus we have authorized for use
        in connection with this offering, include all material information relating
        to this offering.\nWe have not, and the Placement Agent has not, authorized
        anyone to provide you with different or additional information and you must\nnot
        rely on any unauthorized information or representations.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">You\nshould assume that the information appearing in this prospectus
        supplement, the accompanying base prospectus, the documents incorporated\nby
        reference in this prospectus supplement and the accompanying base prospectus
        and any free writing prospectus we have authorized for\nuse in connection
        with this offering is accurate only as of the respective dates of those documents.
        Our business, financial condition,\nresults of operations and prospects may
        have changed since those dates. You should carefully read this prospectus
        supplement, the accompanying\nbase prospectus and the information and documents
        incorporated herein by reference herein and therein, as well as any free writing
        prospectus\nwe have authorized for use in connection with this offering, before
        making an investment decision. See &ldquo;Incorporation of Certain\nDocuments
        by Reference&rdquo; and &ldquo;Where You Can Find More Information&rdquo;
        in this prospectus supplement and in the accompanying\nbase prospectus.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">This\nprospectus supplement and the accompanying base prospectus contain
        summaries of certain provisions contained in some of the documents\ndescribed
        herein, but reference is made to the actual documents for complete information.
        All of the summaries are qualified in their\nentirety by the full text of
        the actual documents, some of which have been filed or will be filed and incorporated
        by reference herein.\nSee &ldquo;Where You Can Find More Information&rdquo;
        in this prospectus supplement. We further note that the representations, warranties\nand
        covenants made by us in any agreement that is filed as an exhibit to any document
        that is incorporated by reference into this prospectus\nsupplement or the
        accompanying base prospectus were made solely for the benefit of the parties
        to such agreement, including, in some\ncases, for the purpose of allocating
        risk among the parties to such agreements, and should not be deemed to be
        a representation, warranty\nor covenant to you. Moreover, such representations,
        warranties or covenants were accurate only as of the date when made. Accordingly,\nsuch
        representations, warranties and covenants should not be relied on as accurately
        representing the current state of our affairs.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">This\nprospectus supplement
        and the accompanying base prospectus contain and incorporate by reference
        certain market data and industry statistics\nand forecasts that are based
        on independent industry publications and other publicly available information.
        Although we believe these\nsources are reliable, estimates as they relate
