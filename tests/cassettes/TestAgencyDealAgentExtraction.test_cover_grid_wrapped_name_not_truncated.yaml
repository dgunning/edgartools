        from time to time, in whole or in part, during\na period commencing six (6)
        months from the date of issuance and expiring five years from the date of
        this offering. The Placement Agent\nWarrants will have substantially the same
        terms as the Common Warrants described above. The Placement Agent Warrants
        and underlying\nshares of common stock are not registered on the registration
        statement of which this prospectus is a part. The Placement Agent Warrants\nhave
        been deemed compensation by FINRA and are therefore subject to a 180-day lock-up
        pursuant to Rule 5110(e) of FINRA. The placement\nagent (or permitted assignees)
        will not sell, transfer, assign, pledge, or hypothecate these warrants or
        the securities underlying these\nwarrants, nor will they engage in any hedging,
        short sale, derivative, put, or call transaction that would result in the
        effective economic\ndisposition of the warrants or the underlying securities
        for a period of 180 days following the commencement of sales of the securities\nissued
        in this offering.</P>\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
