        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">These\nforward-looking statements
        are based largely on our expectations and projections about future events
        and future trends affecting our\nbusiness and are subject to risks and uncertainties
        that could cause actual results to differ materially from those anticipated
        in the\nforward-looking statements. The risks and uncertainties include, among
