        Sequence; Type: Arabic; Name: PageNo -->1<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><A
        NAME=\"SL_002\"></A>PROSPECTUS\nSUMMARY</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>This\nsummary highlights
        information contained elsewhere in this prospectus supplement, the accompanying
        base prospectus and the documents\nincorporated by reference herein and therein.
        This summary does not contain all of the information that you should consider
        before deciding\nto invest in our securities. You should read this entire
        prospectus supplement and the accompanying base prospectus carefully, including\nthe
        section entitled &ldquo;Risk Factors&rdquo; beginning on page S-9 and our
        consolidated financial statements and the related notes\nand the other information
        incorporated by reference into this prospectus supplement and the accompanying
        base prospectus, before making\nan investment decision.</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: left\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>Overview\nof our Company</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">We\nare a clinical-stage
        immuno-oncology company that is developing innovative stem cell-based and
        enveloped platforms for the delivery and\npotentiation of oncolytic virotherapies
        to treat cancer. Our pipeline includes off-the-shelf product candidates designed
        to protect oncolytic\nviruses from being quickly inactivated by the patient&rsquo;s
        immune system and target tumor sites. Once approved by the FDA, this improved\ndelivery,
        both localized and systemic, and increased potency will enable us to develop
        treatments that target various types of cancer\nat different stages of progression.
        Our goal is to create therapies that work on any tumor, regardless of its
        genetic profile (universal\ntreatments). In addition to direct targeting and
        killing cancer cells, our oncolytic virotherapies have shown signs of changing
        the tumor\nimmune environment to induce strong anti-tumor immunity that could
        lead to better cancer treatment and prevent tumor recurrence.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">CLD-101\n(NeuroNova&trade;
        Platform) for Newly Diagnosed High Grade Glioma (&ldquo;HGG&rdquo;) (also
        referred to as &ldquo;NNV1&rdquo; as to the\nindication). CLD-101 is our product
        candidate utilizing our NeuroNova&trade; Platform targeting HGG. Prior to
        our licensing agreement\nwith Northwestern University, an open-label, investigator
        sponsored, Phase 1, dose- escalation clinical trial for NNV1 in patients with\nnewly
        diagnosed high-grade gliomas was completed. This clinical trial demonstrated
        that single administration of CLD-101 was well tolerated\nin patients with
        newly diagnosed HGG. Northwestern University began recruiting for a Phase
        1b/2 clinical trial during the first quarter\nof 2025. This trial will explore
        the final dosing regimen for NNV1, including the feasibility of repeated dosing
        in newly diagnosed HGG.\nExtensive biomarker analysis will be performed on
        tumor biopsies and blood samples to determine viral distribution, specific
        tumor targeting\nand induction of anti-tumor immunity.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">CLD-101\nfor Recurrent HGG (also referred
        to as &ldquo;NNV2&rdquo; as to the recurrent HGG indication). A phase 1 study
        evaluating the safety\nand feasibility of administering repeated doses of
        CLD-101 intracerebrally to patients with recurrent high-grade gliomas began
        treatment\nin May 2023. The study is being run by our partner, City of Hope,
        and started enrolling cohort 4 in January 2024. Clinical data from\npatients
        with recurrent HGG treated with repeated doses of CLD-101 supported the start
        of a trial of repeated doses in newly diagnosed\nHGG.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">CLD-201\n(SuperNova&trade;) for Advanced Solid
        Tumors (triple-negative breast cancer (&ldquo;TNBC&rdquo;), head &amp; neck
        squamous cell carcinoma\n(HNSCC), and advanced soft tissue sarcoma (also referred
        to as &ldquo;SNV1&rdquo;). SNV1 is our first internally developed pre-clinical\nproduct
        candidate utilizing our SuperNova&trade; Delivery Platform. Based on our pre-clinical
        studies, we believe SNV1 has therapeutic\npotential for the treatment of multiple
        solid tumors such as head and neck cancer, breast cancer and sarcoma. We filed
        our IND application\nwith the FDA for the clinical development of CLD-201
        in March 2025 and we anticipate commencing a Phase 1 clinical trial for SNV1
        during\nthe first half of 2025.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">CLD-301\n(AAA) for Multiple Indications. We are also currently engaged
        in early discovery research involving Adult Allogeneic Adipose-derived\n(&ldquo;AAA&rdquo;)
        stem cells for various indications and therapies. These AAA stem cells are
        theoretically multipotent, differentiating\nalong the adipocyte, chondrocyte,
        myocyte, neuronal, and osteoblast lineages, and may have the ability to serve
        in other capacities,\nsuch as providing hematopoietic support and gene transfer
        with potential applications for repair and regeneration of acute and chronically\ndamaged
        tissues. Pre-clinical studies involving toxicity and efficacy will be needed
        before an IND application may be filed with the\nFDA.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nsubsidiary Nova Cell, Inc. (&ldquo;Nova
        Cell&rdquo;) was formed to be a technology service provider that develops
        innovative stem cell-based\nproducts using our cellular manufacturing process.
        Through Nova Cell we anticipate expanding potential uses from oncology to
        other fields\nthat require regenerative medical applications, such as cosmetics,
        orthopedics, auto-immune diseases, and various other therapies.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">CLD-400\n(RTNova) for Lung
        cancer and Metastatic Solid Tumors, our pre-clinical program involving enveloped
        oncolytic viruses (discovery phase),\nbuilds upon our experience of using
        cells to protect, potentiate and deliver virotherapies. CLD-400 program is
        derived from research\nfrom prior pre-clinical CLD-202 program. RTNova consists
        of an engineered vaccinia virus enveloped by a cell membrane, that is potentially\ncapable
        of targeting lung cancer and advanced metastatic disease due to its increased
        ability to survive in the bloodstream. Metastatic\nsolid tumors involve cancer
        cells that break away from where they first formed (primary cancer) and travel
        through the blood or lymph\nsystem to form new tumors, known as metastatic
        tumors, in other parts of the body. In preclinical studies, RTNova has shown
        early signs\nof its resistance to human humoral immunity and capability to
        target multiple distant and diverse tumors and transform their microenvironments\nleading
        to their elimination. In addition, the program has shown potential synergistic
        effects with other immunotherapies, including\ncell therapies, to attack and
        eliminate disseminated solid tumors.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n\n<!--
        Field: Page; Sequence: 4; Value: 1 -->\n    <DIV STYLE=\"margin-top: 0pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->2<!--
        Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 0pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Since\ninception, our operations have focused on organizing and staffing
        our company, business planning, raising capital, acquiring and developing\nour
        technology, establishing our intellectual property portfolio, identifying
        potential product candidates and undertaking preclinical\nstudies and manufacturing.
        We do not have any products approved for sale and have not generated any revenue
        from product sales. We have\nfunded our operations primarily through private
        sales of common stock, convertible preferred stock, contingently convertible
        and convertible\npromissory notes, term loans, lines of credit, and Simple
        Agreements for Future Equity (&ldquo;SAFE&rdquo;). These investments have
        included\nand have been made by various related parties, including our largest
        investor and Chief Executive Officer and Chairman of the Board of\nDirectors.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Since\ninception, we have
        incurred significant operating losses. Our net loss was $22.2 million for
        the year ended December 31, 2024. As of\nDecember 31, 2024, we had an accumulated
        deficit of $121.7 million. We expect to continue to incur significant and
        increasing expenses\nand operating losses for the foreseeable future, as we
        advance our current and future product candidates through preclinical and
        clinical\ndevelopment, manufacture drug product and drug supply, seek regulatory
        approval for our current and future product candidates, maintain\nand expand
        our intellectual property portfolio, hire additional research and development
        and business personnel and operate as a public\ncompany.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Changes\nin economic conditions,
        including rising interest rates, public health issues, lower consumer confidence,
        volatile equity capital markets\nand ongoing supply chain disruptions and
        the impacts of geopolitical conflicts, may also affect our business.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nwill not generate revenue from product sales unless and until we
        successfully complete clinical development and obtain regulatory approval\nfor
        our product candidates. In addition, if we obtain regulatory approval for
        our product candidates and do not enter into a third-party\ncommercialization
        partnership, we expect to incur significant expenses related to developing
        our commercialization capability to support\nproduct sales, marketing, manufacturing
        and distribution activities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">As\na result, we will need substantial additional funding to support
        our continuing operations and pursue our growth strategy. Until we can\ngenerate
        significant revenue from product sales, if ever, we expect to finance our
        operations through a combination of public or private\nequity offerings and
        debt financings or other sources, such as potential collaboration agreements,
        strategic alliances and licensing\narrangements. We may be unable to raise
        additional funds or enter into such other agreements or arrangements when
        needed on acceptable\nterms, or at all. Our inability to raise capital or
        enter into such agreements as, and when needed, could have a material adverse
        effect\non our business, results of operations and financial condition.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Based\non our operating plan,
        we believe we do not have sufficient cash on hand to support current operations
        for at least one year from the\ndate of issuance of our consolidated financial
        statements as of, and for the year ended December 31, 2024. We have concluded
        that this\ncircumstance raises substantial doubt about our ability to continue
        as a going concern. See Note 1 to our annual consolidated financial\nstatements.
        In addition, we will be required to raise additional capital through the issuance
        of our equity securities to support our\noperations which will have an ownership
        and economic dilutive effect to our current shareholders who purchased their
        shares of common\nstock at prices above our current trading price, and such
        capital raising may adversely affect the price of our common stock. Further,\nthe
        sale of or the perception of a sale of a substantial number of our common
        stock by certain selling securityholders pursuant to another\nregistration
        statement filed with the SEC will adversely affect the price of our common
        stock due to our limited trading volume and adversely\naffect the share price
        that we may obtain in future financings and may adversely affect our ability
        to conduct and complete future financings.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n\n<!--
        Field: Page; Sequence: 5; Value: 1 -->\n    <DIV STYLE=\"margin-top: 0pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->3<!--
        Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 0pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>The\nFLAG Merger and Related Transactions</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">On\nSeptember 12, 2023, FLAG
        consummated a series of transactions that resulted in the merger of FLAG Merger
        Sub Inc., a Nevada corporation\nand a wholly-owned subsidiary of FLAG (&ldquo;Merger
        Sub&rdquo;) and Calidi pursuant to the Agreement and Plan of Merger, as amended,\ndated
        as of January 9, 2023. Pursuant to the terms of the Merger Agreement, the
        business combination was effected through the merger\nof Merger Sub with and
        into Calidi, with Calidi surviving such merger as a wholly-owned subsidiary
        of FLAG. Historical common share amounts\nof Calidi have been retroactively
        restated based on the conversion ratio of approximately 0.04 (the &ldquo;Conversion
        Ratio&rdquo;).\nFollowing the consummation of the business combination, FLAG
        was renamed &ldquo;Calidi Biotherapeutics, Inc.&rdquo;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">As\na result of the Business
        Combination, all outstanding stock of Calidi were cancelled in exchange for
        the right to receive newly issued\nshares of Common Stock (also referred to
        as &ldquo;New Calidi Common Stock&rdquo;), par value $0.0001 per share, and
        all outstanding\noptions to purchase Calidi stock were assumed by Calidi.
        The total consideration received by Calidi Security Holders at the Closing
        of\nthe transactions contemplated by the Merger Agreement is the newly issued
        shares of Common Stock and securities convertible or exchangeable\nfor newly
        issued shares of Common Stock with an aggregate value equal $250.0 million,
        plus an adjustment of $23.8 million pursuant to\nthe net debt adjustment provisions
        of the Merger Agreement by reason of the Series B Financing. As a result,
        the Calidi Security Holders\nreceived an aggregate of 2,737,560 shares of
        Common Stock as Merger Consideration.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">As\nadditional consideration, each Calidi stockholder was entitled
        to earn, on a pro rata basis, up to 1,800,000 Escalation Shares. During\nthe
        Escalation Period, Calidi Stockholders may be entitled to receive up to 1,800,000
        Escalation Shares with incremental releases of\n450,000 shares upon the achievement
        of each share price hurdle if the trading price of Common Stock is $120.00,
        $140.00, $160.00, and\n$180.00, respectively, for a period of any 20 days
        within any 30-consecutive-day trading period. The Escalation Shares have been
        placed\nin escrow and are outstanding from and after the Closing, subject
        to cancellation if the applicable price targets are not achieved. While\nin
        escrow, the shares will be non-voting.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Holders\nof FLAG Class A Common Stock who did not redeem their shares
        obtained their pro rata portion of an additional 8,585 Non-Redeeming Continuation\nShares
        issued at Closing. At the Closing, Calidi Security Holders own approximately
        76% of the outstanding shares of New Calidi Common\nStock.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: left\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Recent\nDevelopments</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: left; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Employee\nBenefit Plans
        Securities Registration Statement</I></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nOctober 1, 2024, the Company filed a Registration Statement on
        Form S-8, which includes a Reoffer Prospectus which may be used for reoffers\nand
        resales of shares of the Company. The Reoffer Prospectus covers the shares
        issuable to the holders pursuant to awards granted by\nthe Company under the
        Calidi Equity Plans. The Company will not receive any proceeds from the sale
        of the shares offered by the Reoffer\nProspectus.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>&nbsp;</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: left; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>At\nthe Market Offering
        Agreement</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><I>&nbsp;</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">On\nOctober 11, 2024, the Company entered
        into an At The Market Offering Agreement (the &ldquo;Sales Agreement&rdquo;)
        with Ladenburg Thalmann\n&amp; Co. Inc. (the &ldquo;Ladenburg&rdquo;), under
        which the Company may, from time to time, in its sole discretion, issue and
        sell\nthrough Ladenburg, acting as agent or principal, shares of the Company&rsquo;s
        Common Stock, initially having an aggregate offering price\nof up to $5.1
        million. Pursuant to the Sales Agreement, Ladenburg may sell the Shares by
        any method permitted by law deemed to be an\n&ldquo;at the market&rdquo; offering
        as defined in Rule 415 under the Securities Act of 1933, as amended. Ladenburg
        will use commercially\nreasonable efforts consistent with its normal trading
        and sales practices to sell the Shares from time to time, based upon instructions\nfrom
        the Company (including any price or size limits or other customary parameters
        or conditions the Company may impose).</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCompany will pay Ladenburg
        a cash commission of 3.0% of the aggregate gross sales proceeds of shares
        sold through Ladenburg under the\nSales Agreement. The Company also agreed
        to reimburse Ladenburg for certain specified expenses, including the fees
        and disbursements\nof its counsel, in an amount not to exceed $50,000, in
        addition to certain ongoing disbursements of its legal counsel up to $7,500
        in\nconnection with diligence bring downs.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence: 6; Value: 1 -->\n
        \   <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
        collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top;
        text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->4<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Under\nthe terms of the Sales Agreement, the
        Company may also sell shares to Ladenburg as principal for its own account
        at prices agreed upon\nat the time of sale. If the Company sells shares to
        Ladenburg as principal, it will enter into a separate terms agreement with
        Ladenburg\nin substantially the form attached to the Sales Agreement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nCompany is not obligated to sell any shares under the Sales Agreement.
        The offering of the shares pursuant to the Sales Agreement may\nbe terminated
        by either the Company or Ladenburg, as permitted therein. Since our entry
        into the Sales Agreement and as of the date of\nthis Prospectus Supplement,
        we have offered and sold 4,583,084 shares of common stock for gross proceeds
        of $6.1 million pursuant to\nthe Sales Agreement.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Delisting\nof Public Warrants</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">On\nOctober 17, 2024, Calidi
        received notice from the NYSE that Calidi&rsquo;s public warrants to purchase
        common stock are no longer suitable\nfor listing pursuant to Section 1001
        of the NYSE American Company Guide due to the low trading price of such public
        warrants, and that\nthe NYSE Regulation has determined to commence proceedings
        to delist the public warrants. The public warrants currently trade on the\nOTC
        Pink Marketplace under the symbol CLDWW.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>&nbsp;</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: left; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Convertible\nPromissory
        Note</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>&nbsp;</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Subsequent\nto the quarter ended September 30, 2024 the remaining outstanding
        principal amount of $1.8 million and accrued interest of approximately\n$118,000
        of the Company&rsquo;s existing $2.0 million convertible note was converted
        into 1,679,045 shares of common stock. Upon completion\nof the conversions,
        the convertible note was no longer outstanding.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>&nbsp;</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: left; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Registered\nDirect and
        Concurrent Private Placement</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">On\nOctober 23, 2024, Calidi entered into
        a Securities Purchase Agreement (the &ldquo;Purchase Agreement&rdquo;) with
        certain institutional\ninvestors (the &ldquo;Purchasers&rdquo;), pursuant
        to which Calidi issued to the Purchasers, (i) in a registered offering, 2,050,000\nshares
        of Calidi Common Stock, at a purchase price of $1.00 per share, and (ii) in
        a concurrent private placement, Series E common stock\npurchase warrants to
        purchase up to 2,050,000 shares of Common Stock (the &ldquo;Series E Common
        Warrants&rdquo;) and Series F common\nstock purchase warrants to purchase
        up to 2,050,000 shares of Common Stock (the &ldquo;Series F Common Warrants&rdquo;
        and together with\nthe Series E Common Warrants, the &ldquo;Common Warrants&rdquo;).
        Such registered direct offering and concurrent private placement are\nreferred
        to herein as the &ldquo;Transactions.&rdquo; Ladenburg acted as the placement
        agent.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nSeries E Common Warrants are exercisable on the date that is six
        (6) months from the date of issuance for a term of one (1) year from\nthe
        initial exercise date and have an exercise price of $1.13 per share of Common
        Stock, and the Series F Common Warrants are exercisable\non the date that
        is six (6) months from the date of issuance for a term of five (5) years from
        the initial exercise date and have an\nexercise price of $1.13 per share of
        Common Stock. The Common Warrants may be exercisable via &ldquo;cashless exercise&rdquo;
        in certain\ncircumstances. The Common Warrants and the shares issuable thereunder
        were issued in a concurrent private placement and without registration\nunder
        the Securities Act, and in reliance on the exemption provided in Section 4(a)(2)
        under the Securities Act and Regulation D promulgated\nthereunder.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The\nclosing
        of the Transactions took place on October 24, 2024. The gross proceeds from
        the Transactions were approximately $2.1 million\nbefore deducting placement
        agent fees and other offering expenses payable by Calidi.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>&nbsp;</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: left; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Confidentially\nMarketed Public Offerings (CMPO)</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">On\nNovember 15, 2024, Calidi completed a CMPO of an aggregate of 4,437,869
        shares of Common Stock, at a purchase price of $1.69 per share,\nfor aggregate
        gross proceeds of approximately $7.5 million, before deducting placement agent
        fees and other offering expenses payable\nby the Company.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">On\nJanuary
        10, 2025, Calidi completed a CMPO of an aggregate of 5,000,000 shares of Common
        Stock, at a purchase price of $0.85 per share,\nfor aggregate gross proceeds
        of approximately $4.3 million, before deducting placement agent fees and other
        offering expenses payable\nby the Company.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence: 7; Value: 1 -->\n
        \   <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
        collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top;
        text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->5<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Termination\nof Standby Equity Purchase Agreement</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">On\nDecember
        10, 2023, we entered into a Standby Equity Purchase Agreement (the &ldquo;SEPA&rdquo;)
        with YA II PN, Ltd., a Cayman Island\nexempt limited partnership (&ldquo;Yorkville&rdquo;).
        Pursuant to the SEPA, we have the right, but not the obligation, to sell to
        Yorkville\nup to $25,000,000 of our shares of Common Stock at our request
        any time during the 36 months following the execution of the SEPA. Subject\nto
        certain conditions set forth in the SEPA, including payment of an additional
        commitment fee, the Company will have the right to increase\nthe commitment
        amount under the SEPA by an additional $25,000,000. Each sale under the SEPA
        may be for a number of shares of Common Stock\nequal to the lower of (i) an
        amount equal to 100% of the average of the Daily Traded Amount (as defined
        pursuant to the SEPA) during\nthe five consecutive Trading Days immediately
        preceding an Advance Notice or (ii) 500,000 shares. The shares of Common Stock
        would be\npurchased at 97.0% of the Market Price (as defined pursuant to the
        SEPA).</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">As\nconsideration for Yorkville&rsquo;s commitment to purchase the
        Common Stock, upon execution of the SEPA, the Company is obligated to\npay
        a structuring fee of $25,000 to an affiliate of Yorkville and issue $250,000
        shares of Common Stock to Yorkville (the &ldquo;Commitment\nFee Shares&rdquo;)
        which Commitment Fee Shares will be determined by dividing $250,000 by the
        lowest daily VWAP of the Common Stock during\nthe 10 Trading Days immediately
        prior to December 10, 2023.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">On\nJanuary 23, 2025, Calidi delivered to
        YA II PN, LTD. (&ldquo;Yorkville&rdquo;), a Notice of Termination of the Standby
        Equity Purchase\nAgreement, as required under Section 10.01(b) of the SEPA,
        which notifies Yorkville of Calidi&rsquo;s election to terminate the Standby\nEquity
        Purchase Agreement, dated as of December 10, 2023, by and between Calidi and
        Yorkville. Termination of the SEPA became effective\nas of January 23, 2025,
        as mutually agreed by Calidi and Yorkville.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">At\nthe time of the termination, there were
        no outstanding borrowings, advance notices or shares of common stock to be
        issued under the SEPA.\nIn addition, there are no fees due by Calidi or Yorkville
        in connection with the termination of the SEPA<I>.</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: left; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B><I>Reverse\nStock Split</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">On\nJuly
        10, 2024, Calidi filed a First Certificate of Amendment to Second Amended
        and Restated Certificate of Incorporation with the Secretary\nof State of
        Delaware to effect a 1-for-10 reverse stock split of the shares of Calidi
        common stock, effective on July 15, 2024 (the &ldquo;Reverse\nStock Split&rdquo;).
        As a result of the Reverse Stock Split, every ten shares of issued and outstanding
        Common Stock were automatically\ncombined into one issued and outstanding
        share of Common Stock, without any change in the par value per share. No fractional
        shares were\nissued as a result of the Reverse Stock Split, and any fractional
        shares that would otherwise have resulted from the Reverse Stock Split\nwere
        rounded up to the next whole number. The number of authorized shares of Common
        Stock under the Calidi&rsquo;s Second Amended and\nRestated Certificate of
        Incorporation, as amended, remained unchanged.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">All\nreferences to share
        and per share amounts for all periods presented in the audited consolidated
        financial statements have been retrospectively\nrestated to reflect this Reverse
        Stock Split.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"> <FONT STYLE=\"font-family: Times New Roman, Times, Serif\"><I>Litigation\nUpdate
        - Securities Matter</I></FONT> </P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif\">On\nOctober 29, 2024, Mr. Yian Zeng filed a complaint against
        Calidi related to securities fraud in violation of the California Corporations\nCode,
        breach of covenant of good faith and fair dealing, unjust enrichment, restitution,
        breach of fiduciary duty, and constructive fraud\nin US District Court, Southern
        District of California (Case Number 3:24-cv-02026-H-KSC). Calidi filed an
        Answer to the complaint on February\n10, 2025. Calidi vigorously opposes this
        case and categorically denies all claims. Discovery has not commenced. Therefore,
        at this time,\nCalidi is unable to evaluate the outcome of this case or estimate
        the amount or range of potential loss.</FONT> </P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><I>Financial\nUpdate</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Our\nfinancial statements
        for the quarter and year ended December 31, 2024, will not be available until
        after this offering is completed and\nconsequently will not be available to
        you prior to investing in our securities offered in this offering. Based upon
        preliminary estimates\nand information available to us as of the date of this
        prospectus supplement, we expect to report that we had a cash balance of $9.6\nmillion
        at December 31, 2024. Our unaudited cash balance was approximately $8.8 million
        at February 28, 2025.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">This\nfinancial data as of December 31, 2024
        is preliminary and may change, and is based on information available to management
        as of the date\nof this prospectus supplement and is subject to completion
        by management of our financial statements as of and for the three months and\nyear
        ended December 31, 2024. There can be no assurance that our final cash position
        as of December 31, 2024 will not differ from these\nestimates, including as
        a result of review adjustments and any such changes could be material. This
        preliminary estimate has been prepared\nby, and is the responsibility of,
        our management and is based on a number of assumptions. Our independent registered
        public accountants\nhave not audited, reviewed, compiled or performed any
        procedures with respect to such preliminary financial data as of and for the
        three\nmonths and the year ended December 31, 2024 and accordingly do not
        express an opinion or any other form of assurance with respect to\nthis preliminary
        amount. These results could change as a result of further review. Complete
        results will be included in our Annual Report\non Form 10-K for the year ended
        December 31, 2024.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
