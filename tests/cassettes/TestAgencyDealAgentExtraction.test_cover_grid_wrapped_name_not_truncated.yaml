        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">We\nmay issue warrants for
        the purchase of preferred stock or common stock. Warrants may be issued independently
        or together with any preferred\nstock or common stock, and may be attached
        to or separate from any offered securities. Each series of warrants will be
        issued under a\nseparate warrant agreement to be entered into between a warrant
        agent specified in the agreement and us. The warrant agent will act solely\nas
        our agent in connection with the warrants of that series and will not assume
        any obligation or relationship of agency or trust for\nor with any holders
        or beneficial owners of warrants. This summary of some provisions of the securities
        warrants is not complete. You\nshould refer to the securities warrant agreement,
        including the forms of securities warrant certificate representing the securities
        warrants,\nrelating to the specific securities warrants being offered for
        the complete terms of the securities warrant agreement and the securities\nwarrants.
        The securities warrant agreement, together with the terms of the securities
        warrant certificate and securities warrants, will\nbe filed with the SEC in
        connection with the offering of the specific warrants.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
