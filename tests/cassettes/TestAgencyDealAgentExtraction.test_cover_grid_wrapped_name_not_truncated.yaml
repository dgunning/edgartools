        10pt\"><B>Continuous\nOffering Program</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Without\nlimiting the generality of the foregoing,
        we may enter into a continuous offering program equity distribution agreement
        with a broker-dealer,\nunder which we may offer and sell shares of our common
        stock from time to time through a broker-dealer as our sales agent. If we
        enter\ninto such a program, sales of the shares of common stock, if any, will
        be made by means of ordinary brokers&rsquo; transactions on the\nNYSE at market
        prices, block transactions and such other transactions as agreed upon by us
        and the broker-dealer. Under the terms of\nsuch a program, we also may sell
        shares of common stock to the broker-dealer, as principal for its own account
        at a price agreed upon\nat the time of sale. If we sell shares of common stock
        to such broker-dealer as principal, we will enter into a separate terms agreement\nwith
        such broker-dealer, and we will describe this agreement in a separate prospectus
        supplement or pricing supplement.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Market\nMaking,
        Stabilization and Other Transactions</B></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Unless\nthe applicable prospectus supplement states otherwise, other
        than our common stock all securities we offer under this prospectus will\nbe
        a new issue and will have no established trading market. We may elect to list
        offered securities on an exchange or in the over-the-counter\nmarket. Any
        underwriters that we use in the sale of offered securities may make a market
        in such securities, but may discontinue such\nmarket making at any time without
        notice. Therefore, we cannot assure you that the securities will have a liquid
        trading market.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Any\nunderwriter may also engage in stabilizing transactions, syndicate
        covering transactions and penalty bids in accordance with Rule 104\nunder
        the Securities Exchange Act of 1934 (the &ldquo;Exchange Act&rdquo;). Stabilizing
        transactions involve bids to purchase the underlying\nsecurity in the open
        market for the purpose of pegging, fixing or maintaining the price of the
        securities. Syndicate covering transactions\ninvolve purchases of the securities
        in the open market after the distribution has been completed in order to cover
        syndicate short positions.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Penalty\nbids permit the underwriters to reclaim a selling concession
        from a syndicate member when the securities originally sold by the syndicate\nmember
        are purchased in a syndicate covering transaction to cover syndicate short
        positions. Stabilizing transactions, syndicate covering\ntransactions and
        penalty bids may cause the price of the securities to be higher than it would
        be in the absence of the transactions.\nThe underwriters may, if they commence
        these transactions, discontinue them at any time.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>General\nInformation</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Agents,\nunderwriters, and dealers may be entitled, under agreements
        entered into with us, to indemnification by us against certain liabilities,\nincluding
        liabilities under the Securities Act of 1933. Our agents, underwriters, and
        dealers, or their affiliates, may be customers\nof, engage in transactions
        with or perform services for us, in the ordinary course of business.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
