        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nqualify as an &ldquo;emerging growth company&rdquo; as defined
        in Section 2(a)(19) of the Securities Act of 1933, as modified by the\nJumpstart
        Our Business Startups Act of 2012, or the &ldquo;JOBS Act.&rdquo; As such,
        we take advantage of certain exemptions from various\nreporting requirements
        applicable to other public companies that are not emerging growth companies
        for as long as we continue to be an\nemerging growth company, including (i)
        the exemption from the auditor attestation requirements with respect to internal
        control over\nfinancial reporting under Section 404 of the Sarbanes-Oxley
        Act of 2002 (the &ldquo;Sarbanes-Oxley Act&rdquo;), (ii) the exemptions from\nsay-on-pay,
        say-on-frequency and say-on-golden parachute voting requirements and (iii)
        reduced disclosure obligations regarding executive\ncompensation in our periodic
        reports and proxy statements. As a result, our stockholders may not have access
        to certain information they\ndeem important. We will remain an emerging growth
        company until the earliest of (i) the last day of the fiscal year (a) following
        the\nfifth anniversary of the date of the first sale of the Company&rsquo;s
        common stock, (b) in which we have total annual gross revenue\nof at least
        $1.235 billion or (c) in which Calidi is deemed to be a large accelerated
        filer, which means the market value of our common\nstock that are held by
        non-affiliates exceeds $700 million as of the last business day of our prior
        second fiscal quarter, and (ii) the\ndate on which we have issued more than
        $1.0 billion in non-convertible debt during the prior three-year period.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">In\naddition, Section 107
        of the JOBS Act also provides that an emerging growth company can take advantage
        of the exemption from complying\nwith new or revised accounting standards
        provided in Section 7(a)(2)(B) of the Securities Act of 1933, as long as it
        is an emerging growth\ncompany. An emerging growth company can therefore delay
        the adoption of certain accounting standards until those standards would otherwise\napply
        to private companies. The JOBS Act provides that a company can elect to opt
        out of the extended transition period and comply with\nthe requirements that
        apply to non-emerging growth companies, but any such election to opt out is
        irrevocable. The Company has elected\nnot to opt out of such extended transition
        period, which means that when a standard is issued or revised and it has different
        application\ndates for public or private companies, we, as an emerging growth
        company, can adopt the new or revised standard at the time private companies\nadopt
        the new or revised standard. This may make comparison of our financial statements
        with another public company which is neither\nan emerging growth company nor
        an emerging growth company which has opted out of using the extended transition
        period difficult or impossible\nbecause of the potential differences in accounting
        standards used.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"></P>\n\n\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><B>Corporate\nInformation</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Our\nprincipal executive offices are located
        at 4475 Executive Drive, Suite 200, San Diego, California 92121. Our telephone
        number is (858)\n794-9600. Our website address is <I>www.calidibio.com</I>.
        The references to our website in this prospectus are inactive textual references\nonly.
        The information on our website is neither incorporated by reference into this
        prospectus nor intended to be used in connection\nwith this offering. We have
        included our website address in this prospectus as an inactive textual reference
        only and not as an active\nhyperlink.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><A NAME=\"a_004\"></A>RISK\nFACTORS</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Investing\nin our securities involves a high
        degree of risk. Before making an investment decision, you should consider
        carefully the risks, uncertainties\nand other factors described in our most
        recent Annual Report on Form 10-K, as supplemented and updated by subsequent
        quarterly reports\non Form 10-Q and current reports on Form 8-K that we have
        filed or will file with the SEC, which are incorporated by reference into
        this\nprospectus.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Our\nbusiness, affairs, prospects, assets, financial condition, results
        of operations and cash flows could be materially and adversely affected\nby
        these risks. For more information about our SEC filings, please see &ldquo;Where
        You Can Find More Information&rdquo;.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"></P>\n\n<!--
        Field: Page; Sequence: 10 -->\n    <DIV STYLE=\"margin-bottom: 6pt; border-bottom:
