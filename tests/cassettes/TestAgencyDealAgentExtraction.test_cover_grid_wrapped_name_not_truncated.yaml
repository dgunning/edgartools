        banking and financial advisory services for us and our affiliates, for which\nthey
        received or will receive customary fees and expenses.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">In\nthe ordinary course of their
        various business activities, the placement agent and certain of its affiliates
        may make or hold a broad\narray of investments and actively trade debt and
        equity securities (or related derivative securities) and financial instruments
        (including\nbank loans) for their own account and for the accounts of their
        customers, and such investment and securities activities may involve\nsecurities
        and/or instruments issued by us and our affiliates. If the placement agent
        or its affiliates have a lending relationship with\nus, they routinely hedge
        their credit exposure to us consistent with their customary risk management
        policies. The placement agent and\nits affiliates may hedge such exposure
        by entering into transactions that consist of either the purchase of credit
        default swaps or the\ncreation of short positions in our securities or the
        securities of our affiliates, including potentially the securities offered
        hereby.\nAny such short positions could adversely affect future trading prices
        of the securities offered hereby. The placement agent and certain\nof its
        affiliates may also communicate independent investment recommendations, market
        color or trading ideas and/or publish or express\nindependent research views
        in respect of such securities or instruments and may at any time hold, or
        recommend to clients that they acquire,\nlong and/or short positions in such
        securities and instruments.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">In\naddition to the services provided in connection
