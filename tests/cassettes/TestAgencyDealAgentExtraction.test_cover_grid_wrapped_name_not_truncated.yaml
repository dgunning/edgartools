        Times, Serif; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nCommon Warrants and
        the Common Warrant Shares were issued in a concurrent private placement and
        without registration under the Securities\nAct of 1933, as amended (the &ldquo;Securities
        Act&rdquo;), and in reliance on the exemption provided in Section 4(a)(2)
