        to which the Placement Agent agreed to\nact on a reasonable &ldquo;best efforts&rdquo;
        basis, in connection with the Transactions. The Company agreed to pay the
        Placement Agent\nan aggregate cash fee of 8.0% of the gross proceeds from
        the sale of securities in the Transactions, a 1% management fee of the gross\nproceeds
        and reimburse certain out-of-pocket expenses. As additional compensation to
        the Placement Agent, in connection with the Transactions,\nthe Company issued
