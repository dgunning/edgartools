        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Calidi\nBiotherapeutics,
        Inc. (the &ldquo;Company&rdquo; or &ldquo;we&rdquo; or &ldquo;our&rdquo; or
        &ldquo;us&rdquo;) is offering (&ldquo;Offering&rdquo;)\nto a single institutional
        investor 3,325,000 &nbsp;shares (&ldquo;Shares&rdquo;) of the Company&rsquo;s
        Common Stock, par value\n$0.0001 per share (&ldquo;Common Stock&rdquo;), and
        pre-funded warrants to purchase up to an aggregate of 2,728,000 shares of
        Common\nStock (the &ldquo;Pre-funded Warrants&rdquo;), pursuant to this prospectus
        supplement and the accompanying prospectus. The purchase price\nof each Share
        to the investor identified in the securities purchase agreement dated March
        28, 2025, by and among us and the investor\nlisted on the signature page thereto
        (the &ldquo;Securities Purchase Agreement&rdquo;) is $0.65 per Share, and
        the purchase price per\nPre-funded Warrant is equal to the purchase price
        per Share, minus $0.001 or $0.649. </FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"> <FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nare offering the Pre-funded Warrants in
        lieu of shares of Common Stock to the investor whose purchase of Shares in
        this offering would\notherwise result in such investor, together with its
        affiliates, beneficially owning more than 4.99% (or, at the election of the
        investor,\n9.99% or 14.99% or 19.99%) of our Common Stock. The per share exercise
        price for the Pre-funded Warrants will be $0.001, and the Pre-funded\nWarrants
        are immediately exercisable and may be exercised at any time until all of
        the Pre-funded Warrants are exercised in full. This\noffering also relates
        to the shares of common stock issuable upon exercise of the Pre-funded Warrants
        sold in this offering.&nbsp;</FONT> </P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"> In a concurrent private\nplacement, we are
        also issuing to the investor accompanying Series G common stock purchase warrants
        to purchase up to 6,053,000 shares\nof Common Stock (the &ldquo;Series G Common
        Warrants&rdquo; or the &ldquo;Common Warrants&rdquo;). The Common Warrants
        are exercisable\non the date that is six (6) months from the date of issuance
        for a term of seven and one-half years from the initial exercise date and\nhave
        an exercise price of $0.6954 per share. The Common Warrants and the Common
        Stock issuable upon the exercise of the Common Warrants\n(the &ldquo;Common
        Warrant Shares&rdquo;) are not being registered under the Securities Act of
        1933, as amended (the &ldquo;Securities\nAct&rdquo;), and are not being offered
        pursuant to this prospectus supplement and the accompanying prospectus. The
        Common Warrants and\nCommon Warrant Shares are being offered pursuant to the
        exemption provided in Section 4(a)(2) under the Securities Act and Regulation\nD
        promulgated thereunder. </P>\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Our shares of Common
        Stock\nare listed on the NYSE American LLC (the &ldquo;NYSE American&rdquo;)
        under the symbol &ldquo;CLDI.&rdquo; On March 27, 2025,\nthe last reported
        sale price of our Common Stock on the NYSE American was $0.6950 per share.
        There is no established trading market\nfor the Pre-funded Warrants, or the
        Common Warrants and we do not intend to list the Pre-funded Warrants or Common
        Warrants\non any securities exchange or nationally recognized trading system.</P>\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nare an &ldquo;emerging growth company&rdquo; and &ldquo;smaller
        reporting company&rdquo; as defined under U.S. federal securities laws\nand
        are subject to reduced public company reporting requirements. See the section
        entitled &ldquo;Prospectus Summary&mdash;Implications\nof Being a Smaller
        Reporting Company and Emerging Growth Company&rdquo; on page 5 of the accompanying
