        STYLE=\"margin: 0pt; font: 10pt Times New Roman, Times, Serif; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">On\nOctober 11, 2024, the Company entered
        into an At The Market Offering Agreement (the &ldquo;Sales Agreement&rdquo;)
        with Ladenburg Thalmann\n&amp; Co. Inc. (the &ldquo;Ladenburg&rdquo;), pursuant
        to which the Company, from time to time, sold shares of common stock in &ldquo;at\nthe
        market&rdquo; offerings through or to Ladenburg, acting as agent or principal,
        shares of the Company&rsquo;s common stock, initially\nhaving an aggregate
        offering price of up to $5.1 million. Sales of the shares of common stock,
        were made at prevailing market prices\nat the time of the sale, or as otherwise
        agreed with Craig-Hallum. During the period from October 11, 2024, through
        January 10, 2025,\nthe Company issued a total of 2,197,181 shares of common
        stock pursuant to the Sales Agreement for aggregate gross proceeds of $3.6
        million.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
