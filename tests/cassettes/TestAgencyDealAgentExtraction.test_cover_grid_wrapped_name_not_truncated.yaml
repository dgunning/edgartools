        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Tail</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave also agreed to pay the placement agent a tail fee equal to
        the cash and warrant compensation in this offering, if any investor,\nwho
        was contacted or introduced to us by the placement agent during the term of
        its engagement, provides us with capital in any public\nor private offering
        or other financing or capital raising transaction during the nine (9) month
        period following expiration or termination\nof our engagement agreement with
        the placement agent, provided, however, that the Company has the right to
        terminate its engagement of\nthe placement agent for cause in compliance with
        FINRA Rule 5110(g)(5)(B)(i), which termination for cause eliminates the Company&rsquo;s\nobligations
        with respect to the tail.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: left\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Lock-up\nAgreements
        and other restrictions</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"> Our officers and directors\nhave agreed with the placement agent
        to be subject to a lock-up period of ninety (90) days, respectively, following\nthe
        date of closing of the offering pursuant to this prospectus supplement. This
        means that, during the applicable lock-up period, such\npersons may not offer
        for sale, contract to sell, sell, distribute, grant any option, right or warrant
        to purchase, pledge, hypothecate\nor otherwise dispose of, directly or indirectly,
        any of our shares of common stock or any securities convertible into, or exercisable\nor
        exchangeable for, shares of common stock, subject to customary exceptions.
        The placement agent may waive the terms of these lock-up\nagreements in its
        sole discretion and without notice.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">In addition, pursuant to\nthe placement agency agreement and the securities
        purchase agreement, we have agreed with the placement agent and the investor\nnot
        to: (i) enter into variable rate financings for a period of six (6) months
        following the closing of the offering, subject to\ncertain exceptions; and
        (ii) for seventy five (75) days from closing of the offering (a) issue, enter
        into any agreement to issue\nor announce the issuance or proposed issuance
        of any shares of common stock or securities convertible in common stock, or
        (b) file any\nregistration statement or any amendment or supplement thereto,
        in each case other than (A) a prospectus related to this offering (B)\nthe
        filing of a registration statement on Form S-8 in connection with any employee
        compensation plan and (C) the filing of a new &ldquo;shelf&rdquo;\nregistration
        statement on Form S-3, subject to certain exceptions, including, but not limited
        to, such market standoff no longer applying\nif the closing price of the Company&rsquo;s
        Common Stock is equal to or greater than $1.25 for five (5) consecutive trading
        days. </P>\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: left\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Regulation\nM</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nplacement agent may
        be deemed to be an underwriter within the meaning of Section 2(a)(11) of the
        Securities Act, and any commissions\nreceived by it and any profit realized
        on the resale of the securities sold by it while acting as principal might
        be deemed to be underwriting\ndiscounts or commissions under the Securities
        Act. As an underwriter, the placement agent would be required to comply with
        the requirements\nof the Securities Act and the Exchange Act, including, without
        limitation, Rule 10b-5 and Regulation M under the Exchange Act. These\nrules
        and regulations may limit the timing of purchases and sales of our securities
        by the placement agent acting as principal. Under\nthese rules and regulations,
        the placement agent (i) may not engage in any stabilization activity in connection
        with our securities and\n(ii) may not bid for or purchase any of our securities
        or attempt to induce any person to purchase any of our securities, other than\nas
        permitted under the Exchange Act, until it has completed its participation
        in the distribution.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Indemnification</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave agreed to indemnify the placement agent against certain liabilities,
        including certain liabilities arising under the Securities\nAct and to contribute
        to payments that the placement agent may be required to make for these liabilities.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: left\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Determination\nof Offering Price</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\noffering price of the
        securities we are offering has been negotiated between us and the investors
        in the offering based on the trading\nof our shares of common stock prior
        to the offering, among other things. Other factors considered in determining
        the public offering\nprice of the securities we are offering include our history
        and prospects, the stage of development of our business, our business plans\nfor
        the future and the extent to which they have been implemented, an assessment
        of our management, the general conditions of the securities\nmarkets at the
        time of the offering and such other factors as were deemed relevant.</FONT></P>\n\n<P
