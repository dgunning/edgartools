        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Only\nunderwriters named in the prospectus supplement are underwriters
        of the securities offered by the prospectus supplement.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">If\nunderwriters are used in the sale, the
        underwriters will acquire the securities for their own account, including
        through underwriting,\npurchase, security lending or repurchase agreements
        with us. The underwriters may resell the securities from time to time in one
        or more\ntransactions, including negotiated transactions. Underwriters may
        sell the securities in order to facilitate transactions in any of our\nother
        securities (described in this prospectus or otherwise), including other public
        or private transactions and short sales. Underwriters\nmay offer securities
        to the public either through underwriting syndicates represented by one or
        more managing underwriters or directly\nby one or more firms acting as underwriters.
        Unless otherwise indicated in the prospectus supplement, the obligations of
        the underwriters\nto purchase the securities will be subject to certain conditions,
        and the underwriters will be obligated to purchase all the offered\nsecurities
        if they purchase any of them. The underwriters may change from time to time
        any initial public offering price and any discounts\nor concessions allowed
        or reallowed or paid to dealers.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">If\ndealers are used in the sale of securities offered through this
        prospectus, we will sell the securities to them as principals. They may\nthen
        resell those securities to the public at varying prices determined by the
        dealers at the time of resale. The prospectus supplement\nwill include the
        names of the dealers and the terms of the transaction.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Direct\nSales and Sales Through Agents</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nmay sell the securities offered through
        this prospectus directly. In this case, no underwriters or agents would be
        involved. Such securities\nmay also be sold through agents designated from
        time to time. The prospectus supplement will name any agent involved in the
        offer or\nsale of the offered securities and will describe any commissions
        payable to the agent. Unless otherwise indicated in the prospectus supplement,\nany
        agent will agree to use its reasonable best efforts to solicit purchases for
        the period of its appointment.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nmay sell the securities directly to institutional investors or
        others who may be deemed to be underwriters within the meaning of the\nSecurities
        Act of 1933 with respect to any sale of those securities. The terms of any
        such sales will be described in the prospectus\nsupplement.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>Delayed\nDelivery Contracts</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">If\nthe prospectus supplement
        indicates, we may authorize agents, underwriters or dealers to solicit offers
        from certain types of institutions\nto purchase securities at the public offering
        price under delayed delivery contracts. These contracts would provide for
        payment and delivery\non a specified date in the future. The contracts would
        be subject only to those conditions described in the prospectus supplement.
        The\napplicable prospectus supplement will describe the commission payable
        for solicitation of those contracts.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
