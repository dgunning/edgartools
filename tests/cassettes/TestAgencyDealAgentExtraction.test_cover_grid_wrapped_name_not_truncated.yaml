        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif\"><A NAME=\"a_005\"></A><FONT STYLE=\"font-size: 10pt\"><B>USE\nOF PROCEEDS</B></FONT></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Unless\notherwise indicated
        in a prospectus supplement, we intend to use the net proceeds from the sale
        of the securities under this prospectus\nfor general corporate purposes, including
        to support research and development, including clinical trials, and general
        corporate purposes.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><A NAME=\"a_006\"></A><B>DESCRIPTION\nOF CAPITAL STOCK</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B>General</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nfollowing description
        of our capital stock, together with any additional information we include
        in any applicable prospectus supplement\nor any related free writing prospectus,
        summarizes the material terms and provisions of our common stock and the preferred
        stock that\nwe may offer under this prospectus. While the terms we have summarized
        below will apply generally to any future common stock or preferred\nstock
        that we may offer, we will describe the particular terms of any class or series
        of these securities in more detail in the applicable\nprospectus supplement.
        For the complete terms of our common stock and preferred stock, please refer
        to our articles of incorporation\nand our bylaws that are incorporated by
        reference into the registration statement of which this prospectus is a part.
        The summary below\nand that contained in any applicable prospectus supplement
        or any related free writing prospectus are qualified in their entirety by\nreference
        to our articles of incorporation and our bylaws.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Common\nStock</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nare authorized to issue 330,000,000 shares of common stock, $0.0001
        par value per share, of which Three Hundred Twelve Million (312,000,000)\nare
        designated as Voting Common Stock (&ldquo;Common Stock&rdquo;) and Eighteen
        Million (18,000,000) are designated as Non-Voting Common\nStock (the &ldquo;Non-Voting
        Common Stock&rdquo;). As of January 10, 2025, there were 27,881,677 shares
        of common stock issued and outstanding.\nThe outstanding shares of common
        stock are validly issued, fully paid and nonassessable.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Voting\nPower</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Holders\nof
        Common Stock are entitled to one vote for each share held on all matters submitted
        to a vote of stockholders, including the election\nof directors, and do not
        have cumulative voting rights. Accordingly, the holders of a plurality of
        votes cast can elect all of the directors\nstanding for election, if they
        so choose, other than any directors that holders of any preferred stock may
        issue may be entitled to elect.\nSubject to supermajority votes for some matters,
        other matters shall be decided by the affirmative vote of our stockholders
        having a\nmajority in voting power of the votes cast by the stockholders present
        or represented and voting on such matter.</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The\nshares
        of Non-Voting Common Stock shall automatically convert into shares of Common
        Stock on a one-to-one basis at such time that such\nshares of Non-Voting Common
        Stock are released from the escrow account holding such shares in accordance
        with the Merger Agreement and\nthe escrow agreement governing such escrow
        account.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Dividends</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">Subject\nto
        applicable law and the rights and preferences, if any, of any holders of any
        outstanding series of Preferred Stock, holders of Common\nStock will be entitled
        to receive dividends when, as and if declared by the Board, payable either
        in cash, in property or in shares of\ncapital stock.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Liquidation,\nDissolution and Winding Up</I></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Upon\nour liquidation, dissolution or winding up and after payment
        in full of all amounts required to be paid to creditors and to any holders\nof
        preferred stock having liquidation preferences, if any, the holders of Common
        Stock will be entitled to receive pro rata our remaining\nassets available
        for distribution.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"></P>\n\n<!--
        Field: Page; Sequence: 11 -->\n    <DIV STYLE=\"margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
