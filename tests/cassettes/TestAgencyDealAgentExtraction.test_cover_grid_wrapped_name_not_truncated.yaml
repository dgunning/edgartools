        New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"margin: 0pt; font: 10pt Times New Roman, Times, Serif; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">On\nOctober 23, 2024, the Company entered
        into a Securities Purchase Agreement (the &ldquo;Purchase Agreement&rdquo;)
        with certain institutional\ninvestors (the &ldquo;Purchasers&rdquo;), pursuant
        to which the Company agreed to issue to the Purchasers, (i) in a registered
        offering,\n2,050,000 shares of the Company&rsquo;s common stock, par value
        $0.0001 per share, at a purchase price of $1.00 per share, and (ii) in\na
        concurrent private placement, Series E common stock purchase warrants to purchase
        up to 2,050,000 shares of Common Stock (the &ldquo;Series\nE Common Warrants&rdquo;)
        and Series F common stock purchase warrants to purchase up to 2,050,000 shares
        of Common Stock (the &ldquo;Series\nF Common Warrants&rdquo; and together
        with the Series E Common Warrants, the &ldquo;Common Warrants&rdquo;). Such
        registered direct offering\nand concurrent private placement are referred
        to herein as the &ldquo;Transactions.&rdquo;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
