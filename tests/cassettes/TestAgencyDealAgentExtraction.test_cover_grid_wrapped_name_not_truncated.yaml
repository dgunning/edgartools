        Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">The\nplacement agent and
        certain of its affiliates are full service financial institutions engaged
        in various activities, which may include\nsecurities trading, commercial and
        investment banking, financial advisory, investment management, investment
        research, principal investment,\nhedging, financing and brokerage activities.
        The placement agent and certain of its affiliates have, from time to time,
