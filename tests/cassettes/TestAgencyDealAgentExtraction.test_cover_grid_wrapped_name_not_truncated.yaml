        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"width:
        100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif\"><A NAME=\"a_003\"></A><FONT STYLE=\"font-size: 10pt\"><B>PROSPECTUS\nSUMMARY</B></FONT></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>This\nsummary highlights
        certain information about us and selected information contained in the prospectus.
        This summary is not complete and\ndoes not contain all of the information
        that may be important to you. For a more complete understanding of the Company,
        we encourage\nyou to read and consider the more detailed information included
        or incorporated by reference in this prospectus and our most recent consolidated\nfinancial
        statements and related notes.</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>Company\nOverview</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">We\nare a clinical-stage
        immuno-oncology company that is developing innovative stem cell-based and
        enveloped platforms for the delivery and\npotentiation of oncolytic virotherapies
        to treat cancer. Our pipeline includes off-the-shelf product candidates designed
        to protect oncolytic\nviruses from being quickly inactivated by the patient&rsquo;s
        immune system and target tumor sites. Once approved by the FDA, this improved\ndelivery,
        both localized and systemic, and increased potency will enable us to develop
        treatments that target various types of cancer\nat different stages of progression.
        Our goal is to create therapies that work on any tumor, regardless of its
        genetic profile (universal\ntreatments). In addition to direct targeting and
        killing cancer cells, our oncolytic virotherapies have shown signs of changing
        the tumor\nimmune environment to induce strong anti-tumor immunity that could
        lead to better cancer treatment and prevent tumor recurrence.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">CLD-101\n(NeuroNova&trade; Platform) for Newly Diagnosed High Grade
        Glioma (&ldquo;HGG&rdquo;) (also referred to as &ldquo;NNV1&rdquo; as to the\nindication).
        CLD-101 is our product candidate utilizing our NeuroNova&trade; Platform targeting
        HGG. Prior to our licensing agreement\nwith Northwestern University, an open-label,
        investigator sponsored, Phase 1, dose- escalation clinical trial for NNV1
        in patients with\nnewly diagnosed high-grade gliomas was completed. This clinical
        trial demonstrated that single administration of CLD-101 was well tolerated\nin
        patients with newly diagnosed HGG. Subject to funding, Northwestern University
        anticipates to commence a Phase 1b clinical trial during\nthe first quarter
        of 2025. This trial will explore the final dosing regimen for NNV1, including
        the feasibility of repeated dosing in\nnewly diagnosed HGG. Extensive biomarker
        analysis will be performed on tumor biopsies and blood samples to determine
        viral distribution,\nspecific tumor targeting and induction of anti-tumor
        immunity.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">CLD-101\nfor Recurrent HGG (also referred to as &ldquo;NNV2&rdquo;
        as to the recurrent HGG indication). A phase 1 study evaluating the safety\nand
        feasibility of administering repeated doses of CLD-101 intracerebrally to
        patients with recurrent high-grade gliomas began treatment\nin May 2023. The
        study is being run by our partner, City of Hope, and started enrolling cohort
        4 in January 2024. Clinical data from\npatients with recurrent HGG treated
        with repeated doses of CLD-101 is planned to support the start of a trial
        of repeated doses in newly\ndiagnosed HGG.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">CLD-201\n(SuperNova&trade;)
        for Advanced Solid Tumors (triple-negative breast cancer (&ldquo;TNBC&rdquo;),
        head &amp; neck squamous cell carcinoma\n(HNSCC), and advanced soft tissue
        sarcoma (also referred to as &ldquo;SNV1&rdquo;). SNV1 is our first internally
        developed pre-clinical\nproduct candidate utilizing our SuperNova&trade; Delivery
        Platform. Based on our pre-clinical studies, we believe SNV1 has therapeutic\npotential
        for the treatment of multiple solid tumors such as head and neck cancer, triple-negative
        breast cancer and melanoma. We have\nheld a pre-IND meeting with FDA to discuss
        the filing of our IND application for the clinical development of CLD-201.
        We anticipate commencing\na Phase 1 clinical trial for SNV1 during the first
        half of 2025.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">CLD-301\n(AAA) for Multiple Indications. We are also currently engaged
        in early discovery research involving Adult Allogeneic Adipose-derived\n(&ldquo;AAA&rdquo;)
        stem cells for various indications and therapies. These AAA stem cells are
        theoretically multipotent, differentiating\nalong the adipocyte, chondrocyte,
        myocyte, neuronal, and osteoblast lineages, and may have the ability to serve
        in other capacities,\nsuch as providing hematopoietic support and gene transfer
        with potential applications for repair and regeneration of acute and chronically\ndamaged
        tissues. Pre-clinical studies involving toxicity and efficacy will be needed
        before an IND application may be filed with the\nFDA.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"></P>\n\n<!--
        Field: Page; Sequence: 6; Options: NewSection -->\n    <DIV STYLE=\"margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"border-collapse: collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align:
        top; text-align: left\"><TD STYLE=\"text-align: center; width: 100%\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->1<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"width:
        100%\">&nbsp;</TD></TR></TABLE></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">Our\nsubsidiary Nova Cell,
        Inc. (&ldquo;Nova Cell&rdquo;) was formed to be a technology service provider
        that develops innovative stem cell-based\nproducts using our cellular manufacturing
        process. Through Nova Cell we anticipate expanding potential uses from oncology
        to other fields\nthat require regenerative medical applications, such as cosmetics,
        orthopedics, auto-immune diseases, and various other therapies.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">CLD-400\n(RTNova) for Lung cancer and Metastatic Solid Tumors, our
        pre-clinical program involving enveloped oncolytic viruses (discovery phase),\nbuilds
        upon our experience of using cells to protect, potentiate and deliver virotherapies.
        CLD-400 program is derived from research\nfrom prior pre-clinical CLD-202
        program. RTNova consists of an engineered vaccinia virus enveloped by a cell
        membrane, that is potentially\ncapable of targeting lung cancer and advanced
        metastatic disease due to its increased ability to survive in the bloodstream.
        Metastatic\nsolid tumors involve cancer cells that break away from where they
        first formed (primary cancer) and travel through the blood or lymph\nsystem
        to form new tumors, known as metastatic tumors, in other parts of the body.
        In preclinical studies, RTNova has shown early signs\nof its resistance to
        human humoral immunity and capability to target multiple distant and diverse
        tumors and transform their microenvironments\nleading to their elimination.
        In addition, the program has shown potential synergistic effects with other
        immunotherapies, including\ncell therapies, to attack and eliminate disseminated
        solid tumors.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Since\ninception, our operations have focused on organizing and staffing
        our company, business planning, raising capital, acquiring and developing\nour
        technology, establishing our intellectual property portfolio, identifying
        potential product candidates and undertaking preclinical\nstudies and manufacturing.
        We do not have any products approved for sale and have not generated any revenue
        from product sales. We have\nfunded our operations primarily through private
        sales of common stock, convertible preferred stock, contingently convertible
        and convertible\npromissory notes, term loans, lines of credit, and Simple
        Agreements for Future Equity (&ldquo;SAFE&rdquo;). These investments have
        included\nand have been made by various related parties, including our largest
        investor and Chief Executive Officer and Chairman of the Board of\nDirectors.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Since\ninception, we have incurred significant operating losses. Our
        net loss was $5.1 million and $18.1 million for the three and nine months\nended
        September 30, 2024, respectively. As of September 30, 2024, we had an accumulated
        deficit of $117.6 million. We expect to continue\nto incur significant and
        increasing expenses and operating losses for the foreseeable future, as we
        advance our current and future product\ncandidates through preclinical and
        clinical development, manufacture drug product and drug supply, seek regulatory
        approval for our current\nand future product candidates, maintain and expand
        our intellectual property portfolio, hire additional research and development
        and\nbusiness personnel and operate as a public company.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Changes\nin economic conditions, including rising interest rates, public
        health issues, including the COVID-19 pandemic and its aftereffects,\nlower
        consumer confidence, volatile equity capital markets and ongoing supply chain
        disruptions and the impacts of geopolitical conflicts,\nmay also affect our
        business.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nwill not generate revenue from product sales unless and until we
        successfully complete clinical development and obtain regulatory approval\nfor
        our product candidates. In addition, if we obtain regulatory approval for
        our product candidates and do not enter into a third-party\ncommercialization
        partnership, we expect to incur significant expenses related to developing
        our commercialization capability to support\nproduct sales, marketing, manufacturing
        and distribution activities.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">As\na result, we will need substantial additional
        funding to support our continuing operations and pursue our growth strategy.
        Until we can\ngenerate significant revenue from product sales, if ever, we
        expect to finance our operations through a combination of public or private\nequity
        offerings and debt financings or other sources, such as potential collaboration
        agreements, strategic alliances and licensing\narrangements. We may be unable
        to raise additional funds or enter into such other agreements or arrangements
        when needed on acceptable\nterms, or at all. Our inability to raise capital
        or enter into such agreements as, and when needed, could have a material adverse
        effect\non our business, results of operations and financial condition.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Based\non our operating plan, we believe we do not have sufficient
        cash on hand to support current operations for at least one year from the\ndate
        of issuance of our unaudited condensed consolidated financial statements as
        of, and for the three and nine months ended September\n30, 2024. We have concluded
        that this circumstance raises substantial doubt about our ability to continue
        as a going concern. See Note\n1 to our unaudited condensed consolidated financial
        statements. In addition, we will be required to raise additional capital through\nthe
        issuance of our equity securities to support our operations which will have
        an ownership and economic dilutive effect to our current\nshareholders who
        purchased their shares of common stock at prices above our current trading
        price, and such capital raising may adversely\naffect the price of our common
        stock. Further, the sale of or the perception of a sale of a substantial number
        of our common stock by\ncertain selling securityholders pursuant to another
        registration statement filed with the SEC will adversely affect the price
        of our\ncommon stock due to our limited trading volume and adversely affect
        the share price that we may obtain in future financings and may adversely\naffect
        our ability to conduct and complete future financings.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
