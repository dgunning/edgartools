        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Except as otherwise indicated,\nthe information in this prospectus
        supplement assumes, no release of the Non-Voting Escalation Shares, no exercise
        of any outstanding\noptions or exercise of any outstanding warrants or conversion
        of the convertible debt and assumes no exercise of the Common Warrants\nissued
        pursuant to the concurrent private placement described in this prospectus
        supplement, or by the Placement Agent of the Placement\nAgent Warrants.</P>\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> <FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">To\nthe extent that options or warrants are exercised, you may experience
        further dilution. In addition, we may choose to raise additional\ncapital
        due to market conditions or strategic considerations even if we believe we
        have sufficient funds for our current or future operating\nplans. To the extent
        that additional capital is raised through the sale of equity or convertible
        debt securities, the issuance of these\nsecurities could result in further
        dilution to our stockholders.</FONT> </P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><B><A NAME=\"SL_009\"></A>DESCRIPTION\nOF SECURITIES
        WE ARE OFFERING</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt; text-align: center\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">We are offering 3,325,000\nshares of Common Stock at a purchase price
        of $0.65 per Share or Pre-funded Warrants, in lieu thereof, at a\npurchase
        price of $0.649 per Pre-funded Warrant. We are also registering the shares
        of our Common Stock issuable upon exercise\nof the Pre-funded Warrants offered.</P>\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: left\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>Common\nStock</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">The\nshares
        of our Common Stock are registered under Section 12 of the Exchange Act and
        are traded on NYSE American under the symbol &ldquo;CLDI&rdquo;.\nThe material
        terms and provisions of our Common Stock and each other class of our securities
        that qualifies or limits our Common Stock\nare described in the section entitled
        &ldquo;<I>Description of Capital Stock</I>&rdquo;, beginning on page 6 of
        the accompanying base\nprospectus.</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        left\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>Pre-funded\nWarrants</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>General</I>.\nThe term &ldquo;pre-funded&rdquo; refers to the fact
        that the purchase price of the Pre-funded Warrants in this offering includes
        almost\nthe entire exercise price that will be paid under the Pre-funded Warrants,
        except for a nominal remaining exercise price of $0.001. The\npurpose of the
        Pre-Funded Warrants is to enable investors that may have restrictions on their
        ability to beneficially own more than 4.99%\n(or, at the election of such
        purchaser, 9.99%, 14.99%, or 19.99%) of our outstanding common stock following
        the consummation of this\noffering the opportunity to invest capital into
        the Company without triggering their ownership restrictions, by receiving
        Pre-Funded\nWarrants in lieu of shares of our common stock which would result
        in such ownership of more than 4.99%, 9.99%, 14.99%, or 19.99%, as\napplicable,
        and receiving the ability to exercise their option to purchase the shares
        underlying the Pre-funded Warrants at a nominal\nprice at a later date.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nfollowing summary of certain terms and provisions of Pre-funded
        Warrants that are being offered hereby is not complete and is subject\nto,
        and qualified in its entirety by, the provisions of the Pre-Funded Warrant,
        the form of which is filed as an exhibit to the registration\nstatement of
        which this prospectus forms a part. Prospective investors should carefully
        review the terms and provisions of the form of\nPre-funded Warrant for a complete
        description of the terms and conditions of the Pre-Funded Warrants.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Duration\nand Exercise Price</I>. Each Pre-funded Warrant offered
        hereby has an initial exercise price per share equal to $0.001. The Pre-Funded\nWarrants
        are immediately exercisable and may be exercised at any time until the Pre-Funded
        Warrants are exercised in full. The exercise\nprice and number of shares of
        Common Stock issuable upon exercise is subject to appropriate adjustment in
        the event of stock dividends,\nstock splits, reorganizations or similar events
        affecting our Common Stock and the exercise price. The Pre-Funded Warrants
        will be issued\nseparately from the accompanying Common Warrants and may be
        transferred separately immediately thereafter.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence: 16; Value: 1 -->\n
        \   <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
        collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top;
        text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->14<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>&nbsp;</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Exercisability</I>.\nThe Pre-funded Warrants
        are exercisable, at the option of each holder, in whole or in part, by delivering
        to us a duly executed exercise\nnotice accompanied by payment in full for
        the number of shares of our Common Stock purchased upon such exercise (except
        in the case of\na cashless exercise as discussed below). Purchasers of the
        Pre-funded Warrants in this offering may elect to deliver their exercise notice\nfollowing
        the pricing of the offering and prior to the issuance of the Pre-Funded Warrants
        at closing to have their Pre-Funded Warrants\nexercised immediately upon issuance
        and receive shares of Common Stock underlying the Pre-Funded Warrants upon
        closing of this offering.\nA holder (together with its affiliates) may not
        exercise any portion of the Pre-Funded Warrant to the extent that the holder
        would own\nmore than 4.99% of the outstanding Common Stock immediately after
        exercise, except that upon at least 61 days&rsquo; prior notice from\nthe
        holder to us, the holder may increase the amount of ownership of outstanding
        stock after exercising the holder&rsquo;s Pre-Funded\nWarrants up to 9.99%
        of the number of shares of our Common Stock outstanding immediately after
        giving effect to the exercise, as such\npercentage ownership is determined
        in accordance with the terms of the Pre-funded Warrants. Purchasers of Pre-funded
        Warrants in this\noffering may also elect prior to the issuance of the Pre-funded
        Warrants to have the initial exercise limitation set at 9.99% of our\noutstanding
        Common Stock. No fractional shares of Common Stock will be issued in connection
        with the exercise of a Pre-funded Warrant.\nIn lieu of fractional shares,
        we will round down to the next whole share.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>&nbsp;</I></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Cashless\nExercise</I>. If, at the time
        a holder exercises its Pre-funded Warrants, a registration statement registering
        the issuance of the shares\nof Common Stock underlying the Pre-funded Warrants
        under the Securities Act is not then effective or available, then in lieu
        of making\nthe cash payment otherwise contemplated to be made to us upon such
        exercise in payment of the aggregate exercise price, the holder may\nelect
        instead to receive upon such exercise (either in whole or in part) the net
        number of shares of Common Stock determined according\nto a formula set forth
        in the Pre-funded Warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Transferability</I>.\nSubject to applicable
        laws, a Pre-funded Warrant may be transferred at the option of the holder
        upon surrender of the Pre-funded Warrant\nto us together with the appropriate
        instruments of transfer.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><I>Exchange\nListing</I>. There is no trading
        market available for the Pre-funded Warrants on any securities exchange or
        nationally recognized trading\nsystem. We do not intend to list the Pre-Funded
        Warrants on any securities exchange or nationally recognized trading system.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><I>Right\nas a Stockholder</I>. Except as otherwise provided in the
        Pre-funded Warrants or by virtue of such holder&rsquo;s ownership of shares\nof
        our Common Stock, the holders of the Pre-funded Warrants do not have the rights
        or privileges of holders of our Common Stock, including\nany voting rights,
        until they exercise their Pre-funded Warrants.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><I>Fundamental\nTransaction.
        </I>In the event of a fundamental transaction, as described in the Pre-funded
        Warrants and generally including any reorganization,\nrecapitalization or
        reclassification of our Common Stock, the sale, transfer or other disposition
        of all or substantially all of our\nproperties or assets, our consolidation
        or merger with or into another person, the acquisition of more than 50% of
        our outstanding Common\nStock, or any person or group becoming the beneficial
        owner of 50% of the voting power represented by our outstanding Common Stock,
        the\nholders of the Pre-funded Warrants will be entitled to receive upon exercise
        of the Pre-funded Warrants the kind and amount of securities,\ncash or other
        property that the holders would have received had they exercised the Pre-Funded
        Warrants immediately prior to such fundamental\ntransaction. Notwithstanding
        the foregoing, in the event of a fundamental transaction, the holder of the
        Pre-funded Warrant will have\nthe right to require us or the successor entity
        to purchase the remaining unexercised portion of the Pre-funded Warrant in
        cash in an\namount equal to a Black Scholes Value as defined in the Pre-funded
        Warrant.&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"> <B><A
        NAME=\"sl_009a\"></A>CONCURRENT PRIVATE PLACEMENT</B> </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"> Concurrently with
        this\noffering, we are also selling to the investor in this offering Series
        G Common Warrants to purchase up to 6,053,000 shares of Common\nStock (&ldquo;Common
        Warrant Shares&rdquo;), with an exercise price of $0.6954 per Series G Common
        Warrant Share, subject to certain\nadjustments, and exercisable on the date
        that is six (6) months from the date of issuance for a term of seven and one-half
        years from\nthe initial exercise date. </P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\"> The Common Warrants
        will\nbe exercisable, at the option of the holder, in whole or in part by
        delivering to us a duly executed exercise notice and, at any time\na registration
        statement registering the issuance of the Common Stock underlying the Common
        Warrants under the Securities Act is effective\nand available for the issuance
        of such shares, or an exemption from registration under the Securities Act
        is available for the issuance\nof such shares, by payment in full in immediately
        available funds for the number of Common Stock purchased upon such exercise.
        </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> A holder of Common Warrants\nwill have the right to exercise the
        Common Warrants on a &ldquo;cashless&rdquo; basis if there is no effective
        registration statement\nregistering the resale of the Common Warrant Shares
        underlying the Common Warrants. Subject to limited exceptions, a holder of
        Common\nWarrants will not have the right to exercise any portion of its Common
        Warrants if the holder, together with its affiliates, would beneficially\nown
        in excess of 4.99% of the number of shares of Common Stock outstanding immediately
        after giving effect to such exercise, provided\nthat the holder may, at its
        option, increase the beneficial ownership limitation up to 9.99%, 14.99% or
        19.99%. </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> We have agreed to prepare\nand file with the SEC a registration statement
        to register for resale all of the Common Warrant Shares underlying the Common
        Warrants.\nExcept as otherwise provided in the Common Warrants or by virtue
        of such holder&rsquo;s ownership of Common Warrant Shares, the holders\nof
        the Common&nbsp;Warrants do not have the rights or privileges of holders of
        our shares of Common Stock, including any voting rights,\nuntil they exercise
        their Common Warrants.&nbsp; </P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\"> &nbsp;
        </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.5in\"> The Common Warrants and\nthe Common
        Warrant Shares issuable upon the exercise of the Common Warrants are being
        offered pursuant to the exemptions provided in\nSection 4(a)(2) of the Securities
        Act and Rule 506(b) of Regulation D promulgated thereunder, and they are not
        being offered pursuant\nto this prospectus supplement and the accompanying
        prospectus. </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: justify; text-indent: 0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> In the event of any fundamental\ntransaction, as described in the
        Common Warrants and generally including any merger with or into another entity,
        sale of all or substantially\nall of our assets, tender offer or exchange
        offer, or reclassification of our shares of Common Stock, subject to certain
        exceptions,\nthen upon any subsequent exercise of a Common Warrant, the holder
        will have the right to receive as alternative consideration, for each\nCommon
        Warrant Share that would have been issuable upon such exercise immediately
        prior to the occurrence of such fundamental transaction,\nthe number of shares
        of Common Stock of the successor or acquiring corporation of our company,
        if it is the surviving corporation, and\nany additional consideration receivable
        upon or as a result of such transaction by a holder of the number of Common
        Warrant Shares for\nwhich the Common Warrant is exercisable immediately prior
        to such event. Notwithstanding the foregoing, in the event of a fundamental\ntransaction,
        the holders of the Common Warrants have the right to require us or a successor
        entity to redeem the Common Warrants for\ncash in the amount of the Black
        Scholes Value (as defined in each Common Warrant) of the unexercised portion
        of the Common Warrants concurrently\nwith or within 30 days following the
        consummation of a fundamental transaction. However, in the event of a fundamental
        transaction which\nis not in our control, including a fundamental transaction
        not approved by our board of directors, the holders of the Common Warrants\nwill
        only be entitled to receive from us or our successor entity, as of the date
        of consummation of such fundamental transaction the\nsame type or form of
        consideration (and in the same proportion), at the Black Scholes Value of
        the unexercised portion of the Common\nWarrants, that is being offered and
        paid to the holders of our common shares in connection with the fundamental
        transaction, whether\nthat consideration is in the form of cash, shares or
        any combination of cash and shares, or whether the holders of our common shares\nare
        given the choice to receive alternative forms of consideration in connection
        with the fundamental transaction, provided, further,\nthat if holders of Common
        Stock of the Company are not offered or paid any consideration in such fundamental
        transaction, such holders\nof Common Stock will be deemed to have received
        common stock of the successor entity (which entity may be the Company following
        such\nFundamental Transaction) in such fundamental transaction. </P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> In accordance with its\nterms and subject to applicable laws, a Common
        Warrant may be transferred at the option of the holder upon surrender of the
        Common Warrant\nto us together with the appropriate instruments of transfer
        and payment of funds sufficient to pay any transfer taxes (if applicable).
        </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0;
        text-align: justify; text-indent: 0.5in\"> &nbsp; </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"> Except as otherwise provided\nin the Common Warrants or by virtue
        of such holder&rsquo;s ownership of our Common Stock, the holder of a Common
        Warrant does not have\nthe rights or privileges of a holder of our Common
        Stock, including any voting rights, until the holder exercises the Common
        Warrant. </P>\n\n<P STYLE=\"margin: 0pt 0; font: 10pt Times New Roman, Times,
        Serif\"> &nbsp; </P>\n\n<P STYLE=\"text-align: justify; font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"> There is no established public trading
        market for the Common Warrants,\nand we do not expect a market to develop.
        In addition, we do not intend to list the Common Warrants on NYSE American,
        any other national\nsecurities exchange or any other nationally recognized
        trading system. </P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin-top: 0pt; margin-bottom: 0pt; text-align: center\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><B><A NAME=\"SL_010\"></A>PLAN\nOF DISTRIBUTION</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Ladenburg\nThalmann &amp; Co. Inc. (the &ldquo;placement agent&rdquo;),
        has agreed to act as our exclusive placement agent in connection with this\noffering,
        subject to the terms and conditions of the Placement Agency Agreement, dated
        March 28, 2025. The placement agent is not\npurchasing or selling any of the
        securities offered by this prospectus supplement, nor is it required to arrange
        the purchase or\nsale of any specific number or dollar amount of securities
        but has agreed to use its reasonable best efforts to arrange for the sale\nof
        all of the securities offered hereby. We may not sell the entire amount of
        securities offered pursuant to this prospectus. The\nterms of this offering
        were subject to market conditions and negotiations between us, the placement
        agent and prospective investors.\nThis is a best efforts offering and there
        is no minimum offering amount required as a condition to the closing of this
        offering. Because\nthere is no minimum offering amount required as a condition
        to closing this offering, we may sell fewer than all of the securities offered\nhereby,
        which may significantly reduce the amount of proceeds received by us. The
        placement agent does not guarantee that it will be\nable to raise new capital
        in any prospective offering. </FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.25in\"> In
        connection with this\noffering, we entered into a securities purchase agreement
        with the investor. The agreement includes representations and warranties by\nus
        and the investor. We will only sell to such investors who have entered into
        the securities purchase agreement with us. In addition to rights and remedies
        available to all purchasers in this offering under federal securities and
        state law, the purchasers\nwhich enter into a securities purchase agreement
        will also be able to bring claims of breach of contract against us. </P>\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nwill deliver the securities being issued
        to the investor upon receipt of such investor&rsquo;s funds for the purchase
        of the securities\noffered pursuant to this prospectus supplement. We expect
        to deliver the shares of our Common Stock being offered pursuant to this prospectus\nsupplement
        on or about March 31, 2025, subject to the satisfaction of customary closing
        conditions.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">We\nhave agreed to indemnify the placement agent against specified
        liabilities, including liabilities under the Securities Act, and to contribute\nto
        payments the placement agent may be required to make in respect thereof.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence:
