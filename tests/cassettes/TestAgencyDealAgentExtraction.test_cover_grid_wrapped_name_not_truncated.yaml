        and\nare subject to change based on various factors, including those discussed
        under &ldquo;Risk Factors&rdquo; in this prospectus supplement\nand the accompanying
        base prospectus and under similar headings in the documents incorporated by
        reference herein and therein. Accordingly,\ninvestors should not place undue
        reliance on this information.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.25in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.25in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Unless\notherwise stated or the context requires
        otherwise, all references in this prospectus supplement to the &ldquo;Company,&rdquo;
        &ldquo;we,&rdquo;\n&ldquo;us,&rdquo; &ldquo;our&rdquo;, &ldquo;CLDI&rdquo;
        refer to Calidi Biotherapeutics, Inc., a Delaware corporation. References
        to\n&ldquo;you&rdquo; refer to a prospective investor.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.25in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence: 3; Options: NewSection;
        Value: 1 -->\n    <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
