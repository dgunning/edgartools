        Serif; font-size: 10pt\"><B><A NAME=\"SL_004\"></A>RISK\nFACTORS</B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt; text-align: center\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><I>An\ninvestment
        in our Common Stock involves a high degree of risk. Before making an investment
        decision, in addition to the risks set forth\nbelow, you should consider the
        &ldquo;Risk Factors&rdquo; included under Item 1A of our most recent Annual
        Report on Form 10-K, as may\nbe updated in our subsequent Quarterly Reports
        on Form 10-Q, and other reports and documents that are incorporated by reference
        into\nthis prospectus supplement and the accompanying base prospectus, before
        deciding whether to purchase any of our Common Stock in this\noffering. .
        The market or trading price of our Common Stock could decline due to any of
        these risks. In addition, please read &ldquo;Forward-Looking\nStatements&rdquo;
        in this prospectus, where we describe additional uncertainties associated
        with our business and the forward-looking\nstatements included or incorporated
        by reference in this prospectus. Please note that additional risks not currently
        known to us or that\nwe currently deem immaterial may also impair our business
        and operations. If any of the risks or uncertainties described in our SEC
        filings\nor any additional risks and uncertainties actually occur, our business,
        financial condition, results of operations and cash flow could\nbe materially
        and adversely affected. In that case, the market value and/or trading price,
        as applicable, of our securities could decline,\nand you might lose all or
        part of your investment.</I></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>Our\nmanagement will have broad discretion
        over the use of the net proceeds from this offering, you may not agree with
        how we use the proceeds,\nand the proceeds may not be invested successfully.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Our\nmanagement will have broad discretion in the application of the
        net proceeds from this offering, and our stockholders will not have the\nopportunity
        as part of their investment decision to assess whether the net proceeds are
        being used appropriately. Because of the number\nand variability of factors
        that will determine our use of the net proceeds from this offering, their
        ultimate use may vary substantially\nfrom their currently intended use. The
        failure by our management to apply these funds effectively could harm our
        business. See &ldquo;Use\nof Proceeds&rdquo; on page S-12 of this prospectus
        supplement for a description of our proposed use of proceeds from this offering.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>Our\nindependent registered public accounting firm has included
        an explanatory paragraph relating to our ability to continue as a going concern\nin
        its report on our audited financial statements included in our Annual Report
        on Form 10-K for the Fiscal year ended December 31, 2023.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nreport from our independent registered public accounting firm
        for the year ended December 31, 2023, includes an explanatory paragraph\nstating
        that we have significant working capital deficiency, and have incurred significant
        losses and need to raise additional funds\nto meet our obligations and sustain
        our operations. These conditions raise substantial doubt about our ability
        to continue as a going\nconcern. As of September 30, 2024, we had approximately
        $1.9 million in cash and restricted cash of $0.2 million, an accumulated deficit\nof
        approximately $117.6 million and working capital deficit of approximately
        $9.4 million. We believe that our existing cash and cash\nequivalents as of
        September 30, 2024, and our anticipated expenditures and commitments for the
        next twelve months, will not enable us\nto fund our operating expenses and
        capital expenditure requirements for the twelve months from September 30,
        2024. Our recurring losses\nfrom operations since inception and required additional
        funding to finance our operations raise substantial doubt about our ability
        to\ncontinue as a going concern. These conditions could materially limit our
        ability to raise additional funds through the issuance of new\ndebt or equity
        securities or otherwise. There is no assurance that sufficient financing will
        be available when needed, or at all, to\nallow us to continue as a going concern.
        The perception that we may not be able to continue as a going concern may
        also make it more\ndifficult to operate our business due to concerns about
        our ability to meet our contractual obligations. Our ability to continue as
        a\ngoing concern is contingent upon, among other factors, the sale of our
        securities. There is no assurance that sufficient financing will\nbe available
        when needed, or at all, to allow us to continue as a going concern.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">If\nwe are unable to secure
        additional capital, we may be required to curtail our clinical and research
        and development initiatives and take\nadditional measures to reduce costs
        in order to conserve our cash in amounts sufficient to sustain operations
        and meet our obligations.\nThese measures could cause significant delays in
        our clinical and regulatory efforts, which is critical to the realization
        of our business\nplan. The consolidated financial statements do not include
        any adjustments that may be necessary should we be unable to continue as a\ngoing
        concern. It is not possible for us to predict at this time the potential success
        of our business. The revenue and income potential\nof our proposed business
        and operations are currently unknown. If we cannot continue as a viable entity,
        you may lose some or all of\nyour investment.</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence: 11; Value: 1 -->\n
        \   <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
        collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top;
        text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->9<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>If\nyou purchase securities sold in
        this offering, you may experience immediate dilution as a result of this offering.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">You may incur immediate and\nsubstantial dilution as a result of this
        offering. After giving effect to the sale by us of 3,325,000&nbsp;Shares offered
        in this\noffering at a purchase price of $0.65 per Share or Pre-funded Warrants
        at a purchase price of $0.649 per\nPre-funded Warrant, and after deducting
        Placement Agent fees and offering expenses payable by us, and assuming full
        exercise of the Pre-funded\nWarrants, you will suffer immediate and substantial
        dilution of approximately $0.20 per share. We have a significant number of\nstock
        options and warrants outstanding, and, in order to raise additional capital,
        we may in the future offer additional shares of our\ncommon stock or other
        securities convertible into or exchangeable for our common stock at prices
        that may not be the same as the price\nper share in this offering. In the
        event that the outstanding options and/or warrants are exercised, or that
        we make additional issuances\nof common stock or other convertible or exchangeable
        securities, you could experience additional dilution. We cannot assure you
        that\nwe will be able to sell shares or other securities in any other offering
        at a price per share that is equal to or greater than the price\nper share
        paid by investors in this offering, and investors purchasing shares or other
        securities in the future could have rights superior\nto existing stockholders,
        including investors who purchase shares of common stock in this offering.
        The price per share at which we sell\nadditional shares of our common stock
        or securities convertible into common stock in future transactions, may be
        higher or lower than\nthe price per share in this offering. As a result, purchasers
        of the shares we sell, as well as our existing stockholders, will experience\nsignificant
        dilution if we sell at prices significantly below the price at which they
        invested. See the section entitled &ldquo;Dilution&rdquo;\nbelow for a more
        detailed illustration of the dilution you would incur if you participate in
        this offering.</P>\n\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B><I>Sales\nof a significant
        number of shares of our Common Stock in the public markets or significant
        short sales of our Common Stock, or the perception\nthat such sales could
        occur, could depress the market price of our Common Stock and impair our ability
        to raise capital.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Sales\nof a substantial number of shares of
        our Common Stock or other equity-related securities in the public markets,
        could depress the market\nprice of our Common Stock. This offering may contribute
        to a depressed market price of our Common Stock. If there are significant
        short\nsales of our Common Stock, the price decline that could result from
        this activity may cause the share price to decline more so, which,\nin turn,
        may cause long holders of the Common Stock to sell their shares, thereby contributing
        to sales of Common Stock in the market.\nSuch sales also may impair our ability
        to raise capital through the sale of additional equity securities in the future
        at a time and\nprice that our management deems acceptable, if at all.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>There\nis
        a limited trading market for our Common Stock, which could make it difficult
        to liquidate an investment in our Common Stock, in a\ntimely manner.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Our\nCommon Stock is currently traded on the NYSE American. Because
        there is a limited public market for our Common Stock, investors may not\nbe
        able to liquidate their investment whenever desired. We cannot assure that
        there will be an active trading market for our Common Stock\nand the lack
        of an active public trading market could mean that investors may be exposed
        to increased risk. In addition, if we failed\nto meet the criteria set forth
        in SEC regulations, various requirements would be imposed by law on broker-dealers
        who sell our securities\nto persons other than established customers and accredited
        investors. Consequently, such regulations may deter broker-dealers from recommending\nor
        selling our Common Stock, which may further affect its liquidity.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>There\nis no established public trading market for the Pre-funded
        Warrants being offered in this Offering, and we do not expect a market to\ndevelop
        for the Pre-funded Warrants.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">There\nis no established public trading market
        for the Pre-funded Warrants being offered and sold in this Offering, and we
        do not expect a market\nto develop. In addition, we do not intend to apply
        to list the Pre-funded Warrants on any national securities exchange or other
        nationally\nrecognized trading system. Without an active market, the liquidity
        of the Pre-funded Warrants will be limited. Further, the existence\nof the
        Pre-funded Warrants may act to reduce both the trading volume and the trading
        price of our Common Stock.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>The\nPre-funded Warrants are speculative
        in nature.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">Except\nas otherwise provided in the Pre-funded
        Warrants, until holders of Pre-funded Warrants acquire our Common Stock upon
        exercise of the\nPre-funded Warrants, holders of Pre-funded Warrants will
        have no rights with respect to our Common Stock underlying such Pre-funded
        Warrants.\nUpon exercise of the Pre-funded Warrants, the holders will be entitled
        to exercise the rights of a stockholder of our Common Stock only\nas to matters
        for which the record date occurs after the exercise date.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Moreover,\nfollowing this offering, the market value of the Pre-funded
        Warrants is uncertain. There can be no assurance that the market price of\nour
        Common Stock will ever equal or exceed the price of the Pre-funded Warrants,
        and, consequently, whether it will ever be profitable\nfor investors to exercise
        their Pre-funded Warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n\n<!--
        Field: Page; Sequence: 12; Value: 1 -->\n    <DIV STYLE=\"margin-top: 0pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%; font-size:
        10pt\"><TR STYLE=\"vertical-align: top; text-align: left\"><TD STYLE=\"text-align:
        center; width: 100%\">S-<!-- Field: Sequence; Type: Arabic; Name: PageNo -->10<!--
        Field: /Sequence --></TD></TR></TABLE></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 0pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt; text-align: justify\"><FONT STYLE=\"font-family: Times
        New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>We\nwill not receive any meaningful
        amount of additional funds upon the exercise of the Pre-funded Warrants.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">Each\nPre-funded Warrant, will be exercisable until it is fully exercised
        and by means of payment of the nominal cash purchase price upon exercise,\nor
        $ cash purchase price upon exercise, respectively, or through a &ldquo;cashless
        exercise&rdquo; procedure. Accordingly, we will not,\nin case of the Pre-funded
        Warrants, receive any meaningful additional funds upon the exercise of the
        Pre-funded Warrants.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>Significant\nholders or beneficial holders
        of shares of our Common Stock may not be permitted to exercise the Pre-funded
        Warrants that they hold.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">A holder of the Pre-funded\nWarrants will not
        be entitled to exercise any portion of any Pre-funded Warrant that, upon giving
        effect to such exercise, would cause:\n(i) the aggregate number of shares
        of our Common Stock beneficially owned by such holder (together with its affiliates)
        to exceed 4.99%\n(or 9.99% or 14.99% or 19.99% at the election of the holder)
        of the number of shares of our Common Stock immediately after giving\neffect
        to the exercise; or (ii) the combined voting power of our securities beneficially
        owned by such holder (together with its affiliates)\nto exceed 4.99% (or 9.99%
        or 14.99% or 19.99% at the election of the holder) of the combined voting
        power of all of our securities\noutstanding immediately after giving effect
        to the exercise, as such percentage ownership is determined in accordance
        with the terms\nof the Pre-funded Warrants. As a result, you may not be able
        to exercise your Pre-funded Warrants for shares of our Common Stock at a\ntime
        when it would be financially beneficial for you to do so. In such a circumstance,
        you could seek to sell your Pre-funded Warrants\nto realize value, but you
        may be unable to do so in the absence of an established trading market and
        due to applicable transfer restrictions.</P>\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\"> <B><I>Holders of the warrants\nbeing sold in
        the concurrent private placement will have no rights as stockholders until
        they acquire our common stock.</I></B> </P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\"><B><I>&nbsp;</I></B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"> Until
        you acquire shares\nof our Common Stock upon exercise of the Common Warrants
        being sold in the concurrent private placement, you will have no rights with\nrespect
        to our Common Stock issuable upon exercise of such Common Warrants, including
        the right to receive dividend payments, vote or\nrespond to tender offers.
        Upon exercise of such Common Warrants, you will be entitled to exercise the
        rights of a common stockholder\nonly as to matters for which the record date
        occurs after the exercise date.<FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;&nbsp;</FONT> </P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">
        <B><I>There is no public\nmarket for the Common Warrants being offered by
        us in the concurrent private placement.</I></B> </P>\n\n<P STYLE=\"margin:
        0pt 0; font: 10pt Times New Roman, Times, Serif\"> &nbsp; </P>\n\n<P STYLE=\"text-align:
        justify; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"> There is no established public trading market\nfor the Common Warrants
        being sold in the concurrent private placement, and we do not expect a market
        to develop. In addition, we do\nnot intend to apply to list the Common Warrants
        on any securities exchange or recognized trading system. Without an active
        market, the\nliquidity of the Common Warrants will be limited. </P>\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>This\nis a best efforts offering, no
        minimum number of securities is required to be sold, and we may not raise
        the amount of capital we believe\nis required for our business plans.</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">The\nPlacement Agent has agreed to use its reasonable best efforts
        to solicit offers to purchase the Shares, or the Pre-funded Warrants, in\nthis
        Offering. The Placement Agent has no obligation to buy any of the securities
        from us or to arrange for the purchase or sale of any\nspecific number or
        dollar amount of the securities. There is no required minimum number of securities
        or amount of proceeds that must\nbe sold as a condition to completion of this
        Offering. Because there is no minimum number of securities or amount of proceeds
        required\nas a condition to the closing of this Offering, the actual offering
        amount, Placement Agent fees and proceeds to us are not presently\ndeterminable
        and may be substantially less than the maximum amounts set forth above. We
        may sell fewer than all of the securities offered\nhereby, which may significantly
        reduce the amount of proceeds received by us, and investors in this offering
        will not receive a refund\nin the event that we do not sell all of the securities
        offered in this Offering. Thus, we may not raise the amount of capital we
        believe\nis required for our operations in the short term and may need to
        raise additional funds, which may not be available or available on terms\nacceptable
        to us.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\"><B><I>You\nmay experience future dilution
        as a result of future equity offerings.</I></B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>&nbsp;</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">In\norder
        to raise additional capital, we may in the future offer additional shares
        of our Common Stock or other securities convertible into\nor exchangeable
        for our Common Stock at prices that may not be the same as the price per share
        paid by any investor in this offering.\nWe may sell shares or other securities
        in any other offering at a price per share that is less than the price per
        share paid by any investor\nin this offering, and investors purchasing shares
        or other securities in the future could have rights superior to you. The price
        per\nshare at which we sell additional shares of our Common Stock, or securities
        convertible or exchangeable into shares of Common Stock,\nin future transactions
        may be higher or lower than the price per share paid by any investor in this
        offering.</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B><I>We\ndo not intend to pay dividends on our Common Stock in the
        foreseeable future.</I></B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nhave never paid cash dividends on our
        Common Stock. We currently intend to invest our future earnings, if any, to
        fund our growth and\nnot to pay any cash dividends on our Common Stock. Because
        we do not intend to pay dividends, your ability to receive a return on your\ninvestment
        will depend on any future appreciation in the market price of our Common Stock.
        We cannot be certain that our Common Stock\nwill appreciate in price.</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt; text-align:
        justify; text-indent: 0.5in\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">&nbsp;</FONT></P>\n\n\n<!-- Field: Page; Sequence:
        13; Value: 1 -->\n    <DIV STYLE=\"margin-top: 0pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" STYLE=\"border-collapse:
        collapse; width: 100%; font-size: 10pt\"><TR STYLE=\"vertical-align: top;
        text-align: left\"><TD STYLE=\"text-align: center; width: 100%\">S-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->11<!-- Field: /Sequence --></TD></TR></TABLE></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 0pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\"><B>&nbsp;</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align: center\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\"><B><A
        NAME=\"SL_005\"></A>CAUTIONARY\nNOTE FORWARD-LOOKING STATEMENTS</B></FONT></P>\n\n<P
