        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;text-decoration:underline\">S-</a><a
        href=\"#i83339560318648a98cad8b6481af0b6b_318\" style=\"color:#0000ff;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;text-decoration:underline\">10</a></font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">
        of this prospectus supplement. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        aggregate market value of our outstanding common stock held by non-affiliates
        is approximately $40.5 million, based on 12,103,750 shares of outstanding
        common stock, of which 7,082,747 shares are held by non-affiliates, and a
        per share price of $5.72 based on the closing sale price of our common stock
        on February 5, 2025, which is the highest closing sale price of our common
        stock on the NYSE within the prior 60 days of this prospectus supplement.
        As a result, pursuant to General Instruction I.B.6 of Form S-3, we are currently
        eligible to offer and sell up to an aggregate of approximately $13.5 million
        of our securities, all of which may be sold under the Sales Agreement. In
        no event will the aggregate market value of securities sold by us or on our
        behalf pursuant to General Instruction I.B.6 of Form S-3 during the twelve-month
        period immediately prior to, and including, the date of any such sale, exceed
        one-third of the aggregate market value of our common stock held by non-affiliates
        in any twelve-month period, so long as the aggregate market value of our common
        stock held by non-affiliates is less than $75.0 million. During the twelve-month
        period that ends on and includes the date of this prospectus supplement, we
        have not sold any shares of securities pursuant to General Instruction I.B.6
        of Form S-3. </font></div><div style=\"margin-bottom:6pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        are an &#8220;emerging growth company&#8221; and a &#8220;smaller reporting
        company&#8221; under federal securities laws and, as such, are subject to
        reduced public company reporting requirements.</font></div><div style=\"margin-bottom:3pt\"><table
