        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Investing
        in our securities involves a high degree of risk and uncertainty. In addition
        to the other information included or incorporated by reference in this prospectus
        supplement and the accompanying prospectus, you should carefully consider
        the risks described below before making an investment decision with respect
        to our common stock. We expect to update the risk factors described or incorporated
