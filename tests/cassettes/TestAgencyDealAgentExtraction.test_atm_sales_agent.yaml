        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:18pt;font-weight:700;line-height:120%\">Up
        to $13,504,438</font></div><div style=\"text-align:center\"><img alt=\"esslogoa.jpg\"
        src=\"esslogoa.jpg\" style=\"height:58px;margin-bottom:5pt;vertical-align:text-bottom;width:168px\"></div><div
        style=\"text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:14pt;font-weight:700;line-height:120%\">Common
        Stock</font></div><div><table style=\"border-collapse:collapse;display:inline-table;margin-bottom:5pt;vertical-align:text-bottom;width:100.000%\"><tr><td
        style=\"width:1.0%\"></td><td style=\"width:98.900%\"></td><td style=\"width:0.1%\"></td></tr><tr
        style=\"height:3pt\"><td colspan=\"3\" style=\"border-bottom:1pt solid #000;padding:0
        1pt\"></td></tr></table></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        have entered into a Sales Agreement, dated March&#160;31, 2025, (the &#8220;Sales
        Agreement&#8221;), with Robert W. Baird &#38; Co. Incorporated relating to
        shares of our common stock, $0.0001 par value per share, offered by this prospectus
        supplement and the accompanying prospectus. We refer to Robert W. Baird &#38;
        Co. Incorporated as the &#8220;sales agent.&#8221; In accordance with the
        terms of the Sales Agreement, we may offer and sell shares of our common stock
        under this prospectus supplement having an aggregate gross sales price of
        up to $13,504,438, from time to time through or to the sales agent, as sales
        agent or principal. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        common stock is listed on the New York Stock Exchange (the &#8220;NYSE&#8221;)
        under the symbol &#8220;GWH.&#8221; On March&#160;28, 2025, the last quoted
        sale price for our common stock as reported on the NYSE was $3.35 per share.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Sales
        of shares of our common stock under this prospectus supplement, if any, may
        be made by any method deemed to be an &#8220;at the market offering&#8221;
        as defined in Rule 415(a)(4) promulgated under the Securities Act of 1933,
        as amended (the &#8220;Securities Act&#8221;). The sales agent is not required
        to sell any specific number of shares of our common stock. The sales agent
        has agreed to use its commercially reasonable efforts consistent with its
        normal trading and sales practices, on mutually agreed terms between the sales
        agent and us. There is no arrangement for funds to be received in any escrow,
        trust or similar arrangement. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        sales agent will be entitled to compensation under the terms of the Sales
        Agreement at a commission rate up to 3.0% of the gross proceeds of the sales
        price of common stock that it sells under the Sales Agreement. The net proceeds
        from any sales under this prospectus supplement will be used as described
        under &#8220;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Use
        of Proceeds</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.&#8221;
        The proceeds we receive from sales of our common stock, if any, will depend
        on the number of shares actually sold and the offering price of such shares.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        connection with the sale of our shares of common stock on our behalf, the
        sales agent may be deemed to be an &#8220;underwriter&#8221; within the meaning
        of the Securities Act, and its compensation as sales agent may be deemed to
        be underwriting commissions or discounts. We have also agreed to provide indemnification
        and contribution to the sales agent with respect to certain liabilities, including
        liabilities under the Securities Act. See the section titled &#8220;</font><font
        style=\"color:#0000ff;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%;text-decoration:underline\"><a
        href=\"#i83339560318648a98cad8b6481af0b6b_318\" style=\"color:#0000ff;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%;text-decoration:underline\">Plan
