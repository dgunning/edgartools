        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Because
        forward-looking statements are inherently subject to risks and uncertainties,
        some of which cannot be predicted or quantified, you should not rely upon
        forward-looking statements as predictions of future events. The events and
        circumstances reflected in the forward-looking statements may not be achieved
        or occur and actual results could differ materially from those projected in
        the forward-looking statements. Except as required by applicable law, including
        the securities laws of the United States and the rules and regulations of
        the SEC, we do not plan to publicly update or revise any forward-looking statements
        contained herein after we distribute this prospectus, whether as a result
        of any new information, future events or otherwise.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, statements that &#8220;we believe&#8221; and similar statements
        reflect our beliefs and opinions on the relevant subject. These statements
        are based upon information available to us as of the date of this prospectus,
        and although we believe such information forms a reasonable basis for such
        statements, such information may be limited or incomplete, and our statements
        should not be read to indicate that we have conducted a thorough inquiry into,
        or review of, all potentially available relevant information. These statements
        are inherently uncertain and investors are cautioned not to unduly rely upon
        these statements.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        prospectus, any prospectus supplement and the documents incorporated by reference
        in this prospectus may contain market data that we obtain from industry sources.
        These sources do not guarantee the accuracy or completeness of the information.
        Although we believe that our industry sources are reliable, we do not independently
        verify the information. The market data may include projections that are based
        on a number of other projections. While we believe these assumptions to be
        reasonable and sound as of the date of this prospectus, actual results may
        differ from the projections.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">5</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_781\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">USE
        OF PROCEEDS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will retain broad discretion over the use of the net proceeds to us from the
        sale of our securities under this prospectus. Unless otherwise provided in
        the applicable prospectus supplement, we currently expect to use the net proceeds
        that we receive from this offering for working capital and other general corporate
        purposes. The expected use of net proceeds of this offering represents our
        current intentions based on our present plans and business conditions. We
        cannot specify with certainty all of the particular uses for the net proceeds
        to be received upon the closing of this offering. Pending these uses, we plan
        to invest the net proceeds of this offering in short- and intermediate-term,
        interest-bearing obligations, investment-grade instruments, certificates of
        deposit or direct or guaranteed obligations of the U.S. government.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">6</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_795\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF CAPITAL STOCK</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">The
        following descriptions of our capital stock and certain provisions of our
        certificate of incorporation and amended and restated bylaws are summaries
        and are qualified by reference to the certificate of incorporation and the
        amended and restated bylaws. Copies of these documents have been filed with
        the SEC as exhibits to our registration statement, of which this prospectus
        forms a part.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        authorized capital stock consists of 2,200,000,000 shares of capital stock,
        of which&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">2,000,000,000
        shares are designated as common stock, par value $0.0001 per share&#59; and</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">200,000,000
        shares are designated as preferred stock, par value $0.0001 per share.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        board of directors is authorized, without stockholder approval, except as
        required by the listing standards of the New York Stock Exchange, to issue
        additional shares of capital stock.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Common
        Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        holders of our common stock are entitled to one vote per share on all matters
        submitted to a vote of the stockholders and do not have cumulative voting
        rights. Accordingly, subject to the rights of holders of any preferred stock
        outstanding at the time, where a quorum is present at a meeting of stockholders,
        directors are elected by plurality vote. Subject to preferences that may be
        applicable to any preferred stock outstanding at the time, the holders of
        outstanding shares of our common stock are entitled to receive ratably any
        dividends declared by the board of directors out of assets legally available.
        Upon the liquidation, dissolution or winding up, holders of our common stock
        are entitled to share ratably in all assets remaining after payment of liabilities
        and the liquidation preference of any then outstanding shares of preferred
        stock. Holders of our common stock have no preemptive or conversion rights
        or other subscription rights. There are no redemption or sinking fund provisions
        applicable to our common stock.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Preferred
        Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        board of directors is authorized, subject to limitations prescribed by the
        Delaware General Corporation Law (&#8220;DGCL&#8221;), to issue preferred
        stock in one or more series, to establish from time to time the number of
        shares to be included in each series, and to fix the designation, powers,
        preferences, and rights of the shares of each series and any of its qualifications,
        limitations, or restrictions, in each case without further vote or action
        by the stockholders. The board of directors is empowered to increase, but
        not above the total number of authorized shares of preferred stock, or decrease
        the number of shares of any series of preferred stock, but not below the number
        of shares of that series then outstanding, without any further vote or action
        by the stockholders. Our board of directors is able to authorize the issuance
        of preferred stock with voting or conversion rights that could adversely affect
        the voting power or other rights of the holders of our common stock. The issuance
        of preferred stock, while providing flexibility in connection with possible
        acquisitions and other corporate purposes, could, among other things, have
        the effect of delaying, deferring, or preventing a change in control of ESS
        and might adversely affect the market price of our common stock and the voting
        and other rights of the holders of our common stock. There are currently no
        plans to issue any shares of preferred stock.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Warrants</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Public
        Warrants</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        whole warrant entitles the registered holder to purchase one share of common
        stock at a price of $11.50 per share, subject to adjustment as discussed below.
        Pursuant to the Warrant Agreement, dated September 16, 2020, as amended by
        the Assignment, Assumption and Amendment Agreement, dated October 8, 2021
        (together, the &#8220;Warrant Agreement&#8221;), a warrant holder may exercise
        its warrants only for a whole number of shares of common stock. This means
        only a whole warrant may be exercised at a given time by a warrant holder.
        No fractional warrants will be issued upon separation of the units and only
        whole warrants trade. The warrants expire on October 8, 2026, at 5&#58;00
        p.m., New York City time, or earlier upon redemption or liquidation.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">7</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Redemption
        of Warrants when the price per share of our common stock equals or exceeds
        $18.00</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        Once the public warrants become exercisable, we may redeem the outstanding
        warrants (excluding the private placement warrants)&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">in
        whole and not in part&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        a price of $0.01 per public warrant&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">upon
        a minimum of 30 days&#8217; prior written notice of redemption to each warrant
        holder&#59; and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if,
        and only if, the closing price of our common stock equals or exceeds $18.00
        per share (as adjusted for adjustments to the number of shares issuable upon
        exercise or the exercise price of a warrant as described under the heading
        &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;)
        for any 20 trading days within a 30-trading day period ending three trading
        days before we send the notice of redemption to the warrant holders.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will not redeem the warrants as described above unless a registration statement
        under the Securities Act covering the issuance of our common stock issuable
        upon exercise of the warrants is then effective and a current prospectus relating
        to those shares of our common stock is available throughout the 30-day Redemption
        Period (as defined below). If and when the warrants become redeemable, we
        may exercise our redemption right even if we are unable to register or qualify
        the underlying securities for sale under all applicable state securities laws.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        have established the last of the redemption criteria discussed above to prevent
        a redemption call unless there is at the time of the call a significant premium
        to the warrant exercise price. If the foregoing conditions are satisfied and
        we issue a notice of redemption of the warrants, each warrant holder will
        be entitled to exercise his, her or its warrant prior to the scheduled redemption
        date. However, the price of our common stock may fall below the $18.00 redemption
        trigger price (as adjusted for adjustments to the number of shares issuable
        upon exercise or the exercise price of a warrant as described under the heading
        &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;)
        as well as the $11.50 (for whole shares) warrant exercise price after the
        redemption notice is issued.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Redemption
        of warrants when the price per share of our common stock equals or exceeds
        $10.00. Once the warrants become exercisable, we may redeem the outstanding
        warrants&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">in
        whole and not in part&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        $0.10 per warrant upon a minimum of 30 days&#8217; prior written notice of
        redemption provided that holders will be able to exercise their warrants on
        a cashless basis prior to redemption and receive that number of shares determined
        by reference to the table below, based on the redemption date and the &#8220;fair
        market value&#8221; of our common stock (as defined below) except as otherwise
        described below&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if,
        and only if, the closing price of our common stock equals or exceeds $10.00
        per public share (as adjusted for adjustments to the number of shares issuable
        upon exercise or the exercise price of a warrant as described under the heading
        &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-Dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;)
        for any 20 trading days within the 30-trading day period ending three trading
        days before we send the notice of redemption to the warrant holders&#59; and</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        the closing price of our common stock for any 20 trading days within a 30-trading
        day period ending on the third trading day prior to the date on which we send
        the notice of redemption to the warrant holders is less than $18.00 per share
        (as adjusted for adjustments to the number of shares issuable upon exercise
        or the exercise price of a warrant as described under the heading &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;),
        the preferred stock must also be concurrently called for redemption on the
        same terms as the outstanding public warrants, as described above.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        accordance with the Warrant Agreement, in the event that we elect to redeem
        the outstanding warrants as set forth under the headings &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Redemption
        of Warrants when the price per share of our common stock equals or exceeds
        $18.00</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        and &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New
        Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Redemption
        of Warrants when the price per share of our common stock equals or exceeds
        $10.00</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">,&#8221;
        we will fix a date for the redemption. Notice of redemption will be mailed
        by first class mail, postage prepaid, by us to all shareholders, including
        beneficial owners, not less than 30 days prior to the redemption date (the
        &#8220;30-day Redemption Period&#8221;) to the registered holders of the warrants
        to be redeemed at their last addresses as </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">8</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">they
        appear on the registration books. Any notice mailed in the manner provide
        above will be conclusively presumed to have been duly given whether or not
        the registered holder of the warrants received such notice. We are not contractually
        obligated to notify investors when its warrants become eligible for redemption,
        and does not intend to so notify investors upon eligibility of the warrants
        for redemption.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Beginning
        on the date the notice of redemption is given until the warrants are redeemed
        or exercised, holders may elect to exercise their warrants on a cashless basis.
        The numbers in the table below represent the number of shares of our common
        stock that a warrant holder will receive upon such cashless exercise in connection
        with a redemption by us pursuant to this redemption feature, based on the
        &#8220;fair market value&#8221; of our common stock on the corresponding redemption
        date (assuming holders elect to exercise their warrants and such warrants
        are not redeemed for $0.10 per warrant), determined for these purposes based
        on volume weighted average price of our common stock during the 10 trading
        days immediately following the date on which the notice of redemption is sent
        to the holders of warrants, and the number of months that the corresponding
        redemption date precedes the expiration date of the warrants, each as set
        forth in the table below. We will provide warrant holders with the final fair
        market value no later than one business day after the 10-trading day period
        described above ends.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        share prices set forth in the column headings of the table below will be adjusted
        as of any date on which the number of shares issuable upon exercise of a warrant
        or the exercise price of a warrant is adjusted as set forth under the heading
        &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        below. If the number of shares issuable upon exercise of a warrant is adjusted,
        the adjusted share prices in the column headings will equal the share prices
        immediately prior to such adjustment, multiplied by a fraction, the numerator
        of which is the number of shares deliverable upon exercise of a warrant immediately
        prior to such adjustment and the denominator of which is the number of shares
        deliverable upon exercise of a warrant as so adjusted. The number of shares
        in the table below shall be adjusted in the same manner and at the same time
        as the number of shares issuable upon exercise of a warrant. If the exercise
        price of a warrant is adjusted, (a) in the case of an adjustment pursuant
        to the fifth paragraph under the heading &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        below, the adjusted share prices in the column headings will equal the unadjusted
        share price multiplied by a fraction, the numerator of which is the higher
        of the Market Value and the Newly Issued Price as set forth under the heading
        &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        and the denominator of which is $10.00 and (b) in the case of an adjustment
        pursuant to the second paragraph under the heading &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        below, the </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">9</font></div></div></div><hr
