        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        exact fair market value and redemption date may not be set forth in the table
        above, in which case, if the fair market value is between two values in the
        table or the redemption date is between two redemption dates in the table,
        the number of shares of common stock to be issued for each warrant exercised
        will be determined by a straight-line interpolation between the number of
        shares set forth for the higher and lower fair market values and the earlier
        and later redemption dates, as applicable, based on a 365 or 366-day year,
        as applicable. For example, if the volume weighted average price of our common
        stock during the 10 trading days immediately following the date on which the
        notice of redemption is sent to the holders of the warrants is $11.00 per
        share, and at such time there are 57 months until the expiration of the warrants,
        holders may choose to, in connection with this redemption feature, exercise
        their warrants for 0.277 shares of common stock for each whole warrant. For
        an example where the exact fair market value and redemption date are not as
        set forth in the table above, if the volume weighted average price of our
        common stock during the 10 trading days immediately following the date on
        which the notice of redemption is sent to the holders of the warrants is $13.50
        per share, and at such time there are 38 months until the expiration of the
        warrants, holders may choose to, in connection with this redemption feature,
        exercise their warrants for 0.298 shares of common stock for each whole warrant.
        In no event will the warrants be exercisable on a cashless basis in connection
        with this redemption feature for more than 0.361 shares of common stock per
        warrant (subject to adjustment). Finally, as reflected in the table above,
        if the warrants are out of the money and about to expire, they cannot be exercised
        on a cashless basis in connection with a redemption by us pursuant to this
        redemption feature, since they will not be exercisable for any shares of common
        stock.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        redemption feature differs from the typical warrant redemption features used
        in some other blank check offerings, which only provide for a redemption of
        warrants for cash (other than the private placement warrants) when the trading
        price of our common stock exceeds $18.00 per share for a specified period
        of time. This redemption feature is structured to allow for all of the outstanding
        warrants to be redeemed when our common stock </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">10</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">is
        trading at or above $10.00 per public share, which may be at a time when the
        trading price of our common stock is below the exercise price of the warrants.
        We have established this redemption feature to provide it with the flexibility
        to redeem the warrants without the warrants having to reach the $18.00 per
        share threshold set forth above under &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Redemption
        of warrants when the price per share of our common stock equals or exceeds
        $18.00</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.&#8221;
        Holders choosing to exercise their warrants in connection with a redemption
        pursuant to this feature will, in effect, receive a number of shares for their
        warrants based on an option pricing model with a fixed volatility input as
        of the date of this prospectus. This redemption right provides us with an
        additional mechanism by which to redeem all of the outstanding warrants, and
        therefore have certainty as to its capital structure as the warrants would
        no longer be outstanding and would have been exercised or redeemed. We will
        be required to pay the applicable redemption price to warrant holders if we
        choose to exercise this redemption right and it will allow us to quickly proceed
        with a redemption of the warrants if we determine it is in its best interest
        to do so. As such, we would redeem the warrants in this manner when we believe
        it is in its best interest to update its capital structure to remove the warrants
        and pay the redemption price to the warrant holders.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">As
        stated above, we can redeem the warrants when our common stock is trading
        at a price starting at $10.00, which is below the exercise price of $11.50,
        because it will provide certainty with respect to our capital structure and
        cash position while providing warrant holders with the opportunity to exercise
        their warrants on a cashless basis for the applicable number of shares. If
        we choose to redeem the warrants when our common stock is trading at a price
        below the exercise price of the warrants, this could result in the warrant
        holders receiving fewer shares of Common Stock than they would have received
        if they had chosen to wait to exercise their warrants for our common stock
        if and when such shares were trading at a price higher than the exercise price
        of $11.50.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">No
        fractional shares of common stock will be issued upon exercise. If, upon exercise,
        a holder would be entitled to receive a fractional interest in a share, we
        will round down to the nearest whole number of the number of shares of common
        stock to be issued to the holder.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Redemption
        procedures</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        A holder of a warrant may notify us in writing in the event it elects to be
        subject to a requirement that such holder will not have the right to exercise
        such warrant, to the extent that after giving effect to such exercise, such
        person (together with such person&#8217;s affiliates), to the warrant agent&#8217;s
        actual knowledge, would beneficially own in excess of 9.8% (or such other
        amount as a holder may specify) of our common stock issued and outstanding
        immediately after giving effect to such exercise.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Anti-dilution
        Adjustments</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        If the number of outstanding shares of common stock is increased by a capitalization
        or share dividend payable in shares of common stock, or by a split-up of ordinary
        shares or other similar event, then, on the effective date of such capitalization
        or share dividend, split-up or similar event, the number of shares of common
        stock issuable on exercise of each warrant will be increased in proportion
        to such increase in the outstanding ordinary shares. A rights offering made
        to all or substantially all holders of ordinary shares entitling holders to
        purchase shares of common stock at a price less than the &#8220;historical
        fair market value&#8221; (as defined below) will be deemed a share dividend
        of a number of shares of common stock equal to the product of (i) the number
        of shares of common stock actually sold in such rights offering (or issuable
        under any other equity securities sold in such rights offering that are convertible
        into or exercisable for shares of common stock) and (ii) one minus the quotient
        of (x) the price per share of common stock paid in such rights offering and
        (y) the historical fair market value. For these purposes, (i) if the rights
        offering is for securities convertible into or exercisable for shares of common
        stock, in determining the price payable for shares of common stock there will
        be taken into account any consideration received for such rights, as well
        as any additional amount payable upon exercise or conversion and (ii) &#8220;historical
        fair market value&#8221; means the volume weighted average price of our common
        stock as reported during the 10 trading day period ending on the trading day
        prior to the first date on which the shares of common stock trade on the applicable
        exchange or in the applicable market, regular way, without the right to receive
        such rights.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, if we, at any time while the warrants are outstanding and unexpired,
        pays a dividend or make a distribution in cash, securities or other assets
        to all or substantially all of the holders of shares of common stock on account
        of such shares (or other securities into which the warrants are convertible),
        other than (a) as described above, or (b) any cash dividends or cash distributions
        which, when combined on a per share basis with all other cash dividends and
        cash distributions paid on the shares of common stock during the 365-day period
        ending on the date of declaration of such dividend or distribution does not
        exceed $0.50 (as adjusted to appropriately reflect any other </font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">11</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">adjustments
        and excluding cash dividends or cash distributions that resulted in an adjustment
        to the exercise price or to the number of the shares of common stock issuable
        on exercise of each warrant) but only with respect to the amount of the aggregate
        cash dividends or cash distributions equal to or less than $0.50 per share.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        the number of outstanding shares of common stock is decreased by a consolidation,
        combination, reverse share split or reclassification of shares of common stock
        or other similar event, then, on the effective date of such consolidation,
        combination, reverse share split, reclassification or similar event, the number
        of shares of common stock issuable on exercise of each warrant will be decreased
        in proportion to such decrease in outstanding shares of common stock.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Whenever
        the number of shares of common stock purchasable upon the exercise of the
        warrants is adjusted, as described above, the warrant exercise price will
        be adjusted by multiplying the warrant exercise price immediately prior to
        such adjustment by a fraction (x) the numerator of which will be the number
        of shares of common stock purchasable upon the exercise of the warrants immediately
        prior to such adjustment and (y) the denominator of which will be the number
        of shares of common stock so purchasable immediately thereafter.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        case of any reclassification or reorganization of the outstanding shares of
        common stock (other than those described above or that solely affects the
        par value of such shares of common stock), or in the case of any merger or
        consolidation of us with or into another corporation (other than a consolidation
        or merger in which we are the continuing corporation and that does not result
        in any reclassification or reorganization of outstanding shares of common
        stock), or in the case of any sale or conveyance to another corporation or
        entity of our assets or other property as an entirety or substantially as
        an entirety in connection with which we are dissolved, the holders of the
        warrants will thereafter have the right to purchase and receive, upon the
        basis and upon the terms and conditions specified in the warrants and in lieu
        of the shares of common stock immediately theretofore purchasable and receivable
        upon the exercise of the rights represented thereby, the kind and amount of
        shares of common stock or other securities or property (including cash) receivable
        upon such reclassification, reorganization, merger or consolidation, or upon
        a dissolution following any such sale or transfer, that the holder of the
        warrants would have received if such holder had exercised their warrants immediately
        prior to such event. However, if such holders were entitled to exercise a
        right of election as to the kind or amount of securities, cash or other assets
        receivable upon such consolidation or merger, then the kind and amount of
        securities, cash or other assets for which each warrant will become exercisable
        will be deemed to be the weighted average of the kind and amount received
        per share by such holders in such consolidation or merger that affirmatively
        make such election, and if a tender, exchange or redemption offer has been
        made to and accepted by such holders under circumstances in which, upon completion
        of such tender or exchange offer, the maker thereof, together with members
        of any group (within the meaning of Rule 13d-5(b)(1) under the Exchange Act)
        of which such maker is a part, and together with any affiliate or associate
        of such maker (within the meaning of Rule 12b-2 under the Exchange Act) and
        any members of any such group of which any such affiliate or associate is
        a part, own beneficially (within the meaning of Rule 13d-3 under the Exchange
        Act) more than 50% of the issued and outstanding shares of common stock, the
        holder of a warrant will be entitled to receive the highest amount of cash,
        securities or other property to which such holder would actually have been
        entitled as a shareholder if such warrant holder had exercised the warrant
        prior to the expiration of such tender or exchange offer, accepted such offer
        and all of the shares of common stock held by such holder had been purchased
        pursuant to such tender or exchange offer, subject to adjustment (from and
        after the consummation of such tender or exchange offer) as nearly equivalent
        as possible to the adjustments provided for in the warrant agreement. If less
        than 70% of the consideration receivable by the holders of shares of common
        stock in such a transaction is payable in the form of shares in the successor
        entity that is listed for trading on a national securities exchange or is
        quoted in an established over-the-counter market, or is to be so listed for
        trading or quoted immediately following such event, and if the registered
        holder of the warrant properly exercises the warrant within thirty days following
        public disclosure of such transaction, the warrant exercise price will be
        reduced as specified in the warrant agreement based on the Black-Scholes value
        (as defined in the warrant agreement) of the warrant. The purpose of such
        exercise price reduction is to provide additional value to holders of the
        warrants when an extraordinary transaction occurs during the exercise period
        of the warrants pursuant to which the holders of the warrants otherwise do
        not receive the full potential value of the warrants. The purpose of such
        exercise price reduction is to provide additional value to holders of the
        warrants when an extraordinary transaction occurs during </font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">12</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">the
        exercise period of the warrants pursuant to which the holders of the warrants
        otherwise do not receive the full potential value of the warrants.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        warrant holders do not have the rights or privileges of holders of ordinary
        shares and any voting rights until they exercise their warrants and receive
        shares of common stock. After the issuance of shares of common stock upon
        exercise of the warrants, each holder will be entitled to one vote for each
        share held of record on all matters to be voted on by shareholders.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">No
        fractional warrants will be issued upon separation of the units and only whole
        warrants will trade. If, upon exercise of the warrants, a holder would be
        entitled to receive a fractional interest in a share, we will, upon exercise,
        round down to the nearest whole number the number of shares of common stock
        to be issued to the warrant holder.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        have agreed that, subject to applicable law, any action, proceeding or claim
        against it arising out of or relating in any way to the Warrant Agreement
        will be brought and enforced in the courts of the State of New York or the
        United States District Court for the Southern District of New York, and we
        irrevocably submits to such jurisdiction, which jurisdiction will be the exclusive
        forum for any such action, proceeding or claim. This provision applies to
        claims under the Securities Act but does not apply to claims under the Exchange
        Act or any claim for which the federal district courts of the United States
        of America are the sole and exclusive forum.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Private
        Placement Warrants</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Except
        as described below, the private placement warrants have terms and provisions
        that are identical to those of the public warrants. 3,500,000 of the private
        placement warrants vested on October 8, 2021 pursuant to the terms of the
        Sponsor Letter Agreement (the &#8220;Sponsor Letter Agreement&#8221;), dated
        as of May 6, 2021, by and among ACON S2 Sponsor, L.L.C., a Delaware limited
        liability company (the &#8220;Sponsor&#8221;), ESS, Legacy ESS, and, solely
        for purposes of certain sections, the Insiders (as defined in the Sponsor
        Letter Agreement). The remaining 583,334 of the private placement warrants
        vested on November&#160;9, 2021, upon the occurrence of the earnout milestone
        events pursuant to the Sponsor Letter Agreement. The private placement warrants
        will not be redeemable by us (except as described under &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Public
        Warrants&#8212;Redemption of warrants when the price per share of our common
        stock equals or exceeds $10.00</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;)
        so long as they are held by the Sponsor or its permitted transferees (except
        as otherwise set forth herein). The Sponsor, or its permitted transferees,
        has the option to exercise the private placement warrants on a cashless basis.
        If the private placement warrants are held by holders other than the Sponsor
        or its permitted transferees, the private placement warrants will be redeemable
        by us in all redemption scenarios and exercisable by the holders on the same
        basis as the public warrants. Any amendment to the terms of the private placement
        warrants or any provision of the Warrant Agreement with respect to the private
        placement warrants will require a vote of holders of at least 50% of the number
        of the then outstanding private placement warrants.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Except
        as described above under &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Public
        Warrants&#8212;Redemption of warrants when the price per share of our common
        stock equals or exceeds $10.00</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">,&#8221;
        if holders of the private placement warrants elect to exercise them on a cashless
        basis, they would pay the exercise price by surrendering his, her or its warrants
        for that number of shares of common stock equal to the quotient obtained by
        dividing (x) the product of the number of shares of common stock underlying
        the warrants, multiplied by the excess of the &#8220;Sponsor fair market value&#8221;
        (as defined below) over the exercise price of the warrants by (y) the Sponsor
        fair market value. For these purposes, the &#8220;Sponsor fair market value&#8221;
        shall mean the average reported closing price of the shares of common stock
        for the 10 trading days ending on the third trading day prior to the date
        on which the notice of warrant exercise is sent to the warrant agent.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Registration
        Rights</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Under
        the Registration Rights Agreement (the &#8220;Registration Rights Agreement&#8221;),
        dated October&#160;8, 2021, by and among ESS, the Sponsor and other holders
        of common stock, the holders of 73,022,199 shares of common stock or their
        permitted transferees have the right to require us to register the offer and
        sale of their shares, or to include their shares in any registration statement
        we file, in each case as described below.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">13</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Resale
        Registration Statement</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        filed a registration statement on Form S-1 on November&#160;2, 2021 (File
        No. 333-260693) (the &#8220;Initial Resale Registration Statement&#8221;),
        Post-Effective Amendment No.&#160;1 to the Initial Resale Registration Statement
        on December&#160;9, 2021, and a registration statement on Form&#160;S-1 and
        Post-Effective Amendment No. 2 to the Initial Resale Registration Statement
        on March&#160;4, 2022 (File No. 333-263316) (the &#8220;Additional Resale
        Registration Statement&#8221; and together with the Initial Resale Registration
        Statement, the &#8220;Resale Registration Statements&#8221;) for an offering
        of our common stock to be made on a delayed or continuous basis. Pursuant
        to the Registration Rights Agreement, the holders of at least $30.0 million
        of shares having registration rights then outstanding can request that we
        effect an underwritten public offering pursuant to such Resale Registration
        Statements. We are only obligated to effect no more than four such registrations
        within any 12-month period. These registration rights are subject to specified
        conditions and limitations, including the right of the underwriters to limit
        the number of shares included in any such registration under certain circumstances.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        Additional Resale Registration Statement was declared effective by the SEC
        on March&#160;16, 2022.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">On
        November 3, 2022, we filed a post-effective amendment to the Resale Registration
        Statements to convert the Resale Registration Statements on Form S-1 into
        a registration statement on Form S-3.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Piggyback
        Registration Rights</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        we propose to register the offer and sale of our common stock under the Securities
        Act, all holders of these shares then outstanding can request that we include
        their shares in such registration, subject to certain marketing and other
        limitations, including the right of the underwriters to limit the number of
        shares included in any such registration statement under certain circumstances.
        As a result, whenever we propose to file a registration statement under the
        Securities Act, other than with respect to a registration (i) relating to
        any employee stock option or other benefit plan, (ii) on Form S-4 (or similar
        form that relates to a transaction subject to Rule 145 under the Securities
        Act or any successor rule thereto), (iii) relating to an offering of debt
        that is convertible into equity securities of ESS, or (iv) for a dividend
        reinvestment plan.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Termination</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        registration rights terminate upon the date as of which all of the registrable
        securities have been sold pursuant to a registration statement or are permitted
        to be sold under Rule 144 or any similar provision under the Securities Act.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Registration
        Rights for PIPE Shares</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">On
        May 6, 2021, STWO entered into subscription agreements with certain investors,
        pursuant to which STWO agreed to issue and sell to the investors 25,000,000
        shares of common stock (&#8220;PIPE Shares&#8221;) at a purchase price of
        $10.00 per share for an aggregate commitment of $250,000,000 (the &#8220;PIPE
        Financing&#8221;). The PIPE Financing was consummated on October 8, 2021.
        The Resale Registration Statements also registered the PIPE Shares for resale.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Form
        S-8 Registration Statement</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        filed a registration statement on Form S-8 under the Securities Act to register
        the shares of Common Stock issued or issuable under our 2021 Employee Stock
        Purchase Plan, 2021 Equity Incentive Plan and 2014 Equity Incentive Plan.
        The Form&#160;S-8 registration statement became effective automatically upon
        filing, and shares covered by the registration statement became eligible for
        sale in the public market, subject to Rule 144 limitations applicable to affiliates
        and vesting restrictions.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Limitation
        of Liability and Indemnification</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        certificate of incorporation contains provisions that limit the liability
        of our directors for monetary damages to the fullest extent permitted by the
        DGCL. In addition, if the DGCL is amended to authorize corporate action further
        eliminating or limiting the personal liability of directors of corporations,
        then the personal liability of our directors will be eliminated or limited
        to the greatest extent permitted by the DGCL.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">14</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, our bylaws, which became effective upon consummation of the Merger,
        provides that we will indemnify our directors and officers to the fullest
        extent permitted by the DGCL and we may indemnify our employees, agents and
        any other persons to the extent not prohibited by the DGCL or other applicable
        law. Our amended and restated bylaws will also provide that we must advance
        expenses incurred by or on behalf of a director or officer in advance of the
        final disposition of any action or proceeding, subject to limited exceptions.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Further,
        we have entered into indemnification agreements with our directors and executive
        officers that are broader than the specific indemnification provisions contained
        in the DGCL and may continue to do so in the future. These indemnification
        agreements require us to indemnify our directors and executive officers against
        liabilities that may arise by reason of their status or service. These indemnification
        agreements also require us to advance all expenses reasonably and actually
        incurred by our directors and executive officers in investigating or defending
        any such action, suit or proceeding. We believe that these agreements are
        necessary to attract and retain qualified individuals to serve as directors
        and executive officers.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        also maintain insurance policies under which our directors and officers are
        insured, within the limits and subject to the limitations of those policies,
        against certain expenses in connection with the defense of, and certain liabilities
        which might be imposed as a result of, actions, suits, or proceedings to which
        they are parties by reason of being or having served as a director or officer
        of ESS. At present, we are not aware of any pending litigation or proceeding
        involving any person who is one of our directors or officers or is or was
        one of our directors or officers, or is or was one of our directors or officers
        serving at our request as a director, officer, employee or agent of another
        corporation, partnership, joint venture, trust or other enterprise, for which
        indemnification is sought, and we are not aware of any threatened litigation
        that may result in claims for indemnification.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Description
        of Certain Terms in the Charter Documents and Delaware Law</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        certificate of incorporation and amended and restated bylaws contain provisions
        that could have the effect of delaying, deferring or discouraging another
        party from acquiring control of ESS. These provisions and certain provisions
        of Delaware law, which are summarized below, could discourage takeovers, coercive
        or otherwise. These provisions are also designed, in part, to encourage persons
        seeking to acquire control of ESS to negotiate first with our board of directors.
        ESS believes that the benefits of increased protection of the potential ability
        to negotiate with an unfriendly or unsolicited acquirer outweigh the disadvantages
        of discouraging a proposal to acquire the Company.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Issuance
        of Undesignated Preferred Stock</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        As discussed above under &#8220;&#8212;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Preferred
        Stock</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">,&#8221;
        our board of directors has the ability to designate and issue preferred stock
        with voting or other rights or preferences that could deter hostile takeovers
        or delay changes in control or management.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Limits
        on Ability of Stockholders to Act by Written Consent or Call a Special Meeting</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        The certificate of incorporation provides that the stockholders may not act
        by written consent. This limit on the ability of stockholders to act by written
        consent may lengthen the amount of time required to take stockholder actions.
        As a result, the holders of a majority of our capital stock may not be able
        to amend the amended and restated bylaws or remove directors without holding
        a meeting of stockholders called in accordance with the amended and restated
        bylaws.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, the amended and restated bylaws provide that special meetings of
        the stockholders may be called only by the chairperson of the board of directors,
        the chief executive officer, the president, or a majority of our board of
        directors (measured based on the total authorized directorships, including
        any vacancies or unfilled seats). A stockholder may not call a special meeting,
        which may delay the ability of the stockholders to force consideration of
        a proposal or for holders controlling a majority of our capital stock to take
        any action, including the removal of directors.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Requirements
        for Advance Notification of Stockholder Nominations and Proposals</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        The amended and restated bylaws establish advance notice procedures with respect
        to stockholder proposals and the nomination of candidates for election as
        directors, other than nominations made by or at the direction of our board
        of directors or a committee of our board of directors. These advance notice
        procedures may have the effect of precluding the conduct of certain business
        at a meeting if the proper procedures are not followed and may also discourage
        or deter a potential acquirer </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">15</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">from
        conducting a solicitation of proxies to elect its own slate of directors or
        otherwise attempt to obtain control of ESS.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Board
        Classification</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        The certificate of incorporation provides that our board of directors is divided
        into three classes, one class of which is elected each year by the stockholders.
        The directors in each class will serve for a three-year term. The classified
        board of directors may tend to discourage a third party from making a tender
        offer or otherwise attempting to obtain control of ESS because it generally
        makes it more difficult for stockholders to replace a majority of the directors.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Election
        and Removal of Directors</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        The certificate of incorporation contains provisions that establish specific
        procedures for appointing and removing members of our board of directors.
        Under the certificate of incorporation and amended and restated bylaws, vacancies
        and newly created directorships on our board of directors may be filled only
        by a majority of the directors then serving on our board of directors. Under
        the certificate of incorporation, directors may be removed only for cause
        by the affirmative vote of the holders of at least a majority of the voting
        power of the issued and outstanding capital stock of the Company entitled
        to vote in the election of directors.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">No
        Cumulative Voting</font><font style=\"color:#000000;font-family:'Times New
        Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">. The
        DGCL provides that stockholders are not entitled to the right to cumulate
        votes in the election of directors unless a corporation&#8217;s certificate
        of incorporation provides otherwise. The certificate of incorporation and
        amended and restated bylaws do not expressly provide for cumulative voting.
        Without cumulative voting, a minority stockholder may not be able to gain
        as many seats on the board of directors as the stockholder would be able to
        gain if cumulative voting were permitted. The absence of cumulative voting
        makes it more difficult for a minority stockholder to gain a seat on the board
        of directors to, among other things, influence the board of directors&#8217;
        decision regarding a takeover.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Amendment
        of Charter Provision</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        Any amendment of the above provisions in the certificate of incorporation
        or amended and restated bylaws would require approval by holders of at least
        662&#47;3% of the then outstanding capital stock entitled to vote, voting
        together as a single class.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Delaware
        Anti-Takeover Statute</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        ESS is subject to the provisions of Section 203 of the DGCL regulating corporate
        takeovers. In general, Section 203 prohibits a publicly held Delaware corporation
        from engaging, under certain circumstances, in a business combination with
        an interested stockholder for a period of three years following the date the
        person became an interested stockholder unless&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">prior
        to the date of the transaction, the board of directors approved either the
        business combination or the transaction that resulted in the stockholder becoming
        an interested stockholder&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">upon
        completion of the transaction that resulted in the stockholder becoming an
        interested stockholder, the interested stockholder owned at least 85% of the
        voting stock of the corporation outstanding at the time the transaction commenced,
        excluding for purposes of determining the voting stock outstanding, but not
        the outstanding voting stock owned by the interested stockholder, (1) shares
        owned by persons who are directors and also officers and (2) shares owned
        by employee stock plans in which employee participants do not have the right
        to determine confidentially whether shares held subject to the plan will be
        tendered in a tender or exchange offer&#59; or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        or subsequent to the date of the transaction, the business combination is
        approved by the board of directors and authorized at an annual or special
        meeting of stockholders, and not by written consent, by the affirmative vote
        of at least 66 2&#47;3% of the outstanding voting stock that is not owned
        by the interested stockholder.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Generally,
        a business combination includes a merger, asset or stock sale or other transaction
        resulting in a financial benefit to the interested stockholder. An interested
        stockholder is generally defined under Section 203 to be a person who, together
        with affiliates and associates, owns or, within three years prior to the determination
        of interested stockholder status, did own 15% or more of a corporation&#8217;s
        outstanding voting stock. ESS expects the existence of this provision to have
        an anti-takeover effect with respect to transactions our board of directors
        does not approve in advance. We also anticipate that Section 203 may discourage
        attempts that might result in a premium over the market price for the shares
        of common stock held by stockholders.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">16</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        provisions of Delaware law and the provisions of the certificate of incorporation
        and amended and restated bylaws could have the effect of discouraging others
        from attempting hostile takeovers and as a consequence, they might also inhibit
        temporary fluctuations in the market price of our common stock that often
        result from actual or rumored hostile takeover attempts. These provisions
        might also have the effect of preventing changes in management. It is also
        possible that these provisions could make it more difficult to accomplish
        transactions that stockholders might otherwise deem to be in their best interests.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Choice
        of Forum</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        The amended and restated bylaws provides that the Court of Chancery of the
        State of Delaware will be the exclusive forum for&#58; (i) any derivative
        action or proceeding brought on ESS&#8217; behalf&#59; (ii) actions asserting
        a breach of fiduciary duty&#59; (iii) any action arising under the DGCL, the
        certificate of incorporation or amended and restated bylaws&#59; and (iv)
        any action asserting a claim against ESS that is governed by the internal-affairs
        doctrine. The amended and restated bylaws further provide that the federal
        district courts of the United States will be the exclusive forum for resolving
        any complaint asserting a cause of action arising under the Securities Act.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Transfer
        Agent and Warrant Agent</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        transfer agent and warrant agent for the common stock and warrants is Computershare
        Inc. The transfer agent&#8217;s address is 150 Royall Street, Canton, MA 02021
        and its telephone number is (206) 406-5789.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">17</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_809\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF DEBT SECURITIES</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        following description, together with the additional information we include
        in any applicable prospectus supplement, summarizes certain general terms
        and provisions of the debt securities that we may offer under this prospectus.
        When we offer to sell a particular series of debt securities, we will describe
        the specific terms of the series in a supplement to this prospectus. We will
        also indicate in the supplement to what extent the general terms and provisions
        described in this prospectus apply to a particular series of debt securities.
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue debt securities either separately, or together with, or upon the
        conversion or exercise of or in exchange for, other securities described in
        this prospectus. Debt securities may be our senior, senior subordinated or
        subordinated obligations and, unless otherwise specified in a supplement to
        this prospectus, the debt securities will be our direct, unsecured obligations
        and may be issued in one or more series. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        debt securities will be issued under an indenture between us and a trustee
        to be identified in an accompanying prospectus supplement. We have summarized
        select portions of the indenture below. The summary is not complete. The form
        of the indenture has been filed as an exhibit to the registration statement
        of which this prospectus forms a part and you should read the indenture for
        provisions that may be important to you. In the summary below, we have included
        references to the section numbers of the indenture so that you can easily
        locate these provisions. Capitalized terms used in the summary and not defined
        herein have the meanings specified in the indenture.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">General</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        terms of each series of debt securities will be established by or pursuant
        to a resolution of our board of directors and set forth or determined in the
        manner provided in a resolution of our board of directors, in an officer&#8217;s
        certificate or by a supplemental indenture. The particular terms of each series
        of debt securities will be described in a prospectus supplement relating to
        such series (including any pricing supplement or term sheet).</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        can issue an unlimited amount of debt securities under the indenture that
        may be in one or more series with the same or various maturities, at par,
        at a premium, or at a discount. We will set forth in a prospectus supplement
        (including any pricing supplement or term sheet) relating to any series of
        debt securities being offered the aggregate principal amount and the following
        terms of the debt securities, if applicable&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        title and ranking of the debt securities (including the terms of any subordination
        provisions)&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        price or prices (expressed as a percentage of the principal amount) at which
        we will sell the debt securities&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        limit upon the aggregate principal amount of the debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        date or dates on which the principal of the securities of the series is payable&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        rate or rates (which may be fixed or variable) per annum or the method used
        to determine the rate or rates (including any commodity, commodity index,
        stock exchange index or financial index) at which the debt securities will
        bear interest, the date or dates from which interest will accrue, the date
        or dates on which interest will commence and be payable and any regular record
        date for the interest payable on any interest payment date&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        place or places where principal of, and interest, if any, on the debt securities
        will be payable (and the method of such payment), where the securities of
        such series may be surrendered for registration of transfer or exchange, and
        where notices and demands to us in respect of the debt securities may be delivered&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        period or periods within which, the price or prices at which and the terms
        and conditions upon which we may redeem the debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        obligation we have to redeem or purchase the debt securities pursuant to any
        sinking fund or analogous provisions or at the option of a holder of debt
        securities and the period or periods within which, the price or </font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">18</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;padding-left:36pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">prices
        at which and the terms and conditions upon which securities of the series
        shall be redeemed or purchased, in whole or in part, pursuant to such obligation&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        dates on which and the price or prices at which we will repurchase debt securities
        at the option of the holders of debt securities and other detailed terms and
        provisions of these repurchase obligations&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        denominations in which the debt securities will be issued, if other than denominations
        of $1,000 and any integral multiple thereof&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the debt securities will be issued in the form of certificated debt securities
        or global debt securities&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        portion of principal amount of the debt securities payable upon declaration
        of acceleration of the maturity date, if other than the principal amount&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        currency of denomination of the debt securities, which may be United States
        dollars or any foreign currency, and if such currency of denomination is a
        composite currency, the agency or organization, if any, responsible for overseeing
        such composite currency&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        designation of the currency, currencies or currency units in which payment
        of principal of, premium and interest on the debt securities will be made&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        payments of principal of, premium or interest on the debt securities will
        be made in one or more currencies or currency units other than that or those
        in which the debt securities are denominated, the manner in which the exchange
        rate with respect to these payments will be determined&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        manner in which the amounts of payment of principal of, premium, if any, or
        interest on the debt securities will be determined, if these amounts may be
        determined by reference to an index based on a currency or currencies or by
        reference to a commodity, commodity index, stock exchange index or financial
        index&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        provisions relating to any security provided for the debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        addition to, deletion of or change in the Events of Default described in this
        prospectus or in the indenture with respect to the debt securities and any
        change in the acceleration provisions described in this prospectus or in the
        indenture with respect to the debt securities&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        addition to, deletion of or change in the covenants described in this prospectus
        or in the indenture with respect to the debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        depositaries, interest rate calculation agents, exchange rate calculation
        agents or other agents with respect to the debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        other terms of the debt securities, which may supplement, modify or delete
        any provision of the indenture as it applies to that series, including any
        terms that may be required under applicable law or regulations or advisable
        in connection with the marketing of the securities&#59; and</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        any of our direct or indirect subsidiaries will guarantee the debt securities
        of that series, including the terms of subordination, if any, of such guarantees.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue debt securities that provide for an amount less than their stated
        principal amount to be due and payable upon declaration of acceleration of
        their maturity pursuant to the terms of the indenture. We will provide you
        with information on the federal income tax considerations and other special
        considerations applicable to any of these debt securities in the applicable
        prospectus supplement.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        we denominate the purchase price of any of the debt securities in a foreign
        currency or currencies or a foreign currency unit or units, or if the principal
        of and any premium and interest on any series of debt securities is payable
        in a foreign currency or currencies or a foreign currency unit or units, we
        will provide you with information on the restrictions, elections, general
        tax considerations, specific terms and other information with respect to that
        issue of </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">19</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">debt
        securities and such foreign currency or currencies or foreign currency unit
        or units in the applicable prospectus supplement.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Transfer
        and Exchange</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        debt security will be represented by either one or more global securities
        registered in the name of a clearing agency registered under the Exchange
        Act, which we refer to as the depositary, or a nominee of the depositary (we
        will refer to any debt security represented by a global debt security as a
        &#8220;book-entry debt security&#8221;), or a certificate issued in definitive
        registered form (we will refer to any debt security represented by a certificated
        security as a &#8220;certificated debt security&#8221;) as set forth in the
        applicable prospectus supplement. Except as set forth under the heading &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Global
        Debt Securities and Book-Entry System</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        below, book-entry debt securities will not be issuable in certificated form.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Certificated
        Debt Securities</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">You
        may transfer or exchange certificated debt securities at any office we maintain
        for this purpose in accordance with the terms of the indenture. No service
        charge will be made for any transfer or exchange of certificated debt securities,
        but we may require payment of a sum sufficient to cover any tax or other governmental
        charge payable in connection with a transfer or exchange.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">You
        may effect the transfer of certificated debt securities and the right to receive
        the principal of, premium and interest on certificated debt securities only
        by surrendering the certificate representing those certificated debt securities
        and either reissuance by us or the trustee of the certificate to the new holder
        or the issuance by us or the trustee of a new certificate to the new holder.&#160;</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Global
        Debt Securities and Book-Entry System</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        global debt security representing book-entry debt securities will be deposited
        with, or on behalf of, the depositary, and registered in the name of the depositary
        or a nominee of the depositary.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Covenants</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will set forth in the applicable prospectus supplement any restrictive covenants
        applicable to any issue of debt securities.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">No
        Protection in the Event of a Change of Control</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Unless
        we state otherwise in the applicable prospectus supplement, the debt securities
        will not contain any provisions which may afford holders of the debt securities
        protection in the event we have a change in control or in the event of a highly
        leveraged transaction (whether or not such transaction results in a change
        in control) which could adversely affect holders of debt securities.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Conversion
        or Exchange Rights</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">For
        any series of debt securities that are convertible into or exchangeable for
        shares of our common stock, we will set forth in the applicable prospectus
        supplement the terms on which such series of debt securities may be convertible
        into or exchangeable for our common stock. We will include provisions as to
        settlement upon conversion or exchange and whether conversion or exchange
        is mandatory, at the option of the holder or at our option. We may include
        provisions pursuant to which the number of shares of our common stock that
        the holders of the series of debt securities receive would be subject to adjustment.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">20</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Consolidation,
        Merger and Sale of Assets</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may not consolidate with or merge with or into, or convey, transfer or lease
        all or substantially all of our properties and assets to any person, which
        we refer to as a successor person, unless&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">we
        are the surviving corporation or the successor person (if other than us) is
        a corporation organized and validly existing under the laws of any U.S. domestic
        jurisdiction and expressly assumes our obligations on the debt securities
        and under the indenture&#59; and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">immediately
        after giving effect to the transaction, no Default or Event of Default, shall
        have occurred and be continuing.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Notwithstanding
        the above, any of our subsidiaries may consolidate with, merge into or transfer
        all or part of its properties to us.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Events
        of Default</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8220;Event
        of Default&#8221; means with respect to any series of debt securities, any
        of the following&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">default
        in the payment of any interest upon any debt security of that series when
        it becomes due and payable, and continuance of such default for a period of
        30 days (unless the entire amount of the payment is deposited by us with the
        trustee or with a paying agent prior to the expiration of the 30-day period)&#59;
        </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">default
        in the payment of principal of any security of that series at its maturity&#59;
        </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">default
        in the performance or breach of any other covenant or warranty by us in the
        indenture (other than a covenant or warranty that has been included in the
        indenture solely for the benefit of a series of debt securities other than
        that series), which default continues uncured for a period of 60 days after
        we receive written notice from the trustee, or we and the trustee receive
        written notice from the holders of not less than 25% in principal amount of
        the outstanding debt securities of that series as provided in the indenture&#59;
        </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">certain
        voluntary or involuntary events of bankruptcy, insolvency or reorganization
        of us&#59; and </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        other Event of Default provided with respect to debt securities of that series
        that is described in the applicable prospectus supplement. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">No
        Event of Default with respect to a particular series of debt securities (except
        as to certain events of bankruptcy, insolvency or reorganization) necessarily
        constitutes an Event of Default with respect to any other series of debt securities.
        The occurrence of certain Events of Default or an acceleration under the indenture
        may constitute an event of default under certain indebtedness of ours or our
        subsidiaries outstanding from time to time.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will provide the trustee written notice of any Default or Event of Default
        within 30 days of becoming aware of the occurrence of such Default or Event
        of Default, which notice will describe in reasonable detail the status of
        such Default or Event of Default and what action we are taking or propose
        to take in respect thereof.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        an Event of Default with respect to debt securities of any series at the time
        outstanding occurs and is continuing, then the trustee or the holders of not
        less than 25% in principal amount of the outstanding debt securities of that
        series may, by a notice in writing to us (and to the trustee if given by the
        holders), declare to be due and payable immediately the principal of (or,
        if the debt securities of that series are discount securities, that portion
        of the principal amount as may be specified in the terms of that series) and
        accrued and unpaid interest, if any, on all debt securities of that series.
        In the case of an Event of Default resulting from certain events of bankruptcy,
        insolvency or reorganization, the principal (or such specified amount) of
        and accrued and unpaid interest, if any, on all outstanding debt securities
        will become and be immediately due and payable without any declaration or
        other act on the part of the trustee or any holder of outstanding debt securities.
        At any time after a declaration of acceleration with respect to debt securities
        of any series has been made, but before a judgment or decree for payment of
        the money due has been obtained by the trustee, the holders of a majority
        in principal amount of the outstanding debt securities of that series may
        rescind and annul the acceleration if all Events of Default, other than the
        non-payment </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">21</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">of
        accelerated principal and interest, if any, with respect to debt securities
        of that series, have been cured or waived as provided in the indenture. We
        refer you to the prospectus supplement relating to any series of debt securities
        that are discount securities for the particular provisions relating to acceleration
        of a portion of the principal amount of such discount securities upon the
        occurrence of an Event of Default.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture provides that the trustee may refuse to perform any duty or exercise
        any of its rights or powers under the indenture unless the trustee receives
        indemnity satisfactory to it against any cost, liability or expense which
        might be incurred by it in performing such duty or exercising such right or
        power. Subject to certain rights of the trustee, the holders of a majority
        in principal amount of the outstanding debt securities of any series will
        have the right to direct the time, method and place of conducting any proceeding
        for any remedy available to the trustee or exercising any trust or power conferred
        on the trustee with respect to the debt securities of that series.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">No
        holder of any debt security of any series will have any right to institute
        any proceeding, judicial or otherwise, with respect to the indenture or for
        the appointment of a receiver or trustee, or for any remedy under the indenture,
        unless&#58; </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">that
        holder has previously given to the trustee written notice of a continuing
        Event of Default with respect to debt securities of that series&#59; and </font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        holders of not less than 25% in principal amount of the outstanding debt securities
        of that series have made written request, and offered indemnity or security
        satisfactory to the trustee, to the trustee to institute the proceeding as
        trustee, and the trustee has not received from the holders of not less than
        a majority in principal amount of the outstanding debt securities of that
        series a direction inconsistent with that request and has failed to institute
        the proceeding within 60 days. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Notwithstanding
        any other provision in the indenture, the holder of any debt security will
        have an absolute and unconditional right to receive payment of the principal
        of, premium and any interest on that debt security on or after the due dates
        expressed in that debt security and to institute suit for the enforcement
        of payment.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture requires us, within 120 days after the end of our fiscal year, to
        furnish to the trustee a statement as to compliance with the indenture. If
        a Default or Event of Default occurs and is continuing with respect to the
        securities of any series and if it is known to a responsible officer of the
        trustee, the trustee shall send to each securityholder of the securities of
        that series notice of a Default or Event of Default within 90 days after it
        occurs or, if later, after a responsible officer of the trustee has knowledge
        of such Default or Event of Default. The indenture provides that the trustee
        may withhold notice to the holders of debt securities of any series of any
        Default or Event of Default (except in payment on any debt securities of that
        series) with respect to debt securities of that series if the trustee determines
        in good faith that withholding notice is in the interest of the holders of
        those debt securities.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Modification
        and Waiver</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        and the trustee may modify, amend or supplement the indenture or the debt
        securities of any series without the consent of any holder of any debt security&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        cure any ambiguity, defect or inconsistency&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        comply with covenants in the indenture described above under the heading &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Consolidation,
        Merger and Sale of Assets</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        provide for uncertificated securities in addition to or in place of certificated
        securities&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        add guarantees with respect to debt securities of any series or secure debt
        securities of any series&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        surrender any of our rights or powers under the indenture&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        add covenants or events of default for the benefit of the holders of debt
        securities of any series&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        comply with the applicable procedures of the applicable depositary&#59;</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">22</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        make any change that does not adversely affect the rights of any holder of
        debt securities&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        provide for the issuance of and establish the form and terms and conditions
        of debt securities of any series as permitted by the indenture&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        effect the appointment of a successor trustee with respect to the debt securities
        of any series and to add to or change any of the provisions of the indenture
        to provide for or facilitate administration by more than one trustee&#59;
        or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        comply with requirements of the SEC in order to effect or maintain the qualification
        of the indenture under the Trust Indenture Act.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may also modify and amend the indenture with the consent of the holders of
        at least a majority in principal amount of the outstanding debt securities
        of each series affected by the modifications or amendments. We may not make
        any modification or amendment without the consent of the holders of each affected
        debt security then outstanding if that amendment will&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">reduce
        the amount of debt securities whose holders must consent to an amendment,
        supplement or waiver&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">reduce
        the rate of or extend the time for payment of interest (including default
        interest) on any debt security&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">reduce
        the principal of or premium on or change the fixed maturity of any debt security
        or reduce the amount of, or postpone the date fixed for, the payment of any
        sinking fund or analogous obligation with respect to any series of debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">reduce
        the principal amount of discount securities payable upon acceleration of maturity&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">waive
        a default in the payment of the principal of, premium or interest on any debt
        security (except a rescission of acceleration of the debt securities of any
        series by the holders of at least a majority in aggregate principal amount
        of the then outstanding debt securities of that series and a waiver of the
        payment default that resulted from such acceleration)&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">make
        the principal of or premium or interest on any debt security payable in currency
        other than that stated in the debt security&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">make
        any change to certain provisions of the indenture relating to, among other
        things, the right of holders of debt securities to receive payment of the
        principal of, premium and interest on those debt securities and to institute
        suit for the enforcement of any such payment and to waivers or amendments&#59;
        or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">waive
        a redemption payment with respect to any debt security.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Except
        for certain specified provisions, the holders of at least a majority in principal
        amount of the outstanding debt securities of any series may on behalf of the
        holders of all debt securities of that series waive our compliance with provisions
        of the indenture. The holders of a majority in principal amount of the outstanding
        debt securities of any series may on behalf of the holders of all the debt
        securities of such series waive any past default under the indenture with
        respect to that series and its consequences, except a default in the payment
        of the principal of, premium or any interest on any debt security of that
        series&#59; provided, however, that the holders of a majority in principal
        amount of the outstanding debt securities of any series may rescind an acceleration
        and its consequences, including any related payment default that resulted
        from the acceleration.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Defeasance
        of Debt Securities and Certain Covenants in Certain Circumstances</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Legal
        Defeasance</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture provides that, unless otherwise provided by the terms of the applicable
        series of debt securities, we may be discharged from any and all obligations
        in respect of the debt securities of any series (subject to certain exceptions).
        We will be so discharged upon the irrevocable deposit with the trustee, in
        trust, of money and&#47;or U.S. </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">23</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">government
        obligations or, in the case of debt securities denominated in a single currency
        other than U.S. dollars, government obligations of the government that issued
        or caused to be issued such currency, that, through the payment of interest
        and principal in accordance with their terms, will provide money or U.S. government
        obligations in an amount sufficient in the opinion of a nationally recognized
        firm of independent public accountants or investment bank to pay and discharge
        each installment of principal, premium and interest on and any mandatory sinking
        fund payments in respect of the debt securities of that series on the stated
        maturity of those payments in accordance with the terms of the indenture and
        those debt securities.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        discharge may occur only if, among other things, we have delivered to the
        trustee an opinion of counsel stating that we have received from, or there
        has been published by, the United States Internal Revenue Service a ruling
        or, since the date of execution of the indenture, there has been a change
        in the applicable United States federal income tax law, in either case to
        the effect that, and based thereon such opinion shall confirm that, the holders
        of the debt securities of that series will not recognize income, gain or loss
        for United States federal income tax purposes as a result of the deposit,
        defeasance and discharge and will be subject to United States federal income
        tax on the same amounts and in the same manner and at the same times as would
        have been the case if the deposit, defeasance and discharge had not occurred.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Defeasance
        of Certain Covenants</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture provides that, unless otherwise provided by the terms of the applicable
        series of debt securities, upon compliance with certain conditions&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">we
        may omit to comply with the covenant described under the heading &#8220;&#8212;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Consolidation,
        Merger and Sale of Assets</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        and certain other covenants set forth in the indenture, as well as any additional
        covenants which may be set forth in the applicable prospectus supplement&#59;
        and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        omission to comply with those covenants will not constitute a Default or an
        Event of Default with respect to the debt securities of that series.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        refer to this as covenant defeasance. The conditions include&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">depositing
        with the trustee money and&#47;or U.S. government obligations or, in the case
        of debt securities denominated in a single currency other than U.S. dollars,
        government obligations of the government that issued or caused to be issued
        such currency, that, through the payment of interest and principal in accordance
        with their terms, will provide money in an amount sufficient in the opinion
        of a nationally recognized firm of independent public accountants or investment
        bank to pay and discharge each installment of principal of, premium and interest
        on and any mandatory sinking fund payments in respect of the debt securities
        of that series on the stated maturity of those payments in accordance with
        the terms of the indenture and those debt securities&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">such
        deposit will not result in a breach or violation of, or constitute a default
        under the indenture or any other agreement to which we are a party&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">no
        Default or Event of Default with respect to the applicable series of debt
        securities shall have occurred or is continuing on the date of such deposit&#59;
        and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">delivering
        to the trustee an opinion of counsel to the effect that we have received from,
        or there has been published by, the United States Internal Revenue Service
        a ruling or, since the date of execution of the indenture, there has been
        a change in the applicable United States federal income tax law, in either
        case to the effect that, and based thereon such opinion shall confirm that,
        the holders of the debt securities of that series will not recognize income,
        gain or loss for United States federal income tax purposes as a result of
        the deposit and related covenant defeasance and will be subject to United
        States federal income tax on the same amounts and in the same manner and at
        the same times as would have been the case if the deposit and related covenant
        defeasance had not occurred.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">24</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">No
        Personal Liability of Directors, Officers, Employees or Stockholders</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">None
        of our past, present or future directors, officers, employees or stockholders,
        as such, will have any liability for any of our obligations under the debt
        securities or the indenture or for any claim based on, or in respect or by
        reason of, such obligations or their creation. By accepting a debt security,
        each holder waives and releases all such liability. This waiver and release
        is part of the consideration for the issue of the debt securities. However,
        this waiver and release may not be effective to waive liabilities under U.S.
        federal securities laws, and it is the view of the SEC that such a waiver
        is against public policy.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Governing
        Law</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture and the debt securities, including any claim or controversy arising
        out of or relating to the indenture or the securities, will be governed by
        the laws of the State of New York.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture will provide that we, the trustee and the holders of the debt securities
        (by their acceptance of the debt securities) irrevocably waive, to the fullest
        extent permitted by applicable law, any and all right to trial by jury in
        any legal proceeding arising out of or relating to the indenture, the debt
        securities or the transactions contemplated thereby.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        indenture will provide that any legal suit, action or proceeding arising out
        of or based upon the indenture or the transactions contemplated thereby may
        be instituted in the federal courts of the United States of America located
        in the City of New York or the courts of the State of New York in each case
        located in the City of New York, and we, the trustee and the holder of the
        debt securities (by their acceptance of the debt securities) irrevocably submit
        to the non-exclusive jurisdiction of such courts in any such suit, action
        or proceeding. The indenture will further provide that service of any process,
        summons, notice or document by mail (to the extent allowed under any applicable
        statute or rule of court) to such party&#8217;s address set forth in the indenture
        will be effective service of process for any suit, action or other proceeding
        brought in any such court. The indenture will further provide that we, the
        trustee and the holders of the debt securities (by their acceptance of the
        debt securities) irrevocably and unconditionally waive any objection to the
        laying of venue of any suit, action or other proceeding in the courts specified
        above and irrevocably and unconditionally waive and agree not to plead or
        claim any such suit, action or other proceeding has been brought in an inconvenient
        forum.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">25</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_823\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF DEPOSITARY SHARES</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">General</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may, at our option, elect to offer fractional shares of preferred stock, or
        depositary shares, rather than full shares of preferred stock. If we do, we
        will issue to the public receipts, called depositary receipts, for depositary
        shares, each of which will represent a fraction, to be described in the applicable
        prospectus supplement, of a share of a particular series of preferred stock.
        Unless otherwise provided in the prospectus supplement, each owner of a depositary
        share will be entitled, in proportion to the applicable fractional interest
        in a share of preferred stock represented by the depositary share, to all
        the rights and preferences of the preferred stock represented by the depositary
        share. Those rights include dividend, voting, redemption, conversion and liquidation
        rights.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        shares of preferred stock underlying the depositary shares will be deposited
        with a bank or trust company selected by us to act as depositary under a deposit
        agreement between us, the depositary and the holders of the depositary receipts.
        The depositary will be the transfer agent, registrar and dividend disbursing
        agent for the depositary shares.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        depositary shares will be evidenced by depositary receipts issued pursuant
        to the depositary agreement. Holders of depositary receipts agree to be bound
        by the deposit agreement, which requires holders to take certain actions such
        as filing proof of residence and paying certain charges.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        summary of terms of the depositary shares contained in this prospectus is
        not complete. You should refer to the form of the deposit agreement, our certificate
        of incorporation and the certificate of designation for the applicable series
        of preferred stock that are, or will be, filed with the SEC.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Dividends
        and Other Distributions</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        depositary will distribute all cash dividends or other cash distributions,
        if any, received in respect of the preferred stock underlying the depositary
        shares to the record holders of depositary shares in proportion to the numbers
        of depositary shares owned by those holders on the relevant record date. The
        relevant record date for depositary shares will be the same date as the record
        date for the underlying preferred stock.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        there is a distribution other than in cash, the depositary will distribute
        property (including securities) received by it to the record holders of depositary
        shares, unless the depositary determines that it is not feasible to make the
        distribution. If this occurs, the depositary may, with our approval, adopt
        another method for the distribution, including selling the property and distributing
        the net proceeds from the sale to the holders.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Liquidation
        Preference</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        a series of preferred stock underlying the depositary shares has a liquidation
        preference, in the event of the voluntary or involuntary liquidation, dissolution
        or winding up of us, holders of depositary shares will be entitled to receive
        the fraction of the liquidation preference accorded each share of the applicable
        series of preferred stock, as set forth in the applicable prospectus supplement.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Withdrawal
        of Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Unless
        the related depositary shares have been previously called for redemption,
        upon surrender of the depositary receipts at the office of the depositary,
        the holder of the depositary shares will be entitled to delivery, at the office
        of the depositary to or upon his or her order, of the number of whole shares
        of the preferred stock and any money or other property represented by the
        depositary shares. If the depositary receipts delivered by the holder evidence
        a number of depositary shares in excess of the number of depositary shares
        representing the number of whole shares of preferred stock to be withdrawn,
        the depositary will deliver to the holder at the same time a new depositary
        receipt evidencing the excess number of depositary shares. In no event will
        the depositary deliver fractional shares of preferred stock upon surrender
        of depositary receipts. Holders of preferred stock thus withdrawn may not
        thereafter deposit those shares under the deposit agreement or receive depositary
        receipts evidencing depositary shares therefor.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">26</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Redemption
        of Depositary Shares</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Whenever
        we redeem shares of preferred stock held by the depositary, the depositary
        will redeem as of the same redemption date the number of depositary shares
        representing shares of the preferred stock so redeemed, so long as we have
        paid in full to the depositary the redemption price of the preferred stock
        to be redeemed plus an amount equal to any accumulated and unpaid dividends
        on the preferred stock to the date fixed for redemption. The redemption price
        per depositary share will be equal to the redemption price and any other amounts
        per share payable on the preferred stock multiplied by the fraction of a share
        of preferred stock represented by one depositary share. If less than all the
        depositary shares are to be redeemed, the depositary shares to be redeemed
        will be selected by lot or pro rata or by any other equitable method as may
        be determined by the depositary.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">After
        the date fixed for redemption, depositary shares called for redemption will
        no longer be deemed to be outstanding and all rights of the holders of depositary
        shares will cease, except the right to receive the monies payable upon redemption
        and any money or other property to which the holders of the depositary shares
        were entitled upon redemption upon surrender to the depositary of the depositary
        receipts evidencing the depositary shares.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Voting
        the Preferred Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Upon
        receipt of notice of any meeting at which the holders of the preferred stock
        are entitled to vote, the depositary will mail the information contained in
        the notice of meeting to the record holders of the depositary receipts relating
        to that preferred stock. The record date for the depositary receipts relating
        to the preferred stock will be the same date as the record date for the preferred
        stock. Each record holder of the depositary shares on the record date will
        be entitled to instruct the depositary as to the exercise of the voting rights
        pertaining to the number of shares of preferred stock represented by that
        holder&#8217;s depositary shares. The depositary will endeavor, insofar as
        practicable, to vote the number of shares of preferred stock represented by
        the depositary shares in accordance with those instructions, and we will agree
        to take all action that may be deemed necessary by the depositary in order
        to enable the depositary to do so. The depositary will not vote any shares
        of preferred stock except to the extent that it receives specific instructions
        from the holders of depositary shares representing that number of shares of
        preferred stock.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Charges
        of the Depositary</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will pay all transfer and other taxes and governmental charges arising solely
        from the existence of the depositary arrangements. We will pay charges of
        the depositary in connection with the initial deposit of the preferred stock
        and any redemption of the preferred stock. Holders of depositary receipts
        will pay transfer, income and other taxes and governmental charges and such
        other charges (including those in connection with the receipt and distribution
        of dividends, the sale or exercise of rights, the withdrawal of the preferred
        stock and the transferring, splitting or grouping of depositary receipts)
        as are expressly provided in the deposit agreement to be for their accounts.
        If these charges have not been paid by the holders of depositary receipts,
        the depositary may refuse to transfer depositary shares, withhold dividends
        and distributions and sell the depositary shares evidenced by the depositary
        receipt.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Amendment
        and Termination of the Deposit Agreement</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        form of depositary receipt evidencing the depositary shares and any provision
        of the deposit agreement may be amended by agreement between us and the depositary.
        However, any amendment that materially and adversely alters the rights of
        the holders of depositary shares, other than fee changes, will not be effective
        unless the amendment has been approved by the holders of a majority of the
        outstanding depositary shares. The deposit agreement may be terminated by
        the depositary or us only if&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">all
        outstanding depositary shares have been redeemed&#59; or </font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">there
        has been a final distribution of the preferred stock in connection with our
        dissolution and such distribution has been made to all the holders of depositary
        shares. </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">27</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Resignation
        and Removal of Depositary</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        depositary may resign at any time by delivering to us notice of its election
        to do so, and we may remove the depositary at any time. Any resignation or
        removal of the depositary will take effect upon our appointment of a successor
        depositary and its acceptance of such appointment. The successor depositary
        must be appointed within 60 days after delivery of the notice of resignation
        or removal and must be a bank or trust company having its principal office
        in the United States and having the requisite combined capital and surplus
        as set forth in the applicable agreement.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Notices</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        depositary will forward to holders of depositary receipts all notices, reports
        and other communications, including proxy solicitation materials received
        from us, that are delivered to the depositary and that we are required to
        furnish to the holders of the preferred stock. In addition, the depositary
        will make available for inspection by holders of depositary receipts at the
        principal office of the depositary, and at such other places as it may from
        time to time deem advisable, any reports and communications we deliver to
        the depositary as the holder of preferred stock.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Limitation
        of Liability</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Neither
        we nor the depositary will be liable if either is prevented or delayed by
        law or any circumstance beyond its control in performing its obligations.
        Our obligations and those of the depositary will be limited to performance
        in good faith of our and its duties thereunder. We and the depositary will
        not be obligated to prosecute or defend any legal proceeding in respect of
        any depositary shares or preferred stock unless satisfactory indemnity is
        furnished. We and the depositary may rely upon written advice of counsel or
        accountants, on information provided by persons presenting preferred stock
        for deposit, holders of depositary receipts or other persons believed to be
        competent to give such information and on documents believed to be genuine
        and to have been signed or presented by the proper party or parties.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">28</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_837\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF WARRANTS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue warrants to purchase </font><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">debt
        securities, preferred stock, depositary shares or common stock</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        We may offer warrants separately or together with one or more additional warrants,
        </font><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">debt
        securities, preferred stock, depositary shares or common stock</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">,
        or any combination of those securities in the form of units, as described
        in the applicable prospectus supplement. If we issue warrants as part of a
        unit, the applicable prospectus supplement will specify whether those warrants
        may be separated from the other securities in the unit prior to the expiration
        date of the warrants. The applicable prospectus supplement will also describe
        the following terms of any warrants&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        specific designation and aggregate number of, and the offering price at which
        we will issue, the warrants&#59; </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        currency or currency units in which the offering price, if any, and the exercise
        price are payable&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        date on which the right to exercise the warrants will begin and the date on
        which that right will expire or, if you may not continuously exercise the
        warrants throughout that period, the specific date or dates on which you may
        exercise the warrants&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the warrants are to be sold separately or with other securities as parts of
        units&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the warrants will be issued in definitive or global form or in any combination
        of these forms, although, in any case, the form of a warrant included in a
        unit will correspond to the form of the unit and of any security included
        in that unit&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        applicable material U.S. federal income tax consequences&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        identity of the warrant agent for the warrants and of any other depositaries,
        execution or paying agents, transfer agents, registrars or other agents&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        proposed listing, if any, of the warrants or any securities purchasable upon
        exercise of the warrants on any securities exchange&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        designation and terms of any equity securities purchasable upon exercise of
        the warrants&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        designation, aggregate principal amount, currency and terms of any debt securities
        that may be purchased upon exercise of the warrants&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        applicable, the designation and terms of the debt securities, preferred stock,
        depositary shares or common stock with which the warrants are issued and the
        number of warrants issued with each security&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        applicable, the date from and after which any warrants issued as part of a
        unit and the related debt securities, preferred stock, depositary shares or
        common stock will be separately transferable&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        number of shares of preferred stock, the number of depositary shares or the
        number of shares of common stock purchasable upon exercise of a warrant and
        the price at which those shares may be purchased&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        applicable, the minimum or maximum amount of the warrants that may be exercised
        at any one time&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">information
        with respect to book-entry procedures, if any&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        antidilution provisions, and other provisions for changes to or adjustment
        in the exercise price, of the warrants, if any&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        redemption or call provisions&#59; and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        additional terms of the warrants, including terms, procedures and limitations
        relating to the exchange or exercise of the warrants.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">29</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_851\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF SUBSCRIPTION RIGHTS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue subscription rights to purchase our </font><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">common
        stock, preferred stock, debt securities, depositary shares, warrants or units
        consisting of some or all of these securities</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.
        These subscription rights may be offered independently or together with any
        other security offered hereby and may or may not be transferable by the stockholder
        receiving the subscription rights in such offering. In connection with any
        offering of subscription rights, we may enter into a standby arrangement with
        one or more underwriters or other purchasers pursuant to which the underwriters
        or other purchasers may be required to purchase any securities remaining unsubscribed
        for after such offering.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        prospectus supplement relating to any subscription rights we offer, if any,
        will, to the extent applicable, include specific terms relating to the offering,
        including some or all of the following&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        price, if any, for the subscription rights&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        exercise price payable for our common stock, preferred stock, debt securities,
        depositary shares, warrants or units consisting of some or all of these securities
        upon the exercise of the subscription rights&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        number of subscription rights to be issued to each stockholder&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        number and terms of our common stock, preferred stock, debt securities, depositary
        shares, warrants or units consisting of some or all of these securities which
        may be purchased per each subscription right&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        extent to which the subscription rights are transferable&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        other terms of the subscription rights, including the terms, procedures and
        limitations relating to the exchange and exercise of the subscription rights&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        date on which the right to exercise the subscription rights shall commence,
        and the date on which the subscription rights shall expire&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        extent to which the subscription rights may include an over-subscription privilege
        with respect to unsubscribed securities or an over-allotment privilege to
        the extent the securities are fully subscribed&#59; and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        applicable, the material terms of any standby underwriting or purchase arrangement
        which may be entered into by us in connection with the offering of subscription
        rights.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        descriptions of the subscription rights in this prospectus and in any prospectus
        supplement are summaries of the material provisions of the applicable subscription
        right agreements. These descriptions do not restate those subscription right
        agreements in their entirety and may not contain all the information that
        you may find useful. We urge you to read the applicable subscription right
        agreements because they, and not the summaries, define your rights as holders
        of the subscription rights. For more information, please review the forms
        of the relevant subscription right agreements, which will be filed with the
        SEC promptly after the offering of subscription rights and will be available
        as described in the section of this prospectus under the heading &#8220;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Where
        You Can Find More Information</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.&#8221;</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">30</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_865\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF PURCHASE CONTRACTS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        following description summarizes the general features of the purchase contracts
        that we may offer under this prospectus. Although the features we have summarized
        below will generally apply to any future purchase contracts we may offer under
        this prospectus, we will describe the particular terms of any purchase contracts
        that we may offer in more detail in the applicable prospectus supplement.
        The specific terms of any purchase contracts may differ from the description
        provided below as a result of negotiations with third parties in connection
        with the issuance of those purchase contracts, as well as for other reasons.
        Because the terms of any purchase contracts we offer under a prospectus supplement
        may differ from the terms we describe below, you should rely solely on information
        in the applicable prospectus supplement if that summary is different from
        the summary in this prospectus.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will incorporate by reference into the registration statement of which this
        prospectus is a part the form of any purchase contract that we may offer under
        this prospectus before the sale of the related purchase contract. We urge
        you to read any applicable prospectus supplement related to specific purchase
        contracts being offered, as well as the complete instruments that contain
        the terms of the securities that are subject to those purchase contracts.
        Certain of those instruments, or forms of those instruments, have been filed
        as exhibits to the registration statement of which this prospectus is a part,
        and supplements to those instruments or forms may be incorporated by reference
        into the registration statement of which this prospectus is a part from reports
        we file with the SEC.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue purchase contracts, including contracts obligating holders to purchase
        from us, and for us to sell to holders, a specific or variable number of our
        securities at a future date or dates. Alternatively, the purchase contracts
        may obligate us to purchase from holders, and obligate holders to sell to
        us, a specific or varying number of our securities.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        we offer any purchase contracts, certain terms of that series of purchase
        contracts will be described in the applicable prospectus supplement, including,
        without limitation, the following&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        price of the securities or other property subject to the purchase contracts
        (which may be determined by reference to a specific formula described in the
        purchase contracts)&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the purchase contracts are issued separately, or as a part of units each consisting
        of a purchase contract and one or more of our other securities, including
        U.S. Treasury securities, securing the holder&#8217;s obligations under the
        purchase contract&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        requirement for us to make periodic payments to holders or vice versa, and
        whether the payments are unsecured or pre-funded&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        provisions relating to any security provided for the purchase contracts&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the purchase contracts obligate the holder or us to purchase or sell, or both
        purchase and sell, the securities subject to purchase under the purchase contract,
        and the nature and amount of each of those securities, or the method of determining
        those amounts&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the purchase contracts are to be prepaid or not&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the purchase contracts are to be settled by delivery, or by reference or linkage
        to the value, performance or level of the securities subject to purchase under
        the purchase contract&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        acceleration, cancellation, termination or other provisions relating to the
        settlement of the purchase contracts&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">a
        discussion of certain U.S. federal income tax considerations applicable to
        the purchase contracts&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the purchase contracts will be issued in fully registered or global form&#59;
        and</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        other terms of the purchase contracts and any securities subject to such purchase
        contracts.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">31</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_879\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DESCRIPTION
        OF UNITS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue units comprising two or more securities described in this prospectus
        in any combination. For example, we might issue units consisting of a combination
        of debt securities and warrants to purchase common stock. The following description
        sets forth certain general terms and provisions of the units that we may offer
        pursuant to this prospectus. The particular terms of the units and the extent,
        if any, to which the general terms and provisions may apply to the units so
        offered will be described in the applicable prospectus supplement.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        unit will be issued so that the holder of the unit also is the holder of each
        security included in the unit. Thus, the unit will have the rights and obligations
        of a holder of each included security. Units will be issued pursuant to the
        terms of a unit agreement, which may provide that the securities included
        in the unit may not be held or transferred separately at any time or at any
        time before a specified date. A copy of the forms of the unit agreement and
        the unit certificate relating to any particular issue of units will be filed
        with the SEC each time we issue units, and you should read those documents
        for provisions that may be important to you. For more information on how you
        can obtain copies of the forms of the unit agreement and the related unit
        certificate, see the section of this prospectus captioned &#8220;Where You
        Can Find More Information.&#8221;</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        prospectus supplement relating to any particular issuance of units will describe
        the terms of those units, including, to the extent applicable, the following&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        designation and terms of the units and the securities comprising the units,
        including whether and under what circumstances those securities may be held
        or transferred separately&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        provision for the issuance, payment, settlement, transfer or exchange of the
        units or of the securities comprising the units&#59; and</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">whether
        the units will be issued in fully registered or global form.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">32</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_893\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">PLAN
        OF DISTRIBUTION</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may sell securities&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">through
        underwriters&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">through
        dealers&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">through
        agents&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">directly
        to purchasers&#59; or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">through
        a combination of any of these methods of sale.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, we may issue the securities as a dividend or distribution or in
        a subscription rights offering to our existing securityholders.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may directly solicit offers to purchase securities or agents may be designated
        to solicit such offers. We will, in the prospectus supplement relating to
        such offering, name any agent that could be viewed as an underwriter under
        the Securities Act and describe any commissions that we must pay. Any such
        agent will be acting on a best efforts basis for the period of its appointment
        or, if indicated in the applicable prospectus supplement, on a firm commitment
        basis. This prospectus may be used in connection with any offering of our
        securities through any of these methods or other methods described in the
        applicable prospectus supplement.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        distribution of the securities may be effected from time to time in one or
        more transactions&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        a fixed price or prices that may be changed from time to time&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        market prices prevailing at the time of sale&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        prices related to such prevailing market prices&#59; or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">at
        negotiated prices.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may also sell equity securities covered by this registration statement in
        an &#8220;at the market offering&#8221; as defined in Rule&#160;415(a)(4)
        under the Securities Act. Such offering may be made into an existing trading
        market for such securities in transactions at other than a fixed price, either&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">on
        or through the facilities of the New York Stock Exchange or any other securities
        exchange or quotation or trading service on which such securities may be listed,
        quoted or traded at the time of sale&#59; and&#47;or</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">to
        or through a market maker otherwise than on the New York Stock Exchange or
        such other securities exchanges or quotation trading services.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Such
        at the market offerings, if any, may be conducted by underwriters acting as
        principal or agent.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        prospectus supplement will describe the method of distribution of the securities
        and any applicable restrictions.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        prospectus supplement with respect to the securities of a particular series
        will describe the terms of the offering of the securities, including the following&#58;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        name of the agent or any underwriters&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        public offering or purchase price&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        applicable, the names of any selling securityholders&#59;</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        discounts and commissions to be allowed or paid to the agent or underwriters&#59;</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">33</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">all
        other items constituting underwriting compensation&#59;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        discounts and commissions to be allowed or paid to dealers&#59; and</font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">any
        exchanges on which the securities will be listed.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        any underwriters or agents are utilized in the sale of the securities in respect
        of which this prospectus is delivered, we will enter into an underwriting
        agreement or other agreement with them at the time of sale to them, and we
        will set forth in the prospectus supplement relating to such offering the
        names of the underwriters or agents and the terms of the related agreement
        with them.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        a dealer is utilized in the sale of the securities in respect of which the
        prospectus is delivered, we will sell such securities to the dealer, as principal.
        The dealer may then resell such securities to the public at varying prices
        to be determined by such dealer at the time of resale.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        we offer securities in a subscription rights offering to our existing securityholders,
        we may enter into a standby underwriting agreement with dealers, acting as
        standby underwriters. We may pay the standby underwriters a commitment fee
        for the securities they commit to purchase on a standby basis. If we do not
        enter into a standby underwriting arrangement, we may retain a dealer-manager
        to manage a subscription rights offering for us.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Agents,
        underwriters, dealers and other persons may be entitled under agreements that
        they may enter into with us to indemnification by us against certain civil
        liabilities, including liabilities under the Securities Act.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        so indicated in the applicable prospectus supplement, we will authorize underwriters
        or other persons acting as our agents to solicit offers by certain institutions
        to purchase securities from us pursuant to delayed delivery contracts providing
        for payment and delivery on the date stated in the prospectus supplement.
        Each contract will be for an amount not less than, and the aggregate amount
        of securities sold pursuant to such contracts shall not be less nor more than,
        the respective amounts stated in the prospectus supplement. Institutions with
        whom the contracts, when authorized, may be made include commercial and savings
        banks, insurance companies, pension funds, investment companies, educational
        and charitable institutions and other institutions, but shall in all cases
        be subject to our approval. Delayed delivery contracts will not be subject
        to any conditions except that&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">the
        purchase by an institution of the securities covered under that contract shall
        not at the time of delivery be prohibited under the laws of the jurisdiction
        to which that institution is subject&#59; and </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">if
        the securities are also being sold to underwriters acting as principals for
        their own account, the underwriters shall have purchased such securities not
        sold for delayed delivery.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        underwriters and other persons acting as agents will not have any responsibility
        in respect of the validity or performance of delayed delivery contracts.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Certain
        agents, underwriters and dealers, and their associates and affiliates may
        be customers of, have borrowing relationships with, engage in other transactions
        with, and&#47;or perform services, including investment banking services,
        for us or one or more of our respective affiliates in the ordinary course
        of business.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        order to facilitate the offering of the securities, any underwriters may engage
        in transactions that stabilize, maintain or otherwise affect the price of
        the securities or any other securities the prices of which may be used to
        determine payments on such securities. Specifically, any underwriters may
        over-allot in connection with the offering, creating a short position for
        their own accounts. In addition, to cover over-allotments or to stabilize
        the price of the securities or of any such other securities, the underwriters
        may bid for, and purchase, the securities or any such other securities in
        the open market. Finally, in any offering of the securities through a syndicate
        of underwriters, the underwriting syndicate may reclaim selling concessions
        allowed to an underwriter or a dealer for distributing the securities in the
        offering if the syndicate repurchases previously distributed securities in
        transactions to cover syndicate short positions, in stabilization transactions
        or otherwise. Any of these activities may stabilize or maintain the market
        price of the securities above independent market levels. Any such underwriters
        are not required to engage in these activities and may end any of these activities
        at any time.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">34</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Under
        Rule&#160;15c6-1 of the Exchange Act, trades in the secondary market generally
        are required to settle in two business days, unless the parties to any such
        trade expressly agree otherwise. The applicable prospectus supplement may
        provide that the original issue date for your securities may be more than
        two scheduled business days after the trade date for your securities. Accordingly,
        in such a case, if you wish to trade securities on any date prior to the third
        business day before the original issue date for your securities, you will
        be required, by virtue of the fact that your securities initially are expected
        to settle in more than three scheduled business days after the trade date
        for your securities, to make alternative settlement arrangements to prevent
        a failed settlement.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        securities may be new issues of securities and may have no established trading
        market. The securities may or may not be listed on a national securities exchange.
        We can make no assurance as to the liquidity of or the existence of trading
        markets for any of the securities.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">35</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_907\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">LEGAL
        MATTERS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        validity of the securities offered hereby will be passed upon for us by Wilson
        Sonsini Goodrich&#160;&#38; Rosati, Professional Corporation, Palo Alto, California.
        Additional legal matters may be passed on for us, or any underwriters, dealers
        or agents by counsel we will name in the applicable prospectus supplement.</font></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_921\"></div><div style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">EXPERTS</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        consolidated financial statements of ESS Tech, Inc. appearing in ESS Tech,
        Inc.&#8217;s Annual Report (Form 10-K) for the year ended December 31, 2021,
        have been audited by Ernst &#38; Young LLP, independent registered public
        accounting firm, as set forth in their report thereon, included therein, and
        incorporated herein by reference. Such consolidated financial statements are
        incorporated herein by reference in reliance upon such report given on the
        authority of such firm as experts in accounting and auditing.</font></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_935\"></div><div style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">WHERE
        YOU CAN FIND MORE INFORMATION</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        file annual, quarterly and current reports, proxy statements and other information
        with the SEC. Our SEC filings are available to the public over the Internet
        at the SEC&#8217;s website at www.sec.gov. Copies of certain information filed
        by us with the SEC are also available on our website at https&#58;&#47;&#47;essinc.com&#47;.
        Information accessible on or through our website is not a part of this prospectus.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        prospectus and any prospectus supplement is part of a registration statement
        that we filed with the SEC and do not contain all of the information in the
        registration statement. You should review the information and exhibits in
        the registration statement for further information on us and our consolidated
        subsidiaries and the securities that we are offering. Forms of any indenture
        or other documents establishing the terms of the offered securities are filed
        as exhibits to the registration statement of which this prospectus forms a
        part or under cover of a Current Report on Form 8-K and incorporated in this
        prospectus by reference. Statements in this prospectus or any prospectus supplement
        about these documents are summaries and each statement is qualified in all
        respects by reference to the document to which it refers. You should read
        the actual documents for a more complete description of the relevant matters.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">36</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_949\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">INCORPORATION
        BY REFERENCE</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        SEC allows us to incorporate by reference much of the information that we
        file with the SEC, which means that we can disclose important information
        to you by referring you to those publicly available documents. The information
        that we incorporate by reference in this prospectus is considered to be part
        of this prospectus. Because we are incorporating by reference future filings
        with the SEC, this prospectus is continually updated and those future filings
        may modify or supersede some of the information included or incorporated by
        reference in this prospectus. This means that you must look at all of the
        SEC filings that we incorporate by reference to determine if any of the statements
        in this prospectus or in any document previously incorporated by reference
        have been modified or superseded. This prospectus incorporates by reference
        the documents listed below and any future filings we make with the SEC under
        Sections&#160;13(a), 13(c), 14 or 15(d) of the Exchange Act (in each case,
        other than those documents or the portions of those documents furnished pursuant
        to Items 2.02 or 7.01 of any Current Report on Form&#160;8-K and, except as
        may be noted in any such Form&#160;8-K, exhibits filed on such form that are
        related to such information), until the offering of the securities under the
        registration statement of which this prospectus forms a part is terminated
        or completed&#58;</font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">our
        Annual Report on Form 10-K for the year ended December 31, 2021, filed with
