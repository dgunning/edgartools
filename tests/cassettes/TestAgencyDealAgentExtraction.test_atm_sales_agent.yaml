        appearing in this prospectus are the property of their respective holders.
        We have omitted the &#174; and TM designations, as applicable, for the trademarks
        used in this prospectus.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">ii</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_734\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"border-color:#000000;border-style:solid;border-width:1.00pt;padding:36.00pt
        36.00pt 36.00pt 36.00pt\"><div style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">PROSPECTUS
        SUMMARY</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">This
        summary highlights selected information that is presented in greater detail
        elsewhere, or incorporated by reference, in this prospectus. It does not contain
        all of the information that may be important to you and your investment decision.
        Before investing in our securities, you should carefully read this entire
        prospectus, including the matters set forth under the section of this prospectus
        captioned &#8220;Risk Factors&#8221; and the financial statements and related
        notes and other information that we incorporate by reference herein, including
        our Annual Report on Form 10-K and our Quarterly Reports on Form 10-Q. Unless
        the context indicates otherwise, references in this prospectus to &#8220;ESS,&#8221;
        &#8220;we,&#8221; &#8220;our,&#8221; &#8220;us,&#8221; the &#8220;registrant&#8221;
        and the &#8220;Company&#8221; refer, collectively, to ESS Tech, Inc., a Delaware
        corporation, and its subsidiaries taken as a whole.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Company
        Overview</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">ESS
        is a long-duration energy storage company specializing in iron flow battery
        technology. We design and produce long-duration batteries predominantly using
        earth-abundant materials that we expect can be cycled over 20,000 times without
        capacity fade. Because we designed our batteries to operate using an electrolyte
        of primarily salt, iron and water, they are non-toxic and substantially recyclable.
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        long-duration iron flow batteries are the product of nearly 50 years of scientific
        advancement. Our founders, Craig Evans and Dr. Julia Song, began advancing
        this technology in 2011 and formed ESS. Our team has significantly enhanced
        the technology, improved the round-trip efficiency and developed an innovative
        and patented solution to the hydroxide build-up problem that plagued previous
        researchers developing iron flow batteries. Our proprietary solution to eliminate
        the hydroxide formation is known as the Proton Pump, and it works by utilizing
        hydrogen generated by side reactions on the negative electrode. The Proton
        Pump converts the hydrogen back into protons in the positive electrolyte.
        This process eliminates the hydroxide and stabilizes the electrolytes&#8217;
        pH levels. The Proton Pump is designed to allow the electrolyte to be used
        for over 20,000 cycles without any capacity fade. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        batteries provide flexibility to grid operators and energy assurance for commercial
        and industrial customers. Our technology addresses energy delivery, duration
        and cycle-life in a single battery platform that compares favorably to lithium-ion
        batteries, the most widely deployed alternative technology. Using our iron
        flow battery technology, we are developing two products, each of which is
        able to provide reliable, safe, long-duration energy storage. Our first energy
        storage product, the Energy Warehouse, is our &#8220;behind-the-meter&#8221;
        solution (referring to solutions that are located on the customer&#8217;s
        premises, behind the service demarcation with the utility) that offers energy
        storage ranging from four to 12-hour duration. Our second, larger scale energy
        storage product, the Energy Center, is designed for &#8220;front-of-the-meter&#8221;
        (referring to solutions that are located outside the customer&#8217;s premises,
        typically operated by the utility or by third-party providers who sell energy
        into the grid, often known as independent power producers) deployments specifically
        for utility and large commercial and industrial consumers.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        began shipping our second-generation Energy Warehouses in the third quarter
        of 2021 and, during the second quarter of 2022, we received final customer
        acceptance for the first units shipped. With each battery deployed, we will
        further our mission to accelerate the transition to a zero-carbon energy future
        with increased grid reliability.</font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Corporate
        Information</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">On
        October 8, 2021 (the &#8220;Closing Date&#8221;), ESS, f&#47;k&#47;a ACON
        S2 Acquisition Corp., a Cayman Islands exempted company (&#8220;STWO&#8221;),
        consummated a merger pursuant to that certain Agreement and Plan of Merger,
        dated May 6, 2021 (the &#8220;Merger Agreement&#8221;), by and among STWO,
        SCharge Merger Sub, Inc., a Delaware corporation and wholly owned direct subsidiary
        of STWO (&#8220;Merger Sub&#8221;), and ESS Tech Subsidiary, Inc., a Delaware
        corporation, f&#47;k&#47;a ESS Tech, Inc. (&#8220;Legacy ESS&#8221;) following
        the approval at a special meeting of the stockholders of STWO held on October
        5, 2021.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Pursuant
        to the terms of the Merger Agreement, STWO deregistered by way of continuation
        under the Cayman Islands Companies Act (2021 Revision) and registered as a
        corporation in the State of Delaware under Part XII of the Delaware General
        Corporation Law, and a business combination between STWO and ESS was effected
        through the merger of Merger Sub with and into Legacy ESS, with Legacy ESS
        surviving as a wholly owned subsidiary of </font></div></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">1</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"border-color:#000000;border-style:solid;border-width:1.00pt;padding:36.00pt
        36.00pt 36.00pt 36.00pt\"><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">STWO
        (together with the other transactions described in the Merger Agreement, the
        &#8220;Merger&#8221;). On the Closing Date, the registrant changed its name
        from &#8220;ACON S2 Acquisition Corp&#8221; to &#8220;ESS Tech, Inc.&#8221;</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">On
