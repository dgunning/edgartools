        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-9</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_318\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">PLAN
        OF DISTRIBUTION </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        have entered into the Sales Agreement dated March 31, 2025, with Robert W.
        Baird &#38; Co. Incorporated, the sales agent, under which we may from time
        to time offer and sell shares of our common stock having an aggregate gross
        sales price of up to $13,504,438. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Sales
        of shares of our common stock, if any, under this prospectus supplement may
        be made by any method permitted by law deemed to be an &#8220;at the market
        offering&#8221; as defined in Rule 415 under the Securities Act, including
        without limitation, sales made directly on the NYSE, on any other existing
        trading market for the common stock, in block trades or to or through a market
        maker, or through an electronic communications network. With our prior consent,
        the sales agent may also sell shares in privately negotiated transactions.
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        offering of the shares of our common stock by the sales agent is subject to
        receipt and acceptance of trading instructions (the &#8220;Placement Notice&#8221;)
        and subject to the sales agent&#8217;s right to decline any order in whole
        or in part. Upon its acceptance of a Placement Notice from us, the sales agent
        will use its commercially reasonable efforts consistent with its customary
        trading and sales practices to solicit offers to purchase shares of our common
        stock up to the amount specified, and in accordance with the terms and conditions
        set forth in the Sales Agreement. The Placement Notice that we deliver will
        set forth the number of shares to be issued, the time period during which
        sales are requested to be made by the sales agent, any limitation on the number
        of shares that may be sold in any one trading day, any minimum price below
        which sales may not be made, and any other instructions relevant to such requested
        sales. We or the sales agent may suspend the offering of shares of our common
        stock upon proper notice and subject to other conditions. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        sales agent will provide to us written confirmation no later than the opening
        of the trading day on the NYSE following the trading day on which shares of
        common stock are sold under the Sales Agreement. Each confirmation will include
        the number of shares of common stock sold on the preceding day, the net proceeds
        to us and the compensation payable by us to the sales agent with respect to
        such sales. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will pay the sales agent commissions for its services in acting as sales agent
        and&#47;or principal in the sale of shares of our common stock. The sales
        agent will be entitled to compensation of up to 3.0% of the gross sale price
        of the shares of our common stock sold under the Sales Agreement. We estimate
        that the total expenses for the offering, excluding any commissions or expense
        reimbursement payable to the sales agent under the terms of the Sales Agreement,
        will be approximately $380,000. The remaining sale proceeds, after deducting
        any other transaction fees, will equal our net proceeds from the sale of such
        shares. We have also agreed to reimburse the sales agent for its reasonable
        out-of-pocket expenses, including attorney&#8217;s fees, in an amount not
        to exceed an aggregate of $100,000 in connection with entering into the transactions
        contemplated by the Sales Agreement and an amount not to exceed an aggregate
        of $15,000 per calendar quarter thereafter for ongoing diligence arising from
        the transactions contemplated by the Sales Agreement. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may also sell shares of our common stock to the sales agent as principal for
        its own account at a price agreed upon at the time of sale. If we sell shares
        of our common stock to the sales agent, acting as principal, we will enter
        into a separate agreement setting forth the terms of such transaction and,
        to the extent required by applicable law, we will describe the agreement in
        a separate prospectus supplement or pricing supplement. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Settlement
        for sales of common stock will occur on the first trading day (or such earlier
        day as is industry practice for regular-way trading) following the date on
        which any sales are made, or on some other date that is agreed upon by us
        and the sales agent in connection with a particular transaction, in return
        for payment of the net proceeds to us. There is no arrangement for funds to
        be received in an escrow, trust or similar account. Sales of shares of our
        common stock as contemplated by this prospectus supplement will be settled
        through the facilities of the Depository Trust Company.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        summary of the material provisions of the Sales Agreement does not purport
        to be a complete statement of its terms and conditions. A copy of the Sales
        Agreement will be filed as an exhibit to a Current Report on Form 8-K filed
        under the Securities Exchange Act of 1934, as amended, and incorporated by
        reference in this prospectus supplement. </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-10</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will report in our Quarterly Reports on Form 10-Q, in our Annual Report on
        Form 10-K, and&#47;or, in our discretion, in a Current Report on Form 8-K,
        the number of shares of our common stock sold through the sales agent under
        the Sales Agreement and the net proceeds to us.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        sales agent and its affiliates have in the past and may in the future provide
        various investment banking, financial advisory and other financial services
        for us and our affiliates, for which services they have received, and may
        in the future receive, customary fees and expenses.  The sales agent and its
        affiliates may, from time to time, engage in other transactions with and perform
        services for us in the ordinary course of their business.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        the ordinary course of their business activities, the sales agent and its
        affiliates may make or hold a broad array of investments and actively trade
        debt and equity securities (or related derivative securities) and financial
        instruments (including bank loans) for their own account and for the accounts
        of their customers. Such investments and securities activities may involve
        securities and&#47;or instruments of ours or our affiliates. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        connection with the sale of the shares of our common stock on our behalf,
        the sales agent may be deemed to be an &#8220;underwriter&#8221; within the
        meaning of the Securities Act, and its compensation as sales agent may be
        deemed to be underwriting commissions or discounts. We have agreed to provide
        indemnification and contribution to the sales agent against certain specified
        liabilities, including liabilities under the Securities Act. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        and the sales agent have the right to terminate the Sales Agreement at any
        time upon proper notice to the other.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-11</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_344\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">LEGAL
        MATTERS </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        validity of the securities offered hereby will be passed upon for us by Wilson
        Sonsini Goodrich &#38; Rosati, Professional Corporation, Palo Alto, California.
        The sales agent is being represented in connection with this offering by Morrison
        &#38; Foerster LLP, Washington, D.C. </font></div><div id=\"i83339560318648a98cad8b6481af0b6b_370\"></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">EXPERTS
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        financial statements of ESS Tech, Inc. as of December 31, 2024 and 2023, and
        for each of the years in the two-year period ended December 31, 2024, have
        been incorporated by reference herein in reliance upon the report of KPMG
        LLP, independent registered public accounting firm, incorporated by reference
        herein, and upon the authority of said firm as experts in accounting and auditing.
        The audit report covering the December 31, 2024 financial statements contains
        an explanatory paragraph that states that the Company&#8217;s recurring net
        losses from operations and negative cash flows from operating activities raise
        substantial doubt about the entity&#8217;s ability to continue as a going
        concern. The financial statements do not include any adjustments that might
        result from the outcome of that uncertainty. </font></div><div id=\"i83339560318648a98cad8b6481af0b6b_397\"></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">WHERE
        YOU CAN FIND ADDITIONAL INFORMATION </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        file annual, quarterly and current reports, proxy statements and other information
        with the SEC. Our SEC filings are available to the public over the Internet
