        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        principal executive offices are located at 26440 SW Parkway Ave., Bldg. 83,
        Wilsonville, Oregon 97070, and our telephone number is (855) 423-9920.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        website address is https&#58;&#47;&#47;essinc.com. The information on, or
        that can be accessed through, our website is not part of this prospectus and
        should not be considered to be part of this prospectus unless expressly noted.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">The
        Securities That May Be Offered</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer or sell common stock, preferred stock, depositary shares, debt securities,
        warrants, subscription rights, purchase contracts and units in one or more
        offerings and in any combination. The aggregate offering price of the securities
        we sell pursuant to this prospectus will not exceed $300,000,000. Each time
        securities are offered with this prospectus, we will provide a prospectus
        supplement that will describe the specific amounts, prices and terms of the
        securities being offered and the net proceeds we expect to receive from that
        sale.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        securities may be sold to or through underwriters, dealers or agents or directly
        to purchasers or as otherwise set forth in the section of this prospectus
        under the heading &#8220;</font><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Plan
        of Distribution</font><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">.&#8221;
        Each prospectus supplement will set forth the names of any underwriters, dealers,
        agents or other entities involved in the sale of securities described in that
        prospectus supplement and any applicable fee, commission or discount arrangements
        with them.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Common
        Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer shares of our common stock, par value $0.0001 per share, either
        alone or underlying other registered securities convertible into our common
        stock. Holders of our common stock are entitled to receive dividends declared
        by our board of directors out of funds legally available for the payment of
        dividends, subject to rights, if any, of preferred stockholders. We have not
        paid dividends in the past and have no current plans to pay dividends. Each
        holder of common stock is entitled to one vote per share. The holders of common
        stock have no preemptive rights.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Preferred
        Stock</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        board of directors has the authority, subject to limitations prescribed by
        Delaware law, to issue preferred stock in one or more series, to establish
        from time to time the number of shares to be included in each series, and
        to fix the designation, powers, preferences and rights of the shares of each
        series and any of its qualifications, limitations or restrictions, in each
        case without further vote or action by our stockholders. Each series of preferred
        stock offered by us will be more fully described in the particular prospectus
        supplement that will accompany this prospectus, including redemption provisions,
        rights in the event of our liquidation, dissolution or winding up, voting
        rights and rights to convert into common stock.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Depositary
        Shares</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue fractional shares of preferred stock that will be represented by
        depositary shares and depositary receipts.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Each
        series of depositary shares or depositary receipts offered by us will be more
        fully described in the particular prospectus supplement that will accompany
        this prospectus, including redemption provisions, rights in the event of our
        liquidation, dissolution or winding up, voting rights and rights to convert
        into common stock.</font></div></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">2</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"border-color:#000000;border-style:solid;border-width:1.00pt;padding:36.00pt
        36.00pt 36.00pt 36.00pt\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Debt
        Securities</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer secured or unsecured obligations in the form of one or more series
        of senior or subordinated debt. The senior debt securities and the subordinated
        debt securities are together referred to in this prospectus as the &#8220;debt
        securities.&#8221; The subordinated debt securities generally will be entitled
        to payment only after payment of our senior debt. Senior debt generally includes
        all debt for money borrowed by us, except debt that is stated in the instrument
        governing the terms of that debt to be not senior to, or to have the same
        rank in right of payment as, or to be expressly junior to, the subordinated
        debt securities. We may issue debt securities that are convertible into or
        exchangeable for shares of our common stock.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        debt securities will be issued under an indenture between us and a trustee
        to be identified in an accompanying prospectus supplement. We have summarized
        the general features of the debt securities to be governed by the indenture
        in this prospectus and the form of indenture has been filed as an exhibit
        to the registration statement of which this prospectus forms a part. We encourage
        you to read the indenture.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Warrants</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer warrants for the purchase of common stock, preferred stock, debt
        securities or depositary shares. We may offer warrants independently or together
        with other securities.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Subscription
        Rights</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer subscription rights to purchase our common stock, preferred stock,
        debt securities, depositary shares, warrants or units consisting of some or
        all of these securities. These subscription rights may be offered independently
        or together with any other security offered hereby and may or may not be transferable
        by the stockholder receiving the subscription rights in such offering.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Purchase
        Contracts</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"background-color:#ffffff;color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer purchase contracts, including contracts obligating holders or us
        to purchase from the other a specific or variable number of securities at
        a future date or dates.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Units</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"background-color:#ffffff;color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may offer units comprised of one or more of the other classes of securities
        described in this prospectus in any combination. Each unit will be issued
        so that the holder of the unit is also the holder of each security included
        in the unit.</font></div></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">3</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_753\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-align:right\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">RISK
        FACTORS</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">An
        investment in our securities involves a high degree of risk. The prospectus
        supplement applicable to each offering of our securities will contain a discussion
        of the risks applicable to an investment in our securities. Prior to making
        a decision about investing in our securities, you should carefully consider
        the specific factors discussed under the section in the applicable prospectus
        supplement captioned &#8220;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Risk
        Factors</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">,&#8221;
        together with all of the other information contained or incorporated by reference
        in the prospectus supplement or appearing or incorporated by reference in
        this prospectus. You should also consider the risks, uncertainties and assumptions
        discussed under &#8220;</font><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Part&#160;I&#8212;Item&#160;1A&#8212;Risk
        Factors</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        of our most recent Annual Report on Form&#160;10-K and in &#8220;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Part&#160;II&#8212;Item&#160;1A&#8212;Risk
        Factors</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        in our most recent Quarterly Report on Form&#160;10-Q filed subsequent to
        such Form 10-K that are incorporated herein by reference, as may be amended,
        supplemented or superseded from time to time by other reports we file with
        the SEC in the future. The risks and uncertainties we have described are not
        the only ones we face. Additional risks and uncertainties not presently known
        to us or that we currently deem immaterial may also affect our operations.</font></div><div
        style=\"height:72pt;position:relative;width:100%\"><div style=\"bottom:0;position:absolute;width:100%\"><div
        style=\"margin-bottom:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">4</font></div></div></div><div
