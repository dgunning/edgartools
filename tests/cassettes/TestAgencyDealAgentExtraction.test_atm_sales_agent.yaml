        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Unless
        the context otherwise requires, all references in this prospectus supplement
        to &#8220;ESS,&#8221; &#8220;we,&#8221; &#8220;us,&#8221; &#8220;our,&#8221;
        the &#8220;Company&#8221; or similar words refer to ESS Tech, Inc.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Company
        Overview</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">ESS
        is a long-duration energy storage company specializing in iron flow battery
        technology. We design and produce long-duration batteries predominantly using
        earth-abundant materials that we believe can be cycled over 20,000 times without
        capacity fade. Because our batteries are designed to operate using an electrolyte
        of primarily salt, iron and water, they are environmentally sustainable and
        substantially recyclable or reusable. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        long-duration iron flow batteries are the product of nearly 50 years of scientific
        advancement. Our founders, Craig Evans and Dr. Julia Song, began advancing
        this technology in 2011 and formed ESS. Our team has significantly enhanced
        the technology, improved the round-trip efficiency and developed an innovative
        solution to the hydroxide build-up problem that plagued previous researchers
        developing iron flow batteries. Our proprietary solution to eliminate the
        hydroxide formation is known as the Proton Pump, which works by utilizing
        hydrogen generated by side reactions on the negative electrode. The Proton
        Pump converts the hydrogen back into protons in the positive electrolyte.
        This process eliminates the hydroxide and stabilizes the electrolytes&#8217;
        pH levels.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        batteries provide flexibility to grid operators and energy assurance for commercial
        and industrial customers. Our technology addresses energy delivery, duration
        and cycle-life in a single battery platform that compares favorably to lithium-ion
        batteries, the most widely deployed alternative technology. Using our iron
        flow battery technology, we are developing several products, each of which
        is designed to provide reliable, safe, long-duration energy storage. Our first
        energy storage product, the Energy Warehouse, is our &#8216;behind-the-meter&#8217;
        solution (referring to solutions that are located on the customer&#8217;s
        premises, behind the service demarcation with the utility) that offers energy
        storage of up to twelve hours and is used for initial testing and technology
        validation. Our larger scale energy storage products, the Energy Center and
        Energy Base, are designed for either &#8216;behind-the meter&#8217; or &#8216;front-of-the-meter&#8217;
        (referring to solutions that are located outside the customer&#8217;s premises,
        typically operated by the utility or by third-party providers who sell energy
        into the grid, often known as independent power producers) deployments specifically
        for utility and large commercial and industrial consumers. We are developing
        additional products at larger scale, in addition to productized versions of
        our core technology components, for integration into third-party systems.</font></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">Corporate
        Information</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Our
        principal executive offices are located at 26440 SW Parkway Ave., Bldg. 83,
        Wilsonville, Oregon, 97070, and our telephone number is (855) 423-9920. Our
        website is https&#58;&#47;&#47;essinc.com. We make available free of charge
        through our website our Annual Reports on Form 10-K, Quarterly Reports on
        Form 10-Q and Current Reports on Form 8-K, and amendments to these reports
        filed or furnished pursuant to Section 13(a) or 15(d) of the Securities Exchange
