        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Sales
        of a substantial number of shares of our common stock in the public market
        could occur at any time, including as a result of the shares sold in this
        offering. These sales, or the perception in the market that the holders of
        a large number of shares intend to sell shares, could reduce the market price
        of our common stock.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        maintain a shelf registration statement on Form S-3, of which this prospectus
        supplement forms a part, pursuant to which we may, from time to time, sell
        up to an aggregate of $300 million of our common stock, preferred stock, debt
        securities, depositary shares, warrants, subscription rights, purchase contracts,
        or units, subject to the limitations of General Instruction I.B.6 of Form
        S-3 so long as the aggregate market value of our common stock held by non-affiliates
        is less than $75.0 million. We have also filed registration statements with
        the SEC to register the resale of shares of our common stock by certain stockholders
        who have rights, subject to certain conditions, to require us to file registration
        statements covering their shares or to include their shares in registration
        statements that we may file for ourselves or other stockholders. We have also
        filed registration statements with the SEC to register shares reserved for
        future issuance under our equity compensation plans. Registration of these
        shares under the Securities Act results in the shares becoming freely tradable
        in the public market, subject to the restrictions of Rule 144 in the case
        of our affiliates.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Any
        issuance of securities under the shelf registration statement may cause stockholders
        to experience significant dilution of their ownership interests and any sales
        of securities by us or our stockholders under the resale registration statements
        could have a material adverse effect on the market price for our common stock.
        Sales of shares of our common stock pursuant to the exercise of registration
        rights may make it more difficult for us to sell equity securities in the
        future at a time and at a price that we deem appropriate. These sales also
        could cause the trading price of our common stock to fall and make it more
        difficult for you to sell shares of our common stock at a time and price that
        you deem appropriate.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">We
        may issue additional shares of common stock or preferred stock. Any such issuances
        would dilute the interest of our stockholders and likely present other risks.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        may issue a substantial number of additional shares of common stock or preferred
        stock. The issuance of additional securities&#58; </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">may
        significantly dilute the equity interests of our investors&#59; </font></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">may
        subordinate the rights of our stockholders if preferred stock is issued with
        rights senior to those afforded our common stock&#59; </font></div><div style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">could
        cause a change in control if a substantial number of securities are issued,
        which may affect, among other things, our ability to use our net operating
        loss carry forwards, if any, and could result in the resignation or removal
        of our present officers and directors&#59; and </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-3</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;padding-left:36pt;text-indent:-18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8226;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;padding-left:14.5pt\">may
        adversely affect prevailing market prices for our common stock and&#47;or
        warrants.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">Raising
        additional capital may cause dilution to our stockholders, including purchasers
        of our common stock in this offering, restrict our operations or require us
        to relinquish substantial rights.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">To
        the extent that we raise additional capital through the sale of equity or
        convertible debt securities, your ownership interest will be diluted, and
        the terms of these new securities may include liquidation or other preferences
        that adversely affect your rights as a common stockholder. Debt financing,
        if available, may involve fixed payment obligations or agreements that include
        covenants limiting or restricting our ability to take specific actions such
        as incurring additional debt, making capital expenditures or declaring dividends.
        If we raise additional funds through partnerships, collaborations, strategic
        alliances or licensing arrangements with third parties, we may have to relinquish
        valuable rights to our technologies, products or future revenue streams, or
        grant licenses on terms that are not favorable to us. We cannot assure you
        that we will be able to obtain additional funding if and when necessary. If
        we are unable to obtain adequate financing on a timely basis, we could be
        required to delay or scale back our development or production efforts or grant
        rights to develop, produce and market our products that we would otherwise
        prefer to develop, produce and market ourselves. In addition, we may seek
        additional capital due to favorable market conditions or strategic considerations
        even if we believe we have sufficient funds for our current or future operating
        plans.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">We
        have broad discretion in the use of our cash and cash equivalents, including
        the net proceeds from this offering. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        currently anticipate that the net proceeds from this offering will be used
        for working capital and general corporate purposes. We have broad discretion
        in the use of our cash and cash equivalents, including the net proceeds from
        this offering, and investors must rely on the judgment of our management regarding
        the use of our cash and cash equivalents. Our management may not use cash
        and cash equivalents in ways that ultimately increase the value of your investment.
        Our failure to use our cash and cash equivalents effectively could result
        in financial losses that could have a material adverse effect on our business,
        cause the price of our common stock to decline and delay the commercialization
        of our products. Pending their use, we may invest our cash and cash equivalents
        in short-term or long-term, investment-grade, interest-bearing securities.
        These investments may not yield favorable returns. If we do not invest or
        apply our cash and cash equivalents in ways that enhance shareholder value,
        we may fail to achieve expected financial results, which could cause the price
        of our common stock to decline. </font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">You
        may experience immediate and substantial dilution in the book value per share
        of the common stock you purchase. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Because
        the prices per share at which shares of our common stock are sold in this
        offering may be substantially higher than the book value per share of our
        common stock, you may suffer immediate and substantial dilution in the net
        tangible book value of the common stock you purchase in this offering. The
        shares sold in this offering, if any, will be sold from time to time at various
        prices. After giving effect to the sale of our common stock in the maximum
        aggregate offering amount of $13,504,438 at an assumed offering price of $3.35
        per share, the last reported sale price of our common stock on the NYSE on
        March 28, 2025 and after deducting estimated offering commissions and expenses
        payable by us, the net tangible book value of our common stock as of December
        31, 2024 would have been $36.9 million, or $2.30 per share of common stock.
        This represents an immediate increase in the net tangible book value of $0.28
        per share to our existing stockholders and an immediate and substantial dilution
        in as-adjusted net tangible book value of approximately $1.05 per share to
        new investors who purchase our common stock in the offering. See &#8220;</font><font
        style=\"color:#0000ff;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%;text-decoration:underline\"><a
        href=\"#i83339560318648a98cad8b6481af0b6b_292\" style=\"color:#0000ff;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%;text-decoration:underline\">Dilution</a></font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        beginning on page </font><font style=\"color:#0000ff;font-family:'Times New
        Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;text-decoration:underline\"><a
        href=\"#i83339560318648a98cad8b6481af0b6b_292\" style=\"color:#0000ff;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;text-decoration:underline\">S-</a><a
        href=\"#i83339560318648a98cad8b6481af0b6b_292\" style=\"color:#0000ff;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%;text-decoration:underline\">8</a></font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">
        of this prospectus supplement for a more detailed discussion of the dilution
        you may incur in connection with this offering. </font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">We
        do not expect to declare any dividends in the foreseeable future. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        do not anticipate declaring any cash dividends to holders of our common stock
        in the foreseeable future. Consequently, investors may need to rely on sales
        of their shares after price appreciation, which may never occur, as the only
        way to realize any future gains on their investment. </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-4</font></div></div></div><hr
        style=\"page-break-after:always\"><div style=\"min-height:72pt;width:100%\"><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">It
        is not possible to predict the actual number of shares we will sell under
        the Sales Agreement, or the gross proceeds resulting from those sales. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Subject
        to certain limitations in the Sales Agreement and compliance with applicable
        law, we have the discretion to deliver a placement notice to the sales agent
        at any time throughout the term of the Sales Agreement. The number of shares
        that are sold through the sales agent after delivering a placement notice
        will fluctuate based on a number of factors, including the market price of
        the common stock during the sales period, the limits we set with the sales
        agent in any applicable placement notice, and the demand for our common stock
        during the sales period. Because the price per share of each share sold will
        fluctuate during the sales period, it is not currently possible to predict
        the number of shares that will be sold or the gross proceeds to be raised
        in connection with those sales. </font></div><div style=\"margin-bottom:9pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">The
        common stock offered hereby will be sold in &#8220;at the market offerings,&#8221;
        and investors who buy shares at different times will likely pay different
        prices. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Investors
        who purchase shares in this offering at different times will likely pay different
        prices, and so may experience different levels of dilution and different outcomes
        in their investment results. We will have discretion, subject to market demand,
        to vary the timing, prices, and numbers of shares sold in this offering. In
        addition, there is no minimum or maximum sales price for shares to be sold
        in this offering. Investors may experience a decline in the value of the shares
        they purchase in this offering as a result of sales made at prices lower than
        the prices they paid.</font></div><div style=\"margin-bottom:9pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:700;line-height:120%\">The
        report of our independent registered public accounting firm includes a &#8220;going
        concern&#8221; explanatory paragraph.</font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        will require substantial additional funds to continue our operations. Our
        cash and cash equivalents and short-term investments were $31.6 million at
        December 31, 2024. Given our planned expenditures for the next year, we have
        concluded, and our independent registered public accounting firm has agreed
        with our conclusion that there is a substantial doubt regarding our ability
        to continue as a going concern for a period of at least 12 months beyond the
        filing of our Annual Report on Form 10-K for the year ended December 31, 2024.
        As a result, the report of our independent registered public accounting firm
        on our financial statements for the year ended December 31, 2024 includes
        an explanatory paragraph regarding the existence of substantial doubt about
        our ability to continue as a going concern. Any such inability to continue
        as a going concern may result in our stockholders losing their entire investment.
        There is no guarantee that we will become profitable or secure additional
        financing on acceptable terms or at all, and we may not be able to raise additional
        capital either in this offering or otherwise. Further, the inclusion of disclosures
        expressing substantial doubt about our ability to continue as a going concern
        could materially adversely affect our stock price and our ability to raise
        new capital or enter into partnerships or other agreements.</font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        have prepared our consolidated financial statements on a going concern basis,
        which contemplates the realization of assets and the satisfaction of liabilities
        and commitments in the normal course of business. Our audited consolidated
        financial statements included in our Annual Report on Form 10-K for the year
        ended December 31, 2024 do not include any adjustments to reflect the possible
        inability to continue as a going concern within at least 12 months after the
        issuance of such financial statements.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-5</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_240\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">SPECIAL
        NOTE REGARDING FORWARD-LOOKING STATEMENTS </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        prospectus supplement, the accompanying prospectus and the information incorporated
        by reference herein and therein contain certain statements that constitute
        &#8220;forward-looking statements&#8221; within the meaning of Section 27A
        of the Securities Act and Section 21E of the Exchange Act. The words &#8220;believe,&#8221;
        &#8220;may,&#8221; &#8220;will,&#8221; &#8220;estimate,&#8221; &#8220;continue,&#8221;
        &#8220;anticipate,&#8221; &#8220;intend,&#8221; &#8220;expect,&#8221; &#8220;could,&#8221;
        &#8220;would,&#8221; &#8220;project,&#8221; &#8220;plan,&#8221; &#8220;potentially,&#8221;
        &#8220;likely,&#8221; and similar expressions and variations thereof are intended
        to identify forward-looking statements, but are not the exclusive means of
        identifying such statements. Those statements appear in this prospectus supplement,
        the accompanying prospectus and the information incorporated by reference
        herein and therein by reference, particularly in the sections titled &#8220;</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Risk
        Factors</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        and &#8220;</font><font style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-style:italic;font-weight:400;line-height:120%\">Management&#8217;s
        Discussion and Analysis of Financial Condition and Results of Operations</font><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">&#8221;
        and include statements regarding the intent, belief or current expectations
        of our management that are subject to known and unknown risks, uncertainties
        and assumptions. You are cautioned that any such forward-looking statements
        are not guarantees of future performance and involve risks and uncertainties,
        and that actual results may differ materially from those projected in the
        forward-looking statements as a result of various factors. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">Because
        forward-looking statements are inherently subject to risks and uncertainties,
        some of which cannot be predicted or quantified, you should not rely upon
        forward-looking statements as predictions of future events. The events and
        circumstances reflected in the forward-looking statements may not be achieved
        or occur and actual results could differ materially from those projected in
        the forward-looking statements. Except as required by applicable law, including
        the securities laws of the United States and the rules and regulations of
        the SEC, we do not plan to publicly update or revise any forward-looking statements
        contained herein after we distribute this prospectus supplement, whether as
        a result of any new information, future events or otherwise. </font></div><div
        style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">In
        addition, statements that &#8220;we believe&#8221; and similar statements
        reflect our beliefs and opinions on the relevant subject. These statements
        are based upon information available to us as of the date of this prospectus
        supplement, and although we believe such information forms a reasonable basis
        for such statements, such information may be limited or incomplete, and our
        statements should not be read to indicate that we have conducted a thorough
        inquiry into, or review of, all potentially available relevant information.
        These statements are inherently uncertain and investors are cautioned not
        to unduly rely upon these statements. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">This
        prospectus supplement, the accompanying prospectus and the information incorporated
        by reference herein and therein may contain market data that we obtain from
        industry sources. These sources do not guarantee the accuracy or completeness
        of the information. Although we believe that our industry sources are reliable,
        we do not independently verify the information. The market data may include
        projections that are based on a number of other projections. While we believe
        these assumptions to be reasonable as of the date of this prospectus supplement,
        actual results may differ from the projections.</font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-6</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_266\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">USE
        OF PROCEEDS </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        amount of proceeds from this offering will depend upon the number of shares
        of our common stock sold and the market price at which they are sold. There
        can be no assurance that we will be able to sell any shares under or fully
        utilize the Sales Agreement with the sales agent. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">We
        intend to use the net proceeds, if any, from this offering for working capital
        and general corporate purposes. </font></div><div style=\"height:72pt;position:relative;width:100%\"><div
        style=\"bottom:0;position:absolute;width:100%\"><div style=\"margin-bottom:9pt;text-align:center\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">S-7</font></div></div></div><div
        id=\"i83339560318648a98cad8b6481af0b6b_292\"></div><hr style=\"page-break-after:always\"><div
        style=\"min-height:72pt;width:100%\"><div style=\"margin-bottom:9pt;text-indent:18pt\"><font><br></font></div></div><div
        style=\"margin-bottom:9pt;margin-top:9pt;text-align:center\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:700;line-height:120%\">DILUTION
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">If
        you invest in our common stock, your interest will be diluted to the extent
        of the difference between the public offering price per share and the adjusted
        net tangible book value per share of our common stock after this offering.
        </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font style=\"color:#000000;font-family:'Times
        New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">The
        net tangible book value of our common stock as of December&#160;31, 2024 was
        approximately $24.2 million, or approximately $2.02 per share. Net tangible
        book value per share represents the amount of our total tangible assets, excluding
        goodwill and intangible assets, less total liabilities, divided by the total
        number of shares of our common stock outstanding. Dilution per share to new
        investors represents the difference between the amount per share paid by purchasers
        for each share of common stock in this offering and the net tangible book
        value per share of our common stock immediately following the completion of
        this offering. </font></div><div style=\"margin-bottom:9pt;text-indent:18pt\"><font
        style=\"color:#000000;font-family:'Times New Roman',sans-serif;font-size:10pt;font-weight:400;line-height:120%\">After
        giving effect to the sale of shares of our common stock in the aggregate amount
        of $13,504,438 at an assumed offering price of $3.35 per share, which was
        the last reported sale price of our common stock on March 28, 2025 on the
        NYSE, and after deducting estimated commissions and estimated offering expenses,
