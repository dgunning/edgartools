        style="bottom:0;position:absolute;width:100%"><div><span><br/></span></div></div></div><div
        id="i8cfd830e1ed449b2ba1d046c6fd55a65_7"></div><hr style="page-break-after:always"/><div
        style="min-height:42.75pt;width:100%"><div><span><br/></span></div></div><div
        style="-sec-extract:summary"><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:700;line-height:115%">Item
        5.02 Departure of Directors or Certain Officers; Election of Directors; Appointment
        of Certain Officers; Compensatory Arrangements of Certain Officers</span></div><div
        style="margin-bottom:6pt"><span><br/></span></div><div><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">On
        June 25, 2026, JPMorgan Chase &amp; Co. ("JPMorganChase" or the &#8220;Firm&#8221;)
        announced that Doug Petno, 61, and Troy Rohrbaugh, 56, Co-CEOs of the Commercial
        &amp; Investment Bank ("CIB"), have been elected Co-Presidents of the Firm,
        effective immediately.</span><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:6.5pt;font-weight:400;line-height:115%;position:relative;top:-3.5pt;vertical-align:baseline">1</span><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">
        In addition to their new roles, Mr. Petno will become sole CEO of the CIB,
        and Mr. Rohrbaugh will become CEO of Consumer &amp; Community Banking ("CCB").</span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">The
        promotions of Messrs. Petno and Rohrbaugh to Co-Presidents and sole CEOs of
        the Firm&#8217;s two largest businesses are part of the Board&#8217;s ongoing
        succession planning designed to ensure continued exceptional leadership at
        the highest levels of the company.  </span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">Marianne
        Lake, current CEO of CCB, has decided to retire from the Firm after more than
        25 years of outstanding leadership and service. Ms. Lake will work with Mr.
        Rohrbaugh and other senior executives over the coming weeks to help guide
        a smooth transition.</span></div><div><span><br/></span></div><div><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">In
        addition, the independent members of the Compensation &amp; Management Development
        Committee (&#8220;CMDC&#8221;) approved one-time Retention and Continuity
        equity based awards (the &#8220;Awards&#8221;) on June 24, 2026 to the following
        Operating Committee members: Doug Petno, Co-President and CEO of the Commercial
        &amp; Investment Bank, and Troy Rohrbaugh, Co-President and CEO of Consumer
        &amp; Community Banking, in the amount of $30 million each; Mary Erdoes, CEO
        of Asset &amp; Wealth Management, and Jennifer Piepszak, Chief Operating Officer,
        in the amount of $20 million each.</span><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:6.5pt;font-weight:400;line-height:115%;position:relative;top:-3.5pt;vertical-align:baseline">2</span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">The
        CMDC determined that the targeted Retention and Continuity Awards are designed
        to preserve top qualified internal succession candidates, maintain key Operating
        Committee continuity through any leadership transition, and are in the long-term
        interests of shareholders.</span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">The
        Awards are equity-based in the form of Restricted Stock Units (&#8220;RSUs&#8221;)
        that are designed to incentivize leadership continuity. The terms of the Awards
        are distinct from, and are generally more restrictive than, the terms of annual
        equity grants regularly awarded by the Firm to Operating Committee members.
        The Awards 100% cliff-vest after three years and are subject to an additional
        Vesting Performance Condition that requires the Firm to achieve a three-year
        average return on tangible common equity</span><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:6.5pt;font-weight:400;line-height:115%;position:relative;top:-3.5pt;vertical-align:baseline">3</span><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:115%">
        (&#8220;ROTCE&#8221;) of 12% for calendar years 2026, 2027 and 2028. Net shares
        are subject to a two-year hold and are also subject to the Firm&#8217;s stock
        ownership guideline and retention requirements applicable to the Firm&#8217;s
        Operating Committee members. Vesting is subject to continuous employment with
        the Firm, with certain limited exceptions, but does not allow for vesting
        for retirement, job elimination or government service.  </span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:112%">Equity
        incentives are subject to the JPMorgan Chase Bonus Recoupment Policy which
        applies in the event of a material restatement of the Firm''s financial results.
        In addition, all equity awards granted contain recapture provisions that enable
        the Firm to cancel outstanding awards and/or recover the value of certain
        stock distributed under the award in specified circumstances. In addition
        to recapture provisions, portions of equity awards awarded are also subject
        to additional Protection-based Vesting provisions under which awards may be
        cancelled as determined by the CMDC.</span></div><div><span><br/></span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:10pt;font-weight:400;line-height:112%">A
        copy of the press release related to this announcement is attached hereto
        as Exhibit 99.1.</span></div><div><span><br/></span></div><div style="border-bottom:1pt
        solid #000000;margin-bottom:5pt;margin-top:10pt;opacity:1;width:150pt"></div><div
        style="-sec-extract:summary"><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:4.55pt;font-weight:400;line-height:112%;position:relative;top:-2.44pt;vertical-align:baseline">1</span><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:7pt;font-weight:400;line-height:112%">
        For biographical information, refer to Item 10 of the Form 10-K for the fiscal
        year ended December 31, 2025.</span></div><div><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:3pt;font-weight:400;line-height:112%">
        </span></div><div style="-sec-extract:summary"><span style="color:#000000;font-family:''Sons'',sans-serif;font-size:4.55pt;font-weight:400;line-height:120%;position:relative;top:-2.44pt;vertical-align:baseline">2</span><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:7pt;font-weight:400;line-height:120%">
        The amount of the Awards reflects the grant date fair market value.  The aggregate
        number of RSUs granted to each executive was determined by dividing the Award
        grant date fair market value by the average of the high and the low prices
        of JPMorganChase common stock on the grant date.  </span></div><div><span
        style="color:#000000;font-family:''Sons'',sans-serif;font-size:3pt;font-weight:400;line-height:120%">
