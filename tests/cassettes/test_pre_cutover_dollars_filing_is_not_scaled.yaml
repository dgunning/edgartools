        \     <additionalInformation>MetLife, Inc. is the parent holding company of
        certain institutional investment managers.  MetLife, Inc. is filing this 13F
        Combination Report to reflect Section 13(f) securities for which one of such
        institutional investment managers exercises investment discretion, however
        where such manager does not exceed the $100 million filing threshold and thus
        does not meet the criteria for being an Other Included Manager.  Other institutional
        investment managers for which MetLife, Inc. is the parent holding company
        file separate 13F Holdings Reports.\n\nMetLife, Inc. is the parent holding
        company of certain institutional investment managers. For purposes of the
        reporting requirements under Section 13(f) of the Securities Exchange Act
        of 1934 (the Act), and the rules promulgated thereunder, MetLife, Inc. itself
        does not exercise, and therefore disclaims, investment discretion with respect
        to any Section 13(f) securities positions over which its investment operating
        subsidiaries exercise such discretion. To the extent, however, that MetLife
        Inc.'s ownership interest in such subsidiaries may nevertheless give rise
        to a Form 13F obligation on behalf of MetLife, Inc., the information required
        by Form 13F is reported herein on behalf of all such subsidiaries.</additionalInformation>\n
