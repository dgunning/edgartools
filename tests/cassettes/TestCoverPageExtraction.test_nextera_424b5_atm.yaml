        Senior Debt Security affected by the modification. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">A supplemental indenture that changes or eliminates
        any provision of the Indenture that has expressly been included only for the
        benefit of\none or more particular series or tranches of Senior Debt Securities,
        or that modifies the rights of the registered owners of Senior Debt Securities
        of that particular series or tranche with respect to that provision, will
        not affect the rights under\nthe Indenture of the registered owners of the
        Senior Debt Securities of any other series or tranche. (Indenture, Section&nbsp;1202).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The\nIndenture provides that, in order to determine
        whether the registered owners of the required principal amount of the outstanding
        Senior Debt Securities have given any request, demand, authorization, direction,
        notice, consent or waiver under the\nIndenture, or whether a quorum is present
        at the meeting of the registered owners of Senior Debt Securities, Senior
        Debt Securities owned by NEE Capital or any other obligor upon the Senior
        Debt Securities or any affiliate of NEE Capital or of that\nother obligor
        (unless NEE Capital, that affiliate or that obligor owns all Senior Debt Securities
        outstanding under the Indenture, determined without regard to this provision)
        will be disregarded and deemed not to be outstanding. (Indenture,\nSection&nbsp;101).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If NEE Capital solicits any action under the
        Indenture from registered owners of Senior Debt Securities, NEE Capital\nmay,
        at its option, fix in advance a record date for determining the registered
        owners of Senior Debt </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\">27 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nSecurities entitled to take
        that action, but NEE Capital will not be obligated to do so. If NEE Capital
        fixes such a record date, that action may be taken before or after that record
        date, but\nonly the registered owners of record at the close of business on
        that record date will be deemed to be registered owners of Senior Debt Securities
        for the purposes of determining whether registered owners of the required
        proportion of the\noutstanding Senior Debt Securities have authorized that
        action. For these purposes, the outstanding Senior Debt Securities will be
        computed as of the record date. Any action of a registered owner of any Senior
        Debt Security under the Indenture will\nbind every future registered owner
        of that Senior Debt Security, or any Senior Debt Security replacing that Senior
        Debt Security, with respect to anything that the Indenture Trustee or NEE
        Capital do, fail to do, or allow to be done in reliance on\nthat action, whether
        or not that action is noted upon that Senior Debt Security. (Indenture, Section&nbsp;104).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Resignation and\nRemoval of Indenture Trustee.</B>
        The Indenture Trustee may resign at any time with respect to any series of
        Senior Debt Securities by giving written notice of its resignation to NEE
        Capital. Also, the registered owners of a majority in principal\namount of
        the outstanding Senior Debt Securities of one or more series of Senior Debt
        Securities may remove the Indenture Trustee at any time with respect to the
        Senior Debt Securities of that series, by delivering an instrument evidencing
        this\naction to the Indenture Trustee and NEE Capital. The resignation or
        removal of the Indenture Trustee and the appointment of a successor trustee
        will not become effective until a successor trustee accepts its appointment.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except with respect to a trustee under the Indenture
        appointed by the registered owners of Senior Debt Securities, the Indenture
        Trustee will\nbe deemed to have resigned and the successor will be deemed
        to have been appointed as trustee in accordance with the Indenture if: </P>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">no event of default under the Indenture or event
        that, after notice or lapse of time, or both, would become an\nevent of default
        under the Indenture exists, and </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">NEE Capital has delivered to the Indenture Trustee
        a resolution of its Board of Directors appointing a\nsuccessor trustee and
        that successor trustee has accepted that appointment in accordance with the
        terms of the Indenture. (Indenture, Section&nbsp;910). </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Notices.</B> Notices to registered owners
        of Senior Debt Securities will be sent by mail to the addresses of those registered
        owners as\nthey appear in the security register for those Senior Debt Securities.
        (Indenture, Section&nbsp;106). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Title.</B>
        NEE Capital, the\nIndenture Trustee, and any agent of NEE Capital or the Indenture
        Trustee, may treat the person in whose name a Senior Debt Security is registered
        as the absolute owner of that Senior Debt Security, whether or not that Senior
        Debt Security is\noverdue, for the purpose of making payments and for all
        other purposes, regardless of any notice to the contrary. (Indenture, Section&nbsp;308).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Governing Law.</B> The Indenture and the
        Senior Debt Securities will be governed by, and construed in accordance with,
        the laws of the\nState of New York, without regard to conflict of laws principles
        thereunder, except to the extent that the law of any other jurisdiction is
        mandatorily applicable. (Indenture, Section&nbsp;112). </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">28 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_22\"></A>DESCRIPTION
        OF NEE GUARANTEE OF </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>NEE CAPITAL
        SENIOR DEBT SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>General.</B>
        This section briefly summarizes some of the provisions of the Guarantee Agreement,
        dated as of June&nbsp;1, 1999, between NEE,\nas guarantor, and The Bank of
        New York Mellon, as guarantee trustee, referred to in this prospectus as the
        &#8220;Guarantee Trustee.&#8221; The Guarantee Agreement, referred to in this
        prospectus as the &#8220;Guarantee Agreement,&#8221; was\nexecuted for the
        benefit of the Indenture Trustee, which holds the Guarantee Agreement for
        the benefit of registered owners of the Senior Debt Securities covered by
        the Guarantee Agreement. This summary does not contain a complete description
        of the\nGuarantee Agreement. You should read this summary together with the
        Guarantee Agreement for a complete understanding of all the provisions. The
        Guarantee Agreement has previously been filed with the SEC and is an exhibit
        to the registration\nstatement filed with the SEC of which this prospectus
        is a part. In addition, the Guarantee Agreement is qualified as an indenture
        under the Trust&nbsp;Indenture Act of 1939 and therefore subject to the provisions
        of the Trust&nbsp;Indenture Act of\n1939. You should read the Trust&nbsp;Indenture
        Act of 1939 for a complete understanding of its provisions. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Under
        the Guarantee Agreement,\nNEE absolutely, irrevocably and unconditionally
        guarantees the prompt and full payment, when due and payable (including upon
        acceleration, redemption or stated maturity), of the principal, interest and
        premium, if any, on the Senior Debt Securities\nthat are covered by the Guarantee
        Agreement to the registered owners of those Senior Debt Securities, according
        to the terms of those Senior Debt Securities and the Indenture. Pursuant to
        the Guarantee Agreement, all of the Senior Debt Securities\nare covered by
        the Guarantee Agreement except Senior Debt Securities that by their terms
        are expressly not entitled to the benefit of the Guarantee Agreement. All
        of the Offered Senior Debt Securities will be covered by the Guarantee Agreement.
        This\nguarantee is referred to in this prospectus as the &#8220;Guarantee.&#8221;
        NEE is only required to make these payments if NEE Capital fails to pay or
        provide for punctual payment of any of those amounts on or before the expiration
        of any applicable\ngrace periods. (Guarantee Agreement, Section&nbsp;5.01).
        In the Guarantee Agreement, NEE has waived its right to require the Guarantee
        Trustee, the Indenture Trustee or the registered owners of Senior Debt Securities
        covered by the Guarantee\nAgreement to exhaust their remedies against NEE
        Capital prior to bringing suit against NEE. (Guarantee Agreement, Section&nbsp;5.06).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The\nGuarantee is a guarantee of payment when
        due (i.e., the guaranteed party may institute a legal proceeding directly
        against NEE to enforce its rights under the Guarantee Agreement without first
        instituting a legal proceeding against any other person\nor entity). The Guarantee
        is not a guarantee of collection. (Guarantee Agreement, Section&nbsp;5.01).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise stated in the\nrelated prospectus
        supplement, the covenants in the Guarantee Agreement would not give registered
        owners of the Senior Debt Securities covered by the Guarantee Agreement protection
        in the event of a\n<FONT STYLE=\"white-space:nowrap\">highly-leveraged</FONT>
        transaction involving NEE. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Security
        and Ranking.</B> The Guarantee is an\nunsecured obligation of NEE and will
        rank equally and ratably with all other unsecured and unsubordinated indebtedness
        of NEE. There is no limit on the amount of other indebtedness, including guarantees,
        that NEE may incur or issue. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">While NEE is
        a holding company that derives substantially all of its income from its operating
        subsidiaries, NEE&#8217;s subsidiaries are\nseparate and distinct legal entities
        and have no obligation to make any payments under the Guarantee Agreement
        or to make any funds available for such payment. Therefore, the Guarantee
        effectively is subordinated to all indebtedness and other\nliabilities, including
        trade payables, debt and preferred stock, incurred or issued by NEE&#8217;s
        subsidiaries. In addition to trade liabilities, many of NEE&#8217;s operating
        subsidiaries incur debt in order to finance their business activities.\nAll
        of this indebtedness will effectively be senior to the Guarantee. Neither
        the Indenture nor the Guarantee Agreement places any limit on the amount of
        liabilities, including debt or preferred stock, that NEE&#8217;s subsidiaries
        may issue,\nguarantee or incur. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Events of
        Default.</B> An event of default under the Guarantee Agreement will occur
        upon the failure of NEE to\nperform any of its payment obligations under the
        Guarantee Agreement. (Guarantee Agreement, Section&nbsp;1.01). </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">29 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nThe registered owners of a
        majority of the aggregate principal amount of the outstanding Senior Debt
        Securities covered by the Guarantee Agreement have the right to: </P>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">direct the time, method and place of conducting
        any proceeding for any remedy available to the Guarantee\nTrustee under the
        Guarantee Agreement, or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">direct the exercise of any trust or power conferred
        upon the Guarantee Trustee under the Guarantee Agreement.\n(Guarantee Agreement,
        Section&nbsp;3.01). </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Guarantee
        Trustee must give notice of any event of default under the\nGuarantee Agreement
        known to the Guarantee Trustee to the registered owners of Senior Debt Securities
        covered by the Guarantee Agreement within 90&nbsp;days after the occurrence
        of that event of default, in the manner and to the extent provided in\nsubsection&nbsp;(c)
        of Section&nbsp;313 of the Trust&nbsp;Indenture Act of 1939, unless such event
        of default has been cured or waived prior to the giving of such notice. (Guarantee
        Agreement, Section&nbsp;2.07). The registered owners of all\noutstanding Senior
        Debt Securities may waive any past event of default and its consequences.
        (Guarantee Agreement, Section&nbsp;2.06). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Guarantee Trustee, the Indenture Trustee and the registered owners of Senior
        Debt Securities covered by the Guarantee Agreement have all\nof the rights
        and remedies available under applicable law and may sue to enforce the terms
        of the Guarantee Agreement and to recover damages for the breach of the Guarantee
        Agreement. The remedies of each of the Guarantee Trustee, the Indenture\nTrustee
        and the registered owners of Senior Debt Securities covered by the Guarantee
        Agreement, to the extent permitted by law, are cumulative and in addition
        to any other remedy now or hereafter existing at law or in equity. At the
        option of any of\nthe Guarantee Trustee, the Indenture Trustee or the registered
        owners of Senior Debt Securities covered by the Guarantee Agreement, that
        person or entity may join NEE in any lawsuit commenced by that person or entity
        against NEE Capital with respect\nto any obligations under the Guarantee Agreement.
        Also, that person or entity may recover against NEE in that lawsuit, or in
        any independent lawsuit against NEE, without first asserting, prosecuting
        or exhausting any remedy or claim against NEE\nCapital. (Guarantee Agreement,
        Section&nbsp;5.06). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE is required to deliver to
        the Guarantee Trustee an annual statement as to its\ncompliance with all conditions
        under the Guarantee Agreement. (Guarantee Agreement, Section&nbsp;2.04). </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Modification.</B> NEE and the\nGuarantee
        Trustee may, without the consent of any registered owner of Senior Debt Securities
        covered by the Guarantee Agreement, agree to any changes to the Guarantee
        Agreement that do not materially adversely affect the rights of registered
        owners.\nThe Guarantee Agreement also may be amended with the prior approval
        of the registered owners of a majority in aggregate principal amount of all
        outstanding Senior Debt Securities covered by the Guarantee Agreement. However,
        the right of any\nregistered owner of Senior Debt Securities covered by the
        Guarantee Agreement to receive payment under the Guarantee Agreement on the
        due date of the Senior Debt Securities held by that registered owner, or to
        institute suit for the enforcement of\nthat payment on or after that due date,
        may not be impaired or affected without the consent of that registered owner.
        (Guarantee Agreement, Section&nbsp;6.01). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Termination
        of the Guarantee Agreement.</B> The Guarantee Agreement will terminate and
        be of no further force and effect upon full payment\nof all Senior Debt Securities
        covered by the Guarantee Agreement. (Guarantee Agreement, Section&nbsp;5.05).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Governing Law.</B> The\nGuarantee Agreement
        will be governed by and construed in accordance with the laws of the State
        of New York, without regard to conflict of laws principles thereunder, except
        to the extent that the law of any other jurisdiction is mandatorily\napplicable.
        (Guarantee Agreement, Section&nbsp;5.07). </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">30 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_23\"></A>DESCRIPTION
        OF NEE CAPITAL SUBORDINATED DEBT SECURITIES </B></P>\n<P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>AND
        NEE SUBORDINATED GUARANTEE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE Capital
        may issue its subordinated debt securities (other than the NEE Capital Junior
        Subordinated Debentures (as defined above under\n&#8220;Description of NEE
        Capital Junior Subordinated Debentures and NEE Junior Subordinated Guarantee&#8221;)),
        in one or more series, under one or more indentures between NEE Capital and
        The Bank of New York Mellon, as trustee. The terms of any\noffered subordinated
        debt securities, including NEE&#8217;s guarantee of NEE Capital&#8217;s payment
        obligations under such subordinated debt securities, and the applicable indenture
        will be described in a prospectus supplement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">31 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_24\"></A>DESCRIPTION
        OF NEE CAPITAL </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>JUNIOR SUBORDINATED DEBENTURES
        AND </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>NEE JUNIOR SUBORDINATED
        GUARANTEE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>General.</B> NEE Capital
        may issue its junior subordinated debentures in one or more series, under
        an Indenture, dated as of\nSeptember&nbsp;1, 2006, among NEE Capital, NEE
        and The Bank of New York Mellon, as trustee, or another subordinated indenture
        among NEE Capital, NEE and The Bank of New York Mellon as specified in the
        related prospectus supplement. The indenture or\nindentures pursuant to which
        NEE Capital Junior Subordinated Debentures may be issued, as they may be amended
        and supplemented from time to time, are referred to in this prospectus as
        the &#8220;NEE Capital Junior Subordinated Indenture.&#8221; The\nBank of
        New York Mellon, as trustee under the NEE Capital Junior Subordinated Indenture,
        is referred to in this prospectus as the &#8220;Junior Subordinated Indenture
        Trustee.&#8221; The junior subordinated debentures of NEE Capital offered
        pursuant\nto this prospectus and any applicable prospectus supplement are
        referred to as the &#8220;NEE Capital Junior Subordinated Debentures.&#8221;
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The NEE Capital Junior Subordinated Indenture
        provides for the issuance from time to time of subordinated debt in an unlimited
        amount. The NEE\nCapital Junior Subordinated Debentures and all other subordinated
        debt issued previously or hereafter under the NEE Capital Junior Subordinated
        Indenture are collectively referred to in this prospectus as the &#8220;NEE
        Capital Junior Subordinated\nIndenture Securities.&#8221; </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        section briefly summarizes some of the terms of the NEE Capital Junior Subordinated
        Debentures,\nNEE&#8217;s junior subordinated guarantee of the NEE Capital
        Junior Subordinated Debentures (the &#8220;Junior Subordinated Guarantee&#8221;),
        and some of the provisions of the NEE Capital Junior Subordinated Indenture.
        This summary does not contain\na complete description of the NEE Capital Junior
        Subordinated Debentures, the Junior Subordinated Guarantee or the NEE Capital
        Junior Subordinated Indenture. You should read this summary together with
        the NEE Capital Junior Subordinated Indenture\nand the officer&#8217;s certificates
        or other documents creating the NEE Capital Junior Subordinated Debentures
        and the Junior Subordinated Guarantee for a complete understanding of all
        the provisions and for the definitions of some terms used in\nthis summary.
        The NEE Capital Junior Subordinated Indenture which includes the Junior Subordinated
        Guarantee, the form of officer&#8217;s certificate that may be used to create
        a series of NEE Capital Junior Subordinated Debentures and a form of the\nNEE
        Capital Junior Subordinated Debentures have previously been filed with the
        SEC, and are exhibits to the registration statement filed with the SEC of
        which this prospectus is a part. In addition, each NEE Capital Junior Subordinated
        Indenture is\nor will be qualified under the Trust&nbsp;Indenture Act of 1939
        and therefore subject to the provisions of the Trust&nbsp;Indenture Act of
        1939. You should read the Trust&nbsp;Indenture Act of 1939 for a complete
        understanding of its provisions.\n</P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">All NEE Capital
        Junior Subordinated Debentures of one series need not be issued at the same
        time, and a series may be <FONT\nSTYLE=\"white-space:nowrap\">re-opened</FONT>
        for issuances of additional NEE Capital Junior Subordinated Debentures of
        such series. This means that NEE Capital may from time to time, without notice
        to, or the consent of any existing holders of the <FONT\nSTYLE=\"white-space:nowrap\">previously-issued</FONT>
        NEE Capital Junior Subordinated Debentures of a particular series, create
        and issue additional NEE Capital Junior Subordinated Debentures of such series.
        Such additional NEE Capital Junior\nSubordinated Debentures will have the
        same terms as the <FONT STYLE=\"white-space:nowrap\">previously-issued</FONT>
        NEE Capital Junior Subordinated Debentures of such series in all respects
        except for the issue date and, if applicable, the initial\ninterest payment
        date. The additional NEE Capital Junior Subordinated Debentures will be consolidated
        and form a single series with the <FONT STYLE=\"white-space:nowrap\">previously-issued</FONT>
        NEE Capital Junior Subordinated Debentures of such\nseries. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        NEE Capital Junior Subordinated Debentures will be unsecured, subordinated
        obligations of NEE Capital which rank junior to\nall of NEE Capital&#8217;s
        Senior Indebtedness. The term &#8220;Senior Indebtedness&#8221; with respect
        to NEE Capital will be defined in the related prospectus supplement. All NEE
        Capital Junior Subordinated Debentures issued under a particular NEE\nCapital
        Junior Subordinated Indenture will rank equally and ratably with all other
        NEE Capital Junior Subordinated Debentures issued under that NEE Capital Junior
        Subordinated Indenture, except to the extent that NEE Capital elects to provide\nsecurity
        with respect to any series </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">32 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
