        New Roman; \" ALIGN=\"left\">certain events of bankruptcy, insolvency or reorganization
        of NEE Capital or NEE, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(5)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">with certain exceptions, the Junior Subordinated
        Guarantee ceases to be effective, is found by a judicial\nproceeding to be
        unenforceable or invalid or is denied or disaffirmed by NEE, or </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(6)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other event of default specified with respect
        to the NEE Capital Junior Subordinated Indenture Securities\nof that series.
        (NEE Capital Junior Subordinated Indenture, Section&nbsp;801). </P></TD></TR></TABLE>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">40 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In the case of an event of default
        listed in item (3)&nbsp;above, the Junior Subordinated\nIndenture Trustee
        may extend the grace period. In addition, if registered owners of a particular
        series have given a notice of default, then registered owners of at least
        the same percentage of NEE Capital Junior Subordinated Debentures of that\nseries,
        together with the Junior Subordinated Indenture Trustee, may also extend the
        grace period. The grace period will be automatically extended if NEE Capital
        or NEE has initiated and is diligently pursuing corrective action in good
        faith. (NEE\nCapital Junior Subordinated Indenture, Section&nbsp;801). An
        event of default with respect to the NEE Capital Junior Subordinated Indenture
        Securities of a particular series will not necessarily constitute an event
        of default with respect to NEE\nCapital Junior Subordinated Indenture Securities
        of any other series issued under the NEE Capital Junior Subordinated Indenture.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Remedies.</B> If an event of default applicable
        to the NEE Capital Junior Subordinated Indenture Securities of one or more
        series, but not\napplicable to all outstanding NEE Capital Junior Subordinated
        Indenture Securities, exists, then either (i)&nbsp;the Junior Subordinated
        Indenture Trustee or (ii)&nbsp;the registered owners of at least 33% in aggregate
        principal amount of the NEE\nCapital Junior Subordinated Indenture Securities
        of each of the affected series may declare the principal of and accrued but
        unpaid interest on all the NEE Capital Junior Subordinated Indenture Securities
        of that series to be due and payable\nimmediately. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;802). However, under the Indenture, some NEE Capital
        Junior Subordinated Indenture Securities may provide for a specified amount
        less than their entire principal amount to be due\nand payable upon that declaration.
        Such a NEE Capital Junior Subordinated Indenture Security is defined as a
        &#8220;Discount Security&#8221; in the Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">A
        majority of the currently outstanding series of NEE Capital Junior Subordinated
        Indenture Securities contain an exception to the right to\naccelerate payment
        of the principal of and accrued but unpaid interest on NEE Capital Junior
        Subordinated Indenture Securities of those series for an event of default
        listed in item (3)&nbsp;under &#8220;Events of Default&#8221; above. With
        respect\nto such NEE Capital Junior Subordinated Indenture Securities, if
        an event of default listed in item (3)&nbsp;under &#8220;Events of Default&#8221;
        above exists, the registered owners of the NEE Capital Junior Subordinated
        Indenture Securities of\nsuch series will not be entitled to vote to make
        a declaration of acceleration (and these NEE Capital Junior Subordinated Indenture
        Securities will not be considered outstanding for the purpose of determining
        whether the required vote, described\nabove, has been obtained), and the Junior
        Subordinated Indenture Trustee will not have a right to make such declaration
        with respect to these NEE Capital Junior Subordinated Indenture Securities.
        Unless otherwise provided in the related prospectus\nsupplement, the terms
        of the NEE Capital Junior Subordinated Indenture Securities issued in the
        future will contain this exception. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If an\nevent
        of default is applicable to all outstanding NEE Capital Junior Subordinated
        Indenture Securities, then either (i)&nbsp;the Junior Subordinated Indenture
        Trustee or (ii)&nbsp;the registered owners of at least 33% in aggregate principal
        amount\nof all outstanding NEE Capital Junior Subordinated Indenture Securities
        of all series, voting as one class, and not the registered owners of any one
        series, may make a declaration of acceleration. However, the event of default
        giving rise to the\ndeclaration relating to any series of NEE Capital Junior
        Subordinated Indenture Securities will be automatically waived, and that declaration
        and its consequences will be automatically rescinded and annulled, if, at
        any time after that declaration\nand before a judgment or decree for payment
        of the money due has been obtained: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">NEE Capital or NEE pays or deposits with the
        Junior Subordinated Indenture Trustee a sum sufficient to pay:\n</P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(a)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">all overdue interest, if any, on all NEE Capital
        Junior Subordinated Indenture Securities of that series then\noutstanding,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(b)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the principal of and any premium on any NEE Capital
        Junior Subordinated Indenture Securities of that series\nthat have become
        due for reasons other than that declaration, and interest that is then due,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(c)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">interest on overdue interest for that series,
        and </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\">41 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">(d)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">all amounts
        then due to the Junior Subordinated Indenture Trustee under the NEE Capital
        Junior Subordinated\nIndenture, and </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">if, after application of money paid or deposited
        as described in item (1)&nbsp;above, NEE Capital Junior\nSubordinated Indenture
        Securities of that series would remain outstanding, any other event of default
        with respect to the NEE Capital Junior Subordinated Indenture Securities of
        that series has been cured or waived as provided in the NEE Capital\nJunior
        Subordinated Indenture. (NEE Capital Junior Subordinated Indenture, Section&nbsp;802).
        </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Other than its\nobligations
        and duties in case of an event of default under the NEE Capital Junior Subordinated
        Indenture, the Junior Subordinated Indenture Trustee is not obligated to exercise
        any of its rights or powers under the NEE Capital Junior Subordinated\nIndenture
        at the request or direction of any of the registered owners of the NEE Capital
        Junior Subordinated Indenture Securities, unless those registered owners offer
        reasonable indemnity to the Junior Subordinated Indenture Trustee. (NEE Capital\nJunior
        Subordinated Indenture, Section&nbsp;903). If they provide this reasonable
        indemnity, the registered owners of a majority in principal amount of any
        series of NEE Capital Junior Subordinated Indenture Securities will have the
        right to direct\nthe time, method and place of conducting any proceeding for
        any remedy available to the Junior Subordinated Indenture Trustee, or exercising
        any trust or power conferred on the Junior Subordinated Indenture Trustee,
        with respect to the NEE Capital\nJunior Subordinated Indenture Securities
        of that series. However, if an event of default under the NEE Capital Junior
        Subordinated Indenture relates to more than one series of NEE Capital Junior
        Subordinated Indenture Securities, only the registered\nowners of a majority
        in aggregate principal amount of all affected series of NEE Capital Junior
        Subordinated Indenture Securities, considered as one class, will have the
        right to make that direction. Also, the direction must not violate any law
        or\nthe NEE Capital Junior Subordinated Indenture, and may not expose the
        Junior Subordinated Indenture Trustee to personal liability in circumstances
        where the indemnity would not, in the Junior Subordinated Indenture Trustee&#8217;s
        sole discretion,\nbe adequate, and the Junior Subordinated Indenture Trustee
        may take any other action that it deems proper and not inconsistent with such
        direction. (NEE Capital Junior Subordinated Indenture, Section&nbsp;812).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">A registered owner of a NEE Capital Junior Subordinated
        Indenture Security has the right to institute a suit for the enforcement of
        payment of\nthe principal of or premium, if any, or interest on that NEE Capital
        Junior Subordinated Indenture Security on or after the applicable due date
        specified in that NEE Capital Junior Subordinated Indenture Security. (NEE
        Capital Junior Subordinated\nIndenture, Section&nbsp;808). No registered owner
        of NEE Capital Junior Subordinated Indenture Securities of any series will
        have any other right to institute any proceeding under the NEE Capital Junior
        Subordinated Indenture, or any other remedy\nunder the NEE Capital Junior
        Subordinated Indenture, unless: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">that registered owner has previously given to
        the Junior Subordinated Indenture Trustee written notice of a\ncontinuing
        event of default with respect to the NEE Capital Junior Subordinated Indenture
        Securities of that series, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the registered owners of a majority in aggregate
        principal amount of the outstanding NEE Capital Junior\nSubordinated Indenture
        Securities of all series in respect of which an event of default under the
        NEE Capital Junior Subordinated Indenture exists, considered as one class,
        have made written request to the Junior Subordinated Indenture Trustee to\ninstitute
        that proceeding in its own name as trustee, and have offered reasonable indemnity
        to the Junior Subordinated Indenture Trustee against related costs, expenses
        and liabilities, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the Junior Subordinated Indenture Trustee for
        60 days after its receipt of that notice, request and offer of\nindemnity
        has failed to institute any such proceeding, and </P></TD></TR></TABLE> <P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">no direction inconsistent with that request was
        given to the Junior Subordinated Indenture Trustee during this\n60 day period
        by the registered owners of a majority in aggregate principal amount of the
        outstanding NEE Capital Junior Subordinated Indenture Securities of all series
        in respect of which an event of default under the NEE Capital Junior\nSubordinated
        Indenture exists, considered as one class. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;807). </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">42 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each of NEE
        Capital and NEE is required to deliver to the Junior Subordinated Indenture\nTrustee
        an annual statement as to its compliance with all conditions and covenants
        applicable to it under the NEE Capital Junior Subordinated Indenture. (NEE
        Capital Junior Subordinated Indenture, Section&nbsp;606). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Modification
        and Waiver.</B> Without the consent of any registered owner of NEE Capital
        Junior Subordinated Indenture Securities, NEE\nCapital, NEE and the Junior
        Subordinated Indenture Trustee may amend or supplement the NEE Capital Junior
        Subordinated Indenture for any of the following purposes: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">to provide for the assumption by any permitted
        successor to NEE Capital or NEE of NEE Capital&#8217;s or\nNEE&#8217;s obligations
        under the NEE Capital Junior Subordinated Indenture and the NEE Capital Junior
        Subordinated Indenture Securities in the case of a merger or consolidation
        or a conveyance, transfer or lease of NEE Capital or NEE&#8217;s\nproperties
        and assets substantially as an entirety, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">to add covenants of NEE Capital or NEE or to
        surrender any right or power conferred upon NEE Capital or NEE by\nthe NEE
        Capital Junior Subordinated Indenture, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">to add any additional events of default, </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">to change, eliminate or add any provision of
        the NEE Capital Junior Subordinated Indenture, provided that if\nthat change,
        elimination or addition will materially adversely affect the interests of
        the registered owners of NEE Capital Junior Subordinated Indenture Securities
        of any series or tranche, that change, elimination or addition will become
        effective\nwith respect to that particular series or tranche only </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(a)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">when the required consent of the registered owners
        of NEE Capital Junior Subordinated Indenture Securities of\nthat particular
        series or tranche has been obtained, or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
