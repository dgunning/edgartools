        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"9%\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">\nadditions may
        not materially adversely affect the interests of the registered owners of
        NEE Capital Junior Subordinated Indenture Securities of any series or tranche.
        (NEE Capital Junior\nSubordinated Indenture, Section&nbsp;1201). </TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The registered owners of a majority in aggregate
        principal amount of the NEE\nCapital Junior Subordinated Indenture Securities
        of all series then outstanding may waive compliance by NEE Capital or NEE
        with certain restrictive provisions of the NEE Capital Junior Subordinated
        Indenture. (NEE Capital Junior Subordinated\nIndenture, Section&nbsp;607).
        The registered owners of a majority in principal amount of the outstanding
        NEE Capital Junior Subordinated Indenture Securities of any series may waive
        any past default under the NEE Capital Junior Subordinated\nIndenture with
        respect to that series, except a default in the payment of principal, premium,
        if any, or interest and a default with respect to certain restrictive covenants
        or provisions of the NEE Capital Junior Subordinated Indenture that cannot\nbe
        modified or amended without the consent of the registered owner of each outstanding
        NEE Capital Junior Subordinated Indenture Security of that series affected.
        (NEE Capital Junior Subordinated Indenture, Section&nbsp;813). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        addition to any amendments described above, if the Trust&nbsp;Indenture Act
        of 1939 is amended after the date of the NEE Capital Junior\nSubordinated
        Indenture in a way that requires changes to the NEE Capital Junior Subordinated
        Indenture or in a way that permits changes to, or the elimination of, provisions
        that were previously required by the Trust&nbsp;Indenture Act of 1939, the\nNEE
        Capital Junior Subordinated Indenture will be deemed to be amended to conform
        to that amendment of the Trust&nbsp;Indenture Act of 1939 or to make those
        changes, additions or eliminations. NEE Capital, NEE and the Junior Subordinated
        Indenture\nTrustee may, without the consent of any registered owners, enter
        into supplemental indentures to make that amendment. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;1201). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except for any
        amendments described above, the consent of the registered owners of a majority
        in aggregate principal amount of the NEE Capital\nJunior Subordinated Indenture
        Securities of all series then outstanding, considered as one class, is required
        for all other modifications to the NEE Capital Junior Subordinated Indenture.
        However, if less than all of the series of NEE Capital Junior\nSubordinated
        Indenture Securities outstanding are directly affected by a proposed supplemental
        indenture, then the consent only of the registered owners of a majority in
        aggregate principal amount of outstanding NEE Capital Junior Subordinated\nIndenture
        Securities of all directly affected series, considered as one class, is required.
        But, if NEE Capital issues any series of NEE Capital Junior Subordinated Indenture
        Securities in more than one tranche and if the proposed supplemental\nindenture
        directly affects the rights of the registered owners of NEE Capital Junior
        Subordinated Indenture Securities of less than all of those tranches, then
        the consent only of the registered owners of a majority in aggregate principal
        amount of\nthe outstanding NEE Capital Junior Subordinated Indenture Securities
        of all directly affected tranches, considered as one class, will be required.
        However, none of those amendments or modifications may: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">change the dates on which the principal of or
        interest (except as described above under &#8220;&#8212;Option to\nDefer Interest
        Payments&#8221;) on a NEE Capital Junior Subordinated Indenture Security is
        due without the consent of the registered owner of that NEE Capital Junior
        Subordinated Indenture Security, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">reduce any NEE Capital Junior Subordinated Indenture
        Security&#8217;s principal amount or rate of interest (or\nthe amount of any
        installment of that interest) or change the method of calculating that rate
        without the consent of the registered owner of that NEE Capital Junior Subordinated
        Indenture Security, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">reduce any premium payable upon the redemption
        of a NEE Capital Junior Subordinated Indenture Security without\nthe consent
        of the registered owner of that NEE Capital Junior Subordinated Indenture
        Security, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">change the currency (or other property) in which
        a NEE Capital Junior Subordinated Indenture Security is\npayable without the
        consent of the registered owner of that NEE Capital Junior Subordinated Indenture
        Security, </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">44 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\" VALIGN=\"top\" ALIGN=\"left\">(5)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">impair the
        right to sue to enforce payments on any NEE Capital Junior Subordinated Indenture
        Security on or\nafter the date that it states that the payment is due (or,
        in the case of redemption, on or after the redemption date) without the consent
        of the registered owner of that NEE Capital Junior Subordinated Indenture
        Security, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(6)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">impair the right to receive payments under the
        Junior Subordinated Guarantee or to institute suit for\nenforcement of any
        such payment under the Junior Subordinated Guarantee, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(7)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">reduce the percentage in principal amount of
        the outstanding NEE Capital Junior Subordinated Indenture\nSecurities of any
        series or tranche whose owners must consent to an amendment, supplement or
        waiver without the consent of the registered owner of each outstanding NEE
        Capital Junior Subordinated Indenture Security of that particular series or\ntranche,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(8)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">reduce the requirements for quorum or voting
        of any series or tranche without the consent of the registered\nowner of each
        outstanding NEE Capital Junior Subordinated Indenture Security of that particular
        series or tranche, or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(9)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">modify certain of the provisions of the NEE Capital
        Junior Subordinated Indenture relating to supplemental\nindentures, waivers
        of certain covenants and waivers of past defaults with respect to the NEE
        Capital Junior Subordinated Indenture Securities of any series or tranche,
        without the consent of the registered owner of each outstanding NEE Capital\nJunior
        Subordinated Indenture Security affected by the modification. </P></TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">A supplemental indenture that changes or\neliminates
        any provision of the NEE Capital Junior Subordinated Indenture that has expressly
        been included only for the benefit of one or more particular series or tranches
        of NEE Capital Junior Subordinated Indenture Securities, or that modifies\nthe
        rights of the registered owners of NEE Capital Junior Subordinated Indenture
        Securities of that particular series or tranche with respect to that provision,
        will not affect the rights under the NEE Capital Junior Subordinated Indenture
        of the\nregistered owners of the NEE Capital Junior Subordinated Indenture
        Securities of any other series or tranche. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;1202). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The NEE Capital
        Junior Subordinated Indenture provides that, in order to determine whether
        the registered owners of the required principal\namount of the outstanding
        NEE Capital Junior Subordinated Indenture Securities have given any request,
        demand, authorization, direction, notice, consent or waiver under the NEE
        Capital Junior Subordinated Indenture, or whether a quorum is present at\nthe
        meeting of the registered owners of NEE Capital Junior Subordinated Indenture
        Securities, NEE Capital Junior Subordinated Indenture Securities owned by
        NEE Capital, NEE or any other obligor upon the NEE Capital Junior Subordinated
        Indenture\nSecurities or any affiliate of NEE Capital, NEE or of that other
        obligor (unless NEE Capital, NEE, that affiliate or that obligor owns all
        NEE Capital Junior Subordinated Indenture Securities outstanding under the
        NEE Capital Junior Subordinated\nIndenture, determined without regard to this
        provision), will be disregarded and deemed not to be outstanding. (NEE Capital
        Junior Subordinated Indenture, Section&nbsp;101). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        NEE Capital or NEE solicits any action under the NEE Capital Junior Subordinated
        Indenture from registered owners of NEE Capital Junior\nSubordinated Indenture
        Securities, each of NEE Capital or NEE may, at its option, fix in advance
        a record date for determining the registered owners of NEE Capital Junior
        Subordinated Indenture Securities entitled to take that action, but neither\nNEE
        Capital nor NEE will be obligated to do so. If NEE Capital or NEE fixes such
        a record date, that action may be taken before or after that record date,
        but only the registered owners of record at the close of business on that
        record date will be\ndeemed to be registered owners of NEE Capital Junior
        Subordinated Indenture Securities for the purposes of determining whether
        registered owners of the required proportion of the outstanding NEE Capital
        Junior Subordinated Indenture Securities have\nauthorized that action. For
        these purposes, the outstanding NEE Capital Junior Subordinated Indenture
        Securities will be computed as of the record date. Any action of a registered
