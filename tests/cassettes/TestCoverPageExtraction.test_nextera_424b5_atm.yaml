        income tax or other considerations applicable to any NEE Capital Junior Subordinated
        Debentures that are denominated in a currency other than U.S. dollars may
        be discussed in the related prospectus supplement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">34 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except as otherwise
        stated in the related prospectus supplement, the covenants in the NEE\nCapital
        Junior Subordinated Indenture would not give registered owners of NEE Capital
        Junior Subordinated Debentures protection in the event of a <FONT STYLE=\"white-space:nowrap\">highly-leveraged</FONT>
        transaction involving NEE Capital or NEE. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Subordination.</B>
        The NEE Capital Junior Subordinated Debentures will be subordinate and junior
        in right of payment to all Senior\nIndebtedness of NEE Capital. (NEE Capital
        Junior Subordinated Indenture, Article Fifteen). No payment of the principal
        (including redemption and sinking fund payments) of, or interest, or premium,
        if any, on the NEE Capital Junior Subordinated\nDebentures may be made by
        NEE Capital, until all holders of Senior Indebtedness of NEE Capital have
        been paid in full (or provision has been made for such payment), if any of
        the following occurs: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">certain events of bankruptcy, insolvency or reorganization
        of NEE Capital, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any Senior Indebtedness of NEE Capital is not
        paid when due (after the expiration of any applicable grace\nperiod) and that
        default continues without waiver, or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other default has occurred and continues
        without waiver (after the expiration of any applicable grace\nperiod) pursuant
        to which the holders of Senior Indebtedness of NEE Capital are permitted to
        accelerate the maturity of such Senior Indebtedness. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;1502). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        any distribution of assets of NEE Capital to creditors in connection with
        any insolvency, bankruptcy or similar proceeding, all principal\nof, and premium,
        if any, and interest due or to become due on all Senior Indebtedness of NEE
        Capital must be paid in full before the holders of the NEE Capital Junior
        Subordinated Debentures are entitled to receive or retain any payment from
        such\ndistribution. (NEE Capital Junior Subordinated Indenture, Section&nbsp;1502).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">While NEE Capital is a holding company that
        derives\nsubstantially all of its income from its operating subsidiaries,
        NEE Capital&#8217;s subsidiaries are separate and distinct legal entities
        and have no obligation to make any payments on the NEE Capital Junior Subordinated
        Indenture Securities or to\nmake any funds available for such payment. Therefore,
        NEE Capital Junior Subordinated Indenture Securities will effectively be subordinated
        to all indebtedness and other liabilities, including trade payables, debt
        and preferred stock, incurred or\nissued by NEE Capital&#8217;s subsidiaries.
        In addition to trade liabilities, many of NEE Capital&#8217;s operating subsidiaries
        incur debt in order to finance their business activities. All of this indebtedness
        will effectively be senior to the NEE\nCapital Junior Subordinated Indenture
        Securities. The NEE Capital Junior Subordinated Indenture does not place any
        limit on the amount of liabilities, including debt or preferred stock, that
        NEE Capital&#8217;s subsidiaries may issue, guarantee or\nincur. See &#8220;Description
        of NEE Common Stock&#8212;Common Stock Terms&#8212;Dividend Rights&#8221;
        for a description of contractual restrictions on the dividend-paying ability
        of NEE Capital. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Junior Subordinated Guarantee
        of NEE Capital Junior Subordinated Debentures.</B> Pursuant to the Junior
        Subordinated Guarantee, NEE will\nabsolutely, irrevocably and unconditionally
        guarantee the payment of principal of and any interest and premium, if any,
        on the NEE Capital Junior Subordinated Debentures, when due and payable, whether
        at the stated maturity date, by declaration of\nacceleration, call for redemption
        or otherwise, in accordance with the terms of such NEE Capital Junior Subordinated
        Debentures and the NEE Capital Junior Subordinated Indenture. The Junior Subordinated
        Guarantee will remain in effect until the\nentire principal of and any premium,
        if any, and interest on the NEE Capital Junior Subordinated Debentures has
        been paid in full or otherwise discharged in accordance with the provisions
        of the NEE Capital Junior Subordinated Indenture. (NEE\nCapital Junior Subordinated
        Indenture, Article Fourteen). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Junior Subordinated
        Guarantee will be subordinate and junior in right of\npayment to all Senior
        Indebtedness of NEE. (NEE Capital Junior Subordinated Indenture, Section&nbsp;1402).
        The term &#8220;Senior Indebtedness&#8221; with respect to NEE will be defined
        in the related prospectus supplement. No payment of the\nprincipal (including
        redemption and sinking fund payments) of, or interest, or premium, if any,
        on, the NEE </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">35 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nCapital Junior Subordinated Debentures may
        be made by NEE under the Junior Subordinated Guarantee until all holders of
        Senior Indebtedness of NEE have been paid in full (or provision has been\nmade
        for such payment), if any of the following occurs: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">certain events of bankruptcy, insolvency or reorganization
        of NEE, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any Senior Indebtedness of NEE is not paid when
        due (after the expiration of any applicable grace period) and\nthat default
        continues without waiver, or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other default has occurred and continues
        without waiver (after the expiration of any applicable grace\nperiod) pursuant
        to which the holders of Senior Indebtedness of NEE are permitted to accelerate
        the maturity of such Senior Indebtedness. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;1403). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        any distribution of assets of NEE to creditors in connection with any insolvency,
        bankruptcy or similar proceeding, all principal of, and\npremium, if any,
        and interest due or to become due on all Senior Indebtedness of NEE must be
        paid in full before the holders of the NEE Capital Junior Subordinated Debentures
        are entitled to receive or retain any payment from such distribution. (NEE\nCapital
        Junior Subordinated Indenture, Section&nbsp;1403). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">While
        NEE is a holding company that derives substantially all of its income\nfrom
        its operating subsidiaries, NEE&#8217;s subsidiaries are separate and distinct
        legal entities and have no obligation to make any payments under the Junior
        Subordinated Guarantee or to make any funds available for such payment. Therefore,
        the\nJunior Subordinated Guarantee will effectively be subordinated to all
        indebtedness and other liabilities, including trade payables, debt and preferred
        stock, incurred or issued by NEE&#8217;s subsidiaries. In addition to trade
        liabilities, many of\nNEE&#8217;s operating subsidiaries incur debt in order
        to finance their business activities. All of this indebtedness will effectively
        be senior to the Junior Subordinated Guarantee. The NEE Capital Junior Subordinated
        Indenture does not place any\nlimit on the amount of liabilities, including
        debt or preferred stock, that NEE&#8217;s subsidiaries may issue, guarantee
        or incur. See &#8220;Description of NEE Common Stock&#8212;Common Stock Terms&#8212;Dividend
        Rights&#8221; for a description of\ncontractual restrictions on the dividend-paying
        ability of some of NEE&#8217;s subsidiaries. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Payment
        and Paying Agents.</B> Except as\nstated in the related prospectus supplement,
        on each interest payment date NEE Capital will pay interest on each NEE Capital
        Junior Subordinated Debenture to the person in whose name that NEE Capital
        Junior Subordinated Debenture is registered as of\nthe close of business on
        the record date relating to that interest payment date. However, on the date
        that the NEE Capital Junior Subordinated Debentures mature, NEE Capital will
        pay the interest to the person to whom it pays the principal. Also, if\nNEE
        Capital has defaulted in the payment of interest on any NEE Capital Junior
        Subordinated Debenture, it may pay that defaulted interest to the registered
        owner of that NEE Capital Junior Subordinated Debenture: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">as of the close of business on a date that the
        Junior Subordinated Indenture Trustee selects, which may not be\nmore than
        15 days or less than 10 days before the date that NEE Capital, or NEE, as
        the case may be, proposes to pay the defaulted interest, or </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">in any other lawful manner that does not violate
        the requirements of any securities exchange on which that NEE\nCapital Junior
        Subordinated Debenture is listed and that the Junior Subordinated Indenture
        Trustee believes is practicable. (NEE Capital Junior Subordinated Indenture,
        Section&nbsp;307). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless otherwise
        stated in the related prospectus supplement, the principal, premium, if any,
        and interest on the NEE Capital Junior\nSubordinated Debentures at maturity
        will be payable when such NEE Capital Junior Subordinated Debentures are presented
        at the main corporate trust office of The Bank of New York Mellon, as paying
        agent, in New York City. NEE Capital and NEE may\nchange the place of payment
        on the NEE Capital Junior Subordinated Debentures, appoint one or more additional
        paying agents, including NEE Capital, and remove any paying agent. (NEE Capital
        Junior Subordinated Indenture, Section&nbsp;602). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Transfer
        and Exchange.</B> Unless otherwise stated in the related prospectus supplement,
        NEE Capital Junior Subordinated Debentures may be\ntransferred or exchanged
        at the main corporate trust office of The Bank of New </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">36 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nYork Mellon, as security registrar,
        in New York City. NEE Capital may change the place for transfer and exchange
        of the NEE Capital Junior Subordinated Debentures and may designate one or
        more\nadditional places for that transfer and exchange. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        as otherwise stated in the related prospectus supplement, there will be no\nservice
        charge for any transfer or exchange of the NEE Capital Junior Subordinated
        Debentures. However, NEE Capital may require payment of any tax or other governmental
        charge in connection with any transfer or exchange of the NEE Capital Junior\nSubordinated
        Debentures. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE Capital will not be required
        to transfer or exchange any NEE Capital Junior Subordinated Debenture selected\nfor
        redemption. Also, NEE Capital will not be required to transfer or exchange
        any NEE Capital Junior Subordinated Debenture during a period of 15 days before
        notice is to be given identifying the NEE Capital Junior Subordinated Debentures
        selected\nto be redeemed. (NEE Capital Junior Subordinated Indenture, Section&nbsp;305).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
