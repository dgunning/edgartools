        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE Capital
        may sell NEE Capital Junior Subordinated Debentures at a discount below their
        principal amount. Some of the important United\nStates federal income tax
        considerations applicable to NEE Capital Junior Subordinated Debentures sold
        at a discount below their principal amount may be discussed in the related
