        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(5)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other event of default specified with respect
        to the Senior Debt Securities of that series. (Indenture,\nSection&nbsp;801).
        </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In the case of an event of default
        listed in item (3)&nbsp;above, the Indenture Trustee may extend\nthe grace
        period. In addition, if registered owners of a particular series have given
        a notice of default, then registered owners of at least the same percentage
        of Senior Debt Securities of that series, together with the Indenture Trustee,
        may also\nextend the grace period. The grace period will be automatically
        extended if NEE Capital has initiated and is diligently pursuing corrective
        action. (Indenture, Section&nbsp;801). An event of default with respect to
        the Senior Debt Securities of a\nparticular series will not necessarily constitute
        an event of default with respect to Senior Debt Securities of any other series
        issued under the Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Remedies.</B>
        If an event of default applicable to the Senior Debt Securities of one or
        more series, but not applicable to all outstanding\nSenior Debt Securities,
        exists, then either (i)&nbsp;the Indenture Trustee or (ii)&nbsp;the registered
        owners of at least 33% in aggregate principal amount of the Senior Debt Securities
        of each of the affected series may declare the principal of and\naccrued but
        unpaid interest on all the Senior Debt Securities of that series to be due
        and payable immediately. (Indenture, Section&nbsp;802). However, under the
        Indenture, some Senior Debt Securities may provide for a specified amount
        less than\ntheir entire principal amount to be due and payable upon that declaration.
        Such a Senior Debt Security is defined as a &#8220;Discount Security&#8221;
        in the Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If an event of default is applicable
        to all outstanding Senior Debt Securities, then either (i)&nbsp;the Indenture
        Trustee or (ii)&nbsp;the\nregistered owners of at least 33% in aggregate principal
        amount of all outstanding Senior Debt Securities of all series, voting as
        one class, and not the registered owners of any one series, may make a declaration
        of acceleration. However, the event\nof default giving rise to the declaration
        relating to any series of Senior Debt Securities will be automatically waived,
        and that declaration and its consequences will be automatically rescinded
        and annulled, if, at any time after that declaration\nand before a judgment
        or decree for payment of the money due has been obtained: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">NEE Capital pays or deposits with the Indenture
        Trustee a sum sufficient to pay: </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(a)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">all overdue interest on all Senior Debt Securities
        of that series, </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">24 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"9%\">&nbsp;</TD>\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">(b)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">the principal
        of and any premium on any Senior Debt Securities of that series that have
        become due for reasons\nother than that declaration, and interest that is
