        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">direct obligations of, or obligations unconditionally
        guaranteed by, the United States and entitled to the\nbenefit of its full
        faith and credit that do not contain provisions permitting their redemption
        or other prepayment at the option of their issuer, and </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
