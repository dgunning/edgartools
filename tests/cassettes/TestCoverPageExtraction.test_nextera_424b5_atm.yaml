        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">As
        of January&nbsp;31, 2024, there were 2,052,429,154 shares of common stock
        and no shares of preferred stock outstanding. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Common
        Stock Terms </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B><I>Voting Rights.\n</I></B>In
        general, each holder of common stock is entitled to one vote for each share
        held by such holder on all matters submitted to a vote of holders of common
        stock, including the election of directors. Each holder of common stock is
        entitled to\nattend all special and annual meetings of NEE&#8217;s shareholders.
        The holders of common stock do not have cumulative voting rights. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In\ngeneral, if a quorum exists at a meeting
        of NEE&#8217;s shareholders, unless a greater or different vote is required
        by the Florida Act, NEE&#8217;s Charter or NEE&#8217;s Bylaws, or by action
        of the board of directors, (1)&nbsp;on all matters other\nthan the election
        of directors, action on such matters will be approved if the votes cast favoring
        the action exceed the votes cast opposing the action, (2)&nbsp;in an uncontested
        director election, a nominee for director will be elected if the\nvotes cast
        for the nominee&#8217;s election exceed the votes cast against the nominee&#8217;s
        election, and (3)&nbsp;in a contested director election, which is an election
        in which the number of persons considered for election to the board of\ndirectors
        exceeds the total number of directors to be elected, a nominee for director
        will be elected by a plurality of the votes cast. Other voting rights of shareholders
        are described below under &#8220;&#8212;Anti-Takeover Effects of Provisions\nin
        NEE&#8217;s Charter and NEE&#8217;s Bylaws.&#8221; </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B><I>Dividend
        Rights. </I></B>The holders of common stock are entitled to\nparticipate on
        an equal per share basis in any dividends declared on the common stock by
        NEE&#8217;s board of directors out of funds legally available for dividend
        payments. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The declaration and payment
        of dividends on the common stock is within the sole discretion of NEE&#8217;s
        board of directors. NEE&#8217;s\nCharter does not limit the dividends that
        may be paid on the common stock. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The ability
        of NEE to pay dividends on the common stock is\ncurrently subject to, and
        in the future may be limited by: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
