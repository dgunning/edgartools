        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nsecurities or guarantees then
        outstanding on a pro rata basis in proportion to the full payment to which
        each series of such securities or guarantees is then entitled if paid in full.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Unless otherwise provided in the related prospectus
        supplement, (i)&nbsp;before an optional deferral period ends, NEE Capital
        may further\ndefer the payment of interest and (ii)&nbsp;after any optional
        deferral period and the payment of all amounts then due, NEE Capital may select
        a new optional deferral period. Unless otherwise provided in the related prospectus
        supplement, no\noptional deferral period may exceed the period of time specified
        in that prospectus supplement. No interest period may be deferred beyond the
        maturity of the NEE Capital Junior Subordinated Debentures. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Redemption.</B>
        The redemption terms of the NEE Capital Junior Subordinated Debentures, if
        any, will be set forth in a prospectus\nsupplement. Unless otherwise provided
        in the related prospectus supplement, and except with respect to NEE Capital
        Junior Subordinated Debentures redeemable at the option of the holder, NEE
        Capital Junior Subordinated Debentures will be redeemable\nupon notice between
        30 and 60 days prior to the redemption date. NEE Capital has reserved the
        right to amend the NEE Capital Junior Subordinated Indenture without any consent,
        vote or other action of the holders of any junior subordinated debentures\nissued
        under the NEE Capital Junior Subordinated Indenture after December&nbsp;1,
        2021, including the NEE Capital Junior Subordinated Debentures, to provide
        that notice of any redemption shall be given in the manner provided in the
        NEE Capital\nJunior Subordinated Indenture to the holders of the junior subordinated
        debentures to be redeemed not less than 10 nor more than 60 days prior to
        the redemption date. If less than all of the NEE Capital Junior Subordinated
        Debentures of any series\nor any tranche thereof are to be redeemed, the Junior
        Subordinated Indenture Trustee will select the NEE Capital Junior Subordinated
        Debentures to be redeemed. In the absence of any provision for selection,
        the Junior Subordinated Indenture Trustee\nwill choose such method of selection
        as it deems fair and appropriate. (NEE Capital Junior Subordinated Indenture,
        Sections 403 and 404). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE Capital
        Junior Subordinated Debentures selected for redemption will cease to bear
        interest on the redemption date. The paying agent will\npay the redemption
        price and any accrued interest once the NEE Capital Junior Subordinated Debentures
        are surrendered for redemption. (NEE Capital Junior Subordinated Indenture,
        Section&nbsp;405). Except as stated in the related prospectus\nsupplement,
        on the redemption date NEE Capital will pay interest on the NEE Capital Junior
        Subordinated Debentures being redeemed to the person to whom it pays the redemption
        price. If only part of a NEE Capital Junior Subordinated Debenture is\nredeemed,
        the Junior Subordinated Indenture Trustee will deliver a new NEE Capital Junior
        Subordinated Debenture of the same series for the remaining portion without
        charge. (NEE Capital Junior Subordinated Indenture, Section&nbsp;406). </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any redemption at the option of NEE Capital
        may be conditional upon the receipt by the paying agent, on or prior to the
        date fixed for\nredemption, of money sufficient to pay the redemption price.
        If at the time notice of redemption is given, the redemption moneys are not
        on deposit with the paying agent, then, if such notice so provides, the redemption
        shall be subject to the\nreceipt of the redemption moneys on or before the
        Redemption Date and such notice of redemption shall be of no force or effect
        unless such moneys are received. (Indenture, Section&nbsp;404). </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Purchase
        of the NEE Capital Junior Subordinated Debentures</B>. NEE or its affiliates,
        including NEE Capital, may at any time and from time\nto time, purchase all
        or some of the NEE Capital Junior Subordinated Debentures at any price or
        prices, whether by tender, in the open market or by private agreement or otherwise,
        subject to applicable law. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Consolidation,
        Merger, and Sale of Assets.</B> Under the NEE Capital Junior Subordinated
        Indenture, neither NEE Capital nor NEE may\nconsolidate with or merge into
        any other entity or convey, transfer or lease its properties and assets substantially
        as an entirety to any entity, unless: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
