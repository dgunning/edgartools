        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Issuer: </P></TD>\n<TD>NextEra
        Energy, Inc. </TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR VALIGN=\"TOP\">\n<TD
        WIDTH=\"38%\"> <P STYLE=\" margin-top:0pt; margin-bottom:1pt; margin-left:2%;
        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Common Stock
        offered: </P></TD>\n<TD>Shares of NEE&#8217;s common stock, having aggregate
        sales proceeds of up to $4,000,000,000. </TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR VALIGN=\"TOP\">\n<TD
        WIDTH=\"38%\"> <P STYLE=\" margin-top:0pt; margin-bottom:1pt; margin-left:2%;
        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Use of Proceeds:
        </P></TD>\n<TD>NEE will add the net proceeds from the sale of the NEE common
        stock to its general funds. NEE expects to use its general funds to fund investments
        in energy and power projects and for other general corporate purposes. See
        &#8220;Use of\nProceeds&#8221; on page <FONT STYLE=\"white-space:nowrap\">S-4</FONT>
        of this prospectus supplement. </TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR VALIGN=\"TOP\">\n<TD
        WIDTH=\"38%\"> <P STYLE=\" margin-top:0pt; margin-bottom:1pt; margin-left:2%;
        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Listing: </P></TD>\n<TD>NEE&#8217;s
        common stock is listed on the New York Stock Exchange under the symbol &#8220;NEE.&#8221;
        </TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
