        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">require the
        affirmative vote of holders of at least a majority of the voting power of
        the outstanding shares of\nvoting stock, voting together as a single class,
        to alter, amend or repeal specified provisions of NEE&#8217;s Charter, including
        the foregoing provisions. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        NEE Bylaws contain some of the foregoing provisions contained in the Charter.
        In addition, the Bylaws contain provisions that limit to 16\ndirectors the
        maximum number of authorized directors of NEE, provide the board of directors
        with the ability to increase or decrease the size of the board without shareholder
        approval, provided that the number of directors cannot be less than three\nnor
        more than 16, and that establish advance notice requirements for shareholders
        to nominate candidates for election as directors at any annual or special
        meeting of shareholders or to present any other business for consideration
        at an annual\nmeeting. See &#8220;Description of NEE Common Stock&#8212;Anti-Takeover
        Effects of Provisions in NEE&#8217;s Charter and NEE&#8217;s Bylaws&#8221;
        in the accompanying prospectus. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-3 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As a Florida
        corporation, NEE is subject to the Florida Act, which provides that an\naffiliated
        transaction with an interested shareholder generally must be approved by the
        affirmative vote of the holders of <FONT STYLE=\"white-space:nowrap\">two-thirds</FONT>
        of NEE&#8217;s voting shares, other than the shares beneficially owned by\nthe
        interested shareholder. The Florida Act also contains a <FONT STYLE=\"white-space:nowrap\">control-share</FONT>
        acquisition statute which provides that a person who acquires shares in an
        &#8220;issuing public corporation,&#8221; as defined in the\nstatute, in excess
        of certain specified thresholds generally will not have any voting rights
        with respect to such shares unless such voting rights are approved by the
        holders of a majority of the votes of each class of securities entitled to
        vote\nseparately, excluding shares held or controlled by the acquiring person.
        See &#8220;Description of NEE Common Stock&#8212;Restrictions on Affiliated
        and Control Share Transactions Under Florida Act&#8221; in the accompanying
        prospectus. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Charter authorizes NEE&#8217;s
        board of directors from time to time and without shareholder action to provide
        for the issuance of up to\n100,000,000 shares of serial preferred stock in
        one or more series, and to fix the powers, preferences and rights of each
        such series. The rights and privileges of holders of NEE common stock may
        be adversely affected by the powers, preferences and\nrights of holders of
        any series of preferred stock which the NEE board of directors may authorize
        for issuance from time to time. By authorizing the issuance of shares of preferred
        stock with particular voting, conversion or other rights and\npreferences,
        the board of directors could adversely affect the voting power of the holders
        of NEE common stock and could discourage unsolicited acquisition proposals
        or make it more difficult for a third party to gain control of NEE or otherwise\ncould
        adversely affect the market price of NEE common stock. </P> <P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A
        NAME=\"supptoc85786_3\"></A>USE OF PROCEEDS </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        information in this section supplements the information in the &#8220;Use
        of Proceeds&#8221; section on page&nbsp;3 of the accompanying\nprospectus.
        Please read these two sections together. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE
        will add the net proceeds from the sale of the NEE common stock to its general\nfunds.
        NEE expects to use its general funds to fund investments in energy and power
        projects and for other general corporate purposes. NEE will temporarily invest
        in short-term instruments any proceeds that are not immediately used for these\npurposes.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">S-4 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"supptoc85786_5\"></A>PLAN
        OF DISTRIBUTION </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The information in this section
        supplements the information in the &#8220;Plan of Distribution&#8221; section
        beginning on page&nbsp;48 of the\naccompanying prospectus. Please read these
        two sections together. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE has entered
        into the equity distribution agreement with each of the\nsales agents under
        which NEE may issue and sell up to $4,000,000,000 in the aggregate of shares
        of its common stock from time to time through the sales agents acting as sales
        agents or directly to the sales agents acting as principals for the offer\nand
        sale of shares of NEE common stock. If NEE sells shares of its common stock
        to a sales agent as principal, then NEE will enter into a separate terms agreement
        with that sales agent setting forth the terms of such transaction. In no event
        will\nthe aggregate number of shares of NEE common stock sold through the
        sales agents, each as an agent for NEE, and as principal, under the equity
        distribution agreement have an aggregate sales price in excess of $4,000,000,000.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The sales, if any, of shares of NEE common stock
        under the equity distribution agreement will be made in &#8220;at the market\nofferings,&#8221;
        as defined in Rule&nbsp;415 of the Securities Act, including sales made directly
        on the New York Stock Exchange, the existing trading market for shares of
        NEE&#8217;s common stock, sales made to or through a market maker or through\nan
        electronic communications network or by such other methods, including privately
        negotiated transactions (including block transactions), as NEE and any sales
        agent agree to in writing. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In connection
        with the sale of NEE common stock as contemplated in this prospectus supplement,
        the sales agents may be deemed to be\n&#8220;underwriters&#8221; within the
        meaning of the Securities Act, and the compensation paid to the sales agents
        may be deemed to be underwriting commissions or discounts. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        a sales agent or NEE has reason to believe that the exemptive provisions set
        forth in Rule 101(c)(1) of Regulation M under the Exchange Act\nare not satisfied,
        that party will promptly notify the other and sales of common stock under
        the equity distribution agreement will be suspended until that or other exemptive
        provisions have been satisfied in the judgment of the sales agents and\nNEE.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE intends to report to the SEC at least quarterly
        (1)&nbsp;the number of shares of NEE common stock sold through the sales agents\nin
        connection with <FONT STYLE=\"white-space:nowrap\"><FONT STYLE=\"white-space:nowrap\">at-the-market</FONT></FONT>
        sales as described below under &#8220;&#8212;Sales Through Sales Agents&#8221;
        and (2)&nbsp;the net proceeds received by NEE and the\ncompensation paid by
        NEE to the sales agents in connection with transactions described in clause
        (1). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Sales of NEE common stock as\ncontemplated in
        this prospectus supplement will be settled through the facilities of The Depository
        Trust Company or by such other means as NEE and the sales agents may agree
        upon. The offering of NEE common stock pursuant to the equity distribution\nagreement
        will terminate upon the earlier of (1)&nbsp;the sale, under the equity distribution
        agreement, of shares of NEE common stock with an aggregate sales price of
        $4,000,000,000 and (2)&nbsp;the termination of the equity distribution agreement,\npursuant
        to its terms, by either all of the sales agents or NEE. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Sales
        Through Sales Agents </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">From time to
        time during the term of the equity distribution agreement, and subject to
        the terms and conditions set forth therein, NEE may\ndeliver instructions
        to any of the sales agents. Upon receipt of such instructions from NEE, and
        subject to the terms and conditions of the equity distribution agreement,
        each sales agent has agreed to use its commercially reasonable efforts\nconsistent
        with its normal trading and sales practices to sell the amount of shares of
        NEE common stock specified in NEE instructions. NEE or the relevant sales
        agent may suspend the offering of shares of NEE common stock at any time upon
        proper\nnotice to the other, upon which the selling period will immediately
        terminate. Settlement for sales of shares of NEE common stock will occur on
        the trading day following the date on which the sales were made (or such earlier
        day as in industry\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">S-5 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\npractice for <FONT STYLE=\"white-space:nowrap\">regular-way</FONT>
        trading) unless another date shall be agreed to in writing by NEE and the
        relevant sales agent. The obligation of any sales agent\nunder the equity
        distribution agreement to sell shares of NEE common stock pursuant to NEE
        instructions is subject to a number of conditions, which such sales agent
        reserves the right to waive in its sole discretion. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE
        will pay each sales agent a commission equal to up to 1% of the sales price
        of all shares of its common stock sold through it as\nNEE&#8217;s agent under
        the equity distribution agreement. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Expenses and Indemnification
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The expenses in connection with the sale of
        the NEE common stock, other than underwriting discounts, are estimated to
        be approximately\n$1.5&nbsp;million. This estimate includes expenses relating
        to printing, rating agency fees, trustees&#8217; fees and legal fees, among
        other expenses. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE has agreed to indemnify
        the several sales agents against, or to contribute to payments the sales agents
        may be required to make in respect\nof, certain liabilities, including liabilities
        under the Securities Act. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Certain Relationships </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The agents and their respective affiliates may
        engage in transactions with, and may perform services for, NEE, its subsidiaries
        and its\naffiliates in the ordinary course of business and have engaged, and
        may engage in the future, in commercial banking and/or investment banking
        transactions with NEE, its subsidiaries and its affiliates. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">S-6 </P>\n\n</DIV></Center>\n\n\n<p
