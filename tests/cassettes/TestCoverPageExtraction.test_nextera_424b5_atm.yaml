        of that principal or interest, will provide money\nthat, together with any
        money deposited with or held by the Indenture Trustee, will be sufficient
        to pay all or that portion of the principal, premium, if any, and interest
        due and to become due on those Senior Debt Securities, on or prior to their\nmaturity,
        or </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">a combination of (1)&nbsp;and (2) that will be
        sufficient to pay all or that portion of the principal, premium,\nif any,
        and interest due and to become due on those Senior Debt Securities, on or
        prior to their maturity. (Indenture, Section&nbsp;701). </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Limitation on Liens.</B> So long as any Senior
        Debt Securities remain outstanding, NEE Capital will not secure any indebtedness
        with a lien\non any shares of the capital stock of any of its <FONT STYLE=\"white-space:nowrap\">majority-owned</FONT>
        subsidiaries, which shares of capital stock NEE Capital now or hereafter directly
        owns, unless NEE Capital equally secures all Senior Debt\nSecurities. However,
        this restriction does not apply to or prevent: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any lien on capital stock created at the time
        NEE Capital acquires that capital stock, or within 270 days after\nthat time,
        to secure all or a portion of the purchase price for that capital stock, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
