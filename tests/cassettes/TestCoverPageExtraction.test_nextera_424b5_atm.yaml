        solid #000000;MARGIN-LEFT:0px; MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%;
        margin-top:1.5%; margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B><A NAME=\"supptoc85786_1\"></A>PROSPECTUS
        SUPPLEMENT SUMMARY </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>You should
        read the following summary in conjunction with the more detailed information
        incorporated by reference or provided in this\nprospectus supplement or in
        the accompanying prospectus. This prospectus supplement and the accompanying
        prospectus contain <FONT STYLE=\"white-space:nowrap\">forward-looking</FONT>
        statements (as that term is defined in the Private Securities\nLitigation
        Reform Act of 1995). <FONT STYLE=\"white-space:nowrap\">Forward-looking</FONT>
        statements should be read with the cautionary statements in the accompanying
        prospectus under the heading\n<FONT STYLE=\"white-space:nowrap\">&#8220;Forward-Looking</FONT>
        Statements&#8221; and the important factors discussed in this prospectus supplement
        and in the incorporated documents. To the extent that the information in this
        prospectus supplement is\ninconsistent with the information in the accompanying
        prospectus, you should rely on the information in this prospectus supplement.
        You should pay special attention to the &#8220;Risk Factors&#8221; section
        beginning on <FONT\nSTYLE=\"white-space:nowrap\">page&nbsp;S-3</FONT> of this
        prospectus supplement to determine whether an investment in NEE&#8217;s common
        stock is appropriate for you. </I></P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>NEE </B></P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The information in\nthis section supplements
        the information in the &#8220;NEE&#8221; section on page&nbsp;2 of the accompanying
        prospectus. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE is a holding\ncompany incorporated
        in 1984 as a Florida corporation and conducts its operations principally through
        its wholly owned subsidiaries, Florida Power&nbsp;&amp; Light Company (&#8220;FPL&#8221;)
        and, indirectly through NextEra Energy Capital Holdings,\nInc., NextEra Energy
        Resources, LLC and NextEra Energy Transmission, LLC (collectively &#8220;NEER&#8221;).
        FPL is a rate-regulated electric utility engaged primarily in the generation,
        transmission, distribution and sale of electric energy in\nFlorida. NEER currently
        owns, develops, constructs, manages and operates electric generation facilities
        in wholesale energy markets in the U.S. and Canada. NEER produces the majority
        of its energy from clean and renewable sources, including wind and\nsolar.
        In addition, NEER develops and constructs battery storage projects and also
        owns, develops, constructs and operates rate-regulated transmission facilities
        in North America, and transmission lines that connect its electric generation\nfacilities
        to the electric grid. NEER also engages in energy-related commodity marketing
        and trading activities and participates in natural gas, natural gas liquids
        and oil production and in pipeline infrastructure construction, management
        and\noperations. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE&#8217;s principal executive
        offices are located at 700 Universe Boulevard, Juno Beach, Florida 33408,
        telephone number\n(561) <FONT STYLE=\"white-space:nowrap\">694-4000,</FONT>
        and its mailing address is P.O. Box 14000, Juno Beach, Florida 33408-0420.
        </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">S-1 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
