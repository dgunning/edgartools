        WIDTH=\"38%\"> <P STYLE=\" margin-top:0pt; margin-bottom:1pt; margin-left:2%;
        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Risk Factors:
        </P></TD>\n<TD>See &#8220;Risk Factors&#8221; beginning on page <FONT STYLE=\"white-space:nowrap\">S-3</FONT>
        of this prospectus supplement. </TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR VALIGN=\"TOP\">\n<TD
        WIDTH=\"38%\"> <P STYLE=\" margin-top:0pt; margin-bottom:1pt; margin-left:2%;
        text-indent:-2%; font-size:10pt; font-family:Times New Roman\">Rights and
        privileges of NEE common stock: </P></TD>\n<TD>See the discussion of NEE common
        stock in the accompanying prospectus under the heading &#8220;Description
        of NEE Common Stock.&#8221; </TD></TR></TABLE>\n<P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>Recent
        Developments </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE,\nFPL, and certain current
        and former executives are the named defendants in a purported shareholder
        securities class action lawsuit filed in the U.S. District Court for the Southern
        District of Florida in June 2023 and amended in December 2023 that\nseeks
        from the defendants unspecified damages allegedly resulting from alleged false
        or misleading statements regarding NEE&#8217;s alleged campaign finance and
        other political activities. The alleged class of plaintiffs are all persons
        or entities\nwho purchased or otherwise acquired NEE securities between December&nbsp;2,
        2021 and January&nbsp;30, 2023. In September 2024, the class action lawsuit
        was dismissed with prejudice by the U.S. District Court for the Southern District
        of Florida.\nFollowing appeal, on November&nbsp;26, 2025, a panel of the U.S.
        Court of Appeals for the 11th Circuit reversed the dismissal and remanded
        the lawsuit for further proceedings. The defendants plan to petition the panel
        or the U.S. Court of Appeals\nfor the 11th Circuit en banc for rehearing of
        the panel&#8217;s decision and otherwise plan to continue to vigorously defend
        against the claims in this proceeding. </P>\n</div></div>\n\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
