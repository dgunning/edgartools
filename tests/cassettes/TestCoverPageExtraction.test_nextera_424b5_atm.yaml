        <BODY BGCOLOR=\"WHITE\" STYLE=\"line-height:Normal\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"right\"><B>Filed Pursuant
        to Rule 424(b)(5) <BR> Registration No. 333-278184 </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>PROSPECTUS
        SUPPLEMENT </B></P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>(To prospectus dated\nMarch&nbsp;22, 2024)
        </B></P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>
        <P STYLE=\"font-size:0pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt;margin-bottom:0pt\">\n\n\n<IMG SRC=\"g85786g01k01.jpg\"
        ALT=\"LOGO\" STYLE=\"width:1.49603in;height:0.652in;\">\n </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:24pt; font-family:Times New Roman\" ALIGN=\"center\"><B>NextEra
        Energy, Inc. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:16pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>Up to $4,000,000,000 </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:14pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>Common Stock </B></P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><center><DIV
        STYLE=\"line-height:6.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1.00pt
        solid #000000;width:21%\">&nbsp;</DIV></center>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        prospectus supplement and the accompanying prospectus relate to the offer
        and sale from time to time of shares of NextEra Energy,\nInc.&#8217;s (&#8220;NEE&#8221;)
        common stock, having an aggregate offering price of up to $4,000,000,000 through
        BNY Mellon Capital Markets, LLC (&#8220;BNY&#8221;), BofA Securities, Inc.
        (&#8220;BofA&#8221;), Capital One Securities, Inc.\n(&#8220;Capital One&#8221;),
        Credit Agricole Securities (USA) Inc. (&#8220;Credit Agricole&#8221;), J.P.
        Morgan Securities LLC (&#8220;JPM&#8221;), Mizuho Securities USA LLC (&#8220;Mizuho&#8221;),
        and Wells Fargo Securities, LLC (&#8220;Wells\nFargo&#8221;) as agents under
        an equity distribution agreement, dated December&nbsp;31, 2025 (the &#8220;equity
        distribution agreement&#8221;). BNY, BofA, Capital One, Credit Agricole, JPM,
        Mizuho and Wells Fargo are collectively referred to as the\nsales agents.
        In no event will the aggregate number of shares of NEE&#8217;s common stock
        sold through the sales agents, each as an agent for NEE and as principal,
        under the equity distribution agreement have an aggregate sales price in excess
        of\n$4,000,000,000. The offering of NEE common stock pursuant to the equity
        distribution agreement will terminate upon the earlier of (1)&nbsp;the sale,
        under the equity distribution agreement, of shares of NEE common stock with
        an aggregate sales price\nof $4,000,000,000 and (2)&nbsp;the termination of
        the equity distribution agreement, pursuant to its terms, by either all of
        the sales agents or us. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The shares of
        NEE common stock will be offered at market prices prevailing at the time of
        sale in &#8220;at the market offerings,&#8221; as\ndefined in Rule 415 of
        the Securities Act of 1933, as amended (the &#8220;Securities Act&#8221;),
        including sales made directly on the New York Stock Exchange, the existing
        trading market for shares of NEE&#8217;s common stock, sales made to or\nthrough
        a market maker or through an electronic communications network or by such
        other methods, including privately negotiated transactions (including block
        transactions), as NEE and any sales agent agree to in writing. NEE will pay
        each sales\nagent a commission equal to up to 1% of the sales price of all
        shares of NEE common stock sold through it as sales agent under the equity
        distribution agreement. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE&#8217;s
        common stock is listed on the New York Stock Exchange under the symbol &#8220;NEE&#8221;.
        The last reported sale price of\nNEE&#8217;s common stock on December&nbsp;30,
        2025 was $80.53 per share. </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><center><DIV
        STYLE=\"line-height:6.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1.00pt
        solid #000000;width:21%\">&nbsp;</DIV></center>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:12pt; font-family:Times New Roman\"><B>See
        &#8220;<A HREF=\"#supptoc85786_2\">Risk Factors</A>&#8221; beginning on <FONT
        STYLE=\"white-space:nowrap\">page&nbsp;S-3</FONT> of this\nprospectus supplement
        to read about certain factors you should consider before making an investment
        in shares of NEE&#8217;s common stock. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Neither
        the Securities and Exchange Commission nor any other securities commission
        in any jurisdiction has approved or disapproved of\nNEE&#8217;s common stock
        or determined if this prospectus supplement or the accompanying prospectus
        is truthful or complete. Any representation to the contrary is a criminal
        offense. </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><center><DIV
        STYLE=\"line-height:6.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1.00pt
