        MARGIN-RIGHT:0px;max-width:100%\"><div style=\"width:97%; margin-top:1.5%;
        margin-bottom:1.5%; margin-left:1.5%; margin-right:-1.25%\">\n\n <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>The
        Offering </B></P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
