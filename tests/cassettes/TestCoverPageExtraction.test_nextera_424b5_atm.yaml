        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_1\"></A>ABOUT
        THIS PROSPECTUS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This prospectus is part of a
        registration statement that NEE, NEE Capital, and Florida Power&nbsp;&amp;
        Light Company (&#8220;FPL&#8221;) have\nfiled with the Securities and Exchange
        Commission (&#8220;SEC&#8221;) using a &#8220;shelf&#8221; registration process.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Under this shelf\nregistration process, NEE
        and/or NEE Capital may issue and sell any combination of the securities described
        in this prospectus in one or more offerings from time to time in amounts authorized
        by the board of directors of NEE or NEE Capital, as the\ncase may be. NEE
        may offer any of the following securities: common stock, preferred stock,
        depositary shares, stock purchase contracts, stock purchase units, warrants
        to purchase common stock, preferred stock or depositary shares, senior debt\nsecurities,
        subordinated debt securities and junior subordinated debentures and guarantees
        related to the preferred stock, depositary shares, senior debt securities,
        subordinated debt securities and junior subordinated debentures that NEE Capital\nmay
        offer. NEE Capital may offer any of the following securities: preferred stock,
        depositary shares, senior debt securities, subordinated debt securities and
        junior subordinated debentures. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This prospectus
        provides you with a general description of the securities that NEE and/or
        NEE Capital may offer. Each time NEE and/or NEE\nCapital sells securities,
        NEE and/or NEE Capital will provide a prospectus supplement that will contain
        specific information about the terms of that offering. Material United States
        federal income tax considerations applicable to the offered\nsecurities will
        be discussed in the applicable prospectus supplement if necessary. The applicable
        prospectus supplement may also add, update or change information contained
        in this prospectus. You should carefully read both this prospectus and any\napplicable
        prospectus supplement together with the additional information described under
        the headings &#8220;Where You Can Find More Information&#8221; and &#8220;Incorporation
        by Reference.&#8221; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">For more detailed
        information about the securities, please read the exhibits to the registration
        statement. Those exhibits have been either\nfiled with the registration statement
        or incorporated by reference from earlier SEC filings listed in the registration
        statement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">1 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_2\"></A>RISK
        FACTORS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Before purchasing the securities,
        investors should carefully consider the risk factors described in NEE&#8217;s
        annual, quarterly and current\nreports filed with the SEC under the Securities
        Exchange Act of 1934, which are incorporated by reference into this prospectus,
        together with the other information incorporated by reference or provided
        in this prospectus or in a related prospectus\nsupplement in order to evaluate
        an investment in the securities. </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_3\"></A>NEE
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE is a holding company incorporated in 1984
        as a Florida corporation and conducts its operations principally through its
        wholly owned\nsubsidiaries, FPL and, indirectly through NEE Capital, NextEra
        Energy Resources, LLC and NextEra Energy Transmission, LLC (collectively &#8220;NEER&#8221;).
        FPL is a rate-regulated electric utility engaged primarily in the generation,
        transmission,\ndistribution and sale of electric energy in Florida. NEER currently
        owns, develops, constructs, manages and operates electric generation facilities
        in wholesale energy markets in the U.S. and Canada. NEER produces the majority
        of its electricity\nfrom clean and renewable sources, including wind and solar.
        In addition, NEER develops and constructs battery storage projects and also
        owns, develops, constructs and operates rate-regulated transmission facilities
        in North America, and transmission\nlines that connect its electric generation
        facilities to the electric grid. NEER also engages in energy-related commodity
        marketing and trading activities and participates in natural gas, natural
        gas liquids and oil production and in pipeline\ninfrastructure, construction,
