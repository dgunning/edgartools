        NEE Capital or NEE (other than NEE Capital) to place liens on any\nof their
        assets. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Redemption.</B>
        The redemption terms of the Offered Senior Debt Securities, if any, will be
        set\nforth in a prospectus supplement. Unless otherwise provided in the related
        prospectus supplement, and except with respect to Offered Senior Debt Securities
        redeemable at the option of the holder, Offered Senior Debt Securities will
        be redeemable\nupon notice between 30 and 60 days prior to the redemption
        date. NEE Capital has reserved the right to amend the Indenture without any
        consent, vote or other action of the holders of any Senior Debt Securities
        issued under the Indenture after\nDecember&nbsp;1, 2021, including the Offered
        Senior Debt Securities, to provide that notice of any redemption shall be
        given in the manner provided in the Indenture to the holders of the Senior
        Debt Securities to be redeemed not less than 10 nor\nmore than 60 days prior
        to the redemption date. If less than all of the Offered Senior Debt Securities
        of any series or any tranche thereof are to be redeemed, the Security Registrar
        will select the Offered Senior Debt Securities to be redeemed. In\nthe absence
        of any provision for selection, the Security Registrar will choose such method
        of selection as it deems fair and appropriate. (Indenture, Sections 403 and
        404). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Offered Senior Debt Securities
        selected for redemption will cease to bear interest on the redemption date.
        The paying agent will pay the\nredemption price and any accrued interest once
        the Offered Senior Debt Securities are surrendered for redemption. (Indenture,
        Section&nbsp;405). Except as stated in the related prospectus supplement,
        on the redemption date NEE Capital will pay\ninterest on the Offered Senior
        Debt Securities being redeemed to the person to whom it pays the redemption
        price. If only part of an Offered Senior Debt Security is redeemed, the Indenture
        Trustee will deliver a new Offered Senior Debt Security of\nthe same series
        for the remaining portion without charge. (Indenture, Section&nbsp;406). </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any redemption at the option of NEE Capital
        may\nbe conditional upon the receipt by the paying agent, on or prior to the
        date fixed for redemption, of money sufficient to pay the redemption price.
        If at the time notice of redemption is given, the redemption moneys are not
        on deposit with the\npaying agent, then, if such notice so provides, the redemption
        shall be subject to the receipt of the redemption moneys on or before the
        Redemption Date and such notice of redemption shall be of no force or effect
        unless such moneys are received.\n(Indenture, Section&nbsp;404). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Purchase
        of the Offered Senior Debt Securities.</B> NEE Capital or its affiliates,
