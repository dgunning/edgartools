        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">FPL is subject
        to the terms of its Mortgage and Deed of Trust dated as of January&nbsp;1,\n1944,
        with Deutsche Bank Trust Company Americas, as mortgage trustee, as amended
        and supplemented from time to time (the &#8220;FPL Mortgage&#8221;), that
        secures its obligations under outstanding first mortgage bonds issued by it
        from time to time.\nIn specified circumstances, the terms of the FPL Mortgage
        could restrict the amount of retained earnings that FPL can use to pay cash
        dividends on its common stock. As of December&nbsp;31, 2023, no retained earnings
        were restricted by these\nprovisions of the FPL Mortgage. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Other
        contractual restrictions on the <FONT STYLE=\"white-space:nowrap\">dividend-paying</FONT>
        ability of\nNEE and its subsidiaries are contained in outstanding financing
        arrangements, and similar or other restrictions may be included in future
        financing arrangements. As of the date of this prospectus, NEE has equity
        units outstanding. In accordance with\nthe terms of the equity units, NEE
        has the right, from time to time, to defer the payment of contract adjustment
        payments on the purchase contracts that form a part of the equity units to
        a date no later than the purchase contract settlement date.\nAs of the date
        of this prospectus, NEE Capital has junior subordinated debentures outstanding.
        In accordance with the terms of the junior subordinated debentures NEE Capital
        has the right, from time to time, to defer the payment of interest on its\noutstanding
        junior subordinated debentures on one or more occasions for up to ten consecutive
        years. NEE, NEE Capital and FPL may issue, from time to time, additional equity
        units, junior subordinated debentures or other securities that\n(i)&nbsp;provide
        them with rights to defer the payment of interest or other payments and (ii)&nbsp;contain
        dividend restrictions in the event of the exercise of such rights. In the
        event that NEE or NEE Capital were to exercise any right to defer\ninterest
        or other payments on currently outstanding or future series of equity units,
        junior subordinated debentures or other securities, or if there were to occur
        certain payment defaults on those securities, NEE would not be able, with
        limited\nexceptions, to pay dividends on the common stock during the periods
        in which such payments were deferred or such payment defaults continued. In
        the event that FPL was to issue equity units, junior subordinated debentures
        or other securities having\nsimilar provisions and was to exercise any such
        right to defer the payment of interest or other payments on such securities,
        or if there was to occur certain payment defaults on those securities, FPL
        would not be able, with limited exceptions, to\npay dividends to NEE or any
        other holder of its common stock or preferred stock during the periods in
        which such payments were deferred or such payment defaults continued. In addition,
        NEE, NEE Capital and FPL might issue other securities in the\nfuture containing
        similar or other restrictions on, or that affect, NEE&#8217;s ability to pay
        dividends on its common stock or preferred stock and on the ability of NEE&#8217;s
        subsidiaries, including NEE Capital and FPL, to pay dividends to any\nholder
        of their respective common stock or preferred stock, including NEE. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In addition, the right of the holders of NEE&#8217;s
        common\nstock to receive dividends might become subject to the preferential
        dividend, redemption, sinking fund or other rights of the holders of any series
        of NEE preferred stock that may be issued in the future, and the right of
        the holders (including NEE)\nof FPL or NEE Capital, as the case may be, common
        stock or preferred stock, as the case may be, to receive dividends might become
        subject to the preferential dividend, redemption, sinking fund or other rights
        of the holders of any series of FPL or\nNEE Capital, as the case may be, preferred
        stock that may be issued in the future. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B><I>Liquidation
        Rights. </I></B>If there is a\nliquidation, dissolution or winding up of NEE,
        the holders of common stock are entitled to share equally and ratably in any
        assets remaining after NEE has paid, or provided for the payment of, all of
        its debts and other liabilities, and after NEE\nhas paid, or provided for
        the payment of, any preferential amounts payable to the holders of any outstanding
        preferred stock. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B><I>Other\nRights. </I></B>The
        holders of common stock do not have any preemptive, subscription, conversion
        or sinking fund rights. The common stock is not subject to redemption. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B><FONT STYLE=\"white-space:nowrap\">Anti-Takeover</FONT> Effects
        of Provisions in NEE&#8217;s Charter and NEE&#8217;s Bylaws </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE&#8217;s
        Charter and NEE&#8217;s Bylaws contain provisions that may make it difficult
        and expensive for a third party to pursue a takeover\nattempt that NEE&#8217;s
        board of directors and management oppose even if a change in control of NEE
        might be beneficial to the interests of holders of common stock. </P>\n <p
        STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">7
        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B><I>NEE&#8217;s Charter Provisions.
        </I></B>Among NEE&#8217;s Charter provisions that\ncould have an <FONT STYLE=\"white-space:nowrap\">anti-takeover</FONT>
        effect are those that: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">provide that
        a vacancy on the board of directors may be filled only by a majority vote
        of the remaining\ndirectors, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">prohibit
        the shareholders from taking action by written consent in lieu of a meeting
        of shareholders,\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">limit the
        persons who may call a special meeting of shareholders to the chairman of
        the NEE board of directors,\nthe president or the secretary, a majority of
        the board of directors or the holders of 20% of the outstanding shares of
        stock entitled to vote on the matter or matters to be presented at the meeting,
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">require any
        action by shareholders to amend or repeal NEE&#8217;s Bylaws, or to adopt
        new bylaws, to receive the\naffirmative vote of holders of at least a majority
        of the voting power of the outstanding shares of voting stock, voting together
        as a single class, and </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">require the
        affirmative vote of holders of at least a majority of the voting power of
        the outstanding shares of\nvoting stock, voting together as a single class,
        to alter, amend or repeal specified provisions of NEE&#8217;s Charter, including
        the foregoing provisions. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B><I>NEE&#8217;s
        Bylaw Provisions. </I></B>NEE&#8217;s Bylaws contain some of the foregoing
        provisions contained in NEE&#8217;s Charter.\nNEE&#8217;s Bylaws also contain
        a provision limiting to 16 directors the maximum number of authorized directors
        of NEE. In addition, NEE&#8217;s Bylaws contain provisions that establish
        advance notice requirements for shareholders to nominate\ncandidates for election
        as directors at any annual or special meeting of shareholders or to present
        any other business for consideration at any annual meeting of shareholders.
        These provisions generally require a shareholder to submit in writing to\nNEE&#8217;s
        secretary any nomination of a candidate for election to the board of directors
        or any other proposal for consideration at any annual meeting not earlier
        than 120 days or later than 90&nbsp;days before the first anniversary of the\npreceding
        year&#8217;s annual meeting. NEE&#8217;s Bylaws also require a shareholder
        to submit in writing to NEE&#8217;s secretary any nomination of a candidate
        for election to the board of directors for consideration at any special meeting
        not\nearlier than 120 days before such special meeting and not after the later
        of 90 days before such special meeting or the tenth day following the day
        of the first public announcement of the date of the special meeting and of
        the fact that directors\nare to be elected at the meeting. For the shareholder&#8217;s
        notice to be in proper form, it must include all of the information specified
        in NEE&#8217;s Bylaws. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B><I>Preferred
        Stock</I></B>. The rights and privileges of holders of common stock may be
        adversely affected by the rights, privileges and\npreferences of holders of
        shares of any series of preferred stock which NEE&#8217;s board of directors
        may authorize for issuance from time to time. NEE&#8217;s board of directors
        has broad discretion with respect to the creation and issuance of any\nseries
        of preferred stock without shareholder approval, subject to any applicable
        rights of holders of any shares of preferred stock outstanding at any time.
        In that regard, NEE&#8217;s Charter authorizes NEE&#8217;s board of directors
        from time to\ntime and without shareholder action to provide for the issuance
        of up to 100,000,000 shares of preferred stock in one or more series, and
        to determine the designations, preferences, limitations and relative or other
        rights of any such series,\nincluding voting rights, dividend rights, liquidation
        preferences, sinking fund provisions, conversion privileges and redemption
        rights. Among other things, by authorizing the issuance of shares of preferred
        stock with particular voting, conversion\nor other rights, the board of directors
        could adversely affect the voting power of the holders of common stock and
        could discourage any attempt to effect a change in control of NEE, even if
        such a transaction would be beneficial to the interests of\nholders of common
        stock. See the description of NEE&#8217;s Preferred Stock in &#8220;Description
        of NEE Preferred Stock.&#8221; </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Restrictions on\nAffiliated
        and Control Share Transactions under Florida Act </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B><I>Affiliated
        Transactions.</I></B> As a Florida corporation, NEE is\nsubject to the Florida
        Act, which provides that a Florida corporation generally may not engage in
        an &#8220;affiliated transaction&#8221; with an &#8220;interested shareholder,&#8221;
        as </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">8 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nthose terms are defined in the statute, for
        three years following the date a shareholder becomes an &#8220;interested
        shareholder,&#8221; unless: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">prior to
        the time that such shareholder became an interested shareholder, the board
        of directors approved either\nthe affiliated transaction or the transaction
        which resulted in the shareholder becoming an interested shareholder, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">upon consummation
        of the transaction that resulted in the shareholder becoming an interested
        shareholder, the\ninterested shareholder owned at least 85&nbsp;percent of
        the voting shares of the corporation outstanding at the time the transaction
        commenced, subject to certain exclusions, or </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">at or subsequent
        to the time that such shareholder became an interested shareholder, the affiliated
        transaction\nis approved by the board of directors and authorized by the affirmative
        vote of at least <FONT STYLE=\"white-space:nowrap\">two-thirds</FONT> of the
        outstanding voting shares which are not owned by the interested shareholder.
        </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Florida Act generally defines
        an &#8220;interested shareholder&#8221; as any person who is the beneficial
        owner of more than 15% of the\noutstanding voting shares of the corporation.
        The affiliated transactions covered by the Florida Act include, with specified
        exceptions: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">mergers and
        consolidations to which the corporation and the interested shareholder are
        parties,\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">sales or
        certain other dispositions of assets representing 10% or more of the aggregate
        fair market value of the\ncorporation&#8217;s assets, outstanding shares,
        earning power or net income to the interested shareholder, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">generally,
        issuances by the corporation of 10% or more of the aggregate fair market value
        of its outstanding\nshares to the interested shareholder, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the adoption
        of any plan for the liquidation or dissolution of the corporation proposed
        by or pursuant to an\narrangement with the interested shareholder, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">any reclassification
        of the corporation&#8217;s securities, recapitalization of the corporation,
        merger or\nconsolidation, or other transaction which has the effect of increasing
        by more than 10% the percentage of the outstanding voting shares of the corporation
        beneficially owned by the interested shareholder, and </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the receipt
        by the interested shareholder of certain loans or other financial assistance
        from the corporation.\n</P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        foregoing transactions generally also include transactions involving any affiliate
        of the interested shareholder\nand involving or affecting any direct or indirect
        majority-owned subsidiary of the corporation. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        voting requirements above will not\napply if, among other things, subject
        to specified qualifications: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the transaction
        has been approved by a majority of the corporation&#8217;s disinterested directors,\n</P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the interested
        shareholder has been the beneficial owner of at least 80% of the corporation&#8217;s
        outstanding\nvoting shares for at least three years preceding the transaction,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the interested
        shareholder is the beneficial owner of at least 90% of the outstanding voting
        shares, or\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">specified
        fair price and procedural requirements are satisfied. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B><I>Control</I></B><B><I><FONT STYLE=\"white-space:nowrap\">-Share</FONT>
        Acquisitions. </I></B>The Florida Act also contains a <FONT\nSTYLE=\"white-space:nowrap\">control-share</FONT>
        acquisition statute which provides that a person who acquires shares in an
        &#8220;issuing public corporation,&#8221; as defined in the statute, in excess
        of certain specified thresholds generally will\nnot have any voting rights
        with respect to such shares unless such voting rights are approved by the
        holders of a majority of the votes of each class of securities entitled to
        vote </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">9 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nseparately, excluding shares held or controlled
        by the acquiring person. The thresholds specified in the Florida Act are the
        acquisition of a number of shares representing: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><FONT STYLE=\"white-space:nowrap\">one-fifth</FONT>
        or more, but less than\n<FONT STYLE=\"white-space:nowrap\">one-third,</FONT>
        of all voting power of the corporation, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\"><FONT STYLE=\"white-space:nowrap\">one-third</FONT>
        or more, but less than a majority, of all voting power of the\ncorporation,
        or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">a majority
        or more of all voting power of the corporation. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The statute does not apply if, among other things,
        the acquisition: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">is approved
        by the corporation&#8217;s board of directors before the acquisition, or </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">is effected
        pursuant to a statutory merger or share exchange to which the corporation
        is a party.\n</P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The statute
        also does not apply to an acquisition of shares of a corporation in excess
        of a specified threshold if,\nbefore the acquisition, the corporation&#8217;s
        articles of incorporation or bylaws provide that the corporation will not
        be governed by the statute. The statute also permits a corporation to adopt
        a provision in its articles of incorporation or\nbylaws providing for the
        redemption of the acquired shares by the corporation in specified circumstances.
        NEE&#8217;s Charter and NEE&#8217;s Bylaws do not contain such provisions.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Indemnification </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Florida law
        generally\nprovides that a Florida corporation, such as NEE, may indemnify
        its directors and officers against liabilities and expenses they may incur.
        Florida law also limits the liability of directors to NEE and other persons.
        NEE&#8217;s Bylaws contain\nprovisions requiring NEE to indemnify its directors,
        officers, employees and agents under specified conditions. In addition, NEE
        carries insurance permitted by the laws of Florida on behalf of its directors,
        officers, employees and agents. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Shareholder Access </B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE&#8217;s Bylaws\npermit a shareholder, or
        a group of up to 20 shareholders, owning continuously for at least three years
        3% or more of NEE&#8217;s outstanding common stock (an &#8220;eligible shareholder&#8221;)
        to nominate and include in NEE&#8217;s annual meeting\nproxy materials director
        candidates to occupy (together with any nominees of other eligible shareholders)
        up to two or 20% of the number of directors in office (whichever is greater),
        provided that such eligible shareholder satisfies the\nrequirements set forth
        in NEE&#8217;s Bylaws. Those requirements generally include receipt by NEE&#8217;s
        secretary of written notice from an eligible shareholder of the nomination
        not earlier than 150 days or later than 120 days before the first\nanniversary
        of the mailing of NEE&#8217;s proxy materials for the most recent annual meeting.
        For the eligible shareholder&#8217;s notice to be in proper form, it must
        include all of the information specified in NEE&#8217;s Bylaws. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Transfer
        Agent and Registrar </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The\ntransfer
        agent and registrar for the common stock is Computershare Trust Company, N.A.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Listing </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The common stock
        is listed on the New York Stock Exchange and trades under the symbol &#8220;NEE.&#8221;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">10 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_10\"></A>DESCRIPTION
        OF NEE PREFERRED STOCK </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>General.</B>
        The following statements describing NEE&#8217;s preferred stock are not intended
        to be a complete description. For additional\ninformation, please see NEE&#8217;s
        Charter and NEE&#8217;s Bylaws. You should read this summary together with
        the articles of amendment to NEE&#8217;s Charter, which will describe the
        terms of any preferred stock to be offered hereby, for a\ncomplete understanding
        of all the provisions. Please also see the FPL Mortgage, which contains restrictions
        which may in certain instances restrict the amount of retained earnings that
        FPL can use to pay cash dividends on its common stock. Each of\nthese documents
        has previously been filed, or will be filed, with the SEC and each is or will
        be an exhibit to the registration statement filed with the SEC of which this
        prospectus is a part. Reference is also made to the Florida Act and other\napplicable
        laws. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>NEE Preferred Stock.</B>
        NEE may issue one or more series of its preferred stock, $.01&nbsp;par value,
        without the\napproval of its shareholders. No shares of preferred stock are
        presently outstanding. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Some terms of
        a series of preferred stock may\ndiffer from those of another series. The
        terms of any preferred stock being offered will be described in a prospectus
        supplement. These terms will also be described in articles of amendment to
        NEE&#8217;s Charter, which will establish the terms of\nthe preferred stock
        being offered. These terms will include any of the following that apply to
        that series: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the title of that series of preferred stock,
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the number of shares in the series, </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the dividend rate, or how such rate will be determined,
        and the dividend payment dates for the series, if any,\n</P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">whether the series will be listed on a securities
        exchange, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(5)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the date or dates on which the series of preferred
        stock may be redeemed at the option of NEE and any\nrestrictions on such redemptions,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(6)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any sinking fund or other provisions that would
        obligate NEE to repurchase, redeem or retire the series of\npreferred stock,
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(7)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the amount payable on the series of preferred
        stock in case of the liquidation, dissolution or winding up of\nNEE and any
        additional amount, or method of determining such amount, payable in case any
        such event is voluntary, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(8)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any rights to convert the shares of the series
        of preferred stock into shares of another series or into shares\nof any other
        class of capital stock, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(9)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the voting rights, if any, and </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(10)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other terms that are not inconsistent with
        the provisions of NEE&#8217;s Charter. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        some cases, the issuance of preferred stock could make it difficult for another
        company to acquire NEE and make it harder to remove current\nmanagement. See
        also &#8220;Description of NEE Common Stock.&#8221; </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">There
        are contractual restrictions on the <FONT\nSTYLE=\"white-space:nowrap\">dividend-paying</FONT>
        ability of NEE and its subsidiaries contained in outstanding financing arrangements,
        and similar or other restrictions may be included in future financing arrangements.
        As of the date of this\nprospectus, NEE has equity units outstanding. In accordance
        with the terms of the equity units, NEE has the right, from time to time,
        to defer the payment of contract adjustment payments on the purchase contracts
        that form a part of the equity units\nto a date no later than the purchase
        contract settlement date. As of the date of this prospectus, NEE Capital has
        junior subordinated debentures outstanding. In accordance with the terms of
        the junior subordinated debentures, NEE Capital has the\nright, from time
        to time, to defer the payment of interest on its outstanding junior subordinated
        debentures on one or more occasions for up to ten consecutive years. NEE,
        NEE Capital and FPL may issue, from time to time, additional equity units,\njunior
        subordinated debentures or other securities that (i)&nbsp;provide them with
        rights to defer the payment of interest or </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">11 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nother payments and (ii)&nbsp;contain
        dividend restrictions in the event of the exercise of such rights. In the
        event that NEE or NEE Capital were to exercise any right to defer interest
        or other\npayments on currently outstanding or future series of equity units,
        junior subordinated debentures or other securities, or if there were to occur
        certain payment defaults on those securities, NEE would not be able, with
        limited exceptions, to pay\ndividends on the preferred stock (and NEE Capital
        would not be able to pay dividends to NEE or any other holder of its common
        stock if it defers interest on its junior subordinated debentures) during
        the periods in which such payments were deferred\nor such payment defaults
        continued. In the event that FPL was to issue equity units, junior subordinated
        debentures or other securities having similar provisions and was to exercise
        any such right to defer the payment of interest or other payments\non such
        securities, or if there was to occur certain payment defaults on those securities,
        FPL would not be able, with limited exceptions, to pay dividends to NEE or
        any other holder of its common stock or preferred stock during the periods
        in which\nsuch payments were deferred or such payment defaults continued.
        In addition, NEE, NEE Capital and FPL might issue other securities in the
        future containing similar or other restrictions on, or that affect, NEE&#8217;s
        ability to pay dividends on its\ncommon stock or preferred stock and on the
        ability of NEE&#8217;s subsidiaries, including NEE Capital and FPL, to pay
        dividends to any holder of their respective common stock or preferred stock,
        including NEE. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">12 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_11\"></A>DESCRIPTION
        OF NEE DEPOSITARY SHARES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE may issue
        depositary shares representing fractional interests in shares of NEE preferred
        stock of any series. In connection with the\nissuance of any depositary shares,
        NEE will enter into a deposit agreement with a bank or trust company, as depositary,
        which will be named in the applicable prospectus supplement. Depositary shares
        will be evidenced by depositary receipts issued\npursuant to the related deposit
        agreement. Following the issuance of the security related to the depositary
        shares, NEE will deposit the shares of its preferred stock with the relevant
        depositary and will cause the depositary to issue, on its\nbehalf, the related
        depositary receipts. Subject to the terms of the deposit agreement, each owner
        of a depositary receipt will be entitled, in proportion to the fractional
        interest in the share of preferred stock represented by the related\ndepositary
        share, to all the rights, preferences and privileges of, and will be subject
        to all of the limitations and restrictions on, the preferred stock represented
        by the depositary receipt (including, if applicable, dividend, voting, conversion,\nexchange,
        redemption, sinking fund, subscription and liquidation rights). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        terms of any depositary shares being offered will be\ndescribed in a prospectus
        supplement. </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_12\"></A>DESCRIPTION
        OF NEE STOCK PURCHASE CONTRACTS </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>AND STOCK
        PURCHASE UNITS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE may issue stock purchase
        contracts, including contracts that obligate holders to purchase from NEE,
        and NEE to sell to these holders, a\nspecified number of shares of common
        stock or preferred stock or depositary shares at a future date or dates. The
        consideration per share of common stock or preferred stock or per depositary
        share may be fixed at the time the stock purchase\ncontracts are issued or
        may be determined by reference to a specific formula set forth in the stock
        purchase contracts. The stock purchase contracts may be issued separately
        or as a part of stock purchase units consisting of a stock purchase\ncontract
        and either debt securities of NEE Capital, debt securities of NEE, or debt
        securities of third parties including, but not limited to, U.S. Treasury securities,
        that would secure the holders&#8217; obligations to purchase common stock,\npreferred
        stock or depositary shares under the stock purchase contracts. The stock purchase
        contracts may require NEE to make periodic payments to the holders of some
        or all of the stock purchase units or vice versa, and such payments may be\nunsecured
        or prefunded on some basis. The stock purchase contracts may require holders
        to secure their obligations under these stock purchase contracts in a specified
        manner. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The terms of any stock purchase
        contracts or stock purchase units being offered will be described in a prospectus
        supplement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">13 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_13\"></A>DESCRIPTION
        OF NEE WARRANTS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">NEE may issue warrants to purchase
        common stock, preferred stock or depositary shares. The terms of any such
        warrants being offered and any\nrelated warrant agreement between NEE and
        a warrant agent will be described in a prospectus supplement. </P>\n<P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A
        NAME=\"tx85786_14\"></A>DESCRIPTION OF NEE SENIOR DEBT SECURITIES </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE may issue its senior debt securities, in
        one or more series, under one or more indentures between NEE and The Bank
        of New York Mellon, as\ntrustee. The terms of any offered senior debt securities
        and the applicable indenture will be described in a prospectus supplement.
        </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_15\"></A>DESCRIPTION OF
        NEE SUBORDINATED DEBT SECURITIES </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE may issue
        its subordinated debt securities (other than the NEE Junior\nSubordinated
        Debentures (as defined below under &#8220;Description of NEE Junior Subordinated
        Debentures&#8221;)), in one or more series, under one or more indentures between
        NEE and The Bank of New York Mellon, as trustee. The terms of any offered\nsubordinated
        debt securities and the applicable indenture will be described in a prospectus
        supplement. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_16\"></A>DESCRIPTION
        OF NEE JUNIOR SUBORDINATED DEBENTURES </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE
        may issue its junior subordinated debentures (the &#8220;NEE Junior Subordinated
        Debentures&#8221;), in one or more series, under one or\nmore indentures between
        NEE and The Bank of New York Mellon, as trustee. The terms of any offered
        junior subordinated debentures and the applicable indenture will be described
        in a prospectus supplement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">14 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_17\"></A>DESCRIPTION
        OF NEE CAPITAL PREFERRED STOCK </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>General.</B>
        The following statements describing NEE Capital&#8217;s preferred stock are
        not intended to be a complete description. For\nadditional information, please
        see NEE Capital&#8217;s Articles of Incorporation, as currently in effect
        (&#8220;NEE Capital&#8217;s Charter&#8221;), and NEE Capital&#8217;s bylaws,
        as currently in effect. You should read this summary together with\nthe articles
        of amendment to NEE Capital&#8217;s Charter, which will describe the terms
        of any preferred stock to be offered hereby, for a complete understanding
        of all the provisions. Each of these documents has previously been filed,
        or will be\nfiled, with the SEC and each is or will be an exhibit to the registration
        statement filed with the SEC of which this prospectus is a part. Reference
        is also made to the Florida Act and other applicable laws. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>NEE
        Capital Preferred Stock.</B> NEE Capital may issue one or more series of its
        preferred stock, $.01&nbsp;par value, without the approval\nof its shareholders.
        The NEE Capital preferred stock will be guaranteed by NEE as described under
        &#8220;Description of NEE Guarantee of NEE Capital Preferred Stock.&#8221;
        No shares of preferred stock are presently outstanding. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Some
        terms of a series of preferred stock may differ from those of another series.
        The terms of any preferred stock being offered will be\ndescribed in a prospectus
        supplement. These terms will also be described in articles of amendment to
        NEE Capital&#8217;s Charter, which will establish the terms of the preferred
        stock being offered. These terms will include any of the following that\napply
        to that series: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the title of that series of preferred stock,
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the number of shares in the series, </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the dividend rate, or how such rate will be determined,
        and the dividend payment dates for the series,\n</P></TD></TR></TABLE> <P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">whether the series will be listed on a securities
        exchange, </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(5)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the date or dates on which the series of preferred
        stock may be redeemed at the option of NEE Capital and any\nrestrictions on
        such redemptions, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(6)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any sinking fund or other provisions that would
        obligate NEE Capital to repurchase, redeem or retire the series\nof preferred
        stock, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(7)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the amount payable on the series of preferred
        stock in case of the liquidation, dissolution or winding up of\nNEE Capital
        and any additional amount, or method of determining such amount, payable in
        case any such event is voluntary, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(8)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any rights to convert the shares of the series
        of preferred stock into shares of another series or into shares\nof any other
        class of capital stock, </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(9)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the voting rights, if any, and </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(10)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other terms that are not inconsistent with
        the provisions of NEE Capital&#8217;s Charter.\n</P></TD></TR></TABLE> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">There are contractual restrictions on the <FONT
        STYLE=\"white-space:nowrap\">dividend-paying</FONT> ability of NEE\nCapital
        contained in outstanding financing arrangements, and similar or other restrictions
        may be included in future financing arrangements. As of the date of this prospectus,
        NEE Capital has outstanding junior subordinated debentures giving NEE\nCapital
        the right, from time to time, to defer the payment of interest on its outstanding
        junior subordinated debentures on one or more occasions for up to ten consecutive
        years. NEE Capital may issue, from time to time, additional junior\nsubordinated
        debentures or other securities that (i)&nbsp;provide it with rights to defer
        the payment of interest or other payments and (ii)&nbsp;contain dividend restrictions
        in the event of the exercise of such rights. In the event that NEE\nCapital
        were to exercise any right to defer interest or other payments on currently
        outstanding or future series of junior subordinated debentures or such other
        securities, or if there were to occur certain payment defaults on those securities,
        NEE\nCapital would not be able, with limited exceptions, to pay dividends
        on the preferred stock during the periods in which such payments were deferred
        or such payment defaults continued. In addition, NEE Capital might issue other
        securities in the\nfuture containing similar or other restrictions on NEE
        Capital&#8217;s ability to pay dividends to any holder of its preferred stock.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">15 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_18\"></A>DESCRIPTION
        OF NEE GUARANTEE OF NEE CAPITAL PREFERRED STOCK\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        following statements describing NEE&#8217;s guarantee of NEE Capital&#8217;s
        preferred stock are not intended to be a complete\ndescription. For additional
        information, please see NEE&#8217;s guarantee agreement relating to NEE Capital&#8217;s
        preferred stock. You should read this summary together with the guarantee
        agreement for a complete understanding of all the\nprovisions. Please also
        see the FPL Mortgage, which contains restrictions which may in certain instances
        limit the ability of FPL to pay dividends to NEE. Each of these documents
        has previously been filed with the SEC and each is an exhibit to the\nregistration
        statement filed with the SEC of which this prospectus is a part. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE
        will absolutely, irrevocably and unconditionally\nguarantee the payment of
        accumulated and unpaid dividends, and payments due on liquidation or redemption,
        as and when due, regardless of any defense, right of <FONT STYLE=\"white-space:nowrap\">set-off</FONT>
        or counterclaim that NEE Capital may have\nor assert. NEE&#8217;s guarantee
        of NEE Capital&#8217;s preferred stock will be an unsecured obligation of
        NEE and will rank (1)&nbsp;subordinate and junior in right of payment to all
        other liabilities of NEE (except those made pari passu or\nsubordinate by
        their terms), (2)&nbsp;equal in right of payment with the most senior preferred
        or preference stock that may be issued by NEE and with any other guarantee
        that may be entered into by NEE in respect of any preferred or preference
        stock\nof any affiliate of NEE, and (3)&nbsp;senior to NEE&#8217;s common
        stock. The terms of NEE&#8217;s guarantee of NEE Capital&#8217;s preferred
        stock will be described in a prospectus supplement. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">While
        NEE is a holding company that derives substantially all of its income from
        its operating subsidiaries, NEE&#8217;s subsidiaries are\nseparate and distinct
        legal entities and have no obligation to make any payments under the NEE guarantee
        of NEE Capital preferred stock or to make any funds available for such payment.
        Therefore, the NEE guarantee of NEE Capital preferred stock will\neffectively
        be subordinated to all indebtedness and other liabilities, including trade
        payables, debt and preferred stock, incurred or issued by NEE&#8217;s subsidiaries.
        In addition to trade liabilities, many of NEE&#8217;s operating subsidiaries\nincur
        debt in order to finance their business activities. All of this indebtedness
        will effectively be senior to the NEE guarantee of NEE Capital preferred stock.
        NEE&#8217;s guarantee of NEE Capital preferred stock does not place any limit
        on the\namount of liabilities, including debt or preferred stock, that NEE&#8217;s
        subsidiaries may issue, guarantee or incur. See &#8220;Description of NEE
        Common Stock&#8212;Common Stock Terms&#8212;Dividend Rights&#8221; for a description
        of contractual\nrestrictions on the dividend-paying ability of some of NEE&#8217;s
        subsidiaries. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">16 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_19\"></A>DESCRIPTION
        OF NEE CAPITAL DEPOSITARY SHARES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE Capital
        may issue depositary shares representing fractional interests in shares of
        NEE Capital preferred stock of any series. In\nconnection with the issuance
        of any depositary shares, NEE Capital will enter into a deposit agreement
        with a bank or trust company, as depositary, which will be named in the applicable
        prospectus supplement. Depositary shares will be evidenced by\ndepositary
        receipts issued pursuant to the related deposit agreement. Following the issuance
        of the security related to the depositary shares, NEE Capital will deposit
        the shares of its preferred stock with the relevant depositary and will cause
        the\ndepositary to issue, on its behalf, the related depositary receipts.
        Subject to the terms of the deposit agreement, each owner of a depositary
        receipt will be entitled, in proportion to the fractional interest in the
        share of preferred stock\nrepresented by the related depositary share, to
        all the rights, preferences and privileges of, and will be subject to all
        of the limitations and restrictions on, the preferred stock represented by
        the depositary receipt (including, if applicable,\ndividend, voting, exchange,
        redemption, sinking fund, subscription and liquidation rights). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        terms of any depositary shares being\noffered will be described in a prospectus
        supplement. </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_20\"></A>DESCRIPTION
        OF NEE GUARANTEE OF NEE CAPITAL DEPOSITARY\nSHARES </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">NEE
        may guarantee any NEE Capital depositary shares. The terms of any such guarantee
        and the guarantee agreement would be\ndescribed in a prospectus supplement.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">17 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"tx85786_21\"></A>DESCRIPTION
        OF NEE CAPITAL SENIOR DEBT SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>General.</B>
        NEE Capital may issue its senior debt securities, in one or more series, under
        an Indenture, dated as of June&nbsp;1, 1999,\nbetween NEE Capital and The
        Bank of New York Mellon, as trustee. This Indenture, as it may be amended
        and supplemented from time to time, is referred to in this prospectus as the
        &#8220;Indenture.&#8221; The Bank of New York Mellon, as trustee under\nthe
        Indenture, is referred to in this prospectus as the &#8220;Indenture Trustee.&#8221;
        The senior debt securities of NEE Capital offered pursuant to this prospectus
        and any applicable prospectus supplement are referred to as the &#8220;Offered\nSenior
        Debt Securities.&#8221; </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Indenture
        provides for the issuance from time to time of debentures, notes or other
        senior debt by NEE\nCapital in an unlimited amount. The Offered Senior Debt
        Securities and all other debentures, notes or other debt of NEE Capital issued
        previously or hereafter under the Indenture are collectively referred to in
        this prospectus as the &#8220;Senior\nDebt Securities.&#8221; </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        section briefly summarizes some of the terms of the Offered Senior Debt Securities
        and some of the\nprovisions of the Indenture. This summary does not contain
        a complete description of the Offered Senior Debt Securities or the Indenture.
        You should read this summary together with the Indenture and the officer&#8217;s
        certificates or other\ndocuments creating the Offered Senior Debt Securities
        for a complete understanding of all the provisions and for the definitions
        of some terms used in this summary. The Indenture, the form of officer&#8217;s
        certificate that may be used to create a\nseries of Offered Senior Debt Securities
        and a form of Offered Senior Debt Securities have previously been filed with
        the SEC, and are exhibits to the registration statement filed with the SEC
        of which this prospectus is a part. In addition, the\nIndenture is qualified
        under the Trust&nbsp;Indenture Act of 1939 and therefore subject to the provisions
        of the Trust&nbsp;Indenture Act of 1939. You should read the Trust&nbsp;Indenture
        Act of 1939 for a complete understanding of its provisions.\n</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        Offered Senior Debt Securities of one series need not be issued at the same
        time, and a series may be\n<FONT STYLE=\"white-space:nowrap\">re-opened</FONT>
        for issuances of additional Offered Senior Debt Securities of such series.
        This means that NEE Capital may from time to time, without notice to, or the
        consent of any existing holders of the\npreviously-issued Offered Senior Debt
        Securities of a particular series, create and issue additional Offered Senior
        Debt Securities of such series. Such additional Offered Senior Debt Securities
        will have the same terms as the <FONT\nSTYLE=\"white-space:nowrap\">previously-issued</FONT>
        Offered Senior Debt Securities of such series in all respects except for the
        issue date and, if applicable, the initial interest payment date. The additional
        Offered Senior Debt Securities will be\nconsolidated and form a single series
        with the <FONT STYLE=\"white-space:nowrap\">previously-issued</FONT> Offered
        Senior Debt Securities of such series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each series
        of Offered Senior Debt Securities may have different terms. NEE Capital will
        include some or all of the following information\nabout a specific series
        of Offered Senior Debt Securities in a prospectus supplement relating to that
        specific series of Offered Senior Debt Securities: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the title of those Offered Senior Debt Securities,
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
