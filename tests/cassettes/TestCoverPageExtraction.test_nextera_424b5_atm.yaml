        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\" VALIGN=\"top\" ALIGN=\"left\">(25)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">any other terms
        of those Offered Senior Debt Securities that are not inconsistent with the
        provisions of the\nIndenture. (Indenture, Section&nbsp;301). </P></TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE Capital may sell Offered Senior Debt Securities
        at a discount below their\nprincipal amount. Some of the important United
        States federal income tax considerations applicable to Offered Senior Debt
        Securities sold at a discount below their principal amount may be discussed
        in the related prospectus supplement. In addition,\nsome of the important
        United States federal income tax or other considerations applicable to any
        Offered Senior Debt Securities that are denominated in a currency other than
        U.S. dollars may be discussed in the related prospectus supplement. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise stated in the related prospectus
        supplement, the covenants in the Indenture would not give registered owners
        of Offered\nSenior Debt Securities protection in the event of a <FONT STYLE=\"white-space:nowrap\">highly-leveraged</FONT>
        transaction involving NEE Capital or NEE. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Security
        and Ranking.</B> The Offered Senior Debt Securities will be unsecured obligations
        of NEE Capital. The Indenture does not limit NEE\nCapital&#8217;s ability
        to provide security with respect to other Senior Debt Securities. All Senior
        Debt Securities issued under the Indenture will rank equally and ratably with
        all other Senior Debt Securities issued under the Indenture, except to\nthe
        extent that NEE Capital elects to provide security with respect to any Senior
        Debt Security (other than the Offered Senior Debt Securities) without providing
        that security to all outstanding Senior Debt Securities in accordance with
        the\nIndenture. The Offered Senior Debt Securities will rank senior to NEE
        Capital&#8217;s Subordinated Debt Securities and NEE Capital&#8217;s Junior
        Subordinated Debentures. The Indenture does not limit NEE Capital&#8217;s
        ability to issue other\nunsecured debt. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">While NEE Capital
        is a holding company that derives substantially all of its income from its
        operating subsidiaries, NEE\nCapital&#8217;s subsidiaries are separate and
        distinct legal entities and have no obligation to make any payments on the
        Senior Debt Securities or to make any funds available for such payment. Therefore,
        the Senior Debt Securities will effectively\nbe subordinated to all indebtedness
        and other liabilities, including trade payables, debt and preferred stock,
        incurred or issued by NEE Capital&#8217;s subsidiaries. In addition to trade
        liabilities, many of NEE Capital&#8217;s operating\nsubsidiaries incur debt
        in order to finance their business activities. All of this indebtedness will
        effectively be senior to the Senior Debt Securities. The Indenture does not
        place any limit on the amount of liabilities, including debt or\npreferred
        stock, that NEE Capital&#8217;s subsidiaries may issue, guarantee or incur.
        See &#8220;Description of NEE Common Stock&#8212;Common Stock Terms&#8212;Dividend
        Rights&#8221; for a description of contractual restrictions on the\ndividend-paying
        ability of NEE Capital. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Payment and
        Paying Agents.</B> Except as stated in the related prospectus supplement,
        on each\ninterest payment date NEE Capital will pay interest on each Offered
        Senior Debt Security to the person in whose name that Offered Senior Debt
        Security is registered as of the close of business on the record date relating
        to that interest payment\ndate. However, on the date that the Offered Senior
        Debt Securities mature, NEE Capital will pay the interest to the person to
        whom it pays the principal. Also, if NEE Capital has defaulted in the payment
        of interest on any Offered Senior Debt\nSecurity, it may pay that defaulted
        interest to the registered owner of that Offered Senior Debt Security: </P>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">as of the close of business on a date that the
        Indenture Trustee selects, which may not be more than 15 days or\nless than
        10 days before the date that NEE Capital proposes to pay the defaulted interest,
        or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">in any other lawful manner that does not violate
        the requirements of any securities exchange on which that\nOffered Senior
        Debt Security is listed and that the Indenture Trustee believes is practicable.
        (Indenture, Section&nbsp;307). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise stated in the related prospectus supplement, the principal, premium,
        if any, and interest on the Offered Senior Debt\nSecurities at maturity will
        be payable when such Offered Senior Debt Securities are presented at the main
        corporate trust office of The Bank of New York Mellon, as paying agent, in
        New York City. NEE Capital may change the place of payment on the\nOffered
        Senior Debt Securities, appoint one or more additional paying agents, including
        NEE Capital, and remove any paying agent. (Indenture, Section&nbsp;602). </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">20 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Transfer and Exchange.</B>
        Unless otherwise stated in the related prospectus supplement,\nOffered Senior
        Debt Securities may be transferred or exchanged at the main corporate trust
        office of The Bank of New York Mellon, as security registrar, in New York
        City. NEE Capital may change the place for transfer and exchange of the Offered\nSenior
        Debt Securities and may designate one or more additional places for that transfer
        and exchange. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Except as otherwise stated in
        the\nrelated prospectus supplement, there will be no service charge for any
        transfer or exchange of the Offered Senior Debt Securities. However, NEE Capital
        may require payment of any tax or other governmental charge in connection
        with any transfer or\nexchange of the Offered Senior Debt Securities. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE Capital will not be required to transfer
        or exchange any Offered Senior Debt Security\nselected for redemption. Also,
        NEE Capital will not be required to transfer or exchange any Offered Senior
        Debt Security during a period of 15 days before notice is to be given identifying
        the Offered Senior Debt Securities selected to be redeemed.\n(Indenture, Section&nbsp;305).
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Defeasance.</B> NEE Capital may, at any time,
        elect to have all of its obligations discharged with\nrespect to all or a
        portion of any Senior Debt Securities. To do so, NEE Capital must irrevocably
        deposit with the Indenture Trustee or any paying agent, in trust: </P> <P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">money in an amount that will be sufficient to
        pay all or that portion of the principal, premium, if any, and\ninterest due
        and to become due on those Senior Debt Securities, on or prior to their maturity,
        or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
