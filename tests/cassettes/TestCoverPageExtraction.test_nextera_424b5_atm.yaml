        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">any other event of default with respect to the
        Senior Debt Securities of that series has been cured or waived\nas provided
        in the Indenture. (Indenture, Section&nbsp;802). </P></TD></TR></TABLE> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Other than its obligations and duties in case
        of an event\nof default under the Indenture, the Indenture Trustee is not
        obligated to exercise any of its rights or powers under the Indenture at the
        request or direction of any of the registered owners of the Senior Debt Securities,
        unless those registered\nowners offer reasonable indemnity to the Indenture
        Trustee. (Indenture, Section&nbsp;903). If they provide this reasonable indemnity,
        the registered owners of a majority in principal amount of any series of Senior
        Debt Securities will have the right\nto direct the time, method and place
        of conducting any proceeding for any remedy available to the Indenture Trustee,
        or exercising any trust or power conferred on the Indenture Trustee, with
        respect to the Senior Debt Securities of that series.\nHowever, if an event
        of default under the Indenture relates to more than one series of Senior Debt
        Securities, only the registered owners of a majority in aggregate principal
        amount of all affected series of Senior Debt Securities, considered as one\nclass,
        will have the right to make that direction. Also, the direction must not violate
        any law or the Indenture, and may not expose the Indenture Trustee to personal
        liability in circumstances where the indemnity would not, in the Indenture\nTrustee&#8217;s
        sole discretion, be adequate, and the Indenture Trustee may take any other
        action that it deems proper and not inconsistent with such direction. (Indenture,
        Section&nbsp;812). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">A registered owner of a Senior
        Debt Security has the right to institute a suit for the enforcement of payment
        of the principal of or premium,\nif any, or interest on that Senior Debt Security
        on or after the applicable due date specified in that Senior Debt Security.
        (Indenture, Section&nbsp;808). No registered owner of Senior Debt Securities
        of any series will have any other right to\ninstitute any proceeding under
        the Indenture, or any other remedy under the Indenture, unless: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">that registered owner has previously given to
        the Indenture Trustee written notice of a continuing event of\ndefault with
        respect to the Senior Debt Securities of that series, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(2)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the registered owners of a majority in aggregate
        principal amount of the outstanding Senior Debt Securities of\nall series
        in respect of which an event of default under the Indenture exists, considered
        as one class, have made written request to the Indenture Trustee to institute
        that proceeding in its own name as trustee, and have offered reasonable indemnity\nto
        the Indenture Trustee against related costs, expenses and liabilities, </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(3)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the Indenture Trustee for 60 days after its receipt
        of that notice, request and offer of indemnity has failed\nto institute any
        such proceeding, and </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(4)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">no direction inconsistent with that request was
        given to the Indenture Trustee during this 60 day period by the\nregistered
        owners of a majority in aggregate principal amount of the outstanding Senior
        Debt Securities of all series in respect of which an event of default under
        the Indenture exists, considered as one class. (Indenture, Section&nbsp;807).\n</P></TD></TR></TABLE>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">NEE Capital is required to deliver to the Indenture
        Trustee an annual statement as to its compliance with all\nconditions and
        covenants under the Indenture. (Indenture, Section&nbsp;606). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Modification
        and Waiver.</B> Without the consent of any\nregistered owner of Senior Debt
        Securities, NEE Capital and the Indenture Trustee may amend or supplement
        the Indenture for any of the following purposes: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">(1)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">to provide for the assumption by any permitted
        successor to NEE Capital of NEE Capital&#8217;s obligations\nunder the Indenture
        and the Senior Debt Securities in the case of a merger or consolidation or
        a conveyance, transfer or lease of NEE Capital&#8217;s properties and assets
        substantially as an entirety, </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">25 </P>\n\n</DIV></Center>\n\n\n<p
