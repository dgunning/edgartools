        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">a combination of (1)&nbsp;and (2) that will be
        sufficient to pay all or that portion of the principal, premium,\nif any,
        and interest due and to become due on those NEE Capital Junior Subordinated
        Indenture Securities, on or prior to their maturity. (NEE Capital Junior Subordinated
        Indenture, Section&nbsp;701). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Option
        to Defer Interest Payments.</B> If so specified in the related prospectus
        supplement, NEE Capital will have the option to defer the\npayment of interest
        from time to time on the NEE Capital Junior Subordinated Debentures for one
        or more periods. Interest would, however, continue to accrue on the NEE Capital
        Junior Subordinated Debentures. Unless otherwise provided in the related\nprospectus
        supplement, during any optional deferral period neither NEE nor NEE Capital
        may: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
