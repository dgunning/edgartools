        customers of, engage in transactions with or perform services for us in the
        ordinary course of business. Insofar as indemnification for liabilities arising
        under the U.S. Securities Act of 1933, as amended\n(the &#147;<B>U.S. Securities
        Act</B>&#148;) may be permitted to directors, officers and controlling persons
        of TRC, TR Finance or any of the Subsidiary Guarantors, such issuers have
