        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B><I>Your ability to enforce civil liabilities
        under U.S. federal securities laws may be adversely affected because\nTRC
        is organized under the laws of Canada, many of the directors and officers
        of TRC, TR Finance and the Subsidiary Guarantors and some experts named herein
        are residents of Canada, and a substantial portion of Thomson Reuters&#146;
        assets and\nassets of such persons are located outside the United States.
        </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">TRC is organized under the laws of the
        Province of Ontario, Canada. A\nsubstantial portion of Thomson Reuters&#146;
        assets are located outside the United States, and many of the directors and
        officers of TRC, TR Finance and the Subsidiary Guarantors and some of the
        experts named herein are residents of jurisdictions\noutside of the United
        States and the assets of such persons may be located outside of the United
        States. As a result, it may be difficult to effect service within the United
        States upon TRC and those directors, officers and experts, or to enforce\njudgments
        obtained in U.S. courts against us or such persons either inside or outside
        of the United States, or to enforce in U.S. courts judgments obtained against
        TRC or such persons in courts in jurisdictions outside the United States,
        in any\naction predicated upon the civil liability provisions of the federal
        securities laws of the United States. There is no certainty that civil liabilities
        predicated solely upon the federal securities laws of the United States can
        be enforced in\nCanada, whether by original action or by seeking to enforce
        a judgment of U.S. courts. In addition, punitive damages awards in actions
        brought in the United States or elsewhere may be unenforceable in Canada.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B><I>The
        terms of the Debt Securities may provide that they may be redeemed at our
        option under certain circumstances, which limits the ability of holders of
        the Debt\nSecurities to accrue interest over the full stated term of the Debt
        Securities. </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The terms of the Debt Securities may provide
        that we may, at\nour option and from time to time, redeem some or all of the
        Debt Securities issued hereunder prior to their maturity under certain circumstances.
        Holders should not expect us to redeem any Debt Securities on any particular
        date. If we redeem the\nDebt Securities for any reason, you will not have
        the opportunity to continue to accrue and be paid interest to the stated maturity
        date and you may not be able to reinvest the redemption proceeds you receive
        in a similar security or in securities\nbearing similar interest rates or
        yields. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
