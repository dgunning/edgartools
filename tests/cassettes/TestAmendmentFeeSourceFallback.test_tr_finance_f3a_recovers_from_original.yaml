        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\"><B>PART III </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\"><B>UNDERTAKING AND CONSENT
        TO\nSERVICE OF PROCESS </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\"><B>Item&#8201;1.</B><B><I> Undertaking</I></B><B>
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">The
        <FONT STYLE=\"white-space:nowrap\">F-10</FONT> Registrant undertakes to make
        available, in person or by telephone, representatives to respond to inquiries
        made by the\nCommission staff, and to furnish promptly, when requested to
        do&nbsp;so by the Commission staff, information relating to the securities
        registered pursuant to this <FONT STYLE=\"white-space:nowrap\">Form&nbsp;F-10</FONT>
        or to transactions in said\nsecurities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\"><B>Item&#8201;2.</B><B><I> Consent to
        Service of Process</I></B><B> </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">(a) Concurrently with the initial filing
        of this Registration Statement on Form <FONT STYLE=\"white-space:nowrap\">F-10,</FONT>
        the\n<FONT STYLE=\"white-space:nowrap\">F-10</FONT> Registrant filed with
        the Commission a written irrevocable consent and power of attorney on Form
        <FONT STYLE=\"white-space:nowrap\">F-X.</FONT> </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">(b) Concurrently with
        the initial filing of this Registration Statement on Form <FONT STYLE=\"white-space:nowrap\">F-10,</FONT>
        Computershare Trust Company of Canada, a <FONT\nSTYLE=\"white-space:nowrap\">non-U.S.</FONT>
        trustee under each of the indentures, filed with the Commission a written
        irrevocable consent and power of attorney on Form <FONT STYLE=\"white-space:nowrap\">F-X.</FONT>
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">(c)
        Any change to the name or address of the agent for service of the <FONT STYLE=\"white-space:nowrap\">F-10</FONT>
        Registrant or Computershare Trust Company of Canada,\nas a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        trustee, shall be communicated promptly to the Commission by amendment to
        Form <FONT STYLE=\"white-space:nowrap\">F-X</FONT> referencing the file number
        of this Registration Statement. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-10, III-1 </P>\n\n</DIV></Center>\n\n\n<p
