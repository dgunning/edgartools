        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The condensed consolidating summary financial
        information incorporated by reference in this prospectus\nhas been prepared
        in accordance with IFRS, as issued by the International Accounting Standards
        Board, and is unaudited. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\" ALIGN=\"center\"><B><A NAME=\"toc936318_10\"></A>USE
        OF PROCEEDS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Unless otherwise specified in a prospectus
        supplement that accompanies this prospectus, the net proceeds from the sale
        of the Debt Securities will be\nadded to our general funds, and we may use
        them for general corporate purposes including, without limitation, to repay
        existing indebtedness. We may invest funds that we do not immediately use
        in short-term marketable securities. We may from time to\ntime offer Debt
        Securities and incur additional indebtedness other than through an offering
        under this prospectus and any applicable prospectus supplements. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"
        ALIGN=\"center\"><B><A NAME=\"toc936318_11\"></A>SHARE CAPITAL </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">TRC&#146;s authorized share capital includes an unlimited
        number of common shares and an unlimited number of preference shares, without
        par value,\nissuable in series. As of March&nbsp;28, 2025, TRC had outstanding
        450,423,115 common shares and 6,000,000 Series II preference shares. TRC has
        also issued a Thomson Reuters Founders Share which enables Thomson Reuters
        Founders Share Company to\nexercise extraordinary voting power to safeguard
        the Thomson Reuters Trust Principles. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">TR Finance&#146;s authorized
        share capital includes 1,000\nshares. As of March&nbsp;28, 2025, TR Finance
        had one share outstanding which is indirectly held by TRC. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\" ALIGN=\"center\"><B><A
        NAME=\"toc936318_12\"></A>DESCRIPTION OF DEBT SECURITIES AND GUARANTEES </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">This section describes certain general terms and provisions
        of the Debt Securities. We will provide the particular terms and provisions
        of a series of\nDebt Securities and a description of how the general terms
        and provisions described below apply to that series in a prospectus supplement.
        Thus, for a description of the terms of a particular series of Debt Securities,
        you must refer to both the\napplicable prospectus supplement relating to that
        series and the description of the Debt Securities contained in this prospectus.
        </P>  <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">Unless\notherwise specified in a prospectus supplement,
        the TRC Debt Securities will be issued under a trust indenture to be entered
        into between TRC, the Subsidiary Guarantors, Computershare Trust Company of
        Canada and Deutsche Bank Trust Company Americas\n(as may be amended and/or
        supplemented from time to time, the &#147;<B>TRC Indenture</B>&#148;). Unless
        otherwise specified in a prospectus supplement, the TR Finance Debt Securities
        will be issued under a trust indenture dated as of March 20, 2025\nbetween
        TRC, TR Finance, the Subsidiary Guarantors, Computershare Trust Company of
        Canada and Deutsche Bank Trust Company Americas (as may be amended and/or
        supplemented from time to time, the &#147;<B>TR Finance Indenture</B>&#148;
        and together\nwith the TRC Indenture, the &#147;<B>Indentures</B>&#148;).
        An indenture is a contract between a financial institution, acting on your
        behalf as trustee of the Debt Securities, and us. We collectively refer to
        Computershare Trust Company of Canada\nand Deutsche Bank Trust Company Americas
        as the &#147;Trustees&#148; and each Trustee acting in such capacity for a
        specific series of Debt Securities as a &#147;Trustee.&#148; The Indentures
        are subject to the provisions of Trust Indenture\nLegislation. </P>  <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">The
        following description of the Debt Securities is a summary only. Please refer
        to the complete text of the provisions of the\nDebt Securities and each Indenture,
        including the definition of certain terms in the applicable Indenture. It
        is the respective Indenture, and not this summary, that governs the rights
        of Holders of Debt Securities. Capitalized terms that are used\nin this section
        and not defined have the meanings assigned to them in the applicable Indenture.
        We have defined selected terms at the end of this section. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">-&#8201;14&#8201;- </P>\n\n</DIV></Center>\n\n\n<p
