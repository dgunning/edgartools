        for the period of its appointment. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">We may agree to pay the
        underwriters a commission for various services relating to the issue and sale
        of the Debt Securities offered hereby. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">In connection with any
        offering of the Debt Securities, the underwriters or agents may over-allot
