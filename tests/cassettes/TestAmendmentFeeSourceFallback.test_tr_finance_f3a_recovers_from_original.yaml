        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">(iii)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:9pt; font-family:arial; \" ALIGN=\"left\">default in the deposit
        of any sinking fund or analogous payment when due by the terms of any Debt
        Security (if\napplicable); </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
