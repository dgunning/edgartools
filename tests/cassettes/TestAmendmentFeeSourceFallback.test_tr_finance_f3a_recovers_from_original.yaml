        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">We are members of the Bar of
        the State of Minnesota, and we have not considered, and do not express any\nopinion
        as to, the laws of any jurisdiction other than the State of Minnesota, and
        we do not express any opinion as to the effect of any other laws on the opinion
        stated herein. Without limiting the generality of the foregoing limitations
        (and\nwithout expanding in any way any of the opinions that are set forth
        in this letter), we express no opinion regarding the legality, validity, binding
        effect or enforceability of the Guarantees, any of the Debt Securities, or
        any other agreement or\ndocument. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">In rendering the opinions set
        forth below, we have examined originals or copies, certified or otherwise
        identified to our satisfaction, of\n(i)&nbsp;the articles of incorporation
        of the Company, as amended to date as in effect on the date hereof (the &#147;<U>Articles</U>&#148;),
        (ii) the bylaws of the Company, as amended to date and as in effect on the
        date hereof (the\n&#147;<U>Bylaws</U>,&#148; and, together with the Articles,
        the &#147;<U>Governing Documents</U>&#148;), (iii)&nbsp;the Indentures, (iv)&nbsp;a
        Certificate of Good Standing, dated March&nbsp;28, 2025, issued by the Office
        of the Minnesota Secretary\nof State in relation to the Company (the &#147;<U>Certificate
        of Good Standing</U>&#148;); and (v)&nbsp;resolutions of the Board of Directors
        of the Company related to the Indentures. We have also examined originals,
        or copies certified to our\nsatisfaction, of such corporate records of the
        Company and other instruments, certificates of public officials and representatives
        of the Company and other documents as we have deemed necessary as a basis
        for the opinions hereinafter expressed. In\nsuch examination, we have assumed
        the genuineness of all signatures, the authenticity of all documents submitted
        to us as originals and the conformity with the originals of all documents
        submitted to us as copies. As to certain facts material to\nthis opinion letter,
        we have relied without independent verification upon oral and written statements
        and representations of officers and other representatives of the Company.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">Based upon the foregoing, and subject to the additional assumptions
        and qualifications set forth below, we advise you that, in our opinion: </P>\n<P
