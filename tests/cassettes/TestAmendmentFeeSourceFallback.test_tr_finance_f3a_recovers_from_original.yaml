        applicable Debt Securities or unless such Debt Securities are secured equally
        and\nratably with, or prior to, the Debt secured by such mortgage or other
        encumbrance. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">In addition, the TR Finance Indenture provides
