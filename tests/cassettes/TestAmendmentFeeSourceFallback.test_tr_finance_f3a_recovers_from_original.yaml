        margin-bottom:0pt; font-size:9pt; font-family:arial\"><FONT COLOR=\"#dd2b00\">Legal
        Professionals</FONT></P> <P STYLE=\"font-size:12pt; margin-top:0pt; margin-bottom:0pt\">&nbsp;</P>\n<P
        STYLE=\"margin-top:0pt; margin-bottom:1pt; font-size:9pt; font-family:arial\">Serves
        law firms and governments with research and workflow products powered by leading-edge
