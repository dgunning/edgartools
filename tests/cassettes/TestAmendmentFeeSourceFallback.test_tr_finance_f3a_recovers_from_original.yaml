        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Payment of any installment of interest
        on Debt Securities will be made to the Person in whose name such\nDebt Security
        is registered at the close of business on the Regular Record Date for such
        interest. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Any Paying Agent outside the United States
        and\nany other Paying Agent in the United States initially designated by us
        for the Debt Securities may be established for each series of Debt Securities.
        We may at any time designate additional Paying Agents or rescind the designation
        of any Paying\nAgent or approve a change in the office through which any Paying
        Agent acts, except that we will be required to maintain a Paying Agent in
        each Place of Payment for such series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B>Resignation of Trustee </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">The
        Trustee may resign or be removed\nwith respect to one or more series of Debt
        Securities and a successor Trustee may be appointed to act with respect to
        such series. In the event that two or more persons are acting as Trustee with
        respect to different series of Debt Securities, each\nsuch Trustee shall be
        a Trustee of a trust under the applicable Indenture separate and apart from
        the trust administered by any other such Trustee, and any action described
        herein to be taken by the &#147;Trustee&#148; may then be taken by each such\nTrustee
        with respect to, and only with respect to, the one or more series of Debt
        Securities for which it is Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B>Book-Entry Delivery and Form </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">The Debt Securities of a series may be issued in whole
        or in part in the form of one or more Global Securities that will be deposited
        with, or on behalf\nof, a depositary for a series of Debt Securities. Global
        Securities may be issued in either temporary or permanent form. Unless otherwise
        provided for a series of Debt Securities, Debt Securities that are represented
        by a Global Security will be\nissued in denominations of US$1,000 and any
        integral multiple thereof or in such other denominations as may be provided
        for by the terms of the Debt Securities of any particular series, and will
        be issued in registered form only, without coupons.\nPayments of principal
        of (and premium, if any) and interest, if any, on any Debt Securities represented
        by a Global Security will be made by the Trustee to the depositary or its
        nominee. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>Governing Law </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Each
        Indenture and the Debt Securities will be\ngoverned by, and construed in accordance
        with, the laws of the State of New York. Each Indenture is subject to the
        provisions of the Trust Indenture Legislation and shall, to the extent applicable,
        be governed by such provisions. The exercise,\nperformance or discharge by
        Computershare Trust Company of Canada as Trustee of any of its rights, powers,
        duties, or responsibilities under each Indenture shall be construed in accordance
        with the laws of the Province of Ontario and the federal\nlaws of Canada applicable
        thereto. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>Agent for Service of Process </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Each
        Indenture provides that TRC has designated its subsidiary, Thomson Reuters
        Holdings Inc., as its authorized agent for service of process in any\nsuit,
        action or proceeding arising out of or relating to the applicable Indenture
        and the Debt Securities that may be instituted in any federal or state court
        located in the Borough of Manhattan, in the City of New York, or brought under
        United\nStates federal or state securities laws or brought by the Trustee,
        and TRC has irrevocably submitted to the jurisdiction of such courts. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Definitions
