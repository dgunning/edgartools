        Securities pursuant to the applicable Indenture, adding or evidencing the
        succession of a Guarantor Party or amending any covenant, right or power of
        such Subsidiary Guarantor under the applicable\nIndenture) may modify and
        amend each Indenture without the consent of any Holder under the relevant
        Indenture, for any of the following purposes: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
