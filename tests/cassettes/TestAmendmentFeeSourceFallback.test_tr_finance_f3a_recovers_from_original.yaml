        <P ALIGN=\"left\" STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial;
        font-size:9pt\">the Person formed by such consolidation or amalgamation or
        into which TR Finance is merged or the Person which acquires or\nleases TR
        Finance&#146;s properties and assets substantially as an entirety expressly
        assumes the obligations of TR Finance under the TR Finance Debt Securities
