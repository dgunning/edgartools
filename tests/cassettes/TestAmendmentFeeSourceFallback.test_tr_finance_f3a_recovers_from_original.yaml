        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">restrict
        our ability to transfer assets within Thomson Reuters; </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
