        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        margin-left:21%; font-size:10pt; font-family:arial\">\nearlier of the date
        such form of prospectus is first used after effectiveness or the date of the
        first contract of sale of securities in the offering described in the prospectus.
        As provided in\nRule 430B, for liability purposes of the issuer and any person
        that is at that date an underwriter, such date shall be deemed to be a new
        effective date of the registration statement relating to the securities in
        the registration statement to which\nthat prospectus relates, and the offering
        of such securities at that time shall be deemed to be the initial <I>bona
        fide</I> offering thereof. <I>Provided</I>, <I>however</I>, that no statement
        made in a registration statement or prospectus that is\npart of this Registration
        Statement or made in a document incorporated or deemed incorporated by reference
        into the registration statement or prospectus that is part of this Registration
        Statement will, as to a purchaser with a time of contract of\nsale prior to
        such effective date, supersede or modify any statement that was made in the
        registration statement or prospectus that was part of this Registration Statement
        or made in any such document immediately prior to such effective date; and\n</P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:11%; text-indent:7%;
        font-size:10pt; font-family:arial\">(6) That, for the purpose of determining
        liability of a <FONT STYLE=\"white-space:nowrap\">F-3</FONT> Registrant under
        the Securities\nAct to any purchaser in the initial distribution of the securities:
        each undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT> Registrant
        undertakes that in a primary offering of securities of such undersigned\n<FONT
        STYLE=\"white-space:nowrap\">F-3</FONT> Registrant pursuant to this Registration
        Statement, regardless of the underwriting method used to sell the securities
        to the purchaser, if the securities are offered or sold to such purchaser
        by means of\nany of the following communications, such undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant will be a seller to the purchaser and will be considered to offer
        or sell such securities to such purchaser: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:21%; font-size:10pt; font-family:arial\">(i)
        Any preliminary prospectus or prospectus of the undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant relating to the offering required\nto be filed pursuant to Rule
        424; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:21%; font-size:10pt;
        font-family:arial\">(ii) Any free writing prospectus relating to the offering
        prepared by or on behalf of such undersigned <FONT\nSTYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant or used or referred to by such undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:21%;
        font-size:10pt; font-family:arial\">(iii) The portion of any other free writing
        prospectus relating to the offering containing material information about
        such undersigned <FONT\nSTYLE=\"white-space:nowrap\">F-3</FONT> Registrant
        or its securities provided by or on behalf of such undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:21%;
        font-size:10pt; font-family:arial\">(iv) Any other communication that is an
        offer in the offering made by such undersigned <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant to the\npurchaser. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:5%; font-size:10pt; font-family:arial\">(b) The undersigned <FONT
        STYLE=\"white-space:nowrap\">F-3</FONT> Registrant hereby undertakes that,
        for purposes of determining any\nliability under the Securities Act, each
        filing of an annual report pursuant to Section&nbsp;13(a) or Section&nbsp;15(d)
        of the Exchange Act (and, where applicable, each filing of an employee benefit
        plan&#146;s annual report pursuant to\nSection&nbsp;15(d) of the Exchange
        Act) by or on behalf of the <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant that is incorporated by reference in this Registration Statement
        shall be deemed to be a new registration statement relating to the\nsecurities
        offered therein, and the offering of such securities at that time shall be
        deemed to be the initial <I>bona fide</I> offering thereof. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:5%; font-size:10pt; font-family:arial\">(c)
        Insofar as indemnification for liabilities arising under the Securities Act
        may be permitted to directors, officers and controlling persons of the <FONT\nSTYLE=\"white-space:nowrap\">F-3</FONT>
        Registrants pursuant to the foregoing provisions, or otherwise, such Registrants
        have been advised that, in the opinion of the Commission, such indemnification
        is against public policy as expressed in the\nSecurities Act and is, therefore,
        unenforceable. In the event that a claim for indemnification against such
        liabilities (other than the payment by the <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrants of expenses incurred or paid by a\ndirector, officer or controlling
        person of the <FONT STYLE=\"white-space:nowrap\">F-3</FONT> Registrants in
        the successful defense of any action, suit or proceeding) is asserted </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">F-3, II-10 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
