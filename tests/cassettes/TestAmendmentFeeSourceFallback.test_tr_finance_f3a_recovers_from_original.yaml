        Inc. (&#147;<U>TRTA</U>&#148;), a Texas corporation, and the Company (together
        with TRA and TRTA, the &#147;<U>Subsidiary Guarantors</U>&#148;). We have
        been\ninformed that the Registration Statement relates to the registration
        under the U.S. Securities Act of 1933, as amended (the &#147;<U>Securities
        Act</U>&#148;), of (i)&nbsp;debt securities to be issued by TRC (the &#147;<U>TRC
        Debt\nSecurities</U>&#148;), (ii)&nbsp;debt securities to be issued by TRF
        (the &#147;<U>TRF Debt Securities</U>,&#148; and, together with the TRC Debt
