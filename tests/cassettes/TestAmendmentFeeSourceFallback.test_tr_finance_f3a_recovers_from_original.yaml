        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">Insofar as indemnification for liabilities arising under
        the Securities Act of 1933, as amended (the &#147;Securities\nAct&#148;) may
        be permitted to directors, officers or persons controlling TR Finance, Thomson
        Reuters Applications, Thomson Reuters Tax&nbsp;&amp; Accounting or West Publishing
        (each, a <FONT STYLE=\"white-space:nowrap\">&#147;F-3</FONT>\nRegistrant&#148;
        and collectively, the <FONT STYLE=\"white-space:nowrap\">&#147;F-3</FONT>
        Registrants&#148;) pursuant to the applicable provisions described above,
        each <FONT STYLE=\"white-space:nowrap\">F-3</FONT> Registrant has been informed
        that in\nthe opinion of the U.S. Securities and Exchange Commission such indemnification
        is against public policy as expressed in the Securities Act and is therefore
