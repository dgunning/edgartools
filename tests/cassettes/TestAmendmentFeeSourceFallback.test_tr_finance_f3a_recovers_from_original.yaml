        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Our businesses are supported by a corporate
        center that manages our commercial and technology\noperations, including those
        around our sales capabilities, digital customer experience and product and
        content development, as well as our global facilities. Costs relating to these
        activities are allocated to our business segments. We also report\n&#147;Corporate
        costs&#148;, which includes expenses for centrally managed functions such
        as finance, legal and human resources. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">TRC is incorporated\nunder
        the OBCA. Its registered office and principal executive office is located
        at 19 Duncan Street, Toronto, Ontario M5H 3H1, Canada. TRC&#146;s shares are
        listed on the Toronto Stock Exchange and the Nasdaq (symbol: TRI). Our website
        is tr.com.\nInformation contained on our website does not constitute part
        of this prospectus. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>TR Finance </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">TR Finance is an indirect
        100% owned subsidiary of TRC formed under the laws of the State of Delaware.
        TR Finance is a financing vehicle for Thomson\nReuters. TR Finance has no
        independent operations, other than raising debt for use by Thomson Reuters,
        hedging such debt when appropriate and <FONT STYLE=\"white-space:nowrap\">on-lending</FONT>
        funds to companies in the Thomson Reuters group. TR\nFinance will lend substantially
        all net proceeds of its borrowings to companies in the Thomson Reuters group.
        TR Finance&#146;s head office is located at 2900 Ames Crossing Road, Suite
        100, Eagan, Minnesota 55121, United States. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Subsidiary Guarantors
        </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">West Publishing is an indirect\n100%-owned subsidiary
