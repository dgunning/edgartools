        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">We have assumed that the Company, at the time
        of entering into the TRC Indenture and at the time of the\nissuance of any
        Guarantees, will be a direct or indirect wholly owned subsidiary of TRC and
        will receive adequate and sufficient consideration therefor. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">This opinion is rendered as of the date hereof, and we disclaim
        any undertaking to advise you of any subsequent changes in the facts stated
        or assumed herein\nor any subsequent changes in applicable law that may come
        to our attention. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">We hereby consent to the filing of a copy of
        this opinion as an exhibit to\nthe Registration Statement and to the reference
        to us as local counsel under the heading &#147;Legal Matters&#148; in the
        base prospectus to be filed in relation to the Indentures. In addition, we
        consent to Torys LLP&#146;s reliance as to matters\nof Minnesota law upon
        this opinion letter in connection with the rendering of its opinion of even
        date herewith concerning the Guarantees, but only to the extent of the opinions
        specifically set forth herein. In giving these consents, we do not\nthereby
        admit that we are within the category of persons whose consent is required
        under Section&nbsp;7 of the Securities Act and the rules and regulations thereunder.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
