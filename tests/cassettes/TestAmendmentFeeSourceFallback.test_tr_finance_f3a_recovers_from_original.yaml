        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:arial; font-size:9pt\" BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD
        VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial;
        font-size:9pt\">\nhas been published by, the Internal Revenue Service a ruling
        or (y)&nbsp;since the date of the TR Finance Indenture, there has been a change
