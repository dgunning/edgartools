        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Thomson
        Reuters </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Thomson Reuters informs the way forward
        by\nbringing together the trusted content and technology that people and organizations
        need to make the right decisions. We serve professionals across legal, tax,
        audit, accounting, compliance, government, and media. Our products combine
        highly\nspecialized software and insights to empower professionals with the
        data, intelligence, and solutions needed to make informed decisions, and to
        help institutions in their pursuit of justice, truth and transparency. Reuters,
        part of Thomson Reuters,\nis a world leading provider of trusted journalism
        and news. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We derive most of our revenues from selling
        information and software solutions,\nprimarily on a recurring subscription
        basis. Our solutions blend deep domain knowledge with software and automation
        tools. We believe our workflow solutions make our customers more productive
        by streamlining how they operate, enabling them to focus\non higher value
        activities. Many of our customers use our solutions as part of their workflows,
        which has led to strong customer retention. We believe that our customers
        trust us because of our history and dependability and our deep understanding
        of\ntheir businesses and industries, and they rely on our services for navigating
        a rapidly changing and increasingly complex digital world. Over the years,
        our business model has proven to be capital efficient and cash flow generative,
        and it has\nenabled us to maintain leading and scalable positions in our chosen
        market segments. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We are organized in five reportable segments
