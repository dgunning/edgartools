        </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">Ladies and Gentlemen: </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">We have acted
