        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Merger,
        Consolidation or Amalgamation </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
