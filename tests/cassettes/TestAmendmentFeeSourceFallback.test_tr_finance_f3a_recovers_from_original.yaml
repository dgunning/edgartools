        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">There
        can be no assurance as to what standard a court would apply in making such
        determinations or that a court would agree with TR Finance or any\nGuarantor&#146;s
        conclusions in this regard. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B><I>Canadian bankruptcy and insolvency
        laws may impair the ability of the trustees appointed under the Indentures
        to\nenforce certain remedies. </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">TRC is organized under
        the laws of the Province of Ontario, Canada, and a portion of its assets are
        located in\nCanada. The rights of the trustees appointed under the Indentures
        to enforce certain remedies could be delayed by the restructuring provisions
        of applicable Canadian federal bankruptcy, insolvency and other restructuring
        legislation if the benefit\nof such legislation is sought with respect to
        TRC. For example, both the <I>Bankruptcy and Insolvency Act</I> (Canada) and
        the <I>Companies&#146; Creditors Arrangement Act</I> (Canada) contain provisions
        enabling an insolvent person to obtain a stay\nof proceedings against its
        creditors and to file a proposal or plan of compromise or arrangement to be
        voted on by the various classes of its affected creditors. A restructuring
        proposal, compromise or arrangement if accepted by the requisite\nmajorities
        of each affected class of creditors, and if approved by the relevant Canadian
        court, would be binding on all creditors within each affected class, including
        those creditors that did not vote to accept the proposal, compromise or\narrangement.
        Moreover, this legislation, in certain instances, permits the insolvent debtor
        to retain possession and administration of its property, subject to court
        oversight, even though it may be in default under the applicable debt instrument,\nduring
        the period that the stay against proceedings remains in place. </P> <P STYLE=\"font-size:12pt;
