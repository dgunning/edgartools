        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial;
        font-size:9pt\" BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR
        style = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"4%\"
        VALIGN=\"top\" ALIGN=\"left\">(vii)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:9pt; font-family:arial;
        \" ALIGN=\"left\">any guarantee of an applicable Guarantor ceasing to be,
        or asserting by any applicable Guarantor as not being, in full\nforce and
        effect, enforceable according to its terms, except to the extent contemplated
        by the applicable Indenture, including without limitation the release of any
        guarantee in accordance with the terms of such Indenture. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">No Event of Default provided with respect to a particular
        series of Debt Securities necessarily constitutes an Event of Default with
        respect to any other\nseries of Debt Securities. We are required to file with
        the Trustee, annually, an Officer&#146;s Certificate as to our compliance
        with all conditions and covenants under each Indenture. Each Indenture provides
        that the Trustee may withhold notice to\nthe Holders of Debt Securities of
        any default (except payment defaults on the Debt Securities) if it is determined,
        in accordance with the applicable Indenture, to be in the best interest of
        the Holders of Debt Securities to do so. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">If an
        Event of Default listed in clause (i), (ii), (iii), (iv), (vi) or (vii)&nbsp;of
        the second preceding paragraph occurs and is continuing, the\nTrustee or the
        Holders of not less than 25% in principal amount of Outstanding Debt Securities
        of that series may declare the Outstanding Debt Securities of that series
        due and payable immediately. If an Event of Default listed in clause (v)&nbsp;of\nthe
        second preceding paragraph occurs and is continuing, then the Trustee or the
        Holders of not less than 25% in principal amount of all Debt Securities then
        Outstanding under the applicable Indenture may declare the principal amount
        of all of the\nOutstanding Debt Securities under that Indenture to be due
        and payable immediately. However, in either case the Holders of a majority
        in principal amount of the Outstanding Debt Securities of that series, or
        of all Outstanding Debt Securities under\nthe applicable Indenture, as the
        case may be, by written notice to us, the applicable Guarantor Parties and
        the Trustee, may, under certain circumstances, rescind and annul such declaration.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">Subject to the provisions relating to the duties of the
        Trustee, in case an Event of Default with respect to Debt Securities of any
        or all series occurs\nand is continuing, the Trustee shall be under no obligation
        to exercise any of its rights or powers under the applicable Indenture at
        the request, order or direction of any of the Holders of such Debt Securities,
        unless such Holders shall have\noffered to the Trustee reasonable indemnity,
        security and funding (as required under the applicable Indenture) against
        the expenses and liabilities which might be incurred by it in compliance with
        such request. Subject to such provisions for the\nindemnification and funding
        of the Trustee, the Holders of not less than a majority in principal amount
        of the Outstanding Debt Securities of any series (with respect to any remedy,
        trust or power relating to or arising under an Event of Default\ndescribed
        in clause (i), (ii), (iii), (iv), (vi) or (vii)&nbsp;above) or the Holders
        of not less than a majority in principal amount of all Outstanding Debt Securities
        (with respect to any remedy, trust or power relating to or arising under an
        Event\nof Default described in clause (v)&nbsp;above), as the case may be
        and in each case under the applicable Indenture, shall have the right to direct
        the time, method and place of conducting any proceeding for any remedy available
        to the Trustee under\nthe applicable Indenture, or exercising any trust or
        power conferred on the Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">The Holders of not less
        than a majority in principal amount of\nthe Outstanding Debt Securities of
        any series under the applicable Indenture may on behalf of the Holders of
        all the Debt Securities of such series waive any past default described in
        clause (i), (ii), (iii), (iv), (vi) or (vii)&nbsp;above (or, in\nthe case
        of a default described in clause (v)&nbsp;above, the Holders of not less than
        a majority in principal amount of all Outstanding Debt Securities under the
        applicable Indenture may waive any such past default) and its consequences,
        except a\ndefault (a)&nbsp;in the payment of the principal of (or premium,
        if any) or any interest on any Debt Security, or (b)&nbsp;in respect of a
        covenant or provision that cannot be modified or amended without the consent
        of the Holder of each Outstanding\nDebt Security of such series affected thereby,
        in each case under the applicable Indenture. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Modification and
        Waiver </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We and the Trustee (and any applicable
        Subsidiary Guarantor, solely in the case of supplemental indentures amending
        any covenant, right or power of such\nSubsidiary Guarantor under the applicable
        Indenture) may modify and amend each Indenture with the consent of the Holders
        of not less than a majority in principal amount of all Outstanding Debt Securities
        under the applicable Indenture that are\naffected by such modification or
        amendment; provided that no such modification or amendment may, without the
        consent of the Holder of each Outstanding Debt Security affected thereby,
        among other things: </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
