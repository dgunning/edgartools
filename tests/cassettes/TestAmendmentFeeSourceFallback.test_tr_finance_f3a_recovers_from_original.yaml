        Debt Securities thereunder, and a form of which is being filed as an exhibit
        to the\nRegistration Statement (the &#147;<U>TRC Indenture</U>&#148; ), among
        TRC, as issuer, the Subsidiary Guarantors, as guarantors, and Computershare
        Trust Company of Canada and Deutsche Bank Trust Company Americas, as trustees
        (together, the\n&#147;<U>Trustees</U>&#148;), with the specific terms of each
        issuance of TRC Debt Securities to be set forth in one or more board resolutions,
        officer&#146;s certificates and/or supplemental indentures to the TRC Indenture
        (each, a &#147;<U>TRC\nSupplemental Indenture</U>&#148;); (b) debt securities
        to be issued by TR Finance (the &#147;<U>TR Finance Debt Securities</U>&#148;
        and together with the </P>\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">\nTRC Debt Securities, the &#147;<U>Debt Securities</U>&#148;)
        and fully and unconditionally guaranteed by TRC, as parent guarantor, and
        guaranteed initially by each of the Subsidiary Guarantors,\nto be issued pursuant
        to an indenture dated as of March&nbsp;20, 2025, by and among TR Finance,
        as the issuer, TRC and the Subsidiary Guarantors, as guarantors, and the Trustees,
        as trustees (the &#147;<U>TR Finance Indenture</U>&#148; and together\nwith
        the TRC Indenture, the &#147;<U>Indentures</U>&#148;), which is being filed
        as an exhibit to the Registration Statement, with the specific terms of each
        issuance of TR Finance Debt Securities to be set forth in one or more board
        resolutions,\nofficer&#146;s certificates and/or supplemental indentures to
        the TR Finance Indenture (each, a &#147;<U>TR Finance Supplemental Indenture</U>&#148;
        and together with the TRC Supplemental Indentures, the (&#147;<U>Supplemental
        Indentures</U>&#148;);\n(c)&nbsp;guarantees (the &#147;<U>TR Finance Guarantees</U>&#148;)
        of the TR Finance Debt Securities by TRC and the Subsidiary Guarantors as
        provided for in the TR Finance Indenture; and (d)&nbsp;guarantees by the Subsidiary
        Guarantors (the\n&#147;<U>TRC Guarantees</U>&#148; and together with the TR
        Finance Guarantees, the &#147;<U>Guarantees</U>&#148;) of the TRC Debt Securities
        as provided for in the TRC Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We, as your
        counsel, have examined originals or copies of such documents, corporate records,
        certificates of public officials and other\ninstruments as we have deemed
        necessary or advisable for the purpose of rendering this opinion. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In rendering the opinions expressed\nherein,
        we have, without independent inquiry or investigation, assumed that (i)&nbsp;all
        documents submitted to us as originals are authentic and complete, (ii)&nbsp;all
        documents submitted to us as copies conform to authentic, complete originals,\n(iii)&nbsp;all
        documents filed as exhibits to the Registration Statement that have not been
        executed will conform to the forms thereof when executed and delivered by
        the parties thereto, (iv)&nbsp;all signatures on all documents that we reviewed
        are\ngenuine, (v)&nbsp;all natural persons executing documents had and have
        the legal capacity to do so, (vi)&nbsp;all statements in certificates of public
        officials and directors or managers, as the case may be, and officers of the
        Registrants that we\nreviewed were and are accurate, (vii)&nbsp;all representations
        made by the Registrants as to matters of fact in the documents that we reviewed
        were and are accurate, and (viii)&nbsp;the Indentures, each of the Supplemental
        Indentures and the\nGuarantees have been duly authorized by each of the parties
        thereto (other than TRC, TR Finance and TR Applications). We have also assumed
        that each of TR T&amp;A and West Publishing is validly existing, has the requisite
        power to enter into any\nIndenture or Supplemental Indenture and has duly
        authorized entering into any Indenture or Supplemental Indenture under the
        laws of Texas and Minnesota, respectively. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Based
        upon the foregoing, and subject to the additional assumptions and qualifications
        set forth below, we advise you that, in our opinion,\nassuming the Indentures
        and the relevant Supplemental Indenture(s)&nbsp;have been duly authorized
        by the Trustees, and when (i)&nbsp;the TRC Indenture and the relevant Supplemental
        Indenture(s)&nbsp;to the applicable Indenture have been executed and\ndelivered
        by the applicable Registrants and the Trustees; (ii)&nbsp;the specific terms
        of a particular series of Debt Securities and the related Guarantees have
        been duly authorized and established in accordance with the applicable Indenture
        and the\nrelevant Supplemental Indenture(s); and (iii)&nbsp;such Debt Securities
        and Guarantees have been duly authorized, executed, authenticated, issued
        and delivered in accordance with the applicable Indenture, the applicable
        Supplemental\nIndenture(s)&nbsp;and the applicable underwriting or other agreement
        against payment therefor, such Debt Securities will constitute valid and binding
        obligations of TR Finance or TRC, as applicable, and the Guarantees thereof
        will constitute valid\nand binding obligations of TRC (in the case of the
        TR Finance Debt Securities) and the Subsidiary Guarantors, in each case enforceable
        in accordance with their terms, and in each case subject to applicable bankruptcy,
        insolvency and similar laws\naffecting creditors&#146; rights generally, concepts
        of reasonableness and equitable principles of general applicability, provided
        that we express no opinion as to (x)&nbsp;the enforceability of any waiver
        of rights under any usury or stay law, or\nany provisions for indemnity or
        contribution or other provisions that may be limited by public policy considerations;
        or (y)&nbsp;the effect of any applicable bankruptcy, insolvency, moratorium,
        arrangement or\n<FONT STYLE=\"white-space:nowrap\">winding-up</FONT> laws,
        or fraudulent conveyance, fraudulent transfer or similar provision of applicable
        law on the conclusions expressed above. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        connection with the opinion expressed above, we have assumed that (i)&nbsp;the
        Registration Statement and any supplements and amendments\nthereto (including
        post-effective amendments) shall have become effective under the Securities
        Act and such effectiveness shall not have been terminated or rescinded and
        (ii)&nbsp;an appropriate prospectus supplement with respect to the Debt\nSecurities
        and the applicable Guarantees thereof will have been prepared, delivered and
        filed in compliance with the Securities Act and the applicable rules and regulations
        thereunder. </P>\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Further, we have assumed that, at or prior to
        the time of the delivery of any Debt\nSecurities and/or the related Guarantees,
        (i)&nbsp;all corporate or other action required to be taken by the Registrants
        to duly authorize each proposed issuance of the Debt Securities and, if applicable,
        the Guarantees thereof shall have been\ntaken, and shall remain in full force
        and effect; (ii)&nbsp;the applicable Indenture, Supplemental Indenture(s)&nbsp;and
        Debt Securities and Guarantees thereof are each valid, binding and enforceable
        agreements of each party thereto (other than as\nexpressly covered above in
        respect of the Registrants); and (iii)&nbsp;there shall not have occurred
        any change in law affecting the validity or enforceability of the applicable
        Indenture, Supplemental Indenture(s), Debt Securities and Guarantees.\nWe
        have also assumed that the execution, delivery and performance by the Registrants
        of the Indentures, the Supplemental Indentures, and any Debt Securities or
        Guarantees, as applicable, whose terms are established subsequent to the date
        hereof\n(a)&nbsp;require no action by or in respect of, or filing with, any
        governmental body, agency or official and (b)&nbsp;do not contravene, or constitute
        a default under, any provision of applicable law or regulation or any judgment,
        injunction, order\nor decree or any agreement or other instrument binding
        upon any of the Registrants. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We are qualified
        to practice law in the Province of\nOntario and the State of New York, and
        we do not express any opinion with respect to the laws of any jurisdiction
        other than (a)&nbsp;the laws of the Province of Ontario (and the federal laws
        of Canada applicable therein), (b)&nbsp;the laws of the\nState of New York,
        (c)&nbsp;the Limited Liability Company Act of the State of Delaware (the &#147;<U>DLLCA</U>&#148;)
        and (d)&nbsp;the General Corporation Law of the State of Delaware (the &#147;<U>DGCL</U>&#148;),
        in each case, in force at the date\nof this opinion letter.&nbsp;Notwithstanding
        the foregoing and our opinion above, we express no opinion with respect to
        the compliance or <FONT STYLE=\"white-space:nowrap\">non-compliance</FONT>
        with applicable privacy laws in connection with the\nIndentures, any Supplemental
        Indenture(s)&nbsp;or the issuance and sale of any Debt Securities or Guarantees.
        All opinions expressed in this letter concerning the laws of the Province
        of Ontario (and the federal laws of Canada applicable therein)\nhave been
        given by members of the Law Society of Ontario and all opinions expressed
        in this letter concerning the laws of New York, the DLLCA and the DGCL have
        been given by members of the Bar of the State of New York. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        hereby consent to the filing of this opinion letter as an exhibit to the Registration
        Statement referred to above and further consent to\nthe reference to our name
        under the caption &#147;Legal Matters&#148; in the prospectus, which is a
        part of the Registration Statement. In giving this consent, we do not admit
        that we are in the category of persons whose consent is required under\nSection&nbsp;7
        of the Securities Act. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">Very truly yours, </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\">/s/ Torys
        LLP </P>\n</DIV></Center>\n\n</BODY></HTML>\n</TEXT>\n</DOCUMENT>\n<DOCUMENT>\n<TYPE>EX-5.3\n<SEQUENCE>3\n<FILENAME>d936318dex53.htm\n<DESCRIPTION>EX-5.3\n<TEXT>\n<HTML><HEAD>\n<TITLE>EX-5.3</TITLE>\n</HEAD>\n
