        thereto (the &#147;<U>Subsidiary\nGuarantors</U>&#148;), of a Registration
        Statement on Forms <FONT STYLE=\"white-space:nowrap\">F-10</FONT> and <FONT
        STYLE=\"white-space:nowrap\">F-3</FONT> (Registration Nos. <FONT STYLE=\"white-space:nowrap\">333-285907,</FONT>
        <FONT\nSTYLE=\"white-space:nowrap\">333-285927,</FONT> <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">333-285927-01,</FONT></FONT> <FONT STYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">333-285927-02</FONT></FONT> and <FONT\nSTYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">333-285927-03)</FONT></FONT> originally filed
        on March&nbsp;19, 2025 with the U.S. Securities and Exchange Commission (the
        &#147;<U>SEC</U>&#148;) under the Securities Act of 1933, as\namended, and
        subsequently amended on the date hereof (such Registration Statement, as so
        amended, the &#147;<U>Registration Statement</U>&#148;), relating to the registration
        of (i)&nbsp;debt securities to be issued by TRC (the &#147;<U>TRC Debt\nSecurities</U>&#148;),
        (ii) debt securities to be issued by TRF (the &#147;<U>TRF Debt Securities</U>,&#148;
        and, together with the TRC Debt Securities, the &#147;<U>Debt Securities</U>&#148;),
        and (iii)&nbsp;guarantees of the Debt Securities by the\nCompany (the &#147;<U>Guarantees</U>&#148;),
        the other Subsidiary Guarantors and (solely with respect to the TRF Debt Securities)
        TRC, to be issued pursuant to: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">(a) &#8195;an
        indenture to be entered into in connection with the issuance of the TRC Debt
        Securities (the &#147;<U>TRC Base\nIndenture</U>&#148;) among TRC as issuer,
        TR Finance, the Subsidiary Guarantors, and Computershare Trust Company of
        Canada and Deutsche Bank Trust Company Americas, as <FONT STYLE=\"white-space:nowrap\">co-trustees</FONT>
        (the\n&#147;<U>Trustees</U>&#148;), a form of which is filed as Exhibit 7.1
        to the Registration Statement, and </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">(b) &#8195;an
        indenture dated as\nof March&nbsp;20, 2025, entered into in connection with
        the issuance of the TRF Debt Securities thereunder (the &#147;TR Finance Base
        Indenture&#148;, and together with the TRC Base Indenture, collectively the
        &#147;Indentures&#148;) among TR\nFinance as issuer, TRC, the Subsidiary Guarantors,
        and the Trustees , which is filed as Exhibit 7.2 to the Registration Statement.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In\nconnection with this opinion letter, we
        have examined the forms of the Indentures. We have also examined originals
        or copies of such other records of the Company, certificates and web sites
        of </P>\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">Thomson Reuters Corporation </P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">March&nbsp;31, 2025 </P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"> Page\n 2\n </P> <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P>\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">public officials and of officers
        or other representatives of the Company and agreements and other documents\nas
        we have deemed necessary, subject to the assumptions set forth below, as a
        basis for the opinions expressed below. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In rendering
        the\nopinions expressed below, we have assumed: </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:4%; font-size:10pt; font-family:Times
        New Roman\">(i)&#8195;The genuineness of all signatures (whether manual, electronic
        or\notherwise) and, to the extent that a signature on a document is manifested
        by electronic or similar means, such signature has been executed or adopted
        by a signatory with an intent to authenticate and sign the document. </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">(ii)&#8195;The authenticity
        of the originals of the documents submitted to us. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:4%; font-size:10pt; font-family:Times
        New Roman\">(iii)&#8195;The conformity to authentic originals of any documents
        submitted to us as copies. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:4%; font-size:10pt; font-family:Times New Roman\">(iv)&#8195;As
        to matters of fact, the truthfulness of the representations made or otherwise
        incorporated in each Indenture and\nrepresentations and statements made in
        certificates or web sites of public officials and officers or other representatives
        of the Company. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">(v)&#8195;That,
        with respect to the Company, each person who has taken any action relevant
        to any of our opinions in the\ncapacity of director, officer, manager, member,
        or partner was duly elected or appointed to or otherwise occupied that director,
        officer, manager, member, or partner position and held that position when
        such action was taken, and, if other than an\nindividual and other than the
        Company, was duly organized and existing when such action was taken, and had
        the power and authority to take such action, all necessary action has been
        taken to authorize such action, and such action has been validly\neffected.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have not independently established the validity
        of the foregoing assumptions. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Based upon the
        foregoing, and subject to the qualifications and limitations herein set forth,
        we are of the opinion that: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">1.&#8195;Based
        solely on a Certificate of Fact dated March&nbsp;28, 2025 of the Secretary
        of State of the State of Texas and a review on such\ndate of the web site
        of the Comptroller of Public Accounts of the State of Texas, the Company is
        a corporation that is validly existing and its authority to transact business
        is active under the laws of the State of Texas. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">2.&#8195;The
        Company (a)&nbsp;has the corporate power to execute, deliver and perform each
        Indenture and (b)&nbsp;has taken all corporate\naction necessary to authorize
        each Indenture. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">3.&#8195;The execution and delivery
        by the Company of each Indenture does not, and the\nclosing of the transactions
        contemplated thereby will not: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:4%; font-size:10pt; font-family:Times New Roman\">(a)&nbsp;&#8195;violate
        the articles of incorporation or bylaws\nof the Company, or </P>\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">Thomson Reuters Corporation
        </P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">March&nbsp;31, 2025 </P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"> Page\n 3\n </P> <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P>\n <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:4%; font-size:10pt; font-family:Times New Roman\">(b)
        &#8195;result in a violation by the Company of the Texas Business\nOrganizations
        Code. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The opinions set forth above
        are limited to the Texas Business Organizations Code (including all applicable\nprovisions
        of the constitution of the State of Texas and reported judicial decisions
        interpreting such Code), and we do not express any opinion herein concerning
        any other laws.<B> </B> </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This opinion
        letter is rendered in connection with your filing of the Registration Statement.
        We hereby consent to the filing of this opinion\nletter as an exhibit to the
        Registration Statement and to the reference to us as local counsel under the
        heading &#147;Legal Matters&#148; in the base prospectus to be filed in relation
        to the Indentures. In addition, we consent to Torys LLP&#146;s\nreliance as
        to matters of Texas law upon this opinion letter in connection with the rendering
        of its opinion of even date herewith concerning the Guarantees, but only to
        the extent of the opinions specifically set forth herein. Our consent, however,\nshall
        not constitute an admission to our being experts as provided for in Sections
        7 and 11 of the Securities Act. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This opinion
        letter\nhas been prepared, and is to be understood, in accordance with customary
        practice of lawyers who regularly give and lawyers who regularly advise recipients
        regarding opinions of this kind, is limited to the matters expressly stated
        herein and is\nprovided solely for purposes of complying with the requirements
        of the Registration Statement, and no opinions may be inferred or implied
        beyond the matters expressly stated herein. The opinions expressed herein
        are rendered and speak only as of the\ndate hereof and we specifically disclaim
        any responsibility to update such opinions subsequent to the date hereof or
        to advise you of subsequent developments affecting such opinions. We note
        that we only represent the Company with respect to\nspecific transactions,
        and with respect to the Registration Statement solely for the purpose of preparing
        this opinion letter, and we are not general outside counsel for the Company
        and its affiliates. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Notwithstanding anything to
        the contrary herein, the recipient hereof, by acceptance of this opinion letter,
        acknowledges and agrees that\n(i)&nbsp;any claim in connection with this opinion
        letter and the opinions expressed herein shall be asserted against Holland&nbsp;&amp;
        Knight LLP, as the signer of this opinion letter and shall not be asserted
        against any of its partners,\nattorneys, or other employees, and (ii)&nbsp;with
        respect to any of the affairs of the Company, including, without limitation,
        the transactions contemplated by the Indenture, the recipient has not looked
        to or relied upon any representation,\nwarranty, statement or information
        provided by Holland&nbsp;&amp; Knight LLP, whether orally or in writing, except
        as expressly set forth in this opinion letter with and subject to the assumptions
        and qualifications set forth herein. </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><DIV
