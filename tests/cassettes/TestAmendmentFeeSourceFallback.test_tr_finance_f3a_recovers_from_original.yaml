        margin-bottom:0pt; font-size:10pt; font-family:arial\"><B>Item&#8201;10.&#8195;UNDERTAKINGS
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:5%; font-size:10pt;
        font-family:arial\">(a)&#8195;Each of the\nundersigned <FONT STYLE=\"white-space:nowrap\">F-3&nbsp;Registrants</FONT>
        hereby undertakes: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:11%;
        text-indent:7%; font-size:10pt; font-family:arial\">(1)&#8195;To file, during
        any period in\nwhich offers or sales are being made, a post-effective amendment
        to this Registration Statement: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:21%; font-size:10pt; font-family:arial\">(i)&nbsp;To include any
        prospectus required by\nSection&nbsp;10(a)(3) of the Securities&nbsp;Act;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:21%; font-size:10pt;
        font-family:arial\">(ii)&nbsp;To reflect in the prospectus any facts or events
        arising after the effective date of\nthis Registration Statement (or&nbsp;the
        most recent post-effective amendment thereof) which, individually or in the
        aggregate, represent a fundamental change in the information set forth in
        this Registration Statement. Notwithstanding the\nforegoing, any increase
        or decrease in the volume of securities offered (if&nbsp;the total dollar
        value of securities offered would not </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-3, II-8 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        margin-left:21%; font-size:10pt; font-family:arial\">\nexceed that which was
        registered) and any deviation from the low or high end of the estimated maximum
        offering range may be reflected in the form of prospectus filed with the Commission,
        pursuant\nto Rule&nbsp;424(b) if, in the aggregate, the changes in volume
        and price represent no more than a 20% change in the maximum aggregate offering
        price set forth in the &#147;Calculation of Registration Fee&#148; table in
        the effective registration\nstatement;&nbsp;and </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:21%; font-size:10pt; font-family:arial\">(iii)&nbsp;To
        include any material information with respect to the plan of distribution
        not previously disclosed in this\nRegistration Statement or any material change
        to such information in this Registration Statement; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:11%; font-size:10pt; font-family:arial\">provided,
        however, that the undertakings set\nforth in paragraphs&nbsp;(a)(1)(i), (a)(1)(ii)
        and&nbsp;(a)(1)(iii) of this section do not apply if the information required
        to be included in a post-effective amendment by those paragraphs is contained
        in reports filed with or furnished to the\nCommission by or on behalf of the
        <FONT STYLE=\"white-space:nowrap\">F-3&nbsp;Registrant</FONT> pursuant to
        Section&nbsp;13 or Section&nbsp;15(d) of the U.S.&nbsp;Securities Exchange
        Act of 1934, as amended (the&nbsp;&#147;Exchange Act&#148;), that\nare incorporated
        by reference in this Registration Statement, or is contained in a form of
        prospectus filed pursuant to Rule&nbsp;424(b) that is part of this Registration
        Statement. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:11%;
        text-indent:7%; font-size:10pt; font-family:arial\">(2) That, for the purpose
        of determining any liability under the Securities Act, each such post-effective
        amendment shall be deemed to\nbe a new registration statement relating to
        the securities offered therein, and the offering of such securities at that
        time shall be deemed to be the initial <I>bona fide</I> offering thereof.
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:11%; text-indent:7%;
        font-size:10pt; font-family:arial\">(3) To remove from registration by means
        of a post-effective amendment any of the securities being registered which
        remain unsold at the\ntermination of the offering. </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:11%; text-indent:7%; font-size:10pt; font-family:arial\">(4)
        To file a post-effective amendment to this Registration Statement to include
        any financial\nstatements required by Item 8.A of Form <FONT STYLE=\"white-space:nowrap\">20-F</FONT>
        at the start of any delayed offering or throughout a continuous offering.
        Financial statements and information otherwise required by Section&nbsp;10(a)(3)
        of the\nSecurities Act need not be furnished, provided that the registrant
        includes in the prospectus, by means of a post-effective amendment, financial
        statements required pursuant to this paragraph (a)(4) and other information
        necessary to ensure that all\nother information in the prospectus is at least
        as current as the date of those financial statements. Notwithstanding the
        foregoing, with respect to registration statements on Form <FONT STYLE=\"white-space:nowrap\">F-3,</FONT>
        a post-effective\namendment need not be filed to include financial statements
        and information required by Section&nbsp;10(a)(3) of the Securities Act or
        Item 8.A of Form <FONT STYLE=\"white-space:nowrap\">20-F</FONT> if such financial
        statements and information are\ncontained in periodic reports filed with or
        furnished to the Commission by the registrant pursuant to section 13 or section
        15(d) of the Exchange Act that are incorporated by reference in the Form <FONT
        STYLE=\"white-space:nowrap\">F-3.</FONT> </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:11%; text-indent:7%; font-size:10pt; font-family:arial\">(5)
        That for the purpose of determining liability under the Securities Act to
        any purchaser: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:21%;
        font-size:10pt; font-family:arial\">(i) Each prospectus filed by a <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrant pursuant to Rule 424(b)(3) shall be deemed to be part of this\nRegistration
        Statement as of the date the filed prospectus was deemed part of and included
        in this Registration Statement; and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:21%; font-size:10pt; font-family:arial\">(ii) Each prospectus\nrequired
        to be filed pursuant to Rule 424(b)(2), (b)(5), or (b)(7) as part of a registration
        statement in reliance on Rule 430B relating to an offering made pursuant to
        Rule 415(a)(1)(i), (vii), or (x)&nbsp;for the purpose of providing the\ninformation
        required by Section&nbsp;10(a) of the Securities Act shall be deemed to be
        part of and included in this Registration Statement as of the </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-3, II-9 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
