        by it is against public policy as expressed in the U.S. Securities Act\nand
        will be governed by the final adjudication of such issue. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Each
        series of the Debt Securities will be a new issue of securities with no\nestablished
