        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; margin-left:5%;
        font-size:9pt; font-family:arial\">Notwithstanding the foregoing, any Subsidiary
        of TRC may consolidate with, merge into or transfer all\nor a portion of its
        properties or assets to TR Finance. </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">In
        addition, no such amalgamation, consolidation, merger or transfer may be made
        if, as a result thereof, any of TR\nFinance&#146;s property or assets would
        become subject to any mortgage or other encumbrance securing Debt, unless
        such mortgage or other encumbrance could be created without equally and ratably
        securing the TR Finance Debt Securities or unless the\nTR Finance Debt Securities
        are secured equally and ratably with, or prior to, the Debt secured by such
        mortgage or other encumbrance. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Discharge, Defeasance
        and Covenant Defeasance </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">We may\ndischarge certain
        obligations to Holders of any series of Debt Securities issued under either
        Indenture which have not already been delivered to the Trustee for cancellation
        and which have either become due and payable or are by their terms due and\npayable
        within one year (or scheduled for redemption within one year) by irrevocably
        depositing with the Trustee trust funds in an amount sufficient to pay the
        entire indebtedness on such Debt Securities for principal (and premium, if
        any) and\ninterest to the date of such deposit (if such Debt Securities have
        become due and payable) or to the Stated Maturity or Redemption Date, as the
        case may be. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We may, at our option and at any time,
        elect to have TRC&#146;s or TR Finance&#146;s, as the applicable issuer, and
        each applicable Guarantor\nParty&#146;s obligations discharged with respect
        to the Outstanding Debt Securities of or within any series, which we refer
        to as defeasance. Defeasance means that we shall be deemed to have paid and
        discharged the entire indebtedness represented by\nsuch Outstanding Debt Securities
        and to have satisfied our other obligations under the applicable Indenture
        with respect to such Debt Securities, except for: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        rights of Holders of such Outstanding Debt Securities to receive solely from
        the trust fund described below payments in\nrespect of the principal of (and
        premium, if any) and interest on such Debt Securities when such payments are
        due; </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">our
        obligations with respect to such Debt Securities relating to the issuance
        of temporary securities, the registration,\ntransfer and exchange of the Debt
        Securities, the replacement of mutilated, destroyed, lost or stolen Debt Securities,
        the maintenance of an office or agency in the applicable Place of Payment,
        the holding of money for security payments in trust and\nwith respect to the
        payment of Additional Amounts, if any, pursuant to the applicable Indenture;
        </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        rights, powers, trusts, duties and immunities of the Trustee; and </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        defeasance provisions of the applicable Indenture. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">We may, at our option and at any time, elect to be released
        from our obligations with respect to certain covenants that are described
        in either Indenture\n(including those described under &#147;Merger, Consolidation
        or Amalgamation&#148;), and we refer to this as &#147;covenant defeasance,&#148;
        and any omission to comply with such obligations thereafter shall not constitute
        a default or an Event of\nDefault with respect to such Debt Securities. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">In order to exercise either defeasance or covenant defeasance:
        </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">we
        must irrevocably deposit with the Trustee (or other qualifying trustee), in
        trust, for the benefit of the Holders of such\nDebt Securities, cash, Government
        Obligations, or a combination thereof, in such amounts as will be sufficient,
        in the opinion of a nationally recognized firm of independent public accountants,
        to pay the principal of (and premium, if any) and\ninterest on such Outstanding
        Debt Securities, and any mandatory sinking fund or analogous payments thereon,
        on the scheduled due dates therefor in the Currency in which such Debt Securities
        are then specified as payable at Stated Maturity;\n</P></TD></TR></TABLE>
        <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">in
        the case of defeasance, with respect to the TR Finance Indenture, except where
        such election relates to a series of TR\nFinance Debt Securities offered to
        or held solely by persons that are not U.S. persons, we shall have delivered
        to the Trustee an Opinion of Counsel stating that (x)&nbsp;we have received
        from, or there\n</P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">-&#8201;22&#8201;- </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:arial; font-size:9pt\" BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD
        VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial;
        font-size:9pt\">\nhas been published by, the Internal Revenue Service a ruling
        or (y)&nbsp;since the date of the TR Finance Indenture, there has been a change
        in the applicable United States federal income tax\nlaw, in either case to
        the effect that, and based thereon such Opinion of Counsel shall confirm that,
        the Holders of such Debt Securities will not recognize income, gain or loss
        for United States federal income tax purposes as a result of such\ndefeasance
        and will be subject to United States federal income tax on the same amounts,
        in the same manner and at the same times as would have been the case if such
        defeasance had not occurred; and </P></TD></TR></TABLE>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">in
        the case of covenant defeasance, with respect to the TR Finance Indenture,
        except where such election relates to a series\nof TR Finance Debt Securities
        offered to or held solely by persons that are not U.S. persons, we shall have
        delivered to the Trustee an Opinion of Counsel to the effect that the Holders
        of such Debt Securities will not recognize income, gain or loss\nfor United
        States federal income tax purposes as a result of such covenant defeasance
        and will be subject to United States federal income tax on the same amounts,
        in the same manner and at the same times as would have been the case if such
        covenant\ndefeasance had not occurred; and </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">with
        respect to the TRC Indenture, in the case of defeasance or covenant defeasance,
        we shall have delivered to the Trustee\nan Opinion of Counsel qualified to
        practice law in Canada or a ruling from Canada Revenue Agency to the effect
        that the Holders of such Outstanding Securities will not recognize income,
        gain or loss for Canadian federal income tax purposes as a\nresult of such
        defeasance or covenant defeasance, as applicable, and will be subject to Canadian
        federal income tax on the same amounts, in the same manner and at the same
        times as would have been the case had such defeasance or covenant defeasance,\nas
        applicable, not occurred (and for the purposes of such opinion, such Canadian
        counsel shall assume that Holders of the Outstanding Debt Securities include
        Holders who are not resident in Canada). </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">If,
        after we have deposited funds and/or Government Obligations to effect defeasance
        or covenant defeasance with respect to any Debt Securities: </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        Holder of any such Debt Security is entitled to, and does, elect pursuant
        to the terms of such Debt Security to receive\npayment in a Currency other
        than that in which such deposit has been made in respect of such Debt Security,
        or </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        Currency in which such deposit has been made in respect of any such Debt Security
        ceases to be used by its government of\nissuance, the indebtedness represented
        by such Debt Security shall be deemed to have been, and will be, fully discharged
        and satisfied through the payment of the principal of (and premium, if any)
        and interest, if any, on such Debt Security as they\nbecome due out of the
        proceeds yielded by converting the amount so deposited in respect of such
        Debt Security into the Currency in which such Debt Security becomes payable
        as a result of such election or such cessation of usage based on the\napplicable
        Market Exchange Rate. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">All payments of principal
        of (and premium, if any), and interest, if any, on any Debt Security\nthat
        are payable in a Currency other than U.S. dollars that ceases to be used by
        its government of issuance shall be made in U.S. dollars. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Payment of Principal\nand
        Interest and Paying Agents </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Unless otherwise specified
        in the applicable Indenture, principal of (and premium, if any) and interest,
        if any,\non any Debt Securities will be payable at an office or agency maintained
        by us in New York, New York, except that at our option, interest, if any,
        may be paid by: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">check
        mailed to the address of the Person entitled thereto as such address shall
        appear in the Security Register, or\n</P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
