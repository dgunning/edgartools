        font-family:arial\">\nby such director, officer or controlling person in connection
        with the securities being registered, the <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        Registrants will, unless in the opinion of\ntheir counsel the matter has been
        settled by controlling precedent, submit to a court of appropriate jurisdiction
