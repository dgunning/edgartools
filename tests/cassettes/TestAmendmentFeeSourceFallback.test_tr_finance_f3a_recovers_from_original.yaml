        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">Each Indenture also provides that there may be more than
        one Trustee thereunder, each with respect to one or more different series
        of Debt Securities.\nSee &#147;Resignation of Trustee&#148; below for more
        information. As there is more than one Trustee under each Indenture, the powers
        and trust obligations of each Trustee as described in this prospectus shall
        extend only to the one or more series\nof Debt Securities for which it is
        a Trustee. The Debt Securities (whether of one or more than one series) for
        which each Trustee is acting shall in effect be treated as if issued under
        separate trust indentures. The term &#147;Debt Securities&#148;\nas used in
        this prospectus shall mean the one or more series with respect to which each
        respective Trustee is acting. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Some or all of the Debt\nSecurities
        may be issued under each Indenture as Original Issue Discount Securities (bearing
