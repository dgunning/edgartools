        part of our Legal Professionals, Corporates and Global Print businesses. West
        Publishing&#146;s head office is located at 2900&nbsp;Ames Crossing\nRoad,
        Suite 100, Eagan, Minnesota 55121, United States. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Thomson
        Reuters Applications is an indirect 100%-owned subsidiary of TRC formed under
        the\nlaws of the State of Delaware. Thomson Reuters Applications operates
        part of our Legal Professionals, Tax&nbsp;&amp; Accounting Professionals and
        Corporates businesses. Thomson Reuters Applications&#146; head office is located
        at 2900 Ames Crossing\nRoad, Suite 100, Eagan, Minnesota 55121, United States.
