        the foregoing requirements with certain exceptions. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">The Holders of a majority in principal amount of Outstanding
        Debt Securities under the applicable Indenture affected thereby have the right
        to waive\ncompliance by us with certain covenants. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">We and
        the Trustee (and any applicable Subsidiary Guarantor solely in the case of
        supplemental indentures\nestablishing the form or terms of any series of Debt
        Securities pursuant to the applicable Indenture, adding or evidencing the
        succession of a Guarantor Party or amending any covenant, right or power of
        such Subsidiary Guarantor under the applicable\nIndenture) may modify and
        amend each Indenture without the consent of any Holder under the relevant
        Indenture, for any of the following purposes: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
