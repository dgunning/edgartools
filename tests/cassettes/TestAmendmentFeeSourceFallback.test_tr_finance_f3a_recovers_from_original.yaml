        an entirety or substantially as an entirety expressly assumes TRC&#146;s obligations
        under the TRC Debt Securities, TR Finance Debt Securities, TRC Indenture and
        TR Finance Indenture, and </P></TD></TR></TABLE>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
