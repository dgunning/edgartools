        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        defeasance provisions of the applicable Indenture. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">We may, at our option and at any time, elect to be released
        from our obligations with respect to certain covenants that are described
        in either Indenture\n(including those described under &#147;Merger, Consolidation
        or Amalgamation&#148;), and we refer to this as &#147;covenant defeasance,&#148;
        and any omission to comply with such obligations thereafter shall not constitute
        a default or an Event of\nDefault with respect to such Debt Securities. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">In order to exercise either defeasance or covenant defeasance:
        </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">we
        must irrevocably deposit with the Trustee (or other qualifying trustee), in
        trust, for the benefit of the Holders of such\nDebt Securities, cash, Government
        Obligations, or a combination thereof, in such amounts as will be sufficient,
        in the opinion of a nationally recognized firm of independent public accountants,
        to pay the principal of (and premium, if any) and\ninterest on such Outstanding
        Debt Securities, and any mandatory sinking fund or analogous payments thereon,
        on the scheduled due dates therefor in the Currency in which such Debt Securities
        are then specified as payable at Stated Maturity;\n</P></TD></TR></TABLE>
        <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
