        identity of the Trustee for a particular series of Debt Securities. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">Each Indenture also provides that there may be more than
        one Trustee thereunder, each with respect to one or more different series
        of Debt Securities.\nSee &#147;Resignation of Trustee&#148; below for more
        information. As there is more than one Trustee under each Indenture, the powers
        and trust obligations of each Trustee as described in this prospectus shall
        extend only to the one or more series\nof Debt Securities for which it is
        a Trustee. The Debt Securities (whether of one or more than one series) for
        which each Trustee is acting shall in effect be treated as if issued under
        separate trust indentures. The term &#147;Debt Securities&#148;\nas used in
        this prospectus shall mean the one or more series with respect to which each
        respective Trustee is acting. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Some or all of the Debt\nSecurities
        may be issued under each Indenture as Original Issue Discount Securities (bearing
        no interest or interest at a rate that at the time of issuance is below market
        rates) to be issued at prices below their stated principal amounts. </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">-&#8201;15&#8201;- </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The general provisions of each Indenture
        do not contain any provisions that would limit our ability to\nincur indebtedness
        or that would afford Holders protection in the event of a highly leveraged
        or similar transaction involving Thomson Reuters. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Under
        each Indenture, we will have the ability, in addition to the ability to issue
        Debt Securities with terms different from those of other Debt\nSecurities
        previously issued, without the consent of the Holders, to reopen a previous
        issue of a series of Debt Securities and issue additional Debt Securities
        of such series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>Ranking and Other Indebtedness </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">The
        Debt Securities will be\nsenior unsecured obligations of TRC or TR Finance,
        as applicable, and will rank equally with all of our other existing and future
        senior unsecured obligations. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">The TR Finance Debt Securities
        will be fully and unconditionally guaranteed by the Guarantors, on a joint
        and several basis, and such guarantees will\nrank equally with each such Guarantor&#146;s
        other senior unsecured obligations and will effectively be subordinated to
        all existing and future liabilities of each such Guarantor&#146;s subsidiaries
        (other than TR Finance and the Subsidiary\nGuarantors). The TRC Debt Securities
        will be fully and unconditionally guaranteed by the Subsidiary Guarantors
        on the same basis that the Subsidiary Guarantors will guarantee the TR Finance
        Debt Securities, as described below. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Unless otherwise specified
        in an applicable prospectus supplement relating to a series of Debt Securities,
        the TRC Indenture and the TR Finance Indenture\nwill not limit the amount
        of secured debt that TRC, TR Finance or the Guarantor Parties may incur, as
        applicable, and the TRC Debt Securities and the TR Finance Debt Securities
        will effectively be subordinated in right of payment to any secured debt\nTRC,
        or TR Finance and the Guarantor Parties, may incur, as applicable, and to
        any of their respective secured obligations, in each case to the extent of
        the value of the collateral securing such debt or other obligations. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Form,
        Denomination, Exchange and Transfer </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Debt Securities of\na series
        may be issuable solely as registered Debt Securities issuable in denominations
        of US$1,000 and integral multiples of US$1,000 or in such other denominations
        as may be provided for by the terms of the Debt Securities of any particular\nseries.
        Each Indenture also provides that Debt Securities of a series may be issuable
        in global form, which are referred to as Global Securities. Debt Securities
        of any series will be exchangeable for other Debt Securities of the same series
        of any\nauthorized denominations and of a like aggregate principal amount
        and tenor. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The Debt Securities may be presented for
        exchange as described above,\nand Debt Securities may be presented for registration
        of transfer (duly endorsed or accompanied by a written instrument of transfer),
        at the corporate trust office of the Trustee or at the office of any transfer
        agent designated by us for such\npurpose with respect to any series of Debt
        Securities. No service charge will be made for any transfer or exchange of
        Debt Securities, but we may require payment of a sum sufficient to cover any
        tax or other governmental charge payable in connection\ntherewith. We may
        at any time designate one or more successor or additional transfer agents
        with respect to any series of Debt Securities and may from time to time rescind
        any such designation. We will be required to maintain a transfer agent in\neach
        Place of Payment for such series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">So long as required by
        the OBCA, we shall cause to be kept, by TRC or a trust corporation registered
        in\nOntario, a central securities register that complies with the requirements
        of the OBCA. Additionally, we will cause to be recorded promptly in the central
        securities register maintained pursuant to the OBCA, the particulars of each
        issue, exchange\nor transfer of Debt Securities. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\">We shall not be required
        to: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">issue,
        register the transfer of, or exchange Debt Securities of any series during
        a period beginning at the opening of\nbusiness 15 days before any selection
        of Debt Securities of that series to be redeemed and ending at the close of
        business on the day of mailing of the relevant notice of redemption; </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
