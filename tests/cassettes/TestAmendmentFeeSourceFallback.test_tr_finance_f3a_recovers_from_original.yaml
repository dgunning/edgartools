        the transfer of or exchange any Debt Security, or portion thereof, called
        for redemption, except the unredeemed\nportion of any Debt Security being
        redeemed in part; or </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
