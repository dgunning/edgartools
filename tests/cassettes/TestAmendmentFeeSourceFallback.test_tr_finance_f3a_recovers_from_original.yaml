        Computershare Trust Company of Canada, a <FONT STYLE=\"white-space:nowrap\">non-U.S.</FONT>
        trustee under each of the indentures, is filing with the Commission a written
        irrevocable consent and power of attorney\non Form <FONT STYLE=\"white-space:nowrap\">F-X.</FONT>
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">(c)
        Any change to the name or address of the agent for service of the\n<FONT STYLE=\"white-space:nowrap\">F-10</FONT>
