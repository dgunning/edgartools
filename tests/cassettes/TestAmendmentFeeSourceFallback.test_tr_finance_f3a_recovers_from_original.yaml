        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">to
        evidence the succession of another Person to TRC or a Subsidiary Guarantor
        as obligors under the TRC Indenture, or to TR\nFinance or a Guarantor as obligors
        under the TR Finance Indenture, subject to the provisions described under
        &#147;Merger, Consolidation or Amalgamation&#148;, as applicable; </P></TD></TR></TABLE>\n<P
