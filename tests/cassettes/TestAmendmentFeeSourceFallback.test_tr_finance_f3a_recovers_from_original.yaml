        font-size:10pt; font-family:Times New Roman\">Ladies and Gentlemen: </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have\nacted as Texas local counsel to Thomson
        Reuters (Tax&nbsp;&amp; Accounting) Inc., a Texas corporation (the &#147;<U>Company</U>&#148;),
        in connection with the filing, by Thomson Reuters Corporation, a corporation
        amalgamated under the laws of the\nProvince of Ontario (&#147;<U>TRC</U>&#148;),
