        of the TRF Debt\nSecurities by the Company (the &#147;<U>TRF Guarantee</U>&#148;)
        and the other Subsidiary Guarantors as provided for in the TRF Indenture (as
        defined below) and (iv)&nbsp;guarantees of the TRC Debt Securities (the &#147;<U>TRC\nGuarantee</U><U>&#148;</U>
        and together with the TRF Guarantee, the &#147;<U>Guarantees</U>&#148;) by
        the Company and the other Subsidiary Guarantors as provided for in the TRC
        Indenture (as defined below). The TRF Debt Securities will be issued\npursuant
        to an indenture dated as of March&nbsp;20, 2025, which is referenced as an
