        font-size:10pt; font-family:arial\" ALIGN=\"center\"><B>FORM <FONT STYLE=\"white-space:nowrap\">F-10</FONT>
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\"><B>PART II </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\"><B>INFORMATION NOT REQUIRED
        TO BE\nDELIVERED TO </B></P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\"><B>OFFEREES OR PURCHASERS
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"><B>Indemnification
        of Directors or Officers. </B></P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">The directors of Thomson Reuters\nCorporation
        (&#147;TRC&#148; or the <FONT STYLE=\"white-space:nowrap\">&#147;F-10</FONT>
        Registrant&#148;) are indemnified by TRC to the extent permitted by applicable
        laws and regulations. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">Under the<I> Business Corporations Act</I>
        (Ontario) (the &#147;OBCA&#148;), a corporation may indemnify a director or
        officer of the corporation, a former director or\nofficer of the corporation
        or another individual who acts or acted at the corporation&#146;s request
        as a director or officer, or an individual acting in a similar capacity, of
        another entity, against all costs, charges and expenses, including an\namount
        paid to settle an action or satisfy a judgment, reasonably incurred by the
        individual in respect of any civil, criminal, administrative, investigative
        or other proceeding in which the individual is involved because of that association
        with\nthe corporation or other entity, if the individual acted honestly and
        in good faith with a view to the best interests of the corporation or, as
        the case may be, to the best interests of the other entity for which the individual
        acted as a director\nor officer or in a similar capacity at the corporation&#146;s
        request, and, in the case of a criminal or administrative action or proceeding
        that is enforced by a monetary penalty, such individual had reasonable grounds
        for believing that his or her\nconduct was lawful. Any such individual is
        entitled to indemnification from a corporation as a matter of right in respect
        of all costs, charges and expenses reasonably incurred by the individual in
        connection with the defence of any civil, criminal,\nadministrative, investigative
        or other proceeding to which the individual is subject because of the individual&#146;s
        association with the corporation or other entity if the individual was not
        judged by a court or other competent authority to have\ncommitted any fault
        or omitted to do anything that he or she ought to have done and fulfilled
        the conditions set forth above. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">Pursuant to its organizational\ndocuments,
        TRC is required to indemnify the individuals referred to above and the heirs
        and legal representatives of such individuals to the extent permitted by the
        OBCA. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">TRC maintains, at its expense, a directors&#146; and officers&#146;
        liability insurance policy that provides protection for its directors and
        officers against liability\nincurred by them in their capacities as such.
        The insurance applies in certain circumstances where TRC may not indemnify
        its directors and officers for their acts or omissions. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">Insofar as indemnification
        for liabilities arising under the Securities Act of 1933, as amended (the
        &#147;Securities Act&#148;) may be permitted to directors, officers\nor persons
        controlling TRC pursuant to the applicable provisions described above, TRC
        has been informed that in the opinion of the U.S. Securities and Exchange
        Commission such indemnification is against public policy as expressed in the
        Securities\nAct and is therefore unenforceable. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-10, II-1 </P>\n\n</DIV></Center>\n\n\n<p
