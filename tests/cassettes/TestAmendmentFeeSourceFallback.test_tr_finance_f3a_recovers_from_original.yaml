        font-family:arial\" ALIGN=\"center\"><B>FORM <FONT STYLE=\"white-space:nowrap\">F-3</FONT>
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\"><B>PART II </B></P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\"><B>INFORMATION NOT REQUIRED
        IN\nPROSPECTUS </B></P> <P STYLE=\"margin-top:16pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\"><B>Item&#8201;8.&#8195;INDEMNIFICATION OF DIRECTORS AND
        OFFICERS </B></P>\n<P STYLE=\"margin-top:16pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\"><B>TR Finance LLC </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">TR Finance LLC (&#147;TR
        Finance&#148;) was formed as a\nlimited liability company under the laws of
        Delaware. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\"><FONT STYLE=\"white-space:nowrap\">Section&nbsp;18-108</FONT>
        of the Delaware Limited Liability Company Act\nprovides that, subject to such
        standards and restrictions, if any, as are set forth in its limited liability
        company agreement, a limited liability company may, and shall have the power
        to, indemnify and hold harmless any member or manager or other\nperson from
        and against all claims and demands whatsoever. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">The limited liability
        company agreement of TR Finance provides that no director or officer shall
        have\nany personal liability to TR Finance, any member or any other director
        or officer on account of such director&#146;s or officer&#146;s status as
        a director or officer or by reason of such director&#146;s or officer&#146;s
        acts or omissions in\nconnection with the conduct of the business of TR Finance;
        provided, however, that the foregoing shall not protect any director or officer
        against any liability to TR Finance, the members or the other directors or
        officers to which such director or\nofficer would otherwise be subject by
        reason of any act or omission of such director or officer that involves actual
        fraud or willful misconduct or any transaction from which such director or
        officer derived improper personal benefit. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">The limited liability
        company agreement of TR Finance further provides that TR Finance shall indemnify
        and hold harmless each director and officer, and the affiliates\nof any director
        or officer (each an &#147;Indemnified Person&#148;) against any and all losses,
        claims, damages, expenses and liabilities (including, but not limited to,
        any investigation, legal and other reasonable expenses incurred in connection\nwith,
        and any amounts paid in settlement of, any action, suit, proceeding or claim)
        of any kind or nature whatsoever that such Indemnified Person may at any time
        become subject to or liable for by reason of the formation, operation or termination
        of\nTR Finance, or the Indemnified Person&#146;s acting as a director or officer,
        or the authorized actions of such Indemnified Person in connection with the
        conduct of the affairs of TR Finance (including, without limitation, indemnification
        against\nnegligence, gross negligence or breach of duty); provided, however,
        that no Indemnified Person shall be entitled to indemnification if and to
        the extent that the liability otherwise to be indemnified for results from
        (A)&nbsp;any act or omission of\nsuch Indemnified Person that involves actual
        fraud or willful misconduct or (B)&nbsp;any transaction from which such Indemnified
        Person derived improper personal benefit. Each Indemnified Person shall have
        a claim against the property and assets of\nTR Finance for payment of any
        indemnity amounts from time to time due hereunder, which amounts shall be
        paid or properly reserved for prior to the making of distributions by TR Finance
        to the members. Costs and expenses that are subject to\nindemnification under
        the limited liability company agreement shall, at the request of any Indemnified
        Person, be advanced by TR Finance to or on behalf of such Indemnified Person
        prior to final resolution of a matter, so long as such Indemnified\nPerson
        shall have provided TR Finance with a written undertaking to reimburse TR
        Finance for all amounts so advanced if it is ultimately determined that the
        Indemnified Person is not entitled to indemnification under the limited liability
        company\nagreement. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">The limited liability company agreement of TR Finance
        further provides that TR Finance shall indemnify an Indemnified Person in
        connection with a\nproceeding (or part thereof) initiated by such Indemnified
        Person only if such proceeding (or part thereof) was authorized by the directors;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">F-3, II-1 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">\nprovided, however, that an Indemnified Person shall
        be entitled to reimbursement of his or her reasonable counsel fees with respect
        to a proceeding (or part thereof) initiated by such Indemnified\nPerson to
        enforce his or her right to indemnity or advancement of expenses to the extent
        the Indemnified Person is successful on the merits in such proceeding (or
        part thereof). TR Finance may maintain insurance, at its expense, to protect
        itself\nand any director or officer of TR Finance or another limited liability
        company, corporation, partnership, joint venture, trust or other enterprise
        against any expense, liability or loss, whether or not TR Finance would have
        the power to indemnify\nsuch person against such expense, liability or loss
        under the Delaware Limited Liability Company Act. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\"><B>Thomson Reuters
        Applications Inc. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">Thomson Reuters Applications Inc. (&#147;Thomson
        Reuters Applications&#148;) is a corporation incorporated under the laws of
        Delaware. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">Section&nbsp;145 of the Delaware General Corporation Law
        provides that a corporation may indemnify directors and officers as well as
        other employees and individuals\nagainst expenses (including attorneys&#146;
        fees), judgments, fines and amounts paid in settlement actually and reasonably
        incurred by such person in connection with any threatened, pending or completed
        actions, suits or proceedings in which such\nperson is made a party by reason
        of such person being or having been a director, officer, employee or agent
        to such corporation. The Delaware General Corporation Law provides that Section&nbsp;145
        is not exclusive of other rights to which those\nseeking indemnification may
        be entitled under any bylaw, agreement, vote of stockholders or disinterested
        directors or otherwise. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">Section&nbsp;102(b)(7) of the\nDelaware
        General Corporation Law permits a corporation to provide in its certificate
        of incorporation that a director of the corporation shall not be personally
        liable to the corporation or its stockholders for monetary damages for breach
        of\nfiduciary duty as a director, except for liability (i)&nbsp;for any breach
        of the director&#146;s duty of loyalty to the corporation or its stockholders,
        (ii)&nbsp;for acts or omissions not in good faith or which involve intentional
        misconduct or a\nknowing violation of law, (iii)&nbsp;for unlawful payments
        of dividends or unlawful stock repurchases, redemptions or other distributions,
        or (iv)&nbsp;for any transaction from which the director derived an improper
        personal benefit. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">The bylaws of Thomson Reuters Applications provide that
        Thomson Reuters Applications shall indemnify any person who is or was made,
        or threatened to be made, a party to\nany threatened, pending or completed
        action, suit or proceeding (a &#147;Proceeding&#148;), whether civil, criminal,
        administrative or investigative, including, without limitation, an action
        by or in the right of Thomson Reuters Applications to\nprocure a judgment
        in its favor, by reason of the fact that such person, or a person of whom
        such person is the legal representative, is or was a director or officer of
        Thomson Reuters Applications, or is or was serving in any capacity at the\nrequest
        of Thomson Reuters Applications for any other corporation, partnership, joint
        venture, trust, employee benefit plan or other enterprise (an &#147;Other
        Entity&#148;), against judgments, fines, penalties, excise taxes, amounts
        paid in\nsettlement and costs, charges and expenses (including attorney&#146;s
        fees and disbursements). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">The bylaws of Thomson Reuters Applications
        further provide that\nThomson Reuters Applications shall, from time to time,
        reimburse or advance to any director or officer or other person entitled to
        indemnification under the bylaws the funds necessary for payment of expenses,
        including attorneys&#146; fees and\ndisbursements, incurred in connection
        with any Proceeding, in advance of the final disposition of such Proceeding;
        provided, however, that, if required by the Delaware General Corporation Law,
        such expenses incurred by or on behalf of any director\nor officer or other
        person may be paid in advance of the final disposition of a Proceeding only
        upon a receipt by Thomson Reuters Applications of an undertaking, by or on
        behalf of such director or officer (or other person indemnified under the\nbylaws),
        to repay any such amount so advanced if it shall ultimately be </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-3, II-2 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">\ndetermined by final judicial decision
        from which there is no further rights of appeal that such director, officer
        or other person is not entitled to be indemnified for such expenses. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Thomson
        Reuters Applications may purchase and maintain insurance on behalf of any
        person who is or was a director, officer, employee, or agent of Thomson Reuters\nApplications,
        or is or was serving at the request of Thomson Reuters Applications as a director,
        officer, employee or agent of an Other Entity, against any liability asserted
        against such person and incurred by such person in any such capacity, or\narising
        out of such person&#146;s status as such, whether or not Thomson Reuters Applications
        would have the power to indemnify such person against such liability under
        the indemnity provisions of the bylaws, the certificate of incorporation or\nunder
        Section&nbsp;145 of the Delaware General Corporation Law or any other provision
        of law. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\"><B>Thomson Reuters (Tax&nbsp;&amp; Accounting) Inc. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Thomson
        Reuters (Tax&nbsp;&amp; Accounting) Inc. (&#147;Thomson Reuters Tax&nbsp;&amp;
        Accounting&#148;) is a corporation incorporated under the laws of Texas. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Pursuant
        to Chapter 8 of the Texas Business Organizations Code (the &#147;TBOC&#148;),
        controlling persons, directors or officers of a corporation formed under the
        laws\nof Texas may be insured or indemnified against liability which may be
        incurred in their capacities as such. The following paragraphs describe the
        general effect of certain provisions of Chapter 8 of the TBOC and are qualified
        in their entirety by\nreference to Chapter 8 of the Texas Business Organizations
        Code. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">Under Section&nbsp;8.101 of TBOC, a corporation or limited
        partnership (an\n&#147;enterprise&#148;), and a predecessor to any such enterprise
        may indemnify a person serving as part of the governing authority (including
        the board of directors, general partners, managers, members) of the enterprise
        (a &#147;governing\nperson&#148;), a former governing person, or a person
        who, while serving as a governing person of the enterprise, is or was serving
        at the enterprise&#146;s request as a representative of another enterprise,
        organization, or employee benefits plan\n(a &#147;delegate&#148;) who was,
        is, or is threatened to be made a named defendant or respondent in a proceeding
        against judgment and reasonable expenses (including court costs, penalties,
        settlements, fines, excise and similar taxes, and\nreasonable attorney&#146;s
        fees) actually incurred by the person in connection with the proceeding if
        it is determined that (a)&nbsp;the person seeking indemnification acted in
        good faith, reasonably believed that his or her conduct was in the best\ninterest
        of the enterprise (or, if not acting in the person&#146;s official capacity,
        at least not opposed to the best interests of the enterprise), and, in the
        case of a criminal proceeding, has no reasonable cause to believe his or her
        conduct was\nunlawful, (b)&nbsp;expenses (other than a judgment) are reasonable,
        and (c)&nbsp;indemnification should be paid. Under Section&nbsp;8.102 of the
        TBOC, indemnification of a person who is found liable to the enterprise or
        is found liable because the\nperson improperly received a personal benefit,
        is limited to reasonable expenses (including court costs, settlements, and
        reasonable attorney&#146;s fees, but excluding judgments, penalties, fines,
        excise and similar taxes) actually incurred by the\nperson in connection with
        the proceeding. Section&nbsp;8.102 of the TBOC prohibits an enterprise from
        indemnifying any such person in respect of any such proceeding in which the
        person is found liable (as established by a <FONT\nSTYLE=\"white-space:nowrap\">non-appealable</FONT>
        court order) for willful or intentional misconduct in the performance of the
        person&#146;s duties to the enterprise, breach of the person&#146;s duty of
        loyalty owed to the enterprise, or an act or\nomission not in good faith that
        constitutes a breach of a duty owed by such person to the enterprise. Under
        Section&nbsp;8.105 of the TBOC, an enterprise may indemnify and advance expenses
        to an officer, employee, agent, or other person that is not\na governing person
        as provided by (i)&nbsp;the enterprise&#146;s governing documents, (ii)&nbsp;general
        or specific action of the enterprise&#146;s board of directors or other governing
        authority, (iii)&nbsp;resolution of the enterprise&#146;s\nowners or members,
        (iv)&nbsp;contract, or (v)&nbsp;common law. A person who is not a governing
        person also may seek indemnification or advancement of expenses to the same
        extent that a governing person may seek indemnification or advancement under\nChapter
        8 of the </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">F-3, II-3 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">\nTBOC. Section&nbsp;8.105 of the TBOC also provides that
        an enterprise may pay or reimburse, in advance of the final disposition of
        a proceeding and on terms the enterprise considers appropriate,\nreasonable
        expenses incurred by a former governing person or delegate, or present or
        former employee, agent, officer or other person that is not a governing person,
        who was or is threatened to be made a named defendant or respondent in the\nproceeding.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">An
        enterprise is required by Sections 8.051 and 8.105 of the TBOC to indemnify
        a governing person, former governing person, delegate, or officer\nagainst
        reasonable expenses (including court costs, judgments, penalties, settlements,
        fines, excise and similar taxes, and reasonable attorney&#146;s fees) actually
        incurred by the person in connection with a proceeding in which the person
        is a\nnamed defendant or respondent due to the fact that the person is or
        was in that governing position if the person has been wholly successful, on
        the merits or otherwise, in the defense of the proceeding. Under Section&nbsp;8.052
        of the TBOC, on\napplication and after notice is provided, a court may order
        an enterprise to indemnify a governing person, former governing person, or
        delegate to the extent the court determines that the person is fairly and
        reasonably entitled to indemnification\nin view of all the relevant circumstances,
        without regard to whether the governing person, former governing person, or
        delegate applying to the court satisfies the requirements of Section&nbsp;8.101
        of the TBOC or has been found liable to the\nenterprise or for improperly
        receiving a personal benefit whether or not resulting from action taken in
        such person&#146;s official capacity; however, if the person is found liable
        to the enterprise or is found liable on the basis that a personal\nbenefit
        was improperly received by the person, the indemnification will be limited
        to reasonable expenses (including court costs, judgments, penalties, settlements,
        fines, excise and similar taxes, and reasonable attorney&#146;s fees). </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Under
        Section&nbsp;8.151 of the TBOC, an enterprise may purchase or procure or establish
        and maintain insurance or another arrangement to indemnify or hold harmless
        an\nexisting or former governing person, delegate, officer, employee, or agent
        against liability asserted against or incurred by the person in that capacity
        or arising out of the person&#146;s status in that capacity, without regard
        to whether the\nenterprise otherwise would have had the power to indemnify
        the person against that liability under Chapter 8 of the TBOC, subject to
        certain conditions. Additionally, an enterprise may also take certain other
        steps for the benefit of the persons to\nbe indemnified by the enterprise
        such as creating a trust fund, establishing self-insurance, granting a security
        interest or other lien on the enterprise&#146;s assets to secure the indemnity
        obligation, or establishing a letter of credit, guaranty,\nor surety arrangement.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Under
        Section&nbsp;8.104 of the TBOC, an enterprise may pay or reimburse reasonable
        expenses (including court costs, judgments, penalties,\nsettlements, fines,
        excise and similar taxes, and reasonable attorney&#146;s fees) incurred by
        a present governing person or delegate who was, is, or is threatened to be
        made a named defendant or respondent in a proceeding in advance of the final\ndisposition
        of the proceeding without making the determination required under Section&nbsp;8.101(a)
        after the enterprise&#146;s receipt of a written affirmation by the person
        of the person&#146;s good faith belief that the person has met the\nstandard
        of conduct necessary for indemnification and a receipt of a written undertaking
        by or on behalf of the person to repay the amount paid or reimbursed if the
        final determination is that the person has not met that standard or that\nindemnification
        is prohibited under Section&nbsp;8.102 of the TBOC. Subject to Section&nbsp;8.003
        of the TBOC and to the extent consistent with law, Section&nbsp;8.105 of the
        TBOC provides that an enterprise may advance expenses to an officer,\nemployee,
        agent, or other person that is not a governing person as provided by (i)&nbsp;the
        enterprise&#146;s governing documents, (ii)&nbsp;general or specific action
        of the enterprise&#146;s board of directors or other governing authority,\n(iii)&nbsp;resolution
        of the enterprise&#146;s owners or members, (iv)&nbsp;contract, or (v)&nbsp;common
        law. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">Under
        Section&nbsp;8.106 of the TBOC, an enterprise\nmay pay or reimburse reasonable
        expenses incurred by a governing person, officer, employee, agent, delegate,
        or other person in connection with that </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">F-3, II-4 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">\nperson&#146;s appearance as a witness
        or other participant in a proceeding at a time when the person is not a named
        defendant or respondent in the proceeding. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">Under Section&nbsp;8.003
        of the TBOC, the circumstances in which an enterprise must or may indemnify,
        or may advance expenses to, a person under the TBOC may be\nrestricted by
        the enterprise&#146;s governing document. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">The articles of incorporation
        of Thomson Reuters Tax&nbsp;&amp; Accounting provide that a director shall\nnot
        be liable to Thomson Reuters Tax&nbsp;&amp; Accounting or its shareholders
        for monetary damages for an act or omission in the director&#146;s capacity
        as a director. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\">The bylaws of Thomson Reuters Tax&nbsp;&amp; Accounting
        provide that no director or officer shall have any personal liability to Thomson
        Reuters Tax&nbsp;&amp;\nAccounting or its stockholders for monetary damages
        for any breach of fiduciary duty by such director as a director or by such
        officer as an officer. Notwithstanding the foregoing sentence, a director
        shall be liable to the extent provided by\napplicable law, (i)&nbsp;for breach
        of the director&#146;s duty of loyalty to Thomson Reuters Tax&nbsp;&amp; Accounting
        or its stockholders, (ii)&nbsp;for acts or omissions not in good faith or
        which involve intentional misconduct or knowing\nviolations of law, and (iii)&nbsp;for
        any transaction from which the director derived an improper personal benefit.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">The
        bylaws of Thomson Reuters Tax&nbsp;&amp;\nAccounting further provide that
        Thomson Reuters Tax&nbsp;&amp; Accounting shall indemnify any person who is
        or was made, or threatened to be made, a party to any threatened, pending
        or completed Proceeding, whether civil, criminal, administrative or\ninvestigative,
        including, without limitation, an action by or in the right of Thomson Reuters
        Tax&nbsp;&amp; Accounting to procure a judgment in its favor, by reason of
        the fact that such person, or a person of whom such person is the legal\nrepresentative,
        is or was a director or officer of Thomson Reuters Tax&nbsp;&amp; Accounting,
        or is or was serving in any capacity at the request of Thomson Reuters Tax&nbsp;&amp;
        Accounting for any Other Entity, against judgments, fines, penalties,\nexcise
        taxes, amounts paid in settlement and costs, charges and expenses (including
        attorney&#146;s fees and disbursements). </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">The bylaws of Thomson
        Reuters\nTax&nbsp;&amp; Accounting further provide that Thomson Reuters Tax&nbsp;&amp;
        Accounting shall, from time to time, reimburse or, upon application, advance
        to any director or officer or other person entitled to indemnification under
        the bylaws the\nfunds necessary for payment of expenses, including attorneys&#146;
        fees and disbursements, incurred in connection with any Proceeding, in advance
        of the final disposition of such Proceeding; provided, however, that, if required
        by the TBOC, such\nexpenses incurred by or on behalf of any director or officer
        or other person may be paid in advance of the final disposition of a Proceeding
        only upon a receipt by Thomson Reuters Tax&nbsp;&amp; Accounting of an undertaking,
        by or on behalf of such\ndirector or officer (or other person indemnified
        under the bylaws), to repay any such amount so advanced if it shall ultimately
        be determined by final judicial decision from which there is no further rights
        of appeal that such director, officer or\nother person is not entitled to
        be indemnified for such expenses. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">Thomson Reuters Tax&nbsp;&amp; Accounting
        may purchase and maintain insurance on behalf of any\nperson who is or was
        a director, officer, employee, or agent of Thomson Reuters Tax&nbsp;&amp;
        Accounting, or is or was serving at the request of Thomson Reuters Tax&nbsp;&amp;
        Accounting as a director, officer, employee or agent of an Other Entity,\nagainst
        any liability asserted against such person and incurred by such person in
        any such capacity, or arising out of such person&#146;s status as such, whether
        or not Thomson Reuters Tax&nbsp;&amp; Accounting would have the power to indemnify
        such\nperson against such liability under the indemnity provisions of the
        bylaws, the certificate of incorporation or under the TBOC or any other provision
        of law. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">F-3, II-5 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:arial\"><B>West Publishing Corporation </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:arial\">Section&nbsp;302A.521
        of the Minnesota Statutes requires, among other things, the indemnification
        of persons made or threatened to be made a party to a proceeding by\nreason
        of acts or omissions performed in their official capacity as an officer, director,
        employee or agent of West Publishing Corporation (&#147;West Publishing&#148;)
        against judgments, penalties and fines (including attorneys&#146; fees) if
        such\nperson is not otherwise indemnified, acted in good faith, received no
        improper benefit and the Minnesota Statute provisions relating to director
        conflicts of interest (if applicable) have been satisfied, reasonably believed
        that such conduct was in\nthe best interests of West Publishing or, in the
        case of certain acts or omissions, reasonably believed that such conduct was
        not opposed to the best interests of West Publishing, and, in the case of
        criminal proceedings, had no reason to believe\nthe conduct was unlawful.
        In addition, Section&nbsp;302A.521, subd. 3, of the Minnesota Statutes requires
        payment by West Publishing, upon written request, of reasonable expenses in
        advance of final disposition in certain instances (a)&nbsp;if West\nPublishing
        receives a written affirmation from the person of a good faith belief that
        the criteria for indemnification have been satisfied and a written undertaking
        by the person to repay all amounts so paid or reimbursed by West Publishing
        if it is\nultimately determined that the criteria for indemnification have
        not been satisfied and (b)&nbsp;a determination that the facts then known
        to those making the determination would not preclude indemnification. West
        Publishing also maintains an\ninsurance policy to assist in funding indemnification
        of directors and officers for certain liabilities. These indemnification provisions
        may be sufficiently broad to permit indemnification of our officers and directors
        for liabilities, including\nreimbursement of expenses incurred, arising under
        the Securities Act of 1933, as amended. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">The bylaws of West Publishing provide
        that West Publishing shall, to the\nextent not prohibited by law, indemnify
        any person who is or was made, or threatened to be made, a party to any threatened,
        pending or completed Proceeding, whether civil, criminal, administrative or
        investigative, including, without limitation, an\naction by or in the right
        of West Publishing to procure a judgment in its favor, by reason of the fact
        that such person, or a person of whom such person is the legal representative,
        is or was a director or officer of West Publishing, or is or was\nserving
        in any capacity at the request of West Publishing for any Other Entity, against
        judgments, fines, penalties, excise taxes, amounts paid in settlement and
        costs, charges and expenses (including attorney&#146;s fees and disbursements).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:arial\">The
        bylaws of West Publishing further provide that West Publishing shall, from
        time to time, reimburse or, upon application, advance to any director or officer
        or other\nperson entitled to indemnification under the bylaws the funds necessary
        for payment of expenses, including attorneys&#146; fees and disbursements,
        incurred in connection with any Proceeding, in advance of the final disposition
        of such Proceeding;\nprovided, however, that, if required by the Minnesota
        Business Corporation Act, such expenses incurred by or on behalf of any director
        or officer or other person may be paid in advance of the final disposition
        of a Proceeding only upon a receipt by\nWest Publishing of an undertaking,
        by or on behalf of such director or officer (or other person indemnified under
        the bylaws), to repay any such amount so advanced if it shall ultimately be
        determined by final judicial decision from which there is\nno further rights
        of appeal that such director, officer or other person is not entitled to be
        indemnified for such expenses. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\">West Publishing may purchase and\nmaintain
        insurance on behalf of any person who is or was a director, officer, employee,
        or agent of West Publishing, or is or was serving at the request of West Publishing
        as a director, officer, employee or agent of an Other Entity, against any\nliability
        asserted against such person and incurred by such person in any such capacity,
        or arising out of such person&#146;s status as such, whether or not West Publishing
        would have the power to indemnify such person against such liability under\nthe
        indemnity provisions of the bylaws, the certificate of incorporation or under
        Section&nbsp;302A.521 of the Minnesota Statutes or any other provision of
        law. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:arial\"
        ALIGN=\"center\">F-3, II-6 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
