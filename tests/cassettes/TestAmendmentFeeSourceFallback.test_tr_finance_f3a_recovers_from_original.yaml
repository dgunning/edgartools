        New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:arial; font-size:9pt\">issue, register the
        transfer of, or exchange any Debt Security which has been surrendered for
        repayment at the option of the\nHolder except the portion, if any, of such
        Debt Security not to be so repaid. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Guarantees of TRC
        Debt Securities </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The Subsidiary Guarantors will fully and
        unconditionally guarantee, jointly and severally as primary obligors and not
        merely as sureties, on a senior\nunsecured basis, the full and punctual payment
        when due, whether at stated maturity, by acceleration or otherwise, of all
        obligations of TRC under the TRC Debt Securities, whether for payment of principal
        of, or premium or interest on the TRC Debt\nSecurities, Additional Amounts,
        indemnification or otherwise. Each guarantee from a Subsidiary Guarantor will
        be limited to an amount not to exceed the maximum amount that can be guaranteed
        by the applicable Subsidiary Guarantor without rendering\nthe guarantee, as
        it relates to that Subsidiary Guarantor, voidable under applicable law relating
        to fraudulent conveyance or fraudulent transfer or similar laws affecting
        the rights of creditors generally. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">In the event of a sale
        or other disposition of all or substantially all of the assets of the applicable
        Subsidiary Guarantor to a Person that is not TRC\nor a wholly-owned subsidiary
        of TRC, or if any Subsidiary Guarantor ceases to be a direct or indirect wholly-owned
        subsidiary of TRC for any reason, such Subsidiary Guarantor shall be released
        from its guarantee. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>Guarantees of TR Finance Debt Securities </B></P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">The Guarantors will\nfully and unconditionally guarantee,
        jointly and severally as primary obligors and not merely as sureties, on a
        senior unsecured basis, the full and punctual payment when due, whether at
        stated maturity, by acceleration or otherwise, of all\nobligations of TR Finance
        under the TR Finance Debt Securities, whether for payment of principal of,
        or premium or interest on the TR Finance Debt Securities, Additional Amounts,
        indemnification or otherwise. Each guarantee from a Guarantor will be\nlimited
        to an amount not to exceed the maximum amount that can be guaranteed by the
        applicable Guarantor without rendering the guarantee, as it relates to that
        Guarantor, voidable under applicable law relating to fraudulent conveyance
        or fraudulent\ntransfer or similar laws affecting the rights of creditors
        generally. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">In the event of a sale or other disposition
        of all or substantially all of the\nassets of the applicable Subsidiary Guarantor
        to a Person that is not TRC or a wholly-owned subsidiary of TRC, or if any
        Subsidiary Guarantor ceases to be a direct or indirect wholly-owned subsidiary
        of TRC for any reason, such Subsidiary Guarantor\nshall be released from its
        guarantee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B>Events of Default </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Each
        Indenture provides, with respect to any series of Outstanding Debt Securities
        thereunder, that the following shall constitute Events of Default:\n</P> <P
        STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">(i)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:9pt; font-family:arial; \" ALIGN=\"left\">default in the payment
        of any interest upon any Debt Security of that series, when the same becomes
        due and payable,\ncontinued for 30 days; </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">(ii)</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:9pt; font-family:arial; \" ALIGN=\"left\">default in the payment
        of the principal of or any premium on any Debt Security of that series at
        its Maturity;\n</P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
