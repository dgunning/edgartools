        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        Holder of any such Debt Security is entitled to, and does, elect pursuant
        to the terms of such Debt Security to receive\npayment in a Currency other
        than that in which such deposit has been made in respect of such Debt Security,
        or </P></TD></TR></TABLE> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">the
        Currency in which such deposit has been made in respect of any such Debt Security
        ceases to be used by its government of\nissuance, the indebtedness represented
        by such Debt Security shall be deemed to have been, and will be, fully discharged
        and satisfied through the payment of the principal of (and premium, if any)
        and interest, if any, on such Debt Security as they\nbecome due out of the
        proceeds yielded by converting the amount so deposited in respect of such
        Debt Security into the Currency in which such Debt Security becomes payable
        as a result of such election or such cessation of usage based on the\napplicable
        Market Exchange Rate. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">All payments of principal
        of (and premium, if any), and interest, if any, on any Debt Security\nthat
        are payable in a Currency other than U.S. dollars that ceases to be used by
        its government of issuance shall be made in U.S. dollars. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Payment of Principal\nand
        Interest and Paying Agents </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Unless otherwise specified
        in the applicable Indenture, principal of (and premium, if any) and interest,
        if any,\non any Debt Securities will be payable at an office or agency maintained
        by us in New York, New York, except that at our option, interest, if any,
        may be paid by: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
