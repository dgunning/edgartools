        supplement. If any of the events or developments discussed in these risks
        actually occur, our business, financial condition or results of operations
        or the value of the Debt Securities could be adversely\naffected. </I></P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B>Risks
        Relating to the Debt Securities </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B><I>Fluctuations\nin exchange rates could
        give rise to foreign currency exposure. </I></B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">Debt
        Securities denominated or payable in foreign currencies may entail\nsignificant
        risks, and the extent and nature of such risks change continuously. These
        risks include, without limitation, the possibility of significant fluctuations
        in the foreign currency market, the imposition or modification of foreign
        exchange\ncontrols and potential illiquidity in the secondary market. These
        risks will vary depending on the currency or currencies involved. Prospective
        purchasers should consult their own financial and legal advisors as to the
        risks entailed in an\ninvestment in Debt Securities denominated in currencies
        other than the local currency. Debt Securities are not an appropriate investment
        for investors who are unsophisticated with respect to foreign currency transactions.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B><I>The
        relative value of the Debt Securities will depend on a number of factors.
        </I></B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We believe that the value of Debt Securities
        in any secondary markets will be affected by the supply and demand of the
        Debt Securities, the interest rate\nand a number of other factors. Some of
        these factors are interrelated in complex ways. As a result, the effect of
        any one factor may be offset or magnified by the effect of another factor.
        We have summarized below what we expect to be the impact on\nthe market value
        of the Debt Securities of a change in a specific factor, assuming all other
        conditions remain constant. </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">Market
        Interest Rates. In general, as market interest rates rise, notes bearing interest
        at a fixed rate generally decline\nin value because the premium, if any, over
        market interest rates will decline. Consequently, if a holder holds Debt Securities
        and market interest rates increase, the market value of such Debt Securities
        may decline. We cannot predict future levels\nof market interest rates. </P></TD></TR></TABLE>
        <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
        STYLE=\"font-family:Times New Roman\">&#9679;</FONT></TD>\n<TD WIDTH=\"1%\"
        VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\"
        STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:arial; font-size:9pt\">Our
        Credit Ratings, Financial Condition and Results. Actual or anticipated changes
        in our credit ratings or financial\ncondition may affect the market value
        of the Debt Securities. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">The
        impact of one of the factors above, such as an increase in\nmarket interest
        rates, may offset some or all of any change in the market value of the Debt
        Securities attributable to another factor, such as an improvement in our credit
        ratings. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B><I>Credit ratings assigned to Debt Securities may change.
        </I></B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">We cannot assure you that any credit rating
        assigned to any Debt Securities that may be issued hereunder will remain in
        effect for any given period of\ntime or that any rating will not be lowered
        or withdrawn entirely by the relevant rating agency. Real or anticipated changes
        in credit ratings on the Debt Securities may affect the market value of the
        Debt Securities. In addition, real or\nanticipated changes in credit ratings
        can affect the cost at which we can access the capital markets. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:9pt; font-family:arial\"><B><I>There may not
        be a trading market for the Debt\nSecurities. </I></B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">There
        may be no market through which the Debt Securities may be sold and you may
        not be able to resell the Debt Securities\nissued hereunder. We cannot assure
        you that a secondary market for trading in the Debt </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">-&#8201;9&#8201;- </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\">\nSecurities will develop or that any secondary
        market which does develop will continue. There can also be no assurance regarding
        the ability of holders of Debt Securities issued hereunder to sell\ntheir
        Debt Securities or the price at which such holders may be able to sell their
        Debt Securities. If a trading market were to develop, the Debt Securities
        could trade at prices that may be higher or lower than the price at which
        they were issued\nhereunder and this may result in a return that is greater
        or less than the interest rate on the Debt Securities, in each case depending
        on many factors, including, among other things, prevailing interest rates,
        our financial results, any change in\nour credit-worthiness and the market
        for similar securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B><I>The Debt Securities will be subordinated
        to creditors of our subsidiaries. </I></B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">We conduct
        our operations through a number of subsidiaries and to the extent any such
        subsidiary, except for any Subsidiary Guarantor and in the case of\nTR Finance
        Debt Securities, TR Finance, has or incurs indebtedness with a third party,
        the holders of the Debt Securities will effectively be subordinated to the
        claims of the holders of such third-party indebtedness, including in the event
        of\nliquidation or upon a realization of the assets of any such subsidiary.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">Except for the Subsidiary Guarantors and in the case of
        TR Finance Debt\nSecurities, TR Finance, none of TRC&#146;s subsidiaries have
        guaranteed or will otherwise become obligated with respect to the Debt Securities
        (including any subsidiaries of the Subsidiary Guarantors). Accordingly, each
        Guarantor&#146;s right to\nreceive assets from any of its subsidiaries upon
        such subsidiary&#146;s bankruptcy, liquidation or reorganization and the right
        of holders of Debt Securities to participate in those assets, is effectively
        subordinated to claims of that\nsubsidiary&#146;s creditors, including trade
        creditors. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt;
        font-family:arial\"><B><I>The TRC Debt Securities and TR Finance Debt Securities
        are unsecured and would rank equal in right of\npayment to TRC&#146;s or TR
        Finance&#146;s existing and future unsecured indebtedness, respectively, and
        would be effectively subordinated to any of its future secured indebtedness
        and any of the applicable Guarantors&#146; existing and future\nsecured indebtedness,
        in each case to the extent of the value of the assets securing such indebtedness.
        </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">The TRC Debt Securities and TR\nFinance
        Debt Securities are unsecured and would rank equal in right of payment to
        TRC&#146;s or TR Finance&#146;s existing and future unsecured indebtedness,
        respectively. In addition, the TRC Debt Securities and TR Finance Debt Securities
        would be\neffectively subordinated in right of payment to any of TRC&#146;s
        or TR Finance&#146;s future secured indebtedness, respectively, to the extent
        of the value of the assets securing such indebtedness. TRC and TR Finance
        will not be restricted in their\nability to make investments or incur debt.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%; font-size:9pt;
        font-family:arial\">The Guarantee Obligations are unsecured and effectively
        subordinated in right of payment to all of the\napplicable Guarantors&#146;
        existing and future secured indebtedness, to the extent of the value of the
        assets securing such indebtedness. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\"><B><I>The Indentures will\nnot restrict
        the ability of TRC, TR Finance or the Subsidiary Guarantors to incur additional
        indebtedness. </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:1%; font-size:9pt; font-family:arial\">Each Indenture (as defined
        below)\ndoes not restrict any applicable Guarantor&#146;s ability to incur
        additional indebtedness, including secured indebtedness generally, which would
        have a prior claim on the assets securing that indebtedness. Incurrence of
        additional indebtedness may\nhave important consequences for holders of Debt
        Securities, including making it more difficult for TRC, TR Finance or the
        Subsidiary Guarantors, as applicable, to satisfy its obligations with respect
        to the Debt Securities, increasing the amount of\nindebtedness ranking equal
        or (if secured) effectively senior to the Debt Securities in the event of
        bankruptcy or insolvency, resulting in a loss in the trading value of the
        Debt Securities, if any, and increasing the risk that the credit rating of\nthe
        Debt Securities is lowered or withdrawn. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:1%; font-size:9pt; font-family:arial\">In the
        event of insolvency, bankruptcy, liquidation, reorganization, dissolution
        or winding up of TRC,\nTR Finance or any Subsidiary Guarantor, their respective
        assets that serve as collateral for any secured indebtedness would be made
        available to satisfy their respective obligations to secured creditors before
        any payments are made on the TRC Debt\nSecurities or the TR Finance Debt Securities,
        as applicable. If there is not enough collateral to </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:arial\" ALIGN=\"center\">-&#8201;10&#8201;- </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:9pt; font-family:arial\">\nsatisfy all secured obligations, then
        any remaining amounts payable in respect of secured obligations would share
        equally with all senior unsecured obligations, including payment obligations
        in\nrespect of the Debt Securities and the Guarantee Obligations. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:9pt; font-family:arial\"><B><I>We
        have made only limited covenants in the Indentures (as defined below) governing
        the Debt\nSecurities and these limited covenants may not protect your investment.
        </I></B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:1%;
        font-size:9pt; font-family:arial\">Unless otherwise specified in an applicable
        prospectus supplement\nrelating to a series of Debt Securities, the Indentures
        governing the Debt Securities will not: </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:arial; font-size:9pt\" BORDER=\"0\"
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"3%\">&nbsp;</TD>\n<TD WIDTH=\"2%\" VALIGN=\"top\" ALIGN=\"left\"><FONT
