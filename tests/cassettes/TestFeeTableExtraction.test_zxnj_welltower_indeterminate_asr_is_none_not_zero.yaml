        under the Securities Act. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon the terms
        and conditions of the applicable prospectus supplement, the underwriters\nmay
        purchase and sell securities in the open market. These transactions may include
        short sales, purchases to cover positions created by short sales and stabilizing
        transactions. Short sales involve the sale by the underwriters of a greater
        number\nof securities than they are required to purchase in the offering.
        Stabilizing transactions consist of various bids for or purchases of the securities
        made by the underwriters in the open market prior to the completion of the
        offering. The\nunderwriters may also impose a penalty bid. This occurs when
        a particular underwriter repays to the other underwriters a portion of the
        underwriting discount received by it because the representatives of the underwriters
        have repurchased securities\nsold by or for the account of that underwriter
        in stabilizing or short-covering transactions. The underwriters are not required
        to engage in these activities and may discontinue any of these activities
        at any time. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
