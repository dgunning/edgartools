        XBRL DOCUMENT\n<TEXT>\n/* Updated 2009-11-04 */\n/* v2.2.0.24 */\n\n/* DefRef
        Styles */\n.report table.authRefData{\n\tbackground-color: #def;\n\tborder:
        2px solid #2F4497;\n\tfont-size: 1em;\n\tposition: absolute;\n}\n\n.report
        table.authRefData a {\n\tdisplay: block;\n\tfont-weight: bold;\n}\n\n.report
        table.authRefData p {\n\tmargin-top: 0px;\n}\n\n.report table.authRefData
        .hide {\n\tbackground-color: #2F4497;\n\tpadding: 1px 3px 0px 0px;\n\ttext-align:
        right;\n}\n\n.report table.authRefData .hide a:hover {\n\tbackground-color:
        #2F4497;\n}\n\n.report table.authRefData .body {\n\theight: 150px;\n\toverflow:
        auto;\n\twidth: 400px;\n}\n\n.report table.authRefData table{\n\tfont-size:
        1em;\n}\n\n/* Report Styles */\n.pl a, .pl a:visited {\n\tcolor: black;\n\ttext-decoration:
        none;\n}\n\n/* table */\n.report {\n\tbackground-color: white;\n\tborder:
        2px solid #acf;\n\tclear: both;\n\tcolor: black;\n\tfont: normal 8pt Helvetica,
        Arial, san-serif;\n\tmargin-bottom: 2em;\n}\n\n.report hr {\n\tborder: 1px
        solid #acf;\n}\n\n/* Top labels */\n.report th {\n\tbackground-color: #acf;\n\tcolor:
        black;\n\tfont-weight: bold;\n\ttext-align: center;\n}\n\n.report th.void\t{\n\tbackground-color:
        transparent;\n\tcolor: #000000;\n\tfont: bold 10pt Helvetica, Arial, san-serif;\n\ttext-align:
        left;\n}\n\n.report .pl {\n\ttext-align: left;\n\tvertical-align: top;\n\twhite-space:
        normal;\n\twidth: 200px;\n\twhite-space: normal; /* word-wrap: break-word;
        */\n}\n\n.report td.pl a.a {\n\tcursor: pointer;\n\tdisplay: block;\n\twidth:
        200px;\n\toverflow: hidden;\n}\n\n.report td.pl div.a {\n\twidth: 200px;\n}\n\n.report
        td.pl a:hover {\n\tbackground-color: #ffc;\n}\n\n/* Header rows... */\n.report
        tr.rh {\n\tbackground-color: #acf;\n\tcolor: black;\n\tfont-weight: bold;\n}\n\n/*
        Calendars... */\n.report .rc {\n\tbackground-color: #f0f0f0;\n}\n\n/* Even
        rows... */\n.report .re, .report .reu {\n\tbackground-color: #def;\n}\n\n.report
        .reu td {\n\tborder-bottom: 1px solid black;\n}\n\n/* Odd rows... */\n.report
        .ro, .report .rou {\n\tbackground-color: white;\n}\n\n.report .rou td {\n\tborder-bottom:
        1px solid black;\n}\n\n.report .rou table td, .report .reu table td {\n\tborder-bottom:
        0px solid black;\n}\n\n/* styles for footnote marker */\n.report .fn {\n\twhite-space:
        nowrap;\n}\n\n/* styles for numeric types */\n.report .num, .report .nump
        {\n\ttext-align: right;\n\twhite-space: nowrap;\n}\n\n.report .nump {\n\tpadding-left:
        2em;\n}\n\n.report .nump {\n\tpadding: 0px 0.4em 0px 2em;\n}\n\n/* styles
        for text types */\n.report .text {\n\ttext-align: left;\n\twhite-space: normal;\n}\n\n.report
        .text .big {\n\tmargin-bottom: 1em;\n\twidth: 17em;\n}\n\n.report .text .more
