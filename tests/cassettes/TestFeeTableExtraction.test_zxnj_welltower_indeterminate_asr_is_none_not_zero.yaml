        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">We will not review on a continuing basis the
        Company&#146;s compliance with the documents or assumptions\nset forth above
        or the factual representations set forth in the Officer&#146;s Certificate.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">The Company&#146;s qualification and taxation\nas
        a REIT under the Code depends upon the ability of the Company to meet on an
        ongoing basis (through actual quarterly and annual operating results, distribution
        levels, diversity of stock ownership and otherwise) the various qualification
        tests\nimposed under the Code and upon the Company utilizing any and all appropriate
        &#147;savings provisions&#148; (including the provisions of Sections 856(c)(6),
        856(c)(7) and 856(g) of the Code, the provision of Section&nbsp;856(c)(4)
        of the Code\n(flush language) allowing for the disposal of assets within 30
        days after the close of a calendar quarter and all available deficiency dividend
        procedures) available to the Company under the Code to correct violations
        of specified REIT qualification\nrequirements of Sections 856 and 857 of the
        Code. Our opinion set forth above does not foreclose the possibility that
        the Company may have to utilize one or more of the &#147;savings provisions&#148;
        in the future, which could require the Company to\npay an excise or penalty
        tax (which could be significant in amount) in order to maintain its REIT qualification.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">We have not undertaken\nto review the Company&#146;s
        compliance with these requirements on a continuing basis, nor will we do so
        in the future. Accordingly, no assurance can be given that the actual results
        of the Company&#146;s operations for any given taxable year will\nsatisfy
        the requirements under the Code for qualification and taxation as a REIT.
        The foregoing opinions are based on current provisions of the Code and the
        Regulations, published administrative interpretations thereof and published
        court decisions\nand assume that none of these will change. No assurance,
        however, can be given that the law will not change, possibly with retroactive
        effect, in a way that will prevent the Company from qualifying as a REIT.
        Any change occurring after the date\nhereof in, or a variation from, any of
        the foregoing bases for our opinions could affect the conclusions expressed
        herein. The foregoing opinions do not foreclose the </P>\n</DIV></Center>\n\n\n<p
