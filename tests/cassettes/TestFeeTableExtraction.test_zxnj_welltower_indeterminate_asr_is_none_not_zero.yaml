        font-size:10pt; font-family:Times New Roman\">\namended. The prospectus supplement
        applicable to a particular series of warrants may provide that certain provisions
        of the warrants, including the securities for which they may be exercisable,\nthe
        exercise price, and the expiration date, may not be altered without the consent
        of the holder of each warrant. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">27 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_12\"></A>DESCRIPTION
        OF UNITS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We may, from time to time, issue
        units comprised of one or more of the other securities that may be offered
        under this prospectus, in any\ncombination. Each unit will be issued so that
        the holder of the unit is also the holder of each security included in the
        unit. Thus, the holder of a unit will have the rights and obligations of a
        holder of each included security. The unit agreement\nunder which a unit is
        issued may provide that the securities included in the unit may not be held
        or transferred separately at any time, or at any time before a specified date.
        In this description, all references to &#147;we,&#148; &#147;us,&#148;\n&#147;our&#148;
        or the &#147;Company&#148; refer only to Welltower Inc. and not to any of
        its subsidiaries. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any applicable prospectus\nsupplement
        and any related free writing prospectus will describe: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the material
        terms of the units and of the securities comprising the units, including whether
        and under what\ncircumstances those securities may be held or transferred
        separately; </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
