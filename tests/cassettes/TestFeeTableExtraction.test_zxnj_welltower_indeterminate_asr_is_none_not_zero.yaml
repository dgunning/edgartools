        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">In our capacity as special tax\ncounsel to the
        Company, we have made such legal and factual examinations and inquiries as
        we have deemed necessary or appropriate for purposes of our opinions rendered
        below. For the purposes of rendering these opinions, we have not made an\nindependent
        investigation of the facts set forth in any documents delivered to us, including,
        without limitation, the Officer&#146;s Certificate. We have relied completely
        upon the Company&#146;s representations that the information presented in\nsuch
        documents accurately reflects all material facts. In the course of our representation
        of the Company, we have not been made aware of any facts inconsistent with
        such factual representations. In addition, where such factual representations\ninvolve
        terms defined or used in the Code, the Regulations, published rulings of the
        Internal Revenue Service (the &#147;IRS&#148;) or other relevant authority,
        we have explained such terms to the Company&#146;s representatives and are
        satisfied\nthat the Company&#146;s representatives understand such terms and
        are capable of making such factual representations. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">Based
        on the Code,\nRegulations, documents, assumptions, qualifications and statements
        set forth above and the factual representations set forth in the Officer&#146;s
        Certificate and our review of the discussion in the Annual Report under the
        caption\n&#147;Taxation,&#148; we are of the opinion that: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\">&nbsp;</TD>\n<TD WIDTH=\"5%\"
        VALIGN=\"top\" ALIGN=\"left\">a)</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman; \" ALIGN=\"left\">the Predecessor had been organized and had operated
        in conformity with the requirements for qualification and\ntaxation as a REIT
        pursuant to sections 856 through 860 of the Code for its taxable years ended
        December&nbsp;31, 2011 through December&nbsp;31, 2021; </P></TD></TR></TABLE>\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
