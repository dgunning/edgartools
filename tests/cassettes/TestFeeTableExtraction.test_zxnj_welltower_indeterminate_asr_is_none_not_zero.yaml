        style=\"margin-top: 0pt; margin-bottom: 0pt; font-size: 10pt; font-family:
        &quot;Times New Roman&quot;; text-align: left; line-height: normal;\">Units
        consist of any combination of one or more debt securities or other securities,
        including preferred stock, depositary shares, common stock, warrants or any
        combination thereof. </div></td></tr></table></ix:continuation>\n<table style=\"text-align:start;
