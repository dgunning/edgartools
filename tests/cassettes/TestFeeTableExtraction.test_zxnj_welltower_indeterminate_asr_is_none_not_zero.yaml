        style=\"width:4%;vertical-align:top;text-align:left\">(1)</td>\n<td style=\"vertical-align:top;text-align:left\"><div
        style=\"margin-top: 0pt; margin-bottom: 0pt; font-size: 10pt; font-family:
        &quot;Times New Roman&quot;; text-align: left; line-height: normal;\">Any
        securities registered hereunder may be sold separately or as units with other
        securities registered hereunder. </div></td></tr></table>\n<table cellpadding=\"0\"
        cellspacing=\"0\" style=\"text-align:start; BORDER-COLLAPSE:COLLAPSE; font-family:Times
        New Roman; font-size:10pt;border:0;width:100%\">\n<tr style=\"page-break-inside:avoid\">\n<td
        style=\"width:4%;vertical-align:top;text-align:left\">(2)</td>\n<td style=\"vertical-align:top;text-align:left\"><div
        style=\"margin-top: 0pt; margin-bottom: 0pt; font-size: 10pt; font-family:
        &quot;Times New Roman&quot;; text-align: left; line-height: normal;\">Separate
        consideration may or may not be received for securities that are issuable
        on exercise, conversion or exchange of other securities. </div></td></tr></table></ix:nonNumeric>
        </ix:nonNumeric> </ix:nonNumeric> <ix:continuation id=\"TextSelection_135721828\"
