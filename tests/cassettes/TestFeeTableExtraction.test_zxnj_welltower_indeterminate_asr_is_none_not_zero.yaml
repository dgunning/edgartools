        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the other
        terms of the warrants. </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Warrants
        may be exercised at the appropriate office of the warrant agent or any other
        office indicated in the applicable prospectus\nsupplement. Before the exercise
        of warrants, holders will not have any of the rights of holders of the securities
        underlying the warrants and will not be entitled to payments made to holders
        of those securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The warrant
        agreements may be amended or supplemented without the consent of the holders
        of the warrants to which the amendment or supplement\napplies to effect changes
        that are not inconsistent with the provisions of the warrants and that do
        not adversely affect the interests of the holders of the warrants. However,
        any amendment that materially and adversely alters the rights of the\nholders
        of warrants will not be effective unless the holders of at least a majority
        of the applicable warrants then outstanding (or such greater approval as is
        required by the then-current rules of any stock exchange or trading market
        on which we\nshall have listed the applicable underlying shares of capital
        stock for trading or as otherwise provided in our organizational documents)
        approve the amendment. Every holder of an outstanding warrant at the time
        any amendment becomes effective, by\ncontinuing to hold the warrant, will
        be bound by the applicable warrant agreement, as </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">26 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
