        the IRS. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">The foregoing opinions are limited
        to the U.S. federal income tax matters addressed herein, and no other opinions
        are rendered with respect to\nother federal tax matters or to any issues arising
        under the tax laws of any other country or any state or locality. You must
        judge for yourselves whether the matters addressed in this opinion letter
        are sufficient for your purposes. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">We undertake
        no obligation to update the opinions expressed herein after the date of this
        letter. This letter has been prepared solely for\nyour use in connection with
        the filing of the Registration Statement and speaks only as of this date.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">We hereby consent to the filing of\nthis opinion
