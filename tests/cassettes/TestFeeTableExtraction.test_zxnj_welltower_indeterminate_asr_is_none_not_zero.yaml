        OF PROCEEDS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Unless otherwise described in
        a prospectus supplement or any free writing prospectus we have authorized
        for use in connection with a specific\noffering, we intend to use the net
        proceeds from the sale of any securities under this prospectus for general
        corporate purposes, which may include repaying debt and investment in healthcare
        and seniors housing properties. Until the proceeds from a\nsale of securities
        by us are applied to their intended uses, they may be invested in short-term,
        investment grade, interest-bearing securities, certificates of deposit or
        indirect or guaranteed obligations of the United States. We will not receive\nany
        of the proceeds from sales of securities by any selling security holder pursuant
        to this prospectus. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
