        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Indenture permits, with certain exceptions
        as therein provided, the amendment thereof and the modification of the rights
        and obligations\nof the Obligors and the rights of the Holders of the Securities
        of each series to be affected under the Indenture at any time by the Obligors
        and the Trustee with the consent of the Holders of not less than a majority
        in principal amount of the\nSecurities at the time Outstanding of each series
        to be affected. The Indenture also contains provisions permitting the Holders
        of specified percentages in principal amount of the Securities of each series
        at the time Outstanding, on behalf of the\nHolders of all Securities of such
        series, to waive compliance by the Obligors with certain provisions of the
        Indenture and certain past defaults under the Indenture and their consequences.
        Any such consent or waiver by the Holder of this Security\nshall be conclusive
        and binding upon such Holder and upon all future Holders of this Security
        and of any Security issued upon the registration of transfer hereof or in
        exchange therefor or in lieu hereof, whether or not notation of such consent
        or\nwaiver is made upon this Security. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As provided
        in and subject to the provisions of the Indenture, the Holder of this Security
        shall not\nhave the right to institute any proceeding with respect to the
        Indenture or for the appointment of a receiver or trustee or for any other
        remedy thereunder, unless such Holder shall have previously given the Trustee
        written notice of a continuing\nEvent of Default with respect to the Securities
        of this series, the Holders of not less than a majority in principal amount
        of the Securities of this series at the time Outstanding shall have made written
        request to the Trustee to institute\nproceedings in respect of such Event
        of Default as Trustee and offered the Trustee reasonable indemnity, and the
        Trustee shall not have received from the Holders of a majority in principal
        amount of Securities of this series at the time Outstanding\na direction inconsistent
        with such request, and shall have failed to institute any such proceeding,
        for 60 days after receipt of such notice, request and offer of indemnity.
        The foregoing shall not apply to any suit instituted by the Holder of this\nSecurity
        for the enforcement of any payment of principal hereof or any premium or interest
        hereon on or after the respective due dates expressed herein. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        reference herein to the Indenture and no provision of this Security or of
