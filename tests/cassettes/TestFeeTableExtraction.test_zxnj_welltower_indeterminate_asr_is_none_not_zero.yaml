        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_13\"></A>RESTRICTIONS
        ON TRANSFER OF SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">For Welltower
        Inc. to qualify as a REIT, not more than 50% in value of its outstanding capital
        stock may be owned, directly or indirectly, by\nfive or fewer individuals
        at any time during the last half of our taxable year. In order to ensure that
        this requirement is satisfied, our <FONT STYLE=\"white-space:nowrap\">by-laws</FONT>
        (with respect to its common stock and preferred stock) and our\ncertificates
        of designation (for our preferred stock) provide that no person may acquire
        securities that would result in the direct or indirect beneficial ownership
        of more than 9.8% of its common stock or more than 9.8% in value of our outstanding\ncapital
        stock by such person. For purposes of application of such limitations to any
        person, all options, warrants, convertible securities or other rights to acquire
        Welltower Inc.&#146;s capital stock held directly or indirectly by such person
        will\nbe treated as if all such rights had been exercised. If any securities
        in excess of this limit are issued or transferred to any person, such issuance
        or transfer shall be valid only with respect to such amount of securities
        as does not exceed this\nlimit, and such issuance or transfer will be void
        with respect to the excess. The board of directors of Welltower Inc. may grant
        limited exemptions from the ownership restrictions set forth in the <FONT
        STYLE=\"white-space:nowrap\">by-laws</FONT> to\nspecified persons if the board
        determines that each such limited exemption is in the best interests of Welltower
        Inc. and its stockholders. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our <FONT STYLE=\"white-space:nowrap\">by-laws</FONT>
        and certificates of designation further provide that, if the foregoing stock
        ownership\nlimitations are determined to be invalid by virtue of any legal
        decision, statute, rule or regulation, then the transferee of the shares or
        other securities will be deemed to have acted as our agent in acquiring the
        shares or other securities that\nare in excess of the limit, and will be deemed
        to hold such excess shares or securities on our behalf. As the equivalent
        of treasury securities for such purposes, the excess securities will not be
        entitled to any voting rights, will not be\nconsidered to be outstanding for
        quorum or voting purposes, and will not be entitled to receive dividends,
        interest or any other distribution with respect to such securities. Any person
        who receives dividends, interest or any other distribution in\nrespect of
        the excess securities will hold the same as our agent and for the transferee
        of the excess securities following a permitted transfer. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        addition, under our <FONT STYLE=\"white-space:nowrap\">by-laws</FONT> and
        certificates of designation, we may refuse to transfer any shares,\npassing
        either by voluntary transfer, by operation of law or under the last will and
        testament of any stockholder, if such transfer would or might, in the opinion
        of our board of directors or counsel, disqualify Welltower Inc. as a REIT.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">29 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_14\"></A>DESCRIPTION
        OF CERTAIN PROVISIONS OF CERTIFICATE </B></P>\n<P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>OF
        INCORPORATION AND <FONT STYLE=\"white-space:nowrap\">BY-LAWS</FONT> OF WELLTOWER
        INC. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Anti-Takeover Provisions </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our
        certificate\nof incorporation and <FONT STYLE=\"white-space:nowrap\">by-laws</FONT>
        contain provisions that may have the effect of discouraging persons from acquiring
        large blocks of our stock or delaying or preventing a change in our control.
