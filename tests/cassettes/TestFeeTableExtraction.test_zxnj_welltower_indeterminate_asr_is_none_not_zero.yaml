        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\" VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD
        WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P ALIGN=\"left\" STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:Times
        New Roman; font-size:10pt\">any limitations on direct or beneficial ownership
        and restrictions on transfer, in each case as may be\nappropriate to preserve
        our status as a REIT; and </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">any other
        specific terms, preferences, rights, limitations or restrictions of the shares
        of preferred stock.\n</P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As described
        under &#147;Description of Depositary Shares,&#148; we may, at our option,
        elect to offer depositary\nshares evidenced by depositary receipts. If we
        elect to do this, each depositary receipt will represent a fractional interest
        in a share of the particular series of preferred stock issued and deposited
        with a depositary. The applicable prospectus\nsupplement will describe the
        terms of the depositary receipts. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The shares of
        preferred stock are subject to restrictions on transfer\nunder certain circumstances
        described under &#147;Restrictions on Transfer of Securities&#148; below.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Rank</I>. Unless our board of\ndirectors
        otherwise determines and we so specify in the applicable prospectus supplement,
        we expect that the shares of preferred stock will, with respect to distribution
        rights and rights upon liquidation or dissolution, rank senior to all of our\nshares
        of common stock. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><I>Distributions</I>.<I> </I>Holders
        of shares of preferred stock of each series will be entitled to receive cash\nand/or
        share distributions at the rates and on the dates shown in the applicable
        prospectus supplement. Even though the shares of preferred stock may specify
        a fixed rate of distribution, our board of directors must authorize and declare
        those\ndistributions and they may be paid only out of assets legally available
        for payment. We will pay each distribution to holders of record as they appear
        on our share transfer books on the record dates fixed by our board of directors.
        In the case of\nshares of preferred stock represented by depositary receipts,
        the records of the depositary identified in the applicable prospectus supplement,
        or any successor depositary, will determine the persons to whom dividends
        are payable. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Distributions on any series
        of preferred stock may be cumulative or noncumulative, as provided in the
        applicable prospectus supplement. We\nrefer to each particular series, for
        ease of reference, as the applicable series. Cumulative distributions will
        be cumulative from and after the date shown in the applicable prospectus supplement.
        If our board of directors fails to authorize a\ndistribution on any applicable
        series that is noncumulative, the holders will have no right to receive, and
        we will have no obligation to pay, a distribution in respect of the applicable
        distribution period, whether or not distributions on that\nseries are declared
        payable in the future. If the applicable series is entitled to a cumulative
        distribution, we may not declare, or pay or set aside for payment, any full
        distributions on any other series of preferred stock ranking, as to\ndistributions,
        on a parity with or junior to the applicable series, unless we declare, and
        either pay or set aside for payment, full cumulative distributions on the
        applicable series for all past distribution periods and the then-current\ndistribution
        period. If the applicable series does not have a cumulative distribution,
        we must declare, and pay or set aside for payment, full distributions for
        the then-current distribution period only. When distributions are not paid,
        or set aside\nfor payment, in full upon any applicable series and the shares
        of any other series ranking on a parity as to distributions with the applicable
        series, we must declare, and pay or set aside for payment, all distributions
        upon the applicable series\nand any other parity series proportionately, in
        accordance with accrued and unpaid distributions of the several series. For
        these purposes, accrued and unpaid distributions do not include unpaid distribution
        periods on noncumulative preferred stock.\nNo interest will be payable in
        respect of any distribution payment that may be in arrears. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        as provided in the immediately\npreceding paragraph, unless we declare, and
        pay or set aside for payment, full cumulative distributions, including for
        the then-current period, on any cumulative applicable series, we may not declare,
        or pay or set aside for payment, any\ndistributions upon shares of common
        stock or any other equity securities ranking junior to or on a parity with
        the applicable series as to distributions or upon liquidation. The foregoing
        restriction does not apply to distributions paid in shares of\ncommon stock
        or other equity securities ranking junior to the applicable series as to distributions
        and upon liquidation. If the applicable series is noncumulative, we need only
        declare, and pay or set aside for payment, the distribution for the\nthen-current
        period, before declaring distributions on shares of common stock or junior
        or parity securities. In addition, under </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">19 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nthe circumstances that we
        could not declare a distribution, we may not redeem, purchase or otherwise
        acquire for any consideration any shares of common stock or other parity or
        junior equity\nsecurities, except upon conversion into or exchange for shares
        of common stock or other junior equity securities. We may, however, make purchases
        and redemptions otherwise prohibited pursuant to certain redemptions or pro
        rata offers to purchase the\noutstanding shares of the applicable series and
        any other parity series of preferred stock. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        will credit any distribution payment made\non an applicable series first against
        the earliest accrued but unpaid distribution due with respect to the series.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Redemption</I>. We\nmay have the right or
        may be required to redeem one or more series of preferred stock, as a whole
        or in part, in each case upon the terms, if any, and at the times and at the
        redemption prices shown in the applicable prospectus supplement. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If a series of preferred stock is subject to
        mandatory redemption, we will specify in the applicable prospectus supplement
        the number of\nshares we are required to redeem, when those redemptions start,
        the redemption price, and any other terms and conditions affecting the redemption.
        The redemption price will include all accrued and unpaid distributions, except
        in the case of\nnoncumulative preferred stock. The redemption price may be
        payable in cash or other property, as specified in the applicable prospectus
        supplement. If the redemption price for shares of preferred stock of any series
        is payable only from the net\nproceeds of our issuance of shares of capital
        stock, the terms of the preferred stock may provide that, if no shares of
        such capital stock shall have been issued or to the extent the net proceeds
        from any issuance are insufficient to pay in full the\naggregate redemption
        price then due, the shares of preferred stock will automatically and mandatorily
        be converted into shares of the applicable capital stock pursuant to conversion
        provisions specified in the applicable prospectus supplement. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Liquidation
        Preference</I>. The applicable prospectus supplement will show the liquidation
        preference of the applicable series. Upon our\nvoluntary or involuntary liquidation,
        before any distribution may be made to the holders of our shares of common
        stock or any other shares of capital stock ranking junior in the distribution
        of assets upon any liquidation to the applicable series,\nthe holders of that
        series will be entitled to receive, out of our assets legally available for
        distribution to stockholders, liquidating distributions in the amount of the
        liquidation preference, plus an amount equal to all distributions accrued\nand
        unpaid. In the case of a noncumulative applicable series, accrued and unpaid
        distributions include only the then-current distribution period. Unless otherwise
        provided in the applicable prospectus supplement, after payment of the full
        amount of\nthe liquidating distributions to which they are entitled, the holders
        of shares of preferred stock will have no right or claim to any of our remaining
        assets. If liquidating distributions shall have been made in full to all holders
        of shares of\npreferred stock, our remaining assets will be distributed among
        the holders of any other shares of capital stock ranking junior to the shares
        of preferred stock upon liquidation, according to their rights and preferences
        and in each case according\nto their number of shares. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If,
        upon any voluntary or involuntary liquidation, our available assets are insufficient
        to pay the amount of\nthe liquidating distributions on all outstanding shares
        of that series and the corresponding amounts payable on all shares of capital
        stock ranking on a parity in the distribution of assets with that series,
        then the holders of that series and all\nother equally ranking shares of capital
        stock shall share ratably in the distribution in proportion to the full liquidating
        distributions to which they would otherwise be entitled. For these purposes,
        our consolidation or merger with or into any\nother corporation or other entity,
        or the sale, lease or conveyance of all or substantially all of our property
        or business, shall not be deemed to constitute a liquidation. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Voting
        Rights</I>.<I> </I>Holders of the shares of preferred stock will not have
        any voting rights, except as described below or as\notherwise from time to
        time required by law or as specified in the applicable prospectus supplement.
        As more fully described under &#147;Description of Depositary Shares&#148;
        below, if we elect to issue depositary shares, each representing a\nfraction
        of a share of a series of preferred stock, each holder thereof will in effect
        be entitled to a fraction of a vote per depositary share. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">20 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless otherwise
        provided for in an applicable series, so long as any shares of preferred\nstock
        are outstanding, we may not, without the affirmative vote or consent of the
        holders of a majority of the shares (or such greater vote or consent as is
        required by the then-current rules of any stock exchange or trading market
        on which we shall\nhave listed the applicable series of preferred stock for
        trading or as otherwise provided in our organizational documents) of each
        series of preferred stock outstanding at that time: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">authorize,
        create or increase the authorized or issued amount of any class or series
        of shares of capital stock\nranking senior to that series of preferred stock
        with respect to distribution and liquidation rights; </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">reclassify
        any authorized shares of capital stock into a series of shares of capital
        stock ranking senior to that\nseries of preferred stock with respect to distribution
        and liquidation rights; </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">create, authorize
        or issue any security or obligation convertible into or evidencing the right
        to purchase any\nshares of capital stock ranking senior to that series of
        preferred stock with respect to distribution and liquidation rights; and </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">amend, alter
        or repeal the provisions of our certificate of incorporation relating to that
        series of preferred\nstock that materially and adversely affect the series
        of preferred stock. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The authorization,
        creation or increase of\nthe authorized or issued amount of any class or series
        of shares of capital stock ranking on parity with or junior to a series of
        preferred stock with respect to distribution and liquidation rights will not
        be deemed to materially and adversely\naffect that series. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Conversion
        Rights</I>.<I> </I>We will describe in the applicable prospectus supplement
        the terms and conditions,\nif any, upon which you may, or we may require you
        to, convert shares of any series of preferred stock into shares of common
        stock or any other class or series of shares of capital stock. The terms will
        include the number of shares of common stock or\nother capital stock into
        which the shares of preferred stock are convertible, the conversion price
        or manner of determining it, the conversion period, provisions as to whether
        conversion will be at the option of the holders of the series or at our\noption,
        the events requiring an adjustment of the conversion price, and provisions
        affecting conversion upon the redemption of shares of the series. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Our Exchange Rights</I>.<I> </I>We will describe
        in the applicable prospectus supplement the terms and conditions, if any,
        upon which we\ncan require you to exchange shares of any series of preferred
        stock for debt securities. If an exchange is required, you will receive debt
        securities with a principal amount equal to the liquidation preference of
        the applicable series of preferred\nstock. The other terms and provisions
        of the debt securities will not be materially less favorable to you than those
        of the series of preferred stock being exchanged. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">21 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_10\"></A>DESCRIPTION
        OF DEPOSITARY SHARES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This section
        describes the general terms and provisions of shares of preferred stock represented
        by depositary shares. The applicable\nprospectus supplement and any related
        free writing prospectus will describe the specific terms of the depositary
        shares offered through that prospectus supplement and any general terms outlined
        in this section that will not apply to those depositary\nshares. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">We
        have summarized in this section certain terms and provisions of the deposit
        agreement, the depositary shares and the receipts\nrepresenting depositary
        shares. The summary is not complete. You should read the forms of deposit
        agreement and depositary receipt that we will file with the SEC at or before
        the time of the offering of the depositary shares for additional\ninformation
        before you buy any depositary shares. In this description, all references
        to &#147;we,&#148; &#147;us,&#148; &#147;our&#148; or the &#147;Company&#148;
        refer only to Welltower Inc. and not to any of its subsidiaries. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>General </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We may, at our
        option, elect to\noffer fractional interests in shares of preferred stock,
        rather than shares of preferred stock. If we exercise this option, we will
        appoint a depositary to issue depositary receipts representing those fractional
        interests. Shares of preferred stock\nof each series represented by depositary
        shares will be deposited under a separate deposit agreement between us and
        the depositary. The prospectus supplement relating to a series of depositary
        shares will provide the name and address of the\ndepositary. Subject to the
        terms of the applicable deposit agreement, each owner of depositary shares
        will be entitled to all of the dividend, voting, conversion, redemption, liquidation
        and other rights and preferences of the shares of preferred\nstock represented
        by those depositary shares. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Depositary receipts
        issued pursuant to the applicable deposit agreement will evidence\nownership
        of depositary shares. Upon surrender of depositary receipts at the office
        of the depositary, and upon payment of the charges provided in and subject
        to the terms of the deposit agreement, a holder of depositary shares will
        be entitled to\nreceive the shares of preferred stock underlying the surrendered
        depositary receipts. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Distributions </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">A
        depositary will be required to distribute all dividends or other cash distributions
        received in respect of the applicable shares of preferred\nstock to the record
        holders of depositary receipts evidencing the related depositary shares in
        proportion to the number of depositary receipts owned by the holders. Fractions
        will be rounded down to the nearest whole cent. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the distribution is other than in cash, a depositary will be required to distribute
        property received by it to the record holders of\ndepositary receipts entitled
        thereto, unless the depositary determines that it is not feasible to make
        the distribution. In that case, the depositary may, with our approval, sell
        the property and distribute the net proceeds from the sale to the\nholders
        of depositary shares. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Depositary shares
        that represent shares of preferred stock converted or exchanged will not be
        entitled to\ndistributions. The deposit agreement also will contain provisions
        relating to the manner in which any subscription or similar rights we offer
        to holders of shares of preferred stock will be made available to holders
        of depositary shares. All\ndistributions will be subject to obligations of
        holders to file proofs, certificates and other information and to pay certain
        charges and expenses to the depositary. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Withdrawal
        of Shares of Preferred Stock </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">You may receive
        the number of whole shares of your series of preferred stock and any money
        or other property represented by your depositary\nreceipts after surrendering
        your depositary receipts at the corporate trust office of the depositary.
        Partial shares of preferred stock will not be issued. If the depositary shares
        that you surrender exceed the number of depositary shares that\nrepresent
        the number of whole shares of preferred stock you wish to withdraw, then the
        depositary will deliver to you at the same time a new depositary receipt </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">22 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nevidencing the excess number of depositary
        shares. Once you have withdrawn your shares of preferred stock, you will not
        be entitled to redeposit those shares of preferred stock under the deposit\nagreement
        in order to receive depositary shares. We do not expect that there will be
        any public trading market for withdrawn shares of preferred stock. </P>\n<P
        STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Redemption of Depositary Shares </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        we\nredeem a series of the preferred stock underlying the depositary shares,
        the depositary will redeem those shares from the proceeds it receives. The
        redemption price per depositary share will be equal to the applicable fraction
        of the redemption\nprice per share payable with respect to the series of the
        preferred stock. The redemption date for depositary shares will be the same
        as that of the preferred stock. If we are redeeming less than all of the depositary
        shares, the depositary will\nselect the depositary shares we are redeeming
        by lot or pro rata as the depositary may determine. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">After
        the date fixed for redemption,\nthe depositary shares called for redemption
        will no longer be deemed outstanding. All rights of the holders of the depositary
        shares and the related depositary receipts will cease at that time, except
        the right to receive the money or other property\nto which the holders of
        depositary shares were entitled upon redemption. Receipt of the money or other
        property is subject to surrender to the depositary of the depositary receipts
        evidencing the redeemed depositary shares. </P>\n<P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Voting
        of the Underlying Shares of Preferred Stock </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        receipt of notice of any meeting at which the holders of the preferred stock
        are entitled to vote, a depositary will be required to mail\nthe information
        contained in the notice of meeting to the record holders of the depositary
        shares representing such preferred stock. Each record holder of depositary
        receipts on the record date will be entitled to instruct the depositary as
        to how\nthe holder&#146;s depositary shares will be voted. The record date
        for the depositary shares will be the same as the record date for the preferred
        stock. The depositary will vote the shares as you instruct. We will agree
        to take all reasonable\naction that the depositary deems necessary in order
        to enable it to vote the preferred stock in that manner. If you do not instruct
        the depositary how to vote your shares, the depositary will abstain from voting
        those shares. The depositary will not\nbe responsible for any failure to carry
        out any voting instruction, or for the manner or effect of any vote, as long
        as its action or inaction is in good faith and does not result from its negligence
        or willful misconduct. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Liquidation Preference </B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon our\nliquidation, whether voluntary or
        involuntary, each holder of depositary shares will be entitled to the fraction
        of the liquidation preference accorded each share of preferred stock represented
        by the depositary shares, as described in the\napplicable prospectus supplement.
        </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Conversion or Exchange of Shares of Preferred Stock </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The depositary shares will not themselves be
        convertible into or exchangeable for shares of common stock or preferred stock
        or any of our other\nsecurities or property. Nevertheless, if so specified
        in the applicable prospectus supplement, the depositary receipts may be surrendered
        by holders to the applicable depositary with written instructions to it to
        instruct us to cause the conversion\nof the preferred stock represented by
        the depositary shares. Similarly, if so specified in the applicable prospectus
        supplement, we may require you to surrender all of your depositary receipts
        to the applicable depositary upon our requiring the\nconversion or exchange
        of the preferred stock represented by the depositary shares into our debt
        securities. We will agree that, upon receipt of the instruction and any amounts
        payable in connection with the conversion or exchange, we will cause the\nconversion
        or exchange using the same procedures as those provided for delivery of shares
        of preferred stock to effect the conversion or exchange. If you are converting
        only a part of the depositary shares, the depositary will issue you a new\ndepositary
        receipt for any unconverted depositary shares. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">23 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Amendment and Termination
        of a Deposit Agreement </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">We and the applicable
        depositary are permitted to amend the provisions of the depositary receipts
        and the deposit agreement. However, the\nholders of at least a majority of
        the applicable depositary shares then outstanding (or such greater approval
        as is required by the then-current rules of any stock exchange or trading
        market on which we shall have listed the applicable underlying\nseries of
        preferred stock for trading or as otherwise provided in our organizational
        documents) must approve any amendment that adds or increases fees or charges
        or prejudices an important right of holders. Every holder of an outstanding
        depositary\nreceipt at the time any amendment becomes effective, by continuing
        to hold the receipt, will be bound by the applicable deposit agreement, as
        amended. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any deposit agreement may be
        terminated by us upon not less than <FONT STYLE=\"white-space:nowrap\">30-days&#146;</FONT>
        prior written notice to\nthe applicable depositary if (1)&nbsp;the termination
        is necessary to preserve our status as a REIT or (2)&nbsp;a majority of each
        series of preferred stock affected by the termination consents to the termination.
        When either event occurs, the\ndepositary will be required to deliver or make
        available to each holder of depositary receipts, upon surrender of the depositary
        receipts held by the holder, the number of whole or fractional shares of preferred
        stock as are represented by the\ndepositary shares evidenced by the depositary
        receipts, together with any other property held by the depositary with respect
        to the depositary receipts. In addition, a deposit agreement will automatically
        terminate if: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">all depositary
        shares have been redeemed; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">there shall
        have been a final distribution in respect of the related preferred stock in
        connection with our\nliquidation and the distribution has been made to the
        holders of depositary receipts evidencing the depositary shares underlying
        the preferred stock; or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">each related
        share of preferred stock shall have been converted or exchanged into securities
        not represented by\ndepositary shares. </P></TD></TR></TABLE> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Charges
        of a Depositary </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We will pay all transfer and
        other taxes and governmental charges arising solely from the existence of
        a deposit agreement. In addition, we\nwill pay the fees and expenses of a
        depositary in connection with the initial deposit of the preferred stock and
        any redemption of preferred stock. However, holders of depositary receipts
        will pay any transfer or other governmental charges and the\nfees and expenses
        of a depositary for any duties the holders request to be performed that are
        outside of those expressly provided for in the applicable deposit agreement.
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Resignation and Removal of a Depositary </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">A
        depositary may resign at any time by providing us notice of its election to
        resign. In addition, we may at any time remove a depositary. Any\nresignation
        or removal will take effect when we appoint a successor depositary and it
        accepts the appointment. We must appoint a successor depositary within 60
        days after delivery of the notice of resignation or removal. A depositary
        must be a bank\nor trust company that has its principal office in the United
        States and a combined capital and surplus of at least $50&nbsp;million. </P>
        <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Miscellaneous\n</B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">A depositary
        will be required to forward to holders of depositary receipts any reports
        and communications from us that it receives\nwith respect to the related shares
        of preferred stock, including, without limitation, proxy solicitation materials.
        Holders of depository receipts will be able to inspect the transfer books
        of the depository and the list of holders of receipts upon\nreasonable notice.
        Neither we nor any depositary will be liable if either party is prevented
        from or delayed in performing its obligations under a deposit agreement by
        law or any circumstances beyond its control. Our obligations and those of
        the\ndepositary under a deposit agreement will be limited to performing duties
        in good faith and without gross negligence or willful misconduct. </P>\n <p
        STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">24
        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Neither we nor any depositary
        will be obligated to prosecute or defend any legal proceeding\nin respect
        of any depositary receipts, depositary shares or related shares of preferred
        stock unless satisfactory indemnity is furnished. We and each depositary will
        be permitted to rely on written advice of counsel or accountants, on information\nprovided
        by persons presenting shares of preferred stock for deposit, by holders of
        depositary receipts, or by other persons believed in good faith to be competent
        to give the information, and on documents believed in good faith to be genuine
        and\nsigned by a proper party. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If a depositary
        receives conflicting claims, requests or instructions from any holder of depositary
        receipts,\non the one hand, and us, on the other hand, the depositary shall
        be entitled to act on the claims, requests or instructions received from us.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">25 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_11\"></A>DESCRIPTION
        OF WARRANTS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This section describes the general
        terms and provisions of the warrants. The applicable prospectus supplement
        and any related free writing\nprospectus will describe the specific terms
        of the warrants offered through that prospectus supplement and any general
        terms outlined in this section that will not apply to those warrants. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have summarized in this section certain terms
        and provisions of the warrant agreement and the warrants. The summary is not
        complete. You\nshould read the forms of warrant and warrant agreement that
        we will file with the SEC at or before the time of the offering of the applicable
        series of warrants for additional information before you buy any warrants.
        In this description, all\nreferences to &#147;we,&#148; &#147;us,&#148; &#147;our&#148;
        or the &#147;Company&#148; refer only to Welltower Inc. and not to any of
        its subsidiaries. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">We may issue, together with
        any other securities being offered or separately, warrants entitling the holder
        to purchase from or sell to us, or\nto receive from us the cash value of the
        right to purchase or sell, debt securities, preferred stock, depositary shares
        or common stock. We and a warrant agent will enter into a warrant agreement
        pursuant to which the warrants will be issued. The\nwarrant agent will act
        solely as our agent in connection with the warrants and will not assume any
        obligation or relationship of agency or trust for or with any holders or beneficial
        owners of warrants. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In the case of each series of
        warrants, the applicable prospectus supplement and any related free writing
        prospectus will describe the terms\nof the warrants being offered thereby.
        These include the following, if applicable: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
