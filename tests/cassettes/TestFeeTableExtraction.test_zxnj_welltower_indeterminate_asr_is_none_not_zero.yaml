        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_5\"></A>THE
        COMPANY </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Welltower Inc. (NYSE:WELL),
        an S&amp;P 500 company headquartered in Toledo, Ohio, is driving the transformation
        of healthcare infrastructure.\nWe invest with leading seniors housing operators,
        post-acute providers and health systems to fund the real estate and infrastructure
        needed to scale innovative care delivery models and improve people&#146;s
        wellness and overall healthcare\nexperience. Welltower<SUP STYLE=\"font-size:75%;
        vertical-align:top\">&#153;</SUP>, a REIT, owns interests in properties concentrated
        in major, high-growth markets in the United States (&#147;U.S.&#148;), Canada
        and the United Kingdom, consisting of\nseniors housing, post-acute communities
        and outpatient medical properties.&nbsp;We are structured as an umbrella partnership
        REIT, or &#147;UPREIT,&#148; under which substantially all of our business
        is conducted through Welltower OP, the <FONT\nSTYLE=\"white-space:nowrap\"><FONT
        STYLE=\"white-space:nowrap\">day-to-day</FONT></FONT> management of which
        is exclusively controlled by Welltower Inc. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our
        primary objectives are to protect stockholder capital and enhance stockholder
        value. We seek to pay consistent cash dividends to\nstockholders and create
        opportunities to increase dividend payments to stockholders as a result of
        annual increases in net operating income and portfolio growth. To meet these
        objectives, we invest across the full spectrum of seniors housing and\nhealthcare
        real estate and diversify our investment portfolio by property type, relationship
        and geographic location. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Welltower Inc.
        is\nthe initial member and majority owner of Welltower OP, with an approximate
        ownership interest of 99.707% as of December&nbsp;31, 2024. Welltower Inc.
        issues equity from time to time, the net proceeds of which it is obligated
        to contribute as\nadditional capital to Welltower OP. All debt, including
        credit facilities, senior notes and secured debt, is generally incurred by
        Welltower OP or its subsidiaries, and Welltower Inc. has fully and unconditionally
        guaranteed all existing and future\nsenior unsecured notes. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our
        principal executive offices are located at 4500 Dorr Street, Toledo, Ohio,
        43615, and our telephone number is\n(419) <FONT STYLE=\"white-space:nowrap\">247-2800.</FONT>
        Our internet address is at www.welltower.com. The information on our website
        is not incorporated by reference in this prospectus or any prospectus supplement,
        and our web address is included as\nan inactive textual reference only. </P>\n
