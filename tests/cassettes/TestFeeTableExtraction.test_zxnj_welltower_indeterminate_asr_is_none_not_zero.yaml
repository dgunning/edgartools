        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">As provided in the Indenture and subject to
        certain limitations therein set forth, the\ntransfer of this Security is registrable
        in the Security Register, upon surrender of this Security for registration
        of transfer at the office or agency of the Issuer in any place where the principal
        of and any premium and interest on this Security\nare payable, duly endorsed
        by, or accompanied by a written instrument of transfer in form satisfactory
        to the Issuer and the Security Registrar duly executed by, the Holder hereof
        or his or her attorney duly authorized in writing, and thereupon one\nor more
        new Securities of this series and of like tenor, of authorized denominations
        and for the same aggregate principal amount, will be issued to the designated
        transferee or transferees. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Securities
        of this series are issuable only in registered form without coupons in denominations
        of $__________ and any integral multiple\nthereof. As provided in the Indenture
        and subject to certain limitations therein set forth, Securities of this series
        are exchangeable for a like aggregate principal amount of Securities of this
        series and of like tenor of a different authorized\ndenomination, as requested
        by the Holder surrendering the same. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No service charge
        shall be made for any such registration of transfer or\nexchange, but the
        Issuer may require payment of a sum sufficient to cover any tax or other governmental
        charge payable in connection therewith. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Prior
        to due presentment of this Security for registration of transfer, the Issuer,
        the Trustee and any agent of the Issuer or the Trustee may\ntreat the Person
        in whose name this Security is registered as the owner hereof for all purposes,
        whether or not this Security be overdue, and neither the Issuer, the Trustee
        nor any such agent shall be affected by notice to the contrary. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        terms used in this Security which are defined in the Indenture shall have
        the meanings assigned to them in the Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;204
        Form of Legend for Global Securities. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise specified as contemplated by Section&nbsp;301 for the Securities
        evidenced thereby, every Global Security authenticated and\ndelivered hereunder
        shall bear a legend in substantially the following form: </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        Security is a Global Security within the meaning of the\nIndenture hereinafter
        referred to and is registered in the name of a Depositary or a nominee thereof.
        This Security may not be exchanged in whole or in part for a Security registered,
        and no transfer of this Security in whole or in part may be\nregistered, in
        the name of any Person other than such Depositary or a nominee thereof, except
        in the limited circumstances described in the Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;205
        Form of Trustee&#146;s Certificate of Authentication. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee&#146;s certificates of authentication shall be in substantially the
        following form: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This is one of the Securities
        of the series designated therein referred to in the within-mentioned Indenture.
        </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><DIV
        ALIGN=\"right\">\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" WIDTH=\"40%\"
        BORDER=\"0\" STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman;
        font-size:10pt\">\n\n\n<TR>\n\n<TD WIDTH=\"5%\"></TD>\n\n<TD VALIGN=\"bottom\"
        WIDTH=\"1%\"></TD>\n<TD WIDTH=\"94%\"></TD></TR>\n\n\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\" COLSPAN=\"3\">As
        Trustee</TD></TR>\n<TR STYLE=\"font-size:1pt\">\n<TD HEIGHT=\"16\"></TD>\n<TD
        HEIGHT=\"16\" COLSPAN=\"2\"></TD></TR>\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">By</TD>\n<TD
        VALIGN=\"bottom\">&nbsp;</TD>\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
        New Roman\">&nbsp;</P></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\" COLSPAN=\"3\">Authorized
        Signatory</TD></TR>\n</TABLE></DIV>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">19 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">Dated: </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE THREE </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>THE\nSECURITIES
        </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;301 Amount Unlimited; Issuable
        in Series. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The aggregate principal amount
        of Securities which may be authenticated and delivered under this Indenture
        is unlimited. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Securities may be issued
        in one or more series. There shall be established in or pursuant to a Board
        Resolution and, subject to\nSection&nbsp;303, set forth, or determined in
        the manner provided, in an Officers&#146; Certificate, or established in one
        or more indentures supplemental hereto, prior to the issuance of Securities
        of any series: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) the title of the Securities
        of the series, including &#147;<B>CUSIP</B>&#148; numbers (which shall distinguish
        the Securities of the series\nfrom Securities of any other series); </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) any limit upon the aggregate principal amount
        of the Securities of the series which may be\nauthenticated and delivered
        under this Indenture (except for Securities authenticated and delivered upon
        registration of transfer of, or in exchange for, or in lieu of, other Securities
        of the series pursuant to Section&nbsp;304, 305, 306, 1006 or\n1207 and except
        for any Securities which, pursuant to Section&nbsp;303, are deemed never to
        have been authenticated and delivered hereunder); </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        the Person to whom any interest on a Security of the series shall be payable,
        if other than the Person in whose name that Security (or one\nor more Predecessor
        Securities) is registered at the close of business on the Regular Record Date
        for such interest; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(d) the date or dates\non which
        the principal of any Securities of the series is payable; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e)
        the rate or rates at which any Securities of the series shall bear\ninterest,
        if any, the date or dates from which any such interest shall accrue, the Interest
        Payment Dates on which any such interest shall be payable and the Regular
        Record Date for any such interest payable on any Interest Payment Date; </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) the place or places where the principal
        of and any premium and interest on any Securities of the series shall be payable;
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(g) the period or periods within which, the
        price or prices at which and the terms and conditions upon which any Securities
        of the series may\nbe redeemed, in whole or in part, at the option of the
        Issuer and, if other than by a Board Resolution, the manner in which any election
        by the Issuer to redeem the Securities shall be evidenced; </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">20 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) the obligation,
        if any, of the Issuer to redeem or purchase any Securities of the series\npursuant
        to any sinking fund or analogous provisions or at the option of the Holder
        thereof and the period or periods within which, the price or prices at which
        and the terms and conditions upon which any Securities of the series shall
        be redeemed\nor purchased, in whole or in part, pursuant to such obligation;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(i) if other than denominations of $1,000 and
        any integral multiple\nthereof, the denominations in which any Securities
        of the series shall be issuable; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) if the amount
        of principal of or any premium or\ninterest on any Securities of the series
        may be determined with reference to an index or pursuant to a formula, the
        manner in which such amounts shall be determined; </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(k)
        if other than the currency of the United States of America, the currency,
        currencies or currency units in which the principal of or any\npremium or
        interest on any Securities of the series shall be payable and the manner of
        determining the equivalent thereof in the currency of the United States of
        America for any purpose, including for purposes of the definition of\n&#147;<B>Outstanding</B>&#148;
        in Section&nbsp;101; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(l) if the principal of or any
        premium or interest on any Securities of the series is\nto be payable, at
        the election of the Issuer or the Holder thereof, in one or more currencies
        or currency units other than that or those in which such Securities are stated
        to be payable, the currency, currencies or currency units in which the\nprincipal
        of or any premium or interest on such Securities as to which such election
        is made shall be payable, the periods within which and the terms and conditions
        upon which such election is to be made and the amount so payable (or the manner
        in\nwhich such amount shall be determined); </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(m)
        if other than the entire principal amount thereof, the portion of the principal
        amount of any\nSecurities of the series which shall be payable upon declaration
        of acceleration of the Maturity thereof pursuant to Section&nbsp;602; </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(n)\nif the principal amount payable at the
        Stated Maturity of any Securities of the series will not be determinable as
        of any one or more dates prior to the Stated Maturity, the amount which shall
        be deemed to be the principal amount of such Securities\nas of any such date
        for any purpose thereunder or hereunder, including the principal amount thereof
        which shall be due and payable upon any Maturity other than the Stated Maturity
        or which shall be deemed to be Outstanding as of any date prior to\nthe Stated
        Maturity (or, in any such case, the manner in which such amount deemed to
        be the principal amount shall be determined); </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(o)
        if\napplicable, that the Securities of the series, in whole or any specified
        part, shall be defeasible pursuant to Section&nbsp;1402 or Section&nbsp;1403
        or both such Sections and, if other than by a Board Resolution, the manner
        in which any election by\nthe Issuer to defease such Securities shall be evidenced;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">21 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(p) if applicable, that any Securities of the
        series shall be issuable in whole or in part\nin the form of one or more Global
        Securities and, in such case, the respective Depositaries for such Global
        Securities, the form of any legend or legends which shall be borne by any
        such Global Security in addition to or in lieu of that set forth in\nSection&nbsp;204
        and any circumstances in addition to or in lieu of those set forth in clause
        (b)&nbsp;of Section&nbsp;305 in which any such Global Security may be exchanged
        in whole or in part for Securities registered, and any transfer of such\nGlobal
        Security in whole or in part may be registered, in the name or names of Persons
        other than the Depositary for such Global Security or a nominee thereof; </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(q) any addition to or change in the Events
        of Default which applies to any Securities of the series and any change in
        the right of the Trustee\nor the requisite Holders of such Securities to declare
        the principal amount thereof due and payable pursuant to Section&nbsp;602;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(r) any\naddition to or change in the covenants
        set forth in Article Eleven which applies to Securities of the series; </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(s) if applicable, that the\nSecurities of the
        series are convertible into or exchangeable for common stock or other securities
        of the Issuer, the period or periods within which, the price or prices at
        which and the terms and conditions upon which, and the limitations and\nrestrictions,
        if any, upon which, any Securities of the series shall be convertible or exchangeable,
        in whole or in part, into common stock or other securities of the Issuer;
        and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(t) any other terms of the series (which terms
        shall not be inconsistent with the provisions of this Indenture, except as
        permitted by\nSection&nbsp;1001(e)). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">All Securities
        of any one series shall be substantially identical except as to denomination
        and except as may\notherwise be provided in or pursuant to the Board Resolution
        referred to above and (subject to Section&nbsp;303) set forth, or determined
        in the manner provided, in the Officers&#146; Certificate referred to above
        or in any such indenture\nsupplemental hereto. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any of the terms of the series are established by action taken pursuant to
        a Board Resolution, a copy of an\nappropriate record of such action shall
        be certified by the Secretary or an Assistant Secretary of the Issuer and
        delivered to the Trustee at or prior to the delivery of the Officers&#146;
        Certificate setting forth the terms of the series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;302
        Denominations. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Securities of each series
        shall be issuable only in registered form without coupons and only in such
        denominations as shall be specified\nas contemplated by Section&nbsp;301.
        In the absence of any such specified denomination with respect to the Securities
        of any series, the Securities of such series shall be issuable in denominations
        of $2,000 and integral multiple of $1,000 in excess\nthereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;303
        Execution, Authentication, Delivery and Dating. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Securities shall be executed on behalf of the Issuer by its Chairman of the
        Board, its Vice Chairman of the Board, its President or one of\nits Vice Presidents,
        and may, but need not, have corporate or limited liability company seal reproduced
        thereon attested by its Secretary or one of its Assistant Secretaries. The
        signature of any of these officers on the Securities may be manual or\nelectronic.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">22 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Securities bearing the manual or electronic
        signatures of individuals who were at any time\nthe proper officers of the
        Issuer shall bind the Issuer, notwithstanding that such individuals or any
        of them have ceased to hold such offices prior to the authentication and delivery
        of such Securities or did not hold such offices at the date of\nsuch Securities.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">At any time and from time to time after the
        execution and delivery of this Indenture, the Issuer may deliver Securities\nof
        any series executed by the Issuer to the Trustee for authentication, together
        with an Issuer Order for the authentication and delivery of such Securities,
        and the Trustee in accordance with the Issuer Order shall authenticate and
        deliver such\nSecurities. If the form or terms of the Securities of the series
        have been established by or pursuant to one or more Board Resolutions as permitted
        by Sections 201 and 301, in authenticating such Securities, and accepting
        the additional\nresponsibilities under this Indenture in relation to such
        Securities, the Trustee shall be provided with, and (subject to Section&nbsp;701)
        shall be fully protected in relying upon, an Opinion of Counsel stating: </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) if the form of such Securities has been
        established by or pursuant to Board Resolution as permitted by Section&nbsp;201,
        that such form has\nbeen established in conformity with the provisions of
        this Indenture; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) if the terms of such Securities
        have been established by or\npursuant to Board Resolution as permitted by
        Section&nbsp;301, that such terms have been established in conformity with
        the provisions of this Indenture; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) that such
        Securities, when authenticated and delivered by the Trustee and issued by
        the Issuer in the manner and subject to any conditions\nspecified in such
        Opinion of Counsel, will constitute valid and legally binding obligations
        of the Issuer enforceable in accordance with their terms, subject to bankruptcy,
        insolvency, fraudulent transfer, reorganization, moratorium and similar laws\nof
        general applicability relating to or affecting creditors&#146; rights and
        to general equity principles. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If such form
        or terms have\nbeen so established, the Trustee shall not be required to authenticate
        such Securities if the issue of such Securities pursuant to this Indenture
        will affect the Trustee&#146;s own rights, duties or immunities under the
        Securities and this Indenture\nor otherwise in a manner which is not reasonably
        acceptable to the Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each Security
        shall be dated the date of its authentication.\n</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        Security shall be entitled to any benefit under this Indenture or be valid
        or obligatory for any purpose unless there appears on such\nSecurity a certificate
        of authentication substantially in the form provided for herein executed by
        the Trustee by manual or electronic signature, and such certificate upon any
        Security shall be conclusive evidence, and the only evidence, that such\nSecurity
        has been duly authenticated and delivered hereunder. Notwithstanding the foregoing,
        if any Security shall have been authenticated and delivered hereunder but
        never issued and sold by the Issuer, and the Issuer shall deliver such Security
        to\nthe Trustee for cancellation as provided in Section&nbsp;309, for all
        purposes of this Indenture such Security shall be deemed never to have been
        authenticated and delivered hereunder and shall never be entitled to the benefits
        of this Indenture.\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">23 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;304 Temporary Securities. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Pending the preparation of definitive Securities
        of any series, the Issuer may execute, and upon Issuer Order the Trustee shall
        authenticate\nand deliver, temporary Securities which are printed, lithographed,
        typewritten, mimeographed or otherwise produced, in any authorized denomination,
        substantially of the tenor of the definitive Securities in lieu of which they
        are issued and with\nsuch appropriate insertions, omissions, substitutions
        and other variations as the officers executing such Securities may determine,
        as evidenced by their execution of such Securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        temporary Securities of any series are issued, the Issuer will cause definitive
        Securities of that series to be prepared without\nunreasonable delay. After
        the preparation of definitive Securities of such series, the temporary Securities
        of such series shall be exchangeable for definitive Securities of such series
        upon surrender of the temporary Securities of such series at\nthe office or
        agency of the Issuer in a Place of Payment for that series, without charge
        to the Holder. Upon surrender for cancellation of any one or more temporary
        Securities of any series, the Issuer shall execute and the Trustee shall\nauthenticate
        and deliver in exchange therefor one or more definitive Securities of the
        same series, of any authorized denominations and of like tenor and aggregate
        principal amount. Until so exchanged, the temporary Securities of any series
        shall in\nall respects be entitled to the same benefits under this Indenture
        as definitive Securities of such series and tenor. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;305\nRegistration,
        Registration of Transfer and Exchange. </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall cause to be kept at the Corporate Trust Office of the Trustee
        a\nregister (the register maintained in such office and in any other office
        or agency of the Issuer in a Place of Payment being herein sometimes collectively
        referred to as the &#147;<B>Security Register</B>&#148;) in which, subject
        to such reasonable\nregulations as it may prescribe, the Issuer shall provide
        for the registration of Securities and of transfers of Securities. The Trustee
        is hereby appointed &#147;<B>Security Registrar</B>&#148; for the purpose
        of registering Securities and\ntransfers of Securities as herein provided.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon surrender for registration of transfer
        of any Security of a series at the office or\nagency of the Issuer in a Place
        of Payment for that series, the Issuer shall execute, and the Trustee shall
        authenticate and deliver, in the name of the designated transferee or transferees,
        one or more new Securities of the same series, of any\nauthorized denominations
        and of like tenor and aggregate principal amount. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">At
        the option of the Holder, Securities of any series may be\nexchanged for other
        Securities of the same series, of any authorized denominations and of like
        tenor and aggregate principal amount, upon surrender of the Securities to
        be exchanged at such office or agency. Whenever any Securities are so\nsurrendered
        for exchange, the Issuer shall execute, and the Trustee shall authenticate
        and deliver, the Securities which the Holder making the exchange is entitled
        to receive. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">24 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">All Securities issued upon any registration
        of transfer or exchange of Securities shall be\nthe valid obligations of the
        Issuer, evidencing the same debt, and entitled to the same benefits under
        this Indenture, as the Securities surrendered upon such registration of transfer
        or exchange. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Every Security presented or
        surrendered for registration of transfer or for exchange shall (if so required
        by the Issuer or the Trustee) be\nduly endorsed, or be accompanied by a written
        instrument of transfer in form satisfactory to the Issuer and the Security
        Registrar duly executed, by the Holder thereof or his or her attorney duly
        authorized in writing. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No service charge
        shall be made for any registration of transfer or exchange of Securities,
        but the Issuer may require payment of a sum\nsufficient to cover any tax or
        other governmental charge that may be imposed in connection with any registration
        of transfer or exchange of Securities, other than exchanges pursuant to Section&nbsp;304,
        1006 or 1207 not involving any transfer. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the Securities of any series (or of any series and specified tenor) are to
        be redeemed in part, the Issuer shall not be required\n(a)&nbsp;to issue,
        register the transfer of or exchange any Securities of that series (or of
        that series and specified tenor, as the case may be) during a period beginning
        at the opening of business 15 days before the day of the mailing of a notice\nof
        redemption of any such Securities selected for redemption under Section&nbsp;1203
        and ending at the close of business on the day of such mailing, or (b)&nbsp;to
        register the transfer of or exchange any Security so selected for redemption
        in whole\nor in part, except the unredeemed portion of any Security being
        redeemed in part. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The provisions of clauses (a),
        (b), (c) and\n(d)&nbsp;below shall apply only to Global Securities: </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) Each Global Security authenticated under
        this Indenture shall be registered in\nthe name of the Depositary designated
        for such Global Security or a nominee thereof and delivered to such Depositary
        or a nominee thereof or custodian therefor, and each such Global Security
        shall constitute a single Security for all purposes of\nthis Indenture. </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) Notwithstanding any other provision in this
        Indenture, no Global Security may be exchanged in whole or in part for\nSecurities
        registered, and no transfer of a Global Security in whole or in part may be
        registered, in the name of any Person other than the Depositary for such Global
        Security or a nominee thereof unless (i)&nbsp;such Depositary (A)&nbsp;has\nnotified
        the Issuer that it is unwilling or unable to continue as Depositary for such
        Global Security or (B)&nbsp;has ceased to be a clearing agency registered
        under the Exchange Act, and such Depositary provided reasonable notice to
        the Issuer or\nthe Trustee and no successor depositary is obtained (ii)&nbsp;there
        shall have occurred and be continuing an Event of Default with respect to
        such Global Security or (iii)&nbsp;there shall exist such circumstances, if
        any, in addition to or in lieu\nof the foregoing as have been specified for
        this purpose as contemplated by Section&nbsp;301. </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        Subject to clause (b)&nbsp;above, any\nexchange of a Global Security for other
        Securities may be made in whole or in part, and all Securities issued in exchange
        for a Global Security or any portion thereof shall be registered in such names
        as the Depositary for such Global Security shall\ndirect. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">25 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) Every Security
        authenticated and delivered upon registration of transfer of, or in\nexchange
        for or in lieu of, a Global Security or any portion thereof, whether pursuant
        to this Section, Section&nbsp;304, 306, 1006 or 1207 or otherwise, shall be
        authenticated and delivered in the form of, and shall be, a Global Security,
        unless\nsuch Security is registered in the name of a Person other than the
        Depositary for such Global Security or a nominee thereof. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;306
        Mutilated, Destroyed, Lost and Stolen Securities. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any mutilated Security is surrendered to the Trustee, the Issuer shall execute
        and the Trustee shall authenticate and deliver in exchange\ntherefor a new
        Security of the same series and of like tenor and principal amount and bearing
        a number not contemporaneously outstanding. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        there shall be delivered to the Issuer and the Trustee (a)&nbsp;evidence to
        their satisfaction of the destruction, loss or theft of any\nSecurity and
        (b)&nbsp;such security or indemnity as may be required by them to save each
        of them and any agent of either of them harmless, then, in the absence of
        notice to the Issuer or the Trustee that such Security has been acquired by
        a bona\nfide purchaser, the Issuer shall execute and the Trustee shall authenticate
        and deliver, in lieu of any such destroyed, lost or stolen Security, a new
        Security of the same series and of like tenor and principal amount and bearing
        a number not\ncontemporaneously outstanding. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case any such mutilated, destroyed, lost or stolen Security has become or
        is about to become due and\npayable, the Issuer in its discretion may, instead
        of issuing a new Security, pay such Security. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        the issuance of any new Security\nunder this Section, the Issuer may require
        the payment of a sum sufficient to cover any tax or other governmental charge
        that may be imposed in relation thereto and any other expenses (including
        the fees and expenses of the Trustee) connected\ntherewith. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every
        new Security of any series issued pursuant to this Section in lieu of any
        destroyed, lost or stolen Security shall\nconstitute an original additional
        contractual obligation of the Issuer, whether or not the destroyed, lost or
        stolen Security shall be at any time enforceable by anyone, and shall be entitled
        to all the benefits of this Indenture equally and\nproportionately with any
        and all other Securities of that series duly issued hereunder. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        provisions of this Section are exclusive and\nshall preclude (to the extent
        lawful) all other rights and remedies with respect to the replacement or payment
        of mutilated, destroyed, lost or stolen Securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;307
        Payment of Interest; Interest Rights Preserved. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        as otherwise provided as contemplated by Section&nbsp;301 with respect to
        any series of Securities, interest on any Security which is\npayable, and
        is punctually paid or duly provided for, on any Interest Payment Date shall
        be paid to the Person in whose name that Security (or one or more Predecessor
        Securities) is registered at the close of business on the Regular Record Date
        for\nsuch interest. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">26 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any interest on any Security of any series which
        is payable, but is not punctually paid or\nduly provided for, on any Interest
        Payment Date (herein called &#147;<B>Defaulted Interest</B>&#148;) shall forthwith
        cease to be payable to the Holder on the relevant Regular Record Date by virtue
        of having been such Holder, and such Defaulted\nInterest may be paid by the
        Issuer, at its election in each case, as provided in clause (a)&nbsp;or (b)
        below: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) The Issuer may elect to\nmake
        payment of any Defaulted Interest to the Persons in whose names the Securities
        of such series (or their respective Predecessor Securities) are registered
        at the close of business on a Special Record Date for the payment of such
        Defaulted\nInterest, which shall be fixed in the following manner. The Issuer
        shall notify the Trustee in writing of the amount of Defaulted Interest proposed
        to be paid on each Security of such series and the date of the proposed payment,
        and at the same time\nthe Issuer shall deposit with the Trustee an amount
        of money equal to the aggregate amount proposed to be paid in respect of such
        Defaulted Interest or shall make arrangements satisfactory to the Trustee
        for such deposit prior to the date of the\nproposed payment, such money when
        deposited to be held in trust for the benefit of the Persons entitled to such
        Defaulted Interest as in this clause provided. Thereupon the Trustee shall
        fix a Special Record Date for the payment of such Defaulted\nInterest which
        shall be not more than 15 days and not less than 10 days prior to the date
        of the proposed payment and not less than 10 days after the receipt by the
        Trustee of the notice of the proposed payment. The Trustee shall promptly
        notify the\nIssuer of such Special Record Date and, in the name and at the
        expense of the Issuer, shall cause notice of the proposed payment of such
        Defaulted Interest and the Special Record Date therefor to be given to each
        Holder of Securities of such series\nin the manner set forth in Section&nbsp;106,
        not less than 10 days prior to such Special Record Date. Notice of the proposed
        payment of such Defaulted Interest and the Special Record Date therefor having
        been so mailed, such Defaulted Interest shall\nbe paid to the Persons in whose
        names the Securities of such series (or their respective Predecessor Securities)
        are registered at the close of business on such Special Record Date and shall
        no longer be payable pursuant to the following clause (b).\n</P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        The Issuer may make payment of any Defaulted Interest on the Securities of
        any series in any other lawful manner not inconsistent with\nthe requirements
        of any securities exchange on which such Securities may be listed, and upon
        such notice as may be required by such exchange, if, after notice given by
        the Issuer to the Trustee of the proposed payment pursuant to this clause,
        such\nmanner of payment shall be deemed practicable by the Trustee. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to the foregoing provisions of this
        Section, each Security\ndelivered under this Indenture upon registration of
        transfer of or in exchange for or in lieu of any other Security shall carry
        the rights to interest accrued and unpaid, and to accrue, which were carried
        by such other Security. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;308
        Persons Deemed Owners. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Prior to due
        presentment of a Security for registration of transfer, the Issuer, the Trustee
        and any agent of the Issuer or the Trustee may\ntreat the Person in whose
        name such Security is registered as the owner of such Security for the purpose
        of receiving payment of principal of and any premium and (subject to Section&nbsp;307)
        any interest on such Security and for all other purposes\nwhatsoever, whether
        or not such Security be overdue, and neither the Issuer, the Trustee nor any
        agent of the Issuer or the Trustee shall be affected by notice to the contrary.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">27 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;309 Cancellation. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">All Securities surrendered for payment, redemption,
        registration of transfer or exchange or for credit against any sinking fund
        payment shall,\nif surrendered to any Person other than the Trustee, be delivered
        to the Trustee and shall be promptly cancelled by it. The Issuer may at any
        time deliver to the Trustee for cancellation any Securities previously authenticated
        and delivered\nhereunder which the Issuer may have acquired in any manner
        whatsoever, and may deliver to the Trustee (or to any other Person for delivery
        to the Trustee) for cancellation any Securities previously authenticated hereunder
        which the Issuer has not\nissued and sold, and all Securities so delivered
        shall be promptly cancelled by the Trustee. No Securities shall be authenticated
        in lieu of or in exchange for any Securities cancelled as provided in this
        Section, except as expressly permitted by\nthis Indenture. All cancelled Securities
        held by the Trustee shall be disposed of by the Trustee in its customary manner.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;310 Computation of Interest.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise specified as contemplated
        by Section&nbsp;301 for Securities of any series, interest on the Securities
        of each series\nshall be computed on the basis of a <FONT STYLE=\"white-space:nowrap\">360-day</FONT>
        year of twelve <FONT STYLE=\"white-space:nowrap\">30-day</FONT> months. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;311 CUSIP Numbers. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer in issuing the Securities may use
        &#147;<B>CUSIP</B>&#148; numbers (if then generally in use), and, if so, the
        Trustee shall use\n&#147;<B>CUSIP</B>&#148; numbers in notices of redemption
        as a convenience to Holders; <U>provided</U> that any such notice may state
        that no representation is made as to the correctness of such numbers either
        as printed on the Securities or as\ncontained in any notice of a redemption
        and that reliance may be placed only on the other identification numbers printed
        on the Securities, and any such redemption shall not be affected by any defect
        in or omission of such numbers. The Issuer will\npromptly notify the Trustee
        in writing of any change in the &#147;<B>CUSIP</B>&#148; numbers. </P> <P
        STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE FOUR </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>GUARANTEES
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;401 Applicability of Article;
        Guarantee. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) If the Issuer elects to
        issue any series of Securities with the benefit of Guarantees, then the provisions
        of this Article Four (with such\nmodifications thereto as may be specified
        pursuant to Section&nbsp;301 with respect to any series of Securities), will
        be applicable to such Securities. Each reference in this Article Four to a
        &#147;Security&#148; or &#147;the Securities&#148;\nrefers to the Securities
        of the particular series as to which provision has been made for such Guarantees.
        If more than one series of Securities as to which such provision has been
        made are Outstanding at any time, the provisions of this Article\nFour shall
        be applied separately to each such series. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">28 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) Subject
        to this Article Four, the Guarantor fully and unconditionally guarantees to
        each\nHolder of a Security of any series issued with the benefit of Guarantees
        authenticated and delivered by the Trustee and to the Trustee and its successors
        and assigns, irrespective of the validity and enforceability of this Indenture,
        such Security\nor the obligations of the Issuer hereunder or thereunder, that:
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) the principal of, premium,
        if any, and interest on\nsuch Security will be promptly paid in full when
        due, whether at maturity, by acceleration, redemption or otherwise, and interest
        on the overdue principal of and interest on such Security, if any, if lawful,
        and all other obligations of the Issuer\nto the Holders or the Trustee hereunder
        or thereunder will be promptly paid in full or performed, all in accordance
        with the terms hereof and thereof; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        in case of any extension of time of payment or renewal of any Securities of
        that series or any of such other obligations,\nthat same will be promptly
        paid in full when due or performed in accordance with the terms of the extension
        or renewal, whether at stated maturity, by acceleration or otherwise. Failing
        payment when due of any amount so guaranteed or any performance\nso guaranteed
        for whatever reason, the Guarantor will be obligated to pay the same immediately.
        The Guarantor agrees that this is a guarantee of payment and not a guarantee
        of collection. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(c) The Guarantor hereby agrees
        that its obligations hereunder are unconditional, irrespective of the validity,
        regularity or enforceability of\nthe Securities of any series issued with
        the benefit of Guarantees or this Indenture, the absence of any action to
        enforce the same, any waiver or consent by any Holder of the Securities of
        that series with respect to any provisions hereof or\nthereof, the recovery
        of any judgment against the Issuer, any action to enforce the same or any
        other circumstance which might otherwise constitute a legal or equitable discharge
        or defense of a guarantor, other than payment in full of all\nobligations
        under the Securities of that series. The Guarantor in respect of a series
        of Securities hereby waives diligence, presentment, demand of payment, filing
        of claims with a court in the event of insolvency or bankruptcy of the Issuer
        in\nrespect of that series, any right to require a proceeding first against
        the Issuer, protest, notice and all demands whatsoever and covenants that
        this Guarantee will not be discharged except by complete performance of the
        obligations contained in\nsuch Securities and this Indenture. </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        If any Holder or the Trustee is required by any court or otherwise to return
        to the Issuer, the\nGuarantor or any custodian, trustee, liquidator or other
        similar official acting in relation to either the Issuer or the Guarantor,
        any amount paid by either to the Trustee or such Holder, this Guarantee, to
        the extent theretofore discharged, will\nbe reinstated in full force and effect.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">29 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(e) The Guarantor agrees that it will not be
        entitled to any right of subrogation in\nrelation to the Holders in respect
        of any obligations guaranteed hereby until payment in full of all obligations
        guaranteed hereby. The Guarantor further agrees that, as between the Guarantor,
        on the one hand, and the Holders and the Trustee, on the\nother hand, (1)&nbsp;the
        maturity of the obligations guaranteed hereby may be accelerated as provided
        in Article Six hereof for the purposes of its Guarantee notwithstanding any
        stay, injunction or other prohibition preventing such acceleration in\nrespect
        of the obligations guaranteed hereby, and (2)&nbsp;in the event of any declaration
        of acceleration of such obligations as provided in Article Six hereof, such
        obligations (whether or not due and payable) will forthwith become due and
        payable\nby the Guarantor for the purpose of its Guarantee. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;402
        Limitation on Guarantor Liability. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Guarantor,
        and by its acceptance of Securities of any series issued with the benefit
        of Guarantees, each Holder, hereby confirms that it\nis the intention of all
        such parties that the Guarantee of the Guarantor not constitute a fraudulent
        transfer or conveyance for purposes of Bankruptcy Law, the Uniform Fraudulent
        Conveyance Act, the Uniform Fraudulent Transfer Act or any similar\nfederal
        or state law to the extent applicable to any Guarantee. To effectuate the
        foregoing intention, the Trustee, the Holders and the Guarantor hereby irrevocably
        agree that the obligations of the Guarantor will, after giving effect to any
        maximum\namount and all other contingent and fixed liabilities of the Guarantor
        that are relevant under such laws, result in the obligations of the Guarantor
        under its Guarantee not constituting a fraudulent transfer or conveyance.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;403 Execution and Delivery of
        Guarantee. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">To evidence its Guarantee set
        forth in Section&nbsp;401 in respect of Securities of a series issued with
        the benefit of Guarantees, the\nGuarantor hereby agrees that a notation of
        such Guarantee substantially in the form as shall be established in one or
        more indentures supplemental hereto or approved from time to time pursuant
        to Board Resolutions in accordance with\nSection&nbsp;301, will be endorsed
        by an officer of the Guarantor on each Security of that series authenticated
        and delivered by the Trustee and that this Indenture will be executed on behalf
        of the Guarantor by one of its officers. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Guarantor hereby agrees that its Guarantee set forth in Section&nbsp;401 will
        remain in full force and effect notwithstanding any failure\nto endorse on
        each Security of that series a notation of such Guarantee. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an officer whose signature is on this Indenture or on the\nGuarantee no longer
        holds that office at the time the Trustee authenticates the Security of that
        series on which a Guarantee is endorsed, such Guarantee will be valid nevertheless.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The delivery of any Security of a series issued
        with the benefit of Guarantees by the Trustee, after the authentication thereof
        hereunder,\nwill constitute due delivery of the Guarantee set forth in this
        Indenture on behalf of the Guarantor. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">30 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        FIVE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>SATISFACTION AND DISCHARGE
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;501 Satisfaction and Discharge
        of Indenture. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This Indenture and any related
        Guarantee shall upon Issuer Request cease to be of further effect (except
        as to any surviving rights of\nregistration of transfer or exchange of Securities
        herein expressly provided for and other rights and remedies referenced herein),
        and the Trustee, at the expense of the Issuer, shall execute proper instruments
        acknowledging satisfaction and\ndischarge of this Indenture, when </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) either </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(i) all Securities theretofore authenticated and delivered (other
        than (A)&nbsp;Securities which have been destroyed, lost or\nstolen and which
        have been replaced or paid as provided in Section&nbsp;306 and (B)&nbsp;Securities
        for whose payment money has theretofore been deposited in trust or segregated
        and held in trust by the Issuer and thereafter repaid to the Issuer or\ndischarged
        from such trust, as provided in Section&nbsp;1103) have been delivered to
        the Trustee for cancellation; or (ii)&nbsp;all such Securities not theretofore
        delivered to the Trustee for cancellation </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:13%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(A) have become due and payable, or </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:13%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(B) will become due and payable at their Stated Maturity within
        one year, or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:13%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(C) are to be
        called for redemption within one year under arrangements satisfactory to the
        Trustee for the giving of notice of\nredemption by the Trustee in the name,
        and at the expense, of the Issuer, </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; font-size:10pt; font-family:Times New Roman\">and the Issuer,
        in the case of (A), (B) or (C)&nbsp;above, has\ndeposited or caused to be
        deposited with the Trustee an amount of money sufficient to pay and discharge
        the entire indebtedness on such Securities not theretofore delivered to the
        Trustee for cancellation, for principal and any premium and interest\nto the
        date of such deposit (in the case of Securities which have become due and
        payable) or to the Stated Maturity or Redemption Date, as the case may be;
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) the Issuer has paid or caused to be paid
        all other sums payable hereunder by the Issuer; and </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        the Issuer has delivered to the Trustee an Officers&#146; Certificate and
        an Opinion of Counsel, each stating that all conditions precedent\nherein
        provided for relating to the satisfaction and discharge of this Indenture
        have been complied with. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notwithstanding
        the\nsatisfaction and discharge of this Indenture, the obligations of the
        Issuer to the Trustee under Section&nbsp;707, the obligations of the Trustee
        to any Authenticating Agent under Section&nbsp;714 and, if money shall have
        been deposited with the\nTrustee pursuant to subclause (ii)&nbsp;of clause
        (a)&nbsp;of this Section, the obligations of the Trustee under Section&nbsp;502
        and the last paragraph of Section&nbsp;1103 shall survive such satisfaction
        and discharge. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">31 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;502 Application of Trust Money.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to the provisions of the last paragraph
        of Section&nbsp;1103, all money deposited with the Trustee pursuant to Section&nbsp;501
        shall\nbe held in trust and applied by it, in accordance with the provisions
        of the Securities and this Indenture, to the payment, either directly or through
        any Paying Agent (including the Issuer acting as its own Paying Agent) as
        the Trustee may\ndetermine, to the Persons entitled thereto, of the principal
        and any premium and interest for whose payment such money has been deposited
        with the Trustee. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE SIX </B></P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>REMEDIES\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;601
        Events of Default. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Event
        of Default,</B>&#148; wherever used herein with respect to Securities of any
        series, means any one of the following events\n(whatever the reason for such
        Event of Default and whether it shall be voluntary or involuntary or be effected
        by operation of law or pursuant to any judgment, decree or order of any court
        or any order, rule or regulation of any administrative or\ngovernmental body):
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) default in the payment of the principal
        of or any premium on any Security of that series at its Maturity; or </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) default in the payment of any interest upon
        any Security of that series when it becomes due and payable, and continuance
        of such default\nfor a period of 30 days; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        default in the deposit of any sinking fund payment, when and as due by the
        terms of a Security of that\nseries and continuance of such default for a
        period of 30 days; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(d) default in the performance
        of, or breach of, any covenant of an\nObligor in this Indenture (other than
        a covenant a default in whose performance or whose breach is elsewhere in
        this Section specifically dealt with or which has been expressly included
        in this Indenture solely for the benefit of a series of\nSecurities other
        than that series), and continuance of such default or breach for a period
        of 60 days after there has been given, by first class mail, to the Obligors
        by the Trustee or to the Obligors and the Trustee by the Holders of at least
        a\nmajority in principal amount of the Outstanding Securities of that series
        a written notice specifying such default or breach and requiring it to be
        remedied and stating that such notice is a &#147;<B>Notice of Default</B>&#148;
        hereunder; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(e) a default under any bond,
        debenture, note or other evidence of indebtedness of an Obligor, or under
        any mortgage, indenture or other\ninstrument of an Obligor (including a default
        with respect to Securities of any series other than that series) under which
        there may be issued or by which there may be secured any indebtedness of such
        Obligor (or by any Subsidiary, the repayment of\nwhich such Obligor has guaranteed
        or for which such Obligor </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">32 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nis directly responsible or
        liable as obligor or guarantor), whether such indebtedness now exists or shall
        hereafter be created, which default shall constitute a failure to pay an aggregate\nprincipal
        amount exceeding $__________ of such indebtedness when due and payable after
        the expiration of any applicable grace period with respect thereto and shall
        have resulted in such indebtedness in an aggregate principal amount exceeding\n$__________
        becoming or being declared due and payable prior to the date on which it would
        otherwise have become due and payable, without such indebtedness having been
        discharged, or such acceleration having been rescinded or annulled, within
        a\nperiod of 10 days after there shall have been given, by first class mail,
        to such Obligor by the Trustee or to such Obligor and the Trustee by the Holders
        of at least a majority in principal amount of the Outstanding Securities of
        that series a\nwritten notice specifying such default and requiring such Obligor
        to cause such indebtedness to be discharged or cause such acceleration to
        be rescinded or annulled and stating that such notice is a &#147;<B>Notice
        of Default</B>&#148; hereunder; or\n</P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(f) an Obligor
        or any Significant Subsidiary pursuant to or within the meaning of any Bankruptcy
        Law (i)&nbsp;commences a voluntary case,\n(ii)&nbsp;consents to the entry
        of an order for relief against it in an involuntary case, or (iii)&nbsp;consents
        to the appointment of a Custodian of it or for all or substantially all of
        its property, or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(g) a court of competent jurisdiction
        enters an order or decree under any Bankruptcy Law that: (i)&nbsp;is for relief
        against an Obligor or any\nSignificant Subsidiary in an involuntary case,
        (ii)&nbsp;appoints a Custodian of an Obligor or any Significant Subsidiary
        or for all or substantially all of either of its property, or (iii)&nbsp;orders
        the liquidation of an Obligor or any\nSignificant Subsidiary, and the order
        or decree remains unstayed and in effect for 90 days; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h)
        any Guarantee is not, or is claimed by\nthe Guarantor not to be, in full force
        and effect; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) any other Event of Default
        provided with respect to Securities of that series.\n</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;602
        Acceleration of Maturity; Rescission and Annulment. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an Event of Default (other than an Event of Default specified in Section&nbsp;601(f)
        or 601(g)) with respect to Securities of any series at\nthe time Outstanding
        occurs and is continuing, then in every such case the Trustee or the Holders
        of not less than a majority of the principal amount of the Outstanding Securities
        of that series may declare the principal amount of all the Securities\nof
        that series (or, if any Securities of that series are Original Issue Discount
        Securities, such portion of the principal amount of such Securities as may
        be specified by the terms thereof) to be due and payable immediately, by a
        notice in writing\nto the Issuer (and to the Trustee if given by Holders),
        and upon any such declaration such principal amount (or specified amount)
        shall become immediately due and payable. If an Event of Default specified
        in clause (f)&nbsp;or (g) of\nSection&nbsp;601 with respect to Securities
        of any series at the time Outstanding occurs, the principal amount of all
        the Securities of that series (or, if any Securities of that series are Original
        Issue Discount Securities, such portion of the\nprincipal amount of such Securities
        as may be specified by the terms thereof) shall automatically, and without
        any declaration or other action on the part of the Trustee or any Holder,
        become immediately due and payable. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">33 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">At any time
        after such a declaration of acceleration with respect to Securities of any\nseries
        has been made and before a judgment or decree for payment of the money due
        has been obtained by the Trustee as hereinafter provided in this Article,
        the Holders of a majority in principal amount of the Outstanding Securities
        of that series,\nby written notice to the Issuer and the Trustee, may rescind
        and annul such declaration and its consequences if: </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        the Issuer has paid\nor deposited with the Trustee a sum sufficient to pay
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) all overdue interest on
        all Securities of that series, </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        the principal of (and premium, if any, on) any Securities of that series which
        have become due otherwise than by such\ndeclaration of acceleration and any
        interest thereon at the rate or rates prescribed therefor in such Securities,
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(iii) to\nthe extent that payment
        of such interest is lawful, interest upon overdue interest at the rate or
        rates prescribed therefor in such Securities, and (iv)&nbsp;all sums paid
        or advanced by the Trustee hereunder and the reasonable compensation,\nexpenses,
        disbursements and advances of the Trustee, its agents and counsel; and </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) all Events of Default with respect to Securities
        of\nthat series, other than the <FONT STYLE=\"white-space:nowrap\">non-payment</FONT>
        of the principal of Securities of that series which have become due solely
        by such declaration of acceleration, have been cured or waived as provided
        in\nSection&nbsp;613. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No such rescission
        shall affect any subsequent default or impair any right consequent thereon.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Trustee shall not be required to act upon
        an Event of Default unless a Responsible Officer has received written notice
        of such Event of\nDefault. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;603
        Collection of Indebtedness and Suits for Enforcement by Trustee. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer covenants that if: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        default is made in the payment of any interest on any Security when such interest
        becomes due and payable and such default continues for a\nperiod of 30 days,
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) default is made in the payment of the principal
        of (or premium, if any, on) any Security at the Maturity\nthereof, </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">the Issuer will, upon demand of the Trustee, pay to it, for the
        benefit of the Holders of such Securities, the whole amount then due and payable\non
        such Securities for principal and any premium and interest and, to the extent
        that payment of such interest shall be legally enforceable, interest on any
        overdue principal and premium and on any overdue interest, at the rate or
        rates prescribed\ntherefor in such Securities, and, in addition thereto, such
        further amount as shall be sufficient to cover the amounts owed to the Trustee,
        including the reasonable compensation, expenses, disbursements and advances
        of the Trustee, its agents and\ncounsel. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">34 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If an Event
        of Default with respect to Securities of any series occurs and is continuing,\nthe
        Trustee may in its discretion proceed to protect and enforce its rights and
        the rights of the Holders of Securities of such series by such appropriate
        judicial proceedings as the Trustee shall deem necessary to protect and enforce
        any such\nrights, whether for the specific enforcement of any covenant or
        agreement in this Indenture or in aid of the exercise of any power granted
        herein, or to enforce any other proper remedy. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;604
        Trustee May File Proofs of Claim. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In case of any
        judicial proceeding relative to an Obligor (or any other obligor upon the
        Securities), its property or its creditors, the\nTrustee shall be entitled
        and empowered, by intervention in such proceeding or otherwise, to take any
        and all actions authorized under the Trust Indenture Act in order to have
        claims of the Holders and the Trustee allowed in any such proceeding. In\nparticular,
        the Trustee shall be authorized to collect and receive any moneys or other
        property payable or deliverable on any such claims and to distribute the same;
        and any custodian, receiver, assignee, trustee, liquidator, sequestrator or
        other\nsimilar official in any such judicial proceeding is hereby authorized
        by each Holder to make such payments to the Trustee and, in the event that
        the Trustee shall consent to the making of such payments directly to the Holders,
        to pay to the Trustee\nany amount due it for the reasonable compensation,
        expenses, disbursements and advances of the Trustee, its agents and counsel,
        and any other amounts due the Trustee under Section&nbsp;707. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        provision of this Indenture shall be deemed to authorize the Trustee to authorize
        or consent to or accept or adopt on behalf of any Holder\nany plan of reorganization,
        arrangement, adjustment or composition affecting the Securities or the rights
        of any Holder thereof or to authorize the Trustee to vote in respect of the
        claim of any Holder in any such proceeding; provided, however, that\nthe Trustee
        may, on behalf of the Holders, vote for the election of a trustee in bankruptcy
        or similar official and be a member of a creditors&#146; or other similar
        committee. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;605 Trustee
        May Enforce Claims Without Possession of Securities. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        rights of action and claims under this Indenture or the Securities may be
        prosecuted and enforced by the Trustee without the possession of\nany of the
        Securities or the production thereof in any proceeding relating thereto, and
        any such proceeding instituted by the Trustee shall be brought in its own
        name as trustee of an express trust, and any recovery of judgment shall, after\nprovision
        for the payment of the reasonable compensation, expenses, disbursements and
        advances of the Trustee, its agents and counsel, be for the ratable benefit
        of the Holders of the Securities in respect of which such judgment has been
        recovered.\n</P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;606 Application
        of Money Collected. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any money collected
        by the Trustee pursuant to this Article shall be applied in the following
        order, at the date or dates fixed by the Trustee\nand, in case of the distribution
        of such money on account of principal or any premium or interest, upon presentation
        of the Securities and the notation thereon of the payment if only partially
        paid and upon surrender thereof if fully paid: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">FIRST:
        To the payment of all amounts due the Trustee under Section&nbsp;707, </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">35 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">SECOND: To the payment of the amounts then due
        and unpaid for principal of and any premium\nand interest on the Securities
        in respect of which or for the benefit of which such money has been collected,
        ratably, without preference or priority of any kind, according to the amounts
        due and payable on such Securities for principal and any\npremium and interest,
        respectively, and </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">THIRD: To the Person entitled
        to receive the same; if no other Person shall be entitled thereto,\nthen to
        the Issuer, or as a court of competent jurisdiction may direct. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;607
        Limitation on Suits. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No Holder of
        any Security of any series shall have any right to institute any proceeding,
        judicial or otherwise, with respect to this\nIndenture, or for the appointment
        of a receiver or trustee, or for any other remedy hereunder, unless: </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) such Holder has previously\ngiven written
        notice to the Trustee of a continuing Event of Default with respect to the
        Securities of that series; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) the Holders
        of not\nless than a majority in principal amount of the Outstanding Securities
        of that series shall have made written request to the Trustee to institute
        proceedings in respect of such Event of Default in its own name as Trustee
        hereunder; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(c) such Holder or Holders have
        offered to the Trustee reasonable indemnity satisfactory to it against the
        costs, expenses and liabilities to\nbe incurred in compliance with such request;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(d) the Trustee for 60 days after its receipt
        of such notice, request and offer of indemnity\nhas failed to institute any
        such proceeding; and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(e) no direction inconsistent
        with such written request has been given to the Trustee\nduring such <FONT
        STYLE=\"white-space:nowrap\">60-day</FONT> period by the Holders of a majority
        in principal amount of the Outstanding Securities of that series; </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">it being understood and intended that no one or more of such Holders
        shall have any right in any manner whatever by virtue of, or by availing of,
        any\nprovision of this Indenture to affect, disturb or prejudice the rights
        of any other of such Holders, or to obtain or to seek to obtain priority or
        preference over any other of such Holders or to enforce any right under this
        Indenture, except in the\nmanner herein provided and for the equal and ratable
        benefit of all of such Holders. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;608
        Unconditional Right of Holders\nto Receive Principal, Premium and Interest.
        </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Notwithstanding any other provision in this
        Indenture, the Holder of any Security shall\nhave the right, which is absolute
        and unconditional, to receive payment of the principal of and any premium
        and (subject to Section&nbsp;307) interest on such Security on the respective
        Stated Maturities expressed in such Security (or, in the case\nof redemption,
        on the Redemption Date) and to institute suit for the enforcement of any such
        payment, and such rights shall not be impaired without the consent of such
        Holder. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">36 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;609 Restoration of Rights and
        Remedies. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If the Trustee or any Holder
        has instituted any proceeding to enforce any right or remedy under this Indenture
        and such proceeding has been\ndiscontinued or abandoned for any reason, or
        has been determined adversely to the Trustee or to such Holder, then and in
        every such case, subject to any determination in such proceeding, the Issuer,
        the Trustee and the Holders shall be restored\nseverally and respectively
        to their former positions hereunder and thereafter all rights and remedies
        of the Trustee and the Holders shall continue as though no such proceeding
        had been instituted. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;610
        Rights and Remedies Cumulative. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except as otherwise
        provided with respect to the replacement or payment of mutilated, destroyed,
        lost or stolen Securities in the last\nparagraph of Section&nbsp;306, no right
        or remedy herein conferred upon or reserved to the Trustee or to the Holders
        is intended to be exclusive of any other right or remedy, and every right
        and remedy shall, to the extent permitted by law, be\ncumulative and in addition
        to every other right and remedy given hereunder or now or hereafter existing
        at law or in equity or otherwise. The assertion or employment of any right
        or remedy hereunder, or otherwise, shall not prevent the concurrent\nassertion
        or employment of any other appropriate right or remedy. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;611
        Delay or Omission Not Waiver. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No delay or
        omission of the Trustee or of any Holder of any Securities to exercise any
        right or remedy accruing upon any Event of Default\nshall impair any such
        right or remedy or constitute a waiver of any such Event of Default or an
        acquiescence therein. Every right and remedy given by this Article or by law
        to the Trustee or to the Holders may be exercised from time to time, and as\noften
        as may be deemed expedient, by the Trustee or by the Holders, as the case
        may be. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;612 Control
        by Holders. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Holders of a majority in
        principal amount of the Outstanding Securities of any series shall have the
        right to direct the time, method and\nplace of conducting any proceeding for
        any remedy available to the Trustee, or exercising any trust or power conferred
        on the Trustee, with respect to the Securities of such series, provided that:
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) such direction shall not be in conflict
        with any rule of law or with this Indenture, and </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        the Trustee may take any other action deemed proper by the Trustee which is
        not inconsistent with such direction. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">37 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;613
        Waiver of Past Defaults. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Holders
        of not less than a majority in principal amount of the Outstanding Securities
        of any series may on behalf of the Holders of all\nthe Securities of such
        series waive any past default hereunder with respect to such series and its
        consequences, except a default: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) in\nthe
        payment of the principal of or any premium or interest on any Security of
        such series, or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) in respect of a covenant
        or provision\nhereof which under Article Ten cannot be modified or amended
        without the consent of the Holder of each Outstanding Security of such series
        affected. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Upon any such waiver, such default
        shall cease to exist, and any Event of Default arising therefrom shall be
        deemed to have been cured, for\nevery purpose of this Indenture; but no such
        waiver shall extend to any subsequent or other default or impair any right
        consequent thereon. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;614 Undertaking
        for Costs. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In any suit for the enforcement
        of any right or remedy under this Indenture, or in any suit against the Trustee
        for any action taken, suffered\nor omitted by it as Trustee, a court may require
        any party litigant in such suit to file an undertaking to pay the costs of
        such suit, and may assess costs (including reasonable attorneys&#146; fees
        and expenses) against any such party litigant, in\nthe manner and to the extent
        provided in the Trust Indenture Act. Except as otherwise provided in the Trust
        Indenture Act, this section does not apply to a suit by the Trustee, a suit
        by a Holder pursuant to Section&nbsp;608 hereof, or a suit by\nHolders of
        more than 10% in principal amount of the Outstanding Securities. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;615
        Waiver of Usury, Stay or Extension Laws.\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer covenants (to the extent that it may lawfully do so) that it will not
        at any time insist upon, or plead, or in any manner\nwhatsoever claim or take
        the benefit or advantage of, any usury, stay or extension law wherever enacted,
        now or at any time hereafter in force, which may affect the covenants or the
        performance of this Indenture; and the Issuer (to the extent that\nit may
        lawfully do so) hereby expressly waives all benefit or advantage of any such
        law and covenants that it will not hinder, delay or impede the execution of
        any power herein granted to the Trustee, but will suffer and permit the execution
        of\nevery such power as though no such law had been enacted. </P> <P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        SEVEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>THE TRUSTEE </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;701 Certain Duties and Responsibilities.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The duties and responsibilities of the Trustee
        shall be as provided by the Trust Indenture Act. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">38 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) Except during
        the continuance of an Event of Default, </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i)
        the Trustee undertakes to perform such duties and only such duties as are
        specifically set forth in this Indenture, and no\nimplied covenants or obligations
        shall be read into this Indenture against the Trustee; and </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(ii) in the absence of bad\nfaith on its part, the Trustee may
        conclusively rely, as to the truth of the statements and the correctness of
        the opinions expressed therein, upon certificates or opinions furnished to
        the Trustee and conforming to the requirements of this\nIndenture; but in
        the case of any such certificates or opinions which by any provision hereof
        are specifically required to be furnished to the Trustee, the Trustee shall
        be under a duty to examine the same to determine whether or not they conform
        to\nthe requirements of this Indenture (but need not confirm or investigate
        the accuracy of mathematical calculations or other facts stated therein).
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) In case an Event of Default has occurred
        and is continuing, the Trustee shall exercise such of the rights and powers
        vested in it by this\nIndenture, and use the same degree of care and skill
        in their exercise, as a prudent person would exercise or use under the circumstances
        in the conduct of his or her own affairs. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        No provision of this Indenture shall be construed to relieve the Trustee from
        liability for its own negligent action, its own negligent\nfailure to act,
        or its own willful misconduct, except that </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(i) this Subsection shall not be construed to limit the effect\nof
        Subsection (a)&nbsp;of this Section; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        the Trustee shall not be liable for any error of judgment made in good faith\nby
        a Responsible Officer, unless it shall be proved that the Trustee was negligent
        in ascertaining the pertinent facts; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(iii)
        the Trustee shall not be liable with respect to any action taken or omitted
        to be taken by it in good faith in accordance\nwith the direction of the Holders
        of a majority in principal amount of the Outstanding Securities of any series
        relating to the time, method and place of conducting any proceeding for any
        remedy available to the Trustee, or exercising any trust or\npower conferred
        upon the Trustee, under this Indenture with respect to the Securities of such
        series; and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(iv)\nnotwithstanding
        the foregoing, no provision of this Indenture shall require the Trustee to
        expend or risk its own funds or otherwise incur any financial liability in
        the performance of any of its duties hereunder, or in the exercise of any
        of its\nrights or powers, if it shall have reasonable grounds for believing
        that repayment of such funds or adequate indemnity against such risk or liability
        is not reasonably assured to it. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) Whether
        or not therein expressly so provided, every provision of this Indenture relating
        to the conduct or affecting the liability of or\naffording protection to the
        Trustee shall be subject to the provisions of this Section. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">39 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;702
        Notice of Defaults. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If a default
        occurs hereunder with respect to Securities of any series, the Trustee shall
        give the Holders of Securities of such series notice\nof such default as and
        to the extent provided by the Trust Indenture Act; provided, however, that
        in the case of any default of the character specified in clause (d)&nbsp;of
        Section&nbsp;501 with respect to Securities of such series, no such notice\nto
        Holders shall be given until at least 30 days after the occurrence thereof.
        For the purpose of this Section, the term &#147;default&#148; means any event
        which is, or after notice or lapse of time or both would become, an Event
        of Default with\nrespect to Securities of such series. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;703
        Certain Rights of Trustee. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Subject to the
        provisions of Section&nbsp;701: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) the Trustee
        may conclusively rely and shall be fully protected in acting or refraining
        from acting upon any resolution, certificate,\nstatement, instrument, opinion,
        report, notice, request, direction, consent, order, bond, debenture, note,
        other evidence of indebtedness or other paper or document believed by it to
        be genuine and to have been signed or presented by the proper\nparty or parties
        (but need not investigate the accuracy of any mathematical calculations or
        other facts stated therein); </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) any request\nor
        direction of the Issuer mentioned herein shall be sufficiently evidenced by
        an Issuer Request or Issuer Order, and any resolution of the Board shall be
        sufficiently evidenced by a Board Resolution; </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        whenever in the administration of this Indenture the Trustee shall deem it
        desirable that a matter be proved or established prior to\ntaking, suffering
        or omitting any action hereunder, the Trustee (unless other evidence be herein
        specifically prescribed) may, in the absence of bad faith on its part, rely
        upon an Officers&#146; Certificate; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) the Trustee
        may consult with counsel of its selection and the advice of such counsel or
        any Opinion of Counsel shall be full and complete\nauthorization and protection
        in respect of any action taken, suffered or omitted by it hereunder in good
        faith and in reliance thereon; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) the Trustee
        shall be under no obligation to exercise any of the rights or powers vested
        in it by this Indenture at the request or direction\nof any of the Holders
        pursuant to this Indenture, unless such Holders shall have offered to the
        Trustee reasonable security or indemnity satisfactory to it against the costs,
        expenses and liabilities which might be incurred by it in compliance with\nsuch
        request or direction; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(f) the Trustee shall not be
        bound to make any investigation into the facts or matters stated in any\nresolution,
        certificate, statement, instrument, opinion, report, notice, request, direction,
        consent, order, bond, debenture, note, other evidence of indebtedness or other
        paper or document, but the Trustee, in its discretion, may make such further\ninquiry
        or investigation into such facts or matters as it may see fit, and, if the
        Trustee shall determine to make such further inquiry or investigation, it
        shall be entitled to examine the books, records and premises of the Issuer,
        personally or by\nagent or attorney at the expense of the Issuer and shall
        incur no liability of any kind by reason of such inquiry or investigation;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">40 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(g) the Trustee may execute any of the trusts
        or powers hereunder or perform any duties\nhereunder either directly or by
        or through agents or attorneys and the Trustee shall not be responsible for
        any misconduct or negligence on the part of any agent or attorney appointed
        with due care by it hereunder; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) the Trustee
        shall not be liable for any action taken, suffered, or omitted to be taken
        by it in good faith and reasonably believed by it to\nbe authorized or within
        the discretion or rights or powers conferred upon it by this Indenture; </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(i) in no event shall the Trustee be\nresponsible
        or liable for special, indirect, punitive, or consequential loss or damage
        of any kind whatsoever (including, but not limited to, loss of profit) irrespective
        of whether the Trustee has been advised of the likelihood of such loss or\ndamage
        and regardless of the form of action; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) the Trustee
        shall not be deemed to have notice of any Default or Event of Default unless\nwritten
        notice of any event which is in fact such a default is received by the Trustee
        at the Corporate Trust Office of the Trustee, and such notice references the
        Securities and this Indenture; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(k) the rights,
        privileges, protections, immunities and benefits given to the Trustee, including,
        without limitation, its right to be\nindemnified, are extended to, and shall
        be enforceable by, the Trustee in each of its capacities hereunder, and each
        agent, custodian and other Person employed to act hereunder; and </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(l) the Trustee may request that the Issuer
        deliver a certificate setting forth the names of individuals and/or titles
        of officers authorized\nat such time to take specified actions pursuant to
        this Indenture. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;704 Not Responsible
        for Recitals or Issuance of\nSecurities. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        recitals contained herein and in the Securities, except the Trustee&#146;s
        certificates of authentication, shall be\ntaken as the statements of the Obligors,
        and neither the Trustee nor any Authenticating Agent assumes any responsibility
        for their correctness. The Trustee makes no representations as to the validity
        or sufficiency of this Indenture or of the\nSecurities. Neither the Trustee
        nor any Authenticating Agent shall be accountable for the use or application
        by the Issuer of Securities or the proceeds thereof. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;705
        May Hold Securities. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee,
        any Authenticating Agent, any Paying Agent, any Security Registrar or any
        other agent of the Issuer, in its individual or any\nother capacity, may become
        the owner or pledgee of Securities and, subject to Sections 708 and 713, may
        otherwise deal with the Issuer with the same rights it would have if it were
        not Trustee, Authenticating Agent, Paying Agent, Security Registrar\nor such
        other agent. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">41 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;706 Money Held in Trust. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Money held by the Trustee in trust hereunder
        need not be segregated from other funds except to the extent required by law.
        The Trustee shall be\nunder no liability for interest on any money received
        by it hereunder except as otherwise agreed with the Issuer. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;707\nCompensation,
        Reimbursement and Indemnification. </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer agrees:
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(1) to pay to the Trustee from
        time to time reasonable compensation for all services rendered by it hereunder
        (which\ncompensation shall not be limited by any provision of law in regard
        to the compensation of a trustee of an express trust); </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(2) except as otherwise expressly provided herein, to reimburse
        the Trustee upon its request for all expenses, disbursements\nand advances
        incurred or made by the Trustee in accordance with any provision of this Indenture
        (including the reasonable compensation and the expenses and disbursements
        of its agents and counsel), except any such expense, disbursement or advance
        as\nshall have been caused by its own negligence or willful misconduct; and
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(3) to fully indemnify each
        of the Trustee or any\npredecessor Trustee and their agents for, and to hold
        them harmless against, any loss, liability, claim, damage or expense incurred
        without negligence or willful misconduct on their part, arising out of or
        in connection with the acceptance or\nadministration of the trust or trusts
        hereunder, including the costs and expenses of defending themselves against
        any claim or liability in connection with the exercise or performance of any
        of their powers or duties hereunder. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">When the Trustee
        incurs expenses or renders services in connection with an Event of Default,
        the expenses (including the reasonable charges\nand expenses of its counsel)
        and the compensation for the services are intended to constitute expenses
        of administration under any applicable Federal or state bankruptcy, insolvency
        or other similar law. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        shall have a lien prior to the Securities as to all property and funds held
        by it hereunder for any amount owing it or any\npredecessor Trustee pursuant
        to this Section&nbsp;707, except with respect to funds held in trust for the
        benefit of the Holders of particular Securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        benefits of this Section shall survive the termination of the Indenture and
        resignation or removal of the Trustee. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;708
        Conflicting Interests. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If the Trustee
        has or shall acquire a conflicting interest within the meaning of the Trust
        Indenture Act, the Trustee shall either eliminate\nsuch interest or resign,
        to the extent and in the manner provided by, and subject to the provisions
        of, the Trust Indenture Act and this Indenture. To the extent permitted by
        the Trust Indenture Act, the Trustee shall not be deemed to have a\nconflicting
        interest by virtue of being a trustee under this Indenture with respect to
        Securities of more than one series or a trustee under those certain Indentures
        between the Issuer and the Trustee dated as of September&nbsp;6, 2002, as
        of\nNovember&nbsp;20, 2006 and as of March&nbsp;15, 2010, each as amended
        and supplemented. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">42 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;709 Corporate Trustee Required;
        Eligibility. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">There shall at all times be
        one (and only one) Trustee hereunder with respect to the Securities of each
        series, which may be Trustee hereunder\nfor Securities of one or more other
        series. Each Trustee shall be a Person that is eligible pursuant to the Trust
        Indenture Act to act as such, and has a combined capital and surplus of at
        least $50,000,000. If any such Person publishes reports of\ncondition at least
        annually, pursuant to law or to the requirements of its supervising or examining
        authority, then for the purposes of this Section and to the extent permitted
        by the Trust Indenture Act, the combined capital and surplus of such\nPerson
        shall be deemed to be its combined capital and surplus as set forth in its
        most recent report of condition so published. If at any time the Trustee with
        respect to the Securities of any series shall cease to be eligible in accordance
        with the\nprovisions of this Section, it shall resign immediately in the manner
        and with the effect hereinafter specified in this Article. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;710
        Resignation and Removal; Appointment of Successor. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        resignation or removal of the Trustee and no appointment of a successor Trustee
        pursuant to this Article shall become effective until the\nacceptance of appointment
        by the successor Trustee in accordance with the applicable requirements of
        Section&nbsp;711. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Trustee may\nresign at any
        time with respect to the Securities of one or more series by giving written
        notice thereof to the Issuer. If the instrument of acceptance by a successor
        Trustee required by Section&nbsp;711 shall not have been delivered to the
        Trustee\nwithin 30 days after the giving of such notice of resignation, the
        resigning Trustee may petition, at the expense of the Issuer, any court of
        competent jurisdiction for the appointment of a successor Trustee with respect
        to the Securities of such\nseries. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        may be removed at any time with respect to the Securities of any series by
        Act of the Holders of a majority in\nprincipal amount of the Outstanding Securities
        of such series, upon 30 days&#146; written notice, delivered to the Trustee
        and to the Issuer. If the instrument of acceptance by a successor Trustee
        required by Section&nbsp;711 shall not have been\ndelivered to the Trustee
        within 30 days after such removal, the retiring Trustee may petition, at the
        expense of the Issuer, any court of competent jurisdiction for the appointment
        of a successor Trustee with respect to the Securities of such\nseries. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If at any time: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(1) the Trustee shall fail to comply with Section&nbsp;708 after
        written request therefor by the Issuer or by any Holder who\nhas been a bona
        fide Holder of a Security for at least six months, or </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">43 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(2)
        the Trustee shall cease to be eligible under Section&nbsp;709 and shall\nfail
        to resign after written request therefor by the Issuer or by any such Holder,
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(3) the Trustee shall become\nincapable
        of acting or shall be adjudged a bankrupt or insolvent or a receiver of the
        Trustee or of its property shall be appointed or any public officer shall
        take charge or control of the Trustee or of its property or affairs for the
        purpose of\nrehabilitation, conservation or liquidation, then, in any such
        case, (A)&nbsp;the Issuer by a Board Resolution may remove the Trustee with
        respect to all Securities, or (B)&nbsp;subject to Section&nbsp;514, any Holder
        who has been a bona fide Holder\nof a Security for at least six months may,
        on behalf of such Holder and all others similarly situated, petition any court
        of competent jurisdiction for the removal of the Trustee with respect to all
        Securities and the appointment of a successor\nTrustee or Trustees. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If the Trustee shall resign, be removed or become
        incapable of acting, or if a vacancy shall occur in the office of\nTrustee
        for any cause, with respect to the Securities of one or more series, the Issuer,
        by a Board Resolution, shall promptly appoint a successor Trustee or Trustees
        with respect to the Securities of that or those series (it being understood
        that\nany such successor Trustee may be appointed with respect to the Securities
        of one or more or all of such series and that at any time there shall be only
        one Trustee with respect to the Securities of any particular series) and shall
        comply with the\napplicable requirements of Section&nbsp;711. If, within one
        year after such resignation, removal or incapability, or the occurrence of
        such vacancy, a successor Trustee with respect to the Securities of any series
        shall be appointed by Act of the\nHolders of a majority in principal amount
        of the Outstanding Securities of such series delivered to the Issuer and the
        retiring Trustee, the successor Trustee so appointed shall, forthwith upon
        its acceptance of such appointment in accordance with\nthe applicable requirements
        of Section&nbsp;711, become the successor Trustee with respect to the Securities
        of such series and to that extent supersede the successor Trustee appointed
        by the Issuer. If no successor Trustee with respect to the\nSecurities of
        any series shall have been so appointed by the Issuer or the Holders and accepted
        appointment in the manner required by Section&nbsp;711, any Holder who has
        been a bona fide Holder of a Security of such series for at least six months\nmay,
        on behalf of such Holder and all others similarly situated, petition any court
        of competent jurisdiction for the appointment of a successor Trustee with
        respect to the Securities of such series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall give notice of each resignation and each removal of the Trustee
        with respect to the Securities of any series and each\nappointment of a successor
        Trustee with respect to the Securities of any series to all Holders of Securities
        of such series in the manner provided in Section&nbsp;106. Each notice shall
        include the name of the successor Trustee with respect to the\nSecurities
        of such series and the address of its Corporate Trust Office. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">44 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;711
        Acceptance of Appointment by Successor. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case of the appointment hereunder of a successor Trustee with respect to all
        Securities, every such successor Trustee so appointed shall\nexecute, acknowledge
        and deliver to the Issuer and to the retiring Trustee an instrument accepting
        such appointment, and thereupon the resignation or removal of the retiring
        Trustee shall become effective and such successor Trustee, without any\nfurther
        act, deed or conveyance, shall become vested with all the rights, powers,
        trusts and duties of the retiring Trustee; but, on the request of the Issuer
        or the successor Trustee, such retiring Trustee shall, upon payment of its
        charges,\nexecute and deliver an instrument transferring to such successor
        Trustee all the rights, powers and trusts of the retiring Trustee and shall
        duly assign, transfer and deliver to such successor Trustee all property and
        money held by such retiring\nTrustee hereunder. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case of the appointment hereunder of a successor Trustee with respect to the
        Securities of one or more (but not\nall) series, the Obligors, the retiring
        Trustee and each successor Trustee with respect to the Securities of one or
        more series shall execute and deliver an indenture supplemental hereto wherein
        each successor Trustee shall accept such appointment\nand which (a)&nbsp;shall
        contain such provisions as shall be necessary or desirable to transfer and
        confirm to, and to vest in, each successor Trustee all the rights, powers,
        trusts and duties of the retiring Trustee with respect to the Securities\nof
        that or those series to which the appointment of such successor Trustee relates,
        (b)&nbsp;if the retiring Trustee is not retiring with respect to all Securities,
        shall contain such provisions as shall be deemed necessary or desirable to
        confirm\nthat all the rights, powers, trusts and duties of the retiring Trustee
        with respect to the Securities of that or those series as to which the retiring
        Trustee is not retiring shall continue to be vested in the retiring Trustee,
        and (c)&nbsp;shall\nadd to or change any of the provisions of this Indenture
        as shall be necessary to provide for or facilitate the administration of the
        trusts hereunder by more than one Trustee, it being understood that nothing
        herein or in such supplemental\nindenture shall constitute such Trustees <FONT
        STYLE=\"white-space:nowrap\">co-trustees</FONT> of the same trust and that
        each such Trustee shall be trustee of a trust or trusts hereunder separate
        and apart from any trust or trusts hereunder\nadministered by any other such
        Trustee; and upon the execution and delivery of such supplemental indenture
        the resignation or removal of the retiring Trustee shall become effective
        to the extent provided therein and each such successor Trustee,\nwithout any
        further act, deed or conveyance, shall become vested with all the rights,
        powers, trusts and duties of the retiring Trustee with respect to the Securities
        of that or those series to which the appointment of such successor Trustee\nrelates;
        but, on request of the Issuer or any successor Trustee, such retiring Trustee
        shall duly assign, transfer and deliver to such successor Trustee all property
        and money held by such retiring Trustee hereunder with respect to the Securities
        of\nthat or those series to which the appointment of such successor Trustee
        relates. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Upon request of any such successor
        Trustee, the Issuer\nshall execute any and all instruments for more fully
        and certainly vesting in and confirming to such successor Trustee all such
        rights, powers and trusts referred to in the first or second preceding paragraph,
        as the case may be. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">No successor Trustee shall accept
        its appointment unless at the time of such acceptance such successor Trustee
        shall be qualified and eligible\nunder this Article. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">45 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;712
        Merger, Conversion, Consolidation or Succession to Business. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any corporation into which the Trustee may be
        merged or converted or with which it may be consolidated, or any corporation
        resulting from any\nmerger, conversion or consolidation to which the Trustee
        shall be a party, or any corporation succeeding to all or substantially all
        the corporate trust business of the Trustee, shall be the successor of the
        Trustee hereunder, provided such\ncorporation shall be otherwise qualified
        and eligible under this Article, without the execution or filing of any paper
        or any further act on the part of any of the parties hereto. In case any Securities
        shall have been authenticated, but not\ndelivered, by the Trustee then in
        office, any successor by merger, conversion or consolidation to such authenticating
        Trustee may adopt such authentication and deliver the Securities so authenticated
        with the same effect as if such successor Trustee\nhad itself authenticated
        such Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;713 Preferential
        Collection of Claims Against Issuer. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        and when the Trustee shall be or become a creditor of the Issuer (or any other
        obligor upon the Securities), the Trustee shall be subject to\nthe provisions
        of the Trust Indenture Act regarding the collection of claims against the
        Issuer (or any such other obligor). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;714
        Appointment of Authenticating Agent. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee may appoint an Authenticating Agent or Agents with respect to one
        or more series of Securities which shall be authorized to act on\nbehalf of
        the Trustee to authenticate Securities of such series issued upon original
        issue and upon exchange, registration of transfer or partial redemption thereof
        or pursuant to Section&nbsp;306, and Securities so authenticated shall be
        entitled\nto the benefits of this Indenture and shall be valid and obligatory
        for all purposes as if authenticated by the Trustee hereunder. Wherever reference
        is made in this Indenture to the authentication and delivery of Securities
        by the Trustee or the\nTrustee&#146;s certificate of authentication, such
        reference shall be deemed to include authentication and delivery on behalf
        of the Trustee by an Authenticating Agent and a certificate of authentication
        executed on behalf of the Trustee by an\nAuthenticating Agent. Each Authenticating
        Agent shall be acceptable to the Issuer and shall at all times be a corporation
        organized and doing business under the laws of the United States of America,
        any State thereof or the District of Columbia,\nauthorized under such laws
        to act as Authenticating Agent, having a combined capital and surplus of not
        less than $50,000,000 and subject to supervision or examination by Federal
        or State authority. If such Authenticating Agent publishes reports of\ncondition
        at least annually, pursuant to law or to the requirements of said supervising
        or examining authority, then for the purposes of this Section, the combined
        capital and surplus of such Authenticating Agent shall be deemed to be its
        combined\ncapital and surplus as set forth in its most recent report of condition
        so published. If at any time an Authenticating Agent shall cease to be eligible
        in accordance with the provisions of this Section, such Authenticating Agent
        shall resign\nimmediately in the manner and with the effect specified in this
        Section. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any corporation into which an
        Authenticating Agent may be merged\nor converted or with which it may be consolidated,
        or any corporation resulting from any merger, conversion or consolidation
        to which such Authenticating Agent shall be a party, or any corporation succeeding
        to the corporate agency or corporate\ntrust business of an Authenticating
        Agent, shall continue to be an Authenticating Agent, provided such corporation
        shall be otherwise eligible under this Section, without the execution or filing
        of any paper or any further act on the part of the\nTrustee or the Authenticating
        Agent. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">46 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">An Authenticating Agent may resign at any time
        by giving written notice thereof to the\nTrustee and to the Obligors. The
        Trustee may at any time terminate the agency of an Authenticating Agent by
        giving written notice thereof to such Authenticating Agent and to the Obligors.
        Upon receiving such a notice of resignation or upon such a\ntermination, or
        in case at any time such Authenticating Agent shall cease to be eligible in
        accordance with the provisions of this Section, the Trustee may appoint a
        successor Authenticating Agent which shall be acceptable to the Issuer and
        shall\ngive notice of such appointment in the manner provided in Section&nbsp;106
        to all Holders of Securities of the series with respect to which such Authenticating
        Agent will serve. Any successor Authenticating Agent upon acceptance of its
        appointment\nhereunder shall become vested with all the rights, powers and
        duties of its predecessor hereunder, with like effect as if originally named
        as an Authenticating Agent. No successor Authenticating Agent shall be appointed
        unless eligible under the\nprovisions of this Section. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer agrees to pay to each Authenticating Agent from time to time reasonable
        compensation for its\nservices under this Section. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an appointment with respect to one or more series is made pursuant to this
        Section, the Securities of\nsuch series may have endorsed thereon, in addition
        to the Trustee&#146;s certificate of authentication, an alternative certificate
        of authentication in the following form: </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        is one of the Securities of the series designated therein referred to in the
        within-mentioned Indenture. </P>\n<P STYLE=\"line-height:8.0pt;margin-top:0pt;margin-bottom:2pt;border-bottom:1px
        solid #000000;width:11%\">&nbsp;</P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><DIV
        ALIGN=\"right\">\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" WIDTH=\"40%\"
        BORDER=\"0\" STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman;
        font-size:10pt\">\n\n\n<TR>\n\n<TD WIDTH=\"100%\"></TD></TR>\n\n\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
        New Roman\">&nbsp;</P></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">As Trustee</TD></TR>\n<TR
        STYLE=\"font-size:1pt\">\n<TD HEIGHT=\"16\"></TD></TR>\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
        New Roman\">&nbsp;</P></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">By</TD></TR>\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">Authorized
        Signatory</TD></TR>\n<TR STYLE=\"font-size:1pt\">\n<TD HEIGHT=\"16\"></TD></TR>\n<TR
        STYLE=\"page-break-inside:avoid ; font-family:Times New Roman; font-size:10pt\">\n<TD
        VALIGN=\"top\"> <P STYLE=\"margin-top:0pt; margin-bottom:1pt; border-bottom:1px
        solid #000000; font-size:10pt; font-family:Times New Roman\">&nbsp;</P></TD></TR>\n<TR
        STYLE=\"page-break-inside:avoid ; font-family:Times New Roman; font-size:10pt\">\n<TD
        VALIGN=\"top\">As Authenticating Agent</TD></TR>\n<TR STYLE=\"font-size:1pt\">\n<TD
        HEIGHT=\"16\"></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
        New Roman\">&nbsp;</P></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">By</TD></TR>\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">Authorized
        Signatory</TD></TR>\n</TABLE></DIV> <P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        EIGHT </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>HOLDERS&#146; LISTS AND
        REPORTS BY TRUSTEE AND ISSUER </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;801
        Issuer to Furnish Trustee Names and Addresses of Holders. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer will furnish or cause to be furnished to the Trustee: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        semi-annually, not later than January&nbsp;15 and July&nbsp;15 in each year,
        a list, in such form as the Trustee may reasonably require, of\nthe names
        and addresses of the Holders of Securities of each series as of the preceding
        December&nbsp;31 or June&nbsp;30, as the case may be, and </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">47 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) at such
        other times as the Trustee may request in writing, within 30 days after the\nreceipt
        by the Issuer of any such request, a list of similar form and content as of
        a date not more than 15 days prior to the time such list is furnished; excluding
        from any such list names and addresses received by the Trustee in its capacity
        as\nSecurity Registrar. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;802
        Preservation of Information; Communications to Holders. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee shall preserve, in as current a form as is reasonably practicable,
        the names and addresses of Holders contained in the most recent\nlist furnished
        to the Trustee as provided in Section&nbsp;801 and the names and addresses
        of Holders received by the Trustee in its capacity as Security Registrar.
        The Trustee may destroy any list furnished to it as provided in Section&nbsp;801
        upon\nreceipt of a new list so furnished. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        rights of Holders to communicate with other Holders with respect to their
        rights under this\nIndenture or under the Securities, and the corresponding
        rights and privileges of the Trustee, shall be as provided by the Trust Indenture
        Act. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Every Holder of Securities,
        by receiving and holding the same, agrees with the Issuer and the Trustee
        that neither the Issuer nor the Trustee\nnor any agent of either of them shall
        be held accountable by reason of any disclosure of information as to names
        and addresses of Holders made pursuant to the Trust Indenture Act. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;803 Reports by Trustee. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Trustee shall transmit to Holders such reports
        concerning the Trustee and its actions under this Indenture as may be required
        pursuant to\nthe Trust Indenture Act at the times and in the manner provided
        pursuant thereto. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">A copy of each such report shall,
        at the time of such\ntransmission to Holders, be filed by the Trustee with
        each stock exchange upon which any Securities are listed, with the Commission
        and with the Issuer. The Issuer will notify the Trustee when any Securities
        are listed on any stock exchange and of\nany delisting thereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;804
        Reports by Issuer. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">The Issuer shall </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        file with the Trustee,\nwithin 15 days after the Issuer is required to file
        the same with the Commission, copies of the annual reports and of the information,
        documents, and other reports (or copies of such portions of any of the foregoing
        as the Commission may from time\nto time by rules and regulations prescribe)
        which the Issuer may be required to file with the Commission pursuant to Section&nbsp;13
        or Section&nbsp;15(d) of the Exchange Act (it being understood that any information,
        documents and other reports\nfiled or furnished on the Electronic Data Gathering,
        Analysis and Retrieval system (&#147;<B>EDGAR</B>&#148;) or such other system
        of the Commission or the website of the Issuer will be deemed to be furnished
        to such Holders of Securities once such\ninformation, documents and other
        reports are so filed on EDGAR or the Commission&#146;s website or the website
        of the Issuer); or, if the Issuer is not required to file information, documents
        or reports pursuant to either of such Sections, then it\nwill file with the
        Trustee and the </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">48 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">\nCommission, in accordance with rules and regulations prescribed
        from time to time by the Commission, such of the supplementary and periodic
        information, documents and reports which may be\nrequired pursuant to Section&nbsp;13
        of the Exchange Act in respect of a security listed and registered on a national
        securities exchange as may be prescribed from time to time in such rules and
        regulations; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) file with the Trustee and
        the Commission, in accordance with rules and regulations prescribed from time
        to time by the Commission, such\nadditional information, documents and reports
        with respect to compliance by the Issuer and the Issuer with the conditions
        and covenants of this Indenture as may be required from time to time by such
        rules and regulations (it being understood that if\nthe Issuer is not required
        to file with the Commission pursuant to Section&nbsp;13 or 15(d) of the Exchange
        Act, the Issuer shall not be required to file such reports with the Commission
        or the Trustee). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Delivery of such reports, information
        and documents to the Trustee is for informational purposes only and the Trustee&#146;s
        receipt of such\nshall not constitute actual or constructive notice or knowledge
        of any information contained therein or determinable from information contained
        therein, including the Issuer&#146;s compliance with any of its covenants
        hereunder (as to which the\nTrustee is entitled to rely exclusively on Officers&#146;
        Certificates). </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE NINE </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>CONSOLIDATION, MERGER, CONVEYANCE, TRANSFER
        OR LEASE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;901 Issuer May
        Consolidate, Etc., Only on Certain Terms. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall not consolidate with or merge with or into any other Person,
        or sell, transfer, lease, convey, or otherwise dispose of all or\nsubstantially
        all of its properties or assets to any Person (including pursuant to a statutory
        arrangement), whether in a single transaction or series of related transactions,
        unless (i)&nbsp;the Person formed by such consolidation or into which the\nIssuer
        is merged or the Person that leases or acquires, by sale, transfer, conveyance
        or otherwise, all or substantially all of the property or assets of the Issuer
        expressly assumes, by an indenture supplemental hereto, executed and delivered
        to\nthe Trustee, in form satisfactory to the Trustee, all the obligations
        of the Issuer under the Securities, this Indenture and any supplement or amendment
        to this Indenture then in effect with respect to any Securities; (ii)&nbsp;immediately
        after\ngiving effect to such transaction or series of transactions, no Event
        of Default, and no event which, after notice or lapse of time or both, would
        become an Event of Default, shall have happened and be continuing; and (iii)&nbsp;the
        Person formed by\nsuch consolidation, the Person into which the Issuer is
        merged or the Person that leases or acquires, by sale, transfer, conveyance
        or otherwise, all or substantially all of the property or assets of the Issuer,
        shall be a corporation, partnership,\nlimited liability Issuer or trust and
        shall be organized and validly existing under the laws of the United States
        of America, any state thereof or the District of Columbia. The Issuer shall
        deliver to the Trustee prior to the consummation of the\nproposed transaction
        an Officers&#146; Certificate and an Opinion of Counsel, each stating that
        such proposed transaction and, if a supplemental indenture is required in
        connection with such transaction, such supplemental indenture comply with
        this\nArticle and that all conditions precedent herein provided for relating
        to such transaction have been complied with. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">49 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;902
        Guarantor May Consolidate, Etc., Only on Certain Terms. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Guarantor shall not consolidate with or merge with or into any other Person,
        or sell, transfer, lease, convey, or otherwise dispose of all\nor substantially
        all of its properties or assets to any Person (including pursuant to a statutory
        arrangement), whether in a single transaction or series of related transactions,
        unless (i)&nbsp;the Person formed by such consolidation or into which\nthe
        Guarantor is merged or the Person that leases or acquires, by sale, transfer,
        conveyance or otherwise, all or substantially all of the property or assets
        of the Guarantor expressly assumes, by an indenture supplemental hereto, executed
        and\ndelivered to the Trustee, in form satisfactory to the Trustee, all the
        obligations of the Guarantor under the Securities, this Indenture and any
        supplement or amendment to this Indenture then in effect with respect to any
        Securities;\n(ii)&nbsp;immediately after giving effect to such transaction
        or series of transactions, no Event of Default, and no event which, after
        notice or lapse of time or both, would become an Event of Default, shall have
        happened and be continuing; and\n(iii)&nbsp;the Person formed by such consolidation,
        the Person into which the Guarantor is merged or the Person that leases or
        acquires, by sale, transfer, conveyance or otherwise, all or substantially
        all of the property or assets of the Guarantor,\nshall be a corporation, partnership,
        limited liability Guarantor or trust and shall be organized and validly existing
        under the laws of the United States of America, any state thereof or the District
        of Columbia. The Guarantor shall deliver to the\nTrustee prior to the consummation
        of the proposed transaction an Officers&#146; Certificate and an Opinion of
        Counsel, each stating that such proposed transaction and, if a supplemental
        indenture is required in connection with such transaction, such\nsupplemental
        indenture comply with this Article and that all conditions precedent herein
        provided for relating to such transaction have been complied with. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;903 Successor of the Issuer
        Substituted. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Upon any consolidation of the
        Issuer with, or merger of the Issuer into, any other Person or any sale, transfer,
        lease or conveyance of all or\nsubstantially all of the properties and assets
        of the Issuer in accordance with Section&nbsp;901, the successor Person formed
        by such consolidation or into which the Issuer is merged or to which such
        sale, transfer, lease or conveyance is made shall\nsucceed to, and be substituted
        for, and may exercise every right and power of, the Issuer under this Indenture
        with the same effect as if such successor Person had been named as the Issuer
        herein, and thereafter, except in the case of a lease, the\npredecessor Person
        shall be relieved of all obligations and covenants under this Indenture and
        the Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;904\nSuccessor
        of the Guarantor Substituted. </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon any consolidation
        of the Guarantor with, or merger of the Guarantor into, any other\nPerson
        or any sale, transfer, lease or conveyance of all or substantially all of
        the properties and assets of the Guarantor in accordance with Section&nbsp;901,
        the successor Person formed by such consolidation or into which the Guarantor
        is merged\nor to which such sale, transfer, lease or conveyance is made shall
        succeed to, and be substituted for, and may exercise every right and power
        of, the Guarantor under this Indenture with the same effect as if such successor
        Person had been named as\nthe Guarantor herein, and thereafter, except in
        the case of a lease, the predecessor Person shall be relieved of all obligations
        and covenants under this Indenture and the Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">50 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        TEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>SUPPLEMENTAL INDENTURES
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1001 Supplemental Indentures
        Without Consent of Holders. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Without the
        consent of any Holders, the Issuer, when authorized by a Board Resolution,
        the Guarantor and the Trustee, at any time and from time\nto time, may enter
        into one or more indentures supplemental hereto, in form satisfactory to the
        Trustee, for any of the following purposes: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        to evidence the succession of another Person to the Issuer and the assumption
        by any such successor of the covenants of the Issuer herein\nand in the Securities;
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) to evidence the succession of another Person
        to the Guarantor and the assumption by any such successor of\nthe covenants
        of the Guarantor herein and in the Securities; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        to add to the covenants of the Obligors for the benefit of the Holders\nof
        all or any series of Securities (and if such covenants are to be for the benefit
        of less than all series of Securities, stating that such covenants are expressly
        being included solely for the benefit of such series) or to surrender any
        right or\npower herein conferred upon the Obligors; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        to add any additional Events of Default for the benefit of the Holders of
        all or any\nseries of Securities (and if such additional Events of Default
        are to be for the benefit of less than all series of Securities, stating that
        such additional Events of Default are expressly being included solely for
        the benefit of such series); or\n</P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) to add to
        or change any of the provisions of this Indenture to such extent as shall
        be necessary to permit or facilitate the issuance\nof Securities in bearer
        form, registrable or not registrable as to principal, and with or without
        interest coupons, or to permit or facilitate the issuance of Securities in
        uncertificated form; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(f) to add to,
        change or eliminate any of the provisions of this Indenture in respect of
        one or more series of Securities, provided that any\nsuch addition, change
        or elimination (i)&nbsp;shall neither (A)&nbsp;apply to any Security of any
        series created prior to the execution of such supplemental indenture and entitled
        to the benefit of such provision nor (B)&nbsp;modify the rights of\nthe Holder
        of any such Security with respect to such provision or (ii)&nbsp;shall become
        effective only when there is no such Security Outstanding; or </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g)
        to establish the form or terms of Securities of any series as permitted by
        Sections 201 and 301; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) to evidence
        and provide for the acceptance of appointment hereunder by a successor Trustee
        with respect to the Securities of one or more\nseries and to add to or change
        any of the provisions of this Indenture as shall be necessary to provide for
        or facilitate the administration of the trusts hereunder by more than one
        Trustee, pursuant to the requirements of Section&nbsp;711; or </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">51 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i) to cure
        any ambiguity, to correct or supplement any provision herein which may be\ndefective
        or inconsistent with any other provision herein, or to make any other provisions
        with respect to matters or questions arising under this Indenture, provided
        that such action pursuant to this clause (h)&nbsp;shall not adversely affect
        the\ninterests of the Holders of Securities of any series in any material
        respect; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(j) to add to or change any
        of the provisions of this\nIndenture in respect of one or more series of Securities
        solely to conform such provisions to the description of the Securities contained
        in the prospectus or other offering document pursuant to which such Securities
        were sold; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(k) to amend or supplement any
        provision contained herein or in any supplemental indenture, provided that
        no such amendment or supplement shall\nmaterially adversely affect the interests
        of the Holders of any Securities then Outstanding. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1002
        Supplemental Indentures\nWith Consent of Holders. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">With
        the consent of the Holders of not less than a majority in principal amount
        of the Outstanding Securities\nof each series affected by such supplemental
        indenture, by Act of said Holders delivered to the Issuer and the Trustee,
        the Issuer, when authorized by a Board Resolution, the Guarantor and the Trustee
        may enter into an indenture or indentures\nsupplemental hereto or any applicable
        Guarantee for the purpose of adding any provisions to or changing in any manner
        or eliminating any of the provisions of this Indenture or of modifying in
        any manner the rights of the Holders of Securities of\nsuch series under this
        Indenture; or any applicable Guarantee; provided, however, that no such supplemental
        indenture shall, without the consent of the Holder of each Outstanding Security
        affected thereby: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) change the Stated Maturity
        of the principal of, or any installment of principal of or interest on, any
        Security, or reduce the principal\namount thereof or the rate of interest
        thereon or any premium payable upon the redemption thereof, or reduce the
        amount of the principal of an Original Issue Discount Security or any other
        Security which would be due and payable upon a declaration\nof acceleration
        of the Maturity thereof pursuant to Section&nbsp;602, or change any Place
        of Payment where, or the coin or currency in which, any Security or any premium
        or interest thereon is payable, or impair the right to institute suit for
        the\nenforcement of any such payment on or after the Stated Maturity thereof
        (or, in the case of redemption, on or after the Redemption Date), or </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) reduce the percentage in principal amount
        of the Outstanding Securities of any series, the consent of whose Holders
        is required for any\nsuch supplemental indenture, or the consent of whose
        Holders is required for any waiver (of compliance with certain provisions
        of this Indenture or certain defaults hereunder and their consequences) provided
        for in this Indenture, or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) modify any
        of the provisions of this Section, Section&nbsp;613 or Section&nbsp;1106,
        except to increase any such percentage or to provide\nthat certain other provisions
        of this Indenture cannot be modified or waived without the consent of the
        Holder of each Outstanding Security affected thereby; provided, however, that
        this clause shall not be deemed to require the consent of any\nHolder with
        respect to changes in the references to &#147;the <B>Trustee</B>&#148; and
        concomitant changes in this Section and Section&nbsp;1106, or the deletion
        of this proviso, in accordance with the requirements of Section&nbsp;711 and
        clause\n(h)&nbsp;of Section&nbsp;1001. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">52 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">A supplemental
        indenture which changes or eliminates any covenant or other provision of this\nIndenture
        which has expressly been included solely for the benefit of one or more particular
        series of Securities, or which modifies the rights of the Holders of Securities
        of such series with respect to such covenant or other provision, shall be\ndeemed
        not to affect the rights under this Indenture of the Holders of Securities
        of any other series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">It shall not be necessary for
        any\nAct of Holders under this Section to approve the particular form of any
        proposed supplemental indenture, but it shall be sufficient if such Act shall
        approve the substance thereof. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1003
        Execution of Supplemental Indentures. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        executing, or accepting the additional trusts created by, any supplemental
        indenture permitted by this Article or the modifications thereby\nof the trusts
        created by this Indenture, the Trustee shall receive, and (subject to Section&nbsp;701)
        shall be fully protected in relying upon, an Opinion of Counsel and Officers&#146;
        Certificate of the Issuer and the Guarantor stating that the\nexecution of
        such supplemental indenture is authorized or permitted by this Indenture.
        The Trustee may, but shall not be obligated to, enter into any such supplemental
        indenture which affects the Trustee&#146;s own rights, duties or immunities
        under\nthis Indenture or otherwise. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1004
        Effect of Supplemental Indentures. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon the execution
        of any supplemental indenture under this Article, this Indenture shall be
        modified in accordance therewith, and such\nsupplemental indenture shall form
        a part of this Indenture for all purposes; and every Holder of Securities
        theretofore or thereafter authenticated and delivered hereunder shall be bound
        thereby. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1005 Conformity
        with Trust Indenture Act. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every supplemental
        indenture executed pursuant to this Article shall conform to the requirements
        of the Trust Indenture Act. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1006
        Reference in Securities to Supplemental Indentures. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Securities
        of any series authenticated and delivered after the execution of any supplemental
        indenture pursuant to this Article may, and shall\nif required by the Trustee,
        bear a notation in form approved by the Trustee as to any matter provided
        for in such supplemental indenture. If the Issuer shall so determine, new
        Securities of any series so modified as to conform, in the opinion of the\nTrustee
        and the Issuer, to any such supplemental indenture may be prepared and executed
        by the Issuer and authenticated and delivered by the Trustee in exchange for
        Outstanding Securities of such series. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">53 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        ELEVEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>COVENANTS </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1101
        Payment of Principal, Premium and Interest. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer covenants and agrees for the benefit of each series of Securities that
        it will duly and punctually pay the principal of and any\npremium and interest
        on the Securities of that series in accordance with the terms of the Securities
        and this Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1102 Maintenance
        of Office or Agency. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer will
        maintain in each Place of Payment for any series of Securities an office or
        agency where Securities of that series may be\npresented or surrendered for
        payment, where Securities of that series may be surrendered for registration
        of transfer or exchange and where notices and demands to or upon the Issuer
        in respect of the Securities of that series and this Indenture may\nbe served.
        The Issuer will give prompt written notice to the Trustee of the location,
        and any change in the location, of such office or agency. If at any time the
        Issuer shall fail to maintain any such required office or agency or shall
        fail to\nfurnish the Trustee with the address thereof, such presentations,
        surrenders, notices and demands may be made or served at the Corporate Trust
        Office of the Trustee, and the Issuer hereby appoints the Trustee as its agent
        to receive all such\npresentations, surrenders, notices and demands. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer may also from time to time designate
        one or more other offices or agencies\nwhere the Securities of one or more
        series may be presented or surrendered for any or all such purposes and may
        from time to time rescind such designations; provided, however, that no such
        designation or rescission shall in any manner relieve the\nIssuer of its obligation
        to maintain an office or agency in each Place of Payment for Securities of
        any series for such purposes. The Issuer will give prompt written notice to
        the Trustee of any such designation or rescission and of any change in\nthe
        location of any such other office or agency. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1103
        Money for Securities Payments to Be Held in Trust. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the Issuer shall at any time act as its own Paying Agent with respect to any
        series of Securities, the Issuer will, on or before each due\ndate of the
        principal of or any premium or interest on any of the Securities of that series,
        segregate and hold in trust for the benefit of the Persons entitled thereto
        a sum sufficient to pay the principal and any premium and interest so becoming\ndue
        until such sums shall be paid to such Persons or otherwise disposed of as
        herein provided and will promptly notify the Trustee of its action or failure
        so to act. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Whenever the Issuer shall have
        one or more Paying Agents for any series of Securities, the Issuer will, prior
        to each due date of the\nprincipal of or any premium or interest on any Securities
        of that series, deposit with a Paying Agent a sum sufficient to pay such amount,
        such sum to be held as provided by the Trust Indenture Act, and (unless such
        Paying Agent is the Trustee) the\nIssuer will promptly notify the Trustee
        of its action or failure so to act. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">54 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer will
        cause each Paying Agent (other than the Trustee) for any series of\nSecurities
        to execute and deliver to the Trustee an instrument in which such Paying Agent
        shall agree with the Trustee, subject to the provisions of this Section, that
        such Paying Agent will (1)&nbsp;comply with the provisions of the Trust Indenture\nAct
        applicable to it as a Paying Agent and (2)&nbsp;during the continuance of
        any default by the Obligors (or any other obligor upon the Securities of that
        series) in the making of any payment in respect of the Securities of that
        series, upon the\nwritten request of the Trustee, forthwith pay to the Trustee
        all sums held in trust by such Paying Agent for payment in respect of the
        Securities of that series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer may
        at any time, for the purpose of obtaining the satisfaction and discharge of
        this Indenture or for any other purpose, pay, or by\nIssuer Order direct any
        Paying Agent to pay, to the Trustee all sums held in trust by the Issuer or
        such Paying Agent, such sums to be held by the Trustee upon the same trusts
        as those upon which such sums were held by the Issuer or such Paying\nAgent;
        and, upon such payment by any Paying Agent to the Trustee, such Paying Agent
        shall be released from all further liability with respect to such money. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any money deposited with the Trustee or any
        Paying Agent, or then held by the Issuer, in trust for the payment of the
        principal of or any\npremium or interest on any Security of any series and
        remaining unclaimed for two years after such principal, premium or interest
        has become due and payable shall be paid to the Issuer on Issuer Request,
        or (if then held by the Issuer ) shall be\ndischarged from such trust; and
        the Holder of such Security shall thereafter, as an unsecured general creditor,
        look only to the Issuer for payment thereof, and all liability of the Trustee
        or such Paying Agent with respect to such trust money, and\nall liability
        of the Issuer as trustee thereof, shall thereupon cease; provided, however,
        that the Trustee or such Paying Agent, before being required to make any such
        repayment, may at the expense of the Issuer cause to be published once, in
        a\nnewspaper published in the English language, customarily published on each
        Business Day and of general circulation in , notice that such money remains
        unclaimed and that, after a date specified therein, which shall not be less
        than 30 days from the\ndate of such publication, any unclaimed balance of
        such money then remaining will be repaid to the Issuer. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1104
        Statement\nby Officers as to Default. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer will deliver to the Trustee, within 120 days after the end of each
        fiscal year of the Issuer\nending after the date hereof, an Officers&#146;
        Certificate, stating whether or not, to the best knowledge of the signers
        thereof, either of the Obligors is in default in the performance and observance
        of any of the terms, provisions and conditions\nof this Indenture (without
        regard to any period of grace or requirement of notice provided hereunder)
        and, if either Obligor shall be in default, specifying all such defaults and
        the nature and status thereof of which they may have knowledge. The\nIssuer
        will also deliver to the Trustee, promptly after an officer of the Issuer
        becomes aware of the occurrence of any Event of Default, an Officers&#146;
        Certificate setting forth the nature and status of such Event of Default and,
        if then\nformulated, the action that the Issuer proposes to take with respect
        thereto. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1105 Existence.
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to Article Nine, the Issuer will do
        or cause to be done all things necessary to preserve and keep in full force
        and effect its\nexistence, rights (charter and statutory) and franchises;
        provided, however, that the Issuer shall not be required to preserve any such
        right or franchise if the Board shall determine that the preservation thereof
        is no longer desirable in the\nconduct of the business of the Issuer. </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">55 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1106 Waiver of Certain Covenants.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise specified as contemplated
        by Section&nbsp;301 for Securities of such series, the Obligors may, with
        respect to the\nSecurities of any series, omit in any particular instance
        to comply with any term, provision or condition set forth in any covenant
        provided pursuant to clause (r)&nbsp;of Section&nbsp;301 or clause (b)&nbsp;or
        (g) of Section&nbsp;1001 for the\nbenefit of the Holders of such series or
        in Section&nbsp;1105, if before the time for such compliance the Holders of
        at least a majority in principal amount of the Outstanding Securities of such
        series shall, by Act of such Holders, either waive\nsuch compliance in such
        instance or generally waive compliance with such term, provision or condition,
        but no such waiver shall extend to or affect such term, provision or condition
        except to the extent so expressly waived, and, until such waiver\nshall become
        effective, the obligations of the Issuer and the duties of the Trustee in
        respect of any such term, provision or condition shall remain in full force
        and effect. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1107 Economic
        Sanctions. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">(a) Each of the Issuer and the
        Guarantor represents that neither it nor, to the knowledge of the Issuer or
        the Guarantor, any of its\naffiliates, subsidiaries, directors or officers
        are the target or subject of any sanctions enforced by the US Government,
        (including, without limitation, the Office of Foreign Assets Control of the
        US Department of the Treasury or the US Department\nof State), the United
        Nations Security Council, the European Union, Her Majesty&#146;s Treasury,
        or other relevant sanctions authority (collectively &#147;<B>Sanctions</B>&#148;);
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">(b) Each of the Issuer covenants that it will
        not directly or indirectly use any payments made pursuant to this agreement,
        (i) to fund or\nfacilitate any activities of or business with any person who,
        at the time of such funding or facilitation, is the subject or target of Sanctions,
        or (ii) to fund or facilitate any activities of or business with any country
        or territory that is the\ntarget or subject of Sanctions. </P> <P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        TWELVE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>REDEMPTION OF SECURITIES
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1201 Applicability of Article.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Securities of any series which are redeemable
        before their Stated Maturity shall be redeemable in accordance with their
        terms and (except as\notherwise specified as contemplated by Section&nbsp;301
        for such Securities) in accordance with this Article. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">56 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1202
        Election to Redeem; Notice to Trustee. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        election of the Issuer to redeem any Securities shall be evidenced by a Board
        Resolution or in another manner specified as contemplated by\nSection&nbsp;301
        for such Securities. In case of any redemption at the election of the Issuer
        of less than all the Securities of any series (including any such redemption
        affecting only a single Security), the Issuer shall, at least 20 days prior
        to\nthe Redemption Date fixed by the Issuer (unless a shorter notice shall
        be satisfactory to the Trustee), notify the Trustee of such Redemption Date,
        of the principal amount of Securities of such series to be redeemed and, if
        applicable, of the tenor\nof the Securities to be redeemed. In the case of
        any redemption of Securities prior to the expiration of any restriction on
        such redemption provided in the terms of such Securities or elsewhere in this
        Indenture, the Issuer shall furnish the Trustee\nwith an Officers&#146; Certificate
        evidencing compliance with such restriction. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1203
        Selection of Securities to Be\nRedeemed. </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        less than all of the Securities of any series are to be redeemed (unless all
        the Securities of such series and of a\nspecified tenor are to be redeemed
        or unless such redemption affects only a single Security), the particular
        Securities to be redeemed shall be selected not more than 60 days prior to
        the Redemption Date, from the Outstanding Securities of such\nseries not previously
        called for redemption, in accordance with applicable depositary procedures
        which may provide for the selection for redemption of a portion of the principal
        amount of any Security of such series, provided that the unredeemed\nportion
        of the principal amount of any Security shall be in an authorized denomination
        (which shall not be less than the minimum authorized denomination) for such
        Security. If less than all the Securities of such series and of a specified
        tenor are\nto be redeemed (unless such redemption affects only a single Security),
        the particular Securities to be redeemed shall be selected not more than 60
        days prior to the Redemption Date, from the Outstanding Securities of such
        series and specified tenor\nnot previously called for redemption in accordance
        with the preceding sentence. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        shall promptly notify the Issuer in writing\nof the Securities selected for
        redemption as aforesaid and, in case of any Securities selected for partial
        redemption as aforesaid, the principal amount thereof to be redeemed. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The provisions of the two preceding paragraphs
        shall not apply with respect to any redemption affecting only a single Security,
        whether such\nSecurity is to be redeemed in whole or in part. In the case
        of any such redemption in part, the unredeemed portion of the principal amount
        of the Security shall be in an authorized denomination (which shall not be
        less than the minimum authorized\ndenomination) for such Security. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">For all purposes of this Indenture, unless the
        context otherwise requires, all provisions relating to\nthe redemption of
        Securities shall relate, in the case of any Securities redeemed or to be redeemed
        only in part, to the portion of the principal amount of such Securities which
        has been or is to be redeemed. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1204
        Notice of Redemption. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notice of redemption
        shall be given by first-class mail, postage prepaid, mailed or pursuant to
        applicable Depositary procedures not less than\n15 nor more than 60 days prior
        to the Redemption Date, to each Holder of Securities to be redeemed, at his
        or her address appearing in the Security Register. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">57 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">All notices
        of redemption shall state: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) the Redemption
        Date, </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b)\nthe Redemption Price, </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(c) if less than all the Outstanding Securities
        of any series consisting of more than a single Security are to be\nredeemed,
        the identification (and, in the case of partial redemption of any such Securities,
        the principal amounts) of the particular Securities to be redeemed and, if
        less than all the Outstanding Securities of any series consisting of a single\nSecurity
        are to be redeemed, the principal amount of the particular Security to be
        redeemed, </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(d) that on the Redemption Date,
        the\nRedemption Price will become due and payable upon each such Security
        to be redeemed and, if applicable, that interest thereon will cease to accrue
        on and after said date, </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) that on
        the Redemption Date, if such is the case, the right of the holders of each
        such Security to convert the Securities shall\nterminate, </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(f)
        the place or places where each such Security is to be surrendered for payment
        of the Redemption Price, </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g) that the
        redemption is for a sinking fund, if such is the case, and </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h)
        applicable &#147;<B>CUSIP</B>&#148; numbers. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notice
        of redemption of Securities to be redeemed at the election of the Issuer shall
        be given by the Issuer or, at the Issuer&#146;s request\nand provision to
        the Trustee of such notice provisions at least two days prior to the date
        the notice of redemption is to be given to the Holders, by the Trustee in
        the name and at the expense of the Issuer and shall be irrevocable. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1205 Deposit of Redemption Price.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Prior to any Redemption Date, the Issuer shall
        deposit with the Trustee or with a Paying Agent (or, if the Issuer is acting
        as its own Paying\nAgent, segregate and hold in trust as provided in Section&nbsp;1103)
        an amount of money sufficient to pay the Redemption Price of, and (except
        if the Redemption Date shall be an Interest Payment Date) accrued interest
        on, all the Securities which\nare to be redeemed on that date. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1206
        Securities Payable on Redemption Date. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notice
        of redemption having been given as aforesaid, the Securities so to be redeemed
        shall, on the Redemption Date, become due and payable at\nthe Redemption Price
        therein specified, and from and after such date (unless the Issuer shall default
        in the payment of the Redemption Price and accrued interest) such Securities
        shall cease to bear interest. Upon surrender of any such Security for\nredemption
        in accordance with said notice, such Security shall be paid by the Issuer
        at the Redemption Price, together with accrued interest to the Redemption
        Date; provided, however, that, unless otherwise specified as contemplated
        by\nSection&nbsp;301, </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\">58 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\ninstallments of interest whose
        Stated Maturity is on or prior to the Redemption Date will be payable to the
        Holders of such Securities, or one or more Predecessor Securities, registered
        as such\nat the close of business on the relevant Record Dates according to
        their terms and the provisions of Section&nbsp;307. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any Security\ncalled for redemption shall not be so paid upon surrender thereof
        for redemption, the principal and any premium shall, until paid, bear interest
        from the Redemption Date at the rate prescribed therefor in the Security.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1207 Securities Redeemed in
        Part. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any Security which is to be
        redeemed only in part shall be surrendered at a Place of Payment therefor
        (with, if the Issuer or the Trustee so\nrequires, due endorsement by, or a
        written instrument of transfer in form satisfactory to the Issuer and the
        Trustee duly executed by, the Holder thereof or his or her attorney duly authorized
        in writing), and the Issuer shall execute, and the\nTrustee shall authenticate
        and deliver to the Holder of such Security without service charge, a new Security
        or Securities of the same series and of like tenor, of any authorized denomination
        as requested by such Holder, in aggregate principal\namount equal to and in
        exchange for the unredeemed portion of the principal of the Security so surrendered.
        </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE THIRTEEN </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>SINKING
        FUNDS </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1301 Applicability
        of Article. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The provisions of this Article
        shall be applicable to any sinking fund for the retirement of Securities of
        any series except as otherwise\nspecified as contemplated by Section&nbsp;301
        for such Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The minimum amount of any sinking
        fund payment provided for by the\nterms of any Securities is herein referred
        to as a &#147;mandatory sinking fund payment,&#148; and any payment in excess
        of such minimum amount provided for by the terms of such Securities is herein
        referred to as an &#147;optional sinking fund\npayment.&#148; If provided
        for by the terms of any Securities, the cash amount of any sinking fund payment
        may be subject to reduction as provided in Section&nbsp;1302. Each sinking
        fund payment shall be applied to the redemption of Securities as\nprovided
        for by the terms of such Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1302
        Satisfaction of Sinking Fund Payments with Securities. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer (1)&nbsp;may deliver Outstanding Securities of a series (other than
        any previously called for redemption) and (2)&nbsp;may apply as\na credit
        Securities of a series which have been redeemed either at the election of
        the Issuer pursuant to the terms of such Securities or through the application
        of permitted optional sinking fund payments pursuant to the terms of such
        Securities,\nin each case in satisfaction of all or any part of any sinking
        fund payment with respect to any Securities of such series required to be
        made pursuant to the terms of such Securities as and to the extent provided
        for by the terms of such Securities;\nprovided that the Securities to be so
        credited have not been previously so credited. The Securities to be so credited
        shall be received and credited for such purpose by the Trustee at the Redemption
        Price, as specified in the Securities so to be\nredeemed, for redemption through
        operation of the sinking fund and the amount of such sinking fund payment
        shall be reduced accordingly. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">59 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1303
        Redemption of Securities for Sinking Fund. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Not
        less than 30 days prior to each sinking fund payment date for any Securities,
        the Issuer will deliver to the Trustee an Officers&#146;\nCertificate specifying
        the amount of the next ensuing sinking fund payment for such Securities pursuant
        to the terms of such Securities, the portion thereof, if any, which is to
        be satisfied by payment of cash and the portion thereof, if any, which\nis
        to be satisfied by delivering and crediting Securities pursuant to Section&nbsp;1302
        and will also deliver to the Trustee any Securities to be so delivered. Not
        less than 15 days prior to each such sinking fund payment date, the Securities
        to be\nredeemed upon such sinking fund payment date shall be selected in the
        manner specified in Section&nbsp;1203 and cause notice of the redemption thereof
        to be given in the name of and at the expense of the Issuer in the manner
        provided in\nSection&nbsp;1204. Such notice having been duly given, the redemption
        of such Securities shall be made upon the terms and in the manner stated in
        Sections 1206 and 1207. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        FOURTEEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>DEFEASANCE AND COVENANT
        DEFEASANCE </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1401 Issuer&#146;s
        Option to Effect Defeasance or Covenant Defeasance. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer may elect, at its option at any time, to have Section&nbsp;1402 or
        Section&nbsp;1403 applied to any Securities or any series of\nSecurities,
        as the case may be, designated pursuant to Section&nbsp;301 as being defeasible
        pursuant to such Section&nbsp;1402 or 1403, in accordance with any applicable
        requirements provided pursuant to Section&nbsp;301 and upon compliance with
        the\nconditions set forth below in this Article. Any such election shall be
        evidenced by a Board Resolution or in another manner specified as contemplated
        by Section&nbsp;301 for such Securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1402
        Defeasance and Discharge. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon the Issuer&#146;s
        exercise of its option (if any) to have this Section applied to any Securities
        or any series of Securities, as the case\nmay be, the Obligors shall be deemed
        to have been discharged from their obligations with respect to such Securities
        as provided in this Section on and after the date the conditions set forth
        in Section&nbsp;1404 are satisfied (hereinafter called\n&#147;<B>Defeasance</B>&#148;).
        For this purpose, such Defeasance means that the Issuer shall be deemed to
        have paid and discharged the entire indebtedness represented by such Securities
        and to have satisfied all its other obligations under such\nSecurities and
        this Indenture insofar as such Securities are concerned (and the Trustee,
        at the expense of the Issuer, shall execute proper instruments acknowledging
        the same), subject to the following which shall survive until otherwise terminated\nor
        discharged hereunder: (a)&nbsp;the rights of Holders of such Securities to
        receive, solely from the trust fund described in Section&nbsp;1404 and as
        more fully set forth in such Section, payments in respect of the principal
        of and any premium and\ninterest on such Securities when payments are due,
        (b)&nbsp;the Obligors&#146; obligations with respect to such Securities under
        Sections 304, 305, 306, 1102 and 1103, (c) the rights, powers, trusts, duties
        and immunities of the Trustee hereunder\nand (d) this Article. Subject to
        compliance with this Article, the Issuer may exercise its option (if any)
        to have this Section applied to any Securities notwithstanding the prior exercise
        of its option (if any) to have Section&nbsp;1403 applied to\nsuch Securities.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">60 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1403 Covenant Defeasance. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon the Issuer&#146;s exercise of its option
        (if any) to have this Section applied to any Securities or any series of Securities,
        as the case\nmay be, (a)&nbsp;the Obligors shall be released from their obligations
        under clause (c)&nbsp;of Section&nbsp;901 and any covenants provided pursuant
        to clause (r)&nbsp;of Section&nbsp;301, Section&nbsp;1105 or clause (b)&nbsp;or
        (g) of\nSection&nbsp;1001 for the benefit of the Holders of such Securities,
        and (b)&nbsp;the occurrence of any event specified in clause (d)&nbsp;of Section&nbsp;601
        (with respect to any of clause (c)&nbsp;of Section&nbsp;901 and any such covenants\nprovided
        pursuant to clause (r)&nbsp;of Section&nbsp;301, Section&nbsp;1105 or clause
        (b)&nbsp;or (g) of Section&nbsp;1001) or clause (e)&nbsp;of Section&nbsp;601
        shall be deemed not to be or result in an Event of Default, in each case with
        respect\nto such Securities as provided in this Section on and after the date
        the conditions set forth in Section&nbsp;1404 are satisfied (hereinafter called
        &#147;<B>Covenant Defeasance</B>&#148;). For this purpose, such Covenant Defeasance
        means that, with\nrespect to such Securities, the Obligors may omit to comply
        with and shall have no liability in respect of any term, condition or limitation
        set forth in any such specified Section (to the extent so specified in the
        case of clause (d)&nbsp;of\nSection&nbsp;601), whether directly or indirectly
        by reason of any reference elsewhere herein to any such Section or Article
        or by reason of any reference in any such Section or Article to any other
        provision herein or in any other document, but the\nremainder of this Indenture
        and such Securities shall be unaffected thereby. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1404
        Conditions to Defeasance or Covenant\nDefeasance. </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        following shall be the conditions to the application of Section&nbsp;1402
        or Section&nbsp;1403 to any Securities or\nany series of Securities and any
        related Guarantee, as the case may be: </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) The Issuer
        shall irrevocably have deposited or caused to be\ndeposited with the Trustee
        (or another trustee which satisfies the requirements contemplated by Section&nbsp;709
        and agrees to comply with the provisions of this Article applicable to it)
        as trust funds in trust for the purpose of making the\nfollowing payments,
        specifically pledged as security for, and dedicated solely to, the benefits
        of the Holders of such Securities, (i)&nbsp;money in an amount, or (ii)&nbsp;U.S.
        Government Obligations which through the scheduled payment of principal\nand
        interest in respect thereof in accordance with their terms will provide, not
        later than one day before the due date of any payment, money in an amount,
        or (iii)&nbsp;a combination thereof, in each case sufficient, in the opinion
        of a nationally\nrecognized firm of independent public accountants expressed
        in a written certification thereof delivered to the Trustee, to pay and discharge,
        and which shall be applied by the Trustee (or any such other qualifying trustee)
        to pay and discharge, the\nprincipal of and any premium and interest on such
        Securities on the respective Stated Maturities, in accordance with the terms
        of this Indenture and such Securities. As used herein, &#147;<B>U.S. Government
        Obligation</B>&#148; means (x)&nbsp;any\nsecurity which is (i)&nbsp;a direct
        obligation of the United States of America for the payment of which the full
        faith and credit of the United States of America is pledged or (ii)&nbsp;an
        obligation of a Person controlled or supervised by and\nacting as an agency
        or instrumentality of the United States of America the payment of which is
        unconditionally guaranteed as a full faith and credit obligation by the United
        States of America, </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">61 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">\nwhich, in either case (i)&nbsp;or (ii), is not callable or redeemable
        at the option of the issuer thereof, and (y)&nbsp;any depositary receipt issued
        by a bank (as defined in Section&nbsp;3(a)(2)\nof the Securities Act) as custodian
        with respect to any U.S. Government Obligation which is specified in clause
        (x)&nbsp;above and held by such bank for the account of the holder of such
        depositary receipt, or with respect to any specific payment of\nprincipal
        of or interest on any U.S. Government Obligation which is so specified and
        held, provided that (except as required by law) such custodian is not authorized
        to make any deduction from the amount payable to the holder of such depositary\nreceipt
        from any amount received by the custodian in respect of the U.S. Government
        Obligation or the specific payment of principal or interest evidenced by such
        depositary receipt. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) In the event of an election
        to have Section&nbsp;1402 apply to any Securities or any series of Securities,
        as the case may be, the Issuer\nshall have delivered to the Trustee an Opinion
        of Counsel stating that (i)&nbsp;the Issuer has received from, or there has
        been published by, the Internal Revenue Service a ruling or (ii)&nbsp;since
        the date of this instrument, there has been a\nchange in the applicable Federal
        income tax law, in either case (i)&nbsp;or (ii) to the effect that, and based
        thereon such opinion shall confirm that, the Holders of such Securities will
        not recognize gain or loss for Federal income tax purposes as\na result of
        the deposit, Defeasance and discharge to be effected with respect to such
        Securities and will be subject to Federal income tax on the same amount, in
        the same manner and at the same times as would be the case if such deposit,
        Defeasance\nand discharge were not to occur. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        In the event of an election to have Section&nbsp;1403 apply to any Securities
        or any series of\nSecurities, as the case may be, the Issuer shall have delivered
        to the Trustee an Opinion of Counsel to the effect that the Holders of such
        Securities will not recognize gain or loss for Federal income tax purposes
        as a result of the deposit and\nCovenant Defeasance to be effected with respect
        to such Securities and will be subject to Federal income tax on the same amount,
        in the same manner and at the same times as would be the case if such deposit
        and Covenant Defeasance were not to occur.\n</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        The Issuer shall have delivered to the Trustee an Officers&#146; Certificate
        to the effect that neither such Securities nor any other\nSecurities of the
        same series, if then listed on any securities exchange, will be delisted as
        a result of such deposit. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) No event\nwhich
        is, or after notice or lapse of time or both would become, an Event of Default
        with respect to such Securities or any other Securities shall have occurred
        and be continuing at the time of such deposit or, with regard to any such
        event\nspecified in clause (e)&nbsp;or (f) of Section&nbsp;601, at any time
        on or prior to the 90th day after the date of such deposit (it being understood
        that this condition shall not be deemed satisfied until after such 90th day).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) Such Defeasance or Covenant Defeasance shall
        not cause the Trustee to have a conflicting interest within the meaning of
        the Trust\nIndenture Act (assuming all Securities are in default within the
        meaning of such Act). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g) Such Defeasance
        or Covenant Defeasance shall\nnot result in a breach or violation of, or constitute
        a default under, any other agreement or instrument to which the Obligors are
        parties or by which it is bound. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">62 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) Such Defeasance
        or Covenant Defeasance shall not result in the trust arising from such\ndeposit
        constituting an investment company within the meaning of the Investment Company
        Act unless such trust shall be registered under the Investment Company Act
        or exempt from registration thereunder. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i)
        At the time of such deposit, (i)&nbsp;no default in the payment of any principal
        of or premium or interest on any Senior Debt shall have\noccurred and be continuing,
        (ii)&nbsp;no event of default with respect to any Senior Debt shall have resulted
        in such Senior Debt becoming, and continuing to be, due and payable prior
        to the date on which it would otherwise have become due and\npayable (unless
        payment of such Senior Debt has been made or duly provided for), and (iii)&nbsp;no
        other event of default with respect to any Senior Debt shall have occurred
        and be continuing permitting (after notice or lapse of time or both) the\nholders
        of such Senior Debt (or a trustee on behalf of such holders) to declare such
        Senior Debt due and payable prior to the date on which it would otherwise
        have become due and payable. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) The Issuer
        shall have delivered to the Trustee an Officers&#146; Certificate and an Opinion
        of Counsel, each stating that all conditions\nprecedent with respect to such
        Defeasance or Covenant Defeasance have been complied with. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1405
        Deposited Money and U.S.\nGovernment Obligations to Be Held in Trust; Miscellaneous
        Provisions. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Subject to the provisions of
        the last paragraph of\nSection&nbsp;1103, all money and U.S. Government Obligations
        (including the proceeds thereof) deposited with the Trustee or other qualifying
        trustee (solely for purposes of this Section and Section&nbsp;1406, the Trustee
        and any such other trustee\nare referred to collectively as the &#147;<B>Trustee</B>&#148;)
        pursuant to Section&nbsp;1404 in respect of any Securities shall be held in
        trust and applied by the Trustee, in accordance with the provisions of such
        Securities and this Indenture, to\nthe payment, either directly or through
        any such Paying Agent (including the Issuer acting as its own Paying Agent)
        as the Trustee may determine, to the Holders of such Securities, of all sums
        due and to become due thereon in respect of principal\nand any premium and
        interest, but money so held in trust need not be segregated from other funds
        except to the extent required by law. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer shall
        pay and indemnify the Trustee against any tax, fee or other charge imposed
        on or assessed against the U.S. Government\nObligations deposited pursuant
        to Section&nbsp;1404 or the principal and interest received in respect thereof
        other than any such tax, fee or other charge which by law is for the account
        of the Holders of Outstanding Securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Anything
        in this Article to the contrary notwithstanding, the Trustee shall deliver
        or pay to the Issuer from time to time upon Issuer Request\nany money or U.S.
        Government Obligations held by it as provided in Section&nbsp;1404 with respect
        to any Securities which, in the opinion of a nationally recognized firm of
        independent public accountants expressed in a written certification thereof\ndelivered
        to the Trustee, are in excess of the amount thereof which would then be required
        to be deposited to effect the Defeasance or Covenant Defeasance, as the case
        may be, with respect to such Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">63 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1406
        Reinstatement. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If the Trustee or the Paying
        Agent is unable to apply any money in accordance with this Article with respect
        to any Securities by reason of\nany order or judgment of any court or governmental
        authority enjoining, restraining or otherwise prohibiting such application,
        then the obligations under this Indenture and such Securities from which the
        Obligors have been discharged or released\npursuant to Section&nbsp;1402 or
        1403 shall be revived and reinstated as though no deposit had occurred pursuant
        to this Article with respect to such Securities, until such time as the Trustee
        or Paying Agent is permitted to apply all money held in\ntrust pursuant to
        Section&nbsp;1405 with respect to such Securities in accordance with this
        Article; provided, however, that if the Obligors make any payment of principal
        of or any premium or interest on any such Security following such\nreinstatement
        of its obligations, the Obligors shall be subrogated to the rights (if any)
        of the Holders of such Securities to receive such payment from the money so
        held in trust. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This instrument may be executed
        in any number of counterparts, each of which so executed shall be deemed to
        be an original, but all such\ncounterparts shall together constitute but one
        and the same instrument. In proving the existence of this Indenture it shall
        not be necessary to produce more than one copy. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>[Remainder
