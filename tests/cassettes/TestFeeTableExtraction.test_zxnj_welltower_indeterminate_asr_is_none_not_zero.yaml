        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If we did accomplish full defeasance, you would
        have to rely solely on the trust deposit for repayment on the debt\nsecurities.
        You could not look to us for repayment in the unlikely event of any shortfall.
        Conversely, the trust deposit would most likely be protected from claims of
        our lenders and other creditors if we ever became bankrupt or insolvent. You
        would\nalso be released from any subordination provisions. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Covenant
        Defeasance</I>. We can make the same type of deposit described above and\nbe
        released from some of the restrictive covenants in the debt securities. This
        is called &#147;covenant defeasance.&#148; In that event, you would lose the
        protection of those restrictive covenants but would gain the protection of
        having money and\nsecurities set aside in trust to repay the securities and
        you would be released from any subordination provisions. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        we did accomplish\ncovenant defeasance, the following provisions of an indenture
