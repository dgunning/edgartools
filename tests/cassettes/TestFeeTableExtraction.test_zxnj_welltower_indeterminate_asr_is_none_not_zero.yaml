        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_9\"></A>DESCRIPTION
        OF CAPITAL STOCK </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The following
        is a summary of certain terms of our common stock and preferred stock that
        Welltower Inc. may issue. Because this summary is not\ncomplete, you should
        refer to our certificate of incorporation and Welltower Inc.&#146;s Amended
        and Restated <FONT STYLE=\"white-space:nowrap\">By-Laws</FONT> (our <FONT
        STYLE=\"white-space:nowrap\">&#147;by-laws&#148;),</FONT> which documents
        provide\nadditional information regarding our common stock and preferred stock,
        and the applicable provisions of the General Corporation Law of the State
        of Delaware (the &#147;DGCL&#148;). See also &#147;Description of Certain
        Provisions of Our Certificate\nof Incorporation and <FONT STYLE=\"white-space:nowrap\">By-Laws&#148;</FONT>
        below. Copies of our certificate of incorporation and <FONT STYLE=\"white-space:nowrap\">by-laws,</FONT>
        as amended, are incorporated by reference as exhibits to the\nregistration
        statement of which this prospectus is a part. The summary set forth below
        is subject to and qualified in its entirety by reference to the description
        of the particular terms of the securities described in the applicable prospectus\nsupplement
        or any related free writing prospectus. In this description, all references
        to &#147;we,&#148; &#147;us,&#148; &#147;our&#148; or the &#147;Company&#148;
        refer only to Welltower Inc. and not to any of its subsidiaries. In description,
        all\nreferences to &#147;common stock&#148; refer to common stock, par value
        $1.00 per share, of Welltower Inc., and all references to &#147;preferred
        stock&#148; refer to preferred stock, par value $1.00 per share, of Welltower
        Inc. </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Common Stock </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Dividend
        Rights</I>. The\nholders of shares of common stock are entitled to receive
        dividends when declared by our board of directors and after payment of, or
        provision for, full cumulative dividends on and any required redemptions of
        shares of preferred stock then\noutstanding, if any. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Voting
        Rights</I>. The holders of shares of common stock are entitled to one vote
        per share on all matters to be\nvoted on by such holders. Holders of shares
        of common stock are not entitled to cumulative voting rights. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Liquidation
        Rights</I>. If\nwe are voluntarily or involuntarily liquidated or dissolved,
        holders of shares of common stock are to share ratably in our distributable
        assets remaining after the satisfaction of all of our debts and liabilities
        and the prior preferential rights of\nholders of share of preferred stock,
        if any. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><I>Other Rights and Preferences</I>.
        Holders of shares of common stock do not have\npreemptive rights, and there
        are no conversion rights or redemption or sinking fund provisions with respect
        to such shares of common stock. The rights, preferences and privileges of
        holders of shares of common stock are subject to, and may be\nadversely affected
        by, the rights of the holders of shares of any series of preferred stock which
        are outstanding or which we may designate and issue in the future. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Fully Paid and Nonassessable</I>. All of
        the outstanding shares of common stock are fully paid and nonassessable. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Transfer Agent</I>. The transfer agent for
        our common stock is Computershare Trust Company, N.A. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Listing</I>.
        The common stock is listed on the NYSE under the symbol &#147;WELL.&#148;
        </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Preferred Stock </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Our board of
        directors\nor a duly authorized committee thereof will determine the designations,
        preferences, limitations and relative rights of our authorized and unissued
        preferred stock. These may include: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
