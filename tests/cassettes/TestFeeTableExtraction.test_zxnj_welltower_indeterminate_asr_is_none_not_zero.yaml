        = \"page-break-inside:avoid\">\n<TD WIDTH=\"4%\" VALIGN=\"top\" ALIGN=\"left\">**</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\">Because an
        indeterminate amount of securities is covered by this registration statement,
        the expenses in\nconnection with the issuance and distribution of the securities
        are not currently determinable. The foregoing sets forth the general categories
        of fees and expenses that we anticipate we will incur in connection with the
        offering of securities under\nthis registration statement. An estimate of
        the aggregate fees and expenses in connection with the distribution of the
        securities being offered will be included in any applicable prospectus supplement.
        </P></TD></TR></TABLE>\n<P STYLE=\"font-size:18pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"10%\" VALIGN=\"top\" ALIGN=\"left\"><B>Item&#8201;15.</B></TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P STYLE=\" margin-top:0pt ; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman; \" ALIGN=\"left\"><B>Indemnification
        of Officers and Directors. </B></P></TD></TR></TABLE>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Section&nbsp;102(b)(7)
        of the DGCL permits a corporation to provide in its certificate of incorporation
        that a director or officer of the\ncorporation shall not be personally liable
        to the corporation or its stockholders for monetary damages for breach of
        fiduciary duty as a director or officer, except for liability for any breach
        of the director&#146;s or officer&#146;s duty of\nloyalty to the corporation
        or its stockholders, for acts or omissions not in good faith or which involve
        intentional misconduct or a knowing violation of law, for unlawful payments
        of dividends or unlawful stock purchases or redemptions in the case\nof a
        director, for any transaction from which the director or officer derived an
        improper personal benefit, or in any action by or in the right of the corporation
        in the case of an officer. Welltower&#146;s Restated Certificate of Incorporation
        (the\n&#147;Certificate of Incorporation&#148;) provides that a director or
        officer will not be liable to Welltower or its stockholders for monetary damages
        for breach of fiduciary duty as a director or officer, except to the extent
        such exemption from\nliability or limitation thereof is not permitted under
        the DGCL. The Certificate of Incorporation also states that any amendment,
        modification or repeal of the foregoing sentence by our stockholders will
        not adversely affect any right or protection\nof our directors or officers
        in respect of any act or omission occurring prior to the time of such amendment,
        modification or repeal, and provides that if the DGCL is amended to permit
        further elimination or limitation of the personal liability of\ndirectors
        or officers, then the liability of our directors and officers will be eliminated
        or limited to the fullest extent permitted by the DGCL, as so amended. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Welltower Inc.&#146;s Amended and Restated <FONT
        STYLE=\"white-space:nowrap\">By-Laws</FONT> (the\n<FONT STYLE=\"white-space:nowrap\">&#147;By-Laws&#148;)</FONT>
        provide that we will indemnify, to the extent permitted by the DGCL (and except
        as otherwise required by applicable law, rule, regulation or listing standard),
        any current or past director\nor officer of the Company who was or is a party
        or is threatened to be made a party to any threatened, pending or completed
        action, suit or proceeding, whether civil, criminal, administrative or investigative,
        by reason of the fact that he or she is\nor was a director, officer, employee
        or agent </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">II-1 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\">\nof the Company, or is or was serving at our
        request as a director, officer, employee, trustee, partner, agent or fiduciary
        of another corporation, partnership, joint venture, employee benefit\nplan,
        trust or other enterprise, against expenses (including attorneys&#146; fees),
        judgments, fines, penalties and amounts paid in settlement, actually and reasonably
        incurred by him or her in connection with such threatened, pending or completed\naction,
        suit or proceeding. The <FONT STYLE=\"white-space:nowrap\">By-Laws</FONT>
        further obligate us to pay all expenses incurred by a current or past director
        or officer in defending or investigating a threatened or pending action, suit
        or\nproceeding of the nature referenced above in advance of the final disposition
        of such action, suit or proceeding upon receipt of an undertaking by or on
        behalf of such person to repay such amount if it is ultimately determined
        that he or she is not\nentitled to be indemnified by us as provided above.
        Under these provisions, however, we are not obligated to indemnify any person
        in connection with a proceeding (or part thereof, including any amounts paid
        in settlement thereof) initiated by such\nperson unless such proceeding (or
        part thereof) is in connection with a claim by such person to enforce rights
        as stated above or was authorized or consented to by our board of directors.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We have entered into indemnification agreements
        with our directors, executive officers and officers to assure them that they
        will be\nindemnified to the extent permitted by the Certificate of Incorporation,
        the <FONT STYLE=\"white-space:nowrap\">By-Laws</FONT> and Delaware law. The
        indemnification agreements cover, subject to certain exceptions and limitations,
        any and all expenses,\njudgments, fines, penalties and amounts paid in settlement,
        provide for the prompt advancement of all expenses incurred in connection
        with any threatened, pending or completed action, suit or proceeding, or any
        inquiry or investigation, and obligate\nthe director, executive officer or
        officer to reimburse us for all amounts so advanced if it is subsequently
        determined, as provided in the indemnification agreements, that the director,
        executive officer or officer is not entitled to\nindemnification. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Delaware law requires indemnification in cases
        where a director or officer has been successful in defending any claim or\nproceeding
        and permits indemnification, even if a director or officer has not been successful,
        in cases where the director or officer acted in good faith and in a manner
        that he or she reasonably believed was in, or not opposed to, the best\ninterests
        of the corporation. To be indemnified with respect to criminal proceedings,
        the director or officer must also have had no reasonable cause to believe
        that his or her conduct was unlawful. In the case of a claim by a third party
        (i.e., a\nparty other than the corporation), Delaware law permits indemnification
        for expenses (including attorneys&#146; fees), judgments, fines and amounts
        paid in settlement. In the case of a claim by, or in the right of, the corporation
        (including\nstockholder derivative suits), indemnification under the DGCL
        is limited to expenses (including attorneys&#146; fees) and no indemnification
        of expenses is permitted if the director or officer is adjudged liable to
        the corporation unless a court\ndetermines that, despite such adjudication
        but in view of all of the circumstances, such indemnification is nonetheless
        proper. Delaware law also permits the advancement of expenses to directors
        and officers of the corporation upon receipt of an\nundertaking to repay all
        amounts so advanced if it is ultimately determined that the director or officer
        has not met the applicable standard of conduct and is, therefore, not entitled
        to be indemnified by the corporation. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except as otherwise
        required by applicable law, rule, regulation or listing standard, the <FONT
        STYLE=\"white-space:nowrap\">By-Laws</FONT> also\nprovide that Welltower may
        maintain insurance, at its expense, to protect itself and any director, officer,
        employee or agent of Welltower, among others, against any expense, liability
        or loss, whether or not Welltower would have the power to\nindemnify such
        person against such expense, liability or loss under the DGCL. We maintain
        indemnification insurance that provides for reimbursement of indemnification
        payments properly and lawfully made to our directors and officers and coverage,\nsubject
        to certain exceptions and limitations, for directors and officers in situations
        where we cannot or do not indemnify them. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">II-2 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
