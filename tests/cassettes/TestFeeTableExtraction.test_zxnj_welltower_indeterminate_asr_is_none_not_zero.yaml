        font-family:Times New Roman\">[If the Security is an Original Issue Discount
        Security, insert the following &#151; If an\nEvent of Default with respect
        to Securities of this series shall occur and be continuing, an amount of principal
        of the Securities of this series may be declared due and payable in the manner
        and with the effect provided in the Indenture. Such\namount shall be equal
        to &#151; insert formula for determining the amount. Upon payment (i)&nbsp;of
        the amount of principal so declared due and payable and (ii)&nbsp;of interest
        on any overdue principal, premium and interest (in each case to the\nextent
        that the payment of such interest shall be legally enforceable), all of the
        Issuer&#146;s obligations in respect of the payment of the principal of and
        premium and interest, if any, on the Securities of this series shall terminate.]
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Indenture permits, with certain exceptions
        as therein provided, the amendment thereof and the modification of the rights
        and obligations\nof the Obligors and the rights of the Holders of the Securities
        of each series to be affected under the Indenture at any time by the Obligors
        and the Trustee with the consent of the Holders of not less than a majority
        in principal amount of the\nSecurities at the time Outstanding of each series
        to be affected. The Indenture also contains provisions permitting the Holders
        of specified percentages in principal amount of the Securities of each series
        at the time Outstanding, on behalf of the\nHolders of all Securities of such
        series, to waive compliance by the Obligors with certain provisions of the
        Indenture and certain past defaults under the Indenture and their consequences.
        Any such consent or waiver by the Holder of this Security\nshall be conclusive
        and binding upon such Holder and upon all future Holders of this Security
        and of any Security issued upon the registration of transfer hereof or in
        exchange therefor or in lieu hereof, whether or not notation of such consent
        or\nwaiver is made upon this Security. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">As provided
        in and subject to the provisions of the Indenture, the Holder of this Security
        shall not\nhave the right to institute any proceeding with respect to the
        Indenture or for the appointment of a receiver or trustee or for any other
        remedy thereunder, unless such Holder shall have previously given the Trustee
        written notice of a continuing\nEvent of Default with respect to the Securities
        of this series, the Holders of not less than a majority in principal amount
        of the Securities of this series at the time Outstanding shall have made written
        request to the Trustee to institute\nproceedings in respect of such Event
        of Default as Trustee and offered the Trustee reasonable indemnity, and the
        Trustee shall not have received from the Holders of a majority in principal
        amount of Securities of this series at the time Outstanding\na direction inconsistent
        with such request, and shall have failed to institute any such proceeding,
        for 60 days after receipt of such notice, request and offer of indemnity.
        The foregoing shall not apply to any suit instituted by the Holder of this\nSecurity
        for the enforcement of any payment of principal hereof or any premium or interest
        hereon on or after the respective due dates expressed herein. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        reference herein to the Indenture and no provision of this Security or of
        the Indenture shall alter or impair the obligation of the Issuer,\nwhich is
        absolute and unconditional, to pay the principal of and any premium and interest
        on this Security at the times, place and rate, and in the coin or currency,
        herein prescribed. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">18 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">As provided in the Indenture and subject to
        certain limitations therein set forth, the\ntransfer of this Security is registrable
        in the Security Register, upon surrender of this Security for registration
        of transfer at the office or agency of the Issuer in any place where the principal
        of and any premium and interest on this Security\nare payable, duly endorsed
        by, or accompanied by a written instrument of transfer in form satisfactory
        to the Issuer and the Security Registrar duly executed by, the Holder hereof
        or his or her attorney duly authorized in writing, and thereupon one\nor more
        new Securities of this series and of like tenor, of authorized denominations
        and for the same aggregate principal amount, will be issued to the designated
        transferee or transferees. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Securities
        of this series are issuable only in registered form without coupons in denominations
        of $__________ and any integral multiple\nthereof. As provided in the Indenture
        and subject to certain limitations therein set forth, Securities of this series
        are exchangeable for a like aggregate principal amount of Securities of this
        series and of like tenor of a different authorized\ndenomination, as requested
        by the Holder surrendering the same. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No service charge
        shall be made for any such registration of transfer or\nexchange, but the
        Issuer may require payment of a sum sufficient to cover any tax or other governmental
        charge payable in connection therewith. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Prior
        to due presentment of this Security for registration of transfer, the Issuer,
        the Trustee and any agent of the Issuer or the Trustee may\ntreat the Person
        in whose name this Security is registered as the owner hereof for all purposes,
        whether or not this Security be overdue, and neither the Issuer, the Trustee
        nor any such agent shall be affected by notice to the contrary. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        terms used in this Security which are defined in the Indenture shall have
        the meanings assigned to them in the Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;204
        Form of Legend for Global Securities. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise specified as contemplated by Section&nbsp;301 for the Securities
        evidenced thereby, every Global Security authenticated and\ndelivered hereunder
        shall bear a legend in substantially the following form: </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        Security is a Global Security within the meaning of the\nIndenture hereinafter
        referred to and is registered in the name of a Depositary or a nominee thereof.
        This Security may not be exchanged in whole or in part for a Security registered,
        and no transfer of this Security in whole or in part may be\nregistered, in
        the name of any Person other than such Depositary or a nominee thereof, except
        in the limited circumstances described in the Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;205
        Form of Trustee&#146;s Certificate of Authentication. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee&#146;s certificates of authentication shall be in substantially the
        following form: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This is one of the Securities
        of the series designated therein referred to in the within-mentioned Indenture.
