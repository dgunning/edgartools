        comprised of one or more debt securities, preferred stock, depositary shares,
        common stock, or warrants of the Company, in any combination, (viii)&nbsp;debt
        securities of Welltower OP, and\n(ix)&nbsp;guarantees of debt securities issued
        by the Company, hereby constitutes and appoints Shankh Mitra, Timothy G. McHugh,
