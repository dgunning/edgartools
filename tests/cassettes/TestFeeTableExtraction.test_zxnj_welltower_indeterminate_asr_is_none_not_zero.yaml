        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B><A NAME=\"toc763599_8\"></A>DESCRIPTION
        OF DEBT SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This section
        describes the general terms and provisions of the debt securities of Welltower
        Inc. and the debt securities of Welltower OP LLC.\nIn this description, unless
        specifically noted otherwise or unless the context otherwise requires, all
        references to &#147;we,&#148; &#147;us,&#148; &#147;our&#148; or the &#147;Company&#148;
        refer to either Welltower Inc. or Welltower OP LLC, as\napplicable, as issuer
        of the debt securities. The debt securities sold under this prospectus will
        be our direct obligations, which may be secured or unsecured, and which may
        be senior or subordinated indebtedness. The debt securities may be\nguaranteed
        on a secured or unsecured, senior or subordinated basis, by one or more of
        our subsidiaries. The debt securities will be issued under one or more indentures
        among us, the specified guarantor, if any, and a specified trustee. Any indenture\nwill
        be subject to and governed by the Trust Indenture Act of 1939, as amended.
        The statements made in this prospectus relating to any indentures and the
        debt securities to be issued under the indentures are summaries of certain
        provisions or\nanticipated provisions of the indentures. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        following is a summary of the material terms of our debt securities. Because
        it is a\nsummary, it does not contain all of the information that may be important
        to you. If you want more information, you should read the forms of indentures
        to be entered into among us, the guarantor, if any, and The Bank of New York
        Mellon Trust\nCompany, N.A., as trustee, for senior debt securities, senior
        subordinated debt securities and junior subordinated debt securities which
        we have filed as exhibits to the registration statement of which this prospectus
        is a part. See &#147;Where You\nCan Find Additional Information.&#148; The
        summary set forth below does not purport to be complete and is subject to
        and qualified in its entirety by reference to the descriptions of the particular
        terms of the securities described in the applicable\nprospectus supplement
        and any related free writing prospectus. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>General
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We may issue debt securities that rank &#147;senior,&#148;
        &#147;senior subordinated&#148; or &#147;junior subordinated.&#148; The debt\nsecurities
        that we refer to as &#147;senior&#148; will be our direct obligations and
        will rank equally and ratably in right of payment with our other indebtedness
        not subordinated. We may issue debt securities that will be subordinated in
        right of\npayment to the prior payment in full of senior debt, as defined
        in the applicable prospectus supplement or any related free writing prospectus,
        and may rank equally and ratably with the other senior subordinated indebtedness.
        We refer to these as\n&#147;senior subordinated&#148; securities. We may also
        issue debt securities that may be subordinated in right of payment to the
        senior subordinated securities. These would be &#147;junior subordinated&#148;
        securities. We have filed with the\nregistration statement, of which this
        prospectus is a part, separate forms of indentures for senior debt securities,
        senior subordinated debt securities and junior subordinated debt securities.
        We refer to each of these three indentures as an\n&#147;indenture.&#148; We
        refer to senior subordinated and junior subordinated securities as &#147;subordinated.&#148;
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We may issue the\ndebt securities without limit
        as to aggregate principal amount, in one or more series, in each case as we
        establish in one or more supplemental indentures. We need not issue all debt
        securities of one series at the same time. Unless we otherwise\nprovide, we
        may reopen a series, without the consent of the holders of the series, for
        issuances of additional securities of that series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise provided in the prospectus supplement relating to any debt securities,
        the debt securities will not constitute obligations of\nour subsidiaries.
        Creditors and preferred equity holders of our subsidiaries are entitled to
        a preferred claim on the assets of those subsidiaries. Consequently, in the
        event of a liquidation or reorganization of any subsidiary, creditors and\npreferred
        equity holders of the subsidiary are likely to be paid in full before any
        distribution is made to the Company and holders of debt securities, except
        to the extent that the Company is itself recognized as a creditor of such
        subsidiary, in\nwhich case the Company&#146;s claims would still be subordinate
        to any security interests in the assets of such subsidiary and any debt of
        such subsidiary senior to that held by the Company. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        senior debt indenture provides and we anticipate that any other indenture
        will provide that we may, but need not, designate more than one\ntrustee under
        an indenture, each with respect to one or more series of debt </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
