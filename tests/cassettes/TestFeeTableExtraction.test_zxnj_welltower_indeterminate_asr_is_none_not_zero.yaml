        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        margin-left:4%; font-size:10pt; font-family:Times New Roman\">provided, however,
        that paragraphs (i), (ii) and (iii) above do not apply if the information\nrequired
        to be included in a post-effective amendment by those paragraphs is contained
        in reports filed with or furnished to the Securities and Exchange Commission
        by the registrants pursuant to Section&nbsp;13 or Section&nbsp;15(d) of the\nSecurities
        Exchange Act of 1934 that are incorporated by reference in the registration
        statement or is contained in a form of prospectus filed pursuant to Rule&nbsp;424(b)
        that is part of the registration statement. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(2) That, for the purpose of determining any liability under the
        Securities Act of 1933, each such post-effective amendment\nshall be deemed
        to be a new registration statement relating to the securities offered therein,
        and the offering of such securities at that time shall be deemed to be the
        initial bona fide offering thereof. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(3)
        To remove from registration by means of a post-effective amendment any of
        the securities being registered which remain\nunsold at the termination of
        the offering. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(4) That, for
        the purpose of determining liability under the Securities Act of\n1933 to
        any purchaser: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%;
        text-indent:13%; font-size:10pt; font-family:Times New Roman\">(i) Each prospectus
        filed by either registrant pursuant to Rule 424(b)(3) shall be deemed to be\npart
        of the registration statement as of the date the filed prospectus was deemed
        part of and included in the registration statement; and </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:13%; font-size:10pt; font-family:Times
        New Roman\">(ii) Each prospectus required to be filed pursuant to Rule 424(b)(2),
        (b)(5), or (b)(7) as part of a registration statement in\nreliance on Rule
        430B relating to an offering made pursuant to Rule 415(a)(1)(i), (vii) or
        (x)&nbsp;for the purpose of providing the information required by Section&nbsp;10(a)
        of the Securities Act of 1933 shall be deemed to be part of and included\nin
        the registration statement as of the earlier of the date such form of prospectus
        is first used after effectiveness or the date of the first contract of sale
        of securities in the offering described in the prospectus. As provided in
        Rule 430B, for\nliability purposes of the issuer and any person that is at
        that date an underwriter, such date shall be deemed to be a new effective
        date of the registration statement relating to the securities in the registration
        statement to which that prospectus\nrelates, and the offering of such securities
        at that time shall be deemed to be the initial bona fide offering thereof.
        Provided, however, that no statement made in a registration statement or prospectus
        that is part of the registration statement or\nmade in a document incorporated
        or deemed incorporated by reference into the registration statement or prospectus
        that is part of the registration statement will, as to a purchaser with a
        time of contract of sale prior to such effective date,\nsupersede or modify
        any statement that was made in the registration statement or prospectus that
        was part of the registration statement or made in any such document immediately
        prior to such effective date. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(5)
        That, for the purpose of determining liability of each registrant under the
        Securities Act of 1933 to any purchaser in the\ninitial distribution of the
        securities, in a primary offering of securities of such undersigned registrant
        pursuant to this registration statement, regardless of the underwriting method
        used to sell the securities to the purchaser, if the securities\nare offered
        or sold to such purchaser by means of any of the following communications,
        such undersigned registrant will be a seller to the purchaser and will be
        considered to offer or sell such securities to such purchaser: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:13%; font-size:10pt; font-family:Times
        New Roman\">(i) Any preliminary prospectus or prospectus of such undersigned
        registrant relating to the offering required to be filed\npursuant to Rule
        424; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:13%;
        font-size:10pt; font-family:Times New Roman\">(ii) Any free writing prospectus
        relating to the offering prepared by or on behalf of such\nundersigned registrant
        or used or referred to by such undersigned registrant; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:13%; font-size:10pt; font-family:Times
        New Roman\">(iii) The portion of any other free writing\nprospectus relating
        to the offering containing material information about such undersigned registrant
        or its securities provided by or on behalf of such undersigned registrant;
        and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:13%;
        font-size:10pt; font-family:Times New Roman\">(iv) Any other communication
        that is an offer in the offering made by such undersigned registrant to the
        purchaser. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
