        style=\"margin-top: 0pt; margin-bottom: 0pt; font-size: 10pt; font-family:
        &quot;Times New Roman&quot;; text-align: left; line-height: normal;\">The
        warrants covered by this registration statement may be warrants for common
        stock, preferred stock, depositary shares or debt securities. </div></td></tr></table></ix:continuation><ix:continuation
        id=\"TextSelectionAppend_135721830_1\">\n<table cellpadding=\"0\" cellspacing=\"0\"
