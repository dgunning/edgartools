        <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Global Securities </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If so set forth
        in the applicable prospectus supplement, we may issue the debt securities
        of a series in whole or in part in the form of one or\nmore global securities
