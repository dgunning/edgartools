        style=\"width:4%;vertical-align:top;text-align:left\">(6)</td>\n<td style=\"vertical-align:top;text-align:left\">
        <div style=\" margin-top:0pt ; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman;text-align:left\">Welltower Inc. may fully and unconditionally guarantee
        debt securities issued by Welltower OP LLC In accordance with Rule 457(n),
        no separate fee is payable with respect to the guarantees of debt securities
        being registered. </div></td></tr></table></ix:continuation><ix:continuation
        id=\"TextSelectionAppend_135721829_1\">\n<table cellpadding=\"0\" cellspacing=\"0\"
        style=\"text-align:start; BORDER-COLLAPSE:COLLAPSE; font-family:Times New
