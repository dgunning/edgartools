        <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE THREE </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>THE
        SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;301 Amount Unlimited;
        Issuable in Series. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The aggregate
        principal amount of Securities which may be authenticated and delivered under
        this Indenture is unlimited. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Securities
        may be issued in one or more series. There shall be established in or pursuant
        to a Board Resolution and, subject to\nSection&nbsp;303, set forth, or determined
        in the manner provided, in an Officers&#146; Certificate, or established in
        one or more indentures supplemental hereto, prior to the issuance of Securities
        of any series: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) the title of the Securities
        of the series, including &#147;<B>CUSIP</B>&#148; numbers (which shall distinguish
        the Securities of the series\nfrom Securities of any other series); </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) any limit upon the aggregate principal amount
        of the Securities of the series which may be\nauthenticated and delivered
        under this Indenture (except for Securities authenticated and delivered upon
        registration of transfer of, or in exchange for, or in lieu of, other Securities
        of the series pursuant to Section&nbsp;304, 305, 306, 1006 or\n1207 and except
        for any Securities which, pursuant to Section&nbsp;303, are deemed never to
        have been authenticated and delivered hereunder); </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        the Person to whom any interest on a Security of the series shall be payable,
        if other than the Person in whose name that Security (or one\nor more Predecessor
        Securities) is registered at the close of business on the Regular Record Date
        for such interest; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(d) the date or dates\non which
        the principal of any Securities of the series is payable; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e)
        the rate or rates at which any Securities of the series shall bear\ninterest,
        if any, the date or dates from which any such interest shall accrue, the Interest
        Payment Dates on which any such interest shall be payable and the Regular
        Record Date for any such interest payable on any Interest Payment Date; </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">20 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) the place or places where the principal
        of and any premium and interest on any\nSecurities of the series shall be
        payable; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(g) the period or periods within
        which, the price or prices at which and the terms and\nconditions upon which
        any Securities of the series may be redeemed, in whole or in part, at the
        option of the Issuer and, if other than by a Board Resolution, the manner
        in which any election by the Issuer to redeem the Securities shall be\nevidenced;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(h) the obligation, if any, of the Issuer to
        redeem or purchase any Securities of the series pursuant to any sinking fund
        or\nanalogous provisions or at the option of the Holder thereof and the period
        or periods within which, the price or prices at which and the terms and conditions
        upon which any Securities of the series shall be redeemed or purchased, in
        whole or in\npart, pursuant to such obligation; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i)
        if other than denominations of $1,000 and any integral multiple thereof, the
        denominations in which\nany Securities of the series shall be issuable; </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(j) if the amount of principal of or any premium
        or interest on any Securities of the\nseries may be determined with reference
        to an index or pursuant to a formula, the manner in which such amounts shall
        be determined; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(k) if\nother than the currency
        of the United States of America, the currency, currencies or currency units
        in which the principal of or any premium or interest on any Securities of
        the series shall be payable and the manner of determining the equivalent\nthereof
        in the currency of the United States of America for any purpose, including
        for purposes of the definition of &#147;<B>Outstanding</B>&#148; in Section&nbsp;101;
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(l) if the principal of or any premium or interest
        on any Securities of the series is to be payable, at the election of the Issuer
        or the\nHolder thereof, in one or more currencies or currency units other
        than that or those in which such Securities are stated to be payable, the
        currency, currencies or currency units in which the principal of or any premium
        or interest on such\nSecurities as to which such election is made shall be
        payable, the periods within which and the terms and conditions upon which
        such election is to be made and the amount so payable (or the manner in which
        such amount shall be determined); </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(m) if other
        than the entire principal amount thereof, the portion of the principal amount
        of any Securities of the series which shall be\npayable upon declaration of
        acceleration of the Maturity thereof pursuant to Section&nbsp;602; </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(n) if the principal amount payable at the\nStated
        Maturity of any Securities of the series will not be determinable as of any
        one or more dates prior to the Stated Maturity, the amount which shall be
        deemed to be the principal amount of such Securities as of any such date for
        any purpose\nthereunder or hereunder, including the principal amount thereof
        which shall be due and payable upon any Maturity other than the Stated Maturity
        or which shall be deemed to be Outstanding as of any date prior to the Stated
        Maturity (or, in any such\ncase, the manner in which such amount deemed to
        be the principal amount shall be determined); </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">21 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(o) if applicable,
        that the Securities of the series, in whole or any specified part, shall\nbe
        defeasible pursuant to Section&nbsp;1402 or Section&nbsp;1403 or both such
        Sections and, if other than by a Board Resolution, the manner in which any
        election by the Issuer to defease such Securities shall be evidenced; </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(p) if applicable, that any Securities of the
        series shall be issuable in whole or in part in the form of one or more Global
        Securities and, in\nsuch case, the respective Depositaries for such Global
        Securities, the form of any legend or legends which shall be borne by any
        such Global Security in addition to or in lieu of that set forth in Section&nbsp;204
        and any circumstances in addition\nto or in lieu of those set forth in clause
        (b)&nbsp;of Section&nbsp;305 in which any such Global Security may be exchanged
        in whole or in part for Securities registered, and any transfer of such Global
        Security in whole or in part may be registered,\nin the name or names of Persons
        other than the Depositary for such Global Security or a nominee thereof; </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(q) any addition to or change in\nthe Events
        of Default which applies to any Securities of the series and any change in
        the right of the Trustee or the requisite Holders of such Securities to declare
        the principal amount thereof due and payable pursuant to Section&nbsp;602;
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(r) any addition to or change in the covenants
        set forth in Article Eleven which applies to Securities of the series; </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(s) if applicable, that the Securities of the
        series are convertible into or exchangeable for common stock or other securities
        of the Issuer,\nthe period or periods within which, the price or prices at
        which and the terms and conditions upon which, and the limitations and restrictions,
        if any, upon which, any Securities of the series shall be convertible or exchangeable,
        in whole or in\npart, into common stock or other securities of the Issuer;
        and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(t) any other terms of the series (which terms
        shall not be inconsistent\nwith the provisions of this Indenture, except as
        permitted by Section&nbsp;1001(e)). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">All Securities
        of any one series shall be\nsubstantially identical except as to denomination
        and except as may otherwise be provided in or pursuant to the Board Resolution
        referred to above and (subject to Section&nbsp;303) set forth, or determined
        in the manner provided, in the\nOfficers&#146; Certificate referred to above
        or in any such indenture supplemental hereto. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any of the terms of the series are\nestablished by action taken pursuant to
        a Board Resolution, a copy of an appropriate record of such action shall be
        certified by the Secretary or an Assistant Secretary of the Issuer and delivered
        to the Trustee at or prior to the delivery of the\nOfficers&#146; Certificate
        setting forth the terms of the series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;302
        Denominations. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Securities of each series
        shall be issuable only in registered form without coupons and only in such
        denominations as shall be specified as\ncontemplated by Section&nbsp;301.
        In the absence of any such specified denomination with respect to the Securities
        of any series, the Securities of such series shall be issuable in denominations
        of $2,000 and integral multiple of $1,000 in excess\nthereof. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">22 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;303
        Execution, Authentication, Delivery and Dating. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Securities shall be executed on behalf of the Issuer by its Chairman of the
        Board, its Vice Chairman of the Board, its President or one of\nits Vice Presidents,
        and may, but need not, have corporate or limited liability company seal reproduced
        thereon attested by its Secretary or one of its Assistant Secretaries. The
        signature of any of these officers on the Securities may be manual or\nelectronic.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Securities bearing the manual or electronic
        signatures of individuals who were at any time the proper officers of the
        Issuer\nshall bind the Issuer, notwithstanding that such individuals or any
        of them have ceased to hold such offices prior to the authentication and delivery
        of such Securities or did not hold such offices at the date of such Securities.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">At any time and from time to time after the
        execution and delivery of this Indenture, the Issuer may deliver Securities
        of any series executed\nby the Issuer to the Trustee for authentication, together
        with an Issuer Order for the authentication and delivery of such Securities,
        and the Trustee in accordance with the Issuer Order shall authenticate and
        deliver such Securities. If the form or\nterms of the Securities of the series
        have been established by or pursuant to one or more Board Resolutions as permitted
        by Sections 201 and 301, in authenticating such Securities, and accepting
        the additional responsibilities under this Indenture\nin relation to such
        Securities, the Trustee shall be provided with, and (subject to Section&nbsp;701)
        shall be fully protected in relying upon, an Opinion of Counsel stating: </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) if the form of such Securities has been
        established by or pursuant to Board Resolution as permitted by Section&nbsp;201,
        that such form has\nbeen established in conformity with the provisions of
        this Indenture; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) if the terms of such Securities
        have been established by or\npursuant to Board Resolution as permitted by
        Section&nbsp;301, that such terms have been established in conformity with
        the provisions of this Indenture; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) that such
        Securities, when authenticated and delivered by the Trustee and issued by
        the Issuer in the manner and subject to any conditions\nspecified in such
        Opinion of Counsel, will constitute valid and legally binding obligations
        of the Issuer enforceable in accordance with their terms, subject to bankruptcy,
        insolvency, fraudulent transfer, reorganization, moratorium and similar laws\nof
        general applicability relating to or affecting creditors&#146; rights and
        to general equity principles. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If such form
        or terms have\nbeen so established, the Trustee shall not be required to authenticate
        such Securities if the issue of such Securities pursuant to this Indenture
        will affect the Trustee&#146;s own rights, duties or immunities under the
        Securities and this Indenture\nor otherwise in a manner which is not reasonably
        acceptable to the Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each Security
        shall be dated the date of its authentication.\n</P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        Security shall be entitled to any benefit under this Indenture or be valid
        or obligatory for any purpose unless there appears on such\nSecurity a certificate
        of authentication substantially in the form provided for herein executed by
        the Trustee by manual or electronic </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">23 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nsignature, and such certificate
        upon any Security shall be conclusive evidence, and the only evidence, that
        such Security has been duly authenticated and delivered hereunder. Notwithstanding
        the\nforegoing, if any Security shall have been authenticated and delivered
        hereunder but never issued and sold by the Issuer, and the Issuer shall deliver
        such Security to the Trustee for cancellation as provided in Section&nbsp;309,
        for all purposes of\nthis Indenture such Security shall be deemed never to
        have been authenticated and delivered hereunder and shall never be entitled
        to the benefits of this Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;304
        Temporary Securities. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Pending the
        preparation of definitive Securities of any series, the Issuer may execute,
        and upon Issuer Order the Trustee shall authenticate\nand deliver, temporary
        Securities which are printed, lithographed, typewritten, mimeographed or otherwise
        produced, in any authorized denomination, substantially of the tenor of the
        definitive Securities in lieu of which they are issued and with\nsuch appropriate
        insertions, omissions, substitutions and other variations as the officers
        executing such Securities may determine, as evidenced by their execution of
        such Securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If temporary Securities of any
        series are issued, the Issuer will cause definitive Securities of that series
        to be prepared without\nunreasonable delay. After the preparation of definitive
        Securities of such series, the temporary Securities of such series shall be
        exchangeable for definitive Securities of such series upon surrender of the
        temporary Securities of such series at\nthe office or agency of the Issuer
        in a Place of Payment for that series, without charge to the Holder. Upon
        surrender for cancellation of any one or more temporary Securities of any
        series, the Issuer shall execute and the Trustee shall\nauthenticate and deliver
        in exchange therefor one or more definitive Securities of the same series,
        of any authorized denominations and of like tenor and aggregate principal
        amount. Until so exchanged, the temporary Securities of any series shall in\nall
        respects be entitled to the same benefits under this Indenture as definitive
        Securities of such series and tenor. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;305\nRegistration,
        Registration of Transfer and Exchange. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall cause to be kept at the Corporate Trust Office of the Trustee
        a\nregister (the register maintained in such office and in any other office
        or agency of the Issuer in a Place of Payment being herein sometimes collectively
        referred to as the &#147;<B>Security Register</B>&#148;) in which, subject
        to such reasonable\nregulations as it may prescribe, the Issuer shall provide
        for the registration of Securities and of transfers of Securities. The Trustee
        is hereby appointed &#147;<B>Security Registrar</B>&#148; for the purpose
        of registering Securities and\ntransfers of Securities as herein provided.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Upon surrender for registration of transfer
        of any Security of a series at the office or\nagency of the Issuer in a Place
        of Payment for that series, the Issuer shall execute, and the Trustee shall
        authenticate and deliver, in the name of the designated transferee or transferees,
        one or more new Securities of the same series, of any\nauthorized denominations
        and of like tenor and aggregate principal amount. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">24 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">At the option
        of the Holder, Securities of any series may be exchanged for other Securities\nof
        the same series, of any authorized denominations and of like tenor and aggregate
        principal amount, upon surrender of the Securities to be exchanged at such
        office or agency. Whenever any Securities are so surrendered for exchange,
        the Issuer\nshall execute, and the Trustee shall authenticate and deliver,
        the Securities which the Holder making the exchange is entitled to receive.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">All Securities issued upon any registration
        of transfer or exchange of Securities shall be the valid obligations of the
        Issuer, evidencing the\nsame debt, and entitled to the same benefits under
        this Indenture, as the Securities surrendered upon such registration of transfer
        or exchange. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Every Security presented or
        surrendered for registration of transfer or for exchange shall (if so required
        by the Issuer or the Trustee) be\nduly endorsed, or be accompanied by a written
        instrument of transfer in form satisfactory to the Issuer and the Security
        Registrar duly executed, by the Holder thereof or his or her attorney duly
        authorized in writing. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No service charge
        shall be made for any registration of transfer or exchange of Securities,
        but the Issuer may require payment of a sum\nsufficient to cover any tax or
        other governmental charge that may be imposed in connection with any registration
        of transfer or exchange of Securities, other than exchanges pursuant to Section&nbsp;304,
        1006 or 1207 not involving any transfer. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the Securities of any series (or of any series and specified tenor) are to
        be redeemed in part, the Issuer shall not be required\n(a)&nbsp;to issue,
        register the transfer of or exchange any Securities of that series (or of
        that series and specified tenor, as the case may be) during a period beginning
        at the opening of business 15 days before the day of the mailing of a notice\nof
        redemption of any such Securities selected for redemption under Section&nbsp;1203
        and ending at the close of business on the day of such mailing, or (b)&nbsp;to
        register the transfer of or exchange any Security so selected for redemption
        in whole\nor in part, except the unredeemed portion of any Security being
        redeemed in part. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The provisions of clauses (a),
        (b), (c) and\n(d)&nbsp;below shall apply only to Global Securities: </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) Each Global Security authenticated under
        this Indenture shall be registered in\nthe name of the Depositary designated
        for such Global Security or a nominee thereof and delivered to such Depositary
        or a nominee thereof or custodian therefor, and each such Global Security
        shall constitute a single Security for all purposes of\nthis Indenture. </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) Notwithstanding any other provision in this
        Indenture, no Global Security may be exchanged in whole or in part for\nSecurities
        registered, and no transfer of a Global Security in whole or in part may be
        registered, in the name of any Person other than the Depositary for such Global
        Security or a nominee thereof unless (i)&nbsp;such Depositary (A)&nbsp;has\nnotified
        the Issuer that it is unwilling or unable to continue as Depositary for such
        Global Security or (B)&nbsp;has ceased to be a clearing agency registered
        under the Exchange Act, and such Depositary provided reasonable notice to
        the Issuer or\nthe Trustee and no successor depositary is obtained (ii)&nbsp;there
        shall have occurred and be continuing an Event of Default with respect to
        such Global Security or (iii)&nbsp;there shall exist such circumstances, if
        any, in addition to or in lieu\nof the foregoing as have been specified for
        this purpose as contemplated by Section&nbsp;301. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">25 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) Subject
        to clause (b)&nbsp;above, any exchange of a Global Security for other Securities\nmay
        be made in whole or in part, and all Securities issued in exchange for a Global
        Security or any portion thereof shall be registered in such names as the Depositary
        for such Global Security shall direct. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) Every Security
        authenticated and delivered upon registration of transfer of, or in exchange
        for or in lieu of, a Global Security or any\nportion thereof, whether pursuant
        to this Section, Section&nbsp;304, 306, 1006 or 1207 or otherwise, shall be
        authenticated and delivered in the form of, and shall be, a Global Security,
        unless such Security is registered in the name of a Person\nother than the
        Depositary for such Global Security or a nominee thereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;306
        Mutilated, Destroyed, Lost and Stolen\nSecurities. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        any mutilated Security is surrendered to the Trustee, the Issuer shall execute
        and the Trustee shall authenticate and\ndeliver in exchange therefor a new
        Security of the same series and of like tenor and principal amount and bearing
        a number not contemporaneously outstanding. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        there shall be delivered to the Issuer and the Trustee (a)&nbsp;evidence to
        their satisfaction of the destruction, loss or theft of any\nSecurity and
        (b)&nbsp;such security or indemnity as may be required by them to save each
        of them and any agent of either of them harmless, then, in the absence of
        notice to the Issuer or the Trustee that such Security has been acquired by
        a bona\nfide purchaser, the Issuer shall execute and the Trustee shall authenticate
        and deliver, in lieu of any such destroyed, lost or stolen Security, a new
        Security of the same series and of like tenor and principal amount and bearing
        a number not\ncontemporaneously outstanding. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case any such mutilated, destroyed, lost or stolen Security has become or
        is about to become due and\npayable, the Issuer in its discretion may, instead
        of issuing a new Security, pay such Security. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        the issuance of any new Security\nunder this Section, the Issuer may require
        the payment of a sum sufficient to cover any tax or other governmental charge
        that may be imposed in relation thereto and any other expenses (including
        the fees and expenses of the Trustee) connected\ntherewith. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every
        new Security of any series issued pursuant to this Section in lieu of any
        destroyed, lost or stolen Security shall\nconstitute an original additional
        contractual obligation of the Issuer, whether or not the destroyed, lost or
        stolen Security shall be at any time enforceable by anyone, and shall be entitled
        to all the benefits of this Indenture equally and\nproportionately with any
        and all other Securities of that series duly issued hereunder. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        provisions of this Section are exclusive and\nshall preclude (to the extent
        lawful) all other rights and remedies with respect to the replacement or payment
        of mutilated, destroyed, lost or stolen Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">26 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;307
        Payment of Interest; Interest Rights Preserved. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        as otherwise provided as contemplated by Section&nbsp;301 with respect to
        any series of Securities, interest on any Security which is\npayable, and
        is punctually paid or duly provided for, on any Interest Payment Date shall
        be paid to the Person in whose name that Security (or one or more Predecessor
        Securities) is registered at the close of business on the Regular Record Date
        for\nsuch interest. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any interest on any Security
        of any series which is payable, but is not punctually paid or duly provided
        for, on any\nInterest Payment Date (herein called &#147;<B>Defaulted Interest</B>&#148;)
        shall forthwith cease to be payable to the Holder on the relevant Regular
        Record Date by virtue of having been such Holder, and such Defaulted Interest
        may be paid by the\nIssuer, at its election in each case, as provided in clause
        (a)&nbsp;or (b) below: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) The Issuer
        may elect to make payment of any\nDefaulted Interest to the Persons in whose
        names the Securities of such series (or their respective Predecessor Securities)
        are registered at the close of business on a Special Record Date for the payment
        of such Defaulted Interest, which shall be\nfixed in the following manner.
        The Issuer shall notify the Trustee in writing of the amount of Defaulted
        Interest proposed to be paid on each Security of such series and the date
        of the proposed payment, and at the same time the Issuer shall deposit\nwith
        the Trustee an amount of money equal to the aggregate amount proposed to be
        paid in respect of such Defaulted Interest or shall make arrangements satisfactory
        to the Trustee for such deposit prior to the date of the proposed payment,
        such money\nwhen deposited to be held in trust for the benefit of the Persons
        entitled to such Defaulted Interest as in this clause provided. Thereupon
        the Trustee shall fix a Special Record Date for the payment of such Defaulted
        Interest which shall be not\nmore than 15 days and not less than 10 days prior
        to the date of the proposed payment and not less than 10 days after the receipt
        by the Trustee of the notice of the proposed payment. The Trustee shall promptly
        notify the Issuer of such Special\nRecord Date and, in the name and at the
        expense of the Issuer, shall cause notice of the proposed payment of such
        Defaulted Interest and the Special Record Date therefor to be given to each
        Holder of Securities of such series in the manner set forth\nin Section&nbsp;106,
        not less than 10 days prior to such Special Record Date. Notice of the proposed
        payment of such Defaulted Interest and the Special Record Date therefor having
        been so mailed, such Defaulted Interest shall be paid to the Persons\nin whose
        names the Securities of such series (or their respective Predecessor Securities)
        are registered at the close of business on such Special Record Date and shall
        no longer be payable pursuant to the following clause (b). </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        The Issuer may make payment of any Defaulted Interest on the Securities of
        any series in any other lawful manner not inconsistent with the\nrequirements
        of any securities exchange on which such Securities may be listed, and upon
        such notice as may be required by such exchange, if, after notice given by
        the Issuer to the Trustee of the proposed payment pursuant to this clause,
        such\nmanner of payment shall be deemed practicable by the Trustee. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to the foregoing provisions of this
        Section, each Security\ndelivered under this Indenture upon registration of
        transfer of or in exchange for or in lieu of any other Security shall carry
        the rights to interest accrued and unpaid, and to accrue, which were carried
        by such other Security. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">27 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;308
        Persons Deemed Owners. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Prior to due
        presentment of a Security for registration of transfer, the Issuer, the Trustee
        and any agent of the Issuer or the Trustee may\ntreat the Person in whose
        name such Security is registered as the owner of such Security for the purpose
        of receiving payment of principal of and any premium and (subject to Section&nbsp;307)
        any interest on such Security and for all other purposes\nwhatsoever, whether
        or not such Security be overdue, and neither the Issuer, the Trustee nor any
        agent of the Issuer or the Trustee shall be affected by notice to the contrary.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;309 Cancellation. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">All Securities surrendered for payment, redemption,
        registration of transfer or exchange or for credit against any sinking fund
        payment shall,\nif surrendered to any Person other than the Trustee, be delivered
        to the Trustee and shall be promptly cancelled by it. The Issuer may at any
        time deliver to the Trustee for cancellation any Securities previously authenticated
        and delivered\nhereunder which the Issuer may have acquired in any manner
        whatsoever, and may deliver to the Trustee (or to any other Person for delivery
        to the Trustee) for cancellation any Securities previously authenticated hereunder
        which the Issuer has not\nissued and sold, and all Securities so delivered
        shall be promptly cancelled by the Trustee. No Securities shall be authenticated
        in lieu of or in exchange for any Securities cancelled as provided in this
        Section, except as expressly permitted by\nthis Indenture. All cancelled Securities
        held by the Trustee shall be disposed of by the Trustee in its customary manner.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;310 Computation of Interest.
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise specified as contemplated
        by Section&nbsp;301 for Securities of any series, interest on the Securities
        of each series shall\nbe computed on the basis of a <FONT STYLE=\"white-space:nowrap\">360-day</FONT>
        year of twelve <FONT STYLE=\"white-space:nowrap\">30-day</FONT> months. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;311 CUSIP Numbers. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer in issuing the Securities may use
        &#147;<B>CUSIP</B>&#148; numbers (if then generally in use), and, if so, the
        Trustee shall use\n&#147;<B>CUSIP</B>&#148; numbers in notices of redemption
        as a convenience to Holders; <U>provided</U> that any such notice may state
        that no representation is made as to the correctness of such numbers either
        as printed on the Securities or as\ncontained in any notice of a redemption
        and that reliance may be placed only on the other identification numbers printed
        on the Securities, and any such redemption shall not be affected by any defect
        in or omission of such numbers. The Issuer will\npromptly notify the Trustee
        in writing of any change in the &#147;<B>CUSIP</B>&#148; numbers. </P>\n <p
        STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">28
        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE FOUR </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>GUARANTEES
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;401 Applicability of Article;
        Guarantee. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) If the Issuer elects to
        issue any series of Securities with the benefit of Guarantees, then the provisions
        of this Article Four (with such\nmodifications thereto as may be specified
        pursuant to Section&nbsp;301 with respect to any series of Securities), will
        be applicable to such Securities. Each reference in this Article Four to a
        &#147;Security&#148; or &#147;the Securities&#148;\nrefers to the Securities
        of the particular series as to which provision has been made for such Guarantees.
        If more than one series of Securities as to which such provision has been
        made are Outstanding at any time, the provisions of this Article\nFour shall
        be applied separately to each such series. </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        Subject to this Article Four, the Guarantor fully and unconditionally guarantees\nto
        each Holder of a Security of any series issued with the benefit of Guarantees
        authenticated and delivered by the Trustee and to the Trustee and its successors
        and assigns, irrespective of the validity and enforceability of this Indenture,
        such\nSecurity or the obligations of the Issuer hereunder or thereunder, that:
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) the principal of, premium,
        if any, and\ninterest on such Security will be promptly paid in full when
        due, whether at maturity, by acceleration, redemption or otherwise, and interest
        on the overdue principal of and interest on such Security, if any, if lawful,
        and all other obligations of\nthe Issuer to the Holders or the Trustee hereunder
        or thereunder will be promptly paid in full or performed, all in accordance
        with the terms hereof and thereof; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        in case of any extension of time of payment or renewal of any Securities of
        that series or any of such other obligations,\nthat same will be promptly
        paid in full when due or performed in accordance with the terms of the extension
        or renewal, whether at stated maturity, by acceleration or otherwise. Failing
        payment when due of any amount so guaranteed or any performance\nso guaranteed
        for whatever reason, the Guarantor will be obligated to pay the same immediately.
        The Guarantor agrees that this is a guarantee of payment and not a guarantee
        of collection. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(c) The Guarantor hereby agrees
        that its obligations hereunder are unconditional, irrespective of the validity,
        regularity or enforceability of\nthe Securities of any series issued with
        the benefit of Guarantees or this Indenture, the absence of any action to
        enforce the same, any waiver or consent by any Holder of the Securities of
        that series with respect to any provisions hereof or\nthereof, the recovery
        of any judgment against the Issuer, any action to enforce the same or any
        other circumstance which might otherwise constitute a legal or equitable discharge
        or defense of a guarantor, other than payment in full of all\nobligations
        under the Securities of that series. The Guarantor in respect of a series
        of Securities hereby waives diligence, presentment, demand of payment, filing
        of claims with a court in the event of insolvency or bankruptcy of the Issuer
        in\nrespect of that series, any right to require a proceeding first against
        the Issuer, protest, notice and all demands whatsoever and covenants that
        this Guarantee will not be discharged except by complete performance of the
        obligations contained in\nsuch Securities and this Indenture. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">29 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) If any Holder
        or the Trustee is required by any court or otherwise to return to the\nIssuer,
        the Guarantor or any custodian, trustee, liquidator or other similar official
        acting in relation to either the Issuer or the Guarantor, any amount paid
        by either to the Trustee or such Holder, this Guarantee, to the extent theretofore\ndischarged,
        will be reinstated in full force and effect. </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e)
        The Guarantor agrees that it will not be entitled to any right of subrogation\nin
        relation to the Holders in respect of any obligations guaranteed hereby until
        payment in full of all obligations guaranteed hereby. The Guarantor further
        agrees that, as between the Guarantor, on the one hand, and the Holders and
        the Trustee, on\nthe other hand, (1)&nbsp;the maturity of the obligations
        guaranteed hereby may be accelerated as provided in Article Six hereof for
        the purposes of its Guarantee notwithstanding any stay, injunction or other
        prohibition preventing such acceleration\nin respect of the obligations guaranteed
        hereby, and (2)&nbsp;in the event of any declaration of acceleration of such
        obligations as provided in Article Six hereof, such obligations (whether or
        not due and payable) will forthwith become due and\npayable by the Guarantor
        for the purpose of its Guarantee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;402
        Limitation on Guarantor Liability. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Guarantor,
        and by its acceptance of Securities of any series issued with the benefit
        of Guarantees, each Holder, hereby confirms that it is\nthe intention of all
        such parties that the Guarantee of the Guarantor not constitute a fraudulent
        transfer or conveyance for purposes of Bankruptcy Law, the Uniform Fraudulent
        Conveyance Act, the Uniform Fraudulent Transfer Act or any similar\nfederal
        or state law to the extent applicable to any Guarantee. To effectuate the
        foregoing intention, the Trustee, the Holders and the Guarantor hereby irrevocably
        agree that the obligations of the Guarantor will, after giving effect to any
        maximum\namount and all other contingent and fixed liabilities of the Guarantor
        that are relevant under such laws, result in the obligations of the Guarantor
        under its Guarantee not constituting a fraudulent transfer or conveyance.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;403 Execution and Delivery of
        Guarantee. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">To evidence its Guarantee set
        forth in Section&nbsp;401 in respect of Securities of a series issued with
        the benefit of Guarantees, the\nGuarantor hereby agrees that a notation of
        such Guarantee substantially in the form as shall be established in one or
        more indentures supplemental hereto or approved from time to time pursuant
        to Board Resolutions in accordance with\nSection&nbsp;301, will be endorsed
        by an officer of the Guarantor on each Security of that series authenticated
        and delivered by the Trustee and that this Indenture will be executed on behalf
        of the Guarantor by one of its officers. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Guarantor hereby agrees that its Guarantee set forth in Section&nbsp;401 will
        remain in full force and effect notwithstanding any failure\nto endorse on
        each Security of that series a notation of such Guarantee. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">30 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If an officer
        whose signature is on this Indenture or on the Guarantee no longer holds that\noffice
        at the time the Trustee authenticates the Security of that series on which
        a Guarantee is endorsed, such Guarantee will be valid nevertheless. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The delivery of any Security of a series issued
        with the benefit of Guarantees by the Trustee, after the authentication thereof
        hereunder,\nwill constitute due delivery of the Guarantee set forth in this
        Indenture on behalf of the Guarantor. </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        FIVE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>SATISFACTION AND DISCHARGE
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;501 Satisfaction and Discharge
        of Indenture. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">This Indenture and any related
        Guarantee shall upon Issuer Request cease to be of further effect (except
        as to any surviving rights of\nregistration of transfer or exchange of Securities
        herein expressly provided for and other rights and remedies referenced herein),
        and the Trustee, at the expense of the Issuer, shall execute proper instruments
        acknowledging satisfaction and\ndischarge of this Indenture, when </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) either </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(i) all Securities theretofore authenticated and delivered (other
        than (A)&nbsp;Securities which have been destroyed, lost or\nstolen and which
        have been replaced or paid as provided in Section&nbsp;306 and (B)&nbsp;Securities
        for whose payment money has theretofore been deposited in trust or segregated
        and held in trust by the Issuer and thereafter repaid to the Issuer or\ndischarged
        from such trust, as provided in Section&nbsp;1103) have been delivered to
        the Trustee for cancellation; or (ii)&nbsp;all such Securities not theretofore
        delivered to the Trustee for cancellation </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(A) have become due and payable, or </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(B) will become due and payable at their Stated Maturity within
        one year, or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(C) are to be
        called for redemption within one year under arrangements satisfactory to the
        Trustee for the giving of notice of\nredemption by the Trustee in the name,
        and at the expense, of the Issuer, </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; font-size:10pt; font-family:Times New Roman\">and the Issuer,
        in the case of (A), (B) or (C)&nbsp;above, has\ndeposited or caused to be
        deposited with the Trustee an amount of money sufficient to pay and discharge
        the entire indebtedness on such Securities not theretofore delivered to the
        Trustee for cancellation, for principal and any premium and interest\nto the
        date of such deposit (in the case of Securities which have become due and
        payable) or to the Stated Maturity or Redemption Date, as the case may be;
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) the Issuer has paid or caused to be paid
        all other sums payable hereunder by the Issuer; and </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">31 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) the Issuer
        has delivered to the Trustee an Officers&#146; Certificate and an Opinion
        of\nCounsel, each stating that all conditions precedent herein provided for
        relating to the satisfaction and discharge of this Indenture have been complied
        with. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Notwithstanding the satisfaction
        and discharge of this Indenture, the obligations of the Issuer to the Trustee
        under Section&nbsp;707, the\nobligations of the Trustee to any Authenticating
        Agent under Section&nbsp;714 and, if money shall have been deposited with
        the Trustee pursuant to subclause (ii)&nbsp;of clause (a)&nbsp;of this Section,
        the obligations of the Trustee under\nSection&nbsp;502 and the last paragraph
        of Section&nbsp;1103 shall survive such satisfaction and discharge. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;502\nApplication of Trust Money.
        </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to the provisions of the last paragraph
        of Section&nbsp;1103, all money deposited with the Trustee\npursuant to Section&nbsp;501
        shall be held in trust and applied by it, in accordance with the provisions
        of the Securities and this Indenture, to the payment, either directly or through
        any Paying Agent (including the Issuer acting as its own Paying\nAgent) as
        the Trustee may determine, to the Persons entitled thereto, of the principal
        and any premium and interest for whose payment such money has been deposited
        with the Trustee. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE SIX </B></P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>REMEDIES\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;601
        Events of Default. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Event
        of Default,</B>&#148; wherever used herein with respect to Securities of any
        series, means any one of the following events\n(whatever the reason for such
        Event of Default and whether it shall be occasioned by the provisions of Article
        Fifteen or be voluntary or involuntary or be effected by operation of law
        or pursuant to any judgment, decree or order of any court or any\norder, rule
        or regulation of any administrative or governmental body): </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        default in the payment of the principal of or any premium on\nany Security
        of that series at its Maturity; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) default
        in the payment of any interest upon any Security of that series when it\nbecomes
        due and payable, and continuance of such default for a period of 30 days;
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(c) default in the deposit of any sinking fund\npayment,
        when and as due by the terms of a Security of that series and continuance
        of such default for a period of 30 days; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        default\nin the performance of, or breach of, any covenant of an Obligor in
        this Indenture (other than a covenant a default in whose performance or whose
        breach is elsewhere in this Section specifically dealt with or which has been
        expressly included in this\nIndenture solely for the benefit of a series of
        Securities other than that series), and continuance of such default or breach
        for a period of 60 days after there has been given, by first class mail, to
        the Obligors by the Trustee or to the Obligors\nand the Trustee by the Holders
        of at least a majority in principal amount of the Outstanding Securities of
        that series a written notice specifying such default or breach and requiring
        it to be remedied and stating that such notice is a\n&#147;<B>Notice of Default</B>&#148;
        hereunder; or </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">32 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(e) a default under any bond, debenture, note
        or other evidence of indebtedness of an\nObligor, or under any mortgage, indenture
        or other instrument of an Obligor (including a default with respect to Securities
        of any series other than that series) under which there may be issued or by
        which there may be secured any indebtedness of\nsuch Obligor (or by any Subsidiary,
        the repayment of which such Obligor has guaranteed or for which such Obligor
        is directly responsible or liable as obligor or guarantor), whether such indebtedness
        now exists or shall hereafter be created, which\ndefault shall constitute
        a failure to pay an aggregate principal amount exceeding $__________ of such
        indebtedness when due and payable after the expiration of any applicable grace
        period with respect thereto and shall have resulted in such\nindebtedness
        in an aggregate principal amount exceeding $__________ becoming or being declared
        due and payable prior to the date on which it would otherwise have become
        due and payable, without such indebtedness having been discharged, or such\nacceleration
        having been rescinded or annulled, within a period of 10 days after there
        shall have been given, by first class mail, to such Obligor by the Trustee
        or to such Obligor and the Trustee by the Holders of at least a majority in
        principal\namount of the Outstanding Securities of that series a written notice
        specifying such default and requiring such Obligor to cause such indebtedness
        to be discharged or cause such acceleration to be rescinded or annulled and
        stating that such notice\nis a &#147;<B>Notice of Default</B>&#148; hereunder;
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) an Obligor or any Significant Subsidiary
        pursuant to or within the meaning of\nany Bankruptcy Law (i)&nbsp;commences
        a voluntary case, (ii)&nbsp;consents to the entry of an order for relief against
        it in an involuntary case, or (iii)&nbsp;consents to the appointment of a
        Custodian of it or for all or substantially all of its\nproperty, or </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(g) a court of competent jurisdiction enters
        an order or decree under any Bankruptcy Law that: (i)&nbsp;is for relief against\nan
        Obligor or any Significant Subsidiary in an involuntary case, (ii)&nbsp;appoints
        a Custodian of an Obligor or any Significant Subsidiary or for all or substantially
        all of either of its property, or (iii)&nbsp;orders the liquidation of an
        Obligor\nor any Significant Subsidiary, and the order or decree remains unstayed
        and in effect for 90 days; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) any Guarantee
        is not, or is\nclaimed by the Guarantor not to be, in full force and effect;
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(i) any other Event of Default provided with
        respect to Securities of\nthat series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;602
        Acceleration of Maturity; Rescission and Annulment. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an Event of Default (other than an Event of Default specified in Section&nbsp;601(f)
        or 601(g)) with respect to Securities of any series at\nthe time Outstanding
        occurs and is continuing, then in every such case the Trustee or the Holders
        of not less than a majority of the principal amount of the Outstanding Securities
        of that series may declare the principal amount of all the Securities\nof
        that series (or, if any Securities of that series are Original Issue Discount
        Securities, such portion of the principal amount of such Securities as may
        be specified by the terms thereof) </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">33 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nto be due and payable immediately,
        by a notice in writing to the Issuer (and to the Trustee if given by Holders),
        and upon any such declaration such principal amount (or specified amount)
        shall\nbecome immediately due and payable. If an Event of Default specified
        in clause (f)&nbsp;or (g) of Section&nbsp;601 with respect to Securities of
        any series at the time Outstanding occurs, the principal amount of all the
        Securities of that series\n(or, if any Securities of that series are Original
        Issue Discount Securities, such portion of the principal amount of such Securities
        as may be specified by the terms thereof) shall automatically, and without
        any declaration or other action on the\npart of the Trustee or any Holder,
        become immediately due and payable. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">At any time
        after such a declaration of acceleration with respect\nto Securities of any
        series has been made and before a judgment or decree for payment of the money
        due has been obtained by the Trustee as hereinafter provided in this Article,
        the Holders of a majority in principal amount of the Outstanding\nSecurities
        of that series, by written notice to the Issuer and the Trustee, may rescind
        and annul such declaration and its consequences if: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        the Issuer has paid or deposited with the Trustee a sum sufficient to pay
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) all overdue interest on
        all Securities of that series, </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        the principal of (and premium, if any, on) any Securities of that series which
        have become due otherwise than by such\ndeclaration of acceleration and any
        interest thereon at the rate or rates prescribed therefor in such Securities,
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(iii) to\nthe extent that payment
        of such interest is lawful, interest upon overdue interest at the rate or
        rates prescribed therefor in such Securities, and (iv)&nbsp;all sums paid
        or advanced by the Trustee hereunder and the reasonable compensation,\nexpenses,
        disbursements and advances of the Trustee, its agents and counsel; and </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) all Events of Default with respect to Securities
        of\nthat series, other than the <FONT STYLE=\"white-space:nowrap\">non-payment</FONT>
        of the principal of Securities of that series which have become due solely
        by such declaration of acceleration, have been cured or waived as provided
        in\nSection&nbsp;613. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No such rescission
        shall affect any subsequent default or impair any right consequent thereon.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Trustee shall not be required to act upon
        an Event of Default unless a Responsible Officer has received written notice
        of such Event of\nDefault. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;603
        Collection of Indebtedness and Suits for Enforcement by Trustee. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer covenants that if: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        default is made in the payment of any interest on any Security when such interest
        becomes due and payable and such default continues for a\nperiod of 30 days,
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) default is made in the payment of the principal
        of (or premium, if any, on) any Security at the Maturity\nthereof, </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">34 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">the Issuer will, upon demand of the Trustee, pay to it, for the
        benefit of the Holders of such Securities,\nthe whole amount then due and
        payable on such Securities for principal and any premium and interest and,
        to the extent that payment of such interest shall be legally enforceable,
        interest on any overdue principal and premium and on any overdue\ninterest,
        at the rate or rates prescribed therefor in such Securities, and, in addition
        thereto, such further amount as shall be sufficient to cover the amounts owed
        to the Trustee, including the reasonable compensation, expenses, disbursements
        and\nadvances of the Trustee, its agents and counsel. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an Event of Default with respect to Securities of any series occurs and is\ncontinuing,
        the Trustee may in its discretion proceed to protect and enforce its rights
        and the rights of the Holders of Securities of such series by such appropriate
        judicial proceedings as the Trustee shall deem necessary to protect and enforce\nany
        such rights, whether for the specific enforcement of any covenant or agreement
        in this Indenture or in aid of the exercise of any power granted herein, or
        to enforce any other proper remedy. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;604
        Trustee May File Proofs of Claim. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In case of any
        judicial proceeding relative to an Obligor (or any other obligor upon the
        Securities), its property or its creditors, the\nTrustee shall be entitled
        and empowered, by intervention in such proceeding or otherwise, to take any
        and all actions authorized under the Trust Indenture Act in order to have
        claims of the Holders and the Trustee allowed in any such proceeding. In\nparticular,
        the Trustee shall be authorized to collect and receive any moneys or other
        property payable or deliverable on any such claims and to distribute the same;
        and any custodian, receiver, assignee, trustee, liquidator, sequestrator or
        other\nsimilar official in any such judicial proceeding is hereby authorized
        by each Holder to make such payments to the Trustee and, in the event that
        the Trustee shall consent to the making of such payments directly to the Holders,
        to pay to the Trustee\nany amount due it for the reasonable compensation,
        expenses, disbursements and advances of the Trustee, its agents and counsel,
        and any other amounts due the Trustee under Section&nbsp;707. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        provision of this Indenture shall be deemed to authorize the Trustee to authorize
        or consent to or accept or adopt on behalf of any Holder\nany plan of reorganization,
        arrangement, adjustment or composition affecting the Securities or the rights
        of any Holder thereof or to authorize the Trustee to vote in respect of the
        claim of any Holder in any such proceeding; provided, however, that\nthe Trustee
        may, on behalf of the Holders, vote for the election of a trustee in bankruptcy
        or similar official and be a member of a creditors&#146; or other similar
        committee. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;605 Trustee
        May Enforce Claims Without Possession of Securities. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        rights of action and claims under this Indenture or the Securities may be
        prosecuted and enforced by the Trustee without the possession of\nany of the
        Securities or the production thereof in any proceeding relating thereto, and
        any such proceeding instituted by the Trustee shall be brought in its own
        name as trustee of an express trust, and any recovery of judgment shall, after\nprovision
        for the payment of the reasonable compensation, expenses, disbursements and
        advances of the Trustee, its agents and counsel, be for the ratable benefit
        of the Holders of the Securities in respect of which such judgment has been
        recovered.\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">35 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;606 Application of Money Collected.
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any money collected by the Trustee pursuant
        to this Article shall be applied in the following order, at the date or dates
        fixed by the Trustee\nand, in case of the distribution of such money on account
        of principal or any premium or interest, upon presentation of the Securities
        and the notation thereon of the payment if only partially paid and upon surrender
        thereof if fully paid: </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">FIRST: To the
        payment of all amounts due the Trustee under Section&nbsp;707, </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">SECOND:
        To the extent provided in Article Fifteen, to the holders of Senior Debt of
        the Company in accordance with Article Fifteen, </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">THIRD:
        To the payment of the amounts then due and unpaid for principal of and any
        premium and interest on the Securities in respect of which\nor for the benefit
        of which such money has been collected, ratably, without preference or priority
        of any kind, according to the amounts due and payable on such Securities for
        principal and any premium and interest, respectively, and </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">FOURTH:
        To the Person entitled to receive the same; if no other Person shall be entitled
        thereto, then to the Issuer, or as a court of\ncompetent jurisdiction may
        direct. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;607 Limitation
        on Suits. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">No Holder of any Security of
        any series shall have any right to institute any proceeding, judicial or otherwise,
        with respect to this\nIndenture, or for the appointment of a receiver or trustee,
        or for any other remedy hereunder, unless: </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        such Holder has previously\ngiven written notice to the Trustee of a continuing
        Event of Default with respect to the Securities of that series; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        the Holders of not\nless than a majority in principal amount of the Outstanding
        Securities of that series shall have made written request to the Trustee to
        institute proceedings in respect of such Event of Default in its own name
        as Trustee hereunder; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) such Holder
        or Holders have offered to the Trustee reasonable indemnity satisfactory to
        it against the costs, expenses and liabilities to\nbe incurred in compliance
        with such request; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(d) the Trustee for 60 days
        after its receipt of such notice, request and offer of indemnity\nhas failed
        to institute any such proceeding; and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) no direction
        inconsistent with such written request has been given to the Trustee\nduring
        such <FONT STYLE=\"white-space:nowrap\">60-day</FONT> period by the Holders
        of a majority in principal amount of the Outstanding Securities of that series;
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">36 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">it being understood and intended that no one or more of such Holders
        shall have any right in any manner\nwhatever by virtue of, or by availing
        of, any provision of this Indenture to affect, disturb or prejudice the rights
        of any other of such Holders, or to obtain or to seek to obtain priority or
        preference over any other of such Holders or to enforce\nany right under this
        Indenture, except in the manner herein provided and for the equal and ratable
        benefit of all of such Holders. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;608
        Unconditional Right of Holders to Receive Principal, Premium and Interest.
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Notwithstanding any other provision in this
        Indenture, the Holder of any Security shall have the right, which is absolute
        and unconditional, to\nreceive payment of the principal of and any premium
        and (subject to Section&nbsp;307) interest on such Security on the respective
        Stated Maturities expressed in such Security (or, in the case of redemption,
        on the Redemption Date) and to institute\nsuit for the enforcement of any
        such payment, and such rights shall not be impaired without the consent of
        such Holder. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;609 Restoration
        of Rights and Remedies. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If the Trustee
        or any Holder has instituted any proceeding to enforce any right or remedy
        under this Indenture and such proceeding has been\ndiscontinued or abandoned
        for any reason, or has been determined adversely to the Trustee or to such
        Holder, then and in every such case, subject to any determination in such
        proceeding, the Issuer, the Trustee and the Holders shall be restored\nseverally
        and respectively to their former positions hereunder and thereafter all rights
        and remedies of the Trustee and the Holders shall continue as though no such
        proceeding had been instituted. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;610
        Rights and Remedies Cumulative. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except as otherwise
        provided with respect to the replacement or payment of mutilated, destroyed,
        lost or stolen Securities in the last\nparagraph of Section&nbsp;306, no right
        or remedy herein conferred upon or reserved to the Trustee or to the Holders
        is intended to be exclusive of any other right or remedy, and every right
        and remedy shall, to the extent permitted by law, be\ncumulative and in addition
        to every other right and remedy given hereunder or now or hereafter existing
        at law or in equity or otherwise. The assertion or employment of any right
        or remedy hereunder, or otherwise, shall not prevent the concurrent\nassertion
        or employment of any other appropriate right or remedy. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;611
        Delay or Omission Not Waiver. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No delay or
        omission of the Trustee or of any Holder of any Securities to exercise any
        right or remedy accruing upon any Event of Default shall\nimpair any such
        right or remedy or constitute a waiver of any such Event of Default or an
        acquiescence therein. Every right and remedy given by this Article or by law
        to the Trustee or to the Holders may be exercised from time to time, and as
        often\nas may be deemed expedient, by the Trustee or by the Holders, as the
        case may be. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">37 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;612 Control by Holders. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Holders of a majority in principal amount
        of the Outstanding Securities of any series shall have the right to direct
        the time, method and\nplace of conducting any proceeding for any remedy available
        to the Trustee, or exercising any trust or power conferred on the Trustee,
        with respect to the Securities of such series, provided that: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        such direction shall not be in conflict with any rule of law or with this
        Indenture, and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) the Trustee may take any
        other action deemed proper by the Trustee which is not inconsistent with such
        direction. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;613 Waiver of
        Past Defaults. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Holders of not less than
        a majority in principal amount of the Outstanding Securities of any series
        may on behalf of the Holders of all the\nSecurities of such series waive any
        past default hereunder with respect to such series and its consequences, except
        a default: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) in the\npayment of the principal
        of or any premium or interest on any Security of such series, or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        in respect of a covenant or provision hereof\nwhich under Article Ten cannot
        be modified or amended without the consent of the Holder of each Outstanding
        Security of such series affected. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon any such
        waiver, such default shall cease to exist, and any Event of Default arising
        therefrom shall be deemed to have been cured, for\nevery purpose of this Indenture;
        but no such waiver shall extend to any subsequent or other default or impair
        any right consequent thereon. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;614
        Undertaking for Costs. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In any suit
        for the enforcement of any right or remedy under this Indenture, or in any
        suit against the Trustee for any action taken, suffered\nor omitted by it
        as Trustee, a court may require any party litigant in such suit to file an
        undertaking to pay the costs of such suit, and may assess costs (including
        reasonable attorneys&#146; fees and expenses) against any such party litigant,
        in\nthe manner and to the extent provided in the Trust Indenture Act. Except
        as otherwise provided in the Trust Indenture Act, this section does not apply
        to a suit by the Trustee, a suit by a Holder pursuant to Section&nbsp;608
        hereof, or a suit by\nHolders of more than 10% in principal amount of the
        Outstanding Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;615
        Waiver of Usury, Stay or Extension Laws.\n</B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer covenants (to the extent that it may lawfully do so) that it will not
        at any time insist upon, or plead, or in any manner\nwhatsoever claim or take
        the benefit or advantage of, any usury, stay or extension law wherever enacted,
        now or at any time hereafter in force, which may affect the covenants or the
        performance of this Indenture; and the Issuer (to the extent that\nit may
        lawfully do so) hereby expressly waives all benefit or advantage of any such
        law and covenants that it will not hinder, delay or impede the execution of
        any power herein granted to the Trustee, but will suffer and permit the execution
        of\nevery such power as though no such law had been enacted. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">38 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        SEVEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>THE TRUSTEE </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;701 Certain Duties and Responsibilities.
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The duties and responsibilities of the Trustee
        shall be as provided by the Trust Indenture Act. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        Except during the continuance of an Event of Default, </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(i) the Trustee undertakes to perform such duties and only such
        duties as are specifically set forth in this Indenture, and no\nimplied covenants
        or obligations shall be read into this Indenture against the Trustee; and
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(ii) in the absence of bad\nfaith
        on its part, the Trustee may conclusively rely, as to the truth of the statements
        and the correctness of the opinions expressed therein, upon certificates or
        opinions furnished to the Trustee and conforming to the requirements of this\nIndenture;
        but in the case of any such certificates or opinions which by any provision
        hereof are specifically required to be furnished to the Trustee, the Trustee
        shall be under a duty to examine the same to determine whether or not they
        conform to\nthe requirements of this Indenture (but need not confirm or investigate
        the accuracy of mathematical calculations or other facts stated therein).
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) In case an Event of Default has occurred
        and is continuing, the Trustee shall exercise such of the rights and powers
        vested in it by this\nIndenture, and use the same degree of care and skill
        in their exercise, as a prudent person would exercise or use under the circumstances
        in the conduct of his or her own affairs. </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        No provision of this Indenture shall be construed to relieve the Trustee from
        liability for its own negligent action, its own negligent\nfailure to act,
        or its own willful misconduct, except that </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(i) this Subsection shall not be construed to limit the effect\nof
        Subsection (a)&nbsp;of this Section; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(ii)
        the Trustee shall not be liable for any error of judgment made in good faith\nby
        a Responsible Officer, unless it shall be proved that the Trustee was negligent
        in ascertaining the pertinent facts; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(iii)
        the Trustee shall not be liable with respect to any action taken or omitted
        to be taken by it in good faith in accordance\nwith the direction of the Holders
        of a majority in principal amount of the Outstanding Securities of any series
        relating to the time, method and place of conducting any proceeding for any
        remedy available to the Trustee, or exercising any trust or\npower conferred
        upon the Trustee, under this Indenture with respect to the Securities of such
        series; and </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">39 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(iv) notwithstanding the foregoing,
        no provision of this Indenture shall\nrequire the Trustee to expend or risk
        its own funds or otherwise incur any financial liability in the performance
        of any of its duties hereunder, or in the exercise of any of its rights or
        powers, if it shall have reasonable grounds for believing\nthat repayment
        of such funds or adequate indemnity against such risk or liability is not
        reasonably assured to it. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) Whether
        or not\ntherein expressly so provided, every provision of this Indenture relating
        to the conduct or affecting the liability of or affording protection to the
        Trustee shall be subject to the provisions of this Section. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;702
        Notice of Defaults. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If a default
        occurs hereunder with respect to Securities of any series, the Trustee shall
        give the Holders of Securities of such series notice\nof such default as and
        to the extent provided by the Trust Indenture Act; provided, however, that
        in the case of any default of the character specified in clause (d)&nbsp;of
        Section&nbsp;501 with respect to Securities of such series, no such notice\nto
        Holders shall be given until at least 30 days after the occurrence thereof.
        For the purpose of this Section, the term &#147;default&#148; means any event
        which is, or after notice or lapse of time or both would become, an Event
        of Default with\nrespect to Securities of such series. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;703
        Certain Rights of Trustee. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Subject to the
        provisions of Section&nbsp;701: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) the Trustee
        may conclusively rely and shall be fully protected in acting or refraining
        from acting upon any resolution, certificate,\nstatement, instrument, opinion,
        report, notice, request, direction, consent, order, bond, debenture, note,
        other evidence of indebtedness or other paper or document believed by it to
        be genuine and to have been signed or presented by the proper\nparty or parties
        (but need not investigate the accuracy of any mathematical calculations or
        other facts stated therein); </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b) any request\nor
        direction of the Issuer mentioned herein shall be sufficiently evidenced by
        an Issuer Request or Issuer Order, and any resolution of the Board shall be
        sufficiently evidenced by a Board Resolution; </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        whenever in the administration of this Indenture the Trustee shall deem it
        desirable that a matter be proved or established prior to\ntaking, suffering
        or omitting any action hereunder, the Trustee (unless other evidence be herein
        specifically prescribed) may, in the absence of bad faith on its part, rely
        upon an Officers&#146; Certificate; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d) the Trustee
        may consult with counsel of its selection and the advice of such counsel or
        any Opinion of Counsel shall be full and complete\nauthorization and protection
        in respect of any action taken, suffered or omitted by it hereunder in good
        faith and in reliance thereon; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) the Trustee
        shall be under no obligation to exercise any of the rights or powers vested
        in it by this Indenture at the request or direction\nof any of the Holders
        pursuant to this Indenture, unless such Holders shall have offered to the
        Trustee reasonable security or indemnity satisfactory to it against the costs,
        expenses and liabilities which might be incurred by it in compliance with\nsuch
        request or direction; </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ;
        font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\">40 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(f) the Trustee
        shall not be bound to make any investigation into the facts or matters\nstated
        in any resolution, certificate, statement, instrument, opinion, report, notice,
        request, direction, consent, order, bond, debenture, note, other evidence
        of indebtedness or other paper or document, but the Trustee, in its discretion,
        may make\nsuch further inquiry or investigation into such facts or matters
        as it may see fit, and, if the Trustee shall determine to make such further
        inquiry or investigation, it shall be entitled to examine the books, records
        and premises of the Issuer,\npersonally or by agent or attorney at the expense
        of the Issuer and shall incur no liability of any kind by reason of such inquiry
        or investigation; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(g) the Trustee may execute
        any of the trusts or powers hereunder or perform any duties hereunder either
        directly or by or through agents or\nattorneys and the Trustee shall not be
        responsible for any misconduct or negligence on the part of any agent or attorney
        appointed with due care by it hereunder; </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h)
        the Trustee shall not be liable for any action taken, suffered, or omitted
        to be taken by it in good faith and reasonably believed by it to\nbe authorized
        or within the discretion or rights or powers conferred upon it by this Indenture;
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(i) in no event shall the Trustee be\nresponsible
        or liable for special, indirect, punitive, or consequential loss or damage
        of any kind whatsoever (including, but not limited to, loss of profit) irrespective
        of whether the Trustee has been advised of the likelihood of such loss or\ndamage
        and regardless of the form of action; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) the Trustee
        shall not be deemed to have notice of any Default or Event of Default unless\nwritten
        notice of any event which is in fact such a default is received by the Trustee
        at the Corporate Trust Office of the Trustee, and such notice references the
        Securities and this Indenture; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(k) the rights,
        privileges, protections, immunities and benefits given to the Trustee, including,
        without limitation, its right to be\nindemnified, are extended to, and shall
        be enforceable by, the Trustee in each of its capacities hereunder, and each
        agent, custodian and other Person employed to act hereunder; and </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(l) the Trustee may request that the Issuer
        deliver a certificate setting forth the names of individuals and/or titles
        of officers authorized\nat such time to take specified actions pursuant to
        this Indenture. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;704 Not Responsible
        for Recitals or Issuance of\nSecurities. </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        recitals contained herein and in the Securities, except the Trustee&#146;s
        certificates of authentication, shall be\ntaken as the statements of the Obligors,
        and neither the Trustee nor any Authenticating Agent assumes any responsibility
        for their correctness. The Trustee makes no representations as to the validity
        or sufficiency of this Indenture or of the\nSecurities. Neither the Trustee
        nor any Authenticating Agent shall be accountable for the use or application
        by the Issuer of Securities or the proceeds thereof. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">41 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;705
        May Hold Securities. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee,
        any Authenticating Agent, any Paying Agent, any Security Registrar or any
        other agent of the Issuer, in its individual or any\nother capacity, may become
        the owner or pledgee of Securities and, subject to Sections 708 and 713, may
        otherwise deal with the Issuer with the same rights it would have if it were
        not Trustee, Authenticating Agent, Paying Agent, Security Registrar\nor such
        other agent. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;706 Money Held
        in Trust. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Money held by the Trustee in
        trust hereunder need not be segregated from other funds except to the extent
        required by law. The Trustee shall be\nunder no liability for interest on
        any money received by it hereunder except as otherwise agreed with the Issuer.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;707\nCompensation, Reimbursement
        and Indemnification. </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer agrees:
        </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(1) to pay to the Trustee from
        time to time reasonable compensation for all services rendered by it hereunder
        (which\ncompensation shall not be limited by any provision of law in regard
        to the compensation of a trustee of an express trust); </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(2) except as otherwise expressly provided herein, to reimburse
        the Trustee upon its request for all expenses, disbursements\nand advances
        incurred or made by the Trustee in accordance with any provision of this Indenture
        (including the reasonable compensation and the expenses and disbursements
        of its agents and counsel), except any such expense, disbursement or advance
        as\nshall have been caused by its own negligence or willful misconduct; and
        </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(3) to fully indemnify each
        of the Trustee or any\npredecessor Trustee and their agents for, and to hold
        them harmless against, any loss, liability, claim, damage or expense incurred
        without negligence or willful misconduct on their part, arising out of or
        in connection with the acceptance or\nadministration of the trust or trusts
        hereunder, including the costs and expenses of defending themselves against
        any claim or liability in connection with the exercise or performance of any
        of their powers or duties hereunder. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">When the Trustee
        incurs expenses or renders services in connection with an Event of Default,
        the expenses (including the reasonable charges\nand expenses of its counsel)
        and the compensation for the services are intended to constitute expenses
        of administration under any applicable Federal or state bankruptcy, insolvency
        or other similar law. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        shall have a lien prior to the Securities as to all property and funds held
        by it hereunder for any amount owing it or any\npredecessor Trustee pursuant
        to this Section&nbsp;707, except with respect to funds held in trust for the
        benefit of the Holders of particular Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">42 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The benefits
        of this Section shall survive the termination of the Indenture and resignation\nor
        removal of the Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;708
        Conflicting Interests. </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If the Trustee
        has or shall acquire a conflicting interest within the meaning of the Trust
        Indenture Act, the Trustee shall either eliminate\nsuch interest or resign,
        to the extent and in the manner provided by, and subject to the provisions
        of, the Trust Indenture Act and this Indenture. To the extent permitted by
        the Trust Indenture Act, the Trustee shall not be deemed to have a\nconflicting
        interest by virtue of being a trustee under this Indenture with respect to
        Securities of more than one series or a trustee under those certain Indentures
        between the Issuer and the Trustee dated as of September&nbsp;6, 2002, as
        of\nNovember&nbsp;20, 2006 and as of March&nbsp;15, 2010, each as amended
        and supplemented. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;709 Corporate
        Trustee Required;\nEligibility. </B></P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">There shall
        at all times be one (and only one) Trustee hereunder with respect to the Securities
        of each series, which may\nbe Trustee hereunder for Securities of one or more
        other series. Each Trustee shall be a Person that is eligible pursuant to
        the Trust Indenture Act to act as such, and has a combined capital and surplus
        of at least $50,000,000. If any such Person\npublishes reports of condition
        at least annually, pursuant to law or to the requirements of its supervising
        or examining authority, then for the purposes of this Section and to the extent
        permitted by the Trust Indenture Act, the combined capital\nand surplus of
        such Person shall be deemed to be its combined capital and surplus as set
        forth in its most recent report of condition so published. If at any time
        the Trustee with respect to the Securities of any series shall cease to be
        eligible in\naccordance with the provisions of this Section, it shall resign
        immediately in the manner and with the effect hereinafter specified in this
        Article. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;710 Resignation
        and Removal; Appointment of Successor. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">No
        resignation or removal of the Trustee and no appointment of a successor Trustee
        pursuant to this Article shall become effective until the\nacceptance of appointment
        by the successor Trustee in accordance with the applicable requirements of
        Section&nbsp;711. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">The Trustee may\nresign at any
        time with respect to the Securities of one or more series by giving written
        notice thereof to the Issuer. If the instrument of acceptance by a successor
        Trustee required by Section&nbsp;711 shall not have been delivered to the
        Trustee\nwithin 30 days after the giving of such notice of resignation, the
        resigning Trustee may petition, at the expense of the Issuer, any court of
        competent jurisdiction for the appointment of a successor Trustee with respect
        to the Securities of such\nseries. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        may be removed at any time with respect to the Securities of any series by
        Act of the Holders of a majority in\nprincipal amount of the Outstanding Securities
        of such series, upon 30 days&#146; written notice, delivered to the Trustee
        and to the Issuer. If the instrument of acceptance by a successor Trustee
        required by Section&nbsp;711 shall not have been\ndelivered to the Trustee
        within 30 days after such removal, the retiring Trustee may petition, at the
        expense of the Issuer, any court of competent jurisdiction for the appointment
        of a successor Trustee with respect to the Securities of such\nseries. </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">43 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If at any time: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(1) the Trustee shall fail to comply with Section&nbsp;708 after
        written request therefor by the Issuer or by any Holder who\nhas been a bona
        fide Holder of a Security for at least six months, or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(2) the Trustee shall cease to be eligible under\nSection&nbsp;709
        and shall fail to resign after written request therefor by the Issuer or by
        any such Holder, or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(3) the\nTrustee
        shall become incapable of acting or shall be adjudged a bankrupt or insolvent
        or a receiver of the Trustee or of its property shall be appointed or any
        public officer shall take charge or control of the Trustee or of its property
        or affairs\nfor the purpose of rehabilitation, conservation or liquidation,
        then, in any such case, (A)&nbsp;the Issuer by a Board Resolution may remove
        the Trustee with respect to all Securities, or (B)&nbsp;subject to Section&nbsp;514,
        any Holder who has been\na bona fide Holder of a Security for at least six
        months may, on behalf of such Holder and all others similarly situated, petition
        any court of competent jurisdiction for the removal of the Trustee with respect
        to all Securities and the appointment\nof a successor Trustee or Trustees.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If the Trustee shall resign, be removed or become
        incapable of acting, or if a vacancy shall occur in\nthe office of Trustee
        for any cause, with respect to the Securities of one or more series, the Issuer,
        by a Board Resolution, shall promptly appoint a successor Trustee or Trustees
        with respect to the Securities of that or those series (it being\nunderstood
        that any such successor Trustee may be appointed with respect to the Securities
        of one or more or all of such series and that at any time there shall be only
        one Trustee with respect to the Securities of any particular series) and shall\ncomply
        with the applicable requirements of Section&nbsp;711. If, within one year
        after such resignation, removal or incapability, or the occurrence of such
        vacancy, a successor Trustee with respect to the Securities of any series
        shall be appointed\nby Act of the Holders of a majority in principal amount
        of the Outstanding Securities of such series delivered to the Issuer and the
        retiring Trustee, the successor Trustee so appointed shall, forthwith upon
        its acceptance of such appointment in\naccordance with the applicable requirements
        of Section&nbsp;711, become the successor Trustee with respect to the Securities
        of such series and to that extent supersede the successor Trustee appointed
        by the Issuer. If no successor Trustee with\nrespect to the Securities of
        any series shall have been so appointed by the Issuer or the Holders and accepted
        appointment in the manner required by Section&nbsp;711, any Holder who has
        been a bona fide Holder of a Security of such series for at\nleast six months
        may, on behalf of such Holder and all others similarly situated, petition
        any court of competent jurisdiction for the appointment of a successor Trustee
        with respect to the Securities of such series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall give notice of each resignation and each removal of the Trustee
        with respect to the Securities of any series and each\nappointment of a successor
        Trustee with respect to the Securities of any series to all Holders of Securities
        of such series in the manner provided in Section&nbsp;106. Each notice shall
        include the name of the successor Trustee with respect to the\nSecurities
        of such series and the address of its Corporate Trust Office. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">44 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;711
        Acceptance of Appointment by Successor. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case of the appointment hereunder of a successor Trustee with respect to all
        Securities, every such successor Trustee so appointed shall\nexecute, acknowledge
        and deliver to the Issuer and to the retiring Trustee an instrument accepting
        such appointment, and thereupon the resignation or removal of the retiring
        Trustee shall become effective and such successor Trustee, without any\nfurther
        act, deed or conveyance, shall become vested with all the rights, powers,
        trusts and duties of the retiring Trustee; but, on the request of the Issuer
        or the successor Trustee, such retiring Trustee shall, upon payment of its
        charges,\nexecute and deliver an instrument transferring to such successor
        Trustee all the rights, powers and trusts of the retiring Trustee and shall
        duly assign, transfer and deliver to such successor Trustee all property and
        money held by such retiring\nTrustee hereunder. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        case of the appointment hereunder of a successor Trustee with respect to the
        Securities of one or more (but not\nall) series, the Obligors, the retiring
        Trustee and each successor Trustee with respect to the Securities of one or
        more series shall execute and deliver an indenture supplemental hereto wherein
        each successor Trustee shall accept such appointment\nand which (a)&nbsp;shall
        contain such provisions as shall be necessary or desirable to transfer and
        confirm to, and to vest in, each successor Trustee all the rights, powers,
        trusts and duties of the retiring Trustee with respect to the Securities\nof
        that or those series to which the appointment of such successor Trustee relates,
        (b)&nbsp;if the retiring Trustee is not retiring with respect to all Securities,
        shall contain such provisions as shall be deemed necessary or desirable to
        confirm\nthat all the rights, powers, trusts and duties of the retiring Trustee
        with respect to the Securities of that or those series as to which the retiring
        Trustee is not retiring shall continue to be vested in the retiring Trustee,
        and (c)&nbsp;shall\nadd to or change any of the provisions of this Indenture
        as shall be necessary to provide for or facilitate the administration of the
        trusts hereunder by more than one Trustee, it being understood that nothing
        herein or in such supplemental\nindenture shall constitute such Trustees <FONT
        STYLE=\"white-space:nowrap\">co-trustees</FONT> of the same trust and that
        each such Trustee shall be trustee of a trust or trusts hereunder separate
        and apart from any trust or trusts hereunder\nadministered by any other such
        Trustee; and upon the execution and delivery of such supplemental indenture
        the resignation or removal of the retiring Trustee shall become effective
        to the extent provided therein and each such successor Trustee,\nwithout any
        further act, deed or conveyance, shall become vested with all the rights,
        powers, trusts and duties of the retiring Trustee with respect to the Securities
        of that or those series to which the appointment of such successor Trustee\nrelates;
        but, on request of the Issuer or any successor Trustee, such retiring Trustee
        shall duly assign, transfer and deliver to such successor Trustee all property
        and money held by such retiring Trustee hereunder with respect to the Securities
        of\nthat or those series to which the appointment of such successor Trustee
        relates. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Upon request of any such successor
        Trustee, the Issuer\nshall execute any and all instruments for more fully
        and certainly vesting in and confirming to such successor Trustee all such
        rights, powers and trusts referred to in the first or second preceding paragraph,
        as the case may be. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">No successor Trustee shall accept
        its appointment unless at the time of such acceptance such successor Trustee
        shall be qualified and eligible\nunder this Article. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">45 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;712
        Merger, Conversion, Consolidation or Succession to Business. </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any corporation into which the Trustee may be
        merged or converted or with which it may be consolidated, or any corporation
        resulting from any\nmerger, conversion or consolidation to which the Trustee
        shall be a party, or any corporation succeeding to all or substantially all
        the corporate trust business of the Trustee, shall be the successor of the
        Trustee hereunder, provided such\ncorporation shall be otherwise qualified
        and eligible under this Article, without the execution or filing of any paper
        or any further act on the part of any of the parties hereto. In case any Securities
        shall have been authenticated, but not\ndelivered, by the Trustee then in
        office, any successor by merger, conversion or consolidation to such authenticating
        Trustee may adopt such authentication and deliver the Securities so authenticated
        with the same effect as if such successor Trustee\nhad itself authenticated
        such Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;713 Preferential
        Collection of Claims Against Issuer. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        and when the Trustee shall be or become a creditor of the Issuer (or any other
        obligor upon the Securities), the Trustee shall be subject to\nthe provisions
        of the Trust Indenture Act regarding the collection of claims against the
        Issuer (or any such other obligor). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;714
        Appointment of Authenticating Agent. </B></P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee may appoint an Authenticating Agent or Agents with respect to one
        or more series of Securities which shall be authorized to act on\nbehalf of
        the Trustee to authenticate Securities of such series issued upon original
        issue and upon exchange, registration of transfer or partial redemption thereof
        or pursuant to Section&nbsp;306, and Securities so authenticated shall be
        entitled\nto the benefits of this Indenture and shall be valid and obligatory
        for all purposes as if authenticated by the Trustee hereunder. Wherever reference
        is made in this Indenture to the authentication and delivery of Securities
        by the Trustee or the\nTrustee&#146;s certificate of authentication, such
        reference shall be deemed to include authentication and delivery on behalf
        of the Trustee by an Authenticating Agent and a certificate of authentication
        executed on behalf of the Trustee by an\nAuthenticating Agent. Each Authenticating
        Agent shall be acceptable to the Issuer and shall at all times be a corporation
        organized and doing business under the laws of the United States of America,
        any State thereof or the District of Columbia,\nauthorized under such laws
        to act as Authenticating Agent, having a combined capital and surplus of not
        less than $50,000,000 and subject to supervision or examination by Federal
        or State authority. If such Authenticating Agent publishes reports of\ncondition
        at least annually, pursuant to law or to the requirements of said supervising
        or examining authority, then for the purposes of this Section, the combined
        capital and surplus of such Authenticating Agent shall be deemed to be its
        combined\ncapital and surplus as set forth in its most recent report of condition
        so published. If at any time an Authenticating Agent shall cease to be eligible
        in accordance with the provisions of this Section, such Authenticating Agent
        shall resign\nimmediately in the manner and with the effect specified in this
        Section. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any corporation into which an
        Authenticating Agent may be merged\nor converted or with which it may be consolidated,
        or any corporation resulting from any merger, conversion or consolidation
        to which such Authenticating Agent shall be a party, or any corporation succeeding
        to the corporate agency or corporate\ntrust business of an Authenticating
        Agent, shall continue to be an Authenticating Agent, provided such corporation
        shall be otherwise eligible under this Section, without the execution or filing
        of any paper or any further act on the part of the\nTrustee or the Authenticating
        Agent. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">46 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">An Authenticating Agent may resign at any time
        by giving written notice thereof to the\nTrustee and to the Obligors. The
        Trustee may at any time terminate the agency of an Authenticating Agent by
        giving written notice thereof to such Authenticating Agent and to the Obligors.
        Upon receiving such a notice of resignation or upon such a\ntermination, or
        in case at any time such Authenticating Agent shall cease to be eligible in
        accordance with the provisions of this Section, the Trustee may appoint a
        successor Authenticating Agent which shall be acceptable to the Issuer and
        shall\ngive notice of such appointment in the manner provided in Section&nbsp;106
        to all Holders of Securities of the series with respect to which such Authenticating
        Agent will serve. Any successor Authenticating Agent upon acceptance of its
        appointment\nhereunder shall become vested with all the rights, powers and
        duties of its predecessor hereunder, with like effect as if originally named
        as an Authenticating Agent. No successor Authenticating Agent shall be appointed
        unless eligible under the\nprovisions of this Section. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer agrees to pay to each Authenticating Agent from time to time reasonable
        compensation for its\nservices under this Section. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        an appointment with respect to one or more series is made pursuant to this
        Section, the Securities of\nsuch series may have endorsed thereon, in addition
        to the Trustee&#146;s certificate of authentication, an alternative certificate
        of authentication in the following form: </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        is one of the Securities of the series designated therein referred to in the
        within-mentioned Indenture. </P>\n<P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><DIV
        ALIGN=\"right\">\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" WIDTH=\"40%\"
        BORDER=\"0\" STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman;
        font-size:10pt\">\n\n\n<TR>\n\n<TD WIDTH=\"100%\"></TD></TR>\n\n\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
        New Roman\">&nbsp;</P></TD></TR>\n<TR STYLE=\"page-break-inside:avoid ; font-family:Times
        New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">As Trustee</TD></TR>\n<TR
        STYLE=\"font-size:1pt\">\n<TD HEIGHT=\"16\"></TD></TR>\n<TR STYLE=\"page-break-inside:avoid
        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\"> <P STYLE=\"margin-top:0pt;
        margin-bottom:1pt; border-bottom:1px solid #000000; font-size:10pt; font-family:Times
