        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\" style=\"font-size:10pt;font-weight:bold\"><a
        href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV STYLE=\"width:8.5in\"
        align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times
        New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD
        WIDTH=\"3%\" VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the provisions
        relating to any guarantee of the debt securities. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">We may issue debt securities at less than the
        principal amount payable at maturity. We refer to these securities as &#147;original
        issue\ndiscount&#148; securities. If material or applicable, we will describe
        in the applicable prospectus supplement special U.S. federal income tax, accounting
        and other considerations applicable to original issue discount securities.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as may be described in any prospectus
        supplement, an indenture will not contain any provisions that would limit
        our ability to incur\nindebtedness or that would afford holders of the debt
        securities protection in the event of a highly leveraged or similar transaction
        involving us or in the event of a change of control. You should review carefully
        the applicable prospectus\nsupplement for information with respect to events
        of default and covenants applicable to the securities being offered. </P>
        <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\"><B>Denominations, Interest,\nRegistration and Transfer </B></P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Unless otherwise described in the applicable
        prospectus supplement, we will issue the debt securities of any\nseries that
        are registered securities in denominations that are even multiples of $1,000,
        other than global securities, which may be of any denomination. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Unless
        otherwise specified in the applicable prospectus supplement, we will pay the
        interest, principal and any premium at the corporate trust\noffice of the
        trustee, such other address as the trustee may designate from time to time
        by notice to the holders and the Company or the principal corporate trust
        office of any successor trustee. At our option, however, we may make payment
        of\ninterest by check mailed to the address of the person entitled to the
        payment as it appears in the applicable register or by wire transfer of funds
        to that person at an account maintained within the United States. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If we do not punctually pay or otherwise provide
        for interest on any interest payment date, the defaulted interest will be
        paid either: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">to the person
        in whose name the debt security is registered at the close of business on
        a special record date the\ntrustee will fix; or </P></TD></TR></TABLE> <P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">in any other
        lawful manner, all as the applicable indenture describes. </P></TD></TR></TABLE>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">You may have your debt securities divided into
        more debt securities of smaller denominations or combined into fewer debt
        securities of larger\ndenominations, as long as the total principal amount
        is not changed. We call this an &#147;exchange.&#148; You may exchange or
        transfer debt securities at the office of the applicable trustee. The trustee
        acts as our agent for registering debt\nsecurities in the names of holders
        and transferring debt securities. We may change this appointment to another
        entity or perform it ourselves. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The entity performing
        the role of maintaining the list of registered holders is called the &#147;registrar.&#148;
        It will also perform\ntransfers. You will not be required to pay a service
        charge to transfer or exchange debt securities, but you may be required to
        pay for any tax or other governmental charge associated with the exchange
        or transfer. The registrar will make the\ntransfer or exchange only if it
        is satisfied with your proof of ownership. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Guarantees
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Debt securities issued by Welltower Inc. may
        be fully and unconditionally guaranteed by Welltower OP LLC, and debt securities
        issued by\nWelltower OP LLC may be fully and unconditionally guaranteed by
        Welltower Inc. The applicable prospectus supplement relating to a series of
        debt securities will provide that those debt securities will have the benefit
        of a guarantee by Welltower\nInc. or Welltower OP LLC, as applicable. The
        guarantees will be general obligations of each guarantor. If a series of debt
        securities is so guaranteed, a supplemental indenture to the applicable base
        indenture will be executed by each guarantor.\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">11 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The obligations
        of each guarantor under its guarantee will be limited as necessary to\nprevent
        that guarantee from constituting a fraudulent transfer or conveyance under
        applicable law. A guarantor will be permitted to consolidate or merge with,
        or sell substantially all of its assets to another company, other than us
        or another\nguarantor, only if (i)&nbsp;the other company is an entity organized
        under the laws of one of the states of the United States or the District of
        Columbia or under United States federal law and agrees to be legally responsible
        for the guarantee; and\n(ii)&nbsp;immediately after the merger, sale of assets
        or other transaction, there would exist no event of default on the debt securities
        or any event that would be an event of default on the debt securities if the
        requirements regarding notice of\ndefault or continuing default for a specific
        period of time were disregarded. The terms of any guarantee and the conditions
        upon which a guarantor may be released from its obligations under that guarantee
        will be set forth in the applicable\nprospectus supplement. </P> <P STYLE=\"margin-top:18pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\"><B>Merger,
        Consolidation or Sale of Assets </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Under an indenture,
        we are or generally will be permitted to consolidate or merge with another
        company. In addition, we are or will be\npermitted to sell substantially all
        of our assets to another company, or to buy substantially all of the assets
        of another company. However, we may not take any of these actions unless the
        following conditions are met: </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">if we merge
        out of existence or sell our assets, the other company must be an entity organized
        under the laws of\none of the states of the United States or the District
        of Columbia or under United States federal law and must agree to be legally
        responsible for our debt securities; and </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">immediately
        after the merger, sale of assets or other transaction, we may not be in default
        on the debt\nsecurities. A default for this purpose would include any event
        that would be an event of default if the requirements regarding notice of
        default or continuing default for a specific period of time were disregarded.
        </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Certain Covenants </B></P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Existence</I>.\nExcept
        as permitted and described above under &#147;&#151;Merger, Consolidation or
        Sale of Assets,&#148; we will agree to do all things necessary to preserve
        and keep our existence, rights and franchises, provided that it is in our
        best interests\nfor the conduct of business. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Provisions
        of Financial Information</I>. To the extent permitted by law, we will agree
        to file all\nannual, quarterly and other reports and financial statements
        with the SEC and the trustee on or before the applicable SEC filing dates
        whether or not we remain required to do so under the Exchange Act. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Additional Covenants</I>. Any additional
        or different covenants or modifications to the foregoing covenants with respect
        to any series of\ndebt securities will be described in the applicable prospectus
        supplement. </P> <P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Events of Default and Related Matters </B></P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Events of Default</I>. The term &#147;event
        of default&#148; for any series of debt securities means any of the following:
        </P>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">We do not
        pay the principal or any premium on a debt security of that series at its
        maturity date.\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">We do not
        pay interest on a debt security of that series within 30 days after its due
        date.\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">We do not
        deposit any sinking fund payment for that series within 30 days after its
        due date.\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">We or the
        guarantor, if any, remains in breach of any other term of the applicable indenture
        (other than a term\nadded to the indenture solely for the benefit of another
        series) for 60 days after we or the guarantor receives a written notice of
        default from the trustee or holders of at least a majority in principal amount
        of debt securities of the affected\nseries specifying the breach and requiring
        it to be remedied. </P></TD></TR></TABLE>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">12 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n\n<TABLE STYLE=\"BORDER-COLLAPSE:COLLAPSE;
        font-family:Times New Roman; font-size:10pt\" BORDER=\"0\" CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style = \"page-break-inside:avoid\">\n<TD
        WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\" VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD
        WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD ALIGN=\"left\" VALIGN=\"top\">
        <P ALIGN=\"left\" STYLE=\" margin-top:0pt ; margin-bottom:0pt; font-family:Times
        New Roman; font-size:10pt\">We or the guarantor, if any, defaults under any
        of our or the guarantor&#146;s other indebtedness in specified\namounts after
        the expiration of any applicable grace period, which default results in the
        acceleration of the maturity of such indebtedness. Such default is not an
        event of default if the other indebtedness is discharged, or the acceleration
        is\nrescinded or annulled, within a period of 10 days after we or the guarantor
        receives a written notice from the trustee or holders of at least a majority
        in principal amount of debt securities of the affected series specifying the
        default and\nrequiring that we or the guarantor discharges the other indebtedness
        or cause the acceleration to be rescinded or annulled. </P></TD></TR></TABLE>
        <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">We, the guarantor,
        if any, or one of our &#147;significant subsidiaries,&#148; if any, files
        for bankruptcy or\ncertain other events in bankruptcy, insolvency or reorganization
        occur. The term &#147;significant subsidiary&#148; means each of our significant
        subsidiaries, if any, as defined in Regulation <FONT STYLE=\"white-space:nowrap\">S-X</FONT>
        under the\nSecurities Act of 1933, as amended (the &#147;Securities Act&#148;).
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">Any other
        event of default described in the applicable prospectus supplement occurs.
        </P></TD></TR></TABLE>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><I>Remedies If an Event of Default
        Occurs</I>. If an event of default has occurred and has not been cured, the
        trustee or the holders of at\nleast a majority in principal amount of the
        debt securities of the affected series may declare the entire principal amount
        of all the debt securities of that series to be due and immediately payable.
        If an event of default occurs because of certain\nevents in bankruptcy, insolvency
        or reorganization, the principal amount of all the debt securities of that
        series will be automatically accelerated, without any action by the trustee
        or any holder. At any time after the trustee or the holders have\naccelerated
        any series of debt securities, but before a judgment or decree for payment
        of the money due has been obtained, the holders of at least a majority in
        principal amount of the debt securities of the affected series may, under
        certain\ncircumstances, rescind and annul such acceleration. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        trustee will be required to give notice to the holders of debt securities
        within\n90 days after a default under the applicable indenture; provided,
        however, that in case of any default that may be cured, no such notice will
        be required to be given until at least 30 days after the occurrence thereof.
        The trustee may withhold\nnotice to the holders of any series of debt securities
        of any default with respect to that series, except a default in the payment
        of the principal of or interest on any debt security of that series, if specified
        responsible officers of the trustee\nin good faith determine that withholding
        the notice is in the interest of the holders. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Except
        in cases of default, where the trustee has\nsome special duties, the trustee
        is not required to take any action under the applicable indenture at the request
        of any holders unless the holders offer the trustee reasonable protection
        from expenses and liability. We refer to this as an\n&#147;indemnity.&#148;
        If reasonable indemnity satisfactory to it is provided, the holders of a majority
        in principal amount of the outstanding securities of the relevant series may
        direct the time, method and place of conducting any lawsuit or\nother formal
        legal action seeking any remedy available to the trustee. These majority holders
        may also direct the trustee in performing any other action under the applicable
        indenture, subject to certain limitations. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Before
        you bypass the trustee and bring your own lawsuit or other formal legal action
        or take other steps to enforce your rights or protect\nyour interests relating
        to the debt securities, the following must occur: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">you must
        give the trustee written notice that an event of default has occurred and
        remains uncured;\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the holders
        of at least a majority in principal amount of all outstanding securities of
        the relevant series must\nmake a written request that the trustee take action
        because of the default, and must offer reasonable indemnity to the trustee
        against the cost and other liabilities of taking that action; and </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">the trustee
        must have not taken action for 60 days after receipt of the notice and offer
        of indemnity.\n</P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">However, you
        are entitled at any time to bring a lawsuit for the payment of money due on
        your security after its due\ndate. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every year,
        we will furnish to the trustee a written statement by certain of our officers
        certifying that to their knowledge we are\nin compliance with the applicable
        indenture, or else specifying any default. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">13 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\"><B>Modification of an Indenture
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">There are three types of changes we can make
        to the indentures and the debt securities: </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Changes
        Requiring Your Approval</I>. First, there are changes we cannot make to your
        debt securities without your specific approval. The\nfollowing is a list of
        those types of changes: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">change the
        stated maturity of the principal or interest on a debt security; </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">reduce any
        amounts due on a debt security; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">reduce the
        amount of principal payable upon acceleration of the maturity of a debt security
        following a default;\n</P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">change the
        currency of payment on a debt security; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">impair your
        right to sue for payment; </P></TD></TR></TABLE>\n<P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">modify the
        subordination provisions, if any, in a manner that is adverse to you; </P></TD></TR></TABLE>\n<P
        STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">reduce the
        percentage of holders of debt securities whose consent is needed to modify
        or amend an indenture or to\nwaive compliance with certain provisions of an
        indenture; </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">reduce the
        percentage of holders of debt securities whose consent is needed to waive
        past defaults or change\ncertain provisions of the indenture relating to waivers
        of default; or </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">waive a default
        or event of default in the payment of principal, interest, or premium, if
        any, on the debt\nsecurities. </P></TD></TR></TABLE> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Changes
        Requiring a Majority Vote</I>. The second type of change is the kind that
        requires the vote of\nholders of debt securities owning a majority of the
        principal amount of the particular series affected. Most changes fall into
        this category, except for clarifying changes and certain other changes that
        would not materially adversely affect holders\nof the debt securities. We
        require the same vote to obtain a waiver of a past default; however, we cannot
        obtain a waiver of a payment default or any other aspect of an indenture or
        the debt securities listed in the first category described above\nunder &#147;&#151;Changes
        Requiring Your Approval&#148; unless we obtain your individual consent to
        the waiver. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><I>Changes Not Requiring\nApproval</I>.
        The third type of change does not require any vote by holders of debt securities.
        This type is limited to clarifications and certain other changes that would
        not materially adversely affect holders of the debt securities. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Further
        Details Concerning Voting</I>. Debt securities are not considered outstanding,
        and therefore the holders of debt securities are not\neligible to vote on
        matters relating thereto, if we have deposited or set aside in trust for such
        holders money for payment or redemption of debt securities or if we own or
        one of our affiliates owns the debt securities. The holders of debt\nsecurities
        are also not eligible to vote if the debt securities have been fully defeased
        as described below under &#147;&#151;Discharge, Defeasance and Covenant Defeasance&#151;Full
        Defeasance.&#148; </P>\n<P STYLE=\"margin-top:18pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\"><B>Discharge, Defeasance and Covenant Defeasance
        </B></P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><I>Discharge</I>. We may discharge some obligations
        to holders of any series of debt securities that either have become due and
        payable or will\nbecome due and payable within one year, or scheduled for
        redemption within one year, by irrevocably depositing with the trustee, in
        trust, funds in the applicable currency in an amount sufficient to pay the
        debt securities, including any premium and\ninterest. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">14 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n<h5 align=\"left\"
        style=\"font-size:10pt;font-weight:bold\"><a href=\"#toc\">Table of Contents</a></h5>\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><I>Full Defeasance</I>.
        We can, under particular circumstances, effect a full defeasance of\nyour
        series of debt securities. By this we mean we can legally release ourselves
        from any payment or other obligations on the debt securities if, among other
        things, we put in place the arrangements described below to repay you and
        deliver certain\ncertificates and opinions to the trustee: </P> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
        BORDER=\"0\" CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\">\n<TR style
        = \"page-break-inside:avoid\">\n<TD WIDTH=\"5%\">&nbsp;</TD>\n<TD WIDTH=\"3%\"
        VALIGN=\"top\" ALIGN=\"left\">&#149;</TD>\n<TD WIDTH=\"1%\" VALIGN=\"top\">&nbsp;</TD>\n<TD
        ALIGN=\"left\" VALIGN=\"top\"> <P ALIGN=\"left\" STYLE=\" margin-top:0pt ;
        margin-bottom:0pt; font-family:Times New Roman; font-size:10pt\">we must deposit
        in trust for your benefit and the benefit of all other direct holders of the
        debt securities a\ncombination of money or U.S. government or U.S. government
        agency notes or bonds or, in some circumstances, depositary receipts representing
        these notes or bonds, that will generate enough cash to make interest, principal
        and any other payments on\nthe debt securities on their various due dates;
        </P></TD></TR></TABLE> <P STYLE=\"font-size:6pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P>\n<TABLE
        STYLE=\"BORDER-COLLAPSE:COLLAPSE; font-family:Times New Roman; font-size:10pt\"
