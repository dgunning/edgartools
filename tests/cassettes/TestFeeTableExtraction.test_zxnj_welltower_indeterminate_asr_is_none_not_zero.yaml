        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>INDENTURE </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        Indenture, dated as of ________, 20__, between Welltower Inc., a corporation
        duly organized and existing under the laws of the State of\nDelaware (the
        &#147;<B>Issuer</B>&#148;), having its principal offices at 4500 Dorr Street,
        Toledo, Ohio 43615, Welltower OP LLC, a limited liability company duly organized
        and existing under the laws of the State of Delaware (the\n&#147;<B>Guarantor</B>&#148;
        and together with the Issuer, the &#147;<B>Obligors</B>&#148;), having its
        principal offices at 4500 Dorr Street, Toledo, Ohio 43615, and The Bank of
        New York Mellon Trust Company, N.A., a national banking association,\nas Trustee
        (the &#147;<B>Trustee</B>&#148;), having its principal offices at 311 S. Wacker
        Drive, Suite 6200B, Floor 62, Chicago, Illinois 60606. </P>\n<P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>RECITALS:
        </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer and\nthe Guarantor have duly authorized
        the execution and delivery of this Indenture to provide for the issuance from
        time to time of the Issuer&#146;s unsecured debentures, notes or other evidences
        of indebtedness (the &#147;<B>Securities</B>&#148;), to\nbe issued in one
        or more series as provided in this Indenture. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Guarantor has agreed to enter into this Indenture and to provide its\nGuarantee
        of the Issuer&#146;s obligation under the Securities; and </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer and the Guarantor have taken all actions necessary to make\nthis Indenture
        a valid and legally binding agreement of the Issuer and the Guarantor, in
        accordance with its terms. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>NOW, THEREFORE,\nTHIS
        INDENTURE WITNESSETH: </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">For and in consideration
        of the premises and the purchase of the Securities by the Holders thereof,
        it is\nmutually agreed, for the equal and proportionate benefit of all Holders
        of the Securities or of series thereof, as follows: </P> <P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        ONE\n</B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>DEFINITIONS AND OTHER GENERAL
        PROVISIONS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;101 Definitions.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">For all purposes of this Indenture, except as
        otherwise expressly provided or unless the context otherwise requires: </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(a) the terms defined in this Article have the
        meanings assigned to them in this Article and include the plural as well as
        the singular; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) all other terms used herein
        which are defined in the Trust Indenture Act, either directly or by reference
        therein, have the meanings\nassigned to them therein; </P>\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) all accounting
        terms not otherwise defined herein have the meanings assigned to them in\naccordance
        with generally accepted accounting principles, and, except as otherwise herein
        expressly provided, the term &#147;generally accepted accounting principles&#148;
        with respect to any computation required or permitted hereunder shall mean\nsuch
        accounting principles as are generally accepted at the Issue Date; </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(d) unless otherwise specifically set forth
        herein, all\ncalculations or determinations of a Person shall be performed
        or made on a consolidated basis in accordance with generally accepted accounting
        principles; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(e) unless the context otherwise
        requires, any reference to an &#147;<B>Article</B>&#148; or a &#147;<B>Section</B>&#148;
        refers to an Article\nor a Section, as the case may be, of this Indenture;
        and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) the words &#147;herein,&#148; &#147;hereof&#148;
        and &#147;hereunder&#148;\nand other words of similar import refer to this
        Indenture as a whole and not to any particular Article, Section or other subdivision.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Certain terms, used principally in Articles
        Fifteen and Sixteen, are defined in those Articles. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Act</B>,&#148;
        when used with respect to any Holder, has the meaning specified in Section&nbsp;104.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Affiliate</B>&#148; of any specified
        Person means any other Person directly or indirectly controlling or controlled
        by or under\ndirect or indirect common control with such specified Person.
        For the purposes of this definition, &#147;control&#148; when used with respect
        to any specified Person means the power to direct the management and policies
        of such Person, directly or\nindirectly, whether through the ownership of
        voting securities, by contract or otherwise; and the terms &#147;controlling&#148;
        and &#147;controlled&#148; have meanings correlative to the foregoing. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Authenticating Agent</B>&#148; means
        any Person authorized by the Trustee pursuant to Section&nbsp;714 to act on
        behalf of the\nTrustee to authenticate Securities of one or more series. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Bankruptcy Law</B>&#148; means Title
        11 of the United States Code, or\nany similar United States federal or state
        law relating to bankruptcy, insolvency, receivership, <FONT STYLE=\"white-space:nowrap\">winding-up,</FONT>
        liquidation, reorganization or relief of debtors or any amendment to, succession
        to or change in any\nsuch law. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Board</B>&#148;
        means either the board of directors of the Issuer or any duly authorized committee
        of that board. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Board Resolution</B>&#148;
        means a copy of a resolution certified by the Secretary or an Assistant Secretary
        of the Issuer to have\nbeen duly adopted by the Board and to be in full force
        and effect on the date of such certification, and delivered to the Trustee.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Business Day</B>,&#148; when used with
        respect to any Place of Payment, means each Monday, Tuesday, Wednesday, Thursday
        and Friday\nwhich is not a day on which banking institutions in that Place
        of Payment are authorized or obligated by law or executive order to close.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Commission</B>&#148; means the Securities
        and Exchange Commission, from time to time constituted, created under the
        Exchange Act, or,\nif at any time after the execution of this instrument such
        Commission is not existing and performing the duties now assigned to it under
        the Trust Indenture Act, then the body performing such duties at such time.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">2 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Corporate Trust Office</B>&#148; means
        the principal office of the Trustee at\nwhich, at any particular time its
        corporate trust business shall be administered, which is located at 311 S.&nbsp;Wacker
        Drive, Suite 6200B, Floor 62, Chicago, Illinois 60606, or such other address
        as the Trustee may designate from time to time by\nnotice to the Holders and
        the Issuer, or the principal corporate trust office of any successor Trustee.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Corporation</B>&#148;\nmeans a corporation,
        association, company, joint-stock company, real estate investment trust or
        business trust. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Covenant\nDefeasance</B>&#148;
        has the meaning specified in Section&nbsp;1403. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Custodian</B>&#148;
        means any receiver, trustee, assignee,\nliquidator or other similar official
        under any Bankruptcy Law. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Default</B>&#148;
        means any event that is, or after the giving of\nnotice or the passage of
        time or both would be, an Event of Default. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Defaulted
        Interest</B>&#148; has the meaning specified in\nSection&nbsp;307. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Defeasance</B>&#148; has the meaning
        specified in Section&nbsp;1402. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Depositary</B>&#148;
        means, with respect to Securities of any series issuable in whole or in part
        in the form of one or more Global\nSecurities, a clearing agency registered
        under the Exchange Act that is designated to act as Depositary for such Securities
        as contemplated by Section&nbsp;301. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>EDGAR</B>&#148;
        has the meaning specified in Section&nbsp;804. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Electronic
        Means</B>&#148; shall mean the following communications methods: <FONT STYLE=\"white-space:nowrap\">e-mail,</FONT>
        secure\nelectronic transmission containing applicable authorization codes,
        passwords and/or authentication keys issued by the Trustee, or another method
        or system specified by the Trustee as available for use in connection with
        its services hereunder. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Event
        of Default</B>&#148; has the meaning specified in Section&nbsp;601. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Exchange Act</B>&#148; means the Securities
        Exchange Act of 1934 and any statute successor thereto, in each case as amended
        from time\nto time. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Expiration Date</B>&#148;
        has the meaning specified in Section&nbsp;104. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>GAAP</B>&#148;
        means generally accepted accounting principles set forth in the opinions and
        pronouncements of the Accounting\nPrinciples Board of the American Institute
        of Certified Public Accountants and statements and pronouncements of the Financial
        Accounting Standards Board, or in such other statements by such other entity
        as have been approved by a significant segment\nof the accounting profession,
        which are in effect on the Issue Date. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">3 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Global
        Security</B>&#148; means a Security that evidences all or part of the\nSecurities
        of any series and bears the legend set forth in Section&nbsp;204 (or such
        legend as may be specified as contemplated by Section&nbsp;301 for such Securities).
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Guarantee</B>&#148; means any guarantee
        of the Guarantor of the obligations of the Issuer under any Securities. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Guarantor</B>&#148; means Welltower
        OP LLC, a Delaware limited liability company, and any and all permitted successors
        thereto. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Holder</B>&#148; means
        a Person in whose name a Security is registered in the Security Register.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Indenture</B>&#148; means this instrument
        as originally executed and as it may from time to time be supplemented or
        amended by one or\nmore indentures supplemental hereto entered into pursuant
        to the applicable provisions hereof, including, for all purposes of this instrument
        and any such supplemental indenture, the provisions of the Trust Indenture
        Act that are deemed to be a part\nof and govern this instrument and any such
        supplemental indenture, respectively. The term &#147;<B>Indenture</B>&#148;
        shall also include the terms of particular series of Securities established
        as contemplated by Section&nbsp;301. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Interest</B>,&#148;
        when used with respect to an Original Issue Discount Security which by its
        terms bears interest only after\nMaturity, means interest payable after Maturity.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Interest Payment Date</B>,&#148; when
        used with respect to any Security, means\nthe Stated Maturity of an installment
        of interest on such Security. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Investment
        Company Act</B>&#148; means the Investment\nCompany Act of 1940 and any statute
        successor thereto, in each case as amended from time to time. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Issue
        Date</B>&#148; means the\ndate of initial issuance of the Securities pursuant
        to this Indenture. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Issuer</B>&#148; means
        the Person named as the\n&#147;Issuer&#148; in the first paragraph of this
        instrument until a successor Person shall have become such pursuant to the
        applicable provisions of this Indenture, thereafter &#147;Issuer&#148; shall
        mean such Person. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Issuer Request</B>&#148;
        or &#147;<B>Issuer Order</B>&#148; means a written request or order signed
        in the name of the Issuer by its\nChairman of the Board, its Vice Chairman
        of the Board, its Chief Executive Officer, its Chief Operating Officer, its
        Chief Financial Officer, its President or a Vice President, and by its Treasurer,
        an Assistant Treasurer, its Secretary or an\nAssistant Secretary, and delivered
        to the Trustee. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Maturity</B>,&#148;
        when used with respect to any Security, means the date on\nwhich the principal
        of such Security or an installment of principal becomes due and payable as
        therein or herein provided, whether at the Stated Maturity or by declaration
        of acceleration, call for redemption or otherwise. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">4 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Notice
        of Default</B>&#148; means a written notice of the kind specified in\nSection&nbsp;601(d)
        or 501(e). </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">&#147;<B>Obligors</B>&#148;
        means, collectively, the Issuer and the Guarantor and\n&#147;<B>Obligor</B>&#148;
        means either of them. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Officers&#146;
        Certificate</B>&#148; means a certificate signed by (i)&nbsp;the\nChairman
        of the Board, a Vice Chairman of the Board, the Chief Executive Officer, the
        Chief Operating Officer, the President or a Vice President, and (ii)&nbsp;the
        Chief Financial Officer, the Treasurer, an Assistant Treasurer, the Controller,
        the\nSecretary or an Assistant Secretary, of the Issuer or the Guarantor,
        as applicable, and delivered to the Trustee. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Opinion
        of\nCounsel</B>&#148; means a written opinion of counsel, who may be counsel
        for the Issuer or the Guarantor. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Original
        Issue\nDiscount Security</B>&#148; means any Security which provides for an
        amount less than the principal amount thereof to be due and payable upon a
        declaration of acceleration of the Maturity thereof pursuant to Section&nbsp;602.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Outstanding</B>,&#148; when used with
        respect to Securities, means, as of the date of determination, all Securities
        theretofore\nauthenticated and delivered under this Indenture, except: </P>
        <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(i) Securities theretofore cancelled
        by the Trustee or delivered\nto the Trustee for cancellation; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(ii) Securities for whose payment or redemption money in the necessary
        amount has been\ntheretofore deposited with the Trustee or any Paying Agent
        (other than the Issuer) in trust or set aside and segregated in trust by the
        Issuer (if the Issuer shall act as its own Paying Agent) for the Holders of
        such Securities; provided that, if\nsuch Securities are to be redeemed, notice
        of such redemption has been duly given pursuant to this Indenture or provision
        therefor satisfactory to the Trustee has been made; </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(iii) Securities as to which Defeasance has been effected pursuant
        to Section&nbsp;1402; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(iv)
        Securities which have been paid pursuant to Section&nbsp;306 or in exchange
        for or in lieu of which other Securities have\nbeen authenticated and delivered
        pursuant to this Indenture, other than any such Securities in respect of which
        there shall have been presented to the Trustee proof satisfactory to it that
        such Securities are held by a bona fide purchaser in whose\nhands such Securities
        are valid obligations of the Issuer; </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:4%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(v)
        lost, stolen or destroyed Securities, when new Securities\nhave been duly
        and validly issued in substitution for them pursuant to Section&nbsp;306;
        and </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:4%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(vi) provided, however, that\nin
        determining whether the Holders of the requisite principal amount of the Outstanding
        Securities have given, made or taken any request, demand, authorization, direction,
        notice, consent, waiver or other action hereunder as of any date,\n(A)&nbsp;the
        principal amount of an Original Issue Discount Security </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">5 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        margin-left:4%; font-size:10pt; font-family:Times New Roman\">\nwhich shall
        be deemed to be Outstanding shall be the amount of the principal thereof which
        would be due and payable as of such date upon acceleration of the Maturity
        thereof to such date pursuant\nto Section&nbsp;602, (B) if, as of such date,
        the principal amount payable at the Stated Maturity of a Security is not determinable,
        the principal amount of such Security which shall be deemed to be Outstanding
        shall be the amount as specified or\ndetermined as contemplated by Section&nbsp;301,
        (C) the principal amount of a Security denominated in one or more foreign
        currencies or currency units which shall be deemed to be Outstanding shall
        be the U.S. dollar equivalent, determined as of such\ndate in the manner provided
        as contemplated by Section&nbsp;301, of the principal amount of such Security
        (or, in the case of a Security described in clause (A)&nbsp;or (B) above,
        of the amount determined as provided in such clause), and\n(D)&nbsp;Securities
        owned by the Issuer or any other obligor upon the Securities or any Affiliate
        of the Issuer or of such other obligor shall be disregarded and deemed not
        to be Outstanding, except that, in determining whether the Trustee shall be\nprotected
        in relying upon any such request, demand, authorization, direction, notice,
        consent, waiver or other action, only Securities which a Responsible Officer
        of the Trustee actually knows to be so owned shall be so disregarded. Securities
        so\nowned which have been pledged in good faith may be regarded as Outstanding
        if the pledgee establishes to the satisfaction of the Trustee the pledgee&#146;s
        right so to act with respect to such Securities and that the pledgee is not
        the Issuer or any\nother obligor upon the Securities or any Affiliate of the
        Issuer or of such other obligor. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Paying
        Agent</B>&#148; means any\nPerson authorized by the Issuer to pay the principal
        of or any premium or interest on any Securities on behalf of the Issuer. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Person</B>&#148; means any individual,
        corporation, partnership, limited liability company, joint venture, association,
        joint stock\ncompany, trust, unincorporated organization or government or
        any agency or political subdivision thereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Place
        of\nPayment</B>,&#148; when used with respect to the Securities of any series,
        means the place or places where the principal of and any premium and interest
        on the Securities of that series are payable as specified as contemplated
        by Section&nbsp;301.\n</P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Predecessor
        Security</B>&#148; of any particular Security means every previous Security
        evidencing all or a portion of the same\ndebt as that evidenced by such particular
        Security; and, for the purposes of this definition, any Security authenticated
        and delivered under Section&nbsp;306 in exchange for or in lieu of a mutilated,
        destroyed, lost or stolen Security shall be\ndeemed to evidence the same debt
        as the mutilated, destroyed, lost or stolen Security. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Redemption
        Date</B>,&#148; when used with\nrespect to any Security to be redeemed, means
        the date fixed for such redemption by or pursuant to this Indenture. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Redemption\nPrice</B>,&#148; when used
        with respect to any Security to be redeemed, means the price at which it is
        to be redeemed pursuant to this Indenture. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">6 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Regular
        Record Date</B>&#148; for the interest payable on any Interest Payment Date\non
        the Securities of any series means the date specified for that purpose as
        contemplated by Section&nbsp;301. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Responsible\nOfficer</B>&#148;
        means, when used with respect to the Trustee, any officer within the Corporate
        Trust Department of the Trustee, including any vice president, any assistant
        treasurer, any trust officer or assistant trust officer, or any other\nofficer
        of the Trustee customarily performing functions similar to those performed
        by any of the above designated officers or to whom any corporate trust matter
        is referred because of his or her knowledge of and familiarity with the particular\nsubject
        and who shall have direct responsibility for the administration of this Indenture.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Securities</B>&#148; has the meaning\nstated
        in the first recital of this Indenture and more particularly means any Securities
        authenticated and delivered under this Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Securities
        Act</B>&#148; means the Securities Act of 1933, as amended, and any statute
        successor thereto, in each case as amended\nfrom time to time. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Security
        Register</B>&#148; and &#147;<B>Security Registrar</B>&#148; have the respective
        meanings specified\nin Section&nbsp;305. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Significant
        Subsidiary</B>&#148; means any Subsidiary which is a &#147;significant subsidiary&#148;
        (as\ndefined in Article I, Rule <FONT STYLE=\"white-space:nowrap\">1-02</FONT>
        of Regulation <FONT STYLE=\"white-space:nowrap\">S-X,</FONT> promulgated under
        the Securities Act) of the Issuer. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Special
        Record Date</B>&#148; for the payment of any Defaulted Interest means a date
        fixed by the Trustee pursuant to\nSection&nbsp;307. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Stated
        Maturity</B>,&#148; when used with respect to any Security or any installment
        of principal thereof or\ninterest thereon, means the date specified in such
        Security as the fixed date on which the principal of such Security or such
        installment of principal or interest is due and payable. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Subsidiary</B>&#148;
        means a corporation more than 50% of the outstanding voting stock of which
        is owned, directly or indirectly, by\nthe Issuer or by one or more other Subsidiaries,
        or by the Issuer and one or more other Subsidiaries. For the purposes of this
        definition, &#147;voting stock&#148; means stock which ordinarily has voting
        power for the election of directors, whether\nat all times or only so long
        as no senior class of stock has such voting power by reason of any contingency.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Trustee</B>&#148;\nmeans the Person
        named as the &#147;<B>Trustee</B>&#148; in the first paragraph of this instrument
        until a successor Trustee shall have become such pursuant to the applicable
        provisions of this Indenture, and thereafter &#147;<B>Trustee</B>&#148;\nshall
        mean or include each Person who is then a Trustee hereunder, and if at any
        time there is more than one such Person, &#147;<B>Trustee</B>&#148; as used
        with respect to the Securities of any series shall mean the Trustee with respect
        to\nSecurities of that series. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>Trust
        Indenture Act</B>&#148; means the Trust Indenture Act of 1939 as in force
        at the date this\ninstrument is executed; provided, however, that in the event
        the Trust Indenture Act of 1939 is amended after such date, &#147;<B>Trust
        Indenture Act</B>&#148; means, to the extent required by any such amendment,
        the Trust Indenture Act of 1939 as\nso amended. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">7 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">&#147;<B>U.S.
        Government Obligation</B>&#148; has the meaning specified in\nSection&nbsp;1404.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">&#147;<B>Vice President</B>,&#148; when used
        with respect to the Issuer, the Guarantor or the Trustee, means any vice\npresident,
        whether or not designated by a number or a word or words added before or after
        the title &#147;vice president.&#148; </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;102
        Compliance Certificates and Opinions. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        any application or request by the Issuer to the Trustee to take any action
        under any provision of this Indenture, the Issuer shall\nfurnish to the Trustee
        an Officers&#146; Certificate and an Opinion of Counsel. Each such certificate
        or opinion shall be given in the form of an Officers&#146; Certificate, if
        to be given by an officer of the Issuer, or an Opinion of Counsel, if to\nbe
        given by counsel, and shall comply with the requirements of the Trust Indenture
        Act and any other requirements set forth in this Indenture. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every
        certificate or opinion with respect to compliance with a condition or covenant
        provided for in this Indenture (except for certificates\nprovided for in Section&nbsp;1104)
        shall include: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(1) a statement
        that each individual signing such certificate or opinion\nhas read such covenant
        or condition and the definitions herein relating thereto; </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times
        New Roman\">(2) a brief statement as to the nature\nand scope of the examination
        or investigation upon which the statements or opinions contained in such certificate
        or opinion are based; </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(3)
        a statement that, in the opinion of each such individual, he or she has made
        such examination or investigation as is\nnecessary to enable him or her to
        express an informed opinion as to whether or not such covenant or condition
        has been complied with; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        margin-left:9%; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(4)
        a statement as to whether, in the opinion of each such individual, such condition
        or covenant has been complied with. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;103
        Form of Documents Delivered to Trustee. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        any case where several matters are required to be certified by, or covered
        by an opinion of, any specified Person, it is not necessary that\nall such
        matters be certified by, or covered by the opinion of, only one such Person,
        or that they be so certified or covered by only one document, but one such
        Person may certify or give an opinion with respect to some matters and one
        or more other\nsuch Persons as to other matters, and any such Person may certify
        or give an opinion as to such matters in one or several documents. </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">8 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any certificate or opinion of an officer of
        the Issuer may be based, insofar as it relates\nto legal matters, upon a certificate
        or opinion of, or representations by, counsel, unless such officer knows,
        or in the exercise of reasonable care should know, that the certificate or
        opinion or representations with respect to the matters upon\nwhich his or
        her certificate or opinion is based are erroneous. Any such certificate or
        opinion of counsel may be based, insofar as it relates to factual matters,
        upon a certificate or opinion of, or representations by, an officer or officers
        of the\nIssuer stating that the information with respect to such factual matters
        is in the possession of the Issuer, unless such counsel knows, or in the exercise
        of reasonable care should know, that the certificate or opinion or representations
        with\nrespect to such matters are erroneous. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Where
        any Person is required to make, give or execute two or more applications,
        requests,\nconsents, certificates, statements, opinions or other instruments
        under this Indenture, they may, but need not, be consolidated and form one
        instrument. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;104 Acts of
        Holders; Record Dates. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any request,
        demand, authorization, direction, notice, consent, waiver or other action
        provided or permitted by this Indenture to be given,\nmade or taken by Holders
        may be embodied in and evidenced by one or more instruments of substantially
        similar tenor signed by such Holders in person or by agent duly appointed
        in writing; and, except as herein otherwise expressly provided, such\naction
        shall become effective when such instrument or instruments are delivered to
        the Trustee and, where it is hereby expressly required, to the Obligors. Such
        instrument or instruments (and the action embodied therein and evidenced thereby)
        are\nherein sometimes referred to as the &#147;<B>Act</B>&#148; of the Holders
        signing such instrument or instruments. Proof of execution of any such instrument
        or of a writing appointing any such agent shall be sufficient for any purpose
        of this\nIndenture and (subject to Section&nbsp;701) conclusive in favor of
        the Trustee and the Obligors, if made in the manner provided in this Section.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The fact and date of the execution by any Person
        of any such instrument or writing may be proved by the affidavit of a witness
        of such\nexecution or by a certificate of a notary public or other officer
        authorized by law to take acknowledgments of deeds, certifying that the individual
        signing such instrument or writing acknowledged to him or her the execution
        thereof. Where such\nexecution is by a signer acting in a capacity other than
        his or her individual capacity, such certificate or affidavit shall also constitute
        sufficient proof of his or her authority. The fact and date of the execution
        of any such instrument or\nwriting, or the authority of the Person executing
        the same, may also be proved in any other manner which the Trustee deems sufficient.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The ownership of Securities shall be proved
        by the Security Register. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any request,
        demand, authorization, direction, notice, consent, waiver or other Act of
        the Holder of any Security shall bind every future\nHolder of the same Security
        and the Holder of every Security issued upon the registration of transfer
        thereof or in exchange therefor or in lieu thereof in respect of anything
        done, omitted or suffered to be done by the Trustee or the Issuer in\nreliance
        thereon, whether or not notation of such action is made upon such Security.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer may set any day as a record date
        for the\npurpose of determining the Holders of Outstanding Securities of any
        series entitled to give, make or take any request, demand, authorization,
        direction, notice, consent, waiver or other action provided or permitted by
        this Indenture to be given,\nmade or taken by Holders of Securities of such
        series, provided that the </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">9 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nIssuer may not set a record
        date for, and the provisions of this paragraph shall not apply with respect
        to, the giving or making of (i)&nbsp;any Notice of Default, (ii)&nbsp;any
        declaration of\nacceleration referred to in Section&nbsp;602, (iii) any request
        to institute proceedings referred to in Section&nbsp;607(b) or (iv)&nbsp;any
        direction referred to in Section&nbsp;612. If any record date is set pursuant
        to this paragraph, the Holders\nof Outstanding Securities of the relevant
        series on such record date, and no other Holders, shall be entitled to take
        the relevant action, whether or not such Holders remain Holders after such
        record date; provided that no such action shall be\neffective hereunder unless
        taken on or prior to the applicable Expiration Date by Holders of the requisite
        principal amount of Outstanding Securities of such series on such record date.
        Nothing in this paragraph shall be construed to prevent the\nIssuer from setting
        a new record date for any action for which a record date has previously been
        set pursuant to this paragraph (whereupon the record date previously set shall
        automatically and with no action by any Person be cancelled and of no\neffect),
        and nothing in this paragraph shall be construed to render ineffective any
        action taken by Holders of the requisite principal amount of Outstanding Securities
        of the relevant series on the date such action is taken. Promptly after any\nrecord
        date is set pursuant to this paragraph, the Issuer, at its own expense, shall
        cause notice of such record date, the proposed action by Holders and the applicable
        Expiration Date to be given to the Trustee in writing and to each Holder of\nSecurities
        of the relevant series in the manner set forth in Section&nbsp;106. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">With respect to any record date set pursuant
        to this\nSection, the Issuer may designate any day as the &#147;<B>Expiration
        Date</B>&#148; and from time to time may change the Expiration Date to any
        earlier or later day; provided that no such change shall be effective unless
        notice of the proposed new\nExpiration Date is given to the Trustee in writing,
        and to each Holder of Securities of the relevant series in the manner set
        forth in Section&nbsp;106, on or prior to the existing Expiration Date. If
        an Expiration Date is not designated with\nrespect to any record date set
        pursuant to this Section, the Issuer shall be deemed to have initially designated
        the 180th day after such record date as the Expiration Date with respect thereto,
        subject to its right to change the Expiration Date as\nprovided in this paragraph.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Without limiting the foregoing, a Holder entitled
        hereunder to take any action hereunder with regard to any\nparticular Security
        may do so with regard to all or any part of the principal amount of such Security
        or by one or more duly appointed agents each of which may do so pursuant to
        such appointment with regard to all or any part of such principal\namount.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;105 Notices, Etc., to Trustee
        and Issuer. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Any request, demand, authorization,
        direction, notice, consent, waiver or Act of Holders or other document provided
        or permitted by this\nIndenture to be made upon, given or furnished to, or
        filed with: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(1) the Trustee
        by any Holder or by the Issuer shall be\nsufficient for every purpose hereunder
        if made, given, furnished or filed in writing to or with the Trustee at its
        Corporate Trust Office, Attention: Corporate Trust Administration, or </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; margin-left:9%; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(2) the Issuer by the Trustee
        or by any Holder shall be sufficient for every purpose hereunder (unless otherwise
        herein\nexpressly provided) if in writing and mailed, first-class postage
        prepaid, to the Issuer addressed to it at the address of its principal office
        specified in the first paragraph of this instrument or at any other address
        previously furnished in\nwriting to the Trustee by the Issuer. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">10 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Trustee
        shall have the right to accept and act upon instructions, including funds\ntransfer
        instructions (&#147;<B>Instructions</B>&#148;) given pursuant to this Indenture
        and delivered using Electronic Means; provided, however, that the Issuer and/or
        the Guarantor, as applicable, shall provide to the Trustee an incumbency\ncertificate
        listing officers with the authority to provide such Instructions (&#147;<B>Authorized
        Officers</B>&#148;) and containing specimen signatures of such Authorized
        Officers, which incumbency certificate shall be amended by the Issuer and/or\nthe
        Guarantor, as applicable, whenever a person is to be added or deleted from
        the listing. If the Issuer and/or the Guarantor, as applicable, elects to
        give the Trustee Instructions using Electronic Means and the Trustee in its
        discretion elects to\nact upon such Instructions, the Trustee&#146;s understanding
        of such Instructions shall be deemed controlling. The Issuer and the Guarantor
        understand and agree that the Trustee cannot determine the identity of the
        actual sender of such Instructions\nand that the Trustee shall conclusively
        presume that directions that purport to have been sent by an Authorized Officer
        listed on the incumbency certificate provided to the Trustee have been sent
        by such Authorized Officer. The Issuer and the\nGuarantor shall be responsible
        for ensuring that only Authorized Officers transmit such Instructions to the
        Trustee and that the Issuer, the Guarantor and all Authorized Officers are
        solely responsible to safeguard the use and confidentiality of\napplicable
        user and authorization codes, passwords and/or authentication keys upon receipt
        by the Issuer and/or the Guarantor, as applicable. The Trustee shall not be
        liable for any losses, costs or expenses arising directly or indirectly from
        the\nTrustee&#146;s reliance upon and compliance with such Instructions notwithstanding
        such directions conflict or are inconsistent with a subsequent written instruction.
        The Issuer and the Guarantor agree: (i)&nbsp;to assume all risks arising out
        of\nthe use of Electronic Means to submit Instructions to the Trustee, including
        without limitation the risk of the Trustee acting on unauthorized Instructions,
        and the risk of interception and misuse by third parties; (ii)&nbsp;that it
        is fully\ninformed of the protections and risks associated with the various
        methods of transmitting Instructions to the Trustee and that there may be
        more secure methods of transmitting Instructions than the method(s) selected
        by the Issuer and/or the\nGuarantor, as applicable; (iii)&nbsp;that the security
        procedures (if any) to be followed in connection with its transmission of
        Instructions provide to it a commercially reasonable degree of protection
        in light of its particular needs and\ncircumstances; and (iv)&nbsp;to notify
        the Trustee immediately upon learning of any compromise or unauthorized use
        of the security procedures. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;106
        Notice to Holders; Waiver. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Where this Indenture
        provides for notice to Holders of any event, such notice shall be sufficiently
        given (unless otherwise herein expressly\nprovided) if in writing and mailed,
        first-class postage prepaid, to each Holder affected by such event, at his
        or her address as it appears in the Security Register, not later than the
        latest date (if any), and not earlier than the earliest date (if\nany), prescribed
        for the giving of such notice. In any case where notice to Holders is given
        by mail, neither the failure to mail such notice, nor any defect in any notice
        so mailed, to any particular Holder shall affect the sufficiency of such\nnotice
        with respect to other Holders. Where this Indenture provides for notice in
        any manner, such notice may be waived in writing by the Person entitled to
        receive such notice, either before or after the event, and such waiver shall
        be the\nequivalent of such notice. Waivers of notice by Holders shall be filed
        with the Trustee, but such filing shall not be a condition precedent to the
        validity of any action taken in reliance upon such waiver. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">11 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In case by reason
        of the suspension of regular mail service or by reason of any other cause\nit
        shall be impracticable to give such notice by mail, then such notification
        as shall be made with the approval of the Trustee shall constitute a sufficient
        notification for every purpose hereunder. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;107
        Conflict with Trust Indenture Act. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If any provision
        hereof limits, qualifies or conflicts with a provision of the Trust Indenture
        Act which is required thereunder to be a part\nof and govern this Indenture,
        the latter provision shall control. If any provision of this Indenture modifies
        or excludes any provision of the Trust Indenture Act which may be so modified
        or excluded, the latter provision shall be deemed to apply to\nthis Indenture
        as so modified or to be excluded, as the case may be. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;108
        Effect of Headings and Table of Contents.\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Article and Section headings herein and the Table of Contents are for convenience
        only and shall not affect the construction\nhereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;109
        Successors and Assigns. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">All covenants
        and agreements in this Indenture by the Issuer shall bind its successors and
        assigns, whether so expressed or not. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;110
        Severability Clause. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">In case any
        provision in this Indenture or in the Securities shall be invalid, illegal
        or unenforceable, the validity, legality and\nenforceability of the remaining
        provisions shall not in any way be affected or impaired thereby. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;111
        Benefits of\nIndenture. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Nothing in this
        Indenture or in the Securities, express or implied, shall give to any Person,
        other than the parties\nhereto and their successors hereunder, the holders
        of Senior Debt and the Holders, any benefit or any legal or equitable right,
        remedy or claim under this Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;112
        Governing Law and Submission to Jurisdiction. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">This
        Indenture and the Securities shall be governed by and construed in accordance
        with the law of the State of New York. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Each Obligor
        hereby irrevocably submits to the jurisdiction of any New York State court
        sitting in the Borough of Manhattan in the City of New\nYork or any federal
        court sitting in the Southern District in the Borough of Manhattan in the
        City of New York in respect of any suit, action or proceeding arising out
        of or relating to this Indenture and the Securities, and irrevocably accepts
        for\nitself and in respect of its property, generally and unconditionally,
        jurisdiction of the aforesaid courts. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">12 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;113
        Legal Holidays. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In any case where any Interest
        Payment Date, Redemption Date or Stated Maturity of any Security shall not
        be a Business Day at any Place of\nPayment, then (notwithstanding any other
        provision of this Indenture or of the Securities (other than a provision of
        any Security which specifically states that such provision shall apply in
        lieu of this Section)) payment of interest or principal\n(and premium, if
        any) need not be made at such Place of Payment on such date, but may be made
        on the next succeeding Business Day at such Place of Payment with the same
        force and effect as if made on the Interest Payment Date or Redemption Date,
        or\nat the Stated Maturity. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;114
        No Personal Liability. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">No recourse
        under or upon any obligation, covenant or agreement of this Indenture or any
        indenture supplemental hereto or of any Security, or\nfor any claim based
        thereon or otherwise in respect thereof, shall be had against any incorporator,
        stockholder, officer or director, as such, past, present or future, of the
        applicable Obligor, or of any successor Person, either directly or through\nsuch
        Obligor or any successor Person, whether by virtue of any constitution, statute
        or rule of law, or by the enforcement of any assessment or penalty or otherwise;
        it being expressly understood that this Indenture and the obligations issued\nhereunder
        are solely corporate or limited liability company obligations, and that no
        such personal liability whatever shall attach to, or is or shall be incurred
        by the incorporators, stockholders, officers or directors, as such, of such
        Obligoror\nof any successor Person, or any of them, because of the creation
        of the indebtedness hereby authorized, or under or by reason of the obligations,
        covenants or agreements contained in this Indenture or in any of the Securities
        or implied therefrom;\nand that any and all such personal liability of every
        name and nature, either at common law or in equity or by constitution or statute,
        of, and any and all such rights and claims against, every such incorporator,
        stockholder, officer or director, as\nsuch, because of the creation of the
        indebtedness hereby authorized, or under or by reason of the obligations,
        covenants or agreements contained in this Indenture or in any of the Securities
        or implied therefrom are hereby expressly waived and\nreleased as a condition
        of, and as a consideration for, the execution of this Indenture and the issue
        of such Securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;115 Waiver of
        Jury Trial. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">EACH OF THE OBLIGORS, THE TRUSTEE
        AND (BY THE ACCEPTANCE OF THE SECURITIES) EACH OF THE HOLDERS HEREBY IRREVOCABLY
        WAIVES, TO THE FULLEST\nEXTENT PERMITTED BY APPLICABLE LAW, ANY AND ALL RIGHT
        TO TRIAL BY JURY IN ANY LEGAL PROCEEDING ARISING OUT OF OR RELATING TO THIS
        INDENTURE, THE NOTES, ANY GUARANTEE OR THE TRANSACTION CONTEMPLATED HEREBY.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">13 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;116 Force Majeure. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">In no event shall the Trustee be responsible
        or liable for any failure or delay in the performance of its obligations hereunder
        arising out of\nor caused by, directly or indirectly, forces beyond its control,
        including, without limitation, strikes, work stoppages, accidents, acts of
        war or terrorism, civil or military disturbances, pandemics or epidemics,
        nuclear or natural catastrophes or\nacts of God, and interruptions, loss or
        malfunctions of utilities, communications or computer (software and hardware)
        services; it being understood that the Trustee shall use reasonable efforts
        which are consistent with accepted practices in the\nbanking industry to resume
        performance as soon as practicable under the circumstances. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;117
        FATCA. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">In order to comply with the
        set of rules commonly known as &#147;FATCA&#148; and other similar applicable
        tax laws, rules and regulations\n(inclusive of directives, guidelines and
        interpretations promulgated by competent authorities) in effect from time
        to time (&#147;<B>Applicable Law</B>&#148;) to which a foreign financial institution,
        the Issuer, Trustee, Paying Agent, Holder or\nother institution is subject
        related to the Indenture, the Issuer agrees (i)&nbsp;to provide to the Trustee
        information about the transaction that is within the possession of the Issuer
        and reasonably requested by the Trustee, to assist the Trustee\nin determining
        whether it has tax related obligations under Applicable Law, and (ii)&nbsp;that
        Trustee shall be entitled to make any withholding or deduction from payments
        under the Indenture to the extent necessary to comply with Applicable Law.\nThe
        terms of this section shall survive the termination of this Indenture. </P>
        <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE TWO </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>SECURITY
        FORMS </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;201 Forms Generally.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Securities of each series shall be in substantially
        the form set forth in this Article, or in such other form as shall be established
        by\nor pursuant to a Board Resolution or in one or more indentures supplemental
        hereto, in each case with such appropriate insertions, omissions, substitutions
        and other variations as are required or permitted by this Indenture, and may
        have such\nletters, numbers or other marks of identification and such legends
        or endorsements placed thereon as may be required to comply with the rules
        of any securities exchange or Depositary therefor or as may, consistently
        herewith, be determined by the\nofficers executing such Securities, as evidenced
        by their execution thereof. If the form of Securities of any series is established
        by action taken pursuant to a Board Resolution, a copy of an appropriate record
        of such action shall be certified by\nthe Secretary or an Assistant Secretary
        of the Issuer and delivered to the Trustee at or prior to the delivery of
        the Issuer Order contemplated by Section&nbsp;303 for the authentication and
        delivery of such Securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The definitive
