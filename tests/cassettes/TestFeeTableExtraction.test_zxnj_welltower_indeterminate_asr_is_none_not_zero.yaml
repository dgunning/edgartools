        connection with those liabilities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">If indicated
        in the applicable prospectus supplement, we may also offer and sell securities
        through one or more firms that will remarket the\nsecurities. These firms
        may act as principals for their own account or as our agents. These firms
        may be deemed to be underwriters in connection with the securities being remarketed.
