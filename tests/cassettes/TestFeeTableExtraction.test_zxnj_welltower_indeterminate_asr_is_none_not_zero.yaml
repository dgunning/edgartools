        style=\"margin-top: 0pt; margin-bottom: 0pt; font-size: 10pt; font-family:
        &quot;Times New Roman&quot;; text-align: left; line-height: normal;\">Each
        depositary share will be issued under a deposit agreement, will represent
        an interest in a fractional share of preferred stock and will be evidenced
