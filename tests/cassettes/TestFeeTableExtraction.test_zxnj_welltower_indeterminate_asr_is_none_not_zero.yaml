        ; font-family:Times New Roman; font-size:10pt\">\n<TD VALIGN=\"top\">Authorized
        Signatory</TD></TR>\n</TABLE></DIV>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">47 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        EIGHT </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>HOLDERS&#146; LISTS AND
        REPORTS BY TRUSTEE AND ISSUER </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;801
        Issuer to Furnish Trustee Names and Addresses of Holders. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer will furnish or cause to be furnished to the Trustee: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        semi-annually, not later than January&nbsp;15 and July&nbsp;15 in each year,
        a list, in such form as the Trustee may reasonably require, of\nthe names
        and addresses of the Holders of Securities of each series as of the preceding
        December&nbsp;31 or June&nbsp;30, as the case may be, and </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(b)
        at such other times as the Trustee may request in writing, within 30 days
        after the receipt by the Issuer of any such request, a list of\nsimilar form
        and content as of a date not more than 15 days prior to the time such list
        is furnished; excluding from any such list names and addresses received by
        the Trustee in its capacity as Security Registrar. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;802
        Preservation of Information; Communications to Holders. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Trustee shall preserve, in as current a form as is reasonably practicable,
        the names and addresses of Holders contained in the most recent\nlist furnished
        to the Trustee as provided in Section&nbsp;801 and the names and addresses
        of Holders received by the Trustee in its capacity as Security Registrar.
        The Trustee may destroy any list furnished to it as provided in Section&nbsp;801
        upon\nreceipt of a new list so furnished. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        rights of Holders to communicate with other Holders with respect to their
        rights under this\nIndenture or under the Securities, and the corresponding
        rights and privileges of the Trustee, shall be as provided by the Trust Indenture
        Act. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Every Holder of Securities,
        by receiving and holding the same, agrees with the Issuer and the Trustee
        that neither the Issuer nor the Trustee\nnor any agent of either of them shall
        be held accountable by reason of any disclosure of information as to names
        and addresses of Holders made pursuant to the Trust Indenture Act. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;803 Reports by Trustee. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Trustee shall transmit to Holders such reports
        concerning the Trustee and its actions under this Indenture as may be required
        pursuant to\nthe Trust Indenture Act at the times and in the manner provided
        pursuant thereto. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">A copy of each such report shall,
        at the time of such\ntransmission to Holders, be filed by the Trustee with
        each stock exchange upon which any Securities are listed, with the Commission
        and with the Issuer. The Issuer will notify the Trustee when any Securities
        are listed on any stock exchange and of\nany delisting thereof. </P>\n <p
        STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">48
        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;804 Reports by Issuer. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\">The Issuer shall </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) file with
        the Trustee,\nwithin 15 days after the Issuer is required to file the same
        with the Commission, copies of the annual reports and of the information,
        documents, and other reports (or copies of such portions of any of the foregoing
        as the Commission may from time\nto time by rules and regulations prescribe)
        which the Issuer may be required to file with the Commission pursuant to Section&nbsp;13
        or Section&nbsp;15(d) of the Exchange Act (it being understood that any information,
        documents and other reports\nfiled or furnished on the Electronic Data Gathering,
        Analysis and Retrieval system (&#147;<B>EDGAR</B>&#148;) or such other system
        of the Commission or the website of the Issuer will be deemed to be furnished
        to such Holders of Securities once such\ninformation, documents and other
        reports are so filed on EDGAR or the Commission&#146;s website or the website
        of the Issuer); or, if the Issuer is not required to file information, documents
        or reports pursuant to either of such Sections, then it\nwill file with the
        Trustee and the Commission, in accordance with rules and regulations prescribed
        from time to time by the Commission, such of the supplementary and periodic
        information, documents and reports which may be required pursuant to\nSection&nbsp;13
        of the Exchange Act in respect of a security listed and registered on a national
        securities exchange as may be prescribed from time to time in such rules and
        regulations; and </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) file with the Trustee and
        the Commission, in accordance with rules and regulations prescribed from time
        to time by the Commission, such\nadditional information, documents and reports
        with respect to compliance by the Issuer and the Issuer with the conditions
        and covenants of this Indenture as may be required from time to time by such
        rules and regulations (it being understood that if\nthe Issuer is not required
        to file with the Commission pursuant to Section&nbsp;13 or 15(d) of the Exchange
        Act, the Issuer shall not be required to file such reports with the Commission
        or the Trustee). </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Delivery of such reports, information
        and documents to the Trustee is for informational purposes only and the Trustee&#146;s
        receipt of such\nshall not constitute actual or constructive notice or knowledge
        of any information contained therein or determinable from information contained
        therein, including the Issuer&#146;s compliance with any of its covenants
        hereunder (as to which the\nTrustee is entitled to rely exclusively on Officers&#146;
        Certificates). </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE NINE </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>CONSOLIDATION, MERGER, CONVEYANCE, TRANSFER
        OR LEASE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;901 Issuer May
        Consolidate, Etc., Only on Certain Terms. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer shall not consolidate with or merge with or into any other Person,
        or sell, transfer, lease, convey, or otherwise dispose of all or\nsubstantially
        all of its properties or assets to any Person (including pursuant to a statutory
        arrangement), whether in a single transaction or series of related transactions,
        unless (i)&nbsp;the Person formed by such consolidation or into which the\nIssuer
        is merged or the Person that leases or acquires, by sale, transfer, conveyance
        or otherwise, all or substantially all of the property or assets of the Issuer
        expressly assumes, by an indenture supplemental hereto, executed and delivered
        to\nthe Trustee, in form satisfactory to the Trustee, all the obligations
        of the Issuer under the Securities, this Indenture and any supplement or amendment
        to this Indenture then in effect with respect to any Securities; (ii)&nbsp;immediately
        after\ngiving effect to such transaction or series of transactions, no Event
        of Default, and no event </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">49 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nwhich, after notice or lapse
        of time or both, would become an Event of Default, shall have happened and
        be continuing; and (iii)&nbsp;the Person formed by such consolidation, the
        Person into\nwhich the Issuer is merged or the Person that leases or acquires,
        by sale, transfer, conveyance or otherwise, all or substantially all of the
        property or assets of the Issuer, shall be a corporation, partnership, limited
        liability Issuer or trust\nand shall be organized and validly existing under
        the laws of the United States of America, any state thereof or the District
        of Columbia. The Issuer shall deliver to the Trustee prior to the consummation
        of the proposed transaction an\nOfficers&#146; Certificate and an Opinion
        of Counsel, each stating that such proposed transaction and, if a supplemental
        indenture is required in connection with such transaction, such supplemental
        indenture comply with this Article and that all\nconditions precedent herein
        provided for relating to such transaction have been complied with. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;902 Guarantor May\nConsolidate,
        Etc., Only on Certain Terms. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Guarantor
        shall not consolidate with or merge with or into any other Person, or sell,\ntransfer,
        lease, convey, or otherwise dispose of all or substantially all of its properties
        or assets to any Person (including pursuant to a statutory arrangement), whether
        in a single transaction or series of related transactions, unless\n(i)&nbsp;the
        Person formed by such consolidation or into which the Guarantor is merged
        or the Person that leases or acquires, by sale, transfer, conveyance or otherwise,
        all or substantially all of the property or assets of the Guarantor expressly\nassumes,
        by an indenture supplemental hereto, executed and delivered to the Trustee,
        in form satisfactory to the Trustee, all the obligations of the Guarantor
        under the Securities, this Indenture and any supplement or amendment to this
        Indenture\nthen in effect with respect to any Securities; (ii)&nbsp;immediately
        after giving effect to such transaction or series of transactions, no Event
        of Default, and no event which, after notice or lapse of time or both, would
        become an Event of Default,\nshall have happened and be continuing; and (iii)&nbsp;the
        Person formed by such consolidation, the Person into which the Guarantor is
        merged or the Person that leases or acquires, by sale, transfer, conveyance
        or otherwise, all or substantially all\nof the property or assets of the Guarantor,
        shall be a corporation, partnership, limited liability Guarantor or trust
        and shall be organized and validly existing under the laws of the United States
        of America, any state thereof or the District of\nColumbia. The Guarantor
        shall deliver to the Trustee prior to the consummation of the proposed transaction
        an Officers&#146; Certificate and an Opinion of Counsel, each stating that
        such proposed transaction and, if a supplemental indenture is\nrequired in
        connection with such transaction, such supplemental indenture comply with
        this Article and that all conditions precedent herein provided for relating
        to such transaction have been complied with. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;903
        Successor of the Issuer Substituted. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        any consolidation of the Issuer with, or merger of the Issuer into, any other
        Person or any sale, transfer, lease or conveyance of all or\nsubstantially
        all of the properties and assets of the Issuer in accordance with Section&nbsp;901,
        the successor Person formed by such consolidation or into which the Issuer
        is merged or to which such sale, transfer, lease or conveyance is made shall\nsucceed
        to, and be substituted for, and may exercise every right and power of, the
        Issuer under this Indenture with the same effect as if such successor Person
        had been named as the Issuer herein, and thereafter, except in the case of
        a lease, the\npredecessor Person shall be relieved of all obligations and
        covenants under this Indenture and the Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">50 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;904
        Successor of the Guarantor Substituted. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon
        any consolidation of the Guarantor with, or merger of the Guarantor into,
        any other Person or any sale, transfer, lease or conveyance of\nall or substantially
        all of the properties and assets of the Guarantor in accordance with Section&nbsp;901,
        the successor Person formed by such consolidation or into which the Guarantor
        is merged or to which such sale, transfer, lease or conveyance\nis made shall
        succeed to, and be substituted for, and may exercise every right and power
        of, the Guarantor under this Indenture with the same effect as if such successor
        Person had been named as the Guarantor herein, and thereafter, except in the\ncase
        of a lease, the predecessor Person shall be relieved of all obligations and
        covenants under this Indenture and the Securities. </P>\n<P STYLE=\"margin-top:24pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        TEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>SUPPLEMENTAL INDENTURES
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1001 Supplemental Indentures
        Without Consent of Holders. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Without the
        consent of any Holders, the Issuer, when authorized by a Board Resolution,
        the Guarantor and the Trustee, at any time and from\ntime to time, may enter
        into one or more indentures supplemental hereto, in form satisfactory to the
        Trustee, for any of the following purposes: </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a)
        to evidence the succession of another Person to the Issuer and the assumption
        by any such successor of the covenants of the Issuer herein\nand in the Securities;
        or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) to evidence the succession of another Person
        to the Guarantor and the assumption by any such successor of\nthe covenants
        of the Guarantor herein and in the Securities; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        to add to the covenants of the Obligors for the benefit of the Holders\nof
        all or any series of Securities (and if such covenants are to be for the benefit
        of less than all series of Securities, stating that such covenants are expressly
        being included solely for the benefit of such series) or to surrender any
        right or\npower herein conferred upon the Obligors; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        to add any additional Events of Default for the benefit of the Holders of
        all or any\nseries of Securities (and if such additional Events of Default
        are to be for the benefit of less than all series of Securities, stating that
        such additional Events of Default are expressly being included solely for
        the benefit of such series); or\n</P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e) to add to
        or change any of the provisions of this Indenture to such extent as shall
        be necessary to permit or facilitate the issuance\nof Securities in bearer
        form, registrable or not registrable as to principal, and with or without
        interest coupons, or to permit or facilitate the issuance of Securities in
        uncertificated form; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(f) to add to,
        change or eliminate any of the provisions of this Indenture in respect of
        one or more series of Securities, provided that any\nsuch addition, change
        or elimination (i)&nbsp;shall neither (A)&nbsp;apply to any Security of any
        series created prior to the execution of such supplemental indenture and entitled
        to the benefit of such provision nor (B)&nbsp;modify the rights of\nthe Holder
        of any such Security with respect to such provision or (ii)&nbsp;shall become
        effective only when there is no such Security Outstanding; or </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">51 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g) to establish
        the form or terms of Securities of any series as permitted by Sections 201\nand
        301; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(h) to evidence and provide
        for the acceptance of appointment hereunder by a successor Trustee with respect
        to the Securities\nof one or more series and to add to or change any of the
        provisions of this Indenture as shall be necessary to provide for or facilitate
        the administration of the trusts hereunder by more than one Trustee, pursuant
        to the requirements of\nSection&nbsp;711; or </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i)
        to cure any ambiguity, to correct or supplement any provision herein which
        may be defective or inconsistent with\nany other provision herein, or to make
        any other provisions with respect to matters or questions arising under this
        Indenture, provided that such action pursuant to this clause (h)&nbsp;shall
        not adversely affect the interests of the Holders of\nSecurities of any series
        in any material respect; or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) to add to
        or change any of the provisions of this Indenture in respect of one or\nmore
        series of Securities solely to conform such provisions to the description
        of the Securities contained in the prospectus or other offering document pursuant
        to which such Securities were sold; or </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(k) to amend
        or supplement any provision contained herein or in any supplemental indenture,
        provided that no such amendment or supplement shall\nmaterially adversely
        affect the interests of the Holders of any Securities then Outstanding. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1002 Supplemental Indentures\nWith
        Consent of Holders. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">With the consent
        of the Holders of not less than a majority in principal amount of the Outstanding\nSecurities
        of each series affected by such supplemental indenture, by Act of said Holders
        delivered to the Issuer and the Trustee, the Issuer, when authorized by a
        Board Resolution, the Guarantor and the Trustee may enter into an indenture
        or\nindentures supplemental hereto or any applicable Guarantee for the purpose
        of adding any provisions to or changing in any manner or eliminating any of
        the provisions of this Indenture or of modifying in any manner the rights
        of the Holders of\nSecurities of such series under this Indenture; or any
        applicable Guarantee; provided, however, that no such supplemental indenture
        shall, without the consent of the Holder of each Outstanding Security affected
        thereby: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) change the Stated Maturity
        of the principal of, or any installment of principal of or interest on, any
        Security, or reduce the principal\namount thereof or the rate of interest
        thereon or any premium payable upon the redemption thereof, or reduce the
        amount of the principal of an Original Issue Discount Security or any other
        Security which would be due and payable upon a declaration\nof acceleration
        of the Maturity thereof pursuant to Section&nbsp;602, or change any Place
        of Payment where, or the coin or currency in which, any Security or any premium
        or interest thereon is payable, or impair the right to institute suit for
        the\nenforcement of any such payment on or after the Stated Maturity thereof
        (or, in the case of redemption, on or after the Redemption Date), or </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">52 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) reduce the percentage in principal amount
        of the Outstanding Securities of any series,\nthe consent of whose Holders
        is required for any such supplemental indenture, or the consent of whose Holders
        is required for any waiver (of compliance with certain provisions of this
        Indenture or certain defaults hereunder and their consequences)\nprovided
        for in this Indenture, or </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) modify any
        of the provisions of this Section, Section&nbsp;613 or Section&nbsp;1106,
        except to\nincrease any such percentage or to provide that certain other provisions
        of this Indenture cannot be modified or waived without the consent of the
        Holder of each Outstanding Security affected thereby; provided, however, that
        this clause shall not be\ndeemed to require the consent of any Holder with
        respect to changes in the references to &#147;the <B>Trustee</B>&#148; and
        concomitant changes in this Section and Section&nbsp;1106, or the deletion
        of this proviso, in accordance with the\nrequirements of Section&nbsp;711
        and clause (h)&nbsp;of Section&nbsp;1001. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">A
        supplemental indenture which changes or eliminates any\ncovenant or other
        provision of this Indenture which has expressly been included solely for the
        benefit of one or more particular series of Securities, or which modifies
        the rights of the Holders of Securities of such series with respect to such\ncovenant
        or other provision, shall be deemed not to affect the rights under this Indenture
        of the Holders of Securities of any other series. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">It
        shall not be necessary for any Act of Holders under this Section to approve
        the particular form of any proposed supplemental indenture, but\nit shall
        be sufficient if such Act shall approve the substance thereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1003
        Execution of Supplemental Indentures.\n</B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">In
        executing, or accepting the additional trusts created by, any supplemental
        indenture permitted by this Article or the\nmodifications thereby of the trusts
        created by this Indenture, the Trustee shall receive, and (subject to Section&nbsp;701)
        shall be fully protected in relying upon, an Opinion of Counsel and Officers&#146;
        Certificate of the Issuer and the\nGuarantor stating that the execution of
        such supplemental indenture is authorized or permitted by this Indenture.
        The Trustee may, but shall not be obligated to, enter into any such supplemental
        indenture which affects the Trustee&#146;s own rights,\nduties or immunities
        under this Indenture or otherwise. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1004
        Effect of Supplemental Indentures. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon the execution
        of any supplemental indenture under this Article, this Indenture shall be
        modified in accordance therewith, and such\nsupplemental indenture shall form
        a part of this Indenture for all purposes; and every Holder of Securities
        theretofore or thereafter authenticated and delivered hereunder shall be bound
        thereby. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1005 Conformity
        with Trust Indenture Act. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Every supplemental
        indenture executed pursuant to this Article shall conform to the requirements
        of the Trust Indenture Act. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">53 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1006
        Reference in Securities to Supplemental Indentures. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Securities
        of any series authenticated and delivered after the execution of any supplemental
        indenture pursuant to this Article may, and shall\nif required by the Trustee,
        bear a notation in form approved by the Trustee as to any matter provided
        for in such supplemental indenture. If the Issuer shall so determine, new
        Securities of any series so modified as to conform, in the opinion of the\nTrustee
        and the Issuer, to any such supplemental indenture may be prepared and executed
        by the Issuer and authenticated and delivered by the Trustee in exchange for
        Outstanding Securities of such series. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        ELEVEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>COVENANTS </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1101
        Payment of Principal, Premium and Interest. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer covenants and agrees for the benefit of each series of Securities that
        it will duly and punctually pay the principal of and any\npremium and interest
        on the Securities of that series in accordance with the terms of the Securities
        and this Indenture. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1102 Maintenance
        of Office or Agency. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer will
        maintain in each Place of Payment for any series of Securities an office or
        agency where Securities of that series may be\npresented or surrendered for
        payment, where Securities of that series may be surrendered for registration
        of transfer or exchange and where notices and demands to or upon the Issuer
        in respect of the Securities of that series and this Indenture may\nbe served.
        The Issuer will give prompt written notice to the Trustee of the location,
        and any change in the location, of such office or agency. If at any time the
        Issuer shall fail to maintain any such required office or agency or shall
        fail to\nfurnish the Trustee with the address thereof, such presentations,
        surrenders, notices and demands may be made or served at the Corporate Trust
        Office of the Trustee, and the Issuer hereby appoints the Trustee as its agent
        to receive all such\npresentations, surrenders, notices and demands. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer may also from time to time designate
        one or more other offices or agencies\nwhere the Securities of one or more
        series may be presented or surrendered for any or all such purposes and may
        from time to time rescind such designations; provided, however, that no such
        designation or rescission shall in any manner relieve the\nIssuer of its obligation
        to maintain an office or agency in each Place of Payment for Securities of
        any series for such purposes. The Issuer will give prompt written notice to
        the Trustee of any such designation or rescission and of any change in\nthe
        location of any such other office or agency. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1103
        Money for Securities Payments to Be Held in Trust. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">If
        the Issuer shall at any time act as its own Paying Agent with respect to any
        series of Securities, the Issuer will, on or before each due\ndate of the
        principal of or any premium or interest on any of the Securities of that series,
        segregate and hold in trust for the benefit of the Persons entitled thereto
        a sum sufficient to pay the principal and any premium and interest so becoming\ndue
        until such sums shall be paid to such Persons or otherwise disposed of as
        herein provided and will promptly notify the Trustee of its action or failure
        so to act. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">54 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Whenever the Issuer shall have one or more Paying
        Agents for any series of Securities, the\nIssuer will, prior to each due date
        of the principal of or any premium or interest on any Securities of that series,
        deposit with a Paying Agent a sum sufficient to pay such amount, such sum
        to be held as provided by the Trust Indenture Act, and\n(unless such Paying
        Agent is the Trustee) the Issuer will promptly notify the Trustee of its action
        or failure so to act. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer will\ncause
        each Paying Agent (other than the Trustee) for any series of Securities to
        execute and deliver to the Trustee an instrument in which such Paying Agent
        shall agree with the Trustee, subject to the provisions of this Section, that
        such Paying\nAgent will (1)&nbsp;comply with the provisions of the Trust Indenture
        Act applicable to it as a Paying Agent and (2)&nbsp;during the continuance
        of any default by the Obligors (or any other obligor upon the Securities of
        that series) in the making\nof any payment in respect of the Securities of
        that series, upon the written request of the Trustee, forthwith pay to the
        Trustee all sums held in trust by such Paying Agent for payment in respect
        of the Securities of that series. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer may
        at any time, for the purpose of obtaining the satisfaction and discharge of
        this Indenture or for any other purpose, pay, or by\nIssuer Order direct any
        Paying Agent to pay, to the Trustee all sums held in trust by the Issuer or
        such Paying Agent, such sums to be held by the Trustee upon the same trusts
        as those upon which such sums were held by the Issuer or such Paying\nAgent;
        and, upon such payment by any Paying Agent to the Trustee, such Paying Agent
        shall be released from all further liability with respect to such money. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Any money deposited with the Trustee or any
        Paying Agent, or then held by the Issuer, in trust for the payment of the
        principal of or any\npremium or interest on any Security of any series and
        remaining unclaimed for two years after such principal, premium or interest
        has become due and payable shall be paid to the Issuer on Issuer Request,
        or (if then held by the Issuer ) shall be\ndischarged from such trust; and
        the Holder of such Security shall thereafter, as an unsecured general creditor,
        look only to the Issuer for payment thereof, and all liability of the Trustee
        or such Paying Agent with respect to such trust money, and\nall liability
        of the Issuer as trustee thereof, shall thereupon cease; provided, however,
        that the Trustee or such Paying Agent, before being required to make any such
        repayment, may at the expense of the Issuer cause to be published once, in
        a\nnewspaper published in the English language, customarily published on each
        Business Day and of general circulation in , notice that such money remains
        unclaimed and that, after a date specified therein, which shall not be less
        than 30 days from the\ndate of such publication, any unclaimed balance of
        such money then remaining will be repaid to the Issuer. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1104
        Statement\nby Officers as to Default. </B></P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer will deliver to the Trustee, within 120 days after the end of each
        fiscal year of the Issuer\nending after the date hereof, an Officers&#146;
        Certificate, stating whether or not, to the best knowledge of the signers
        thereof, either of the Obligors is in default in the performance and observance
        of any of the terms, provisions and conditions\nof this Indenture (without
        regard to any period of grace or requirement of notice provided hereunder)
        and, if either Obligor shall be in default, specifying all such defaults and
        the nature and status thereof of which they may have\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">55 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nknowledge. The Issuer will
        also deliver to the Trustee, promptly after an officer of the Issuer becomes
        aware of the occurrence of any Event of Default, an Officers&#146; Certificate
        setting\nforth the nature and status of such Event of Default and, if then
        formulated, the action that the Issuer proposes to take with respect thereto.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1105 Existence. </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Subject to Article Nine, the Issuer will do
        or cause to be done all things necessary to preserve and keep in full force
        and effect its\nexistence, rights (charter and statutory) and franchises;
        provided, however, that the Issuer shall not be required to preserve any such
        right or franchise if the Board shall determine that the preservation thereof
        is no longer desirable in the\nconduct of the business of the Issuer. </P>
        <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1106 Waiver of Certain Covenants.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Except as otherwise specified as contemplated
        by Section&nbsp;301 for Securities of such series, the Obligors may, with
        respect to the\nSecurities of any series, omit in any particular instance
        to comply with any term, provision or condition set forth in any covenant
        provided pursuant to clause (r)&nbsp;of Section&nbsp;301 or clause (b)&nbsp;or
        (g) of Section&nbsp;1001 for the\nbenefit of the Holders of such series or
        in Section&nbsp;1105, if before the time for such compliance the Holders of
        at least a majority in principal amount of the Outstanding Securities of such
        series shall, by Act of such Holders, either waive\nsuch compliance in such
        instance or generally waive compliance with such term, provision or condition,
        but no such waiver shall extend to or affect such term, provision or condition
        except to the extent so expressly waived, and, until such waiver\nshall become
        effective, the obligations of the Issuer and the duties of the Trustee in
        respect of any such term, provision or condition shall remain in full force
        and effect. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1107 Economic
        Sanctions. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">(a) Each of the Issuer and the
        Guarantor represents that neither it nor, to the knowledge of the Issuer or
        the Guarantor, any of its\naffiliates, subsidiaries, directors or officers
        are the target or subject of any sanctions enforced by the US Government,
        (including, without limitation, the Office of Foreign Assets Control of the
        US Department of the Treasury or the US Department\nof State), the United
        Nations Security Council, the European Union, Her Majesty&#146;s Treasury,
        or other relevant sanctions authority (collectively &#147;<B>Sanctions</B>&#148;);
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">(b) Each of the Issuer covenants that it will
        not directly or indirectly use any payments made pursuant to this agreement,
        (i) to fund or\nfacilitate any activities of or business with any person who,
        at the time of such funding or facilitation, is the subject or target of Sanctions,
        or (ii) to fund or facilitate any activities of or business with any country
        or territory that is the\ntarget or subject of Sanctions. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">56 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        TWELVE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>REDEMPTION OF SECURITIES
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1201 Applicability of Article.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Securities of any series which are redeemable
        before their Stated Maturity shall be redeemable in accordance with their
        terms and (except as\notherwise specified as contemplated by Section&nbsp;301
        for such Securities) in accordance with this Article. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1202\nElection
        to Redeem; Notice to Trustee. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The election
        of the Issuer to redeem any Securities shall be evidenced by a Board Resolution\nor
        in another manner specified as contemplated by Section&nbsp;301 for such Securities.
        In case of any redemption at the election of the Issuer of less than all the
        Securities of any series (including any such redemption affecting only a single\nSecurity),
        the Issuer shall, at least 20 days prior to the Redemption Date fixed by the
        Issuer (unless a shorter notice shall be satisfactory to the Trustee), notify
        the Trustee of such Redemption Date, of the principal amount of Securities
        of such\nseries to be redeemed and, if applicable, of the tenor of the Securities
        to be redeemed. In the case of any redemption of Securities prior to the expiration
        of any restriction on such redemption provided in the terms of such Securities
        or elsewhere\nin this Indenture, the Issuer shall furnish the Trustee with
        an Officers&#146; Certificate evidencing compliance with such restriction.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1203 Selection of Securities
        to Be Redeemed. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If less than all of the Securities
        of any series are to be redeemed (unless all the Securities of such series
        and of a specified tenor are to\nbe redeemed or unless such redemption affects
        only a single Security), the particular Securities to be redeemed shall be
        selected not more than 60 days prior to the Redemption Date, from the Outstanding
        Securities of such series not previously\ncalled for redemption, in accordance
        with applicable depositary procedures which may provide for the selection
        for redemption of a portion of the principal amount of any Security of such
        series, provided that the unredeemed portion of the principal\namount of any
        Security shall be in an authorized denomination (which shall not be less than
        the minimum authorized denomination) for such Security. If less than all the
        Securities of such series and of a specified tenor are to be redeemed (unless\nsuch
        redemption affects only a single Security), the particular Securities to be
        redeemed shall be selected not more than 60 days prior to the Redemption Date,
        from the Outstanding Securities of such series and specified tenor not previously
        called\nfor redemption in accordance with the preceding sentence. </P> <P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Trustee shall promptly notify the Issuer
        in writing of the Securities\nselected for redemption as aforesaid and, in
        case of any Securities selected for partial redemption as aforesaid, the principal
        amount thereof to be redeemed. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The provisions
        of the two preceding paragraphs shall not apply with respect to any redemption
        affecting only a single Security, whether such\nSecurity is to be redeemed
        in whole or in part. In the case of any such redemption in part, the unredeemed
        portion of the principal amount of the Security shall be in an authorized
        denomination (which shall not be less than the minimum authorized\ndenomination)
        for such Security. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">57 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">For all purposes of this Indenture, unless the
        context otherwise requires, all provisions\nrelating to the redemption of
        Securities shall relate, in the case of any Securities redeemed or to be redeemed
        only in part, to the portion of the principal amount of such Securities which
        has been or is to be redeemed. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1204
        Notice of Redemption. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notice of redemption
        shall be given by first-class mail, postage prepaid, mailed or pursuant to
        applicable Depositary procedures not less than\n15 nor more than 60 days prior
        to the Redemption Date, to each Holder of Securities to be redeemed, at his
        or her address appearing in the Security Register. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">All
        notices of redemption shall state: </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(a) the Redemption
        Date, </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(b) the\nRedemption Price, </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c)
        if less than all the Outstanding Securities of any series consisting of more
        than a single Security are to be\nredeemed, the identification (and, in the
        case of partial redemption of any such Securities, the principal amounts)
        of the particular Securities to be redeemed and, if less than all the Outstanding
        Securities of any series consisting of a single\nSecurity are to be redeemed,
        the principal amount of the particular Security to be redeemed, </P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(d)
        that on the Redemption Date, the\nRedemption Price will become due and payable
        upon each such Security to be redeemed and, if applicable, that interest thereon
        will cease to accrue on and after said date, </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e)
        that on the Redemption Date, if such is the case, the right of the holders
        of each such Security to convert the Securities shall terminate,\n</P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(f) the place or places where each such Security
        is to be surrendered for payment of the Redemption Price, </P>\n<P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g)
        that the redemption is for a sinking fund, if such is the case, and </P>\n<P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(h) applicable &#147;<B>CUSIP</B>&#148; numbers.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Notice of redemption of Securities to be redeemed
        at the election of the Issuer shall be given by the Issuer or, at the Issuer&#146;s
        request\nand provision to the Trustee of such notice provisions at least two
        days prior to the date the notice of redemption is to be given to the Holders,
        by the Trustee in the name and at the expense of the Issuer and shall be irrevocable.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">58 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1205 Deposit of Redemption Price.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Prior to any Redemption Date, the Issuer shall
        deposit with the Trustee or with a Paying Agent (or, if the Issuer is acting
        as its own Paying\nAgent, segregate and hold in trust as provided in Section&nbsp;1103)
        an amount of money sufficient to pay the Redemption Price of, and (except
        if the Redemption Date shall be an Interest Payment Date) accrued interest
        on, all the Securities which\nare to be redeemed on that date. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1206
        Securities Payable on Redemption Date. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">Notice
        of redemption having been given as aforesaid, the Securities so to be redeemed
        shall, on the Redemption Date, become due and payable at\nthe Redemption Price
        therein specified, and from and after such date (unless the Issuer shall default
        in the payment of the Redemption Price and accrued interest) such Securities
        shall cease to bear interest. Upon surrender of any such Security for\nredemption
        in accordance with said notice, such Security shall be paid by the Issuer
        at the Redemption Price, together with accrued interest to the Redemption
        Date; provided, however, that, unless otherwise specified as contemplated
        by\nSection&nbsp;301, installments of interest whose Stated Maturity is on
        or prior to the Redemption Date will be payable to the Holders of such Securities,
        or one or more Predecessor Securities, registered as such at the close of
        business on the\nrelevant Record Dates according to their terms and the provisions
        of Section&nbsp;307. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">If any Security called for redemption
        shall not be\nso paid upon surrender thereof for redemption, the principal
        and any premium shall, until paid, bear interest from the Redemption Date
        at the rate prescribed therefor in the Security. </P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1207
        Securities Redeemed in Part. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Any Security
        which is to be redeemed only in part shall be surrendered at a Place of Payment
        therefor (with, if the Issuer or the Trustee so\nrequires, due endorsement
        by, or a written instrument of transfer in form satisfactory to the Issuer
        and the Trustee duly executed by, the Holder thereof or his or her attorney
        duly authorized in writing), and the Issuer shall execute, and the\nTrustee
        shall authenticate and deliver to the Holder of such Security without service
        charge, a new Security or Securities of the same series and of like tenor,
        of any authorized denomination as requested by such Holder, in aggregate principal\namount
        equal to and in exchange for the unredeemed portion of the principal of the
        Security so surrendered. </P> <P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        THIRTEEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>SINKING FUNDS </B></P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1301 Applicability of Article.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The provisions of this Article shall be applicable
        to any sinking fund for the retirement of Securities of any series except
        as otherwise\nspecified as contemplated by Section&nbsp;301 for such Securities.
        </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">59 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The minimum amount of any sinking fund payment
        provided for by the terms of any Securities\nis herein referred to as a &#147;mandatory
        sinking fund payment,&#148; and any payment in excess of such minimum amount
        provided for by the terms of such Securities is herein referred to as an &#147;optional
        sinking fund payment.&#148; If provided\nfor by the terms of any Securities,
        the cash amount of any sinking fund payment may be subject to reduction as
        provided in Section&nbsp;1302. Each sinking fund payment shall be applied
        to the redemption of Securities as provided for by the terms of\nsuch Securities.
        </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1302 Satisfaction of Sinking
        Fund Payments with Securities. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The Issuer (1)&nbsp;may
        deliver Outstanding Securities of a series (other than any previously called
        for redemption) and (2)&nbsp;may apply as\na credit Securities of a series
        which have been redeemed either at the election of the Issuer pursuant to
        the terms of such Securities or through the application of permitted optional
        sinking fund payments pursuant to the terms of such Securities,\nin each case
        in satisfaction of all or any part of any sinking fund payment with respect
        to any Securities of such series required to be made pursuant to the terms
        of such Securities as and to the extent provided for by the terms of such
        Securities;\nprovided that the Securities to be so credited have not been
        previously so credited. The Securities to be so credited shall be received
        and credited for such purpose by the Trustee at the Redemption Price, as specified
        in the Securities so to be\nredeemed, for redemption through operation of
        the sinking fund and the amount of such sinking fund payment shall be reduced
        accordingly. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1303 Redemption
        of Securities for Sinking Fund. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Not less than
        30 days prior to each sinking fund payment date for any Securities, the Issuer
        will deliver to the Trustee an Officers&#146;\nCertificate specifying the
        amount of the next ensuing sinking fund payment for such Securities pursuant
        to the terms of such Securities, the portion thereof, if any, which is to
        be satisfied by payment of cash and the portion thereof, if any, which\nis
        to be satisfied by delivering and crediting Securities pursuant to Section&nbsp;1302
        and will also deliver to the Trustee any Securities to be so delivered. Not
        less than 15 days prior to each such sinking fund payment date, the Securities
        to be\nredeemed upon such sinking fund payment date shall be selected in the
        manner specified in Section&nbsp;1203 and cause notice of the redemption thereof
        to be given in the name of and at the expense of the Issuer in the manner
        provided in\nSection&nbsp;1204. Such notice having been duly given, the redemption
        of such Securities shall be made upon the terms and in the manner stated in
        Sections 1206 and 1207. </P>\n<P STYLE=\"margin-top:24pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>ARTICLE
        FOURTEEN </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt;
        font-family:Times New Roman\" ALIGN=\"center\"><B>DEFEASANCE AND COVENANT
        DEFEASANCE </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1401 Issuer&#146;s
        Option to Effect Defeasance or Covenant Defeasance. </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:4%; font-size:10pt; font-family:Times New Roman\">The
        Issuer may elect, at its option at any time, to have Section&nbsp;1402 or
        Section&nbsp;1403 applied to any Securities or any series of\nSecurities,
        as the case may be, designated pursuant to Section&nbsp;301 as being defeasible
        pursuant to such Section&nbsp;1402 or 1403, in accordance with any applicable
        requirements provided pursuant to Section&nbsp;301 and upon compliance with
        the\nconditions set forth below in this Article. Any such election shall be
        evidenced by a Board Resolution or in another manner specified as contemplated
        by Section&nbsp;301 for such Securities. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">60 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1402
        Defeasance and Discharge. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">Upon the Issuer&#146;s
        exercise of its option (if any) to have this Section applied to any Securities
        or any series of Securities, as the case\nmay be, the Obligors shall be deemed
        to have been discharged from their obligations, and the provisions of Article
        Fifteen shall cease to be effective, with respect to such Securities as provided
        in this Section on and after the date the conditions\nset forth in Section&nbsp;1404
        are satisfied (hereinafter called &#147;<B>Defeasance</B>&#148;). For this
        purpose, such Defeasance means that the Issuer shall be deemed to have paid
        and discharged the entire indebtedness represented by such\nSecurities and
        to have satisfied all its other obligations under such Securities and this
        Indenture insofar as such Securities are concerned (and the Trustee, at the
        expense of the Issuer, shall execute proper instruments acknowledging the
        same),\nsubject to the following which shall survive until otherwise terminated
        or discharged hereunder: (a)&nbsp;the rights of Holders of such Securities
        to receive, solely from the trust fund described in Section&nbsp;1404 and
        as more fully set forth in\nsuch Section, payments in respect of the principal
        of and any premium and interest on such Securities when payments are due,
        (b)&nbsp;the Obligors&#146; obligations with respect to such Securities under
        Sections 304, 305, 306, 1102 and 1103, (c) the\nrights, powers, trusts, duties
        and immunities of the Trustee hereunder and (d)&nbsp;this Article. Subject
        to compliance with this Article, the Issuer may exercise its option (if any)
        to have this Section applied to any Securities notwithstanding the\nprior
        exercise of its option (if any) to have Section&nbsp;1403 applied to such
        Securities. </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1403 Covenant
        Defeasance.\n</B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Upon the Issuer&#146;s exercise
        of its option (if any) to have this Section applied to any Securities or any
        series of Securities, as\nthe case may be, (a)&nbsp;the Obligors shall be
        released from their obligations under clause (c)&nbsp;of Section&nbsp;901
        and any covenants provided pursuant to clause (r)&nbsp;of Section&nbsp;301,
        Section&nbsp;1105 or clause (b)&nbsp;or (g) of\nSection&nbsp;1001 for the
        benefit of the Holders of such Securities, (b)&nbsp;the occurrence of any
        event specified in clause (d)&nbsp;of Section&nbsp;601 (with respect to any
        of clause (c)&nbsp;of Section&nbsp;901 and any such covenants provided\npursuant
        to clause (r)&nbsp;of Section&nbsp;301, Section&nbsp;1105 or clause (b)&nbsp;or
        (g) of Section&nbsp;1001) or clause (e)&nbsp;of Section&nbsp;601 shall be
        deemed not to be or result in an Event of Default, and (c)&nbsp;the provisions
        of\nArticle Fifteen shall cease to be effective, in each case with respect
        to such Securities as provided in this Section on and after the date the conditions
        set forth in Section&nbsp;1404 are satisfied (hereinafter called &#147;<B>Covenant\nDefeasance</B>&#148;).
        For this purpose, such Covenant Defeasance means that, with respect to such
        Securities, the Obligors may omit to comply with and shall have no liability
        in respect of any term, condition or limitation set forth in any such\nspecified
        Section (to the extent so specified in the case of clause (d)&nbsp;of Section&nbsp;601)
        or Article Fifteen, whether directly or indirectly by reason of any reference
        elsewhere herein to any such Section or Article or by reason of any\nreference
        in any such Section or Article to any other provision herein or in any other
        document, but the remainder of this Indenture and such Securities shall be
        unaffected thereby. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P>
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">61 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>Section&nbsp;1404 Conditions to Defeasance
        or Covenant Defeasance. </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">The following
        shall be the conditions to the application of Section&nbsp;1402 or Section&nbsp;1403
        to any Securities or any series of\nSecurities and any related Guarantee,
        as the case may be: </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(a) The Issuer shall irrevocably
        have deposited or caused to be deposited with\nthe Trustee (or another trustee
        which satisfies the requirements contemplated by Section&nbsp;709 and agrees
        to comply with the provisions of this Article applicable to it) as trust funds
        in trust for the purpose of making the following payments,\nspecifically pledged
        as security for, and dedicated solely to, the benefits of the Holders of such
        Securities, (i)&nbsp;money in an amount, or (ii)&nbsp;U.S. Government Obligations
        which through the scheduled payment of principal and interest in\nrespect
        thereof in accordance with their terms will provide, not later than one day
        before the due date of any payment, money in an amount, or (iii)&nbsp;a combination
        thereof, in each case sufficient, in the opinion of a nationally recognized
        firm\nof independent public accountants expressed in a written certification
        thereof delivered to the Trustee, to pay and discharge, and which shall be
        applied by the Trustee (or any such other qualifying trustee) to pay and discharge,
        the principal of\nand any premium and interest on such Securities on the respective
        Stated Maturities, in accordance with the terms of this Indenture and such
        Securities. As used herein, &#147;<B>U.S. Government Obligation</B>&#148;
        means (x)&nbsp;any security which\nis (i)&nbsp;a direct obligation of the
        United States of America for the payment of which the full faith and credit
        of the United States of America is pledged or (ii)&nbsp;an obligation of a
        Person controlled or supervised by and acting as an agency\nor instrumentality
        of the United States of America the payment of which is unconditionally guaranteed
        as a full faith and credit obligation by the United States of America, which,
        in either case (i)&nbsp;or (ii), is not callable or redeemable at the\noption
        of the issuer thereof, and (y)&nbsp;any depositary receipt issued by a bank
        (as defined in Section&nbsp;3(a)(2) of the Securities Act) as custodian with
        respect to any U.S. Government Obligation which is specified in clause (x)&nbsp;above
        and\nheld by such bank for the account of the holder of such depositary receipt,
        or with respect to any specific payment of principal of or interest on any
        U.S. Government Obligation which is so specified and held, provided that (except
        as required by\nlaw) such custodian is not authorized to make any deduction
        from the amount payable to the holder of such depositary receipt from any
        amount received by the custodian in respect of the U.S. Government Obligation
        or the specific payment of principal\nor interest evidenced by such depositary
        receipt. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(b) In the event of an election
        to have Section&nbsp;1402 apply to any Securities or any\nseries of Securities,
        as the case may be, the Issuer shall have delivered to the Trustee an Opinion
        of Counsel stating that (i)&nbsp;the Issuer has received from, or there has
        been published by, the Internal Revenue Service a ruling or\n(ii)&nbsp;since
        the date of this instrument, there has been a change in the applicable Federal
        income tax law, in either case (i)&nbsp;or (ii) to the effect that, and based
        thereon such opinion shall confirm that, the Holders of such Securities will\nnot
        recognize gain or loss for Federal income tax purposes as a result of the
        deposit, Defeasance and discharge to be effected with respect to such Securities
        and will be subject to Federal income tax on the same amount, in the same
        manner and at\nthe same times as would be the case if such deposit, Defeasance
        and discharge were not to occur. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(c) In the event
        of an election to have\nSection&nbsp;1403 apply to any Securities or any series
        of Securities, as the case may be, the Issuer shall have delivered to the
        Trustee an Opinion of Counsel to the effect that the Holders of such Securities
        will not recognize gain or\n</P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">62 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\">\nloss for Federal income tax
        purposes as a result of the deposit and Covenant Defeasance to be effected
        with respect to such Securities and will be subject to Federal income tax
        on the same\namount, in the same manner and at the same times as would be
        the case if such deposit and Covenant Defeasance were not to occur. </P> <P
        STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%; font-size:10pt;
        font-family:Times New Roman\">(d) The\nIssuer shall have delivered to the
        Trustee an Officers&#146; Certificate to the effect that neither such Securities
        nor any other Securities of the same series, if then listed on any securities
        exchange, will be delisted as a result of such deposit.\n</P> <P STYLE=\"margin-top:6pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(e)
        No event which is, or after notice or lapse of time or both would become,
        an Event of Default with respect to such Securities or any\nother Securities
        shall have occurred and be continuing at the time of such deposit or, with
        regard to any such event specified in clause (e)&nbsp;or (f) of Section&nbsp;601,
        at any time on or prior to the 90th day after the date of such deposit (it\nbeing
        understood that this condition shall not be deemed satisfied until after such
        90th day). </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(f) Such Defeasance or Covenant
        Defeasance\nshall not cause the Trustee to have a conflicting interest within
        the meaning of the Trust Indenture Act (assuming all Securities are in default
        within the meaning of such Act). </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(g) Such Defeasance
        or Covenant Defeasance shall not result in a breach or violation of, or constitute
        a default under, any other agreement or\ninstrument to which the Obligors
        are parties or by which it is bound. </P> <P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(h) Such Defeasance
        or Covenant Defeasance shall not result in the\ntrust arising from such deposit
        constituting an investment company within the meaning of the Investment Company
        Act unless such trust shall be registered under the Investment Company Act
        or exempt from registration thereunder. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(i) At the time
        of such deposit, (i)&nbsp;no default in the payment of any principal of or
        premium or interest on any Senior Debt shall have\noccurred and be continuing,
        (ii)&nbsp;no event of default with respect to any Senior Debt shall have resulted
        in such Senior Debt becoming, and continuing to be, due and payable prior
        to the date on which it would otherwise have become due and\npayable (unless
        payment of such Senior Debt has been made or duly provided for), and (iii)&nbsp;no
        other event of default with respect to any Senior Debt shall have occurred
        and be continuing permitting (after notice or lapse of time or both) the\nholders
        of such Senior Debt (or a trustee on behalf of such holders) to declare such
        Senior Debt due and payable prior to the date on which it would otherwise
        have become due and payable. </P>\n<P STYLE=\"margin-top:6pt; margin-bottom:0pt;
        text-indent:9%; font-size:10pt; font-family:Times New Roman\">(j) The Issuer
        shall have delivered to the Trustee an Officers&#146; Certificate and an Opinion
        of Counsel, each stating that all conditions\nprecedent with respect to such
        Defeasance or Covenant Defeasance have been complied with. </P>\n <p STYLE=\"margin-top:0pt;margin-bottom:0pt
        ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">63 </P>\n\n</DIV></Center>\n\n\n<p
        style=\"margin-top:1em; margin-bottom:0em; page-break-before:always\"> </p>\n<HR
        SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV
        STYLE=\"width:8.5in\" align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1405
        Deposited Money and U.S. Government Obligations to Be Held in Trust;\nMiscellaneous
        Provisions. </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">Subject to the provisions of
        the last paragraph of Section&nbsp;1103, all money and U.S. Government\nObligations
        (including the proceeds thereof) deposited with the Trustee or other qualifying
        trustee (solely for purposes of this Section and Section&nbsp;1406, the Trustee
        and any such other trustee are referred to collectively as the\n&#147;<B>Trustee</B>&#148;)
        pursuant to Section&nbsp;1404 in respect of any Securities shall be held in
        trust and applied by the Trustee, in accordance with the provisions of such
        Securities and this Indenture, to the payment, either directly or\nthrough
        any such Paying Agent (including the Issuer acting as its own Paying Agent)
        as the Trustee may determine, to the Holders of such Securities, of all sums
        due and to become due thereon in respect of principal and any premium and
        interest, but\nmoney so held in trust need not be segregated from other funds
        except to the extent required by law. Money and U.S. Government Obligations
        so held in trust shall not be subject to the provisions of Article Fifteen.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">The Issuer shall pay and indemnify the Trustee
        against any tax, fee or other charge imposed on or assessed against the U.S.
        Government\nObligations deposited pursuant to Section&nbsp;1404 or the principal
        and interest received in respect thereof other than any such tax, fee or other
        charge which by law is for the account of the Holders of Outstanding Securities.
        </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">Anything in this Article to the contrary notwithstanding,
        the Trustee shall deliver or pay to the Issuer from time to time upon Issuer
        Request\nany money or U.S. Government Obligations held by it as provided in
        Section&nbsp;1404 with respect to any Securities which, in the opinion of
        a nationally recognized firm of independent public accountants expressed in
        a written certification thereof\ndelivered to the Trustee, are in excess of
        the amount thereof which would then be required to be deposited to effect
        the Defeasance or Covenant Defeasance, as the case may be, with respect to
        such Securities. </P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\"><B>Section&nbsp;1406 Reinstatement.
        </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">If the Trustee or the Paying Agent is unable
        to apply any money in accordance with this Article with respect to any Securities
        by reason of\nany order or judgment of any court or governmental authority
        enjoining, restraining or otherwise prohibiting such application, then the
        obligations under this Indenture and such Securities from which the Obligors
        have been discharged or released\npursuant to Section&nbsp;1402 or 1403 shall
        be revived and reinstated as though no deposit had occurred pursuant to this
        Article with respect to such Securities, until such time as the Trustee or
        Paying Agent is permitted to apply all money held in\ntrust pursuant to Section&nbsp;1405
        with respect to such Securities in accordance with this Article; provided,
        however, that if the Obligors make any payment of principal of or any premium
        or interest on any such Security following such\nreinstatement of its obligations,
        the Obligors shall be subrogated to the rights (if any) of the Holders of
        such Securities to receive such payment from the money so held in trust. </P>\n<P
        STYLE=\"margin-top:24pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE FIFTEEN </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>SUBORDINATION
        OF SECURITIES </B></P>\n<P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%;
        font-size:10pt; font-family:Times New Roman\">[Subordination Provisions with
        respect to Junior Subordinated Debt Securities to be provided here.] </P>\n
        <p STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P
        STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\">64 </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em;
        margin-bottom:0em; page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\"
        WIDTH=\"100%\" ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>ARTICLE SIXTEEN </B></P>\n<P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\"><B>SECURITY
        </B></P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">[Security for\nJunior Subordinated Debt Securities
        to be provided here.] </P> <P STYLE=\"margin-top:12pt; margin-bottom:0pt;
        text-indent:4%; font-size:10pt; font-family:Times New Roman\">This instrument
        may be executed in any number of counterparts, each of which so\nexecuted
        shall be deemed to be an original, but all such counterparts shall together
        constitute but one and the same instrument. In proving the existence of this
        Indenture it shall not be necessary to produce more than one copy. </P>\n<P
        STYLE=\"margin-top:12pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>[Remainder of page intentionally left blank.
        </B></P>\n<P STYLE=\"margin-top:0pt; margin-bottom:0pt; font-size:10pt; font-family:Times
        New Roman\" ALIGN=\"center\"><B>Next page is signature page.] </B></P>\n <p
        STYLE=\"margin-top:0pt;margin-bottom:0pt ; font-size:8pt\">&nbsp;</P> <P STYLE=\"margin-top:0pt;
        margin-bottom:0pt; font-size:10pt; font-family:Times New Roman\" ALIGN=\"center\">65
        </P>\n\n</DIV></Center>\n\n\n<p style=\"margin-top:1em; margin-bottom:0em;
        page-break-before:always\"> </p>\n<HR SIZE=\"3\" style=\"COLOR:#999999\" WIDTH=\"100%\"
        ALIGN=\"CENTER\">\n\n\n<Center><DIV STYLE=\"width:8.5in\" align=\"left\">\n
        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\"><B>IN WITNESS WHEREOF</B>, the parties hereto
        have caused this Indenture to be duly executed\nas of the day and year first
        above written. </P> <P STYLE=\"font-size:12pt;margin-top:0pt;margin-bottom:0pt\">&nbsp;</P><DIV
        ALIGN=\"right\">\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\" WIDTH=\"40%\"
