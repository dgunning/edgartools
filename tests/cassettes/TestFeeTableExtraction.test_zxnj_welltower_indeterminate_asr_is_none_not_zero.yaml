        align=\"left\">\n <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:9%;
        font-size:10pt; font-family:Times New Roman\">(B) That, for purposes of determining
        any liability under the Securities Act of 1933, each\nfiling of the registrants&#146;
        annual report pursuant to Section&nbsp;13(a) or 15(d) of the Securities Exchange
        Act of 1934 (and, where applicable, each filing of an employee benefit plan&#146;s
        annual report pursuant to Section&nbsp;15(d) of the\nSecurities Exchange Act
        of 1934) that is incorporated by reference in the registration statement shall
        be deemed to be a new registration statement relating to the securities offered
        therein, and the offering of such securities at that time shall be\ndeemed
        to be the initial bona fide offering thereof. </P> <P STYLE=\"margin-top:12pt;
        margin-bottom:0pt; text-indent:9%; font-size:10pt; font-family:Times New Roman\">(C)
        Insofar as indemnification for liabilities arising under the Securities Act
        of\n1933 may be permitted to directors, officers and controlling persons of
        the registrants pursuant to the foregoing provisions, or otherwise, the registrants
        have been advised that in the opinion of the Securities and Exchange Commission
        such\nindemnification is against public policy as expressed in the Securities
        Act of 1933 and is, therefore, unenforceable. In the event that a claim for
        indemnification against such liabilities (other than the payment by the registrants
        of expenses\nincurred or paid by a director, officer or controlling person
        of the registrants in the successful defense of any action, suit or proceeding)
        is asserted by such director, officer or controlling person in connection
