        <P STYLE=\"margin-top:0pt; margin-bottom:0pt; text-indent:4%; font-size:10pt;
        font-family:Times New Roman\">[If applicable, insert the following &#151;
        The Indenture contains provisions for defeasance\nat any time of [the entire
