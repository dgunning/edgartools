        4.16\n<TEXT>\n<HTML>\n<HEAD>\n     <TITLE></TITLE>\n</HEAD>\n<BODY STYLE=\"font:
        10pt Times New Roman, Times, Serif\">\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: right\"><B>Exhibit
        4.16</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-align: center\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: center\">MASTER NOTE</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">Unless this certificate is presented by an authorized\nrepresentative
        of The Depository Trust Company (55 Water Street, New York, New York) (&ldquo;DTC&rdquo;
        or the &ldquo;Depositary&rdquo;)\nto the Company (as defined below) or its
        agent for registration of transfer, exchange or payment, and any certificate
        issued is registered\nin the name of Cede&nbsp;&amp; Co. or such other name
        as is requested by an authorized representative of DTC and any payment is
        made to\nCede&nbsp;&amp; Co. or such other entity as is requested by an authorized
        representative of DTC, ANY TRANSFER, PLEDGE OR OTHER USE HEREOF\nFOR VALUE
        OR OTHERWISE BY OR TO ANY PERSON IS WRONGFUL since the registered owner hereof,
        Cede&nbsp;&amp; Co., has an interest herein.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Unless
        and until it is exchanged in whole or in\npart for Notes in definitive registered
        form, this Note may not be transferred except as a whole by the Depositary
        to a nominee of the\nDepositary or by a nominee of the Depositary to the Depositary
        or another nominee of the Depositary or by the Depositary or any such nominee\nto
        a successor Depositary or a nominee of such successor Depositary.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\">CREDIT SUISSE AG<BR> SENIOR MEDIUM-TERM NOTE</P>\n\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">This Note is a master note, which term means a\nRegistered Global
        Security with the meaning specified in the Indenture (as defined on the reverse
        hereof) that provides for incorporation\ntherein of the terms of one or more
        obligations of CREDIT SUISSE AG, a corporation established under the laws
        of, and duly licensed as\na bank in, Switzerland (the &ldquo;Company&rdquo;)
        (each such obligation, a &ldquo;Supplemental Obligation&rdquo;) by reference
        to the\nRelated Prospectuses (as defined below).</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The
        terms of each Supplemental Obligation shall\nbe reflected in this Note and
        in the applicable pricing supplement relating to such Supplemental Obligation
        (each a &ldquo;Related Pricing\nSupplement&rdquo;) and any product supplement(s),
        underlying supplement(s), prospectus supplement(s)&nbsp;and prospectus referred
        to therein\n(however titled) (together with the Related Pricing Supplement,
        the &ldquo;Related Prospectus&rdquo;). With respect to each Supplemental\nObligation,
        the terms of the Supplemental Obligation contained in the Related Prospectus
        are hereby incorporated by reference in, and\nshall be deemed to be a part
        of, this Note for purposes of the applicable Supplemental Obligation only
        as of the original issue date specified\nin the relevant Related Pricing Supplement;
        <I>provided, however</I>, that for the avoidance of doubt, no hypothetical
        examples, risk\nfactors, historical information or other information not considered
        to be terms of such Supplemental Obligation provided or incorporated\nby reference
        in the Related Prospectus shall be used to determine the terms of such Supplemental
        Obligation. Each Related Prospectus is\non file with the Trustee referred
        to on the reverse hereof and is identified in the records of the Trustee.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">With\nrespect
        to each Supplemental Obligation evidenced by this Note, the Company, acting
        through the branch specified in the applicable Related\nPricing Supplement
        (the &ldquo;Branch&rdquo;), for value received, hereby promises to pay and/or
        deliver to Cede&nbsp;&amp; Co., or registered\nassigns, </FONT>an amount of
        cash in the coin or currency of the United States and/or the number of securities
        or other property, as applicable,\nas specified in the applicable Related
        Prospectus.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 1 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align:
        center; font-size: 10pt; margin-top: 0pt; margin-bottom: 0pt\">F-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->1<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">All
        terms used in this Note that are or will be\ndefined in the Indenture or Related
        Prospectus shall have the meanings assigned to them therein. In relation to
        a particular Supplemental\nObligation, in the event of any inconsistency between
        the definitions in the Indenture and the definitions in the Related Prospectus,\nthe
        definitions in the Related Prospectus shall govern.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Reference
        is hereby made to the further provisions\nof this Note set forth on the reverse
        hereof, which further provisions shall for all purposes have the same effect
        as if set forth at\nthis place. With respect to each Supplemental Obligation,
        every term of this Note is subject to modification, amendment or elimination\nthrough
        the incorporation of the applicable Related Prospectus by reference, whether
        or not the phrase &ldquo;unless otherwise provided\nin the Related Prospectus&rdquo;
        or language of similar import precedes the term of this Note so modified,
        amended or eliminated. It is\nthe intent of the parties hereto that, in the
        case of any conflict between the applicable Related Prospectus and the terms
        herein, the\nRelated Prospectus shall control over the terms herein with respect
        to the relevant Supplemental Obligation. Without limiting the foregoing,\nin
        the case of each Supplemental Obligation, the holders of this Note are directed
        to the applicable Related Prospectus for a description\nof certain terms of
        such Supplemental Obligation, including the manner of determining the amounts
        due and/or property to be delivered,\nif any, as applicable, on such Supplemental
        Obligation and the date or dates, if any, on which amounts due and or securities
        or other\nproperty to be delivered, if any, on such Supplemental Obligation
        are to be paid or delivered, as applicable.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The principal
        amount of each Supplemental Obligation\nevidenced by this Note shall be as
        specified in the applicable Related Pricing Supplement.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">Unless the certificate
        of authentication hereon has been signed by\nthe Trustee or Authenticating
        Agent (which signature may be manual, facsimile or electronic (including,
        without limitation, DocuSign and\nAdobeSign and other similar applications)),
        this Note shall not be entitled to any benefit under the Indenture or be valid
        or obligatory\nfor any purpose. The Company and the Trustee hereby agree that
        authentication of this Note shall be deemed to be due authentication pursuant\nto
        Section&nbsp;2.02 of the Indenture with respect to each Supplemental Obligation
        evidenced by this Note and the execution and delivery\nof a written order
        of the Company with respect to a Supplemental Obligation by any two Authorized
        Persons shall be deemed to be due execution\npursuant to Section&nbsp;2.02
        with respect to such Supplemental Obligation.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
