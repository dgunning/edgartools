        of the successor corporation enforceable against it. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse may issue debt
        securities directly or through one or more of its branches, and Credit Suisse
