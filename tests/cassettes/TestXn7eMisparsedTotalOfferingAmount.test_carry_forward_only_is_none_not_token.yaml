        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\">(i)</TD><TD>the
        nature of the remedies available in the Swiss courts (and nothing\n                                            in
        this opinion should be taken as indicating that specific performance (other
        than for the\n                                            payment of a sum
        of money) or injunctive relief would be available as remedies for the enforcement\n
        \                                           of such obligations); and</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\">(ii)</TD><TD>the
        acceptance of such courts of jurisdiction and the power of such\n                                            courts
        to stay proceedings if concurrent proceedings are being brought elsewhere.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(f)</TD><TD>Under
        Swiss law, jurisdiction clauses may have no effect with regard to\n                                            actions
        relating to, or deemed to be brought in connection with, insolvency procedures,
        which,\n                                            as a rule, must be brought
        before the court at the place of the relevant insolvency procedure.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(g)</FONT></TD><TD><FONT STYLE=\"font-size: 10pt\">Contractual\n                                            submissions
        to a particular jurisdiction are subject to mandatory provisions on the protection\n
        \                                           of consumers, insured persons
        and employees pursuant to the Private International Law Act\n                                            and
        bilateral and international treaties by which Switzerland is bound (including,
        but not\n                                            limited to, Convention
        on Jurisdiction and the Recognition and Enforcement of Judgments in\n                                            Civil
        and Commercial Matters of October</FONT>&nbsp;30, 2007, as amended (the <B>Lugano
        Convention</B>)).</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 6;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: right; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->6<!-- Field: /Sequence -->/8</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: right; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"><IMG SRC=\"tm2317905d2_ex5-2img001.jpg\"
        ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(h)</FONT></TD><TD><FONT
        STYLE=\"font-size: 10pt\">Rights\n                                            and
        claims may become barred under statutes of limitation or prescription, or
        may be or become\n                                            subject to available
        defenses such as set-off, counterclaim, misrepresentation, material\n                                            error,
        frustration, overreaching, duress or fraud. Further, (i)</FONT>&nbsp;limitations
        may\n                                            apply to any provision in
        any Security or any other document, security or guarantee that\n                                            limits
        the liability of any party thereto or provides for indemnification or contribution\n
        \                                           obligations of CS, if a Swiss
        court finds that such party or the indemnified person, respectively,\n                                            acted
        willfully or negligently, and (ii)&nbsp;any party's obligation to pay an amount
        under\n                                            any Security or any other
        document, security or guarantee may be unenforceable if a Swiss\n                                            court
        finds that such amount constitutes an excessive penalty (such as exemplary
        or punitive\n                                            damages).</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(i)</FONT></TD><TD><FONT STYLE=\"font-size: 10pt\">The\n                                            enforceability
        in Switzerland of a foreign judgment rendered against CS is subject to the\n
        \                                           limitations set forth in (x)</FONT>&nbsp;bilateral
        and international treaties by which Switzerland\n                                            is
        bound (including, but not limited to, the Lugano Convention), and (y)&nbsp;the
        Private\n                                            International Law Act.
        In particular, and without limitation to the foregoing, a judgment\n                                            rendered
        by a foreign court may only be enforced in Switzerland if:</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(i)</FONT></TD><TD><FONT STYLE=\"font-size: 10pt\">in\n                                            the
        case of sub-clause</FONT>&nbsp;(y)&nbsp;above and, in certain exceptional
        cases, sub-clause&nbsp;(x)&nbsp;above,\n                                            such
        foreign court had jurisdiction;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0.5in\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(ii)</FONT></TD><TD><FONT STYLE=\"font-size: 10pt\">such\n                                            judgment
        has become final and non-appealable, or, in the case of sub-clause</FONT>&nbsp;(x)&nbsp;above,\n
        \                                           has become enforceable at an earlier
        stage;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(iii)</FONT></TD><TD><FONT
        STYLE=\"font-size: 10pt\">the\n                                            court
        procedures leading to such judgment followed the principles of due process
        of law,\n                                            including proper service
        of process, subject to any special provisions provided for by </FONT>bilateral\n
        \                                           and international treaties by
        which Switzerland is bound (including, but not limited to,\n                                            the
        Lugano Convention);</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.5in\">(iv)</TD><TD>such judgment on its
        merits does not violate Swiss law principles\n                                            of
        public policy; and</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"></TD><TD STYLE=\"width: 0.5in\">(v)</TD><TD>from a Swiss law perspective,
        such foreign procedure does not formally\n                                            or
        functionally qualify as an insolvency-related, administrative or criminal
        procedure.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.5in\">(j)</TD><TD>Enforcement of a claim or
        court judgment under Swiss debt collection or\n                                            bankruptcy
        proceedings may only be made in Swiss francs and any foreign currency amount
        must\n                                            accordingly be converted
        into Swiss francs in accordance with the applicable rules.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(k)</TD><TD>It
        is doubtful whether a Swiss court would enforce a judgment of any court\n
        \                                           of the United States or any political
        subdivision thereof predicated solely upon the federal\n                                            or
        state securities laws of the United States.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(l)</TD><TD>A Swiss court
        may limit or decline to give effect to an indemnity for\n                                            legal
        fees or costs incurred.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(m)</TD><TD>Swiss courts
        do not consider themselves bound by contractual severability\n                                            provisions
        or provisions stating that an agreement may only be amended in writing.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(n)</TD><TD>Pursuant
        to Swiss law, any mandate, power of attorney or instruction provided\n                                            to,
        or appointment of, an agent may be terminated at any time by the principal
        or the agent,\n                                            notwithstanding
        such mandate, power of attorney, instruction or appointment being stated\n
        \                                           to be irrevocable.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 7; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: right; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->7<!-- Field: /Sequence -->/8</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        right; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><IMG SRC=\"tm2317905d2_ex5-2img001.jpg\"
        ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(o)</FONT></TD><TD><FONT
        STYLE=\"font-size: 10pt\">Pursuant\n                                            to
        the Private International Law Act, the Swiss Code of Civil Procedure of December</FONT>&nbsp;19,\n
        \                                           2008, as amended, and bilateral
        and international treaties by which Switzerland is bound\n                                            (including,
        but not limited to, the Lugano Convention), as applicable, Swiss courts may
        order\n                                            preliminary measures even
        where they do not have jurisdiction over the substance of the matter.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(p)</TD><TD>We
        express no opinion as to the accuracy or completeness of the information\n
        \                                           set out in the Registration Statement.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
