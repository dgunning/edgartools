        10pt Times New Roman, Times, Serif; margin: 0pt 0\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\"><B>Credit\nSuisse AG &ndash;
        Registration Statement on Form&nbsp;F-3</B></FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif; font-size: 10pt\">We,\nHomburger AG, have acted
        as special Swiss counsel to Credit Suisse AG (<B>CS</B>) in connection with
        the issuance of Securities (as defined\nbelow) by CS, acting through either
        its head office or one of its branches, under the registration statement on
        Form&nbsp;F-3 (excluding\nthe documents incorporated by reference therein,
        the <B>Registration Statement</B>) to be filed by CS under the United States
        Securities\nAct of 1933, as amended (the <B>Securities Act</B>), with the
        U.S. Securities and Exchange Commission (the <B>SEC</B>) on or about </FONT>June&nbsp;8,\n2023,
        for the purpose of registering on or after the date hereof offerings by CS,
        acting through either its head office or one of its\nbranches, of (i)&nbsp;one
        or more series of senior or subordinated debt securities (the <B>Debt Securities</B>)
        to be issued by it on\nor after the date hereof in accordance with the applicable
        Indenture (as defined below) and (ii)&nbsp;warrants (the <B>Warrants</B> and,\ntogether
        with the Debt Securities, the <B>Securities</B>) to be issued by it on or
        after the date hereof in accordance with the Warrants\nAgreement (as defined
        below), in each case, on the terms and conditions described in the Registration
        Statement. As such counsel, we\nhave been requested to give our opinion as
        to certain matters of Swiss law relating to the Securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\">I.</TD><TD STYLE=\"text-align:
        justify\">Basis of Opinion</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">This opinion is confined to
        and given on the basis of the laws of\nSwitzerland in force at the date hereof.
        Such laws and the interpretation thereof are subject to change. This opinion
        is also confined\nto the matters stated herein and the Documents (as defined
        below), and is not to be read as extending, by implication or otherwise, to\nany
        agreement or other document referred to in any of the Documents (including,
        in the case of the Registration Statement, any document\nincorporated by reference
        therein or exhibited thereto) or any other matter.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
