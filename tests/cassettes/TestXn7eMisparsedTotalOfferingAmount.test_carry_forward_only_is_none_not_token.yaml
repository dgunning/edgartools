        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Unless otherwise specified
        in the applicable prospectus supplement, for purposes of determining the amount
        of discount that has accrued as of any date on which a redemption, repayment
        or acceleration of maturity occurs for an original issue discount note, the
        discount will be accrued using a constant yield method. The constant yield
        will be calculated using a 30-day month, 360-day year convention, a compounding
        period that, except for the initial period (as defined below), corresponds
        to the shortest period between interest payment dates for the applicable original
        issue discount note (with ratable accruals within a compounding period), a
        coupon rate equal to the initial coupon rate applicable to such original issue
        discount note and an assumption that the maturity of such original issue discount
        note will not be accelerated. If the period from the date of issue to the
        initial interest payment date, or the initial period, for an original issue
        discount note is shorter than the compounding period for such original issue
        discount note, a proportionate amount of the yield for an entire compounding
        period will be accrued. If the initial period is longer than the compounding
        period, then such period will be divided into a regular compounding period
        and a short period with the short period being treated as provided in the
        preceding sentence. The accrual of the applicable discount may differ from
        the accrual of original issue discount for purposes of the Internal Revenue
        Code of 1986, as amended (the &#8220;Code&#8221;). </font>\n        </div>\n
