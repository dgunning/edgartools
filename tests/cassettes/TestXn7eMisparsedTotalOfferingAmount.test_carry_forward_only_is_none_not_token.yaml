        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Only the depositary may exercise
        the repayment option in respect of global securities representing book-entry
        debt securities. Accordingly, beneficial owners of global securities that
        desire to have all or any portion of book-entry debt securities represented
        by global securities repaid must direct the participant of the depositary
        through which they own their interest to direct the depositary to exercise
        the repayment option on their behalf by delivering the related global security
        and duly completed election form to the trustee as aforesaid. In order to
        ensure that the global security and election form are received by the trustee
        on a particular day, the applicable beneficial owner must so direct the participant
        through which it owns its interest before that participant&#8217;s deadline
        for accepting instructions for that day. Different firms may have different
        deadlines for accepting instructions from their customers. Accordingly, beneficial
        owners should consult the participants through which they own their interest
        for the respective deadlines of those participants. All instructions given
        to participants from beneficial owners of global securities relating to the
        option to elect repayment will be irrevocable. In addition, at the time instructions
        are given by a beneficial owner, the beneficial owner must cause the participant
        through which it owns its interest to transfer that beneficial owner&#8217;s
        interest in the global security or securities representing the related book-entry
        debt securities, on the depositary&#8217;s records, to the trustee. We refer
        you to &#8220;&#8212; Book-Entry System.&#8221; Debt securities denominated
        in a foreign currency may be subject to different restrictions on repayment.
        We refer you to &#8220;Special Provisions Relating to Debt Securities Denominated
        in a Foreign Currency&#8201;&#8212;&#8201;Minimum Denominations, Restrictions
