        such rate, under the caption &#8220;U.S. Government Securities/Treasury Bills
        (Secondary Market).&#8221; In the event such rate is not published in H.15(519),
        H.15 daily update or another recognized electronic source by 3:00&#160;p.m.,
        New York City time, on such calculation date, the calculation agent will calculate
        the Treasury rate, which will be a bond equivalent yield of the arithmetic
        mean of the secondary market bid rates, as of approximately 3:30&#160;p.m.,
        New York City time, on such interest determination date, of three leading
        primary U.S. government securities dealers (which may include Credit Suisse
        Securities (USA) LLC) selected and identified by us or by the calculation
        agent (after consultation with us), as applicable, for the issue of Treasury
        bills with a remaining maturity closest to the index maturity designated in
        the applicable prospectus supplement; provided, however, that if the dealers
        selected by us or the calculation agent, as applicable, are not quoting bid
        rates as mentioned in this sentence, the Treasury rate with respect to the
        interest determination date will be the same as the Treasury rate in effect
        for the immediately preceding interest reset period (or, if there was no preceding
        interest reset period, the rate of interest will be the initial interest rate).
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        term &#8220;bond equivalent yield&#8221; means a yield (expressed as a&#160;percentage)
        calculated in accordance with the following formula: </font>\n        </div>\n
        \       <div style=\"position:relative;margin-top:10.3pt; text-align:center;
        width:456pt;\">\n          <img src=\"eq_moneymark04-bw.jpg\" alt=\"[MISSING
        IMAGE: eq_moneymark04-bw.jpg]\" height=\"32\" width=\"259\" >\n        </div>\n
        \       <div style=\"margin-top:13.6pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">where &#8220;D&#8221; refers
        to the applicable per annum rate for Treasury bills quoted on a bank discount
        basis, &#8220;N&#8221; refers to 365 or 366, as the case may be, and &#8220;M&#8221;
        refers to the actual number of days in the applicable interest reset period.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Indexed
        Notes</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        issuer may offer from time to time indexed notes, the return on which is linked
        to the performance of one or more underlyings or a basket of such underlyings.
        We will refer generally to each index, exchange-traded fund, equity security,
        exchange rate, commodity, commodity futures contract or any other market measure
        or reference asset as an &#8220;underlying.&#8221; The one or more underlyings
        or the basket to which the securities may be linked will be specified in the
        applicable prospectus supplement, along with any terms applicable to such
        indexed note. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">An
        investment in indexed notes has significant risks, and has risks and characteristics
