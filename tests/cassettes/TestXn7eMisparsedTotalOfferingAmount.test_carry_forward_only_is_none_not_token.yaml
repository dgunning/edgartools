        if any, applicable to a series of debt securities may decline on each anniversary
        of the initial redemption date by an amount equal to the applicable annual
        redemption&#160;percentage reduction, if any, until the redemption price is
        equal to 100% of the unpaid principal amount to be redeemed. The redemption
        price of original issue discount notes is described above under &#8220;&#8212;
        Original Issue Discount Notes.&#8221; </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
