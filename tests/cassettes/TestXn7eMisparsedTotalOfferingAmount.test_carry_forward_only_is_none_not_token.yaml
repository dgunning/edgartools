        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">TAXATION</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">United
        States Taxation</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        following is a summary of material U.S. federal income tax considerations
        that may be relevant to a beneficial owner of debt securities. This summary
        is based on laws, regulations, rulings and decisions now in effect, all of
        which are subject to change, possibly with retroactive effect. For a discussion
        of material U.S. federal income tax considerations of holding convertible
        or exchangeable debt or warrants we refer you to the applicable prospectus
        supplement. For a discussion of material U.S. federal income tax considerations
        of holding subordinated debt securities, to the extent they differ from the
        following summary, we refer you to the applicable prospectus supplement. For
        purposes of this summary, a &#8220;U.S. holder&#8221; means a citizen or resident
        of the United States or a domestic corporation or a holder that is otherwise
        subject to U.S. federal income tax on a net income basis in respect of our
        securities. A &#8220;Non-U.S. holder&#8221; means a holder that is not a U.S.
        holder. This summary does not purport to be a comprehensive description of
        all of the tax considerations that may be relevant to a decision to purchase
        our securities. In particular, the summary deals only with holders who will
        hold our securities as capital assets. This summary does not address the tax
        treatment of holders that may be subject to special tax rules, such as banks,
        insurance companies, regulated investment companies, dealers in securities
        or currencies, tax exempt entities, financial institutions, traders in securities
        that elect to use the mark-to-market method of accounting for their securities,
        expatriates, nonresident alien individuals present in the United States for
        more than 182&#160;days in a taxable year, persons subject to the alternative
        minimum tax, U.S. holders whose functional currency is not the U.S. dollar,
        partnerships (for U.S. tax purposes) that hold our securities or partners
        therein, or persons that hedge their exposure in our securities or will hold
        our securities as a position in a &#8220;straddle&#8221; or &#8220;conversion&#8221;
        transaction or as part of a &#8220;synthetic security&#8221; or other integrated
        financial transaction. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">This
        discussion does not address U.S. state, local and non-U.S. tax consequences,
        the Medicare tax on certain investment income or special timing rules prescribed
        under section 451(b) of the Code. You should consult your tax adviser with
        respect to the U.S. federal, state, local and foreign tax consequences of
        acquiring, owning or disposing of our securities in your particular circumstances.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">U.S.
        Holder</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Payments
        or Accruals of Interest</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Payments
        or accruals of &#8220;qualified stated interest&#8221; &#8203;(as defined
        below) on a debt security and Additional Amounts, if any (i.e., without reduction
        for any applicable withholding taxes), but excluding any pre-issuance accrued
        interest, will be taxable to you as ordinary interest income at the time that
        you receive or accrue such amounts (in accordance with your regular method
        of tax accounting). If you use the cash method of tax accounting and you receive
        payments of interest pursuant to the terms of a debt security in a currency
        other than U.S. dollars, which we refer to as a foreign currency, the amount
        of interest income you will realize will be the U.S. dollar value of the foreign
        currency payment based on the exchange rate in effect on the date you receive
        the payment, regardless of whether you convert the payment into U.S. dollars.
        If you are an accrual-basis U.S. holder, the amount of interest income you
        will realize will be based on the average exchange rate in effect during the
        interest accrual period (or with respect to an interest accrual period that
        spans two taxable&#160;years, at the average exchange rate for the partial
        period within the taxable year). Alternatively, as an accrual-basis U.S. holder,
        you may elect to translate all interest income on foreign currency-denominated
        debt securities at the spot rate on the last day of the accrual period (or
        the last day of the taxable year, in the case of an accrual period that spans
        more than one taxable year) or on the date that you receive the interest payment
        if that date is within five business days of the end of the accrual period.
        If you make this election, you must apply it consistently to all debt instruments
        from year to year and you cannot change the election without the consent of
        the U.S. Internal Revenue Service (the &#8220;IRS&#8221;). If you use the
        accrual method of accounting for tax purposes, you will recognize foreign
        currency gain or loss on the receipt of a foreign currency interest payment
        if the exchange rate in effect on the date the payment is received differs
        from the rate applicable to a previous accrual of that interest income. Amounts
        attributable to any pre-issuance accrued interest will generally not be includible
        in income, except to the extent of foreign currency gain or loss attributable
        to any changes in exchange rates during the period between the date the U.S.
        holder </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">48</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:11.5pt;\">\n          <font
        style=\"letter-spacing:0.2pt;\">acquired the debt security and the first interest
        payment date. Foreign currency gain or loss will be treated as ordinary income
        or loss, but generally will not be treated as an adjustment to interest income
        received on the debt security. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Subject
        to generally applicable limitations and conditions, non-U.S. interest withholding
        tax paid at the appropriate rate applicable to the U.S. holder may be eligible
        for credit against such U.S. holder&#8217;s U.S. federal income tax liability.
        These generally applicable limitations and conditions include new requirements
        recently adopted by the IRS and any non-U.S. tax will need to satisfy these
        requirements in order to be eligible to be a creditable tax for a U.S. holder.
        In the case of a U.S. holder that is eligible for, and properly elects, the
        benefits of the currently applicable version of the convention signed on October&#160;2,
        1996 between the United States of America and the Swiss Confederation for
        the avoidance of double taxation with respect to taxes on income, together
        with its protocol (the &#8220;Treaty&#8221;), any Swiss tax on interest will
        be treated as meeting the new requirements and therefore as a creditable tax.
        Except in the case of any Swiss tax on interest for U.S. holders electing
        the benefits of the Treaty, the application of these requirements to any non-U.S.
        tax on interest is uncertain and we have not determined whether these requirements
        have been met. If the non-U.S. interest tax is not a creditable tax for a
        U.S. holder or the U.S. holder does not elect to claim a foreign tax credit
        for any foreign income taxes, the U.S. holder may be able to deduct the non-U.S.
        tax in computing such U.S. holder&#8217;s taxable income for U.S. federal
        income tax purposes. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Interest
        on debt securities issued by a non-U.S. branch of Credit Suisse (except in
        the case of interest paid through its Cayman branch) and Additional Amounts
        generally will constitute income from sources without the United States for
        U.S. foreign tax credit purposes, and, for U.S. holders that elect to claim
        foreign tax credits, generally will constitute &#8220;passive category income&#8221;
        for foreign tax credit purposes. The calculation of foreign tax credits and,
        in the case of a U.S. holder that elects to deduct foreign taxes, the availability
        of deductions, involves the application of rules that depend on a U.S. holder&#8217;s
        particular circumstances. You should consult your own tax advisors regarding
        the availability of foreign tax credits and the treatment of Additional Amounts.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Purchase,
        Sale and Retirement of Debt Securities</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Initially,
        your tax basis in a debt security generally will equal the cost of the debt
        security to you. Your basis will increase by any amounts that you are required
        to include in income under the rules governing original issue discount and
        market discount, and will decrease by the amount of any amortized premium
        and any payments other than qualified stated interest made on the debt security.
        (The rules for determining these amounts are discussed below.) If you purchase
        a debt security that is denominated in a foreign currency, the cost to you
        (and therefore generally your initial tax basis) will be the U.S. dollar value
        of the foreign currency purchase price on the date of purchase calculated
        at the exchange rate in effect on that date. If the debt security denominated
        in a foreign currency is traded on an established securities market and you
        are a cash-basis taxpayer (or if you are an accrual-basis taxpayer that makes
        a special election), you will determine the U.S. dollar value of the cost
        of the debt security by translating the amount of the foreign currency that
        you paid for the debt security at the spot rate of exchange on the settlement
        date of your purchase. The amount of any subsequent adjustments to your tax
        basis in a debt security in respect of foreign currency-denominated original
        issue discount, market discount and premium will be determined in the manner
        described below. If you convert U.S. dollars into a foreign currency and then
        immediately use that foreign currency to purchase a debt security, you generally
        will not have any taxable gain or loss as a result of the conversion or purchase.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">When
        you sell or exchange a debt security, or if a debt security that you hold
        is retired, you generally will recognize gain or loss equal to the difference
        between the amount you realize on the transaction (less any accrued qualified
        stated interest, which will be subject to tax in the manner described above
        under &#8220;&#8212;&#160;Payments or Accruals of Interest&#8221;) and your
        tax basis in the debt security. If you sell or exchange a debt security for
        a foreign currency, or receive foreign currency on the retirement of a debt
        security, the amount you will realize for U.S. tax purposes generally will
        be the U.S. dollar value of the foreign currency that you receive calculated
        at the exchange rate in effect on the date the debt security denominated in
        a foreign currency is disposed of or retired. If you dispose of a debt security
        denominated in a foreign currency that is traded on an established securities
        market and you are a cash-basis U.S. holder (or if you are an accrual-basis
        holder that makes a special election), you will determine the U.S. dollar
        value of the amount realized </font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">49</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:11.5pt;\">\n          <font
        style=\"letter-spacing:0.2pt;\">by translating the amount of the foreign currency
        that you received on the debt security at the spot rate of exchange on the
        settlement date of the sale, exchange or retirement. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The special election available
        to you if you are an accrual-basis taxpayer in respect of the purchase and
        sale of debt securities denominated in a foreign currency traded on an established
        securities market, which is discussed in the two preceding paragraphs, must
        be applied consistently to all debt instruments from year to year and cannot
        be changed without the consent of the IRS. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Except as discussed below
        with respect to market discount, short-term notes (as defined below), and
        foreign currency gain or loss, the gain or loss that you recognize on the
        sale, exchange or retirement of a debt security generally will be capital
        gain or loss. The gain or loss on the sale, exchange or retirement of a debt
        security will be long-term capital gain or loss if you have held the debt
        security for more than one year on the date of disposition. Net long-term
        capital gain recognized by an individual U.S. holder generally will be subject
        to tax at the lower rate than net short-term capital gain or ordinary income.
        The ability of U.S. holders to offset capital losses against ordinary income
        is limited. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Despite
        the foregoing, the gain or loss that you recognize on the sale, exchange or
        retirement of a debt security denominated in a foreign currency generally
        will be treated as ordinary income or loss to the extent that the gain or
        loss is attributable to changes in exchange rates during the period in which
        you held the debt security. This foreign currency gain or loss will not be
        treated as an adjustment to interest income that you receive on the debt security.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Original
        Issue Discount</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        we issue a series of debt securities at a discount from their stated redemption
        price at maturity, and the discount is equal to or more than a statutory de
        minimis amount (i.e., generally the product of one-fourth of one&#160;percent
        (0.25%) of the stated redemption price at maturity of the series of debt securities
        multiplied by the number of full&#160;years to their maturity), the series
        of debt securities will be original issue discount notes. The difference between
        the issue price and the stated redemption price at maturity of the series
        of debt securities will be the &#8220;original issue discount.&#8221; The
        &#8220;issue price&#8221; of the original discount notes will be the first
        price at which a substantial amount of the original issue discount notes are
        sold to the public (i.e., excluding sales of original issue discount notes
        to Credit Suisse Securities (USA) LLC, underwriters, placement agents, wholesalers,
        or similar persons). The &#8220;stated redemption price at maturity&#8221;
        will include all payments under the original issue discount notes other than
        payments of qualified stated interest. The term &#8220;qualified stated interest&#8221;
        generally means stated interest that is unconditionally payable in cash or
        property (other than debt instruments issued by us) at least annually during
        the entire term of an original issue discount note at a single fixed interest
        rate or, subject to certain conditions, based on one or more interest indices.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        you invest in an original issue discount note, you generally will be subject
        to the special tax accounting rules for original issue discount obligations
        provided by the Code and certain U.S. Treasury regulations. You should be
        aware that, as described in greater detail below, if you invest in an original
        issue discount note, you generally will be required to include original issue
        discount in ordinary gross income for U.S. federal income tax purposes as
        it accrues, although you may not yet have received the cash attributable to
        that income. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        general, and regardless of whether you use the cash or the accrual method
        of tax accounting, if you are the holder of an original issue discount note
        with a maturity greater than one year, you will be required to include in
        ordinary gross income the sum of the &#8220;daily portions&#8221; of original
        issue discount on that original issue discount note for all days during the
        taxable year that you own the original issue discount note. The daily portions
        of original issue discount on an original issue discount note are determined
        by allocating to each day in any accrual period a ratable portion of the original
        issue discount allocable to that period. Accrual periods may be any length
        and may vary in length over the term of an original issue discount note, so
        long as no accrual period is longer than one year and each scheduled payment
        of principal or interest occurs on the first or last day of an accrual period.
        If you are the initial holder of the original issue discount note, the amount
        of original issue discount on an original issue discount note allocable to
        each accrual period is determined by (a)&#160;multiplying the &#8220;adjusted
        issue price&#8221; &#8203;(as defined below) of the original issue discount
        note at the beginning of the accrual period by a fraction, the numerator of
        which is the annual yield to maturity (defined below) of the original issue
        discount note and the denominator of which is the number of accrual </font>\n
        \       </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">50</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:11.5pt;\">\n          <font
        style=\"letter-spacing:0.2pt;\">periods in a year; and (b)&#160;subtracting
        from that product the amount (if any) payable as qualified stated interest
        allocable to that accrual period. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        the case of an original issue discount note that is a floating rate note,
        both the &#8220;annual yield to maturity&#8221; and the qualified stated interest
        will be determined for these purposes as though the original issue discount
        note will bear interest in all periods at a fixed rate generally equal to
        the rate that would be applicable to interest payments on the original issue
        discount note on its date of issue or, in the case of some floating rate notes,
        the rate that reflects the yield that is reasonably expected for the original
        issue discount note. (Additional rules may apply if interest on a floating
        rate note is based on more than one interest index.) The &#8220;adjusted issue
        price&#8221; of an original issue discount note at the beginning of any accrual
        period will generally be the sum of its issue price and the amount of original
        issue discount allocable to all prior accrual periods, reduced by the amount
        of all payments other than any qualified stated interest payments on the original
        issue discount note in all prior accrual periods. All payments on an original
        issue discount note (other than qualified stated interest) will generally
        be viewed first as payments of previously accrued original issue discount
        (to the extent of the previously accrued discount and to the extent that the
        discount has not been allocated to prior cash payments on the note), and then
        as a payment of principal. The &#8220;annual yield to maturity&#8221; of an
        original issue discount note is the discount rate (appropriately adjusted
        to reflect the length of accrual periods) that causes the present value on
        the issue date of all payments on the original issue discount note to equal
        the issue price. As a result of this &#8220;constant yield&#8221; method of
        including original issue discount income, the amounts you will be required
        to include in your gross income if you invest in an original issue discount
        note denominated in U.S. dollars generally will be lesser in the early&#160;years
        and greater in the later&#160;years than amounts that would be includible
        on a straight-line basis. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">You
        generally may make an irrevocable election to include in income your entire
        return on a debt security (i.e., the excess of all remaining payments to be
        received on the debt security, including payments of qualified stated interest,
        over the amount you paid for the debt security) under the constant yield method
        described above. If you purchase debt securities at a premium or market discount
        and if you make this election, you will also be deemed to have made the election
        (discussed below under &#8220;&#8212; Premium&#8221; and &#8220;&#8212;&#160;Market
        Discount&#8221;) to amortize premium or to accrue market discount currently
        on a constant yield basis in respect of all other premium or market discount
        bonds that you hold. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        the case of an original issue discount note that is also a foreign currency
        denominated debt security, you should determine the U.S. dollar amount includible
        as original issue discount for each accrual period by (a)&#160;calculating
        the amount of original issue discount allocable to each accrual period in
        the foreign currency using the constant yield method described above and (b)&#160;translating
        that foreign currency amount at the average exchange rate in effect during
        that accrual period (or, with respect to an interest accrual period that spans
        two taxable&#160;years, at the average exchange rate for each partial period).
        Alternatively, you may translate the foreign currency amount at the spot rate
        of exchange on the last day of the accrual period (or the last day of the
        taxable year, for an accrual period that spans two taxable&#160;years) or
        at the spot rate of exchange on the date of receipt, if that date is within
        five business days of the last day of the accrual period, provided that you
        have made the election described above under &#8220;&#8212; Payments or Accruals
        of Interest.&#8221; Because exchange rates may fluctuate, if you are the holder
        of an original issue discount note that is also a foreign currency denominated
        debt security, you may recognize a different amount of original issue discount
        income in each accrual period than would be the case if you were the holder
        of an otherwise similar original issue discount note denominated in U.S. dollars.
        Upon the receipt of an amount attributable to original issue discount (whether
        in connection with a payment of an amount that is not qualified stated interest
        or the sale or retirement of the original issue discount note), you will recognize
        ordinary income or loss measured by the difference between the amount received
        (translated into U.S. dollars at the exchange rate in effect on the date of
        receipt or on the date of disposition of the original issue discount note,
        as the case may be) and the amount accrued (using the exchange rate applicable
        to such previous accrual). </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        you purchase an original issue discount note outside of the initial offering
        at a cost less than its remaining redemption amount (i.e., the total of all
        future payments to be made on the original issue discount note other than
        payments of qualified stated interest), or if you purchase an original issue
        discount note in the initial offering at a price other than the original issue
        discount note&#8217;s issue price, you generally will also be required to
        include in gross income the daily portions of original issue discount, calculated
        as described above. However, if you acquire an original issue discount note
        at a price greater than its adjusted </font>\n        </div>\n      </div>\n
        \     <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">51</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:52pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">issue
        price, you will be required to reduce your periodic inclusions of original
        issue discount to reflect the premium paid over the adjusted issue price.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Floating
        rate notes generally will be treated as &#8220;variable rate debt instruments&#8221;
        under the original issue discount regulations. Accordingly, the stated interest
        on a floating rate note generally will be treated as &#8220;qualified stated
        interest&#8221; and such a floating rate note will not have original issue
        discount solely as a result of the fact that it provides for interest at a
        variable rate. If a floating rate note does not qualify as a &#8220;variable
        rate debt instrument,&#8221; the floating rate note will be subject to special
        rules that govern the tax treatment of debt obligations that provide for contingent
        payments. We will provide a detailed description of the tax considerations
        relevant to U.S. holders of any such debt securities in the applicable prospectus
        supplement. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Certain
        original issue discount notes may be redeemed prior to maturity, either at
        our option or at the option of the holder, or may have special repayment or
        interest rate reset features as indicated in the applicable prospectus supplement.
        Original issue discount notes containing these features may be subject to
        rules that differ from the general rules discussed above. If you purchase
        original issue discount notes with these features, you should carefully examine
        the applicable prospectus supplement and consult your tax adviser about their
        treatment since the tax consequences of original issue discount will depend,
        in part, on the particular terms and features of the original issue discount
        notes. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Short-Term
        Notes</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        rules described above will also generally apply to original issue discount
        notes with maturities of one year or less, which we refer to as short-term
        notes, but with some modifications. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">First, the original issue
        discount rules treat none of the interest on a short-term note as qualified
        stated interest, but treat a short-term note as having original issue discount.
        Thus, all short-term notes will be original issue discount notes. Except as
        noted below, if you are a cash-basis holder of a short-term note and you do
        not identify the short-term note as part of a hedging transaction you will
        generally not be required to accrue original issue discount currently, but
        you will be required to treat any gain realized on a sale, exchange or retirement
        of the short-term note as ordinary income to the extent such gain does not
        exceed the original issue discount accrued with respect to the short-term
        note during the period you held the short-term note. You may not be allowed
        to deduct all of the interest paid or accrued on any indebtedness incurred
        or maintained to purchase or carry a short-term note until the maturity of
        the short-term note or its earlier disposition in a taxable transaction. Notwithstanding
        the foregoing, if you are a cash-basis U.S. holder of a short-term note, you
        may elect to accrue original issue discount on a current basis (in which case
        the limitation on the deductibility of interest described above will not apply).
        A U.S. holder using the accrual method of tax accounting and some cash method
        holders (including banks, securities dealers, regulated investment companies
        and certain trust funds) generally will be required to include original issue
        discount on a short-term note in gross income on a current basis. Original
        issue discount will be treated as accruing for these purposes on a ratable
        basis or, at the election of the holder, on a constant yield basis based on
        daily compounding. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Second,
        regardless of whether you are a cash-basis or accrual-basis holder, if you
        are the holder of a short-term note you may elect to accrue any &#8220;acquisition
        discount&#8221; with respect to the short-term note on a current basis. Acquisition
        discount is the excess of the remaining redemption amount of the short-term
        note at the time of acquisition over the purchase price. Acquisition discount
        will be treated as accruing ratably or, at the election of the holder, under
        a constant yield method based on daily compounding. If you elect to accrue
        acquisition discount, the original issue discount rules will not apply. </font>\n
        \       </div>\n        <div style=\"margin-left:20pt; margin-top:8pt; width:436pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Finally,
        the market discount rules described below will not apply to short-term notes.
        </font>\n        </div>\n      </div>\n      <div style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">52</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Premium</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        you purchase a debt security at a cost greater than the debt security&#8217;s
        remaining redemption amount, you will be considered to have purchased the
        debt security at a premium, and you may elect to amortize the premium as an
        offset to interest income, using a constant yield method, over the remaining
        term of the debt security. If you make this election, it generally will apply
        to all debt instruments that you hold at the time of the election, as well
        as any debt instruments that you subsequently acquire. In addition, you may
        not revoke the election without the consent of the IRS. If you elect to amortize
        the premium, you will be required to reduce your tax basis in the debt security
        by the amount of the premium amortized during your holding period. Original
        issue discount notes purchased at a premium will not be subject to the original
        issue discount rules described above. In the case of premium on a foreign
        currency denominated debt security, you should calculate the amortization
        of the premium in the foreign currency. Premium amortization deductions attributable
        to a period reduce interest income in respect of that period, and therefore
        are translated into U.S. dollars at the rate that you use for interest payments
        in respect of that period. Exchange gain or loss will be realized with respect
        to amortized premium on a foreign currency denominated debt security based
        on the difference between the exchange rate computed on the date or dates
        the premium is amortized against interest payments on the debt security and
        the exchange rate on the date the holder acquired the debt security. If you
        do not elect to amortize premium, the amount of premium will be included in
        your tax basis in the debt security. Therefore, if you do not elect to amortize
        premium and you hold the debt security to maturity, you generally will be
        required to treat the premium as capital loss when the debt security matures.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Market
        Discount</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If you
        purchase a debt security at a price that is lower than the debt security&#8217;s
        remaining redemption amount (or in the case of an original issue discount
        note, the original issue discount note&#8217;s adjusted issue price), by 0.25%
        or more of the remaining redemption amount (or adjusted issue price), multiplied
        by the number of remaining whole&#160;years to maturity, the debt security
        will be considered to bear &#8220;market discount&#8221; in your hands. In
        this case, any gain that you realize on the disposition of the debt security
        generally will be treated as ordinary interest income to the extent of the
        market discount that accrued on the debt security during your holding period.
        In addition, you may be required to defer the deduction of a portion of the
        interest paid on any indebtedness that you incurred or maintained to purchase
        or carry the debt security. In general, market discount will be treated as
        accruing ratably over the term of the debt security, or, at your election,
        under a constant yield method. You must accrue market discount on a foreign
        currency denominated debt security in the specified currency. The amount that
        you will be required to include in income in respect of accrued market discount
        will be the U.S. dollar value of the accrued amount, generally calculated
        at the exchange rate in effect on the date that you dispose of the debt security.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">You
        may elect to include market discount in gross income currently as it accrues
        (on either a ratable or constant yield basis), in lieu of treating a portion
        of any gain realized on a sale of the debt security as ordinary income. If
        you elect to include market discount on a current basis, the interest deduction
        deferral rule described above will not apply. If you do make such an election,
        it will apply to all market discount debt instruments that you acquire on
        or after the first day of the first taxable year to which the election applies.
        The election may not be revoked without the consent of the IRS. Any accrued
        market discount on a foreign currency denominated debt security that is currently
        includible in income will be translated into U.S. dollars at the average exchange
        rate for the accrual period (or portion thereof within the holder&#8217;s
        taxable year). </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Indexed
        Notes and Other Debt Securities Providing for Contingent Payments</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Special rules govern the tax
        treatment of debt obligations that provide for contingent payments, which
        we refer to as contingent debt obligations. These rules generally require
        accrual of interest income on a constant yield basis in respect of contingent
        debt obligations at a yield determined at the time of issuance of the obligation,
        and may require adjustments to these accruals when any contingent payments
        are made. We will provide a detailed description of the tax considerations
        relevant to U.S. holders of any contingent debt obligations in the applicable
        prospectus supplement. </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">53</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:16pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Foreign Currency Notes and
        Reportable Transactions</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">A
        U.S. holder that participates in a &#8220;reportable transaction&#8221; will
        be required to disclose its participation to the IRS. The scope and application
        of these rules is not entirely clear. A U.S. holder may be required to treat
        a foreign currency exchange loss relating to a debt obligation denominated
        in a foreign currency as a reportable transaction if the loss exceeds $50,000
        in a single taxable year if the U.S. holder is an individual or trust, or
        higher amounts for other U.S. holders. In the event the acquisition, ownership
        or disposition of a foreign currency debt obligation constitutes participation
        in a &#8220;reportable transaction&#8221; for purposes of these rules, a U.S.
        holder will be required to disclose its investment to the IRS, currently on
        Form 8886. Prospective purchasers should consult their tax advisors regarding
        the application of these rules to the acquisition, ownership or disposition
        of a foreign currency debt obligation. </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Specified Foreign Financial
        Assets</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Individual
        U.S. holders that own &#8220;specified foreign financial assets&#8221; with
        an aggregate value in excess of $50,000 on the last day of the taxable year
        or $75,000 at any time during the taxable year are generally required to file
        an information statement along with their tax returns, currently on Form 8938,
        with respect to such assets. &#8220;Specified foreign financial assets&#8221;
        include any financial accounts held at a non-U.S. financial institution, as
        well as securities held for investment issued by a non-U.S. issuer (which
        may include debt obligations issued in certificated form) that are not held
        in accounts maintained by financial institutions. Higher reporting thresholds
        apply to certain individuals living abroad and to certain married individuals.
        Regulations extend this reporting requirement to certain entities that are
        treated as formed or availed of to hold direct or indirect interests in specified
        foreign financial assets based on certain objective criteria. U.S. holders
        who fail to report the required information could be subject to substantial
        penalties. In addition, the statute of limitations of assessment of tax would
        be suspended, in whole or in part. Prospective investors should consult their
        own tax advisors concerning the application of these rules to their investment
        in a debt security, including the application of the rules to their particular
        circumstances. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">Non-U.S. Holder</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">This
        section &#8220;Non-U.S. Holder&#8221; applies to non-U.S. holders who hold
        debt securities issued by Credit Suisse, acting through a U.S. branch or through
        its Cayman branch. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Under
        present United States federal tax law, and subject to the discussion below
        concerning backup withholding and FATCA: </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">(a)&#8199;Payments of interest
        (including original issue discount) on a debt security to you will not be
        subject to the 30% U.S. federal withholding tax, provided that: </font>\n
        \       </div>\n        <div style=\" float:left; margin-left:20pt; line-height:12pt;
        margin-top:8pt; margin-bottom:0pt; text-align:left; width:20pt;white-space:nowrap;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">1.</font>\n          <br >\n
        \       </div>\n        <div style=\" margin-top:8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:40pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">you do not actually or constructively
        own 10% or more of the total combined voting power of all classes of our stock
        entitled to vote and are not a controlled foreign corporation related to us
        actually or constructively through stock ownership; and </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:8pt;
        margin-bottom:0pt; text-align:left; width:20pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">2.</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:40pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">you provide a statement signed
        under penalties of perjury that includes your name and address and certify
        that you are a non-U.S. holder in compliance with applicable requirements
        by completing an applicable Form W-8BEN or W-8BEN-E (or successor form), or
        otherwise satisfy documentary evidence requirements for establishing that
        you are a non-U.S. holder. </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Payments of interest (including
        original issue discount) on the debt security that do not qualify for the
        portfolio interest exception will be subject to the 30% U.S. federal withholding
        tax, unless a U.S. income tax treaty applies to reduce or eliminate withholding.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">(b)&#8199;You
        will not be subject to U.S. federal income tax on any gain realized on the
        sale, exchange or retirement of the debt security. </font>\n        </div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">54</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Information Reporting and
        Backup Withholding</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Information
        returns will be required to be filed with the IRS in connection with debt
        security payments made to certain United States taxpayers. If you are a United
        States taxpayer, you generally will not be subject to a United States backup
        withholding tax (currently at a rate of 24%) on such payments if you provide
        your taxpayer identification number to the paying agent. You may also be subject
        to information reporting and backup withholding tax requirements with respect
        to the proceeds from a sale of the debt securities. If you are a non-U.S.
        taxpayer, you may have to comply with certification procedures to establish
        that you are a non-U.S. taxpayer in order to avoid information reporting and
        backup withholding tax requirements. Any amounts withheld under the backup
        withholding rules may be allowed as a credit against the holder&#8217;s U.S.
        federal income tax liability and may entitle the holder to a refund, provided
        that the required information is timely furnished to the IRS. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Foreign Account Tax Compliance
        Act</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Pursuant
        to FATCA, and potentially subject to grandfathering rules discussed below,
        the issuer and other financial institutions in the chain of payments on the
        debt securities may be required to withhold U.S. tax on payments to an investor
        who does not provide information sufficient for the financial institution
        to determine whether the investor is a U.S. person or should otherwise be
        treated as holding a &#8220;United States account&#8221; of such institution,
        or to an investor that is, or holds the debt securities directly or indirectly
        through, a non-U.S. financial institution that is not in compliance with FATCA.
        Even if withholding is not required, to permit a financial institution in
        the chain of payments on the debt securities to comply with diligence and
        reporting obligations imposed on it under FATCA, an investor may be required
        to provide the institution information regarding the investor&#8217;s identity,
        and in the case of an investor that is an entity, the investor&#8217;s direct
        and indirect owners, and this information may be reported to applicable tax
        authorities (including to the IRS). </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">If a debt security is subject
        to FATCA withholding (under the circumstances described below), such withholding
        will apply at a 30% rate to payments of interest to an investor or intermediary
        that does not comply with FATCA. Unless we tell you otherwise in the applicable
        prospectus supplement, FATCA withholding will apply to a debt security only
        if Credit Suisse issues the debt security through a U.S. branch or through
        its Cayman branch. Otherwise, under a grandfathering rule, FATCA withholding
        will not apply to a debt security provided that the debt security is not issued
        or materially modified after the date on which final regulations implementing
        withholding on such debt securities are filed by the U.S. Treasury Department.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        any amount of, or in respect of, U.S. withholding tax were to be deducted
        or withheld from payments on the debt securities as a result of a failure
        by an investor (or by an institution through which an investor holds the debt
        securities) to comply with FATCA, neither the issuer nor any paying agent
        nor any other person would, pursuant to the terms of the debt securities,
        be required to pay additional amounts with respect to any debt securities
        as a result of the deduction or withholding of such tax. Holders should consult
        their own tax advisors about how the FATCA rules may apply to payments they
        receive in respect of the debt securities. </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Swiss Taxation</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The following is a summary
        of the principal tax consequences of holding debt securities for investors
        who are not residents of Switzerland for tax purposes and have no Swiss permanent
        establishment and do not conduct a Swiss-based trade or business. It does
        not address the tax treatment of holders of debt securities who are residents
        of Switzerland for tax purposes or who are subject to Swiss taxes for other
        reasons. This summary is based on legislation as of the date of this prospectus
        and does not aim to be a comprehensive description of all the Swiss tax considerations
        that may be relevant to a decision to invest in debt securities. For a discussion
        of Swiss income tax considerations of holding subordinated debt securities,
        to the extent they differ from the following summary, we refer you to the
        applicable prospectus supplement. </font>\n        </div>\n      </div>\n
        \     <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">55</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Withholding Tax</font><font
        style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\" float:left; line-height:12pt; margin-top:7.8pt;
        margin-bottom:0pt; text-align:left; width:20pt;white-space:nowrap;font-style:italic;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">(i)</font>\n          <br
        >\n        </div>\n        <div style=\" margin-top:7.8pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:20pt;font-style:italic;\">\n
        \         <!--blacklining:none;-->\n          <font style=\"letter-spacing:0.2pt;\">Interest
        payments</font><font style=\"font-style:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Payments of interest on debt
        securities issued by a branch of Credit Suisse outside Switzerland are not
        subject to Swiss withholding tax, provided that the net proceeds from the
        issue of the debt securities are used outside of Switzerland (except to the
        extent use in Switzerland is permitted under the Swiss taxation laws in force
        from time to time without payments in respect of the debt securities becoming
        subject to withholding or deduction for Swiss withholding tax as a consequence
        of such use of proceeds in Switzerland) and that such branch is at all times
        licensed to carry on banking activities in the relevant jurisdiction in which
        such branch is established outside of Switzerland and has at all times its
        fixed place of business outside Switzerland for Swiss tax purposes. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Payments
        of interest on debt securities issued by Credit Suisse acting through its
        head office may be subject to Swiss withholding tax, currently at a rate of
        35%, regardless of whether such interest is paid regularly in coupons or in
        a one-time payment upon redemption. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">On April&#160;3, 2020, the
        Swiss Federal Council published draft legislation to reform the Swiss withholding
        tax system for interest payments on bonds. This draft legislation provided
        for, among other things the replacement of the current debtor-based regime
        applicable to interest payments on bonds with a paying agent-based regime
        for Swiss withholding tax. Under such proposed paying agent-based regime,
        subject to certain exceptions, all interest payments on bonds made by paying
        agents acting out of Switzerland to individuals resident in Switzerland would
        have been subject to Swiss withholding tax, including any such interest payments
        made on bonds issued by entities organized in a jurisdiction outside Switzerland
        (such as interest payments on debt securities issued by Credit Suisse acting
        through a branch outside Switzerland). Due to the negative outcome of the
        consultation on the draft legislation, the Swiss Federal Council submitted
        new draft legislation to the Swiss Parliament that provided for the abolition
        of Swiss withholding tax on interest payments on bonds. This legislation was
        accepted by the Swiss Parliament but rejected in the subsequent public referendum
        vote on September&#160;25, 2022. In view of the rejection of this legislation,
        the Swiss Federal Council could again propose a paying agent-based regime
        as contemplated by the draft legislation published on April&#160;3, 2020.
        If such a paying agent-based regime were to be subsequently enacted, and a
        paying agent acting out of Switzerland were required to deduct or withhold
        Swiss withholding tax on any payment under any debt security, neither the
        issuer nor a paying agent nor any other person would pursuant to the conditions
        of the debt securities be obliged to pay any additional amounts with respect
        to such debt security as a result of such deduction or withholding of Swiss
        withholding tax. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;\">\n          <font style=\"letter-spacing:0.2pt;\">(ii)
        Refund of Swiss withholding tax</font><font style=\"font-style:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">A
        recipient of an interest payment on debt securities (including upon a repurchase
        for cancellation) who (i)&#160;is not resident in Switzerland and (ii)&#160;does
        not hold such debt securities in a business carried on through a permanent
        establishment in Switzerland for tax purposes, may be entitled to a full or
        partial refund of such Swiss withholding tax, if the country in which such
        holder resides for tax purposes has entered into a bilateral treaty for the
        avoidance of double taxation with Switzerland, such recipient is the beneficial
        owner of such interest payment or distribution and the conditions of the applicable
        treaty are met. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        the case of Swiss withholding tax deducted by the issuer of debt securities,
        a person who (i)&#160;is (x)&#160;a resident of the U.S. for purposes of the
        Convention between the United States of America and the Swiss Confederation
        for the Avoidance of Double Taxation (for purposes of this section (iii)&#160;and
        the section &#8220;Swiss Facilitation of the Implementation of FATCA&#8221;
        below, the &#8220;Double Taxation Treaty&#8221;) without taxable presence
        in Switzerland to which such debt securities are attributable or (y)&#160;a
        qualified U.S. pension fund and (ii)&#160;is the beneficial owner of such
        debt securities and such interest payment and meets the conditions of the
        Double Taxation Treaty, may apply for a full refund of such Swiss withholding
        tax in accordance with Article&#160;11 of the Double Taxation Treaty. The
        claim for refund must be filed on Swiss Tax Form 82 (82C for corporations,
        82I for individuals, 82E for other entities and 82R for regulated investment
        companies), which forms may, together with an instruction form, be downloaded
        from the Swiss Federal Tax Administration&#8217;s website, obtained from any
        Swiss consulate general in the U.S., or obtained from the Swiss Federal Tax
        Administration at the address below. Four copies of the applicable form must
        be duly completed and signed before a notary public of the U.S., and three
        of such completed and signed copies </font>\n        </div>\n      </div>\n
        \     <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">56</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">must
        be sent to the Swiss Federal Tax Administration, Eigerstrasse 65, 3003, Bern,
        Switzerland. The form must be accompanied by suitable evidence of deduction
        of the Swiss withholding tax, such as certificates of deduction, bank vouchers
        or credit slips. The form must be filed no later than December&#160;31 of
        the third year following the calendar year in which the interest payment subject
        to the Swiss withholding tax became payable. </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Securities Turnover Tax</font><font
        style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        issue, and the sale and delivery, of debt securities on the issue date are
        not subject to Swiss securities turnover tax (</font><font style=\"font-style:italic;letter-spacing:0.2pt;\">Umsatzabgabe</font><font
        style=\"letter-spacing:0.2pt;\">) (primary market). Secondary market dealings
        in debt securities with a term in excess of 12&#160;months where a securities
        dealer (as defined in the Swiss Act on Stamp Duties of June&#160;27, 1973,
        as amended) in Switzerland or the Principality of Liechtenstein is a party,
        or acts as an intermediary, to the transaction may be subject to Swiss turnover
        tax at a rate of up to 0.15% of the consideration paid in the case of debt
        securities issued by Credit Suisse acting through its head office and at a
        rate of up to 0.3% of such consideration paid in the case of debt securities
        issued by Credit Suisse acting through one of its branches outside of Switzerland.
        Subject to applicable statutory exemptions in respect of the one or the other
        party to the purchase and sale of debt securities, generally half of the tax
        is charged to the one party to the purchase and sale and the other half to
        the other party. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Subject
        to applicable statutory exemptions, the delivery of underlying securities
        to a holder of debt securities following exercise by such holder of exchange
        rights embedded in such debt securities, may be subject to Swiss securities
        turnover tax, in case of underlying securities issued by an issuer resident
        in Switzerland at half of the rate of 0.15%, and in case of securities issued
        by an issuer not resident in Switzerland, at half of the rate of 0.3%, however,
        in each case only if a Swiss securities dealer, as defined in the Swiss Act
        on Stamp Duties of June&#160;27, 1973, as amended, is a party or an intermediary
        to the transaction. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">Other Taxes</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Under
        current Swiss law, a holder of debt securities acquired following exercise
        of any warrants who is not resident in Switzerland and who during the taxable
        year has not engaged in trade or business through a permanent establishment
        within Switzerland and who is not subject to taxation by Switzerland for any
        other reason will not be subject to any Swiss federal, cantonal or municipal
        income or other tax on gains on the sale of, or payments received under, such
        debt securities. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">International Automatic Exchange of Information
        in Tax Matters</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Switzerland
        has concluded a multilateral agreement with the EU on the international automatic
        exchange of information (&#8220;AEOI&#8221;) in tax matters, which applies
        to all member states of the EU. In addition, Switzerland signed the multilateral
        competent authority agreement on the automatic exchange of financial account
        information (the &#8220;MCAA&#8221;) and a number of bilateral AEOI agreements
        with other countries, most of them on the basis of the MCAA. Based on these
        agreements and the implementing laws of Switzerland, Switzerland collects
        and exchanges data in respect of financial assets held in, and income derived
        thereon and credited to, accounts and deposits (including debt securities
        held in any such account or deposit) with a paying agent in Switzerland for
        the benefit of individuals resident in a member state of the EU or another
        treaty state. An up-to-date list of the AEOI agreements to which Switzerland
        is a party that are in effect or that have been entered into but are not yet
        in effect can be found on the website of the State Secretariat for International
        Financial Matters SIF. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">Swiss Facilitation of the Implementation
        of FATCA</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Switzerland
        has concluded a &#8220;Model 2&#8221; intergovernmental agreement with the
        U.S. to facilitate the implementation of U.S. Foreign Account Tax Compliance
        Act (FATCA). The agreement ensures that accounts held by US persons maintaining
        accounts with financial assets (including debt securities) held in any such
        accounts) with Swiss financial institutions are disclosed to the U.S. tax
        authorities either with the consent of the account holder or by means of group
        requests within the scope of administrative assistance on the basis of the
        Double Taxation Treaty. Since it was amended in 2019, the Double Taxation
        Treaty includes a mechanism for the exchange of information in tax matters
        upon request between Switzerland </font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">57</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Helvetica,
        Arial, sans-serif;font-size:9pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n
        \         <br >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:532pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-family:Times New Roman,
        Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:0.2pt;\">and
        the United States, allowing the United States to make group requests under
        FATCA concerning non-consenting U.S. accounts and non-consenting non-participating
        foreign financial institutions for periods from June&#160;30, 2014. Furthermore,
        on October&#160;8, 2014, the Swiss Federal Council approved a mandate for
        negotiations with the United States regarding a &#8220;Model 1&#8221; intergovernmental
        agreement that would replace the existing agreement and that would a change
        from the current direct notification-based regime to a regime where the relevant
        information is sent to the Swiss Federal Tax Administration, which in turn
        provides the information to the U.S. tax authorities. It is not yet known
        when negotiations will continue and, if they do, if and when any new regime
        would come into force.</font>\n        </div>\n      </div>\n      <div style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n
