        23.3\n<TEXT>\n<HTML>\n<HEAD>\n     <TITLE></TITLE>\n</HEAD>\n<BODY STYLE=\"font:
        10pt Times New Roman, Times, Serif\">\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: right;
        font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><B>Exhibit 23.3</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"><IMG SRC=\"tm2317905d2_ex23-3img001.jpg\"
        ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\"><B>CONSENT OF INDEPENDENT REGISTERED
        PUBLIC ACCOUNTING\nFIRM</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\">We hereby consent
        to the incorporation by reference\nin this Registration Statement on Form&nbsp;F-3
        of Credit Suisse AG of our report dated March&nbsp;14, 2023, relating to the
        financial\nstatements of Credit Suisse Group AG and its subsidiaries (the
        &quot;Group&quot;) and the Group's effectiveness of internal control over\nfinancial
        reporting, which appears in Credit Suisse Group AG's and Credit Suisse AG's
        Annual Report on Form&nbsp;20-F for the year ended\nDecember&nbsp;31, 2022.
        We also consent to the reference to us under the heading &ldquo;Experts&rdquo;
        in such Registration Statement.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">/s/ PricewaterhouseCoopers AG</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
