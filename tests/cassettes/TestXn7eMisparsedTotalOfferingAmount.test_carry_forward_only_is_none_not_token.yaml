        >\n        </div>\n        <div style=\" margin-top:12pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:41pt;font-weight:bold;\">\n
        \         <!--blacklining:none;-->\n          <font style=\"letter-spacing:-0.2pt;\">Indemnification
        of Directors and Officers</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Credit Suisse</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Under Swiss law, directors
        and senior officers acting in violation of their statutory duties&#8201;&#8212;&#8201;whether
        dealing with third parties or performing any other acts on behalf of the corporation&#8201;&#8212;&#8201;may
        become liable to the corporation, its shareholders and (in bankruptcy) its
        creditors for damages. The directors&#8217; liability is joint and several
        but only to the extent the damage is attributable to each director based on
        willful or negligent violation of duty. If the board of directors lawfully
        delegated the power to carry out day-to-day management to a different corporate
        body, e.g., the executive board, the board of directors is not vicariously
        liable for the acts of the members of the executive board. Instead, the directors
        can be held liable for their failure to properly select, instruct or supervise
        the executive board members. If directors and officers enter into a transaction
        on behalf of the corporation with third parties in violation of their statutory
        duties, the transaction is nevertheless valid as long as it is not excluded
        by the corporation&#8217;s business purpose. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse is a Swiss company
        and is headquartered in Switzerland and a number of its directors and officers
        are residents of Switzerland and not the United States. As a result, U.S.
        investors may find it difficult to serve legal process on Credit Suisse or
        those directors and executive officers or have any of them appear in a U.S.
        court. Furthermore, the United States and Switzerland do not currently have
        a treaty providing for the reciprocal recognition and enforcement of judgments,
        other than arbitration awards, in civil and commercial matters. Consequently,
        a final judgment rendered against Credit Suisse (or any of its directors or
        executive officers that are residents of Switzerland) by any U.S. federal
        or state court for payment would not automatically be enforceable in Switzerland
        and it may be difficult for you to enforce any such judgment in Switzerland
        against Credit Suisse (or such directors or executive officers). In addition,
        there is doubt as to enforceability in Switzerland, in original actions or
        in actions for enforcement of judgments of U.S. courts, of liabilities predicated
        solely upon the federal or state securities laws of the United States. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Under
        Swiss law, a company may indemnify a director or officer of the company against
        losses and expenses (unless such losses and expenses result from a culpable
        breach of such director&#8217;s or officer&#8217;s fiduciary duties under
        Swiss law), including attorney&#8217;s fees, judgments, fines and settlement
        amounts actually and reasonably incurred in a civil or criminal action, suit
        or proceeding by reason of having been the representative of or serving at
        the request of the company. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        Articles of Association of Credit Suisse, as well as Swiss statutory law,
        contain no provisions regarding the indemnification of directors and officers.
        According to general principles of Swiss employment law, an employer may,
        under certain circumstances, be required to indemnify an employee against
        losses and expenses incurred by such employee in the execution of their duties
        under the employment agreement, unless the losses and expenses arise from
        the employee&#8217;s gross negligence or willful misconduct. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">It is Credit Suisse&#8217;s
        policy to indemnify its current or former directors and/or employees against
        certain losses and expenses in respect of service as a director or employee
        of Credit Suisse, one of its affiliates or another entity that Credit Suisse
        has approved, subject to specific conditions or exclusions. Credit Suisse
        maintains directors&#8217; and officers&#8217; insurance for its directors
        and officers. </font>\n        </div>\n      </div>\n      <div style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
