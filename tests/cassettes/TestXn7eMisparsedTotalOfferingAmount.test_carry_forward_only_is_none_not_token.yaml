        /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n</BODY>\n</HTML>\n</TEXT>\n</DOCUMENT>\n<DOCUMENT>\n<TYPE>EX-5.1\n<SEQUENCE>3\n<FILENAME>tm2317905d2_ex5-1.htm\n<DESCRIPTION>EXHIBIT
        5.1\n<TEXT>\n<HTML>\n<HEAD>\n     <TITLE></TITLE>\n</HEAD>\n<BODY STYLE=\"font:
        10pt Times New Roman, Times, Serif\">\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 5in\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        right; font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 5in\"><B>Exhibit
        5.1</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><IMG SRC=\"tm2317905d2_ex5-1img001.jpg\"
        ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 5in\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; text-align: center; margin-top: 0pt; margin-bottom: 0pt\">Writer&rsquo;s
        Direct Dial:\n+44 20 7614 2237<BR>\nE-Mail: ssperber@cgsh.com</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 5in\">&nbsp;</P>\n\n<P
        STYLE=\"margin-right: 1.5in; font: 10pt Times New Roman, Times, Serif; text-align:
        right; margin-top: 0pt; margin-bottom: 0pt\">June&nbsp;8, 2023</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">Credit Suisse AG</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">Paradeplatz
        8, 8001</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">Zurich, Switzerland</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">Ladies and Gentlemen:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">We have
        acted as special United States counsel to\nCredit Suisse AG, a corporation
        organized under the laws of, and duly licensed as a bank in, Switzerland (&ldquo;Credit
        Suisse&rdquo;),\nin connection with the preparation and filing with the United
        States Securities and Exchange Commission (the &ldquo;Commission&rdquo;)\nunder
        the United States Securities Act of 1933, as amended (the &ldquo;Securities
        Act&rdquo;), of a registration statement on Form&nbsp;F-3\n(including the
        documents incorporated by reference therein, the &ldquo;Registration Statement&rdquo;)
        relating to the offering from time\nto time, as set forth in the Registration
        Statement, the prospectus (including the documents incorporated by reference
        therein, the &ldquo;Prospectus&rdquo;)\ncontained therein and one or more
        supplements to the Prospectus, of (i)&nbsp;unsecured debt securities of Credit
        Suisse, including senior\ndebt securities of Credit Suisse (the &ldquo;Senior
        Debt Securities&rdquo;) and subordinated debt securities of Credit Suisse
        (the &ldquo;Subordinated\nDebt Securities&rdquo;), and (ii)&nbsp;warrants
        of Credit Suisse (the &ldquo;Warrants&rdquo; and collectively with the Senior
        Debt Securities\nand the Subordinated Debt Securities, the &ldquo;Offered
        Securities&rdquo;).</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 1in\">The Offered Securities will be offered
        on an immediate,\ncontinuous or delayed basis pursuant to the provisions of
        Rule&nbsp;415 under the Securities Act.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">The Senior
        Debt Securities are to be issued in one\nor more series in accordance with
        the provisions of an indenture, dated as of March&nbsp;29, 2007 and as amended
        as of the date hereof\n(the &ldquo;Senior Indenture&rdquo;), entered into
        between Credit Suisse and The Bank of New York Mellon, as trustee (together
        with any\npredecessor or successor thereto, the &ldquo;Trustee&rdquo;). The
        Subordinated Debt Securities are to be issued in one or more series\nin accordance
        with the provisions of an indenture, dated as of March&nbsp;29, 2007 and as
        amended as of the date hereof (the &ldquo;Subordinated\nIndenture&rdquo;),
        entered into between Credit Suisse and the Trustee. The Warrants are to be
        issued from time to time in accordance\nwith the provisions of a warrant agreement,
        dated June&nbsp;18, 2009 (the &ldquo;Warrant Agreement&rdquo;), entered into
        between Credit\nSuisse and The Bank of New York Mellon, as warrant agent.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        1in\">In arriving at the opinions expressed below, we\nhave reviewed the following
        documents:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 1in\">(a)&nbsp;the Registration Statement;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><IMG SRC=\"tm2317905d2_ex25-2img001.jpg\" ALT=\"\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<!--
        Field: Page; Sequence: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">Credit Suisse AG, p. 2</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        1in\">(b)&nbsp;the Prospectus;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 1in\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">(c)&nbsp;an
        executed copy of the Senior Indenture;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">(d)&nbsp;an
        executed copy of the Subordinated Indenture;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">(e)&nbsp;the
        form of Senior Debt Securities;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">(f)&nbsp;the form of
        Subordinated Debt Securities;\nand</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">(g)&nbsp;the Warrant
        Agreement.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 1in\">In addition, we have made such investigations
        of\nlaw as we have deemed appropriate as a basis for the opinions expressed
        below.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 1in\">In rendering the opinions expressed below,
        we have\nassumed the authenticity of all documents submitted to us as originals
        and the conformity to the originals of all documents submitted\nto us as copies.
        In addition, we have assumed and have not verified the accuracy as to factual
        matters of each document we have reviewed.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">Based on
        the foregoing, and subject to the further\nassumptions and qualifications
        set forth below, it is our opinion that:</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 21.6pt\"></TD><TD STYLE=\"width: 16.2pt\">1.</TD><TD>When the
        issuance, execution and delivery by Credit Suisse of the\n                                            Senior
        Debt Securities of a series have been duly authorized by all necessary corporate
        action\n                                            of Credit Suisse in accordance
        with the provisions of the Senior Indenture, and when such\n                                            Senior
        Debt Securities have been duly executed and delivered by Credit Suisse, authenticated\n
        \                                           by the Trustee and sold as described
        in the Registration Statement, the Prospectus and any\n                                            supplement
        or supplements to the Prospectus relating to such Senior Debt Securities,
        such\n                                            Senior Debt Securities will
        constitute valid, binding and enforceable obligations of Credit\n                                            Suisse,
        entitled to the benefits of the Senior Indenture.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 19.6pt\"></TD><TD STYLE=\"width: 17.2pt\">2.</TD><TD>When
        the issuance, execution and delivery by Credit Suisse of the\n                                            Subordinated
        Debt Securities of a series have been duly authorized by all necessary corporate\n
        \                                           action of Credit Suisse in accordance
        with the provisions of the Subordinated Indenture,\n                                            and
        when such Subordinated Debt Securities have been duly executed and delivered
        by Credit\n                                            Suisse, authenticated
        by the Trustee and sold as described in the Registration Statement,\n                                            the
        Prospectus and any supplement or supplements to the Prospectus relating to
        such Subordinated\n                                            Debt Securities,
        such Subordinated Debt Securities will constitute valid, binding and enforceable\n
        \                                           obligations of Credit Suisse,
        entitled to the benefits of the Subordinated Indenture.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 19.6pt\"></TD><TD STYLE=\"width: 17.2pt\">3.</TD><TD>When
        the issuance, execution and delivery by Credit Suisse of any\n                                            Warrants
        have been duly authorized by all necessary corporate action of Credit Suisse
        in\n                                            accordance with the provisions
        of the Warrant Agreement, and when such Warrants have been\n                                            duly
        executed and delivered by Credit Suisse as described in the Registration Statement,\n
        \                                           the Prospectus and any supplement
        or supplements to the Prospectus relating to such Warrants,\n                                            such
        Warrants will constitute valid, binding and enforceable obligations of Credit
        Suisse.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<!-- Field: Page; Sequence: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">Credit Suisse AG, p. 3</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">Insofar
        as the foregoing opinions relate to the\nvalidity, binding effect or enforceability
        of any agreement or obligation of Credit Suisse, (a)&nbsp;we have assumed
        that Credit Suisse\nand each other party to such agreement or obligation has
        satisfied or, prior to the issuance of the Offered Securities, will satisfy,\nthose
        legal requirements that are applicable to it to the extent necessary to make
        such agreement or obligation enforceable against it\n(except that no such
        assumption is made as to Credit Suisse regarding matters of the federal law
        of the United States of America or the\nlaw of the State of New York that
        in our experience normally would be applicable to general business entities
        with respect to such agreement\nor obligation), (b)&nbsp;we have assumed that
        any Offered Securities denominated in a currency other than U.S. dollars will
        comply in\nall respects with the applicable law of the country in whose currency
        such Offered Securities are denominated in respect of the use of\nor payment
        in such currency, (c)&nbsp;we have assumed that at the time of the issuance,
        sale and delivery of each Offered Security, the\nauthorization thereof by
        Credit Suisse will not have been modified or rescinded and there will not
        have occurred any change in law affecting\nthe validity, binding effect and
        enforceability of such Offered Security, (d)&nbsp;such opinions are subject
        to applicable bankruptcy,\ninsolvency and similar laws affecting creditors&rsquo;
        rights generally and to general principles of equity, (e)&nbsp;such opinions
        are\nsubject to the effect of judicial application of foreign laws or foreign
        governmental actions affecting creditors&rsquo; rights and (f)&nbsp;we\nexpress
        no opinion with respect to the effect of any mandatory choice of law rules.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        1in\">In rendering the opinions expressed above, we have\nfurther assumed
        that (i)&nbsp;the Registration Statement and any amendments thereto (including
        post-effective amendments) will or have\nbeen prepared and filed with the
        Commission describing the Offered Securities offered thereby and will comply
        with all applicable laws,\n(ii)&nbsp;the Registration Statement will be effective
        and will comply with all applicable laws at the time the Offered Securities
        are\noffered or issued as contemplated by the Registration Statement, (iii)&nbsp;the
        terms of the Senior Debt Securities and the Subordinated\nDebt Securities
        will conform to the forms thereof, and the terms of the Senior Indenture,
        Subordinated Indenture, and Warrant Agreement\nwill not violate any applicable
        law, result in a default under or breach of any agreement or instrument binding
        upon Credit Suisse or\nviolate any requirement or restriction imposed by any
        court or governmental body having jurisdiction over Credit Suisse, (iv)&nbsp;the\nOffered
        Securities will be sold and delivered to, and paid for by, the purchasers
        at the price specified in, and in accordance with the\nterms of, an agreement
        or agreements duly authorized, executed and delivered by the parties thereto,
        (v)&nbsp;Credit Suisse will authorize\nthe offering and issuance of the Offered
        Securities and will authorize, approve and establish the final terms and conditions
        thereof,\nand will take any other appropriate additional corporate action
        and (vi)&nbsp;certificates, if required, representing the Offered Securities\nwill
        be duly executed and delivered and, to the extent required by the applicable
        Senior Indenture, Subordinated Indenture and Warrant\nAgreement, duly authenticated
        and countersigned.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 1in\">In addition, in rendering the opinions
        above, we\nhave assumed that with respect to any Offered Security that includes
        any alternative or additional terms that are not specified in the\nforms thereof
        examined by us, such inclusion would not cause such Offered Security not to
        be valid, binding or enforceable.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">We express no opinion
        as to the subject matter jurisdiction\nof any United States federal court
        to adjudicate any action relating to the Offered Securities where jurisdiction
        based on diversity\nof citizenship under 28 U.S.C. &sect; 1332 does not exist.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<!--
        Field: Page; Sequence: 3 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">Credit Suisse AG, p. 4</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        1in\">We note that by statute New York provides that a\njudgment or decree
        rendered in a currency other than the currency of the United States shall
        be converted into U.S. dollars at the rate\nof exchange prevailing on the
        date of entry of the judgment or decree. There is no corresponding Federal
        statute and no controlling Federal\ncourt decision on this issue. Accordingly,
        we express no opinion as to whether a Federal court would award a judgment
        in a currency other\nthan U.S. dollars or, if it did so, whether it would
        order conversion of the judgment into U.S. dollars.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">We express
        no opinion as to the enforceability of\nSection&nbsp;10.15 of the Senior Indenture
        or Section&nbsp;11.15 of the Subordinated Indenture, relating to currency
        indemnity.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 1in\">We express no opinion relating to any subordination\nprovision
        in any Offered Security to the extent it purports to be governed by Swiss
        law.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0; text-indent: 1in\">The foregoing opinions are limited to the federal\nlaw
        of the United States of America and the law of the State of New York. Insofar
        as the foregoing opinions involve matters governed\nby Swiss law, we have
        relied, without independent inquiry or investigation, on the opinion letter
        of Homburger AG dated June&nbsp;8,\n2023 and filed as Exhibit&nbsp;5.2 to
        the Registration Statement. Our opinions are subject to the same assumptions,
        qualifications and\nlimitations with respect to such matters as are contained
        in the opinion letter of Homburger AG.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">We hereby
        consent to the use of our name in the\nprospectus constituting a part of the
        Registration Statement and in any prospectus supplements related thereto under
        the heading &ldquo;Legal\nMatters,&rdquo; and to the use of this opinion as
        a part (Exhibit&nbsp;5.1) of the Registration Statement. In giving such consent,
        we\ndo not thereby admit that we are within the category of persons whose
        consent is required under Section&nbsp;7 of the Securities Act\nor the rules&nbsp;and
        regulations of the Commission thereunder.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 1in\">The opinion
        expressed herein is rendered on and\nas of the date hereof, and we assume
        no obligation to advise you or any other person, or to make any investigations,
        as to any legal\ndevelopments or factual matters arising subsequent to the
        date hereof that might affect the opinion expressed herein.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%\">\n  <TR
        STYLE=\"vertical-align: bottom\">\n    <TD STYLE=\"font-size: 10pt\"><FONT
        STYLE=\"font-size: 10pt\">&nbsp;</FONT></TD>\n    <TD COLSPAN=\"2\" STYLE=\"font:
