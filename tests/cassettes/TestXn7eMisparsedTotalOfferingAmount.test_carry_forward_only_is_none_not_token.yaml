        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Each
        fixed rate debt security, which we refer to as a fixed rate note, will bear
        interest at the annual rate specified in the applicable prospectus supplement.
        The interest payment dates for fixed rate notes will be specified in the applicable
        prospectus supplement and the regular record dates will be the fifteenth calendar
        day (whether or not a business day) prior to each interest payment date unless
        otherwise specified in the applicable prospectus supplement. Unless otherwise
