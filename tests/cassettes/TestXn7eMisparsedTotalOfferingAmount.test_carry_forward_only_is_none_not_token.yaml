        \       </div>\n        <div style=\"text-indent:20pt; margin-top:12pt; width:505.31pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Credit
        Suisse AG (&#8220;Credit Suisse&#8221;) (acting through its head office or
        any one of its branches) may from time to time offer to sell debt securities,
        which may consist of senior and subordinated notes or other types of debt,
        including debt convertible into or exchangeable for shares or other securities
        of any entity unaffiliated with Credit Suisse, a basket of such securities,
        an index or indices of such securities or any combination of the foregoing.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:505.31pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        addition, Credit Suisse (acting through its head office or any one of its
        branches) may from time to time offer to sell warrants or warrants in the
        form of subscription rights to purchase securities of any entity unaffiliated
        with Credit Suisse, a basket of such securities, an index or indices of such
        securities or any combination of the foregoing. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:505.31pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We will provide the specific
        terms of these securities in supplements to this prospectus. You should read
        this prospectus and any supplement carefully before you invest. We will not
        use this prospectus to issue any securities unless it is attached to a prospectus
        supplement. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:505.31pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        we state otherwise in a prospectus supplement, we will not list any of these
        securities on a securities exchange. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:505.31pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">These securities may be offered
        directly or to or through underwriters, agents or dealers, including Credit
        Suisse Securities (USA) LLC, an affiliate of Credit Suisse. Because of this
        relationship, Credit Suisse Securities (USA) LLC would have a &#8220;conflict
        of interest&#8221; within the meaning of Rule&#160;5121 of the Financial Industry
        Regulatory Authority, Inc., or &#8220;FINRA.&#8221; If Credit Suisse Securities
        (USA) LLC or our other U.S.-registered broker-dealer subsidiaries or affiliates
        participate in the distribution of our securities, we will conduct the offering
        in accordance with the applicable provisions of FINRA Rule&#160;5121. See
        &#8220;Plan of Distribution (Conflicts of Interest)&#8201;&#8212;&#8201;Conflicts
        of Interest.&#8221; The names of any other underwriters, agents or dealers
        will be included in a supplement to this prospectus. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:505.31pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Investing in our securities
