        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(q)</TD><TD>We
        express no opinion on the admissibility or validity of, or the procedures\n
        \                                           relating to, the registration
        of the offering of Securities with the SEC.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\">(r)</TD><TD>Further, we
        express no opinion on any banking, tax, commercial, accounting,\n                                            calculating,
        auditing or other non-legal matter.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">*&nbsp;
        &nbsp;*&nbsp;&nbsp; *</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">We\nhereby consent to the filing of this opinion
        with the SEC as an exhibit to the Registration Statement and to the use of
        our name in the\nprospectus included in the Registration Statement under the
        heading &quot;Legal Matters&quot;. In giving such consent we do not admit\nthat
        we are in the category of persons whose consent is required under Section</FONT>&nbsp;7
        of the Securities Act.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">This opinion is furnished by us, as special
        Swiss counsel to CS, in\nconnection with the filing of the Registration Statement
        and, except as provided in the immediately preceding paragraph, is not to
        be\nused, circulated, quoted or otherwise referred to for any other purpose
        without our express written permission, or relied upon by any\nother person.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: left; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">This opinion is governed by and shall be construed\nin accordance
        with the laws of Switzerland. We confirm our understanding that all disputes
        arising out of or in connection with this\nopinion shall be subject to the
        exclusive jurisdiction of the courts of the Canton of Zurich, Switzerland,
        venue being the City of Zurich.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">Sincerely yours,</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%\">\n  <TR
        STYLE=\"vertical-align: bottom\">\n    <TD STYLE=\"border-bottom: Black 1pt
