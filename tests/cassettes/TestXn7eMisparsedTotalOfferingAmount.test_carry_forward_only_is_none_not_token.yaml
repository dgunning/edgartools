        debt securities purchased by the issuer may, at its discretion, be held, resold
        or surrendered to the trustee for cancellation. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
