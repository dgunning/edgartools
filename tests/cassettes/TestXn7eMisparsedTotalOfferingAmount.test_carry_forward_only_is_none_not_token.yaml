        agency&#8221; registered pursuant to the provisions of Section&#160;17A of
        the Exchange Act. DTC holds securities deposited with it by its participants
        and facilitates the settlement of transactions among its participants in such
        securities through electronic computerized book-entry changes in accounts
        of the participants, thereby eliminating the need for physical movement of
        securities certificates. DTC&#8217;s participants include securities brokers
        and dealers, banks, trust companies, clearing corporations and certain other
        organizations, some of whom (and/or their representatives) own DTC. Access
        to DTC&#8217;s book-entry system is also available to others, such as banks,
