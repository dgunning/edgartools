        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">is made solely with assets
        of an insurance company pooled separate account and satisfies the requirements
        and conditions of PTCE 90-1 issued by the Department of Labor; </font>\n        </div>\n
