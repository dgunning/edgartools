        States Taxation.&#8221; </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Redemption
        at the Option of the Issuer</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise provided in the applicable prospectus supplement, the issuer cannot
        redeem debt securities prior to maturity. The issuer may redeem a series of
        debt securities at its option prior to the maturity date only if an initial
        redemption date is specified in the applicable prospectus supplement. If so
        specified, the issuer can redeem the debt securities of such series at its
        option on any date on and after the applicable initial redemption date in
        whole or from time to time in part in increments of $2,000 or such other minimum
        denomination specified in such applicable prospectus supplement (provided
        that any remaining principal amount of the debt securities of such series
        will be at least $2,000 or such other minimum denomination), at the applicable
        redemption price, together with unpaid interest accrued to the date of redemption,
        on notice given not more than 60 nor less than 30 calendar days prior to the
        date of redemption, unless otherwise provided in the applicable prospectus
        supplement, and in accordance with the provisions of the applicable indenture.
        By redemption price for a debt security of a series, we mean an amount equal
        to the initial redemption&#160;percentage specified in the applicable prospectus
        supplement (as adjusted by the annual redemption&#160;percentage reduction
        specified in the applicable prospectus supplement, if any) multiplied by the
