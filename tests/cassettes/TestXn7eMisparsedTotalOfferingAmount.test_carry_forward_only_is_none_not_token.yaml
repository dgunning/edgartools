        supplement under the heading &#8220;Risk Factors.&#8221;</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:505.31pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Neither
        the Securities and Exchange Commission nor any state securities commission
        has approved or disapproved of these securities or determined if this prospectus
        or any accompanying prospectus supplement is truthful or complete. Any representation
        to the contrary is a criminal offense. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:505.31pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The debt securities of Credit
        Suisse are not deposit liabilities and are not insured by the Federal Deposit
        Insurance Corporation or any other governmental agency of the United States,
        Switzerland or any other jurisdiction. Unless otherwise provided in the applicable
        prospectus supplement, the debt securities will not have the benefit of any
        agency or governmental guarantee. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:505.31pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Any
        of our broker-dealer subsidiaries or affiliates, including Credit Suisse Securities
        (USA) LLC, may use this prospectus and our prospectus supplements in connection
        with offers and sales of our securities in connection with market-making transactions
        by and through our broker-dealer subsidiaries or affiliates, including Credit
        Suisse Securities (USA) LLC, at prices that relate to the prevailing market
        prices of our securities at the time of the sale or otherwise. Any of our
        broker-dealer subsidiaries and affiliates, including Credit Suisse Securities
        (USA) LLC, may act as principal or agent in these transactions. None of our
        broker-dealer subsidiaries and affiliates has any obligation to make a market
        in any of our offered securities and may discontinue any market-making activities
        at any time without notice, at its sole discretion. </font>\n        </div>\n
