        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Amortizing
        Notes</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Amortizing
        debt securities, which we refer to as amortizing notes, are a series of debt
        securities for which payments combining principal and interest are made in
        installments over the life of such series of debt securities. Payments with
        respect to amortizing notes will be applied first to interest due and payable
        on the amortizing notes and then to the reduction of the unpaid principal
        amount of the amortizing notes. The issuer will provide further information
        on the additional terms and conditions of any issue of amortizing notes in
