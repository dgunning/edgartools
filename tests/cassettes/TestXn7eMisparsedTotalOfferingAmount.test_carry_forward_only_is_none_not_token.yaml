        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">DESCRIPTION OF DEBT SECURITIES</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">This section describes the
        general terms that will apply to any debt securities that may be offered by
        Credit Suisse, directly or through one of its branches pursuant to this prospectus
        (referred to in this section as the &#8220;issuer&#8221;). The specific terms
        of the offered debt securities, and the extent to which the general terms
        described in this section apply to debt securities, will be described in the
        related prospectus supplement at the time of the offer. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">General</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As
        used in this prospectus, &#8220;debt securities&#8221; means the senior and
        subordinated debentures, notes, bonds and other evidences of indebtedness
        that the issuer issues and, in each case, the trustee authenticates and delivers
        under the applicable indenture. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Credit
        Suisse may issue senior debt securities, subordinated debt securities (including
        convertible or exchangeable debt securities), directly or through one of its
        branches. Any convertible or exchangeable debt securities issued by Credit
        Suisse will not be convertible or exchangeable into or for shares of Credit
        Suisse. Senior debt securities or subordinated debt securities of Credit Suisse
        will be issued in one or more series under the senior indenture dated as of
        March&#160;29, 2007 (as supplemented, the &#8220;Senior Indenture&#8221;)
        or subordinated indenture dated as of March&#160;29, 2007 (as supplemented,
        the &#8220;Subordinated Indenture&#8221;), each between Credit Suisse and
        The Bank of New York Mellon, formerly known as The Bank of New York, as trustee.
        The Senior Indenture and the Subordinated Indenture have each been qualified
        under the Trust Indenture Act of 1939, as amended, (the &#8220;Trust Indenture
        Act&#8221;). In this section, we sometimes refer to these indentures collectively,
        as amended or supplemented from time to time, as the &#8220;indentures.&#8221;
        This section of the prospectus briefly outlines the provisions of the indentures
        related to the debt securities. The terms of the indentures will include both
        those stated in the indentures and those made part of the indentures by the
        Trust Indenture Act. The forms of the indentures have been filed as exhibits
        to the registration statement of which this prospectus forms a part, and you
        should read the applicable indentures for provisions that may be important
        to you. </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">There
        are various regulatory requirements applicable to some of Credit Suisse&#8217;s
        subsidiaries that limit their ability to pay dividends and make loans and
        advances to Credit Suisse. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        indentures do not contain any covenants or other provisions designed to protect
        holders of the debt securities against a reduction in the creditworthiness
        of the issuer in the event of a highly leveraged transaction or that would
        prohibit other transactions that might adversely affect holders of the debt
        securities, including a change in control of the issuer. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Issuances in Series</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The indentures do not limit
        the amount of debt that may be issued. The debt securities may be issued in
        one or more series with the same or various maturities, at a price of 100%
        of their principal amount or at a premium or a discount. Not all debt securities
        of any one series need be issued at the same time and, unless otherwise provided,
        any series may be reopened for issuances of additional debt securities of
        that series. The debt securities will not be secured by any property or assets
        of the issuer. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        terms of any authorized series of debt securities will be described in a prospectus
        supplement. These terms may include: </font>\n        </div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the issue date; </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">whether the debt securities
        are senior or subordinated (if subordinated debt securities are issued, any
        special U.S. federal income tax and other considerations of a purchase of
        such debt securities will be described); </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the total principal amount
        of the debt securities; </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
