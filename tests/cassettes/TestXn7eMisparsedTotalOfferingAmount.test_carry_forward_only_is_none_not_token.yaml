        \   <TD STYLE=\"width: 0.25in\">(1)</TD><TD>The amount to be registered, proposed
        maximum aggregate price per unit and proposed maximum aggregate offering price
        for each class\nof security will be determined from time to time by the Registrant
        in connection with the issuance by the Registrant of the securities\nhereunder
        and is not specified as to each class of security pursuant to Instruction
        2.A.iii.b. of Form&nbsp;F-3 under the Securities Act\nof 1933, as amended
        (the &ldquo;Securities Act&rdquo;), and Rule&nbsp;457(o)&nbsp;under the Securities
        Act. The amount also includes such\nindeterminate principal amount, liquidation
        amount or number of identified classes of securities as may be issued upon
        conversion, exchange\nor exercise of other securities and may be offered or
        sold by affiliates of the Registrant in market-making transactions.</TD></TR>\n<TR
        STYLE=\"vertical-align: top\">\n<TD></TD>\n    <TD>(2)</TD><TD>Pursuant to
        Rule&nbsp;415(a)(6)&nbsp;under the Securities Act, this registration statement
        will include an amount of unsold securities\n(the &ldquo;Unsold Securities&rdquo;)
        that were previously registered on the registration statement on Form&nbsp;F-3
        under the Securities\nAct (Registration No.&nbsp;333-238458) filed on May&nbsp;15,
        2020, as amended by Pre-Effective Amendment No.&nbsp;1 filed on June&nbsp;16,\n2020
        and declared effective on June&nbsp;18, 2020 (the &ldquo;Prior Registration
        Statement&rdquo;), for which the Registrant paid a registration\nfee. The
        Registrant expects to and to carry forward\nto this registration statement
        the remaining portion of the Unsold Securities pursuant to Rule&nbsp;415(a)(6)&nbsp;under
        the Securities\nAct. In accordance with SEC rules, the Registrant may continue
        to use the Prior Registration Statement to offer and sell any unsold securities\nuntil
        this registration statement is declared effective. At such time as the Registrant
        requests effectiveness of this registration statement,\nthe Registrant will
        identify in a pre-effective amendment to this registration statement the amount
        of the Unsold Securities from the\nPrior Registration Statement to be included
        in this registration statement pursuant to Rule&nbsp;415(a)(6). Pursuant to
        Rule&nbsp;415(a)(6),\nthe offering of unsold securities under the Prior Registration
        Statement will be deemed terminated as of the date of effectiveness of\nthis
        registration statement.</TD></TR>\n<TR STYLE=\"vertical-align: top\">\n<TD></TD>\n
        \   <TD>(3)</TD><TD>In connection with Debt Securities or Warrants, Credit
        Suisse AG may act through its head office or any one of its branches. Any
        convertible\nDebt Securities or Warrants issued by Credit Suisse AG will not
        be convertible into shares of Credit Suisse AG.</TD></TR>\n<TR STYLE=\"vertical-align:
        top\">\n<TD></TD>\n    <TD>(4)</TD><TD>This registration statement also includes
        an indeterminate amount of securities of the classes specified above that
        may be reoffered\nand resold on an ongoing basis after their initial sale
        in market-making transactions by and through affiliates of the Registrant,
        including\nCredit Suisse Securities (USA) LLC. These securities consist of
        an indeterminate amount of such securities that are initially being registered,\nand
        will initially be offered and sold, under this registration statement and
        an indeterminate amount of such securities that were initially\nregistered,
        and were initially offered and sold, under registration statements previously
        filed by Credit Suisse AG. All such market-making\nreoffers and resales of
        these securities that are made pursuant to a registration statement after
        the effectiveness of this registration\nstatement are being made solely pursuant
        to this registration statement.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt
