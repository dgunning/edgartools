        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Any additional or different
        events of default applicable to a particular series of debt securities will
        be described in the prospectus supplement relating to such series. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        trustee may withhold notice to the holders of debt securities of any default
        (except in the payment of principal, premium or interest) if it considers
        such withholding of notice to be in the best interests of the holders. A default
        is any event which is an event of default described above or would be an event
        of default but for the giving of notice or the passage of time. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise specified in the applicable prospectus supplement, if an event of
        default occurs and continues, the trustee or the holders of the aggregate
        principal amount of the debt securities specified below may require the issuer
        to repay immediately, or accelerate: </font>\n        </div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.91pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.91pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the entire principal of the
        debt securities of such series; or </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.9pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.9pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">if the debt securities are
        original issue discount securities, such portion of the principal as may be
        described in the applicable prospectus supplement. </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Unless otherwise specified
        in the applicable prospectus supplement, if the event of default occurs because
        of a default in a payment of principal or interest on the debt securities,
        then the trustee or the holders of at least 25% of the aggregate principal
        amount of debt securities of that series can accelerate that series of debt
        securities. If the event of default occurs because of a failure to perform
        any other covenant in the applicable indenture for the benefit of one or more
        series of debt securities, then the trustee or the holders of at least 25%
        of the aggregate principal amount of debt securities of all series affected,
        voting as one class, can accelerate all of the affected series of debt securities.
        If the event of default occurs because of bankruptcy proceedings, then all
        of the debt securities under the applicable indenture will be accelerated
        automatically. Therefore, except in the case of a default on a payment of
        principal or interest on the debt securities of your series or a default due
        to bankruptcy or insolvency of the issuer, it is possible that you may not
        be able to accelerate the debt securities of your series because of the failure
        of holders of other series to take action. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The holders of a majority
        of the aggregate principal amount of the debt securities of all affected series,
        voting as one class, can rescind this accelerated payment requirement or waive
        any past default or event of default or allow noncompliance with any provision
        of the applicable indenture. However, they cannot waive a default in payment
        of principal of, premium, if any, or interest on, any of the debt securities.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">After
        an event of default, the trustee must exercise the same degree of care a prudent
        person would exercise under the circumstances in the conduct of her or his
        own affairs. Subject to these requirements, the trustee is not obligated to
        exercise any of its rights or powers under the applicable indenture at the
        request, order or direction of any holders, unless the holders offer the trustee
        reasonable indemnity. If they provide this reasonable indemnity, the holders
        of a majority in principal amount of all affected series of debt securities,
        voting as one class, may direct the time, method and place of conducting any
        proceeding or any remedy available to the trustee, or exercising any power
        conferred upon the trustee, for any series of debt securities. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Defeasance</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        term defeasance means discharge from some or all of the obligations under
        the applicable indenture. If the issuer deposits with the trustee sufficient
        cash or government securities to pay the principal, interest, any premium
        and any other sums due to the stated maturity date or a redemption date of
        the debt securities of a particular series, then at the issuer&#8217;s option:
        </font>\n        </div>\n        <div style=\" float:left; margin-left:20pt;
        line-height:12pt; margin-top:6pt; margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br
        >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the issuer will be discharged
        from their respective obligations with respect to the debt securities of such
        series; or </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"
        float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the issuer will no longer
        be under any obligation to comply with the restrictive covenants, if any,
        contained in the applicable indenture and any supplemental indenture or board
        resolution with respect to the debt securities of such series, and the events
        of default relating to failures to comply with covenants will no longer apply
        to them. </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        this happens, the holders of the debt securities of the affected series will
        not be entitled to the benefits of the applicable indenture except for registration
        of transfer and exchange of debt securities and </font>\n        </div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
