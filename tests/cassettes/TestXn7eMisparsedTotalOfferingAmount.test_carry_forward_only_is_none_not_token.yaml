        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">If specifically provided by
        the applicable prospectus supplement, the issuer may redeem a series of debt
        securities at its option at any time, in whole but not in part, on giving
        not less than 30 nor more than 60&#160;days&#8217; notice, unless otherwise
        provided in the applicable prospectus supplement, at the principal amount
        of such series of debt securities being redeemed, together with accrued interest
        to the date of redemption, if it has or will become obligated to pay additional
        interest on such series of debt securities as described under &#8220;&#8212;
        Payment of Additional Amounts&#8221; below as a result of any change in, or
        amendment to, the laws (or any regulations or rulings promulgated thereunder)
        of Switzerland or the United States, as applicable, or any political subdivision
        or taxing authority thereof or therein, or any change in the application or
