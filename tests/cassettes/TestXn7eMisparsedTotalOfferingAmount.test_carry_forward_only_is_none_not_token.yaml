        the head office to any branch of Credit Suisse or from any branch of Credit
        Suisse to another branch or to its head office. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Modification of the Indentures</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">In general, rights and obligations
        of the issuer and the holders under each applicable indenture may be modified
        if the holders of a majority in aggregate principal amount of the outstanding
        debt securities of each series affected by the modification consent to such
        modification. However, each of the indentures provides that, unless each affected
        holder agrees, an amendment cannot: </font>\n        </div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">make any adverse change to
        any payment term of a debt security such as extending the maturity date, extending
        the date on which the issuer has to pay interest or make a sinking fund payment,
        reducing the interest rate, reducing the amount of principal the issuer has
        to repay, reducing the amount of principal of a debt security issued with
        original issue discount that would be due and payable upon an acceleration
        of the maturity thereof or the amount thereof provable in bankruptcy, insolvency
        or similar proceeding, changing the currency or place in which the issuer
        has to make any payment of principal, premium or interest, modifying any redemption
        or repurchase right to the detriment of the holder, modifying any right to
        convert or exchange the debt securities for another security to the detriment
        of the holder, and impairing any right of a holder to bring suit for payment;
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">reduce the&#160;percentage
        of the aggregate principal amount of debt securities needed to make any amendment
        to the applicable indenture or to waive any covenant or default; </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.81pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.81pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">waive any payment default;
        or </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"
        float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:5.8pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">make any change to the amendment
        provisions of the applicable indenture. </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">However, other than in the
        circumstances mentioned above, if the issuer and the trustee agree, the applicable
        indenture may be amended without notifying any holders or seeking their consent
        if the amendment does not materially and adversely affect any holder. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        particular, if the issuer and the trustee agree, the applicable indenture
        may be amended without notifying any holders or seeking their consent to add
        a guarantee from a third party on the outstanding and future debt securities
        to be issued under an applicable indenture. </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Covenants</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        issuer may be subject to additional covenants, including restrictive covenants
        in respect of a particular series of debt securities. Such additional covenants
        will be set forth in the applicable prospectus supplement and, to the extent
        necessary, in the supplemental indenture or board resolution relating to that
        series of debt securities. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Events
        of Default</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise specified in a prospectus supplement, an event of default with respect
        to a series of debt securities occurs upon: </font>\n        </div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.9pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.9pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a default in payment of the
        principal or any premium on any debt security of that series when due, and
        such default continues for 30&#160;days; </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.9pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.9pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
