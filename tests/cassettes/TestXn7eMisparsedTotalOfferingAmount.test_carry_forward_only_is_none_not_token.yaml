        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a><a name=\"tCRSU\">&#8203;</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">CREDIT SUISSE</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Pursuant to the merger agreement
        between UBS Group and Credit Suisse Group, Credit Suisse&#8217;s parent company,
        dated as of March&#160;19, 2023, as amended on April&#160;6, 2023 and on May&#160;22,
        2023, UBS Group and Credit Suisse Group will merge, with UBS Group being the
        absorbing company which shall continue to operate, and Credit Suisse Group
        being the absorbed company which shall cease to exist (the &#8220;Merger&#8221;).
        Effective upon registration of the Merger with the Commercial Register of
        the Canton of Zurich in Switzerland, Credit Suisse Group will be dissolved
        and its assets, liabilities and contracts transferred to, and absorbed and
        taken over by, UBS Group by operation of Swiss law (</font><font style=\"font-style:italic;letter-spacing:0.2pt;\">Universalsukzession</font><font
        style=\"letter-spacing:0.2pt;\">). As a result of the Merger, Credit Suisse
        will become a wholly-owned subsidiary of UBS Group. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse is a corporation
        established under the laws of, and licensed as a bank in, Switzerland. Credit
        Suisse&#8217;s registered and principal executive office is in Zurich, and
        it has additional executive offices and principal branches located in London,
        New York, Hong Kong, Singapore and Tokyo. Credit Suisse&#8217;s registered
        and principal executive office is located at Paradeplatz 8, 8001 Zurich, Switzerland,
        and its telephone number is +41 44 333 1111. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse may act through
        any of its branches in connection with the debt securities and warrants as
        described in this prospectus and the applicable prospectus supplement. Credit
        Suisse, Guernsey branch, was established in 1986 in Guernsey, Channel Islands,
        and is, among other things, a vehicle for various funding activities of Credit
        Suisse. The Guernsey branch exists as part of Credit Suisse and is not a separate
        legal entity, although it has independent status for certain tax and Guernsey
        regulatory purposes. The Guernsey branch is located at Helvetia Court, Les
        Echelons, South Esplanade, St. Peter Port, Guernsey GY1 3YJ, Channel Islands,
        and its telephone number is +44 1481 719000. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse, London branch,
        was established in 1993 in England and Wales, and is, among other things,
        a vehicle for various funding activities of Credit Suisse. The London branch
        exists as part of Credit Suisse and is not a separate legal entity, although
        it has independent status for certain tax and regulatory purposes. The London
        branch is located at One Cabot Square, London, E14 4QJ, United Kingdom, and
        its telephone number is +44 20 7888 8888. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse, Nassau branch,
        was established in Nassau, Bahamas in 1971 and is, among other things, a vehicle
        for various funding activities of Credit Suisse. The Nassau branch exists
        as part of Credit Suisse and is not a separate legal entity, although it has
        independent status for certain tax and regulatory purposes. The Nassau branch
        is located at Shirley &amp; Charlotte Streets, Bahamas Financial Centre, 4th
        Floor, P.O. Box N-4928, Nassau, Bahamas, and its telephone number is +1 242-356-8100.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Credit
        Suisse, New York branch, was established in 1940 in New York, New York, and
        is, among other things, a vehicle for various funding activities of Credit
        Suisse. The New York branch exists as part of Credit Suisse and is not a separate
        legal entity, although it has independent status for certain tax and regulatory
        purposes. The New York branch is located at Eleven Madison Avenue, New York,
        New York 10010, United States and its telephone number is (212) 325-2000.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Recent
        Developments</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"margin-left:20pt; margin-top:12pt;
        width:436pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">Customer Account Matters</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As
        further described on page 396 of the 2022 20-F, Credit Suisse filed a criminal
        complaint with the Geneva Prosecutor&#8217;s Office against a former relationship
        manager in Switzerland who several clients claimed had exceeded his investment
        authority in the management of their portfolios, resulting in excessive concentrations
        of certain exposures and investment losses, upon which complaint the prosecutor
        initiated a criminal investigation. On February&#160;9, 2018, the former relationship
        manager was sentenced to five&#160;years in prison by the Geneva criminal
        court for fraud, forgery and criminal mismanagement. Civil lawsuits were initiated
        between August&#160;7, 2017 and August&#160;25, 2017 in the High Court of
        Singapore and the Supreme Court of Bermuda against Credit Suisse and/or certain
        affiliates, based on the findings established in the criminal proceedings
        against the former relationship manager. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">In Bermuda, in the civil lawsuit
        brought against a Credit Suisse affiliate, the Supreme Court of Bermuda issued
        a first instance judgment on March&#160;29, 2022, finding for the plaintiff,
        and issued an order </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">8</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:384pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">on
        May&#160;6, 2022, awarding damages of USD 607.35&#160;million to the plaintiff.
        On May&#160;9, 2022, Credit Suisse Life (Bermuda) Ltd. appealed the decision
        to the Bermuda Court of Appeal. On July&#160;25, 2022, the Supreme Court of
        Bermuda granted a stay of execution of its judgment pending appeal on the
        condition that damages awarded were paid into an escrow account within 42&#160;days,
        which condition was satisfied. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        the civil lawsuit brought against Credit Suisse Trust Limited in Singapore,
        on May&#160;26, 2023, the Singapore International Commercial Court issued
        a first instance judgment finding for the plaintiffs and directing the parties&#8217;
        experts to agree by June&#160;30, 2023 on the amount of the damages award
        according to the calculation method and parameters adopted by the court. The
        plaintiffs&#8217; experts initially calculated damages to be USD 926m, using
        a start date for such calculation of December&#160;31, 2007. The court determined
        that the start date for the calculation of damages shall be March&#160;30,
        2008, and on the basis of those parameters, Credit Suisse expects the damages
        amount to be significantly lower than USD 926m. The amount will be determined
        by agreement between the parties&#8217; experts, or failing that, will be
        determined by the court. Further, the court determined that (i)&#160;damages
        shall be reduced by compensation already paid to the plaintiffs and (ii)&#160;there
        shall be no double recovery between this award and the award in the Bermuda
        proceedings against Credit Suisse Life (Bermuda) Ltd. An estimate of such
        amounts is not possible today as the proceedings are ongoing. No sanctions,
        other than damages, were sought by the plaintiffs, and as a result, non-monetary
        sanctions, such as an injunction or restraining order, were not imposed. Credit
        Suisse Trust Limited intends to appeal the judgment. </font>\n        </div>\n
        \       <div style=\"margin-left:20pt; margin-top:8pt; width:436pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">For additional information,
        please refer to page 396 of the 2022 20-F. </font>\n        </div>\n      </div>\n
