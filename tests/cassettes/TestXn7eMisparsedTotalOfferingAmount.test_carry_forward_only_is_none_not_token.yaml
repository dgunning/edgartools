        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 3 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align: center; font-size:
        10pt; margin-top: 0pt; margin-bottom: 0pt\">F-<!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->3<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">REVERSE OF NOTE</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">CREDIT SUISSE AG<BR>\nSENIOR MEDIUM-TERM NOTE</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif\">This\nNote is one of
        a duly authorized issue of</FONT> Senior Medium-Term Notes (the &ldquo;Securities&rdquo;)
        of the Company, acting through\nthe applicable Branch. The Securities are
        issuable under a senior indenture, dated as of March&nbsp;29, 2007, as supplemented
        by a second\nsupplemental indenture, dated as of March&nbsp;25, 2009 and a
        third supplemental indenture, dated as of September&nbsp;9, 2020 (collectively,\nthe
        &ldquo;Indenture&rdquo;), in each case between the Company and The Bank of
        New York Mellon (formerly known as The Bank of New York),\nas trustee (the
        &ldquo;Trustee&rdquo;), to which indenture and all indentures supplemental
        thereto reference is hereby made for a statement\nof the respective rights,
        limitations of rights, duties and immunities of the Company, the Trustee and
        the registered holder (the &ldquo;Holder&rdquo;)\nof the Securities and the
        terms upon which the Securities are to be authenticated and delivered. The
        Bank of New York Mellon (formerly\nknown as The Bank of New York) at its corporate
        trust office in The City of New York has been appointed the Registrar and
        Paying Agent\nwith respect to the Securities. The terms of individual Securities
        may vary with respect to interest rates, interest rate formulas, issue\ndates,
        maturity dates, or otherwise, all as provided in the Indenture. To the extent
        not inconsistent herewith, the terms of the Indenture\nare hereby incorporated
        by reference herein. The Securities will not be subject to any sinking fund
        and, unless otherwise provided in\nthe Related Prospectus, the Securities
        will not be redeemable or subject to repayment at the option of the Holder
        prior to maturity.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\">This Note, and any Note or Notes
        issued upon transfer\nor exchange hereof, is issuable only in fully registered
        form without coupons, and each Supplemental Obligation is issued in the minimum\ndenomination
        and any integral multiples thereof as specified in the Related Prospectus
        in the manner and subject to the limitations provided\nin the Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">This Note is payable in the manner, with the effect\nand subject to
        the conditions provided in the Indenture.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Unless
        otherwise stated in the Related Prospectus,\nif a payment date is not a Business
        Day as defined in the Indenture at a place of payment, payment may be made
        at that place on the next\nsucceeding day that is a Business Day, and no interest
        shall accrue for the intervening period. Following any postponement of any
        date,\nno interest payment will be adjusted and no other payment will be payable
        hereon because of such postponement.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        4; Options: NewSection; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align: center; font-size:
        10pt; margin-top: 0pt; margin-bottom: 0pt\">R-<!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->1<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The Indenture contains provisions
        that provide\nthat the Company and the Trustee may amend or supplement the
        Indenture or the Securities without notice to or the consent of any Holder\nin
        order to (i)&nbsp;cure any ambiguity, defect or inconsistency in the Indenture,
        provided that such amendments or supplements shall\nnot materially and adversely
        affect the interests of the Holders; (ii)&nbsp;comply with the requirements
        of the Indenture if the Company\nconsolidates with, merges with or into, or
        sells, conveys, transfers, leases or otherwise disposes of all or substantially
        all of its\nproperty and assets (as an entirety or substantially as an entirety
        in one transaction or a series of transactions), to any person; (iii)&nbsp;comply\nwith
        any requirements of the Securities and Exchange Commission in connection with
        the qualification of the Indenture under the Trust\nIndenture Act; (iv)&nbsp;evidence
        and provide for the acceptance of appointment under the Indenture with respect
        to the Securities by\na successor Trustee; (v)&nbsp;provide for uncertificated
        or unregistered Securities and to make all appropriate changes for such purpose;\n(vi)&nbsp;provide
        for a guarantee from a third party on outstanding Securities that are issued
        under the Indenture; (vii)&nbsp;provide\nfor the substitution of one or more
        of the Company&rsquo;s branches as obligor of the Securities or (viii)&nbsp;make
        any change that does\nnot materially and adversely affect the rights of any
        Holder.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\">The Indenture contains provisions that
        provide\nthat, without prior notice to any Holders, the Company and the Trustee
        may amend the Indenture and the Securities with the written consent\nof the
        Holders of a majority in principal amount of the outstanding Securities of
        all series affected by such amendment (all such series\nvoting as one class),
        and the Holders of a majority in principal amount of the outstanding Securities
        of all series affected thereby (all\nsuch series voting as one class) by written
        notice to the Trustee may waive future compliance by the Company with any
        provision of the\nIndenture or the Securities; provided that, without the
        consent of each Holder of the Securities affected thereby, an amendment or
        waiver,\nincluding a waiver of past defaults, may not: (i)&nbsp;extend the
        stated maturity of the Principal of, or any sinking fund obligation\nor any
        installment of interest on, such Holder&rsquo;s Security, or reduce the Principal
        thereof or the rate of interest thereon (including\nany amount in respect
        of original issue discount), or adversely affect the rights of such Holder
        under any mandatory redemption or repurchase\nprovision or any right of redemption
        or repurchase at the option of such Holder, or reduce the amount of the Principal
        of an Original\nIssue Discount Security that would be due and payable upon
        an acceleration of the maturity thereof or the amount thereof provable in
        bankruptcy,\ninsolvency or similar proceeding, or change any place of payment
        where, or the currency in which, the Principal or the interest thereon\nis
        payable, modify any right to convert or exchange such Holder&rsquo;s Security
        for another security to the detriment of the Holder or\nimpair the right to
        institute suit for the enforcement of any such payment on or after the due
        date therefor; (ii)&nbsp;reduce the percentage\nin Principal of outstanding
        Securities the consent of whose Holders is required for any such supplemental
        indenture, for any waiver of\ncompliance with certain provisions of the Indenture
        or certain Defaults and their consequences provided for in the Indenture;
        (iii)&nbsp;waive\na Default in the payment of Principal of or interest on
        any Security of such Holder; or (iv)&nbsp;modify any of the provisions of
        the\nIndenture governing amendments or waivers with the consent of Holders
        except to increase any such percentage or to provide that certain\nother provisions
        of the Indenture cannot be modified or waived without the consent of the Holder
        of each outstanding Security affected\nthereby.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The
        Indenture contains provisions that provide\nthat the Company may at any time
        designate another branch of the Company (the &ldquo;Substitution Branch&rdquo;)
        as substitute for the\nBranch through which it acts under a series of Securities
        with the same effect as if such Substitution Branch had been originally named\nas
        the Branch for all purposes under the Indenture in relation to such Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 5; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align:
        center; font-size: 10pt; margin-top: 0pt; margin-bottom: 0pt\">R-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->2<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">In
        case an Event of Default with respect to a Supplemental\nObligation shall
        have occurred and be continuing, the amount that may be declared due and payable
        will be determined as set forth in the\nRelated Prospectus, and, upon such
        declaration, such amount shall become due and payable in the manner, with
        the effect and subject to\nthe conditions provided in the Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">It is also provided in the Indenture that, subject\nto certain conditions,
        the Holders of at least a majority in principal amount of the outstanding
        Securities of all series affected (voting\nas a single class), by notice to
        the Trustee, may waive an existing Default or Event of Default with respect
        to the Securities of such\nseries and its consequences, except a Default in
        the payment of Principal of or interest on any Security or in respect of a
        covenant or\nprovision of the Indenture which cannot be modified or amended
        without the consent of the Holder of each outstanding Security affected.\nUpon
        any such waiver, such Default shall cease to exist, and any Event of Default
        with respect to the Securities of such series arising\ntherefrom shall be
        deemed to have been cured, for every purpose of the Indenture; but no such
        waiver shall extend to any subsequent or\nother Default or Event of Default
        or impair any right consequent thereto.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The calculation
        agent for a Supplemental Obligation\n(the &ldquo;Calculation Agent&rdquo;)
        is as specified in the Related Prospectus. The Calculation Agent makes all
        determinations with respect\nto such Supplemental Obligation. All determinations
        made by the Calculation Agent will be at the sole discretion of the Calculation
        Agent\nand will be conclusive for all purposes and binding upon all parties,
        including the Company and the beneficial owners of such Supplemental\nObligation,
        absent manifest error. The Calculation Agent will have no responsibility for
        good faith errors or omissions in its calculations\nand determinations, whether
        caused by negligence or otherwise.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">The Indenture
        provides that a series of Securities\nmay include one or more tranches (each
        a &ldquo;tranche&rdquo;) of Securities, including Securities issued in a Periodic
        Offering. The\nSecurities of different tranches may have one or more different
        terms, but all the Securities of each tranche within a series shall have\nidentical
        terms, provided that Securities of each tranche within a series may have different
        authentication dates, public offering prices,\ninitial interest accrual dates,
        and initial interest payment dates, if applicable. Notwithstanding any other
        provision of the Indenture,\nsubject to certain exceptions, with respect to
        sections of the Indenture concerning the execution, authentication and terms
        of the Securities,\nredemption of the Securities, maintenance of an office
        or agency of the Company in The City of New York, Events of Default of the
        Securities,\ndefeasance of the Securities and amendment of the Indenture,
        if any series of Securities includes more than one tranche, all provisions\nof
        such sections applicable to any series of Securities shall be deemed equally
        applicable to each tranche of any series of Securities\nin the same manner
        as though originally designated a series unless otherwise provided with respect
        to such series or tranche pursuant\nto a Board Resolution or a supplemental
        indenture establishing such series or the Authority establishing such tranche.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 6; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align:
        center; font-size: 10pt; margin-top: 0pt; margin-bottom: 0pt\">R-<!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->3<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\">Each
        Supplemental Obligation evidenced by this\nNote is unsecured and ranks pari
        passu with all other unsecured and unsubordinated indebtedness of the Company.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">The interest rate, if any, coupon, if any, or redemption\namount,
        as applicable, will in no event be higher than the maximum rate permitted
        by New York or other applicable state law, as such law\nmay be modified by
        United States law of general application.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-family:
        Times New Roman, Times, Serif\">All\ndeterminations referred to above made
        by the Company or its agents shall be at its sole discretion and shall, in
        the absence of manifest\nerror, be conclusive for all purposes and binding
        on Holders of Securities. </FONT>So long as this Note shall be outstanding,
        the Company\nwill cause to be maintained an office or agency for the payment
        of amounts due or property to be delivered, if any, on this Note as herein\nprovided
        in the Borough of Manhattan, The City of New York, and an office or agency
        in said Borough of Manhattan for the registration,\ntransfer and exchange
        as aforesaid of the Notes. The Company may designate other agencies for the
        payment of such amounts or such property\nat such place or places (subject
        to applicable laws and regulations) as the Company may decide. So long as
        there shall be any such agency,\nthe Company shall keep the Trustee advised
        of the names and locations of such agencies, if any are so designated.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif\">No\nprovision
        of this Note or of the Indenture shall alter or impair the obligation of the
        Company, which is absolute and unconditional, to\npay or deliver the amounts
        or property due (whether at maturity or otherwise) on this Note at the time,
        place, and rate, and in the coin\nor currency</FONT> and/or the number of
        securities or other property, as applicable, herein and in the Indenture prescribed
        unless otherwise\nagreed between the Company and the registered Holder of
        this Note.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\">Upon due presentment for registration
        of transfer\nof this Note, a new Note or Notes of authorized denominations
        for an equal aggregate principal amount will be issued to the transferee\nin
        exchange therefor, subject to the limitations provided in the Indenture, without
        charge except for any tax or other governmental charge\nimposed in connection
        therewith.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\">The Company or any agent of the Company,
        the registrar\nof the Securities or the Trustee may treat the Holder in whose
        name this Note is registered as the owner hereof for all purposes, whether\nor
        not this Note is overdue, and neither the Company, the Registrar, the Trustee
        nor any such agent shall be affected by notice to the\ncontrary.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\">No recourse shall be had for the payment of amounts\ndue or property
        to be delivered, if any, with respect to each Supplemental Obligation evidenced
        by this Note, for any claim based hereon,\nor otherwise in respect hereof,
        or based on or in respect of the Indenture or any indenture supplemental thereto,
        against any incorporator,\nshareholder, officer or director, as such, past,
        present or future, of the Company or of any successor corporation, either
        directly or\nthrough the Company or any successor corporation, whether by
        virtue of any constitution, statute or rule&nbsp;of law or by the enforcement\nof
        any assessment or penalty or otherwise, all such liability being, by the acceptance
        hereof and as part of the consideration for the\nissue hereof, expressly waived
        and released.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\">This Note and each Supplemental
        Obligation evidenced\nhereby shall for all purposes be governed by, and construed
        in accordance with, the laws of the State of New York (without regard to conflicts\nof
        law principles thereof).</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 7; Value:
        1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"text-align: center; font-size: 10pt; margin-top:
        0pt; margin-bottom: 0pt\">R-<!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->4<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">FOR VALUE RECEIVED, the undersigned hereby sell(s),
        assign(s)&nbsp;and\ntransfer(s)&nbsp;unto</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
