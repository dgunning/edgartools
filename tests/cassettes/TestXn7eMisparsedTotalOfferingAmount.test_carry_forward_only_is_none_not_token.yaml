        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">ABOUT THIS PROSPECTUS</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">This prospectus is part of
        a registration statement on Form F-3 that we filed with the Securities and
        Exchange Commission, or the &#8220;SEC,&#8221; using a &#8220;shelf&#8221;
        registration process. Under this shelf process, we may sell any combination
        of the securities described in this prospectus in one or more offerings. This
        prospectus provides you with a general description of the securities we may
        offer. Each time we sell securities, we will provide a prospectus supplement
        that will contain specific information about the terms of that offering. The
        prospectus supplement may also add, update or change information contained
        in this prospectus. You should read both this prospectus and any prospectus
        supplement together with the additional information described under the heading
        &#8220;Where You Can Find More Information.&#8221; </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Unless the context otherwise
        requires and except as otherwise indicated, in this prospectus, the terms
        &#8220;we,&#8221; &#8220;our,&#8221; and &#8220;us&#8221; refer to Credit
        Suisse and its consolidated subsidiaries </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse&#8217;s financial
        statements, which are incorporated by reference into this prospectus, have&#160;been&#160;prepared
        in accordance with accounting principles generally accepted in the United
        States of America, which we refer to as &#8220;U.S. GAAP.&#8221; Credit Suisse&#8217;s
        financial statements are denominated in Swiss francs, the legal&#160;tender
        of Switzerland. When we refer to &#8220;CHF,&#8221; we mean Swiss francs.
        When we refer to &#8220;USD&#8221; or &#8220;$,&#8221; we mean U.S. dollars.
        On June&#160;7, 2023, the Swiss franc to U.S. dollar exchange rate was 0.90970
        Swiss francs = 1 U.S. dollar. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">LIMITATIONS ON ENFORCEMENT OF U.S. LAWS</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Credit Suisse is a bank domiciled
        in Switzerland. Many of its directors and executive officers, and certain
        experts named in this prospectus, are resident outside the United States,
        and all or a substantial portion of its assets and the assets of such persons
        are located outside the United States. As a result, it may be difficult for
        you to serve legal process on Credit Suisse or its directors and executive
        officers resident outside of the United States or have any of them appear
        in a U.S. court. We have been advised by Homburger AG, Swiss counsel to Credit
        Suisse that, due to the lack of reciprocal legislation between Switzerland
        and the United States, it may be difficult for you to enforce in Switzerland
        against Credit Suisse (or any of its respective directors or executive officers
        resident in Switzerland) judgments obtained in U.S. courts. In addition, there
        is doubt as to enforceability in Switzerland, in original actions or in actions
        for enforcement of judgments of U.S. courts, of liabilities predicated solely
        upon the federal or state securities laws of the United States. </font>\n
        \       </div>\n        <div style=\"margin-top:12pt; text-align:center; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">WHERE
        YOU CAN FIND MORE INFORMATION</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Credit
        Suisse files periodic reports and other information with the SEC. Copies of
        the documents filed by Credit Suisse with the SEC may be obtained either on
        the SEC&#8217;s website at www.sec.gov, which contains reports, proxy and
        information statements and other information regarding issuers that file electronically
        with the SEC, or on the website of Credit Suisse at https://www.credit-suisse.com/about-us/en/investor-relations/financial-regulatory-disclosures/sec-filings.html.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        SEC allows Credit Suisse to &#8220;incorporate by reference&#8221; the information
        it files with the SEC, which means that Credit Suisse can disclose important
        information to you by referring you to those documents. The information incorporated
        by reference is an important part of this prospectus, and information that
        Credit Suisse files later with the SEC and that is incorporated by reference
        will automatically update and supersede this information. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
