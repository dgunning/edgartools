        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">is made solely with assets
        of an insurance company general account and satisfies the requirements and
        conditions of PTCE 95-60 issued by the Department of Labor; </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">is made solely with assets
        managed by an in-house asset manager and satisfies the requirements and conditions
        of PTCE 96-23 issued by the Department of Labor; or </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">is made by a Plan with respect
        to which the issuing entity is a party in interest solely by virtue of it
        being a service provider and satisfies the requirements and conditions of
        Section&#160;408(b)(17) of ERISA and Section&#160;4975(d)(20) of the Code;
        such exemption is herein referred to as the &#8220;Service Provider Exemption.&#8221;
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Governmental Plans</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Governmental plans, non-U.S.
        plans and certain church plans (which we refer to as &#8220;Similar Law Plans&#8221;),
        while not subject to the fiduciary responsibility provisions of ERISA or the
        prohibited transaction provisions of ERISA or Section&#160;4975 of the Code,
        may nevertheless be subject to local, state or other federal laws that are
        substantially similar to the foregoing provisions of ERISA and the Code, which
        we refer to as &#8220;Similar Law.&#8221; Fiduciaries of any such plan should
        consult legal counsel before purchasing these securities. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">ERISA and Similar Law Representations</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">With respect to securities
        that are eligible for acquisition and holding by Plans, each person will,
        by its acquisition and holding, be deemed to have represented and agreed that
        on each day from the date of acquisition of the securities through and including
        the date of disposition of such securities it either (A)&#160;is not, and
        is not or acting on behalf of or investing the assets of, any Plan or Similar
        Law Plan or (B)&#160;is eligible for the exemptive relief available under
        PTCE 91-38, 90-1, 84-14, 95-60 or 96-23 or the Service Provider Exemption
        (or, if a Similar Law Plan, similar exemption from Similar Law) with respect
        to the purchase, holding and disposition of the securities to the extent it
        would either constitute or result in a &#8220;prohibited transaction&#8221;
        under ERISA or the Code (or violation of any Similar Law). Any fiduciary that
        proposes to cause a Plan or Similar Law Plan to acquire securities should
        consult with its counsel with respect to the potential applicability of ERISA,
        the Code or Similar Law to such investment and whether any exemption would
        be applicable and determine on its own whether all conditions of such exemption
        or exemptions have been satisfied such that the acquisition, holding and disposition
        of securities by the purchaser are entitled to the full exemptive relief thereunder.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Please
        consult the applicable prospectus supplement for further information with
        respect to a particular offering. Depending upon the security offered, restrictions
        on purchase or transfer to, by or on behalf of a Plan may apply.</font>\n
