        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Judiciary
        Law of New York State provides, however, that an action based upon an obligation
        denominated in a currency other than U.S. dollars will be rendered in the
        foreign currency of the underlying obligation. Accordingly, if you bring a
        lawsuit in a New York state court or in a federal court located in New York
        State for payment of a debt security denominated in a foreign currency, the
        court would award a judgment in the foreign currency and convert the judgment
        into U.S. dollars, on the date of the judgment. Consequently, in a lawsuit
        for payment on a debt security denominated in a foreign currency, you would
        bear currency exchange risk until judgment is entered, which could be a long
        time. U.S. courts located outside New York State would probably award a judgment
        in U.S. dollars but it is unclear what rate of exchange they would use. The
        date and method used to determine the rate of conversion of the specified
        currency into U.S. dollars will depend on various factors, including which
        court renders the judgment. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Enforcement
        of claims or court judgments under Swiss debt collection or bankruptcy proceedings
        may only be made in Swiss francs. Thus, the amount of any claim or court judgment
        denominated in a currency other than Swiss francs would be converted into
        Swiss francs at the rate obtained, for the enforcing creditor on (i)&#160;the
        date the enforcement proceedings are instituted or (ii)&#160;upon request
        of the creditor, the date of the filing for the continuation of the bankruptcy
        procedure (</font><font style=\"font-style:italic;letter-spacing:0.2pt;\">Fortsetzungsbegehren</font><font
        style=\"letter-spacing:0.2pt;\">)or the time of adjudication of bankruptcy
        (</font><font style=\"font-style:italic;letter-spacing:0.2pt;\">Konkurser&#246;ffnung</font><font
        style=\"letter-spacing:0.2pt;\">) and, with respect to non-enforcing creditors,
        at the time of adjudication of bankruptcy (</font><font style=\"font-style:italic;letter-spacing:0.2pt;\">Konkurser&#246;ffnung</font><font
        style=\"letter-spacing:0.2pt;\">). </font>\n        </div>\n      </div>\n
