        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">If the issuer is liquidated,
        the holders of the senior indebtedness will be entitled to receive payment
        in full in cash for principal, premium and interest on the senior indebtedness
        before the holders of subordinated debt securities receive any of the issuer&#8217;s
        assets. As a result, holders of subordinated debt securities may receive a
        smaller proportion of the issuer&#8217;s assets in liquidation than holders
        of senior indebtedness. In such a situation, holders of the subordinated debt
        securities could lose all or part of their investment. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Even if the subordination
        provisions prevent the issuer from making any payment when due on the subordinated
        debt securities, the issuer will be in default on its obligations under the
        Subordinated Indenture if it does not make the payment when due. This means
        that the trustee and the holders of subordinated debt securities can take
        action against the issuer, but they would not receive any money until the
        claims of the senior indebtedness have been fully satisfied. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The Subordinated Indenture
        allows the holders of senior indebtedness to obtain specific performance of
        the subordination provisions from the issuer or any holder of subordinated
        debt securities. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">There
        is no restriction on the amount of further debt securities that the issuer
        may issue or guarantee which rank senior to or pari&#160;passu with the subordinated
        debt securities. The issue of any such further debt securities may reduce
        the amount that may be recovered by holders of subordinated debt securities
        in the event that the issuer is wound up and/or may limit the ability of the
        issuer to meet its obligations under the subordinated debt securities. </font>\n
        \       </div>\n        <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Consolidation, Merger or
        Sale</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
