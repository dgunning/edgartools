        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Original Issue Discount Notes</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The issuer may offer series
        of debt securities, which we refer to as original issue discount notes, from
        time to time at an issue price (as specified in the applicable prospectus
        supplement) that is less than 100% of the principal amount of such series
        of debt securities (i.e., par). Original issue discount notes may not bear
        any interest currently or may bear interest at a rate that is below market
        rates at the time of issuance. The difference between the issue price of an
        original issue discount note and par is referred to herein as the &#8220;discount.&#8221;
        In the event of redemption, repayment or acceleration of maturity of an original
        issue discount note, the amount payable to the holder of an original issue
        discount note will be equal to the sum of (a)&#160;the issue price (increased
        by any accruals of discount) and, in the event of any redemption by us of
        such original issue discount note (if applicable), multiplied by the initial
        redemption&#160;percentage specified in the applicable prospectus supplement
        (as adjusted by the initial redemption&#160;percentage reduction, if applicable)
        </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
