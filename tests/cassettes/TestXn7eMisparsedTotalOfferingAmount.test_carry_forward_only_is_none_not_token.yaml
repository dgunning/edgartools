        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">replacement
        of lost, stolen or mutilated debt securities. Instead, the holders will only
        be able to rely on the deposited funds or obligations for payment. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        issuer must deliver to the trustee an officers&#8217; certificate and an opinion
        of counsel to the effect that the deposit and related defeasance would not
        cause the holders of the debt securities to recognize income, gain or loss
        for U.S. federal income tax purposes. In the case of a complete discharge,
        such opinion must be based on a ruling received from or published by the U.S.
        Internal Revenue Service or on a change in applicable U.S. federal income
        tax law. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Information
        Concerning the Trustee for the Debt Securities</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        Bank of New York Mellon, formerly known as The Bank of New York, with its
        corporate trust office at 240&#160;Greenwich Street, Floor&#160;7E, New York,
        New York 10286, will be the trustee for the debt securities. The trustee will
        be required to perform only those duties that are specifically set forth in
        the applicable indenture, except when a default has occurred and is continuing
        with respect to the debt securities. After a default, the trustee must exercise
        the same degree of care that a prudent person would exercise under the circumstances
        in the conduct of her or his own affairs. Subject to these requirements, the
        trustee will be under no obligation to exercise any of the powers vested in
        it by the applicable indenture at the request of any holder of debt securities
        unless the holder offers the trustee reasonable indemnity against the costs,
        expenses and liabilities that might be incurred by exercising those powers.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        Bank of New York Mellon, formerly known as The Bank of New York, has loaned
        money to Credit Suisse and certain of its subsidiaries and affiliates and
        provided other services to it and has acted as trustee or fiscal agent under
        certain of its and its subsidiaries&#8217; and affiliates&#8217; indentures
        or fiscal agency agreements in the past and may do so in the future as a part
        of its regular business. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Governing
        Law</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        debt securities and the related indentures will be governed by and construed
        in accordance with the laws of the State of New York, except for, in the case
        of subordinated debt securities, the subordination provisions thereof, which
        will be governed by Swiss law. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Payment
        and Transfer</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise provided for in the applicable prospectus supplement, the debt securities
        will be issued only as registered securities, which means that the name of
        the holder will be entered in a register that will be kept by the applicable
        trustee or another agent appointed by the issuer. Unless stated otherwise
        in a prospectus supplement, and except as described under &#8220;&#8212; Book-Entry
        System&#8221; below, principal and interest payments will be made at the office
        of the paying agent or agents named in the prospectus supplement or by check
        mailed to you at your address as it appears in the register. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Unless other procedures are
        described in a prospectus supplement, and except as described under &#8220;&#8212;
        Book-Entry System&#8221; below, you will be able to transfer registered debt
        securities at the office of the transfer agent or agents named in the prospectus
        supplement. You may also exchange registered debt securities at the office
        of the transfer agent for an equal aggregate principal amount of registered
        debt securities of the same series having the same maturity date, interest
        rate and other terms as long as the debt securities are issued in authorized
        denominations. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Neither
        the issuer nor the applicable trustee will impose any service charge for any
        transfer or exchange of a debt security. The issuer may, however, ask you
        to pay any taxes or other governmental charges in connection with a transfer
        or exchange of debt securities. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Book-Entry
        System</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Debt
        securities may be issued under a book-entry system in the form of one or more
        global securities. The global securities will be registered in the name of
        a depositary or its nominee and deposited with that depositary or its custodian.
        Unless stated otherwise in the prospectus supplement, The Depository Trust
        Company, New York, New York, or DTC, will be the depositary if a depositary
        is used. </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">33</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Following the issuance of
        a global security in registered form, the depositary will credit the accounts
        of its participants with the debt securities upon the issuer&#8217;s instructions.
        Only persons who hold directly or indirectly through financial institutions
        that are participants in the depositary can hold beneficial interests in the
        global securities. Since the laws of some jurisdictions require certain types
        of purchasers to take physical delivery of such securities in definitive form,
        you may encounter difficulties in your ability to own, transfer or pledge
        beneficial interests in a global security. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">So long as the depositary
        or its nominee is the registered owner of a global security, the issuer, the
        guarantor (if applicable) and the applicable trustee will treat the depositary
        as the sole owner or holder of the debt securities for purposes of the applicable
        indenture. Therefore, except as set forth below, you will not be entitled
        to have debt securities registered in your name or to receive physical delivery
        of certificates representing the debt securities. Accordingly, you will have
        to rely on the procedures of the depositary and the participant in the depositary
        through whom you hold your beneficial interest in order to exercise any rights
        of a holder under the applicable indenture. We understand that under existing
        practices, the depositary would act upon the instructions of a participant
        or authorize that participant to take any action that a holder is entitled
        to take. </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        stated otherwise in an applicable prospectus supplement, you may elect to
        hold interests in the global securities through either DTC (in the United
        States) or Clearstream Banking S.A., which we refer to as Clearstream, Luxembourg,
        or Euroclear Bank SA/NV, or its successor, as operator of the Euroclear System,
        which we refer to as Euroclear (outside of the United States), if you are
        participants of such systems, or indirectly through organizations which are
        participants in such systems. Interests held through Clearstream, Luxembourg
        and Euroclear will be recorded on DTC&#8217;s books as being held by the U.S.
        depositary for each of Clearstream, Luxembourg and Euroclear, which U.S. depositaries
        will in turn hold interests on behalf of their participants&#8217; customers&#8217;
        securities accounts. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As
        long as the debt securities of a series are represented by global securities,
        the issuer will pay principal of and interest and premium on those securities
        to, or as directed by, DTC as the registered holder of the global securities.
        Payments to DTC will be in immediately available funds by wire transfer. DTC,
        Clearstream, Luxembourg or Euroclear, as applicable, will credit the relevant
        accounts of their participants on the applicable date. Neither the issuer
        nor the applicable trustee will be responsible for making any payments to
        participants or customers of participants or for maintaining any records relating
        to the holdings of participants and their customers, and you will have to
        rely on the procedures of the depositary and its participants. If an issue
        of debt securities is denominated in a currency other than the U.S. dollar,
        the issuer will make payments of principal and any interest in the foreign
        currency in which the debt securities are denominated, or in U.S. dollars.
        DTC has elected to have all payments of principal and interest paid in U.S.
        dollars unless notified by any of its participants through which an interest
        in the debt securities is held that it elects, in accordance with, and to
        the extent permitted by, the applicable supplement and the relevant debt security,
        to receive payment of principal or interest in the foreign currency. On or
        prior to the third business day after the record date for payment of interest
        and 12&#160;days prior to the date for payment of principal, a participant
        will be required to notify DTC of (a)&#160;its election to receive all, or
        the specified portion, of payment in the foreign currency and (b)&#160;its
