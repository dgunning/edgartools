        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:280pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Euroclear
        participants will occur in the ordinary way in accordance with the applicable
        rules and operating procedures of Clearstream, Luxembourg and Euroclear and
        will be settled using the procedures applicable to conventional eurobonds
        in immediately available funds. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Cross-market
        transfers between persons holding directly or indirectly through DTC, on the
        one hand, and directly or indirectly through Clearstream, Luxembourg customers
        or Euroclear participants, on the other, will be effected in DTC in accordance
        with DTC rules on behalf of the relevant European international clearing system
        by a U.S. depositary; however, such cross-market transactions will require
        delivery of instructions to the relevant European international clearing system
        by the counterparty in such system in accordance with its rules and procedures
        and within its established deadlines (based on European time). The relevant
        European international clearing system will, if the transaction meets its
        settlement requirements, deliver instructions to the U.S. depositary to take
        action to effect final settlement on its behalf by delivering or receiving
        debt securities in DTC, and making or receiving payment in accordance with
        normal procedures for same-day funds settlement applicable to DTC. Clearstream,
        Luxembourg customers and Euroclear participants may not deliver instructions
        directly to their respective U.S. depositaries. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Because of time-zone differences,
        credits of debt securities received in Clearstream, Luxembourg or Euroclear
        as a result of a transaction with a DTC participant will be made during subsequent
        securities settlement processing and dated the business day following the
        DTC settlement date. Such credits or any transactions in such debt securities
        settled during such processing will be reported to the relevant Clearstream,
        Luxembourg customers or Euroclear participants on such business day. Cash
        received in Clearstream, Luxembourg or Euroclear as a result of sales of debt
        securities, by or through a Clearstream, Luxembourg customer or a Euroclear
        participant to a DTC participant will be received with value on the DTC settlement
        date but will be available in the relevant Clearstream, Luxembourg or Euroclear
        cash account only as of the business day following settlement in DTC. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Although
        DTC, Clearstream, Luxembourg and Euroclear have agreed to the foregoing procedures
        in order to facilitate transfers of debt securities among participants of
        DTC, Clearstream, Luxembourg and Euroclear, they are under no obligation to
        perform or continue to perform such procedures and such procedures may be
        discontinued at any time.</font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n        <div
        style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">37</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a><a name=\"tSPRT\">&#8203;</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:11.5pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">SPECIAL PROVISIONS RELATING
        TO DEBT SECURITIES</font>\n          <br >\n          <font style=\"letter-spacing:-0.2pt;\">DENOMINATED
        IN A FOREIGN CURRENCY</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise specified in the applicable prospectus supplement, the following
        additional provisions will apply to debt securities denominated in a foreign
        currency. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Payment
        Currency</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise indicated in the applicable prospectus supplement, you will be required
        to pay for debt securities denominated in a foreign currency in the specified
        currency. Currently, there are limited facilities in the United States for
        the conversion of U.S. dollars into foreign currencies. Therefore, unless
        otherwise indicated in the applicable prospectus supplement, the exchange
        rate agent the issuer appoints and identifies in the applicable prospectus
        supplement will arrange for the conversion of U.S. dollars into the specified
        currency on behalf of any purchaser of a debt security denominated in a foreign
        currency to enable a prospective purchaser to deliver the specified currency
        in payment for a debt security denominated in a foreign currency. The exchange
        rate agent must receive a request for any conversion on or prior to the third
        business day preceding the date of delivery of the debt security denominated
        in a foreign currency. You must pay all costs of currency exchange. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        otherwise specified in the applicable prospectus supplement or unless the
        holder of a debt security denominated in a foreign currency elects to receive
        payments in the specified currency, payments made by the issuer of principal
        of, premium, if any, and interest, if any, on a debt security denominated
        in a foreign currency will be made in U.S. dollars. The U.S. dollar amount
        to be received by a holder will be based on the highest bid quotation in The
        City of New York received by the exchange rate agent at approximately 11:00&#160;a.m.,
        New York City time, on the second business day preceding the applicable payment
        date from three recognized foreign exchange dealers (one of which may be the
        exchange rate agent) for the purchase by the quoting dealer of the specified
        currency for U.S. dollars for settlement on the payment date in the aggregate
        amount of the specified currency payable to the holders of debt securities
        scheduled to receive U.S. dollar payments and at which the applicable dealer
        commits to execute a contract. If these bid quotations are not available,
        payments to holders will be made in the specified currency. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Unless otherwise specified
        in the applicable prospectus supplement, a holder of a debt security denominated
        in a foreign currency may elect to receive payment in the specified currency
        for all payments and need not file a separate election for each payment, and
        such election will remain in effect until revoked by written notice to the
        paying agent at its corporate trust office in The City of New York received
        on a date prior to the record date for the relevant interest payment date
        or at least 10 calendar days prior to the maturity date (or any redemption
        date, repayment date or repurchase date), as the case may be; provided, that
        such election is irrevocable as to the next succeeding payment to which it
        relates. If such election is made as to full payment on a debt security, the
        election may thereafter be revoked so long as the paying agent is notified
        of the revocation within the time period set forth above. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Banks in the United States
        offer non-U.S. dollar-denominated checking or savings account facilities in
        the United States only on a limited basis. Accordingly, unless otherwise indicated
        in the applicable prospectus supplement, payments of principal of, premium,
        if any, and interest, if any, on, debt securities denominated in a foreign
        currency to be made in a specified currency other than U.S. dollars will be
        made to an account at a bank outside the United States, unless alternative
        arrangements are made. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        a specified currency (other than the U.S. dollar) in which a debt security
        is denominated or payable: (a)&#160;ceases to be recognized by the government
        of the country which issued such currency or for the settlement of transactions
        by public institutions of or within the international banking community, (b)&#160;is
        a currency unit and such currency unit ceases to be used for the purposes
        for which it was established, or (c)&#160;is not available to the issuer for
        making payments due to the imposition of exchange controls or other circumstances
        beyond its control, in each such case, as determined in good faith by the
        issuer, then with respect to each date for the payment of principal of and
        interest, if any, on a debt security denominated or payable in such specified
        currency occurring after the last date on which such specified currency was
        so used, which we refer to as the conversion date, the U.S. dollar or such
        foreign currency or currency unit as may be specified by the issuer, which
        we refer to as the substitute currency, will become the currency of payment
        for use on each such payment date (but such specified currency will, at the
        issuer&#8217;s election, resume being the currency of </font>\n        </div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">38</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">payment
        on the first such payment date preceded by 15 business days during which the
        circumstances which gave rise to the change of currency no longer prevail,
        in each case, as determined in good faith by the issuer). The substitute currency
        amount to be paid by the issuer to the applicable trustee and by the applicable
        trustee or any paying agent to the holder of a debt security with respect
        to such payment date will be the currency equivalent or currency unit equivalent
        (each as defined below) of the specified currency as determined by the exchange
        rate agent (which determination will be delivered in writing to the applicable
        trustee not later than the fifth business day prior to the applicable payment
        date) as of the conversion date or, if later, the date most recently preceding
        the payment date in question on which such determination is possible of performance,
        but not more than 15 business days before such payment date. We refer to such
        conversion date or date preceding a payment date as aforesaid as the valuation
        date. Any payment in a substitute currency under the circumstances described
        above will not constitute an event of default under the applicable indenture
        or the debt securities. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        &#8220;currency equivalent&#8221; will be determined by the exchange rate
        agent as of each valuation date and will be obtained by converting the specified
        currency (unless the specified currency is a currency unit) into the substitute
        currency at the market exchange rate (as defined below) on the valuation date.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        &#8220;currency unit equivalent&#8221; will be determined by the exchange
        rate agent as of each valuation date and will be the sum obtained by adding
        together the results obtained by converting the specified amount of each initial
        component currency into the substitute currency at the market exchange rate
        on the valuation date for such component currency. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8220;Component currency&#8221;
        means any currency which, on the conversion date, was a component currency
        of the relevant currency unit. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8220;Market
        exchange rate&#8221; means, as of any date, for any currency or currency unit,
        the noon U.S. dollar buying rate for that currency or currency unit, as the
        case may be, for cable transfers quoted in The City of New York on such date
        as certified for customs purposes by the Federal Reserve Bank of New York.
        If such rates are not available for any reason with respect to one or more
        currencies or currency&#160;units for which an exchange rate is required,
        the exchange rate agent will use, in its sole discretion and without liability
        on its part, such quotation of the Federal Reserve Bank of New York as of
        the most recent available date, or quotations from one or more major banks
        in The City of New York or in the country of issue of the currency or currency
        unit in question, or such other quotations as the exchange rate agent will
        deem appropriate. Unless otherwise specified by the exchange rate agent, if
        there is more than one market for dealing in any currency or currency unit
        by reason of foreign exchange regulations or otherwise, the market to be used
        in respect of such currency or currency unit will be that upon which a non-resident
        issuer of securities designated in such currency or currency unit would, as
        determined in its sole discretion and without liability on the part of the
        exchange rate agent, purchase such currency or currency unit in order to make
        payments in respect of such securities. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8220;Specified amount&#8221;
        of a component currency means the number of&#160;units (including decimals)
        which such component currency represented in the relevant currency unit, on
        the conversion date or the valuation date or the last date the currency unit
        was so used, whichever is later. If after such date the official unit of any
        component currency is altered by way of combination or subdivision, the specified
        amount of such component currency will be divided or multiplied in the same
        proportion. If after such date two or more component currencies are consolidated
        into a single currency, the respective specified amounts of such component
        currencies will be replaced by an amount in such single currency equal to
        the sum of the respective specified amounts of such consolidated component
        currencies expressed in such single currency, and such amount will thereafter
        be a specified amount and such single currency will thereafter be a component
        currency. If after such date any component currency will be divided into two
        or more currencies, the specified amount of such component currency will be
        replaced by specified amounts of such two or more currencies, the sum of which,
        at the market exchange rate of such two or more currencies on the date of
        such replacement, will be equal to the specified amount of such former component
        currency and such amounts will thereafter be specified amounts and such currencies
        will thereafter be component currencies. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">All determinations referred
        to above made by the issuer or its agents will be at its or their sole discretion
        and will, in the absence of manifest error, be conclusive for all purposes
        and binding on you. </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">39</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:464pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Specific information about
        the currency, currency unit or composite currency in which a particular debt
        security denominated in a foreign currency is denominated, including historical
        exchange rates and a description of the currency and any exchange controls,
        will be set forth in the applicable prospectus supplement. The information
        therein concerning exchange rates is furnished as a matter of information
        only and should not be regarded as indicative of the range of or trends in
        fluctuations in currency exchange rates that may occur in the future. </font>\n
        \       </div>\n        <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Minimum Denominations, Restrictions
        on Maturities, Repayment and Redemption</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Debt
        securities denominated in specified currencies other than U.S. dollars will
        have the minimum denominations and will be subject to the restrictions on
        maturities, repayment and redemption that are set forth in the applicable
        prospectus supplement. Any other restrictions applicable to debt securities
        denominated in specified currencies other than U.S. dollars, including restrictions
        related to the distribution of such debt securities, will be set forth in
        the applicable prospectus supplement. </font>\n        </div>\n      </div>\n
        \     <div style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">40</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a><a name=\"tFCR\">&#8203;</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">FOREIGN CURRENCY RISKS</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">This prospectus does not,
        and any applicable prospectus supplement will not, describe all of the possible
        risks of an investment in debt securities the payment on which will be made
        in, or affected by the value of, a foreign currency or a composite currency.
        You should not invest in debt securities denominated in a foreign currency
        if you are not knowledgeable about foreign currency and indexed transactions.
        You should consult your own financial and legal advisors about such risks
        as such risks may change from time to time. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We are providing the following
        information for the benefit of U.S. residents. If you are not a U.S. resident,
        you should consult your own financial and legal advisors before investing
        in any debt securities. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Exchange
        Rates and Exchange Controls</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">A
        series of debt securities denominated in, or affected by the value of, a currency
        other than U.S. dollars has additional risks that do not exist for U.S. dollar
        denominated debt securities. The most important risks are (a)&#160;possible
        changes in exchange rates between the U.S. dollar and the specified currency
        after the issuance of the debt securities resulting from market changes in
        rates or from the official redenomination or revaluation of the specified
        currency and (b)&#160;imposition or modification of foreign exchange controls
        by either the U.S. government or foreign governments. Such risks generally
        depend on economic events, political events and the supply of, and demand
        for, the relevant currencies, over which we have no control. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Exchange rates have fluctuated
        greatly in recent&#160;years and are likely to continue to fluctuate in the
        future. These fluctuations are caused by economic forces as well as political
        factors. However, you cannot predict future fluctuations based on past exchange
        rates. If the foreign currency decreases in value relative to the U.S. dollar,
        the yield on a debt security denominated in a foreign currency or on a currency-linked
        indexed debt security for a U.S. investor will be less than the coupon rate
        and you may lose money at maturity if you sell such debt security. In addition,
        you may lose all or most of your investment in a currency-linked indexed debt
        security as a result of changes in exchange rates. Except as described below
        or in any applicable prospectus supplement, we will not make any adjustment
        in or change to the terms of the debt securities for changes in the exchange
        rate for the relevant currency, including any devaluation, revaluation, or
        imposition of exchange or other regulatory controls or taxes, or for other
        developments affecting that currency, the U.S. dollar, or any other currency.
        Consequently, you will bear the risk that your investment may be affected
        adversely by these types of events. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Governments often impose exchange
        controls which can affect exchange rates or the availability of the foreign
        currency to make payments of principal, premium, if any, and interest on the
        debt securities. We cannot assure you that exchange controls will not restrict
        or prohibit payments of principal, premium, if any, or interest denominated
        in any specified currency. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Even
        if there are no actual exchange controls, it is possible that the specified
        currency would not be available to the issuer when payments on the debt securities
        are due because of circumstances beyond its control. If the specified foreign
        currency is not available, the issuer will make the required payments in U.S.
        dollars on the basis of the market exchange rate on the date of such payment,
        or if such rate of exchange is not then available, on the basis of the market
        exchange rate as of a recent date. We refer you to &#8220;Special Provisions
        Relating to Debt Securities Denominated in a Foreign Currency&#8201;&#8212;&#8201;Payment
        Currency.&#8221; You should consult your own financial and legal advisors
        as to the risk of an investment in debt securities denominated in a currency
        other than your home currency. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Any
        applicable prospectus supplement relating to debt securities having a specified
        currency other than U.S. dollars will contain a description of any material
        exchange controls affecting that currency and any other required information
        concerning the currency. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Foreign
        Currency Judgments</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        debt securities and the applicable indentures, except for, in the case of
        the Subordinated Indenture and the subordinated debt securities, the subordination
        provisions thereof which are governed by Swiss law, are governed by New York
        State law. Courts in the United States customarily have not rendered judgments
        for money damages denominated in any currency other than the U.S. dollar.
        A 1987&#160;amendment to the </font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
