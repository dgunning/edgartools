        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 2;
        Options: NewSection; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        right; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic;
        Name: PageNo -->2<!-- Field: /Sequence -->/8</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: right; font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"><IMG SRC=\"tm2317905d2_ex5-2img001.jpg\"
        ALT=\"\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">In this opinion, Swiss legal concepts are expressed
        in English terms\nand not in their original language. These concepts may not
        be identical to the concepts described by the same English terms as they exist\nunder
        the laws of other jurisdictions. With respect to Documents governed by laws
        other than the laws of Switzerland, for purposes of\nthis opinion, we have
        relied on the plain meaning of the words and expressions contained therein
        without regard to any import they may\nhave under the relevant governing law.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.25in\">II.</TD><TD
        STYLE=\"text-align: justify\">Assumptions</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">In rendering the opinions
        below, we have assumed the following:</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0pt\"></TD><TD STYLE=\"width: 28.35pt\">(a)</TD><TD>all documents
        produced to us as originals are authentic and complete,\n                                            and
        all documents produced to us as copies (including, without limitation, fax
        and electronic\n                                            copies) conform
        to the original;</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0pt\"></TD><TD STYLE=\"width: 28.35pt\">(b)</TD><TD>all documents produced
        to us as originals and the originals of all\n                                            documents
        produced to us as copies were duly executed and certified, as applicable,
        by the\n                                            individuals purported
        to have executed or certified, as the case may be, such documents,\n                                            and
        any electronic signatures of CS (whether acting through its head office or
        through one\n                                            of its branches)
        on any such document have been affixed thereto by the individual to whom\n
        \                                           such electronic signature belongs
        and such individual has saved and submitted such document\n                                            as
        so electronically signed in such a manner so as to prevent removal or other
        alteration\n                                            of such signature;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0pt\"></TD><TD STYLE=\"width: 28.35pt\">(c)</TD><TD>except
        as expressly opined upon herein, all information contained\n                                            in
        the Documents is, and all material statements made to us in connection with
        the Documents\n                                            are, true and accurate;</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0pt\"></TD><TD STYLE=\"width: 28.35pt\">(d)</TD><TD>the
        Registration Statement and the Exhibits will be executed and filed\n                                            with
        the SEC in the form reviewed by us;</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
