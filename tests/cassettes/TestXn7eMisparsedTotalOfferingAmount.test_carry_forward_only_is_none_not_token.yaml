        <B>Registration Statement Approval</B>).</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">No documents have been
        reviewed by us in connection with this opinion\nother than the Documents.
        Accordingly, we shall limit our opinion to the Documents and their legal implications
        under the laws of Switzerland.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
