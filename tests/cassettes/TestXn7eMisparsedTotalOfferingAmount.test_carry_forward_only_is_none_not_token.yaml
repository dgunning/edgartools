        notes issued on the same day and having the same terms, of making all payments
        of principal, premium, if any, and interest after the exercise of such option,
        whether at maturity or otherwise (which payments would otherwise be made in
        the face amount currency of such series of debt securities specified in the
        applicable prospectus supplement), in the optional payment currency specified
        in the applicable prospectus supplement. The terms of the dual currency notes
        together with information as to the </font>\n        </div>\n      </div>\n
