        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a><a name=\"tERF6\">&#8203;</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">ERISA</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">ERISA
        and Section&#160;4975 of the Code impose certain restrictions on (a)&#160;employee
        benefit plans, including entities such as collective investment funds and
        separate accounts, that are subject to Title I of ERISA, (b)&#160;plans described
        in Section&#160;4975(e)(1) of the Code, including individual retirement accounts
        and Keogh plans, subject to Section&#160;4975 of the Code and (c)&#160;any
        entities or accounts whose underlying assets include &#8220;plan assets&#8221;
        by reason of the Plan&#160;Asset Regulation (as defined below) or otherwise.
        Each of (a), (b)&#160;and (c)&#160;is herein referred to as a &#8220;Plan.&#8221;
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">General
        Fiduciary Considerations</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">ERISA
        also imposes certain duties on persons who are fiduciaries with respect to
        Plans subject to ERISA. In accordance with ERISA&#8217;s general fiduciary
        requirements, a fiduciary with respect to any such Plan who is considering
        the purchase of securities on behalf of such Plan should determine whether
        such purchase is permitted under the governing plan documents and is prudent
        and appropriate for the Plan in view of its overall investment policy and
        the composition and diversification of its portfolio. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Plan&#160;Asset Considerations</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The Department of Labor has
        issued a regulation (29 C.F.R. Section&#160;2510.3-101), as modified by Section&#160;3(42)
        of ERISA, concerning the definition of what constitutes the assets of a Plan
        for purposes of ERISA and Section&#160;4975 of the Code, or the &#8220;Plan&#160;Asset
        Regulation.&#8221; The Plan&#160;Asset Regulation provides that, as a general
        rule, the underlying assets and properties of corporations, partnerships,
        trusts and certain other entities would be treated as &#8220;plan assets&#8221;
        of a Plan investing therein for purposes of ERISA and/or Section&#160;4975
        of the Code only if the Plan acquired an &#8220;equity interest&#8221; in
        such entity (i.e., an interest other than an instrument which is treated as
        indebtedness under applicable local law and which has no substantial equity
        features) and none of the exceptions to holding &#8220;plan assets&#8221;
        contained in the Plan&#160;Asset Regulation applied. Under one such exception,
        the assets of an entity will not be considered &#8220;plan assets&#8221; as
        a result of a Plan&#8217;s equity investment in such entity where such entity
        is an &#8220;operating company&#8221; &#8203;(i.e., an entity that is primarily
        engaged, through majority- and/or wholly-owned subsidiaries, in producing
        a product or providing a service other than the investment of capital). Under
        another such exception, the assets of an entity will not be considered &#8220;plan
        assets&#8221; where a Plan makes an investment in an equity interest of such
        entity that is a &#8220;publicly-offered security.&#8221; A &#8220;publicly-offered
        security&#8221; is a security that is (a)&#160;&#8220;freely transferable,&#8221;(b)
        part of a class of securities that is &#8220;widely held&#8221; and (c)&#160;either
        part of a class of securities that is registered under Section&#160;12(b)
        or 12(g) of the Exchange Act or sold to the Plan as part of an offering of
        securities to the public pursuant to an effective registration statement under
        the Securities Act of 1933, as amended, or the &#8220;Securities Act,&#8221;
        and the class of securities of which such security is a part is registered
        under the Exchange Act within 120&#160;days (or such later time as may be
        allowed by the SEC) after the end of the fiscal year of the issuer during
        which the offering of such securities to the public occurred. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Prohibited Transaction Considerations</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Section&#160;406 of ERISA
        and Section&#160;4975 of the Code prohibit certain transactions involving
        Plans, and certain persons, referred to as &#8220;parties in interest&#8221;
        under ERISA or &#8220;disqualified persons&#8221; under the Code, having certain
        relationships with such Plans. We and certain of our subsidiaries, controlling
        shareholders and other affiliates may each be considered a &#8220;party in
        interest&#8221; or &#8220;disqualified person&#8221; with respect to many
        Plans. Prohibited transactions within the meaning of ERISA or the Code may
        arise, for example, as the result of the loan of money to us, if debt securities
        are acquired by or with the assets of a Plan with respect to which one of
        these entities is a service provider, unless such securities are acquired
        pursuant to a statutory or an administrative exemption. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The acquisition of the securities
        may be eligible for one of the exemptions noted below if the acquisition:
        </font>\n        </div>\n        <div style=\" float:left; margin-left:20pt;
        line-height:12pt; margin-top:5.8pt; margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br
        >\n        </div>\n        <div style=\" margin-top:5.8pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">is made solely with the assets
        of a bank collective investment fund and satisfies the requirements and conditions
        of Prohibited Transaction Class&#160;Exemption, or &#8220;PTCE,&#8221; 91-38
        issued by the Department of Labor; </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
