        Cash Equivalents, and Short-term Investments","description":"Cash includes
        currency on hand as well as demand deposits with banks or financial institutions.
        It also includes other kinds of accounts that have the general characteristics
        of demand deposits in that the customer may deposit additional funds at any
        time and effectively may withdraw funds at any time without prior notice or
        penalty. Cash equivalents, excluding items classified as marketable securities,
        include short-term, highly liquid Investments that are both readily convertible
        to known amounts of cash, and so near their maturity that they present minimal
        risk of changes in value because of changes in interest rates. Generally,
        only investments with original maturities of three months or less qualify
        under that definition. Original maturity means original maturity to the entity
        holding the investment. For example, both a three-month US Treasury bill and
        a three-year Treasury note purchased three months from maturity qualify as
        cash equivalents. However, a Treasury note purchased three years ago does
        not become a cash equivalent when its remaining maturity is three months.
        Short-term investments, exclusive of cash equivalents, generally consist of
