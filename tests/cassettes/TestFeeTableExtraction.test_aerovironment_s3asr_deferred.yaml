        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; line-height:12pt; margin-top:4.5pt; margin-bottom:0pt;
        text-align:left; width:20pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">(2)</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:4.5pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:20pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">These fees are calculated
        based on the securities offered and the number of issuances and accordingly
        cannot be estimated at this time. </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Item&#160;15.&nbsp;&nbsp;&nbsp;</font><font
        style=\"font-style:italic;letter-spacing:-0.2pt;\">Indemnification of Directors
        and Officers</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Subsection
        (a)&#160;of Section&#160;145 of the General Corporation Law of the State of
        Delaware, or the&#160;DGCL, empowers a corporation to indemnify any person
        who was or is a party or who is threatened to be made a party to any threatened,
        pending or completed action, suit or proceeding, whether civil, criminal,
        administrative or investigative (other than an action by or in the right of
        the corporation) by reason of the fact that the person is or was a director,
        officer, employee or agent of the corporation, or is or was serving at the
        request of the corporation as a director, officer, employee or agent of another
        corporation, partnership, joint venture, trust or other enterprise, against
        expenses (including attorneys&#8217; fees), judgments, fines and amounts paid
        in settlement actually and reasonably incurred by the person in connection
        with such action, suit or proceeding if the person acted in good faith and
        in a manner the person reasonably believed to be in or not opposed to the
        best interests of the corporation, and, with respect to any criminal action
        or proceeding, had no reasonable cause to believe the person&#8217;s conduct
        was unlawful. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Subsection
        (b)&#160;of Section&#160;145 empowers a corporation to indemnify any person
        who was or is a party or is threatened to be made a party to any threatened,
        pending or completed action or suit by or in the right of the corporation
        to procure a judgment in its favor by reason of the fact that the person acted
        in any of the capacities set forth above, against expenses (including attorneys&#8217;
        fees) actually and reasonably incurred by the person in connection with the
        defense or settlement of such action or suit if the person acted in good faith
        and in a manner the person reasonably believed to be in or not opposed to
        the best interests of the corporation, except that no indemnification shall
        be made in respect of any claim, issue or matter as to which such person shall
        have been adjudged to be liable to the corporation unless and only to the
        extent that the Court of Chancery or the court in which such action or suit
        was brought shall determine upon application that, despite the adjudication
        of liability but in view of all the circumstances of the case, such person
        is fairly and reasonably entitled to indemnity for such expenses which the
        Court of Chancery or such other court shall deem proper. </font>\n        </div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">II-1</font>\n          <br
        >\n        </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Section&#160;145 further provides
        that to the extent a director or officer of a corporation has been successful
        on the merits or otherwise in the defense of any action, suit or proceeding
        referred to in subsections (a)&#160;and (b)&#160;of Section&#160;145, or in
        defense of any claim, issue or matter therein, such person shall be indemnified
        against expenses (including attorneys&#8217; fees) actually and reasonably
        incurred by such person in connection therewith; that indemnification provided
        for by Section&#160;145 shall not be deemed exclusive of any other rights
        to which the indemnified party may be entitled; and the indemnification provided
        for by Section&#160;145 shall, unless otherwise provided when authorized or
        ratified, continue as to a person who has ceased to be a director, officer,
        employee or agent and shall inure to the benefit of such person&#8217;s heirs,
        executors and administrators. Section&#160;145 also empowers the corporation
        to purchase and maintain insurance on behalf of any person who is or was a
        director, officer, employee or agent of the corporation, or is or was serving
        at the request of the corporation as a director, officer, employee or agent
        of another corporation, partnership, joint venture, trust or other enterprise
        against any liability asserted against such person and incurred by such person
        in any such capacity, or arising out of his status as such, whether or not
        the corporation would have the power to indemnify such person against such
        liabilities under Section&#160;145. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Section&#160;102(b)(7) of
        the DGCL provides that a corporation&#8217;s certificate of incorporation
        may contain a provision eliminating or limiting the personal liability of
        a director to the corporation or its stockholders for monetary damages for
        breach of fiduciary duty as a director, provided that such provision shall
        not eliminate or limit the liability of a director (i)&#160;for any breach
        of the director&#8217;s duty of loyalty to the corporation or its stockholders,
        (ii)&#160;for acts or omissions not in good faith or which involve intentional
        misconduct or a knowing violation of law, (iii)&#160;under Section&#160;174
        of the DGCL, or (iv)&#160;for any transaction from which the director derived
        an improper personal benefit. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Any
        underwriting agreement or distribution agreement that the registrant enters
        into with any underwriters or agents involved in the offering or sale of any
        securities registered hereby may require such underwriters or dealers to indemnify
        the registrant, some or all of its directors and officers and its controlling
        persons, if any, for specified liabilities, which may include liabilities
        under the Securities Act of 1933, as amended. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Additionally, our Certificate
        of Incorporation provides that we will indemnify and hold harmless&#160;current
        or former directors or officers involved in legal actions due to their role,
        provided that the directors/officers acted in good faith and in our best interests
        (and in criminal cases, no reasonable cause to believe their conduct was unlawful).
        The Certificate of Incorporation further provides that we will indemnify and
        hold harmless current or former directors or officers involved in legal actions
        initiated by us, provided that the directors and officers acted in good faith
        and in our best interests. The indemnification includes expenses reasonably
        incurred, including attorneys&#8217; fees. If the director or officer is found
        liable to us, indemnification is only possible if a court determines it is
        fair and reasonable under the circumstances. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We have entered into indemnification
        agreements with each of our executive officers and directors. The indemnification
        agreements provide the indemnitees with contractual rights to indemnification,
        and expense advancement and reimbursement, to the fullest extent permitted
        under the DGCL, subject to certain exceptions contained in those agreements.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Item&#160;16.&nbsp;&nbsp;&nbsp;</font><font
        style=\"font-style:italic;letter-spacing:-0.2pt;\">Exhibits</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <table style=\"width:456pt;height:143.5pt;margin-top:10pt;border-collapse:
        collapse;font-style:normal;font-weight:bold;font-variant:normal;text-transform:none;color:#000000;font-family:Times
