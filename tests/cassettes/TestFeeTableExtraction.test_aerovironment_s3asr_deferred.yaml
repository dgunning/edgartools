        \       <div style=\" margin-top:6.3pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">waive a redemption payment
        with respect to any debt security. (Section&#160;9.3) </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Except for certain specified
        provisions, the holders of at least a majority in principal amount of the
        outstanding debt securities of any series may on behalf of the holders of
        all debt securities of that series waive our compliance with provisions of
        the indenture. (Section&#160;9.2) The holders of a majority in principal amount
        of the outstanding debt securities of any series may on behalf of the holders
        of all the debt securities of such series waive any past default under the
        indenture with respect to that series and its consequences, except a default
        in the payment of the principal of, premium or any interest on any debt security
        of that series; provided, however, that the holders of a majority in principal
        amount of the outstanding debt securities of any series may rescind an acceleration
        and its consequences, including any related payment default that resulted
        from the acceleration. (Section&#160;6.13) </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Defeasance of Debt Securities
        and Certain Covenants in Certain Circumstances</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"font-style:italic;letter-spacing:0.2pt;\">Legal
        Defeasance</font><font style=\"letter-spacing:0.2pt;\">.&nbsp;&nbsp;&nbsp;The
        indenture provides that, unless otherwise provided by the terms of the applicable
        series of debt securities, we may be discharged from any and all obligations
        in respect of the debt securities of any series (subject to certain exceptions).
        We will be so discharged upon the irrevocable deposit with the trustee, in
        trust, of money and/or U.S. government obligations or, in the case of debt
        securities denominated in a single currency other than U.S. Dollars, government
        obligations of the government that issued or caused to be issued such currency,
        that, through the payment of interest and principal in accordance with their
        terms, will provide money or U.S. government obligations in an amount sufficient
        in the opinion of a nationally recognized firm of independent public accountants
        or investment bank to pay and discharge each installment of principal, premium
        and interest on and any mandatory sinking fund payments in respect of the
        debt securities of that series on the stated maturity of those payments in
        accordance with the terms of the indenture and those debt securities. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">This
        discharge may occur only if, among other things, we have delivered to the
        trustee an opinion of counsel stating that we have received from, or there
        has been published by, the United States Internal Revenue Service a ruling
        or, since the date of execution of the indenture, there has been a change
        in the applicable United States federal income tax law, in either case to
        the effect that, and based thereon such opinion shall confirm that, the holders
        of the debt securities of that series will not recognize income, gain or loss
        for United States federal income tax purposes as a result of the deposit,
        defeasance and discharge and will be subject to United States federal income
        tax on the same amounts and in the same manner and at the same times as would
        have been the case if the deposit, defeasance and discharge had not occurred.
        (Section&#160;8.3) </font>\n        </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
