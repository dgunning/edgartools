        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;1.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Incorporation\nby
        Reference of Trust Indenture Act</U>.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Whenever this Indenture refers\nto a provision of the TIA, the provision
        is incorporated by reference in and made a part of this Indenture. The following
        TIA terms used\nin this Indenture have the following meanings:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 9; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->4<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Commission</I>&rdquo;\nmeans
        the SEC.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>indenture
        securities</I>&rdquo;\nmeans the Securities.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>indenture security\nholder</I>&rdquo; means a Holder.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>indenture to be qualified</I>&rdquo;\nmeans
        this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>indenture
        trustee</I>&rdquo;\nor &ldquo;<I>institutional trustee</I>&rdquo; means the
        Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 1in; text-align: justify\">&ldquo;<I>obligor</I>&rdquo;
        on the indenture\nsecurities means the Company and any successor obligor upon
        the Securities.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">All other terms
        used in this\nIndenture that are defined by the TIA, defined by TIA reference
        to another statute or defined by SEC rule&nbsp;under the TIA and not otherwise\ndefined
        herein are used herein as so defined.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;1.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Rules&nbsp;of\nConstruction</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Unless the context otherwise\nrequires:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nterm
        has the meaning assigned to it;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>an\naccounting
        term not otherwise defined has the meaning assigned to it in accordance with
        GAAP;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>&ldquo;<I>or</I>&rdquo;\nis
        not exclusive;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>words\nin
        the singular include the plural, and in the plural include the singular;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>provisions\napply
        to successive events and transactions;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>in\nthe
        computation of periods of time from a specified date to a later specified
        date, the word &ldquo;from&rdquo; means &ldquo;from and\nincluding,&rdquo;
        and the words &ldquo;to&rdquo; and &ldquo;until&rdquo; each mean &ldquo;to
        but excluding&rdquo;; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align: justify; font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nphrase
        &ldquo;in writing&rdquo; as used herein shall be deemed to include PDFs, e-mails
        and other electronic means of transmission, unless\notherwise indicated.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE&nbsp;II.<FONT STYLE=\"text-transform: uppercase\"><BR>\nTHE
        SECURITIES</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;2.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Issuable\nin
        Series</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The aggregate principal
        amount\nof Securities that may be authenticated and delivered under this Indenture
        is unlimited. The Securities may be issued in one or more Series.\nAll Securities
        of a Series&nbsp;shall be identical except as may be set forth or determined
        in the manner provided in a Board Resolution,\na supplemental indenture or
        an Officer&rsquo;s Certificate detailing the adoption of the terms thereof
        pursuant to authority granted under\na Board Resolution. In the case of Securities
        of a Series&nbsp;to be issued from time to time, the Board Resolution, Officer&rsquo;s
        Certificate\nor supplemental indenture detailing the adoption of the terms
        thereof pursuant to authority granted under a Board Resolution may provide\nfor
        the method by which specified terms (such as interest rate, maturity date,
        record date or date from which interest shall accrue) are\nto be determined.
        Securities may differ between Series&nbsp;in respect of any matters, provided
        that all Series&nbsp;of Securities shall\nbe equally and ratably entitled
        to the benefits of the Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 10;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->5<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;2.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Establishment\nof
        Terms of Series&nbsp;of Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">At or prior to the issuance\nof any Securities within a Series, the
        following shall be established (as to the Series&nbsp;generally, in the case
        of Subsection 2.2.1\nand either as to such Securities within the Series&nbsp;or
        as to the Series&nbsp;generally in the case of Subsections 2.2.2 through 2.2.23)\nby
        or pursuant to a Board Resolution, and set forth or determined in the manner
        provided in a Board Resolution, supplemental indenture\nhereto or Officer&rsquo;s
        Certificate:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">2.2.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\ntitle
        (which shall distinguish the Securities of that particular Series&nbsp;from
        the Securities of any other Series) and ranking (including\nthe terms of any
        subordination provisions) of the Series;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nprice
        or prices (expressed as a percentage of the principal amount thereof) at which
        the Securities of the Series&nbsp;will be issued;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\nlimit
        upon the aggregate principal amount of the Securities of the Series&nbsp;which
        may be authenticated and delivered under this Indenture\n(except for Securities
        authenticated and delivered upon registration of transfer of, or in exchange
        for, or in lieu of, other Securities\nof the Series&nbsp;pursuant to Section&nbsp;2.7,
        2.8, 2.11, 3.6 or 9.6);</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.2.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\ndate
        or dates on which the principal of the Securities of the Series&nbsp;is payable;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nrate
        or rates (which may be fixed or variable) per annum or, if applicable, the
        method used to determine such rate or rates (including,\nbut not limited to,
        any commodity, commodity index, stock exchange index or financial index) at
        which the Securities of the Series&nbsp;shall\nbear interest, if any, the
        date or dates from which such interest, if any, shall accrue, the date or
        dates on which such interest, if\nany, shall commence and be payable and any
        regular record date for the interest payable on any interest payment date;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nplace
        or places where the principal of and interest, if any, on the Securities of
        the Series&nbsp;shall be payable, where the Securities\nof such Series&nbsp;may
        be surrendered for registration of transfer or exchange and where notices
        and demands to or upon the Company in\nrespect of the Securities of such Series&nbsp;and
        this Indenture may be delivered, and the method of such payment, if by wire
        transfer,\nmail or other means;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.2.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>if\napplicable,
        the period or periods within which, the price or prices at which and the terms
        and conditions upon which the Securities of\nthe Series&nbsp;may be redeemed,
        in whole or in part, at the option of the Company;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 11; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->6<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.2.8.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nobligation,
        if any, of the Company to redeem or purchase the Securities of the Series&nbsp;pursuant
        to any sinking fund or analogous provisions\nor at the option of a Holder
        thereof and the period or periods within which, the price or prices at which
        and the terms and conditions\nupon which Securities of the Series&nbsp;shall
        be redeemed or purchased, in whole or in part, pursuant to such obligation;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.9.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\ndates,
        if any, on which and the price or prices at which the Securities of the Series&nbsp;will
        be repurchased by the Company at the option\nof the Holders thereof and other
        detailed terms and provisions of such repurchase obligations;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.10.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>if\nother
        than denominations of $1,000 and any integral multiple thereof, the denominations
        in which the Securities of the Series&nbsp;shall\nbe issuable;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.11.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nforms
        of the Securities of the Series&nbsp;and whether the Securities will be issuable
        as Global Securities;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.2.12.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>if\nother
        than the principal amount thereof, the portion of the principal amount of
        the Securities of the Series&nbsp;that shall be payable\nupon declaration
        of acceleration of the maturity thereof pursuant to Section&nbsp;6.2;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.13.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\ncurrency
        of denomination of the Securities of the Series, which may be Dollars or any
        Foreign Currency, and if such currency of denomination\nis a composite currency,
        the agency or organization, if any, responsible for overseeing such composite
        currency;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">2.2.14.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\ndesignation
        of the currency, currencies or currency units in which payment of the principal
        of and interest, if any, on the Securities\nof the Series&nbsp;will be made;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.15.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>if\npayments
        of principal of or interest, if any, on the Securities of the Series&nbsp;are
        to be made in one or more currencies or currency\nunits other than that or
        those in which such Securities are denominated, the manner in which the exchange
        rate with respect to such payments\nwill be determined;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.16.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nmanner
        in which the amounts of payment of principal of or interest, if any, on the
        Securities of the Series&nbsp;will be determined, if\nsuch amounts may be
        determined by reference to an index based on a currency or currencies or by
        reference to a commodity, commodity index,\nstock exchange index or financial
        index;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">2.2.17.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nprovisions,
        if any, relating to any security provided for the Securities of the Series;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.18.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\naddition
        to, deletion of or change in the Events of Default which applies to any Securities
        of the Series&nbsp;and any change in the right\nof the Trustee or the requisite
        Holders of such Securities to declare the principal amount thereof due and
        payable pursuant to Section&nbsp;6.2;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.19.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\naddition
        to, deletion of or change in the covenants applicable to Securities of the
        Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 12; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->7<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.2.20.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\nDepositaries,
        interest rate calculation agents, exchange rate calculation agents or other
        agents with respect to Securities of such Series&nbsp;if\nother than those
        appointed herein;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">2.2.21.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nprovisions,
        if any, relating to conversion or exchange of any Securities of such Series,
        including if applicable, the conversion or exchange\nprice, the conversion
        or exchange period, provisions as to whether conversion or exchange will be
        mandatory, at the option of the Holders\nthereof or at the option of the Company,
        the events requiring an adjustment of the conversion price or exchange price
        and provisions affecting\nconversion or exchange if such Series&nbsp;of Securities
        are redeemed;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">2.2.22.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\nother
        terms of the Series&nbsp;(which may supplement, modify or delete any provision
        of this Indenture insofar as it applies to such Series),\nincluding any terms
        that may be required under applicable law or regulations or advisable in connection
        with the marketing of Securities\nof that Series; and</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.2.23.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>whether\nany
        of the Company&rsquo;s direct or indirect Subsidiaries will guarantee the
        Securities of that Series, including the terms of subordination,\nif any,
        of such guarantees.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">All Securities
        of any one Series&nbsp;need\nnot be issued at the same time and may be issued
        from time to time, consistent with the terms of this Indenture, if so provided
        by or\npursuant to the Board Resolution, supplemental indenture hereto or
        Officer&rsquo;s Certificate referred to above.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Execution\nand
        Authentication</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">An Officer shall
        sign the Securities\nfor the Company by manual, facsimile or electronic signature.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If an Officer whose signature\nis on a Security
        no longer holds that office at the time the Security is authenticated, the
        Security shall nevertheless be valid.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">A Security shall not be valid\nuntil authenticated by the manual signature
        of the Trustee or an authenticating agent. The signature shall be conclusive
        evidence that\nthe Security has been authenticated under this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Trustee shall at any time,\nand from time
        to time, authenticate Securities for original issue in the principal amount
        provided in the Board Resolution, supplemental\nindenture hereto or Officer&rsquo;s
        Certificate, upon receipt by the Trustee of a Company Order. Each Security
        shall be dated the date\nof its authentication.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The aggregate principal amount\nof Securities of any Series&nbsp;outstanding
        at any time may not exceed any limit upon the maximum principal amount for
        such Series&nbsp;set\nforth in the Board Resolution, supplemental indenture
        hereto or Officer&rsquo;s Certificate delivered pursuant to Section&nbsp;2.2,
        except\nas provided in Section&nbsp;2.8.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        13; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->8<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Prior
        to the issuance of Securities\nof any Series, the Trustee shall have received
        and (subject to Section&nbsp;7.2) shall be fully protected in relying on:
        (a)&nbsp;the\nBoard Resolution, supplemental indenture hereto or Officer&rsquo;s
        Certificate establishing the form of the Securities of that Series&nbsp;or\nof
        Securities within that Series&nbsp;and the terms of the Securities of that
        Series&nbsp;or of Securities within that Series, (b)&nbsp;an\nOfficer&rsquo;s
        Certificate complying with Sections 10.4 and 10.5, and (c)&nbsp;an Opinion
        of Counsel complying with Sections 10.4 and\n10.5.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The Trustee shall have the right\nto decline to authenticate and deliver
        any Securities of such Series: (a)&nbsp;if the Trustee, being advised by counsel,
        determines that\nsuch action may not be taken lawfully; or (b)&nbsp;if the
        Trustee in good faith determines that such action may expose the Trustee to\npersonal
        liability.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The Trustee may appoint
        an authenticating\nagent acceptable to the Company to authenticate Securities.
        An authenticating agent may authenticate Securities whenever the Trustee may\ndo
        so. Each reference in this Indenture to authentication by the Trustee includes
        authentication by such agent. An authenticating agent\nhas the same rights
        as an Agent to deal with the Company or an Affiliate of the Company.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;2.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Registrar,\nPaying
        Agent and Notice Agent</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company shall maintain,\nwith respect to each Series&nbsp;of Securities, at
        the place or places specified with respect to such Series&nbsp;pursuant to
        Section&nbsp;2.2,\nan office or agency where Securities of such Series&nbsp;may
        be presented or surrendered for payment (&ldquo;<I>Paying Agent</I>&rdquo;),\nwhere
        Securities of such Series&nbsp;may be surrendered for registration of transfer
        or exchange (&ldquo;<I>Registrar</I>&rdquo;) and\nwhere notices and demands
        to or upon the Company in respect of the Securities of such Series&nbsp;and
        this Indenture may be delivered\n(&ldquo;<I>Notice Agent</I>&rdquo;). The
        Registrar shall keep a register with respect to each Series&nbsp;of Securities
        and to their transfer\nand exchange. The Company will give prompt written
        notice to the Trustee of the name and address, and any change in the name
        or address,\nof each Registrar, Paying Agent or Notice Agent. If at any time
        the Company shall fail to maintain any such required Registrar, Paying\nAgent
        or Notice Agent or shall fail to furnish the Trustee with the name and address
        thereof, such presentations, surrenders, notices\nand demands may be made
        or served at the Corporate Trust Office of the Trustee, and the Company hereby
        appoints the Trustee as its agent\nto receive all such presentations, surrenders,
        notices and demands; <U>provided</U>, <U>however</U>, that any appointment
        of the Trustee\nas the Notice Agent shall exclude the appointment of the Trustee
        or any office of the Trustee as an agent to receive the service of legal\nprocess
        on the Company.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        may also from time\nto time designate one or more co-registrars, additional
        paying agents or additional notice agents and may from time to time rescind
        such\ndesignations; <U>provided</U>, <U>however</U>, that no such designation
        or rescission shall in any manner relieve the Company of its obligations\nto
        maintain a Registrar, Paying Agent and Notice Agent in each place so specified
        pursuant to Section&nbsp;2.2 for Securities of any Series&nbsp;for\nsuch purposes.
        The Company will give prompt written notice to the Trustee of any such designation
        or rescission and of any change in the\nname or address of any such co-registrar,
        additional paying agent or additional notice agent. The term &ldquo;<I>Registrar</I>&rdquo;\nincludes
        any co-registrar; the term &ldquo;<I>Paying Agent</I>&rdquo; includes any
        additional paying agent; and the term &ldquo;<I>Notice\nAgent</I>&rdquo; includes
        any additional notice agent. The Company or any of its Affiliates may serve
        as Registrar or Paying Agent.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 14;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->9<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in; background-color:
        white\">The\nCompany hereby appoints the Trustee the initial Registrar, Paying
        Agent and Notice Agent for each Series&nbsp;unless another Registrar,\nPaying
        Agent or Notice Agent, as the case may be, is appointed prior to the time
        Securities of that Series&nbsp;are first issued. The\nrights, powers, duties,
        obligations and actions of each Agent under this Indenture are several and
        not joint or joint and several, and\nthe Agents shall only be obliged to perform
        those duties expressly set out in this Indenture and shall have no implied
        duties.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;2.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Paying\nAgent
        to Hold Money in Trust</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company shall require each\nPaying Agent other than the Trustee to agree in
        writing that the Paying Agent will hold in trust, for the benefit of Holders
        of any Series&nbsp;of\nSecurities or the Trustee, all money held by the Paying
        Agent for the payment of principal of or interest on the Series&nbsp;of Securities\nand
        will notify the Trustee in writing of any default by the Company in making
        any such payment. While any such default continues, the\nTrustee may require
        a Paying Agent to pay all money held by it to the Trustee. The Company at
        any time may require a Paying Agent to pay\nall money held by it to the Trustee.
        Upon payment over to the Trustee, the Paying Agent (if other than the Company
        or a Subsidiary of\nthe Company) shall have no further liability for the money.
        If the Company or a Subsidiary of the Company acts as Paying Agent, it shall\nsegregate
        and hold in a separate trust fund for the benefit of Holders of any Series&nbsp;of
        Securities all money held by it as Paying\nAgent. Upon any bankruptcy, reorganization
        or similar proceeding with respect to the Company, the Trustee shall serve
        as Paying Agent\nfor the Securities. For the avoidance of doubt, a Paying
        Agent and the Trustee shall be held harmless and have no liability with respect\nto
        payments or disbursements (including to the Holders) until they have confirmed
        receipt of funds sufficient to make the relevant payment.\nNo money held by
        an Agent needs to be segregated except as is required by law.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Holder\nLists</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If it is serving as Registrar,\nthe Trustee shall
        preserve in as current a form as is reasonably practicable the most recent
        list available to it of the names and addresses\nof Holders of each Series&nbsp;of
        Securities and shall otherwise comply with TIA &sect; 312(a). If the Trustee
        is not the Registrar, the\nCompany shall furnish to the Trustee at least ten
        days before each interest payment date and at such other times as the Trustee
        may request\nin writing a list, in such form and as of such date as the Trustee
        may reasonably require, of the names and addresses of Holders of each\nSeries&nbsp;of
        Securities.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in; background-color: white\">Every\nHolder,
        by receiving and holding Securities, agrees with the Company and the Trustee
        that neither the Company nor the Trustee or any agent\nof either of them shall
        be held accountable by reason of the disclosure of any such information as
        to the names and addresses of the Holders\nin accordance with TIA &sect;&nbsp;312,
        regardless of the source from which such information was derived, and that
        the Trustee shall not\nbe held accountable by reason of mailing any material
        pursuant to a request made under TIA &sect;&nbsp;312(b).</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 15; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->10<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;2.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Transfer\nand
        Exchange</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Where Securities
        of a Series&nbsp;are\npresented to the Registrar or a co-registrar with a
        request to register a transfer or to exchange them for an equal principal
        amount of\nSecurities of the same Series, the Registrar shall register the
        transfer or make the exchange if its requirements for such transactions\nare
        met. To permit registrations of transfers and exchanges, the Trustee shall
        authenticate Securities at the Registrar&rsquo;s request.\nNo service charge
        shall be made for any registration of transfer or exchange (except as otherwise
        expressly permitted herein), but the\nCompany may require payment of a sum
        sufficient to cover any transfer tax or similar governmental charge payable
        in connection therewith\n(other than any such transfer tax or similar governmental
        charge payable upon exchanges pursuant to Sections 2.11, 3.6 or 9.6).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Neither the Company nor the\nRegistrar shall be
        required (a)&nbsp;to issue, register the transfer of or exchange Securities
        of any Series&nbsp;for the period beginning\nat the opening of business 15
        days immediately preceding the sending of a notice of redemption of Securities
        of that Series&nbsp;selected\nfor redemption and ending at the close of business
        on the day such notice is sent, (b)&nbsp;to register the transfer of or exchange
        Securities\nof any Series&nbsp;selected, called or being called for redemption
        as a whole or the portion being redeemed of any such Securities selected,\ncalled
        or being called for redemption in part or (c)&nbsp;to register the transfer
        of or exchange Securities of any Series&nbsp;between\na record date and payment
        date for such Series&nbsp;of Securities.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;2.8.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Mutilated,\nDestroyed,
        Lost and Stolen Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">If
        any mutilated Security is\nsurrendered to the Trustee, the Company shall execute
        and the Trustee shall authenticate and deliver in exchange therefor a new
        Security\nof the same Series&nbsp;and of like tenor and principal amount and
        bearing a number not contemporaneously outstanding.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">If there shall be delivered\nto the Company and the Trustee (i)&nbsp;evidence
        to their satisfaction of the destruction, loss or theft of any Security and
        (ii)&nbsp;such\nsecurity or indemnity bond as may be required by each of them
        to hold itself and any of its agents harmless, then, in the absence of notice\nto
        the Company or the Trustee that such Security has been acquired by a bona
        fide purchaser, the Company shall execute and upon receipt\nof a Company Order
        the Trustee shall authenticate and make available for delivery, in lieu of
        any such destroyed, lost or stolen Security,\na new Security of the same Series&nbsp;and
        of like tenor and principal amount and bearing a number not contemporaneously
        outstanding.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">In case any such mutilated,\ndestroyed,
        lost or stolen Security has become or is about to become due and payable,
        the Company in its discretion may, instead of issuing\na new Security, pay
        such Security.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Upon the issuance
        of any new\nSecurity under this Section, the Company may require the payment
        of a sum sufficient to cover any tax or other governmental charge that\nmay
        be imposed in relation thereto and any other expenses (including the fees
        and expenses of the Trustee) connected therewith.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Every new Security of any Series&nbsp;issued\npursuant to this Section&nbsp;in
        lieu of any destroyed, lost or stolen Security shall constitute an original
        additional contractual obligation\nof the Company, whether or not the destroyed,
        lost or stolen Security shall be at any time enforceable by anyone, and shall
        be entitled\nto all the benefits of this Indenture equally and proportionately
        with any and all other Securities of that Series&nbsp;duly issued hereunder.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 16; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->11<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The provisions of this Section&nbsp;are\nexclusive and shall preclude
        (to the extent lawful) all other rights and remedies with respect to the replacement
        or payment of mutilated,\ndestroyed, lost or stolen Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;2.9.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Outstanding\nSecurities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Securities outstanding at\nany time are all
        the Securities authenticated by the Trustee except for those canceled by it,
        those delivered to it for cancellation,\nthose reductions in the interest
        on a Global Security effected by the Trustee in accordance with the provisions
        hereof and those described\nin this Section&nbsp;as not outstanding.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If a Security is replaced pursuant\nto Section&nbsp;2.8,
        it ceases to be outstanding until the Trustee receives proof satisfactory
        to it that the replaced Security is held\nby a bona fide purchaser.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If the Paying Agent (other than\nthe Company,
        a Subsidiary of the Company or an Affiliate of the Company) holds on the Maturity
        of Securities of a Series&nbsp;money sufficient\nto pay such Securities payable
        on that date, then on and after that date such Securities of the Series&nbsp;cease
        to be outstanding and\ninterest on them ceases to accrue.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The Company may purchase or\notherwise acquire the Securities, whether
        by open market purchases, negotiated transactions or otherwise. A Security
        does not cease to\nbe outstanding because the Company or an Affiliate of the
        Company holds the Security (but see Section&nbsp;2.10 below).</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">In determining whether the Holders\nof the requisite principal amount
        of outstanding Securities have given any request, demand, authorization, direction,
        notice, consent\nor waiver hereunder, the principal amount of a Discount Security
        that shall be deemed to be outstanding for such purposes shall be the\namount
        of the principal thereof that would be due and payable as of the date of such
        determination upon a declaration of acceleration\nof the Maturity thereof
        pursuant to Section&nbsp;6.2.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;2.10.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Treasury\nSecurities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">In determining whether the Holders\nof the required
        principal amount of Securities of a Series&nbsp;have concurred in any request,
        demand, authorization, direction, notice,\nconsent or waiver, Securities of
        a Series&nbsp;owned by the Company or any Affiliate of the Company shall be
        disregarded, except that\nfor the purposes of determining whether the Trustee
        shall be protected in relying on any such request, demand, authorization,
        direction,\nnotice, consent or waiver only Securities of a Series&nbsp;that
        a Responsible Officer of the Trustee knows are so owned shall be so disregarded.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 17; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->12<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.11.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Temporary\nSecurities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Until definitive Securities\nare ready for delivery,
        the Company may prepare and the Trustee shall authenticate temporary Securities
        upon a Company Order. Temporary\nSecurities shall be substantially in the
        form of definitive Securities but may have variations that the Company considers
        appropriate\nfor temporary Securities. Without unreasonable delay, the Company
        shall prepare and the Trustee upon receipt of a Company Order shall\nauthenticate
        definitive Securities of the same Series&nbsp;and date of maturity in exchange
        for temporary Securities. Until so exchanged,\ntemporary securities shall
        have the same rights under this Indenture as the definitive Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;2.12.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Cancellation</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Company at any time may\ndeliver Securities
        to the Trustee for cancellation. The Registrar and the Paying Agent shall
        forward to the Trustee any Securities surrendered\nto them for registration
        of transfer, exchange or payment. The Trustee shall cancel all Securities
        surrendered for transfer, exchange,\npayment, replacement or cancellation
        and shall destroy such canceled Securities (subject to the record retention
        requirements of the Exchange\nAct and the Trustee) and deliver a certificate
        of such cancellation to the Company upon written request of the Company. The
        Company may\nnot issue new Securities to replace Securities that it has paid
        or delivered to the Trustee for cancellation.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.13.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Defaulted\nInterest</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If the Company defaults in a\npayment of interest
        on a Series&nbsp;of Securities, it shall pay the defaulted interest, plus,
        to the extent permitted by law, any interest\npayable on the defaulted interest,
        to the persons who are Holders of the Series&nbsp;on a subsequent special
        record date. The Company\nshall fix the record date and payment date. At least
        ten days before the special record date, the Company shall send to the Trustee
        and\nto each Holder of the Series&nbsp;a notice that states the special record
        date, the payment date and the amount of interest to be paid.\nThe Company
        may pay defaulted interest in any other lawful manner.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.14.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Global\nSecurities</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">2.14.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Terms\nof
        Securities</U>. A Board Resolution, a supplemental indenture hereto or an
        Officer&rsquo;s Certificate shall establish whether the Securities\nof a Series&nbsp;shall
        be issued in whole or in part in the form of one or more Global Securities
        and the Depositary for such Global Security\nor Securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.14.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Transfer\nand
        Exchange</U>. Notwithstanding any provisions to the contrary contained in
        Section&nbsp;2.7 of the Indenture and in addition thereto,\nany Global Security
        shall be exchangeable pursuant to Section&nbsp;2.7 of the Indenture for Securities
        registered in the names of Holders\nother than the Depositary for such Security
        or its nominee only if (i)&nbsp;such Depositary notifies the Company that
        it is unwilling\nor unable to continue as Depositary for such Global Security
        or if at any time such Depositary ceases to be a clearing agency registered\nunder
        the Exchange Act, and, in either case, the Company fails to appoint a successor
        Depositary registered as a clearing agency under\nthe Exchange Act within
        90 days of such event or (ii)&nbsp;the Company executes and delivers to the
        Trustee an Officer&rsquo;s Certificate\nto the effect that such Global Security
        shall be so exchangeable. Any Global Security that is exchangeable pursuant
        to the preceding sentence\nshall be exchangeable for Securities registered
        in such names as the Depositary shall direct in writing in an aggregate principal
        amount\nequal to the principal amount of the Global Security with like tenor
        and terms.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">Except as provided
        in this Section&nbsp;2.14.2,\na Global Security may not be transferred except
        as a whole by the Depositary with respect to such Global Security to a nominee
        of such\nDepositary, by a nominee of such Depositary to such Depositary or
        another nominee of such Depositary or by the Depositary or any such\nnominee
        to a successor Depositary or a nominee of such a successor Depositary.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 18; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->13<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">None of the Trustee or any Agent\nshall have any obligation or duty
        to monitor, determine or inquire as to compliance with any restrictions on
        transfer imposed under this\nIndenture or under applicable law with respect
        to any transfer of any interest in any Security (including any transfers between
        or among\nDepositary participants, members or beneficial owners in any Global
        Security) other than to require delivery of such certificates and\nother documentation
        or evidence as are expressly required by, and to do so if and when expressly
        required by the terms of, this Indenture,\nand to examine the same to determine
        substantial compliance as to form with the express requirements hereof.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">None of the Trustee or any Agent\nshall have any
        responsibility or obligation to any beneficial owner of a Global Security,
        a member of, or a participant in the Depositary\nor other Person with respect
        to the accuracy of the records of the Depositary or its nominee or of any
        participant or member thereof,\nwith respect to any ownership interest in
        any Security or with respect to the delivery to any participant, member, beneficial
        owner or\nother Person (other than the Depositary) of any notice (including
        any notice of optional redemption) or the payment of any amount, under\nor
        with respect to such Security.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.14.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Legends</U>.\nAny
        Global Security issued hereunder shall bear a legend in substantially the
        following form:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;THIS
        SECURITY IS A GLOBAL\nSECURITY WITHIN THE MEANING OF THE INDENTURE HEREINAFTER
        REFERRED TO AND IS REGISTERED IN THE NAME OF THE DEPOSITARY OR A NOMINEE OF
        THE\nDEPOSITARY. THIS SECURITY IS EXCHANGEABLE FOR SECURITIES REGISTERED IN
        THE NAME OF A PERSON OTHER THAN THE DEPOSITARY OR ITS NOMINEE ONLY\nIN THE
        LIMITED CIRCUMSTANCES DESCRIBED IN THE INDENTURE, AND MAY&nbsp;NOT BE TRANSFERRED
        EXCEPT AS A WHOLE BY THE DEPOSITARY TO A NOMINEE\nOF THE DEPOSITARY, BY A
        NOMINEE OF THE DEPOSITARY TO THE DEPOSITARY OR ANOTHER NOMINEE OF THE DEPOSITARY
        OR BY THE DEPOSITARY OR ANY SUCH\nNOMINEE TO A SUCCESSOR DEPOSITARY OR A NOMINEE
        OF SUCH A SUCCESSOR DEPOSITARY.&rdquo;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">In addition, so long as the\nDepository Trust Company (&ldquo;DTC&rdquo;)
        is the Depositary, each Global Security registered in the name of DTC or its
        nominee shall\nbear a legend in substantially the following form:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;UNLESS THIS GLOBAL SECURITY\nIS PRESENTED
        BY AN AUTHORIZED REPRESENTATIVE OF THE DEPOSITORY TRUST COMPANY, A NEW YORK
        CORPORATION (&ldquo;DTC&rdquo;), TO THE COMPANY\nOR ITS AGENT FOR REGISTRATION
        OF TRANSFER, EXCHANGE OR PAYMENT, AND ANY GLOBAL SECURITY ISSUED IS REGISTERED
        IN THE NAME OF CEDE&nbsp;&amp;\nCO. OR IN SUCH OTHER NAME AS IS REQUESTED
        BY AN AUTHORIZED REPRESENTATIVE OF DTC (AND ANY PAYMENT IS MADE TO CEDE&nbsp;&amp;
        CO. OR TO\nSUCH OTHER ENTITY AS IS REQUESTED BY AN AUTHORIZED REPRESENTATIVE
        OF DTC), ANY TRANSFER, PLEDGE OR OTHER USE HEREOF FOR VALUE OR OTHERWISE\nBY
        OR TO ANY PERSON IS WRONGFUL INASMUCH AS THE REGISTERED OWNER HEREOF, CEDE&nbsp;&amp;
        CO., HAS AN INTEREST HEREIN.&rdquo;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        19; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->14<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">2.14.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Acts\nof
        Holders</U>. The Depositary, as a Holder, may appoint agents and otherwise
        authorize participants to give or take any request, demand,\nauthorization,
        direction, notice, consent, waiver or other action which a Holder is entitled
        to give or take under the Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.14.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Payments</U>.\nNotwithstanding
        the other provisions of this Indenture, unless otherwise specified as contemplated
        by Section&nbsp;2.2, payment of the\nprincipal of and interest, if any, on
        any Global Security shall be made to the Holder thereof.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\">2.14.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Agent\nMembers</U>.
        The registered Holder of a Security will be treated as the owner of such Security
        for all purposes and only registered Holders\nshall have rights under this
        Indenture and the Securities. Members of, or participants in, the Depositary
        (&ldquo;<I>Agent Members</I>&rdquo;)\nand persons who hold beneficial interests
        in a Global Security through an Agent Member shall have no rights under this
        Indenture with\nrespect to any Global Security held on their behalf by the
        Depositary. The Depositary may be treated by the Company, the Trustee, the\nPaying
        Agent, the Registrar and any agent of the foregoing as the absolute owner
        of the Global Securities for all purposes whatsoever.\nNotwithstanding the
        foregoing, nothing herein shall prevent the Company, the Trustee, the Paying
        Agent, the Registrar or any agent of\nthe foregoing from giving effect to
        any written certification, proxy or other authorization furnished by the Depositary
        or impair, as\nbetween the Depositary and its Agent Members, the operation
        of customary practices of such Depositary governing the exercise of the rights\nof
        a Holder of a beneficial interest in any Global Security.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;2.15.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>CUSIP\nNumbers</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Company in issuing the Securities\nmay use
        &ldquo;CUSIP&rdquo; numbers (if then generally in use), and, if so, the Trustee
        shall use &ldquo;CUSIP&rdquo; numbers in notices\nof redemption as a convenience
        to Holders; <U>provided</U> that any such notice may state that no representation
        is made as to the correctness\nof such numbers either as printed on the Securities
        or as contained in any notice of a redemption and that reliance may be placed
        only\non the other elements of identification printed on the Securities, and
        any such redemption shall not be affected by any defect in or omission\nof
        such numbers.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;III.<FONT STYLE=\"text-transform:
        uppercase\"><BR>\nREDEMPTION</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;3.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Notice\nto
        Trustee</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company may, with
        respect\nto any Series&nbsp;of Securities, reserve the right to redeem and
        pay the Series&nbsp;of Securities or may covenant to redeem and pay\nthe Series&nbsp;of
        Securities or any part thereof prior to the Stated Maturity thereof at such
        time and on such terms as provided for\nin such Securities. If a Series&nbsp;of
        Securities is redeemable and the Company wants or is obligated to redeem prior
        to the Stated Maturity\nthereof all or part of the Series&nbsp;of Securities
        pursuant to the terms of such Securities, it shall notify the Trustee in writing\nof
        the redemption date and the principal amount of the Series&nbsp;of Securities
        to be redeemed. The Company shall give the notice at\nleast 15 days before
        the redemption date (or such shorter period as may be acceptable to the Trustee).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 20; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->15<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;3.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Selection\nof
        Securities to be Redeemed</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in;
        background-color: white\">Unless\notherwise indicated for a particular Series&nbsp;by
        a Board Resolution, a supplemental indenture hereto or an Officer&rsquo;s
        Certificate,\nif less than all the Securities of a Series&nbsp;are to be redeemed,
        the Securities of the Series&nbsp;to be redeemed will be selected\nas follows:
        (a)&nbsp;if the Securities are in the form of Global Securities, in accordance
        with the procedures of the Depositary, (b)&nbsp;if\nthe Securities are listed
        on any national securities exchange, in compliance with the requirements of
        the principal national securities\nexchange, if any, on which the Securities
        are listed or (c)&nbsp;if not otherwise provided for under clause (a)&nbsp;or
        (b)&nbsp;in the\nmanner that the Trustee deems fair and appropriate, including
        by lot or other method, unless otherwise required by law or applicable stock\nexchange
        requirements, subject, in the case of Global Securities, to the applicable
        rules&nbsp;and procedures of the Depositary. The Securities\nto be redeemed
        shall be selected from Securities of the Series&nbsp;outstanding not previously
        called for redemption. Portions of the\nprincipal of Securities of the Series&nbsp;that
        have denominations larger than $1,000 may be selected for redemption. Securities
        of the\nSeries&nbsp;and portions of them it selected for redemption shall
        be in amounts of $1,000 or whole multiples of $1,000 or, with respect\nto
        Securities of any Series&nbsp;issuable in other denominations pursuant to
        Section&nbsp;2.2.10, the minimum principal denomination for\neach Series&nbsp;and
        the authorized integral multiples thereof. Provisions of this Indenture that
        apply to Securities of a Series&nbsp;called\nfor redemption also apply to
        portions of Securities of that Series&nbsp;called for redemption. Neither
        the Trustee nor the Paying Agent\nshall be liable for any selection made by
        it in accordance with this paragraph (including the procedures of the Depositary).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;3.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Notice\nof
        Redemption</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Unless otherwise
        indicated for\na particular Series&nbsp;by Board Resolution, a supplemental
        indenture hereto or an Officer&rsquo;s Certificate, at least 15 days but\nnot
        more than 60 days before a redemption date, the Company shall send or cause
        to be sent by first-class mail or electronically, in accordance\nwith the
        procedures of the Depositary, a notice of redemption to each Holder whose
        Securities are to be redeemed.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        notice shall identify the\nSecurities of the Series&nbsp;to be redeemed and
        shall state:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nredemption
        date;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nredemption
        price;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nname
        and address of the Paying Agent;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>if\nany
        Securities are being redeemed in part, the portion of the principal amount
        of such Securities to be redeemed and that, after the redemption\ndate and
        upon surrender of such Security, a new Security or Securities in principal
        amount equal to the unredeemed portion of the original\nSecurity shall be
        issued in the name of the Holder thereof upon cancellation of the original
        Security;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 21; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->16<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>that\nSecurities
        of the Series&nbsp;called for redemption must be surrendered to the Paying
        Agent to collect the redemption price;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>that\ninterest
        on Securities of the Series&nbsp;called for redemption ceases to accrue on
        and after the redemption date unless the Company defaults\nin the deposit
        of the redemption price;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\n
        &ldquo;CUSIP&rdquo; number, if any; and</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\nother
        information as may be required by the terms of the particular Series&nbsp;or
        the Securities of a Series&nbsp;being redeemed.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">At the Company&rsquo;s request,\nthe Trustee shall give the notice of
        redemption in the Company&rsquo;s name and at its expense, provided, however,
        that the Company has\ndelivered to the Trustee, at least 10 days (unless a
        shorter time shall be acceptable to the Trustee) prior to the notice date,
        an Officer&rsquo;s\nCertificate requesting that the Trustee give such notice
        and setting forth the information to be stated in such notice and the form
        of\nsuch notice.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;3.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Effect\nof
        Notice of Redemption</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Once
        notice of redemption is\nsent as provided in Section&nbsp;3.3, Securities
        of a Series&nbsp;called for redemption become due and payable on the redemption
        date\nand at the redemption price. Except as otherwise provided in the supplemental
        indenture, Board Resolution or Officer&rsquo;s Certificate\nfor a Series,
        a notice of redemption may not be conditional. Upon surrender to the Paying
        Agent, such Securities shall be paid at the\nredemption price plus accrued
        interest to the redemption date.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;3.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Deposit\nof
        Redemption Price</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">On or
        before 11:00 a.m., New\nYork City time, on the redemption date, the Company
        shall deposit with the Paying Agent money sufficient to pay the redemption
        price of\nand accrued interest, if any, on all Securities to be redeemed on
        that date.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;3.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Securities\nRedeemed
        in Part</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">Upon surrender of a
        Security\nthat is redeemed in part, the Trustee shall authenticate for the
        Holder a new Security of the same Series&nbsp;and the same maturity equal\nin
        principal amount to the unredeemed portion of the Security surrendered.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE&nbsp;IV.<FONT STYLE=\"text-transform: uppercase\"><BR>\nCOVENANTS</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;4.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Payment\nof
        Principal and Interest</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company covenants and agrees\nfor the benefit of the Holders of each Series&nbsp;of
        Securities that it will duly and punctually pay the principal of and interest,
        if\nany, on the Securities of that Series&nbsp;in accordance with the terms
        of such Securities and this Indenture. On or before 11:00 a.m.,\nNew York
        City time, on the applicable payment date, the Company shall deposit with
        the Paying Agent money sufficient to pay the principal\nof and interest, if
        any, on the Securities of each Series&nbsp;in accordance with the terms of
        such Securities and this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        22; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->17<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;4.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>SEC\nReports</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">To the extent any Securities\nof a Series&nbsp;are
        outstanding, the Company shall deliver to the Trustee within 15 days after
        it files them with the SEC copies of the\nannual reports and of the information,
        documents and other reports (or copies of such portions of any of the foregoing
        as the SEC may\nby rules&nbsp;and regulations prescribe) which the Company
        is required to file with the SEC pursuant to Section&nbsp;13 or 15(d)&nbsp;of\nthe
        Exchange Act. The Company also shall comply with the other provisions of TIA
        &sect; 314(a). Reports, information and documents filed\nwith the SEC via
        the EDGAR system will be deemed to be delivered to the Trustee as of the time
        of such filing via EDGAR for purposes of\nthis Section&nbsp;4.2.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Delivery of reports, information\nand documents
        to the Trustee under this Section&nbsp;4.2 is for informational purposes only
        and the Trustee&rsquo;s receipt of the foregoing\nshall not constitute constructive
        or actual notice of any information contained therein or determinable from
        information contained therein,\nincluding the Company&rsquo;s compliance with
        any of the covenants hereunder (as to which the Trustee is entitled to rely
        exclusively\non Officer&rsquo;s Certificates). All such reports, information
        or documents referred to in this Section&nbsp;4.2 that the Company files\nwith
        the SEC via the SEC&rsquo;s EDGAR system shall be deemed to be filed with
        the Trustee and transmitted to Holders at the time such\nreports, information
        or documents are filed via the EDGAR system (or any successor system).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;4.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Compliance\nCertificate</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">To the extent any Securities\nof a Series&nbsp;are
        outstanding, the Company shall deliver to the Trustee, within 120 days after
        the end of each fiscal year of the Company,\nan Officer&rsquo;s Certificate
        stating that a review of the activities of the Company and its Subsidiaries
        during the preceding fiscal\nyear has been made under the supervision of the
        signing Officer with a view to determining whether the Company has kept, observed,
        performed\nand fulfilled its obligations under this Indenture, and further
        stating, as to such Officer signing such certificate, that to the best\nof
        his/her knowledge the Company has kept, observed, performed and fulfilled
        each and every covenant contained in this Indenture and is\nnot in default
        in the performance or observance of any of the terms, provisions and conditions
        hereof (or, if a Default or Event of Default\nshall have occurred, describing
        all such Defaults or Events of Default of which the Officer may have knowledge).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;4.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Stay,\nExtension
        and Usury Laws</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        covenants (to the\nextent that it may lawfully do so) that it will not at
        any time insist upon, plead or in any manner whatsoever claim or take the
        benefit\nor advantage of, any stay, extension or usury law wherever enacted,
        now or at any time hereafter in force, which may affect the covenants\nor
        the performance of this Indenture or the Securities; and the Company (to the
        extent it may lawfully do so) hereby expressly waives\nall benefit or advantage
        of any such law and covenants that it will not, by resort to any such law,
        hinder, delay or impede the execution\nof any power herein granted to the
        Trustee, but will suffer and permit the execution of every such power as though
        no such law has been\nenacted.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 23;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->18<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;V.<FONT STYLE=\"text-transform:
        uppercase\"><BR>\nSUCCESSORS</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;5.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>When\nCompany
        May&nbsp;Merge, Etc</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        shall not consolidate\nwith or merge with or into, or convey, transfer or
        lease all or substantially all of its properties and assets to, any person
        (a &ldquo;<I>successor\nperson</I>&rdquo;) unless:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        is the surviving entity or the successor person (if other than the Company)
        is a corporation, partnership, trust or other entity\norganized and validly
        existing under the laws of any U.S. domestic jurisdiction and expressly assumes
        by supplemental indenture the Company&rsquo;s\nobligations on the Securities
        and under this Indenture; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>immediately\nafter
        giving effect to the transaction, no Default or Event of Default, shall have
        occurred and be continuing.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company shall deliver to\nthe Trustee prior to the consummation of the proposed
        transaction an Officer&rsquo;s Certificate to the foregoing effect and an
        Opinion\nof Counsel stating that the proposed transaction and any supplemental
        indenture comply with this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Notwithstanding the above, any\nSubsidiary of the Company may consolidate
        with, merge into or transfer all or part of its properties to the Company.
        Neither an Officer&rsquo;s\nCertificate nor an Opinion of Counsel shall be
        required to be delivered in connection therewith.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;5.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Successor\nCorporation
        Substituted</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Upon any consolidation
        or merger,\nor any sale, lease, conveyance or other disposition of all or
        substantially all of the assets of the Company in accordance with Section&nbsp;5.1,\nthe
        successor corporation formed by such consolidation or into or with which the
        Company is merged or to which such sale, lease, conveyance\nor other disposition
        is made shall succeed to, and be substituted for, and may exercise every right
        and power of, the Company under this\nIndenture with the same effect as if
        such successor person has been named as the Company herein; <U>provided</U>,
        <U>however</U>, that\nthe predecessor Company in the case of a sale, conveyance
        or other disposition (other than a lease) shall be released from all obligations\nand
        covenants under this Indenture and the Securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;VI.<FONT
        STYLE=\"text-transform: uppercase\"><BR>\nDEFAULTS AND REMEDIES</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;6.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Events\nof
        Default</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Event of
        Default</I>,&rdquo;\nwherever used herein with respect to Securities of any
        Series, means any one of the following events, unless in the establishing
        Board\nResolution, supplemental indenture or Officer&rsquo;s Certificate it
        is provided that such Series&nbsp;shall not have the benefit of said\nEvent
        of Default:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 24; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->19<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nin
        the payment of any interest on any Security of that Series&nbsp;when it becomes
        due and payable, and continuance of such default for\na period of 30 days
        (unless the entire amount of such payment is deposited by the Company with
        the Trustee or with a Paying Agent prior\nto 11:00 a.m., New York City time,
        on the 30<SUP>th</SUP> day of such period);</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nin
        the payment of principal of any Security of that Series&nbsp;at its Maturity;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nin
        the performance or breach of any covenant or warranty of the Company in this
        Indenture (other than defaults pursuant to paragraph (a)&nbsp;or\n(b)&nbsp;above
        or pursuant to a covenant or warranty that has been included in this Indenture
        solely for the benefit of a Series&nbsp;of\nSecurities other than that Series),
        which default continues uncured for a period of 60 days after there has been
        given, by registered\nor certified mail, to the Company by the Trustee or
        to the Company and the Trustee by the Holders of at least 25% in principal
        amount\nof the outstanding Securities of that Series&nbsp;a written notice
        specifying such default or breach and requiring it to be remedied and\nstating
        that such notice is a &ldquo;Notice of Default&rdquo; hereunder;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        pursuant to or within the meaning of any Bankruptcy Law:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>commences\na
        voluntary case,</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.75in; text-align: justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT
        STYLE=\"font-size: 10pt\">(ii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>consents\nto
        the entry of an order for relief against it in an involuntary case,</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in;
        text-align: justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT
        STYLE=\"font-size: 10pt\">(iii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>consents\nto
        the appointment of a Custodian of it or for all or substantially all of its
        property,</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.75in; text-align: justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT
        STYLE=\"font-size: 10pt\">(iv)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>makes\na
        general assignment for the benefit of its creditors, or</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(v)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>generally\nis
        unable to pay its debts as the same become due;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\ncourt
        of competent jurisdiction enters an order or decree under any Bankruptcy Law
        that:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.75in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">&#8239;&#8239;&#8239;&#8239;&#8239;(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>is\nfor
        relief against the Company in an involuntary case,</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(ii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>appoints\na
        Custodian of the Company or for all or substantially all of its property,
        or</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.75in; text-align: justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT
        STYLE=\"font-size: 10pt\">(iii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>orders\nthe
        liquidation of the Company,</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify\">and the
        order or decree remains unstayed\nand in effect for 60 days; or</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 25; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->20<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>any\nother
        Event of Default provided with respect to Securities of that Series, which
        is specified in a Board Resolution, a supplemental indenture\nhereto or an
        Officer&rsquo;s Certificate, in accordance with Section&nbsp;2.2.18.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The term &ldquo;<I>Bankruptcy\nLaw</I>&rdquo;
        means title 11, U.S. Code or any similar Federal or State law for the relief
        of debtors. The term &ldquo;<I>Custodian</I>&rdquo;\nmeans any receiver, trustee,
        assignee, liquidator or similar official under any Bankruptcy Law.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Company will provide the\nTrustee written
        notice of any Default or Event of Default within 30 days of becoming aware
        of the occurrence of such Default or Event\nof Default, which notice will
        describe in reasonable detail the status of such Default or Event of Default
        and what action the Company\nis taking or proposes to take in respect thereof.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;6.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Acceleration\nof
        Maturity; Rescission and Annulment</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">If an Event of Default with\nrespect to Securities of any Series&nbsp;at
        the time outstanding occurs and is continuing (other than an Event of Default
        referred to\nin Section&nbsp;6.1(d)&nbsp;or (e)) then in every such case the
        Trustee or the Holders of not less than 25% in principal amount of the\noutstanding
        Securities of that Series&nbsp;may declare the principal amount (or, if any
        Securities of that Series&nbsp;are Discount Securities,\nsuch portion of the
        principal amount as may be specified in the terms of such Securities) of and
        accrued and unpaid interest, if any,\non all of the Securities of that Series&nbsp;to
        be due and payable immediately, by a notice in writing to the Company (and
        to the Trustee\nif given by Holders), and upon any such declaration such principal
        amount (or specified amount) and accrued and unpaid interest, if any,\nshall
        become immediately due and payable. If an Event of Default specified in Section&nbsp;6.1(d)&nbsp;or
        (e)&nbsp;shall occur, the principal\namount (or specified amount) of and accrued
        and unpaid interest, if any, on all outstanding Securities shall <I>ipso facto</I>
        become\nand be immediately due and payable without any declaration or other
        act on the part of the Trustee or any Holder.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">At any time after such a declaration\nof acceleration with respect to
        any Series&nbsp;has been made and before a judgment or decree for payment
        of the money due has been obtained\nby the Trustee as hereinafter in this
        Article&nbsp;provided, the Holders of a majority in principal amount of the
        outstanding Securities\nof that Series, by written notice to the Company and
        the Trustee, may rescind and annul such declaration and its consequences if
        all Events\nof Default with respect to Securities of that Series, other than
        the non-payment of the principal and interest, if any, of Securities\nof that
        Series&nbsp;which have become due solely by such declaration of acceleration,
        have been cured or waived as provided in Section&nbsp;6.13.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">No such rescission shall affect\nany subsequent Default or impair any
        right consequent thereon.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;6.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Collection\nof
        Indebtedness and Suits for Enforcement by Trustee</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The Company covenants that if:</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nis
        made in the payment of any interest on any Security when such interest becomes
        due and payable and such default continues for a period\nof 30 days,</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 26; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->21<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nis
        made in the payment of principal of any Security at the Maturity thereof,
        or</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>default\nis
        made in the deposit of any sinking fund payment, if any, when and as due by
        the terms of a Security,</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size:
        10pt\"><I>then,</I></FONT>\nthe Company will, upon demand of the Trustee,
        pay to it, for the benefit of the Holders of such Securities, the whole amount
        then due\nand payable on such Securities for principal and interest and, to
        the extent that payment of such interest shall be legally enforceable,\ninterest
        on any overdue principal and any overdue interest at the rate or rates prescribed
        therefor in such Securities, and, in addition\nthereto, such further amount
        as shall be sufficient to cover the costs and expenses of collection, including
        the compensation, reasonable\nexpenses, disbursements and advances of the
        Trustee, its agents and counsel.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">If
        the Company fails to pay\nsuch amounts forthwith upon such demand, the Trustee,
        in its own name and as trustee of an express trust, may institute a judicial
        proceeding\nfor the collection of the sums so due and unpaid, may prosecute
        such proceeding to judgment or final decree and may enforce the same against\nthe
        Company or any other obligor upon such Securities and collect the moneys adjudged
        or deemed to be payable in the manner provided by\nlaw out of the property
        of the Company or any other obligor upon such Securities, wherever situated.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If an Event of Default with\nrespect to any Securities
        of any Series&nbsp;occurs and is continuing, the Trustee, subject to Article&nbsp;VII
        hereof, may in its discretion\nproceed to protect and enforce its rights and
        the rights of the Holders of Securities of such Series&nbsp;by such appropriate
        judicial\nproceedings as the Trustee shall deem most effectual to protect
        and enforce any such rights, whether for the specific enforcement of any\ncovenant
        or agreement in this Indenture or in aid of the exercise of any power granted
        herein, or to enforce any other proper remedy.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Trustee\nMay&nbsp;File
        Proofs of Claim</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">In case
        of the pendency of any\nreceivership, insolvency, liquidation, bankruptcy,
        reorganization, arrangement, adjustment, composition or other judicial proceeding
        relative\nto the Company or any other obligor upon the Securities or the property
        of the Company or of such other obligor or their creditors, the\nTrustee (irrespective
        of whether the principal of the Securities shall then be due and payable as
        therein expressed or by declaration\nor otherwise and irrespective of whether
        the Trustee shall have made any demand on the Company for the payment of overdue
        principal or\ninterest) shall be entitled and empowered, by intervention in
        such proceeding or otherwise,</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nfile
        and prove a claim for the whole amount of principal and interest owing and
        unpaid in respect of the Securities and to file such other\npapers or documents
        as may be necessary or advisable in order to have the claims of the Trustee
        (including any claim for the compensation,\nreasonable expenses, disbursements
        and advances of the Trustee, its agents and counsel) and of the Holders allowed
        in such judicial proceeding,\nand</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\ncollect
        and receive any moneys or other property payable or deliverable on any such
        claims and to distribute the same,</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        27; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->22<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\">and any custodian, receiver,
        assignee, trustee,\nliquidator, sequestrator or other similar official in
        any such judicial proceeding is hereby authorized by each Holder to make such
        payments\nto the Trustee and, in the event that the Trustee shall consent
        to the making of such payments directly to the Holders, to pay to the\nTrustee
        any amount due it for the compensation, reasonable expenses, disbursements
        and advances of the Trustee, its agents and counsel\nand any other amounts
        due the Trustee under Section&nbsp;7.7.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Nothing herein contained shall\nbe deemed to authorize the Trustee to
        authorize or consent to or accept or adopt on behalf of any Holder any plan
        of reorganization, arrangement,\nadjustment or composition affecting the Securities
        or the rights of any Holder thereof or to authorize the Trustee to vote in
        respect\nof the claim of any Holder in any such proceeding.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Trustee\nMay&nbsp;Enforce
        Claims Without Possession of Securities</U>.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">All rights of action and claims\nunder this Indenture or the Securities
        may be prosecuted and enforced by the Trustee without the possession of any
        of the Securities or\nthe production thereof in any proceeding relating thereto,
        and any such proceeding instituted by the Trustee shall be brought in its
        own\nname as trustee of an express trust, and any recovery of judgment shall,
        after provision for the payment of the compensation, reasonable\nexpenses,
        disbursements and advances of the Trustee, its agents and counsel, be for
        the ratable benefit of the Holders of the Securities\nin respect of which
        such judgment has been recovered.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;6.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Application\nof
        Money Collected.</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Any money
        or property collected\nby the Trustee pursuant to this Article&nbsp;shall
        be applied in the following order, at the date or dates fixed by the Trustee
        and, in\ncase of the distribution of such money or property on account of
        principal or interest, upon presentation of the Securities and the notation\nthereon
        of the payment if only partially paid and upon surrender thereof if fully
        paid:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">First:&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>To\nthe
        payment of all amounts due the Trustee under Section&nbsp;7.7; and</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"font-size: 10pt\">Second:&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>To\nthe
        payment of the amounts then due and unpaid for principal of and interest on
        the Securities in respect of which or for the benefit\nof which such money
        has been collected, ratably, without preference or priority of any kind, according
        to the amounts due and payable\non such Securities for principal and interest,
        respectively; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">Third:&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>To\nthe
        Company.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;6.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Limitation\non
        Suits</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">No Holder of any Security
        of\nany Series&nbsp;shall have any right to institute any proceeding, judicial
        or otherwise, with respect to this Indenture, or for the appointment\nof a
        receiver or trustee, or for any other remedy hereunder, unless</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>such\nHolder
        has previously given written notice to the Trustee of a continuing Event of
        Default with respect to the Securities of that Series;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 28; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->23<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nHolders
        of not less than 25% in principal amount of the outstanding Securities of
        that Series&nbsp;shall have made written request to\nthe Trustee to institute
        proceedings in respect of such Event of Default in its own name as Trustee
        hereunder;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>such\nHolder
        or Holders have offered to the Trustee indemnity or security satisfactory
        to the Trustee against the costs, expenses and liabilities\nwhich might be
        incurred by the Trustee in compliance with such request;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nTrustee
        for 60 days after its receipt of such notice, request and offer of indemnity
        has failed to institute any such proceeding; and</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>no\ndirection
        inconsistent with such written request has been given to the Trustee during
        such 60-day period by the Holders of a majority\nin principal amount of the
        outstanding Securities of that Series;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">it being
        understood, intended and expressly covenanted\nby the Holder of every Security
        with every other Holder and the Trustee that no one or more of such Holders
        shall have any right in any\nmanner whatever by virtue of, or by availing
        of, any provision of this Indenture to affect, disturb or prejudice the rights
        of any other\nof such Holders, or to obtain or to seek to obtain priority
        or preference over any other of such Holders or to enforce any right under\nthis
        Indenture, except in the manner herein provided and for the equal and ratable
        benefit of all such Holders of the applicable Series.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.8.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Unconditional\nRight
        of Holders to Receive Principal and Interest</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Notwithstanding any other provision\nin this Indenture, the Holder of
        any Security shall have the right, which is absolute and unconditional, to
        receive payment of the principal\nof and interest, if any, on such Security
        on the Maturity of such Security, including the Stated Maturity expressed
        in such Security (or,\nin the case of redemption, on the redemption date)
        and to institute suit for the enforcement of any such payment, and such rights
        shall\nnot be impaired without the consent of such Holder.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.9.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Restoration\nof
        Rights and Remedies</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">If the
        Trustee or any Holder\nhas instituted any proceeding to enforce any right
        or remedy under this Indenture and such proceeding has been discontinued or
        abandoned\nfor any reason or has been determined adversely to the Trustee
        or to such Holder, then and in every such case, subject to any determination\nin
        such proceeding, the Company, the Trustee and the Holders shall be restored
        severally and respectively to their former positions hereunder\nand thereafter
        all rights and remedies of the Trustee and the Holders shall continue as though
        no such proceeding had been instituted.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;6.10.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Rights\nand
        Remedies Cumulative</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Except
        as otherwise provided\nwith respect to the replacement or payment of mutilated,
        destroyed, lost or stolen Securities in Section&nbsp;2.8, no right or remedy\nherein
        conferred upon or reserved to the Trustee or to the Holders is intended to
        be exclusive of any other right or remedy, and every\nright and remedy shall,
        to the extent permitted by law, be cumulative and in addition to every other
        right and remedy given hereunder\nor now or hereafter existing at law or in
        equity or otherwise. The assertion or employment of any right or remedy hereunder,
        or otherwise,\nshall not, to the extent permitted by law, prevent the concurrent
        assertion or employment of any other appropriate right or remedy.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 29; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->24<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.11.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Delay\nor
        Omission Not Waiver</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">No delay
        or omission of the\nTrustee or of any Holder of any Securities to exercise
        any right or remedy accruing upon any Event of Default shall impair any such
        right\nor remedy or constitute a waiver of any such Event of Default or an
        acquiescence therein. Every right and remedy given by this Article&nbsp;or\nby
        law to the Trustee or to the Holders may be exercised from time to time, and
        as often as may be deemed expedient, by the Trustee or\nby the Holders, as
        the case may be.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;6.12.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Control\nby
        Holders</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The Holders of a majority
        in\nprincipal amount of the outstanding Securities of any Series&nbsp;shall
        have the right to direct the time, method and place of conducting\nany proceeding
        for any remedy available to the Trustee, or exercising any trust or power
        conferred on the Trustee, with respect to the\nSecurities of such Series,
        provided that</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>such\ndirection
        shall not be in conflict with any rule&nbsp;of law or with this Indenture,</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nTrustee
        may take any other action deemed proper by the Trustee which is not inconsistent
        with such direction,</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>subject\nto
        the provisions of Section&nbsp;7.1, the Trustee shall have the right to decline
        to follow any such direction if the Trustee in good\nfaith shall, by a Responsible
        Officer of the Trustee, determine that the proceeding so directed would involve
        the Trustee in personal\nliability, and</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>prior\nto
        taking any action as directed under this Section&nbsp;6.12, the Trustee shall
        be entitled to indemnity satisfactory to it against the\ncosts, expenses and
        liabilities which might be incurred by it in compliance with such request
        or direction.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;6.13.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Waiver\nof
        Past Defaults</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Holders
        of not less than\na majority in principal amount of the outstanding Securities
        of any Series&nbsp;may on behalf of the Holders of all the Securities of\nsuch
        Series, by written notice to the Trustee and the Company, waive any past Default
        hereunder with respect to such Series&nbsp;and its\nconsequences, except a
        Default in the payment of the principal of or interest on any Security of
        such Series&nbsp;(provided, however,\nthat the Holders of a majority in principal
        amount of the outstanding Securities of any Series&nbsp;may rescind an acceleration
        and its\nconsequences, including any related payment default that resulted
        from such acceleration). Upon any such waiver, such Default shall cease\nto
        exist, and any Event of Default arising therefrom shall be deemed to have
        been cured, for every purpose of this Indenture; but no such\nwaiver shall
        extend to any subsequent or other Default or impair any right consequent thereon.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 30; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->25<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;6.14.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Undertaking\nfor
        Costs</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">All parties to this
        Indenture\nagree, and each Holder of any Security by his acceptance thereof
        shall be deemed to have agreed, that any court may in its discretion\nrequire,
        in any suit for the enforcement of any right or remedy under this Indenture,
        or in any suit against the Trustee for any action\ntaken, suffered or omitted
        by it as Trustee, the filing by any party litigant in such suit of an undertaking
        to pay the costs of such\nsuit, and that such court may in its discretion
        assess reasonable costs, including reasonable attorneys&rsquo; fees, against
        any party\nlitigant in such suit, having due regard to the merits and good
        faith of the claims or defenses made by such party litigant; but the provisions\nof
        this Section&nbsp;shall not apply to any suit instituted by the Company, to
        any suit instituted by the Trustee, to any suit instituted\nby any Holder
        or group of Holders, holding in the aggregate more than 10% in principal amount
        of the outstanding Securities of any Series,\nor to any suit instituted by
        any Holder for the enforcement of the payment of the principal of or interest
        on any Security on or after\nthe Maturity of such Security, including the
        Stated Maturity expressed in such Security (or, in the case of redemption,
        on the redemption\ndate).</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;VII.<FONT STYLE=\"text-transform:
        uppercase\"><BR>\nTRUSTEE</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;7.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Duties\nof
        Trustee</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>If\nan
        Event of Default has occurred and is continuing, the Trustee shall exercise
        the rights and powers vested in it by this Indenture and\nuse the same degree
        of care and skill in their exercise as a prudent person would exercise or
        use under the circumstances in the conduct\nof such person&rsquo;s own affairs.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>Except\nduring
        the continuance of an Event of Default:</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        need perform only those duties that are specifically set forth in this Indenture
        and no others, and no implied covenants or obligations\nwill be read into
        this Indenture against the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent:
        0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size: 10pt\">(ii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>In\nthe
        absence of bad faith on its part, the Trustee may conclusively rely, as to
        the truth of the statements and the correctness of the\nopinions expressed
        therein, upon Officer&rsquo;s Certificates or Opinions of Counsel furnished
        to the Trustee and conforming to the requirements\nof this Indenture; <U>however</U>,
        in the case of any such Officer&rsquo;s Certificates or Opinions of Counsel
        which by any provisions\nhereof are specifically required to be furnished
        to the Trustee, the Trustee shall examine such Officer&rsquo;s Certificates
        and Opinions\nof Counsel to determine whether or not they conform to the form
        requirements of this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        may not be relieved from liability for its own negligent action, its own negligent
        failure to act or its own willful misconduct,\nexcept that:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.75in; text-align:
        justify; text-indent: 0.5in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>This\nparagraph
        does not limit the effect of paragraph (b)&nbsp;of this Section.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 31; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->26<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(ii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be liable for any error of judgment made in good faith by a Responsible
        Officer, unless it is proved that the Trustee\nwas negligent in ascertaining
        the pertinent facts.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify; text-indent: 0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT
        STYLE=\"font-size: 10pt\">(iii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be liable with respect to any action taken, suffered or omitted
        to be taken by it with respect to Securities of any\nSeries&nbsp;in good faith
        in accordance with the direction of the Holders of a majority in principal
        amount of the outstanding Securities\nof such Series&nbsp;relating to the
        time, method and place of conducting any proceeding for any remedy available
        to the Trustee, or exercising\nany trust or power conferred upon the Trustee,
        under this Indenture with respect to the Securities of such Series&nbsp;in
        accordance with\nSection&nbsp;6.12.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>Every\nprovision
        of this Indenture that in any way relates to the Trustee is subject to paragraph
        (a), (b)&nbsp;and (c)&nbsp;of this Section.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        may refuse to perform any duty or exercise any right or power unless it receives
        indemnity satisfactory to it against the costs,\nexpenses and liabilities
        which might be incurred by it in performing such duty or exercising such right
        or power.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be liable for interest on any money received by it except as the
        Trustee may agree in writing with the Company. Money\nheld in trust by the
        Trustee need not be segregated from other funds except to the extent required
        by law.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>No\nprovision
        of this Indenture shall require the Trustee to risk its own funds or otherwise
        incur any financial liability in the performance\nof any of its duties or
        in the exercise of any of its rights or powers, if adequate indemnity against
        such risk is not assured to the\nTrustee in its satisfaction.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nPaying
        Agent, the Notice Agent, the Registrar, any authenticating agent and the Trustee
        when acting in any other capacity hereunder shall\nbe entitled to the protections
        and immunities as are set forth in this Article&nbsp;VII.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nrights,
        privileges, protections, immunities and benefits given to the Trustee, including
        its right to be indemnified, are extended to,\nand will be enforceable by,
        the Trustee in each of its capacities under this Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;7.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Rights\nof
        Trustee</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        may rely on and shall be protected in acting or refraining from acting upon
        any document (whether in its original or facsimile\nform) believed by it to
        be genuine and to have been signed or presented by the proper person. The
        Trustee need not investigate any fact\nor matter stated in the document.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>Before\nthe
        Trustee acts or refrains from acting, it may require an Officer&rsquo;s Certificate
        or an Opinion of Counsel or both. The Trustee\nshall not be liable for any
        action it takes or omits to take in good faith in reliance on such Officer&rsquo;s
        Certificate or Opinion\nof Counsel.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        32; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->27<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        may act through agents and shall not be responsible for the misconduct or
        negligence of any agent appointed with due care. No\nDepositary shall be deemed
        an agent of the Trustee, and the Trustee shall not be responsible for any
        act or omission by any Depositary.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be liable for any action it takes or omits to take in good faith
        which it believes to be authorized or within its rights\nor powers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        may consult with counsel and the advice of such counsel or any Opinion of
        Counsel shall be full and complete authorization and\nprotection in respect
        of any action taken, suffered or omitted by it hereunder in good faith and
        in reliance thereon.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall be under no obligation to exercise any of the rights or powers vested
        in it by this Indenture at the request or direction\nof any of the Holders
        of Securities unless such Holders shall have offered to the Trustee security
        or indemnity satisfactory to it against\nthe costs, expenses and liabilities
        which might be incurred by it in compliance with such request or direction.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be bound to make any investigation into the facts or matters stated
        in any resolution, certificate, statement, instrument,\nopinion, report, notice,
        request, direction, consent, order, bond, debenture, note, other evidence
        of indebtedness or other paper or document,\nbut the Trustee, in its discretion,
        may make such further inquiry or investigation into such facts or matters
        as it may see fit.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall not be deemed to have notice of any Default or Event of Default unless
        a Responsible Officer of the Trustee has actual knowledge\nthereof or unless
        written notice of any event which is in fact such a default is received by
        a Responsible Officer at the Corporate Trust\nOffice of the Trustee, and such
        notice references the Securities generally or the Securities of a particular
        Series&nbsp;and this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>In\nno
        event shall the Trustee be liable to any person for special, punitive, indirect,
        consequential or incidental loss or damage of any\nkind whatsoever (including
        but not limited to lost profits), even if the Trustee has been advised of
        the likelihood of such loss or damage.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(j)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\npermissive
        right of the Trustee to take the actions permitted by this Indenture shall
        not be construed as an obligation or duty to do\nso.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(k)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        will not be required to give any bond or surety in respect of the execution
        of this Indenture or otherwise.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;7.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Individual\nRights
        of Trustee</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Trustee
        in its individual\nor any other capacity may become the owner or pledgee of
        Securities and may otherwise deal with the Company or an Affiliate of the
        Company\nwith the same rights it would have if it were not Trustee. Any Agent
        may do the same with like rights. The Trustee is also subject to\nSections
        7.10 and 7.11.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 33; Value: 2 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt;
        margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->28<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;7.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Trustee&rsquo;s\nDisclaimer</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Trustee makes no representation\nas to the
        validity or adequacy of this Indenture or the Securities. The Trustee shall
        not be accountable for the Company&rsquo;s use of\nthe proceeds from the Securities
        and shall not be responsible for any statement in the Securities other than
        its certificate of authentication.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;7.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Notice\nof
        Defaults</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        white\"><FONT STYLE=\"font-size: 10pt\">If\na Default or Event of Default
        occurs and is continuing with respect to the Securities of any Series&nbsp;and
        if it is known to a Responsible\nOfficer of the Trustee, the Trustee shall
        send to each Holder of the Securities of that Series&nbsp;notice of a Default
        or Event of Default\nwithin 90 days after it occurs or, if later, after a
        Responsible Officer of the Trustee has knowledge of such Default or Event
        of Default.\nExcept in the case of a Default or Event of Default in payment
        of principal of or interest on any Security of any Series, the Trustee\nmay
        withhold the notice if and so long as its corporate trust committee or a committee
        of its Responsible Officers in good faith determines\nthat withholding the
        notice is in the interests of Holders of that Series. </FONT>The Trustee will
        not be deemed to have notice or be\ncharged with knowledge of any Default
        or Event of Default unless written notice thereof has been received by a Responsible
        Officer, and\nsuch notice references the applicable Series&nbsp;of Securities
        and this Indenture and states on its face that a Default or Event of Default\nhas
        occurred.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;7.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Reports\nby
        Trustee to Holders</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Within
        60 days after each anniversary\nof the date of this Indenture and for so long
        as any Securities remain outstanding, the Trustee shall transmit by mail to
        all Holders,\nas their names and addresses appear on the register kept by
        the Registrar, a brief report dated as of such anniversary date, in accordance\nwith,
        and to the extent required under, TIA &sect; 313.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">A copy of each report at the\ntime of its mailing to Holders of any
        Series&nbsp;shall be filed with the SEC and each national securities exchange
        on which the Securities\nof that Series&nbsp;are listed. The Company shall
        promptly notify the Trustee in writing when Securities of any Series&nbsp;are
        listed\non any national securities exchange.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;7.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Compensation\nand
        Indemnity</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        shall pay to the\nTrustee from time to time compensation for its services
        as the Company and the Trustee shall from time to time agree upon in writing.\nThe
        Trustee&rsquo;s compensation shall not be limited by any law on compensation
        of a trustee of an express trust. The Company shall reimburse\nthe Trustee
        upon request for all reasonable out-of-pocket expenses incurred by it. Such
        expenses shall include the reasonable compensation\nand expenses of the Trustee&rsquo;s
        agents and counsel.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        shall indemnify\neach of the Trustee and any predecessor Trustee (including
        for the cost of defending itself) against any cost, expense or liability,
        including\ntaxes (other than taxes based upon, measured by or determined by
        the income of the Trustee) incurred by it except as set forth in the\nnext
        paragraph in the performance of its duties under this Indenture as Trustee
        or Agent. The Trustee shall notify the Company promptly\nof any claim for
        which it may seek indemnity. Failure by the Trustee to so notify the Company
        shall not relieve the Company of its obligations\nhereunder, unless and to
        the extent that the Company is materially prejudiced thereby. The Company
        shall defend the claim and the Trustee\nshall cooperate in the defense. The
        Trustee may have separate counsel, and the Company shall pay the reasonable
        fees and expenses of such\ncounsel. The Company need not pay for any settlement
        made without its consent, which consent will not be unreasonably withheld.
        This indemnification\nshall apply to officers, directors, employees, shareholders
        and agents of the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 34; Value:
        2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->29<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT
        STYLE=\"font-size: 10pt\">The\nCompany need not reimburse any expense or indemnify
        against any loss or liability incurred by the Trustee or by any officer, director,\nemployee,
        shareholder or agent of the Trustee through willful misconduct or negligence,
        </FONT>as determined by a final decision of a\ncourt of competent jurisdiction.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">To secure the Company&rsquo;s\npayment obligations
        in this Section, the Trustee shall have a lien prior to the Securities of
        any Series&nbsp;on all money or property\nheld or collected by the Trustee,
        except that held in trust to pay principal of and interest on particular Securities
        of that Series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">When the Trustee
        incurs expenses\nor renders services after an Event of Default specified in
        Section&nbsp;6.1(d)&nbsp;or (e)&nbsp;occurs, the expenses and the compensation\nfor
        the services are intended to constitute expenses of administration under any
        Bankruptcy Law.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\"><FONT STYLE=\"font-size:
        10pt\">The\nprovisions of this Section&nbsp;shall survive the termination
        of this Indenture </FONT>and the resignation or removal of the Trustee.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;7.8.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Replacement\nof
        Trustee</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">A resignation or removal
        of\nthe Trustee and appointment of a successor Trustee shall become effective
        only upon the successor Trustee&rsquo;s acceptance of appointment\nas provided
        in this Section.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Trustee
        may resign with\nrespect to the Securities of one or more Series&nbsp;by so
        notifying the Company at least 30 days prior to the date of the proposed resignation.\nThe
        Holders of a majority in principal amount of the Securities of any Series&nbsp;may
        remove the Trustee with respect to that Series&nbsp;by\nso notifying the Trustee
        and the Company. The Company may remove the Trustee with respect to Securities
        of one or more Series&nbsp;if:</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nTrustee
        fails to comply with Section&nbsp;7.10;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nTrustee
        is adjudged a bankrupt or an insolvent or an order for relief is entered with
        respect to the Trustee under any Bankruptcy Law;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nCustodian
        or public officer takes charge of the Trustee or its property; or</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nTrustee
        becomes incapable of acting.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">If
        the Trustee resigns or is\nremoved or if a vacancy exists in the office of
        Trustee for any reason, the Company shall promptly appoint a successor Trustee.
        Within\none year after the successor Trustee takes office, the Holders of
        a majority in principal amount of the then outstanding Securities may\nappoint
        a successor Trustee to replace the successor Trustee appointed by the Company.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 35; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->30<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">If a successor Trustee with\nrespect to the Securities of any one or
        more Series&nbsp;does not take office within 60 days after the retiring Trustee
        resigns or is\nremoved, the retiring Trustee, the Company or the Holders of
        at least a majority in principal amount of the Securities of the applicable\nSeries&nbsp;may
        petition any court of competent jurisdiction for the appointment of a successor
        Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">A successor Trustee
        shall deliver\na written acceptance of its appointment to the retiring Trustee
        and to the Company. Immediately after that, the retiring Trustee shall\ntransfer
        all property held by it as Trustee to the successor Trustee subject to the
        lien provided for in Section&nbsp;7.7, the resignation\nor removal of the
        retiring Trustee shall become effective, and the successor Trustee shall have
        all the rights, powers and duties of the\nTrustee with respect to each Series&nbsp;of
        Securities for which it is acting as Trustee under this Indenture. A successor
        Trustee shall\nsend a notice of its succession to each Holder of each such
        Series. Notwithstanding replacement of the Trustee pursuant to this Section&nbsp;7.8,\nthe
        Company&rsquo;s obligations under Section&nbsp;7.7 hereof shall continue for
        the benefit of the retiring Trustee with respect to expenses\nand liabilities
        incurred by it for actions taken or omitted to be taken in accordance with
        its rights, powers and duties under this Indenture\nprior to such replacement.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;7.9.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Successor\nTrustee
        by Merger, Etc</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Any organization
        or entity into\nwhich the Trustee may be merged or converted or with which
        it may be consolidated, or any organization or entity resulting from any merger,\nconversion
        or consolidation to which the Trustee shall be a party, or any organization
        or entity succeeding to all or substantially all\nof the corporate trust business
        of the Trustee, shall be the successor of the Trustee hereunder, provided
        such organization or entity\nshall be otherwise qualified and eligible under
        Section&nbsp;7.10, without the execution or filing of any paper or any further
        act on\nthe part of any of the parties hereto.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;7.10.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Eligibility;\nDisqualification</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">This Indenture shall always\nhave a Trustee who
        satisfies the requirements of TIA &sect; 310(a)(1), (2)&nbsp;and (5). The
        Trustee shall always have a combined capital\nand surplus of at least $25,000,000
        as set forth in its most recent published annual report of condition. The
        Trustee shall comply with\nTIA &sect; 310(b).</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;7.11.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Preferential\nCollection
        of Claims Against Company</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Trustee is subject to TIA\n &sect; 311(a), excluding any creditor relationship
        listed in TIA &sect; 311(b). A Trustee who has resigned or been removed shall
        be subject\nto TIA &sect; 311(a)&nbsp;to the extent indicated.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 36; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->31<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;VIII.<FONT
        STYLE=\"text-transform: uppercase\"><BR>\nSATISFACTION AND DISCHARGE; DEFEASANCE</FONT></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;8.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Satisfaction\nand
        Discharge of Indenture</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">This
        Indenture shall upon Company\nOrder be discharged with respect to the Securities
        of any Series&nbsp;and cease to be of further effect as to all Securities
        of such Series&nbsp;(except\nas hereinafter provided in this Section&nbsp;8.1),
        and the Trustee, at the expense of the Company, shall execute instruments
        acknowledging\nsatisfaction and discharge of this Indenture, when</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>either</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align:
        justify; text-indent: 0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>all\nSecurities
        of such Series&nbsp;theretofore authenticated and delivered (other than Securities
        that have been destroyed, lost or stolen\nand that have been replaced or paid)
        have been delivered to the Trustee for cancellation; or</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1in; text-align: justify;
        text-indent: 0.25in\">&#8239;&#8239;&#8239;&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(ii)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>all\nsuch
        Securities of such Series&nbsp;not theretofore delivered to the Trustee for
        cancellation:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 1.25in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">&#8239;&#8239;(1)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>have\nbecome
        due and payable by reason of sending a notice of redemption or otherwise,</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.25in;
        text-align: justify; text-indent: 0.5in\">&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(2)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>will\nbecome
        due and payable at their Stated Maturity within one year,</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0in 1.5in; text-align: justify;
        text-indent: 0.25in\">&#8239;&#8239;<FONT STYLE=\"font-size: 10pt\">(3)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>have\nbeen
        called for redemption or are to be called for redemption within one year under
        arrangements satisfactory to the Trustee for the giving\nof notice of redemption
        by the Trustee in the name, and at the expense, of the Company, or</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 1.25in;
        text-align: justify; text-indent: 0.5in\">&#8239;&#8239;<FONT STYLE=\"font-size:
        10pt\">(4)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>are\ndeemed
        paid and discharged pursuant to Section&nbsp;8.3, as applicable;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">and the Company, in the case of (1), (2)&nbsp;or\n(3)&nbsp;above,
        has irrevocably deposited or caused to be deposited with the Trustee as trust
        funds in trust an amount of money or U.S.\nGovernment Obligations, which amount
        shall be sufficient for the purpose of paying and discharging each installment
        of principal (including\nmandatory sinking fund payments or analogous payments)
        of and interest on all the Securities of such Series&nbsp;on the dates such
        installments\nof principal or interest are due;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        has paid or caused to be paid all other sums payable hereunder by the Company;
        and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        has delivered to the Trustee an Officer&rsquo;s Certificate and an Opinion
        of Counsel, each stating that all conditions precedent\nprovided for relating
        to the satisfaction and discharge contemplated by this Section&nbsp;have been
        complied with.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<!-- Field: Page; Sequence: 37; Value: 2 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt;
        margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->32<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">Notwithstanding the
        satisfaction\nand discharge of this Indenture, (x)&nbsp;the obligations of
        the Company to the Trustee under Section&nbsp;7.7, (y)&nbsp;if money shall\nhave
        been deposited with the Trustee pursuant to clause (a)&nbsp;of this Section,
        the provisions of Sections 2.4, 2.7, 2.8, 8.2 and 8.5,\nand (z)&nbsp;the rights,
        powers, trusts and immunities of the Trustee hereunder and the Company&rsquo;s
        obligations in connection therewith\nshall survive.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;8.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Application\nof
        Trust Funds; Indemnification</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>Subject\nto
        the provisions of Section&nbsp;8.5, all money and U.S. Government Obligations
        or Foreign Government Obligations deposited with the\nTrustee pursuant to
        Section&nbsp;8.1, 8.3 or 8.4 and all money received by the Trustee in respect
        of U.S. Government Obligations or Foreign\nGovernment Obligations deposited
        with the Trustee pursuant to Section&nbsp;8.1, 8.3 or 8.4, shall be held in
        trust and applied by it,\nin accordance with the provisions of the Securities
        and this Indenture, to the payment, either directly or through any Paying
        Agent (including\nthe Company acting as its own Paying Agent) as the Trustee
        may determine, to the persons entitled thereto, of the principal and interest\nfor
        whose payment such money has been deposited with or received by the Trustee
        or to make mandatory sinking fund payments or analogous\npayments as contemplated
        by Sections 8.1, 8.3 or 8.4.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nCompany
        shall pay and shall indemnify the Trustee (which indemnity shall survive termination
        of this Indenture) against any tax, fee or\nother charge imposed on or assessed
        against U.S. Government Obligations or Foreign Government Obligations deposited
        pursuant to Sections\n8.1, 8.3 or 8.4 or the interest and principal received
        in respect of such obligations other than any payable by or on behalf of Holders.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nTrustee
        shall deliver or pay to the Company from time to time upon Company Order any
        U.S. Government Obligations or Foreign Government\nObligations or money held
        by it as provided in Sections 8.3 or 8.4 which, in the opinion of a nationally
        recognized firm of independent\ncertified public accountants or investment
        bank expressed in a written certification thereof delivered to the Trustee,
        are then in excess\nof the amount thereof which then would have been required
        to be deposited for the purpose for which such U.S. Government Obligations
        or\nForeign Government Obligations or money were deposited or received. This
        provision shall not authorize the sale by the Trustee of any\nU.S. Government
        Obligations or Foreign Government Obligations held under this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;8.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Legal\nDefeasance
        of Securities of any Series</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Unless
        this Section&nbsp;8.3\nis otherwise specified, pursuant to Section&nbsp;2.2,
        to be inapplicable to Securities of any Series, the Company shall be deemed
        to have\npaid and discharged the entire indebtedness on all the outstanding
        Securities of any Series&nbsp;on the 91st day after the date of the\ndeposit
        referred to in subparagraph (d)&nbsp;hereof, and the provisions of this Indenture,
        as it relates to such outstanding Securities\nof such Series, shall no longer
        be in effect (and the Trustee, at the expense of the Company, shall, upon
        receipt of a Company Order,\nexecute instruments acknowledging the same),
        except as to:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 38; Value: 2 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt;
        margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->33<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nrights
        of Holders of Securities of such Series&nbsp;to receive, from the trust funds
        described in subparagraph (d)&nbsp;hereof, (i)&nbsp;payment\nof the principal
        of and each installment of principal of and interest on the outstanding Securities
        of such Series&nbsp;on the Maturity\nof such principal or installment of principal
        or interest and (ii)&nbsp;the benefit of any mandatory sinking fund payments
        applicable\nto the Securities of such Series&nbsp;on the day on which such
        payments are due and payable in accordance with the terms of this Indenture\nand
        the Securities of such Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nprovisions
        of Sections 2.4, 2.5, 2.7, 2.8, 7.7, 8.2, 8.3, 8.5 and 8.6; and</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nrights,
        powers, trusts and immunities of the Trustee hereunder and the Company&rsquo;s
        obligations in connection therewith;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">provided that,
        the following conditions shall\nhave been satisfied:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        shall have irrevocably deposited or caused to be deposited (except as provided
        in Section&nbsp;8.2(c)) with the Trustee as trust\nfunds specifically pledged
        as security for and dedicated solely to the benefit of the Holders of such
        Securities (i)&nbsp;in the case\nof Securities of such Series&nbsp;denominated
        in Dollars, cash in Dollars and/or U.S. Government Obligations or (ii)&nbsp;in
        the case\nof Securities of such Series&nbsp;denominated in a Foreign Currency
        (other than a composite currency), money and/or Foreign Government\nObligations,
        which through the payment of interest and principal in respect thereof in
        accordance with their terms, will provide (and\nwithout reinvestment and assuming
        no tax liability will be imposed on such Trustee), not later than one day
        before the due date of any\npayment of money, an amount in cash, sufficient,
        in the opinion of a nationally recognized firm of independent public accountants
        or investment\nbank expressed in a written certification thereof delivered
        to the Trustee, to pay and discharge each installment of principal of and\ninterest,
        on and any mandatory sinking fund payments in respect of all the Securities
        of such Series&nbsp;on the dates such installments\nof principal or interest
        and such sinking fund payments are due;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>such\ndeposit
        will not result in a breach or violation of, or constitute a default under,
        this Indenture or any other agreement or instrument\nto which the Company
        is a party or by which it is bound;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>no\nDefault
        or Event of Default with respect to the Securities of such Series&nbsp;shall
        have occurred and be continuing on the date of such\ndeposit or during the
        period ending on the 91st day after such date;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate and an
        Opinion of Counsel to the effect that (i)&nbsp;the Company\nhas received from,
        or there has been published by, the Internal Revenue Service a ruling or (ii)&nbsp;since
        the date of execution of this\nIndenture, there has been a change in the applicable
        Federal income tax law, in either case to the effect that, and based thereon
        such\nOpinion of Counsel shall confirm that, the Holders of the Securities
        of such Series&nbsp;will not recognize income, gain or loss for Federal\nincome
        tax purposes as a result of such deposit, defeasance and discharge and will
        be subject to Federal income tax on the same amount\nand in the same manner
        and at the same times as would have been the case if such deposit, defeasance
        and discharge had not occurred;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 39;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->34<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate stating
        that the deposit was not made by the Company with the\nintent of defeating,
        hindering, delaying or defrauding any other creditors of the Company; and</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate and an
        Opinion of Counsel, each stating that all conditions\nprecedent provided for
        relating to the defeasance contemplated by this Section&nbsp;have been complied
        with.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;8.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Covenant\nDefeasance</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Unless this Section&nbsp;8.4\nis otherwise specified
        pursuant to Section&nbsp;2.2 to be inapplicable to Securities of any Series,
        the Company may omit to comply with\nrespect to the Securities of any Series&nbsp;with
        any term, provision or condition set forth under Sections 4.2, 4.3, 4.4 and
        5.1 and,\nunless otherwise specified therein, any additional covenants specified
        in a supplemental indenture for such Series&nbsp;of Securities\nor a Board
        Resolution or an Officer&rsquo;s Certificate delivered pursuant to Section&nbsp;2.2
        (and the failure to comply with any such\ncovenants shall not constitute a
        Default or Event of Default with respect to such Series&nbsp;under Section&nbsp;6.1)
        and the occurrence\nof any event specified in a supplemental indenture for
        such Series&nbsp;of Securities or a Board Resolution or an Officer&rsquo;s
        Certificate\ndelivered pursuant to Section&nbsp;2.2 and designated as an Event
        of Default shall not constitute a Default or Event of Default hereunder,\nwith
        respect to the Securities of such Series, but, except as specified above,
        the remainder of this Indenture and such Securities will\nbe unaffected thereby;
        provided that the following conditions shall have been satisfied:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>with\nreference
        to this Section&nbsp;8.4, the Company has irrevocably deposited or caused
        to be irrevocably deposited (except as provided in\nSection&nbsp;8.2(c)) with
        the Trustee as trust funds in trust for the purpose of making the following
        payments specifically pledged as\nsecurity for, and dedicated solely to, the
        benefit of the Holders of such Securities (i)&nbsp;in the case of Securities
        of such Series&nbsp;denominated\nin Dollars, cash in Dollars and/or U.S. Government
        Obligations or (ii)&nbsp;in the case of Securities of such Series&nbsp;denominated\nin
        a Foreign Currency (other than a composite currency), money and/or Foreign
        Government Obligations, which through the payment of interest\nand principal
        in respect thereof in accordance with their terms, will provide (and without
        reinvestment and assuming no tax liability\nwill be imposed on such Trustee),
        not later than one day before the due date of any payment of money, an amount
        in cash, sufficient, in\nthe opinion of a nationally recognized firm of independent
        certified public accountants or investment bank expressed in a written certification\nthereof
        delivered to the Trustee, to pay and discharge each installment of principal
        (including mandatory sinking fund payments or analogous\npayments) of and
        interest on all the Securities of such Series&nbsp;on the dates such installments
        of principal or interest are due;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>such\ndeposit
        will not result in a breach or violation of, or constitute a default under,
        this Indenture or any other agreement or instrument\nto which the Company
        is a party or by which it is bound;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        40; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->35<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>no\nDefault
        or Event of Default with respect to the Securities of such Series&nbsp;shall
        have occurred and be continuing on the date of such\ndeposit;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>the\nCompany
        shall have delivered to the Trustee an Officers&rsquo; Certificate and an
        Opinion of Counsel to the effect that the Holders of\nthe Securities of such
        Series&nbsp;will not recognize income, gain or loss for Federal income tax
        purposes as a result of such deposit\nand covenant defeasance and will be
        subject to Federal income tax on the same amount and in the same manner and
        at the same times as would\nhave been the case if such deposit and covenant
        defeasance had not occurred;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate stating
        the deposit was not made by the Company with the intent\nof defeating, hindering,
        delaying or defrauding any other creditors of the Company; and</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>The\nCompany
        shall have delivered to the Trustee an Officer&rsquo;s Certificate and an
        Opinion of Counsel, each stating that all conditions\nprecedent herein provided
        for relating to the covenant defeasance contemplated by this Section&nbsp;have
        been complied with.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;8.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Repayment\nto
        Company</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">Subject to applicable
        abandoned\nproperty law, the Trustee and the Paying Agent shall pay to the
        Company upon request any money held by them for the payment of principal\nand
        interest that remains unclaimed for two years. After that, Holders entitled
        to the money must look to the Company for payment as general\ncreditors unless
        an applicable abandoned property law designates another person.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;8.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Reinstatement</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If the Trustee or the Paying\nAgent is unable
        to apply any money deposited with respect to Securities of any Series&nbsp;in
        accordance with Section&nbsp;8.1 by reason\nof any legal proceeding or by
        reason of any order or judgment of any court or governmental authority enjoining,
        restraining or otherwise\nprohibiting such application, the obligations of
        the Company under this Indenture with respect to the Securities of such Series&nbsp;and\nunder
        the Securities of such Series&nbsp;shall be revived and reinstated as though
        no deposit had occurred pursuant to Section&nbsp;8.1\nuntil such time as the
        Trustee or the Paying Agent is permitted to apply all such money in accordance
        with Section&nbsp;8.1; <U>provided</U>,\n<U>however</U>, that if the Company
        has made any payment of principal of or interest on [or any Additional Amounts
        with respect to] any\nSecurities because of the reinstatement of its obligations,
        the Company shall be subrogated to the rights of the Holders of such Securities\nto
        receive such payment from the money or U.S. Government Obligations held by
        the Trustee or Paying Agent after payment in full to the\nHolders.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE&nbsp;IX.<FONT STYLE=\"text-transform: uppercase\"><BR>\nAMENDMENTS
        AND WAIVERS</FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;9.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Without\nConsent
        of Holders</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company
        and the Trustee\nmay amend or supplement this Indenture or the Securities
        of one or more Series&nbsp;without the consent of any Holder:</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 41; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type:
        Arabic; Name: PageNo -->36<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\ncure
        any ambiguity, defect or inconsistency;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\ncomply
        with Article&nbsp;V;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nprovide
        for uncertificated Securities in addition to or in place of certificated Securities;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nadd
        guarantees with respect to Securities of any Series&nbsp;or secure Securities
        of any Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nsurrender
        any of the Company&rsquo;s rights or powers under this Indenture;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nadd
        covenants or events of default for the benefit of the holders of Securities
        of any Series;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\ncomply
        with the applicable procedures of the applicable depositary;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nmake
        any change that does not adversely affect the rights of any Holder;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(i)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nprovide
        for the issuance of and establish the form and terms and conditions of Securities
        of any Series&nbsp;as permitted by this Indenture;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(j)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\nevidence
        and provide for the acceptance of appointment hereunder by a successor Trustee
        with respect to the Securities of one or more\nSeries&nbsp;and to add to or
        change any of the provisions of this Indenture as shall be necessary to provide
        for or facilitate the administration\nof the trusts hereunder by more than
        one Trustee; or</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(k)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>to\ncomply
        with requirements of the SEC in order to effect or maintain the qualification
        of this Indenture under the TIA.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;9.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>With\nConsent
        of Holders</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Subject to Section&nbsp;9.3,\nthe
        Company and the Trustee may enter into a supplemental indenture with the written
        consent of the Holders of at least a majority in\nprincipal amount of the
        outstanding Securities of each Series&nbsp;affected by such supplemental indenture
        (including consents obtained\nin connection with a tender offer or exchange
        offer for the Securities of such Series), for the purpose of adding any provisions
        to or\nchanging in any manner or eliminating any of the provisions of this
        Indenture or of any supplemental indenture or of modifying in any\nmanner
        the rights of the Holders of each such Series. Except as provided in Section&nbsp;6.13,
        and subject to Section&nbsp;9.3, the Holders\nof at least a majority in principal
        amount of the outstanding Securities of any Series&nbsp;by notice to the Trustee
        (including consents\nobtained in connection with a tender offer or exchange
        offer for the Securities of such Series) may waive compliance by the Company
        with\nany provision of this Indenture or the Securities with respect to such
        Series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">It shall not be necessary
        for\nthe consent of the Holders of Securities under this Section&nbsp;9.2
        to approve the particular form of any proposed supplemental indenture\nor
        waiver, but it shall be sufficient if such consent approves the substance
        thereof. After a supplemental indenture or waiver under this\nsection becomes
        effective, the Company shall send to the Holders of Securities affected thereby,
        a notice briefly describing the supplemental\nindenture or waiver. Any failure
        by the Company to send such notice, or any defect therein, shall not, however,
        in any way impair or affect\nthe validity of any such supplemental indenture
        or waiver.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 42; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->37<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;9.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Limitations</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Without the consent of each\nHolder affected,
        an amendment or waiver may not:</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>reduce\nthe
        principal amount of Securities whose Holders must consent to an amendment,
        supplement or waiver;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>reduce\nthe
        rate of or extend the time for payment of interest (including default interest)
        on any Security;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>reduce\nthe
        principal or change the Stated Maturity of any Security or reduce the amount
        of, or postpone the date fixed for, the payment of any\nsinking fund or analogous
        obligation;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>reduce\nthe
        principal amount of Discount Securities payable upon acceleration of the maturity
        thereof;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(e)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>waive\na
        Default or Event of Default in the payment of the principal of or interest,
        if any, on any Security (except a rescission of acceleration\nof the Securities
        of any Series&nbsp;by the Holders of at least a majority in principal amount
        of the outstanding Securities of such Series&nbsp;and\na waiver of the payment
        default that resulted from such acceleration);</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(f)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>make\nthe
        principal of or interest, if any, on any Security payable in any currency
        other than that stated in the Security;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(g)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>make\nany
        change in Sections 6.8, 6.13 or 9.3 (this sentence); or</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify;
        text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(h)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>waive\na
        redemption payment with respect to any Security, provided that such redemption
        is made at the Company&rsquo;s option.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;9.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Compliance\nwith
        Trust Indenture Act</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Every
        amendment to this Indenture\nor the Securities of one or more Series&nbsp;shall
        be set forth in a supplemental indenture hereto that complies with the TIA
        as then\nin effect.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;9.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Revocation\nand
        Effect of Consents</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Until
        an amendment is set forth\nin a supplemental indenture or a waiver becomes
        effective, a consent to it by a Holder of a Security is a continuing consent
        by the Holder\nand every subsequent Holder of a Security or portion of a Security
        that evidences the same debt as the consenting Holder&rsquo;s Security,\neven
        if notation of the consent is not made on any Security. However, any such
        Holder or subsequent Holder may revoke the consent as to\nhis Security or
        portion of a Security if the Trustee receives the notice of revocation before
        the date of the supplemental indenture or\nthe date the waiver becomes effective.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 43; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->38<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Any amendment or waiver once\neffective shall bind every Holder of each
        Series&nbsp;affected by such amendment or waiver unless it is of the type
        described in any of\nclauses (a)&nbsp;through (h)&nbsp;of Section&nbsp;9.3.
        In that case, the amendment or waiver shall bind each Holder of a Security
        who\nhas consented to it and every subsequent Holder of a Security or portion
        of a Security that evidences the same debt as the consenting\nHolder&rsquo;s
        Security.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The Company may, but
        shall not\nbe obligated to, fix a record date for the purpose of determining
        the Holders entitled to give their consent or take any other action\ndescribed
        above or required or permitted to be taken pursuant to this Indenture. If
        a record date is fixed, then notwithstanding the second\nimmediately preceding
        paragraph, those Persons who were Holders at such record date (or their duly
        designated proxies), and only those\nPersons, shall be entitled to give such
        consent or to revoke any consent previously given or take any such action,
        whether or not such\nPersons continue to be Holders after such record date.
        No such consent shall be valid or effective for more than 120 days after such
        record\ndate.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;9.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Notation\non
        or Exchange of Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company or the Trustee may,\nbut shall not be obligated to, place an appropriate
        notation about an amendment or waiver on any Security of any Series&nbsp;thereafter\nauthenticated.
        The Company in exchange for Securities of that Series&nbsp;may issue and the
        Trustee shall authenticate upon receipt of\na Company Order in accordance
        with Section&nbsp;2.3 new Securities of that Series&nbsp;that reflect the
        amendment or waiver.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;9.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Trustee\nProtected</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">In executing, or accepting the\nadditional trusts
        created by, any supplemental indenture permitted by this Article&nbsp;or the
        modifications thereby of the trusts created\nby this Indenture, the Trustee
        shall be entitled to receive, upon request, an Officer&rsquo;s Certificate
        and/or an Opinion of Counsel\ncomplying with Sections 10.4 and 10.5 and (subject
        to Section&nbsp;7.1) shall be fully protected in relying upon such Officer&rsquo;s\nCertificate
        and/or Opinion of Counsel. The Trustee shall sign all supplemental indentures
        upon delivery of such an Officer&rsquo;s Certificate\nor Opinion of Counsel
        or both, except that the Trustee need not sign any supplemental indenture
        that adversely affects its rights, duties,\nliabilities or immunities under
        this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;X.<FONT STYLE=\"text-transform:
        uppercase\"><BR>\nMISCELLANEOUS</FONT></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Trust\nIndenture
        Act Controls</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">If any provision
        of this Indenture\nlimits, qualifies or conflicts with another provision which
        is required or deemed to be included in this Indenture by the TIA, such required\nor
        deemed provision shall control.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Notices</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">Any notice or communication\nby the Company or
        the Trustee to the other, or by a Holder to the Company or the Trustee, is
        duly given if in writing and delivered in\nperson or mailed by first-class
        mail (registered or certified, return receipt requested), email or overnight
        air courier guaranteeing\nnext day delivery, to the others&rsquo; address:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 44; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->39<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
