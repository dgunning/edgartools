        (assuming the securities issuable upon exercise of\nsuch Units have been duly
        authorized and reserved for issuance by all necessary corporate action), such
        Units will be the legally valid\nand binding obligations of the Company, enforceable
        against the Company in accordance with their terms.Our opinions are subject
        to: (i)&nbsp;the\neffect of bankruptcy, insolvency, reorganization, preference,
        fraudulent transfer, moratorium or other similar laws relating to or affecting\nthe
        rights and remedies of creditors; (ii)&nbsp;(a)&nbsp;the effect of general
        principles of equity, whether considered in a proceeding\nin equity or at
