        \         </td>\n          <td colspan=\"7\" style=\"white-space: pre-line;\">\n
        \           <ix:nonNumeric name=\"ffd:OfferingNote\" escape=\"1\" contextRef=\"offrl_1\"
        id=\"ixv-435\">\n1.a. An unspecified number of securities or aggregate principal
        amount, as applicable, is being registered as may from time to time be offered
        at unspecified prices and, in addition, an unspecified number of securities
        is being registered as may be issued from time to time upon conversion of
        or exchange for any preferred stock or debt securities that provide for conversion
        or exchange, upon exercise of warrants, or pursuant to any anti-dilution adjustments
        with respect to any such securities. Pursuant to Rule 416 under the Securities
        Act of 1933, as amended (the \"Securities Act\"), this registration statement
        also covers any additional securities that may be offered or issued in connection
        with any stock split, stock dividend or pursuant to anti-dilution provisions
        of any of the securities. Separate consideration may or may not be received
        for securities that are issuable upon conversion, exercise or exchange of
        other securities.\n\n1.b. Includes rights to acquire common stock or preferred
        stock under any shareholder rights plan then in effect, if applicable under
        the terms of any such plan.\n\n1.c. The proposed maximum per security and
        aggregate offering prices per class of securities will be determined from
        time to time by the registrant in connection with the issuance by the registrant
        of the securities registered hereunder and is not specified as to each class
        of security.\n\n1.d. In accordance with Rules 456(b) and 457(r) under the
        Securities Act, the registrant is deferring payment of the entire registration
        fee.\n</ix:nonNumeric>\n          </td>\n        </tr>\n        <tr>\n          <td
