        \ </TABLE>\n\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">To the addressees set forth above:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">We have acted as special counsel\nto AeroVironment,&nbsp;Inc.,
        a Delaware corporation (the &ldquo;<B><I>Company</I></B>&rdquo;), in connection
        with its filing on the date\nhereof with the Securities and Exchange Commission
        (the &ldquo;<B><I>Commission</I></B>&rdquo;) of a registration statement on
        Form&nbsp;S-3\n(as amended, the &ldquo;<B><I>Registration Statement</I></B>&rdquo;),
        including a base prospectus (the &ldquo;<B><I>Base Prospectus</I></B>&rdquo;),\nwhich
        provides that it will be supplemented by one or more prospectus supplements
        (each such prospectus supplement, together with the\nBase Prospectus, a &ldquo;<B><I>Prospectus</I></B>&rdquo;),
        under the Securities Act of 1933, as amended (the &ldquo;<B><I>Act</I></B>&rdquo;),\nrelating
        to the registration for issue and sale by the Company of (i)&nbsp;shares of
        the Company&rsquo;s common stock, $0.0001 par value\nper share (&ldquo;<B><I>Common
        Stock</I></B>&rdquo;), (ii)&nbsp;shares of one or more series of the Company&rsquo;s
        preferred stock, $0.0001\npar value per share (&ldquo;<B><I>Preferred Stock</I></B>&rdquo;),
        (iii)&nbsp;one or more series of the Company&rsquo;s debt securities\n(collectively,
        &ldquo;<B><I>Debt Securities</I></B>&rdquo;) to be issued under an indenture
        to be entered into between the Company, as\nissuer, and U.S. Bank Trust Company,
        National Association, as trustee (a form of which is included as Exhibit&nbsp;4.1
        to the Registration\nStatement) and one or more board resolutions, supplements
        thereto or officer&rsquo;s certificates thereunder (such indenture, together\nwith
        the applicable board resolution, supplement or officer&rsquo;s certificate
        pertaining to the applicable series of Debt Securities,\nthe &ldquo;<B><I>Applicable
        Indenture</I></B>&rdquo;), (iv)&nbsp;warrants (&ldquo;<B><I>Warrants</I></B>&rdquo;),
        (v)&nbsp;purchase contracts\n(&ldquo;<B><I>Purchase Contracts</I></B>&rdquo;),
        and (vi)&nbsp;units (&ldquo;<B><I>Units</I></B>&rdquo;). The Common Stock,
        Preferred\nStock, Debt Securities, Warrants, Purchase Contracts, and Units
        are referred to herein collectively as the &ldquo;<B><I>Securities</I></B>.&rdquo;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">This opinion is being furnished\nin connection
        with the requirements of Item 601(b)(5)&nbsp;of Regulation S-K under the Act,
        and no opinion is expressed herein as to any\nmatter pertaining to the contents
        of the Registration Statement or related applicable Prospectus, other than
        as expressly stated herein\nwith respect to the issue of the Securities.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">As such counsel, we have examined\nsuch matters
        of fact and questions of law as we have considered appropriate for purposes
        of this letter. With your consent, we have relied\nupon certificates and other
        assurances of officers of the Company and others as to factual matters without
        having independently verified\nsuch factual matters. We are opining herein
        as to the General Corporation Law of the State of Delaware (the &ldquo;<B><I>DGCL</I></B>&rdquo;),\nand
        with respect to the opinions set forth in paragraphs 3 through 6 below, the
        internal laws of the State of New York, and we express\nno opinion with respect
        to the applicability thereto, or the effect thereon, of the laws of any other
        jurisdiction or, in the case of\nDelaware, any other laws, or as to any matters
        of municipal law or the laws of any local agencies within any state.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font: 8pt Arial, Helvetica,
        Sans-Serif; text-align: right; margin: 0pt\"></P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLSPACING=\"0\" CELLPADDING=\"0\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 100%; border-collapse:
