        100%\"><B>June&nbsp;30, 2025</B></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD><B>Page&nbsp;2</B></TD></TR>\n  <TR STYLE=\"vertical-align:
        top\">\n    <TD>&nbsp;</TD></TR>\n  <TR STYLE=\"vertical-align: top\">\n    <TD><IMG
        SRC=\"tm2519048d2_ex5-1img002.jpg\" ALT=\"\" STYLE=\"height: 17px; width:
        163px\"></TD></TR>\n  </TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Subject
        to the foregoing and\nthe other matters set forth herein, it is our opinion
        that, as of the date hereof:</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        STYLE=\"width: 100%; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0.5in\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt; text-transform: uppercase\">1.</FONT></TD><TD STYLE=\"text-align: justify\">When
        an issuance of Common Stock has been duly authorized by all necessary corporate
        action of the Company, upon issuance, delivery\nand payment therefor in an
        amount not less than the par value thereof in the manner contemplated by the
        applicable Prospectus and by such\ncorporate action, and in total amounts
        and numbers of shares that do not exceed the respective total amounts and
        numbers of shares (a)&nbsp;available\nunder the Company&rsquo;s certificate
        of incorporation (the &ldquo;<I>Certificate of Incorporation</I>&rdquo;),
        and (b)&nbsp;authorized\nby the board of directors of the Company (the &ldquo;<I>Board
        of Directors</I>&rdquo;) in connection with the offering contemplated by\nthe
        applicable Prospectus, such shares of Common Stock will be validly issued,
        fully paid and nonassessable. In rendering the foregoing\nopinion, we have
        assumed that the Company will comply with all applicable notice requirements
        regarding uncertificated shares provided\nin the DGCL.</TD></TR>\n<TR STYLE=\"vertical-align:
        top\">\n<TD>&nbsp;</TD><TD STYLE=\"text-align: justify\">&nbsp;</TD></TR>\n<TR
        STYLE=\"vertical-align: top\">\n<TD><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; text-transform: uppercase\">2.</FONT></TD><TD STYLE=\"text-align:
        justify\">When a series of Preferred Stock has been duly established in accordance
        with the terms of the Certificate\nof Incorporation and authorized by all
        necessary corporate action of the Company, upon issuance, delivery and payment
        therefor in an amount\nnot less than the par value thereof in the manner contemplated
        by the applicable Prospectus and by such corporate action, and in total\namounts
        and numbers of shares that do not exceed the respective total amounts and
        numbers of shares (a)&nbsp;available under the Certificate\nof Incorporation,
        and (b)&nbsp;authorized by the Board of Directors in connection with the offering
        contemplated by the applicable Prospectus,\nsuch shares of such series of
        Preferred Stock will be validly issued, fully paid and nonassessable. In rendering
        the foregoing opinion,\nwe have assumed that the Company will comply with
        all applicable notice requirements regarding uncertificated shares provided
        in the DGCL.</TD></TR>\n<TR STYLE=\"vertical-align: top\">\n<TD>&nbsp;</TD><TD
        STYLE=\"text-align: justify\">&nbsp;</TD></TR>\n<TR STYLE=\"vertical-align:
        top\">\n<TD><FONT STYLE=\"font-family: Times New Roman, Times, Serif; text-transform:
        uppercase\">3.</FONT></TD><TD STYLE=\"text-align: justify\">When the Applicable
        Indenture has been duly authorized, executed and delivered by all necessary
        corporate\naction of the Company, and when the specific terms of a particular
        series of Debt Securities have been duly established in accordance\nwith the
        terms of the Applicable Indenture and authorized by all necessary corporate
        action of the Company, and such Debt Securities have\nbeen duly executed,
        authenticated, issued and delivered against payment therefor in accordance
        with the terms of the Applicable Indenture\nand in the manner contemplated
        by the applicable Prospectus and by such corporate action, such Debt Securities
        will be the legally valid\nand binding obligations of the Company, enforceable
        against the Company in accordance with their terms.</TD></TR>\n<TR STYLE=\"vertical-align:
        top\">\n<TD>&nbsp;</TD><TD STYLE=\"text-align: justify\">&nbsp;</TD></TR>\n<TR
        STYLE=\"vertical-align: top\">\n<TD><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; text-transform: uppercase\">4.</FONT></TD><TD STYLE=\"text-align:
        justify\">When the applicable warrant agreement has been duly authorized,
        executed and delivered by all necessary\ncorporate action of the Company,
        and when the specific terms of a particular issuance of Warrants have been
        duly established in accordance\nwith the terms of the applicable warrant agreement
        and authorized by all necessary corporate action of the Company, and such
        Warrants\nhave been duly executed, authenticated, issued and delivered against
        payment therefor in accordance with the terms of the applicable warrant\nagreement
        and in the manner contemplated by the applicable Prospectus and by such corporate
        action (assuming the securities issuable upon\nexercise of such Warrants have
        been duly authorized and reserved for issuance by all necessary corporate
        action), such Warrants will be\nthe legally valid and binding obligations
        of the Company, enforceable against the Company in accordance with their terms.</TD></TR>\n</TABLE>\n\n<P
        STYLE=\"margin: 0\">&nbsp;</P>\n\n<P STYLE=\"margin: 0\"></P>\n\n<!-- Field:
        Page; Sequence: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt;
