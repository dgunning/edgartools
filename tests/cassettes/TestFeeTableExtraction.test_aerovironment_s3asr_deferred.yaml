        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">prior to the date of the transaction,
        the board of directors of the corporation approved either the business combination
        or the transaction which resulted in the stockholder becoming an interested
        stockholder; </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"
        float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">upon completion of the transaction
        that resulted in the stockholder becoming an interested stockholder, the stockholder
        owned at least 85% of the voting stock of the corporation outstanding at the
        time the transaction commenced, calculated in accordance with the provisions
        of Section&#160;203 of the DGCL; or </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">on or subsequent to the date
        of the transaction, the business combination is approved by the board of directors
        and authorized at an annual or special meeting of stockholders, and not by
        written consent, by the affirmative vote of at least 66</font><font style=\"
        position:relative; bottom:2.66pt;font-size:7pt;letter-spacing:0.14pt;\">2</font><font
        style=\"letter-spacing:0.2pt;\">&#8725;</font><font style=\"font-size:7pt;letter-spacing:0.14pt;\">3</font><font
        style=\"letter-spacing:0.2pt;\">% of the outstanding voting stock which is
        not owned by the interested stockholder. </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Generally, an &#8220;interested
        stockholder&#8221; is a person who, together with affiliates and associates,
        owns, or within three&#160;years prior to the determination of interested
        stockholder status did own, 15% or more of a corporation&#8217;s voting stock.
        Generally, a &#8220;business combination&#8221; includes a merger, asset or
        stock sale, or other transaction resulting in a financial benefit to the interested
        stockholder. The existence of this provision may have an anti-takeover effect
        with respect to transactions not approved in advance by our board of directors.
        We also anticipate that Section&#160;203 of the DGCL may also discourage attempts
        that might result in a premium over the market price for the shares of capital
        stock held by stockholders. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Transfer
        Agent</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"margin-left:20pt; margin-top:8pt; width:436pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        transfer agent and registrar for our common stock is Equiniti Trust Company,
        LLC. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Exchange
