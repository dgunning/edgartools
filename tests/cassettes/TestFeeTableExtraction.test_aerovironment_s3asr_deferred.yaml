        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the place or places where
        principal of, and interest, if any, on the debt securities will be payable
        (and the method of such payment), where the securities of such series may
        be surrendered for registration of transfer or exchange, and where notices
        and demands to us in respect of the debt securities may be delivered; </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6.2pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6.2pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the period or periods within
        which, the price or prices at which and the terms and conditions upon which
        we may redeem the debt securities; </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n      </div>\n
        \     <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
