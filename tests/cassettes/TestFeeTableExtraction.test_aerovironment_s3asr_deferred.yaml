        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:-0.2pt;\">DESCRIPTION
        OF OTHER SECURITIES</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;font-family:Times New Roman, Times, serif ;font-size:10pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We will set forth in the applicable
        prospectus supplement a description of any warrants, purchase contracts or&#160;units
        issued by us that may be offered and sold pursuant to this prospectus. </font>\n
        \       </div>\n      </div>\n      <div style=\"margin-top:0pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n
        \         <br >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n          <font style=\"letter-spacing:0.2pt;\">21</font>\n
        \         <br >\n        </div>\n      </div>\n      <hr >\n    </div>\n    <div
        style=\"page-break-after:always; width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a><a name=\"tGLSE\">&#8203;</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">GLOBAL SECURITIES</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Book-Entry, Delivery and
        Form</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Unless
        we indicate differently in any applicable prospectus supplement or free writing
        prospectus, the securities initially will be issued in book-entry form and
        represented by one or more global notes or global securities, or, collectively,
        global securities. The global securities will be deposited with, or on behalf
        of, The Depository Trust Company, New York, New York, as depositary, or DTC,
        and registered in the name of Cede &amp; Co., the nominee of DTC. Unless and
        until it is exchanged for individual certificates evidencing securities under
        the limited circumstances described below, a global security may not be transferred
        except as a whole by the depositary to its nominee or by the nominee to the
        depositary, or by the depositary or its nominee to a successor depositary
        or to a nominee of the successor depositary. </font>\n        </div>\n        <div
        style=\"margin-left:20pt; margin-top:8pt; width:436pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">DTC has advised us that it
        is: </font>\n        </div>\n        <div style=\" float:left; margin-left:20pt;
        line-height:12pt; margin-top:5.71pt; margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br
        >\n        </div>\n        <div style=\" margin-top:5.71pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a limited-purpose trust company
        organized under the New York Banking Law; </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.7pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.7pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a &#8220;banking organization&#8221;
        within the meaning of the New York Banking Law; </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.7pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.7pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a member of the Federal Reserve
        System; </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"
        float:left; margin-left:20pt; line-height:12pt; margin-top:5.7pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:5.7pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a &#8220;clearing corporation&#8221;
        within the meaning of the New York Uniform Commercial Code; and </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.7pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.7pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">a &#8220;clearing agency&#8221;
        registered pursuant to the provisions of Section&#160;17A of the Exchange
        Act. </font>\n        </div>\n        <div style=\"clear:both; padding:0pt;
        margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">DTC
        holds securities that its participants deposit with DTC. DTC also facilitates
        the settlement among its participants of securities transactions, such as
        transfers and pledges, in deposited securities through electronic computerized
        book-entry changes in participants&#8217; accounts, thereby eliminating the
        need for physical movement of securities certificates. &#8220;Direct participants&#8221;
        in DTC include securities brokers and dealers, including underwriters, banks,
        trust companies, clearing corporations and other organizations. DTC is a wholly-owned
        subsidiary of The Depository Trust &amp; Clearing Corporation, or DTCC. DTCC
        is the holding company for DTC, National Securities Clearing Corporation and
        Fixed Income Clearing Corporation, all of which are registered clearing agencies.
        DTCC is owned by the users of its regulated subsidiaries. Access to the DTC
        system is also available to others, which we sometimes refer to as indirect
        participants, that clear through or maintain a custodial relationship with
        a direct participant, either directly or indirectly. The rules applicable
        to DTC and its participants are on file with the SEC. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Purchases of securities under
        the DTC system must be made by or through direct participants, which will
        receive a credit for the securities on DTC&#8217;s records. The ownership
        interest of the actual purchaser of a security, which we sometimes refer to
        as a beneficial owner, is in turn recorded on the direct and indirect participants&#8217;
        records. Beneficial owners of securities will not receive written confirmation
        from DTC of their purchases. However, beneficial owners are expected to receive
        written confirmations providing details of their transactions, as well as
        periodic statements of their holdings, from the direct or indirect participants
        through which they purchased securities. Transfers of ownership interests
        in global securities are to be accomplished by entries made on the books of
        participants acting on behalf of beneficial owners. Beneficial owners will
        not receive certificates representing their ownership interests in the global
        securities, except under the limited circumstances described below. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">To
        facilitate subsequent transfers, all global securities deposited by direct
        participants with DTC will be registered in the name of DTC&#8217;s partnership
        nominee, Cede &amp; Co., or such other name as may be requested by an authorized
        representative of DTC. The deposit of securities with DTC and their registration
        in the name of Cede &amp; Co. or such other nominee will not change the beneficial
        ownership of the securities. DTC has no knowledge of the actual beneficial
        owners of the securities. DTC&#8217;s records reflect only the identity of
        the direct participants to whose accounts the securities are credited, which
        may or may not be the beneficial owners. The participants are responsible
        for keeping account of their holdings on behalf of their customers. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">So
        long as the securities are in book-entry form, you will receive payments and
        may transfer securities only through the facilities of the depositary and
        its direct and indirect participants. We will maintain an office or agency
        in the location specified in the prospectus supplement for the applicable
        securities, where notices and demands in respect of the securities and the
        indenture may be delivered to us and where certificated securities may be
        surrendered for payment, registration of transfer or exchange. </font>\n        </div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">22</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Conveyance of notices and
        other communications by DTC to direct participants, by direct participants
        to indirect participants and by direct participants and indirect participants
        to beneficial owners will be governed by arrangements among them, subject
        to any legal requirements in effect from time to time. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Redemption notices will be
        sent to DTC. If less than all of the securities of a particular series are
        being redeemed, DTC&#8217;s practice is to determine by lot the amount of
        the interest of each direct participant in the securities of such series to
        be redeemed. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Neither
        DTC nor Cede &amp; Co. (or such other DTC nominee) will consent or vote with
        respect to the securities. Under its usual procedures, DTC will mail an omnibus
        proxy to us as soon as possible after the record date. The omnibus proxy assigns
        the consenting or voting rights of Cede &amp; Co. to those direct participants
        to whose accounts the securities of such series are credited on the record
        date, identified in a listing attached to the omnibus proxy. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">So long as securities are
        in book-entry form, we will make payments on those securities to the depositary
        or its nominee, as the registered owner of such securities, by wire transfer
        of immediately available funds. If securities are issued in definitive certificated
        form under the limited circumstances described below and unless if otherwise
        provided in the description of the applicable securities herein or in the
        applicable prospectus supplement, we will have the option of making payments
        by check mailed to the addresses of the persons entitled to payment or by
        wire transfer to bank accounts in the United States designated in writing
        to the applicable trustee or other designated party at least 15&#160;days
        before the applicable payment date by the persons entitled to payment, unless
        a shorter period is satisfactory to the applicable trustee or other designated
        party. </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Redemption
        proceeds, distributions and dividend payments on the securities will be made
        to Cede &amp; Co., or such other nominee as may be requested by an authorized
        representative of DTC. DTC&#8217;s practice is to credit direct participants&#8217;
        accounts upon DTC&#8217;s receipt of funds and corresponding detail information
        from us on the payment date in accordance with their respective holdings shown
        on DTC records. Payments by participants to beneficial owners will be governed
        by standing instructions and customary practices, as is the case with securities
        held for the account of customers in bearer form or registered in &#8220;street
        name.&#8221; Those payments will be the responsibility of participants and
        not of DTC or us, subject to any statutory or regulatory requirements in effect
        from time to time. Payment of redemption proceeds, distributions and dividend
        payments to Cede &amp; Co., or such other nominee as may be requested by an
        authorized representative of DTC, is our responsibility, disbursement of payments
        to direct participants is the responsibility of DTC, and disbursement of payments
        to the beneficial owners is the responsibility of direct and indirect participants.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Except
        under the limited circumstances described below, purchasers of securities
        will not be entitled to have securities registered in their names and will
        not receive physical delivery of securities. Accordingly, each beneficial
        owner must rely on the procedures of DTC and its participants to exercise
        any rights under the securities and the indenture. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The laws of some jurisdictions
        may require that some purchasers of securities take physical delivery of securities
        in definitive form. Those laws may impair the ability to transfer or pledge
        beneficial interests in securities. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">DTC may discontinue providing
        its services as securities depositary with respect to the securities at any
        time by giving reasonable notice to us. Under such circumstances, in the event
        that a successor depositary is not obtained, securities certificates are required
        to be printed and delivered. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As
        noted above, beneficial owners of a particular series of securities generally
        will not receive certificates representing their ownership interests in those
        securities. However, if: </font>\n        </div>\n        <div style=\" float:left;
        margin-left:20pt; line-height:12pt; margin-top:6.1pt; margin-bottom:0pt; text-align:left;
        width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6.1pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">DTC notifies us that it is
        unwilling or unable to continue as a depositary for the global security or
        securities representing such series of securities or if DTC ceases to be a
        clearing agency registered under the Exchange Act at a time when it is required
        to be registered and a successor depositary is not appointed within 90&#160;days
        of the notification to us or of our becoming aware of DTC&#8217;s ceasing
        to be so registered, as the case may be; </font>\n        </div>\n        <div
        style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \     </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">23</font>\n          <br >\n
        \       </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; text-align:left;
        width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" line-height:12pt; text-align:left;
        margin-left:30pt;\">\n          <!--blacklining:none;-->\n          <font
        style=\"letter-spacing:0.2pt;\">we determine, in our sole discretion, not
        to have such securities represented by one or more global securities; or </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6.1pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6.1pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">an Event of Default has occurred
        and is continuing with respect to such series of securities, </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font
        style=\"letter-spacing:0.2pt;\">we will prepare and deliver certificates for
        such securities in exchange for beneficial interests in the global securities.
        Any beneficial interest in a global security that is exchangeable under the
        circumstances described in the preceding sentence will be exchangeable for
        securities in definitive certificated form registered in the names that the
        depositary directs. It is expected that these directions will be based upon
        directions received by the depositary from its participants with respect to
        ownership of beneficial interests in the global securities. </font>\n        </div>\n
        \       <div style=\"margin-left:20pt; margin-top:12pt; width:436pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Euroclear and Clearstream</font><font
        style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If so
        provided in the applicable prospectus supplement, you may hold interests in
        a global security through Clearstream Banking S.A., which we refer to as &#8220;Clearstream,&#8221;
        or Euroclear Bank S.A./N.V., as operator of the Euroclear System, which we
        refer to as &#8220;Euroclear,&#8221; either directly if you are a participant
        in Clearstream or Euroclear or indirectly through organizations which are
        participants in Clearstream or Euroclear. Clearstream and Euroclear will hold
        interests on behalf of their respective participants through customers&#8217;
        securities accounts in the names of Clearstream and Euroclear, respectively,
        on the books of their respective U.S. depositaries, which in turn will hold
        such interests in customers&#8217; securities accounts in such depositaries&#8217;
        names on DTC&#8217;s books. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Clearstream
        and Euroclear are securities clearance systems in Europe. Clearstream and
        Euroclear hold securities for their respective participating organizations
        and facilitate the clearance and settlement of securities transactions between
        those participants through electronic book-entry changes in their accounts,
        thereby eliminating the need for physical movement of certificates. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Payments,
        deliveries, transfers, exchanges, notices and other matters relating to beneficial
        interests in global securities owned through Euroclear or Clearstream must
        comply with the rules and procedures of those systems. Transactions between
        participants in Euroclear or Clearstream, on one hand, and other participants
        in DTC, on the other hand, are also subject to DTC&#8217;s rules and procedures.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Investors
        will be able to make and receive through Euroclear and Clearstream payments,
        deliveries, transfers and other transactions involving any beneficial interests
        in global securities held through those systems only on days when those systems
        are open for business. Those systems may not be open for business on days
        when banks, brokers and other institutions are open for business in the United
        States. </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Cross-market
        transfers between participants in DTC, on the one hand, and participants in
        Euroclear or Clearstream, on the other hand, will be effected through DTC
        in accordance with the DTC&#8217;s rules on behalf of Euroclear or Clearstream,
        as the case may be, by their respective U.S. depositaries; however, such cross-market
        transactions will require delivery of instructions to Euroclear or Clearstream,
        as the case may be, by the counterparty in such system in accordance with
        the rules and procedures and within the established deadlines (European time)
        of such system. Euroclear or Clearstream, as the case may be, will, if the
        transaction meets its settlement requirements, deliver instructions to its
        U.S. depositary to take action to effect final settlement on its behalf by
        delivering or receiving interests in the global securities through DTC, and
        making or receiving payment in accordance with normal procedures for same-day
        fund settlement. Participants in Euroclear or Clearstream may not deliver
        instructions directly to their respective U.S. depositaries. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Due to time zone differences,
        the securities accounts of a participant in Euroclear or Clearstream purchasing
        an interest in a global security from a direct participant in DTC will be
        credited, and any such crediting will be reported to the relevant participant
        in Euroclear or Clearstream, during the securities settlement processing day
        (which must be a business day for Euroclear or Clearstream) immediately following
        the settlement date of DTC. Cash received in Euroclear or Clearstream as a
        result of sales of interests in a global security by or through a participant
        in Euroclear or Clearstream to a direct participant in DTC will be received
        with value on the settlement date of DTC but will be available in the relevant
        Euroclear or Clearstream cash account only as of the business day for Euroclear
        or Clearstream following DTC&#8217;s settlement date. </font>\n        </div>\n
