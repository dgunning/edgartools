        Outstanding Shares. &#8220;Adjusted Outstanding Shares&#8221; means, at any
        time, the total number of issued and outstanding shares of our common stock,
        less the number of shares issued by us within six&#160;months of May&#160;1,
        2025. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Certain
        Anti-Takeover Provisions of Delaware Law, Our Certificate of Incorporation
        and Our Bylaws</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"font-weight:bold;letter-spacing:-0.2pt;\">S</font><font
        style=\"letter-spacing:0.2pt;\">ome provisions of the Delaware General Corporation
        Law (&#8220;DGCL&#8221;) and our Certificate of Incorporation and Bylaws,
        contain provisions that could make certain transactions more difficult, including
        an acquisition of us by means of a tender offer, an acquisition of us by means
        of a proxy contest or otherwise, or the removal of any of our incumbent officers
        and directors. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">These
        provisions, which are summarized below, are expected to discourage coercive
        takeover practices and inadequate takeover bids. These provisions also are
        designed to encourage persons seeking to acquire control of us to first negotiate
        with our board of directors. We believe that the benefits of increased protection
        of our potential ability to negotiate with the proponent of an unfriendly
        or unsolicited proposal to acquire or restructure us outweigh the disadvantages
        of discouraging these proposals because negotiation of these proposals could
        result in an improvement of their terms. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"font-style:italic;letter-spacing:0.2pt;\">Undesignated
        Preferred Stock.&nbsp;&nbsp;&nbsp;</font><font style=\"letter-spacing:0.2pt;\">Our
        board of directors, without further action by our stockholders, may issue
        up to 10,000,000 shares of undesignated preferred stock in one or more series,
        in each case, in such number and with such voting or other rights, preferences,
        or privileges as are established by our board of directors with respect thereto,
        including those superior to our common stock, that could impede the success
        of any attempt to change the control of the Company. These and other provisions
        may have the effect of deferring hostile takeovers or delaying changes in
        control or management of the Company. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"font-style:italic;letter-spacing:0.2pt;\">Stockholder
        Meetings.&nbsp;&nbsp;&nbsp;</font><font style=\"letter-spacing:0.2pt;\">Our
        Certificate of Incorporation and Bylaws provide that a special meeting of
        stockholders may be called only by our chairman of the board or chief executive
        officer, or by the chief executive officer or secretary at the request in
        writing by a majority of our board of directors. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"font-style:italic;letter-spacing:0.2pt;\">Requirements
        for Advance Notification of Stockholder Nominations and Proposals.&nbsp;&nbsp;&nbsp;</font><font
        style=\"letter-spacing:0.2pt;\">Our Bylaws establish advance notice procedures
        with respect to stockholder proposals and the nomination of candidates for
        election as directors, other than nominations made by or at the direction
        of our board of directors or a committee of our board of directors. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"font-style:italic;letter-spacing:0.2pt;\">Elimination
        of Stockholder Action by Written Consent.&nbsp;&nbsp;&nbsp;</font><font style=\"letter-spacing:0.2pt;\">Our
        Certificate of Incorporation eliminates the right of stockholders to act by
        written consent without a meeting. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"font-style:italic;letter-spacing:0.2pt;\">Amendments
        to Certificate of Incorporation and Bylaws.&nbsp;&nbsp;&nbsp;</font><font
        style=\"letter-spacing:0.2pt;\">The affirmative vote of holders of at least
        66</font><font style=\" position:relative; bottom:2.66pt;font-size:7pt;letter-spacing:0.14pt;\">2</font><font
        style=\"letter-spacing:0.2pt;\">&#8725;</font><font style=\"font-size:7pt;letter-spacing:0.14pt;\">3</font><font
        style=\"letter-spacing:0.2pt;\">% of the outstanding voting stock of the Company,
        voting together as a single class, is required to amend certain portions of
        the Certificate of Incorporation, including the portions regarding the removal
        of directors for cause by our stockholders. Our board of directors may amend
        or repeal our Bylaws without any further action by our stockholders. Our stockholders
        may amend or repeal the Bylaws with, in addition to any other vote required
        by law, the affirmative vote of the holders of not less than 66</font><font
        style=\" position:relative; bottom:2.66pt;font-size:7pt;letter-spacing:0.14pt;\">2</font><font
        style=\"letter-spacing:0.2pt;\">&#8725;</font><font style=\"font-size:7pt;letter-spacing:0.14pt;\">3</font><font
        style=\"letter-spacing:0.2pt;\">% of the total voting power of all outstanding
        Company securities then entitled to vote generally in the election of directors,
        voting together as a single class. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"font-style:italic;letter-spacing:0.2pt;\">Delaware
        Anti-Takeover Statute</font><font style=\"letter-spacing:0.2pt;\">.&nbsp;&nbsp;&nbsp;We
        are subject to the provisions of Section&#160;203 of the DGCL. Subject to
        certain exceptions, Section&#160;203 prohibits persons deemed &#8220;interested
        stockholders&#8221; from </font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
