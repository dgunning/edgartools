        10pt; text-align: right\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">(b)</FONT></TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n
        \   <TD STYLE=\"font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">6.8</FONT></TD></TR>\n  <TR STYLE=\"font-size:
        10pt; vertical-align: bottom\">\n    <TD STYLE=\"font-size: 10pt; text-align:
        right\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">&sect;317(a)(1)</FONT></TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n
        \   <TD STYLE=\"font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">6.3</FONT></TD></TR>\n  <TR STYLE=\"font-size:
        10pt; vertical-align: bottom\">\n    <TD STYLE=\"font-size: 10pt; text-align:
        right\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(a)(2)</FONT></TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n
        \   <TD STYLE=\"font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman,
        Times, Serif; font-size: 10pt\">6.4</FONT></TD></TR>\n  <TR STYLE=\"font-size:
        10pt; vertical-align: bottom\">\n    <TD STYLE=\"font-size: 10pt; text-align:
        right\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">(b)</FONT></TD>\n    <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n    <TD
        STYLE=\"font-size: 10pt\"><FONT STYLE=\"font-family: Times New Roman, Times,
        Serif; font-size: 10pt\">2.5</FONT></TD></TR>\n  <TR STYLE=\"font-size: 10pt;
        vertical-align: bottom\">\n    <TD STYLE=\"font-size: 10pt; text-align: right\"><FONT
        STYLE=\"font-family: Times New Roman, Times, Serif; font-size: 10pt\">&sect;318(a)</FONT></TD>\n
        \   <TD STYLE=\"font-size: 10pt\">&nbsp;</TD>\n    <TD STYLE=\"font-size:
        10pt\"><FONT STYLE=\"font-family: Times New Roman, Times, Serif; font-size:
        10pt\">10.1</FONT></TD></TR>\n  </TABLE>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Rule-Page --><DIV
        STYLE=\"margin-top: 3pt; margin-bottom: 3pt; width: 25%\"><DIV STYLE=\"font-size:
        1pt; border-top: Black 1pt solid\">&nbsp;</DIV></DIV><!-- Field: /Rule-Page
        -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"></P>\n\n\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">Note: This reconciliation and tie shall
        not, for\nany purpose, be deemed to be part of the Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 5; Options: NewSection; Value: 4 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: LowerRoman; Name: PageNo -->iv<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Indenture dated as of __________,\n20__ between AEROVIRONMENT,&nbsp;INC.,
        a company incorporated under the laws of Delaware (&ldquo;<I>Company</I>&rdquo;),
        and U.S BANK\nTRUST COMPANY, NATIONAL ASSOCIATION, a national banking association
        (&ldquo;<I>Trustee</I>&rdquo;).</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Each
        party agrees as follows\nfor the benefit of the other party and for the equal
        and ratable benefit of the Holders of the Securities issued under this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">ARTICLE&nbsp;I.<FONT STYLE=\"text-transform: uppercase\"><BR>\nDEFINITIONS
        AND INCORPORATION BY REFERENCE</FONT></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;1.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Definitions.</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Additional Amounts</I>&rdquo;\nmeans
        any additional amounts which are required hereby or by any Security, under
        circumstances specified herein or therein, to be paid\nby the Company in respect
        of certain taxes imposed on Holders specified herein or therein and which
        are owing to such Holders.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Affiliate</I>&rdquo;\nof
        any specified person means any other person directly or indirectly controlling
        or controlled by or under common control with such specified\nperson. For
        the purposes of this definition, &ldquo;control&rdquo; (including, with correlative
        meanings, the terms &ldquo;controlled\nby&rdquo; and &ldquo;under common control
        with&rdquo;), as used with respect to any person, shall mean the possession,
        directly or indirectly,\nof the power to direct or cause the direction of
        the management or policies of such person, whether through the ownership of
        voting securities\nor by agreement or otherwise.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Agent</I>&rdquo; means\nany Registrar, Paying Agent or Notice
        Agent.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Board of
        Directors</I>&rdquo;\nmeans the board of directors of the Company or any duly
        authorized committee thereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Board
        Resolution</I>&rdquo;\nmeans a copy of a resolution certified by the Secretary
        or an Assistant Secretary of the Company to have been adopted by the Board
        of\nDirectors or pursuant to authorization by the Board of Directors and to
        be in full force and effect on the date of the certificate and\ndelivered
        to the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Business
        Day</I>&rdquo;\nmeans any day except a Saturday, Sunday or a legal holiday
        in the City of New York, New York (or in connection with any payment, the
        place\nof payment) on which banking institutions are authorized or required
        by law, regulation or executive order to close.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Capital Stock</I>&rdquo;\nmeans any and all shares, interests,
        participations, rights or other equivalents (however designated) of corporate
        stock.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Company</I>&rdquo;\nmeans
        the party named as such above until a successor replaces it and thereafter
        means the successor.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Company
        Order</I>&rdquo;\nmeans a written order signed in the name of the Company
        by an Officer and delivered to the Trustee.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        6 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font: 8pt Arial, Helvetica, Sans-Serif; text-align:
        right; margin: 0pt\"></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Corporate
        Trust Office</I>&rdquo;\nmeans the office of the Trustee at which at any particular
        time its corporate trust business related to this Indenture shall be principally\nadministered.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Default</I>&rdquo;\nmeans any event
        which is, or after notice, passage of time or both would be, an Event of Default.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Depositary</I>&rdquo;\nmeans, with respect
        to the Securities of any Series&nbsp;issuable or issued in whole or in part
        in the form of one or more Global Securities,\nthe person designated as Depositary
        for such Series&nbsp;by the Company, which Depositary shall be a clearing
        agency registered under\nthe Exchange Act; and if at any time there is more
        than one such person, &ldquo;Depositary&rdquo; as used with respect to the
        Securities\nof any Series&nbsp;shall mean the Depositary with respect to the
        Securities of such Series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Discount
        Security</I>&rdquo;\nmeans any Security that provides for an amount less than
        the stated principal amount thereof to be due and payable upon declaration
        of\nacceleration of the maturity thereof pursuant to Section&nbsp;6.2.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Dollars</I>&rdquo;\nand &ldquo;<I>$</I>&rdquo;
        means the currency of the United States of America.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Exchange Act</I>&rdquo;\nmeans the Securities Exchange Act
        of 1934, as amended.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Foreign
        Currency</I>&rdquo;\nmeans any currency or currency unit issued by a government
        other than the government of the United States of America.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Foreign Government\nObligations</I>&rdquo; means, with respect
        to Securities of any Series&nbsp;that are denominated in a Foreign Currency,
        direct obligations\nof, or obligations guaranteed by, the government that
        issued or caused to be issued such currency for the payment of which obligations\nits
        full faith and credit is pledged and which are not callable or redeemable
        at the option of the issuer thereof.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><FONT STYLE=\"font-size: 10pt\"><I>&ldquo;GAAP&rdquo;</I></FONT>\nmeans
        generally accepted accounting principles in the United States of America set
        forth in the opinions and pronouncements of the Accounting\nPrinciples Board
        of the American Institute of Certified Public Accountants and statements and
        pronouncements of the Financial Accounting\nStandards Board or in such other
        statements by such other entity as have been approved by a significant segment
        of the accounting profession,\nwhich are in effect as of the date of determination.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Global Security</I>&rdquo;\nor &ldquo;<I>Global
        Securities</I>&rdquo; means a Security or Securities, as the case may be,
        in the form established pursuant to Section&nbsp;2.2\nevidencing all or part
        of a Series&nbsp;of Securities, issued to the Depositary for such Series&nbsp;or
        its nominee, and registered in\nthe name of such Depositary or nominee.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Holder</I>&rdquo;\nmeans a person in
        whose name a Security is registered on the Registrar&rsquo;s books.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Indenture</I>&rdquo;\nmeans this Indenture
        as amended or supplemented from time to time and shall include the form and
        terms of particular Series&nbsp;of Securities\nestablished as contemplated
        hereunder.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 7; Options: NewSection;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->2<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>interest</I>&rdquo;\nwith
        respect to any Discount Security which by its terms bears interest only after
        Maturity, means interest payable after Maturity.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Maturity</I>&rdquo;\nwhen used with respect to any Security,
        means the date on which the principal of such Security becomes due and payable
        as therein or herein\nprovided, whether at the Stated Maturity or by declaration
        of acceleration, call for redemption or otherwise.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Officer</I>&rdquo;\nmeans the Chief Executive Officer, President,
        the Chief Financial Officer, the Treasurer or any Assistant Treasurer, the
        Secretary or\nany Assistant Secretary and any Vice President of the Company.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Officer&rsquo;s Certificate</I>&rdquo;\nmeans
        a certificate signed by any Officer that meets the requirements of this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Opinion of Counsel</I>&rdquo;\nmeans
        a written opinion of legal counsel who is acceptable to the Trustee. The counsel
        may be an employee of or counsel to the Company.\nThe opinion may contain
        customary limitations, conditions and exceptions.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>person</I>&rdquo;\nmeans any individual, corporation, partnership,
        joint venture, association, limited liability company, joint-stock company,
        trust, unincorporated\norganization or government or any agency or political
        subdivision thereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>principal</I>&rdquo;\nof
        a Security means the principal of the Security plus, when appropriate, the
        premium, if any, on, [and any Additional Amounts in respect\nof,] the Security.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>Responsible Officer</I>&rdquo;\nmeans
        any officer of the Trustee in its Corporate Trust Office having responsibility
        for administration of this Indenture and also means,\nwith respect to a particular
        corporate trust matter, any other officer to whom any corporate trust matter
        is referred because of his or\nher knowledge of and familiarity with a particular
        subject.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>SEC</I>&rdquo;
        means\nthe Securities and Exchange Commission.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Security</I>&rdquo;\nor &ldquo;<I>Securities</I>&rdquo; means
        the debentures, notes or other debt instruments of the Company of any Series&nbsp;authenticated\nand
        delivered under this Indenture.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Series</I>&rdquo;\nor
        &ldquo;<I>Series&nbsp;of Securities</I>&rdquo; means each series of debentures,
        notes or other debt instruments of the Company created\npursuant to Sections
        2.1 and 2.2 hereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Stated
        Maturity</I>&rdquo;\nwhen used with respect to any Security, means the date
        specified in such Security as the fixed date on which the principal of such
        Security\nor interest is due and payable.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>Subsidiary</I>&rdquo;\nof any specified person means any corporation,
        association or other business entity of which more than 50% of the total voting
        power of\nshares of Capital Stock entitled (without regard to the occurrence
        of any contingency) to vote in the election of directors, managers\nor trustees
        thereof is at the time owned or controlled, directly or indirectly, by such
        person or one or more of the other Subsidiaries\nof that person or a combination
        thereof.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 8; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->3<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">&ldquo;<I>TIA</I>&rdquo; means\nthe Trust Indenture
        Act of 1939 (15 U.S. Code &sect;&sect; 77aaa-77bbbb) as in effect on the date
        of this Indenture; <U>provided</U>,\n<U>however</U>, that in the event the
        Trust Indenture Act of 1939 is amended after such date, &ldquo;TIA&rdquo;
        means, to the extent required\nby any such amendment, the Trust Indenture
        Act as so amended.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">&ldquo;<I>Trustee</I>&rdquo;\nmeans
        the person named as the &ldquo;Trustee&rdquo; in the first paragraph of this
        instrument until a successor Trustee shall have become\nsuch pursuant to the
        applicable provisions of this Indenture, and thereafter &ldquo;Trustee&rdquo;
        shall mean or include each person who\nis then a Trustee hereunder, and if
        at any time there is more than one such person, &ldquo;Trustee&rdquo; as used
        with respect to the\nSecurities of any Series&nbsp;shall mean the Trustee
        with respect to Securities of that Series.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">&ldquo;<I>U.S. Government Obligations</I>&rdquo;\nmeans securities which
        are direct obligations of, or guaranteed by, the United States of America
        for the payment of which its full faith\nand credit is pledged and which are
        not callable or redeemable at the option of the issuer thereof and shall also
        include a depositary\nreceipt issued by a bank or trust company as custodian
        with respect to any such U.S. Government Obligation or a specific payment
        of interest\non or principal of any such U.S. Government Obligation held by
        such custodian for the account of the holder of a depositary receipt, <I>provided</I>\nthat
        (except as required by law) such custodian is not authorized to make any deduction
        from the amount payable to the holder of such\ndepositary receipt from any
        amount received by the custodian in respect of the U.S. Government Obligation
        evidenced by such depositary\nreceipt.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0in; text-indent: 0.5in\"><FONT
