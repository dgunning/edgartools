        >\n        </div>\n        <div style=\" margin-top:6.1pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">we may omit to comply with
        the covenant described under the heading &#8220;Consolidation, Merger and
        Sale of Assets&#8221; and certain other covenants set forth in the indenture,
        as well as any additional covenants which may be set forth in the applicable
        prospectus supplement; and </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6.1pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6.1pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">any omission to comply with
        those covenants will not constitute a Default or an Event of Default with
        respect to the debt securities of that series (&#8220;covenant defeasance&#8221;).
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"margin-left:20pt; margin-top:8pt; width:436pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The conditions include: </font>\n
        \       </div>\n        <div style=\" float:left; margin-left:20pt; line-height:12pt;
        margin-top:6.1pt; margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br
        >\n        </div>\n        <div style=\" margin-top:6.1pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">depositing with the trustee
        money and/or U.S. government obligations or, in the case of debt securities
        denominated in a single currency other than U.S. Dollars, government obligations
        of the government that issued or caused to be issued such currency, that,
        through the payment of interest and principal in accordance with their terms,
        will provide money in an amount sufficient in the opinion of a nationally
        recognized firm of independent public accountants or investment bank to pay
        and discharge each installment of principal of, premium and interest on and
        any mandatory sinking fund payments in respect of the debt securities of that
        series on the stated maturity of those payments in accordance with the terms
        of the indenture and those debt securities; and </font>\n        </div>\n
        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">delivering to the trustee
        an opinion of counsel to the effect that the holders of the debt securities
        of that series will not recognize income, gain or loss for United States federal
        income tax purposes as a result of the deposit and related covenant defeasance
        and will be subject to United States federal income tax on the same amounts
        and in the same manner and at the same times as would have been the case if
        the deposit and related covenant defeasance had not occurred. (Section&#160;8.4)
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">No Personal Liability of
        Directors, Officers, Employees or Securityholders</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">None
        of our past, present or future directors, officers, employees or securityholders,
        as such, will have any liability for any of our obligations under the debt
        securities or the indenture or for any claim based on, or in respect or by
        reason of, such obligations or their creation. By accepting a debt security,
        each holder waives and releases all such liability. This waiver and release
        is part of the consideration for the issue of the debt securities. However,
        this waiver and release may not be effective to waive liabilities under U.S.
        federal securities laws, and it is the view of the SEC that such a waiver
        is against public policy. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Governing
        Law</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        indenture and the debt securities, including any claim or controversy arising
        out of or relating to the indenture or the securities, will be governed by
        the laws of the State of New York. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        indenture will provide that we, the trustee and the holders of the debt securities
        (by their acceptance of the debt securities) irrevocably waive, to the fullest
        extent permitted by applicable law, any and all right to trial by jury in
        any legal proceeding arising out of or relating to the indenture, the debt
        securities or the transactions contemplated thereby. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The indenture will provide
        that any legal suit, action or proceeding arising out of or based upon the
        indenture or the transactions contemplated thereby may be instituted in the
        federal courts of the United States of America located in the City of New
        York or the courts of the State of New York in each case located in the City
        of New York, and we, the trustee and the holder of the debt securities (by
        their acceptance of the debt securities) irrevocably submit to the non-exclusive
        jurisdiction of such courts in any such suit, action or proceeding. The indenture
        will further provide that service of any process, summons, notice or document
        by mail (to the extent allowed under any applicable statute or rule of court)
        to such party&#8217;s address set forth in the indenture will be effective
        service of process for any suit, action or other proceeding brought in any
        such court. The indenture will further provide that we, the trustee and the
        holders of the debt securities (by their acceptance of the debt securities)
        irrevocably and unconditionally waive any objection to the laying of venue
        of any suit, action or other proceeding in the courts specified above and
        irrevocably and unconditionally waive and agree not to plead or claim any
        such suit, action or other proceeding has been brought in an inconvenient
        forum. (Section&#160;10.10) </font>\n        </div>\n      </div>\n      <div
        style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
