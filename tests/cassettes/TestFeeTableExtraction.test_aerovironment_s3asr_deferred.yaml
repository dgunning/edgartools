        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-indent:20pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"font-style:italic;letter-spacing:0.2pt;\">Defeasance
        of Certain Covenants</font><font style=\"letter-spacing:0.2pt;\">.&nbsp;&nbsp;&nbsp;The
        indenture provides that, unless otherwise provided by the terms of the applicable
        series of debt securities, upon compliance with certain conditions: </font>\n
        \       </div>\n        <div style=\" float:left; margin-left:20pt; line-height:12pt;
        margin-top:6.1pt; margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n
