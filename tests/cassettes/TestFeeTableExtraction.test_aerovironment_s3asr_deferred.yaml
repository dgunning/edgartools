        (h)&nbsp;waivers of broadly or vaguely stated rights, (i)&nbsp;provisions
        for exclusivity,\nelection or cumulation of rights or remedies, (j)&nbsp;provisions
        authorizing or validating conclusive or discretionary determinations,\n(k)&nbsp;grants
