        3 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><B><U>Exhibit&nbsp;1</U></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\">&nbsp;</P>\n\n<P STYLE=\"text-align: center; font: 10pt Times New
        Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><B>ARTICLES OF
        ASSOCIATION</B></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><B>OF</B></P>\n\n<P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><B>U. S. BANK TRUST COMPANY, NATIONAL ASSOCIATION</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">For the purpose of organizing an association (the\n &ldquo;Association&rdquo;)
        to perform any lawful activities of national banks, the undersigned enter
        into the following Articles of Association:</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in; text-align: justify;
        text-indent: -0.25in\"><FONT STYLE=\"font-size: 10pt\"><B>FIRST.\n</B></FONT>The
        title of this Association shall be U. S. Bank Trust Company, National Association.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0\"><FONT STYLE=\"font-size: 10pt\"><B>SECOND.\n</B></FONT>The
        main office of the Association shall be in the city of Portland, county of
        Multnomah, state of Oregon. The business of\nthe Association will be limited
        to fiduciary powers and the support of activities incidental to the exercise
        of those powers. The Association\nmay not expand or alter its business beyond
        that stated in this article without the prior approval of the Comptroller
        of the Currency.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size: 10pt\"><B>THIRD.</B></FONT>\nThe
        board of directors of the Association shall consist of not less than five
        nor more than twenty-five persons, the exact number to be\nfixed and determined
        from time to time by resolution of a majority of the full board of directors
        or by resolution of a majority of the\nshareholders at any annual or special
        meeting thereof. Each director shall own common or preferred stock of the
        Association or of a holding\ncompany owning the Association, with an aggregate
        par, fair market, or equity value of not less than $1,000, as of either (i)&nbsp;the\ndate
        of purchase, (ii)&nbsp;the date the person became a director, or (iii)&nbsp;the
        date of that person's most recent election to the\nboard of directors, whichever
        is more recent. Any combination of common or preferred stock of the Association
        or holding company may be\nused.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\">Any vacancy in the
        board of directors may be filled\nby action of a majority of the remaining
        directors between meetings of shareholders. The board of directors may increase
        the number of\ndirectors up to the maximum permitted by law. Terms of directors,
        including directors selected to fill vacancies, shall expire at the\nnext
        regular meeting of shareholders at which directors are elected, unless the
        directors resign or are removed from office. Despite the\nexpiration of a
        director's term, the director shall continue to serve until his or her successor
        is elected and qualified or until there\nis a decrease in the number of directors
        and his or her position is eliminated.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">Honorary
        or advisory members of the board of directors,\nwithout voting power or power
        of final decision in matters concerning the business of the Association, may
        be appointed by resolution\nof a majority of the full board of directors,
        or by resolution of shareholders at any annual or special meeting. Honorary
        or advisory\ndirectors shall not be counted to determined the number of directors
        of the Association or the presence of a quorum in connection with\nany board
        action, and shall not be required to own qualifying shares.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT
        STYLE=\"font-size: 10pt\"><B>FOURTH. </B></FONT>There\nshall be an annual
        meeting of the shareholders to elect directors and transact whatever other
        business may be brought before the\nmeeting. It shall be held at the main
        office or any other convenient place the board of directors may designate,
        on the day of each\nyear specified therefor in the Bylaws, or <FONT STYLE=\"font-size:
        10pt\">if that</FONT> day falls on a legal holiday in the state in\nwhich
        the <FONT STYLE=\"font-size: 10pt\">Association is located, on the next following
        banking day. If </FONT>no election is held on\nthe day fixed or in the event
        of a legal holiday on the following banking day, an election may be held on
        any subsequent day within\n60 days of the day fixed, to be designated by the
        board of directors, or, <FONT STYLE=\"font-size: 10pt\">if </FONT>the directors
        fail\nto fix the day, by shareholders representing two-thirds of the shares
        issued and outstanding. In all cases, at least 10 days&rsquo;\nadvance notice
        of the meeting shall be given to the shareholders by first-class mail.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 4; Options: NewSection; Value: 1 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\">- <FONT STYLE=\"font-size: 10pt\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->1<!-- Field: /Sequence --></FONT>
        -</P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">In all elections of directors, the number of votes\neach common
        shareholder may cast will be determined by multiplying the number of shares
        he or she owns by the number of directors to be\nelected. Those votes may
        be cumulated and cast for a single candidate or may be distributed among two
        or more candidates in the manner\nselected by the shareholder. On all other
        questions, each common shareholder shall be entitled to one vote for each
        share of stock held\nby him or her.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in; text-align: justify; text-indent:
        -0.25in\">A director may\nresign at any time by delivering written notice
        to the board of directors, its chairperson, or to the Association, which resignation
        shall\nbe effective when the notice is delivered unless the notice specifies
        a later effective date.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size:
        10pt\">A director may be\nremoved by the shareholders at a meeting called
        to remove him or her, when notice of the meeting stating that the purpose
        or one of the\npurposes is to remove him </FONT>or her is provided, <FONT
        STYLE=\"font-size: 10pt\">if </FONT>there is a failure to fulfill one of the\naffirmative
        requirements for qualification, or for cause; provided, however, that a director
        may not be removed <FONT STYLE=\"font-size: 10pt\">if\n</FONT>the number of
        votes sufficient to elect him or her under cumulative voting is voted against
        his or her removal.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size: 10pt\"><B>FIFTH.
        </B></FONT>The\nauthorized amount of capital stock of the Association shall
        be 1,000,000 shares of common stock of the par value of ten dollars ($10)\neach;
        but said capital stock may be increased or decreased from time to time, according
        to the provisions of the laws of the United States.\nThe Association shall
        have only one class of capital stock.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">No holder of
        shares of the capital stock of any\nclass of the Association shall have any
        preemptive or preferential right of subscription to any shares of any class
        of stock of the Association,\nwhether now or hereafter authorized, or to any
        obligations convertible into stock of the Association, issued, or sold, nor
        any right of\nsubscription to any thereof other than such, if any, as the
        board of directors, in its discretion, may from time to time determine and\nat
        such price as the board of directors may from time to time fix.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-size: 10pt\">Transfers of the\nAssociation's
        stock are subject to the prior written approval of a federal depository institution
        regulatory agency. If no</FONT> other\nagency approval is required, the approval
        of the Comptroller of the Currency must be obtained prior to any such transfers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">Unless otherwise specified in the Articles\nof Association or required
        by law, (1)&nbsp;all matters requiring shareholder action, including amendments
        to the Articles of\nAssociation must be approved by shareholders owning a
        majority voting interest in the outstanding voting stock, and (2)&nbsp;each\nshareholder
        shall be entitled to one vote per share.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        5; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"text-align: center; margin-top: 0pt; margin-bottom:
        0pt\">- <FONT STYLE=\"font-size: 10pt\"><!-- Field: Sequence; Type: Arabic;
        Name: PageNo -->2<!-- Field: /Sequence --></FONT> -</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify\">Unless otherwise specified
        in the Articles of\nAssociation or required by law, all shares of voting stock
        shall be voted together as a class, on any matters requiring shareholder approval.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\">Unless otherwise provided in the Bylaws, the record\ndate for determining
        shareholders entitled to notice of and to vote at any meeting is the close
        of business on the day before the first\nnotice is mailed or otherwise sent
        to the shareholders, provided that in no event may a record date be more than
        70 days before the meeting.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0\">The
        Association,\nat any time and from time to time, may authorize and issue debt
        obligations, whether subordinated, without the approval of the shareholders.\nObligations
        classified as debt, whether subordinated, which may be issued by the Association
        without the approval of shareholders, do\nnot carry voting rights on any issue,
        including an increase or decrease in the aggregate number of the securities,
        or the exchange or\nreclassification of all or part of securities into securities
        of another class or series.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size:
        10pt\"><B>SIXTH. </B></FONT>The\nboard of directors shall appoint one of its
        members president of this Association and one of its members chairperson of
        the board and\nshall have the power to appoint one or more vice presidents,
        a secretary who shall keep minutes of the directors' and shareholders' meetings\nand
        be responsible for authenticating the records of the Association, and such
        other officers and employees as may be required to transact\nthe business
        of this Association. A duly appointed officer may appoint one or more officers
        or assistant officers if authorized by the\nboard of directors in accordance
        with the Bylaws.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify\">The board of directors shall have
        the power to:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\"
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width: 0\"></TD><TD
        STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(1)</FONT></TD><TD>Define
        the duties of the officers, employees, and agents of the Association.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(2)</FONT></TD><TD STYLE=\"text-align: justify\">Delegate the performance
        of its duties, but not the responsibility for its duties, to the officers,
        employees,\nand agents of the Association.</TD></TR></TABLE>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(3)</FONT></TD><TD STYLE=\"text-align: justify\">Fix the compensation
        and enter employment contracts with its officers and employees upon reasonable
        terms\nand conditions consistent with applicable law.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(4)</FONT></TD><TD>Dismiss officers and employees.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(5)</FONT></TD><TD>Require bonds from officers and employees and to
        fix the penalty thereof.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD
        STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(6)</FONT></TD><TD STYLE=\"text-align: justify\">Ratify written policies
        authorized by the Association's management or committees of the board.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(7)</FONT></TD><TD STYLE=\"text-align: justify\">Regulate the manner
        any increase or decrease of the capital of the Association shall be made;
        provided\nthat nothing herein shall restrict the power of shareholders to
        increase or decrease the capital of the Association in accordance with\nlaw,
        and nothing shall raise or lower from two-thirds the percentage required for
        shareholder approval to increase or reduce the capital.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 6; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align:
        center; margin-top: 0pt; margin-bottom: 0pt\">- <FONT STYLE=\"font-size: 10pt\"><!--
        Field: Sequence; Type: Arabic; Name: PageNo -->3<!-- Field: /Sequence --></FONT>
        -</P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(8)</FONT></TD><TD>Manage and administer the business and affairs of
        the Association.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(9)</FONT></TD><TD>Adopt
        initial Bylaws, not inconsistent with law or the Articles of Association,
        for managing the business and regulating the affairs\nof the Association.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE
        CELLPADDING=\"0\" CELLSPACING=\"0\" WIDTH=\"100%\" STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align:
        top\">\n<TD STYLE=\"width: 0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(10)</FONT></TD><TD>Amend or repeal Bylaws, except to the extent that
        the Articles of Association reserve this power in whole or in part to the
        shareholders.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(11)</FONT></TD><TD>Make
        contracts.</TD></TR></TABLE>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\" CELLSPACING=\"0\"
        WIDTH=\"100%\" STYLE=\"font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><TR STYLE=\"vertical-align: top\">\n<TD STYLE=\"width:
        0\"></TD><TD STYLE=\"width: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(12)</FONT></TD><TD>Generally
        perform all acts that are legal for a board of directors to perform.</TD></TR></TABLE>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify\"><FONT STYLE=\"font-size: 10pt\"><B>SEVENTH. </B></FONT>The\nboard
        of directors shall have the power to change the location of the main office
        to any authorized branch within the limits of the city\nof Portland, Oregon,
        without the approval of the shareholders, or with a vote of shareholders owning
        two-thirds of the stock of the Association\nfor a location outside such limits
        and upon receipt of a certificate of approval from the Comptroller of the
        Currency, to any other location\nwithin or outside the limits of the city
        of Portland, Oregon, but not more than thirty miles beyond such limits. The
        board of directors\nshall have the power to establish or change the location
        of any office or offices of the Association to any other location permitted
        under\napplicable law, without approval of shareholders, subject to approval
        by the Comptroller of the Currency.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0 0pt 0.25in; text-align: justify; text-indent:
        -0.25in\"><FONT STYLE=\"font-size: 10pt\"><B>EIGHTH.\n</B></FONT>The corporate
        existence of this Association shall continue until termination according to
        the laws of the United States.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size:
        10pt\"><B>NINTH. </B></FONT>The\nboard of directors of the Association, or
        any shareholder owning, in the aggregate, not less than 25 percent of the
        stock of the Association,\nmay call a special meeting of shareholders at any
        time. Unless otherwise provided by the Bylaws or the laws of the United States,
        or waived\nby shareholders, a notice of the time, place, and purpose of every
        annual and special meeting of the shareholders shall be given by first-class\nmail,
        postage prepaid, mailed at least 10, and no more than 60, days prior to the
        date of the meeting to each shareholder of record at\nhis/her address as shown
        upon the books of the Association. Unless otherwise provided by the Bylaws,
        any action requiring approval of\nshareholders must be effected at a duly
        called annual or special meeting.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify\"><FONT STYLE=\"font-size:
        10pt\"><B>TENTH. </B></FONT>These\nArticles of Association may be amended
        at any regular or special meeting of the shareholders by the affirmative vote
        of the holders of\na majority of the stock of the Association, unless the
        vote of the holders of a greater amount of stock is required by law, and in
        that\ncase by the vote of the holders of such greater amount; provided, that
        the scope of the Association's activities and services may not\nbe expanded
        without the prior written approval of the Comptroller of the Currency. The
        Association's board of directors may propose one\nor more amendments to the
        Articles of Association for submission to the shareholders.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 7; Value: 1 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"text-align: center; margin-top:
        0pt; margin-bottom: 0pt\">- <FONT STYLE=\"font-size: 10pt\"><!-- Field: Sequence;
        Type: Arabic; Name: PageNo -->4<!-- Field: /Sequence --></FONT> -</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify\"><FONT
        STYLE=\"font-size: 10pt\">In witness\nwhereof, we have hereunto set our hands
        this <FONT STYLE=\"text-decoration-style: solid\">11<SUP>th</SUP></FONT></FONT>
        <U></U>of June,\n1997.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"><IMG SRC=\"tm2519048d2_ex25-1img001.jpg\" ALT=\"\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 8 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom: 0pt; text-align:
        center\"><B><U>Exhibit&nbsp;2</U></B></P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"text-align:
        center; font: 10pt Times New Roman, Times, Serif; margin-top: 0pt; margin-bottom:
        0pt\"><IMG SRC=\"tm2519048d2_ex25-1img002.jpg\" ALT=\"\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 9 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><B><U>Exhibit&nbsp;4</U></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: center; font: 10pt Times New Roman, Times, Serif; margin-top:
        0pt; margin-bottom: 0pt\"><B>U.S. BANK TRUST COMPANY, NATIONAL\nASSOCIATION</B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><B>&nbsp;</B></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><B><U>AMENDED AND RESTATED BYLAWS</U></B></P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;I</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Meetings of Shareholders</U></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;1.1. <U>Annual\nMeeting</U>. The annual meeting of the
        shareholders, for the election of directors and the transaction of any other
        proper business, shall\nbe held at a time and place as the Chairman or President
        may designate. Notice of such meeting shall be given not less than ten (10)&nbsp;days\nor
        more than sixty (60) days prior to the date thereof, to each shareholder of
        the Association, unless the Office of the Comptroller of\nthe Currency (the
        &ldquo;OCC&rdquo;) determines that an emergency circumstance exists. In accordance
        with applicable law, the sole shareholder\nof the Association is permitted
        to waive notice of the meeting. If, for any reason, an election of directors
        is not made on the designated\nday, the election shall be held on some subsequent
        day, as soon thereafter as practicable, with prior notice thereof. Failure
        to hold\nan annual meeting as required by these Bylaws shall not affect the
        validity of any corporate action or work a forfeiture or dissolution\nof the
        Association.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;1.2.
        <U>Special\nMeetings</U>. Except as otherwise specially provided by law, special
        meetings of the shareholders may be called for any purpose, at any\ntime by
        a majority of the board of directors (the &ldquo;Board&rdquo;), or by any
        shareholder or group of shareholders owning at least\nten percent of the outstanding
        stock.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify\">Every such special meeting, unless otherwise
        provided\nby law, shall be called upon not less than ten (10)&nbsp;days nor
        more than sixty (60) days prior notice stating the purpose of the meeting.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;1.3. <U>Nominations\nfor Directors</U>.
        Nominations for election to the Board may be made by the Board or by any shareholder.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;1.4. <U>Proxies</U>.\nShareholders
        may vote at any meeting of the shareholders by proxies duly authorized in
        writing. Proxies shall be valid only for one meeting\nand any adjournments
        of such meeting and shall be filed with the records of the meeting.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;1.5. <U>Record\nDate</U>. The record
        date for determining shareholders entitled to notice and to vote at any meeting
        will be thirty days before the date\nof such meeting, unless otherwise determined
        by the Board.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;1.6.
        <U>Quorum\nand Voting</U>. A majority of the outstanding capital stock, represented
        in person or by proxy, shall constitute a quorum at any\nmeeting of shareholders,
        unless otherwise provided by law, but less than a quorum may adjourn any meeting,
        from time to time, and\nthe meeting may be held as adjourned without further
        notice. A majority of the votes cast shall decide every question or matter\nsubmitted
        to the shareholders at any meeting, unless otherwise provided by law or by
        the Articles of Association.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 10
        -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;1.7.
        <U>Inspectors</U>.\nThe Board may, and in the event of its failure so to do,
        the Chairman of the Board may appoint Inspectors of Election who shall determine\nthe
        presence of quorum, the validity of proxies, and the results of all elections
        and all other matters voted upon by shareholders at\nall annual and special
        meetings of shareholders.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;1.8.
        <U>Waiver\nand Consent</U>. The shareholders may act without notice or a meeting
        by a unanimous written consent by all shareholders.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;1.9. <U>Remote\nMeetings</U>. The Board shall have the
        right to determine that a shareholder meeting not be held at a place, but
        instead be held solely\nby means of remote communication in the manner and
        to the extent permitted by the General Corporation Law of the State of Delaware.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>ARTICLE&nbsp;II</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>Directors</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;2.1. <U>Board\nof Directors</U>.
        The Board shall have the power to manage and administer the business and affairs
        of the Association. Except as expressly\nlimited by law, all corporate powers
        of the Association shall be vested in and may be exercised by the Board.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;2.2. <U>Term\nof Office</U>. The
        directors of this Association shall hold office for one year and until their
        successors are duly elected and qualified,\nor until their earlier resignation
        or removal.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;2.3.
        <U>Powers</U>.\nIn addition to the foregoing, the Board shall have and may
        exercise all of the powers granted to or conferred upon it by the Articles\nof
        Association, the Bylaws and by law.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;2.4. <U>Number</U>.\nAs provided in the Articles of Association,
        the Board of this Association shall consist of no less than five nor more
        than\ntwenty-five members, unless the OCC has exempted the Association from
        the twenty-five- member limit. The Board shall consist of a\nnumber of members
        to be fixed and determined from time to time by resolution of the Board or
        the shareholders at any meeting\nthereof, in accordance with the Articles
        of Association. Between meetings of the shareholders held for the purpose
        of electing\ndirectors, the Board by a majority vote of the full Board may
        increase the size of the Board but not to more than a total of\ntwenty-five
        directors, and fill any vacancy so created in the Board; provided that the
        Board may increase the number of directors\nonly by up to two directors, when
        the number of directors last elected by shareholders was fifteen or fewer,
        and by up to four\ndirectors, when the number of directors last elected by
        shareholders was sixteen or more. Each director shall own a qualifying\nequity
        interest in the Association or a company that has control of the Association
        in each case as required by applicable law. Each\ndirector shall own such
        qualifying equity interest in his or her own right and meet any minimum threshold
        ownership required by\napplicable law.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        11 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;2.5.
        <U>Organization\nMeeting</U>. The newly elected Board shall meet for the purpose
        of organizing the new Board and electing and appointing such officers\nof
        the Association as may be appropriate. Such meeting shall be held on the day
        of the election or as soon thereafter as practicable,\nand, in any event,
        within thirty days thereafter, at such time and place as the Chairman or President
        may designate. If, at the time fixed\nfor such meeting, there shall not be
        a quorum present, the directors present may adjourn the meeting until a quorum
        is obtained.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;2.6.
        <U>Regular\nMeetings</U>. The regular meetings of the Board shall be held,
        without notice, as the Chairman or President may designate and deem suitable.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;2.7. <U>Special\nMeetings</U>.
        Special meetings of the Board may be called at any time, at any place and
        for any purpose by the Chairman of the Board or\nthe President of the Association,
        or upon the request of a majority of the entire Board. Notice of every special
        meeting of the Board\nshall be given to the directors at their usual places
        of business, or at such other addresses as shall have been furnished by them
        for\nthe purpose. Such notice shall be given at least twelve hours (three
        hours if meeting is to be conducted by conference telephone) before\nthe meeting
        by telephone or by being personally delivered, mailed, or electronically delivered.
        Such notice need not include a statement\nof the business to be transacted
        at, or the purpose of, any such meeting.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;2.8. <U>Quorum\nand Necessary Vote</U>. A majority of
        the directors shall constitute a quorum at any meeting of the Board, except
        when otherwise provided\nby law; but less than a quorum may adjourn any meeting,
        from time to time, and the meeting may be held as adjourned without further
        notice.\nUnless otherwise provided by law or the Articles or Bylaws of this
        Association, once a quorum is established, any act by a majority of\nthose
        directors present and voting shall be the act of the Board.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page;
        Sequence: 12 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;2.9.
        <U>Written\nConsent</U>. Except as otherwise required by applicable laws and
        regulations, the Board may act without a meeting by a unanimous written\nconsent
        by all directors, to be filed with the Secretary of the Association as part
        of the corporate records.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;2.10.
        <U>Remote\nMeetings</U>. Members of the Board, or of any committee thereof,
        may participate in a meeting of such Board or committee by means of conference\ntelephone,
        video or similar communications equipment by means of which all persons participating
        in the meeting can hear each other and\nsuch participation shall constitute
        presence in person at such meeting.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;2.11. <U>Vacancies</U>.\nWhen any vacancy occurs among
        the directors, the remaining members of the Board may appoint a director to
        fill such vacancy at any regular\nmeeting of the Board, or at a special meeting
        called for that purpose.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;III</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Committees</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;3.1.
        <U>Advisory\nBoard of Directors</U>. The Board may appoint persons, who need
        not be directors, to serve as advisory directors on an advisory board\nof
        directors established with respect to the business affairs of either this
        Association alone or the business affairs of a group of affiliated\norganizations
        of which this Association is one. Advisory directors shall have such powers
        and duties as may be determined by the Board,\nprovided, that the Board's
        responsibility for the business and affairs of this Association shall in no
        respect be delegated or diminished.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;3.2. <U>Trust\nAudit Committee</U>. At least once during
        each calendar year, the Association shall arrange for a suitable audit (by
        internal or external\nauditors) of all significant fiduciary activities under
        the direction of its trust audit committee, a function that will be fulfilled\nby
        the Audit Committee of the financial holding company that is the ultimate
        parent of this Association. The Association shall note the\nresults of the
        audit (including significant actions taken as a result of the audit) in the
        minutes of the Board. In lieu of annual audits,\nthe Association may adopt
        a continuous audit system in accordance with 12 C.F.R. &sect; 9.9(b).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 13 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom:
        6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">The
        Audit Committee of the financial holding company\nthat is the ultimate parent
        of this Association, fulfilling the function of the trust audit committee:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"text-align: justify; font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0 0pt 0.5in\"><FONT STYLE=\"font-size: 10pt\">(1) </FONT>Must\nnot include
        any officers of the Association or an affiliate who participate significantly
        in the administration of the Association&rsquo;s\nfiduciary activities; and</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify\"><FONT STYLE=\"font-size: 10pt\">(2) </FONT>Must\nconsist
        of a majority of members who are not also members of any committee to which
        the Board has delegated power to manage and\ncontrol the fiduciary activities
        of the Association.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;3.3.
        <U>Executive\nCommittee</U>. The Board may appoint an Executive Committee
        which shall consist of at least three directors and which shall have, and\nmay
        exercise, to the extent permitted by applicable law, all the powers of the
        Board between meetings of the Board or otherwise when the\nBoard is not meeting.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;3.4. <U>Trust\nManagement Committee</U>.
        The Board of this Association shall appoint a Trust Management Committee to
        provide oversight of the fiduciary\nactivities of the Association. The Trust
        Management Committee shall determine policies governing fiduciary activities.
        The Trust Management\nCommittee or such sub-committees, officers or others
        as may be duly designated by the Trust Management Committee shall oversee
        the processes\nrelated to fiduciary activities to assure conformity with fiduciary
        policies it establishes, including ratifying the acceptance and the\nclosing
        out or relinquishment of all trusts. The Trust Management Committee will provide
        regular reports of its activities to the Board.</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;3.5. <U>Other\nCommittees</U>. The Board may appoint,
        from time to time, committees of one or more persons who need not be directors,
        for such purposes\nand with such powers as the Board may determine; however,
        the Board will not delegate to any committee any powers or responsibilities\nthat
        it is prohibited from delegating under any law or regulation. In addition,
        either the Chairman or the President may appoint, from\ntime to time, committees
        of one or more officers, employees, agents or other persons, for such purposes
        and with such powers as either\nthe Chairman or the President deems appropriate
        and proper. Whether appointed by the Board, the Chairman, or the President,
        any such committee\nshall at all times be subject to the direction and control
        of the Board.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;3.6.
        <U>Meetings,\nMinutes and Rules</U>. An advisory board of directors and/or
        committee shall meet as necessary in consideration of the purpose of\nthe
        advisory board of directors or committee, and shall maintain minutes in sufficient
        detail to indicate actions taken or\nrecommendations made; unless required
        by the members, discussions, votes or other specific details need not be reported.
        An advisory\nboard of directors or a committee may, in consideration of its
        purpose, adopt its own rules&nbsp;for the exercise of any of its\nfunctions
        or authority.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 14 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;IV</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Officers</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;4.1.
        <U>Chairman\nof the Board</U>. The Board may appoint one of its members to
        be Chairman of the Board to serve at the pleasure of the Board. The Chairman\nshall
        supervise the carrying out of the policies adopted or approved by the Board;
        shall have general executive powers, as well as the\nspecific powers conferred
        by these Bylaws; and shall also have and may exercise such powers and duties
        as from time to time may be conferred\nupon or assigned by the Board.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;4.2. <U>President</U>.\nThe Board
        may appoint one of its members to be President of the Association. In the
        absence of the Chairman, the President shall preside\nat any meeting of the
        Board. The President shall have general executive powers, and shall have and
        may exercise any and all other powers\nand duties pertaining by law, regulation
        or practice, to the office of President, or imposed by these Bylaws. The President
        shall also\nhave and may exercise such powers and duties as from time to time
        may be conferred or assigned by the Board.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;4.3. <U>Vice\nPresident</U>. The Board may appoint one
        or more Vice Presidents who shall have such powers and duties as may be assigned
        by the Board\nand to perform the duties of the President on those occasions
        when the President is absent, including presiding at any meeting of the\nBoard
        in the absence of both the Chairman and President.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;4.4. <U>Secretary</U>.\nThe Board shall appoint a Secretary,
        or other designated officer who shall be Secretary of the Board and of the
        Association, and shall\nkeep accurate minutes of all meetings. The Secretary
        shall attend to the giving of all notices required by these Bylaws to be given;
        shall\nbe custodian of the corporate seal, records, documents and papers of
        the Association; shall provide for the keeping of proper records\nof all transactions
        of the Association; shall, upon request, authenticate any records of the Association;
        shall have and may exercise\nany and all other powers and duties pertaining
        by law, regulation or practice, to the Secretary, or imposed by these Bylaws;
        and shall\nalso perform such other duties as may be assigned from time to
        time by the Board. The Board may appoint one or more Assistant Secretaries\nwith
        such powers and duties as the Board, the President or the Secretary shall
        from time to time determine.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;4.5.
        <U>Other\nOfficers</U>. The Board may appoint, and may authorize the Chairman,
        the President or any other officer to appoint, any officer as\nfrom time to
        time may appear to the Board, the Chairman, the President or such other officer
        to be required or desirable to transact\nthe business of the Association.
        Such officers shall exercise such powers and perform such duties as pertain
        to their several\noffices, or as may be conferred upon or assigned to them
        by these Bylaws, the Board, the Chairman, the President or such other\nauthorized
        officer. Any person may hold two offices.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        15 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;4.6.
        <U>Tenure\nof Office</U>. The Chairman or the President and all other officers
        shall hold office until their respective successors are elected and\nqualified
        or until their earlier death, resignation, retirement, disqualification or
        removal from office, subject to the right of the\nBoard or authorized officer
        to discharge any officer at any time.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;V</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Stock</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 0.5in\">Section&nbsp;5.1.
        The Board\nmay authorize the issuance of stock either in certificated or in
        uncertificated form. Certificates for shares of stock shall be in such\nform
        as the Board may from time to time prescribe. If the Board issues certificated
        stock, the certificate shall be signed by the President,\nSecretary or any
        other such officer as the Board so determines. Shares of stock shall be transferable
        on the books of the Association,\nand a transfer book shall be kept in which
        all transfers of stock shall be recorded. Every person becoming a shareholder
        by such transfer\nshall, in proportion to such person's shares, succeed to
        all rights of the prior holder of such shares. Each certificate of stock shall\nrecite
        on its face that the stock represented thereby is transferable only upon the
        books of the Association properly endorsed. The Board\nmay impose conditions
        upon the transfer of the stock reasonably calculated to simplify the work
        of the Association for stock transfers,\nvoting at shareholder meetings, and
        related matters, and to protect it against fraudulent transfers.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>ARTICLE&nbsp;VI</U></P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>Corporate Seal</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;6.1. The Association\nshall have
        no corporate seal; provided, however, that if the use of a seal is required
        by, or is otherwise convenient or advisable pursuant\nto, the laws or regulations
        of any jurisdiction, the following seal may be used, and the Chairman, the
        President, the Secretary and any\nAssistant Secretary shall have the authority
        to affix such seal:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 16 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;VII</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Miscellaneous Provisions</U></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;7.1. <U>Execution\nof Instruments</U>. All agreements,
        checks, drafts, orders, indentures, notes, mortgages, deeds, conveyances,
        transfers, endorsements,\nassignments, certificates, declarations, receipts,
        discharges, releases, satisfactions, settlements, petitions, schedules, accounts,
        affidavits,\nbonds, undertakings, guarantees, proxies and other instruments
        or documents may be signed, countersigned, executed, acknowledged, endorsed,\nverified,
        delivered or accepted on behalf of the Association, whether in a fiduciary
        capacity or otherwise, by any officer of the Association,\nor such employee
        or agent as may be designated from time to time by the Board by resolution,
        or by the Chairman or the President by written\ninstrument, which resolution
        or instrument shall be certified as in effect by the Secretary or an Assistant
        Secretary of the Association.\nThe provisions of this section are supplementary
        to any other provision of the Articles of Association or Bylaws.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;7.2. <U>Records</U>.\nThe Articles
        of Association, the Bylaws as revised or amended from time to time and the
        proceedings of all meetings of the shareholders,\nthe Board, and standing
        committees of the Board, shall be recorded in appropriate minute books provided
        for the purpose. The minutes of\neach meeting shall be signed by the Secretary,
        or other officer appointed to act as Secretary of the meeting.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;7.3. <U>Trust\nFiles</U>. There shall be maintained in
        the Association files all fiduciary records necessary to assure that its fiduciary
        responsibilities\nhave been properly undertaken and discharged.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;7.4. <U>Trust\nInvestments</U>.
        Funds held in a fiduciary capacity shall be invested according to the instrument
        establishing the fiduciary relationship\nand according to law. Where such
        instrument does not specify the character and class of investments to be made
        and does not vest in the\nAssociation a discretion in the matter, funds held
        pursuant to such instrument shall be invested in investments in which corporate
        fiduciaries\nmay invest under law.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;7.5. <U>Notice</U>.\nWhenever notice is required by the
        Articles of Association, the Bylaws or law, such notice shall be by mail,
        postage prepaid, e- mail,\nin person, or by any other means by which such
        notice can reasonably be expected to be received, using the address of the
        person to receive\nsuch notice, or such other personal data, as may appear
        on the records of the Association.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify\">Except where
        specified otherwise in these Bylaws,\nprior notice shall be proper if given
        not more than 30 days nor less than 10 days prior to the event for which notice
        is given.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 17 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"margin:
        0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt;
        margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;VIII</U></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\"><U>Indemnification</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;8.1. The Association\nshall indemnify
        such persons for such liabilities in such manner under such circumstances
        and to such extent as permitted by Section&nbsp;145\nof the Delaware General
        Corporation Law, as now enacted or hereafter amended. The Board may authorize
        the purchase and maintenance of\ninsurance and/or the execution of individual
        agreements for the purpose of such indemnification, and the Association shall
        advance all\nreasonable costs and expenses (including attorneys&rsquo; fees)
        incurred in defending any action, suit or proceeding to all persons entitled\nto
        indemnification under this Section&nbsp;8.1. Such insurance shall be consistent
        with the requirements of 12 C.F.R. &sect; 7.2014 and\nshall exclude coverage
        of liability for a formal order assessing civil money penalties against an
        institution-affiliated party, as defined\nat 12 U.S.C. &sect; 1813(u).</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;8.2.\nNotwithstanding Section&nbsp;8.1,
        however, (a)&nbsp;any indemnification payments to an institution-affiliated
        party, as defined at\n12 U.S.C. &sect; 1813(u), for an administrative proceeding
        or civil action initiated by a federal banking agency, shall be\nreasonable
        and consistent with the requirements of 12 U.S.C. &sect; 1828(k)&nbsp;and
        the implementing regulations thereunder; and\n(b)&nbsp;any indemnification
        payments and advancement of costs and expenses to an institution-affiliated
        party, as defined at 12\nU.S.C. &sect; 1813(u), in cases involving an administrative
        proceeding or civil action not initiated by a federal banking agency,\nshall
        be in accordance with Delaware General Corporation Law and consistent with
        safe and sound banking practices.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;IX</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Bylaws: Interpretation and Amendment</U></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;9.1. These Bylaws\nshall be interpreted in accordance
        with and subject to appropriate provisions of law, and may be added to, altered,
        amended, or repealed,\nat any regular or special meeting of the Board.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 0.5in\">Section&nbsp;9.2. A copy of\nthe Bylaws and
        all amendments shall at all times be kept in a convenient place at the principal
        office of the Association, and shall be\nopen for inspection to all shareholders
        during Association hours.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 18 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <DIV STYLE=\"break-before:
        page; margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: center\"><U>ARTICLE&nbsp;X</U></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        center\"><U>Miscellaneous Provisions</U></P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;10.1. <U>Fiscal\nYear</U>. The fiscal year of the Association
        shall begin on the first day of January&nbsp;in each year and shall end on
        the thirty-first\nday of December&nbsp;following.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        0.5in\">Section&nbsp;10.2. <U>Governing\nLaw</U>. This Association designates
        the Delaware General Corporation Law, as amended from time to time, as the
        governing law for its\ncorporate governance procedures, to the extent not
        inconsistent with Federal banking statutes and regulations or bank safety
        and soundness.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: center\">***</P>\n\n<P STYLE=\"font: 10pt
