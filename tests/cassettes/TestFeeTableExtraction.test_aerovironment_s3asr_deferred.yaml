        remedies, or judicial relief, (c)&nbsp;waivers of rights or defenses, (d)&nbsp;any
        provision requiring\nthe payment of attorneys&rsquo; fees, where such payment
        is contrary to law or public policy, (e)&nbsp;any provision permitting, upon\nacceleration
        of any Debt Securities, collection of that portion of the stated principal
        amount thereof which might be determined to constitute\nunearned interest
        thereon, (f)&nbsp;the creation, validity, attachment, perfection, or priority
