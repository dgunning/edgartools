        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:274pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">engaging,
        under certain circumstances, in a &#8220;business combination&#8221; with
        a publicly held Delaware corporation for three&#160;years following the date
        these persons become interested stockholders, unless: </font>\n        </div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
