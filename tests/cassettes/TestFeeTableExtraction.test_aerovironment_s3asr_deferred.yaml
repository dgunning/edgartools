        \       <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">No Event of Default with respect
        to a particular series of debt securities (except as to certain events of
        bankruptcy, insolvency or reorganization) necessarily constitutes an Event
        of Default with respect to any other series of debt securities. (Section&#160;6.1)
        The occurrence of certain Events of Default or an acceleration under the indenture
        may constitute an event of default under certain indebtedness of ours or our
        subsidiaries outstanding from time to time. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We will provide the trustee
        written notice of any Default or Event of Default within 30&#160;days of becoming
        aware of the occurrence of such Default or Event of Default, which notice
        will describe in reasonable detail the status of such Default or Event of
        Default and what action we are taking or propose to take in respect thereof.
        (Section&#160;6.1) </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        an Event of Default with respect to debt securities of any series at the time
        outstanding occurs and is continuing, then the trustee or the holders of not
        less than 25% in principal amount of the outstanding debt securities of that
        series may, by a notice in writing to us (and to the trustee if given by the
        holders), declare to be due and payable immediately the principal of (or,
        if the debt securities of that series are discount securities, that portion
        of the principal amount as may be specified in the terms of that series) and
        accrued and unpaid interest, if any, on all debt securities of that series.
        In the case of an Event of Default resulting from certain events of bankruptcy,
        insolvency or reorganization, the principal (or such specified amount) of
        and accrued and unpaid interest, if any, on all outstanding debt securities
        will become and be immediately due and payable without any declaration or
        other act on the part of the trustee or any holder of outstanding debt securities.
        At any time after a declaration of acceleration with respect to debt securities
        of any series has been made, but before a judgment or decree for payment of
        the money due has been obtained by the trustee, the holders of a majority
        in principal amount of the outstanding debt securities of that series may
        rescind and annul the acceleration if all Events of Default, other than the
        non-payment of accelerated principal and interest, if any, with respect to
        debt securities of that series, have been cured or waived as provided in the
        indenture. (Section&#160;6.2) We refer you to the prospectus supplement relating
        to any series of debt securities that are discount securities for the particular
        provisions relating to acceleration of a portion of the principal amount of
        such discount securities upon the occurrence of an Event of Default. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        indenture provides that the trustee may refuse to perform any duty or exercise
        any of its rights or powers under the indenture unless the trustee receives
        indemnity satisfactory to it against any cost, liability or expense which
        might be incurred by it in performing such duty or exercising such right or
        power. (Section&#160;7.1(e)) Subject to certain rights of the trustee, the
        holders of a majority in principal amount of the outstanding debt securities
        of any series will have the right to direct the time, method and place of
        conducting any proceeding for any remedy available to the trustee or exercising
        any trust or power conferred on the trustee with respect to the debt securities
        of that series. (Section&#160;6.12) </font>\n        </div>\n      </div>\n
