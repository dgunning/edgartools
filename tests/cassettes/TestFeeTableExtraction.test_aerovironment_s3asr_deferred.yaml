        [____]</FONT></TD></TR>\n  </TABLE>\n\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Company or the Trustee by\nnotice to the other may designate additional or
        different addresses for subsequent notices or communications.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Any notice or communication\nto a Holder shall be sent electronically
        or by first-class mail or overnight air courier to his, her or its address
        shown on the register\nkept by the Registrar, in accordance with the procedures
        of the Depositary. Failure to send a notice or communication to a Holder of
        any\nSeries&nbsp;or any defect in it shall not affect its sufficiency with
        respect to other Holders of that or any other Series.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">If a notice or communication\nis sent or published in the manner provided
        above, within the time prescribed, it is duly given, whether or not the Holder
        receives it.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">If the Company sends
        a notice\nor communication to Holders, it shall send a copy to the Trustee
        and each Agent at the same time.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 45;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->40<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in; background-color:
        white\">The\nTrustee shall not have any duty to confirm that the person sending
        any notice, instruction or other communication by electronic transmission\n(including
        by e-mail, facsimile transmission, web portal or other electronic methods)
        is, in fact, a person authorized to do so. Electronic\nsignatures believed
        by the Trustee to comply with the ESIGN Act of 2000 or other applicable law
        (including electronic images of handwritten\nsignatures and digital signatures
        provided by DocuSign, Orbit, Adobe Sign or any other digital signature provider
        acceptable to the Trustee)\nshall be deemed original signatures for all purposes.
        The Company assumes all risks arising out of the use of electronic signatures
        and\nelectronic methods to send communications to the Trustee, including without
        limitation the risk of the Trustee acting on an unauthorized\ncommunication,
        and the risk of interception or misuse by third parties.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Notwithstanding any other provision\nof this Indenture or any Security,
        where this Indenture or any Security provides for notice of any event (including
        any notice of redemption)\nto a Holder of a Global Security (whether by mail
        or otherwise), such notice shall be sufficiently given to the Depositary for
        such Security\n(or its designee) pursuant to the customary procedures of such
        Depositary.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Communication\nby
        Holders with Other Holders</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Holders
        of any Series&nbsp;may\ncommunicate pursuant to TIA &sect; 312(b)&nbsp;with
        other Holders of that Series&nbsp;or any other Series&nbsp;with respect to
        their rights\nunder this Indenture or the Securities of that Series&nbsp;or
        all Series. The Company, the Trustee, the Registrar and anyone else shall\nhave
        the protection of TIA &sect; 312(c).</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.4.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Certificate\nand
        Opinion as to Conditions Precedent</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Upon any request or application\nby the Company to the Trustee to take
        any action under this Indenture, the Company shall furnish to the Trustee:</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>an\nOfficer&rsquo;s
        Certificate stating that, in the opinion of the signers, all conditions precedent,
        if any, provided for in this Indenture\nrelating to the proposed action have
        been complied with; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>an\nOpinion
        of Counsel stating that, in the opinion of such counsel, all such conditions
        precedent have been complied with.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.5.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Statements\nRequired
        in Certificate or Opinion</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Each
        certificate or opinion\nwith respect to compliance with a condition or covenant
        provided for in this Indenture (other than a certificate provided pursuant
        to\nTIA &sect; 314(a)(4)) shall comply with the provisions of TIA &sect; 314(e)&nbsp;and
        shall include:</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(a)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nstatement
        that the person making such certificate or opinion has read such covenant
        or condition;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">(b)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nbrief
        statement as to the nature and scope of the examination or investigation upon
        which the statements or opinions contained in such\ncertificate or opinion
        are based;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 46; Value: 2 -->\n    <DIV
        STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P
        STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt; margin-bottom:
        0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->41<!-- Field: /Sequence
        --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom:
        12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0 0pt 0.5in;
        text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">(c)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nstatement
        that, in the opinion of such person, such person has made such examination
        or investigation as is necessary to enable such person\nto express an informed
        opinion as to whether or not such covenant or condition has been complied
        with; and</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0 0pt 0.5in; text-align: justify; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">(d)&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT>a\nstatement
        as to whether or not, in the opinion of such person, such condition or covenant
        has been complied with.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.6.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Rules&nbsp;by\nTrustee
        and Agents</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The Trustee
        may make reasonable\nrules&nbsp;for action by or a meeting of Holders of one
        or more Series. Any Agent may make reasonable rules&nbsp;and set reasonable
        requirements\nfor its functions.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.7.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Legal\nHolidays</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">If a payment date for any payment\nmade under
        this Indenture is not a Business Day, payment may be made on the next succeeding
        Business Day, and no interest shall accrue\nfor the intervening period.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.8.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>No\nRecourse
        Against Others</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">A director,
        officer, employee\nor stockholder (past or present), as such, of the Company
        shall not have any liability for any obligations of the Company under the
        Securities\nor the Indenture or for any claim based on, in respect of or by
        reason of such obligations or their creation. Each Holder by accepting\na
        Security waives and releases all such liability. The waiver and release are
        part of the consideration for the issue of the Securities.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;10.9.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Counterparts</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">This Indenture may be executed\nin any number
        of counterparts and by the parties hereto in separate counterparts, each of
        which when so executed shall be deemed to be\nan original and all of which
        taken together shall constitute one and the same agreement. The exchange of
        copies of this Indenture and\nof signature pages&nbsp;by facsimile or electronic
        format (e.g., &ldquo;.pdf&rdquo; or &ldquo;.tif&rdquo;) transmission shall
        constitute\neffective execution and delivery of this Indenture as to the parties
        hereto and may be used in lieu of the original Indenture for all\npurposes.
        Signatures of the parties hereto transmitted by facsimile or electronic format
        (e.g., &ldquo;.pdf&rdquo; or &ldquo;.tif&rdquo;)\nshall be deemed to be their
        original signatures for all purposes.</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">Unless otherwise provided herein\nor in any other Securities, the words
        &ldquo;execute&rdquo;, &ldquo;execution&rdquo;, &ldquo;signed&rdquo; and &ldquo;signature&rdquo;\nand
        words of similar import used in or related to any document to be signed in
        connection with this Indenture, any Securities or any of\nthe transactions
        contemplated hereby (including amendments, waivers, consents and other modifications)
        shall be deemed to include electronic\nsignatures and the keeping of records
        in electronic form, each of which shall be of the same legal effect, validity
        or enforceability\nas a manually executed signature in ink or the use of a
        paper-based recordkeeping system, as applicable, to the fullest extent and
        as\nprovided for in any applicable law, including the Federal Electronic Signatures
        in Global and National Commerce Act, the New York State\nElectronic Signatures
        and Records Act and any other similar state laws based on the Uniform Electronic
        Transactions Act.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 47; Value: 2 -->\n
        \   <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom: Black
        1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top: 0pt;
        margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo -->42<!--
        Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page; margin-top:
        6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!--
        Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.10.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Governing\nLaw;
        Waiver of Jury Trial; Consent to Jurisdiction</U>.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\"><B>THIS INDENTURE AND THE SECURITIES,&nbsp;INCLUDING\nANY CLAIM OR CONTROVERSY
        ARISING OUT OF OR RELATING TO THE INDENTURE OR THE SECURITIES, SHALL BE GOVERNED
        BY THE LAWS OF THE STATE OF\nNEW YORK<FONT STYLE=\"text-transform: uppercase\">.</FONT></B></P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\"><FONT STYLE=\"text-transform: uppercase\"><B>THE\nCOMPANY,
        THE TRUSTEE AND THE HOLDERS (BY THEIR ACCEPTANCE OF THE SECURITIES) EACH HEREBY
        IRREVOCABLY WAIVE, TO THE FULLEST EXTENT PERMITTED\nBY APPLICABLE LAW, ANY
        AND ALL RIGHT TO TRIAL BY JURY IN ANY LEGAL PROCEEDING ARISING OUT OF OR RELATING
        TO THIS INDENTURE, THE SECURITIES\nOR THE TRANSACTIONS CONTEMPLATED HEREBY
        OR THEREBY.</B></FONT></P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Any legal
        suit, action or proceeding\narising out of or based upon this Indenture or
        the transactions contemplated hereby may be instituted in the federal courts
        of the United\nStates of America located in the City of New York or the courts
        of the State of New York in each case located in the City of New York\n(collectively,
        the &ldquo;<I>Specified Courts</I>&rdquo;), and each party irrevocably submits
        to the non-exclusive jurisdiction of such\ncourts in any such suit, action
        or proceeding. Service of any process, summons, notice or document by mail
        (to the extent allowed under\nany applicable statute or rule&nbsp;of court)
        to such party&rsquo;s address set forth above shall be effective service of
        process for\nany suit, action or other proceeding brought in any such court.
        The Company, the Trustee and the Holders (by their acceptance of the Securities)\neach
        hereby irrevocably and unconditionally waive any objection to the laying of
        venue of any suit, action or other proceeding in the\nSpecified Courts and
        irrevocably and unconditionally waive and agree not to plead or claim any
        such suit, action or other proceeding has\nbeen brought in an inconvenient
        forum.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.11.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>No\nAdverse
        Interpretation of Other Agreements</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">This Indenture may not be used\nto interpret another indenture, loan
        or debt agreement of the Company or a Subsidiary of the Company. Any such
        indenture, loan or debt\nagreement may not be used to interpret this Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent:
        0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.12.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Successors</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">All agreements of the Company\nin this Indenture
        and the Securities shall bind its successor. All agreements of the Trustee
        in this Indenture shall bind its successor.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.13.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Severability</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">In case any provision in this\nIndenture or in
        the Securities shall be invalid, illegal or unenforceable, the validity, legality
        and enforceability of the remaining\nprovisions shall not in any way be affected
        or impaired thereby.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.14.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Table\nof
        Contents, Headings, Etc</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">The
        Table of Contents, Cross\nReference Table, headings of the Articles and Sections
        of this Indenture have been inserted for convenience of reference only, are
        not\nto be considered a part hereof and shall in no way modify or restrict
        any of the terms or provisions hereof.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence:
        48; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->43<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.15.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Securities\nin
        a Foreign Currency</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Unless
        otherwise specified in\na Board Resolution, a supplemental indenture hereto
        or an Officer&rsquo;s Certificate delivered pursuant to Section&nbsp;2.2 of
        this Indenture\nwith respect to a particular Series&nbsp;of Securities, whenever
        for purposes of this Indenture any action may be taken by the Holders\nof
        a specified percentage in aggregate principal amount of Securities of all
        Series&nbsp;or all Series&nbsp;affected by a particular action\nat the time
        outstanding and, at such time, there are outstanding Securities of any Series&nbsp;which
        are denominated in more than one\ncurrency, then the principal amount of Securities
        of such Series&nbsp;which shall be deemed to be outstanding for the purpose
        of taking\nsuch action shall be determined by converting any such other currency
        into a currency that is designated upon issuance of any particular\nSeries&nbsp;of
        Securities. Unless otherwise specified in a Board Resolution, a supplemental
        indenture hereto or an Officer&rsquo;s Certificate\ndelivered pursuant to
        Section&nbsp;2.2 of this Indenture with respect to a particular Series&nbsp;of
        Securities, such conversion shall\nbe at the spot rate for the purchase of
        the designated currency as published in The Financial Times in the &ldquo;Currency
        Rates&rdquo;\nsection (or, if The Financial Times is no longer published,
        or if such information is no longer available in The Financial Times, such\nsource
        as may be selected in good faith by the Company) on any date of determination.
        The provisions of this paragraph shall apply in\ndetermining the equivalent
        principal amount in respect of Securities of a Series&nbsp;denominated in
        currency other than Dollars in connection\nwith any action taken by Holders
        of Securities pursuant to the terms of this Indenture.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">All decisions and determinations\nprovided for in the preceding paragraph
        shall, in the absence of manifest error, to the extent permitted by law, be
        conclusive for all\npurposes and irrevocably binding upon the Trustee and
        all Holders.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.16.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Judgment\nCurrency</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The Company agrees, to the fullest\nextent that
        it may effectively do so under applicable law, that (a)&nbsp;if for the purpose
        of obtaining judgment in any court it is necessary\nto convert the sum due
        in respect of the principal of or interest or other amount on the Securities
        of any Series&nbsp;(the &ldquo;<I>Required\nCurrency</I>&rdquo;) into a currency
        in which a judgment will be rendered (the &ldquo;<I>Judgment Currency</I>&rdquo;),
        the rate of exchange\nused shall be the rate at which in accordance with normal
        banking procedures the Trustee could purchase in the City of New York the
        Required\nCurrency with the Judgment Currency on the day on which final unappealable
        judgment is entered, unless such day is not a New York Banking\nDay, then
        the rate of exchange used shall be the rate at which in accordance with normal
        banking procedures the Trustee could purchase\nin the City of New York the
        Required Currency with the Judgment Currency on the New York Banking Day preceding
        the day on which final\nunappealable judgment is entered and (b)&nbsp;its
        obligations under this Indenture to make payments in the Required Currency
        (i)&nbsp;shall\nnot be discharged or satisfied by any tender, any recovery
        pursuant to any judgment (whether or not entered in accordance with subsection\n(a)),
        in any currency other than the Required Currency, except to the extent that
        such tender or recovery shall result in the actual receipt,\nby the payee,
        of the full amount of the Required Currency expressed to be payable in respect
        of such payments, (ii)&nbsp;shall be enforceable\nas an alternative or additional
        cause of action for the purpose of recovering in the Required Currency the
        amount, if any, by which such\nactual receipt shall fall short of the full
        amount of the Required Currency so expressed to be payable, and (iii)&nbsp;shall
        not be affected\nby judgment being obtained for any other sum due under this
        Indenture. For purposes of the foregoing, &ldquo;<I>New York Banking Day</I>&rdquo;\nmeans
        any day except a Saturday, Sunday or a legal holiday in the City of New York
        on which banking institutions are authorized or required\nby law, regulation
        or executive order to close.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 49;
        Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt; margin-bottom: 6pt; border-bottom:
        Black 1pt solid\"><P STYLE=\"font-size: 10pt; text-align: center; margin-top:
        0pt; margin-bottom: 0pt\"><!-- Field: Sequence; Type: Arabic; Name: PageNo
        -->44<!-- Field: /Sequence --></P></DIV>\n    <DIV STYLE=\"break-before: page;
        margin-top: 6pt; margin-bottom: 12pt\"><P STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n
        \   <!-- Field: /Page -->\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;10.17.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Force\nMajeure</U>.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">In no event shall the Trustee\nbe responsible
        or liable for any failure or delay in the performance of its obligations hereunder
        arising out of or caused by, directly\nor indirectly, forces beyond its control,
        including, without limitation, strikes, work stoppages, accidents, acts of
        war or terrorism,\ncivil or military disturbances, nuclear or natural catastrophes,
        pandemics, epidemics or other public health emergencies, or acts of God,\nand
        interruptions, loss or malfunctions of utilities, communications or computer
        (software and hardware) services, it being understood\nthat the Trustee shall
        use reasonable best efforts which are consistent with accepted practices in
        the banking industry to resume performance\nas soon as practicable under the
        circumstances.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times,
        Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size: 10pt\">Section&nbsp;10.18.&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>U.S.A.\nPatriot
        Act</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The parties hereto
        acknowledge\nthat in accordance with Section&nbsp;326 of the U.S.A. Patriot
        Act, the Trustee is required to obtain, verify and record information that\nidentifies
        each person or legal entity that establishes a relationship or opens an account
        with the Trustee. The parties to this Indenture\nagree that they will provide
        the Trustee with such information as it may request in order for the Trustee
        to satisfy the requirements\nof the U.S.A. Patriot Act.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: center\">ARTICLE&nbsp;XI.<FONT
        STYLE=\"text-transform: uppercase\"><BR>\nSINKING FUNDS</FONT></P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;11.1.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Applicability\nof
        Article</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif;
        margin: 0pt 0; text-align: justify; text-indent: 1in\">The provisions of this
        Article&nbsp;shall\nbe applicable to any sinking fund for the retirement of
        the Securities of a Series&nbsp;if so provided by the terms of such Securities\npursuant
        to Section&nbsp;2.2, except as otherwise permitted or required by any form
        of Security of such Series&nbsp;issued pursuant to\nthis Indenture.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align:
        justify; text-indent: 1in\">The minimum amount of any sinking\nfund payment
        provided for by the terms of the Securities of any Series&nbsp;is herein referred
        to as a &ldquo;<I>mandatory sinking fund\npayment</I>&rdquo; and any other
        amount provided for by the terms of Securities of such Series&nbsp;is herein
        referred to as an &ldquo;<I>optional\nsinking fund payment</I>.&rdquo; If
        provided for by the terms of Securities of any Series, the cash amount of
        any sinking fund payment\nmay be subject to reduction as provided in Section&nbsp;11.2.
        Each sinking fund payment shall be applied to the redemption of Securities\nof
        any Series&nbsp;as provided for by the terms of the Securities of such Series.</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P
        STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt 0\"></P>\n\n<!--
        Field: Page; Sequence: 50; Value: 2 -->\n    <DIV STYLE=\"margin-top: 12pt;
        margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->45<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT
        STYLE=\"font-size: 10pt\">Section&nbsp;11.2.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Satisfaction\nof
        Sinking Fund Payments with Securities</U>.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">The Company may, in satisfaction\nof all or any part of any sinking
        fund payment with respect to the Securities of any Series&nbsp;to be made
        pursuant to the terms of such\nSecurities (1)&nbsp;deliver outstanding Securities
        of such Series&nbsp;to which such sinking fund payment is applicable (other
        than any\nof such Securities previously called for mandatory sinking fund
        redemption) and (2)&nbsp;apply as credit Securities of such Series&nbsp;to\nwhich
        such sinking fund payment is applicable and which have been repurchased by
        the Company or redeemed either at the election of the\nCompany pursuant to
        the terms of such Series&nbsp;of Securities (except pursuant to any mandatory
        sinking fund) or through the application\nof permitted optional sinking fund
        payments or other optional redemptions pursuant to the terms of such Securities,
        provided that such\nSecurities have not been previously so credited. Such
        Securities shall be received by the Trustee, together with an Officer&rsquo;s
        Certificate\nwith respect thereto, not later than 15 days prior to the date
        on which the Trustee begins the process of selecting Securities for redemption\nand
        shall be credited for such purpose by the Trustee at the price specified in
        such Securities for redemption through operation of the\nsinking fund and
        the amount of such sinking fund payment shall be reduced accordingly. If as
        a result of the delivery or credit of Securities\nin lieu of cash payments
        pursuant to this Section&nbsp;11.2, the principal amount of Securities of
        such Series&nbsp;to be redeemed in\norder to exhaust the aforesaid cash payment
        shall be less than $100,000, the Trustee need not call Securities of such
        Series&nbsp;for\nredemption, except upon receipt of a Company Order that such
        action be taken, and such cash payment shall be held by the Trustee or a\nPaying
        Agent and applied to the next succeeding sinking fund payment, <U>provided</U>,
        <U>however</U>, that the Trustee or such Paying\nAgent shall from time to
        time upon receipt of a Company Order pay over and deliver to the Company any
        cash payment so being held by the\nTrustee or such Paying Agent upon delivery
        by the Company to the Trustee of Securities of that Series&nbsp;purchased
        by the Company having\nan unpaid principal amount equal to the cash payment
        required to be released to the Company.</P>\n\n<P STYLE=\"font: 10pt Times
        New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt
        Times New Roman, Times, Serif; margin: 0pt 0; text-indent: 0.5in\"><FONT STYLE=\"font-size:
        10pt\">Section&nbsp;11.3.&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;&#8239;</FONT><U>Redemption\nof
        Securities for Sinking Fund</U>.</P>\n\n<P STYLE=\"font: 10pt Times New Roman,
        Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New
        Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent: 1in\">Not
        less than 45 days (unless\notherwise indicated in the Board Resolution, supplemental
        indenture hereto or Officer&rsquo;s Certificate in respect of a particular
        Series&nbsp;of\nSecurities) prior to each sinking fund payment date for any
        Series&nbsp;of Securities, the Company will deliver to the Trustee an Officer&rsquo;s\nCertificate
        specifying the amount of the next ensuing mandatory sinking fund payment for
        that Series&nbsp;pursuant to the terms of that\nSeries, the portion thereof,
        if any, which is to be satisfied by payment of cash and the portion thereof,
        if any, which is to be satisfied\nby delivering and crediting of Securities
        of that Series&nbsp;pursuant to Section&nbsp;11.2, and the optional amount,
        if any, to be added\nin cash to the next ensuing mandatory sinking fund payment,
        and the Company shall thereupon be obligated to pay the amount therein specified.\nNot
        less than 30 days (unless otherwise indicated in the Board Resolution, Officer&rsquo;s
        Certificate or supplemental indenture in respect\nof a particular Series&nbsp;of
        Securities) before each such sinking fund payment date the Securities to be
        redeemed upon such sinking\nfund payment date will be selected in the manner
        specified in Section&nbsp;3.2, and the Company shall send or cause to be sent
        a notice\nof the redemption thereof to be given in the name of and at the
        expense of the Company in the manner provided in and in accordance with\nSection&nbsp;3.3.
        Such notice having been duly given, the redemption of such Securities shall
        be made upon the terms and in the manner\nstated in Sections 3.4, 3.5 and
        3.6.</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin: 0pt
        0\">&nbsp;</P>\n\n<P STYLE=\"font: 10pt Times New Roman, Times, Serif; margin:
        0pt 0\"></P>\n\n<!-- Field: Page; Sequence: 51; Value: 2 -->\n    <DIV STYLE=\"margin-top:
        12pt; margin-bottom: 6pt; border-bottom: Black 1pt solid\"><P STYLE=\"font-size:
        10pt; text-align: center; margin-top: 0pt; margin-bottom: 0pt\"><!-- Field:
        Sequence; Type: Arabic; Name: PageNo -->46<!-- Field: /Sequence --></P></DIV>\n
        \   <DIV STYLE=\"break-before: page; margin-top: 6pt; margin-bottom: 12pt\"><P
        STYLE=\"margin: 0pt\">&nbsp;</P></DIV>\n    <!-- Field: /Page -->\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0; text-align: justify; text-indent:
        1in\">IN WITNESS WHEREOF, the parties\nhereto have caused this Indenture to
        be duly executed as of the day and year first above written.</P>\n\n<P STYLE=\"font:
        10pt Times New Roman, Times, Serif; margin: 0pt 0\">&nbsp;</P>\n\n<TABLE CELLPADDING=\"0\"
        CELLSPACING=\"0\" STYLE=\"border-collapse: collapse; width: 100%\">\n  <TR
        STYLE=\"vertical-align: bottom\">\n    <TD><FONT STYLE=\"font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD COLSPAN=\"2\" STYLE=\"font: 10pt Times New Roman, Times, Serif\"><FONT
        STYLE=\"font-size: 10pt\">AeroVironment,&nbsp;Inc.</FONT></TD></TR>\n  <TR
        STYLE=\"vertical-align: bottom\">\n    <TD><FONT STYLE=\"font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD COLSPAN=\"2\" STYLE=\"font: 10pt Times New Roman, Times, Serif\"><FONT
        STYLE=\"font-size: 10pt\">&nbsp;</FONT></TD></TR>\n  <TR STYLE=\"vertical-align:
        bottom\">\n    <TD STYLE=\"width: 50%\"><FONT STYLE=\"font-size: 10pt\">&nbsp;</FONT></TD>\n
        \   <TD STYLE=\"font: 10pt Times New Roman, Times, Serif; width: 3%\"><FONT
        STYLE=\"font-size: 10pt\">By:</FONT></TD>\n    <TD STYLE=\"border-bottom:
        Black 1pt solid; font: 10pt Times New Roman, Times, Serif; width: 47%\"><FONT
