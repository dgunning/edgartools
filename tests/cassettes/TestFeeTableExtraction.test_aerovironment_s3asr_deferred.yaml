        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">DESCRIPTION OF DEBT SECURITIES</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The following description,
        together with the additional information we include in any applicable prospectus
        supplement or free writing prospectus, summarizes certain general terms and
        provisions of the debt securities that we may offer under this prospectus.
        When we offer to sell a particular series of debt securities, we will describe
        the specific terms of the series in a supplement to this prospectus. We will
        also indicate in the supplement to what extent the general terms and provisions
        described in this prospectus apply to a particular series of debt securities.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        may issue debt securities either separately, or together with, or upon the
        conversion or exercise of or in exchange for, other securities described in
        this prospectus. Debt securities may be our senior, senior subordinated or
        subordinated obligations and, unless otherwise specified in a supplement to
        this prospectus, the debt securities will be our direct, unsecured obligations
        and may be issued in one or more series. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The debt securities will be
        issued under an indenture between us and U.S. Bank Trust Company, National
        Association, as trustee. We have summarized select portions of the indenture
        below. The summary is not complete. The form of the indenture has been filed
        as an exhibit to the registration statement and you should read the indenture
        for provisions that may be important to you. In the summary below, we have
        included references to the section numbers of the indenture so that you can
        easily locate these provisions. Capitalized terms used in the summary and
        not defined herein have the meanings specified in the indenture. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As used
        in this section only, &#8220;AeroVironment,&#8221; &#8220;we,&#8221; &#8220;our&#8221;
        or &#8220;us&#8221; refer to AeroVironment, Inc. excluding our subsidiaries,
        unless expressly stated or the context otherwise requires. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">General</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        terms of each series of debt securities will be established by or pursuant
        to a resolution of our board of directors and set forth or determined in the
        manner provided in a resolution of our board of directors, in an officer&#8217;s
        certificate or by a supplemental indenture. (Section&#160;2.2) The particular
        terms of each series of debt securities will be described in a prospectus
        supplement relating to such series (including any pricing supplement or term
        sheet). </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        can issue an unlimited amount of debt securities under the indenture that
        may be in one or more series with the same or various maturities, at par,
        at a premium, or at a discount. (Section&#160;2.1) We will set forth in a
        prospectus supplement (including any pricing supplement or term sheet) relating
        to any series of debt securities being offered, the aggregate principal amount
        and the following terms of the debt securities, if applicable: </font>\n        </div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6.19pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6.19pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">the title and ranking of the
        debt securities (including the terms of any subordination provisions); </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6.2pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
