        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Our
        management will have broad discretion with respect to the use of proceeds
        of this offering, including for any of the purposes described in the section
        of this prospectus supplement entitled &#8220;Use of Proceeds.&#8221; You
        will be relying on the judgment of our management regarding the application
        of the proceeds of this offering. The results and effectiveness of the use
        of proceeds are uncertain, and we could spend the proceeds in ways that you
        do not agree with or that do not improve our results of operations or enhance
        the value of our common stock. Our failure to apply these funds effectively
        could have a material adverse effect on our business, delay the development
        of our product candidates, and cause the price of our common stock to decline.
        </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">We
        may be required to raise additional financing by issuing new securities with
        terms or rights superior to those of our existing securityholders, which could
        adversely affect the market price of shares of common stock and our business.</font><font
        style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We will
        require additional financing to fund future operations, including expansion
        in current and new markets, development and acquisition, capital costs and
        the costs of any necessary implementation of technological innovations or
        alternative technologies. We may not be able to obtain financing on favorable
        terms, if at all. If we raise additional funds by issuing equity securities,
        the&#160;percentage ownership of our current stockholders will be reduced,
        and the holders of the new equity securities may have rights superior to those
        of our existing securityholders, which could adversely affect the market price
        of common stock and the voting power of shares of common stock. If we raise
        additional funds by issuing debt securities, the holders of these debt securities
        would similarly have some rights senior to those of our existing securityholders,
        and the terms of these debt securities could impose restrictions on operations
        and create a significant interest expense for us which could have a materially
        adverse effect on our business. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">Our shareholders may experience significant
        dilution as a result of future equity offerings or issuances and exercise
        of outstanding options and warrants.</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        order to raise additional capital or pursue strategic transactions, we may
        in the future offer, issue or sell additional shares of Common Stock or other
        securities convertible into or exchangeable for shares of Common Stock. We
        cannot assure you that we will be able to sell shares or other securities
        in any other transaction at a price per share or that have an exercise price
        or conversion price per share that is equal to or greater than the price for
        the securities purchased by investors in this offering, and investors purchasing
        shares or other securities in the future could have rights superior to existing
        stockholders. The price per share at which we sell or issue additional shares
        of Common Stock or other securities convertible into or exchangeable for Common
        Stock future transactions may be higher or lower than such price. </font>\n
        \       </div>\n      </div>\n      <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">S-5</font>\n          <br
        >\n        </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:42pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">We have never declared or
        paid dividends on our capital stock and we do not anticipate paying dividends
        in the foreseeable future.</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Our
        business requires significant funding, and we currently invest available funds
        and earnings in product development. Therefore, we do not anticipate paying
        any cash dividends on our common stock in the foreseeable future. We currently
        plan to invest all available funds and future earnings in the development
        and growth of our business. As a result, capital appreciation, if any, of
        our common stock will be your sole source of potential gain for the foreseeable
        future. </font>\n        </div>\n        <div style=\"margin-top:12pt; width:456pt;
        line-height:12pt;font-style:italic;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Future
        issuances of preferred stock may adversely affect the market price for Common
        Stock.</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Additional
        issuances and sales of preferred stock, or the perception that such issuances
        and sales could occur, may cause prevailing market prices for Common Stock
        to decline and may adversely affect our ability to raise additional capital
        in the financial markets at times and prices favorable to us. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-style:italic;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">We are not in compliance
        with the Nasdaq continued listing requirements. If we are unable to comply
        with the continued listing requirements of the Nasdaq Capital Market, Common
        Stock could be delisted, which could affect Common Stock&#8217;s market price
        and liquidity and reduce our ability to raise capital.</font><font style=\"font-style:normal;font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        are required to meet certain qualitative and financial tests to maintain the
        listing of our securities on The Nasdaq Capital Market. As previously reported
        in a Current Report on Form 8-K filed with the Securities and Exchange Commission
        on November&#160;22, 2024, we were notified on November&#160;20, 2024 by Nasdaq
        that we were not in compliance with the minimum stockholders&#8217; equity
        requirement under Nasdaq Listing Rule&#160;5550(b)(1) for continued listing
        on The Nasdaq Capital Market because our stockholders&#8217; deficit of approximately
        $2.033&#160;million, as reported in our Quarterly Report on Form 10-Q for
        the period ended September&#160;30, 2024, is below the required minimum stockholders&#8217;
        equity of $2.5&#160;million, and as of the date of the notification, we did
        not meet the alternatives of market value of listed securities or net income
        from continuing operations. In accordance with the notification, the Nasdaq
        Staff has determined to delist the Company&#8217;s securities from The Nasdaq
        Capital Market. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        Company requested a hearing before the Nasdaq Hearings Panel (the &#8220;Panel&#8221;)
        and presented its plan of compliance at a hearing held on November&#160;14,
        2024. The Panel granted an extension to February&#160;18, 2025 to regain compliance
        with the minimum stockholders&#8217; equity requirement under Nasdaq Listing
        Rule&#160;5550(b)(1). The Company is working with its advisors to implement
        its plan of compliance. Even if we assume all of the shares of Common Stock
        offered in this prospectus are sold, no assurance can be given that the proceeds
        of this offering will enable us to achieve the minimum stockholders&#8217;
        equity requirement and there can be no guarantee that we will be able to maintain
        our Nasdaq listing. </font>\n        </div>\n        <div style=\"margin-left:20pt;
        margin-top:8pt; width:436pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">If
        we cease to be eligible to trade on Nasdaq: </font>\n        </div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">We may have to pursue trading
        on a less recognized or accepted market, such as the OTC Bulletin Board or
        the &#8220;pink sheets.&#8221; </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt; margin-bottom:0pt;
        text-align:left; width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" margin-top:6pt; margin-bottom:0pt;
        line-height:12pt; text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">Shares of our Common Stock
        could be less liquid and marketable, thereby reducing the ability of stockholders
        to purchase or sell our shares as quickly and as inexpensively as they have
        done historically. If our stock is traded as a &#8220;penny stock,&#8221;
        transactions in our stock would be more difficult and cumbersome. </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:6pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:6pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">We may be unable to access
        capital on favorable terms or at all, as companies trading on alternative
        markets may be viewed as less attractive investments with higher associated
        risks, such that existing or prospective institutional investors may be less
        interested in, or prohibited from, investing in our common stock. This may
        also cause the market price of our common stock to decline.</font>\n        </div>\n
