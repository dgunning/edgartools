        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">WARRANT PRIVATE PLACEMENT</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">In a concurrent Warrant Private
        Placement, we are selling to investors, including our chief executive officer
        and certain principal stockholders of the Company, Unregistered Warrants to
        purchase up to an aggregate of 7,230,301 Unregistered Warrant Shares. The
        Unregistered Securities are not being registered under the Securities Act
        and are not offered pursuant to this prospectus supplement and the accompanying
        prospectus. The Unregistered Securities are being offered pursuant to an exemption
        from the registration requirements of the Securities Act provided in Section&#160;4(a)(2)
        of the Securities Act. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        exercise price of each Series&#160;A Warrant and Pre-Funded Warrant will be
        $13.42 and $0.01 per share, respectively. The exercisability of the Unregistered
        Warrants offered in the Private Placement will be subject to stockholder approval.
        If such stockholder approval is obtained, the Series&#160;A Warrants will
        be exercisable six&#160;months after issuance and will expire on the earlier
        of (a)&#160;subject to the fulfilment of certain equity conditions set forth
        in the securities purchase agreement, thirty (30) trading days after the last
        of certain data readouts to be reported by the Company, and (b)&#160;the 5-year
        anniversary of the closing date of the securities purchase agreement. The
        exercise price of the Series&#160;A Warrants will be subject to adjustment
        for stock splits, reverse splits, and similar capital transactions as described
        in the Series&#160;A Warrants. Subject to certain ownership limitations described
        in the Pre-Funded Warrants, the Pre-Funded Warrants will be exercisable after
        stockholder approval is obtained and do not expire. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Our Common Stock is listed
        on The Nasdaq Capital Market, and, as such, we are subject to the applicable
        rules of the Nasdaq Stock Market, including Nasdaq Listing Rule&#160;5635(c),
        which requires stockholder approval in connection with certain non-public
        offerings involving the sale, issuance or potential issuance by a listed company
        of equity compensation. For this purpose, &#8220;equity compensation&#8221;
        includes common stock (and/or securities convertible into or exercisable for
        common stock) issued to a company&#8217;s officers, directors, employees or
        consultants at a discount to the Market Value of such company&#8217;s common
        stock. &#8220;Market Value&#8221; means the consolidated closing bid price
        (as reflected on Nasdaq.net) immediately preceding the time that the listed
        company enters into a binding agreement with such officer, director, employee
        or consultant to issue the equity compensation. In addition to the foregoing,
        we are subject to Nasdaq Listing Rule&#160;5635(d) which requires stockholder
        approval prior to the issuance of common stock or securities exercisable for
        common stock in an amount that equals 20% or more of the outstanding shares
        of common stock or voting power of an issuer, when such issuance is made at
        below the Minimum Price. &#8220;Minimum Price&#8221; means a price that is
        the lower of: (i)&#160;the official Nasdaq closing price of the Company&#8217;s
        common stock immediately preceding the signing of the securities purchase
        agreement, and (ii)&#160;the average Nasdaq closing price of the Company&#8217;s
        common stock for the five trading days immediately preceding signing of the
        securities purchase agreement. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        issuance of the Unregistered Warrant Shares underlying the Unregistered Warrants
        may result in shares of our Common Stock being issued to our chief executive
        officer (the &#8220;Inside Investor&#8221;) at a price which may be deemed
        to be below the Market Value of our Common Stock as of the time we entered
        into a securities purchase agreement with respect to the issuance of the Unregistered
        Securities. Thus, the issuance of the Unregistered Warrants may be considered
        &#8220;equity compensation&#8221; under Nasdaq Listing Rule&#160;5635(c).
        As such, in order for the Unregistered Pre-Funded Warrant Shares to be fully
        issued as contemplated by the Private Placement Purchase Agreement, stockholder
        approval is required because, for purposes of Nasdaq Listing Rule&#160;5635(c),
        the issuance of the Unregistered Warrants could result in shares of our common
        stock being issuable to the Inside Investor upon exercise of their Unregistered
        Warrants. In addition, the issuance of securities in the Private Placement
        will result in an issuance of more than 20% of the Company&#8217;s outstanding
        shares of common stock at an offering price that is less than the Minimum
        Price. As such, we would require stockholder approval to issue the common
        stock underlying the Unregistered Warrants that would result in such an issuance.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        closing of the Warrant Private Placement is expected to occur on December&#160;31,
        2024, subject to satisfaction of customary closing conditions. </font>\n        </div>\n
