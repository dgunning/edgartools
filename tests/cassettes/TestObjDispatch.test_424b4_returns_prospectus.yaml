        \       <div style=\"margin-top:12pt; text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">ONCONOVA THERAPEUTICS, INC.</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Overview</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        are a clinical-stage biopharmaceutical company focused on discovering and
        developing novel products for patients with cancer. We have proprietary molecularly
        targeted agents designed to disrupt specific cellular pathways that are important
        for cancer cell proliferation. We believe that the product candidates in our
        pipeline have the potential to be efficacious in a variety of cancers with
        unmet medical need. We have the following two clinical-stage programs: 1.
        narazaciclib (ON 123300), a multi-targeted kinase inhibitor in solid tumors
        and hematological malignancies as a single agent or in combination with other
        anti-cancer therapies; and 2. rigosertib administered alone or in combination
        for the treatment of various cancers. We are currently evaluating potential
        compounds for in-licensing opportunities. </font>\n        </div>\n        <div
        style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Our net losses were $5.8&#160;million
        and $4.1&#160;million for the three&#160;months ended March&#160;31, 2023
        and 2022, respectively. As of March&#160;31, 2023, we had an accumulated deficit
        of $469.5&#160;million. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n          <font
        style=\"letter-spacing:-0.2pt;\">CORPORATE INFORMATION</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        were incorporated in Delaware in December&#160;1998 and commenced operations
        in January&#160;1999. Our principal executive offices are located at 12 Penns
        Trail, Newtown, Pennsylvania 18940, and our telephone number is (267) 759-3680.
        Our website address is www.onconova.com. The information on, or that can be
        accessed through, our website is not part of this prospectus. </font>\n        </div>\n
