        \         <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;font-style:normal;\">\n
        \           <font style=\"letter-spacing:0.2pt;\">Traws Pharma, Inc. (&#8220;Traws
        Pharma&#8221;), formerly known as Onconova Therapeutics, Inc. (the &#8220;Company&#8221;),
        was incorporated in the State of Delaware on December&#160;22, 1998 and commenced
        operations on January&#160;1, 1999. On April&#160;1, 2024, the Company acquired
        Trawsfynydd Therapeutics, Inc., a Delaware corporation (&#8220;Trawsfynydd&#8221;),
        and the name change to Traws Pharma, Inc. was effected. Traws Pharma is a
        clinical stage biopharmaceutical company aiming to address unmet medical needs
        in respiratory viral diseases and cancer. The viral respiratory disease program
        includes a single oral dose CAP dependent inhibitor candidate for influenza,
        and an oral antiviral candidate designed to target mPro protease without the
        need for a CYP inhibitor for SARS-CoV-2. In the cancer program, Traws Pharma
        is developing the novel, proprietary multi-kinase CDK4-plus inhibitor narazaciclib
        for refractory endometrial cancer and potentially for other cancers. </font>\n
        \         </div>\n          <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:12pt;font-style:normal;\">\n            <font style=\"letter-spacing:0.2pt;\">Our
