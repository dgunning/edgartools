        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-bottom:368pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"text-align:center; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">USE OF PROCEEDS</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Net proceeds to us from this
        offering will be approximately $2.8&#160;million, based on the sale of an
        aggregate of 608,197 shares of Common Stock at the public offering price of
        $5.103 per share, after deducting estimated placement agent fees and estimated
        offering expenses payable by us. The amount of offering proceeds above does
        not take into account any proceeds from the sale of the Pre-Funded Warrants
        or the exercise of any of the Unregistered Warrants being issued in the Warrant
        Private Placement. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        intend to use the net proceeds from this offering to fund the development
        of our clinical and preclinical programs, for other research and development
        activities and for general corporate purposes, which may include capital expenditures
        and funding working capital needs. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:8pt; width:456pt; line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        amounts actually expended for each purpose may vary significantly depending
        upon numerous factors, including the amount and timing of the proceeds from
        this offering and progress with the clinical development of our product candidates.
        Expenditures will also depend upon the establishment of collaborative arrangements
        with other companies, the availability of additional financing and other factors.
        Investors will be relying on the judgment of our management regarding the
        application of the proceeds of any sale of shares of our securities. </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:8pt; width:456pt;
        line-height:12pt;\">\n          <font style=\"letter-spacing:0.2pt;\">As of
        the date of this prospectus, we cannot specify with certainty all of the particular
        uses of the proceeds from this offering. Accordingly, we will retain broad
        discretion over the use of such proceeds. Pending the use of the net proceeds
        from this offering as described above, we intend to invest the net proceeds
        in investment-grade, interest-bearing securities. </font>\n        </div>\n
