        \       </table>\n        <div style=\"text-indent:20pt; margin-top:7.01pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        estimate the total expenses payable by us for this offering to be approximately
        $691,000, which amount includes (i)&#160;a placement agent&#8217;s fee of
        approximately $256,000 (ii)&#160;reimbursement of the reasonable accountable
        expenses of the placement agent; and (iii)&#160;other estimated expenses of
        approximately $335,000 which include legal, accounting, printing costs and
        various fees associated with the registration and listing of our shares. </font>\n
        \       </div>\n        <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Listing</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Our
        Common Stock is currently traded on the Nasdaq Capital Market under the symbol
        &#8220;TRAW.&#8221; On December&#160;27, 2024, the last reported sale price
        of Common Stock was $13.42 per share. </font>\n        </div>\n        <div
        style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Lock-up Agreements</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">Our officers and directors
        and certain of our stockholders have agreed with the placement agent to be
        subject to a lock-up period of 90&#160;days following the date of this prospectus.
        This means that, during the applicable lock-up period, such persons may not
        offer for sale, contract to sell, sell, distribute, grant any option, right
        or warrant to purchase, pledge, hypothecate or otherwise dispose of, directly
        or indirectly, any shares of Common Stock or any securities convertible into,
        or exercisable or exchangeable for, shares of Common Stock. Certain limited
        transfers are permitted during the lock-up period if the transferee agrees
        to these lock-up restrictions. We have also agreed in the securities purchase
        agreement, subject to certain exceptions, to similar lock-up restrictions
        on the issuance and sale of our securities for 30 trading days following the
        later of (i)&#160;the Resale Effective Date (as defined in the purchase agreement)
        and (ii)&#160;obtaining the Requisite Stockholder Approval (as defined in
        the purchase agreement). The placement agent may, in its sole discretion and
        without notice, waive the terms of any of these lock-up agreements. </font>\n
        \       </div>\n        <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Stabilization, Short Positions
        and Penalty Bids</font><font style=\"font-weight:normal;letter-spacing:0.2pt;\">
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">The
        placement agent may engage in syndicate covering transactions, stabilizing
        transactions and penalty bids or purchases for the purpose of pegging, fixing
        or maintaining the price of Common Stock: </font>\n        </div>\n      </div>\n
        \     <div style=\"margin-top:2.00000000000002pt;height:12pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:2pt;margin-bottom:21.86pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:5pt; text-align:center; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">S-14</font>\n          <br
        >\n        </div>\n      </div>\n      <hr >\n    </div>\n    <div style=\"page-break-after:always;
        width:595.3pt;margin-left:auto;margin-right:auto;font-style:normal;font-weight:normal;font-variant:normal;text-transform:none;color:#000000;font-family:Times
        New Roman, Times, serif ;font-size:10pt;\">\n      <div style=\"padding:0pt;margin:0pt;font-family:calibri,
        arial, sans-serif;font-weight:normal;font-style:normal;font-size:8pt;line-height:8pt;\">\n
        \       <a style=\"text-decoration:none;color:#003366;\" href=\"#TOC\">TABLE
        OF CONTENTS</a>\n      </div>\n      <div style=\"margin-top:15.85pt;height:24pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\"margin-top:17pt; width:456pt; line-height:12pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">&#160;</font>\n          <br
        >\n        </div>\n      </div>\n      <div style=\"margin-top:6pt;margin-left:69.66pt;width:456pt;\">\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; text-align:left;
        width:10pt;white-space:nowrap;\">\n          <font style=\"letter-spacing:0.2pt;\">&#8226;</font>\n
        \         <br >\n        </div>\n        <div style=\" line-height:12pt; text-align:left;
        margin-left:30pt;\">\n          <!--blacklining:none;-->\n          <font
        style=\"letter-spacing:0.2pt;\">Syndicate covering transactions involve purchases
        of securities in the open market after the distribution has been completed
        in order to cover syndicate short positions. Such a naked short position would
        be closed out by buying securities in the open market. A naked short position
        is more likely to be created if the placement agent is concerned that there
        could be downward pressure on the price of the securities in the open market
        after pricing that could adversely affect investors who purchase in the offering.
        </font>\n        </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">Stabilizing transactions permit
        bids to purchase the underlying security so long as the stabilizing bids do
        not exceed a specific maximum. </font>\n        </div>\n        <div style=\"clear:both;
        padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n        <div
        style=\" float:left; margin-left:20pt; line-height:12pt; margin-top:5.8pt;
        margin-bottom:0pt; text-align:left; width:10pt;white-space:nowrap;\">\n          <font
        style=\"letter-spacing:0.2pt;\">&#8226;</font>\n          <br >\n        </div>\n
        \       <div style=\" margin-top:5.8pt; margin-bottom:0pt; line-height:12pt;
        text-align:left; margin-left:30pt;\">\n          <!--blacklining:none;-->\n
        \         <font style=\"letter-spacing:0.2pt;\">Penalty bids permit the placement
        agent to reclaim a selling concession from a syndicate member when the securities
        originally sold by the syndicate member are purchased in a stabilizing or
        syndicate covering transaction to cover syndicate short positions. </font>\n
        \       </div>\n        <div style=\"clear:both; padding:0pt; margin:0pt;font-size:0pt;line-height:0pt;\">&#8203;</div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">These syndicate covering transactions,
        stabilizing transactions and penalty bids may have the effect of raising or
        maintaining the market prices of our securities or preventing or retarding
        a decline in the market prices of our securities. As a result, the price of
        Common Stock may be higher than the price that might otherwise exist in the
        open market. Neither we nor the placement agent make any representation or
        prediction as to the effect that the transactions described above may have
        on the price of Common Stock. These transactions may be effected on the Nasdaq
        Capital Market, in the over-the-counter market or on any other trading market
        and, if commenced, may be discontinued at any time. </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">In connection with this offering,
        the placement agent also may engage in passive market making transactions
        in Common Stock in accordance with Regulation&#160;M during a period before
        the commencement of offers or sales of shares of Common Stock in this offering
        and extending through the completion of the distribution. In general, a passive
        market maker must display its bid at a price not in excess of the highest
        independent bid for that security. However, if all independent bids are lowered
        below the passive market maker&#8217;s bid that bid must then be lowered when
        specific purchase limits are exceeded. Passive market making may stabilize
        the market price of the securities at a level above that which might otherwise
        prevail in the open market and, if commenced, may be discontinued at any time.
        </font>\n        </div>\n        <div style=\"text-indent:20pt; margin-top:8pt;
        width:456pt; line-height:11.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Neither
        we nor the placement agent make any representation or prediction as to the
        direction or magnitude of any effect that the transactions described above
        may have on the prices of our securities. In addition, neither we nor the
        placement agent make any representation that the placement agent will engage
        in these transactions or that any transactions, once commenced, will not be
        discontinued without notice. </font>\n        </div>\n        <div style=\"margin-top:12pt;
        width:456pt; line-height:12pt;font-weight:bold;\">\n          <font style=\"letter-spacing:-0.2pt;\">Indemnification</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">We have agreed to indemnify
        the placement agent against certain liabilities, including certain liabilities
        arising under the Securities Act, or to contribute to payments that the placement
        agent may be required to make for these liabilities. </font>\n        </div>\n
        \       <div style=\"margin-top:12pt; width:456pt; line-height:12pt;font-weight:bold;\">\n
        \         <font style=\"letter-spacing:-0.2pt;\">Regulation&#160;M</font><font
        style=\"font-weight:normal;letter-spacing:0.2pt;\"> </font>\n        </div>\n
        \       <div style=\"text-indent:20pt; margin-top:8pt; width:456pt; line-height:11.5pt;\">\n
        \         <font style=\"letter-spacing:0.2pt;\">The placement agent may be
        deemed to be an underwriter within the meaning of Section&#160;2(a)(11) of
        the Securities Act and any fees received by it and any profit realized on
        the sale of the securities by it while acting as principal might be deemed
        to be underwriting discounts or commissions under the Securities Act. The
        placement agent will be required to comply with the requirements of the Securities
        Act and the Exchange Act including, without limitation, Rule&#160;10b-5 and
        Regulation&#160;M under the Exchange Act. These rules and regulations may
        limit the timing of purchases and sales of our securities by the placement
