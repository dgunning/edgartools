        \       <div style=\"margin-top:12pt; text-align:center; width:456pt; line-height:15pt;font-weight:bold;font-size:14pt;\">\n
        \         <font style=\"letter-spacing:-0.28pt;\">608,197 Shares of Common
        Stock</font><font style=\"font-weight:normal;letter-spacing:0.28pt;\"> </font>\n
        \       </div>\n        <div style=\"text-indent:20pt; margin-top:3pt; width:456pt;
        line-height:10.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">We
        are offering 608,197 shares of our common stock to investors pursuant to this
        prospectus supplement and the accompanying prospectus and a securities purchase
        agreement with each investor. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:3pt; width:456pt; line-height:10.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">In
        a concurrent private placement, or the Warrant Private Placement, we are also
        selling to the investors, including our chief executive officer and certain
        principal stockholders of the Company, Series&#160;A common stock warrants,
        or Series&#160;A Warrants, and pre-funded warrants to purchase shares of common
        stock, or Pre-Funded Warrants, and together with the Series&#160;A Warrants,
        the Unregistered Warrants, to purchase up to an aggregate of 7,230,301 shares,
        or the Unregistered Warrant Shares, of our common stock. The Unregistered
        Warrants and Unregistered Warrant Shares, which we refer to collectively as
        the Unregistered Securities, are not being registered under the Securities
        Act of 1933, as amended, or the Securities Act, and are not offered pursuant
        to this prospectus supplement and the accompanying prospectus. The Unregistered
        Securities are being offered pursuant to an exemption from the registration
        requirements of the Securities Act provided in Section&#160;4(a)(2) of the
        Securities Act and/or Regulation&#160;D promulgated thereunder. The exercisability
        of the Unregistered Warrants will be subject to stockholder approval. If such
        stockholder approval is obtained, the Series&#160;A Warrants will be exercisable
        six&#160;months after issuance and will expire on the earlier of (a)&#160;subject
        to the fulfilment of certain equity conditions set forth in the securities
        purchase agreement, thirty (30) trading days after the last of certain data
        readouts to be reported by the Company, and (b)&#160;the 5-year anniversary
        of the closing date of the securities purchase agreement. The exercise price
        of the Series&#160;A Warrants will be subject to adjustment for stock splits,
        reverse splits, and similar capital transactions as described in the Series&#160;A
        Warrants. Subject to certain ownership limitations described in the Pre-Funded
        Warrants, the Pre-Funded Warrants will be exercisable after stockholder approval
        is obtained and do not expire. See &#8220;Warrant Private Placement&#8221;
        for more information. </font>\n        </div>\n        <div style=\"text-indent:20pt;
        margin-top:3pt; width:456pt; line-height:10.5pt;\">\n          <font style=\"letter-spacing:0.2pt;\">Our
        common stock is listed on the Nasdaq Capital Market under the symbol &#8220;TRAW.&#8221;
        On December&#160;27, 2024, the last reported sale price of common stock on
        the Nasdaq Capital Market was $13.42 per share. </font>\n        </div>\n
