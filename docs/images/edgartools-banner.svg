<svg width="1600" height="400" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- edgartools README banner: hex mark + "edgartools" wordmark on white -->
  <defs>
    <linearGradient id="splitBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <filter id="bannerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.6" dy="1.0" stdDeviation="0.6"
                    flood-color="#0a1a13" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Hex mark on the left, scaled 2.4× of base 64-unit viewBox -->
  <g transform="translate(20, 24) scale(2.4)">
    <path d="M32 4 L54 17 L54 43 L32 56 L10 43 L10 17 Z" fill="url(#splitBanner)" stroke="none"/>
    <line x1="10" y1="17" x2="54" y2="43" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <g filter="url(#bannerShadow)">
      <polyline points="16,25 23,32 16,39"
                stroke="white" stroke-width="2.6"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="miter"
                stroke-miterlimit="10"
                opacity="0.95"/>
      <g transform="translate(35, 30)">
        <rect x="-6" y="-8.5" width="12" height="2.6" fill="white" opacity="0.95"/>
        <rect x="-6" y="-1.3" width="8.5" height="2.6" fill="white" opacity="0.95"/>
        <rect x="-6" y="5.9" width="12" height="2.6" fill="white" opacity="0.95"/>
        <rect x="-6" y="-8.5" width="2.6" height="17" fill="white" opacity="0.95"/>
      </g>
      <rect x="29" y="42" width="12" height="2.6" fill="white" opacity="0.95"/>
    </g>
  </g>

  <!-- Wordmark "edgartools" -->
  <text x="200" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="96"
        font-weight="800"
        fill="#0f172a"
        letter-spacing="-3">edgartools</text>
</svg>
