# Company-specific configuration for concept mapping
# Override defaults for companies with special handling needs

version: "1.0.0"

# MAG7 Companies
companies:
  GOOG:
    name: "Alphabet Inc."
    cik: 1652044
    legacy_ciks: [1288776]  # Before restructuring
    notes: "Uses multiple CIKs due to corporate restructuring"

  AMZN:
    name: "Amazon.com, Inc."
    cik: 1018724

  AAPL:
    name: "Apple Inc."
    cik: 320193

  MSFT:
    name: "Microsoft Corporation"
    cik: 789019

  NVDA:
    name: "NVIDIA Corporation"
    cik: 1045810
    fiscal_year_end: "January"  # Non-calendar fiscal year

  TSLA:
    name: "Tesla, Inc."
    cik: 1318605
    notes: "Amended filings (10-K/A) may have missing XBRL data"

  META:
    name: "Meta Platforms, Inc."
    cik: 1326801
    exclude_metrics:
      - COGS  # Services company, no traditional COGS
    metric_overrides:
      Revenue:
        preferred_concept: AdvertisingRevenue
        notes: "Primary revenue is advertising"

  # Financial Services Companies - require higher validation tolerance
  JPM:
    name: "JPMorgan Chase & Co."
    cik: 19617
    industry: "financial_services"
    validation_tolerance_pct: 20.0  # 20% tolerance for financials
    exclude_metrics:
      - COGS  # Banks don't have traditional COGS
      - SGA   # Banks use different expense categories
    notes: "Financial company - uses dimensional XBRL reporting (VIEs)"

# Default settings
defaults:
  confidence_thresholds:
    tree_high: 0.95
    tree_medium: 0.80
    ai_high: 0.90
    ai_medium: 0.70
  
  # Default validation tolerance (15%)
  validation_tolerance_pct: 15.0
  
  # Industry-specific tolerance overrides
  industry_tolerances:
    financial_services: 20.0  # Banks, insurance, etc.
    technology: 15.0
    default: 15.0
  
  fallback_chain:
    - tree_parser
    - ai_semantic
    - temporal
    - manual

  filing_preferences:
    amendments: false  # Exclude amended filings by default
    forms: ["10-K", "10-Q"]
  
  # Industry-based metric exclusions
  # These metrics are structurally N/A for specific industries
  # Industry names must match get_industry_for_sic() output
  industry_exclusions:
    # Banking (SIC 6020-6029)
    banking:
      - COGS           # No cost of goods - money is the product
      - SGA            # Use Non-Interest Expense instead
      - OperatingIncome  # Use PretaxIncome (interest is primary revenue)
      - Capex          # Capital-light, loan book is the "investment"
    
    # Securities & Asset Management (SIC 6200-6289)
    securities:
      - COGS           # Fees/commissions, not products
      - SGA            # Different expense structure
      - OperatingIncome  # Use PretaxIncome
      - Capex          # Asset-light
    
    # Insurance (SIC 6300-6399)
    insurance:
      - COGS           # Premiums/claims model
      - OperatingIncome  # Underwriting income different
    
    # Investment Companies (SIC 6720-6799)
    investment_companies:
      - COGS           # AUM fees model
      - Capex          # Asset-light
    
    # Legacy: financial_services (manual fallback)
    financial_services:
      - COGS
      - SGA
      - OperatingIncome
      - Capex
    
    # Finance Services (SIC 6199) - AXP
    finance_services:
      - COGS
      - SGA
      - Capex
    
    # Business Services (SIC 7389) - V, MA (payment networks)
    business_services:
      - COGS  # Services model, no goods
