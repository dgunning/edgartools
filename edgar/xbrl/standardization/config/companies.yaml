  # Custodial Banks - NEVER fuzzy match per architect directive
  BK:
    name: "Bank of New York Mellon Corporation"
    cik: 1390777
    industry: "banking"
    bank_archetype: "custodial"
    archetype_override: true  # Prevents dynamic detection, use config archetype
    extraction_rules:
