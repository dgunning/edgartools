  # Financial Services Companies - require higher validation tolerance
  # Hybrid banks have characteristics of both commercial AND dealer banks
  JPM:
    name: "JPMorgan Chase & Co."
    cik: 19617
    industry: "banking"
    bank_archetype: "hybrid"
    archetype_override: true  # Prevents dynamic detection, use config archetype
    extraction_rules:
      # Per architect: Check nesting before subtracting
      subtract_repos_from_stb: false  # Repos are separate line items
      check_nesting: true             # Verify linkbase before subtraction
      # Dealer-like behavior for Street View
      cash_includes_ib_deposits: true
      street_debt_includes_net_repos: true
      safe_fallback: true
    validation_tolerance_pct: 20.0  # 20% tolerance for financials
    exclude_metrics:
      - COGS  # Banks don't have traditional COGS
      - SGA   # Banks use different expense categories
    street_view_notes:
      ShortTermDebt: "Hybrid: Commercial GAAP + Dealer Street View"
    notes: "Hybrid bank - commercial + significant dealer/trading operations"

  # Investment Banks (Dealer Archetype)
  GS:
    name: "Goldman Sachs Group, Inc."
    cik: 886982
    industry: "banking"
    bank_archetype: "dealer"
    archetype_override: true  # Prevents dynamic detection, use config archetype
    extraction_rules:
      use_unsecured_stb: true  # Dealers have clean UnsecuredSTB tag
      safe_fallback: true
    validation_tolerance_pct: 25.0  # Higher tolerance for methodology differences
    exclude_metrics:
      - COGS
      - SGA
    street_view_notes:
      ShortTermDebt: "Includes Net Repos (~$90B) for economic leverage view. GAAP extraction excludes Repos for yfinance validation."
