    street_view_notes:
      ShortTermDebt: "Hybrid: Commercial GAAP + Dealer Street View"
    notes: "Hybrid bank - one of the Big Four with Merrill Lynch operations."

  USB:
    name: "U.S. Bancorp"
    cik: 36104
    industry: "banking"
    bank_archetype: "commercial"
    archetype_override: true  # Prevents dynamic detection, use config archetype
    extraction_rules:
      subtract_repos_from_stb: true
