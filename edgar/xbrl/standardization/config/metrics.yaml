# Metric Definitions for Concept Mapping
# This file is the single source of truth for target metrics

version: "1.0.0"

# Target metrics with known XBRL concepts and tree hints
metrics:
  Revenue:
    description: "Total revenue from operations"
    standard_tag: "Revenue"
    known_concepts:
      # Parent total first — tree parser uses first-match-wins
      - Revenues
      # ASC 606 - Standard revenue recognition (fallback for companies without Revenues)
      - RevenueFromContractWithCustomerExcludingAssessedTax
      - SalesRevenueNet
      - Revenue
      - TotalRevenues
      - NetSales
      # ASC 944 - Insurance revenue (Archetype E)
      - PremiumsEarnedNet       # Primary insurance revenue concept
      - NetPremiumsEarned       # Alternative naming
      - PremiumsEarned          # Basic premiums concept
      - InsuranceServiceRevenue # IFRS 17 terminology
    tree_hints:
      statements: [INCOME, OPERATIONS]
      parent_pattern: OperatingIncome
      weight: 1.0
    universal: true  # Present in all MAG7

  COGS:
    description: "Cost of goods/services sold"
    standard_tag: "CostOfGoodsAndServicesSold"
    known_concepts:
      - CostOfGoodsAndServicesSold
      - CostOfRevenue
      - CostOfGoodsSold
      - CostOfSales
      - CostOfServices  # Service companies (consulting, healthcare)
    tree_hints:
      statements: [INCOME, OPERATIONS]
      parent_pattern: OperatingIncome
      weight: -1.0
    universal: false
    notes: "Services companies (META, FDX) may not have traditional COGS"

  SGA:
    description: "Selling, general, and administrative expenses"
    standard_tag: "SellingGeneralAndAdminExpenses"
    known_concepts:
      - SellingGeneralAndAdministrativeExpense
      - SellingAndMarketingExpense
      - GeneralAndAdministrativeExpense
    tree_hints:
      statements: [INCOME, OPERATIONS]
      parent_pattern: CostsAndExpenses
      weight: 1.0
    universal: false
    notes: "Often split into separate line items"

  OperatingIncome:
    description: "Income from operations"
    known_concepts:
      - OperatingIncomeLoss
      # Note: IncomeLossFromContinuingOperationsBeforeIncomeTaxes is PretaxIncome, NOT OperatingIncome
      # Removed incorrect fallbacks that were causing wrong mappings
    tree_hints:
      statements: [INCOME, OPERATIONS]
      parent_pattern: IncomeLossBeforeTax
      weight: 1.0
    universal: true

  PretaxIncome:
    description: "Income before income taxes"
    known_concepts:
      - IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
      - IncomeLossFromContinuingOperationsBeforeIncomeTaxesMinorityInterestAndIncomeLossFromEquityMethodInvestments
      - IncomeLossFromContinuingOperationsBeforeIncomeTaxes
    tree_hints:
      statements: [INCOME, OPERATIONS]
      parent_pattern: NetIncome
      weight: 1.0
    universal: true

  NetIncome:
    description: "Net income/loss"
    standard_tag: ["NetIncome", "ProfitLoss"]
    known_concepts:
      - NetIncomeLoss
      - ProfitLoss
      - NetIncome
    tree_hints:
      statements: [INCOME, OPERATIONS]
      is_root: true
    universal: true

  OperatingCashFlow:
    description: "Cash from operating activities"
    standard_tag: "NetCashFromOperatingActivities"
    known_concepts:
      - NetCashProvidedByUsedInOperatingActivities
    tree_hints:
      statements: [CASHFLOW]
      section: operating
    universal: true

  Capex:
    description: "Capital expenditures (including intangibles)"
    standard_tag: "CapitalExpenses"
    known_concepts:
      - PaymentsToAcquirePropertyPlantAndEquipment
      - PaymentsToAcquireProductiveAssets  # CVX uses this (matches yfinance exactly)
      - CapitalExpendituresIncurredButNotYetPaid
      # Expanded per architect guidance - pharma/tech need intangibles
      - PaymentsToAcquireIntangibleAssets
      - PaymentsToDevelopSoftware
      - PaymentsToAcquireOilAndGasPropertyAndEquipment  # Energy sector
      - PaymentsToAcquireOtherPropertyPlantAndEquipment # LLY uses this ($5.06B vs 5.34B yfinance)
      # Note: PaymentsToAcquireBusinessesNetOfCashAcquired removed - M&A acquisitions, not capital expenditures
    exclude_patterns:
      - Businesses          # Exclude M&A acquisitions (PaymentsToAcquireBusinesses*)
      - Acquisitions        # Exclude acquisition-related concepts
      - NetOfCash           # Exclude cash-netted M&A concepts
      - InvestmentsInAffiliates  # Exclude equity method investments
    tree_hints:
      statements: [CASHFLOW]
      section: investing
      weight: -1.0
    universal: false
    notes: "Includes intangible investments for pharma/tech. Energy uses PaymentsToAcquireProductiveAssets. Excludes M&A acquisitions."

  TotalAssets:
    description: "Total assets"
    known_concepts:
      - Assets
      - TotalAssets
    tree_hints:
      statements: [BALANCE, FINANCIAL_POSITION]
      is_root: true
    universal: true

  Goodwill:
    description: "Goodwill from acquisitions"
    standard_tag: "Goodwill"
    known_concepts:
      - Goodwill
    exclude_patterns:
      - IncludingGoodwill    # Blocks IntangibleAssetsNetIncludingGoodwill
      - Impaired             # Blocks GoodwillImpairedAccumulatedImpairmentLoss
      - Gross                # Blocks GoodwillGross
    tree_hints:
      statements: [BALANCE]
      section: assets
    universal: true

  IntangibleAssets:
    description: "Goodwill and other intangible assets (matches yfinance)"
    # Composite metric: sum of Goodwill + IntangibleAssetsNetExcludingGoodwill
    # yfinance field: "Goodwill And Other Intangible Assets"
    composite: true
    components:
      - Goodwill
      - IntangibleAssetsNetExcludingGoodwill
      - IndefiniteLivedTrademarks  # KO uses this instead of IntangibleAssetsNet
    known_concepts:
      - Goodwill
      - IntangibleAssetsNetExcludingGoodwill
      - IndefiniteLivedTrademarks  # KO uses this
      - FiniteLivedIntangibleAssetsNet
      - IndefiniteLivedIntangibleAssetsExcludingGoodwill
    tree_hints:
      statements: [BALANCE]
      section: assets
    universal: true
    notes: "Sum of Goodwill + IntangibleAssetsNet to match yfinance. KO uses IndefiniteLivedTrademarks."

  ShortTermDebt:
    description: "Short-term borrowings and current debt (matches yfinance Current Debt)"
    # Composite metric: yfinance includes all current debt obligations
    # Common components: LongTermDebtCurrent + CommercialPaper + ShortTermBorrowings
    composite: true
    components:
      - LongTermDebtCurrent
      - CommercialPaper
      - ShortTermBorrowings
    known_concepts:
      - DebtCurrent  # "Total" concept - Preferred over components if available
      - ShortTermDebt  # "Total" concept
      - ShortTermDebtAndCapitalLeaseObligationsCurrent
      - LongTermDebtCurrent
      - CommercialPaper
      - ShortTermBorrowings
    # Dimensional handling: include dimensional values for CommercialPaper
    # JPM reports CommercialPaper ONLY with dimensions (VIE)
    dimensional_handling:
      mode: "include_dimensional"  # Include dimensional values when no non-dim total exists
      # Note: This allows extraction of values that exist only with dimensions
      # like JPM's CommercialPaper reported under "Beneficial interests issued by consolidated VIEs"
    tree_hints:
      statements: [BALANCE]
      section: liabilities_current
    universal: false
    notes: "yfinance 'Current Debt' sums multiple short-term debt types"

  LongTermDebt:
    description: "Long-term debt (non-current portion)"
    standard_tag: "LongTermDebt"
    known_concepts:
      - LongTermDebtNoncurrent
      - LongTermDebt
      - LongTermDebtAndCapitalLeaseObligations
    tree_hints:
      statements: [BALANCE]
      section: liabilities_noncurrent
    universal: true
    notes: "LongTermDebtNoncurrent preferred (excludes current portion)"

  CashAndEquivalents:
    description: "Cash and cash equivalents"
    standard_tag: "CashAndCashEquivalents"
    known_concepts:
      - CashAndCashEquivalentsAtCarryingValue
      - CashAndCashEquivalents
      - Cash
    tree_hints:
      statements: [BALANCE, CASHFLOW]
      section: assets_current
    universal: true

  # === UNIVERSAL ADDITIONS ===

  WeightedAverageSharesDiluted:
    description: "Weighted average diluted shares outstanding for EPS calculation"
    standard_tag: "SharesFullyDilutedAverage"
    known_concepts:
      - WeightedAverageNumberOfDilutedSharesOutstanding
      - WeightedAverageNumberOfSharesOutstandingDiluted
    tree_hints:
      statements: [INCOME]
    universal: true
    notes: "Essential for per-share valuation metrics"

  StockBasedCompensation:
    description: "Stock-based compensation expense (non-cash)"
    known_concepts:
      - ShareBasedCompensation
      - AllocatedShareBasedCompensationExpense
      - StockCompensationExpense
    tree_hints:
      statements: [CASHFLOW]
      section: operating
    universal: false
    notes: "Critical for calculating 'Real' Free Cash Flow"

  DividendsPaid:
    description: "Cash dividends paid to shareholders"
    standard_tag: "CommonDividendsPaid"
    known_concepts:
      - PaymentsOfDividends
      - PaymentsOfDividendsCommonStock
      - DividendsPaidCommonStock
    tree_hints:
      statements: [CASHFLOW]
      section: financing
      weight: -1.0
    universal: false
    notes: "For total shareholder return and payout ratio analysis"

  # === ARCHETYPE A: WORKING CAPITAL ===

  Inventory:
    description: "Current inventory on hand"
    standard_tag: "Inventories"
    known_concepts:
      - InventoryNet
      - Inventories
      - InventoryFinishedGoods
    tree_hints:
      statements: [BALANCE]
      section: assets_current
    universal: false
    notes: "Not applicable to service companies"

  AccountsReceivable:
    description: "Trade accounts receivable (current)"
    standard_tag: "TradeReceivables"
    known_concepts:
      - AccountsReceivableNetCurrent
      - ReceivablesNetCurrent
      - TradeAccountsReceivable
    tree_hints:
      statements: [BALANCE]
      section: assets_current
    universal: false
    notes: "Rising AR faster than revenue may signal quality issues"

  AccountsPayable:
    description: "Trade accounts payable (current)"
    standard_tag: "TradePayables"
    known_concepts:
      - AccountsPayableCurrent
      - AccountsPayableTradeCurrent
      - TradeAndOtherPayablesCurrent
      - AccountsPayableAndAccruedLiabilitiesCurrent
    exclude_patterns:
      - Liabilities  # Prevent fallback to total Liabilities or LiabilitiesCurrent
    tree_hints:
      statements: [BALANCE]
      section: liabilities_current
    universal: false
    notes: "High AP indicates supplier leverage"

  DepreciationAmortization:
    description: "Depreciation and amortization expense"
    standard_tag: "DepreciationExpense"
    known_concepts:
      - DepreciationDepletionAndAmortization
      - DepreciationAndAmortization
      - DepreciationAmortizationAndAccretionNet  # GE, RTX, WMT use this variant
      - Depreciation
    exclude_patterns:
      - Accumulated  # Prevent matching AccumulatedDepreciation (balance sheet cumulative)
    tree_hints:
      statements: [CASHFLOW]
      section: operating
    universal: true
    notes: "Required for EBITDA calculation and maintenance capex analysis"

# Derived metrics (calculated from above)
derived_metrics:
  FreeCashFlow:
    formula: "OperatingCashFlow - Capex"
    requires: [OperatingCashFlow, Capex]

  TangibleAssets:
    formula: "TotalAssets - Goodwill - IntangibleAssets"
    requires: [TotalAssets, Goodwill, IntangibleAssets]

  NetDebt:
    formula: "ShortTermDebt + LongTermDebt - CashAndEquivalents"
    requires: [ShortTermDebt, LongTermDebt, CashAndEquivalents]
