version: 1.0.0
metrics:
  Revenue:
    description: Total revenue from operations
    standard_tag: Revenue
    known_concepts:
    - Revenues
    - RevenueFromContractWithCustomerExcludingAssessedTax
    - SalesRevenueNet
    - Revenue
    - TotalRevenues
    - NetSales
    - PremiumsEarnedNet
    - NetPremiumsEarned
    - PremiumsEarned
    - InsuranceServiceRevenue
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: OperatingIncome
      weight: 1.0
    universal: true
    standardization:
      company_overrides:
        MS:
          components:
          - InterestExpenseOperating
          - TradingGainsLosses
          - ms:AssetManagementFees
          notes: Auto-solver company-specific via MS, 0/0 periods, 0/3 companies
        AXP:
          components:
          - NoninterestIncome
          - EarningsPerShareDiluted
          - RevenuesNetOfInterestExpense
          notes: Auto-solver company-specific via AXP, 0/0 periods, 0/3 companies
  COGS:
    description: Cost of goods/services sold
    standard_tag: CostOfGoodsAndServicesSold
    known_concepts:
    - CostOfGoodsAndServicesSold
    - CostOfRevenue
    - CostOfGoodsSold
    - CostOfSales
    - CostOfServices
    - CrudeOilAndProductPurchases
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: OperatingIncome
      weight: -1.0
    universal: false
    notes: Services companies (META, FDX) may not have traditional COGS
    standardization:
      company_overrides:
        DE:
          components:
          - CostOfRevenue
          - CommonStockDividendsPerShareCashPaid
          notes: Auto-solver company-specific via DE, 0/0 periods, 0/3 companies
        GE:
          components:
          - CostsAndExpenses
          - IncomeLossFromContinuingOperationsIncludingPortionAttributableToNoncontrollingInterest
          notes: Auto-solver company-specific via GE, 0/0 periods, 0/3 companies
        RTX:
          components:
          - CostsAndExpenses
          - IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
          notes: Auto-solver company-specific via RTX, 0/0 periods, 0/3 companies
  SGA:
    description: Selling, general, and administrative expenses
    standard_tag: SellingGeneralAndAdminExpenses
    known_concepts:
    - SellingGeneralAndAdministrativeExpense
    - SellingAndMarketingExpense
    - GeneralAndAdministrativeExpense
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: CostsAndExpenses
      weight: 1.0
    universal: false
    notes: Often split into separate line items
  OperatingIncome:
    description: Income from operations
    known_concepts:
    - OperatingIncomeLoss
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: IncomeLossBeforeTax
      weight: 1.0
    universal: true
    standardization:
      company_overrides:
        DIS:
          components:
          - IncomeLossFromContinuingOperationsAttributableToNoncontrollingEntity
          - IncomeTaxExpenseBenefit
          - ProfitLoss
          notes: Auto-solver company-specific via DIS, 0/0 periods, 0/3 companies
        PLD:
          components:
          - OperatingIncomeLoss
          notes: Auto-solver company-specific via PLD, 2/3 periods, 0/3 companies
  PretaxIncome:
    description: Income before income taxes
    known_concepts:
    - IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
    - IncomeLossFromContinuingOperationsBeforeIncomeTaxesMinorityInterestAndIncomeLossFromEquityMethodInvestments
    - IncomeLossFromContinuingOperationsBeforeIncomeTaxes
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: NetIncome
      weight: 1.0
    universal: true
  NetIncome:
    description: Net income/loss
    standard_tag:
    - NetIncome
    - ProfitLoss
    known_concepts:
    - NetIncomeLoss
    - ProfitLoss
    - NetIncome
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      is_root: true
    universal: true
  OperatingCashFlow:
    description: Cash from operating activities
    standard_tag: NetCashFromOperatingActivities
    known_concepts:
    - NetCashProvidedByUsedInOperatingActivities
    tree_hints:
      statements:
      - CASHFLOW
      section: operating
    universal: true
  Capex:
    description: Capital expenditures (including intangibles)
    standard_tag: CapitalExpenses
    sign_convention: negate
    validation_tolerance: 40
    known_concepts:
    - PaymentsToAcquirePropertyPlantAndEquipment
    - PaymentsToAcquireProductiveAssets
    - CapitalExpendituresIncurredButNotYetPaid
    - PaymentsToAcquireIntangibleAssets
    - PaymentsToDevelopSoftware
    - PaymentsToAcquireOilAndGasPropertyAndEquipment
    - PaymentsToAcquireOtherPropertyPlantAndEquipment
    - PaymentsForCapitalImprovements
    - CapitalExpenditures
    - CapitalExpensesNet
    - CapitalExpensesGross
    - CapitalExpensesTotal
    - CapitalExpensesCurrent
    - CapitalExpensesNoncurrent
    - TotalCapitalExpenses
    - NetCapitalExpenses
    exclude_patterns:
    - Businesses
    - Acquisitions
    - NetOfCash
    - InvestmentsInAffiliates
    tree_hints:
      statements:
      - CASHFLOW
      section: investing
      weight: -1.0
    universal: false
    notes: Includes intangible investments for pharma/tech. Energy uses PaymentsToAcquireProductiveAssets.
      Excludes M&A acquisitions.
    standardization:
      company_overrides:
        CAT:
          components:
          - PaymentsToAcquireEquipmentOnLease
          - ProceedsFromSaleOfFinanceReceivables
          - PaymentsOfDividendsCommonStock
          notes: Auto-solver company-specific via CAT, 2/3 periods, 0/3 companies
        SLB:
          components:
          - ProceedsFromSaleOfEquityMethodInvestments
          - PaymentsOfDividends
          notes: Auto-solver company-specific via SLB, 1/1 periods, 0/3 companies
        SNOW:
          components:
          - ProceedsFromStockOptionsExercised
          - PaymentsOfDebtIssuanceCosts
          notes: Auto-solver company-specific via SNOW, 1/1 periods, 0/3 companies
        CMCSA:
          components:
          - PaymentsToAcquirePropertyPlantAndEquipment
          - DeferredIncomeTaxExpenseBenefit
          notes: Auto-solver company-specific via CMCSA, 2/3 periods, 1/3 companies
        RTX:
          components:
          - PaymentsToAcquirePropertyPlantAndEquipment
          - PaymentsToAcquireIntangibleAssets
          notes: Auto-solver company-specific via RTX, 3/3 periods, 0/3 companies
        TMUS:
          components:
          - PaymentsToAcquirePropertyPlantAndEquipment
          - PaymentsToAcquireIntangibleAssets
          notes: Auto-solver company-specific via TMUS, 2/3 periods, 0/3 companies
        REGN:
          components:
          - IncreaseDecreaseInAccountsPayableAndAccruedLiabilities
          - AdjustmentsToReconcileNetIncomeLossToCashProvidedByUsedInOperatingActivities
          notes: Auto-solver company-specific via REGN, 2/3 periods, 0/3 companies
        NEE:
          components:
          - CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalentsPeriodIncreaseDecreaseIncludingExchangeRateEffect
          - CapitalExpendituresIncurredButNotYetPaid
          notes: Auto-solver company-specific via NEE, 2/3 periods, 0/3 companies
  TotalAssets:
    description: Total assets
    known_concepts:
    - Assets
    - TotalAssets
    tree_hints:
      statements:
      - BALANCE
      - FINANCIAL_POSITION
      is_root: true
    universal: true
  Goodwill:
    description: Goodwill from acquisitions
    standard_tag: Goodwill
    known_concepts:
    - Goodwill
    exclude_patterns:
    - IncludingGoodwill
    - Impaired
    - Gross
    tree_hints:
      statements:
      - BALANCE
      section: assets
    universal: true
  IntangibleAssets:
    description: Goodwill and other intangible assets (matches yfinance)
    validation_tolerance: 25
    composite: true
    components:
    - Goodwill
    - IntangibleAssetsNetExcludingGoodwill
    - IndefiniteLivedTrademarks
    known_concepts:
    - Goodwill
    - IntangibleAssetsNetExcludingGoodwill
    - IndefiniteLivedTrademarks
    - FiniteLivedIntangibleAssetsNet
    - IndefiniteLivedIntangibleAssetsExcludingGoodwill
    - OtherIntangibleAssetsNet
    tree_hints:
      statements:
      - BALANCE
      section: assets
    universal: true
    notes: Sum of Goodwill + IntangibleAssetsNet to match yfinance. KO uses IndefiniteLivedTrademarks.
    standardization:
      company_overrides:
        JPM:
          components:
          - jpm:GoodwillServicingAssetsAtFairValueAndOtherIntangibleAssets
          notes: Auto-solver company-specific via JPM, 1/1 periods, 0/3 companies
        LMT:
          components:
          - OtherAssetsCurrent
          - ContractWithCustomerAssetNetCurrent
          - IntangibleAssetsNetExcludingGoodwill
          notes: Auto-solver company-specific via LMT, 3/3 periods, 0/3 companies
        CME:
          components:
          - OtherAssetsNoncurrent
          - OtherIndefiniteLivedIntangibleAssets
          - Goodwill
          notes: Auto-solver company-specific via CME, 3/3 periods, 0/3 companies
        T:
          components:
          - CommonStockValue
          - PropertyPlantAndEquipmentAndFinanceLeaseRightOfUseAssetAfterAccumulatedDepreciationAndAmortization
          - DeferredIncomeTaxLiabilitiesNet
          notes: Auto-solver company-specific via T, 3/3 periods, 0/3 companies
  ShortTermDebt:
    description: Short-term borrowings and current debt (matches yfinance Current
      Debt)
    composite: true
    components:
    - LongTermDebtCurrent
    - CommercialPaper
    - ShortTermBorrowings
    known_concepts:
    - DebtCurrent
    - ShortTermDebt
    - ShortTermDebtAndCapitalLeaseObligationsCurrent
    - LongTermDebtCurrent
    - CommercialPaper
    - ShortTermBorrowings
    - NotesPayable
    - CurrentPortionOfLongTermDebt
    - OtherShortTermBorrowings
    - ShortTermBankLoansAndNotesPayable
    dimensional_handling:
      mode: include_dimensional
    tree_hints:
      statements:
      - BALANCE
      section: liabilities_current
    universal: false
    notes: yfinance 'Current Debt' sums multiple short-term debt types
    standardization:
      company_overrides:
        MS:
          components:
          - CapitalAccumulationPlans
          - AccumulatedOtherComprehensiveIncomeLossNetOfTax
          - StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest
          notes: Auto-solver company-specific via MS, 3/3 periods, 0/3 companies
        LOW:
          components:
          - CashAndCashEquivalentsAtCarryingValue
          - OtherAssetsCurrent
          notes: Auto-solver company-specific via LOW, 2/3 periods, 0/3 companies
  LongTermDebt:
    description: Long-term debt (non-current portion)
    standard_tag: LongTermDebt
    known_concepts:
    - LongTermDebtNoncurrent
    - LongTermDebt
    - LongTermDebtAndCapitalLeaseObligations
    tree_hints:
      statements:
      - BALANCE
      section: liabilities_noncurrent
    universal: true
    notes: LongTermDebtNoncurrent preferred (excludes current portion)
    standardization:
      company_overrides:
        JPM:
          components:
          - DebtSecuritiesAvailableForSaleExcludingAccruedInterest
          - FederalFundsPurchasedAndSecuritiesSoldUnderAgreementsToRepurchase
          notes: Auto-solver company-specific via JPM, 0/0 periods, 0/3 companies
        DE:
          components:
          - MinorityInterest
          - de:LongTermDebtAndFinanceLeasesNoncurrent
          notes: Auto-solver company-specific via DE, 0/0 periods, 0/3 companies
        CAT:
          components:
          - OtherAssetsNoncurrent
          - LiabilitiesCurrent
          notes: Auto-solver company-specific via CAT, 0/0 periods, 0/3 companies
  CashAndEquivalents:
    description: Cash and cash equivalents
    standard_tag: CashAndCashEquivalents
    known_concepts:
    - CashAndCashEquivalentsAtCarryingValue
    - CashAndCashEquivalents
    - Cash
    - CashAndDueFromBanks
    - CashAndCashEquivalentsNet
    - CashAndCashEquivalentsGross
    - CashAndCashEquivalentsTotal
    - CashAndCashEquivalentsCurrent
    - CashAndCashEquivalentsNoncurrent
    - TotalCashAndCashEquivalents
    - NetCashAndCashEquivalents
    - CashCashEquivalentsAndShortTermInvestments
    - CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents
    tree_hints:
      statements:
      - BALANCE
      - CASHFLOW
      section: assets_current
    universal: true
    standardization:
      company_overrides:
        MS:
          components:
          - OtherAssets
          - CapitalAccumulationPlans
          - TreasuryStockValue
          - LoansReceivableHeldForSaleNetNotPartOfDisposalGroup
          notes: Auto-solver company-specific via MS, 3/3 periods, 0/3 companies
        AXP:
          components:
          - CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents
          notes: Auto-solver company-specific via AXP, 2/3 periods, 0/3 companies
  WeightedAverageSharesDiluted:
    description: Weighted average diluted shares outstanding for EPS calculation
    standard_tag: SharesFullyDilutedAverage
    validation_tolerance: 15
    known_concepts:
    - WeightedAverageNumberOfDilutedSharesOutstanding
    - WeightedAverageNumberOfSharesOutstandingDiluted
    - WeightedAverageNumberOfShareOutstandingBasicAndDiluted
    tree_hints:
      statements:
      - INCOME
    universal: true
    notes: Essential for per-share valuation metrics
    standardization:
      company_overrides:
        V:
          components:
          - GeneralAndAdministrativeExpense
          - IncomeTaxExpenseBenefit
          notes: Auto-solver company-specific via V, 0/0 periods, 0/3 companies
  StockBasedCompensation:
    description: Stock-based compensation expense (non-cash)
    validation_tolerance: 20
    known_concepts:
    - ShareBasedCompensation
    - AllocatedShareBasedCompensationExpense
    - StockCompensationExpense
    - StockBasedCompensationNet
    - ShareBasedCompensationIncludingDiscontinuedOperations
    tree_hints:
      statements:
      - CASHFLOW
      section: operating
    universal: false
    notes: Critical for calculating 'Real' Free Cash Flow
  DividendsPaid:
    description: Cash dividends paid to shareholders
    standard_tag: CommonDividendsPaid
    sign_convention: negate
    known_concepts:
    - PaymentsOfDividends
    - PaymentsOfDividendsCommonStock
    - DividendsPaidCommonStock
    tree_hints:
      statements:
      - CASHFLOW
      section: financing
      weight: -1.0
    universal: false
    notes: For total shareholder return and payout ratio analysis
    standardization:
      company_overrides:
        GE:
          components:
          - IncreaseDecreaseInReceivables
          - ge:PaymentsForProceedsFromMarketableSecurities
          notes: Auto-solver company-specific via GE, 0/0 periods, 0/3 companies
  Inventory:
    description: Current inventory on hand
    standard_tag: Inventories
    known_concepts:
    - InventoryNet
    - Inventories
    - InventoryFinishedGoods
    tree_hints:
      statements:
      - BALANCE
      section: assets_current
    universal: false
    notes: Not applicable to service companies
    standardization:
      company_overrides:
        XOM:
          components:
          - InventoryPartsAndComponentsNetOfReserves
          - EnergyRelatedInventory
          notes: Auto-solver company-specific via XOM, 2/3 periods
  AccountsReceivable:
    description: Trade accounts receivable (current)
    standard_tag: TradeReceivables
    validation_tolerance: 25
    known_concepts:
    - AccountsReceivableNetCurrent
    - ReceivablesNetCurrent
    - TradeAccountsReceivable
    - AccountsReceivableNet
    - AccountsNotesAndLoansReceivableNetCurrent
    - AccountsAndOtherReceivablesNetCurrent
    - NotesAndAccountsReceivableNet
    - TradeReceivablesNet
    - TradeReceivablesGross
    - TradeReceivablesTotal
    - TradeReceivablesCurrent
    - TradeReceivablesNoncurrent
    - TotalTradeReceivables
    - NetTradeReceivables
    tree_hints:
      statements:
      - BALANCE
      section: assets_current
    universal: false
    notes: Rising AR faster than revenue may signal quality issues
    standardization:
      company_overrides:
        PEP:
          components:
          - ShortTermInvestments
          - EquityMethodInvestments
          - DebtCurrent
          notes: Auto-solver company-specific via PEP, 2/3 periods
        CAT:
          components:
          - LiabilitiesCurrent
          - PropertyPlantAndEquipmentNet
          notes: Auto-solver company-specific via CAT, 0/0 periods, 0/3 companies
        GE:
          components:
          - ContractWithCustomerLiabilityCurrent
          - ContractWithCustomerLiabilityNoncurrent
          notes: Auto-solver company-specific via GE, 0/0 periods, 0/3 companies
  AccountsPayable:
    description: Trade accounts payable (current)
    standard_tag: TradePayables
    known_concepts:
    - AccountsPayableCurrent
    - AccountsPayableTradeCurrent
    - TradeAndOtherPayablesCurrent
    - AccountsPayableAndAccruedLiabilitiesCurrent
    - AccountsPayableAndAccruedLiabilities
    exclude_patterns:
    - Liabilities
    tree_hints:
      statements:
      - BALANCE
      section: liabilities_current
    universal: false
    notes: High AP indicates supplier leverage
    standardization:
      company_overrides:
        DE:
          components:
          - RedeemableNoncontrollingInterestEquityCarryingAmount
          - AccumulatedOtherComprehensiveIncomeLossNetOfTax
          notes: Auto-solver company-specific via DE, 0/0 periods, 0/3 companies
  DepreciationAmortization:
    description: Depreciation and amortization expense
    standard_tag: DepreciationExpense
    validation_tolerance: 30
    composite: true
    components:
    - Depreciation
    - AmortizationOfIntangibleAssets
    known_concepts:
    - DepreciationDepletionAndAmortization
    - DepreciationAndAmortization
    - DepreciationAmortizationAndAccretionNet
    - Depreciation
    - DepreciationAmortizationAndOther
    - DepreciationExpenseNet
    - DepreciationExpenseGross
    - DepreciationExpenseTotal
    - DepreciationExpenseCurrent
    - DepreciationExpenseNoncurrent
    - TotalDepreciationExpense
    - NetDepreciationExpense
    - AmortizationOfIntangibleAssets
    - DepreciationNonproduction
    exclude_patterns:
    - Accumulated
    tree_hints:
      statements:
      - CASHFLOW
      section: operating
    universal: true
    notes: Required for EBITDA calculation and maintenance capex analysis. Pharma/medical
      companies often split into Depreciation + AmortizationOfIntangibleAssets.
    standardization:
      company_overrides:
        SLB:
          components:
          - IncreaseDecreaseInAccountsPayableAndAccruedLiabilities
          - CashAcquiredFromAcquisition
          - NetCashProvidedByUsedInInvestingActivities
          notes: Auto-solver company-specific via SLB, 1/1 periods
        AON:
          components:
          - ProceedsFromSaleAndMaturityOfOtherInvestments
          - PaymentsOfDividendsCommonStock
          notes: Auto-solver company-specific via AON, 1/1 periods, 0/3 companies
        UPS:
          components:
          - IncreaseDecreaseInOtherOperatingCapitalNet
          - PaymentsToAcquirePropertyPlantAndEquipment
          notes: Auto-solver company-specific via UPS, 2/3 periods, 0/3 companies
        PEP:
          components:
          - RepaymentsOfLongTermDebt
          - ProceedsFromStockOptionsExercised
          notes: Auto-solver company-specific via PEP, 2/3 periods, 0/3 companies
        MSFT:
          components:
          - IncreaseDecreaseInOtherNoncurrentAssets
          - PaymentsOfDividendsCommonStock
          - DeferredIncomeTaxExpenseBenefit
          notes: Auto-solver company-specific via MSFT, 2/3 periods, 0/3 companies
        CME:
          components:
          - ShareBasedCompensation
          - AmortizationOfIntangibleAssets
          - PaymentsToAcquireAvailableForSaleSecuritiesDebt
          - RestrictedCashAndCashEquivalentsAtCarryingValue
          notes: Auto-solver company-specific via CME, 3/3 periods, 0/3 companies
  GrossProfit:
    description: Revenue minus cost of goods sold
    standard_tag: GrossProfit
    known_concepts:
    - GrossProfit
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
      parent_pattern: OperatingIncome
      weight: 1.0
    universal: false
    notes: Not applicable to services companies or banks
    standardization:
      company_overrides:
        ICE:
          components:
          - OperatingIncomeLoss
          - ice:IncreaseDecreaseMarginDepositsAndGuarantyFunds
          notes: Auto-solver company-specific via ICE, 2/2 periods, 0/3 companies
        NSC:
          components:
          - IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
          - InterestExpenseNonoperating
          notes: Auto-solver company-specific via NSC, 1/1 periods, 0/3 companies
        PLD:
          components:
          - pld:OperatingExpensesBeforeGainsOnRealEstateTransactionsNet
          - ProceedsFromSaleOfRealEstateHeldforinvestment
          notes: Auto-solver company-specific via PLD, 3/3 periods, 0/3 companies
        EQIX:
          components:
          - NetCashProvidedByUsedInOperatingActivities
          - OtherComprehensiveIncomeLossForeignCurrencyTransactionAndTranslationAdjustmentBeforeTax
          notes: Auto-solver company-specific via EQIX, 1/1 periods, 0/3 companies
        DE:
          components:
          - ProceedsFromDebtMaturingInMoreThanThreeMonths
          - InterestExpense
          notes: Auto-solver company-specific via DE, 2/3 periods, 0/3 companies
        UPS:
          components:
          - OtherCostAndExpenseOperating
          - OperatingIncomeLoss
          notes: Auto-solver company-specific via UPS, 2/3 periods, 0/3 companies
        COP:
          components:
          - IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
          - TaxesExcludingIncomeAndExciseTaxes
          notes: Auto-solver company-specific via COP, 2/3 periods, 0/3 companies
        NEE:
          components:
          - nee:IndependentPowerInvestments
          - nee:IncomeAssociatedWithDifferentialMembershipInterests
          notes: Auto-solver company-specific via NEE, 3/3 periods, 0/3 companies
        NFLX:
          components:
          - CostOfRevenue
          - CurrentIncomeTaxExpenseBenefit
          notes: Auto-solver company-specific via NFLX, 3/3 periods, 0/3 companies
        V:
          components:
          - RevenueFromContractWithCustomerExcludingAssessedTax
          - IncomeLossFromContinuingOperationsBeforeIncomeTaxesDomestic
          notes: Auto-solver company-specific via V, 2/3 periods, 0/3 companies
        META:
          components:
          - RevenueFromContractWithCustomerExcludingAssessedTax
          - ProceedsFromIssuanceOfLongTermDebt
          notes: Auto-solver company-specific via META, 0/0 periods, 0/3 companies
        LLY:
          components:
          - Revenues
          - CurrentIncomeTaxExpenseBenefit
          notes: Auto-solver company-specific via LLY, 0/0 periods, 0/3 companies
        ABBV:
          components:
          - abbv:OperatingLossCarryforwardsWithExpiration
          - BusinessAcquisitionsProFormaNetIncomeLoss
          notes: Auto-solver company-specific via ABBV, 2/2 periods, 0/3 companies
        MRK:
          components:
          - mrk:CostsExpensesAndOther
          - mrk:SegmentReportingUnallocatedOtherExpensesNet
          notes: Auto-solver company-specific via MRK, 2/2 periods, 0/3 companies
        AMZN:
          components:
          - CostOfGoodsAndServicesSold
          - PaymentsToAcquireProductiveAssets
          notes: Auto-solver company-specific via AMZN, 2/3 periods, 0/3 companies
        SLB:
          components:
          - NetCashProvidedByUsedInOperatingActivities
          notes: Auto-solver company-specific via SLB, 3/3 periods, 0/3 companies
        GOOG:
          components:
          - CostsAndExpenses
          - IncomeTaxReconciliationIncomeTaxExpenseBenefitAtFederalStatutoryIncomeTaxRate
          notes: Auto-solver company-specific via GOOG, 1/1 periods, 0/3 companies
        PG:
          components:
          - Revenues
          - ProceedsFromRepaymentsOfShortTermDebtMaturingInThreeMonthsOrLess
          notes: Auto-solver company-specific via PG, 3/3 periods, 0/3 companies
        CAT:
          components:
          - PaymentsToAcquireFinanceReceivables
          - OtherAssetsNoncurrent
          notes: Auto-solver company-specific via CAT, 3/3 periods, 0/3 companies
        GE:
          components:
          - CostOfGoodsAndServicesSold
          - ProceedsFromSaleAndMaturityOfMarketableSecurities
          notes: Auto-solver company-specific via GE, 2/3 periods, 0/3 companies
        RTX:
          components:
          - rtx:ContractWithCustomerAssetProgressPaymentsOffsetCurrent
          notes: Auto-solver company-specific via RTX, 1/1 periods, 0/3 companies
        T:
          components:
          - t:SegmentReportingInformationOperationsAndSupportExpenses
          - AssetAcquisitionPriceOfAcquisitionExpected
          notes: Auto-solver company-specific via T, 1/1 periods, 0/3 companies
      default:
        components:
        - concept: Revenues
          weight: 1.0
        - concept: CostOfGoodsAndServicesSold
          weight: -1.0
        notes: GrossProfit = Revenue - COGS (signed formula)
  ResearchAndDevelopment:
    description: Research and development expense
    standard_tag: ResearchAndDevelopmentExpense
    known_concepts:
    - ResearchAndDevelopmentExpense
    - ResearchAndDevelopmentExpenseExcludingAcquiredInProcessCost
    - ResearchAndDevelopmentExpenseSoftwareExcludingAcquiredInProcessCost
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
    universal: false
    notes: Not all companies have R&D
    validation_tolerance: 20
  InterestExpense:
    description: Interest expense on debt
    standard_tag: InterestExpense
    known_concepts:
    - InterestExpense
    - InterestExpenseDebt
    - InterestAndDebtExpense
    tree_hints:
      statements:
      - INCOME
      - OPERATIONS
    universal: true
    validation_tolerance: 25
    standardization:
      company_overrides:
        JPM:
