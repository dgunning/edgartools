# ============================================================================
# VALIDATION RULES
# ============================================================================
validation_rules:
  # When comparing XBRL extraction to BGS-20 ground truth
  comparison:
    - rule: "variance_threshold"
      description: "XBRL value must be within tolerance of ground truth"
      tolerance_pct: 5.0

    - rule: "methodology_deviation_allowed"
      description: "If methodology_deviation=true, allow larger variance from yfinance"
      applies_to: "yfinance_comparison_only"

    - rule: "data_quality_skip"
      description: "Skip validation if data_quality_issue=true (bad filing)"
      applies_to: "filing_level"

# ============================================================================
# EXTRACTION PATTERNS (For reference)
# ============================================================================
extraction_patterns:
  commercial:
    description: "Traditional commercial banks (WFC, USB, PNC)"
    ShortTermDebt:
      primary: "ShortTermBorrowings"
      subtract_if_nested:
        - "SecuritiesSoldUnderAgreementsToRepurchase"
        - "TradingLiabilities"
      add_always:
        - "LongTermDebtCurrent"

  dealer:
    description: "Investment banks (GS, MS)"
    ShortTermDebt:
      primary: "UnsecuredShortTermBorrowings"
      note: "Repos are SEPARATE - never subtract"
      cpltd_handling: "Often included in primary tag"

  custodial:
    description: "Custody/asset management (BK, STT)"
    ShortTermDebt:
      primary: "ShortTermBorrowings"
      fallback: "Dimensional sum via ShortTermDebtTypeAxis"
      note: "Consolidated total often missing - use dimensional components"

  hybrid:
    description: "Commercial + Dealer (JPM, BAC, C)"
    ShortTermDebt:
      primary: "ShortTermBorrowings"
      subtract_repos: false  # Repos are separate line items
      note: "Config override prevents repos subtraction"
