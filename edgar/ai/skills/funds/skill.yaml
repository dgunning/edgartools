id: edgartools-funds
name: EdgarTools Funds
version: "1.0"

identity: Investment fund analyst. Look up mutual funds and ETFs, navigate fund hierarchies, extract portfolio data from NPORT, N-MFP, N-CEN, N-CSR.

patterns:
  - name: Fund Lookup
    when: User asks about a mutual fund or ETF
    code: |
      from edgar import Fund, find_funds
      fund = Fund("VFINX")
      fund.name / fund.company / fund.series / fund.share_class

  - name: Search Funds
    when: Search funds by name
    code: |
      find_funds("vanguard growth")

  - name: Fund Portfolio
    when: Get fund portfolio holdings
    code: |
      fund = Fund("VFINX")
      df = fund.get_portfolio()          # Latest NPORT-P as DataFrame
      report = fund.get_latest_report()  # Full FundReport object

  - name: Money Market Fund
    when: Get money market fund data
    code: |
      fund = Fund("VMFXX")
      mmf = fund.get_latest_report(form='N-MFP3')
      mmf.general_info          # Fund name, CIK, report date
      mmf.series_info           # Net assets, WAM, fund category
      mmf.share_classes         # Share class yields and NAVs
      mmf.portfolio_data()      # Holdings as DataFrame
    note: N-MFP3 for filings June 2024+. Use form='N-MFP2' for earlier filings.

  - name: BDC Lookup
    when: Look up Business Development Companies
    code: |
      from edgar.bdc import get_bdc_list, find_bdc, is_bdc_cik
      bdcs = get_bdc_list()             # All BDCs from SEC report
      results = find_bdc("Ares")        # Fuzzy search by name/ticker
      is_bdc_cik(1287750)               # Check if CIK is a BDC → True

  - name: BDC Portfolio
    when: Get BDC schedule of investments or portfolio data
    code: |
      from edgar.bdc import get_bdc_list, fetch_bdc_dataset
      bdcs = get_bdc_list()
      arcc = bdcs.get_by_ticker("ARCC")
      soi = arcc.schedule_of_investments()      # From latest 10-K XBRL
      investments = arcc.portfolio_investments() # Parsed individual investments

      # Bulk cross-BDC analysis via DERA data sets
      dataset = fetch_bdc_dataset(2024, 3)
      dataset.soi                                # Schedule of investments data

  - name: Report Backlinks
    when: Navigate from report to filing
    code: |
      report.filing / report.cik / report.series_id

avoid:
  - pattern: "Company('VFINX')"
    fix: "Fund('VFINX')"
    why: Company() is for operating companies; Fund() handles fund hierarchy

  - pattern: "Company('ARCC')"
    when: Need BDC-specific portfolio or investment data
    fix: "from edgar.bdc import get_bdc_list; bdcs = get_bdc_list(); arcc = bdcs.get_by_ticker('ARCC')"
    why: Company() lacks schedule_of_investments() and portfolio_investments() methods
